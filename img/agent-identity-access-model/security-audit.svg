<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-label="安全与审计及下一步">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#475569"/></marker>
  </defs>
  <style>text{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif}</style>
  <rect width="960" height="440" rx="10" fill="#f8fafc"/>
  <text x="480" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">安全与审计：凭证隔离 · 出站阻断 · 全量日志</text>

  <!-- 流程四段 -->
  <rect x="40" y="72" width="200" height="120" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s)"/>
  <text x="140" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">① 凭证隔离存储</text>
  <text x="140" y="126" text-anchor="middle" font-size="12" fill="#475569">映射到频道身份</text>
  <text x="140" y="148" text-anchor="middle" font-size="12" fill="#475569">请求时于网络边界</text>
  <text x="140" y="168" text-anchor="middle" font-size="12" fill="#475569">注入，不落入对话</text>

  <path d="M242 132 L268 132" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#ar)"/>

  <rect x="270" y="72" width="200" height="120" rx="10" fill="#ffffff" stroke="#fecaca" stroke-width="1.5" filter="url(#s)"/>
  <text x="370" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">② 出站流量阻断</text>
  <text x="370" y="126" text-anchor="middle" font-size="12" fill="#475569">未经管理员允许的</text>
  <text x="370" y="148" text-anchor="middle" font-size="12" fill="#475569">主机，出站一律拦截</text>
  <text x="370" y="168" text-anchor="middle" font-size="12" fill="#ef4444">✕ 默认拒绝</text>

  <path d="M472 132 L498 132" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#ar)"/>

  <rect x="500" y="72" width="200" height="120" rx="10" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5" filter="url(#s)"/>
  <text x="600" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">③ Agent 自身账户</text>
  <text x="600" y="126" text-anchor="middle" font-size="12" fill="#475569">以服务账户行动</text>
  <text x="600" y="148" text-anchor="middle" font-size="12" fill="#475569">不借个人凭证</text>
  <text x="600" y="168" text-anchor="middle" font-size="12" fill="#047857">✓ 行为可归因</text>

  <path d="M702 132 L728 132" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#ar)"/>

  <rect x="730" y="72" width="200" height="120" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s)"/>
  <text x="830" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">④ 全量日志</text>
  <text x="830" y="126" text-anchor="middle" font-size="12" fill="#475569">例程/记忆写入/网络</text>
  <text x="830" y="148" text-anchor="middle" font-size="12" fill="#475569">调用全部记录，且</text>
  <text x="830" y="168" text-anchor="middle" font-size="12" fill="#475569">进入各系统自有日志</text>

  <!-- 下一步 -->
  <text x="480" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#6d28d9">下一步 · What's next</text>
  <rect x="120" y="256" width="340" height="150" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#s)"/>
  <text x="290" y="288" text-anchor="middle" font-size="15" font-weight="700" fill="#6d28d9">即时（JIT）凭证授予</text>
  <text x="290" y="320" text-anchor="middle" font-size="13" fill="#475569">用户临时批准单次敏感操作</text>
  <text x="290" y="346" text-anchor="middle" font-size="13" fill="#475569">而不永久扩大 Agent 权限</text>
  <rect x="150" y="366" width="280" height="26" rx="6" fill="#ffffff" stroke="#ede9fe"/>
  <text x="290" y="384" text-anchor="middle" font-size="12" fill="#6d28d9">用完即回收，最小暴露面</text>

  <rect x="500" y="256" width="340" height="150" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#s)"/>
  <text x="670" y="288" text-anchor="middle" font-size="15" font-weight="700" fill="#6d28d9">身份感知覆盖层</text>
  <text x="670" y="320" text-anchor="middle" font-size="13" fill="#475569">在 Agent 权限之上叠加用户级检查</text>
  <text x="670" y="346" text-anchor="middle" font-size="13" fill="#475569">频道 Profile 与用户权限「双同意」</text>
  <rect x="530" y="366" width="280" height="26" rx="6" fill="#ffffff" stroke="#ede9fe"/>
  <text x="670" y="384" text-anchor="middle" font-size="12" fill="#6d28d9">面向权限结构复杂的组织</text>
</svg>
