<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-label="带走清单">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>
  <style>text{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif}</style>
  <rect width="960" height="430" rx="10" fill="#f8fafc"/>
  <text x="480" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">带走清单 · 六条要点</text>

  <g>
    <rect x="48" y="70" width="435" height="104" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#s)"/>
    <circle cx="80" cy="102" r="15" fill="#dbeafe"/><text x="80" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">1</text>
    <text x="106" y="100" font-size="14" font-weight="700" fill="#1e293b">权限的锚点从「用户」变「频道」</text>
    <text x="106" y="126" font-size="13" fill="#64748b">该问的是 Agent 在这个隔间能做什么，</text>
    <text x="106" y="148" font-size="13" fill="#64748b">而不是某个用户能做什么。</text>

    <rect x="497" y="70" width="435" height="104" rx="10" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5" filter="url(#s)"/>
    <circle cx="529" cy="102" r="15" fill="#d1fae5"/><text x="529" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">2</text>
    <text x="555" y="100" font-size="14" font-weight="700" fill="#1e293b">Agent 以自身身份行动</text>
    <text x="555" y="126" font-size="13" fill="#64748b">独立服务账户，不借个人凭证，</text>
    <text x="555" y="148" font-size="13" fill="#64748b">共享频道不再是窥探他人的侧门。</text>

    <rect x="48" y="186" width="435" height="104" rx="10" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#s)"/>
    <circle cx="80" cy="218" r="15" fill="#ede9fe"/><text x="80" y="223" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">3</text>
    <text x="106" y="216" font-size="14" font-weight="700" fill="#1e293b">工作区定基线，频道可覆盖</text>
    <text x="106" y="242" font-size="13" fill="#64748b">继承 + 覆盖两级模型，让权限既统一</text>
    <text x="106" y="264" font-size="13" fill="#64748b">又能按频道收放。</text>

    <rect x="497" y="186" width="435" height="104" rx="10" fill="#ffffff" stroke="#fde68a" stroke-width="1.5" filter="url(#s)"/>
    <circle cx="529" cy="218" r="15" fill="#fef3c7"/><text x="529" y="223" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">4</text>
    <text x="555" y="216" font-size="14" font-weight="700" fill="#1e293b">私有频道各有边界，记忆不外泄</text>
    <text x="555" y="242" font-size="13" fill="#64748b">企业版再叠加 RBAC，同时管控</text>
    <text x="555" y="264" font-size="13" fill="#64748b">「Agent 能碰什么」与「谁能提问」。</text>

    <rect x="48" y="302" width="435" height="104" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#s)"/>
    <circle cx="80" cy="334" r="15" fill="#dbeafe"/><text x="80" y="339" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">5</text>
    <text x="106" y="332" font-size="14" font-weight="700" fill="#1e293b">先慷慨授权，靠审计再收窄</text>
    <text x="106" y="358" font-size="13" fill="#64748b">价值随上下文复合增长，从基线起步、</text>
    <text x="106" y="380" font-size="13" fill="#64748b">读审计、按需谨慎扩展。</text>

    <rect x="497" y="302" width="435" height="104" rx="10" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5" filter="url(#s)"/>
    <circle cx="529" cy="334" r="15" fill="#d1fae5"/><text x="529" y="339" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">6</text>
    <text x="555" y="332" font-size="14" font-weight="700" fill="#1e293b">安全靠隔离 + 阻断 + 归因</text>
    <text x="555" y="358" font-size="13" fill="#64748b">凭证隔离注入、出站默认拒绝、全量</text>
    <text x="555" y="380" font-size="13" fill="#64748b">日志，未来还有 JIT 与身份覆盖层。</text>
  </g>
</svg>
