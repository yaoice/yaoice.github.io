<svg xmlns="http://www.w3.org/2000/svg" width="960" height="450" viewBox="0 0 960 450" role="img" aria-label="宽泛默认访问与价值复合增长">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
    <marker id="arb" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#3b82f6"/></marker>
    <marker id="arg" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#10b981"/></marker>
  </defs>
  <style>text{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif}</style>
  <rect width="960" height="450" rx="10" fill="#f8fafc"/>
  <text x="480" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">宽泛默认访问：价值随工具与上下文复合增长</text>

  <!-- 上半：跨系统汇聚 -->
  <rect x="48" y="66" width="864" height="190" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s)"/>
  <text x="72" y="94" font-size="14" font-weight="700" fill="#1d4ed8">跨系统组合上下文 → 一个答案</text>
  <g>
    <rect x="72" y="112" width="150" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe"/><text x="147" y="137" text-anchor="middle" font-size="13" fill="#334155">Slack 线程</text>
    <rect x="72" y="160" width="150" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe"/><text x="147" y="185" text-anchor="middle" font-size="13" fill="#334155">Drive 文档</text>
    <rect x="72" y="208" width="150" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe"/><text x="147" y="233" text-anchor="middle" font-size="13" fill="#334155">工单系统</text>
  </g>
  <rect x="72" y="256" width="150" height="0" fill="none"/>
  <rect x="72" y="112" width="0" height="0"/>
  <path d="M222 132 L392 172" stroke="#3b82f6" stroke-width="1.8" fill="none" marker-end="url(#arb)"/>
  <path d="M222 180 L392 178" stroke="#3b82f6" stroke-width="1.8" fill="none" marker-end="url(#arb)"/>
  <path d="M222 228 L392 184" stroke="#3b82f6" stroke-width="1.8" fill="none" marker-end="url(#arb)"/>
  <rect x="398" y="150" width="170" height="56" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="483" y="174" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">数据仓库查询</text>
  <text x="483" y="194" text-anchor="middle" font-size="12" fill="#1d4ed8">+ Agent 组合推理</text>
  <path d="M568 178 L648 178" stroke="#3b82f6" stroke-width="2.4" fill="none" marker-end="url(#arb)"/>
  <rect x="654" y="146" width="210" height="64" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="759" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">一个连贯的答案</text>
  <text x="759" y="194" text-anchor="middle" font-size="12" fill="#047857">价值来自「组合」而非单点</text>

  <!-- 下半：推荐路径 -->
  <rect x="48" y="272" width="864" height="150" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s)"/>
  <text x="72" y="300" font-size="14" font-weight="700" fill="#047857">推荐路径：先慷慨授权，再按管理员偏好谨慎收窄</text>
  <rect x="80" y="322" width="230" height="76" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="195" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">1 · 少量频道起步</text>
  <text x="195" y="378" text-anchor="middle" font-size="12" fill="#475569">从基线 Profile 开始</text>
  <path d="M312 360 L350 360" stroke="#10b981" stroke-width="2.4" fill="none" marker-end="url(#arg)"/>
  <rect x="356" y="322" width="230" height="76" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="471" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">2 · 阅读审计记录</text>
  <text x="471" y="378" text-anchor="middle" font-size="12" fill="#475569">看 Agent 实际怎么用</text>
  <path d="M588 360 L626 360" stroke="#10b981" stroke-width="2.4" fill="none" marker-end="url(#arg)"/>
  <rect x="632" y="322" width="248" height="76" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="756" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">3 · 逐一谨慎扩展</text>
  <text x="756" y="378" text-anchor="middle" font-size="12" fill="#475569">在工作需要处扩权/禁用/RBAC</text>
</svg>
