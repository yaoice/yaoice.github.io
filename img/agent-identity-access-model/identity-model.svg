<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470" role="img" aria-label="Agent 身份模型如何运作">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/></marker>
  </defs>
  <style>text{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif}</style>
  <rect width="960" height="470" rx="10" fill="#f8fafc"/>
  <text x="480" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">身份模型：工作区定义基线，频道继承并可覆盖</text>

  <!-- 工作区级身份 -->
  <rect x="150" y="66" width="660" height="118" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#s)"/>
  <text x="480" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">工作区级身份（管理员配置的基线 Profile）</text>
  <g>
    <rect x="176" y="106" width="150" height="60" rx="8" fill="#ffffff" stroke="#bfdbfe"/><text x="251" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">仓库访问</text><text x="251" y="152" text-anchor="middle" font-size="11" fill="#64748b">可读写哪些 repo</text>
    <rect x="336" y="106" width="150" height="60" rx="8" fill="#ffffff" stroke="#bfdbfe"/><text x="411" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">连接器 Connectors</text><text x="411" y="152" text-anchor="middle" font-size="11" fill="#64748b">工具与 API 密钥</text>
    <rect x="496" y="106" width="150" height="60" rx="8" fill="#ffffff" stroke="#bfdbfe"/><text x="571" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">技能与插件</text><text x="571" y="152" text-anchor="middle" font-size="11" fill="#64748b">动态加载指令/脚本</text>
    <rect x="656" y="106" width="132" height="60" rx="8" fill="#ffffff" stroke="#bfdbfe"/><text x="722" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">常驻指令</text><text x="722" y="152" text-anchor="middle" font-size="11" fill="#64748b">频道级上下文</text>
  </g>

  <!-- 继承箭头 -->
  <path d="M260 184 L200 236" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <path d="M480 184 L480 236" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <path d="M700 184 L760 236" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <text x="500" y="212" font-size="12" font-weight="600" fill="#64748b">默认继承</text>

  <!-- 频道 -->
  <rect x="60" y="240" width="270" height="180" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s)"/>
  <rect x="60" y="240" width="270" height="34" rx="10" fill="#f1f5f9"/><rect x="60" y="258" width="270" height="16" fill="#f1f5f9"/>
  <text x="195" y="263" text-anchor="middle" font-size="14" font-weight="700" fill="#334155"># general（公共频道）</text>
  <text x="84" y="300" font-size="13" fill="#475569">· 使用工作区基线身份</text>
  <text x="84" y="326" font-size="13" fill="#475569">· 数据仓库连接：只读</text>
  <text x="84" y="352" font-size="13" fill="#475569">· 频道内任何人默认可 @Claude</text>
  <rect x="84" y="372" width="222" height="30" rx="6" fill="#f8fafc"/><text x="195" y="392" text-anchor="middle" font-size="12" fill="#64748b">= 继承，未做覆盖</text>

  <rect x="345" y="240" width="270" height="180" rx="10" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" filter="url(#s)"/>
  <rect x="345" y="240" width="270" height="34" rx="10" fill="#dbeafe"/><rect x="345" y="258" width="270" height="16" fill="#dbeafe"/>
  <text x="480" y="263" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8"># eng（工程私有频道）</text>
  <text x="369" y="300" font-size="13" fill="#475569">· 覆盖：授予 GitHub 读写</text>
  <text x="369" y="326" font-size="13" fill="#475569">· 覆盖：数据仓库可写</text>
  <text x="369" y="352" font-size="13" fill="#475569">· 加载工程相关技能/插件</text>
  <rect x="369" y="372" width="222" height="30" rx="6" fill="#eff6ff"/><text x="480" y="392" text-anchor="middle" font-size="12" fill="#1d4ed8">频道级覆盖，权限更宽</text>

  <rect x="630" y="240" width="270" height="180" rx="10" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#s)"/>
  <rect x="630" y="240" width="270" height="34" rx="10" fill="#ede9fe"/><rect x="630" y="258" width="270" height="16" fill="#ede9fe"/>
  <text x="765" y="263" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9"># legal（法务私有频道）</text>
  <text x="654" y="300" font-size="13" fill="#475569">· 覆盖：仅限法务连接器</text>
  <text x="654" y="326" font-size="13" fill="#475569">· 不可触及未授权代码库</text>
  <text x="654" y="352" font-size="13" fill="#475569">· 独立身份，记忆不外泄</text>
  <rect x="654" y="372" width="222" height="30" rx="6" fill="#f5f3ff"/><text x="765" y="392" text-anchor="middle" font-size="12" fill="#6d28d9">频道级覆盖，权限收窄</text>

  <text x="480" y="448" text-anchor="middle" font-size="13" fill="#94a3b8">关键问题：不是「用户能做什么」，而是「Agent 在这个隔间能做什么」</text>
</svg>
