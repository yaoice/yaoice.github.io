<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-label="为什么以用户身份代理会失效">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>
  <style>text{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif}</style>
  <rect width="960" height="430" rx="10" fill="#f8fafc"/>
  <text x="480" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">「以用户身份代理」失效的两个驱动力</text>

  <!-- 驱动一：自主性 -->
  <rect x="48" y="72" width="420" height="320" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s)"/>
  <text x="72" y="106" font-size="15" font-weight="700" fill="#8b5cf6">驱动一 · Agent 自主性快速增长</text>
  <text x="72" y="130" font-size="13" fill="#64748b">可独立可靠完成的任务时长，约每 4 个月翻一番</text>

  <!-- 坐标轴 -->
  <line x1="96" y1="340" x2="440" y2="340" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="96" y1="340" x2="96" y2="160" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="90" y="356" text-anchor="end" font-size="11" fill="#94a3b8">时间</text>
  <!-- 翻倍曲线（阶梯柱） -->
  <rect x="120" y="322" width="40" height="18" rx="3" fill="#c4b5fd"/>
  <rect x="188" y="300" width="40" height="40" rx="3" fill="#a78bfa"/>
  <rect x="256" y="262" width="40" height="78" rx="3" fill="#8b5cf6"/>
  <rect x="324" y="196" width="40" height="144" rx="3" fill="#7c3aed"/>
  <text x="140" y="316" text-anchor="middle" font-size="10" fill="#6d28d9">1x</text>
  <text x="208" y="294" text-anchor="middle" font-size="10" fill="#fff">2x</text>
  <text x="276" y="256" text-anchor="middle" font-size="10" fill="#fff">4x</text>
  <text x="344" y="190" text-anchor="middle" font-size="10" fill="#fff">8x</text>
  <text x="380" y="336" font-size="11" fill="#94a3b8">→</text>
  <rect x="72" y="360" width="372" height="22" rx="6" fill="#f5f3ff"/>
  <text x="258" y="375" text-anchor="middle" font-size="12" fill="#6d28d9">请求者已下线，Agent 仍在自主排期、响应事件</text>

  <!-- 驱动二：多人同驾 -->
  <rect x="492" y="72" width="420" height="320" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s)"/>
  <text x="516" y="106" font-size="15" font-weight="700" fill="#f59e0b">驱动二 · 多人共享同一个频道</text>
  <text x="516" y="130" font-size="13" fill="#64748b">3 名工程师 + 1 名 PM 一起在频道里调试</text>

  <!-- 四个人 -->
  <g>
    <circle cx="560" cy="200" r="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/><text x="560" y="205" text-anchor="middle" font-size="12" fill="#92400e">Eng</text>
    <circle cx="640" cy="200" r="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/><text x="640" y="205" text-anchor="middle" font-size="12" fill="#92400e">Eng</text>
    <circle cx="720" cy="200" r="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/><text x="720" y="205" text-anchor="middle" font-size="12" fill="#92400e">Eng</text>
    <circle cx="800" cy="200" r="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/><text x="800" y="205" text-anchor="middle" font-size="12" fill="#92400e">PM</text>
  </g>
  <path d="M560 224 L676 268 M640 224 L678 268 M720 224 L682 268 M800 224 L688 268" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="682" cy="292" r="30" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="682" y="297" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Claude</text>
  <rect x="516" y="342" width="372" height="34" rx="8" fill="#fffbeb"/>
  <text x="702" y="364" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">多人同时「驾驶」，该用谁的权限？</text>
</svg>
