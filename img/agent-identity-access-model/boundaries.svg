<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-label="身份边界如何运作">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>
  <style>text{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif}</style>
  <rect width="960" height="440" rx="10" fill="#f8fafc"/>
  <text x="480" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">身份边界：每个私有频道一套独立身份</text>

  <!-- 工程隔间 -->
  <rect x="60" y="70" width="360" height="220" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#s)"/>
  <text x="240" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8"># eng 隔间</text>
  <rect x="86" y="114" width="308" height="44" rx="8" fill="#ffffff" stroke="#bfdbfe"/><text x="240" y="141" text-anchor="middle" font-size="13" fill="#334155">身份可读写：代码库 · 数据仓库</text>
  <rect x="86" y="168" width="308" height="44" rx="8" fill="#ffffff" stroke="#bfdbfe"/><text x="240" y="195" text-anchor="middle" font-size="13" fill="#334155">记忆：仅存于本频道，不外泄</text>
  <rect x="86" y="222" width="308" height="44" rx="8" fill="#ffffff" stroke="#fecaca"/><text x="240" y="249" text-anchor="middle" font-size="13" fill="#b91c1c">✕ 不能读取法务文档</text>

  <!-- 隔离墙 -->
  <line x1="480" y1="76" x2="480" y2="284" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="6 5"/>
  <rect x="452" y="164" width="56" height="30" rx="6" fill="#fff" stroke="#cbd5e1"/><text x="480" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">隔离</text>

  <!-- 法务隔间 -->
  <rect x="540" y="70" width="360" height="220" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#s)"/>
  <text x="720" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#6d28d9"># legal 隔间</text>
  <rect x="566" y="114" width="308" height="44" rx="8" fill="#ffffff" stroke="#c4b5fd"/><text x="720" y="141" text-anchor="middle" font-size="13" fill="#334155">身份可访问：合同库 · 法务连接器</text>
  <rect x="566" y="168" width="308" height="44" rx="8" fill="#ffffff" stroke="#c4b5fd"/><text x="720" y="195" text-anchor="middle" font-size="13" fill="#334155">记忆：仅存于本频道，不外泄</text>
  <rect x="566" y="222" width="308" height="44" rx="8" fill="#ffffff" stroke="#fecaca"/><text x="720" y="249" text-anchor="middle" font-size="13" fill="#b91c1c">✕ 不能触碰未授权代码</text>

  <!-- 底部两条要点 -->
  <rect x="60" y="308" width="415" height="104" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="84" y="336" font-size="14" font-weight="700" fill="#b45309">偏离传统按用户的 ACL</text>
  <text x="84" y="362" font-size="13" fill="#475569">对 repo 无直接权限的频道成员，只要频道</text>
  <text x="84" y="384" font-size="13" fill="#475569">Profile 授予了 Claude，就能让它去读该 repo。</text>
  <text x="84" y="404" font-size="12" fill="#94a3b8">权限属于「频道里的 Agent」，不属于个人</text>

  <rect x="485" y="308" width="415" height="104" rx="10" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5"/>
  <text x="509" y="336" font-size="14" font-weight="700" fill="#047857">企业版 · RBAC 双重管控</text>
  <text x="509" y="362" font-size="13" fill="#475569">频道 Profile 管「Agent 能触及什么」，</text>
  <text x="509" y="384" font-size="13" fill="#475569">RBAC 管「谁能调用 Agent 提问」。</text>
  <text x="509" y="404" font-size="12" fill="#94a3b8">可收紧到频道内权限最低的成员</text>
</svg>
