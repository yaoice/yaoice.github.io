<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470" role="img" aria-label="Agent 身份：面向自主、团队级 AI 的新访问模型">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#3b82f6"/></marker>
  </defs>
  <style>text{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif}</style>
  <rect width="960" height="470" rx="10" fill="#f8fafc"/>

  <text x="480" y="58" text-anchor="middle" font-size="30" font-weight="800" fill="#1e293b">Agent 身份：面向团队的新访问模型</text>
  <text x="480" y="92" text-anchor="middle" font-size="16" fill="#475569">从「这个用户能做什么」到「这个 Agent 在这个隔间里能做什么」</text>

  <!-- 旧模型 -->
  <rect x="60" y="140" width="360" height="270" rx="10" fill="#ffffff" stroke="#fecaca" stroke-width="1.5" filter="url(#s)"/>
  <rect x="60" y="140" width="360" height="46" rx="10" fill="#fee2e2"/>
  <rect x="60" y="170" width="360" height="16" fill="#fee2e2"/>
  <text x="240" y="170" text-anchor="middle" font-size="17" font-weight="700" fill="#b91c1c">旧模型 · act as the user</text>
  <text x="88" y="222" font-size="15" font-weight="600" fill="#334155">Agent 借用某个人的凭证行动</text>
  <text x="88" y="262" font-size="14" fill="#64748b">✕ 自主性每 4 个月翻倍，请求者已下线</text>
  <text x="88" y="292" font-size="14" fill="#64748b">✕ 多人共享频道，该用谁的权限？</text>
  <text x="88" y="322" font-size="14" fill="#64748b">✕ 共享空间成了窥探他人文档的侧门</text>
  <rect x="88" y="348" width="304" height="40" rx="8" fill="#fef2f2"/>
  <text x="240" y="373" text-anchor="middle" font-size="13" font-weight="600" fill="#b91c1c">没有任何单一用户权限在所有情况下都对</text>

  <!-- 箭头 -->
  <path d="M432 275 L528 275" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#ar)"/>
  <text x="480" y="262" text-anchor="middle" font-size="12" font-weight="700" fill="#3b82f6">转变</text>

  <!-- 新模型 -->
  <rect x="540" y="140" width="360" height="270" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#s)"/>
  <rect x="540" y="140" width="360" height="46" rx="10" fill="#dbeafe"/>
  <rect x="540" y="170" width="360" height="16" fill="#dbeafe"/>
  <text x="720" y="170" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">新模型 · agent identity</text>
  <text x="568" y="222" font-size="15" font-weight="600" fill="#334155">Agent 以自身身份、独立账户行动</text>
  <text x="568" y="262" font-size="14" fill="#475569">✓ 管理员按工作区/频道配置身份</text>
  <text x="568" y="292" font-size="14" fill="#475569">✓ 权限按频道（隔间）而非按用户</text>
  <text x="568" y="322" font-size="14" fill="#475569">✓ 撤销身份，全部访问一次性收回</text>
  <rect x="568" y="348" width="304" height="40" rx="8" fill="#eff6ff"/>
  <text x="720" y="373" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">宽到够用、限到在企业规模下依然安全</text>

  <text x="480" y="446" text-anchor="middle" font-size="13" fill="#94a3b8">Anthropic · Claude Code / Claude Tag · 2026-06-24</text>
</svg>
