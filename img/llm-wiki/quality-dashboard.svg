<svg width="1180" height="720" viewBox="0 0 1180 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LLM Wiki 质量度量看板</title>
  <desc id="desc">展示 LLM Wiki 项目可直接落地的质量指标，包括引用覆盖率、孤岛页面、索引延迟、冲突积压、查询写回率和人工审查 SLA。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#f0fdf4"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>.title{font:800 30px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.sub{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}.h{font:800 17px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.num{font:900 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.txt{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#334155}.small{font:500 12.5px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}.ok{fill:#dcfce7;stroke:#22c55e}.warn{fill:#fef3c7;stroke:#f59e0b}.bad{fill:#fee2e2;stroke:#fb7185}.card{fill:#fff}</style>
  </defs>
  <rect width="1180" height="720" rx="28" fill="url(#bg)"/>
  <text x="590" y="54" text-anchor="middle" class="title">质量看板：把“知识库是否健康”变成可度量指标</text>
  <text x="590" y="84" text-anchor="middle" class="sub">LLM Wiki 不能只看页面数量，必须看证据链、可导航性、维护延迟和复用效率</text>

  <g transform="translate(70,132)">
    <rect width="320" height="160" rx="24" class="card" filter="url(#shadow)"/>
    <rect x="24" y="24" width="82" height="34" rx="17" class="ok"/><text x="65" y="46" text-anchor="middle" class="txt">核心</text>
    <text x="24" y="88" class="h">引用覆盖率</text><text x="24" y="132" class="num">≥ 90%</text>
    <text x="168" y="104" class="small">有 source 支撑的事实主张占比</text><text x="168" y="128" class="small">低于阈值时禁止发布 synthesis</text>
  </g>
  <g transform="translate(430,132)">
    <rect width="320" height="160" rx="24" class="card" filter="url(#shadow)"/>
    <rect x="24" y="24" width="82" height="34" rx="17" class="warn"/><text x="65" y="46" text-anchor="middle" class="txt">导航</text>
    <text x="24" y="88" class="h">孤岛页面率</text><text x="24" y="132" class="num">≤ 5%</text>
    <text x="168" y="104" class="small">无入链且无出链页面占比</text><text x="168" y="128" class="small">每周 Lint 后必须处理 Top 10</text>
  </g>
  <g transform="translate(790,132)">
    <rect width="320" height="160" rx="24" class="card" filter="url(#shadow)"/>
    <rect x="24" y="24" width="82" height="34" rx="17" class="ok"/><text x="65" y="46" text-anchor="middle" class="txt">时效</text>
    <text x="24" y="88" class="h">索引延迟</text><text x="24" y="132" class="num">≤ 1d</text>
    <text x="168" y="104" class="small">新页面进入 index.md 的延迟</text><text x="168" y="128" class="small">超过一天说明导航已漂移</text>
  </g>

  <g transform="translate(70,335)">
    <rect width="320" height="160" rx="24" class="card" filter="url(#shadow)"/>
    <rect x="24" y="24" width="82" height="34" rx="17" class="bad"/><text x="65" y="46" text-anchor="middle" class="txt">风险</text>
    <text x="24" y="88" class="h">冲突积压</text><text x="24" y="132" class="num">≤ 10</text>
    <text x="168" y="104" class="small">未处理 contradiction 数量</text><text x="168" y="128" class="small">按影响范围和来源可信度排序</text>
  </g>
  <g transform="translate(430,335)">
    <rect width="320" height="160" rx="24" class="card" filter="url(#shadow)"/>
    <rect x="24" y="24" width="82" height="34" rx="17" class="ok"/><text x="65" y="46" text-anchor="middle" class="txt">复用</text>
    <text x="24" y="88" class="h">查询写回率</text><text x="24" y="132" class="num">≥ 30%</text>
    <text x="168" y="104" class="small">有价值 Query 被沉淀为页面比例</text><text x="168" y="128" class="small">太低说明仍停留在聊天模式</text>
  </g>
  <g transform="translate(790,335)">
    <rect width="320" height="160" rx="24" class="card" filter="url(#shadow)"/>
    <rect x="24" y="24" width="82" height="34" rx="17" class="warn"/><text x="65" y="46" text-anchor="middle" class="txt">治理</text>
    <text x="24" y="88" class="h">审查 SLA</text><text x="24" y="132" class="num">≤ 48h</text>
    <text x="168" y="104" class="small">关键 synthesis 的人工审核时限</text><text x="168" y="128" class="small">超过时标记为 draft</text>
  </g>

  <rect x="150" y="552" width="880" height="98" rx="24" fill="#fff" filter="url(#shadow)"/>
  <text x="590" y="586" text-anchor="middle" class="h">建议每周输出一份 Wiki Health Report</text>
  <text x="590" y="616" text-anchor="middle" class="txt">新增 source / 新增页面 / 写回 synthesis / 未处理冲突 / 无引用主张 / 下周待研究问题</text>
  <text x="590" y="642" text-anchor="middle" class="small">如果这些指标连续两周恶化，先暂停批量摄入，优先偿还知识债务</text>
</svg>
