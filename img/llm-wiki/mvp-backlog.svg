<svg width="1180" height="720" viewBox="0 0 1180 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LLM Wiki MVP 任务看板</title>
  <desc id="desc">展示 LLM Wiki MVP 的可执行任务拆解，按仓库、规则、摄入、查询、质量五个泳道组织。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>.title{font:800 30px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.sub{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}.h{font:800 17px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.txt{font:600 13.5px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#334155}.small{font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}.done{fill:#dcfce7;stroke:#22c55e}.doing{fill:#eff6ff;stroke:#60a5fa}.risk{fill:#fee2e2;stroke:#fb7185}.todo{fill:#fff;stroke:#cbd5e1}</style>
  </defs>
  <rect width="1180" height="720" rx="28" fill="url(#bg)"/>
  <text x="590" y="54" text-anchor="middle" class="title">MVP 任务看板：照着做即可启动第一个 LLM Wiki</text>
  <text x="590" y="84" text-anchor="middle" class="sub">把“搭知识库”拆成 5 条泳道，每张卡片都对应一个可检查交付物</text>

  <g transform="translate(42,130)">
    <rect width="210" height="520" rx="22" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="210" height="58" rx="22" fill="#fed7aa"/><text x="105" y="37" text-anchor="middle" class="h">仓库骨架</text>
    <rect x="22" y="88" width="166" height="62" rx="15" class="done"/><text x="105" y="112" text-anchor="middle" class="txt">创建目录结构</text><text x="105" y="134" text-anchor="middle" class="small">raw / wiki / assets</text>
    <rect x="22" y="174" width="166" height="62" rx="15" class="done"/><text x="105" y="198" text-anchor="middle" class="txt">初始化 Git</text><text x="105" y="220" text-anchor="middle" class="small">main + ingest 分支</text>
    <rect x="22" y="260" width="166" height="62" rx="15" class="doing"/><text x="105" y="284" text-anchor="middle" class="txt">准备样本资料</text><text x="105" y="306" text-anchor="middle" class="small">5~10 个真实 source</text>
    <rect x="22" y="346" width="166" height="62" rx="15" class="todo"/><text x="105" y="370" text-anchor="middle" class="txt">配置 Obsidian</text><text x="105" y="392" text-anchor="middle" class="small">Graph + attachments</text>
    <text x="105" y="468" text-anchor="middle" class="small">完成定义</text><text x="105" y="492" text-anchor="middle" class="txt">能打开、能检索、能 diff</text>
  </g>

  <g transform="translate(263,130)">
    <rect width="210" height="520" rx="22" fill="#ffffff" filter="url(#shadow)"/>
    <rect width="210" height="58" rx="22" fill="#ddd6fe"/><text x="105" y="37" text-anchor="middle" class="h">Agent 规则</text>
    <rect x="22" y="88" width="166" height="62" rx="15" class="done"/><text x="105" y="112" text-anchor="middle" class="txt">AGENTS.md v0</text><text x="105" y="134" text-anchor="middle" class="small">目录 + 禁止修改 raw</text>
    <rect x="22" y="174" width="166" height="62" rx="15" class="doing"/><text x="105" y="198" text-anchor="middle" class="txt">页面模板</text><text x="105" y="220" text-anchor="middle" class="small">source/concept/synthesis</text>
    <rect x="22" y="260" width="166" height="62" rx="15" class="todo"/><text x="105" y="284" text-anchor="middle" class="txt">引用规则</text><text x="105" y="306" text-anchor="middle" class="small">No citation, no claim</text>
    <rect x="22" y="346" width="166" height="62" rx="15" class="risk"/><text x="105" y="370" text-anchor="middle" class="txt">冲突策略</text><text x="105" y="392" text-anchor="middle" class="small">禁止静默覆盖旧结论</text>
    <text x="105" y="468" text-anchor="middle" class="small">完成定义</text><text x="105" y="492" text-anchor="middle" class="txt">Agent 输出稳定可预测</text>
  </g>

  <g transform="translate(484,130)">
    <rect width="210" height="520" rx="22" fill="#ffffff" filter="url(#shadow)"/>
    <rect width="210" height="58" rx="22" fill="#bfdbfe"/><text x="105" y="37" text-anchor="middle" class="h">资料摄入</text>
    <rect x="22" y="88" width="166" height="62" rx="15" class="doing"/><text x="105" y="112" text-anchor="middle" class="txt">逐篇 ingest</text><text x="105" y="134" text-anchor="middle" class="small">不要批量黑盒导入</text>
    <rect x="22" y="174" width="166" height="62" rx="15" class="todo"/><text x="105" y="198" text-anchor="middle" class="txt">生成 source 页</text><text x="105" y="220" text-anchor="middle" class="small">摘要 + 核心引用</text>
    <rect x="22" y="260" width="166" height="62" rx="15" class="todo"/><text x="105" y="284" text-anchor="middle" class="txt">更新概念页</text><text x="105" y="306" text-anchor="middle" class="small">避免重复建页</text>
    <rect x="22" y="346" width="166" height="62" rx="15" class="todo"/><text x="105" y="370" text-anchor="middle" class="txt">追加 log.md</text><text x="105" y="392" text-anchor="middle" class="small">记录本次影响范围</text>
    <text x="105" y="468" text-anchor="middle" class="small">完成定义</text><text x="105" y="492" text-anchor="middle" class="txt">每个 source 都可追溯</text>
  </g>

  <g transform="translate(705,130)">
    <rect width="210" height="520" rx="22" fill="#ffffff" filter="url(#shadow)"/>
    <rect width="210" height="58" rx="22" fill="#bbf7d0"/><text x="105" y="37" text-anchor="middle" class="h">查询写回</text>
    <rect x="22" y="88" width="166" height="62" rx="15" class="todo"/><text x="105" y="112" text-anchor="middle" class="txt">设计 5 个问题</text><text x="105" y="134" text-anchor="middle" class="small">覆盖事实/对比/路线图</text>
    <rect x="22" y="174" width="166" height="62" rx="15" class="todo"/><text x="105" y="198" text-anchor="middle" class="txt">引用式回答</text><text x="105" y="220" text-anchor="middle" class="small">区分事实和推断</text>
    <rect x="22" y="260" width="166" height="62" rx="15" class="doing"/><text x="105" y="284" text-anchor="middle" class="txt">沉淀 synthesis</text><text x="105" y="306" text-anchor="middle" class="small">高价值答案写回</text>
    <rect x="22" y="346" width="166" height="62" rx="15" class="todo"/><text x="105" y="370" text-anchor="middle" class="txt">更新 index</text><text x="105" y="392" text-anchor="middle" class="small">可再次被找到</text>
    <text x="105" y="468" text-anchor="middle" class="small">完成定义</text><text x="105" y="492" text-anchor="middle" class="txt">同类问题答案更稳定</text>
  </g>

  <g transform="translate(926,130)">
    <rect width="210" height="520" rx="22" fill="#ffffff" filter="url(#shadow)"/>
    <rect width="210" height="58" rx="22" fill="#fecaca"/><text x="105" y="37" text-anchor="middle" class="h">质量门禁</text>
    <rect x="22" y="88" width="166" height="62" rx="15" class="todo"/><text x="105" y="112" text-anchor="middle" class="txt">首次 Lint</text><text x="105" y="134" text-anchor="middle" class="small">孤岛/重复/无引用</text>
    <rect x="22" y="174" width="166" height="62" rx="15" class="todo"/><text x="105" y="198" text-anchor="middle" class="txt">Git diff 审查</text><text x="105" y="220" text-anchor="middle" class="small">拒绝无关重写</text>
    <rect x="22" y="260" width="166" height="62" rx="15" class="risk"/><text x="105" y="284" text-anchor="middle" class="txt">隐私扫描</text><text x="105" y="306" text-anchor="middle" class="small">密钥/个人信息/内部资料</text>
    <rect x="22" y="346" width="166" height="62" rx="15" class="todo"/><text x="105" y="370" text-anchor="middle" class="txt">周报模板</text><text x="105" y="392" text-anchor="middle" class="small">新增/风险/下周问题</text>
    <text x="105" y="468" text-anchor="middle" class="small">完成定义</text><text x="105" y="492" text-anchor="middle" class="txt">可持续维护而非一次性生成</text>
  </g>
</svg>
