<svg width="1180" height="720" viewBox="0 0 1180 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LLM Wiki 知识复利飞轮</title>
  <desc id="desc">展示资料摄入、结构化页面、交叉引用、查询产出、写回和健康检查构成的知识复利循环。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ecfeff"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <linearGradient id="center" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0891b2"/><stop offset="1" stop-color="#4f46e5"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#0891b2"/></marker>
    <style>.title{font:800 30px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.sub{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}.h{font:800 18px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.txt{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#334155}.small{font:500 13px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}</style>
  </defs>
  <rect width="1180" height="720" rx="28" fill="url(#bg)"/>
  <text x="590" y="54" text-anchor="middle" class="title">知识复利飞轮：每一次互动都让 Wiki 更聪明</text>
  <text x="590" y="84" text-anchor="middle" class="sub">LLM Wiki 的价值不是“存了多少文件”，而是“关系、结论和问题是否持续沉淀”</text>

  <circle cx="590" cy="365" r="114" fill="url(#center)" filter="url(#shadow)"/>
  <text x="590" y="342" text-anchor="middle" style="font:800 25px sans-serif;fill:white">Compounding</text>
  <text x="590" y="374" text-anchor="middle" style="font:800 25px sans-serif;fill:white">Wiki</text>
  <text x="590" y="404" text-anchor="middle" style="font:600 14px sans-serif;fill:#cffafe">结构化 · 可链接 · 可审计 · 可演化</text>

  <g>
    <rect x="490" y="130" width="200" height="86" rx="22" fill="#fff" filter="url(#shadow)"/>
    <text x="590" y="164" text-anchor="middle" class="h">1. 摄入新资料</text>
    <text x="590" y="191" text-anchor="middle" class="small">论文、网页、会议纪要、日志</text>

    <rect x="782" y="234" width="214" height="86" rx="22" fill="#fff" filter="url(#shadow)"/>
    <text x="889" y="268" text-anchor="middle" class="h">2. 结构化页面</text>
    <text x="889" y="295" text-anchor="middle" class="small">source / entity / concept</text>

    <rect x="780" y="474" width="220" height="86" rx="22" fill="#fff" filter="url(#shadow)"/>
    <text x="890" y="508" text-anchor="middle" class="h">3. 建立交叉引用</text>
    <text x="890" y="535" text-anchor="middle" class="small">关系、冲突、时间线、证据链</text>

    <rect x="490" y="600" width="200" height="86" rx="22" fill="#fff" filter="url(#shadow)"/>
    <text x="590" y="634" text-anchor="middle" class="h">4. 查询与生成</text>
    <text x="590" y="661" text-anchor="middle" class="small">报告、对比表、路线图、幻灯片</text>

    <rect x="180" y="474" width="220" height="86" rx="22" fill="#fff" filter="url(#shadow)"/>
    <text x="290" y="508" text-anchor="middle" class="h">5. 高价值答案写回</text>
    <text x="290" y="535" text-anchor="middle" class="small">把临时洞察变成长期资产</text>

    <rect x="184" y="234" width="212" height="86" rx="22" fill="#fff" filter="url(#shadow)"/>
    <text x="290" y="268" text-anchor="middle" class="h">6. Lint 与重构</text>
    <text x="290" y="295" text-anchor="middle" class="small">去重、补链、标记过期结论</text>
  </g>

  <path d="M678 206 C744 210 793 231 815 250" stroke="#0891b2" stroke-width="4" fill="none" marker-end="url(#arr)"/>
  <path d="M942 319 C975 380 971 438 936 468" stroke="#0891b2" stroke-width="4" fill="none" marker-end="url(#arr)"/>
  <path d="M814 558 C758 602 696 626 690 630" stroke="#0891b2" stroke-width="4" fill="none" marker-end="url(#arr)"/>
  <path d="M490 646 C410 632 363 584 345 558" stroke="#0891b2" stroke-width="4" fill="none" marker-end="url(#arr)"/>
  <path d="M237 474 C198 414 201 348 239 319" stroke="#0891b2" stroke-width="4" fill="none" marker-end="url(#arr)"/>
  <path d="M395 248 C435 207 482 190 489 188" stroke="#0891b2" stroke-width="4" fill="none" marker-end="url(#arr)"/>

  <rect x="430" y="500" width="320" height="54" rx="18" fill="#cffafe" stroke="#06b6d4"/>
  <text x="590" y="523" text-anchor="middle" class="txt">复利来自写回闭环</text>
  <text x="590" y="544" text-anchor="middle" class="small">不是“回答完就结束”，而是“回答完就升级知识库”</text>
</svg>
