<svg width="1180" height="720" viewBox="0 0 1180 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LLM Wiki 30 天落地路线图</title>
  <desc id="desc">展示从第 0 天准备到第 30 天团队化运行的四阶段实施路线图、关键产物和验收标准。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/></linearGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#db2777"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
    <style>.title{font:800 30px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.sub{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}.h{font:800 18px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.txt{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#334155}.small{font:500 12.5px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}.white{fill:#fff;font:800 19px sans-serif}.mono{font:700 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#1e293b}</style>
  </defs>
  <rect width="1180" height="720" rx="28" fill="url(#bg)"/>
  <text x="590" y="54" text-anchor="middle" class="title">30 天落地路线图：先跑通闭环，再逐步工程化</text>
  <text x="590" y="84" text-anchor="middle" class="sub">每一阶段都必须交付可检查产物，避免把 LLM Wiki 做成“只停留在理念上的知识工程”</text>
  <path d="M118 362 H1045" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>

  <g transform="translate(70,135)">
    <rect width="240" height="455" rx="24" fill="#fff" filter="url(#shadow)"/>
    <circle cx="120" cy="58" r="38" fill="url(#p1)"/><text x="120" y="65" text-anchor="middle" class="white">D0-D3</text>
    <text x="120" y="116" text-anchor="middle" class="h">准备与建仓</text>
    <text x="28" y="155" class="txt">关键动作</text>
    <text x="28" y="182" class="small">• 选定一个真实研究主题</text>
    <text x="28" y="207" class="small">• 创建 raw/wiki 目录</text>
    <text x="28" y="232" class="small">• 写出 AGENTS.md v0</text>
    <text x="28" y="257" class="small">• 放入 5~10 个高质量 source</text>
    <rect x="28" y="292" width="184" height="74" rx="16" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="120" y="321" text-anchor="middle" class="mono">产物</text>
    <text x="120" y="345" text-anchor="middle" class="small">仓库骨架 + 规则草案</text>
    <rect x="28" y="390" width="184" height="40" rx="15" fill="#dcfce7" stroke="#22c55e"/>
    <text x="120" y="416" text-anchor="middle" class="small">验收：可执行一次手工摄入</text>
  </g>

  <g transform="translate(340,135)">
    <rect width="240" height="455" rx="24" fill="#fff" filter="url(#shadow)"/>
    <circle cx="120" cy="58" r="38" fill="url(#p2)"/><text x="120" y="65" text-anchor="middle" class="white">D4-D10</text>
    <text x="120" y="116" text-anchor="middle" class="h">MVP 闭环</text>
    <text x="28" y="155" class="txt">关键动作</text>
    <text x="28" y="182" class="small">• 逐篇 ingest source</text>
    <text x="28" y="207" class="small">• 维护 index.md / log.md</text>
    <text x="28" y="232" class="small">• 建立 concepts 与 syntheses</text>
    <text x="28" y="257" class="small">• 用 5 个问题测试 Query</text>
    <rect x="28" y="292" width="184" height="74" rx="16" fill="#f5f3ff" stroke="#a78bfa"/>
    <text x="120" y="321" text-anchor="middle" class="mono">产物</text>
    <text x="120" y="345" text-anchor="middle" class="small">20~40 页可导航 Wiki</text>
    <rect x="28" y="390" width="184" height="40" rx="15" fill="#dcfce7" stroke="#22c55e"/>
    <text x="120" y="416" text-anchor="middle" class="small">验收：好答案能写回复用</text>
  </g>

  <g transform="translate(610,135)">
    <rect width="240" height="455" rx="24" fill="#fff" filter="url(#shadow)"/>
    <circle cx="120" cy="58" r="38" fill="url(#p1)"/><text x="120" y="65" text-anchor="middle" class="white">D11-D20</text>
    <text x="120" y="116" text-anchor="middle" class="h">质量与检索</text>
    <text x="28" y="155" class="txt">关键动作</text>
    <text x="28" y="182" class="small">• 增加 frontmatter 字段</text>
    <text x="28" y="207" class="small">• 跑首次 Lint 报告</text>
    <text x="28" y="232" class="small">• 修复孤岛和无引用主张</text>
    <text x="28" y="257" class="small">• 评估是否加入 BM25</text>
    <rect x="28" y="292" width="184" height="74" rx="16" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="120" y="321" text-anchor="middle" class="mono">产物</text>
    <text x="120" y="345" text-anchor="middle" class="small">质量看板 + Lint 清单</text>
    <rect x="28" y="390" width="184" height="40" rx="15" fill="#dcfce7" stroke="#22c55e"/>
    <text x="120" y="416" text-anchor="middle" class="small">验收：引用覆盖率 ≥ 90%</text>
  </g>

  <g transform="translate(880,135)">
    <rect width="240" height="455" rx="24" fill="#fff" filter="url(#shadow)"/>
    <circle cx="120" cy="58" r="38" fill="url(#p2)"/><text x="120" y="65" text-anchor="middle" class="white">D21-D30</text>
    <text x="120" y="116" text-anchor="middle" class="h">团队化运行</text>
    <text x="28" y="155" class="txt">关键动作</text>
    <text x="28" y="182" class="small">• 建立 owner 与 review 规则</text>
    <text x="28" y="207" class="small">• 固化每日/每周 Runbook</text>
    <text x="28" y="232" class="small">• 引入 PR / Git diff 审查</text>
    <text x="28" y="257" class="small">• 设定脱敏与发布边界</text>
    <rect x="28" y="292" width="184" height="74" rx="16" fill="#fff7ed" stroke="#fdba74"/>
    <text x="120" y="321" text-anchor="middle" class="mono">产物</text>
    <text x="120" y="345" text-anchor="middle" class="small">可持续运营机制</text>
    <rect x="28" y="390" width="184" height="40" rx="15" fill="#dcfce7" stroke="#22c55e"/>
    <text x="120" y="416" text-anchor="middle" class="small">验收：每周稳定产出报告</text>
  </g>

  <rect x="210" y="630" width="760" height="48" rx="18" fill="#fff" stroke="#cbd5e1"/>
  <text x="590" y="660" text-anchor="middle" class="txt">落地原则：每 7~10 天只解决一个瓶颈，优先验证“摄入—查询—写回—审查”闭环是否成立</text>
</svg>
