<svg width="1180" height="720" viewBox="0 0 1180 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Schema 作为 LLM Wiki 的维护契约</title>
  <desc id="desc">展示 Schema 如何约束 LLM Agent 的页面格式、引用规范、工作流、质量门禁和冲突处理策略。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f5f3ff"/><stop offset="1" stop-color="#fff7ed"/></linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6d28d9"/><stop offset="1" stop-color="#db2777"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/></marker>
    <style>.title{font:800 30px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.sub{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}.h{font:800 18px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.txt{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#334155}.small{font:500 13px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}.mono{font:700 14px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#4c1d95}.dash{stroke-dasharray:8 8}</style>
  </defs>
  <rect width="1180" height="720" rx="28" fill="url(#bg)"/>
  <text x="590" y="54" text-anchor="middle" class="title">Schema：把 LLM 从“聊天者”约束成“知识库维护者”</text>
  <text x="590" y="84" text-anchor="middle" class="sub">没有规则文件，Agent 容易漂移；有了 Schema，维护动作才可重复、可审计、可扩展</text>

  <circle cx="590" cy="360" r="112" fill="url(#core)" filter="url(#shadow)"/>
  <text x="590" y="330" text-anchor="middle" style="font:800 26px sans-serif;fill:#fff">Schema</text>
  <text x="590" y="362" text-anchor="middle" style="font:700 17px sans-serif;fill:#fde68a">AGENTS.md / CLAUDE.md</text>
  <text x="590" y="392" text-anchor="middle" style="font:600 14px sans-serif;fill:#fce7f3">维护契约 · 质量门禁 · 操作手册</text>

  <g>
    <rect x="80" y="148" width="270" height="120" rx="22" fill="#fff" filter="url(#shadow)"/>
    <text x="215" y="184" text-anchor="middle" class="h">目录与命名</text>
    <text x="215" y="214" text-anchor="middle" class="small">页面类型、路径、slug、去重规则</text>
    <text x="215" y="240" text-anchor="middle" class="mono">entities/ concepts/ syntheses/</text>

    <rect x="830" y="148" width="270" height="120" rx="22" fill="#fff" filter="url(#shadow)"/>
    <text x="965" y="184" text-anchor="middle" class="h">页面格式</text>
    <text x="965" y="214" text-anchor="middle" class="small">frontmatter、摘要、引用、反向链接</text>
    <text x="965" y="240" text-anchor="middle" class="mono">status / confidence / sources</text>

    <rect x="80" y="450" width="270" height="120" rx="22" fill="#fff" filter="url(#shadow)"/>
    <text x="215" y="486" text-anchor="middle" class="h">工作流协议</text>
    <text x="215" y="516" text-anchor="middle" class="small">Ingest、Query、Lint 的步骤与写回条件</text>
    <text x="215" y="542" text-anchor="middle" class="mono">read → synthesize → update</text>

    <rect x="830" y="450" width="270" height="120" rx="22" fill="#fff" filter="url(#shadow)"/>
    <text x="965" y="486" text-anchor="middle" class="h">质量与安全</text>
    <text x="965" y="516" text-anchor="middle" class="small">引用门禁、冲突标记、隐私规则、Git diff</text>
    <text x="965" y="542" text-anchor="middle" class="mono">no citation, no claim</text>

    <rect x="455" y="112" width="270" height="112" rx="22" fill="#fff" filter="url(#shadow)"/>
    <text x="590" y="148" text-anchor="middle" class="h">索引与日志</text>
    <text x="590" y="178" text-anchor="middle" class="small">index.md 保持导航，log.md 保持时间线</text>
    <text x="590" y="204" text-anchor="middle" class="mono">append-only log</text>

    <rect x="455" y="496" width="270" height="112" rx="22" fill="#fff" filter="url(#shadow)"/>
    <text x="590" y="532" text-anchor="middle" class="h">冲突处理</text>
    <text x="590" y="562" text-anchor="middle" class="small">保留分歧、标记来源、避免过早合并</text>
    <text x="590" y="588" text-anchor="middle" class="mono">contradictions/</text>
  </g>

  <path d="M490 305 C410 245 360 218 352 208" stroke="#7c3aed" stroke-width="3" class="dash" marker-end="url(#arr)"/>
  <path d="M690 305 C770 245 820 218 828 208" stroke="#7c3aed" stroke-width="3" class="dash" marker-end="url(#arr)"/>
  <path d="M590 248 V232" stroke="#7c3aed" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M490 415 C410 475 360 508 352 510" stroke="#7c3aed" stroke-width="3" class="dash" marker-end="url(#arr)"/>
  <path d="M690 415 C770 475 820 508 828 510" stroke="#7c3aed" stroke-width="3" class="dash" marker-end="url(#arr)"/>
  <path d="M590 472 V486" stroke="#7c3aed" stroke-width="3" marker-end="url(#arr)"/>
</svg>
