<svg width="1180" height="720" viewBox="0 0 1180 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LLM Wiki 三类核心工作流</title>
  <desc id="desc">展示 Ingest、Query、Lint 三条工作流如何让知识库持续更新和保持健康。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <marker id="arr1" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#ea580c"/></marker>
    <marker id="arr2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
    <marker id="arr3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.11"/></filter>
    <style>
      .title{font:800 30px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.sub{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}.h{font:800 20px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.txt{font:600 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#334155}.small{font:500 13px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}.mono{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    </style>
  </defs>
  <rect width="1180" height="720" rx="28" fill="url(#bg)"/>
  <text x="590" y="54" text-anchor="middle" class="title">Ingest · Query · Lint：知识库的三条生命线</text>
  <text x="590" y="84" text-anchor="middle" class="sub">摄入让知识增长，查询让知识复用，Lint 让知识保持可信和可导航</text>

  <g transform="translate(50,135)">
    <rect width="1080" height="145" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <circle cx="65" cy="72" r="38" fill="#fed7aa"/><text x="65" y="79" text-anchor="middle" class="h">1</text>
    <text x="128" y="54" class="h">Ingest：新资料进入后，不只是索引，而是整合</text>
    <text x="128" y="84" class="small">一次摄入可能更新 10~15 个页面：source summary、实体页、概念页、综合页、索引和日志</text>
    <rect x="126" y="106" width="120" height="30" rx="15" fill="#fff7ed" stroke="#fdba74"/><text x="186" y="126" text-anchor="middle" class="mono">raw/new.md</text>
    <rect x="298" y="106" width="128" height="30" rx="15" fill="#fff7ed" stroke="#fdba74"/><text x="362" y="126" text-anchor="middle" class="txt">摘要与引用</text>
    <rect x="478" y="106" width="150" height="30" rx="15" fill="#fff7ed" stroke="#fdba74"/><text x="553" y="126" text-anchor="middle" class="txt">更新页面网络</text>
    <rect x="680" y="106" width="116" height="30" rx="15" fill="#fff7ed" stroke="#fdba74"/><text x="738" y="126" text-anchor="middle" class="mono">index.md</text>
    <rect x="848" y="106" width="106" height="30" rx="15" fill="#fff7ed" stroke="#fdba74"/><text x="901" y="126" text-anchor="middle" class="mono">log.md</text>
    <path d="M246 121 H288" stroke="#ea580c" stroke-width="3" marker-end="url(#arr1)"/><path d="M426 121 H468" stroke="#ea580c" stroke-width="3" marker-end="url(#arr1)"/><path d="M628 121 H670" stroke="#ea580c" stroke-width="3" marker-end="url(#arr1)"/><path d="M796 121 H838" stroke="#ea580c" stroke-width="3" marker-end="url(#arr1)"/>
  </g>

  <g transform="translate(50,315)">
    <rect width="1080" height="145" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <circle cx="65" cy="72" r="38" fill="#bfdbfe"/><text x="65" y="79" text-anchor="middle" class="h">2</text>
    <text x="128" y="54" class="h">Query：好答案要写回，而不是消失在聊天记录里</text>
    <text x="128" y="84" class="small">先用 index.md 找方向，再读相关页面和源引用；若答案产生新对比、新判断、新路线图，应沉淀为 synthesis</text>
    <rect x="126" y="106" width="110" height="30" rx="15" fill="#eff6ff" stroke="#93c5fd"/><text x="181" y="126" text-anchor="middle" class="txt">用户问题</text>
    <rect x="288" y="106" width="116" height="30" rx="15" fill="#eff6ff" stroke="#93c5fd"/><text x="346" y="126" text-anchor="middle" class="mono">index.md</text>
    <rect x="456" y="106" width="138" height="30" rx="15" fill="#eff6ff" stroke="#93c5fd"/><text x="525" y="126" text-anchor="middle" class="txt">相关 Wiki 页</text>
    <rect x="646" y="106" width="116" height="30" rx="15" fill="#eff6ff" stroke="#93c5fd"/><text x="704" y="126" text-anchor="middle" class="txt">引用回答</text>
    <rect x="814" y="106" width="160" height="30" rx="15" fill="#dbeafe" stroke="#2563eb"/><text x="894" y="126" text-anchor="middle" class="txt">写回高价值结论</text>
    <path d="M236 121 H278" stroke="#2563eb" stroke-width="3" marker-end="url(#arr2)"/><path d="M404 121 H446" stroke="#2563eb" stroke-width="3" marker-end="url(#arr2)"/><path d="M594 121 H636" stroke="#2563eb" stroke-width="3" marker-end="url(#arr2)"/><path d="M762 121 H804" stroke="#2563eb" stroke-width="3" marker-end="url(#arr2)"/>
  </g>

  <g transform="translate(50,495)">
    <rect width="1080" height="145" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <circle cx="65" cy="72" r="38" fill="#bbf7d0"/><text x="65" y="79" text-anchor="middle" class="h">3</text>
    <text x="128" y="54" class="h">Lint：像静态分析代码一样，定期检查知识库健康度</text>
    <text x="128" y="84" class="small">发现孤岛页面、缺失链接、过期结论、重复概念、矛盾主张和需要继续研究的数据空白</text>
    <rect x="126" y="106" width="118" height="30" rx="15" fill="#f0fdf4" stroke="#86efac"/><text x="185" y="126" text-anchor="middle" class="txt">全库扫描</text>
    <rect x="296" y="106" width="136" height="30" rx="15" fill="#f0fdf4" stroke="#86efac"/><text x="364" y="126" text-anchor="middle" class="txt">关系图检查</text>
    <rect x="484" y="106" width="136" height="30" rx="15" fill="#f0fdf4" stroke="#86efac"/><text x="552" y="126" text-anchor="middle" class="txt">冲突与过期</text>
    <rect x="672" y="106" width="134" height="30" rx="15" fill="#f0fdf4" stroke="#86efac"/><text x="739" y="126" text-anchor="middle" class="txt">维护建议</text>
    <rect x="858" y="106" width="118" height="30" rx="15" fill="#dcfce7" stroke="#22c55e"/><text x="917" y="126" text-anchor="middle" class="txt">审查后合并</text>
    <path d="M244 121 H286" stroke="#16a34a" stroke-width="3" marker-end="url(#arr3)"/><path d="M432 121 H474" stroke="#16a34a" stroke-width="3" marker-end="url(#arr3)"/><path d="M620 121 H662" stroke="#16a34a" stroke-width="3" marker-end="url(#arr3)"/><path d="M806 121 H848" stroke="#16a34a" stroke-width="3" marker-end="url(#arr3)"/>
  </g>
</svg>
