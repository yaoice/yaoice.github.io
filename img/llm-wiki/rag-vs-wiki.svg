<svg width="1180" height="640" viewBox="0 0 1180 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">传统 RAG 与 LLM Wiki 的差异</title>
  <desc id="desc">左侧展示每次查询临时检索和生成答案的 RAG 流程，右侧展示将综合结果持续写回 Wiki 的 LLM Wiki 流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#f97316"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 28px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .subtitle{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}
      .h{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .txt{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#334155}
      .small{font:500 13px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}
      .white{fill:#fff}.dash{stroke-dasharray:7 7}
    </style>
  </defs>
  <rect width="1180" height="640" rx="28" fill="url(#bg)"/>
  <text x="590" y="54" text-anchor="middle" class="title">从“一次性检索”到“持续性知识编译”</text>
  <text x="590" y="82" text-anchor="middle" class="subtitle">RAG 每次重新发现知识；LLM Wiki 把综合结果沉淀为可维护、可审计、可复用的 Markdown 知识层</text>

  <rect x="55" y="120" width="510" height="450" rx="26" fill="#ffffff" filter="url(#shadow)"/>
  <text x="310" y="160" text-anchor="middle" class="h">传统 RAG：查询时综合</text>
  <text x="310" y="185" text-anchor="middle" class="small">答案质量依赖本次检索命中率，历史综合难以复用</text>
  <g>
    <rect x="100" y="235" width="130" height="68" rx="16" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="165" y="262" text-anchor="middle" class="txt">原始文档</text>
    <text x="165" y="286" text-anchor="middle" class="small">PDF / Web / Notes</text>
    <rect x="288" y="235" width="130" height="68" rx="16" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="353" y="262" text-anchor="middle" class="txt">检索片段</text>
    <text x="353" y="286" text-anchor="middle" class="small">Top-k chunks</text>
    <rect x="388" y="345" width="130" height="68" rx="16" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="453" y="372" text-anchor="middle" class="txt">即时答案</text>
    <text x="453" y="396" text-anchor="middle" class="small">Chat output</text>
    <rect x="100" y="345" width="170" height="68" rx="16" fill="#fee2e2" stroke="#fb7185"/>
    <text x="185" y="372" text-anchor="middle" class="txt">下一次提问</text>
    <text x="185" y="396" text-anchor="middle" class="small">重新检索 / 重新推理</text>
    <path d="M230 269 H280" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/>
    <path d="M385 304 C420 312 445 325 452 340" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/>
    <path d="M388 379 H282" stroke="#f97316" stroke-width="3" class="dash" marker-end="url(#arrowOrange)"/>
  </g>
  <text x="310" y="487" text-anchor="middle" class="small">痛点：跨文档关系、冲突判断、历史结论都停留在一次会话中</text>
  <rect x="128" y="505" width="364" height="36" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="310" y="529" text-anchor="middle" class="small">“知识”没有变成长期资产，只是一次答案</text>

  <rect x="615" y="120" width="510" height="450" rx="26" fill="#ffffff" filter="url(#shadow)"/>
  <text x="870" y="160" text-anchor="middle" class="h">LLM Wiki：增量式知识编译</text>
  <text x="870" y="185" text-anchor="middle" class="small">每次摄入和查询都更新 Wiki，知识像代码库一样演化</text>
  <g>
    <rect x="660" y="230" width="130" height="64" rx="16" fill="#dcfce7" stroke="#22c55e"/>
    <text x="725" y="256" text-anchor="middle" class="txt">Raw Sources</text>
    <text x="725" y="279" text-anchor="middle" class="small">不可变证据</text>
    <circle cx="875" cy="262" r="48" fill="url(#blue)"/>
    <text x="875" y="255" text-anchor="middle" style="font:700 16px sans-serif;fill:white">LLM</text>
    <text x="875" y="278" text-anchor="middle" style="font:700 16px sans-serif;fill:white">Agent</text>
    <rect x="965" y="220" width="120" height="84" rx="18" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="1025" y="252" text-anchor="middle" class="txt">Schema</text>
    <text x="1025" y="276" text-anchor="middle" class="small">维护契约</text>
    <rect x="720" y="365" width="300" height="98" rx="22" fill="#fff7ed" stroke="#fb923c"/>
    <text x="870" y="396" text-anchor="middle" class="txt">Markdown Wiki</text>
    <text x="870" y="421" text-anchor="middle" class="small">index.md / log.md / entities / concepts</text>
    <text x="870" y="446" text-anchor="middle" class="small">综合结论、交叉引用、矛盾记录持续积累</text>
    <path d="M790 262 H817" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/>
    <path d="M923 262 H958" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/>
    <path d="M875 311 V354" stroke="#f97316" stroke-width="3" marker-end="url(#arrowOrange)"/>
    <path d="M1000 304 C985 342 965 358 940 367" stroke="#f97316" stroke-width="3" class="dash" marker-end="url(#arrowOrange)"/>
    <path d="M760 365 C690 335 678 304 700 294" stroke="#22c55e" stroke-width="3" class="dash" marker-end="url(#arrowBlue)"/>
  </g>
  <text x="870" y="506" text-anchor="middle" class="small">收益：一次好的总结、对比、图表和发现，会成为下一次推理的起点</text>
  <rect x="702" y="525" width="336" height="36" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="870" y="549" text-anchor="middle" class="small">“知识”变成可版本化、可重构、可复用资产</text>
</svg>
