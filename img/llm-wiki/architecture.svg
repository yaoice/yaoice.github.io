<svg width="1180" height="720" viewBox="0 0 1180 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LLM Wiki 三层架构</title>
  <desc id="desc">展示 Raw Sources、Schema、Markdown Wiki 与 LLM Agent、Obsidian、Git、本地搜索之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#ecfeff"/></linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1d4ed8"/><stop offset="1" stop-color="#0f766e"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/></marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .title{font:800 30px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .sub{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}
      .h{font:700 20px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .txt{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#334155}
      .small{font:500 13px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}
      .mono{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
      .chip{fill:#f8fafc;stroke:#cbd5e1}.dash{stroke-dasharray:8 8}
    </style>
  </defs>
  <rect width="1180" height="720" rx="28" fill="url(#bg)"/>
  <text x="590" y="54" text-anchor="middle" class="title">LLM Wiki 技术架构：把知识库当成代码库维护</text>
  <text x="590" y="84" text-anchor="middle" class="sub">原始资料是事实源，Schema 是维护契约，Wiki 是持续演化的知识编译层</text>

  <rect x="58" y="150" width="255" height="380" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <text x="185" y="188" text-anchor="middle" class="h">Raw Sources</text>
  <text x="185" y="214" text-anchor="middle" class="sub">不可变事实源</text>
  <g>
    <rect x="92" y="250" width="186" height="46" rx="14" class="chip"/><text x="185" y="279" text-anchor="middle" class="txt">网页剪藏 / 文章</text>
    <rect x="92" y="312" width="186" height="46" rx="14" class="chip"/><text x="185" y="341" text-anchor="middle" class="txt">论文 / PDF / 报告</text>
    <rect x="92" y="374" width="186" height="46" rx="14" class="chip"/><text x="185" y="403" text-anchor="middle" class="txt">图片 / 表格 / 数据</text>
    <rect x="92" y="436" width="186" height="46" rx="14" fill="#dcfce7" stroke="#22c55e"/><text x="185" y="465" text-anchor="middle" class="txt">只读、可引用、可回溯</text>
  </g>

  <rect x="404" y="125" width="372" height="435" rx="30" fill="#ffffff" filter="url(#shadow)"/>
  <circle cx="590" cy="225" r="72" fill="url(#agent)"/>
  <text x="590" y="214" text-anchor="middle" style="font:800 22px sans-serif;fill:#fff">LLM Agent</text>
  <text x="590" y="243" text-anchor="middle" style="font:600 15px sans-serif;fill:#dbeafe">read · write · refactor · cite</text>
  <text x="590" y="336" text-anchor="middle" class="h">执行知识工程操作</text>
  <rect x="444" y="370" width="292" height="40" rx="14" fill="#eff6ff" stroke="#60a5fa"/><text x="590" y="396" text-anchor="middle" class="txt">摄入、摘要、建页、补链、标冲突</text>
  <rect x="444" y="424" width="292" height="40" rx="14" fill="#ecfeff" stroke="#22d3ee"/><text x="590" y="450" text-anchor="middle" class="txt">查询、综合、引用、写回高价值答案</text>
  <rect x="444" y="478" width="292" height="40" rx="14" fill="#fff7ed" stroke="#fb923c"/><text x="590" y="504" text-anchor="middle" class="txt">Lint、重构、去重、健康检查</text>

  <rect x="860" y="150" width="262" height="380" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <text x="991" y="188" text-anchor="middle" class="h">Markdown Wiki</text>
  <text x="991" y="214" text-anchor="middle" class="sub">知识编译层</text>
  <g>
    <rect x="894" y="248" width="194" height="42" rx="13" fill="#ede9fe" stroke="#8b5cf6"/><text x="991" y="275" text-anchor="middle" class="mono">index.md</text>
    <rect x="894" y="304" width="194" height="42" rx="13" fill="#fef3c7" stroke="#f59e0b"/><text x="991" y="331" text-anchor="middle" class="mono">log.md</text>
    <rect x="894" y="360" width="194" height="42" rx="13" class="chip"/><text x="991" y="387" text-anchor="middle" class="mono">entities/ concepts/</text>
    <rect x="894" y="416" width="194" height="42" rx="13" class="chip"/><text x="991" y="443" text-anchor="middle" class="mono">sources/ syntheses/</text>
    <rect x="894" y="472" width="194" height="42" rx="13" fill="#fee2e2" stroke="#fb7185"/><text x="991" y="499" text-anchor="middle" class="mono">contradictions/</text>
  </g>

  <rect x="422" y="595" width="336" height="72" rx="22" fill="#f5f3ff" stroke="#8b5cf6" filter="url(#shadow)"/>
  <text x="590" y="625" text-anchor="middle" class="h">Schema / Agent Rules</text>
  <text x="590" y="650" text-anchor="middle" class="small">命名、引用、frontmatter、工作流、质量门禁、冲突策略</text>

  <rect x="860" y="580" width="262" height="96" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <text x="991" y="612" text-anchor="middle" class="h">Human Interfaces</text>
  <text x="991" y="640" text-anchor="middle" class="small">Obsidian Graph · Git Diff · Dataview</text>
  <text x="991" y="662" text-anchor="middle" class="small">BM25 / Vector Search / MCP</text>

  <path d="M313 340 H390" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M776 340 H846" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M590 560 V586" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M758 632 H846" stroke="#7c3aed" stroke-width="4" class="dash" marker-end="url(#arrow2)"/>
  <path d="M991 530 V570" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M860 225 C805 210 780 205 735 220" stroke="#7c3aed" stroke-width="3" class="dash" marker-end="url(#arrow2)"/>
  <text x="325" y="322" class="small">读取证据</text>
  <text x="790" y="322" class="small">写入知识</text>
</svg>
