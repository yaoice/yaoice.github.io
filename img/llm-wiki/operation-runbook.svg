<svg width="1180" height="720" viewBox="0 0 1180 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LLM Wiki 日常运行 Runbook</title>
  <desc id="desc">展示人类、LLM Agent、Git、Obsidian 和搜索索引在一次日常知识库维护中的协作流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ecfeff"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.11"/></filter>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/></marker>
    <style>.title{font:800 30px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.sub{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}.lane{font:800 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.txt{font:600 13.5px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#334155}.small{font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}.box{fill:#fff;stroke:#cbd5e1}.human{fill:#dbeafe;stroke:#60a5fa}.agent{fill:#ede9fe;stroke:#8b5cf6}.git{fill:#dcfce7;stroke:#22c55e}.obs{fill:#fff7ed;stroke:#fb923c}.search{fill:#cffafe;stroke:#06b6d4}.dash{stroke-dasharray:6 6}</style>
  </defs>
  <rect width="1180" height="720" rx="28" fill="url(#bg)"/>
  <text x="590" y="54" text-anchor="middle" class="title">日常运行 Runbook：一次资料进入 Wiki 的标准作业流</text>
  <text x="590" y="84" text-anchor="middle" class="sub">把 LLM Wiki 当生产系统运营：每个角色做什么、何时审查、哪里回滚，都要明确</text>

  <g transform="translate(70,135)">
    <rect width="1040" height="78" rx="18" fill="#fff" filter="url(#shadow)"/><text x="36" y="48" class="lane">人类</text>
    <rect x="140" y="20" width="140" height="38" rx="14" class="human"/><text x="210" y="44" text-anchor="middle" class="txt">选择资料</text>
    <rect x="355" y="20" width="150" height="38" rx="14" class="human"/><text x="430" y="44" text-anchor="middle" class="txt">确认关注点</text>
    <rect x="768" y="20" width="150" height="38" rx="14" class="human"/><text x="843" y="44" text-anchor="middle" class="txt">审查 diff</text>
  </g>
  <g transform="translate(70,230)">
    <rect width="1040" height="78" rx="18" fill="#fff" filter="url(#shadow)"/><text x="36" y="48" class="lane">Agent</text>
    <rect x="205" y="20" width="140" height="38" rx="14" class="agent"/><text x="275" y="44" text-anchor="middle" class="txt">读取 raw</text>
    <rect x="420" y="20" width="150" height="38" rx="14" class="agent"/><text x="495" y="44" text-anchor="middle" class="txt">更新 Wiki 页</text>
    <rect x="620" y="20" width="150" height="38" rx="14" class="agent"/><text x="695" y="44" text-anchor="middle" class="txt">补 index/log</text>
    <rect x="890" y="20" width="120" height="38" rx="14" class="agent"/><text x="950" y="44" text-anchor="middle" class="txt">修正反馈</text>
  </g>
  <g transform="translate(70,325)">
    <rect width="1040" height="78" rx="18" fill="#fff" filter="url(#shadow)"/><text x="36" y="48" class="lane">Git</text>
    <rect x="560" y="20" width="140" height="38" rx="14" class="git"/><text x="630" y="44" text-anchor="middle" class="txt">生成 diff</text>
    <rect x="815" y="20" width="140" height="38" rx="14" class="git"/><text x="885" y="44" text-anchor="middle" class="txt">提交 / 回滚</text>
  </g>
  <g transform="translate(70,420)">
    <rect width="1040" height="78" rx="18" fill="#fff" filter="url(#shadow)"/><text x="36" y="48" class="lane">Obsidian</text>
    <rect x="505" y="20" width="150" height="38" rx="14" class="obs"/><text x="580" y="44" text-anchor="middle" class="txt">图谱浏览</text>
    <rect x="705" y="20" width="150" height="38" rx="14" class="obs"/><text x="780" y="44" text-anchor="middle" class="txt">人工阅读</text>
  </g>
  <g transform="translate(70,515)">
    <rect width="1040" height="78" rx="18" fill="#fff" filter="url(#shadow)"/><text x="36" y="48" class="lane">检索索引</text>
    <rect x="650" y="20" width="150" height="38" rx="14" class="search"/><text x="725" y="44" text-anchor="middle" class="txt">重建索引</text>
    <rect x="870" y="20" width="140" height="38" rx="14" class="search"/><text x="940" y="44" text-anchor="middle" class="txt">回归查询</text>
  </g>

  <path d="M280 174 C310 198 255 218 275 230" stroke="#0f766e" stroke-width="3" fill="none" marker-end="url(#arr)"/>
  <path d="M345 269 C383 242 395 198 355 174" stroke="#0f766e" stroke-width="3" fill="none" marker-end="url(#arr)"/>
  <path d="M505 269 H610 V345" stroke="#0f766e" stroke-width="3" fill="none" marker-end="url(#arr)"/>
  <path d="M570 269 C576 310 580 390 580 420" stroke="#0f766e" stroke-width="3" class="dash" fill="none" marker-end="url(#arr)"/>
  <path d="M700 269 C710 320 725 492 725 515" stroke="#0f766e" stroke-width="3" class="dash" fill="none" marker-end="url(#arr)"/>
  <path d="M700 365 C735 390 780 390 780 420" stroke="#0f766e" stroke-width="3" fill="none" marker-end="url(#arr)"/>
  <path d="M855 174 V325" stroke="#0f766e" stroke-width="3" fill="none" marker-end="url(#arr)"/>
  <path d="M885 365 C910 408 938 490 940 515" stroke="#0f766e" stroke-width="3" class="dash" fill="none" marker-end="url(#arr)"/>

  <rect x="210" y="640" width="760" height="44" rx="16" fill="#fff" stroke="#cbd5e1"/>
  <text x="590" y="668" text-anchor="middle" class="txt">建议节奏：每天摄入 1~3 个 source；每周固定一次 Lint + 回归查询 + Git review</text>
</svg>
