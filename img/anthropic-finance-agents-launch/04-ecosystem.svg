<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f9fc"/><stop offset="100%" stop-color="#eef2f8"/>
    </linearGradient>
    <pattern id="grid4" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e3e8f0" stroke-width="0.6"/>
    </pattern>
    <filter id="sh4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="640" fill="url(#bg4)"/>
  <rect width="1200" height="640" fill="url(#grid4)"/>

  <text x="600" y="52" text-anchor="middle" font-size="26" font-weight="700" fill="#1c2b4a">金融数据生态：既要全面，又要"经过验证"</text>
  <text x="600" y="82" text-anchor="middle" font-size="15" fill="#5b6b8a">8 个新增连接器 + 1 个 MCP 应用（Moody's）叠加已有 8 家合作伙伴</text>

  <!-- 中心 Claude -->
  <g transform="translate(600,340)">
    <circle r="88" fill="#ffffff" stroke="#1f3a8a" stroke-width="2" filter="url(#sh4)"/>
    <text y="-10" text-anchor="middle" font-size="16" font-weight="700" fill="#1f3a8a">Claude</text>
    <text y="14" text-anchor="middle" font-size="13" fill="#4a597d">Agent / Cowork</text>
    <text y="34" text-anchor="middle" font-size="12" fill="#4a597d">/ Platform</text>
  </g>

  <!-- 新连接器 8 个 围绕上方和左右 -->
  <g font-size="12" fill="#3d6b4f">
    <!-- 上方四个 -->
    <g transform="translate(140,160)" filter="url(#sh4)">
      <rect width="190" height="60" rx="12" fill="#e9f7ee" stroke="#bfe2c9"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#0a7f46">Dun &amp; Bradstreet</text>
      <text x="14" y="46">D-U-N-S · 全球企业身份</text>
    </g>
    <g transform="translate(360,140)" filter="url(#sh4)">
      <rect width="190" height="60" rx="12" fill="#e9f7ee" stroke="#bfe2c9"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#0a7f46">Fiscal AI</text>
      <text x="14" y="46">公股实时基本面</text>
    </g>
    <g transform="translate(580,130)" filter="url(#sh4)">
      <rect width="240" height="60" rx="12" fill="#fff3e0" stroke="#f1c9a5"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#8a4b0a">Moody's（MCP 应用）</text>
      <text x="14" y="46">6 亿+ 公私企业评级/数据</text>
    </g>
    <g transform="translate(850,140)" filter="url(#sh4)">
      <rect width="210" height="60" rx="12" fill="#e9f7ee" stroke="#bfe2c9"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#0a7f46">Financial Modeling Prep</text>
      <text x="14" y="46">股/ETF/外汇/大宗实时数据</text>
    </g>

    <!-- 左右两个 -->
    <g transform="translate(80,320)" filter="url(#sh4)">
      <rect width="190" height="60" rx="12" fill="#e9f7ee" stroke="#bfe2c9"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#0a7f46">Guidepoint</text>
      <text x="14" y="46">10 万+ 合规审查访谈记录</text>
    </g>
    <g transform="translate(930,320)" filter="url(#sh4)">
      <rect width="190" height="60" rx="12" fill="#e9f7ee" stroke="#bfe2c9"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#0a7f46">Third Bridge</text>
      <text x="14" y="46">原始专家访谈</text>
    </g>

    <!-- 下方四个 -->
    <g transform="translate(150,480)" filter="url(#sh4)">
      <rect width="190" height="60" rx="12" fill="#e9f7ee" stroke="#bfe2c9"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#0a7f46">IBISWorld</text>
      <text x="14" y="46">千行业数据 / 风险评分</text>
    </g>
    <g transform="translate(380,500)" filter="url(#sh4)">
      <rect width="200" height="60" rx="12" fill="#e9f7ee" stroke="#bfe2c9"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#0a7f46">SS&amp;C Intralinks</text>
      <text x="14" y="46">交易数据室 / 尽调 Q&amp;A</text>
    </g>
    <g transform="translate(620,500)" filter="url(#sh4)">
      <rect width="200" height="60" rx="12" fill="#e9f7ee" stroke="#bfe2c9"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#0a7f46">Verisk</text>
      <text x="14" y="46">承保 / 理赔 / 风险</text>
    </g>
    <g transform="translate(860,480)" filter="url(#sh4)">
      <rect width="220" height="60" rx="12" fill="#f5f8ff" stroke="#c3d0ee"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#1f3a8a">已有合作伙伴</text>
      <text x="14" y="46">FactSet · S&amp;P · MSCI · PitchBook ...</text>
    </g>
  </g>

  <!-- 连线 -->
  <g stroke="#9fb0d3" stroke-width="1.2" fill="none" opacity="0.7">
    <path d="M 235,220 C 400,260 500,300 520,310"/>
    <path d="M 455,200 C 500,260 520,290 540,310"/>
    <path d="M 700,190 C 680,240 660,290 640,310"/>
    <path d="M 955,200 C 850,260 740,300 680,320"/>
    <path d="M 175,380 C 350,360 480,350 520,345"/>
    <path d="M 1025,380 C 850,360 740,350 680,345"/>
    <path d="M 245,480 C 400,430 500,390 540,370"/>
    <path d="M 480,500 C 520,450 540,410 560,380"/>
    <path d="M 720,500 C 680,450 660,410 640,380"/>
    <path d="M 970,480 C 800,440 720,400 680,370"/>
  </g>

  <text x="600" y="618" text-anchor="middle" font-size="12" fill="#8a97b2">数据源并非"灌进 prompt"，而是通过 Connector / MCP 以受治理、可审计的方式被调用</text>
</svg>
