<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f9fc"/><stop offset="100%" stop-color="#eef2f8"/>
    </linearGradient>
    <pattern id="grid2" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e3e8f0" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="gblue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e6efff"/>
    </linearGradient>
    <linearGradient id="gpurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f0eaff"/>
    </linearGradient>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg2)"/>
  <rect width="1200" height="700" fill="url(#grid2)"/>

  <text x="600" y="54" text-anchor="middle" font-size="26" font-weight="700" fill="#1c2b4a">10 个金融 Agent 模板：把分析师日常拆成"研究 / 运营"两条主链路</text>
  <text x="600" y="84" text-anchor="middle" font-size="15" fill="#5b6b8a">每个模板 = Skills（任务指令） + Connectors（受治理数据） + Subagents（子任务专家）</text>

  <!-- 左分组 Research & Client Coverage -->
  <g transform="translate(60,120)">
    <rect width="540" height="540" rx="18" fill="#ffffff" stroke="#c3d0ee" opacity="0.6"/>
    <rect x="0" y="0" width="540" height="44" rx="18" fill="#2f5bd9"/>
    <rect x="0" y="26" width="540" height="18" fill="#2f5bd9"/>
    <text x="20" y="30" font-size="16" font-weight="700" fill="#ffffff">研究与客户覆盖  ·  Research &amp; Client Coverage</text>
    <text x="520" y="30" text-anchor="end" font-size="12" fill="#e0e7fb">5 个模板</text>

    <!-- 卡片 -->
    <g font-size="12" fill="#3c4a6b">
      <g transform="translate(20,64)" filter="url(#sh2)">
        <rect width="240" height="100" rx="12" fill="url(#gblue)" stroke="#c3d0ee"/>
        <text x="16" y="26" font-size="14" font-weight="700" fill="#1f3a8a">Pitch Builder</text>
        <text x="16" y="48">构建目标清单、可比公司分析</text>
        <text x="16" y="66">起草客户会议用 pitchbook</text>
        <text x="16" y="88" fill="#2f5bd9" font-weight="600">输出：Excel + PPT + 邮件一体</text>
      </g>
      <g transform="translate(280,64)" filter="url(#sh2)">
        <rect width="240" height="100" rx="12" fill="url(#gblue)" stroke="#c3d0ee"/>
        <text x="16" y="26" font-size="14" font-weight="700" fill="#1f3a8a">Meeting Preparer</text>
        <text x="16" y="48">电话会议前的客户/对手方简报</text>
        <text x="16" y="66">把"准备时间"转化为"创意时间"</text>
        <text x="16" y="88" fill="#2f5bd9" font-weight="600">场景：投行、销售、研究</text>
      </g>
      <g transform="translate(20,180)" filter="url(#sh2)">
        <rect width="240" height="100" rx="12" fill="url(#gblue)" stroke="#c3d0ee"/>
        <text x="16" y="26" font-size="14" font-weight="700" fill="#1f3a8a">Earnings Reviewer</text>
        <text x="16" y="48">读 transcript 与备案文件</text>
        <text x="16" y="66">更新模型，标记论点变化</text>
        <text x="16" y="88" fill="#2f5bd9" font-weight="600">覆盖每季财报季峰值</text>
      </g>
      <g transform="translate(280,180)" filter="url(#sh2)">
        <rect width="240" height="100" rx="12" fill="url(#gblue)" stroke="#c3d0ee"/>
        <text x="16" y="26" font-size="14" font-weight="700" fill="#1f3a8a">Model Builder</text>
        <text x="16" y="48">基于备案 + 数据源 + 分析师输入</text>
        <text x="16" y="66">创建并维护财务模型</text>
        <text x="16" y="88" fill="#2f5bd9" font-weight="600">替代重复性建模劳动</text>
      </g>
      <g transform="translate(150,296)" filter="url(#sh2)">
        <rect width="240" height="100" rx="12" fill="url(#gblue)" stroke="#c3d0ee"/>
        <text x="16" y="26" font-size="14" font-weight="700" fill="#1f3a8a">Market Researcher</text>
        <text x="16" y="48">跟踪行业 / 发行人动态</text>
        <text x="16" y="66">综合新闻、备案、券商研究</text>
        <text x="16" y="88" fill="#2f5bd9" font-weight="600">把噪音压成信号</text>
      </g>
    </g>

    <!-- 底部主链路 -->
    <g transform="translate(20,420)">
      <rect width="500" height="100" rx="12" fill="#f5f8ff" stroke="#c3d0ee" stroke-dasharray="4 4"/>
      <text x="20" y="28" font-size="13" font-weight="700" fill="#1f3a8a">典型工作链路</text>
      <text x="20" y="52" font-size="12" fill="#3c4a6b">市场研究 → 财报/模型更新 → 会议准备 → Pitch 输出</text>
      <text x="20" y="76" font-size="12" fill="#3c4a6b">→ 分析师只在关键决策点介入审阅 / 迭代 / 审批</text>
    </g>
  </g>

  <!-- 右分组 Finance & Operations -->
  <g transform="translate(600,120)">
    <rect width="540" height="540" rx="18" fill="#ffffff" stroke="#d9cdef" opacity="0.6"/>
    <rect x="0" y="0" width="540" height="44" rx="18" fill="#6a3bd6"/>
    <rect x="0" y="26" width="540" height="18" fill="#6a3bd6"/>
    <text x="20" y="30" font-size="16" font-weight="700" fill="#ffffff">财务与运营  ·  Finance &amp; Operations</text>
    <text x="520" y="30" text-anchor="end" font-size="12" fill="#ece3fb">5 个模板</text>

    <g font-size="12" fill="#3c2a66">
      <g transform="translate(20,64)" filter="url(#sh2)">
        <rect width="240" height="100" rx="12" fill="url(#gpurple)" stroke="#d9cdef"/>
        <text x="16" y="26" font-size="14" font-weight="700" fill="#4b2aa6">Valuation Reviewer</text>
        <text x="16" y="48">对照可比公司与方法论</text>
        <text x="16" y="66">按公司标准检查估值</text>
        <text x="16" y="88" fill="#6a3bd6" font-weight="600">降低估值审阅人工耗时</text>
      </g>
      <g transform="translate(280,64)" filter="url(#sh2)">
        <rect width="240" height="100" rx="12" fill="url(#gpurple)" stroke="#d9cdef"/>
        <text x="16" y="26" font-size="14" font-weight="700" fill="#4b2aa6">General Ledger Reconciler</text>
        <text x="16" y="48">对账总账科目</text>
        <text x="16" y="66">对照账簿计算 NAV</text>
        <text x="16" y="88" fill="#6a3bd6" font-weight="600">资产管理运营常见痛点</text>
      </g>
      <g transform="translate(20,180)" filter="url(#sh2)">
        <rect width="240" height="100" rx="12" fill="url(#gpurple)" stroke="#d9cdef"/>
        <text x="16" y="26" font-size="14" font-weight="700" fill="#4b2aa6">Month-end Closer</text>
        <text x="16" y="48">执行结账清单、准备分录</text>
        <text x="16" y="66">生成结账报告</text>
        <text x="16" y="88" fill="#6a3bd6" font-weight="600">支持多小时长会话</text>
      </g>
      <g transform="translate(280,180)" filter="url(#sh2)">
        <rect width="240" height="100" rx="12" fill="url(#gpurple)" stroke="#d9cdef"/>
        <text x="16" y="26" font-size="14" font-weight="700" fill="#4b2aa6">Statement Auditor</text>
        <text x="16" y="48">审阅财报一致性、完整性</text>
        <text x="16" y="66">评估审计就绪性</text>
        <text x="16" y="88" fill="#6a3bd6" font-weight="600">合规与审计前置化</text>
      </g>
      <g transform="translate(150,296)" filter="url(#sh2)">
        <rect width="240" height="100" rx="12" fill="url(#gpurple)" stroke="#d9cdef"/>
        <text x="16" y="26" font-size="14" font-weight="700" fill="#4b2aa6">KYC Screener</text>
        <text x="16" y="48">汇总实体档案、审阅源文档</text>
        <text x="16" y="66">打包升级合规审阅</text>
        <text x="16" y="88" fill="#6a3bd6" font-weight="600">反洗钱 / 合规关键入口</text>
      </g>
    </g>

    <g transform="translate(20,420)">
      <rect width="500" height="100" rx="12" fill="#faf7ff" stroke="#d9cdef" stroke-dasharray="4 4"/>
      <text x="20" y="28" font-size="13" font-weight="700" fill="#4b2aa6">典型工作链路</text>
      <text x="20" y="52" font-size="12" fill="#3c2a66">KYC 筛查 → 总账对账 → 月末结账 → 估值复核 → 报表审计</text>
      <text x="20" y="76" font-size="12" fill="#3c2a66">→ 多日跨度的合规与运营流水线被压缩到数小时</text>
    </g>
  </g>
</svg>
