<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f9fc"/><stop offset="100%" stop-color="#eef2f8"/>
    </linearGradient>
    <pattern id="grid3" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e3e8f0" stroke-width="0.6"/>
    </pattern>
    <filter id="sh3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dy="2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7fb5"/>
    </marker>
    <linearGradient id="gskill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#eaf2ff"/></linearGradient>
    <linearGradient id="gconn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e9f7ee"/></linearGradient>
    <linearGradient id="gsub" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#fff1e6"/></linearGradient>
  </defs>
  <rect width="1200" height="680" fill="url(#bg3)"/>
  <rect width="1200" height="680" fill="url(#grid3)"/>

  <text x="600" y="52" text-anchor="middle" font-size="26" font-weight="700" fill="#1c2b4a">Agent 模板三件套 + 两种部署模式</text>
  <text x="600" y="82" text-anchor="middle" font-size="15" fill="#5b6b8a">从"人在工具旁"的插件，到"自主运行的托管 Agent"，同一套架构平滑迁移</text>

  <!-- 三件套 -->
  <g transform="translate(80,130)">
    <rect width="1040" height="220" rx="18" fill="#ffffff" stroke="#c3d0ee" opacity="0.6"/>
    <text x="24" y="32" font-size="16" font-weight="700" fill="#1f3a8a">每个 Agent 模板的三件套</text>

    <g transform="translate(40,60)" filter="url(#sh3)">
      <rect width="300" height="140" rx="14" fill="url(#gskill)" stroke="#c3d0ee"/>
      <rect width="6" height="140" rx="3" fill="#2f5bd9"/>
      <text x="22" y="34" font-size="15" font-weight="700" fill="#1f3a8a">Skills</text>
      <text x="22" y="58" font-size="12" fill="#3c4a6b">任务指令 + 领域知识</text>
      <text x="22" y="80" font-size="12" fill="#3c4a6b">例：可比公司如何挑选</text>
      <text x="22" y="100" font-size="12" fill="#3c4a6b">例：估值方法论清单</text>
      <text x="22" y="124" font-size="12" font-weight="600" fill="#2f5bd9">把"资深分析师脑内 SOP"</text>
      <text x="22" y="138" font-size="12" font-weight="600" fill="#2f5bd9">沉淀成可复用指令</text>
    </g>

    <g transform="translate(370,60)" filter="url(#sh3)">
      <rect width="300" height="140" rx="14" fill="url(#gconn)" stroke="#bfe2c9"/>
      <rect width="6" height="140" rx="3" fill="#0a7f46"/>
      <text x="22" y="34" font-size="15" font-weight="700" fill="#0a7f46">Connectors</text>
      <text x="22" y="58" font-size="12" fill="#3d6b4f">对数据的受治理访问</text>
      <text x="22" y="80" font-size="12" fill="#3d6b4f">FactSet / Moody's / D&amp;B</text>
      <text x="22" y="100" font-size="12" fill="#3d6b4f">Intralinks / Guidepoint ...</text>
      <text x="22" y="124" font-size="12" font-weight="600" fill="#0a7f46">不是"把数据灌进 prompt"，</text>
      <text x="22" y="138" font-size="12" font-weight="600" fill="#0a7f46">而是带权限的可审计调用</text>
    </g>

    <g transform="translate(700,60)" filter="url(#sh3)">
      <rect width="300" height="140" rx="14" fill="url(#gsub)" stroke="#f1c9a5"/>
      <rect width="6" height="140" rx="3" fill="#d97706"/>
      <text x="22" y="34" font-size="15" font-weight="700" fill="#8a4b0a">Subagents</text>
      <text x="22" y="58" font-size="12" fill="#6b4a21">专注子任务的 Claude 实例</text>
      <text x="22" y="80" font-size="12" fill="#6b4a21">可比公司选择 · 方法论检查</text>
      <text x="22" y="100" font-size="12" fill="#6b4a21">方差分析 · 一致性校验</text>
      <text x="22" y="124" font-size="12" font-weight="600" fill="#d97706">主 Agent 做编排，</text>
      <text x="22" y="138" font-size="12" font-weight="600" fill="#d97706">子 Agent 做专项裁决</text>
    </g>
  </g>

  <!-- 下方两种部署 -->
  <g transform="translate(80,380)">
    <rect width="500" height="260" rx="18" fill="#ffffff" stroke="#c3d0ee" filter="url(#sh3)"/>
    <rect width="500" height="44" rx="18" fill="#2f5bd9"/>
    <rect y="26" width="500" height="18" fill="#2f5bd9"/>
    <text x="20" y="30" font-size="16" font-weight="700" fill="#ffffff">方式 A：Cowork / Claude Code 插件</text>
    <text x="20" y="74" font-size="13" fill="#1f3a8a" font-weight="700">使用场景</text>
    <text x="20" y="94" font-size="12" fill="#3c4a6b">分析师桌面，紧贴 Excel / PPT / Outlook</text>

    <text x="20" y="124" font-size="13" font-weight="700" fill="#1f3a8a">特点</text>
    <text x="20" y="144" font-size="12" fill="#3c4a6b">· 每一步输出分析师可即时审阅</text>
    <text x="20" y="162" font-size="12" fill="#3c4a6b">· Pitch Agent 可同时产出 Excel + PPT + 邮件</text>
    <text x="20" y="180" font-size="12" fill="#3c4a6b">· Dispatch：文本/语音远程派单，本地文件继续处理</text>

    <text x="20" y="210" font-size="13" font-weight="700" fill="#0a7f46">适合</text>
    <text x="20" y="230" font-size="12" fill="#3c4a6b">日常研究、客户会议准备、pitch 产出等高频短任务</text>
  </g>

  <g transform="translate(620,380)">
    <rect width="500" height="260" rx="18" fill="#ffffff" stroke="#d9cdef" filter="url(#sh3)"/>
    <rect width="500" height="44" rx="18" fill="#6a3bd6"/>
    <rect y="26" width="500" height="18" fill="#6a3bd6"/>
    <text x="20" y="30" font-size="16" font-weight="700" fill="#ffffff">方式 B：Claude Managed Agent（公测）</text>
    <text x="20" y="74" font-size="13" fill="#4b2aa6" font-weight="700">使用场景</text>
    <text x="20" y="94" font-size="12" fill="#3c2a66">在 Claude Platform 自主运行，不需分析师时刻在场</text>

    <text x="20" y="124" font-size="13" font-weight="700" fill="#4b2aa6">特点</text>
    <text x="20" y="144" font-size="12" fill="#3c2a66">· 多小时长会话（例：跨交易日的结账）</text>
    <text x="20" y="162" font-size="12" fill="#3c2a66">· 每个工具独立权限 + 托管凭证保管库</text>
    <text x="20" y="180" font-size="12" fill="#3c2a66">· 控制台完整审计日志（合规刚需）</text>

    <text x="20" y="210" font-size="13" font-weight="700" fill="#d97706">适合</text>
    <text x="20" y="230" font-size="12" fill="#3c2a66">月末结账、KYC 批处理、跨夜对账等长耗时流水线</text>
  </g>
</svg>
