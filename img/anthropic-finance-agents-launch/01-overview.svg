<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f9fc"/>
      <stop offset="100%" stop-color="#eef2f8"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e3e8f0" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eaf2ff"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff1e6"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9f7ee"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offs"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7fb5"/>
    </marker>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>
  <rect width="1200" height="640" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="600" y="60" text-anchor="middle" font-size="28" font-weight="700" fill="#1c2b4a">Anthropic 面向金融服务的一次"三箭齐发"</text>
  <text x="600" y="92" text-anchor="middle" font-size="16" fill="#5b6b8a">从对话助手升级到可托管、可审计、可编排的行业 Agent 平台</text>

  <!-- 中心模型 Hub -->
  <g transform="translate(600,340)">
    <circle r="96" fill="#ffffff" stroke="#1f3a8a" stroke-width="2" filter="url(#sh)"/>
    <circle r="96" fill="none" stroke="#c3d0ee" stroke-width="1" stroke-dasharray="4 4"/>
    <text y="-16" text-anchor="middle" font-size="18" font-weight="700" fill="#1f3a8a">Claude</text>
    <text y="12" text-anchor="middle" font-size="16" font-weight="700" fill="#1f3a8a">Opus 4.7</text>
    <text y="38" text-anchor="middle" font-size="12" fill="#5b6b8a">Vals AI Finance Agent</text>
    <text y="56" text-anchor="middle" font-size="14" font-weight="700" fill="#0a7f46">64.37%</text>
  </g>

  <!-- 卡片1：10 个 Agent -->
  <g transform="translate(90,180)" filter="url(#sh)">
    <rect width="280" height="180" rx="16" fill="url(#card1)" stroke="#c3d0ee"/>
    <rect width="6" height="180" rx="3" fill="#2f5bd9"/>
    <text x="24" y="40" font-size="18" font-weight="700" fill="#1f3a8a">① 10 个金融 Agent 模板</text>
    <text x="24" y="72" font-size="13" fill="#4a597d">Pitch Builder · Meeting Preparer</text>
    <text x="24" y="94" font-size="13" fill="#4a597d">Earnings Reviewer · Model Builder</text>
    <text x="24" y="116" font-size="13" fill="#4a597d">Valuation / Ledger / Month-end</text>
    <text x="24" y="138" font-size="13" fill="#4a597d">Statement Auditor · KYC Screener</text>
    <text x="24" y="164" font-size="12" font-weight="700" fill="#2f5bd9">开箱即用 · GitHub 金融服务市场</text>
  </g>

  <!-- 卡片2：Microsoft 365 -->
  <g transform="translate(830,180)" filter="url(#sh)">
    <rect width="280" height="180" rx="16" fill="url(#card2)" stroke="#f1c9a5"/>
    <rect width="6" height="180" rx="3" fill="#d97706"/>
    <text x="24" y="40" font-size="18" font-weight="700" fill="#8a4b0a">② Microsoft 365 全家桶</text>
    <text x="24" y="72" font-size="13" fill="#6b4a21">Excel：建模 / 审公式 / 敏感性分析</text>
    <text x="24" y="94" font-size="13" fill="#6b4a21">PowerPoint：随数据自动更新的 pitch</text>
    <text x="24" y="116" font-size="13" fill="#6b4a21">Word：按模板起草信贷备忘录</text>
    <text x="24" y="138" font-size="13" fill="#6b4a21">Outlook（即将）：收件箱参谋长</text>
    <text x="24" y="164" font-size="12" font-weight="700" fill="#d97706">上下文跨四应用自动传递</text>
  </g>

  <!-- 卡片3：生态 -->
  <g transform="translate(460,510)" filter="url(#sh)">
    <rect width="280" height="100" rx="16" fill="url(#card3)" stroke="#bfe2c9"/>
    <rect width="6" height="100" rx="3" fill="#0a7f46"/>
    <text x="24" y="36" font-size="18" font-weight="700" fill="#0a7f46">③ 8 连接器 + Moody's MCP</text>
    <text x="24" y="60" font-size="12" fill="#3d6b4f">D&amp;B · Fiscal AI · FMP · Guidepoint</text>
    <text x="24" y="78" font-size="12" fill="#3d6b4f">IBISWorld · Intralinks · Third Bridge · Verisk</text>
  </g>

  <!-- 连线 -->
  <g stroke="#6b7fb5" stroke-width="1.6" fill="none">
    <path d="M 370,270 C 460,280 520,310 520,340" marker-end="url(#arr)"/>
    <path d="M 830,270 C 740,280 680,310 680,340" marker-end="url(#arr)"/>
    <path d="M 600,530 C 600,470 600,450 600,440" marker-end="url(#arr)"/>
  </g>

  <!-- 底注 -->
  <text x="600" y="618" text-anchor="middle" font-size="12" fill="#8a97b2">三条产品线围绕同一个模型底座，覆盖"人在工具旁 → Agent 自主执行"的完整频谱</text>
</svg>
