<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">三类 Agent Grader 对比</title>
  <desc id="desc">对比代码型评分器、模型型评分器和人工评分器在适用场景、优势与限制上的差异。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .bg{fill:#f8fafc}.card{filter:url(#shadow);stroke-width:2}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:30px;font-weight:800}.h{font-size:24px;font-weight:800}.m{font-size:18px}.s{font-size:15px;fill:#475569}.label{font-size:16px;font-weight:700;fill:#334155}
    </style>
  </defs>
  <rect class="bg" width="1200" height="640" rx="28"/>
  <text x="60" y="60" class="text title">Grader 组合：先确定性，后语义判断，最后人工校准</text>
  <text x="60" y="94" class="text s">没有单一评分器适合所有 Agent 任务，关键是按风险、成本和主观性分层。</text>

  <rect x="60" y="140" width="330" height="390" rx="26" fill="#ecfdf5" stroke="#6ee7b7" class="card"/>
  <text x="105" y="188" class="text h">Code-based Grader</text>
  <text x="105" y="230" class="text label">适合</text>
  <text x="105" y="262" class="text m">单元测试、状态检查、静态分析、</text>
  <text x="105" y="292" class="text m">正则/JSON/schema 校验</text>
  <text x="105" y="340" class="text label">优势</text>
  <text x="105" y="372" class="text m">快、便宜、客观、可复现</text>
  <text x="105" y="420" class="text label">风险</text>
  <text x="105" y="452" class="text m">过度刚性，容易误伤合理变体</text>

  <rect x="435" y="140" width="330" height="390" rx="26" fill="#eff6ff" stroke="#93c5fd" class="card"/>
  <text x="480" y="188" class="text h">Model-based Grader</text>
  <text x="480" y="230" class="text label">适合</text>
  <text x="480" y="262" class="text m">Rubric 评分、成对比较、语气、</text>
  <text x="480" y="292" class="text m">完整性、可读性、开放式答案</text>
  <text x="480" y="340" class="text label">优势</text>
  <text x="480" y="372" class="text m">灵活，能处理语义和主观质量</text>
  <text x="480" y="420" class="text label">风险</text>
  <text x="480" y="452" class="text m">非确定性、成本更高、需校准</text>

  <rect x="810" y="140" width="330" height="390" rx="26" fill="#fff7ed" stroke="#fdba74" class="card"/>
  <text x="855" y="188" class="text h">Human Grader</text>
  <text x="855" y="230" class="text label">适合</text>
  <text x="855" y="262" class="text m">高价值、高风险、专家判断、</text>
  <text x="855" y="292" class="text m">LLM judge 校准样本</text>
  <text x="855" y="340" class="text label">优势</text>
  <text x="855" y="372" class="text m">最接近真实产品与领域判断</text>
  <text x="855" y="420" class="text label">风险</text>
  <text x="855" y="452" class="text m">慢、贵、难规模化、一致性成本高</text>

  <rect x="130" y="565" width="940" height="42" rx="21" fill="#0f172a" opacity="0.92"/>
  <text x="175" y="592" class="text s" fill="#ffffff" style="fill:#ffffff">推荐顺序：能用确定性检查就不要先上 LLM；LLM judge 用 rubric 约束；人工用于抽样、仲裁和校准。</text>
</svg>
