<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">失败样本归因地图</title>
  <desc id="desc">展示一次失败 trial 可能来自 Agent、Task、Grader 或 Harness 四类问题，并给出诊断线索。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#334155"/></marker>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .bg{fill:#f8fafc}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:30px;font-weight:800}.s{font-size:15px;fill:#475569}.h{font-size:22px;font-weight:800}.m{font-size:16px;fill:#334155}.center{fill:#0f172a}.centerText{fill:#fff;font-size:22px;font-weight:800}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)}.arrow{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.tag{font-size:14px;font-weight:800;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720" rx="28"/>
  <text x="60" y="58" class="text title">低分不是结论，而是一次归因分析的入口</text>
  <text x="60" y="92" class="text s">读 transcript 的目标，是区分 Agent 真失败、任务有歧义、grader 太脆弱，还是 harness / 环境出了问题。</text>

  <rect x="455" y="288" width="290" height="145" rx="30" class="center"/>
  <text x="515" y="348" class="centerText">Failed Trial</text>
  <text x="498" y="388" class="tag">分数低 ≠ 模型一定差</text>

  <rect x="80" y="150" width="335" height="150" rx="24" class="card"/>
  <text x="125" y="195" class="text h">Agent 问题</text>
  <text x="125" y="232" class="text m">误解目标、工具选择错误、</text>
  <text x="125" y="260" class="text m">过早停止、幻觉或过度行动</text>

  <rect x="785" y="150" width="335" height="150" rx="24" class="card"/>
  <text x="830" y="195" class="text h">Task 问题</text>
  <text x="830" y="232" class="text m">输入含糊、成功标准缺失、</text>
  <text x="830" y="260" class="text m">grader 假设没有写进题目</text>

  <rect x="80" y="475" width="335" height="150" rx="24" class="card"/>
  <text x="125" y="520" class="text h">Grader 问题</text>
  <text x="125" y="557" class="text m">过度刚性、漏掉合理变体、</text>
  <text x="125" y="585" class="text m">LLM judge 未校准或证据不足</text>

  <rect x="785" y="475" width="335" height="150" rx="24" class="card"/>
  <text x="830" y="520" class="text h">Harness / 环境问题</text>
  <text x="830" y="557" class="text m">状态污染、工具异常、资源争用、</text>
  <text x="830" y="585" class="text m">权限与生产环境不一致</text>

  <path d="M455 330 C420 280 405 240 415 220" class="arrow"/>
  <path d="M745 330 C780 280 795 240 785 220" class="arrow"/>
  <path d="M455 395 C420 455 405 505 415 550" class="arrow"/>
  <path d="M745 395 C780 455 795 505 785 550" class="arrow"/>

  <rect x="355" y="625" width="490" height="55" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="395" y="660" class="text h">动作：修正确归因对应的组件，再回放样本</text>
</svg>
