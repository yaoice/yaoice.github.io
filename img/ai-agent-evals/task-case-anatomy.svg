<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">一条 Agent Eval Task 的结构</title>
  <desc id="desc">拆解一个评估任务应包含的输入、初始状态、工具权限、成功标准、参考解和评分器。</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:30px;font-weight:800}.s{font-size:15px;fill:#475569}.h{font-size:20px;font-weight:800}.m{font-size:16px;fill:#334155}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)}.core{fill:#0f172a}.coreText{fill:#fff;font-size:22px;font-weight:800}.arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.pill{font-size:14px;font-weight:700;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720" rx="28"/>
  <text x="60" y="58" class="text title">一条好的 Agent eval，不只是一个 prompt</text>
  <text x="60" y="92" class="text s">它需要同时描述任务、环境、约束、可验证结果和评分方式，避免“测试假设”藏在 grader 里。</text>

  <rect x="455" y="285" width="290" height="145" rx="28" class="core"/>
  <text x="515" y="342" class="coreText">Eval Task</text>
  <text x="500" y="382" class="pill">可运行、可复现、可判定</text>

  <g>
    <rect x="80" y="150" width="285" height="115" rx="22" class="card"/>
    <text x="120" y="192" class="text h">Input</text>
    <text x="120" y="225" class="text m">用户请求、上下文、角色设定</text>
  </g>
  <g>
    <rect x="460" y="125" width="280" height="115" rx="22" class="card"/>
    <text x="500" y="167" class="text h">Initial State</text>
    <text x="500" y="200" class="text m">数据库、文件、工单、页面状态</text>
  </g>
  <g>
    <rect x="835" y="150" width="285" height="115" rx="22" class="card"/>
    <text x="875" y="192" class="text h">Tools &amp; Policy</text>
    <text x="875" y="225" class="text m">可用工具、权限、业务流程约束</text>
  </g>
  <g>
    <rect x="80" y="455" width="285" height="125" rx="22" class="card"/>
    <text x="120" y="497" class="text h">Success Criteria</text>
    <text x="120" y="530" class="text m">明确 pass/fail 条件</text>
    <text x="120" y="558" class="text m">最好能由专家独立判断</text>
  </g>
  <g>
    <rect x="460" y="485" width="280" height="115" rx="22" class="card"/>
    <text x="500" y="527" class="text h">Reference Solution</text>
    <text x="500" y="560" class="text m">验证任务可解，不强制路径</text>
  </g>
  <g>
    <rect x="835" y="455" width="285" height="125" rx="22" class="card"/>
    <text x="875" y="497" class="text h">Graders</text>
    <text x="875" y="530" class="text m">确定性检查 + rubric</text>
    <text x="875" y="558" class="text m">必要时人工校准</text>
  </g>

  <path d="M365 210 C430 240 465 270 505 305" class="arrow"/>
  <path d="M600 240 C600 260 600 270 600 285" class="arrow"/>
  <path d="M835 210 C770 240 735 270 695 305" class="arrow"/>
  <path d="M365 520 C430 485 465 450 505 420" class="arrow"/>
  <path d="M600 485 C600 465 600 450 600 430" class="arrow"/>
  <path d="M835 520 C770 485 735 450 695 420" class="arrow"/>
</svg>
