<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">pass@k 与 pass^k 的差异</title>
  <desc id="desc">展示当单次成功率为 75% 时，pass@k 随 k 增长上升，而 pass^k 随 k 增长下降。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc}.axis{stroke:#334155;stroke-width:3;marker-end:url(#arrow)}.grid{stroke:#cbd5e1;stroke-width:1}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:30px;font-weight:800}.h{font-size:21px;font-weight:800}.m{font-size:17px}.s{font-size:14px;fill:#475569}.blue{stroke:#2563eb;stroke-width:5;fill:none}.orange{stroke:#ea580c;stroke-width:5;fill:none}.dotb{fill:#2563eb}.doto{fill:#ea580c}
    </style>
  </defs>
  <rect class="bg" width="1200" height="680" rx="28"/>
  <text x="60" y="58" class="text title">同样的 Agent，pass@k 与 pass^k 会给出相反信号</text>
  <text x="60" y="92" class="text s">示例：假设单次成功率 p = 75%。pass@k 衡量“至少成功一次”，pass^k 衡量“连续 k 次都成功”。</text>

  <line x1="115" y1="545" x2="1020" y2="545" class="axis"/>
  <line x1="115" y1="545" x2="115" y2="125" class="axis"/>
  <text x="1035" y="552" class="text m">k</text>
  <text x="85" y="120" class="text m">成功概率</text>

  <g>
    <line x1="115" y1="461" x2="1010" y2="461" class="grid"/><text x="65" y="467" class="text s">20%</text>
    <line x1="115" y1="377" x2="1010" y2="377" class="grid"/><text x="65" y="383" class="text s">40%</text>
    <line x1="115" y1="293" x2="1010" y2="293" class="grid"/><text x="65" y="299" class="text s">60%</text>
    <line x1="115" y1="209" x2="1010" y2="209" class="grid"/><text x="65" y="215" class="text s">80%</text>
    <line x1="115" y1="125" x2="1010" y2="125" class="grid"/><text x="58" y="131" class="text s">100%</text>
  </g>

  <text x="188" y="575" class="text s">1</text><text x="274" y="575" class="text s">2</text><text x="360" y="575" class="text s">3</text><text x="446" y="575" class="text s">4</text><text x="532" y="575" class="text s">5</text><text x="618" y="575" class="text s">6</text><text x="704" y="575" class="text s">7</text><text x="790" y="575" class="text s">8</text><text x="876" y="575" class="text s">9</text><text x="958" y="575" class="text s">10</text>

  <path d="M200 230 L286 151 L372 131 L458 127 L544 126 L630 125 L716 125 L802 125 L888 125 L974 125" class="blue"/>
  <circle cx="200" cy="230" r="6" class="dotb"/><circle cx="286" cy="151" r="6" class="dotb"/><circle cx="372" cy="131" r="6" class="dotb"/><circle cx="544" cy="126" r="6" class="dotb"/><circle cx="974" cy="125" r="6" class="dotb"/>

  <path d="M200 230 L286 309 L372 368 L458 413 L544 447 L630 472 L716 491 L802 505 L888 516 L974 524" class="orange"/>
  <circle cx="200" cy="230" r="6" class="doto"/><circle cx="286" cy="309" r="6" class="doto"/><circle cx="372" cy="368" r="6" class="doto"/><circle cx="544" cy="447" r="6" class="doto"/><circle cx="974" cy="524" r="6" class="doto"/>

  <rect x="740" y="225" width="370" height="165" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="775" y1="268" x2="845" y2="268" class="blue"/><text x="865" y="274" class="text h">pass@k = 1 − (1 − p)^k</text>
  <text x="865" y="303" class="text s">适合“多次尝试，至少有一次可用”的场景</text>
  <line x1="775" y1="342" x2="845" y2="342" class="orange"/><text x="865" y="348" class="text h">pass^k = p^k</text>
  <text x="865" y="377" class="text s">适合“每次都要稳定成功”的生产场景</text>

  <text x="160" y="625" class="text s">启示：Agent eval 需要多次 trial，并同时看“最高潜力”和“稳定可靠性”。</text>
</svg>
