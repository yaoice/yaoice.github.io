<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">不同类型 Agent 的评估重点</title>
  <desc id="desc">将 Coding、Conversational、Research、Computer Use 四类 Agent 映射到结果、轨迹、体验和环境状态等评估重点。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .bg{fill:#f8fafc}.card{filter:url(#shadow);stroke-width:2}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:30px;font-weight:800}.h{font-size:23px;font-weight:800}.m{font-size:17px}.s{font-size:14px;fill:#475569}.center{font-size:20px;font-weight:800;fill:#ffffff}
    </style>
  </defs>
  <rect class="bg" width="1200" height="680" rx="28"/>
  <text x="60" y="58" class="text title">Agent 类型不同，eval 的“正确性证据”也不同</text>
  <text x="60" y="92" class="text s">不要套用单一指标；应围绕任务结果、环境状态、轨迹质量和用户体验组合评分。</text>

  <rect x="95" y="145" width="430" height="190" rx="28" fill="#ecfdf5" stroke="#6ee7b7" class="card"/>
  <text x="135" y="190" class="text h">Coding Agent</text>
  <text x="135" y="230" class="text m">主要证据：测试是否通过、代码是否正确修改</text>
  <text x="135" y="263" class="text m">补充证据：静态分析、安全扫描、代码风格</text>
  <text x="135" y="296" class="text s">优先看最终仓库状态，而不是只看回答文本。</text>

  <rect x="675" y="145" width="430" height="190" rx="28" fill="#eff6ff" stroke="#93c5fd" class="card"/>
  <text x="715" y="190" class="text h">Conversational Agent</text>
  <text x="715" y="230" class="text m">主要证据：业务状态是否完成、对话是否合规</text>
  <text x="715" y="263" class="text m">补充证据：共情、清晰度、轮数、工具调用</text>
  <text x="715" y="296" class="text s">任务完成与交互体验必须一起评估。</text>

  <rect x="95" y="410" width="430" height="190" rx="28" fill="#fff7ed" stroke="#fdba74" class="card"/>
  <text x="135" y="455" class="text h">Research Agent</text>
  <text x="135" y="495" class="text m">主要证据：结论是否有来源支撑、覆盖是否充分</text>
  <text x="135" y="528" class="text m">补充证据：来源质量、引用、幻觉、专家校准</text>
  <text x="135" y="561" class="text s">开放式任务要评估 groundedness 与 coverage。</text>

  <rect x="675" y="410" width="430" height="190" rx="28" fill="#f5f3ff" stroke="#c4b5fd" class="card"/>
  <text x="715" y="455" class="text h">Computer Use Agent</text>
  <text x="715" y="495" class="text m">主要证据：UI、文件系统、数据库、配置状态</text>
  <text x="715" y="528" class="text m">补充证据：截图/DOM 选择、点击轨迹、耗时</text>
  <text x="715" y="561" class="text s">真实或沙盒 GUI 环境是评估基础。</text>

  <circle cx="600" cy="372" r="98" fill="#0f172a" opacity="0.94"/>
  <text x="548" y="352" class="center">Outcome</text>
  <text x="550" y="382" class="center">+</text>
  <text x="538" y="412" class="center">Transcript</text>
</svg>
