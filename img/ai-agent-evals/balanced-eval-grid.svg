<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">平衡样本防止 Agent 单向优化</title>
  <desc id="desc">展示应该行动、不应该行动与 Agent 是否行动组成的四象限，说明正反样本的重要性。</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .bg{fill:#f8fafc}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:30px;font-weight:800}.s{font-size:15px;fill:#475569}.h{font-size:21px;font-weight:800}.m{font-size:16px;fill:#334155}.axis{font-size:18px;font-weight:800;fill:#334155}.cell{stroke-width:2;filter:url(#shadow)}.good{fill:#ecfdf5;stroke:#6ee7b7}.warn{fill:#fff7ed;stroke:#fdba74}.bad{fill:#fef2f2;stroke:#fca5a5}.neutral{fill:#eff6ff;stroke:#93c5fd}.check{font-size:42px;font-weight:900;fill:#059669}.cross{font-size:42px;font-weight:900;fill:#dc2626}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720" rx="28"/>
  <text x="60" y="58" class="text title">评估集要有“该做”和“不该做”，否则 Agent 会学偏</text>
  <text x="60" y="92" class="text s">只放正样本会把 Agent 优化成“什么都做”；只放拒绝样本又会让它过度保守。</text>

  <text x="560" y="140" class="text axis">真实任务要求</text>
  <text x="355" y="180" class="text axis">应该行动</text>
  <text x="760" y="180" class="text axis">不应该行动</text>
  <text x="80" y="355" class="text axis" transform="rotate(-90 80 355)">Agent 行为</text>
  <text x="145" y="300" class="text axis">行动</text>
  <text x="135" y="530" class="text axis">不行动</text>

  <rect x="245" y="205" width="360" height="190" rx="24" class="cell good"/>
  <text x="285" y="255" class="check">✓</text>
  <text x="340" y="255" class="text h">正确行动</text>
  <text x="285" y="300" class="text m">需要查库存 → 调用库存工具</text>
  <text x="285" y="330" class="text m">需要修 bug → 修改文件并跑测试</text>
  <text x="285" y="360" class="text s">正样本验证 Agent 有能力完成任务。</text>

  <rect x="635" y="205" width="360" height="190" rx="24" class="cell bad"/>
  <text x="675" y="255" class="cross">×</text>
  <text x="730" y="255" class="text h">过度行动</text>
  <text x="675" y="300" class="text m">常识问题 → 仍然搜索</text>
  <text x="675" y="330" class="text m">只要求解释 → 擅自改代码</text>
  <text x="675" y="360" class="text s">反样本防止“凡事都用工具”。</text>

  <rect x="245" y="425" width="360" height="190" rx="24" class="cell warn"/>
  <text x="285" y="475" class="cross">×</text>
  <text x="340" y="475" class="text h">漏做任务</text>
  <text x="285" y="520" class="text m">应处理退款 → 只安慰用户</text>
  <text x="285" y="550" class="text m">应运行测试 → 只说已修复</text>
  <text x="285" y="580" class="text s">暴露能力缺口和流程缺口。</text>

  <rect x="635" y="425" width="360" height="190" rx="24" class="cell neutral"/>
  <text x="675" y="475" class="check">✓</text>
  <text x="730" y="475" class="text h">正确克制</text>
  <text x="675" y="520" class="text m">无需搜索 → 直接回答</text>
  <text x="675" y="550" class="text m">不符合政策 → 解释原因</text>
  <text x="675" y="580" class="text s">验证 Agent 知道边界在哪里。</text>
</svg>
