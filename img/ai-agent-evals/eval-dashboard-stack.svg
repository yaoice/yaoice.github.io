<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">生产级 Agent Eval 指标面板</title>
  <desc id="desc">展示生产级 Agent eval dashboard 应同时关注任务结果、稳定性、执行过程、成本体验和风险。</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .bg{fill:#f8fafc}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:30px;font-weight:800}.s{font-size:15px;fill:#475569}.h{font-size:20px;font-weight:800}.m{font-size:16px;fill:#334155}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)}.metric{font-size:30px;font-weight:900}.good{fill:#059669}.warn{fill:#ea580c}.bad{fill:#dc2626}.barBg{fill:#e2e8f0}.bar1{fill:#22c55e}.bar2{fill:#3b82f6}.bar3{fill:#f97316}.bar4{fill:#ef4444}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720" rx="28"/>
  <text x="60" y="58" class="text title">生产级 eval 面板：分数只是入口，诊断才是价值</text>
  <text x="60" y="92" class="text s">一个可用 dashboard 应同时回答：是否完成任务、是否稳定、是否高效、是否值得上线。</text>

  <rect x="70" y="130" width="1060" height="500" rx="30" class="card"/>
  <rect x="110" y="170" width="210" height="135" rx="22" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="140" y="210" class="text h">任务结果</text>
  <text x="140" y="252" class="metric good">86%</text>
  <text x="140" y="282" class="text m">pass rate / partial score</text>

  <rect x="350" y="170" width="210" height="135" rx="22" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="380" y="210" class="text h">稳定性</text>
  <text x="380" y="252" class="metric">p@3 98%</text>
  <text x="380" y="282" class="text m">pass@k 与 pass^k 同看</text>

  <rect x="630" y="170" width="210" height="135" rx="22" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="660" y="210" class="text h">执行过程</text>
  <text x="660" y="252" class="metric warn">7.4</text>
  <text x="660" y="282" class="text m">平均 turn / 工具调用</text>

  <rect x="910" y="170" width="180" height="135" rx="22" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="940" y="210" class="text h">风险</text>
  <text x="940" y="252" class="metric bad">3</text>
  <text x="940" y="282" class="text m">高危失败样本</text>

  <text x="120" y="365" class="text h">失败模式分布</text>
  <rect x="120" y="395" width="880" height="28" rx="14" class="barBg"/>
  <rect x="120" y="395" width="330" height="28" rx="14" class="bar1"/>
  <rect x="450" y="395" width="250" height="28" class="bar2"/>
  <rect x="700" y="395" width="180" height="28" class="bar3"/>
  <rect x="880" y="395" width="120" height="28" rx="14" class="bar4"/>
  <text x="120" y="455" class="text m">Agent 行为问题 37%</text>
  <text x="360" y="455" class="text m">Task 歧义 28%</text>
  <text x="570" y="455" class="text m">Grader 脆弱 20%</text>
  <text x="800" y="455" class="text m">环境问题 15%</text>

  <text x="120" y="520" class="text h">发布决策问题</text>
  <rect x="120" y="545" width="290" height="55" rx="18" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="145" y="580" class="text m">这次改动是否真实提升？</text>
  <rect x="455" y="545" width="290" height="55" rx="18" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="480" y="580" class="text m">有没有破坏已有能力？</text>
  <rect x="790" y="545" width="290" height="55" rx="18" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="815" y="580" class="text m">下一批最该修什么？</text>
</svg>
