<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent Eval 从 0 到 1 路线图</title>
  <desc id="desc">展示从真实失败案例开始，逐步构建任务集、harness、grader、transcript 分析、回归套件与长期维护的闭环。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/></marker>
    <marker id="arrowL" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .bg{fill:#f8fafc}.node{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:30px;font-weight:800}.h{font-size:19px;font-weight:800}.s{font-size:14px;fill:#475569}.loopLabel{font-size:14px;fill:#64748b;font-style:italic}.arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.loop{stroke:#64748b;stroke-width:2.5;fill:none;stroke-dasharray:8 8;marker-end:url(#arrowL)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720" rx="28"/>
  <text x="60" y="58" class="text title">从 20–50 个真实失败案例开始，把 eval 做成持续演进的工程资产</text>
  <text x="60" y="92" class="text s">路线图参考 Anthropic 对 Agent eval 的实践建议：早建、小步、可复现、读轨迹、持续维护。</text>

  <g>
    <rect x="70" y="150" width="220" height="105" rx="22" class="node"/>
    <text x="105" y="190" class="text h">0. 尽早开始</text>
    <text x="105" y="220" class="text s">从真实失败和手工测试入手</text>
  </g>
  <g>
    <rect x="360" y="150" width="220" height="105" rx="22" class="node"/>
    <text x="395" y="190" class="text h">1. 明确任务</text>
    <text x="395" y="220" class="text s">无歧义描述 + 参考解</text>
  </g>
  <g>
    <rect x="650" y="150" width="220" height="105" rx="22" class="node"/>
    <text x="685" y="190" class="text h">2. 平衡样本</text>
    <text x="685" y="220" class="text s">既测应该做，也测不该做</text>
  </g>
  <g>
    <rect x="940" y="150" width="220" height="105" rx="22" class="node"/>
    <text x="975" y="190" class="text h">3. 稳定 Harness</text>
    <text x="975" y="220" class="text s">隔离、并发、记录、聚合</text>
  </g>

  <g>
    <rect x="940" y="375" width="220" height="105" rx="22" class="node"/>
    <text x="975" y="415" class="text h">4. 设计 Grader</text>
    <text x="975" y="445" class="text s">确定性优先，LLM 补充</text>
  </g>
  <g>
    <rect x="650" y="375" width="220" height="105" rx="22" class="node"/>
    <text x="685" y="415" class="text h">5. 读 Transcript</text>
    <text x="685" y="445" class="text s">定位 Agent、任务或评分问题</text>
  </g>
  <g>
    <rect x="360" y="375" width="220" height="105" rx="22" class="node"/>
    <text x="395" y="415" class="text h">6. 监控饱和</text>
    <text x="395" y="445" class="text s">能力集毕业为回归集</text>
  </g>
  <g>
    <rect x="70" y="375" width="220" height="105" rx="22" class="node"/>
    <text x="105" y="415" class="text h">7. 长期维护</text>
    <text x="105" y="445" class="text s">产品、工程、专家共同贡献</text>
  </g>

  <path d="M290 202 C320 202 330 202 360 202" class="arrow"/>
  <path d="M580 202 C610 202 620 202 650 202" class="arrow"/>
  <path d="M870 202 C900 202 910 202 940 202" class="arrow"/>
  <path d="M1050 255 C1070 300 1070 330 1050 375" class="arrow"/>
  <path d="M940 427 C910 427 900 427 870 427" class="arrow"/>
  <path d="M650 427 C620 427 610 427 580 427" class="arrow"/>
  <path d="M360 427 C330 427 320 427 290 427" class="arrow"/>

  <path d="M40 427 C20 427 20 202 40 202" class="loop"/>
  <text x="10" y="320" class="text loopLabel" transform="rotate(-90 20 320)">持续闭环</text>

  <rect x="270" y="590" width="660" height="60" rx="18" fill="#0f172a" opacity="0.92"/>
  <text x="305" y="628" class="text h" style="fill:#ffffff">Eval-driven Development：先定义“怎样算成功”，再推动 Agent 达成。</text>
</svg>
