<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent Eval 反馈飞轮</title>
  <desc id="desc">展示从生产反馈到失败样本、eval task、CI 门禁、发布决策和监控回流的闭环。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#334155"/></marker>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>
      .bg{fill:#f8fafc}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:30px;font-weight:800}.s{font-size:15px;fill:#475569}.h{font-size:20px;font-weight:800}.m{font-size:15px;fill:#334155}.node{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)}.ring{fill:none;stroke:#cbd5e1;stroke-width:22;stroke-linecap:round;stroke-dasharray:150 52}.arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.accent{fill:#0f172a}.num{font-size:18px;font-weight:800;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720" rx="28"/>
  <text x="60" y="58" class="text title">把 eval 做成产品反馈飞轮，而不是一次性 benchmark</text>
  <text x="60" y="92" class="text s">真实用户反馈持续进入任务集；自动化评估再反过来约束发布、发现回归和指导下一轮优化。</text>

  <circle cx="600" cy="365" r="210" class="ring"/>
  <circle cx="600" cy="365" r="104" fill="#0f172a" opacity="0.94"/>
  <text x="548" y="350" class="num">Eval</text>
  <text x="520" y="382" class="num">Feedback</text>
  <text x="548" y="414" class="num">Flywheel</text>

  <g>
    <rect x="500" y="125" width="200" height="88" rx="22" class="node"/>
    <circle cx="532" cy="158" r="16" class="accent"/><text x="526" y="164" class="num">1</text>
    <text x="562" y="158" class="text h">生产反馈</text>
    <text x="532" y="188" class="text m">用户、日志、人工接管</text>
  </g>
  <g>
    <rect x="795" y="230" width="220" height="92" rx="22" class="node"/>
    <circle cx="827" cy="263" r="16" class="accent"/><text x="821" y="269" class="num">2</text>
    <text x="857" y="263" class="text h">失败样本</text>
    <text x="827" y="293" class="text m">保留 transcript 与 outcome</text>
  </g>
  <g>
    <rect x="790" y="475" width="230" height="92" rx="22" class="node"/>
    <circle cx="822" cy="508" r="16" class="accent"/><text x="816" y="514" class="num">3</text>
    <text x="852" y="508" class="text h">Eval Task</text>
    <text x="822" y="538" class="text m">写清输入、环境、成功标准</text>
  </g>
  <g>
    <rect x="490" y="575" width="220" height="92" rx="22" class="node"/>
    <circle cx="522" cy="608" r="16" class="accent"/><text x="516" y="614" class="num">4</text>
    <text x="552" y="608" class="text h">CI / 发布门禁</text>
    <text x="522" y="638" class="text m">防止回归，比较方案</text>
  </g>
  <g>
    <rect x="190" y="475" width="225" height="92" rx="22" class="node"/>
    <circle cx="222" cy="508" r="16" class="accent"/><text x="216" y="514" class="num">5</text>
    <text x="252" y="508" class="text h">修复与调优</text>
    <text x="222" y="538" class="text m">模型、prompt、工具、harness</text>
  </g>
  <g>
    <rect x="185" y="230" width="230" height="92" rx="22" class="node"/>
    <circle cx="217" cy="263" r="16" class="accent"/><text x="211" y="269" class="num">6</text>
    <text x="247" y="263" class="text h">上线监控</text>
    <text x="217" y="293" class="text m">成本、延迟、满意度、风险</text>
  </g>

  <path d="M680 178 C760 190 815 210 850 235" class="arrow"/>
  <path d="M910 322 C925 380 925 430 905 475" class="arrow"/>
  <path d="M790 548 C735 590 690 608 710 620" class="arrow"/>
  <path d="M490 620 C420 610 360 585 330 562" class="arrow"/>
  <path d="M260 475 C230 430 220 375 235 320" class="arrow"/>
  <path d="M415 252 C465 205 515 185 500 170" class="arrow"/>
</svg>
