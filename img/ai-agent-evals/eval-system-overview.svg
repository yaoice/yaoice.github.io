<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent Eval 系统全景</title>
  <desc id="desc">展示 eval suite、evaluation harness、agent harness、环境、transcript、outcome、grader 和结果看板之间的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg{fill:#f8fafc}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)}
      .panel{fill:#eef6ff;stroke:#93c5fd;stroke-width:2}.env{fill:#f0fdf4;stroke:#86efac;stroke-width:2}
      .grade{fill:#fff7ed;stroke:#fdba74;stroke-width:2}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}
      .title{font-size:30px;font-weight:700}.h{font-size:22px;font-weight:700}.m{font-size:17px}.s{font-size:15px;fill:#475569}
      .arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:2;fill:none;stroke-dasharray:7 7;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720" rx="28"/>
  <text x="60" y="58" class="text title">Agent Eval 评估的是完整系统，而不是单个模型</text>
  <text x="60" y="90" class="text s">Task → Trial → Agent Harness → Transcript / Outcome → Grader → 指标与决策</text>

  <rect x="60" y="140" width="210" height="340" rx="22" class="card"/>
  <text x="92" y="185" class="text h">Eval Suite</text>
  <text x="92" y="225" class="text m">• 真实任务</text>
  <text x="92" y="258" class="text m">• 成功标准</text>
  <text x="92" y="291" class="text m">• 参考解</text>
  <text x="92" y="324" class="text m">• 正反样本</text>
  <text x="92" y="375" class="text s">能力评估：寻找爬坡方向</text>
  <text x="92" y="403" class="text s">回归评估：守住已有能力</text>

  <rect x="340" y="125" width="260" height="380" rx="24" class="panel"/>
  <text x="385" y="170" class="text h">Evaluation Harness</text>
  <text x="380" y="210" class="text m">1. 分发 task</text>
  <text x="380" y="243" class="text m">2. 多次运行 trial</text>
  <text x="380" y="276" class="text m">3. 隔离环境</text>
  <text x="380" y="309" class="text m">4. 记录完整轨迹</text>
  <text x="380" y="342" class="text m">5. 聚合指标</text>
  <text x="380" y="395" class="text s">关键：可复现、低噪声、</text>
  <text x="380" y="421" class="text s">接近生产但可控</text>

  <rect x="675" y="120" width="420" height="230" rx="24" class="card"/>
  <text x="815" y="164" class="text h">Agent Harness</text>
  <rect x="710" y="195" width="105" height="80" rx="16" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
  <text x="733" y="225" class="text m">Model</text>
  <text x="727" y="250" class="text s">策略与推理</text>
  <rect x="835" y="195" width="105" height="80" rx="16" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
  <text x="858" y="225" class="text m">Tools</text>
  <text x="854" y="250" class="text s">搜索/代码/GUI</text>
  <rect x="960" y="195" width="105" height="80" rx="16" fill="#fef9c3" stroke="#fde047" stroke-width="2"/>
  <text x="980" y="225" class="text m">Policy</text>
  <text x="978" y="250" class="text s">约束与流程</text>
  <text x="720" y="317" class="text s">Agent 的行为来自模型、工具、提示词、权限和环境的组合。</text>

  <rect x="675" y="390" width="190" height="140" rx="22" class="env"/>
  <text x="724" y="432" class="text h">Outcome</text>
  <text x="710" y="470" class="text m">最终环境状态</text>
  <text x="710" y="500" class="text s">文件、数据库、UI、</text>
  <text x="710" y="522" class="text s">工单、日志等</text>

  <rect x="905" y="390" width="190" height="140" rx="22" class="env"/>
  <text x="950" y="432" class="text h">Transcript</text>
  <text x="940" y="470" class="text m">完整执行轨迹</text>
  <text x="940" y="500" class="text s">对话、工具调用、</text>
  <text x="940" y="522" class="text s">token、延迟等</text>

  <rect x="340" y="585" width="520" height="85" rx="22" class="grade"/>
  <text x="375" y="636" class="text h">Graders：确定性检查 + LLM Judge + 人工校准</text>

  <rect x="905" y="595" width="190" height="65" rx="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="945" y="635" class="text h">Dashboard</text>

  <path d="M270 300 C300 300 310 300 340 300" class="arrow"/>
  <path d="M600 235 C635 230 645 230 675 232" class="arrow"/>
  <path d="M770 350 C770 370 770 380 770 388" class="arrow"/>
  <path d="M1000 350 C1000 370 1000 380 1000 388" class="arrow"/>
  <path d="M770 530 C770 555 720 570 680 585" class="dash"/>
  <path d="M1000 530 C1000 555 900 575 820 585" class="dash"/>
  <path d="M860 628 C880 628 890 628 905 628" class="arrow"/>
</svg>
