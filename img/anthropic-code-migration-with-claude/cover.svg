<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">修流程，不修代码</title>
  <desc id="d">Anthropic 用 Claude Code 跑大规模代码迁移的核心心智：修产出代码的循环。</desc>
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="960" height="420" fill="#f8fafc" rx="10"/>

  <text x="480" y="66" text-anchor="middle" font-size="34" font-weight="800" fill="#1e293b">你修的不是代码</text>
  <text x="480" y="112" text-anchor="middle" font-size="34" font-weight="800" fill="#3b82f6">而是产出代码的循环</text>
  <text x="480" y="150" text-anchor="middle" font-size="15" fill="#64748b">Anthropic 如何用 Claude Code 运行大规模代码迁移 · 六步方法论拆解</text>

  <!-- 旧代码库 -->
  <rect x="70" y="210" width="180" height="120" rx="10" fill="#fff" stroke="#cbd5e1" filter="url(#s)"/>
  <text x="160" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">旧代码库</text>
  <text x="160" y="268" text-anchor="middle" font-size="11" fill="#94a3b8">Zig / Python …</text>
  <text x="160" y="300" text-anchor="middle" font-size="11" fill="#64748b">既是待迁移对象</text>
  <text x="160" y="316" text-anchor="middle" font-size="11" fill="#64748b">也是最完整的规范</text>

  <!-- 循环机器 -->
  <rect x="360" y="188" width="240" height="164" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#s)"/>
  <text x="480" y="216" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">Agent 循环</text>
  <text x="480" y="248" text-anchor="middle" font-size="12" fill="#1e293b">实现 → 审查 → 修复</text>
  <circle cx="480" cy="292" r="34" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <path d="M480 258 A34 34 0 0 1 508 306" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M480 326 A34 34 0 0 1 452 278" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>
  <text x="480" y="296" text-anchor="middle" font-size="10" fill="#64748b">编译器 / 测试</text>
  <text x="480" y="310" text-anchor="middle" font-size="10" fill="#64748b">当裁判</text>

  <!-- 新代码库 -->
  <rect x="710" y="210" width="180" height="120" rx="10" fill="#fff" stroke="#10b981" filter="url(#s)"/>
  <text x="800" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">新代码库</text>
  <text x="800" y="268" text-anchor="middle" font-size="11" fill="#94a3b8">Rust / TypeScript …</text>
  <text x="800" y="300" text-anchor="middle" font-size="11" fill="#64748b">更快、更省内存</text>
  <text x="800" y="316" text-anchor="middle" font-size="11" fill="#64748b">行为逐命令对齐</text>

  <path d="M254 270 L356 270" stroke="#3b82f6" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M604 270 L706 270" stroke="#10b981" stroke-width="2" marker-end="url(#ar)"/>

  <text x="480" y="392" text-anchor="middle" font-size="12" font-style="italic" fill="#64748b">人力前置到规则手册，之后剩下的大多是队列在自燃烧</text>
</svg>
