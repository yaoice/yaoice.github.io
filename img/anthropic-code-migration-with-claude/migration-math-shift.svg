<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">迁移的经济账变了</title>
  <desc id="d">代码迁移从四年、数百万美元、职业风险，变成数万美元、最坏删分支重来。</desc>
  <defs>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="ar2" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#f8fafc" rx="10"/>
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">迁移的"经济账"被彻底改写</text>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#64748b">决定要不要迁移的，从来不是技术，而是成本与最坏结果</text>

  <!-- 过去 -->
  <rect x="40" y="86" width="380" height="316" rx="10" fill="#fff" stroke="#cbd5e1" filter="url(#s2)"/>
  <rect x="40" y="86" width="380" height="40" rx="10" fill="#475569"/>
  <text x="230" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">过去：令人却步的豪赌</text>

  <text x="66" y="160" font-size="13" font-weight="700" fill="#ef4444">周期 · 4 年</text>
  <text x="66" y="182" font-size="12" fill="#64748b">一次迁移动辄横跨数个团队季度</text>

  <text x="66" y="218" font-size="13" font-weight="700" fill="#ef4444">成本 · 300–400 万美元</text>
  <text x="66" y="240" font-size="12" fill="#64748b">人力与机会成本高到需要"生死存亡"理由</text>

  <text x="66" y="276" font-size="13" font-weight="700" fill="#ef4444">代价 · 维护两套并行代码库</text>
  <text x="66" y="298" font-size="12" fill="#64748b">拖数个季度乃至数年，最终仅约 90% 一致</text>

  <text x="66" y="334" font-size="13" font-weight="700" fill="#ef4444">风险 · 职业级</text>
  <text x="66" y="356" font-size="12" fill="#64748b">失败会赔上团队声誉，没人敢轻易立项</text>
  <text x="66" y="384" font-size="12" font-style="italic" fill="#94a3b8">"要么成功，要么背锅"</text>

  <!-- 箭头 -->
  <path d="M430 244 L522 244" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#ar2)"/>
  <text x="476" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#3b82f6">AI</text>

  <!-- 现在 -->
  <rect x="540" y="86" width="380" height="316" rx="10" fill="#fff" stroke="#10b981" filter="url(#s2)"/>
  <rect x="540" y="86" width="380" height="40" rx="10" fill="#10b981"/>
  <text x="730" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">现在：可以随手一试</text>

  <text x="566" y="160" font-size="13" font-weight="700" fill="#047857">周期 · 一到两周</text>
  <text x="566" y="182" font-size="12" fill="#64748b">上百万行代码在两周内产出</text>

  <text x="566" y="218" font-size="13" font-weight="700" fill="#047857">成本 · 数万到数十万美元</text>
  <text x="566" y="240" font-size="12" fill="#64748b">仍需商业理由，但门槛降了两个数量级</text>

  <text x="566" y="276" font-size="13" font-weight="700" fill="#047857">代价 · 单向翻译，不再并行维护</text>
  <text x="566" y="298" font-size="12" fill="#64748b">对着旧代码这个"基准真相"逐步逼近</text>

  <text x="566" y="334" font-size="13" font-weight="700" fill="#047857">风险 · 最坏 = 删分支重来</text>
  <text x="566" y="356" font-size="12" fill="#64748b">失败的成本是几万 token，而不是几年</text>
  <text x="566" y="384" font-size="12" font-style="italic" fill="#8b5cf6">"迁移的理由不再需要是生死存亡级别的"</text>
</svg>
