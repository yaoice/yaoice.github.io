<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">实现-审查-修复循环</title>
  <desc id="d">小模型扇出实现，大模型对抗审查，修复上移到规则手册后重生成批次。</desc>
  <defs>
    <filter id="s5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="ar5" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3b82f6"/>
    </marker>
    <marker id="ar5g" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="960" height="430" fill="#f8fafc" rx="10"/>
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">循环的引擎：实现 → 审查 → 修复</text>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#64748b">别对所有事用最大模型：token 都烧在循环里，要刻意分配</text>

  <!-- 实现 -->
  <rect x="40" y="96" width="200" height="128" rx="10" fill="#fff" stroke="#dbeafe" filter="url(#s5)"/>
  <text x="140" y="126" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">① 实现</text>
  <text x="140" y="152" text-anchor="middle" font-size="12" fill="#475569">较小模型高量扇出</text>
  <text x="140" y="174" text-anchor="middle" font-size="11.5" fill="#64748b">十几个子 agent 并行翻译</text>
  <text x="140" y="196" text-anchor="middle" font-size="11.5" fill="#64748b">难点标 // TODO(port)</text>
  <text x="140" y="216" text-anchor="middle" font-size="10.5" font-style="italic" fill="#94a3b8">过保守？直白强硬地推它</text>

  <!-- 审查 -->
  <rect x="380" y="96" width="200" height="128" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#s5)"/>
  <text x="480" y="126" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">② 审查</text>
  <text x="480" y="152" text-anchor="middle" font-size="12" fill="#475569">两个对抗审查者</text>
  <text x="480" y="174" text-anchor="middle" font-size="11.5" fill="#64748b">独立上下文，各自挑刺</text>
  <text x="480" y="196" text-anchor="middle" font-size="11.5" fill="#64748b">分歧 → 第三 agent 仲裁</text>
  <text x="480" y="216" text-anchor="middle" font-size="10.5" font-style="italic" fill="#94a3b8">每个发现都引用一条规则</text>

  <!-- 修复 -->
  <rect x="720" y="96" width="200" height="128" rx="10" fill="#fff" stroke="#d1fae5" filter="url(#s5)"/>
  <text x="820" y="126" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">③ 修复</text>
  <text x="820" y="152" text-anchor="middle" font-size="12" fill="#475569">按根本原因分组</text>
  <text x="820" y="174" text-anchor="middle" font-size="11.5" fill="#64748b">修复 agent 处理错误列表</text>
  <text x="820" y="196" text-anchor="middle" font-size="11.5" fill="#64748b">对抗审查者复核补丁</text>
  <text x="820" y="216" text-anchor="middle" font-size="10.5" font-style="italic" fill="#94a3b8">同类错误 → 触发规则上移</text>

  <!-- 机械裁判 -->
  <rect x="380" y="252" width="200" height="52" rx="10" fill="#1e293b" filter="url(#s5)"/>
  <text x="480" y="276" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">机械裁判</text>
  <text x="480" y="294" text-anchor="middle" font-size="11" fill="#cbd5e1">编译器 · diff · 测试套件</text>

  <!-- 前向箭头 -->
  <path d="M240 160 L378 160" stroke="#3b82f6" stroke-width="2" marker-end="url(#ar5)"/>
  <path d="M580 160 L718 160" stroke="#3b82f6" stroke-width="2" marker-end="url(#ar5)"/>
  <path d="M480 252 L480 226" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar5g)"/>

  <!-- 修复上移回环 -->
  <path d="M820 224 L820 340 L140 340 L140 226" fill="none" stroke="#8b5cf6" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#ar5)" />
  <rect x="330" y="322" width="300" height="34" rx="8" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="480" y="344" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">修复上移：改规则手册一句话，重生成受影响批次</text>

  <!-- 编译器位置决策 -->
  <rect x="40" y="372" width="880" height="44" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="60" y="399" font-size="12" fill="#1e293b"><tspan font-weight="700" fill="#f59e0b">编译器摆哪里是设计决策：</tspan>Mike 让 TS 编译器进循环（秒级即时反馈）；Jarred 把 cargo 挡在循环外、推迟到下一步（分钟级太慢）。</text>
</svg>
