<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">大规模代码迁移的六步流程</title>
  <desc id="d">先建裁判，再走规则手册、压力测试、翻译、编译、运行、匹配行为六步。</desc>
  <defs>
    <filter id="s4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="ar4" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#f8fafc" rx="10"/>
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">六步流程：把人力前置，让队列自己燃烧</text>

  <!-- 前置条件 -->
  <rect x="30" y="58" width="900" height="88" rx="10" fill="#fff8ec" stroke="#f59e0b" stroke-width="1.5" filter="url(#s4)"/>
  <rect x="30" y="58" width="150" height="88" rx="10" fill="#f59e0b"/>
  <text x="105" y="98" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">前置条件</text>
  <text x="105" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">建立强裁判</text>
  <text x="204" y="88" font-size="12.5" fill="#1e293b">归类现有测试 → 改写为可同时跑在新旧代码上的断言 → 用对抗 agent 确认没弱化断言</text>
  <text x="204" y="112" font-size="12.5" fill="#1e293b">验证裁判：先对原代码跑通过，再对"故意破坏的代码"跑，必须失败</text>
  <text x="204" y="136" font-size="12.5" font-style="italic" font-weight="700" fill="#b45309">"抓不到破坏的裁判，不是裁判。"</text>

  <!-- 六步 -->
  <g font-size="12">
    <!-- step1 -->
    <rect x="30" y="180" width="140" height="150" rx="10" fill="#fff" stroke="#dbeafe" filter="url(#s4)"/>
    <circle cx="60" cy="210" r="15" fill="#3b82f6"/><text x="60" y="215" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">1</text>
    <text x="84" y="215" font-size="13" font-weight="700" fill="#1e293b">立规则</text>
    <text x="46" y="248" font-size="11.5" fill="#475569" font-weight="600">规则手册</text>
    <text x="46" y="268" font-size="11.5" fill="#475569" font-weight="600">依赖图</text>
    <text x="46" y="288" font-size="11.5" fill="#475569" font-weight="600">缺口清单</text>
    <text x="46" y="312" font-size="10.5" fill="#94a3b8">先手册后清单</text>
    <!-- step2 -->
    <rect x="184" y="180" width="140" height="150" rx="10" fill="#fff" stroke="#dbeafe" filter="url(#s4)"/>
    <circle cx="214" cy="210" r="15" fill="#3b82f6"/><text x="214" y="215" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">2</text>
    <text x="238" y="215" font-size="13" font-weight="700" fill="#1e293b">压测</text>
    <text x="200" y="248" font-size="11.5" fill="#475569">小规模"试航"</text>
    <text x="200" y="268" font-size="11.5" fill="#475569">两种译法 diff</text>
    <text x="200" y="288" font-size="11.5" fill="#475569">出新规则</text>
    <text x="200" y="312" font-size="10.5" fill="#ef4444">译文全部丢弃</text>
    <!-- step3 -->
    <rect x="338" y="180" width="140" height="150" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#s4)"/>
    <circle cx="368" cy="210" r="15" fill="#1e40af"/><text x="368" y="215" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">3</text>
    <text x="392" y="215" font-size="13" font-weight="700" fill="#1e40af">翻译</text>
    <text x="354" y="248" font-size="11.5" fill="#1e293b">实现→审查→修复</text>
    <text x="354" y="268" font-size="11.5" fill="#1e293b">小模型扇出实现</text>
    <text x="354" y="288" font-size="11.5" fill="#1e293b">大模型对抗审查</text>
    <text x="354" y="312" font-size="10.5" fill="#1e40af" font-weight="600">队列可恢复</text>
    <!-- step4 -->
    <rect x="492" y="180" width="140" height="150" rx="10" fill="#fff" stroke="#d1fae5" filter="url(#s4)"/>
    <circle cx="522" cy="210" r="15" fill="#10b981"/><text x="522" y="215" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">4</text>
    <text x="546" y="215" font-size="13" font-weight="700" fill="#1e293b">编译</text>
    <text x="508" y="248" font-size="11.5" fill="#475569">编译器枚举错误</text>
    <text x="508" y="268" font-size="11.5" fill="#475569">修复 agent 并行</text>
    <text x="508" y="288" font-size="11.5" fill="#475569">审查系统性问题</text>
    <text x="508" y="312" font-size="10.5" fill="#94a3b8">常并入步骤 3</text>
    <!-- step5 -->
    <rect x="646" y="180" width="140" height="150" rx="10" fill="#fff" stroke="#d1fae5" filter="url(#s4)"/>
    <circle cx="676" cy="210" r="15" fill="#10b981"/><text x="676" y="215" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">5</text>
    <text x="700" y="215" font-size="13" font-weight="700" fill="#1e293b">运行</text>
    <text x="662" y="248" font-size="11.5" fill="#475569">冒烟测试找崩溃</text>
    <text x="662" y="268" font-size="11.5" fill="#475569">按根本原因分组</text>
    <text x="662" y="288" font-size="11.5" fill="#475569">对抗子 agent 审</text>
    <text x="662" y="312" font-size="10.5" fill="#94a3b8">真相=崩溃</text>
    <!-- step6 -->
    <rect x="800" y="180" width="130" height="150" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#s4)"/>
    <circle cx="830" cy="210" r="15" fill="#8b5cf6"/><text x="830" y="215" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">6</text>
    <text x="854" y="215" font-size="12.5" font-weight="700" fill="#6d28d9">匹配行为</text>
    <text x="816" y="248" font-size="11.5" fill="#475569">跑测试套件</text>
    <text x="816" y="268" font-size="11.5" fill="#475569">两库逐命令对比</text>
    <text x="816" y="288" font-size="11.5" fill="#475569">build daemon</text>
    <text x="816" y="312" font-size="10.5" fill="#6d28d9">串行化最贵操作</text>
  </g>

  <!-- 连接箭头 -->
  <g stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar4)">
    <path d="M170 255 L182 255"/><path d="M324 255 L336 255"/><path d="M478 255 L490 255"/>
    <path d="M632 255 L644 255"/><path d="M786 255 L798 255"/>
  </g>

  <!-- 递减条 -->
  <rect x="30" y="366" width="900" height="30" rx="6" fill="#e2e8f0"/>
  <text x="48" y="386" font-size="12" font-weight="700" fill="#1e293b">所需人工判断：</text>
  <rect x="150" y="371" width="160" height="20" rx="4" fill="#1e293b"/><text x="230" y="385" text-anchor="middle" font-size="11" fill="#fff">高（定规则）</text>
  <rect x="316" y="371" width="300" height="20" rx="4" fill="#475569"/><text x="466" y="385" text-anchor="middle" font-size="11" fill="#fff">中（盯模式，不盯单点）</text>
  <rect x="622" y="371" width="290" height="20" rx="4" fill="#94a3b8"/><text x="767" y="385" text-anchor="middle" font-size="11" fill="#fff">低（队列自动燃烧）</text>

  <!-- 底部循环上移说明 -->
  <rect x="30" y="418" width="900" height="96" rx="10" fill="#fff" stroke="#e2e8f0" filter="url(#s4)"/>
  <text x="52" y="448" font-size="13" font-weight="700" fill="#3b82f6">贯穿三、四、五、六步的同一条铁律：修复上移，代码永不手工打补丁</text>
  <text x="52" y="476" font-size="12.5" fill="#64748b">审查者反复抓到同类错误时，不是逐个文件去改——而是在规则手册里加一句话，</text>
  <text x="52" y="498" font-size="12.5" fill="#64748b">然后只重新生成受该规则影响的那批文件。规则手册在整个过程中持续生长。</text>
</svg>
