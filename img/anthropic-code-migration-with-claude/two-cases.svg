<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">两个真实案例的分野</title>
  <desc id="d">Bun 保结构 Zig→Rust，与内部 Python→TypeScript 重设计，两条路线对照。</desc>
  <rect width="960" height="480" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">同一套方法论，两条不同的路：保结构 vs 重设计</text>

  <!-- 表头 -->
  <rect x="30" y="56" width="150" height="40" rx="6" fill="#1e293b"/>
  <text x="105" y="81" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">维度</text>
  <rect x="188" y="56" width="371" height="40" rx="6" fill="#3b82f6"/>
  <text x="373" y="75" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Bun · Zig → Rust</text>
  <text x="373" y="90" text-anchor="middle" font-size="10.5" fill="#dbeafe">Jarred Sumner</text>
  <rect x="567" y="56" width="363" height="40" rx="6" fill="#8b5cf6"/>
  <text x="748" y="75" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">内部服务 · Python → TypeScript</text>
  <text x="748" y="90" text-anchor="middle" font-size="10.5" fill="#ede9fe">Mike Krieger</text>

  <!-- 行模板 -->
  <g font-size="11.5">
    <!-- 架构策略 -->
    <rect x="30" y="104" width="150" height="62" rx="6" fill="#e2e8f0"/>
    <text x="105" y="140" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">架构策略</text>
    <rect x="188" y="104" width="371" height="62" rx="6" fill="#fff" stroke="#dbeafe"/>
    <text x="204" y="130" fill="#1e293b" font-weight="600">保结构翻译</text>
    <text x="204" y="152" fill="#64748b">新旧同构，规则手册≈类型/惯用法查找表</text>
    <rect x="567" y="104" width="363" height="62" rx="6" fill="#fff" stroke="#ede9fe"/>
    <text x="583" y="130" fill="#1e293b" font-weight="600">完全重设计</text>
    <text x="583" y="152" fill="#64748b">规则手册是一份设计文档而非查找表</text>

    <!-- 规模耗时 -->
    <rect x="30" y="172" width="150" height="62" rx="6" fill="#e2e8f0"/>
    <text x="105" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">规模 · 耗时</text>
    <rect x="188" y="172" width="371" height="62" rx="6" fill="#fff" stroke="#dbeafe"/>
    <text x="204" y="198" fill="#1e293b" font-weight="600">100 万+ 行 / 不到两周</text>
    <text x="204" y="220" fill="#64748b">1448 个文件，合并前测试 100% 过 CI</text>
    <rect x="567" y="172" width="363" height="62" rx="6" fill="#fff" stroke="#ede9fe"/>
    <text x="583" y="198" fill="#1e293b" font-weight="600">16.5 万行 / 一个周末</text>
    <text x="583" y="220" fill="#64748b">数百 agent、8 个阶段门、3 轮对抗审查</text>

    <!-- 裁判来源 -->
    <rect x="30" y="240" width="150" height="62" rx="6" fill="#e2e8f0"/>
    <text x="105" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">裁判来源</text>
    <rect x="188" y="240" width="371" height="62" rx="6" fill="#fff" stroke="#dbeafe"/>
    <text x="204" y="266" fill="#1e293b" font-weight="600">继承现成测试套件</text>
    <text x="204" y="288" fill="#64748b">另有第三方 TypeScript 大型测试套件</text>
    <rect x="567" y="240" width="363" height="62" rx="6" fill="#fff" stroke="#ede9fe"/>
    <text x="583" y="266" fill="#1e293b" font-weight="600">自造 7 场景一致性装置</text>
    <text x="583" y="288" fill="#64748b">没有就让 Claude 造一个，原库即基准真相</text>

    <!-- 编译器位置 -->
    <rect x="30" y="308" width="150" height="62" rx="6" fill="#e2e8f0"/>
    <text x="105" y="344" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">编译器位置</text>
    <rect x="188" y="308" width="371" height="62" rx="6" fill="#fff" stroke="#dbeafe"/>
    <text x="204" y="334" fill="#1e293b" font-weight="600">挡在循环外</text>
    <text x="204" y="356" fill="#64748b">cargo 慢，推迟到编译步骤统一处理</text>
    <rect x="567" y="308" width="363" height="62" rx="6" fill="#fff" stroke="#ede9fe"/>
    <text x="583" y="334" fill="#1e293b" font-weight="600">放进每个循环</text>
    <text x="583" y="356" fill="#64748b">tsc 秒级，即时抓错、即时纠偏</text>

    <!-- 运行与成本 -->
    <rect x="30" y="376" width="150" height="62" rx="6" fill="#e2e8f0"/>
    <text x="105" y="405" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">运行 · 成本</text>
    <rect x="188" y="376" width="371" height="62" rx="6" fill="#fff" stroke="#dbeafe"/>
    <text x="204" y="402" fill="#1e293b" font-weight="600">一次跑通，事后修 19 个回归</text>
    <text x="204" y="424" fill="#64748b">≈59 亿输入 + 6.9 亿输出 token ≈ 16.5 万美元</text>
    <rect x="567" y="376" width="363" height="62" rx="6" fill="#fff" stroke="#ede9fe"/>
    <text x="583" y="402" fill="#1e293b" font-weight="600">丢弃重跑，第三次才成功</text>
    <text x="583" y="424" fill="#64748b">主体移植约 2700 万 token</text>
  </g>

  <text x="480" y="462" text-anchor="middle" font-size="11.5" font-style="italic" fill="#64748b">别照抄任何一条：先和 Claude 一起为你的代码库规划出属于你的流程</text>
</svg>
