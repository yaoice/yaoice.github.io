<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Bun 迁移的可度量结果</title>
  <desc id="d">内存从 6745MB 降到 609MB，二进制小 19%，真实负载快 2 到 5%。</desc>
  <defs>
    <filter id="s7" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="380" fill="#f8fafc" rx="10"/>
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">审查循环，而不是审查代码：结果说话</text>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#64748b">Bun 的 Rust 版已投入生产，新代码库在可度量维度全面更优</text>

  <!-- 内存卡（带迷你条形图） -->
  <rect x="30" y="84" width="290" height="196" rx="10" fill="#fff" stroke="#d1fae5" filter="url(#s7)"/>
  <text x="175" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">内存占用</text>
  <text x="175" y="132" text-anchor="middle" font-size="10.5" fill="#94a3b8">2000 次重复构建基准</text>
  <!-- 旧 -->
  <rect x="70" y="150" width="90" height="96" rx="4" fill="#cbd5e1"/>
  <text x="115" y="264" text-anchor="middle" font-size="11" fill="#64748b">Zig</text>
  <text x="115" y="144" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">6745 MB</text>
  <!-- 新 -->
  <rect x="200" y="237" width="90" height="9" rx="3" fill="#10b981"/>
  <text x="245" y="264" text-anchor="middle" font-size="11" fill="#64748b">Rust</text>
  <text x="245" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">609 MB</text>

  <!-- 体积卡 -->
  <rect x="340" y="84" width="280" height="196" rx="10" fill="#fff" stroke="#dbeafe" filter="url(#s7)"/>
  <text x="480" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">二进制体积</text>
  <text x="480" y="196" text-anchor="middle" font-size="52" font-weight="800" fill="#3b82f6">-19%</text>
  <text x="480" y="232" text-anchor="middle" font-size="12" fill="#64748b">Linux 与 Windows 上同步瘦身</text>
  <text x="480" y="256" text-anchor="middle" font-size="11" fill="#94a3b8">更小的分发、更快的冷启动</text>

  <!-- 性能卡 -->
  <rect x="640" y="84" width="290" height="196" rx="10" fill="#fff" stroke="#dbeafe" filter="url(#s7)"/>
  <text x="785" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">真实负载性能</text>
  <text x="785" y="196" text-anchor="middle" font-size="46" font-weight="800" fill="#3b82f6">+2–5%</text>
  <text x="785" y="232" text-anchor="middle" font-size="12" fill="#64748b">HTTP 服务、next build、tsc</text>
  <text x="785" y="256" text-anchor="middle" font-size="11" fill="#94a3b8">团队工具可检测的内存泄漏全部修复</text>

  <!-- trade-off -->
  <rect x="30" y="300" width="900" height="56" rx="10" fill="#fff8ec" stroke="#f59e0b"/>
  <text x="52" y="326" font-size="12.5" font-weight="700" fill="#b45309">权衡也真实存在</text>
  <text x="52" y="346" font-size="12" fill="#64748b">约 4% 的 Rust 代码位于 unsafe 块内，多为 C/C++ 边界上的单行指针操作 —— 没有零成本的迁移，只有账算得过来的迁移。</text>
</svg>
