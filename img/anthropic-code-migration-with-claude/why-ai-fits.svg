<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">大规模迁移为何天生适合 AI</title>
  <desc id="d">可并行、旧码即规范、内置裁判、队列自生成、一致性无处藏身。</desc>
  <defs>
    <filter id="s3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="400" fill="#f8fafc" rx="10"/>
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">大规模迁移，恰好长成 AI 最擅长的形状</text>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#64748b">五个特性叠加，让"上百个 agent 磨几天"这件事第一次成立</text>

  <!-- 5 cards -->
  <g>
    <rect x="30" y="88" width="176" height="150" rx="10" fill="#fff" stroke="#dbeafe" filter="url(#s3)"/>
    <circle cx="60" cy="120" r="14" fill="#eff6ff"/><text x="60" y="125" text-anchor="middle" font-size="13" font-weight="800" fill="#3b82f6">1</text>
    <text x="84" y="125" font-size="13" font-weight="700" fill="#1e293b">工作可并行</text>
    <text x="48" y="162" font-size="11.5" fill="#64748b">跨数千个独立单元</text>
    <text x="48" y="182" font-size="11.5" fill="#64748b">（文件、crate）同时</text>
    <text x="48" y="202" font-size="11.5" fill="#64748b">执行，天然可扇出</text>
  </g>
  <g>
    <rect x="222" y="88" width="176" height="150" rx="10" fill="#fff" stroke="#dbeafe" filter="url(#s3)"/>
    <circle cx="252" cy="120" r="14" fill="#eff6ff"/><text x="252" y="125" text-anchor="middle" font-size="13" font-weight="800" fill="#3b82f6">2</text>
    <text x="276" y="125" font-size="13" font-weight="700" fill="#1e293b">旧代码即规范</text>
    <text x="240" y="162" font-size="11.5" fill="#64748b">已存在的实现本身</text>
    <text x="240" y="182" font-size="11.5" fill="#64748b">就是最完整的 spec，</text>
    <text x="240" y="202" font-size="11.5" fill="#64748b">上下文清晰无歧义</text>
  </g>
  <g>
    <rect x="414" y="88" width="176" height="150" rx="10" fill="#fff" stroke="#d1fae5" filter="url(#s3)"/>
    <circle cx="444" cy="120" r="14" fill="#ecfdf5"/><text x="444" y="125" text-anchor="middle" font-size="13" font-weight="800" fill="#10b981">3</text>
    <text x="468" y="125" font-size="13" font-weight="700" fill="#1e293b">内置裁判</text>
    <text x="432" y="162" font-size="11.5" fill="#64748b">现成测试套件提供</text>
    <text x="432" y="182" font-size="11.5" fill="#64748b">客观真相，模型可</text>
    <text x="432" y="202" font-size="11.5" fill="#64748b">对着基准磨好几天</text>
  </g>
  <g>
    <rect x="606" y="88" width="176" height="150" rx="10" fill="#fff" stroke="#d1fae5" filter="url(#s3)"/>
    <circle cx="636" cy="120" r="14" fill="#ecfdf5"/><text x="636" y="125" text-anchor="middle" font-size="13" font-weight="800" fill="#10b981">4</text>
    <text x="660" y="125" font-size="13" font-weight="700" fill="#1e293b">队列自生成</text>
    <text x="624" y="162" font-size="11.5" fill="#64748b">编译或测试一失败，</text>
    <text x="624" y="182" font-size="11.5" fill="#64748b">就自动变成下一个</text>
    <text x="624" y="202" font-size="11.5" fill="#64748b">待办项，无需人排</text>
  </g>
  <g>
    <rect x="798" y="88" width="132" height="150" rx="10" fill="#fff" stroke="#ede9fe" filter="url(#s3)"/>
    <circle cx="828" cy="120" r="14" fill="#f5f3ff"/><text x="828" y="125" text-anchor="middle" font-size="13" font-weight="800" fill="#8b5cf6">5</text>
    <text x="852" y="125" font-size="12.5" font-weight="700" fill="#1e293b">一致性</text>
    <text x="816" y="162" font-size="11.5" fill="#64748b">审查为每个发现</text>
    <text x="816" y="182" font-size="11.5" fill="#64748b">引用规则，漂移</text>
    <text x="816" y="202" font-size="11.5" fill="#64748b">无处藏身</text>
  </g>

  <rect x="30" y="266" width="900" height="98" rx="10" fill="#1e293b"/>
  <text x="60" y="300" font-size="13" font-weight="700" fill="#fff">共同前提：验证必须客观</text>
  <text x="60" y="330" font-size="12.5" fill="#cbd5e1">编译器、diff、测试套件当裁判 —— 只有当"对与错"可以机械判定时，</text>
  <text x="60" y="352" font-size="12.5" fill="#cbd5e1">模型才能在无人仲裁的情况下连续自我纠错，把人从"逐个评审"里解放出来。</text>
</svg>
