<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code 七种指令机制总览</title>
  <desc id="desc">按常驻上下文、按需上下文、隔离执行、事件自动化与系统提示五类展示七种定制机制。</desc>
  <rect width="960" height="520" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Claude Code 七种指令机制：关键不在多少，而在放对位置</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">加载时机 · 压缩存续 · 上下文成本 · 执行权威</text>

  <g transform="translate(30 90)">
    <rect width="210" height="150" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="14" y="14" width="82" height="22" rx="11" fill="#eff6ff"/>
    <text x="55" y="29" text-anchor="middle" font-size="10" fill="#1e40af">会话常驻</text>
    <text x="18" y="66" font-size="15" font-weight="700" fill="#1e293b">CLAUDE.md</text>
    <text x="18" y="90" font-size="11" fill="#475569">仓库地图、构建命令、团队共识</text>
    <text x="18" y="112" font-size="11" fill="#64748b">根文件：启动加载、压缩后重读</text>
    <text x="18" y="132" font-size="11" fill="#64748b">子目录：触及路径时加载</text>
  </g>
  <g transform="translate(260 90)">
    <rect width="210" height="150" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="14" y="14" width="82" height="22" rx="11" fill="#eff6ff"/>
    <text x="55" y="29" text-anchor="middle" font-size="10" fill="#1e40af">路径相关</text>
    <text x="18" y="66" font-size="15" font-weight="700" fill="#1e293b">Rules</text>
    <text x="18" y="90" font-size="11" fill="#475569">特定文件的约束与约定</text>
    <text x="18" y="112" font-size="11" fill="#64748b">无 scope：常驻上下文</text>
    <text x="18" y="132" font-size="11" fill="#64748b">有 paths：匹配时才加载</text>
  </g>
  <g transform="translate(490 90)">
    <rect width="210" height="150" rx="10" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
    <rect x="14" y="14" width="82" height="22" rx="11" fill="#ecfdf5"/>
    <text x="55" y="29" text-anchor="middle" font-size="10" fill="#047857">按需流程</text>
    <text x="18" y="66" font-size="15" font-weight="700" fill="#1e293b">Skills</text>
    <text x="18" y="90" font-size="11" fill="#475569">发布、审查、文档等操作手册</text>
    <text x="18" y="112" font-size="11" fill="#64748b">启动只加载名称与描述</text>
    <text x="18" y="132" font-size="11" fill="#64748b">调用时加载完整正文</text>
  </g>
  <g transform="translate(720 90)">
    <rect width="210" height="150" rx="10" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
    <rect x="14" y="14" width="82" height="22" rx="11" fill="#ecfdf5"/>
    <text x="55" y="29" text-anchor="middle" font-size="10" fill="#047857">隔离上下文</text>
    <text x="18" y="66" font-size="15" font-weight="700" fill="#1e293b">Subagents</text>
    <text x="18" y="90" font-size="11" fill="#475569">检索、审计、并行侧任务</text>
    <text x="18" y="112" font-size="11" fill="#64748b">过程不进入父会话</text>
    <text x="18" y="132" font-size="11" fill="#64748b">只返回最终消息与元数据</text>
  </g>

  <g transform="translate(145 270)">
    <rect width="210" height="150" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="14" y="14" width="82" height="22" rx="11" fill="#fffbeb"/>
    <text x="55" y="29" text-anchor="middle" font-size="10" fill="#92400e">事件触发</text>
    <text x="18" y="66" font-size="15" font-weight="700" fill="#1e293b">Hooks</text>
    <text x="18" y="90" font-size="11" fill="#475569">格式化、拦截、通知、备份</text>
    <text x="18" y="112" font-size="11" fill="#64748b">运行时确定性触发</text>
    <text x="18" y="132" font-size="11" fill="#64748b">低主上下文成本</text>
  </g>
  <g transform="translate(375 270)">
    <rect width="210" height="150" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="14" y="14" width="82" height="22" rx="11" fill="#f5f3ff"/>
    <text x="55" y="29" text-anchor="middle" font-size="10" fill="#6d28d9">系统提示</text>
    <text x="18" y="66" font-size="15" font-weight="700" fill="#1e293b">Output styles</text>
    <text x="18" y="90" font-size="11" fill="#475569">显著改变角色与协作方式</text>
    <text x="18" y="112" font-size="11" fill="#64748b">权威高，不会被压缩移除</text>
    <text x="18" y="132" font-size="11" fill="#64748b">可能替换默认代码指令</text>
  </g>
  <g transform="translate(605 270)">
    <rect width="210" height="150" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="14" y="14" width="82" height="22" rx="11" fill="#f5f3ff"/>
    <text x="55" y="29" text-anchor="middle" font-size="10" fill="#6d28d9">单次启动</text>
    <text x="18" y="66" font-size="15" font-weight="700" fill="#1e293b">append system prompt</text>
    <text x="18" y="90" font-size="11" fill="#475569">语气、长度、临时领域背景</text>
    <text x="18" y="112" font-size="11" fill="#64748b">增量追加，不替换默认角色</text>
    <text x="18" y="132" font-size="11" fill="#64748b">仅对本次调用生效</text>
  </g>

  <rect x="190" y="452" width="580" height="38" rx="19" fill="#1e293b"/>
  <text x="480" y="476" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">把背景、约束、流程、侧任务、自动化与风格分开治理</text>
</svg>
