<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">从臃肿 CLAUDE.md 迁移到分层配置</title>
  <desc id="desc">将项目地图、路径约束、发布流程、依赖审计、安全拦截和个人偏好从单一 CLAUDE.md 路由到对应机制。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L0 10L10 5z" fill="#94a3b8"/></marker></defs>
  <rect width="960" height="560" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">迁移不是“拆文件”，而是为每条要求匹配正确生命周期</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">该常驻的常驻 · 该按需的按需 · 该隔离的隔离 · 该强制的强制</text>

  <g transform="translate(30 90)">
    <rect width="270" height="400" rx="10" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
    <rect width="270" height="52" rx="10" fill="#fef2f2"/>
    <text x="20" y="32" font-size="15" font-weight="700" fill="#991b1b">臃肿的 CLAUDE.md</text>
    <g font-size="11" fill="#475569">
      <rect x="18" y="72" width="234" height="42" rx="7" fill="#f8fafc" stroke="#e2e8f0"/><text x="32" y="97">构建命令与目录结构</text>
      <rect x="18" y="126" width="234" height="42" rx="7" fill="#f8fafc" stroke="#e2e8f0"/><text x="32" y="151">API Handler 必须用 Zod</text>
      <rect x="18" y="180" width="234" height="42" rx="7" fill="#f8fafc" stroke="#e2e8f0"/><text x="32" y="205">发布的五步操作清单</text>
      <rect x="18" y="234" width="234" height="42" rx="7" fill="#f8fafc" stroke="#e2e8f0"/><text x="32" y="259">依赖审计并只返回摘要</text>
      <rect x="18" y="288" width="234" height="42" rx="7" fill="#f8fafc" stroke="#e2e8f0"/><text x="32" y="313">每次格式化；绝不读取 .env</text>
      <rect x="18" y="342" width="234" height="42" rx="7" fill="#f8fafc" stroke="#e2e8f0"/><text x="32" y="367">回答尽量简短</text>
    </g>
  </g>

  <path d="M320 290H390" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="355" y="274" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">按性质路由</text>

  <g transform="translate(410 82)">
    <rect width="520" height="72" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#1e40af">CLAUDE.md：仓库地图</text>
    <text x="20" y="51" font-size="11" fill="#475569">保留构建命令、目录结构和指向详细配置的索引</text>

    <rect y="84" width="520" height="72" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="20" y="112" font-size="14" font-weight="700" fill="#1e40af">Path-scoped Rule：局部约束</text>
    <text x="20" y="135" font-size="11" fill="#475569">仅匹配 API 路径时加载 Zod 校验规则</text>

    <rect y="168" width="520" height="72" rx="10" fill="#ecfdf5" stroke="#10b981"/>
    <text x="20" y="196" font-size="14" font-weight="700" fill="#047857">Skill + Subagent：流程与隔离</text>
    <text x="20" y="219" font-size="11" fill="#475569">发布清单按需调用；依赖审计在独立上下文运行</text>

    <rect y="252" width="520" height="72" rx="10" fill="#fffbeb" stroke="#f59e0b"/>
    <text x="20" y="280" font-size="14" font-weight="700" fill="#92400e">Hooks + permissions：自动化与硬边界</text>
    <text x="20" y="303" font-size="11" fill="#475569">编辑后自动格式化；工具执行前阻止读取 .env 与强推</text>

    <rect y="336" width="520" height="72" rx="10" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="20" y="364" font-size="14" font-weight="700" fill="#6d28d9">用户配置 / append system prompt：个人偏好</text>
    <text x="20" y="387" font-size="11" fill="#475569">“回答简短”不提交到团队项目文件</text>
  </g>

  <rect x="180" y="516" width="600" height="26" rx="13" fill="#1e293b"/>
  <text x="480" y="534" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">结果：更少常驻 Token · 更清晰所有权 · 更可靠的安全边界</text>
</svg>
