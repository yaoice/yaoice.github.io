<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">七种指令机制在会话生命周期中的位置</title>
  <desc id="desc">展示会话开始、按需工作、生命周期事件、上下文压缩和继续工作时，各类指令如何加载与存续。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L0 10L10 5z" fill="#64748b"/></marker></defs>
  <rect width="960" height="520" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">指令不是静态文件：它们在会话生命周期中进出上下文</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">压缩之后“还能不能用”，取决于机制而不是最初是否写过</text>

  <g font-size="11" fill="#475569">
    <rect x="100" y="84" width="140" height="42" rx="8" fill="#eff6ff" stroke="#3b82f6"/><text x="170" y="110" text-anchor="middle" font-weight="600">会话开始</text>
    <rect x="290" y="84" width="140" height="42" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="360" y="110" text-anchor="middle" font-weight="600">读取与编辑</text>
    <rect x="480" y="84" width="140" height="42" rx="8" fill="#fffbeb" stroke="#f59e0b"/><text x="550" y="110" text-anchor="middle" font-weight="600">Compaction</text>
    <rect x="670" y="84" width="140" height="42" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="740" y="110" text-anchor="middle" font-weight="600">继续工作</text>
    <path d="M240 105H290M430 105H480M620 105H670" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <text x="28" y="174" font-size="12" font-weight="700" fill="#1e293b">常驻层</text>
  <rect x="100" y="148" width="710" height="48" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="120" y="169" font-size="12" font-weight="600" fill="#1e40af">根 CLAUDE.md / 无 scope Rules</text>
  <text x="120" y="187" font-size="10" fill="#475569">启动加载 → 主上下文持续存在 → 压缩后重新读取或注入</text>
  <path d="M470 172H650" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="28" y="246" font-size="12" font-weight="700" fill="#1e293b">按需层</text>
  <rect x="290" y="220" width="220" height="48" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="310" y="241" font-size="12" font-weight="600" fill="#047857">子目录 CLAUDE.md / path Rules</text>
  <text x="310" y="259" font-size="10" fill="#475569">触及相关路径时加载</text>
  <rect x="590" y="220" width="220" height="48" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="610" y="241" font-size="12" font-weight="600" fill="#047857">再次触及相关路径</text>
  <text x="610" y="259" font-size="10" fill="#475569">压缩后才重新进入上下文</text>
  <path d="M510 244H590" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <rect x="290" y="282" width="220" height="48" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="310" y="303" font-size="12" font-weight="600" fill="#047857">Skill 被调用</text>
  <text x="310" y="321" font-size="10" fill="#475569">名称与描述 → 完整正文</text>
  <rect x="590" y="282" width="220" height="48" rx="8" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="610" y="303" font-size="12" font-weight="600" fill="#92400e">共享预算内重新注入</text>
  <text x="610" y="321" font-size="10" fill="#475569">较早调用的 Skill 可能先被丢弃</text>
  <path d="M510 306H590" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="28" y="380" font-size="12" font-weight="700" fill="#1e293b">隔离层</text>
  <rect x="290" y="350" width="520" height="58" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text x="310" y="373" font-size="12" font-weight="600" fill="#1e293b">Subagent：独立上下文执行</text>
  <text x="310" y="394" font-size="10" fill="#475569">父会话不接收中间过程，只接收最终消息与元数据；主上下文因此保持干净</text>

  <text x="28" y="458" font-size="12" font-weight="700" fill="#1e293b">运行时层</text>
  <rect x="100" y="430" width="710" height="52" rx="8" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="120" y="453" font-size="12" font-weight="600" fill="#92400e">Hooks：在 SessionStart、PreToolUse、PostToolUse、PreCompact、Stop 等事件上触发</text>
  <text x="120" y="472" font-size="10" fill="#475569">配置主要位于主上下文之外，不依赖 compaction 存续；必要输出才返回主会话</text>
</svg>
