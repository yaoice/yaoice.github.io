<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code 指令机制选择流程</title>
  <desc id="desc">从是否需要强制执行、是否全局相关、是否按路径生效、是否为流程、是否隔离过程和是否改变角色逐步选择机制。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L0 10L10 5z" fill="#94a3b8"/></marker></defs>
  <rect width="960" height="620" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">从一条要求出发，逐步找到它的归属</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">先判断风险，再判断相关性，最后判断交互方式</text>

  <g font-size="12" font-weight="600">
    <rect x="40" y="92" width="260" height="52" rx="10" fill="#fffbeb" stroke="#f59e0b"/><text x="170" y="123" text-anchor="middle" fill="#92400e">必须每次执行，或绝不能绕过？</text>
    <rect x="40" y="180" width="260" height="52" rx="10" fill="#fff" stroke="#cbd5e1"/><text x="170" y="211" text-anchor="middle" fill="#1e293b">每次任务都需要这条背景？</text>
    <rect x="40" y="268" width="260" height="52" rx="10" fill="#fff" stroke="#cbd5e1"/><text x="170" y="299" text-anchor="middle" fill="#1e293b">相关性由文件路径决定？</text>
    <rect x="40" y="356" width="260" height="52" rx="10" fill="#fff" stroke="#cbd5e1"/><text x="170" y="387" text-anchor="middle" fill="#1e293b">它是一套可重复的多步骤流程？</text>
    <rect x="40" y="444" width="260" height="52" rx="10" fill="#fff" stroke="#cbd5e1"/><text x="170" y="475" text-anchor="middle" fill="#1e293b">过程应隔离，只返回结论？</text>
    <rect x="40" y="532" width="260" height="52" rx="10" fill="#fff" stroke="#cbd5e1"/><text x="170" y="563" text-anchor="middle" fill="#1e293b">改变角色，还是本次输出偏好？</text>
  </g>

  <g stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)">
    <path d="M170 144V180"/><path d="M170 232V268"/><path d="M170 320V356"/><path d="M170 408V444"/><path d="M170 496V532"/>
    <path d="M300 118H420"/><path d="M300 206H420"/><path d="M300 294H420"/><path d="M300 382H420"/><path d="M300 470H420"/><path d="M300 558H420"/>
  </g>
  <g font-size="10" fill="#64748b">
    <text x="312" y="110">是</text><text x="154" y="165">否</text>
    <text x="312" y="198">是</text><text x="154" y="253">否</text>
    <text x="312" y="286">是</text><text x="154" y="341">否</text>
    <text x="312" y="374">是</text><text x="154" y="429">否</text>
    <text x="312" y="462">是</text><text x="154" y="517">否</text>
  </g>

  <g>
    <rect x="420" y="86" width="500" height="64" rx="10" fill="#fffbeb" stroke="#f59e0b"/>
    <text x="442" y="112" font-size="14" font-weight="700" fill="#92400e">Hooks + permissions + managed settings</text>
    <text x="442" y="134" font-size="11" fill="#475569">把安全与自动化变成运行时行为，不依赖模型记忆</text>

    <rect x="420" y="174" width="500" height="64" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="442" y="200" font-size="14" font-weight="700" fill="#1e40af">根 CLAUDE.md / 无 scope Rule</text>
    <text x="442" y="222" font-size="11" fill="#475569">只放全局稳定事实与所有任务都相关的约束</text>

    <rect x="420" y="262" width="500" height="64" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="442" y="288" font-size="14" font-weight="700" fill="#1e40af">Path-scoped Rule / 子目录 CLAUDE.md</text>
    <text x="442" y="310" font-size="11" fill="#475569">跨目录文件模式用 Rule；完整局部背景用子目录文件</text>

    <rect x="420" y="350" width="500" height="64" rx="10" fill="#ecfdf5" stroke="#10b981"/>
    <text x="442" y="376" font-size="14" font-weight="700" fill="#047857">Skill</text>
    <text x="442" y="398" font-size="11" fill="#475569">按需加载操作手册、脚本、模板与验收步骤</text>

    <rect x="420" y="438" width="500" height="64" rx="10" fill="#ecfdf5" stroke="#10b981"/>
    <text x="442" y="464" font-size="14" font-weight="700" fill="#047857">Subagent</text>
    <text x="442" y="486" font-size="11" fill="#475569">独立上下文完成检索、审计或并行侧任务</text>

    <rect x="420" y="526" width="500" height="64" rx="10" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="442" y="552" font-size="14" font-weight="700" fill="#6d28d9">Output style / append-system-prompt</text>
    <text x="442" y="574" font-size="11" fill="#475569">长期改变角色用前者；单次语气和格式用后者</text>
  </g>
</svg>
