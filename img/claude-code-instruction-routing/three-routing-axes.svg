<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">指令选型的三条主轴</title>
  <desc id="desc">展示加载时机、压缩存续和执行权威三个决定 Claude Code 指令存放位置的维度。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L0 10L10 5z" fill="#94a3b8"/></marker></defs>
  <rect width="960" height="440" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">一条指令该放哪里？先看三个维度</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">选型不是语法问题，而是生命周期与风险问题</text>

  <g transform="translate(30 90)">
    <rect width="280" height="270" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="36" cy="38" r="18" fill="#eff6ff" stroke="#3b82f6"/><text x="36" y="43" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">1</text>
    <text x="66" y="43" font-size="15" font-weight="700" fill="#1e293b">加载时机</text>
    <text x="22" y="82" font-size="11" fill="#475569">这条信息在多少任务中真正相关？</text>
    <line x1="32" y1="132" x2="248" y2="132" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="32" y="116" font-size="10" fill="#64748b">始终</text><text x="216" y="116" font-size="10" fill="#64748b">按需</text>
    <rect x="28" y="152" width="98" height="30" rx="8" fill="#eff6ff"/><text x="77" y="171" text-anchor="middle" font-size="11" fill="#1e40af">CLAUDE.md</text>
    <rect x="154" y="152" width="98" height="30" rx="8" fill="#ecfdf5"/><text x="203" y="171" text-anchor="middle" font-size="11" fill="#047857">Rules / Skills</text>
    <text x="22" y="218" font-size="11" fill="#475569">越接近按需加载，固定 Token 成本越低，</text>
    <text x="22" y="238" font-size="11" fill="#475569">无关指令之间的竞争也越少。</text>
  </g>
  <g transform="translate(340 90)">
    <rect width="280" height="270" rx="10" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="36" cy="38" r="18" fill="#ecfdf5" stroke="#10b981"/><text x="36" y="43" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">2</text>
    <text x="66" y="43" font-size="15" font-weight="700" fill="#1e293b">压缩存续</text>
    <text x="22" y="82" font-size="11" fill="#475569">长会话 compaction 后，它怎样回来？</text>
    <rect x="24" y="108" width="232" height="38" rx="8" fill="#ecfdf5"/><text x="140" y="132" text-anchor="middle" font-size="11" fill="#047857">重读：根 CLAUDE.md / Rules</text>
    <rect x="24" y="158" width="232" height="38" rx="8" fill="#fffbeb"/><text x="140" y="182" text-anchor="middle" font-size="11" fill="#92400e">预算内重注入：Skills</text>
    <rect x="24" y="208" width="232" height="38" rx="8" fill="#f8fafc" stroke="#cbd5e1"/><text x="140" y="232" text-anchor="middle" font-size="11" fill="#475569">重新触及才加载：路径指令</text>
  </g>
  <g transform="translate(650 90)">
    <rect width="280" height="270" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="36" cy="38" r="18" fill="#fffbeb" stroke="#f59e0b"/><text x="36" y="43" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">3</text>
    <text x="66" y="43" font-size="15" font-weight="700" fill="#1e293b">执行权威</text>
    <text x="22" y="82" font-size="11" fill="#475569">它是在表达意图，还是必须强制执行？</text>
    <line x1="32" y1="132" x2="248" y2="132" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="32" y="116" font-size="10" fill="#64748b">概率性</text><text x="210" y="116" font-size="10" fill="#64748b">确定性</text>
    <rect x="28" y="152" width="98" height="30" rx="8" fill="#eff6ff"/><text x="77" y="171" text-anchor="middle" font-size="11" fill="#1e40af">模型指令</text>
    <rect x="154" y="152" width="98" height="30" rx="8" fill="#fffbeb"/><text x="203" y="171" text-anchor="middle" font-size="11" fill="#92400e">Hook / 权限</text>
    <text x="22" y="218" font-size="11" fill="#475569">安全、合规、危险命令不能只靠模型记住，</text>
    <text x="22" y="238" font-size="11" fill="#475569">必须进入运行时执行与组织策略。</text>
  </g>
  <rect x="190" y="388" width="580" height="30" rx="15" fill="#1e293b"/>
  <text x="480" y="408" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">背景事实看相关性 · 操作流程看复用性 · 安全边界看确定性</text>
</svg>
