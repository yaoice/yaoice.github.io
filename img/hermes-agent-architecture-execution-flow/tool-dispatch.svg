<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#64748b"/></marker></defs>
  <rect width="960" height="520" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">工具注册、曝光与执行路径</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">工具从 registry 进入模型 schema，再回到 agent loop 执行</text>
  <rect x="70" y="105" width="160" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6"/><text x="150" y="129" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">工具模块 import</text><text x="150" y="149" text-anchor="middle" font-size="10" fill="#475569">registry.register</text>
  <rect x="285" y="105" width="160" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6"/><text x="365" y="129" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">schema 过滤</text><text x="365" y="149" text-anchor="middle" font-size="10" fill="#475569">toolsets / cache</text>
  <rect x="500" y="105" width="160" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6"/><text x="580" y="129" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">模型可见工具</text><text x="580" y="149" text-anchor="middle" font-size="10" fill="#475569">OpenAI-format tools</text>
  <rect x="715" y="105" width="160" height="56" rx="8" fill="#fffbeb" stroke="#f59e0b"/><text x="795" y="129" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">tool_calls</text><text x="795" y="149" text-anchor="middle" font-size="10" fill="#475569">assistant message</text>
  <polygon points="480,232 590,270 480,308 370,270" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/><text x="480" y="274" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">可并发?</text>
  <rect x="220" y="370" width="180" height="56" rx="8" fill="#ecfdf5" stroke="#10b981"/><text x="310" y="394" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">ThreadPool 并发</text><text x="310" y="414" text-anchor="middle" font-size="10" fill="#475569">读工具 / 路径不重叠</text>
  <rect x="560" y="370" width="180" height="56" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="650" y="394" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">顺序执行</text><text x="650" y="414" text-anchor="middle" font-size="10" fill="#475569">交互 / 写冲突 / 未知工具</text>
  <path d="M230 133 H285" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M445 133 H500" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M660 133 H715" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M795 161 V270 H590" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M430 300 L330 370" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/><text x="350" y="338" font-size="10" fill="#64748b">Yes</text>
  <path d="M530 300 L630 370" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/><text x="610" y="338" font-size="10" fill="#64748b">No</text>
  <path d="M310 426 V465 H650 V426" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="480" y="486" text-anchor="middle" font-size="11" fill="#64748b">最终统一追加为 tool message，继续下一轮模型调用</text>
</svg>
