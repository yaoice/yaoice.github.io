<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#64748b"/></marker></defs>
  <rect width="960" height="560" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">核心对话循环状态机</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">每个用户 turn 都在同一条模型-工具闭环中推进</text>
  <rect x="70" y="110" width="150" height="52" rx="8" fill="#eff6ff" stroke="#3b82f6"/><text x="145" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">① turn 初始化</text><text x="145" y="151" text-anchor="middle" font-size="10" fill="#475569">DB / runtime / counters</text>
  <rect x="290" y="110" width="150" height="52" rx="8" fill="#eff6ff" stroke="#3b82f6"/><text x="365" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">② 构造上下文</text><text x="365" y="151" text-anchor="middle" font-size="10" fill="#475569">system + history + hooks</text>
  <rect x="510" y="110" width="150" height="52" rx="8" fill="#eff6ff" stroke="#3b82f6"/><text x="585" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">③ 调模型</text><text x="585" y="151" text-anchor="middle" font-size="10" fill="#475569">transport / fallback</text>
  <polygon points="760,102 865,136 760,170 655,136" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/><text x="760" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">有工具?</text>
  <rect x="615" y="255" width="170" height="58" rx="8" fill="#fffbeb" stroke="#f59e0b"/><text x="700" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">④ 执行工具</text><text x="700" y="298" text-anchor="middle" font-size="10" fill="#475569">parallel 或 sequential</text>
  <rect x="365" y="255" width="170" height="58" rx="8" fill="#ecfdf5" stroke="#10b981"/><text x="450" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">⑤ 追加 tool 结果</text><text x="450" y="298" text-anchor="middle" font-size="10" fill="#475569">回填 messages</text>
  <rect x="145" y="255" width="170" height="58" rx="8" fill="#f5f3ff" stroke="#8b5cf6"/><text x="230" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">⑥ 触发压缩?</text><text x="230" y="298" text-anchor="middle" font-size="10" fill="#475569">token threshold</text>
  <rect x="390" y="410" width="180" height="58" rx="8" fill="#fff" stroke="#10b981"/><text x="480" y="434" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">最终响应</text><text x="480" y="453" text-anchor="middle" font-size="10" fill="#475569">无工具调用则结束</text>
  <path d="M220 136 H290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M440 136 H510" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M660 136 H655" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M760 170 V255" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/><text x="780" y="215" font-size="10" fill="#64748b">Yes</text>
  <path d="M655 284 H535" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M365 284 H315" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M230 255 V205 H365 V162" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M760 170 C790 250 685 410 570 435" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/><text x="807" y="235" font-size="10" fill="#64748b">No</text>
</svg>
