<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#64748b"/></marker></defs>
  <rect width="960" height="540" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">状态持久化与上下文压缩链路</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">state.db 保存真实历史，压缩通过 parent_session_id 形成续写链</text>
  <rect x="80" y="110" width="210" height="100" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="185" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">messages</text>
  <text x="185" y="166" text-anchor="middle" font-size="11" fill="#475569">user / assistant / tool</text>
  <text x="185" y="188" text-anchor="middle" font-size="11" fill="#475569">reasoning / tool_calls</text>
  <rect x="380" y="95" width="200" height="130" rx="10" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="480" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">SessionDB</text>
  <text x="480" y="154" text-anchor="middle" font-size="11" fill="#475569">sessions 表：元数据与链路</text>
  <text x="480" y="176" text-anchor="middle" font-size="11" fill="#475569">messages 表：完整 transcript</text>
  <text x="480" y="198" text-anchor="middle" font-size="11" fill="#475569">FTS5：跨会话搜索</text>
  <rect x="680" y="110" width="210" height="100" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="785" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">恢复与查询</text>
  <text x="785" y="166" text-anchor="middle" font-size="11" fill="#475569">resume / session_search</text>
  <text x="785" y="188" text-anchor="middle" font-size="11" fill="#475569">include_ancestors</text>
  <rect x="105" y="315" width="170" height="58" rx="8" fill="#eff6ff" stroke="#3b82f6"/><text x="190" y="339" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">token 超阈值</text><text x="190" y="359" text-anchor="middle" font-size="10" fill="#475569">should_compress</text>
  <rect x="330" y="315" width="170" height="58" rx="8" fill="#fffbeb" stroke="#f59e0b"/><text x="415" y="339" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">压缩中间段</text><text x="415" y="359" text-anchor="middle" font-size="10" fill="#475569">head + summary + tail</text>
  <rect x="555" y="315" width="170" height="58" rx="8" fill="#ecfdf5" stroke="#10b981"/><text x="640" y="339" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">创建 child session</text><text x="640" y="359" text-anchor="middle" font-size="10" fill="#475569">parent_session_id</text>
  <rect x="300" y="440" width="360" height="46" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="480" y="468" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">恢复时若父 session 为空，沿链找到有消息的后代</text>
  <path d="M290 160 H380" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M580 160 H680" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M275 344 H330" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M500 344 H555" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M640 373 C640 420 560 440 480 440" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
