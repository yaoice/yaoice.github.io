<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="960" height="480" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Agentic Search vs RAG：为什么 Claude Code 不建索引</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">两种检索范式在"代码每天都在变"的现实里走向不同结局</text>

  <!-- 分割线 -->
  <line x1="480" y1="90" x2="480" y2="450" stroke="#e2e8f0" stroke-dasharray="4,4"/>

  <!-- 左：RAG -->
  <g>
    <text x="240" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#b91c1c">RAG / Embedding 索引</text>

    <!-- 仓库 -->
    <rect x="120" y="130" width="100" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="170" y="155" text-anchor="middle" font-size="12" fill="#1e293b">代码仓库</text>

    <!-- pipeline -->
    <rect x="260" y="130" width="120" height="40" rx="6" fill="#fef2f2" stroke="#ef4444"/>
    <text x="320" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#b91c1c">Embedding</text>
    <text x="320" y="164" text-anchor="middle" font-size="11" fill="#b91c1c">pipeline</text>
    <path d="M220 150 L260 150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>

    <!-- 向量库 -->
    <rect x="160" y="200" width="200" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="260" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">向量索引（中心化）</text>
    <text x="260" y="240" text-anchor="middle" font-size="11" fill="#64748b">"weeks / days / hours ago"</text>
    <path d="M320 170 L260 200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>

    <!-- 失败结果 -->
    <rect x="60" y="290" width="360" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="240" y="312" text-anchor="middle" font-size="12" font-weight="600" fill="#b91c1c">命中过时函数 / 引用已删模块</text>
    <text x="240" y="332" text-anchor="middle" font-size="11" fill="#b91c1c">且不会告诉你"这条结果已过期"</text>
    <path d="M260 250 L240 290" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrRed)"/>

    <!-- 关键劣势 -->
    <text x="240" y="380" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">活跃团队跑不赢索引重建</text>

    <!-- bullet -->
    <g font-size="11" fill="#475569">
      <text x="80" y="406">· 需要服务器端维护索引</text>
      <text x="80" y="424">· 与 git 主干天然延迟</text>
      <text x="80" y="442">· 团队改名 / 删模块后立刻失真</text>
    </g>
  </g>

  <!-- 右：Agentic Search -->
  <g>
    <text x="720" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">Agentic Search（Claude Code）</text>

    <!-- 仓库 -->
    <rect x="600" y="130" width="100" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="650" y="155" text-anchor="middle" font-size="12" fill="#1e293b">代码仓库</text>

    <!-- 直接读 -->
    <rect x="740" y="130" width="160" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="820" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">grep · read · follow</text>
    <text x="820" y="164" text-anchor="middle" font-size="11" fill="#1e40af">本地、实时</text>
    <path d="M700 150 L740 150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>

    <!-- 无索引 -->
    <rect x="640" y="200" width="200" height="50" rx="6" fill="#ecfdf5" stroke="#10b981"/>
    <text x="740" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">无 embedding · 无服务器</text>
    <text x="740" y="240" text-anchor="middle" font-size="11" fill="#065f46">"works from the live codebase"</text>
    <path d="M820 170 L740 200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>

    <!-- 注意：context 限制 -->
    <rect x="540" y="290" width="360" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="720" y="312" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">代价：依赖初始 context 质量</text>
    <text x="720" y="332" text-anchor="middle" font-size="11" fill="#92400e">"billion-line codebase + 模糊问题" 会先撞 context 限</text>
    <path d="M740 250 L720 290" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr2)"/>

    <text x="720" y="380" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">用 CLAUDE.md + skills 分层喂 context</text>

    <g font-size="11" fill="#475569">
      <text x="560" y="406">· 每个开发者各跑各的实例</text>
      <text x="560" y="424">· 仓库变更立刻可见</text>
      <text x="560" y="442">· 把"找对范围"作为第一步</text>
    </g>
  </g>
</svg>
