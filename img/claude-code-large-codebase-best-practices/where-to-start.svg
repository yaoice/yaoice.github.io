<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#94a3b8"/></marker></defs>
<rect width="960" height="620" fill="#f8fafc" rx="10"/>
<text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">起步路线图：10 步从"个人能用"到"组织能规模化"</text>
<text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">前 5 步是"为模型清场"，6–7 步是"复用沉淀"，8–10 步是"组织复制"</text>

<g font-size="12" font-weight="700">
<rect x="60"  y="92" width="160" height="26" rx="6" fill="#eff6ff" stroke="#3b82f6"/><text x="140" y="110" text-anchor="middle" fill="#1e40af">阶段一 · 基础</text>
<rect x="232" y="92" width="160" height="26" rx="6" fill="#fffbeb" stroke="#f59e0b"/><text x="312" y="110" text-anchor="middle" fill="#92400e">阶段二 · 导航</text>
<rect x="404" y="92" width="160" height="26" rx="6" fill="#f5f3ff" stroke="#8b5cf6"/><text x="484" y="110" text-anchor="middle" fill="#5b21b6">阶段三 · 自动化</text>
<rect x="576" y="92" width="160" height="26" rx="6" fill="#ecfdf5" stroke="#10b981"/><text x="656" y="110" text-anchor="middle" fill="#065f46">阶段四 · 分发集成</text>
<rect x="748" y="92" width="152" height="26" rx="6" fill="#ecfdf5" stroke="#10b981"/><text x="824" y="110" text-anchor="middle" fill="#065f46">阶段五 · 组织维护</text>
</g>

<g stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3">
<line x1="140" y1="124" x2="140" y2="146"/><line x1="312" y1="124" x2="312" y2="146"/><line x1="484" y1="124" x2="484" y2="146"/><line x1="656" y1="124" x2="656" y2="146"/><line x1="824" y1="124" x2="824" y2="146"/>
</g>

<g>
<rect x="60"  y="146" width="160" height="106" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
<circle cx="86" cy="172" r="14" fill="#3b82f6"/><text x="86" y="177" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
<text x="108" y="177" font-size="13" font-weight="700" fill="#1e40af">root CLAUDE.md</text>
<text x="74" y="206" font-size="11" fill="#475569">仓库根放架构指针</text><text x="74" y="222" font-size="11" fill="#475569">+ critical gotchas</text><text x="74" y="240" font-size="10" fill="#94a3b8">仅写大局，pointers only</text>

<rect x="232" y="146" width="160" height="106" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
<circle cx="258" cy="172" r="14" fill="#f59e0b"/><text x="258" y="177" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
<text x="280" y="177" font-size="13" font-weight="700" fill="#92400e">子目录 CLAUDE.md</text>
<text x="246" y="206" font-size="11" fill="#475569">局部约定分层叠加</text><text x="246" y="222" font-size="11" fill="#475569">向上自动遍历加载</text><text x="246" y="240" font-size="10" fill="#94a3b8">在子目录里启动</text>

<rect x="404" y="146" width="160" height="106" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
<circle cx="430" cy="172" r="14" fill="#f59e0b"/><text x="430" y="177" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
<text x="452" y="177" font-size="13" font-weight="700" fill="#92400e">.ignore + 权限</text>
<text x="418" y="206" font-size="11" fill="#475569">排除生成代码 / 三方</text><text x="418" y="222" font-size="11" fill="#475569">写进 settings.json</text><text x="418" y="240" font-size="10" fill="#94a3b8">版本化共享</text>

<rect x="576" y="146" width="160" height="106" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
<circle cx="602" cy="172" r="14" fill="#f59e0b"/><text x="602" y="177" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
<text x="624" y="177" font-size="13" font-weight="700" fill="#92400e">LSP + code intel</text>
<text x="590" y="206" font-size="11" fill="#475569">grep 升级为按符号搜</text><text x="590" y="222" font-size="11" fill="#475569">多语言代码库高 ROI</text><text x="590" y="240" font-size="10" fill="#94a3b8">需手动启用</text>

<rect x="748" y="146" width="152" height="106" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
<circle cx="774" cy="172" r="14" fill="#f59e0b"/><text x="774" y="177" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">5</text>
<text x="796" y="177" font-size="13" font-weight="700" fill="#92400e">test/lint 子目录</text>
<text x="762" y="206" font-size="11" fill="#475569">单服务变更不跑全量</text><text x="762" y="222" font-size="11" fill="#475569">避免超时烧 context</text><text x="762" y="240" font-size="10" fill="#94a3b8">编译型可能更难</text>
</g>

<g stroke="#94a3b8" stroke-width="1.5" fill="none">
<line x1="220" y1="199" x2="232" y2="199" marker-end="url(#a)"/><line x1="392" y1="199" x2="404" y2="199" marker-end="url(#a)"/><line x1="564" y1="199" x2="576" y2="199" marker-end="url(#a)"/><line x1="736" y1="199" x2="748" y2="199" marker-end="url(#a)"/>
<path d="M824 252 L824 280 L140 280 L140 308" stroke-dasharray="4,3" marker-end="url(#a)"/>
</g>

<g>
<rect x="60"  y="308" width="160" height="106" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
<circle cx="86" cy="334" r="14" fill="#8b5cf6"/><text x="86" y="339" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">6</text>
<text x="108" y="339" font-size="13" font-weight="700" fill="#5b21b6">Hooks</text>
<text x="74" y="368" font-size="11" fill="#475569">stop hook 让 CLAUDE.md</text><text x="74" y="384" font-size="11" fill="#475569">在 session 末自我更新</text><text x="74" y="402" font-size="10" fill="#94a3b8">事件触发，确定性强</text>

<rect x="232" y="308" width="160" height="106" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
<circle cx="258" cy="334" r="14" fill="#8b5cf6"/><text x="258" y="339" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">7</text>
<text x="280" y="339" font-size="13" font-weight="700" fill="#5b21b6">Skills</text>
<text x="246" y="368" font-size="11" fill="#475569">横向专长按需加载</text><text x="246" y="384" font-size="11" fill="#475569">绑定 path，避免误触</text><text x="246" y="402" font-size="10" fill="#94a3b8">从 CLAUDE.md 卸载</text>

<rect x="404" y="308" width="160" height="106" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
<circle cx="430" cy="334" r="14" fill="#10b981"/><text x="430" y="339" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">8</text>
<text x="452" y="339" font-size="13" font-weight="700" fill="#065f46">Plugins</text>
<text x="418" y="368" font-size="11" fill="#475569">打包 skills/hooks/MCP</text><text x="418" y="384" font-size="11" fill="#475569">通过 marketplace 分发</text><text x="418" y="402" font-size="10" fill="#94a3b8">把部落知识变标准</text>

<rect x="576" y="308" width="160" height="106" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
<circle cx="602" cy="334" r="14" fill="#10b981"/><text x="602" y="339" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">9</text>
<text x="624" y="339" font-size="13" font-weight="700" fill="#065f46">MCP + Subagents</text>
<text x="590" y="368" font-size="11" fill="#475569">接外部工具/结构化检索</text><text x="590" y="384" font-size="11" fill="#475569">探索 / 编辑分离</text><text x="590" y="402" font-size="10" fill="#94a3b8">基础稳了再做</text>

<rect x="748" y="308" width="152" height="106" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
<circle cx="774" cy="334" r="14" fill="#10b981"/><text x="774" y="339" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">10</text>
<text x="800" y="339" font-size="13" font-weight="700" fill="#065f46">DRI + 复审</text>
<text x="762" y="368" font-size="11" fill="#475569">指定 Agent Manager</text><text x="762" y="384" font-size="11" fill="#475569">3–6 个月配置审查</text><text x="762" y="402" font-size="10" fill="#94a3b8">防止配置贬值</text>
</g>

<g stroke="#94a3b8" stroke-width="1.5">
<line x1="220" y1="361" x2="232" y2="361" marker-end="url(#a)"/><line x1="392" y1="361" x2="404" y2="361" marker-end="url(#a)"/><line x1="564" y1="361" x2="576" y2="361" marker-end="url(#a)"/><line x1="736" y1="361" x2="748" y2="361" marker-end="url(#a)"/>
</g>

<g transform="translate(0,460)">
<text x="60" y="0" font-size="13" font-weight="700" fill="#1e293b">三段重心</text>
<rect x="60"  y="20" width="328" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6"/><text x="76"  y="44" font-size="12" font-weight="700" fill="#1e40af">步骤 1–5 · 为模型清场</text><text x="76"  y="58" font-size="10" fill="#475569">CLAUDE.md / .ignore / LSP / 子目录绑定</text>
<rect x="396" y="20" width="160" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6"/><text x="412" y="44" font-size="12" font-weight="700" fill="#5b21b6">6–7 · 复用沉淀</text><text x="412" y="58" font-size="10" fill="#475569">Hooks + Skills</text>
<rect x="564" y="20" width="336" height="40" rx="6" fill="#ecfdf5" stroke="#10b981"/><text x="580" y="44" font-size="12" font-weight="700" fill="#065f46">8–10 · 组织复制</text><text x="580" y="58" font-size="10" fill="#475569">Plugins / MCP / Subagents / DRI / 配置审查</text>
</g>

<text x="480" y="568" text-anchor="middle" font-size="12" fill="#475569">顺序不能跳：1–5 步是给后面所有事打底</text>
<text x="480" y="592" text-anchor="middle" font-size="11" fill="#94a3b8">小团队可合并 8–9，并把第 10 步浓缩为单一 DRI 角色</text>
</svg>
