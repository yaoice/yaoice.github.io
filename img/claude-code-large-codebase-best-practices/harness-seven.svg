<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="sd3" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="560" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Harness 七大扩展点全景</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">从"每次必加载"到"按需调用"——加载时机决定它该是什么</text>

  <!-- 列标题 -->
  <text x="120" y="100" font-size="12" font-weight="700" fill="#475569">扩展点</text>
  <text x="320" y="100" font-size="12" font-weight="700" fill="#475569">何时加载</text>
  <text x="520" y="100" font-size="12" font-weight="700" fill="#475569">最适合做什么</text>
  <text x="780" y="100" font-size="12" font-weight="700" fill="#475569">易踩的坑</text>
  <line x1="100" y1="110" x2="900" y2="110" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Row 1 CLAUDE.md -->
  <g transform="translate(0,130)">
    <rect x="100" y="0" width="160" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="180" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">① CLAUDE.md</text>
    <text x="180" y="36" text-anchor="middle" font-size="11" fill="#1e40af">项目记忆</text>
    <text x="320" y="26" font-size="12" fill="#1e293b">每个 session 自动加载</text>
    <text x="520" y="26" font-size="12" fill="#1e293b">分层项目约定 / 关键 gotcha</text>
    <text x="780" y="26" font-size="12" fill="#b91c1c">塞成万能百科</text>
  </g>

  <!-- Row 2 Hooks -->
  <g transform="translate(0,184)">
    <rect x="100" y="0" width="160" height="44" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="180" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">② Hooks</text>
    <text x="180" y="36" text-anchor="middle" font-size="11" fill="#92400e">事件触发脚本</text>
    <text x="320" y="26" font-size="12" fill="#1e293b">事件触发（start / stop / pre-tool）</text>
    <text x="520" y="26" font-size="12" fill="#1e293b">自动检查 + 自反馈改进 CLAUDE.md</text>
    <text x="780" y="26" font-size="12" fill="#b91c1c">用提示词代替自动化</text>
  </g>

  <!-- Row 3 Skills -->
  <g transform="translate(0,238)">
    <rect x="100" y="0" width="160" height="44" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="180" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">③ Skills</text>
    <text x="180" y="36" text-anchor="middle" font-size="11" fill="#5b21b6">渐进式专长</text>
    <text x="320" y="26" font-size="12" fill="#1e293b">按需触发（progressive）</text>
    <text x="520" y="26" font-size="12" fill="#1e293b">跨 session 复用 + path 绑定</text>
    <text x="780" y="26" font-size="12" fill="#b91c1c">塞回 CLAUDE.md</text>
  </g>

  <!-- Row 4 Plugins -->
  <g transform="translate(0,292)">
    <rect x="100" y="0" width="160" height="44" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="180" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">④ Plugins</text>
    <text x="180" y="36" text-anchor="middle" font-size="11" fill="#065f46">组织级打包</text>
    <text x="320" y="26" font-size="12" fill="#1e293b">配好就常驻可用</text>
    <text x="520" y="26" font-size="12" fill="#1e293b">把 skills+hooks+MCP 一起分发</text>
    <text x="780" y="26" font-size="12" fill="#b91c1c">让好实践停在"部落知识"</text>
  </g>

  <!-- Row 5 LSP -->
  <g transform="translate(0,346)">
    <rect x="100" y="0" width="160" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="180" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">⑤ LSP</text>
    <text x="180" y="36" text-anchor="middle" font-size="11" fill="#1e40af">语言服务器</text>
    <text x="320" y="26" font-size="12" fill="#1e293b">配置后随时调用</text>
    <text x="520" y="26" font-size="12" fill="#1e293b">符号级跳转 / 引用查询</text>
    <text x="780" y="26" font-size="12" fill="#b91c1c">默认它会自动启用</text>
  </g>

  <!-- Row 6 MCP -->
  <g transform="translate(0,400)">
    <rect x="100" y="0" width="160" height="44" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="180" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">⑥ MCP servers</text>
    <text x="180" y="36" text-anchor="middle" font-size="11" fill="#92400e">外部工具桥</text>
    <text x="320" y="26" font-size="12" fill="#1e293b">配置后常驻</text>
    <text x="520" y="26" font-size="12" fill="#1e293b">连内部工具 / 结构化检索</text>
    <text x="780" y="26" font-size="12" fill="#b91c1c">基础未稳就先建 MCP</text>
  </g>

  <!-- Row 7 Subagents -->
  <g transform="translate(0,454)">
    <rect x="100" y="0" width="160" height="44" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="180" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">⑦ Subagents</text>
    <text x="180" y="36" text-anchor="middle" font-size="11" fill="#5b21b6">独立子实例</text>
    <text x="320" y="26" font-size="12" fill="#1e293b">显式调用</text>
    <text x="520" y="26" font-size="12" fill="#1e293b">探索 / 编辑分离 · 并行</text>
    <text x="780" y="26" font-size="12" fill="#b91c1c">同一会话又探索又改</text>
  </g>

  <!-- 底注 -->
  <text x="480" y="528" text-anchor="middle" font-size="11" fill="#94a3b8">注：LSP 通过 plugin 层接入；Subagents 是委派能力，并非可配置的扩展点</text>
</svg>
