<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr4" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd4" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="480" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">三大成功部署模式：从"代码可导航"到"组织能落地"</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">三层纵深关系——少了任何一层都跑不出规模化效果</text>

  <!-- 三层倒梯形 / 阶梯（从宽到窄） -->

  <!-- Layer 1: 代码层 -->
  <g filter="url(#sd4)">
    <rect x="80" y="100" width="800" height="92" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.8"/>
    <rect x="80" y="100" width="6" height="92" fill="#3b82f6"/>
    <text x="120" y="128" font-size="15" font-weight="700" fill="#1e40af">模式 1 · 让代码库在规模下仍然可导航</text>
    <text x="120" y="152" font-size="12" fill="#475569">分层 CLAUDE.md · 子目录初始化 · 按子目录绑定 test/lint · .ignore + permissions.deny</text>
    <text x="120" y="172" font-size="12" fill="#475569">codebase map · LSP 让 grep 变成"按符号搜"——把检索压力前移到工具，少烧 context</text>
    <rect x="780" y="116" width="84" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="822" y="138" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">为模型</text>
    <text x="822" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">收窄视野</text>
  </g>

  <!-- 箭头 -->
  <path d="M480 192 L480 220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr4)"/>

  <!-- Layer 2: 配置维护层 -->
  <g filter="url(#sd4)">
    <rect x="140" y="222" width="680" height="92" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.8"/>
    <rect x="140" y="222" width="6" height="92" fill="#f59e0b"/>
    <text x="180" y="250" font-size="15" font-weight="700" fill="#92400e">模式 2 · 跟随模型迭代主动维护 CLAUDE.md</text>
    <text x="180" y="274" font-size="12" fill="#475569">3–6 个月一次配置审查；模型大版本发布后再审一次</text>
    <text x="180" y="294" font-size="12" fill="#475569">删掉过时约束（如"每次只改一个文件"）和已被原生支持取代的 hooks（如 Perforce p4 edit）</text>
    <rect x="720" y="238" width="84" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b"/>
    <text x="762" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">让旧约束</text>
    <text x="762" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">不拖新模型</text>
  </g>

  <!-- 箭头 -->
  <path d="M480 314 L480 342" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr4)"/>

  <!-- Layer 3: 组织所有权 -->
  <g filter="url(#sd4)">
    <rect x="200" y="344" width="560" height="92" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.8"/>
    <rect x="200" y="344" width="6" height="92" fill="#10b981"/>
    <text x="240" y="372" font-size="15" font-weight="700" fill="#065f46">模式 3 · 给 Claude Code 指定专人 / 团队负责</text>
    <text x="240" y="396" font-size="12" fill="#475569">最小可行：DRI（直接负责人）；进阶：Agent Manager（PM/工程混合岗）</text>
    <text x="240" y="416" font-size="12" fill="#475569">早期就拉上信息安全 / 治理一起定边界，避免自下而上推广碎片化</text>
    <rect x="660" y="360" width="84" height="60" rx="8" fill="#ecfdf5" stroke="#10b981"/>
    <text x="702" y="382" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">把"部落"</text>
    <text x="702" y="402" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">变成"标准"</text>
  </g>

  <!-- 底注 -->
  <text x="480" y="464" text-anchor="middle" font-size="11" fill="#94a3b8">越往下走越偏组织治理：技术配置只是入场券</text>
</svg>
