<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="460" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Claude Code 在大型代码库里到底是怎么工作的</text>
  <text x="480" y="76" text-anchor="middle" font-size="13" fill="#64748b">Anthropic 官方 5/14 博文：模型 ≠ 全部，Harness 才决定上限</text>

  <!-- Codebase 巨人轮廓（用方块阵列代替 monorepo） -->
  <g transform="translate(60,120)">
    <text x="0" y="0" font-size="12" fill="#64748b">Million-line monorepo</text>
    <g fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1">
      <rect x="0" y="14" width="40" height="24" rx="3"/>
      <rect x="44" y="14" width="40" height="24" rx="3"/>
      <rect x="88" y="14" width="60" height="24" rx="3"/>
      <rect x="0" y="42" width="60" height="24" rx="3"/>
      <rect x="64" y="42" width="40" height="24" rx="3"/>
      <rect x="108" y="42" width="40" height="24" rx="3"/>
      <rect x="0" y="70" width="40" height="24" rx="3"/>
      <rect x="44" y="70" width="50" height="24" rx="3"/>
      <rect x="98" y="70" width="50" height="24" rx="3"/>
      <rect x="0" y="98" width="50" height="24" rx="3"/>
      <rect x="54" y="98" width="40" height="24" rx="3"/>
      <rect x="98" y="98" width="50" height="24" rx="3"/>
      <rect x="0" y="126" width="80" height="24" rx="3"/>
      <rect x="84" y="126" width="64" height="24" rx="3"/>
      <rect x="0" y="154" width="40" height="24" rx="3"/>
      <rect x="44" y="154" width="60" height="24" rx="3"/>
      <rect x="108" y="154" width="40" height="24" rx="3"/>
      <rect x="0" y="182" width="60" height="24" rx="3"/>
      <rect x="64" y="182" width="84" height="24" rx="3"/>
    </g>
    <text x="74" y="226" text-anchor="middle" font-size="11" fill="#64748b">files / refs / symbols</text>
  </g>

  <!-- 中央 Claude Code 大圆 -->
  <g filter="url(#sd)">
    <rect x="350" y="150" width="260" height="160" rx="16" fill="#ffffff" stroke="#3b82f6" stroke-width="1.8"/>
    <text x="480" y="186" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">Claude Code</text>
    <text x="480" y="212" text-anchor="middle" font-size="12" fill="#475569">Agentic Search · 本地运行 · 无索引</text>

    <!-- 内部三个 chip -->
    <rect x="370" y="232" width="70" height="26" rx="13" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="405" y="250" text-anchor="middle" font-size="11" fill="#1e40af">grep</text>
    <rect x="450" y="232" width="70" height="26" rx="13" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="485" y="250" text-anchor="middle" font-size="11" fill="#1e40af">read</text>
    <rect x="530" y="232" width="70" height="26" rx="13" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="565" y="250" text-anchor="middle" font-size="11" fill="#1e40af">follow refs</text>
    <text x="480" y="290" text-anchor="middle" font-size="11" fill="#64748b">"像工程师一样翻代码"</text>
  </g>

  <!-- Harness 七卡片右侧（堆叠） -->
  <g transform="translate(680,120)">
    <text x="0" y="0" font-size="12" fill="#64748b">Harness（决定上限）</text>
    <g font-size="12" fill="#1e293b">
      <rect x="0" y="14" width="220" height="26" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="14" y="32">CLAUDE.md · 项目记忆</text>
      <rect x="0" y="44" width="220" height="26" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="14" y="62">Hooks · 自动化与自反馈</text>
      <rect x="0" y="74" width="220" height="26" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="14" y="92">Skills · 渐进式专长</text>
      <rect x="0" y="104" width="220" height="26" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="14" y="122">Plugins · 组织级分发</text>
      <rect x="0" y="134" width="220" height="26" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="14" y="152">LSP · 符号级精度</text>
      <rect x="0" y="164" width="220" height="26" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="14" y="182">MCP servers · 外部工具</text>
      <rect x="0" y="194" width="220" height="26" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="14" y="212">Subagents · 探索/编辑分离</text>
    </g>
  </g>

  <!-- 连接线：codebase → claude -->
  <path d="M210 220 Q 280 230 350 230" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- claude → harness -->
  <path d="M610 230 Q 645 230 680 230" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 底注 -->
  <text x="480" y="406" text-anchor="middle" font-size="13" fill="#475569">三个核心问题：为什么不用 RAG · 七个扩展点怎么用 · 大组织怎么落地</text>
  <text x="480" y="430" text-anchor="middle" font-size="11" fill="#94a3b8">Source: Anthropic, "How Claude Code works in large codebases" (May 14, 2026)</text>
</svg>
