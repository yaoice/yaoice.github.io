<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8edf8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="stage1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90CAF9"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <linearGradient id="stage2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#80DEEA"/>
      <stop offset="100%" style="stop-color:#00ACC1"/>
    </linearGradient>
    <linearGradient id="stage3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CE93D8"/>
      <stop offset="100%" style="stop-color:#AB47BC"/>
    </linearGradient>
    <linearGradient id="stage4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB74D"/>
      <stop offset="100%" style="stop-color:#FB8C00"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 L3,4 Z" fill="#78909C"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1100" height="400" rx="16" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">AI 编程范式演进路径</text>

  <!-- ======== 进化箭头连线 ======== -->
  <line x1="250" y1="195" x2="310" y2="195" stroke="#78909C" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="195" x2="580" y2="195" stroke="#78909C" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="790" y1="195" x2="850" y2="195" stroke="#78909C" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ======== Stage 1: 提示词工程 ======== -->
  <g transform="translate(140,100)">
    <!-- 圆形背景 -->
    <circle cx="0" cy="95" r="85" fill="url(#stage1)" opacity="0.13"/>
    <circle cx="0" cy="95" r="70" fill="white" filter="url(#glow)"/>
    <!-- 图标: 单个对话气泡 -->
    <rect x="-22" y="70" width="44" height="32" rx="8" fill="url(#stage1)" opacity="0.9"/>
    <circle cx="-10" cy="103" r="3" fill="url(#stage1)" opacity="0.6"/>
    <circle cx="-18" cy="109" r="2" fill="url(#stage1)" opacity="0.4"/>
    <line x1="-8" y1="80" x2="14" y2="80" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="87" x2="10" y2="87" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="94" x2="6" y2="94" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <!-- 标签 -->
    <rect x="-55" y="172" width="110" height="28" rx="14" fill="#42A5F5"/>
    <text x="0" y="191" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Stage 1</text>
    <text x="0" y="218" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565C0">提示词工程</text>
    <text x="0" y="238" text-anchor="middle" font-size="12" fill="#78909C">Prompt Engineering</text>
    <text x="0" y="260" text-anchor="middle" font-size="11" fill="#90A4AE">单点交互</text>
  </g>

  <!-- ======== Stage 2: Skills 技能库 ======== -->
  <g transform="translate(410,100)">
    <circle cx="0" cy="95" r="85" fill="url(#stage2)" opacity="0.13"/>
    <circle cx="0" cy="95" r="70" fill="white" filter="url(#glow)"/>
    <!-- 图标: 多个堆叠模块 -->
    <rect x="-20" y="68" width="18" height="18" rx="3" fill="url(#stage2)" opacity="0.7"/>
    <rect x="2" y="68" width="18" height="18" rx="3" fill="url(#stage2)" opacity="0.85"/>
    <rect x="-20" y="90" width="18" height="18" rx="3" fill="url(#stage2)" opacity="0.85"/>
    <rect x="2" y="90" width="18" height="18" rx="3" fill="url(#stage2)" opacity="1"/>
    <rect x="-9" y="112" width="18" height="18" rx="3" fill="url(#stage2)" opacity="0.6"/>
    <!-- 标签 -->
    <rect x="-55" y="172" width="110" height="28" rx="14" fill="#00ACC1"/>
    <text x="0" y="191" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Stage 2</text>
    <text x="0" y="218" text-anchor="middle" font-size="15" font-weight="bold" fill="#00838F">Skills 技能库</text>
    <text x="0" y="238" text-anchor="middle" font-size="12" fill="#78909C">Skills Library</text>
    <text x="0" y="260" text-anchor="middle" font-size="11" fill="#90A4AE">结构化知识</text>
  </g>

  <!-- ======== Stage 3: Sub-agents ======== -->
  <g transform="translate(680,100)">
    <circle cx="0" cy="95" r="85" fill="url(#stage3)" opacity="0.13"/>
    <circle cx="0" cy="95" r="70" fill="white" filter="url(#glow)"/>
    <!-- 图标: 中心节点+辐射 -->
    <circle cx="0" cy="88" r="10" fill="url(#stage3)"/>
    <circle cx="0" cy="65" r="6" fill="url(#stage3)" opacity="0.6"/>
    <circle cx="22" cy="78" r="6" fill="url(#stage3)" opacity="0.6"/>
    <circle cx="22" cy="102" r="6" fill="url(#stage3)" opacity="0.6"/>
    <circle cx="0" cy="112" r="6" fill="url(#stage3)" opacity="0.6"/>
    <circle cx="-22" cy="102" r="6" fill="url(#stage3)" opacity="0.6"/>
    <circle cx="-22" cy="78" r="6" fill="url(#stage3)" opacity="0.6"/>
    <line x1="0" y1="78" x2="0" y2="71" stroke="#AB47BC" stroke-width="1.5"/>
    <line x1="8" y1="82" x2="17" y2="78" stroke="#AB47BC" stroke-width="1.5"/>
    <line x1="8" y1="95" x2="17" y2="100" stroke="#AB47BC" stroke-width="1.5"/>
    <line x1="0" y1="98" x2="0" y2="106" stroke="#AB47BC" stroke-width="1.5"/>
    <line x1="-8" y1="95" x2="-17" y2="100" stroke="#AB47BC" stroke-width="1.5"/>
    <line x1="-8" y1="82" x2="-17" y2="78" stroke="#AB47BC" stroke-width="1.5"/>
    <!-- 标签 -->
    <rect x="-55" y="172" width="110" height="28" rx="14" fill="#AB47BC"/>
    <text x="0" y="191" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Stage 3</text>
    <text x="0" y="218" text-anchor="middle" font-size="15" font-weight="bold" fill="#7B1FA2">Sub-agents</text>
    <text x="0" y="238" text-anchor="middle" font-size="12" fill="#78909C">子代理委派</text>
    <text x="0" y="260" text-anchor="middle" font-size="11" fill="#90A4AE">委派执行</text>
  </g>

  <!-- ======== Stage 4: Agent Teams ======== -->
  <g transform="translate(950,100)">
    <circle cx="0" cy="95" r="85" fill="url(#stage4)" opacity="0.13"/>
    <circle cx="0" cy="95" r="70" fill="white" filter="url(#glow)"/>
    <!-- 图标: 网状连接的多节点 -->
    <circle cx="0" cy="70" r="8" fill="url(#stage4)"/>
    <circle cx="24" cy="88" r="8" fill="url(#stage4)"/>
    <circle cx="15" cy="114" r="8" fill="url(#stage4)"/>
    <circle cx="-15" cy="114" r="8" fill="url(#stage4)"/>
    <circle cx="-24" cy="88" r="8" fill="url(#stage4)"/>
    <!-- 全连接线 -->
    <line x1="0" y1="78" x2="20" y2="84" stroke="#FB8C00" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="78" x2="13" y2="108" stroke="#FB8C00" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="78" x2="-13" y2="108" stroke="#FB8C00" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="78" x2="-20" y2="84" stroke="#FB8C00" stroke-width="1.5" opacity="0.6"/>
    <line x1="20" y1="93" x2="13" y2="108" stroke="#FB8C00" stroke-width="1.5" opacity="0.6"/>
    <line x1="13" y1="114" x2="-13" y2="114" stroke="#FB8C00" stroke-width="1.5" opacity="0.6"/>
    <line x1="-13" y1="108" x2="-20" y2="93" stroke="#FB8C00" stroke-width="1.5" opacity="0.6"/>
    <line x1="-20" y1="84" x2="20" y2="93" stroke="#FB8C00" stroke-width="1.2" opacity="0.35"/>
    <line x1="20" y1="84" x2="-13" y2="108" stroke="#FB8C00" stroke-width="1.2" opacity="0.35"/>
    <!-- 高亮边框 -->
    <circle cx="0" cy="95" r="70" fill="none" stroke="#FB8C00" stroke-width="2.5" stroke-dasharray="0" opacity="0.3"/>
    <!-- 标签 -->
    <rect x="-55" y="172" width="110" height="28" rx="14" fill="#FB8C00"/>
    <text x="0" y="191" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Stage 4</text>
    <text x="0" y="218" text-anchor="middle" font-size="15" font-weight="bold" fill="#E65100">Agent Teams</text>
    <text x="0" y="238" text-anchor="middle" font-size="12" fill="#78909C">团队协作</text>
    <text x="0" y="260" text-anchor="middle" font-size="11" fill="#90A4AE">群体智能</text>
  </g>

  <!-- ======== 底部能力递增条 ======== -->
  <defs>
    <linearGradient id="barProgress" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#42A5F5"/>
      <stop offset="33%" style="stop-color:#00ACC1"/>
      <stop offset="66%" style="stop-color:#AB47BC"/>
      <stop offset="100%" style="stop-color:#FB8C00"/>
    </linearGradient>
  </defs>
  <rect x="80" y="370" width="940" height="6" rx="3" fill="#E0E0E0"/>
  <rect x="80" y="370" width="940" height="6" rx="3" fill="url(#barProgress)" opacity="0.7"/>
  <text x="80" y="392" font-size="11" fill="#90A4AE">能力单一</text>
  <text x="1020" y="392" text-anchor="end" font-size="11" fill="#90A4AE">群体智能</text>
  <text x="550" y="392" text-anchor="middle" font-size="11" fill="#78909C" font-weight="600">协作能力与复杂度递增 ──▶</text>

</svg>