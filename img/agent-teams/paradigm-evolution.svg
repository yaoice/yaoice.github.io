<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="e1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#bdbdbd"/>
    </linearGradient>
    <linearGradient id="e2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="e3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="e4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <filter id="es">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/>
    </filter>
    <marker id="ea" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#764ba2"/>
    </marker>
  </defs>

  <rect width="900" height="300" rx="16" fill="#f8f9fe"/>
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">AI 编程范式演进四阶段</text>

  <!-- Evolution arrow -->
  <line x1="80" y1="160" x2="860" y2="160" stroke="#764ba2" stroke-width="3" marker-end="url(#ea)"/>

  <!-- Stage 1 -->
  <g filter="url(#es)">
    <circle cx="130" cy="120" r="40" fill="url(#e1)"/>
    <text x="130" y="115" text-anchor="middle" font-size="24" fill="#fff">💬</text>
    <text x="130" y="136" text-anchor="middle" font-size="10" fill="#555" font-weight="600">单点</text>
  </g>
  <text x="130" y="195" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="700">提示词工程</text>
  <text x="130" y="213" text-anchor="middle" font-size="11" fill="#888">Prompt</text>
  <text x="130" y="228" text-anchor="middle" font-size="11" fill="#888">Engineering</text>
  <rect x="85" y="240" width="90" height="22" rx="11" fill="#e0e0e0"/>
  <text x="130" y="255" text-anchor="middle" font-size="10" fill="#555" font-weight="600">Stage 1</text>

  <!-- Stage 2 -->
  <g filter="url(#es)">
    <circle cx="340" cy="120" r="40" fill="url(#e2)"/>
    <text x="340" y="115" text-anchor="middle" font-size="24" fill="#fff">🧩</text>
    <text x="340" y="136" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">结构化</text>
  </g>
  <text x="340" y="195" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="700">Skills 技能库</text>
  <text x="340" y="213" text-anchor="middle" font-size="11" fill="#888">指令 + 脚本 + 模板</text>
  <text x="340" y="228" text-anchor="middle" font-size="11" fill="#888">按需加载</text>
  <rect x="295" y="240" width="90" height="22" rx="11" fill="#4facfe"/>
  <text x="340" y="255" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Stage 2</text>

  <!-- Stage 3 -->
  <g filter="url(#es)">
    <circle cx="550" cy="120" r="40" fill="url(#e3)"/>
    <text x="550" y="115" text-anchor="middle" font-size="24" fill="#fff">🔀</text>
    <text x="550" y="136" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">委派</text>
  </g>
  <text x="550" y="195" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="700">Sub-agents</text>
  <text x="550" y="213" text-anchor="middle" font-size="11" fill="#888">独立上下文</text>
  <text x="550" y="228" text-anchor="middle" font-size="11" fill="#888">单向返回结果</text>
  <rect x="505" y="240" width="90" height="22" rx="11" fill="#667eea"/>
  <text x="550" y="255" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Stage 3</text>

  <!-- Stage 4 -->
  <g filter="url(#es)">
    <circle cx="760" cy="120" r="42" fill="url(#e4)" stroke="#fff" stroke-width="3"/>
    <text x="760" y="115" text-anchor="middle" font-size="24" fill="#fff">🌐</text>
    <text x="760" y="136" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">群体智能</text>
  </g>
  <text x="760" y="195" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="700">Agent Teams</text>
  <text x="760" y="213" text-anchor="middle" font-size="11" fill="#888">平级协作 + 自主通信</text>
  <text x="760" y="228" text-anchor="middle" font-size="11" fill="#888">共享任务列表</text>
  <rect x="715" y="240" width="90" height="22" rx="11" fill="#f5576c"/>
  <text x="760" y="255" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Stage 4</text>

  <!-- Star/current indicator -->
  <text x="760" y="80" text-anchor="middle" font-size="14" fill="#f5576c" font-weight="700">⭐ 当前</text>

  <!-- Bottom description -->
  <text x="450" y="285" text-anchor="middle" font-size="12" fill="#888">能力递增：单点对话 → 结构化技能 → 委派执行 → 群体智能协作</text>
</svg>