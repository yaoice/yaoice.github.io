<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="c4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="cs">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/>
    </filter>
  </defs>

  <rect width="900" height="500" rx="16" fill="#f8f9fe"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">16 Agent 协作编写 C 编译器</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#888">Nicholas Carlini (Anthropic 安全研究员) 主导</text>

  <!-- Project Results (top) -->
  <g filter="url(#cs)">
    <rect x="50" y="75" width="800" height="70" rx="12" fill="url(#c1)"/>
    <text x="165" y="103" text-anchor="middle" font-size="14" fill="#fff" font-weight="600">📊 产出</text>
    <text x="165" y="125" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">10万行 Rust</text>
    <text x="370" y="103" text-anchor="middle" font-size="14" fill="#fff" font-weight="600">⚙️ 能力</text>
    <text x="370" y="125" text-anchor="middle" font-size="16" fill="#fff" font-weight="700">编译 Linux 6.9 内核</text>
    <text x="580" y="103" text-anchor="middle" font-size="14" fill="#fff" font-weight="600">🤖 配置</text>
    <text x="580" y="125" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">16 个并行 Agent</text>
    <text x="760" y="103" text-anchor="middle" font-size="14" fill="#fff" font-weight="600">💰 成本</text>
    <text x="760" y="125" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">&lt; $20,000</text>
  </g>

  <!-- 6 Roles Grid -->
  <text x="450" y="175" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Agent 自发分化的六种角色</text>

  <!-- Role 1 -->
  <g filter="url(#cs)">
    <rect x="50" y="195" width="260" height="70" rx="10" fill="#fff" stroke="#667eea" stroke-width="2"/>
    <circle cx="85" cy="230" r="20" fill="url(#c1)"/>
    <text x="85" y="235" text-anchor="middle" font-size="16" fill="#fff">🔨</text>
    <text x="120" y="222" font-size="14" fill="#1a1a2e" font-weight="700">主力开发</text>
    <text x="120" y="242" font-size="11" fill="#888">实现核心编译器功能</text>
  </g>

  <!-- Role 2 -->
  <g filter="url(#cs)">
    <rect x="320" y="195" width="260" height="70" rx="10" fill="#fff" stroke="#f5576c" stroke-width="2"/>
    <circle cx="355" cy="230" r="20" fill="url(#c2)"/>
    <text x="355" y="235" text-anchor="middle" font-size="16" fill="#fff">🔄</text>
    <text x="390" y="222" font-size="14" fill="#1a1a2e" font-weight="700">去重工程师</text>
    <text x="390" y="242" font-size="11" fill="#888">消除重复代码</text>
  </g>

  <!-- Role 3 -->
  <g filter="url(#cs)">
    <rect x="590" y="195" width="260" height="70" rx="10" fill="#fff" stroke="#43e97b" stroke-width="2"/>
    <circle cx="625" cy="230" r="20" fill="url(#c3)"/>
    <text x="625" y="235" text-anchor="middle" font-size="16" fill="#1a1a2e">⚡</text>
    <text x="660" y="222" font-size="14" fill="#1a1a2e" font-weight="700">性能优化师</text>
    <text x="660" y="242" font-size="11" fill="#888">优化编译速度</text>
  </g>

  <!-- Role 4 -->
  <g filter="url(#cs)">
    <rect x="50" y="280" width="260" height="70" rx="10" fill="#fff" stroke="#4facfe" stroke-width="2"/>
    <circle cx="85" cy="315" r="20" fill="url(#c4)"/>
    <text x="85" y="320" text-anchor="middle" font-size="16" fill="#fff">🔍</text>
    <text x="120" y="307" font-size="14" fill="#1a1a2e" font-weight="700">代码审查员</text>
    <text x="120" y="327" font-size="11" fill="#888">检查代码质量</text>
  </g>

  <!-- Role 5 -->
  <g filter="url(#cs)">
    <rect x="320" y="280" width="260" height="70" rx="10" fill="#fff" stroke="#fa709a" stroke-width="2"/>
    <circle cx="355" cy="315" r="20" fill="#fa709a"/>
    <text x="355" y="320" text-anchor="middle" font-size="16" fill="#fff">📖</text>
    <text x="390" y="307" font-size="14" fill="#1a1a2e" font-weight="700">文档维护者</text>
    <text x="390" y="327" font-size="11" fill="#888">编写和更新文档</text>
  </g>

  <!-- Role 6 -->
  <g filter="url(#cs)">
    <rect x="590" y="280" width="260" height="70" rx="10" fill="#fff" stroke="#ff6f00" stroke-width="2"/>
    <circle cx="625" cy="315" r="20" fill="#ff6f00"/>
    <text x="625" y="320" text-anchor="middle" font-size="16" fill="#fff">🧪</text>
    <text x="660" y="307" font-size="14" fill="#1a1a2e" font-weight="700">回归测试员</text>
    <text x="660" y="327" font-size="11" fill="#888">确保改动不破坏已有功能</text>
  </g>

  <!-- Key Experience -->
  <g filter="url(#cs)">
    <rect x="50" y="375" width="800" height="110" rx="12" fill="#1a1a2e"/>
    <text x="450" y="400" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">💡 关键经验总结</text>
    <rect x="75" y="415" width="230" height="55" rx="8" fill="#ffffff15"/>
    <text x="190" y="437" text-anchor="middle" font-size="12" fill="#4facfe" font-weight="600">🏗️ 环境设计重于指令</text>
    <text x="190" y="457" text-anchor="middle" font-size="10" fill="#aaa">80%精力在测试框架和反馈系统</text>

    <rect x="335" y="415" width="230" height="55" rx="8" fill="#ffffff15"/>
    <text x="450" y="437" text-anchor="middle" font-size="12" fill="#43e97b" font-weight="600">🔄 严格CI防止回归</text>
    <text x="450" y="457" text-anchor="middle" font-size="10" fill="#aaa">每次 commit 触发全量回归测试</text>

    <rect x="595" y="415" width="230" height="55" rx="8" fill="#ffffff15"/>
    <text x="710" y="437" text-anchor="middle" font-size="12" fill="#fa709a" font-weight="600">📋 AI友好的测试输出</text>
    <text x="710" y="457" text-anchor="middle" font-size="10" fill="#aaa">高密度摘要格式，节省上下文</text>
  </g>
</svg>