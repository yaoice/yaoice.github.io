<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="a1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="a2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="a3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="a4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="a5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="as">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/>
    </filter>
    <marker id="aa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667eea"/>
    </marker>
    <marker id="aa2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4facfe"/>
    </marker>
  </defs>

  <rect width="900" height="650" rx="16" fill="#f8f9fe"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Agent Teams 核心架构</text>

  <!-- Component 1: Team Lead (top center) -->
  <g filter="url(#as)">
    <rect x="310" y="55" width="280" height="70" rx="14" fill="url(#a1)"/>
    <text x="450" y="82" text-anchor="middle" font-size="13" fill="#ffffffcc">① 团队领导</text>
    <text x="450" y="105" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">👑 Team Lead</text>
  </g>

  <!-- Lead description -->
  <g filter="url(#as)">
    <rect x="620" y="55" width="255" height="70" rx="8" fill="#fff" stroke="#764ba2" stroke-width="1.5"/>
    <text x="635" y="78" font-size="11" fill="#555">• 用户主会话，统筹协调者</text>
    <text x="635" y="96" font-size="11" fill="#555">• 创建团队、分配任务、设置依赖</text>
    <text x="635" y="114" font-size="11" fill="#555">• 汇总成果，合成最终结果</text>
  </g>

  <!-- Arrows from Lead to Teammates -->
  <line x1="380" y1="125" x2="180" y2="185" stroke="#667eea" stroke-width="2" marker-end="url(#aa)"/>
  <line x1="450" y1="125" x2="450" y2="185" stroke="#667eea" stroke-width="2" marker-end="url(#aa)"/>
  <line x1="520" y1="125" x2="720" y2="185" stroke="#667eea" stroke-width="2" marker-end="url(#aa)"/>
  <text x="450" y="162" text-anchor="middle" font-size="11" fill="#667eea" font-weight="600">创建 / 协调</text>

  <!-- Component 2: Teammates -->
  <g filter="url(#as)">
    <rect x="40" y="190" width="220" height="90" rx="10" fill="#fff" stroke="#4facfe" stroke-width="2"/>
    <rect x="40" y="190" width="220" height="32" rx="10" fill="url(#a2)"/>
    <text x="150" y="212" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">👨‍💻 成员 A: 前端开发</text>
    <text x="60" y="243" font-size="11" fill="#555">独立 CodeBuddy 实例</text>
    <text x="60" y="263" font-size="11" fill="#888">独立上下文 | 不继承对话历史</text>
  </g>

  <g filter="url(#as)">
    <rect x="290" y="190" width="220" height="90" rx="10" fill="#fff" stroke="#43e97b" stroke-width="2"/>
    <rect x="290" y="190" width="220" height="32" rx="10" fill="url(#a3)"/>
    <text x="400" y="212" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="700">👨‍💻 成员 B: 后端开发</text>
    <text x="310" y="243" font-size="11" fill="#555">独立 CodeBuddy 实例</text>
    <text x="310" y="263" font-size="11" fill="#888">独立上下文 | 不继承对话历史</text>
  </g>

  <g filter="url(#as)">
    <rect x="540" y="190" width="220" height="90" rx="10" fill="#fff" stroke="#f5576c" stroke-width="2"/>
    <rect x="540" y="190" width="220" height="32" rx="10" fill="url(#a4)"/>
    <text x="650" y="212" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">👨‍💻 成员 C: 测试工程师</text>
    <text x="560" y="243" font-size="11" fill="#555">独立 CodeBuddy 实例</text>
    <text x="560" y="263" font-size="11" fill="#888">独立上下文 | 不继承对话历史</text>
  </g>

  <!-- ② label -->
  <text x="25" y="210" font-size="12" fill="#4facfe" font-weight="700">②</text>

  <!-- Peer-to-peer arrows between teammates -->
  <path d="M260 235 L290 235" stroke="#4facfe" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aa2)"/>
  <path d="M510 235 L540 235" stroke="#4facfe" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aa2)"/>
  <text x="275" y="228" text-anchor="middle" font-size="9" fill="#4facfe">直接通信</text>
  <text x="525" y="228" text-anchor="middle" font-size="9" fill="#4facfe">直接通信</text>

  <!-- Component 3: Shared Task List -->
  <g filter="url(#as)">
    <rect x="40" y="320" width="395" height="170" rx="12" fill="#fff" stroke="#fa709a" stroke-width="2"/>
    <rect x="40" y="320" width="395" height="36" rx="12" fill="url(#a5)"/>
    <text x="237" y="344" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">③ 📋 共享任务列表 (Shared Task List)</text>
    <!-- Table header -->
    <rect x="55" y="370" width="365" height="24" rx="4" fill="#f5f5f5"/>
    <text x="75" y="386" font-size="11" fill="#888" font-weight="600">ID</text>
    <text x="145" y="386" font-size="11" fill="#888" font-weight="600">任务</text>
    <text x="285" y="386" font-size="11" fill="#888" font-weight="600">负责人</text>
    <text x="370" y="386" font-size="11" fill="#888" font-weight="600">状态</text>
    <!-- Rows -->
    <text x="75" y="412" font-size="11" fill="#555">T-1</text>
    <text x="145" y="412" font-size="11" fill="#555">数据库Schema</text>
    <text x="285" y="412" font-size="11" fill="#555">成员B</text>
    <rect x="355" y="400" width="55" height="18" rx="9" fill="#43e97b"/>
    <text x="382" y="413" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">completed</text>

    <text x="75" y="436" font-size="11" fill="#555">T-2</text>
    <text x="145" y="436" font-size="11" fill="#555">REST API</text>
    <text x="285" y="436" font-size="11" fill="#555">成员B</text>
    <rect x="355" y="424" width="55" height="18" rx="9" fill="#4facfe"/>
    <text x="382" y="437" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">in_progress</text>

    <text x="75" y="460" font-size="11" fill="#555">T-3</text>
    <text x="145" y="460" font-size="11" fill="#555">前端页面</text>
    <text x="285" y="460" font-size="11" fill="#555">成员A</text>
    <rect x="355" y="448" width="55" height="18" rx="9" fill="#4facfe"/>
    <text x="382" y="461" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">in_progress</text>

    <text x="75" y="480" font-size="11" fill="#555">T-4</text>
    <text x="145" y="480" font-size="11" fill="#555">集成测试</text>
    <text x="285" y="480" font-size="11" fill="#555">成员C</text>
    <rect x="355" y="468" width="55" height="18" rx="9" fill="#ccc"/>
    <text x="382" y="481" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">pending</text>
  </g>

  <!-- Component 4: Mailbox System -->
  <g filter="url(#as)">
    <rect x="465" y="320" width="405" height="170" rx="12" fill="#fff" stroke="#4facfe" stroke-width="2"/>
    <rect x="465" y="320" width="405" height="36" rx="12" fill="url(#a2)"/>
    <text x="667" y="344" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">④ 📬 邮箱通信系统 (Mailbox)</text>

    <!-- Message types -->
    <rect x="485" y="372" width="170" height="48" rx="8" fill="#e3f2fd"/>
    <text x="570" y="392" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="600">📨 message</text>
    <text x="570" y="410" text-anchor="middle" font-size="10" fill="#666">点对点消息</text>

    <rect x="680" y="372" width="170" height="48" rx="8" fill="#fce4ec"/>
    <text x="765" y="392" text-anchor="middle" font-size="12" fill="#c62828" font-weight="600">📢 broadcast</text>
    <text x="765" y="410" text-anchor="middle" font-size="10" fill="#666">全员广播</text>

    <rect x="485" y="432" width="170" height="48" rx="8" fill="#fff3e0"/>
    <text x="570" y="452" text-anchor="middle" font-size="12" fill="#e65100" font-weight="600">🛑 shutdown_request</text>
    <text x="570" y="470" text-anchor="middle" font-size="10" fill="#666">请求关闭</text>

    <rect x="680" y="432" width="170" height="48" rx="8" fill="#e8f5e9"/>
    <text x="765" y="452" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="600">✅ plan_approval</text>
    <text x="765" y="470" text-anchor="middle" font-size="10" fill="#666">计划审批</text>
  </g>

  <!-- Local Storage info at bottom -->
  <g filter="url(#as)">
    <rect x="120" y="520" width="660" height="115" rx="12" fill="#1a1a2e"/>
    <text x="450" y="547" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">💾 本地存储结构</text>
    <text x="185" y="575" font-size="12" fill="#4facfe" font-family="monospace">~/.codebuddy/teams/{team}/</text>
    <text x="185" y="598" font-size="11" fill="#aaa" font-family="monospace">  ├── config.json</text>
    <text x="400" y="598" font-size="11" fill="#666">团队配置</text>
    <text x="185" y="618" font-size="11" fill="#aaa" font-family="monospace">  └── inboxes/{member}.json</text>
    <text x="460" y="618" font-size="11" fill="#666">成员消息信箱</text>
  </g>
</svg>