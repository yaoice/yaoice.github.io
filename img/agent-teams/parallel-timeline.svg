<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef1f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barDB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50" />
      <stop offset="100%" style="stop-color:#66BB6A" />
    </linearGradient>
    <linearGradient id="barBE" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196F3" />
      <stop offset="100%" style="stop-color:#42A5F5" />
    </linearGradient>
    <linearGradient id="barFE1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9800" />
      <stop offset="100%" style="stop-color:#FFB74D" />
    </linearGradient>
    <linearGradient id="barFE2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF5722" />
      <stop offset="100%" style="stop-color:#FF8A65" />
    </linearGradient>
    <linearGradient id="barTest" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9C27B0" />
      <stop offset="100%" style="stop-color:#BA68C8" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1100" height="520" rx="12" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Agent Teams 并行开发时序图 —— 电商用户管理系统</text>

  <!-- 时间轴 -->
  <line x1="230" y1="70" x2="1060" y2="70" stroke="#90A4AE" stroke-width="2" marker-end="url(#arrowTime)"/>
  <defs>
    <marker id="arrowTime" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#90A4AE"/>
    </marker>
    <marker id="arrowMsg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E53935"/>
    </marker>
  </defs>

  <!-- 阶段分隔线 -->
  <line x1="480" y1="60" x2="480" y2="490" stroke="#B0BEC5" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="700" y1="60" x2="700" y2="490" stroke="#B0BEC5" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="900" y1="60" x2="900" y2="490" stroke="#B0BEC5" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- 阶段标签 -->
  <text x="355" y="88" text-anchor="middle" font-size="12" fill="#78909C" font-weight="600">阶段1: 并行启动</text>
  <text x="590" y="88" text-anchor="middle" font-size="12" fill="#78909C" font-weight="600">阶段2: 依赖解锁</text>
  <text x="800" y="88" text-anchor="middle" font-size="12" fill="#78909C" font-weight="600">阶段3: 接口对接</text>
  <text x="980" y="88" text-anchor="middle" font-size="12" fill="#78909C" font-weight="600">阶段4: 测试验证</text>

  <!-- 角色标签列 -->
  <!-- DB Engineer -->
  <rect x="20" y="110" width="190" height="36" rx="18" fill="#4CAF50" opacity="0.12"/>
  <text x="115" y="133" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">🗄️ DB Engineer</text>

  <!-- Backend Dev -->
  <rect x="20" y="190" width="190" height="36" rx="18" fill="#2196F3" opacity="0.12"/>
  <text x="115" y="213" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">⚙️ Backend Dev</text>

  <!-- Frontend Dev -->
  <rect x="20" y="280" width="190" height="36" rx="18" fill="#FF9800" opacity="0.12"/>
  <text x="115" y="303" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">🎨 Frontend Dev</text>

  <!-- Test Engineer -->
  <rect x="20" y="380" width="190" height="36" rx="18" fill="#9C27B0" opacity="0.12"/>
  <text x="115" y="403" text-anchor="middle" font-size="14" font-weight="bold" fill="#6A1B9A">🧪 Test Engineer</text>

  <!-- ============ 甘特条 ============ -->

  <!-- DB Engineer: Schema 设计 (阶段1) -->
  <rect x="240" y="112" rx="6" width="230" height="32" fill="url(#barDB)" filter="url(#shadow)"/>
  <text x="355" y="133" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">Schema 设计 + 数据迁移</text>

  <!-- Backend Dev: API 实现 (阶段2) -->
  <rect x="490" y="192" rx="6" width="200" height="32" fill="url(#barBE)" filter="url(#shadow)"/>
  <text x="590" y="213" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">REST API 实现</text>

  <!-- Backend Dev: API 文档 (阶段3前段) -->
  <rect x="700" y="192" rx="6" width="120" height="32" fill="url(#barBE)" filter="url(#shadow)" opacity="0.65"/>
  <text x="760" y="213" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">API 文档</text>

  <!-- Frontend Dev: 页面骨架 Mock (阶段1-2) -->
  <rect x="240" y="282" rx="6" width="340" height="32" fill="url(#barFE1)" filter="url(#shadow)"/>
  <text x="410" y="303" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">页面骨架开发 (Mock 数据)</text>

  <!-- Frontend Dev: 对接真实 API (阶段3) -->
  <rect x="710" y="282" rx="6" width="180" height="32" fill="url(#barFE2)" filter="url(#shadow)"/>
  <text x="800" y="303" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">对接真实 API</text>

  <!-- Test Engineer: 集成测试 (阶段4) -->
  <rect x="910" y="382" rx="6" width="140" height="32" fill="url(#barTest)" filter="url(#shadow)"/>
  <text x="980" y="403" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">集成测试</text>

  <!-- ============ 依赖/通信箭头 ============ -->

  <!-- DB完成 → 通知 Backend -->
  <path d="M 470 140 L 470 160 L 490 195" stroke="#E53935" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowMsg)"/>
  <rect x="440" y="152" width="72" height="18" rx="9" fill="#FFEBEE"/>
  <text x="476" y="164" text-anchor="middle" font-size="10" fill="#E53935" font-weight="600">📨 通知</text>

  <!-- Backend API完成 → 广播 @all -->
  <path d="M 690 210 L 710 282" stroke="#E53935" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowMsg)"/>
  <rect x="672" y="238" width="84" height="18" rx="9" fill="#FFEBEE"/>
  <text x="714" y="250" text-anchor="middle" font-size="10" fill="#E53935" font-weight="600">📢 广播 @all</text>

  <!-- Frontend + API 完成 → Test Engineer -->
  <path d="M 890 300 L 900 340 L 920 382" stroke="#E53935" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowMsg)"/>
  <rect x="870" y="336" width="82" height="18" rx="9" fill="#FFEBEE"/>
  <text x="911" y="348" text-anchor="middle" font-size="10" fill="#E53935" font-weight="600">🔓 依赖解锁</text>

  <!-- ============ 底部说明 ============ -->
  <rect x="40" y="450" width="1020" height="50" rx="8" fill="#fff" opacity="0.7"/>

  <!-- 图例 -->
  <rect x="60" y="463" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="80" y="475" font-size="11" fill="#555">数据库</text>

  <rect x="130" y="463" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="150" y="475" font-size="11" fill="#555">后端</text>

  <rect x="190" y="463" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="210" y="475" font-size="11" fill="#555">前端(Mock)</text>

  <rect x="280" y="463" width="14" height="14" rx="3" fill="#FF5722"/>
  <text x="300" y="475" font-size="11" fill="#555">前端(对接)</text>

  <rect x="370" y="463" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="390" y="475" font-size="11" fill="#555">测试</text>

  <line x1="450" y1="470" x2="490" y2="470" stroke="#E53935" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="500" y="475" font-size="11" fill="#555">消息通知/依赖</text>

  <!-- 效率对比 -->
  <text x="750" y="475" font-size="12" fill="#78909C" font-weight="600">⏱ 串行预计: ~4h → 并行实际: ~1-1.5h（效率提升 3-4x）</text>

</svg>