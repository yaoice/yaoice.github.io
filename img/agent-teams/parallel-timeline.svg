<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="ts2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>

  <rect width="900" height="380" rx="16" fill="#f8f9fe"/>
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">电商用户管理系统 — Agent Teams 并行开发时序</text>

  <!-- Time axis -->
  <line x1="170" y1="55" x2="870" y2="55" stroke="#ccc" stroke-width="2"/>
  <text x="170" y="48" text-anchor="middle" font-size="11" fill="#888">时间</text>
  <polygon points="870,55 860,50 860,60" fill="#ccc"/>

  <!-- Phase labels on time axis -->
  <line x1="320" y1="50" x2="320" y2="60" stroke="#ddd" stroke-width="1"/>
  <line x1="510" y1="50" x2="510" y2="60" stroke="#ddd" stroke-width="1"/>
  <line x1="680" y1="50" x2="680" y2="60" stroke="#ddd" stroke-width="1"/>
  <text x="245" y="72" text-anchor="middle" font-size="10" fill="#667eea" font-weight="600">阶段1: 并行启动</text>
  <text x="415" y="72" text-anchor="middle" font-size="10" fill="#43e97b" font-weight="600">阶段2: 依赖解锁</text>
  <text x="595" y="72" text-anchor="middle" font-size="10" fill="#f5576c" font-weight="600">阶段3: 接口对接</text>
  <text x="775" y="72" text-anchor="middle" font-size="10" fill="#fa709a" font-weight="600">阶段4: 测试验证</text>

  <!-- Row labels -->
  <text x="80" y="115" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="700">DB工程师</text>
  <text x="80" y="175" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="700">后端开发</text>
  <text x="80" y="240" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="700">前端开发</text>
  <text x="80" y="305" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="700">测试工程师</text>

  <!-- Horizontal lines -->
  <line x1="160" y1="85" x2="870" y2="85" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="160" y1="145" x2="870" y2="145" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="160" y1="210" x2="870" y2="210" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="160" y1="275" x2="870" y2="275" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="160" y1="335" x2="870" y2="335" stroke="#f0f0f0" stroke-width="1"/>

  <!-- DB Engineer: Schema Design (Phase 1) -->
  <g filter="url(#ts2)">
    <rect x="175" y="95" width="140" height="40" rx="8" fill="#667eea"/>
    <text x="245" y="120" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">Schema 设计</text>
  </g>

  <!-- Arrow: DB → Backend (notification) -->
  <line x1="315" y1="115" x2="330" y2="160" stroke="#667eea" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="340" y="140" font-size="9" fill="#667eea">📬 通知</text>

  <!-- Backend Dev: API Implementation (Phase 2-3) -->
  <g filter="url(#ts2)">
    <rect x="335" y="155" width="200" height="40" rx="8" fill="#43e97b"/>
    <text x="435" y="180" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="600">REST API 实现</text>
  </g>

  <!-- Arrow: Backend → broadcast @all -->
  <line x1="535" y1="175" x2="555" y2="175" stroke="#43e97b" stroke-width="1.5"/>
  <text x="575" y="170" font-size="9" fill="#43e97b">📢 广播 @all</text>

  <!-- Frontend Dev: Page Skeleton (Phase 1) + Real API (Phase 3) -->
  <g filter="url(#ts2)">
    <rect x="175" y="220" width="170" height="40" rx="8" fill="#4facfe"/>
    <text x="260" y="245" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">页面骨架 (Mock)</text>
  </g>
  <g filter="url(#ts2)">
    <rect x="555" y="220" width="170" height="40" rx="8" fill="#764ba2"/>
    <text x="640" y="245" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">对接真实 API</text>
  </g>
  <!-- Dashed connection -->
  <line x1="345" y1="240" x2="555" y2="240" stroke="#4facfe" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Test Engineer: Integration Testing (Phase 4) -->
  <g filter="url(#ts2)">
    <rect x="690" y="285" width="160" height="40" rx="8" fill="#f5576c"/>
    <text x="770" y="310" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">集成测试</text>
  </g>

  <!-- Dependency arrows to Test -->
  <line x1="535" y1="190" x2="690" y2="300" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="725" y1="260" x2="730" y2="285" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="650" y="295" font-size="9" fill="#888">依赖: API + 前端就绪</text>

  <!-- Bottom: Comparison -->
  <g filter="url(#ts2)">
    <rect x="175" y="342" width="690" height="30" rx="8" fill="#1a1a2e"/>
    <text x="520" y="362" text-anchor="middle" font-size="12" fill="#fff">
      ⏱ 传统串行 ~4小时  →  Agent Teams 并行 ~1-1.5小时  |  🚀 效率提升 3-5 倍
    </text>
  </g>
</svg>