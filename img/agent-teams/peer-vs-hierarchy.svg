<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="p1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="p2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <filter id="ps">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/>
    </filter>
    <marker id="pa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667eea"/>
    </marker>
    <marker id="pg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#43e97b"/>
    </marker>
  </defs>

  <rect width="900" height="420" rx="16" fill="#f8f9fe"/>

  <!-- LEFT: Hierarchy Mode -->
  <text x="215" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#764ba2">传统层级模式</text>
  <text x="215" y="55" text-anchor="middle" font-size="12" fill="#888">所有通信必须经过主节点</text>

  <!-- Main node -->
  <g filter="url(#ps)">
    <circle cx="215" cy="110" r="42" fill="url(#p1)"/>
    <text x="215" y="106" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">Main</text>
    <text x="215" y="122" text-anchor="middle" font-size="11" fill="#ffffffcc">Agent</text>
  </g>

  <!-- Slave nodes -->
  <g filter="url(#ps)">
    <circle cx="100" cy="260" r="35" fill="#e8eaf6" stroke="#667eea" stroke-width="2"/>
    <text x="100" y="256" text-anchor="middle" font-size="12" fill="#667eea" font-weight="600">Agent</text>
    <text x="100" y="272" text-anchor="middle" font-size="12" fill="#667eea" font-weight="600">A</text>
  </g>
  <g filter="url(#ps)">
    <circle cx="215" cy="260" r="35" fill="#e8eaf6" stroke="#667eea" stroke-width="2"/>
    <text x="215" y="256" text-anchor="middle" font-size="12" fill="#667eea" font-weight="600">Agent</text>
    <text x="215" y="272" text-anchor="middle" font-size="12" fill="#667eea" font-weight="600">B</text>
  </g>
  <g filter="url(#ps)">
    <circle cx="330" cy="260" r="35" fill="#e8eaf6" stroke="#667eea" stroke-width="2"/>
    <text x="330" y="256" text-anchor="middle" font-size="12" fill="#667eea" font-weight="600">Agent</text>
    <text x="330" y="272" text-anchor="middle" font-size="12" fill="#667eea" font-weight="600">C</text>
  </g>

  <!-- Arrows (bidirectional Main↔Slaves) -->
  <line x1="185" y1="145" x2="120" y2="228" stroke="#667eea" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="115" y1="225" x2="180" y2="148" stroke="#667eea" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="215" y1="152" x2="215" y2="222" stroke="#667eea" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="219" y1="222" x2="219" y2="152" stroke="#667eea" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="245" y1="145" x2="310" y2="228" stroke="#667eea" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="315" y1="225" x2="250" y2="148" stroke="#667eea" stroke-width="2" marker-end="url(#pa)"/>

  <!-- Red X between slaves -->
  <text x="155" y="265" text-anchor="middle" font-size="18" fill="#f44336" font-weight="700">✗</text>
  <text x="270" y="265" text-anchor="middle" font-size="18" fill="#f44336" font-weight="700">✗</text>
  <text x="215" y="330" text-anchor="middle" font-size="12" fill="#f44336" font-weight="600">成员间无法直接通信</text>

  <!-- Issues -->
  <rect x="65" y="350" width="300" height="55" rx="8" fill="#ffebee"/>
  <text x="215" y="372" text-anchor="middle" font-size="12" fill="#c62828" font-weight="600">⚠️ 单点瓶颈 | 信息失真 | 通信延迟</text>
  <text x="215" y="392" text-anchor="middle" font-size="11" fill="#888">主节点成为通信中心，负担过重</text>

  <!-- Divider -->
  <line x1="450" y1="30" x2="450" y2="410" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="450" y="218" text-anchor="middle" font-size="16" fill="#888" font-weight="700">VS</text>

  <!-- RIGHT: Peer-to-Peer Mode -->
  <text x="680" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#2e7d32">Agent Teams 平级协作</text>
  <text x="680" y="55" text-anchor="middle" font-size="12" fill="#888">成员间直接通信，无需中转</text>

  <!-- Lead node (smaller, not bottleneck) -->
  <g filter="url(#ps)">
    <circle cx="680" cy="105" r="36" fill="url(#p2)"/>
    <text x="680" y="101" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="700">Team</text>
    <text x="680" y="117" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="700">Lead</text>
  </g>

  <!-- Peer nodes -->
  <g filter="url(#ps)">
    <circle cx="560" cy="225" r="35" fill="#e8f5e9" stroke="#43e97b" stroke-width="2"/>
    <text x="560" y="221" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="600">Agent</text>
    <text x="560" y="237" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="600">A</text>
  </g>
  <g filter="url(#ps)">
    <circle cx="680" cy="260" r="35" fill="#e8f5e9" stroke="#43e97b" stroke-width="2"/>
    <text x="680" y="256" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="600">Agent</text>
    <text x="680" y="272" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="600">B</text>
  </g>
  <g filter="url(#ps)">
    <circle cx="800" cy="225" r="35" fill="#e8f5e9" stroke="#43e97b" stroke-width="2"/>
    <text x="800" y="221" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="600">Agent</text>
    <text x="800" y="237" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="600">C</text>
  </g>

  <!-- All bidirectional arrows (mesh network) -->
  <!-- Lead ↔ A -->
  <line x1="650" y1="132" x2="582" y2="198" stroke="#43e97b" stroke-width="2" marker-end="url(#pg)"/>
  <!-- Lead ↔ C -->
  <line x1="710" y1="132" x2="778" y2="198" stroke="#43e97b" stroke-width="2" marker-end="url(#pg)"/>
  <!-- Lead ↔ B -->
  <line x1="680" y1="141" x2="680" y2="222" stroke="#43e97b" stroke-width="2" marker-end="url(#pg)"/>
  <!-- A ↔ B -->
  <line x1="585" y1="248" x2="650" y2="258" stroke="#43e97b" stroke-width="1.5" marker-end="url(#pg)"/>
  <!-- B ↔ C -->
  <line x1="712" y1="252" x2="770" y2="238" stroke="#43e97b" stroke-width="1.5" marker-end="url(#pg)"/>
  <!-- A ↔ C -->
  <line x1="593" y1="215" x2="766" y2="215" stroke="#43e97b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#pg)"/>

  <!-- Green check between members -->
  <text x="620" y="258" text-anchor="middle" font-size="14" fill="#43e97b" font-weight="700">✓</text>
  <text x="740" y="248" text-anchor="middle" font-size="14" fill="#43e97b" font-weight="700">✓</text>
  <text x="680" y="212" text-anchor="middle" font-size="14" fill="#43e97b" font-weight="700">✓</text>

  <text x="680" y="320" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="600">网状通信，所有节点平等</text>

  <!-- Benefits -->
  <rect x="530" y="340" width="300" height="68" rx="8" fill="#e8f5e9"/>
  <text x="680" y="362" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="600">✅ 消除瓶颈 | 信息保真 | 自主协调</text>
  <text x="680" y="380" text-anchor="middle" font-size="11" fill="#555">成员直接交换信息，共享任务列表自主认领</text>
  <text x="680" y="398" text-anchor="middle" font-size="11" fill="#555">通信复杂度分散，无单点故障</text>
</svg>