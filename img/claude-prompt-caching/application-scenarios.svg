<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Application scenarios">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f7f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="800" fill="#0f172a">Prompt Caching 的工程经验可以迁移到所有长上下文 Agent</text>
<rect x="115" y="130" width="450" height="170" rx="28" fill="#dbeafe" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/>
<text x="340" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="24" font-weight="900" fill="#2563eb">企业代码助手</text>
<text x="340" y="230" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#334155">组织规范 / 项目规则</text>
<text x="340" y="260" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#334155">稳定前置</text>
<rect x="635" y="130" width="450" height="170" rx="28" fill="#ede9fe" stroke="#7c3aed" stroke-width="3" filter="url(#shadow)"/>
<text x="860" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="24" font-weight="900" fill="#7c3aed">多 Agent 协作</text>
<text x="860" y="230" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#334155">主会话稳定</text>
<text x="860" y="260" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#334155">子任务 hand-off</text>
<rect x="115" y="365" width="450" height="170" rx="28" fill="#fef3c7" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)"/>
<text x="340" y="420" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="24" font-weight="900" fill="#f59e0b">MCP 工具平台</text>
<text x="340" y="465" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#334155">稳定 stubs</text>
<text x="340" y="495" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#334155">完整 schema 延迟加载</text>
<rect x="635" y="365" width="450" height="170" rx="28" fill="#dcfce7" stroke="#16a34a" stroke-width="3" filter="url(#shadow)"/>
<text x="860" y="420" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="24" font-weight="900" fill="#16a34a">长文档分析</text>
<text x="860" y="465" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#334155">长上下文复用</text>
<text x="860" y="495" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#334155">新问题增量处理</text>
<circle cx="600" cy="340" r="78" fill="#111827" filter="url(#shadow)"/>
<text x="600" y="330" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="900" fill="white">核心原则</text>
<text x="600" y="360" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="800" fill="#cbd5e1">前缀稳定</text>
<line x1="600" y1="340" x2="565" y2="215" stroke="#64748b" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)" stroke-dasharray="6 8"/>
<line x1="600" y1="340" x2="635" y2="215" stroke="#64748b" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)" stroke-dasharray="6 8"/>
<line x1="600" y1="340" x2="565" y2="465" stroke="#64748b" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)" stroke-dasharray="6 8"/>
<line x1="600" y1="340" x2="635" y2="465" stroke="#64748b" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)" stroke-dasharray="6 8"/>
<text x="600" y="635" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="800" fill="#334155">只要上下文会不断增长，缓存布局就是架构设计的一部分</text>
</svg>