<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-label="Prefix Matching">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f6f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
    
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a" opacity="1">Prefix Matching：一个前缀变动，会让后面的缓存全部失效</text>
<rect x="90" y="145" width="1020" height="90" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
<rect x="90" y="155" width="210" height="70" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2" />
<text x="195.0" y="198" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#0f172a" opacity="1">A 稳定系统提示</text>
<rect x="295" y="155" width="180" height="70" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2" />
<text x="385.0" y="198" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#0f172a" opacity="1">B 工具定义</text>
<rect x="475" y="155" width="160" height="70" rx="16" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" />
<text x="555.0" y="198" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#0f172a" opacity="1">C 项目上下文</text>
<rect x="635" y="155" width="150" height="70" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" />
<text x="710.0" y="198" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#0f172a" opacity="1">D 会话上下文</text>
<rect x="785" y="155" width="165" height="70" rx="16" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
<text x="867.5" y="198" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#0f172a" opacity="1">E 新消息</text>
<line x1="200" y1="320" x2="200" y2="245" stroke="#16a34a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<text x="200" y="355" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="800" fill="#166534" opacity="1">命中</text>
<line x1="385" y1="320" x2="385" y2="245" stroke="#16a34a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<text x="385" y="355" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="800" fill="#166534" opacity="1">命中</text>
<line x1="555" y1="320" x2="555" y2="245" stroke="#16a34a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<text x="555" y="355" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="800" fill="#166534" opacity="1">命中</text>
<path d="M705 320 L705 245" fill="none" stroke="#ef4444" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M678 293 L732 347 M732 293 L678 347" fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
<text x="705" y="385" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="800" fill="#991b1b" opacity="1">这里变化</text>
<rect x="760" y="310" width="320" height="115" rx="22" fill="#fee2e2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
<text x="920" y="355" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="24" font-weight="900" fill="#991b1b" opacity="1">后续全部重算</text>
<text x="920" y="390" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="600" fill="#991b1b" opacity="1">成本与延迟突然升高</text>
<path d="M705 225 C770 270 830 275 860 310" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<rect x="170" y="500" width="860" height="70" rx="22" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" />
<text x="600" y="545" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="23" font-weight="800" fill="#1e3a8a" opacity="1">因此：时间戳、随机排序、动态工具集合都不能放在前缀里</text>
</svg>