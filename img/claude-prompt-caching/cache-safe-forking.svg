<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-label="Cache Safe Forking">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f6f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
    
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="800" fill="#0f172a" opacity="1">Cache-safe Forking：压缩不是另起炉灶，而是沿用父会话前缀</text>
<rect x="80" y="150" width="430" height="280" rx="28" fill="#eff6ff" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/>
<text x="295" y="195" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="27" font-weight="900" fill="#1e3a8a" opacity="1">父会话</text>
<rect x="145" y="240" width="300" height="38" rx="14" fill="white" stroke="#93c5fd" stroke-width="1.5" />
<text x="295" y="265" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="800" fill="#1e40af" opacity="1">System + Tools</text>
<rect x="145" y="295" width="300" height="38" rx="14" fill="white" stroke="#93c5fd" stroke-width="1.5" />
<text x="295" y="320" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="800" fill="#1e40af" opacity="1">Project + Session</text>
<rect x="145" y="350" width="300" height="38" rx="14" fill="white" stroke="#93c5fd" stroke-width="1.5" />
<text x="295" y="375" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="800" fill="#1e40af" opacity="1">Conversation History</text>
<rect x="690" y="150" width="430" height="280" rx="28" fill="#ecfdf5" stroke="#22c55e" stroke-width="3" filter="url(#shadow)"/>
<text x="905" y="195" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="27" font-weight="900" fill="#166534" opacity="1">Fork 压缩调用</text>
<rect x="755" y="240" width="300" height="38" rx="14" fill="white" stroke="#86efac" stroke-width="1.5" />
<text x="905" y="265" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="800" fill="#166534" opacity="1">相同 System + Tools</text>
<rect x="755" y="295" width="300" height="38" rx="14" fill="white" stroke="#86efac" stroke-width="1.5" />
<text x="905" y="320" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="800" fill="#166534" opacity="1">相同 Context + History</text>
<rect x="755" y="350" width="300" height="38" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" />
<text x="905" y="375" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="800" fill="#92400e" opacity="1">尾部追加 Compaction Prompt</text>
<path d="M510 290 C590 240 625 240 690 290" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowBlue)"/>
<text x="600" y="250" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="900" fill="#1e40af" opacity="1">共享前缀</text>
<path d="M510 345 C590 395 625 395 690 345" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowBlue)"/>
<text x="600" y="410" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="900" fill="#166534" opacity="1">只新增压缩指令</text>
<rect x="320" y="515" width="560" height="70" rx="22" fill="#fff7ed" stroke="#f97316" stroke-width="2" />
<text x="600" y="560" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="900" fill="#9a3412" opacity="1">避免为整段 100k 历史重新支付 uncached input cost</text>
</svg>