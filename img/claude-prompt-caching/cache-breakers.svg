<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Cache breakers">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f7f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="24" font-weight="800" fill="#0f172a">最常见的 Cache Breakers：不是大改架构，而是小变化放在了前缀里</text>
<rect x="90" y="135" width="300" height="185" rx="26" fill="#fee2e2" stroke="#ef4444" stroke-width="3" filter="url(#shadow)"/>
<text x="240" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="900" fill="#ef4444">时间戳进 System Prompt</text>
<text x="240" y="222" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#475569">每轮第一段都变</text>
<circle cx="240" cy="272" r="30" fill="#ef4444"/>
<text x="240" y="282" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="38" font-weight="900" fill="white">×</text>
<line x1="240" y1="325" x2="240" y2="385" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" stroke-dasharray="6 8"/>
<rect x="90" y="400" width="300" height="95" rx="22" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
<text x="240" y="438" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="900" fill="#166534">修复方式</text>
<text x="240" y="468" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="700" fill="#166534">改为尾部 reminder</text>
<rect x="460" y="135" width="300" height="185" rx="26" fill="#ffedd5" stroke="#f97316" stroke-width="3" filter="url(#shadow)"/>
<text x="610" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="900" fill="#f97316">工具顺序随机</text>
<text x="610" y="222" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#475569">同样工具也不相同</text>
<circle cx="610" cy="272" r="30" fill="#f97316"/>
<text x="610" y="282" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="38" font-weight="900" fill="white">×</text>
<line x1="610" y1="325" x2="610" y2="385" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" stroke-dasharray="6 8"/>
<rect x="460" y="400" width="300" height="95" rx="22" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
<text x="610" y="438" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="900" fill="#166534">修复方式</text>
<text x="610" y="468" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="700" fill="#166534">固定排序与序列化</text>
<rect x="830" y="135" width="300" height="185" rx="26" fill="#fee2e2" stroke="#ef4444" stroke-width="3" filter="url(#shadow)"/>
<text x="980" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="900" fill="#ef4444">中途切模型 / tools</text>
<text x="980" y="222" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#475569">缓存边界直接变化</text>
<circle cx="980" cy="272" r="30" fill="#ef4444"/>
<text x="980" y="282" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="38" font-weight="900" fill="white">×</text>
<line x1="980" y1="325" x2="980" y2="385" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" stroke-dasharray="6 8"/>
<rect x="830" y="400" width="300" height="95" rx="22" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
<text x="980" y="438" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="900" fill="#166534">修复方式</text>
<text x="980" y="468" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="700" fill="#166534">用 hand-off 或 tool 状态</text>
<rect x="220" y="560" width="760" height="58" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="600" y="597" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="900" fill="#1e3a8a">判断标准：会不会改变请求开头？会，就会影响后面所有缓存</text>
</svg>