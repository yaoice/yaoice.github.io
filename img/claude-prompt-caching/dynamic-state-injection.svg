<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="Dynamic State Injection">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f6f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
    
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a" opacity="1">动态状态不要改系统提示：把变化追加到尾部</text>
<rect x="70" y="115" width="500" height="430" rx="28" fill="#fff1f2" stroke="#fb7185" stroke-width="3" filter="url(#shadow)"/>
<text x="320" y="160" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="900" fill="#9f1239" opacity="1">错误：改 System Prompt</text>
<rect x="145" y="215" width="350" height="72" rx="18" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
<text x="320" y="258" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="800" fill="#991b1b" opacity="1">System Prompt + 当前时间</text>
<text x="320" y="330" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="800" fill="#991b1b" opacity="1">每轮时间都不同</text>
<path d="M250 360 L390 360 M320 290 L320 430" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M250 430 L390 290" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
<text x="320" y="505" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="900" fill="#9f1239" opacity="1">前缀从开头失效</text>
<rect x="630" y="115" width="500" height="430" rx="28" fill="#ecfdf5" stroke="#22c55e" stroke-width="3" filter="url(#shadow)"/>
<text x="880" y="160" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="900" fill="#166534" opacity="1">正确：追加动态消息</text>
<rect x="700" y="210" width="360" height="55" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2" />
<text x="880" y="245" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#14532d" opacity="1">Stable System Prompt</text>
<line x1="880" y1="270" x2="880" y2="302" stroke="#16a34a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="700" y="310" width="360" height="55" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2" />
<text x="880" y="345" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#1e3a8a" opacity="1">Stable Tools + History</text>
<line x1="880" y1="370" x2="880" y2="402" stroke="#16a34a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="700" y="410" width="360" height="65" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" />
<text x="880" y="445" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="900" fill="#92400e" opacity="1">system-reminder</text>
<text x="880" y="468" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="600" fill="#92400e" opacity="1">时间 / 文件变化 / 临时状态</text>
<text x="880" y="515" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="900" fill="#166534" opacity="1">前缀稳定，尾部增量更新</text>
</svg>