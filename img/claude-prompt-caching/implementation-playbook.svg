<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Implementation playbook">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f7f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="800" fill="#0f172a">落地路线：从 Prompt 布局到线上告警的五步闭环</text>
<rect x="60" y="165" width="190" height="235" rx="26" fill="#dbeafe" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/>
<circle cx="155" cy="205" r="28" fill="#2563eb"/>
<text x="155" y="215" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="900" fill="white">1</text>
<text x="155" y="270" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="900" fill="#2563eb">排布 Prompt</text>
<text x="155" y="320" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#334155">静态前置</text>
<text x="155" y="350" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#334155">动态后置</text>
<line x1="250" y1="282" x2="282" y2="282" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<rect x="285" y="165" width="190" height="235" rx="26" fill="#ede9fe" stroke="#7c3aed" stroke-width="3" filter="url(#shadow)"/>
<circle cx="380" cy="205" r="28" fill="#7c3aed"/>
<text x="380" y="215" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="900" fill="white">2</text>
<text x="380" y="270" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="900" fill="#7c3aed">固定 Tools</text>
<text x="380" y="320" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#334155">顺序确定</text>
<text x="380" y="350" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#334155">schema 稳定</text>
<line x1="475" y1="282" x2="507" y2="282" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<rect x="510" y="165" width="190" height="235" rx="26" fill="#fef3c7" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)"/>
<circle cx="605" cy="205" r="28" fill="#f59e0b"/>
<text x="605" y="215" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="900" fill="white">3</text>
<text x="605" y="270" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="900" fill="#f59e0b">追加状态</text>
<text x="605" y="320" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#334155">用 message</text>
<text x="605" y="350" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#334155">不用改 system</text>
<line x1="700" y1="282" x2="732" y2="282" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<rect x="735" y="165" width="190" height="235" rx="26" fill="#dcfce7" stroke="#16a34a" stroke-width="3" filter="url(#shadow)"/>
<circle cx="830" cy="205" r="28" fill="#16a34a"/>
<text x="830" y="215" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="900" fill="white">4</text>
<text x="830" y="270" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="900" fill="#16a34a">安全 Fork</text>
<text x="830" y="320" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#334155">复用父前缀</text>
<text x="830" y="350" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#334155">再追加任务</text>
<line x1="925" y1="282" x2="957" y2="282" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<rect x="960" y="165" width="190" height="235" rx="26" fill="#fee2e2" stroke="#ef4444" stroke-width="3" filter="url(#shadow)"/>
<circle cx="1055" cy="205" r="28" fill="#ef4444"/>
<text x="1055" y="215" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="900" fill="white">5</text>
<text x="1055" y="270" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="900" fill="#ef4444">监控指标</text>
<text x="1055" y="320" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#334155">hit rate</text>
<text x="1055" y="350" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#334155">uncached tokens</text>
<rect x="260" y="510" width="680" height="75" rx="22" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
<text x="600" y="553" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="900" fill="#334155">每一步都在回答同一个问题：请求开头是否还能保持完全一致？</text>
</svg>