<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-label="Prompt 布局">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f6f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
    
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="28" font-weight="800" fill="#0f172a" opacity="1">缓存友好的 Prompt 排列：越稳定，越靠前</text>
<rect x="70" y="170" width="190" height="160" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
<text x="165" y="215" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="32" font-weight="900" fill="#16a34a" opacity="1">1</text>
<text x="165" y="258" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="800" fill="#0f172a" opacity="1">System Prompt</text>
<text x="165" y="292" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#475569" opacity="1">跨会话稳定</text>
<line x1="265" y1="250" x2="305" y2="250" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="290" y="170" width="190" height="160" rx="22" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
<text x="385" y="215" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="32" font-weight="900" fill="#2563eb" opacity="1">2</text>
<text x="385" y="258" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="800" fill="#0f172a" opacity="1">Tool Definitions</text>
<text x="385" y="292" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#475569" opacity="1">顺序必须确定</text>
<line x1="485" y1="250" x2="525" y2="250" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="510" y="170" width="190" height="160" rx="22" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="605" y="215" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="32" font-weight="900" fill="#7c3aed" opacity="1">3</text>
<text x="605" y="258" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="800" fill="#0f172a" opacity="1">CLAUDE.md</text>
<text x="605" y="292" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#475569" opacity="1">项目级复用</text>
<line x1="705" y1="250" x2="745" y2="250" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="730" y="170" width="190" height="160" rx="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<text x="825" y="215" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="32" font-weight="900" fill="#f59e0b" opacity="1">4</text>
<text x="825" y="258" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="800" fill="#0f172a" opacity="1">Session Context</text>
<text x="825" y="292" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#475569" opacity="1">同会话复用</text>
<line x1="925" y1="250" x2="965" y2="250" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="950" y="170" width="190" height="160" rx="22" fill="#fee2e2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
<text x="1045" y="215" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="32" font-weight="900" fill="#ef4444" opacity="1">5</text>
<text x="1045" y="258" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="800" fill="#0f172a" opacity="1">Conversation</text>
<text x="1045" y="292" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#475569" opacity="1">逐轮增长</text>
<rect x="85" y="410" width="610" height="80" rx="22" fill="#ecfdf5" stroke="#22c55e" stroke-width="2" />
<text x="390" y="458" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="24" font-weight="800" fill="#166534" opacity="1">长而稳定的前缀：最值得缓存</text>
<rect x="760" y="410" width="330" height="80" rx="22" fill="#fff1f2" stroke="#fb7185" stroke-width="2" />
<text x="925" y="458" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="24" font-weight="800" fill="#9f1239" opacity="1">短而动态的尾部：每轮新增</text>
<path d="M110 390 C250 360 510 360 680 390" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M790 390 C880 365 1000 365 1080 390" fill="none" stroke="#fb7185" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<text x="600" y="585" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="700" fill="#334155" opacity="1">设计目标：让多个请求共享尽可能长的一段“开头完全相同”的内容</text>
</svg>