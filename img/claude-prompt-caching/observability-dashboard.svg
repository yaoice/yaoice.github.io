<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Observability dashboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f7f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="800" fill="#0f172a">像监控 Uptime 一样监控 Prompt Cache Hit Rate</text>
<rect x="75" y="105" width="1050" height="510" rx="28" fill="#0f172a" stroke="#111827" stroke-width="2" filter="url(#shadow)"/>
<text x="600" y="150" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="24" font-weight="900" fill="#e5e7eb">Agent Cache Observability</text>
<rect x="120" y="190" width="215" height="125" rx="20" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
<text x="227" y="230" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="800" fill="#334155">Cache Hit Rate</text>
<text x="227" y="280" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="31" font-weight="900" fill="#22c55e">96.8%</text>
<rect x="375" y="190" width="215" height="125" rx="20" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="482" y="230" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="800" fill="#334155">Uncached Input</text>
<text x="482" y="280" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="31" font-weight="900" fill="#2563eb">低</text>
<rect x="630" y="190" width="215" height="125" rx="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
<text x="737" y="230" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="800" fill="#334155">First Token Latency</text>
<text x="737" y="280" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="31" font-weight="900" fill="#f59e0b">稳定</text>
<rect x="885" y="190" width="215" height="125" rx="20" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="992" y="230" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="800" fill="#334155">Cost / Session</text>
<text x="992" y="280" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="31" font-weight="900" fill="#7c3aed">可预测</text>
<rect x="125" y="355" width="615" height="205" rx="20" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
<text x="432" y="390" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="900" fill="#334155">命中率趋势</text>
<line x1="175" y1="515" x2="690" y2="515" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<line x1="175" y1="515" x2="175" y2="415" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<path d="M190 435 C285 430 345 438 410 425 C500 405 600 415 675 390" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M190 490 C320 492 430 500 520 494 C590 490 635 488 675 486" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 8"/>
<text x="395" y="545" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="700" fill="#475569">绿色：hit rate；红色虚线：miss rate</text>
<rect x="780" y="355" width="300" height="205" rx="20" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
<text x="930" y="392" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="900" fill="#9a3412">告警规则</text>
<circle cx="825" cy="435" r="8" fill="#f97316"/>
<text x="940" y="441" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#9a3412">短时间突降</text>
<circle cx="825" cy="477" r="8" fill="#f97316"/>
<text x="940" y="483" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#9a3412">uncached token 异常</text>
<circle cx="825" cy="519" r="8" fill="#f97316"/>
<text x="940" y="525" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#9a3412">compaction 成本升高</text>
</svg>