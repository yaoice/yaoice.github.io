<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Claude Code Prompt Caching 架构总览">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f6f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
    
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a" opacity="1">Claude Code 的 Prompt Caching 位于整条 Agent 供给链中</text>
<rect x="50" y="130" width="190" height="130" rx="24" fill="white" stroke="#93c5fd" stroke-width="2" filter="url(#shadow)"/>
<text x="145.0" y="162" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="700" fill="#0f172a" opacity="1">开发者</text>
<text x="145.0" y="192" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="500" fill="#475569" opacity="1">提出任务 / 验收结果</text>
<rect x="285" y="110" width="250" height="170" rx="24" fill="white" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
<text x="410.0" y="142" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="700" fill="#0f172a" opacity="1">Claude Code</text>
<text x="410.0" y="172" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="500" fill="#475569" opacity="1">CLI / IDE / Agent Harness</text>
<rect x="590" y="105" width="260" height="50" rx="14" fill="#dcfce7" stroke="#94a3b8" stroke-width="1.5" />
<text x="720" y="137" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#0f172a" opacity="1">System Prompt</text>
<rect x="590" y="175" width="260" height="50" rx="14" fill="#e0f2fe" stroke="#94a3b8" stroke-width="1.5" />
<text x="720" y="207" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#0f172a" opacity="1">Tools</text>
<rect x="590" y="245" width="260" height="50" rx="14" fill="#ede9fe" stroke="#94a3b8" stroke-width="1.5" />
<text x="720" y="277" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#0f172a" opacity="1">CLAUDE.md</text>
<rect x="590" y="315" width="260" height="50" rx="14" fill="#fef3c7" stroke="#94a3b8" stroke-width="1.5" />
<text x="720" y="347" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#0f172a" opacity="1">Session</text>
<rect x="590" y="385" width="260" height="50" rx="14" fill="#ffedd5" stroke="#94a3b8" stroke-width="1.5" />
<text x="720" y="417" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#0f172a" opacity="1">Messages</text>
<text x="720" y="86" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#334155" opacity="1">稳定前缀从上到下拼装</text>
<rect x="905" y="185" width="230" height="145" rx="24" fill="#dbeafe" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/>
<text x="1020" y="238" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="800" fill="#1e3a8a" opacity="1">Prompt Cache</text>
<text x="1020" y="275" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="600" fill="#1e40af" opacity="1">复用稳定前缀计算结果</text>
<rect x="925" y="395" width="190" height="95" rx="22" fill="#fff7ed" stroke="#f97316" stroke-width="2" />
<text x="1020" y="432" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="800" fill="#9a3412" opacity="1">Claude Model</text>
<text x="1020" y="462" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#9a3412" opacity="1">只处理新增尾部</text>
<line x1="240" y1="195" x2="285" y2="195" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<line x1="535" y1="195" x2="590" y2="195" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<line x1="850" y1="245" x2="905" y2="245" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<line x1="1020" y1="330" x2="1020" y2="390" stroke="#f97316" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M925 445 C760 610 330 575 175 300" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 8" marker-end="url(#arrow)"/>
<text x="540" y="625" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="700" fill="#0f172a" opacity="1">关键直觉：缓存不是模型旁边的小优化，而是 Agent 每轮请求的基础设施</text>
</svg>