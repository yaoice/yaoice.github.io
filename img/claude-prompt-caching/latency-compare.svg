<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-label="Latency Compare">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f6f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
    
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a" opacity="1">缓存命中让 Agent 更快进入“新增问题”的推理阶段</text>
<rect x="90" y="120" width="460" height="420" rx="28" fill="#fff1f2" stroke="#fb7185" stroke-width="3" filter="url(#shadow)"/>
<text x="320" y="165" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="28" font-weight="900" fill="#9f1239" opacity="1">缓存未命中</text>
<rect x="160" y="215" width="320" height="40" rx="14" fill="white" stroke="#fecdd3" stroke-width="1.5" />
<text x="320" y="242" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#881337" opacity="1">重读系统提示</text>
<line x1="320" y1="257" x2="320" y2="270" stroke="#fb7185" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="160" y="273" width="320" height="40" rx="14" fill="white" stroke="#fecdd3" stroke-width="1.5" />
<text x="320" y="300" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#881337" opacity="1">重读工具定义</text>
<line x1="320" y1="315" x2="320" y2="328" stroke="#fb7185" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="160" y="331" width="320" height="40" rx="14" fill="white" stroke="#fecdd3" stroke-width="1.5" />
<text x="320" y="358" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#881337" opacity="1">重读历史消息</text>
<line x1="320" y1="373" x2="320" y2="386" stroke="#fb7185" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="160" y="389" width="320" height="40" rx="14" fill="white" stroke="#fecdd3" stroke-width="1.5" />
<text x="320" y="416" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#881337" opacity="1">处理新增请求</text>
<line x1="320" y1="431" x2="320" y2="444" stroke="#fb7185" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="160" y="447" width="320" height="40" rx="14" fill="white" stroke="#fecdd3" stroke-width="1.5" />
<text x="320" y="474" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#881337" opacity="1">开始输出</text>
<rect x="650" y="120" width="460" height="420" rx="28" fill="#ecfdf5" stroke="#22c55e" stroke-width="3" filter="url(#shadow)"/>
<text x="880" y="165" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="28" font-weight="900" fill="#166534" opacity="1">缓存命中</text>
<rect x="720" y="245" width="320" height="48" rx="16" fill="white" stroke="#bbf7d0" stroke-width="1.5" />
<text x="880" y="276" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="800" fill="#14532d" opacity="1">复用稳定前缀</text>
<line x1="880" y1="295" x2="880" y2="315" stroke="#22c55e" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="720" y="323" width="320" height="48" rx="16" fill="white" stroke="#bbf7d0" stroke-width="1.5" />
<text x="880" y="354" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="800" fill="#14532d" opacity="1">处理新增请求</text>
<line x1="880" y1="373" x2="880" y2="393" stroke="#22c55e" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="720" y="401" width="320" height="48" rx="16" fill="white" stroke="#bbf7d0" stroke-width="1.5" />
<text x="880" y="432" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="800" fill="#14532d" opacity="1">开始输出</text>
<rect x="210" y="575" width="220" height="38" rx="19" fill="#fecdd3" stroke="#fb7185" stroke-width="1" />
<text x="320" y="600" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#9f1239" opacity="1">重复工作多</text>
<rect x="770" y="575" width="220" height="38" rx="19" fill="#bbf7d0" stroke="#22c55e" stroke-width="1" />
<text x="880" y="600" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#166534" opacity="1">首 Token 更快</text>
</svg>