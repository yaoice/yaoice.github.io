<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Prompt caching cost curve">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f7f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="800" fill="#0f172a">成本直觉：缓存把长会话从“每轮重算”变成“增量处理”</text>
<rect x="105" y="115" width="990" height="470" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
<line x1="190" y1="510" x2="1030" y2="510" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
<line x1="190" y1="510" x2="190" y2="165" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
<line x1="210" y1="510" x2="210" y2="500" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<text x="210" y="545" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#64748b">第 1 轮</text>
<line x1="460" y1="510" x2="460" y2="500" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<text x="460" y="545" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#64748b">第 10 轮</text>
<line x1="710" y1="510" x2="710" y2="500" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<text x="710" y="545" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#64748b">第 50 轮</text>
<line x1="960" y1="510" x2="960" y2="500" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<text x="960" y="545" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#64748b">第 100 轮</text>
<line x1="185" y1="470" x2="195" y2="470" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<text x="155" y="475" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#64748b">低</text>
<line x1="185" y1="345" x2="195" y2="345" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<text x="155" y="350" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#64748b">中</text>
<line x1="185" y1="220" x2="195" y2="220" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<text x="155" y="225" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#64748b">高</text>
<path d="M210 470 C390 440 520 350 655 280 C780 210 900 175 1015 150" fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M210 470 C410 425 590 405 760 395 C885 388 960 386 1015 385" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="720" y="125" width="300" height="72" rx="20" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
<text x="870" y="158" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="900" fill="#991b1b">缓存命中率低</text>
<text x="870" y="184" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#991b1b">长会话越往后越贵</text>
<rect x="730" y="410" width="300" height="72" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="880" y="443" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="900" fill="#166534">缓存命中率高</text>
<text x="880" y="469" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#166534">主要为新增尾部付费</text>
<text x="600" y="625" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#334155">图中曲线为概念示意：重点是边际成本随会话增长的差异</text>
</svg>