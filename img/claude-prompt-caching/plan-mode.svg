<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-label="Plan Mode">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f6f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
    
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a" opacity="1">Plan Mode：模式变化用工具表达，工具集合保持不变</text>
<rect x="115" y="140" width="360" height="340" rx="28" fill="#eff6ff" stroke="#3b82f6" stroke-width="3" filter="url(#shadow)"/>
<text x="295" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="27" font-weight="900" fill="#1e3a8a" opacity="1">Normal Mode</text>
<rect x="185" y="235" width="220" height="65" rx="18" fill="white" stroke="#93c5fd" stroke-width="2" />
<text x="295" y="276" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="800" fill="#0f172a" opacity="1">读文件 + 编辑文件</text>
<rect x="185" y="325" width="220" height="65" rx="18" fill="white" stroke="#93c5fd" stroke-width="2" />
<text x="295" y="366" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="800" fill="#0f172a" opacity="1">测试 + 提交修改</text>
<rect x="725" y="140" width="360" height="340" rx="28" fill="#fff7ed" stroke="#f97316" stroke-width="3" filter="url(#shadow)"/>
<text x="905" y="185" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="27" font-weight="900" fill="#9a3412" opacity="1">Plan Mode</text>
<rect x="795" y="235" width="220" height="65" rx="18" fill="white" stroke="#fdba74" stroke-width="2" />
<text x="905" y="276" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="800" fill="#0f172a" opacity="1">探索代码库</text>
<rect x="795" y="325" width="220" height="65" rx="18" fill="white" stroke="#fdba74" stroke-width="2" />
<text x="905" y="366" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="800" fill="#0f172a" opacity="1">输出计划，不编辑</text>
<path d="M480 250 C560 185 650 185 725 250" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowBlue)"/>
<text x="600" y="205" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#1e40af" opacity="1">EnterPlanMode 工具</text>
<path d="M725 375 C645 455 560 455 480 375" fill="none" stroke="#f97316" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="600" y="470" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#9a3412" opacity="1">ExitPlanMode 工具</text>
<rect x="380" y="535" width="440" height="70" rx="22" fill="#ecfdf5" stroke="#22c55e" stroke-width="2" />
<text x="600" y="580" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="800" fill="#166534" opacity="1">同一套工具定义始终在前缀里，缓存不被模式切换打断</text>
</svg>