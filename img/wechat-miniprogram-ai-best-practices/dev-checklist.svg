<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="520" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">落地检查清单：从产品设计到文案上线</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">每个阶段的关键检查点，确保 AI 行为可预测、用户体验自然</text>

  <!-- Column headers -->
  <rect x="30" y="75" width="30" height="24" rx="4" fill="#f8fafc"/>
  <rect x="65" y="75" width="180" height="24" rx="4" fill="#f8fafc"/>
  <text x="155" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#64748b">检查点</text>
  <rect x="250" y="75" width="390" height="24" rx="4" fill="#f8fafc"/>
  <text x="445" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#64748b">具体要求</text>
  <rect x="645" y="75" width="140" height="24" rx="4" fill="#f8fafc"/>
  <text x="715" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#64748b">阶段</text>
  <rect x="790" y="75" width="140" height="24" rx="4" fill="#f8fafc"/>
  <text x="860" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#64748b">常见反模式</text>

  <!-- Row 1 -->
  <rect x="30" y="105" width="900" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="128" font-size="12" font-weight="600" fill="#3b82f6">☐ 1</text>
  <text x="75" y="128" font-size="12" fill="#1e293b">界面能承接模糊意图</text>
  <text x="260" y="128" font-size="11" fill="#475569">用户说"想喝清爽的" → AI 理解并推荐，不要求填写表单</text>
  <rect x="655" y="112" width="55" height="22" rx="11" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="682" y="127" text-anchor="middle" font-size="10" fill="#1e40af">产品</text>
  <text x="800" y="128" font-size="10" fill="#64748b">入口就是表单，AI 只嵌在角落</text>

  <!-- Row 2 -->
  <rect x="30" y="147" width="900" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="170" font-size="12" font-weight="600" fill="#3b82f6">☐ 2</text>
  <text x="75" y="170" font-size="12" fill="#1e293b">自然语言可修改内容</text>
  <text x="260" y="170" font-size="11" fill="#475569">规格/时间/地点等可对话修改，无需返回上一页</text>
  <rect x="655" y="154" width="55" height="22" rx="11" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="682" y="169" text-anchor="middle" font-size="10" fill="#1e40af">产品</text>
  <text x="800" y="170" font-size="10" fill="#64748b">修改需要跳出对话重新填表</text>

  <!-- Row 3 -->
  <rect x="30" y="189" width="900" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="212" font-size="12" font-weight="600" fill="#3b82f6">☐ 3</text>
  <text x="75" y="212" font-size="12" fill="#1e293b">历史资产可查询可操作</text>
  <text x="260" y="212" font-size="11" fill="#475569">"再来一杯上次的"、"用积分兑换" 等指令可执行</text>
  <rect x="655" y="196" width="55" height="22" rx="11" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="682" y="211" text-anchor="middle" font-size="10" fill="#1e40af">产品</text>
  <text x="800" y="212" font-size="10" fill="#64748b">每次都得从零开始走完整流程</text>

  <!-- Row 4 -->
  <rect x="30" y="231" width="900" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="254" font-size="12" font-weight="600" fill="#3b82f6">☐ 4</text>
  <text x="75" y="254" font-size="12" fill="#1e293b">服务状态动态实时更新</text>
  <text x="260" y="254" font-size="11" fill="#475569">订单/服务卡片随状态推进而变，非静态快照</text>
  <rect x="655" y="238" width="55" height="22" rx="11" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="682" y="253" text-anchor="middle" font-size="10" fill="#1e40af">产品</text>
  <text x="800" y="254" font-size="10" fill="#64748b">卡片展示后永远不变，错过后继状态</text>

  <!-- Row 5 -->
  <rect x="30" y="273" width="900" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="296" font-size="12" font-weight="600" fill="#8b5cf6">☐ 5</text>
  <text x="75" y="296" font-size="12" fill="#1e293b">接口名语义化</text>
  <text x="260" y="296" font-size="11" fill="#475569">searchDrinks 而非 search；首句声明业务对象而非入参</text>
  <rect x="655" y="280" width="55" height="22" rx="11" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="682" y="295" text-anchor="middle" font-size="10" fill="#6d28d9">接口</text>
  <text x="800" y="296" font-size="10" fill="#64748b">接口名泛化，description 写内部实现</text>

  <!-- Row 6 -->
  <rect x="30" y="315" width="900" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="338" font-size="12" font-weight="600" fill="#8b5cf6">☐ 6</text>
  <text x="75" y="338" font-size="12" fill="#1e293b">字段 description 多样化举例 + 缺省处理</text>
  <text x="260" y="338" font-size="11" fill="#475569">含多个典型值示例，明确"用户未说出时不要填"，ID 标注入参来源</text>
  <rect x="655" y="322" width="55" height="22" rx="11" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="682" y="337" text-anchor="middle" font-size="10" fill="#6d28d9">接口</text>
  <text x="800" y="338" font-size="10" fill="#64748b">字段描述只有一句话，ID 类无取值来源说明</text>

  <!-- Row 7 -->
  <rect x="30" y="357" width="900" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="380" font-size="12" font-weight="600" fill="#10b981">☐ 7</text>
  <text x="75" y="380" font-size="12" fill="#1e293b">content 事实+动作两段式</text>
  <text x="260" y="380" font-size="11" fill="#475569">先陈述客观状态，再给出下一步动作；失败返回含三条要素</text>
  <rect x="655" y="364" width="55" height="22" rx="11" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="682" y="379" text-anchor="middle" font-size="10" fill="#065f46">content</text>
  <text x="800" y="380" font-size="10" fill="#64748b">只给动作不给事实；错误无出口指引</text>

  <!-- Row 8 -->
  <rect x="30" y="399" width="900" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="422" font-size="12" font-weight="600" fill="#f59e0b">☐ 8</text>
  <text x="75" y="422" font-size="12" fill="#1e293b">SKILL.md 只写流程编排不写单接口功能</text>
  <text x="260" y="422" font-size="11" fill="#475569">流程走向、接口依赖、跨接口约束、意图分流；接口清单只含前置条件和上下游关系</text>
  <rect x="655" y="406" width="55" height="22" rx="11" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="682" y="421" text-anchor="middle" font-size="10" fill="#b45309">编排</text>
  <text x="800" y="422" font-size="10" fill="#64748b">SKILL.md 膨胀为接口功能手册</text>

  <!-- Row 9 -->
  <rect x="30" y="441" width="900" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="464" font-size="12" font-weight="600" fill="#f59e0b">☐ 9</text>
  <text x="75" y="464" font-size="12" fill="#1e293b">上行消息用户视角</text>
  <text x="260" y="464" font-size="11" fill="#475569">第一人称、自然表达、不夹杂系统播报感、隐私信息脱敏</text>
  <rect x="655" y="448" width="55" height="22" rx="11" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="682" y="463" text-anchor="middle" font-size="10" fill="#b45309">文案</text>
  <text x="800" y="464" font-size="10" fill="#64748b">"系统已为您生成订单"之类的机器人腔</text>

  <!-- Bottom -->
  <rect x="30" y="488" width="900" height="25" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="505" text-anchor="middle" font-size="10" fill="#94a3b8">逐项核查，按阶段收束：产品 → 接口 → content → 编排 → 文案。满分 9 项，6+ 为及格线</text>
</svg>