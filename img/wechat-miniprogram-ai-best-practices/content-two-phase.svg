<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="440" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">content 返回规范：事实 + 动作两段式</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">先陈述本次返回的客观状态，再给出下一步动作 — 缺一则模型可能误解意图</text>

  <!-- Bad example (left) -->
  <rect x="30" y="80" width="440" height="200" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" filter="url(#sd)"/>
  <rect x="30" y="80" width="80" height="28" rx="6" fill="#ef4444"/>
  <text x="70" y="99" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">反例</text>
  <text x="120" y="99" font-size="13" font-weight="600" fill="#991b1b">仅给动作，缺少事实</text>

  <rect x="50" y="120" width="400" height="65" rx="6" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
  <text x="65" y="140" font-size="11" fill="#475569">content:</text>
  <text x="75" y="158" font-size="11" font-family="monospace" fill="#1e293b">"接下来请务必为用户展示订单确认卡片。"</text>
  <text x="65" y="176" font-size="11" fill="#64748b">↳ 模型不知道"为什么"要展示，缺少上下文锚点</text>

  <!-- Good example (right) -->
  <rect x="490" y="80" width="440" height="200" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#sd)"/>
  <rect x="490" y="80" width="80" height="28" rx="6" fill="#10b981"/>
  <text x="530" y="99" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">正例</text>
  <text x="580" y="99" font-size="13" font-weight="600" fill="#065f46">事实 + 动作</text>

  <rect x="510" y="120" width="400" height="80" rx="6" fill="#fff" stroke="#6ee7b7" stroke-width="1"/>
  <text x="525" y="140" font-size="11" fill="#475569">content:</text>
  <text x="535" y="158" font-size="11" font-family="monospace" fill="#1e293b">"已根据所选规格生成订单。</text>
  <text x="535" y="176" font-size="11" font-family="monospace" fill="#1e293b"> 请展示订单确认卡片，并用一句话</text>
  <text x="535" y="194" font-size="11" font-family="monospace" fill="#1e293b"> 引导用户核对后下单。"</text>

  <!-- Arrow -->
  <line x1="475" y1="180" x2="485" y2="180" stroke="#10b981" stroke-width="2"/>

  <!-- Bottom: Failure pattern -->
  <rect x="30" y="300" width="900" height="120" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1" filter="url(#sd)"/>
  <text x="55" y="325" font-size="13" font-weight="600" fill="#1e293b">失败 / 空结果的三要素</text>

  <rect x="50" y="340" width="280" height="65" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="70" cy="360" r="11" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="70" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">1</text>
  <text x="90" y="365" font-size="12" fill="#1e293b">陈述具体事实</text>
  <text x="90" y="385" font-size="11" fill="#64748b">「未匹配到"圣诞限定款"饮品」</text>

  <rect x="340" y="340" width="280" height="65" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="360" cy="360" r="11" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="360" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">2</text>
  <text x="380" y="365" font-size="12" fill="#1e293b">给出下一步出口</text>
  <text x="380" y="385" font-size="11" fill="#64748b">「请引导用户在本店热销饮品中挑选」</text>

  <rect x="630" y="340" width="280" height="65" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="650" cy="360" r="11" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="650" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">3</text>
  <text x="670" y="365" font-size="12" fill="#1e293b">指出不应做的动作</text>
  <text x="670" y="385" font-size="11" fill="#64748b">「不要以相同关键词重复调本接口」</text>
</svg>