<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#94a3b8"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">SKILL 封装架构：三层信息源分工</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">每个信息源有自己的职责边界，写错位置 = 模型行为不可控</text>

  <!-- Layer 1: SKILL.md (top, broad) -->
  <rect x="60" y="80" width="840" height="90" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#sd)"/>
  <rect x="60" y="80" width="160" height="90" rx="8" fill="#3b82f6"/>
  <text x="140" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">SKILL.md</text>
  <text x="140" y="140" text-anchor="middle" font-size="10" fill="#bfdbfe">注意力 ★★★</text>
  <text x="250" y="105" font-size="13" font-weight="600" fill="#1e293b">业务流程编排 · 跨接口规则 · 意图分流 · 通用规范</text>
  <text x="250" y="128" font-size="11" fill="#475569">描述「整个业务怎么跑」：流程走向、接口依赖、跨接口约束、输出形态规则</text>
  <text x="250" y="148" font-size="11" fill="#64748b">写在这里的应该是"前置条件+上下游关系"，不是单个接口的功能描述</text>

  <!-- Arrow down -->
  <line x1="480" y1="175" x2="480" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: mcp.json (middle, detailed) -->
  <rect x="60" y="200" width="840" height="100" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#sd)"/>
  <rect x="60" y="200" width="160" height="100" rx="8" fill="#8b5cf6"/>
  <text x="140" y="235" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">mcp.json</text>
  <text x="140" y="260" text-anchor="middle" font-size="10" fill="#ddd6fe">注意力 ★★★★/★★★★★</text>
  <text x="250" y="225" font-size="13" font-weight="600" fill="#1e293b">原子接口声明：description + inputSchema.description</text>
  <text x="250" y="248" font-size="11" fill="#475569">描述「单个接口怎么用」：接口功能、调用时机、参数语义、取值来源、缺省处理</text>
  <text x="250" y="270" font-size="11" fill="#64748b">接口 description 影响「选不选这个接口」；inputSchema.description 影响「怎么填参数」</text>

  <!-- Arrow down -->
  <line x1="480" y1="305" x2="480" y2="325" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: content (bottom, immediate) -->
  <rect x="60" y="330" width="840" height="90" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#sd)"/>
  <rect x="60" y="330" width="160" height="90" rx="8" fill="#10b981"/>
  <text x="140" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">content</text>
  <text x="140" y="390" text-anchor="middle" font-size="10" fill="#a7f3d0">注意力 ★★★★★</text>
  <text x="250" y="355" font-size="13" font-weight="600" fill="#1e293b">原子接口返回：事实 + 动作两段式</text>
  <text x="250" y="378" font-size="11" fill="#475569">离决策点最近，模型当做「事实+动作」读取。错误话术在此会直接偏离 SKILL.md 约定</text>
  <text x="250" y="398" font-size="11" fill="#64748b">structuredContent 承载卡片展示数据；_meta 传递渲染需要但 AI 无需理解的数据</text>

  <!-- Bottom note -->
  <rect x="30" y="440" width="900" height="45" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="462" text-anchor="middle" font-size="11" fill="#64748b">上层定义流程走向，中层约束接口选型与参数填写，下层承载即时决策上下文 — 三层各有边界，不可越俎代庖</text>
</svg>