<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="380" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">信息源注意力权重对比</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">权重越高，信息越接近决策点；写错位置会显著降低模型准确率</text>

  <!-- Bar 1: content ★★★★★ -->
  <rect x="60" y="80" width="840" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="60" y="80" width="840" height="50" rx="8" fill="#ecfdf5"/>
  <text x="80" y="110" font-size="14" font-weight="600" fill="#065f46">content</text>
  <text x="180" y="110" font-size="12" fill="#475569">原子接口返回，离当前决策点最近</text>
  <text x="750" y="110" font-size="13" font-weight="700" fill="#10b981">★★★★★</text>
  <text x="870" y="110" font-size="11" fill="#64748b">最高</text>

  <!-- Bar 2: description ★★★★ -->
  <rect x="60" y="145" width="820" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="60" y="145" width="820" height="50" rx="8" fill="#f5f3ff"/>
  <text x="80" y="175" font-size="14" font-weight="600" fill="#6d28d9">mcp.json · description</text>
  <text x="300" y="175" font-size="12" fill="#475569">影响模型选不选这个接口</text>
  <text x="730" y="175" font-size="13" font-weight="700" fill="#8b5cf6">★★★★</text>

  <!-- Bar 3: inputSchema.description ★★★★ -->
  <rect x="60" y="210" width="820" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="60" y="210" width="820" height="50" rx="8" fill="#f5f3ff"/>
  <text x="80" y="240" font-size="14" font-weight="600" fill="#6d28d9">mcp.json · inputSchema.description</text>
  <text x="400" y="240" font-size="12" fill="#475569">影响模型怎么填参数</text>
  <text x="730" y="240" font-size="13" font-weight="700" fill="#8b5cf6">★★★★</text>

  <!-- Bar 4: SKILL.md ★★★ -->
  <rect x="60" y="275" width="700" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="60" y="275" width="700" height="50" rx="8" fill="#eff6ff"/>
  <text x="80" y="305" font-size="14" font-weight="600" fill="#1e40af">SKILL.md</text>
  <text x="200" y="305" font-size="12" fill="#475569">适合写业务流程编排、跨接口规则</text>
  <text x="610" y="305" font-size="13" font-weight="700" fill="#3b82f6">★★★</text>

  <!-- Key insight -->
  <rect x="30" y="340" width="900" height="30" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="360" text-anchor="middle" font-size="11" fill="#64748b">硬约束放在权重更高处；同一约束只写一处（避免不一致）；每条禁令配一个明确的替代动作</text>
</svg>