<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#94a3b8"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="420" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">产品设计 4 条核心原则</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">让 AI 主动承接模糊意图，而非把用户绑死在表单上</text>

  <!-- Principle 1 -->
  <rect x="30" y="80" width="210" height="130" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sd)"/>
  <circle cx="55" cy="105" r="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="55" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">1</text>
  <text x="135" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">承接模糊意图</text>
  <text x="135" y="138" text-anchor="middle" font-size="11" fill="#475569">"想喝点清爽的"→ AI 理解</text>
  <text x="135" y="158" text-anchor="middle" font-size="11" fill="#475569">后推荐，再引导至原子组件</text>
  <text x="135" y="178" text-anchor="middle" font-size="11" fill="#475569">完成确认和下单</text>

  <!-- Arrow 1→2 -->
  <line x1="245" y1="145" x2="275" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Principle 2 -->
  <rect x="280" y="80" width="210" height="130" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sd)"/>
  <circle cx="305" cy="105" r="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="305" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">2</text>
  <text x="385" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">自然语言修改</text>
  <text x="385" y="138" text-anchor="middle" font-size="11" fill="#475569">无需跳出对话，直接对话</text>
  <text x="385" y="158" text-anchor="middle" font-size="11" fill="#475569">修改规格、时间、地点等</text>
  <text x="385" y="178" text-anchor="middle" font-size="11" fill="#475569">枚举值和明确实体的字段</text>

  <!-- Arrow 2→3 -->
  <line x1="495" y1="145" x2="525" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Principle 3 -->
  <rect x="530" y="80" width="210" height="130" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sd)"/>
  <circle cx="555" cy="105" r="14" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="555" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">3</text>
  <text x="635" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">历史可查询/可操作</text>
  <text x="635" y="138" text-anchor="middle" font-size="11" fill="#475569">"再来一杯上次喝的"</text>
  <text x="635" y="158" text-anchor="middle" font-size="11" fill="#475569">"用积分兑换一张优惠券"</text>
  <text x="635" y="178" text-anchor="middle" font-size="11" fill="#475569">提升高频场景使用效率</text>

  <!-- Principle 4 (below row) -->
  <rect x="300" y="240" width="360" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#sd)"/>
  <circle cx="325" cy="280" r="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="325" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">4</text>
  <text x="450" y="275" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">服务进程动态实时更新</text>
  <text x="450" y="300" text-anchor="middle" font-size="11" fill="#475569">订单/服务原子组件随状态推进动态更新，防止用户错过关键信息</text>

  <!-- Key takeaway -->
  <rect x="30" y="350" width="900" height="50" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="370" text-anchor="middle" font-size="12" fill="#64748b">核心理念：AI 是对话的主动参与者，不是被动的表单填空工具 — 它理解意图、引导流程、动态响应</text>
  <text x="480" y="390" text-anchor="middle" font-size="11" fill="#94a3b8">案例参考：WeStoreCafe 点单 SKILL</text>
</svg>