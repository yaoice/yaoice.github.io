<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="620" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Claude Code 会话管理决策树</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">完成任务后，根据下一步需求选择合适的策略</text>

  <!-- Start node -->
  <rect x="360" y="80" width="240" height="44" rx="22" fill="#1e293b"/>
  <text x="480" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">Claude 完成当前任务</text>

  <line x1="480" y1="124" x2="480" y2="148" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision diamond -->
  <polygon points="480,155 620,210 480,265 340,210" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <text x="480" y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">下一步需要</text>
  <text x="480" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">什么？</text>

  <!-- 4 branches -->
  <!-- Continue 左侧 -->
  <line x1="340" y1="210" x2="120" y2="210" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="120" y1="210" x2="120" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="200" text-anchor="middle" font-size="10" fill="#64748b">上下文仍相关</text>
  <rect x="40" y="300" width="160" height="65" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="120" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">继续对话</text>
  <text x="120" y="344" text-anchor="middle" font-size="10" fill="#064e3b">Continue</text>
  <rect x="40" y="375" width="160" height="65" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
  <text x="120" y="394" text-anchor="middle" font-size="10" fill="#065f46">不浪费已有上下文</text>
  <text x="120" y="410" text-anchor="middle" font-size="10" fill="#065f46">适合：后续文档/</text>
  <text x="120" y="425" text-anchor="middle" font-size="10" fill="#065f46">迭代同一功能</text>

  <!-- Rewind -->
  <line x1="430" y1="255" x2="325" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="370" y="285" text-anchor="middle" font-size="10" fill="#64748b">方向错误</text>
  <rect x="240" y="300" width="160" height="65" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="320" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">回退 Rewind</text>
  <text x="320" y="344" text-anchor="middle" font-size="10" fill="#78350f">Esc Esc / /rewind</text>
  <rect x="240" y="375" width="160" height="65" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1"/>
  <text x="320" y="394" text-anchor="middle" font-size="10" fill="#92400e">保留文件读取</text>
  <text x="320" y="410" text-anchor="middle" font-size="10" fill="#92400e">删除失败尝试</text>
  <text x="320" y="425" text-anchor="middle" font-size="10" fill="#92400e">用新知识重新提示</text>

  <!-- Compact -->
  <line x1="530" y1="255" x2="625" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="585" y="285" text-anchor="middle" font-size="10" fill="#64748b">上下文过时</text>
  <rect x="540" y="300" width="160" height="65" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="620" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">压缩 Compact</text>
  <text x="620" y="344" text-anchor="middle" font-size="10" fill="#6b21a8">/compact &lt;hint&gt;</text>
  <rect x="540" y="375" width="160" height="65" rx="6" fill="#ffffff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="620" y="394" text-anchor="middle" font-size="10" fill="#5b21b6">低工作量</text>
  <text x="620" y="410" text-anchor="middle" font-size="10" fill="#5b21b6">可用 hint 引导</text>
  <text x="620" y="425" text-anchor="middle" font-size="10" fill="#5b21b6">长调试后继续开发</text>

  <!-- Clear 右侧 -->
  <line x1="620" y1="210" x2="840" y2="210" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="840" y1="210" x2="840" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="730" y="200" text-anchor="middle" font-size="10" fill="#64748b">全新任务</text>
  <rect x="760" y="300" width="160" height="65" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="840" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">清除 Clear</text>
  <text x="840" y="344" text-anchor="middle" font-size="10" fill="#7f1d1d">/clear</text>
  <rect x="760" y="375" width="160" height="65" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="840" y="394" text-anchor="middle" font-size="10" fill="#991b1b">零上下文腐化</text>
  <text x="840" y="410" text-anchor="middle" font-size="10" fill="#991b1b">完全手动控制</text>
  <text x="840" y="425" text-anchor="middle" font-size="10" fill="#991b1b">全新项目/任务</text>

  <!-- Subagent -->
  <rect x="280" y="475" width="400" height="55" rx="10" fill="#1e293b"/>
  <text x="480" y="498" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Subagent 子代理</text>
  <text x="480" y="518" text-anchor="middle" font-size="10" fill="#cbd5e1">大量中间输出但只需结论 → 独立上下文窗口处理</text>

  <line x1="120" y1="440" x2="380" y2="475" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="620" y1="440" x2="540" y2="475" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <text x="480" y="555" text-anchor="middle" font-size="11" fill="#475569">适用场景：代码库搜索 · 验证测试 · 文档生成 · 代码审查</text>

  <rect x="40" y="575" width="880" height="30" rx="4" fill="#e2e8f0"/>
  <text x="480" y="595" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">核心原则：新任务 = 新会话 · 回退 &gt; 纠正 · 主动压缩 &gt; 被动压缩 · 只需结论 → 子代理</text>
</svg>
