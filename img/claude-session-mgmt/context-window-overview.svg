<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="440" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Claude Code 上下文窗口结构（1M Tokens）</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">工作记忆的四个组成部分与典型占用</text>

  <!-- 外围容器 -->
  <rect x="40" y="85" width="880" height="320" rx="10" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="60" y="108" font-size="12" fill="#3b82f6" font-weight="700">Context Window — 1,000,000 Tokens</text>

  <!-- System Prompt -->
  <rect x="60" y="125" width="840" height="50" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="145" font-size="13" font-weight="700" fill="#1e40af">① System Prompt</text>
  <text x="80" y="162" font-size="11" fill="#475569">系统提示 + CLAUDE.md + 工具定义</text>
  <rect x="760" y="138" width="130" height="24" rx="12" fill="#1e40af"/>
  <text x="825" y="155" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="600">数千~数万 Token</text>

  <!-- Conversation History -->
  <rect x="60" y="185" width="840" height="50" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="80" y="205" font-size="13" font-weight="700" fill="#5b21b6">② Conversation History</text>
  <text x="80" y="222" font-size="11" fill="#475569">用户消息 · Claude 回复 · 每个 turn 都占用 token</text>
  <rect x="760" y="198" width="130" height="24" rx="12" fill="#5b21b6"/>
  <text x="825" y="215" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="600">随对话增长</text>

  <!-- Tool Outputs -->
  <rect x="60" y="245" width="840" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="265" font-size="13" font-weight="700" fill="#92400e">③ Tool Calls &amp; Outputs</text>
  <text x="80" y="282" font-size="11" fill="#475569">read_file / search / bash 的调用参数与返回结果</text>
  <text x="80" y="297" font-size="10" fill="#78350f" font-style="italic">通常是最大的 Token 消耗者</text>
  <rect x="760" y="263" width="130" height="24" rx="12" fill="#f59e0b"/>
  <text x="825" y="280" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="600">占用最大</text>

  <!-- File Contents -->
  <rect x="60" y="315" width="840" height="60" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="80" y="335" font-size="13" font-weight="700" fill="#065f46">④ 已读取的文件内容</text>
  <text x="80" y="352" font-size="11" fill="#475569">通过工具读取的源代码、配置文件等</text>
  <text x="80" y="367" font-size="10" fill="#064e3b" font-style="italic">单个大文件可达数万 Token</text>
  <rect x="760" y="333" width="130" height="24" rx="12" fill="#065f46"/>
  <text x="825" y="350" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="600">可达数万 Token</text>

  <!-- Bottom note -->
  <rect x="40" y="410" width="880" height="24" rx="4" fill="#e2e8f0"/>
  <text x="480" y="428" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">1M Token ≈ 75 万英文单词 ≈ 7.5 万行代码 ≈ 3-4 本技术书 · 但质量远比数量重要</text>
</svg>
