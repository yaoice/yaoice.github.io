<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="280" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">上下文腐化：随上下文增长的性能衰减</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">这是 Transformer 架构的内在特性，不是 Bug（仅为趋势示意，非绝对阈值）</text>

  <!-- 4 stages -->
  <g>
    <rect x="40" y="100" width="200" height="120" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="140" y="128" text-anchor="middle" font-size="22">🟢</text>
    <text x="140" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">上下文较短</text>
    <text x="140" y="178" text-anchor="middle" font-size="10" fill="#064e3b">关注点集中</text>
    <text x="140" y="196" text-anchor="middle" font-size="10" fill="#064e3b">注意力易聚焦</text>
    <text x="140" y="212" text-anchor="middle" font-size="10" fill="#064e3b">模型表现最佳</text>
  </g>

  <line x1="240" y1="160" x2="275" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="148" text-anchor="middle" font-size="10" fill="#64748b">增长</text>

  <g>
    <rect x="280" y="100" width="200" height="120" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="380" y="128" text-anchor="middle" font-size="22">🟡</text>
    <text x="380" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">上下文变长</text>
    <text x="380" y="178" text-anchor="middle" font-size="10" fill="#78350f">注意力开始分散</text>
    <text x="380" y="196" text-anchor="middle" font-size="10" fill="#78350f">相关线索需检索</text>
    <text x="380" y="212" text-anchor="middle" font-size="10" fill="#78350f">仍可保持质量</text>
  </g>

  <line x1="480" y1="160" x2="515" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="148" text-anchor="middle" font-size="10" fill="#64748b">增长</text>

  <g>
    <rect x="520" y="100" width="200" height="120" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
    <text x="620" y="128" text-anchor="middle" font-size="22">🟠</text>
    <text x="620" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">历史与工具输出堆积</text>
    <text x="620" y="178" text-anchor="middle" font-size="10" fill="#7c2d12">检索成本上升</text>
    <text x="620" y="196" text-anchor="middle" font-size="10" fill="#7c2d12">判断成本上升</text>
    <text x="620" y="212" text-anchor="middle" font-size="10" fill="#7c2d12">噪声干扰增加</text>
  </g>

  <line x1="720" y1="160" x2="755" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="740" y="148" text-anchor="middle" font-size="10" fill="#64748b">增长</text>

  <g>
    <rect x="760" y="100" width="160" height="120" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="840" y="128" text-anchor="middle" font-size="22">🔴</text>
    <text x="840" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">接近满载</text>
    <text x="840" y="178" text-anchor="middle" font-size="10" fill="#7f1d1d">遗忘早期指令</text>
    <text x="840" y="196" text-anchor="middle" font-size="10" fill="#7f1d1d">重复错误方案</text>
    <text x="840" y="212" text-anchor="middle" font-size="10" fill="#7f1d1d">腐化风险显著</text>
  </g>

  <!-- 底部 -->
  <rect x="40" y="235" width="880" height="30" rx="4" fill="#e2e8f0"/>
  <text x="480" y="254" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">腐化时机因模型、任务类型、工具输出密度而异 · 关键是：接近满载时模型处于"最不智能"状态</text>
</svg>
