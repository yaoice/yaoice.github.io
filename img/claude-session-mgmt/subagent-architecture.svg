<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">子代理架构：独立上下文 + 精简结果回流</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">大量中间工作产出被封装在子代理中，只有结论回到主会话</text>

  <!-- 主会话 -->
  <g>
    <rect x="40" y="95" width="250" height="370" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="165" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">主对话 (Main Session)</text>

    <rect x="60" y="135" width="210" height="45" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="165" y="156" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">完整的上下文窗口</text>
    <text x="165" y="172" text-anchor="middle" font-size="10" fill="#475569">对话 + 文件 + 工具调用</text>

    <rect x="60" y="190" width="210" height="40" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="165" y="216" text-anchor="middle" font-size="11" fill="#475569">用户："重构认证模块..."</text>

    <rect x="60" y="240" width="210" height="40" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="165" y="266" text-anchor="middle" font-size="11" fill="#475569">Claude: 启动子代理 →</text>

    <rect x="60" y="305" width="210" height="100" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="165" y="325" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">核心优势</text>
    <text x="80" y="345" font-size="10" fill="#475569">• 独立上下文</text>
    <text x="80" y="362" font-size="10" fill="#475569">• 并行执行</text>
    <text x="80" y="379" font-size="10" fill="#475569">• 差异化权限</text>
    <text x="80" y="396" font-size="10" fill="#475569">• 主对话保持干净</text>
  </g>

  <!-- 3 个子代理 -->
  <g>
    <rect x="360" y="95" width="240" height="105" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="480" y="117" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">子代理 1：探索</text>
    <rect x="380" y="125" width="200" height="22" rx="3" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="141" text-anchor="middle" font-size="10" fill="#475569">独立上下文 · 只读权限</text>
    <rect x="380" y="152" width="200" height="40" rx="3" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="168" text-anchor="middle" font-size="10" fill="#475569">搜索 API 路由、数据模型</text>
    <text x="480" y="184" text-anchor="middle" font-size="10" fill="#475569">工具：Read · Grep · Glob</text>
  </g>

  <g>
    <rect x="360" y="215" width="240" height="105" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="480" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">子代理 2：实现</text>
    <rect x="380" y="245" width="200" height="22" rx="3" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="261" text-anchor="middle" font-size="10" fill="#475569">独立上下文 · 编辑权限</text>
    <rect x="380" y="272" width="200" height="40" rx="3" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="288" text-anchor="middle" font-size="10" fill="#475569">重构认证逻辑、更新路由</text>
    <text x="480" y="304" text-anchor="middle" font-size="10" fill="#475569">工具：Read · Write · Bash</text>
  </g>

  <g>
    <rect x="360" y="335" width="240" height="105" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="480" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">子代理 3：审查</text>
    <rect x="380" y="365" width="200" height="22" rx="3" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="381" text-anchor="middle" font-size="10" fill="#475569">独立上下文 · 只读权限</text>
    <rect x="380" y="392" width="200" height="40" rx="3" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="408" text-anchor="middle" font-size="10" fill="#475569">安全审查、性能检查</text>
    <text x="480" y="424" text-anchor="middle" font-size="10" fill="#475569">工具：Read · Grep</text>
  </g>

  <!-- 箭头：主 -> 子 -->
  <line x1="290" y1="260" x2="355" y2="145" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="290" y1="260" x2="355" y2="265" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="290" y1="260" x2="355" y2="385" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- 结果回流 -->
  <g>
    <rect x="670" y="150" width="240" height="225" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="790" y="175" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">精简结果返回</text>

    <rect x="685" y="185" width="210" height="35" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="790" y="207" text-anchor="middle" font-size="11" fill="#065f46">摘要而非原始内容</text>

    <rect x="685" y="230" width="210" height="35" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="790" y="252" text-anchor="middle" font-size="11" fill="#065f46">关键发现 + 建议</text>

    <rect x="685" y="275" width="210" height="35" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="790" y="297" text-anchor="middle" font-size="11" fill="#065f46">代码变更摘要</text>

    <rect x="685" y="320" width="210" height="35" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="790" y="342" text-anchor="middle" font-size="11" fill="#065f46">安全问题列表</text>
  </g>

  <!-- 子 -> 结果 -->
  <line x1="600" y1="145" x2="665" y2="200" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="267" x2="665" y2="265" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="390" x2="665" y2="330" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 结果 -> 主 -->
  <path d="M670,360 Q440,460 290,405" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="465" y="465" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">仅返回相关结果到主对话</text>
</svg>
