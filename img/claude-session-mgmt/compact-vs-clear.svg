<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="480" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">/compact vs /clear：选择指南</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">同一任务继续深入 vs 切换到新任务方向</text>

  <!-- Left: /compact -->
  <g>
    <rect x="40" y="90" width="430" height="370" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="40" y="90" width="430" height="50" rx="10" fill="#f5f3ff"/>
    <rect x="40" y="125" width="430" height="15" fill="#f5f3ff"/>
    <text x="255" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#5b21b6">/compact</text>

    <rect x="60" y="160" width="390" height="35" rx="6" fill="#f5f3ff" stroke="#d8b4fe" stroke-width="1"/>
    <text x="80" y="182" font-size="11" font-weight="700" fill="#5b21b6">工作量</text>
    <text x="430" y="182" text-anchor="end" font-size="11" fill="#475569">低（自动压缩）</text>

    <rect x="60" y="205" width="390" height="35" rx="6" fill="#f5f3ff" stroke="#d8b4fe" stroke-width="1"/>
    <text x="80" y="227" font-size="11" font-weight="700" fill="#5b21b6">上下文质量</text>
    <text x="430" y="227" text-anchor="end" font-size="11" fill="#475569">Claude 决定重点</text>

    <rect x="60" y="250" width="390" height="35" rx="6" fill="#f5f3ff" stroke="#d8b4fe" stroke-width="1"/>
    <text x="80" y="272" font-size="11" font-weight="700" fill="#5b21b6">适用场景</text>
    <text x="430" y="272" text-anchor="end" font-size="11" fill="#475569">同一任务继续深入</text>

    <rect x="60" y="295" width="390" height="35" rx="6" fill="#f5f3ff" stroke="#d8b4fe" stroke-width="1"/>
    <text x="80" y="317" font-size="11" font-weight="700" fill="#5b21b6">腐化风险</text>
    <text x="430" y="317" text-anchor="end" font-size="11" fill="#475569">中（可能保留无关信息）</text>

    <rect x="60" y="340" width="390" height="35" rx="6" fill="#f5f3ff" stroke="#d8b4fe" stroke-width="1"/>
    <text x="80" y="362" font-size="11" font-weight="700" fill="#5b21b6">信息保留</text>
    <text x="430" y="362" text-anchor="end" font-size="11" fill="#475569">可能更全面（有损压缩）</text>

    <rect x="60" y="385" width="390" height="55" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="80" y="405" font-size="11" font-weight="700" fill="#065f46">典型场景</text>
    <text x="80" y="423" font-size="10" fill="#064e3b">长调试后切换到新功能开发</text>
    <text x="80" y="437" font-size="10" fill="#064e3b">会话积累过多测试调试记录</text>
  </g>

  <!-- Right: /clear -->
  <g>
    <rect x="490" y="90" width="430" height="370" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
    <rect x="490" y="90" width="430" height="50" rx="10" fill="#fef2f2"/>
    <rect x="490" y="125" width="430" height="15" fill="#fef2f2"/>
    <text x="705" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">/clear</text>

    <rect x="510" y="160" width="390" height="35" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="530" y="182" font-size="11" font-weight="700" fill="#991b1b">工作量</text>
    <text x="880" y="182" text-anchor="end" font-size="11" fill="#475569">高（需手动编写简报）</text>

    <rect x="510" y="205" width="390" height="35" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="530" y="227" font-size="11" font-weight="700" fill="#991b1b">上下文质量</text>
    <text x="880" y="227" text-anchor="end" font-size="11" fill="#475569">你决定重点</text>

    <rect x="510" y="250" width="390" height="35" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="530" y="272" font-size="11" font-weight="700" fill="#991b1b">适用场景</text>
    <text x="880" y="272" text-anchor="end" font-size="11" fill="#475569">切换到新任务方向</text>

    <rect x="510" y="295" width="390" height="35" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="530" y="317" font-size="11" font-weight="700" fill="#991b1b">腐化风险</text>
    <text x="880" y="317" text-anchor="end" font-size="11" fill="#475569">低（你控制一切）</text>

    <rect x="510" y="340" width="390" height="35" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="530" y="362" font-size="11" font-weight="700" fill="#991b1b">信息保留</text>
    <text x="880" y="362" text-anchor="end" font-size="11" fill="#475569">可能遗漏重要细节</text>

    <rect x="510" y="385" width="390" height="55" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="530" y="405" font-size="11" font-weight="700" fill="#065f46">典型场景</text>
    <text x="530" y="423" font-size="10" fill="#064e3b">从后端开发切换到前端开发</text>
    <text x="530" y="437" font-size="10" fill="#064e3b">完全不相关的两个任务之间</text>
  </g>
</svg>
