<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Rewind 工作流程：保留有用上下文，删除失败尝试</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">按 Esc Esc 或 /rewind · 带着新认知重新出发</text>

  <!-- Timeline -->
  <line x1="80" y1="150" x2="880" y2="150" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Turn 1 -->
  <circle cx="120" cy="150" r="8" fill="#10b981"/>
  <text x="120" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">Turn 1</text>
  <rect x="40" y="175" width="190" height="90" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="135" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">调查 API 响应问题</text>
  <text x="135" y="213" text-anchor="middle" font-size="10" fill="#064e3b">读取 5 个相关文件</text>
  <text x="135" y="229" text-anchor="middle" font-size="10" fill="#064e3b">分析数据流</text>
  <text x="135" y="245" text-anchor="middle" font-size="10" fill="#064e3b">理解业务逻辑</text>
  <text x="135" y="260" text-anchor="middle" font-size="9" font-style="italic" fill="#065f46">（有价值的上下文）</text>

  <!-- Turn 2 (失败) -->
  <circle cx="400" cy="150" r="8" fill="#ef4444"/>
  <text x="400" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">Turn 2</text>
  <rect x="320" y="175" width="190" height="90" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="415" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">尝试方案 A（序列化器）</text>
  <text x="415" y="213" text-anchor="middle" font-size="10" fill="#7f1d1d">修改序列化代码</text>
  <text x="415" y="229" text-anchor="middle" font-size="10" fill="#7f1d1d">测试仍然失败</text>
  <text x="415" y="245" text-anchor="middle" font-size="10" fill="#7f1d1d">方向错误</text>
  <text x="415" y="260" text-anchor="middle" font-size="9" font-style="italic" fill="#991b1b">（失败的尝试）</text>

  <!-- 发现问题 -->
  <circle cx="680" cy="150" r="8" fill="#f59e0b"/>
  <text x="680" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">发现新线索</text>
  <rect x="600" y="175" width="190" height="90" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="695" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">开发者新发现</text>
  <text x="695" y="213" text-anchor="middle" font-size="10" fill="#78350f">问题其实在数据库</text>
  <text x="695" y="229" text-anchor="middle" font-size="10" fill="#78350f">migration 日期类型错</text>
  <text x="695" y="245" text-anchor="middle" font-size="10" fill="#78350f">需要修改 migration</text>

  <!-- 操作：Esc Esc -->
  <rect x="350" y="300" width="260" height="42" rx="8" fill="#1e293b"/>
  <text x="480" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">按 Esc Esc / /rewind</text>
  <text x="480" y="336" text-anchor="middle" font-size="10" fill="#cbd5e1">回退到 Turn 1 之后</text>

  <line x1="415" y1="265" x2="470" y2="300" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="380" y="295" font-size="10" fill="#ef4444" font-weight="600">删除</text>

  <line x1="135" y1="265" x2="450" y2="300" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="270" y="295" font-size="10" fill="#10b981" font-weight="600">保留</text>

  <line x1="480" y1="342" x2="480" y2="370" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 新 Turn 2 -->
  <rect x="260" y="375" width="440" height="95" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="480" y="397" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">新 Turn 2：带新知识重新提示</text>
  <text x="480" y="417" text-anchor="middle" font-size="11" fill="#064e3b">"问题不在序列化器，是 migration 中的日期列类型不对。"</text>
  <text x="480" y="434" text-anchor="middle" font-size="11" fill="#064e3b">"foo 模块的序列化器没问题。直接修改 migration 文件。"</text>
  <text x="480" y="456" text-anchor="middle" font-size="10" fill="#065f46" font-style="italic">Turn 1 的 5 个文件读取仍在上下文中 ✓ · 失败尝试已删除 ✓</text>

  <!-- 底部说明 -->
  <rect x="40" y="485" width="880" height="28" rx="4" fill="#e2e8f0"/>
  <text x="480" y="504" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Pro Tip：在回退前让 Claude 总结学到的东西，得到"来自未来的信"</text>
</svg>
