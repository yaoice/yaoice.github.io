<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">全栈功能开发典型工作流</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">综合运用 Continue · Compact · Subagent · Clear 四种策略</text>

  <!-- Lifelines -->
  <rect x="80" y="80" width="160" height="36" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">开发者</text>

  <rect x="400" y="80" width="160" height="36" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="480" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Claude Code</text>

  <rect x="720" y="80" width="160" height="36" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="800" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">子代理</text>

  <line x1="160" y1="120" x2="160" y2="530" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="480" y1="120" x2="480" y2="530" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="800" y1="120" x2="800" y2="530" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1 -->
  <line x1="160" y1="145" x2="475" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="138" font-size="11" fill="#475569">① 实现用户注册 API</text>
  <rect x="310" y="155" width="340" height="20" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="480" y="170" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">读取 models / routes / middleware, 实现逻辑</text>
  <line x1="475" y1="185" x2="165" y2="185" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <line x1="160" y1="215" x2="475" y2="215" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="208" font-size="11" fill="#475569">② 继续对话：编写测试</text>
  <rect x="310" y="225" width="340" height="20" rx="4" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="480" y="240" text-anchor="middle" font-size="10" fill="#065f46" font-style="italic">复用已有上下文，直接编写测试</text>

  <!-- Step 3: compact -->
  <rect x="280" y="260" width="400" height="24" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="276" text-anchor="middle" font-size="11" fill="#92400e" font-weight="600">③ /compact 保留注册相关上下文</text>

  <!-- Step 4 -->
  <line x1="160" y1="305" x2="475" y2="305" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="298" font-size="11" fill="#475569">④ 实现登录 API</text>
  <rect x="310" y="315" width="340" height="20" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="480" y="330" text-anchor="middle" font-size="10" fill="#1e40af" font-style="italic">在压缩后的上下文中继续开发</text>

  <!-- Step 5: subagent -->
  <line x1="160" y1="360" x2="475" y2="360" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="353" font-size="11" fill="#475569">⑤ 启动子代理验证所有端点</text>

  <line x1="480" y1="385" x2="795" y2="385" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="635" y="378" font-size="11" fill="#065f46">⑥ 派发：验证注册和登录端点</text>

  <rect x="650" y="395" width="300" height="20" rx="4" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="800" y="410" text-anchor="middle" font-size="10" fill="#065f46" font-style="italic">独立上下文：读规范 / 跑测试 / 分析</text>

  <line x1="795" y1="430" x2="485" y2="430" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="635" y="423" font-size="11" fill="#065f46">⑦ 返回验证报告（精炼结论）</text>

  <line x1="475" y1="455" x2="165" y2="455" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="320" y="448" font-size="11" fill="#475569">⑧ 主对话：所有端点符合规范</text>

  <!-- Step 6: clear -->
  <rect x="280" y="478" width="400" height="24" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="480" y="494" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="600">⑨ /clear → 切换到前端开发（全新上下文）</text>

  <!-- Step 7 -->
  <line x1="160" y1="520" x2="475" y2="520" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="513" font-size="11" fill="#475569">⑩ 新任务：实现注册页面组件</text>
</svg>
