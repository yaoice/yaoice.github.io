<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="400" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">/compact 的压缩机制</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">有损压缩 · 带 hint 可精准控制保留内容</text>

  <!-- 起点：长会话 -->
  <rect x="60" y="100" width="220" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="170" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">长会话</text>
  <text x="170" y="145" text-anchor="middle" font-size="10" fill="#7f1d1d">已积累大量历史与工具输出</text>

  <line x1="280" y1="130" x2="315" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 触发 -->
  <polygon points="395,105 455,130 395,155 335,130" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="395" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">/compact</text>

  <line x1="455" y1="130" x2="490" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Claude 阅读 -->
  <rect x="495" y="105" width="180" height="50" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="585" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Claude 阅读全部历史</text>
  <text x="585" y="145" text-anchor="middle" font-size="10" fill="#475569">理解上下文内容</text>

  <line x1="675" y1="130" x2="710" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 生成总结 -->
  <rect x="715" y="105" width="185" height="50" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="807" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">生成结构化总结</text>
  <text x="807" y="145" text-anchor="middle" font-size="10" fill="#475569">~20K-50K Token</text>

  <!-- 下半部分：替换 + 继续 -->
  <line x1="807" y1="160" x2="807" y2="200" stroke="#94a3b8" stroke-width="1.5"/>
  <path d="M807,200 L170,200 L170,225" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="60" y="230" width="280" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="200" y="253" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">总结替换原始历史</text>
  <text x="200" y="270" text-anchor="middle" font-size="10" fill="#475569">上下文大幅缩减</text>

  <line x1="340" y1="255" x2="375" y2="255" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="380" y="230" width="280" height="50" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="520" y="253" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">在总结基础上继续工作</text>
  <text x="520" y="270" text-anchor="middle" font-size="10" fill="#475569">更高效，但丢失细节</text>

  <!-- hint 引导路径 -->
  <rect x="700" y="230" width="200" height="50" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="800" y="253" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">带 hint 引导</text>
  <text x="800" y="270" text-anchor="middle" font-size="10" fill="#78350f">精准控制保留/丢弃</text>

  <line x1="395" y1="155" x2="395" y2="225" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <path d="M395,155 Q395,250 700,255" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- 底部说明 -->
  <rect x="60" y="320" width="840" height="60" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="80" y="343" font-size="12" font-weight="700" fill="#1e293b">Hint 示例</text>
  <text x="80" y="362" font-size="11" fill="#475569">/compact 保留数据库 schema 变更和 API 契约，</text>
  <text x="80" y="377" font-size="11" fill="#475569">丢弃 CSS 调试和 test fixture 的设置细节</text>
</svg>
