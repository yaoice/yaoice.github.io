<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760"><defs><linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff1f2"/><stop offset="100%" stop-color="#fefce8"/></linearGradient><style>.bg{fill:url(#bgGradient)}.title{font:700 28px Arial,'Microsoft YaHei',sans-serif;fill:#881337}.panel{fill:#ffffff;stroke:#fda4af;stroke-width:2;rx:18}.op{fill:#ffe4e6;stroke:#e11d48;stroke-width:2;rx:14}.res{fill:#fef9c3;stroke:#ca8a04;stroke-width:2;rx:14}.h2{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#1e293b}.txt{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.small{font:12px Arial,'Microsoft YaHei',sans-serif;fill:#64748b}.arrow{stroke:#e11d48;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#e11d48"/></marker></defs><rect class="bg" width="1280" height="760"/><text x="640" y="48" text-anchor="middle" class="title">TP/EP 常见 Collective 语义：算子需要什么，HCCL 就执行什么</text><rect x="70" y="98" width="1140" height="560" class="panel"/><rect x="120" y="160" width="240" height="110" class="op"/><text x="240" y="192" text-anchor="middle" class="h2">AllReduce</text><text x="240" y="220" text-anchor="middle" class="txt">各 rank partial sum</text><text x="240" y="246" text-anchor="middle" class="small">规约后每个 rank 都拿到完整结果</text><rect x="520" y="160" width="240" height="110" class="op"/><text x="640" y="192" text-anchor="middle" class="h2">AllGather</text><text x="640" y="220" text-anchor="middle" class="txt">各 rank 输出分片</text><text x="640" y="246" text-anchor="middle" class="small">拼接成完整激活或上下文</text><rect x="920" y="160" width="240" height="110" class="op"/><text x="1040" y="192" text-anchor="middle" class="h2">ReduceScatter</text><text x="1040" y="220" text-anchor="middle" class="txt">先规约再切分</text><text x="1040" y="246" text-anchor="middle" class="small">每个 rank 保留一片结果</text><rect x="320" y="384" width="240" height="110" class="op"/><text x="440" y="416" text-anchor="middle" class="h2">AlltoAll</text><text x="440" y="444" text-anchor="middle" class="txt">多对多交换</text><text x="440" y="470" text-anchor="middle" class="small">MoE expert 输入重分布</text><rect x="720" y="384" width="240" height="110" class="op"/><text x="840" y="416" text-anchor="middle" class="h2">Broadcast</text><text x="840" y="444" text-anchor="middle" class="txt">从 root 分发</text><text x="840" y="470" text-anchor="middle" class="small">配置、权重或状态同步</text><path d="M240 270 C250 320, 340 340, 440 384" class="arrow"/><path d="M640 270 C630 320, 530 340, 440 384" class="arrow"/><path d="M1040 270 C1030 320, 930 340, 840 384" class="arrow"/><rect x="266" y="590" width="748" height="48" class="res"/><text x="640" y="621" text-anchor="middle" class="txt">TP 更常见 AllReduce/AllGather/ReduceScatter；EP/MoE 更容易触发 AlltoAll 类通信。</text></svg>