<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#07111f"/><stop offset="100%" stop-color="#12324a"/></linearGradient><style>.bg{fill:url(#bgGradient)}.title{font:700 28px Arial,'Microsoft YaHei',sans-serif;fill:#ecfeff}.node{fill:#f8fafc;stroke:#22d3ee;stroke-width:2;rx:18}.env{fill:#dbeafe;stroke:#0ea5e9;stroke-width:2;rx:12}.net{fill:#dcfce7;stroke:#10b981;stroke-width:2;rx:14}.warn{fill:#fee2e2;stroke:#ef4444;stroke-width:2;rx:14}.h2{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.txt{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.small{font:13px Arial,'Microsoft YaHei',sans-serif;fill:#475569}.mono{font:13px Menlo,Consolas,monospace;fill:#334155}.arrow{stroke:#22d3ee;stroke-width:2.3;fill:none;marker-end:url(#arrow)}.bad{stroke:#ef4444;stroke-width:2.5;stroke-dasharray:8 6;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#22d3ee"/></marker></defs><rect class="bg" width="1280" height="720"/><text x="640" y="48" text-anchor="middle" class="title">多机网卡绑定：同一节点上控制面与数据面都要选对路径</text><rect x="72" y="105" width="500" height="430" class="node"/><text x="322" y="142" text-anchor="middle" class="h2">Node0</text><rect x="118" y="186" width="405" height="54" class="env"/><text x="320" y="219" text-anchor="middle" class="mono">HCCL_IF_IP = node0_local_ip</text><rect x="118" y="260" width="405" height="54" class="env"/><text x="320" y="293" text-anchor="middle" class="mono">HCCL_SOCKET_IFNAME = nic</text><rect x="118" y="334" width="405" height="54" class="env"/><text x="320" y="367" text-anchor="middle" class="mono">TP_SOCKET_IFNAME = nic</text><rect x="118" y="408" width="405" height="54" class="env"/><text x="320" y="441" text-anchor="middle" class="mono">GLOO_SOCKET_IFNAME = nic</text><rect x="708" y="105" width="500" height="430" class="node"/><text x="958" y="142" text-anchor="middle" class="h2">Node1 Headless</text><rect x="754" y="186" width="405" height="54" class="env"/><text x="956" y="219" text-anchor="middle" class="mono">HCCL_IF_IP = node1_local_ip</text><rect x="754" y="260" width="405" height="54" class="env"/><text x="956" y="293" text-anchor="middle" class="mono">HCCL_SOCKET_IFNAME = nic</text><rect x="754" y="334" width="405" height="54" class="env"/><text x="956" y="367" text-anchor="middle" class="mono">TP_SOCKET_IFNAME = nic</text><rect x="754" y="408" width="405" height="54" class="env"/><text x="956" y="441" text-anchor="middle" class="mono">data-parallel-address = node0_ip</text><rect x="430" y="570" width="420" height="72" class="net"/><text x="640" y="598" text-anchor="middle" class="h2">NPU 通信网络</text><text x="640" y="624" text-anchor="middle" class="small">HCCL 与 TP 通信最终要落到可达的设备 IP 和网卡上</text><path d="M322 535 C400 560, 505 570, 540 570" class="arrow"/><path d="M958 535 C880 560, 775 570, 740 570" class="arrow"/><path d="M1158 435 C1210 492, 1210 580, 852 606" class="bad"/><text x="1030" y="638" text-anchor="middle" class="small">错配时：控制面可能连不上，或 collective 等待远端 rank 超时</text></svg>