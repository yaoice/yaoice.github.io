<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="700" viewBox="0 0 1280 700"><defs><linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff7ed"/><stop offset="100%" stop-color="#ecfeff"/></linearGradient><style>.bg{fill:url(#bgGradient)}.title{font:700 28px Arial,'Microsoft YaHei',sans-serif;fill:#7c2d12}.panel{fill:#ffffff;stroke:#f59e0b;stroke-width:2;rx:18}.a3{fill:#ffedd5;stroke:#f97316;stroke-width:2;rx:14}.a2{fill:#ccfbf1;stroke:#0d9488;stroke-width:2;rx:14}.pd{fill:#ede9fe;stroke:#7c3aed;stroke-width:2;rx:14}.h2{font:700 21px Arial,'Microsoft YaHei',sans-serif;fill:#1e293b}.txt{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.small{font:13px Arial,'Microsoft YaHei',sans-serif;fill:#64748b}.mono{font:13px Menlo,Consolas,monospace;fill:#334155}.arrow{stroke:#f97316;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f97316"/></marker></defs><rect class="bg" width="1280" height="700"/><text x="640" y="48" text-anchor="middle" class="title">DeepSeek-V3.2 多机部署矩阵：并行维度如何映射到节点与 NPU</text><rect x="60" y="92" width="1160" height="520" class="panel"/><rect x="110" y="150" width="310" height="344" class="a3"/><text x="265" y="190" text-anchor="middle" class="h2">A3 普通多机</text><text x="265" y="226" text-anchor="middle" class="mono">DP=2, TP=16</text><text x="265" y="252" text-anchor="middle" class="small">每节点 16 张 NPU</text><text x="265" y="286" text-anchor="middle" class="txt">Node0: DP rank 0</text><text x="265" y="314" text-anchor="middle" class="txt">Node1: DP rank 1</text><text x="265" y="358" text-anchor="middle" class="small">TP group 尽量留在节点内</text><text x="265" y="386" text-anchor="middle" class="small">跨节点主要承载 DP/EP 同步</text><rect x="485" y="150" width="310" height="344" class="a2"/><text x="640" y="190" text-anchor="middle" class="h2">A2 普通多机</text><text x="640" y="226" text-anchor="middle" class="mono">DP=2, TP=8</text><text x="640" y="252" text-anchor="middle" class="small">每节点 8 张 NPU</text><text x="640" y="286" text-anchor="middle" class="txt">Node0: DP rank 0</text><text x="640" y="314" text-anchor="middle" class="txt">Node1: DP rank 1</text><text x="640" y="358" text-anchor="middle" class="small">额外关注 PCIe/RoCE 路径</text><text x="640" y="386" text-anchor="middle" class="small">HCCL timeout 更敏感</text><rect x="860" y="150" width="310" height="344" class="pd"/><text x="1015" y="190" text-anchor="middle" class="h2">Prefill-Decode 分离</text><text x="1015" y="226" text-anchor="middle" class="mono">P: DP2+TP16</text><text x="1015" y="252" text-anchor="middle" class="mono">D: DP8+TP4</text><text x="1015" y="286" text-anchor="middle" class="txt">Prefill 处理长上下文</text><text x="1015" y="314" text-anchor="middle" class="txt">Decode 提高并发解码</text><text x="1015" y="358" text-anchor="middle" class="small">KV transfer 使用 Mooncake</text><text x="1015" y="386" text-anchor="middle" class="small">内部 TP/EP 仍依赖 HCCL</text><path d="M420 322 L485 322" class="arrow"/><path d="M795 322 L860 322" class="arrow"/><rect x="170" y="548" width="940" height="48" class="panel"/><text x="640" y="578" text-anchor="middle" class="txt">共同原则：用 DP 做横向扩展，用 TP 切分单副本，用 EP 支撑 MoE，尽量避免高频 TP collective 跨节点。</text></svg>