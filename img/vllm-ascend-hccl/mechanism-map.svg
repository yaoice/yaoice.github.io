<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620"><defs><linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#e0f2fe"/></linearGradient><style>.bg{fill:url(#bgGradient)}.title{font:700 28px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.box{fill:#ffffff;stroke:#7dd3fc;stroke-width:2;rx:18}.core{fill:#dbeafe;stroke:#2563eb;stroke-width:3;rx:20}.leaf{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:14}.warn{fill:#ffedd5;stroke:#f97316;stroke-width:2;rx:14}.txt{font:16px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.h2{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#1e293b}.small{font:13px Arial,'Microsoft YaHei',sans-serif;fill:#475569}.arrow{stroke:#64748b;stroke-width:2.4;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs><rect class="bg" width="1280" height="620"/><text x="640" y="48" text-anchor="middle" class="title">本文分析主线：从部署参数追到 HCCL 数据面</text><rect x="470" y="210" width="340" height="150" class="core"/><text x="640" y="260" text-anchor="middle" class="h2">HCCL 通信机制</text><text x="640" y="292" text-anchor="middle" class="txt">rank、group、communicator、collective</text><text x="640" y="322" text-anchor="middle" class="small">解释多机推理中张量如何跨 NPU 和跨节点流动</text><rect x="74" y="108" width="260" height="84" class="leaf"/><text x="204" y="140" text-anchor="middle" class="h2">部署形态</text><text x="204" y="166" text-anchor="middle" class="small">Node0 入口、Headless worker、DP/TP/EP</text><rect x="510" y="94" width="260" height="84" class="leaf"/><text x="640" y="126" text-anchor="middle" class="h2">初始化流程</text><text x="640" y="152" text-anchor="middle" class="small">设备、网卡、rank 映射、通信域</text><rect x="946" y="108" width="260" height="84" class="leaf"/><text x="1076" y="140" text-anchor="middle" class="h2">通信组</text><text x="1076" y="166" text-anchor="middle" class="small">TP 高频同步、DP 协调、EP 专家通信</text><rect x="98" y="420" width="260" height="84" class="warn"/><text x="228" y="452" text-anchor="middle" class="h2">张量传输</text><text x="228" y="478" text-anchor="middle" class="small">chunk、buffer、stream、NPU 网络</text><rect x="510" y="432" width="260" height="84" class="warn"/><text x="640" y="464" text-anchor="middle" class="h2">算法选择</text><text x="640" y="490" text-anchor="middle" class="small">Ring、RHD、Pairwise、Pipeline</text><rect x="922" y="420" width="260" height="84" class="warn"/><text x="1052" y="452" text-anchor="middle" class="h2">排障路径</text><text x="1052" y="478" text-anchor="middle" class="small">rank、网卡、NPU 网络、collective 卡点</text><path d="M334 162 C418 190, 450 226, 470 260" class="arrow"/><path d="M640 178 L640 210" class="arrow"/><path d="M946 162 C862 190, 830 226, 810 260" class="arrow"/><path d="M358 450 C430 410, 470 360, 500 334" class="arrow"/><path d="M640 432 L640 360" class="arrow"/><path d="M922 450 C850 410, 810 360, 780 334" class="arrow"/></svg>