<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="680" viewBox="0 0 1280 680"><defs><linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fdf4ff"/><stop offset="100%" stop-color="#ecfeff"/></linearGradient><style>.bg{fill:url(#bgGradient)}.title{font:700 28px Arial,'Microsoft YaHei',sans-serif;fill:#581c87}.plane{fill:#ffffff;stroke:#c084fc;stroke-width:2;rx:18}.ctrl{fill:#dbeafe;stroke:#2563eb;stroke-width:2;rx:14}.data{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:14}.mid{fill:#ffedd5;stroke:#ea580c;stroke-width:2;rx:14}.h2{font:700 21px Arial,'Microsoft YaHei',sans-serif;fill:#1e293b}.txt{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.small{font:13px Arial,'Microsoft YaHei',sans-serif;fill:#64748b}.arrow{stroke:#9333ea;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.dash{stroke:#9333ea;stroke-width:2;stroke-dasharray:7 5;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#9333ea"/></marker></defs><rect class="bg" width="1280" height="680"/><text x="640" y="48" text-anchor="middle" class="title">控制面与数据面分层：不要把 DP RPC 和 HCCL 混为一谈</text><rect x="72" y="108" width="500" height="450" class="plane"/><text x="322" y="146" text-anchor="middle" class="h2">控制面</text><rect x="126" y="190" width="390" height="58" class="ctrl"/><text x="321" y="225" text-anchor="middle" class="txt">API Server / Scheduler</text><rect x="126" y="284" width="390" height="58" class="ctrl"/><text x="321" y="319" text-anchor="middle" class="txt">DP Coordinator / Headless Join</text><rect x="126" y="378" width="390" height="58" class="ctrl"/><text x="321" y="413" text-anchor="middle" class="txt">Gloo / DP RPC / ZMQ</text><text x="322" y="490" text-anchor="middle" class="small">解决谁参与、请求去哪、rank 是否活跃</text><rect x="708" y="108" width="500" height="450" class="plane"/><text x="958" y="146" text-anchor="middle" class="h2">数据面</text><rect x="762" y="190" width="390" height="58" class="data"/><text x="957" y="225" text-anchor="middle" class="txt">HCCL Communicator</text><rect x="762" y="284" width="390" height="58" class="data"/><text x="957" y="319" text-anchor="middle" class="txt">NPU Runtime / Stream / Event</text><rect x="762" y="378" width="390" height="58" class="data"/><text x="957" y="413" text-anchor="middle" class="txt">NPU NIC / RoCE / HCCS 网络</text><text x="958" y="490" text-anchor="middle" class="small">解决张量如何传、如何规约、如何回写</text><rect x="500" y="274" width="280" height="96" class="mid"/><text x="640" y="314" text-anchor="middle" class="h2">模型执行图</text><text x="640" y="342" text-anchor="middle" class="small">forward 中的 collective 同步点</text><path d="M516 313 L500 313" class="arrow"/><path d="M780 313 L762 313" class="arrow"/><path d="M322 558 C390 620, 880 620, 958 558" class="dash"/><text x="640" y="622" text-anchor="middle" class="small">控制面决定调度关系，数据面只在 collective 被触发时搬运和规约张量。</text></svg>