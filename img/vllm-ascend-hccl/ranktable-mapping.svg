<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#faf5ff"/><stop offset="100%" stop-color="#fdf2f8"/></linearGradient><style>.bg{fill:url(#bgGradient)}.title{font:700 28px Arial,'Microsoft YaHei',sans-serif;fill:#4c1d95}.panel{fill:#ffffff;stroke:#d8b4fe;stroke-width:2;rx:18}.item{fill:#ede9fe;stroke:#8b5cf6;stroke-width:2;rx:12}.rank{fill:#dcfce7;stroke:#22c55e;stroke-width:2;rx:12}.h2{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#1e293b}.txt{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.small{font:13px Arial,'Microsoft YaHei',sans-serif;fill:#64748b}.mono{font:13px Menlo,Consolas,monospace;fill:#334155}.arrow{stroke:#a855f7;stroke-width:2.3;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#a855f7"/></marker></defs><rect class="bg" width="1280" height="720"/><text x="640" y="48" text-anchor="middle" class="title">RankTable 映射关系：HCCL 如何从逻辑 rank 找到物理通信端点</text><rect x="70" y="110" width="1140" height="460" class="panel"/><rect x="120" y="176" width="180" height="72" class="item"/><text x="210" y="205" text-anchor="middle" class="h2">rank_id</text><text x="210" y="230" text-anchor="middle" class="mono">0,1,2,3...</text><rect x="380" y="176" width="180" height="72" class="item"/><text x="470" y="205" text-anchor="middle" class="h2">server_id</text><text x="470" y="230" text-anchor="middle" class="mono">node_0 / node_1</text><rect x="640" y="176" width="180" height="72" class="item"/><text x="730" y="205" text-anchor="middle" class="h2">device_id</text><text x="730" y="230" text-anchor="middle" class="mono">0..N-1</text><rect x="900" y="176" width="180" height="72" class="item"/><text x="990" y="205" text-anchor="middle" class="h2">device_ip</text><text x="990" y="230" text-anchor="middle" class="mono">NPU 通信 IP</text><path d="M300 212 L380 212" class="arrow"/><path d="M560 212 L640 212" class="arrow"/><path d="M820 212 L900 212" class="arrow"/><rect x="170" y="344" width="270" height="82" class="rank"/><text x="305" y="376" text-anchor="middle" class="txt">本端 rank</text><text x="305" y="402" text-anchor="middle" class="small">确认当前进程绑定哪张 NPU</text><rect x="505" y="344" width="270" height="82" class="rank"/><text x="640" y="376" text-anchor="middle" class="txt">远端 rank 列表</text><text x="640" y="402" text-anchor="middle" class="small">获取每个 peer 的 server/device/IP</text><rect x="840" y="344" width="270" height="82" class="rank"/><text x="975" y="376" text-anchor="middle" class="txt">通信域 world</text><text x="975" y="402" text-anchor="middle" class="small">按 group 创建 communicator</text><path d="M305 344 C330 292, 360 252, 210 248" class="arrow"/><path d="M640 344 C650 290, 760 255, 990 248" class="arrow"/><path d="M775 385 L840 385" class="arrow"/><rect x="310" y="602" width="660" height="52" class="panel"/><text x="640" y="634" text-anchor="middle" class="txt">一句话：rank 是逻辑身份，device_id 是本机设备，device_ip 是跨节点寻址入口，communicator 是通信组运行时句柄。</text></svg>