<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5f3ff"/><stop offset="100%" stop-color="#ecfeff"/></linearGradient><style>.bg{fill:url(#bgGradient)}.title{font:700 28px Arial,'Microsoft YaHei',sans-serif;fill:#312e81}.panel{fill:#ffffff;stroke:#a78bfa;stroke-width:2;rx:18}.pre{fill:#dbeafe;stroke:#2563eb;stroke-width:2;rx:14}.dec{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:14}.kv{fill:#ede9fe;stroke:#7c3aed;stroke-width:2;rx:14}.hccl{fill:#ffedd5;stroke:#ea580c;stroke-width:2;rx:14}.h2{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#1e293b}.txt{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.small{font:13px Arial,'Microsoft YaHei',sans-serif;fill:#64748b}.mono{font:13px Menlo,Consolas,monospace;fill:#334155}.arrow{stroke:#7c3aed;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.purple{stroke:#7c3aed;stroke-width:3;fill:none;marker-end:url(#arrow)}.orange{stroke:#ea580c;stroke-width:2.4;stroke-dasharray:8 6;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/></marker></defs><rect class="bg" width="1280" height="720"/><text x="640" y="48" text-anchor="middle" class="title">P/D 分离中的两类通信：KV Transfer 与 HCCL Collective 分工不同</text><rect x="70" y="110" width="1140" height="450" class="panel"/><rect x="120" y="170" width="330" height="260" class="pre"/><text x="285" y="208" text-anchor="middle" class="h2">Prefill Engine</text><text x="285" y="242" text-anchor="middle" class="mono">DP2 + TP16</text><text x="285" y="276" text-anchor="middle" class="txt">处理长 prompt</text><text x="285" y="304" text-anchor="middle" class="txt">生成大块 KV cache</text><rect x="166" y="348" width="238" height="50" class="hccl"/><text x="285" y="379" text-anchor="middle" class="small">内部 TP/EP 仍执行 HCCL collective</text><rect x="830" y="170" width="330" height="260" class="dec"/><text x="995" y="208" text-anchor="middle" class="h2">Decode Engine</text><text x="995" y="242" text-anchor="middle" class="mono">DP8 + TP4</text><text x="995" y="276" text-anchor="middle" class="txt">小步高频生成 token</text><text x="995" y="304" text-anchor="middle" class="txt">追求并发与低 TPOT</text><rect x="876" y="348" width="238" height="50" class="hccl"/><text x="995" y="379" text-anchor="middle" class="small">内部 TP/EP 仍执行 HCCL collective</text><rect x="520" y="250" width="240" height="96" class="kv"/><text x="640" y="286" text-anchor="middle" class="h2">Mooncake KV Connector</text><text x="640" y="316" text-anchor="middle" class="small">kv_producer -> kv_consumer</text><path d="M450 300 L520 300" class="purple"/><path d="M760 300 L830 300" class="purple"/><path d="M285 398 C342 520, 930 520, 995 398" class="orange"/><text x="640" y="526" text-anchor="middle" class="small">KV transfer 是 engine 间缓存搬运；HCCL collective 是 engine 内模型层同步，两者不要混用概念。</text></svg>