<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760"><defs><linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#18181b"/><stop offset="100%" stop-color="#3f3f46"/></linearGradient><style>.bg{fill:url(#bgGradient)}.title{font:700 28px Arial,'Microsoft YaHei',sans-serif;fill:#fafafa}.panel{fill:#fafafa;stroke:#a3e635;stroke-width:2;rx:18}.q{fill:#ecfccb;stroke:#65a30d;stroke-width:2;rx:14}.alg{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:14}.cost{fill:#ffedd5;stroke:#f97316;stroke-width:2;rx:14}.h2{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#18181b}.txt{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#3f3f46}.small{font:13px Arial,'Microsoft YaHei',sans-serif;fill:#52525b}.mono{font:13px Menlo,Consolas,monospace;fill:#3f3f46}.arrow{stroke:#a3e635;stroke-width:2.3;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#a3e635"/></marker></defs><rect class="bg" width="1280" height="760"/><text x="640" y="48" text-anchor="middle" class="title">HCCL 算法选择直觉：算子类型、数据量和拓扑共同决定执行计划</text><rect x="80" y="108" width="1120" height="520" class="panel"/><rect x="130" y="176" width="230" height="80" class="q"/><text x="245" y="207" text-anchor="middle" class="h2">算子类型</text><text x="245" y="232" text-anchor="middle" class="small">规约、广播、多对多交换</text><rect x="525" y="176" width="230" height="80" class="q"/><text x="640" y="207" text-anchor="middle" class="h2">数据规模</text><text x="640" y="232" text-anchor="middle" class="small">Decode 小张量 vs Prefill 大张量</text><rect x="920" y="176" width="230" height="80" class="q"/><text x="1035" y="207" text-anchor="middle" class="h2">拓扑与节点数</text><text x="1035" y="232" text-anchor="middle" class="small">节点内、跨节点、2 的幂规模</text><rect x="130" y="360" width="190" height="86" class="alg"/><text x="225" y="393" text-anchor="middle" class="h2">Ring</text><text x="225" y="420" text-anchor="middle" class="small">关系简单，带宽稳定</text><rect x="348" y="360" width="190" height="86" class="alg"/><text x="443" y="393" text-anchor="middle" class="h2">RHD</text><text x="443" y="420" text-anchor="middle" class="small">步数少，适合特定规模</text><rect x="566" y="360" width="190" height="86" class="alg"/><text x="661" y="393" text-anchor="middle" class="h2">Pairwise</text><text x="661" y="420" text-anchor="middle" class="small">AlltoAll 多对多交换</text><rect x="784" y="360" width="190" height="86" class="alg"/><text x="879" y="393" text-anchor="middle" class="h2">Star</text><text x="879" y="420" text-anchor="middle" class="small">有根节点通信</text><rect x="1002" y="360" width="190" height="86" class="alg"/><text x="1097" y="393" text-anchor="middle" class="h2">Pipeline</text><text x="1097" y="420" text-anchor="middle" class="small">大数据量流水并发</text><path d="M245 256 C245 314, 225 330, 225 360" class="arrow"/><path d="M640 256 C640 314, 661 330, 661 360" class="arrow"/><path d="M1035 256 C1035 314, 1097 330, 1097 360" class="arrow"/><rect x="342" y="530" width="596" height="58" class="cost"/><text x="640" y="554" text-anchor="middle" class="mono">T ≈ steps × α + bytes × β + reduce_bytes × γ</text><text x="640" y="576" text-anchor="middle" class="small">Decode 更怕固定时延 α；Prefill 更看重带宽 β 和流水效率。</text></svg>