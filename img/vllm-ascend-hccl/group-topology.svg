<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820">
  <defs><linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f0fdfa"/><stop offset="100%" stop-color="#eef2ff"/></linearGradient>
    <style>
      .bg{fill:url(#bgGradient)}.title{font:700 28px Arial,"Microsoft YaHei",sans-serif;fill:#134e4a}.panel{fill:#ffffff;stroke:#5eead4;stroke-width:2;rx:18}.rank{fill:#dbeafe;stroke:#2563eb;stroke-width:2;rx:10}.tp{fill:#cffafe;stroke:#0891b2;stroke-width:3;rx:16}.dp{fill:none;stroke:#f97316;stroke-width:3;stroke-dasharray:10 6;rx:18}.ep{fill:none;stroke:#0d9488;stroke-width:3;stroke-dasharray:7 5;rx:18}.h2{font:700 18px Arial,"Microsoft YaHei",sans-serif;fill:#1e293b}.txt{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#334155}.small{font:12px Arial,"Microsoft YaHei",sans-serif;fill:#475569}.mono{font:12px Menlo,Consolas,monospace;fill:#334155}.arrow{stroke:#475569;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.line{stroke:#0d9488;stroke-width:2;fill:none}.orange{stroke:#f97316}.green{stroke:#0d9488}.blue{stroke:#2563eb}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
  </defs>
  <rect class="bg" width="1280" height="820"/>
  <text x="640" y="48" text-anchor="middle" class="title">通信组建模：RankTable 思维下的 TP / DP / EP 子通信域</text>

  <rect x="58" y="92" width="1164" height="570" class="panel"/>
  <text x="640" y="126" text-anchor="middle" class="h2">示意拓扑：2 节点，每节点 1 个 DP rank，每个 rank 内 TP=4（简化展示）</text>

  <rect x="104" y="174" width="472" height="390" class="panel"/>
  <text x="340" y="206" text-anchor="middle" class="h2">Server / Node0</text>
  <rect x="142" y="246" width="396" height="206" class="tp"/>
  <text x="340" y="276" text-anchor="middle" class="h2">TP Group 0：rank 0-3</text>
  <g>
    <rect x="172" y="318" width="78" height="58" class="rank"/><text x="211" y="342" text-anchor="middle" class="mono">rank0</text><text x="211" y="362" text-anchor="middle" class="small">dev0</text>
    <rect x="270" y="318" width="78" height="58" class="rank"/><text x="309" y="342" text-anchor="middle" class="mono">rank1</text><text x="309" y="362" text-anchor="middle" class="small">dev1</text>
    <rect x="368" y="318" width="78" height="58" class="rank"/><text x="407" y="342" text-anchor="middle" class="mono">rank2</text><text x="407" y="362" text-anchor="middle" class="small">dev2</text>
    <rect x="466" y="318" width="78" height="58" class="rank"/><text x="505" y="342" text-anchor="middle" class="mono">rank3</text><text x="505" y="362" text-anchor="middle" class="small">dev3</text>
  </g>
  <path d="M250 347 L270 347 M348 347 L368 347 M446 347 L466 347" class="line blue"/>
  <text x="340" y="420" text-anchor="middle" class="small">张量并行层内频繁执行 AllReduce / AllGather / ReduceScatter</text>

  <rect x="704" y="174" width="472" height="390" class="panel"/>
  <text x="940" y="206" text-anchor="middle" class="h2">Server / Node1</text>
  <rect x="742" y="246" width="396" height="206" class="tp"/>
  <text x="940" y="276" text-anchor="middle" class="h2">TP Group 1：rank 4-7</text>
  <g>
    <rect x="772" y="318" width="78" height="58" class="rank"/><text x="811" y="342" text-anchor="middle" class="mono">rank4</text><text x="811" y="362" text-anchor="middle" class="small">dev0</text>
    <rect x="870" y="318" width="78" height="58" class="rank"/><text x="909" y="342" text-anchor="middle" class="mono">rank5</text><text x="909" y="362" text-anchor="middle" class="small">dev1</text>
    <rect x="968" y="318" width="78" height="58" class="rank"/><text x="1007" y="342" text-anchor="middle" class="mono">rank6</text><text x="1007" y="362" text-anchor="middle" class="small">dev2</text>
    <rect x="1066" y="318" width="78" height="58" class="rank"/><text x="1105" y="342" text-anchor="middle" class="mono">rank7</text><text x="1105" y="362" text-anchor="middle" class="small">dev3</text>
  </g>
  <path d="M850 347 L870 347 M948 347 L968 347 M1046 347 L1066 347" class="line blue"/>
  <text x="940" y="420" text-anchor="middle" class="small">同一 DP rank 内的 TP 通信尽量限制在节点内，降低跨节点同步成本</text>

  <rect x="128" y="148" width="1024" height="444" class="dp"/>
  <text x="640" y="610" text-anchor="middle" class="h2" fill="#f97316">DP / EP 跨节点通信域：rank 0-7 可按算子需要参与同步或专家路由</text>
  <path d="M538 347 C610 272, 682 272, 742 347" class="arrow green"/>
  <path d="M538 386 C620 478, 690 478, 742 386" class="arrow orange"/>

  <rect x="78" y="694" width="336" height="76" class="panel"/>
  <text x="246" y="720" text-anchor="middle" class="h2">Rank 映射</text>
  <text x="246" y="744" text-anchor="middle" class="small">rank_id -> server_id + device_id + device_ip</text>
  <text x="246" y="762" text-anchor="middle" class="small">HCCL 据此确认本端与远端通信地址</text>

  <rect x="472" y="694" width="336" height="76" class="panel"/>
  <text x="640" y="720" text-anchor="middle" class="h2">通信组缓存</text>
  <text x="640" y="744" text-anchor="middle" class="small">world group、TP group、EP group、DP group</text>
  <text x="640" y="762" text-anchor="middle" class="small">不同 collective 复用不同 communicator</text>

  <rect x="866" y="694" width="336" height="76" class="panel"/>
  <text x="1034" y="720" text-anchor="middle" class="h2">算法选择</text>
  <text x="1034" y="744" text-anchor="middle" class="small">Ring / RHD / Pairwise / Pipeline 等</text>
  <text x="1034" y="762" text-anchor="middle" class="small">按拓扑、数据量、算子类型选择执行计划</text>
</svg>
