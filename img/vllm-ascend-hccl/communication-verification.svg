<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760"><defs><linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f0fdf4"/><stop offset="100%" stop-color="#ecfeff"/></linearGradient><style>.bg{fill:url(#bgGradient)}.title{font:700 28px Arial,'Microsoft YaHei',sans-serif;fill:#14532d}.panel{fill:#ffffff;stroke:#86efac;stroke-width:2;rx:18}.check{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:12}.risk{fill:#ffedd5;stroke:#ea580c;stroke-width:2;rx:12}.h2{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#1e293b}.txt{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.small{font:13px Arial,'Microsoft YaHei',sans-serif;fill:#64748b}.arrow{stroke:#16a34a;stroke-width:2.3;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/></marker></defs><rect class="bg" width="1280" height="760"/><text x="640" y="48" text-anchor="middle" class="title">多机通信验证清单：每一项都对应 HCCL 初始化假设</text><rect x="80" y="96" width="1120" height="560" class="panel"/><rect x="150" y="150" width="220" height="70" class="check"/><text x="260" y="180" text-anchor="middle" class="h2">LLDP / Ifname</text><text x="260" y="203" text-anchor="middle" class="small">确认交换端口</text><rect x="530" y="150" width="220" height="70" class="check"/><text x="640" y="180" text-anchor="middle" class="h2">Link UP</text><text x="640" y="203" text-anchor="middle" class="small">确认物理链路</text><rect x="910" y="150" width="220" height="70" class="check"/><text x="1020" y="180" text-anchor="middle" class="h2">Net Health</text><text x="1020" y="203" text-anchor="middle" class="small">确认网络健康</text><rect x="150" y="314" width="220" height="70" class="check"/><text x="260" y="344" text-anchor="middle" class="h2">NPU IP</text><text x="260" y="367" text-anchor="middle" class="small">确认设备地址</text><rect x="530" y="314" width="220" height="70" class="check"/><text x="640" y="344" text-anchor="middle" class="h2">Gateway</text><text x="640" y="367" text-anchor="middle" class="small">确认路由配置</text><rect x="910" y="314" width="220" height="70" class="check"/><text x="1020" y="344" text-anchor="middle" class="h2">NPU Ping</text><text x="1020" y="367" text-anchor="middle" class="small">确认跨节点可达</text><rect x="360" y="500" width="560" height="86" class="risk"/><text x="640" y="532" text-anchor="middle" class="h2">这些检查失败时，HCCL 常表现为“卡住”而不是清晰报错</text><text x="640" y="560" text-anchor="middle" class="small">初始化超时、headless 加入失败、collective 等待、吞吐异常、偶发请求超时</text><path d="M370 185 L530 185" class="arrow"/><path d="M750 185 L910 185" class="arrow"/><path d="M1020 220 C1020 266, 1020 286, 1020 314" class="arrow"/><path d="M910 349 L750 349" class="arrow"/><path d="M530 349 L370 349" class="arrow"/><path d="M260 384 C320 455, 430 492, 520 500" class="arrow"/><path d="M1020 384 C960 455, 850 492, 760 500" class="arrow"/></svg>