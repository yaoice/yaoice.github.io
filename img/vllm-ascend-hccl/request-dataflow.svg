<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780">
  <defs><linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fffbeb"/><stop offset="100%" stop-color="#ecfccb"/></linearGradient>
    <style>
      .bg{fill:url(#bgGradient)}.title{font:700 28px Arial,"Microsoft YaHei",sans-serif;fill:#713f12}.box{fill:#ffffff;stroke:#facc15;stroke-width:2;rx:18}.api{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:12}.engine{fill:#dbeafe;stroke:#2563eb;stroke-width:2;rx:12}.hccl{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:12}.kv{fill:#ede9fe;stroke:#7c3aed;stroke-width:2;rx:12}.h2{font:700 18px Arial,"Microsoft YaHei",sans-serif;fill:#1e293b}.txt{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#334155}.small{font:12px Arial,"Microsoft YaHei",sans-serif;fill:#64748b}.mono{font:12px Menlo,Consolas,monospace;fill:#334155}.arrow{stroke:#64748b;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.dash{stroke:#ca8a04;stroke-width:2;stroke-dasharray:7 5;fill:none;marker-end:url(#arrow)}.green{stroke:#16a34a}.purple{stroke:#7c3aed}.orange{stroke:#d97706}.blue{stroke:#2563eb}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
  </defs>
  <rect class="bg" width="1280" height="780"/>
  <text x="640" y="48" text-anchor="middle" class="title">一次请求在 vLLM-Ascend 多机推理中的数据流转</text>

  <rect x="56" y="94" width="1168" height="120" class="box"/>
  <rect x="96" y="130" width="190" height="52" class="api"/><text x="191" y="153" text-anchor="middle" class="txt">Client</text><text x="191" y="172" text-anchor="middle" class="small">/v1/completions</text>
  <rect x="342" y="130" width="220" height="52" class="api"/><text x="452" y="153" text-anchor="middle" class="txt">Node0 API Server</text><text x="452" y="172" text-anchor="middle" class="small">OpenAI-compatible endpoint</text>
  <rect x="618" y="130" width="220" height="52" class="api"/><text x="728" y="153" text-anchor="middle" class="txt">Scheduler / Router</text><text x="728" y="172" text-anchor="middle" class="small">批处理、路由、限流</text>
  <rect x="894" y="130" width="220" height="52" class="api"/><text x="1004" y="153" text-anchor="middle" class="txt">DP Coordinator</text><text x="1004" y="172" text-anchor="middle" class="small">协调 rank active / idle</text>
  <path d="M286 156 L342 156" class="arrow"/><path d="M562 156 L618 156" class="arrow"/><path d="M838 156 L894 156" class="arrow"/>

  <rect x="56" y="260" width="540" height="340" class="box"/>
  <text x="326" y="294" text-anchor="middle" class="h2">DP Rank 0 / Node0</text>
  <rect x="94" y="328" width="210" height="58" class="engine"/><text x="199" y="352" text-anchor="middle" class="txt">Prefill / Decode Step</text><text x="199" y="373" text-anchor="middle" class="small">执行本地 batch</text>
  <rect x="348" y="328" width="210" height="58" class="engine"/><text x="453" y="352" text-anchor="middle" class="txt">TP Workers</text><text x="453" y="373" text-anchor="middle" class="small">权重与激活分片</text>
  <rect x="94" y="438" width="210" height="58" class="hccl"/><text x="199" y="462" text-anchor="middle" class="txt">HCCL TP Collective</text><text x="199" y="483" text-anchor="middle" class="small">节点内高频同步</text>
  <rect x="348" y="438" width="210" height="58" class="hccl"/><text x="453" y="462" text-anchor="middle" class="txt">EP / MoE Collective</text><text x="453" y="483" text-anchor="middle" class="small">专家路由与聚合</text>
  <path d="M304 357 L348 357" class="arrow blue"/><path d="M199 386 L199 438" class="arrow green"/><path d="M453 386 L453 438" class="arrow green"/>
  <rect x="196" y="530" width="260" height="42" class="kv"/><text x="326" y="556" text-anchor="middle" class="small">KV Cache 写入本地 NPU / host 管理结构</text>
  <path d="M304 467 L348 467" class="arrow green"/><path d="M326 496 L326 530" class="arrow purple"/>

  <rect x="684" y="260" width="540" height="340" class="box"/>
  <text x="954" y="294" text-anchor="middle" class="h2">DP Rank 1 / Node1 Headless</text>
  <rect x="722" y="328" width="210" height="58" class="engine"/><text x="827" y="352" text-anchor="middle" class="txt">Prefill / Decode Step</text><text x="827" y="373" text-anchor="middle" class="small">执行独立 batch 或 dummy forward</text>
  <rect x="976" y="328" width="210" height="58" class="engine"/><text x="1081" y="352" text-anchor="middle" class="txt">TP Workers</text><text x="1081" y="373" text-anchor="middle" class="small">本地 NPU 并行</text>
  <rect x="722" y="438" width="210" height="58" class="hccl"/><text x="827" y="462" text-anchor="middle" class="txt">HCCL TP Collective</text><text x="827" y="483" text-anchor="middle" class="small">节点内同步</text>
  <rect x="976" y="438" width="210" height="58" class="hccl"/><text x="1081" y="462" text-anchor="middle" class="txt">EP / MoE Collective</text><text x="1081" y="483" text-anchor="middle" class="small">跨 DP rank 同步</text>
  <path d="M932 357 L976 357" class="arrow blue"/><path d="M827 386 L827 438" class="arrow green"/><path d="M1081 386 L1081 438" class="arrow green"/>
  <rect x="824" y="530" width="260" height="42" class="kv"/><text x="954" y="556" text-anchor="middle" class="small">KV Cache 与 token 状态在本地维护</text>
  <path d="M932 467 L976 467" class="arrow green"/><path d="M954 496 L954 530" class="arrow purple"/>

  <path d="M1004 182 C980 230, 960 238, 954 260" class="dash orange"/>
  <path d="M1004 182 C760 230, 440 230, 326 260" class="dash orange"/>
  <path d="M558 467 C650 402, 850 402, 976 467" class="dash green"/>
  <text x="640" y="410" text-anchor="middle" class="small">跨节点 collective 只在需要同步的通信组上发生</text>

  <rect x="250" y="650" width="780" height="72" class="box"/>
  <text x="640" y="677" text-anchor="middle" class="h2">返回路径</text>
  <text x="640" y="701" text-anchor="middle" class="small">各 DP engine 完成 step 后把 token / 状态回传给 Node0 调度层；Node0 聚合流式输出并响应客户端。</text>
</svg>
