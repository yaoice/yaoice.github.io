<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="520" fill="#f8fafc" rx="10"/>
  
  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">防御者闭环：LLM 驱动的代码安全流程</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">一次性基建 → 持续循环，瓶颈从发现转移到验证与修复</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Left: One-time setup -->
  <rect x="60" y="100" width="200" height="40" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="160" y="125" text-anchor="middle" font-size="13" font-weight="600" fill="#6d28d9">① 威胁建模</text>

  <line x1="160" y1="140" x2="160" y2="170" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="180" width="200" height="40" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="160" y="205" text-anchor="middle" font-size="13" font-weight="600" fill="#6d28d9">② 沙箱</text>

  <!-- Label: One-time -->
  <text x="160" y="250" text-anchor="middle" font-size="11" fill="#8b5cf6">一次性基建投入</text>

  <!-- Arrow from setup to loop -->
  <line x1="260" y1="200" x2="340" y2="200" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Right: The Loop (circular) -->
  <!-- Discovery -->
  <rect x="360" y="100" width="180" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">③ 发现</text>
  <text x="450" y="134" text-anchor="middle" font-size="10" fill="#475569">优化召回率</text>

  <!-- Verification -->
  <rect x="600" y="100" width="180" height="44" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="690" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">④ 验证</text>
  <text x="690" y="134" text-anchor="middle" font-size="10" fill="#475569">优化精确率</text>

  <!-- Triage -->
  <rect x="600" y="220" width="180" height="44" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="690" y="238" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">⑤ 分类</text>
  <text x="690" y="254" text-anchor="middle" font-size="10" fill="#475569">去重 · 定级 · 排序</text>

  <!-- Patching -->
  <rect x="360" y="220" width="180" height="44" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="450" y="238" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">⑥ 修复</text>
  <text x="450" y="254" text-anchor="middle" font-size="10" fill="#475569">补丁 · 测试 · 变体搜索</text>

  <!-- Loop arrows -->
  <line x1="540" y1="122" x2="598" y2="122" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="780" y1="140" x2="780" y2="222" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="600" y1="242" x2="542" y2="242" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="360" y1="224" x2="360" y2="148" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Loop label -->
  <text x="570" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">持续循环</text>

  <!-- Bottom insight box -->
  <rect x="100" y="320" width="760" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="480" y="348" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">核心洞察</text>
  <text x="480" y="372" text-anchor="middle" font-size="12" fill="#475569">已披露 1,596 个漏洞，仅 97 个被修复 — 发现已可轻松并行化</text>
  <text x="480" y="390" text-anchor="middle" font-size="12" fill="#ef4444">瓶颈已从"发现"转移到"验证 → 分类 → 修复"</text>

  <!-- Stats -->
  <rect x="140" y="430" width="200" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="240" y="456" text-anchor="middle" font-size="11" fill="#475569">发现容易 ✓</text>
  <text x="240" y="476" text-anchor="middle" font-size="13" font-weight="600" fill="#3b82f6">可大规模并行</text>

  <rect x="380" y="430" width="200" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="480" y="456" text-anchor="middle" font-size="11" fill="#475569">验证/修复难 ✗</text>
  <text x="480" y="476" text-anchor="middle" font-size="13" font-weight="600" fill="#ef4444">需要投资管道</text>

  <rect x="620" y="430" width="200" height="60" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="720" y="456" text-anchor="middle" font-size="11" fill="#475569">闭环迭代</text>
  <text x="720" y="476" text-anchor="middle" font-size="13" font-weight="600" fill="#10b981">每轮都更精准</text>
</svg>
