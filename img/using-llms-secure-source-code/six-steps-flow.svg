<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="600" fill="#f8fafc" rx="10"/>
  
  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">六步闭环详解：每步的输入、产出与关键实践</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">左列为一次性基建，右列为持续循环的四步</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Step 1: Threat Model -->
  <rect x="40" y="80" width="400" height="100" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="60" y="102" font-size="13" font-weight="700" fill="#6d28d9">① 威胁建模</text>
  <text x="60" y="120" font-size="11" fill="#475569">输入：架构文档 · Wiki · Git 历史 · 历史 CVE</text>
  <text x="60" y="138" font-size="11" fill="#475569">产出：THREAT_MODEL.md（信任边界 · 资产 · 入口点）</text>
  <text x="60" y="158" font-size="11" fill="#475569">关键：定义受信输入 → 有文档的威胁模型 90% 可利用率</text>
  <text x="60" y="174" font-size="10" fill="#8b5cf6">工具：threat-model skill（bootstrap + interview）</text>

  <!-- Arrow 1->2 -->
  <line x1="240" y1="180" x2="240" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Sandbox -->
  <rect x="40" y="210" width="400" height="100" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="60" y="232" font-size="13" font-weight="700" fill="#6d28d9">② 沙箱</text>
  <text x="60" y="250" font-size="11" fill="#475569">输入：目标代码 · Dockerfile · 依赖清单</text>
  <text x="60" y="268" font-size="11" fill="#475569">产出：隔离环境快照（gVisor / Firecracker）</text>
  <text x="60" y="286" font-size="11" fill="#475569">关键：固定依赖版本 · 仅允许模型 API 出站 · 无凭据</text>
  <text x="60" y="302" font-size="10" fill="#8b5cf6">效果：有 PoC 测试床后，不可利用发现显著下降</text>

  <!-- Arrow setup -> loop -->
  <path d="M440,260 L480,260 L480,122 L520,122" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Step 3: Discovery -->
  <rect x="520" y="80" width="400" height="100" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="540" y="102" font-size="13" font-weight="700" fill="#1e40af">③ 发现</text>
  <text x="540" y="120" font-size="11" fill="#475569">输入：代码 + THREAT_MODEL.md + 历史扫描结果</text>
  <text x="540" y="138" font-size="11" fill="#475569">策略：简短提示 · 分区并行 · 让模型自建工具</text>
  <text x="540" y="156" font-size="11" fill="#475569">反模式：长清单降低创造性；暴力水平扩展收益递减</text>
  <text x="540" y="174" font-size="10" fill="#3b82f6">工具：vuln-scan skill（分区 → 并行代理 → 结构化报告）</text>

  <!-- Arrow 3->4 -->
  <line x1="720" y1="180" x2="720" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Verification -->
  <rect x="520" y="210" width="400" height="100" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="540" y="232" font-size="13" font-weight="700" fill="#065f46">④ 验证</text>
  <text x="540" y="250" font-size="11" fill="#475569">输入：发现报告 + PoC + 代码库（无发现代理上下文）</text>
  <text x="540" y="268" font-size="11" fill="#475569">策略：独立代理 · 反驳假设 · 多投票 · 裁判机制</text>
  <text x="540" y="286" font-size="11" fill="#475569">效果：对抗性验证将误报减半；PoC 验证使误报接近零</text>
  <text x="540" y="302" font-size="10" fill="#10b981">原则：发现 → 召回率 | 验证 → 精确率（绝不混合）</text>

  <!-- Arrow 4->5 -->
  <line x1="720" y1="310" x2="720" y2="330" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Triage -->
  <rect x="520" y="340" width="400" height="100" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="540" y="362" font-size="13" font-weight="700" fill="#92400e">⑤ 分类</text>
  <text x="540" y="380" font-size="11" fill="#475569">输入：已验证发现 + 威胁模型</text>
  <text x="540" y="398" font-size="11" fill="#475569">策略：根因去重 → 六维定级（可达/控制/前提/认证/读写/半径）</text>
  <text x="540" y="416" font-size="11" fill="#475569">关键：先答每个问题再定级，避免锚定于漏洞类别名</text>
  <text x="540" y="432" font-size="10" fill="#f59e0b">工具：triage skill（多投票验证 + 跨轮去重 + 重排序）</text>

  <!-- Arrow 5->6 -->
  <line x1="720" y1="440" x2="720" y2="460" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 6: Patching -->
  <rect x="520" y="470" width="400" height="100" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="540" y="492" font-size="13" font-weight="700" fill="#991b1b">⑥ 修复</text>
  <text x="540" y="510" font-size="11" fill="#475569">输入：分类后的优先级列表 + 代码库</text>
  <text x="540" y="528" font-size="11" fill="#475569">流程：写失败测试 → 最小修复 → PoC 失效 → 回归通过 → 反攻</text>
  <text x="540" y="546" font-size="11" fill="#475569">反馈：更新 THREAT_MODEL.md · 搜索变体 · 喂入下一轮上下文</text>
  <text x="540" y="562" font-size="10" fill="#ef4444">工具：patch skill（候选 diff + 独立审查代理）</text>

  <!-- Loop back arrow from 6 to 3 -->
  <path d="M920,520 L940,520 L940,80 L920,80" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M940,80 L920,80" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="948" y="300" text-anchor="middle" font-size="10" fill="#3b82f6" transform="rotate(90,948,300)">循环迭代</text>
</svg>
