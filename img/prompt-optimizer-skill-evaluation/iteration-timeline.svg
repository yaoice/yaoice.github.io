<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="-apple-system, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfbf8"/>
      <stop offset="100%" stop-color="#f4f3ee"/>
    </linearGradient>
    <pattern id="grid5" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#000" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <filter id="bsh3"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dx="0" dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="660" fill="url(#bg5)"/>
  <rect width="1200" height="660" fill="url(#grid5)"/>

  <!-- 标题 -->
  <text x="600" y="48" font-size="22" font-weight="700" fill="#1a2247" text-anchor="middle">
    description 三轮迭代时间线 · 每一轮都能从评测里读出一个具体洞察
  </text>

  <!-- 横向时间线 -->
  <line x1="120" y1="220" x2="1080" y2="220" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="200" cy="220" r="14" fill="#7c5cff" stroke="#fff" stroke-width="3"/>
  <circle cx="600" cy="220" r="14" fill="#5b8cff" stroke="#fff" stroke-width="3"/>
  <circle cx="1000" cy="220" r="14" fill="#2c8a3a" stroke="#fff" stroke-width="3"/>

  <!-- 三个版本卡片 -->
  <!-- v1 -->
  <g transform="translate(80, 260)">
    <rect x="0" y="0" width="240" height="350" rx="10" fill="#fff" stroke="#7c5cff" stroke-width="2" filter="url(#bsh3)"/>
    <text x="120" y="32" font-size="16" font-weight="700" fill="#7c5cff" text-anchor="middle">v1 · 初始版本</text>
    <text x="120" y="52" font-size="11" fill="#94a3b8" text-anchor="middle">153 字符 · F1 = 0.90</text>
    <line x1="20" y1="68" x2="220" y2="68" stroke="#e5e7eb"/>

    <text x="20" y="92" font-size="12" font-weight="600" fill="#1a2247">描述结构</text>
    <text x="20" y="112" font-size="11" fill="#475569">• 触发线 A：URL/资料/技术解读</text>
    <text x="20" y="130" font-size="11" fill="#475569">• 触发线 B：用户显式索取</text>
    <text x="20" y="148" font-size="11" fill="#475569">• 反触发：3 类（代码/数据/Agent）</text>

    <text x="20" y="180" font-size="12" font-weight="600" fill="#c0392b">⚠ 暴露的问题</text>
    <text x="20" y="200" font-size="11" fill="#5d2018">• q4：主题型请求弱判定 (conf 2.7)</text>
    <text x="20" y="220" font-size="11" fill="#5d2018">• q10：改写初稿被漏召 (FN)</text>
    <text x="20" y="240" font-size="11" fill="#5d2018">• q20：报告 prompt 被误召 (FP)</text>

    <text x="20" y="272" font-size="12" font-weight="600" fill="#475569">📊 判定一致性</text>
    <text x="20" y="290" font-size="11" fill="#475569">3/3 全票：17 / 20</text>
    <text x="20" y="308" font-size="11" fill="#475569">平均 conf：4.28</text>
    <text x="20" y="326" font-size="11" fill="#94a3b8" font-style="italic">基线确认：description 已"够用"但有边界洞</text>
  </g>

  <!-- v2 -->
  <g transform="translate(480, 260)">
    <rect x="0" y="0" width="240" height="350" rx="10" fill="#fff" stroke="#5b8cff" stroke-width="2" filter="url(#bsh3)"/>
    <text x="120" y="32" font-size="16" font-weight="700" fill="#5b8cff" text-anchor="middle">v2 · 三处补丁</text>
    <text x="120" y="52" font-size="11" fill="#94a3b8" text-anchor="middle">217 字符 · F1 = 1.00</text>
    <line x1="20" y1="68" x2="220" y2="68" stroke="#e5e7eb"/>

    <text x="20" y="92" font-size="12" font-weight="600" fill="#1a2247">改了什么</text>
    <text x="20" y="112" font-size="11" fill="#1f5c2c">+ 触发线 A 加"或自己写的初稿"</text>
    <text x="20" y="130" font-size="11" fill="#1f5c2c">+ 加"判定模糊的标准"</text>
    <text x="20" y="148" font-size="11" fill="#1f5c2c">+ 反触发列举 commit/邮件/RFC</text>

    <text x="20" y="180" font-size="12" font-weight="600" fill="#1f5c2c">✅ 收益</text>
    <text x="20" y="200" font-size="11" fill="#0e3a1a">• q4：conf 2.7 → 4.0</text>
    <text x="20" y="220" font-size="11" fill="#0e3a1a">• q10：0/3 → 3/3 (FN 修复)</text>
    <text x="20" y="240" font-size="11" fill="#0e3a1a">• q20：3/3 → 0/3 (FP 修复)</text>

    <text x="20" y="272" font-size="12" font-weight="600" fill="#c0392b">⚠ 副作用</text>
    <text x="20" y="290" font-size="11" fill="#5d2018">q3：3/3 → 2/3</text>
    <text x="20" y="308" font-size="11" fill="#5d2018">"内部讨论稿"被误识为内部 RFC</text>
    <text x="20" y="326" font-size="11" fill="#94a3b8" font-style="italic">字面冲突：原料是内部，产物是公众号</text>
  </g>

  <!-- v3 -->
  <g transform="translate(880, 260)">
    <rect x="0" y="0" width="240" height="350" rx="10" fill="#fff" stroke="#2c8a3a" stroke-width="2" filter="url(#bsh3)"/>
    <text x="120" y="32" font-size="16" font-weight="700" fill="#2c8a3a" text-anchor="middle">v3 · 重构反触发线</text>
    <text x="120" y="52" font-size="11" fill="#94a3b8" text-anchor="middle">257 字符 · F1 = 1.00 🎯</text>
    <line x1="20" y1="68" x2="220" y2="68" stroke="#e5e7eb"/>

    <text x="20" y="92" font-size="12" font-weight="600" fill="#1a2247">关键改写</text>
    <text x="20" y="112" font-size="11" fill="#1f5c2c">"判断依据是 <tspan font-weight="700">用户最终要交付什么</tspan>，</text>
    <text x="20" y="130" font-size="11" fill="#1f5c2c">不是<tspan font-weight="700">原料来自哪里</tspan>"</text>
    <text x="20" y="150" font-size="11" fill="#1f5c2c">+ PPT/slogan 显式列举</text>

    <text x="20" y="180" font-size="12" font-weight="600" fill="#1f5c2c">✅ 收益</text>
    <text x="20" y="200" font-size="11" fill="#0e3a1a">• q3：2/3 → 3/3</text>
    <text x="20" y="220" font-size="11" fill="#0e3a1a">• q17/q18/q19 conf 4 → 5</text>
    <text x="20" y="240" font-size="11" fill="#0e3a1a">• 0 硬回归 / 0 共识弱化</text>

    <text x="20" y="272" font-size="12" font-weight="600" fill="#475569">📊 最终</text>
    <text x="20" y="290" font-size="11" fill="#1f5c2c" font-weight="600">3/3 全票：20 / 20 🎯</text>
    <text x="20" y="308" font-size="11" fill="#1f5c2c" font-weight="600">平均 conf：4.60</text>
    <text x="20" y="326" font-size="11" fill="#94a3b8" font-style="italic">触顶：分数 + 一致性双满</text>
  </g>

  <!-- 时间标签 -->
  <g font-size="11" fill="#94a3b8">
    <text x="200" y="195" text-anchor="middle">基线评测</text>
    <text x="600" y="195" text-anchor="middle">第 1 轮迭代</text>
    <text x="1000" y="195" text-anchor="middle">第 2 轮迭代</text>
  </g>

  <!-- 箭头 -->
  <g stroke="#cbd5e1" stroke-width="1.5" fill="none">
    <path d="M 320 240 L 470 240" marker-end="url(#arrline)"/>
    <path d="M 720 240 L 870 240" marker-end="url(#arrline)"/>
  </g>
  <defs>
    <marker id="arrline" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1"/>
    </marker>
  </defs>
  <text x="395" y="232" font-size="11" fill="#475569" text-anchor="middle" font-style="italic">从 90% → 100%</text>
  <text x="795" y="232" font-size="11" fill="#475569" text-anchor="middle" font-style="italic">从分数 → 一致性</text>

  <!-- 底注 -->
  <text x="600" y="638" font-size="11" fill="#94a3b8" text-anchor="middle" font-style="italic">
    每一轮 description 改动都先在评测集上跑回归，确认 0 硬回归 + 0 共识弱化才落地到 SKILL.md
  </text>
</svg>
