<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfbf8"/>
      <stop offset="100%" stop-color="#f4f3ee"/>
    </linearGradient>
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#000" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <filter id="bsh2"><feGaussianBlur in="SourceAlpha" stdDeviation="2"/><feOffset dx="1" dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="640" fill="url(#bg4)"/>
  <rect width="1200" height="640" fill="url(#grid4)"/>

  <!-- 标题 -->
  <text x="600" y="50" font-size="22" font-weight="700" fill="#1a2247" text-anchor="middle">
    触发评测三轮迭代：F1 0.90 → 1.00 · 全样本 3/3 全票一致
  </text>
  <text x="600" y="78" font-size="13" fill="#6b7280" text-anchor="middle">
    20 query × 3 次独立判定 = 每轮 60 次召回判定 · 改了 description，没动正文
  </text>

  <!-- 左侧：F1 折线图 -->
  <g transform="translate(120, 130)">
    <text x="200" y="-12" font-size="14" font-weight="700" fill="#1a2247" text-anchor="middle">F1 / Accuracy 走势</text>

    <!-- Y 轴 0.85 - 1.00 -->
    <line x1="0" y1="0" x2="0" y2="320" stroke="#1a2247" stroke-width="1.5"/>
    <line x1="0" y1="320" x2="400" y2="320" stroke="#1a2247" stroke-width="1.5"/>
    <g font-size="11" fill="#475569">
      <text x="-8" y="324" text-anchor="end">0.85</text>
      <text x="-8" y="218" text-anchor="end">0.90</text>
      <text x="-8" y="112" text-anchor="end">0.95</text>
      <text x="-8" y="6" text-anchor="end">1.00</text>
    </g>
    <line x1="0" y1="218" x2="400" y2="218" stroke="#cbd5e1" stroke-dasharray="2,3"/>
    <line x1="0" y1="112" x2="400" y2="112" stroke="#cbd5e1" stroke-dasharray="2,3"/>
    <line x1="0" y1="0" x2="400" y2="0" stroke="#54f0a3" stroke-dasharray="3,3" opacity="0.5"/>

    <!-- 数据点：iter1 (0.90 → y=218), iter2 (1.00 → y=0), iter3 (1.00 → y=0) -->
    <!-- 折线 -->
    <polyline points="60,218 200,0 340,0" fill="none" stroke="#7c5cff" stroke-width="3" filter="url(#bsh2)"/>
    <!-- 数据点 -->
    <circle cx="60" cy="218" r="8" fill="#fff" stroke="#7c5cff" stroke-width="3"/>
    <circle cx="200" cy="0" r="8" fill="#fff" stroke="#7c5cff" stroke-width="3"/>
    <circle cx="340" cy="0" r="8" fill="#54f0a3" stroke="#2c8a3a" stroke-width="3"/>
    <!-- 数据标签 -->
    <text x="60" y="248" font-size="14" font-weight="700" fill="#7c5cff" text-anchor="middle">0.90</text>
    <text x="200" y="-18" font-size="14" font-weight="700" fill="#7c5cff" text-anchor="middle">1.00</text>
    <text x="340" y="-18" font-size="14" font-weight="700" fill="#2c8a3a" text-anchor="middle">1.00 🎯</text>
    <!-- X 轴 -->
    <text x="60" y="345" font-size="12" fill="#1a2247" text-anchor="middle" font-weight="600">iter1</text>
    <text x="60" y="362" font-size="10" fill="#94a3b8" text-anchor="middle">基线 v1</text>
    <text x="200" y="345" font-size="12" fill="#1a2247" text-anchor="middle" font-weight="600">iter2</text>
    <text x="200" y="362" font-size="10" fill="#94a3b8" text-anchor="middle">v2 · +3 处补丁</text>
    <text x="340" y="345" font-size="12" fill="#1a2247" text-anchor="middle" font-weight="600">iter3</text>
    <text x="340" y="362" font-size="10" fill="#94a3b8" text-anchor="middle">v3 · 看产物不看原料</text>
  </g>

  <!-- 右侧：confidence + 全票 一致 -->
  <g transform="translate(680, 130)">
    <text x="200" y="-12" font-size="14" font-weight="700" fill="#1a2247" text-anchor="middle">
      平均 confidence（判对 query）+ 3/3 全票一致数
    </text>

    <!-- Y 轴 4.0 - 4.7 -->
    <line x1="0" y1="0" x2="0" y2="320" stroke="#1a2247" stroke-width="1.5"/>
    <line x1="0" y1="320" x2="400" y2="320" stroke="#1a2247" stroke-width="1.5"/>
    <g font-size="11" fill="#475569">
      <text x="-8" y="324" text-anchor="end">4.0</text>
      <text x="-8" y="232" text-anchor="end">4.2</text>
      <text x="-8" y="140" text-anchor="end">4.4</text>
      <text x="-8" y="48" text-anchor="end">4.6</text>
    </g>
    <line x1="0" y1="232" x2="400" y2="232" stroke="#cbd5e1" stroke-dasharray="2,3"/>
    <line x1="0" y1="140" x2="400" y2="140" stroke="#cbd5e1" stroke-dasharray="2,3"/>
    <line x1="0" y1="48" x2="400" y2="48" stroke="#cbd5e1" stroke-dasharray="2,3"/>

    <!-- conf: 4.28 → y=192, 4.45 → y=114, 4.60 → y=46 -->
    <polyline points="60,192 200,114 340,46" fill="none" stroke="#3aa9ff" stroke-width="3" filter="url(#bsh2)"/>
    <circle cx="60" cy="192" r="8" fill="#fff" stroke="#3aa9ff" stroke-width="3"/>
    <circle cx="200" cy="114" r="8" fill="#fff" stroke="#3aa9ff" stroke-width="3"/>
    <circle cx="340" cy="46" r="8" fill="#fff" stroke="#3aa9ff" stroke-width="3"/>
    <text x="60" y="180" font-size="13" font-weight="700" fill="#3aa9ff" text-anchor="middle">4.28</text>
    <text x="200" y="102" font-size="13" font-weight="700" fill="#3aa9ff" text-anchor="middle">4.45</text>
    <text x="340" y="34" font-size="13" font-weight="700" fill="#3aa9ff" text-anchor="middle">4.60</text>

    <!-- 全票一致条 -->
    <g transform="translate(0, 280)">
      <text x="-8" y="0" font-size="11" fill="#475569" text-anchor="end">3/3 全票</text>
      <!-- iter1 17/20 -->
      <rect x="20" y="-15" width="80" height="20" rx="3" fill="#7c5cff" opacity="0.3"/>
      <rect x="20" y="-15" width="68" height="20" rx="3" fill="#7c5cff"/>
      <text x="60" y="0" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">17/20</text>
      <!-- iter2 19/20 -->
      <rect x="160" y="-15" width="80" height="20" rx="3" fill="#7c5cff" opacity="0.3"/>
      <rect x="160" y="-15" width="76" height="20" rx="3" fill="#7c5cff"/>
      <text x="200" y="0" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">19/20</text>
      <!-- iter3 20/20 -->
      <rect x="300" y="-15" width="80" height="20" rx="3" fill="#54f0a3" opacity="0.3"/>
      <rect x="300" y="-15" width="80" height="20" rx="3" fill="#2c8a3a"/>
      <text x="340" y="0" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">20/20</text>
    </g>
    <text x="60" y="345" font-size="12" fill="#1a2247" text-anchor="middle" font-weight="600">iter1</text>
    <text x="200" y="345" font-size="12" fill="#1a2247" text-anchor="middle" font-weight="600">iter2</text>
    <text x="340" y="345" font-size="12" fill="#1a2247" text-anchor="middle" font-weight="600">iter3</text>
  </g>

  <!-- 关键判断 -->
  <g transform="translate(120, 540)">
    <rect x="0" y="0" width="960" height="68" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="20" y="26" font-size="13" font-weight="700" fill="#7c5cff">📌 关键判断</text>
    <text x="20" y="50" font-size="13" fill="#1a2247">
      <tspan font-weight="600">分数停在 100% 后还能进步——</tspan>
      <tspan>用"3/3 全票一致"和"平均 confidence"作为补充指标，能继续暴露 description 字面陷阱（如 q3 的"内部稿"误判）。</tspan>
    </text>
  </g>
</svg>
