<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="-apple-system, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfbf8"/>
      <stop offset="100%" stop-color="#f4f3ee"/>
    </linearGradient>
    <pattern id="grid6" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#000" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <linearGradient id="s1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4e8"/><stop offset="100%" stop-color="#fde8d0"/>
    </linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8efff"/><stop offset="100%" stop-color="#d0dcff"/>
    </linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e8ff"/><stop offset="100%" stop-color="#e6d0ff"/>
    </linearGradient>
    <linearGradient id="s4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#bbf2cd"/>
    </linearGradient>
    <filter id="bsh4"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dx="0" dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.16"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b8cff"/>
    </marker>
  </defs>

  <rect width="1200" height="680" fill="url(#bg6)"/>
  <rect width="1200" height="680" fill="url(#grid6)"/>

  <!-- 标题 -->
  <text x="600" y="50" font-size="22" font-weight="700" fill="#1a2247" text-anchor="middle">
    prompt-optimizer 的打造过程：4 个阶段 × 每阶段一个关键决策
  </text>
  <text x="600" y="78" font-size="13" fill="#6b7280" text-anchor="middle">
    每个决策不是凭空设计，都是为了解一个真实的失败模式
  </text>

  <!-- 横向 4 阶段 -->
  <!-- ① 概念构思 -->
  <g transform="translate(60, 130)">
    <rect width="260" height="380" rx="14" fill="url(#s1)" stroke="#d49058" stroke-width="2" filter="url(#bsh4)"/>
    <circle cx="36" cy="36" r="22" fill="#f59e0b"/>
    <text x="36" y="44" font-size="18" fill="#fff" font-weight="800" text-anchor="middle">①</text>
    <text x="72" y="36" font-size="14" font-weight="700" fill="#5d3a14">概念构思</text>
    <text x="72" y="55" font-size="11" fill="#8b6332">Concept</text>

    <line x1="20" y1="78" x2="240" y2="78" stroke="#d4b078" stroke-width="0.8"/>

    <text x="20" y="106" font-size="12" font-weight="700" fill="#5d3a14">问题</text>
    <text x="20" y="126" font-size="11" fill="#5d3a14">"基于 URL 写博文" 这条 prompt</text>
    <text x="20" y="143" font-size="11" fill="#5d3a14">每次都塌——为什么？</text>

    <text x="20" y="180" font-size="12" font-weight="700" fill="#5d3a14">关键决策</text>
    <text x="20" y="200" font-size="11" fill="#5d3a14">不做通用 prompt 优化器；</text>
    <text x="20" y="217" font-size="11" fill="#5d3a14">只做"模糊写作 → 深度博文"</text>
    <text x="20" y="234" font-size="11" fill="#5d3a14">这一个高频塌方场景。</text>

    <rect x="20" y="252" width="220" height="48" rx="6" fill="#fff" stroke="#d4b078" stroke-width="1"/>
    <text x="30" y="270" font-size="10" font-weight="700" fill="#8b6332">📌 缩窄收益</text>
    <text x="30" y="287" font-size="10.5" fill="#5d3a14">场景越窄，失败模式越集中</text>

    <text x="20" y="328" font-size="12" font-weight="700" fill="#5d3a14">产出</text>
    <text x="20" y="348" font-size="11" fill="#5d3a14">• 1 句话定位</text>
    <text x="20" y="365" font-size="11" fill="#5d3a14">• 5 类失败模式清单</text>
  </g>

  <!-- ② 架构设计 -->
  <g transform="translate(355, 130)">
    <rect width="260" height="380" rx="14" fill="url(#s2)" stroke="#5b8cff" stroke-width="2" filter="url(#bsh4)"/>
    <circle cx="36" cy="36" r="22" fill="#5b8cff"/>
    <text x="36" y="44" font-size="18" fill="#fff" font-weight="800" text-anchor="middle">②</text>
    <text x="72" y="36" font-size="14" font-weight="700" fill="#1a2247">架构设计</text>
    <text x="72" y="55" font-size="11" fill="#475569">Architecture</text>

    <line x1="20" y1="78" x2="240" y2="78" stroke="#a3b8e0" stroke-width="0.8"/>

    <text x="20" y="106" font-size="12" font-weight="700" fill="#1a2247">问题</text>
    <text x="20" y="126" font-size="11" fill="#1a2247">主文档塞多少？方法论 / 案例 /</text>
    <text x="20" y="143" font-size="11" fill="#1a2247">模板各放哪？</text>

    <text x="20" y="180" font-size="12" font-weight="700" fill="#1a2247">关键决策</text>
    <text x="20" y="200" font-size="11" fill="#1a2247">轻 SKILL.md（方法论）</text>
    <text x="20" y="217" font-size="11" fill="#1a2247">+ 重 references（案例库）</text>
    <text x="20" y="234" font-size="11" fill="#1a2247">+ templates（可 fork 骨架）</text>

    <rect x="20" y="252" width="220" height="48" rx="6" fill="#fff" stroke="#a3b8e0" stroke-width="1"/>
    <text x="30" y="270" font-size="10" font-weight="700" fill="#475569">📌 渐进披露原则</text>
    <text x="30" y="287" font-size="10.5" fill="#1a2247">主文档短，模型才记得住核心</text>

    <text x="20" y="328" font-size="12" font-weight="700" fill="#1a2247">产出</text>
    <text x="20" y="348" font-size="11" fill="#1a2247">• SKILL.md 主文档</text>
    <text x="20" y="365" font-size="11" fill="#1a2247">• references/ + templates/</text>
  </g>

  <!-- ③ 实现细节 -->
  <g transform="translate(650, 130)">
    <rect width="260" height="380" rx="14" fill="url(#s3)" stroke="#9b56cc" stroke-width="2" filter="url(#bsh4)"/>
    <circle cx="36" cy="36" r="22" fill="#9b56cc"/>
    <text x="36" y="44" font-size="18" fill="#fff" font-weight="800" text-anchor="middle">③</text>
    <text x="72" y="36" font-size="14" font-weight="700" fill="#3a0a4d">实现细节</text>
    <text x="72" y="55" font-size="11" fill="#6b3590">Implementation</text>

    <line x1="20" y1="78" x2="240" y2="78" stroke="#c4a3e0" stroke-width="0.8"/>

    <text x="20" y="106" font-size="12" font-weight="700" fill="#3a0a4d">问题</text>
    <text x="20" y="126" font-size="11" fill="#3a0a4d">5 维度从哪来？工作流</text>
    <text x="20" y="143" font-size="11" fill="#3a0a4d">少了哪条铁律？</text>

    <text x="20" y="180" font-size="12" font-weight="700" fill="#3a0a4d">关键决策</text>
    <text x="20" y="200" font-size="11" fill="#3a0a4d">5 维度从失败模式逆推；</text>
    <text x="20" y="217" font-size="11" fill="#3a0a4d">+ Step 5 「优化即执行」</text>
    <text x="20" y="234" font-size="11" fill="#3a0a4d">根除"优化完不写"的隐性塌</text>

    <rect x="20" y="252" width="220" height="48" rx="6" fill="#fff" stroke="#c4a3e0" stroke-width="1"/>
    <text x="30" y="270" font-size="10" font-weight="700" fill="#6b3590">📌 显式化隐性约束</text>
    <text x="30" y="287" font-size="10.5" fill="#3a0a4d">用户没说但显然想要的事</text>

    <text x="20" y="328" font-size="12" font-weight="700" fill="#3a0a4d">产出</text>
    <text x="20" y="348" font-size="11" fill="#3a0a4d">• 5 维度对照表</text>
    <text x="20" y="365" font-size="11" fill="#3a0a4d">• 5 步工作流 + 铁律</text>
  </g>

  <!-- ④ 定型上线 -->
  <g transform="translate(945, 130)">
    <rect width="200" height="380" rx="14" fill="url(#s4)" stroke="#2c8a3a" stroke-width="2" filter="url(#bsh4)"/>
    <circle cx="36" cy="36" r="22" fill="#2c8a3a"/>
    <text x="36" y="44" font-size="18" fill="#fff" font-weight="800" text-anchor="middle">④</text>
    <text x="72" y="36" font-size="13" font-weight="700" fill="#0e3a1a">定型上线</text>
    <text x="72" y="55" font-size="10.5" fill="#1f5c2c">Shipping</text>

    <line x1="20" y1="78" x2="180" y2="78" stroke="#7cc098" stroke-width="0.8"/>

    <text x="20" y="106" font-size="12" font-weight="700" fill="#0e3a1a">问题</text>
    <text x="20" y="126" font-size="11" fill="#0e3a1a">怎么让 skill 知道</text>
    <text x="20" y="143" font-size="11" fill="#0e3a1a">自己什么时候不该上？</text>

    <text x="20" y="180" font-size="12" font-weight="700" fill="#0e3a1a">关键决策</text>
    <text x="20" y="200" font-size="11" fill="#0e3a1a">内置反触发清单：</text>
    <text x="20" y="217" font-size="11" fill="#0e3a1a">代码 / 数据 / Agent /</text>
    <text x="20" y="234" font-size="11" fill="#0e3a1a">短文案 / 内部文档</text>

    <rect x="20" y="252" width="160" height="48" rx="6" fill="#fff" stroke="#7cc098" stroke-width="1"/>
    <text x="30" y="270" font-size="10" font-weight="700" fill="#1f5c2c">📌 知道边界</text>
    <text x="30" y="287" font-size="10.5" fill="#0e3a1a">不强行套用比啥都能用更值钱</text>

    <text x="20" y="328" font-size="12" font-weight="700" fill="#0e3a1a">产出</text>
    <text x="20" y="348" font-size="11" fill="#0e3a1a">• 反触发清单</text>
    <text x="20" y="365" font-size="11" fill="#0e3a1a">• 例外条件</text>
  </g>

  <!-- 连接箭头 -->
  <g stroke="#5b8cff" stroke-width="2.5" fill="none" marker-end="url(#arr2)">
    <line x1="320" y1="320" x2="350" y2="320"/>
    <line x1="615" y1="320" x2="645" y2="320"/>
    <line x1="910" y1="320" x2="940" y2="320"/>
  </g>

  <!-- 底部时间轴 -->
  <g transform="translate(60, 560)">
    <rect width="1085" height="78" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="20" y="28" font-size="13" font-weight="700" fill="#1a2247">⏱ 整个开发过程的核心节奏</text>
    <text x="20" y="52" font-size="12" fill="#475569">
      <tspan font-weight="600" fill="#f59e0b">收窄场景</tspan> → 
      <tspan font-weight="600" fill="#5b8cff">分层架构</tspan> → 
      <tspan font-weight="600" fill="#9b56cc">从失败模式逆推规则</tspan> → 
      <tspan font-weight="600" fill="#2c8a3a">显式标注边界</tspan>
    </text>
    <text x="20" y="70" font-size="11" fill="#94a3b8" font-style="italic">
      每个决策都来自一个具体的失败案例，而不是来自"我觉得这样比较优雅"
    </text>
  </g>
</svg>
