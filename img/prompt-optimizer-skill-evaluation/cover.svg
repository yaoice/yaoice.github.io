<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1530"/>
      <stop offset="100%" stop-color="#1a2247"/>
    </linearGradient>
    <linearGradient id="leftCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2240"/>
      <stop offset="100%" stop-color="#2a1830"/>
    </linearGradient>
    <linearGradient id="rightCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#143a3e"/>
      <stop offset="100%" stop-color="#0e2a2e"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3aa9ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.06"/>
    </pattern>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c5cff"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- 主题 -->
  <text x="60" y="78" font-size="34" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
    把"模糊一句话"重写成深度博文 prompt
  </text>
  <text x="60" y="115" font-size="17" fill="#9aa5d6" font-weight="400">
    prompt-optimizer skill · 设计 / 评测 / 三轮迭代到 100% F1
  </text>

  <!-- 左卡片：模糊 prompt -->
  <rect x="60" y="170" width="380" height="360" rx="14" fill="url(#leftCard)" stroke="#5a3270" stroke-width="1"/>
  <text x="80" y="208" font-size="13" fill="#e89cff" letter-spacing="2" font-weight="600">BEFORE · 模糊请求</text>
  <text x="80" y="245" font-size="20" fill="#ffffff" font-weight="600">"</text>
  <text x="92" y="270" font-size="18" fill="#ffd9f4" font-weight="500">基于这个 URL，</text>
  <text x="92" y="298" font-size="18" fill="#ffd9f4" font-weight="500">写一篇博文，</text>
  <text x="92" y="326" font-size="18" fill="#ffd9f4" font-weight="500">图文并茂。</text>
  <text x="80" y="350" font-size="20" fill="#ffffff" font-weight="600">"</text>

  <!-- 失败模式三连 -->
  <g font-size="13" fill="#ff8db5">
    <text x="80" y="408">✗ 配图只有一张封面</text>
    <text x="80" y="438">✗ 写成"AI 百科条目"</text>
    <text x="80" y="468">✗ 复述原文，缺洞察</text>
    <text x="80" y="498">✗ 排版冗长无节奏</text>
  </g>

  <!-- 中间：5 维度补齐 -->
  <g transform="translate(490, 200)">
    <text x="100" y="0" font-size="14" fill="#7c5cff" letter-spacing="3" font-weight="600" text-anchor="middle">prompt-optimizer skill</text>
    <text x="100" y="24" font-size="12" fill="#6271b0" text-anchor="middle">5 维度补齐 · 5 步工作流</text>

    <!-- 5 个圆点 -->
    <g font-size="11" fill="#ffffff">
      <g transform="translate(20, 56)">
        <circle r="20" fill="#3aa9ff" opacity="0.85"/>
        <text y="4" text-anchor="middle" font-weight="700">①</text>
        <text x="0" y="44" text-anchor="middle" fill="#bdd7ff">受众</text>
      </g>
      <g transform="translate(80, 56)">
        <circle r="20" fill="#5b8cff" opacity="0.85"/>
        <text y="4" text-anchor="middle" font-weight="700">②</text>
        <text x="0" y="44" text-anchor="middle" fill="#bdd7ff">深度</text>
      </g>
      <g transform="translate(140, 56)">
        <circle r="20" fill="#7c5cff" opacity="0.9"/>
        <text y="4" text-anchor="middle" font-weight="700">③</text>
        <text x="0" y="44" text-anchor="middle" fill="#bdd7ff">结构</text>
      </g>
      <g transform="translate(20, 130)">
        <circle r="20" fill="#9b56cc" opacity="0.85"/>
        <text y="4" text-anchor="middle" font-weight="700">④</text>
        <text x="0" y="44" text-anchor="middle" fill="#dbb8ff">视觉</text>
      </g>
      <g transform="translate(80, 130)">
        <circle r="20" fill="#bb55a8" opacity="0.85"/>
        <text y="4" text-anchor="middle" font-weight="700">⑤</text>
        <text x="0" y="44" text-anchor="middle" fill="#ffc8e8">阅读</text>
      </g>
    </g>

    <!-- 中间箭头 -->
    <line x1="-30" y1="200" x2="230" y2="200" stroke="url(#dim)" stroke-width="3" marker-end="url(#arr)"/>
    <text x="100" y="190" font-size="12" fill="#9aa5d6" text-anchor="middle" font-style="italic">立即执行写正文</text>
  </g>

  <!-- 右卡片：深度博文产物 -->
  <rect x="760" y="170" width="380" height="360" rx="14" fill="url(#rightCard)" stroke="#1f5c63" stroke-width="1"/>
  <text x="780" y="208" font-size="13" fill="#3ee0d8" letter-spacing="2" font-weight="600">AFTER · 深度博文 prompt</text>
  <text x="780" y="240" font-size="14" fill="#bdf7f3" font-weight="500">📌 面向 [LLM 应用工程师]</text>
  <text x="780" y="266" font-size="14" fill="#bdf7f3" font-weight="500">📌 提炼洞察 + 反常识判断</text>
  <text x="780" y="292" font-size="14" fill="#bdf7f3" font-weight="500">📌 引言/核心/案例/总结</text>
  <text x="780" y="318" font-size="14" fill="#bdf7f3" font-weight="500">📌 4 个节点配图描述</text>
  <text x="780" y="344" font-size="14" fill="#bdf7f3" font-weight="500">📌 排版适合长技术文</text>

  <!-- 评测成绩 -->
  <line x1="780" y1="380" x2="1120" y2="380" stroke="#1f5c63" stroke-width="1"/>
  <text x="780" y="410" font-size="13" fill="#3ee0d8" letter-spacing="2" font-weight="600">EVAL · 三轮迭代结果</text>
  <g font-size="14">
    <text x="780" y="440" fill="#bdf7f3">质量评测</text>
    <text x="1120" y="440" text-anchor="end" fill="#ffffff" font-weight="600">21/21 vs 4/8</text>
    <text x="780" y="470" fill="#bdf7f3">触发评测 F1</text>
    <text x="1120" y="470" text-anchor="end" fill="#ffffff" font-weight="600">0.90 → 1.00</text>
    <text x="780" y="500" fill="#bdf7f3">3/3 全票一致</text>
    <text x="1120" y="500" text-anchor="end" fill="#54f0a3" font-weight="700">20 / 20 🎯</text>
  </g>

  <!-- 底部署名 -->
  <text x="60" y="568" font-size="12" fill="#5a6394">2026-05-16 · iceyao.github.io</text>
</svg>
