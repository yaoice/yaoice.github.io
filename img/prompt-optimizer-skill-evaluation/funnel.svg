<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="-apple-system, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf8"/>
      <stop offset="100%" stop-color="#f0eee8"/>
    </linearGradient>
    <pattern id="dot" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#000" opacity="0.05"/>
    </pattern>
    <linearGradient id="t1" x1="0" x2="1"><stop offset="0%" stop-color="#fff4e8"/><stop offset="100%" stop-color="#ffe6cc"/></linearGradient>
    <linearGradient id="t2" x1="0" x2="1"><stop offset="0%" stop-color="#ffe2cc"/><stop offset="100%" stop-color="#ffc497"/></linearGradient>
    <linearGradient id="t3" x1="0" x2="1"><stop offset="0%" stop-color="#ffc1a1"/><stop offset="100%" stop-color="#fa9978"/></linearGradient>
    <linearGradient id="t4" x1="0" x2="1"><stop offset="0%" stop-color="#f8a09c"/><stop offset="100%" stop-color="#e8625a"/></linearGradient>
    <filter id="shadow"><feGaussianBlur stdDeviation="3" in="SourceAlpha"/><feOffset dx="0" dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="620" fill="url(#bg2)"/>
  <rect width="1200" height="620" fill="url(#dot)"/>

  <!-- 主题句 -->
  <text x="600" y="56" font-size="22" font-weight="700" fill="#1a2247" text-anchor="middle">
    模糊 prompt 的失败漏斗 · 信号缺失越多，产出越塌
  </text>
  <text x="600" y="84" font-size="13" fill="#6b7280" text-anchor="middle">
    每丢一个维度，写作质量按几何级数下滑——补齐 5 维度才是底线
  </text>

  <!-- 漏斗 -->
  <g transform="translate(120, 130)">
    <!-- 第 1 层：模糊原始 prompt -->
    <path d="M 80 0 L 880 0 L 800 80 L 160 80 Z" fill="url(#t1)" stroke="#e2c498" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="480" y="40" font-size="17" font-weight="700" fill="#5d3a14" text-anchor="middle">"基于这个 URL，写一篇博文，图文并茂"</text>
    <text x="480" y="62" font-size="12" fill="#8b6332" text-anchor="middle">看似清楚，实则缺 5 类信号</text>

    <!-- 第 2 层：缺受众 -->
    <path d="M 160 100 L 800 100 L 740 180 L 220 180 Z" fill="url(#t2)" stroke="#d49058" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="480" y="138" font-size="15" font-weight="600" fill="#5a3010" text-anchor="middle">没说受众 → 写成"百科条目"</text>
    <text x="480" y="160" font-size="11" fill="#7a4820" text-anchor="middle">谁都能看的中性叙述，没人记得住</text>

    <!-- 第 3 层：缺结构+视觉 -->
    <path d="M 220 200 L 740 200 L 670 280 L 290 280 Z" fill="url(#t3)" stroke="#d96a40" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="480" y="238" font-size="15" font-weight="600" fill="#4a1a08" text-anchor="middle">没说结构 + 视觉位置 → 一张封面交差</text>
    <text x="480" y="260" font-size="11" fill="#702c14" text-anchor="middle">结构混乱、配图敷衍，读者扫一眼就关</text>

    <!-- 第 4 层：缺深度+风格 -->
    <path d="M 290 300 L 670 300 L 600 380 L 360 380 Z" fill="url(#t4)" stroke="#c84438" stroke-width="2" filter="url(#shadow)"/>
    <text x="480" y="338" font-size="15" font-weight="700" fill="#3a0808" text-anchor="middle">没说深度 + 风格 → 复述原文 + 营销腔</text>
    <text x="480" y="360" font-size="11" fill="#5a1010" text-anchor="middle">没洞察、没判断、堆形容词，发出去没人转</text>

    <!-- 漏斗底 -->
    <g transform="translate(480, 420)">
      <circle r="32" fill="#1a2247" opacity="0.92"/>
      <text y="6" font-size="22" fill="#fff" text-anchor="middle" font-weight="800">塌</text>
    </g>
  </g>

  <!-- 右侧标注 -->
  <g font-size="12" fill="#475569">
    <text x="1040" y="170" text-anchor="end">第 1 跌</text>
    <text x="1040" y="270" text-anchor="end">第 2 跌</text>
    <text x="1040" y="370" text-anchor="end">第 3 跌</text>
    <text x="1040" y="470" text-anchor="end" fill="#c84438" font-weight="700">最终塌方</text>
  </g>
  <line x1="950" y1="180" x2="1010" y2="180" stroke="#94a3b8" stroke-dasharray="3,3"/>
  <line x1="900" y1="280" x2="1010" y2="280" stroke="#94a3b8" stroke-dasharray="3,3"/>
  <line x1="850" y1="380" x2="1010" y2="380" stroke="#94a3b8" stroke-dasharray="3,3"/>

  <!-- 底注 -->
  <text x="600" y="600" font-size="11" fill="#94a3b8" text-anchor="middle" font-style="italic">
    prompt-optimizer 的目标 = 在用户进入这个漏斗之前，把 5 维度信号一次性补齐
  </text>
</svg>
