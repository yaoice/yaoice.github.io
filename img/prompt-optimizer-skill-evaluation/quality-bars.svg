<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfbf8"/>
      <stop offset="100%" stop-color="#f4f3ee"/>
    </linearGradient>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#000" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <linearGradient id="green" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2c8a3a"/>
      <stop offset="100%" stop-color="#54c870"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#e8625a"/>
    </linearGradient>
    <filter id="bsh"><feGaussianBlur in="SourceAlpha" stdDeviation="2"/><feOffset dx="1" dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="640" fill="url(#bg3)"/>
  <rect width="1200" height="640" fill="url(#grid3)"/>

  <!-- 标题 -->
  <text x="600" y="50" font-size="22" font-weight="700" fill="#1a2247" text-anchor="middle">
    质量评测：with_skill 客观断言通过率全面碾压 baseline
  </text>
  <text x="600" y="78" font-size="13" fill="#6b7280" text-anchor="middle">
    5 个真实写作 case · 每 case 跑 with_skill 与 without_skill 各一份 · 自动 grading
  </text>

  <!-- 坐标轴 -->
  <g transform="translate(120, 130)">
    <!-- Y 轴 -->
    <line x1="0" y1="0" x2="0" y2="380" stroke="#1a2247" stroke-width="1.5"/>
    <line x1="0" y1="380" x2="980" y2="380" stroke="#1a2247" stroke-width="1.5"/>
    <!-- Y 轴刻度 -->
    <g font-size="11" fill="#475569">
      <text x="-10" y="384" text-anchor="end">0</text>
      <text x="-10" y="289" text-anchor="end">25%</text>
      <text x="-10" y="194" text-anchor="end">50%</text>
      <text x="-10" y="99" text-anchor="end">75%</text>
      <text x="-10" y="6" text-anchor="end">100%</text>
    </g>
    <!-- 横向网格 -->
    <line x1="0" y1="285" x2="980" y2="285" stroke="#cbd5e1" stroke-dasharray="2,3" stroke-width="0.6"/>
    <line x1="0" y1="190" x2="980" y2="190" stroke="#cbd5e1" stroke-dasharray="2,3" stroke-width="0.6"/>
    <line x1="0" y1="95" x2="980" y2="95" stroke="#cbd5e1" stroke-dasharray="2,3" stroke-width="0.6"/>
    <line x1="0" y1="0" x2="980" y2="0" stroke="#cbd5e1" stroke-dasharray="2,3" stroke-width="0.6"/>
    <text x="-50" y="190" font-size="11" fill="#94a3b8" transform="rotate(-90 -50 190)" text-anchor="middle">客观断言通过率</text>

    <!-- 5 组柱状图 -->
    <!-- case 数据：[name, with%, without%, with-pass, with-total, without-pass, without-total] -->
    <!-- eval-0: 100, 33  ｜ eval-1: 100, 0  ｜ eval-2: 100, 50  ｜ eval-3: 100, 100 ｜ eval-4: 100, 100* -->
    <g>
      <!-- eval-0 -->
      <g transform="translate(50, 0)">
        <rect x="0" y="0" width="60" height="380" fill="url(#green)" filter="url(#bsh)"/>
        <rect x="70" y="253" width="60" height="127" fill="url(#red)" filter="url(#bsh)"/>
        <text x="30" y="-10" font-size="13" font-weight="700" fill="#1f5c2c" text-anchor="middle">100%</text>
        <text x="30" y="14" font-size="10" fill="#fff" text-anchor="middle">3/3</text>
        <text x="100" y="243" font-size="13" font-weight="700" fill="#8c2018" text-anchor="middle">33%</text>
        <text x="100" y="275" font-size="10" fill="#fff" text-anchor="middle">1/3</text>
        <text x="65" y="402" font-size="12" fill="#1a2247" text-anchor="middle" font-weight="600">eval-0</text>
        <text x="65" y="418" font-size="10.5" fill="#475569" text-anchor="middle">URL 博文</text>
      </g>
      <!-- eval-1 -->
      <g transform="translate(240, 0)">
        <rect x="0" y="0" width="60" height="380" fill="url(#green)" filter="url(#bsh)"/>
        <rect x="70" y="380" width="60" height="0" fill="url(#red)"/>
        <rect x="70" y="375" width="60" height="5" fill="url(#red)" filter="url(#bsh)"/>
        <text x="30" y="-10" font-size="13" font-weight="700" fill="#1f5c2c" text-anchor="middle">100%</text>
        <text x="30" y="14" font-size="10" fill="#fff" text-anchor="middle">5/5</text>
        <text x="100" y="370" font-size="13" font-weight="700" fill="#8c2018" text-anchor="middle">0%</text>
        <text x="100" y="395" font-size="10" fill="#8c2018" text-anchor="middle">0/1</text>
        <text x="65" y="402" font-size="12" fill="#1a2247" text-anchor="middle" font-weight="600">eval-1</text>
        <text x="65" y="418" font-size="10.5" fill="#475569" text-anchor="middle">纯主题</text>
      </g>
      <!-- eval-2 -->
      <g transform="translate(430, 0)">
        <rect x="0" y="0" width="60" height="380" fill="url(#green)" filter="url(#bsh)"/>
        <rect x="70" y="190" width="60" height="190" fill="url(#red)" filter="url(#bsh)"/>
        <text x="30" y="-10" font-size="13" font-weight="700" fill="#1f5c2c" text-anchor="middle">100%</text>
        <text x="30" y="14" font-size="10" fill="#fff" text-anchor="middle">6/6</text>
        <text x="100" y="180" font-size="13" font-weight="700" fill="#8c2018" text-anchor="middle">50%</text>
        <text x="100" y="220" font-size="10" fill="#fff" text-anchor="middle">1/2</text>
        <text x="65" y="402" font-size="12" fill="#1a2247" text-anchor="middle" font-weight="600">eval-2</text>
        <text x="65" y="418" font-size="10.5" fill="#475569" text-anchor="middle">资料解读</text>
      </g>
      <!-- eval-3 -->
      <g transform="translate(620, 0)">
        <rect x="0" y="0" width="60" height="380" fill="url(#green)" filter="url(#bsh)"/>
        <rect x="70" y="0" width="60" height="380" fill="url(#green)" opacity="0.55" filter="url(#bsh)"/>
        <text x="30" y="-10" font-size="13" font-weight="700" fill="#1f5c2c" text-anchor="middle">100%</text>
        <text x="30" y="14" font-size="10" fill="#fff" text-anchor="middle">2/2</text>
        <text x="100" y="-10" font-size="13" font-weight="700" fill="#1f5c2c" text-anchor="middle">100%</text>
        <text x="100" y="14" font-size="10" fill="#fff" text-anchor="middle">1/1</text>
        <text x="65" y="402" font-size="12" fill="#1a2247" text-anchor="middle" font-weight="600">eval-3</text>
        <text x="65" y="418" font-size="10.5" fill="#475569" text-anchor="middle">反触发</text>
      </g>
      <!-- eval-4 -->
      <g transform="translate(810, 0)">
        <rect x="0" y="0" width="60" height="380" fill="url(#green)" filter="url(#bsh)"/>
        <rect x="70" y="0" width="60" height="380" fill="url(#green)" opacity="0.55" filter="url(#bsh)"/>
        <text x="30" y="-10" font-size="13" font-weight="700" fill="#1f5c2c" text-anchor="middle">100%</text>
        <text x="30" y="14" font-size="10" fill="#fff" text-anchor="middle">5/5</text>
        <text x="100" y="-10" font-size="13" font-weight="700" fill="#5d8c2a" text-anchor="middle">100%*</text>
        <text x="100" y="14" font-size="10" fill="#fff" text-anchor="middle">1/1</text>
        <text x="65" y="402" font-size="12" fill="#1a2247" text-anchor="middle" font-weight="600">eval-4</text>
        <text x="65" y="418" font-size="10.5" fill="#475569" text-anchor="middle">显式索取</text>
      </g>
    </g>
  </g>

  <!-- 图例 -->
  <g transform="translate(900, 130)" font-size="12">
    <rect x="0" y="0" width="20" height="14" fill="url(#green)"/>
    <text x="28" y="12" fill="#1a2247">with_skill</text>
    <rect x="0" y="22" width="20" height="14" fill="url(#red)"/>
    <text x="28" y="34" fill="#1a2247">without_skill (baseline)</text>
  </g>

  <!-- 备注 -->
  <text x="600" y="588" font-size="12" fill="#475569" text-anchor="middle" font-weight="600">
    总分：with_skill <tspan fill="#2c8a3a" font-weight="700">21/21 (100%)</tspan> · baseline <tspan fill="#c0392b" font-weight="700">4/8 (50%)</tspan>
  </text>
  <text x="600" y="610" font-size="11" fill="#94a3b8" text-anchor="middle" font-style="italic">
    * eval-4 baseline 客观断言通过但实际质量塌：只改 prompt 没写正文，with_skill 立即写出完整文章
  </text>
</svg>
