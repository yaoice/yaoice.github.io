<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f4fbff"/></marker>
  </defs>
  <rect width="900" height="520" fill="url(#bg)" rx="14"/>
  <rect width="900" height="520" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">PATTERN SELECTION · DECISION TREE</text>

  <g filter="url(#glow)">
    <rect x="360" y="70" width="180" height="50" rx="8" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <text x="450" y="100" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">▶ TASK ANALYSIS</text>

    <polygon points="360,160 540,160 450,220" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="450" y="192" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">complexity?</text>

    <polygon points="110,260 290,260 200,320" fill="#1d1832" stroke="#8338ec" stroke-width="1"/>
    <text x="200" y="292" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">interactive?</text>

    <polygon points="610,260 790,260 700,320" fill="#1d1832" stroke="#8338ec" stroke-width="1"/>
    <text x="700" y="292" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">structured?</text>

    <rect x="40" y="370" width="140" height="50" rx="8" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="110" y="400" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">ReAct</text>
    <rect x="220" y="370" width="150" height="50" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="295" y="400" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">CoT</text>

    <polygon points="420,340 570,340 495,395" fill="#101b33" stroke="#7dd3fc" stroke-width="1"/>
    <text x="495" y="372" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="bold">parallel?</text>
    <polygon points="610,340 770,340 690,395" fill="#101b33" stroke="#7dd3fc" stroke-width="1"/>
    <text x="690" y="372" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="bold">learning?</text>

    <rect x="380" y="440" width="150" height="50" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="455" y="470" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">Plan-Execute</text>
    <rect x="540" y="440" width="130" height="50" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="605" y="470" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">Multi-Agent</text>
    <rect x="680" y="440" width="110" height="50" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="735" y="470" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">Ralph</text>
    <rect x="795" y="440" width="95" height="50" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="842" y="470" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">Hierarch</text>
  </g>

  <g stroke-width="1.5" fill="none" filter="url(#glow)">
    <line x1="450" y1="120" x2="450" y2="158" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="400" y1="210" x2="220" y2="258" stroke="#a78bfa" marker-end="url(#arr)"/>
    <line x1="500" y1="210" x2="685" y2="258" stroke="#a78bfa" marker-end="url(#arr)"/>
    <line x1="180" y1="310" x2="110" y2="368" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="240" y1="310" x2="295" y2="368" stroke="#8338ec" marker-end="url(#arr)"/>
    <line x1="665" y1="310" x2="500" y2="340" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="715" y1="310" x2="690" y2="340" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="475" y1="390" x2="455" y2="438" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="540" y1="380" x2="605" y2="438" stroke="#fbbf24" marker-end="url(#arr)"/>
    <line x1="680" y1="390" x2="735" y2="438" stroke="#f472b6" marker-end="url(#arr)"/>
    <line x1="720" y1="390" x2="842" y2="438" stroke="#8338ec" marker-end="url(#arr)"/>
  </g>

  <g fill="#fbbf24" font-size="10" font-family="monospace">
    <text x="295" y="230">simple</text>
    <text x="580" y="230">complex</text>
    <text x="135" y="345">yes</text>
    <text x="275" y="345">no</text>
    <text x="560" y="330">high</text>
    <text x="715" y="330">low</text>
    <text x="465" y="425">yes</text>
    <text x="560" y="425">no</text>
    <text x="700" y="425">yes</text>
    <text x="800" y="425">no</text>
  </g>
</svg>
