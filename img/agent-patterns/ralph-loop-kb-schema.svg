<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="500" fill="url(#bg)" rx="14"/>
  <rect width="900" height="500" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="38" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">KNOWLEDGE BASE · ER SCHEMA</text>
  <text x="450" y="58" text-anchor="middle" fill="#8aa4c8" font-size="11" letter-spacing="3">知识库实体关系模型</text>

  <!-- KB 中心 -->
  <g filter="url(#glow)">
    <rect x="355" y="200" width="190" height="140" rx="6" fill="#0c162c" stroke="#8338ec" stroke-width="2"/>
    <rect x="355" y="200" width="190" height="32" rx="6" fill="#8338ec" opacity="0.2"/>
  </g>
  <text x="450" y="221" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">⬢ KNOWLEDGE_BASE</text>
  <g font-size="11" font-family="monospace" fill="#e5d4ff">
    <text x="370" y="252">🔑 id</text>
    <text x="370" y="270">   type</text>
    <text x="370" y="288">   content</text>
    <text x="370" y="306">   confidence: float</text>
    <text x="370" y="324">   created_at · updated_at</text>
  </g>

  <!-- FACTS -->
  <g filter="url(#glow)">
    <rect x="40" y="70" width="220" height="130" rx="6" fill="#0c162c" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="40" y="70" width="220" height="28" rx="6" fill="#7dd3fc" opacity="0.18"/>
  </g>
  <text x="150" y="89" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">▣ FACTS · 事实</text>
  <g font-size="11" font-family="monospace" fill="#dbeafe">
    <text x="55" y="115">🔑 fact_id</text>
    <text x="55" y="133">   entity</text>
    <text x="55" y="151">   relation</text>
    <text x="55" y="169">   value</text>
    <text x="55" y="187">   confidence</text>
  </g>

  <!-- RULES -->
  <g filter="url(#glow)">
    <rect x="640" y="70" width="220" height="130" rx="6" fill="#0c162c" stroke="#f472b6" stroke-width="1.5"/>
    <rect x="640" y="70" width="220" height="28" rx="6" fill="#f472b6" opacity="0.18"/>
  </g>
  <text x="750" y="89" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">▣ RULES · 规则</text>
  <g font-size="11" font-family="monospace" fill="#fde7f3">
    <text x="655" y="115">🔑 rule_id</text>
    <text x="655" y="133">   condition</text>
    <text x="655" y="151">   action</text>
    <text x="655" y="169">   success_rate</text>
    <text x="655" y="187">   usage_count</text>
  </g>

  <!-- PATTERNS -->
  <g filter="url(#glow)">
    <rect x="40" y="340" width="220" height="130" rx="6" fill="#0c162c" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="40" y="340" width="220" height="28" rx="6" fill="#fbbf24" opacity="0.18"/>
  </g>
  <text x="150" y="359" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">▣ PATTERNS · 模式</text>
  <g font-size="11" font-family="monospace" fill="#ffdc70">
    <text x="55" y="385">🔑 pattern_id</text>
    <text x="55" y="403">   context</text>
    <text x="55" y="421">   pattern_type</text>
    <text x="55" y="439">   parameters: json</text>
    <text x="55" y="457">   effectiveness</text>
  </g>

  <!-- EXPERIENCES -->
  <g filter="url(#glow)">
    <rect x="640" y="340" width="220" height="130" rx="6" fill="#0c162c" stroke="#6ee7b7" stroke-width="1.5"/>
    <rect x="640" y="340" width="220" height="28" rx="6" fill="#6ee7b7" opacity="0.18"/>
  </g>
  <text x="750" y="359" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">▣ EXPERIENCES · 经验</text>
  <g font-size="11" font-family="monospace" fill="#dcfce7">
    <text x="655" y="385">🔑 exp_id</text>
    <text x="655" y="403">   task_type</text>
    <text x="655" y="421">   context · actions</text>
    <text x="655" y="439">   outcomes</text>
    <text x="655" y="457">   reward</text>
  </g>

  <!-- 关系线 -->
  <g stroke="#a78bfa" stroke-width="1.2" fill="none" opacity="0.7">
    <line x1="260" y1="135" x2="353" y2="230"/>
    <line x1="640" y1="135" x2="547" y2="230"/>
    <line x1="260" y1="405" x2="353" y2="315"/>
    <line x1="640" y1="405" x2="547" y2="315"/>
  </g>
  <g font-size="10" font-family="monospace" fill="#fbbf24">
    <text x="290" y="185">1:N</text>
    <text x="585" y="185">1:N</text>
    <text x="290" y="330">1:N</text>
    <text x="585" y="330">1:N</text>
  </g>
</svg>
