    <text x="160" y="388" text-anchor="middle" fill="#d6a6c2" font-size="10">协作进化</text>
    <text x="60" y="412" fill="#fde7f3">› massive_scale()</text>
    <text x="60" y="430" fill="#fde7f3">› decentralized()</text>
    <text x="60" y="448" fill="#fde7f3">› swarm_intelligence</text>

