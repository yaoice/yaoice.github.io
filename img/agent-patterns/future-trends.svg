    <text x="450" y="435" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">⑤ APPLICATION REACH</text>
    <text x="450" y="453" text-anchor="middle" fill="#c49a3f" font-size="10">应用拓展</text>
    <text x="450" y="475" text-anchor="middle" fill="#ffdc70">vertical · edge · realtime</text>
  </g>

  <g stroke-width="1" stroke-dasharray="4 3" opacity="0.7">
    <line x1="280" y1="145" x2="395" y2="235" stroke="#7dd3fc"/>
    <line x1="620" y1="145" x2="505" y2="235" stroke="#6ee7b7"/>
