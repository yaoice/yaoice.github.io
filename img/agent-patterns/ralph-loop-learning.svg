<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="420" fill="url(#bg)" rx="14"/>
  <rect width="900" height="420" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="38" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">ADAPTIVE LEARNING · INNER LOOP × ALGORITHMS</text>

  <!-- 内循环 -->
  <text x="220" y="85" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold" letter-spacing="2">◄ INNER LOOP</text>
  <g filter="url(#glow)">
    <circle cx="105" cy="180" r="55" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <circle cx="340" cy="180" r="55" fill="#0c162c" stroke="#6ee7b7" stroke-width="2"/>
    <circle cx="340" cy="320" r="55" fill="#0c162c" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="105" cy="320" r="55" fill="#0c162c" stroke="#f472b6" stroke-width="2"/>
  </g>
  <g text-anchor="middle" font-size="12" font-weight="bold">
    <text x="105" y="176" fill="#7dd3fc">EXPERIENCE</text>
    <text x="105" y="193" fill="#8aa4c8" font-size="10">经验收集</text>
    <text x="340" y="176" fill="#6ee7b7">PATTERN</text>
    <text x="340" y="193" fill="#9ad0b7" font-size="10">模式识别</text>
    <text x="340" y="316" fill="#fbbf24">KNOWLEDGE</text>
    <text x="340" y="333" fill="#c49a3f" font-size="10">知识抽取</text>
    <text x="105" y="316" fill="#f9a8d4">STRATEGY</text>
    <text x="105" y="333" fill="#d6a6c2" font-size="10">策略优化</text>
  </g>

  <g stroke-width="2" fill="none" filter="url(#glow)">
    <path d="M 160 170 L 284 170" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <path d="M 340 235 L 340 265" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <path d="M 284 330 L 160 330" stroke="#fbbf24" marker-end="url(#arr)"/>
    <path d="M 105 265 L 105 235" stroke="#f472b6" marker-end="url(#arr)"/>
  </g>

  <!-- 算法家族 -->
  <text x="680" y="85" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold" letter-spacing="2">ALGORITHM FAMILIES ►</text>
  <g filter="url(#glow)">
    <rect x="500" y="110" width="165" height="60" rx="8" fill="#0c162c" stroke="#8338ec" stroke-width="1.5"/>
    <text x="582" y="132" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">Reinforcement</text>
    <text x="582" y="155" text-anchor="middle" fill="#e5d4ff" font-size="10" font-family="monospace">reward → Exp</text>

    <rect x="685" y="110" width="165" height="60" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="767" y="132" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">Imitation</text>
    <text x="767" y="155" text-anchor="middle" fill="#dcfce7" font-size="10" font-family="monospace">demo → Pat</text>

    <rect x="500" y="190" width="165" height="60" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="582" y="212" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">Meta</text>
    <text x="582" y="235" text-anchor="middle" fill="#ffdc70" font-size="10" font-family="monospace">learn-to-learn → K</text>

    <rect x="685" y="190" width="165" height="60" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="767" y="212" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">Transfer</text>
    <text x="767" y="235" text-anchor="middle" fill="#fde7f3" font-size="10" font-family="monospace">reuse → Strat</text>
  </g>

  <g stroke-width="1" stroke-dasharray="4 3" opacity="0.6">
    <line x1="160" y1="180" x2="498" y2="140" stroke="#8338ec"/>
    <line x1="395" y1="180" x2="683" y2="140" stroke="#6ee7b7"/>
    <line x1="395" y1="320" x2="498" y2="220" stroke="#fbbf24"/>
    <line x1="160" y1="320" x2="683" y2="220" stroke="#f472b6"/>
  </g>

  <text x="450" y="400" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">mix &amp; match: each family binds to one inner-loop node, forming a composable capability matrix</text>
</svg>
