<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#11213f"/>
      <stop offset="100%" stop-color="#08111f"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21385d" stroke-width="0.5"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#7dd3fc" flood-opacity="0.35"/></filter>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7dd3fc"/><stop offset="100%" stop-color="#0077b6"/></linearGradient>
    <linearGradient id="magenta" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#c9184a"/></linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8338ec"/><stop offset="100%" stop-color="#5a189a"/></linearGradient>
    <linearGradient id="lime" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6ee7b7"/><stop offset="100%" stop-color="#00a86b"/></linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#fb5607"/></linearGradient>
  </defs>
  <rect width="900" height="540" fill="url(#bg)" rx="14"/>
  <rect width="900" height="540" fill="url(#grid)" rx="14" opacity="0.22"/>

  <text x="450" y="45" text-anchor="middle" fill="#f4fbff" font-size="22" font-weight="600" letter-spacing="2">AGENT CORE CAPABILITIES</text>
  <text x="450" y="68" text-anchor="middle" fill="#8aa4c8" font-size="11" letter-spacing="4">智能体核心能力全景</text>

  <!-- 中心节点 -->
  <circle cx="450" cy="280" r="72" fill="#0c162c" stroke="url(#cyan)" stroke-width="2" filter="url(#soft)"/>
  <circle cx="450" cy="280" r="60" fill="none" stroke="#7dd3fc" stroke-width="1" opacity="0.5"/>
  <text x="450" y="275" text-anchor="middle" fill="#7dd3fc" font-size="15" font-weight="bold" filter="url(#glow)">AGENT</text>
  <text x="450" y="295" text-anchor="middle" fill="#8aa4c8" font-size="10" letter-spacing="3">智能体</text>

  <!-- 感知 -->
  <g filter="url(#soft)">
    <rect x="40" y="100" width="210" height="110" rx="8" fill="#101b33" stroke="url(#cyan)" stroke-width="1.5" opacity="0.95"/>
    <rect x="40" y="100" width="4" height="110" fill="url(#cyan)"/>
  </g>
  <text x="60" y="128" fill="#7dd3fc" font-size="13" font-weight="bold">PERCEPTION</text>
  <text x="60" y="145" fill="#8aa4c8" font-size="10" letter-spacing="2">感知能力</text>
  <g font-size="11" fill="#dbeafe" font-family="monospace"><text x="60" y="168">› env.observe()</text><text x="60" y="185">› state.detect()</text><text x="60" y="202">› info.extract()</text></g>

  <!-- 推理 -->
  <g filter="url(#soft)"><rect x="650" y="100" width="210" height="110" rx="8" fill="#101b33" stroke="url(#purple)" stroke-width="1.5"/><rect x="856" y="100" width="4" height="110" fill="url(#purple)"/></g>
  <text x="840" y="128" text-anchor="end" fill="#a78bfa" font-size="13" font-weight="bold">REASONING</text>
  <text x="840" y="145" text-anchor="end" fill="#9d7ab3" font-size="10" letter-spacing="2">推理能力</text>
  <g font-size="11" fill="#e5d4ff" font-family="monospace" text-anchor="end"><text x="840" y="168">logic.infer() ‹</text><text x="840" y="185">cause.analyze() ‹</text><text x="840" y="202">pattern.match() ‹</text></g>

  <!-- 决策 -->
  <g filter="url(#soft)"><rect x="40" y="360" width="210" height="110" rx="8" fill="#101b33" stroke="url(#lime)" stroke-width="1.5"/><rect x="40" y="360" width="4" height="110" fill="url(#lime)"/></g>
  <text x="60" y="388" fill="#6ee7b7" font-size="13" font-weight="bold">DECISION</text>
  <text x="60" y="405" fill="#9ad0b7" font-size="10" letter-spacing="2">决策能力</text>
  <g font-size="11" fill="#dcfce7" font-family="monospace"><text x="60" y="428">› goal.set()</text><text x="60" y="445">› strategy.plan()</text><text x="60" y="462">› action.select()</text></g>

  <!-- 执行 -->
  <g filter="url(#soft)"><rect x="650" y="360" width="210" height="110" rx="8" fill="#101b33" stroke="url(#magenta)" stroke-width="1.5"/><rect x="856" y="360" width="4" height="110" fill="url(#magenta)"/></g>
  <text x="840" y="388" text-anchor="end" fill="#f9a8d4" font-size="13" font-weight="bold">ACTION</text>
  <text x="840" y="405" text-anchor="end" fill="#d6a6c2" font-size="10" letter-spacing="2">执行能力</text>
  <g font-size="11" fill="#fde7f3" font-family="monospace" text-anchor="end"><text x="840" y="428">tool.invoke() ‹</text><text x="840" y="445">api.call() ‹</text><text x="840" y="462">task.exec() ‹</text></g>

  <!-- 学习（底部） -->
  <g filter="url(#soft)"><rect x="330" y="485" width="240" height="45" rx="8" fill="#101b33" stroke="url(#amber)" stroke-width="1.5"/></g>
  <text x="450" y="505" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">LEARNING · 学习能力</text>
  <text x="450" y="521" text-anchor="middle" fill="#c49a3f" font-size="10" font-family="monospace">experience.accumulate() → knowledge.update()</text>

  <!-- 连线（辉光效果） -->
  <g stroke-width="1.2" opacity="0.7" filter="url(#glow)" fill="none">
    <path d="M 250 155 L 390 250" stroke="#7dd3fc"/>
    <path d="M 650 155 L 510 250" stroke="#a78bfa"/>
    <path d="M 250 415 L 390 310" stroke="#6ee7b7"/>
    <path d="M 650 415 L 510 310" stroke="#f9a8d4"/>
    <path d="M 450 352 L 450 485" stroke="#fbbf24"/>
  </g>
</svg>
