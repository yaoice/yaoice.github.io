<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/></marker>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f472b6"/></marker>
  </defs>
  <rect width="900" height="580" fill="url(#bg)" rx="14"/>
  <rect width="900" height="580" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="38" text-anchor="middle" fill="#f4fbff" font-size="19" font-weight="600" letter-spacing="2">MULTI-AGENT · SEQUENCE DIAGRAM</text>

  <g font-size="12" font-weight="bold" text-anchor="middle" filter="url(#glow)">
    <rect x="20" y="60" width="90" height="34" rx="5" fill="#101b33" stroke="#fbbf24" stroke-width="1.5"/><text x="65" y="82" fill="#fbbf24">U · 用户</text>
    <rect x="140" y="60" width="90" height="34" rx="5" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/><text x="185" y="82" fill="#7dd3fc">Coord</text>
    <rect x="280" y="60" width="100" height="34" rx="5" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/><text x="330" y="82" fill="#7dd3fc">Research</text>
    <rect x="420" y="60" width="100" height="34" rx="5" fill="#101b33" stroke="#6ee7b7" stroke-width="1.5"/><text x="470" y="82" fill="#6ee7b7">Analysis</text>
    <rect x="560" y="60" width="100" height="34" rx="5" fill="#101b33" stroke="#fbbf24" stroke-width="1.5"/><text x="610" y="82" fill="#fbbf24">Writing</text>
    <rect x="700" y="60" width="100" height="34" rx="5" fill="#101b33" stroke="#f472b6" stroke-width="1.5"/><text x="750" y="82" fill="#f9a8d4">Review</text>
  </g>

  <g stroke="#3a4670" stroke-width="0.8" stroke-dasharray="3 3">
    <line x1="65" y1="94" x2="65" y2="540"/>
    <line x1="185" y1="94" x2="185" y2="540"/>
    <line x1="330" y1="94" x2="330" y2="540"/>
    <line x1="470" y1="94" x2="470" y2="540"/>
    <line x1="610" y1="94" x2="610" y2="540"/>
    <line x1="750" y1="94" x2="750" y2="540"/>
  </g>

  <g font-size="11" font-family="monospace">
    <line x1="65" y1="120" x2="183" y2="120" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrA)"/>
    <text x="124" y="114" text-anchor="middle" fill="#fbbf24">1: submit_task()</text>

    <rect x="150" y="135" width="70" height="22" rx="3" fill="#101b33" stroke="#7dd3fc"/>
    <text x="185" y="150" text-anchor="middle" fill="#7dd3fc">decompose</text>

    <rect x="150" y="175" width="400" height="90" rx="6" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="162" y="192" fill="#fbbf24" font-weight="bold">par · PARALLEL</text>
    <line x1="187" y1="215" x2="328" y2="215" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="257" y="209" text-anchor="middle" fill="#7dd3fc">2a: research_task</text>
    <line x1="187" y1="245" x2="468" y2="245" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="327" y="239" text-anchor="middle" fill="#6ee7b7">2b: analysis_task</text>

    <line x1="330" y1="285" x2="187" y2="285" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="258" y="279" text-anchor="middle" fill="#7dd3fc">3: research_result</text>
    <line x1="470" y1="310" x2="187" y2="310" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="328" y="304" text-anchor="middle" fill="#6ee7b7">4: analysis_result</text>

    <line x1="187" y1="340" x2="608" y2="340" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrA)"/>
    <text x="397" y="334" text-anchor="middle" fill="#fbbf24">5: integrate + write_draft</text>

    <line x1="610" y1="370" x2="187" y2="370" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrA)"/>
    <text x="398" y="364" text-anchor="middle" fill="#fbbf24">6: draft_ready</text>

    <line x1="187" y1="400" x2="748" y2="400" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arrM)"/>
    <text x="467" y="394" text-anchor="middle" fill="#f472b6">7: submit_for_review</text>

    <line x1="750" y1="430" x2="187" y2="430" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arrM)"/>
    <text x="468" y="424" text-anchor="middle" fill="#f9a8d4">8: review_feedback</text>

    <rect x="150" y="450" width="620" height="70" rx="5" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="162" y="466" fill="#a78bfa" font-weight="bold">alt · needs_revision vs approved</text>
    <line x1="187" y1="485" x2="608" y2="485" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="397" y="479" text-anchor="middle" fill="#a78bfa">9a: revise(feedback)</text>
    <line x1="187" y1="510" x2="67" y2="510" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arr)"/>
    <text x="127" y="504" text-anchor="middle" fill="#7dd3fc" font-weight="bold">9b: deliver</text>
  </g>
</svg>
