<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f4fbff"/></marker>
  </defs>
  <rect width="900" height="500" fill="url(#bg)" rx="14"/>
  <rect width="900" height="500" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">MULTI-AGENT · COLLABORATION SYSTEM</text>

  <!-- 用户 -->
  <g filter="url(#glow)"><rect x="380" y="75" width="140" height="44" rx="22" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/></g>
  <text x="450" y="103" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">● USER</text>

  <!-- Coordinator -->
  <g filter="url(#glow)"><rect x="340" y="150" width="220" height="60" rx="8" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/></g>
  <text x="450" y="176" text-anchor="middle" fill="#7dd3fc" font-size="14" font-weight="bold">COORDINATOR</text>
  <text x="450" y="196" text-anchor="middle" fill="#8aa4c8" font-size="10" font-family="monospace">route · dispatch · aggregate</text>

  <!-- 四个专业 Agent -->
  <rect x="30" y="240" width="840" height="110" rx="10" fill="none" stroke="#8338ec" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="50" y="260" fill="#a78bfa" font-size="11" font-weight="bold" letter-spacing="2">▸ SPECIALIST AGENTS</text>

  <g filter="url(#glow)">
    <rect x="50" y="275" width="180" height="65" rx="8" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="250" y="275" width="180" height="65" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <rect x="450" y="275" width="180" height="65" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="650" y="275" width="180" height="65" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
  </g>
  <g text-anchor="middle">
    <text x="140" y="298" fill="#7dd3fc" font-size="13" font-weight="bold">RESEARCH</text>
    <text x="140" y="316" fill="#8aa4c8" font-size="10">研究专家</text>
    <text x="140" y="332" fill="#dbeafe" font-size="10" font-family="monospace">T=0.7 · 探索性</text>

    <text x="340" y="298" fill="#6ee7b7" font-size="13" font-weight="bold">ANALYSIS</text>
    <text x="340" y="316" fill="#9ad0b7" font-size="10">分析专家</text>
    <text x="340" y="332" fill="#dcfce7" font-size="10" font-family="monospace">T=0 · 严谨性</text>

    <text x="540" y="298" fill="#fbbf24" font-size="13" font-weight="bold">WRITING</text>
    <text x="540" y="316" fill="#c49a3f" font-size="10">写作专家</text>
    <text x="540" y="332" fill="#ffdc70" font-size="10" font-family="monospace">T=0.5 · 平衡</text>

    <text x="740" y="298" fill="#f9a8d4" font-size="13" font-weight="bold">REVIEW</text>
    <text x="740" y="316" fill="#d6a6c2" font-size="10">审核专家</text>
    <text x="740" y="332" fill="#fde7f3" font-size="10" font-family="monospace">T=0 · 严格</text>
  </g>

  <!-- 共享基础设施 -->
  <rect x="30" y="380" width="840" height="90" rx="10" fill="none" stroke="#8338ec" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="50" y="400" fill="#a78bfa" font-size="11" font-weight="bold" letter-spacing="2">▸ SHARED INFRASTRUCTURE</text>

  <g filter="url(#glow)" font-family="monospace" font-size="12">
    <ellipse cx="200" cy="440" rx="115" ry="22" fill="#101b33" stroke="#8338ec" stroke-width="1.2"/>
    <text x="200" y="445" text-anchor="middle" fill="#a78bfa">📚 KnowledgeBase</text>
    <ellipse cx="450" cy="440" rx="115" ry="22" fill="#101b33" stroke="#8338ec" stroke-width="1.2"/>
    <text x="450" y="445" text-anchor="middle" fill="#a78bfa">🗂 Workspace</text>
    <ellipse cx="700" cy="440" rx="115" ry="22" fill="#101b33" stroke="#8338ec" stroke-width="1.2"/>
    <text x="700" y="445" text-anchor="middle" fill="#a78bfa">📡 Communication</text>
  </g>

  <g stroke-width="1.5" fill="none" filter="url(#glow)">
    <line x1="450" y1="119" x2="450" y2="148" stroke="#fbbf24" marker-end="url(#arr)"/>
    <line x1="400" y1="210" x2="150" y2="273" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="430" y1="210" x2="345" y2="273" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="470" y1="210" x2="545" y2="273" stroke="#fbbf24" marker-end="url(#arr)"/>
    <line x1="500" y1="210" x2="745" y2="273" stroke="#f472b6" marker-end="url(#arr)"/>
  </g>
  <g stroke="#555" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.6">
    <line x1="140" y1="340" x2="200" y2="418"/>
    <line x1="340" y1="340" x2="450" y2="418"/>
    <line x1="540" y1="340" x2="450" y2="418"/>
    <line x1="740" y1="340" x2="700" y2="418"/>
  </g>
</svg>
