<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="320" fill="url(#bg)" rx="14"/>
  <rect width="900" height="320" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">CASE · AUTOMATED RESEARCH ASSISTANT</text>
  <text x="450" y="60" text-anchor="middle" fill="#8aa4c8" font-size="11" letter-spacing="3">多模式组合 Pipeline</text>

  <g filter="url(#glow)" font-size="12">
    <rect x="30" y="130" width="115" height="70" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="87" y="158" text-anchor="middle" fill="#fbbf24" font-weight="bold">RESEARCH Q</text>
    <text x="87" y="178" text-anchor="middle" fill="#c49a3f" font-size="10">研究问题</text>

    <rect x="170" y="130" width="130" height="70" rx="8" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="235" y="158" text-anchor="middle" fill="#7dd3fc" font-weight="bold">SEARCH</text>
    <text x="235" y="175" text-anchor="middle" fill="#8aa4c8" font-size="10">文献检索</text>
    <text x="235" y="190" text-anchor="middle" fill="#dbeafe" font-size="10" font-family="monospace">ReAct</text>

    <rect x="325" y="130" width="130" height="70" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="390" y="158" text-anchor="middle" fill="#a78bfa" font-weight="bold">ANALYZE</text>
    <text x="390" y="175" text-anchor="middle" fill="#9d7ab3" font-size="10">文献分析</text>
    <text x="390" y="190" text-anchor="middle" fill="#e5d4ff" font-size="10" font-family="monospace">CoT</text>

    <rect x="480" y="130" width="130" height="70" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="545" y="158" text-anchor="middle" fill="#fbbf24" font-weight="bold">HYPOTHESIZE</text>
    <text x="545" y="175" text-anchor="middle" fill="#c49a3f" font-size="10">假设生成</text>
    <text x="545" y="190" text-anchor="middle" fill="#ffdc70" font-size="10" font-family="monospace">Ralph</text>

    <rect x="635" y="130" width="130" height="70" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="700" y="158" text-anchor="middle" fill="#6ee7b7" font-weight="bold">VALIDATE</text>
    <text x="700" y="175" text-anchor="middle" fill="#9ad0b7" font-size="10">假设验证</text>
    <text x="700" y="190" text-anchor="middle" fill="#dcfce7" font-size="10" font-family="monospace">Plan-Exec</text>

    <rect x="790" y="130" width="80" height="70" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="830" y="158" text-anchor="middle" fill="#f9a8d4" font-weight="bold">REPORT</text>
    <text x="830" y="175" text-anchor="middle" fill="#d6a6c2" font-size="10">报告</text>
    <text x="830" y="190" text-anchor="middle" fill="#fde7f3" font-size="9" font-family="monospace">Multi-Agent</text>
  </g>

  <g stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="145" y1="165" x2="168" y2="165" stroke="#fbbf24" marker-end="url(#arr)"/>
    <line x1="300" y1="165" x2="323" y2="165" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="455" y1="165" x2="478" y2="165" stroke="#8338ec" marker-end="url(#arr)"/>
    <line x1="610" y1="165" x2="633" y2="165" stroke="#fbbf24" marker-end="url(#arr)"/>
    <line x1="765" y1="165" x2="788" y2="165" stroke="#6ee7b7" marker-end="url(#arr)"/>
  </g>

  <g fill="#8aa4c8" font-size="11" font-family="monospace">
    <text x="450" y="245" text-anchor="middle" fill="#f4fbff" font-weight="bold">INSIGHT · 每个环节选用最适配的模式</text>
    <text x="450" y="268" text-anchor="middle">search → need_flexibility ⟹ ReAct</text>
    <text x="450" y="285" text-anchor="middle">analyze → need_transparency ⟹ CoT</text>
    <text x="450" y="302" text-anchor="middle">hypothesize → need_learning ⟹ Ralph · validate → structured ⟹ Plan-Execute · report → collab ⟹ Multi-Agent</text>
  </g>
</svg>
