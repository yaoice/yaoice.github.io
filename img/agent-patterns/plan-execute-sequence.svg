<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/></marker>
  </defs>
  <rect width="900" height="560" fill="url(#bg)" rx="14"/>
  <rect width="900" height="560" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="38" text-anchor="middle" fill="#f4fbff" font-size="19" font-weight="600" letter-spacing="2">PLAN-AND-EXECUTE · SEQUENCE DIAGRAM</text>

  <!-- 角色头 -->
  <g font-size="12" font-weight="bold" text-anchor="middle">
    <g filter="url(#glow)">
      <rect x="30" y="60" width="100" height="36" rx="5" fill="#101b33" stroke="#fbbf24" stroke-width="1.5"/>
      <rect x="180" y="60" width="100" height="36" rx="5" fill="#101b33" stroke="#8338ec" stroke-width="1.5"/>
      <rect x="330" y="60" width="100" height="36" rx="5" fill="#101b33" stroke="#6ee7b7" stroke-width="1.5"/>
      <rect x="480" y="60" width="100" height="36" rx="5" fill="#101b33" stroke="#f472b6" stroke-width="1.5"/>
      <rect x="640" y="60" width="130" height="36" rx="5" fill="#101b33" stroke="#a78bfa" stroke-width="1.5"/>
    </g>
    <text x="80" y="82" fill="#fbbf24">USER</text>
    <text x="230" y="82" fill="#a78bfa">Planner</text>
    <text x="380" y="82" fill="#6ee7b7">Executor</text>
    <text x="530" y="82" fill="#f9a8d4">Monitor</text>
    <text x="705" y="82" fill="#a78bfa">Re-planner</text>
  </g>

  <g stroke="#3a4670" stroke-width="0.8" stroke-dasharray="3 3">
    <line x1="80" y1="96" x2="80" y2="540"/>
    <line x1="230" y1="96" x2="230" y2="540"/>
    <line x1="380" y1="96" x2="380" y2="540"/>
    <line x1="530" y1="96" x2="530" y2="540"/>
    <line x1="705" y1="96" x2="705" y2="540"/>
  </g>

  <g font-size="11" font-family="monospace">
    <line x1="82" y1="120" x2="225" y2="120" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrA)"/>
    <text x="153" y="114" text-anchor="middle" fill="#fbbf24">1: submit_task()</text>

    <rect x="195" y="135" width="70" height="24" rx="3" fill="#101b33" stroke="#8338ec"/>
    <text x="230" y="151" text-anchor="middle" fill="#a78bfa">analyze()</text>
    <rect x="195" y="167" width="70" height="24" rx="3" fill="#101b33" stroke="#8338ec"/>
    <text x="230" y="183" text-anchor="middle" fill="#a78bfa">generate()</text>

    <line x1="232" y1="210" x2="375" y2="210" stroke="#8338ec" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="303" y="204" text-anchor="middle" fill="#a78bfa">2: send_plan(steps)</text>

    <rect x="260" y="235" width="420" height="230" rx="6" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="272" y="250" fill="#fbbf24" font-weight="bold">loop · execute_steps</text>

    <rect x="345" y="265" width="70" height="22" rx="3" fill="#101b33" stroke="#6ee7b7"/>
    <text x="380" y="280" text-anchor="middle" fill="#6ee7b7">exec(step)</text>

    <line x1="382" y1="300" x2="525" y2="300" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="453" y="294" text-anchor="middle" fill="#6ee7b7">3: report_result</text>

    <rect x="495" y="315" width="70" height="22" rx="3" fill="#101b33" stroke="#f472b6"/>
    <text x="530" y="330" text-anchor="middle" fill="#f9a8d4">evaluate()</text>

    <rect x="280" y="348" width="400" height="100" rx="5" fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="3 2"/>
    <text x="292" y="362" fill="#a78bfa">alt · drift vs continue</text>

    <line x1="530" y1="380" x2="702" y2="380" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="615" y="374" text-anchor="middle" fill="#7dd3fc">trigger_replan</text>
    <line x1="702" y1="402" x2="235" y2="402" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
    <text x="470" y="416" text-anchor="middle" fill="#a78bfa">update_plan → Planner</text>

    <line x1="530" y1="434" x2="385" y2="434" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="455" y="428" text-anchor="middle" fill="#7dd3fc">continue_next</text>
  </g>

  <line x1="382" y1="490" x2="85" y2="490" stroke="#7dd3fc" stroke-width="2" filter="url(#glow)" marker-end="url(#arr)"/>
  <text x="235" y="484" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="bold" font-family="monospace">4: final_result</text>
</svg>
