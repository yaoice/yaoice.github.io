<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="440" fill="url(#bg)" rx="14"/>
  <rect width="900" height="440" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="38" text-anchor="middle" fill="#f4fbff" font-size="19" font-weight="600" letter-spacing="2">PARALLEL EXECUTION · TIMELINE</text>
  <text x="450" y="58" text-anchor="middle" fill="#8aa4c8" font-size="11" letter-spacing="3">并行执行时间线对比</text>

  <!-- 时间刻度 -->
  <g fill="#8aa4c8" font-size="11" font-family="monospace">
    <line x1="100" y1="90" x2="820" y2="90" stroke="#3a4670" stroke-width="1"/>
    <g text-anchor="middle" font-size="10">
      <text x="100" y="82">t=0</text><text x="172" y="82">1</text><text x="244" y="82">2</text><text x="316" y="82">3</text>
      <text x="388" y="82">4</text><text x="460" y="82">5</text><text x="532" y="82">6</text><text x="604" y="82">7</text>
      <text x="676" y="82">8</text><text x="748" y="82">9</text><text x="820" y="82">10</text>
    </g>
  </g>

  <!-- 串行 -->
  <text x="40" y="138" fill="#f9a8d4" font-size="13" font-weight="bold">SERIAL</text>
  <text x="40" y="154" fill="#d6a6c2" font-size="10" font-family="monospace">total=10</text>
  <g filter="url(#glow)">
    <rect x="100" y="115" width="144" height="40" rx="4" fill="#281629" stroke="#f472b6" stroke-width="1.2"/>
    <text x="172" y="140" text-anchor="middle" fill="#f9a8d4" font-size="11" font-family="monospace">step1</text>
    <rect x="244" y="115" width="144" height="40" rx="4" fill="#101b33" stroke="#7dd3fc" stroke-width="1.2"/>
    <text x="316" y="140" text-anchor="middle" fill="#7dd3fc" font-size="11" font-family="monospace">step2</text>
    <rect x="388" y="115" width="144" height="40" rx="4" fill="#0f2920" stroke="#6ee7b7" stroke-width="1.2"/>
    <text x="460" y="140" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="monospace">step3</text>
    <rect x="532" y="115" width="144" height="40" rx="4" fill="#2d2410" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="604" y="140" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="monospace">step4</text>
    <rect x="676" y="115" width="144" height="40" rx="4" fill="#1d1832" stroke="#8338ec" stroke-width="1.2"/>
    <text x="748" y="140" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="monospace">step5</text>
  </g>

  <line x1="40" y1="200" x2="860" y2="200" stroke="#3a4670" stroke-dasharray="3 3"/>

  <!-- 并行 -->
  <text x="40" y="238" fill="#7dd3fc" font-size="13" font-weight="bold">PARALLEL</text>
  <text x="40" y="254" fill="#8aa4c8" font-size="10" font-family="monospace">total=6 (-40%)</text>
  <g filter="url(#glow)">
    <rect x="100" y="215" width="144" height="36" rx="4" fill="#281629" stroke="#f472b6" stroke-width="1.2"/>
    <text x="172" y="238" text-anchor="middle" fill="#f9a8d4" font-size="11" font-family="monospace">step1</text>
    <rect x="244" y="215" width="144" height="36" rx="4" fill="#101b33" stroke="#7dd3fc" stroke-width="1.2"/>
    <text x="316" y="238" text-anchor="middle" fill="#7dd3fc" font-size="11" font-family="monospace">step2</text>
    <rect x="244" y="257" width="144" height="36" rx="4" fill="#0f2920" stroke="#6ee7b7" stroke-width="1.2"/>
    <text x="316" y="280" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="monospace">step3</text>
    <rect x="388" y="215" width="144" height="36" rx="4" fill="#2d2410" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="460" y="238" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="monospace">step4</text>
    <rect x="388" y="257" width="144" height="36" rx="4" fill="#1d1832" stroke="#8338ec" stroke-width="1.2"/>
    <text x="460" y="280" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="monospace">step5</text>
    <rect x="532" y="236" width="180" height="36" rx="4" fill="#0f3a4a" stroke="#7dd3fc" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="622" y="258" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="bold">SAVED 4 units</text>
  </g>

  <g fill="#8aa4c8" font-size="11" font-family="monospace">
    <text x="100" y="340" fill="#f4fbff" font-size="12" font-weight="bold">INSIGHT</text>
    <text x="100" y="362">› serial: total = sum(each_step)</text>
    <text x="100" y="382">› parallel: total = length(critical_path)</text>
    <text x="100" y="402">› LangGraph Branch node enables native DAG parallelism</text>
  </g>
</svg>
