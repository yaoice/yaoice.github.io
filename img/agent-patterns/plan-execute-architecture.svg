<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/>
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#13243f"/><stop offset="100%" stop-color="#0d1a31"/></linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020817" flood-opacity="0.36"/></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="960" height="520" rx="18" fill="url(#bg)"/>
  <rect width="960" height="520" rx="18" fill="url(#grid)" opacity="0.22"/>
  <rect x="18" y="18" width="924" height="484" rx="14" fill="none" stroke="#29476f" stroke-width="1" opacity="0.85"/>

  <text x="40" y="52" fill="#8fb3da" font-size="11" letter-spacing="3">AGENT PATTERNS / PLAN-AND-EXECUTE</text>
  <text x="40" y="90" fill="#f4fbff" font-size="24" font-weight="700" letter-spacing="1.2">Plan-and-Execute · Architecture</text>
  <text x="40" y="114" fill="#8aa4c8" font-size="12">Planner 先整体分解任务，Executor 顺序执行，Monitor 在偏差时交给 Re-planner 修正计划</text>

  <!-- Row: main chain Planner → Queue → Executor -->
  <g filter="url(#shadow)">
    <rect x="40" y="160" width="200" height="108" rx="14" fill="url(#panel)" stroke="#a78bfa" stroke-width="1.5"/>
    <rect x="40" y="160" width="200" height="4" rx="2" fill="#a78bfa"/>
  </g>
  <g>
    <text x="60" y="192" fill="#a78bfa" font-size="14" font-weight="700">PLANNER</text>
    <text x="60" y="211" fill="#8aa4c8" font-size="10">规划器 · 任务分解</text>
    <text x="60" y="240" fill="#e5d4ff" font-size="11" font-family="monospace">decompose(task)</text>
    <text x="60" y="258" fill="#e5d4ff" font-size="11" font-family="monospace">GPT-4 · T=0</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="300" y="160" width="200" height="108" rx="14" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="300" y="160" width="200" height="4" rx="2" fill="#7dd3fc"/>
  </g>
  <g>
    <text x="320" y="192" fill="#7dd3fc" font-size="14" font-weight="700">PLAN QUEUE</text>
    <text x="320" y="211" fill="#8aa4c8" font-size="10">计划队列</text>
    <text x="320" y="240" fill="#dbeafe" font-size="11" font-family="monospace">[ step1, step2, step3,</text>
    <text x="320" y="258" fill="#dbeafe" font-size="11" font-family="monospace">  …, stepN ]</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="560" y="160" width="200" height="108" rx="14" fill="url(#panel)" stroke="#6ee7b7" stroke-width="1.5"/>
    <rect x="560" y="160" width="200" height="4" rx="2" fill="#6ee7b7"/>
  </g>
  <g>
    <text x="580" y="192" fill="#6ee7b7" font-size="14" font-weight="700">EXECUTOR</text>
    <text x="580" y="211" fill="#8aa4c8" font-size="10">执行器 · 按步执行</text>
    <text x="580" y="240" fill="#dcfce7" font-size="11" font-family="monospace">for step in plan:</text>
    <text x="580" y="258" fill="#dcfce7" font-size="11" font-family="monospace">  execute(step)</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="160" width="100" height="108" rx="14" fill="#0d1830" stroke="#7dd3fc" stroke-width="1.5"/>
  </g>
  <text x="870" y="200" text-anchor="middle" fill="#7dd3fc" font-size="14" font-weight="700">OUTPUT</text>
  <text x="870" y="222" text-anchor="middle" fill="#8aa4c8" font-size="10">最终结果</text>
  <text x="870" y="244" text-anchor="middle" fill="#dbeafe" font-size="11" font-family="monospace">return</text>

  <!-- Row: Monitor → Re-planner (below) -->
  <g filter="url(#shadow)">
    <rect x="300" y="320" width="200" height="108" rx="14" fill="url(#panel)" stroke="#f9a8d4" stroke-width="1.5"/>
    <rect x="300" y="320" width="200" height="4" rx="2" fill="#f9a8d4"/>
  </g>
  <g>
    <text x="320" y="352" fill="#f9a8d4" font-size="14" font-weight="700">MONITOR</text>
    <text x="320" y="371" fill="#8aa4c8" font-size="10">监控器 · 偏离检测</text>
    <text x="320" y="400" fill="#fde7f3" font-size="11" font-family="monospace">evaluate(result)</text>
    <text x="320" y="418" fill="#fde7f3" font-size="11" font-family="monospace">drift? → re-plan</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="40" y="320" width="200" height="108" rx="14" fill="url(#panel)" stroke="#a78bfa" stroke-width="1.5"/>
    <rect x="40" y="320" width="200" height="4" rx="2" fill="#a78bfa"/>
  </g>
  <g>
    <text x="60" y="352" fill="#a78bfa" font-size="14" font-weight="700">RE-PLANNER</text>
    <text x="60" y="371" fill="#8aa4c8" font-size="10">重规划器 · 动态调整</text>
    <text x="60" y="400" fill="#e5d4ff" font-size="11" font-family="monospace">update_plan(ctx)</text>
    <text x="60" y="418" fill="#e5d4ff" font-size="11" font-family="monospace">on failure only</text>
  </g>

  <!-- Arrows (orthogonal, no crossing) -->
  <g fill="none" stroke-width="2" marker-end="url(#arr)">
    <path d="M240 214 H298" stroke="#a78bfa"/>
    <path d="M500 214 H558" stroke="#7dd3fc"/>
    <path d="M760 214 H818" stroke="#6ee7b7"/>

    <!-- Executor → Monitor: 直下转折 -->
    <path d="M660 268 V320" stroke="#6ee7b7"/>
    <!-- Monitor → Re-planner: 水平 -->
    <path d="M300 374 H242" stroke="#f9a8d4"/>
    <!-- Re-planner → Planner: 直上 -->
    <path d="M140 320 V272" stroke="#a78bfa" stroke-dasharray="6 4"/>
  </g>

  <!-- Legend -->
  <g filter="url(#shadow)">
    <rect x="40" y="452" width="880" height="46" rx="12" fill="#0d1830" stroke="#2b456c" stroke-width="1"/>
  </g>
  <g font-family="monospace" font-size="11">
    <text x="60" y="478" fill="#a78bfa">— plan flow</text>
    <text x="200" y="478" fill="#7dd3fc">— queue flow</text>
    <text x="340" y="478" fill="#6ee7b7">— execute flow</text>
    <text x="500" y="478" fill="#f9a8d4">— monitor signal</text>
    <text x="680" y="478" fill="#a78bfa">┄ re-plan feedback (on drift)</text>
  </g>
</svg>
