<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="78%">
      <stop offset="0%" stop-color="#11213f"/>
      <stop offset="58%" stop-color="#0b1730"/>
      <stop offset="100%" stop-color="#08111f"/>
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12233f"/>
      <stop offset="100%" stop-color="#0d1a31"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020817" flood-opacity="0.36"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/>
    </marker>
  </defs>

  <rect width="900" height="540" rx="18" fill="url(#bg)"/>
  <rect width="900" height="540" rx="18" fill="url(#grid)" opacity="0.22"/>
  <rect x="18" y="18" width="864" height="504" rx="14" fill="none" stroke="#29476f" stroke-width="1" opacity="0.85"/>

  <text x="60" y="54" fill="#8fb3da" font-size="11" letter-spacing="3">EPISODIC LEARNING / KNOWLEDGE-DRIVEN AGENT</text>
  <text x="450" y="58" text-anchor="middle" fill="#f4fbff" font-size="22" font-weight="700" letter-spacing="1.4">Ralph Loop · Four Phases per Episode</text>
  <text x="450" y="80" text-anchor="middle" fill="#8aa4c8" font-size="11">将一次问题求解拆为“推理、执行、学习、规划”四段，使代理具备更强的经验沉淀与策略迭代能力</text>

  <g filter="url(#shadow)">
    <rect x="40" y="118" width="190" height="246" rx="16" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.6"/>
    <rect x="40" y="118" width="190" height="34" rx="16" fill="#0d2746"/>
    <text x="62" y="140" fill="#7dd3fc" font-size="14" font-weight="700">01 · REASONING</text>
    <text x="62" y="160" fill="#8eb8dd" font-size="10">understand current state</text>
    <rect x="58" y="182" width="154" height="34" rx="9" fill="#10213a" stroke="#7dd3fc" stroke-width="1"/>
    <rect x="58" y="224" width="154" height="34" rx="9" fill="#10213a" stroke="#7dd3fc" stroke-width="1"/>
    <rect x="58" y="266" width="154" height="34" rx="9" fill="#10213a" stroke="#7dd3fc" stroke-width="1"/>
    <rect x="58" y="308" width="154" height="34" rx="9" fill="#10213a" stroke="#7dd3fc" stroke-width="1"/>
    <text x="135" y="204" text-anchor="middle" fill="#dbeafe" font-size="11" font-family="monospace">state.assess()</text>
    <text x="135" y="246" text-anchor="middle" fill="#dbeafe" font-size="11" font-family="monospace">problem.analyze()</text>
    <text x="135" y="288" text-anchor="middle" fill="#dbeafe" font-size="11" font-family="monospace">hypothesize()</text>
    <text x="135" y="330" text-anchor="middle" fill="#dbeafe" font-size="11" font-family="monospace">strategy.recall()</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="250" y="118" width="190" height="246" rx="16" fill="url(#panel)" stroke="#6ee7b7" stroke-width="1.6"/>
    <rect x="250" y="118" width="190" height="34" rx="16" fill="#0d2b2a"/>
    <text x="272" y="140" fill="#6ee7b7" font-size="14" font-weight="700">02 · ACTING</text>
    <text x="272" y="160" fill="#8bcbb4" font-size="10">apply chosen strategy</text>
    <rect x="268" y="182" width="154" height="34" rx="9" fill="#10261f" stroke="#6ee7b7" stroke-width="1"/>
    <rect x="268" y="224" width="154" height="34" rx="9" fill="#10261f" stroke="#6ee7b7" stroke-width="1"/>
    <rect x="268" y="266" width="154" height="34" rx="9" fill="#10261f" stroke="#6ee7b7" stroke-width="1"/>
    <rect x="268" y="308" width="154" height="34" rx="9" fill="#10261f" stroke="#6ee7b7" stroke-width="1"/>
    <text x="345" y="204" text-anchor="middle" fill="#dcfce7" font-size="11" font-family="monospace">select_action()</text>
    <text x="345" y="246" text-anchor="middle" fill="#dcfce7" font-size="11" font-family="monospace">bind_params()</text>
    <text x="345" y="288" text-anchor="middle" fill="#dcfce7" font-size="11" font-family="monospace">execute()</text>
    <text x="345" y="330" text-anchor="middle" fill="#dcfce7" font-size="11" font-family="monospace">gather_feedback()</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="460" y="118" width="190" height="246" rx="16" fill="url(#panel)" stroke="#fbbf24" stroke-width="1.6"/>
    <rect x="460" y="118" width="190" height="34" rx="16" fill="#2c2210"/>
    <text x="482" y="140" fill="#fbbf24" font-size="14" font-weight="700">03 · LEARNING</text>
    <text x="482" y="160" fill="#d6b67a" font-size="10">abstract reusable experience</text>
    <rect x="478" y="182" width="154" height="34" rx="9" fill="#2d2410" stroke="#fbbf24" stroke-width="1"/>
    <rect x="478" y="224" width="154" height="34" rx="9" fill="#2d2410" stroke="#fbbf24" stroke-width="1"/>
    <rect x="478" y="266" width="154" height="34" rx="9" fill="#2d2410" stroke="#fbbf24" stroke-width="1"/>
    <rect x="478" y="308" width="154" height="34" rx="9" fill="#2d2410" stroke="#fbbf24" stroke-width="1"/>
    <text x="555" y="204" text-anchor="middle" fill="#fef3c7" font-size="11" font-family="monospace">extract_experience()</text>
    <text x="555" y="246" text-anchor="middle" fill="#fef3c7" font-size="11" font-family="monospace">detect_pattern()</text>
    <text x="555" y="288" text-anchor="middle" fill="#fef3c7" font-size="11" font-family="monospace">update_knowledge()</text>
    <text x="555" y="330" text-anchor="middle" fill="#fef3c7" font-size="11" font-family="monospace">optimize_strategy()</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="670" y="118" width="190" height="246" rx="16" fill="url(#panel)" stroke="#f9a8d4" stroke-width="1.6"/>
    <rect x="670" y="118" width="190" height="34" rx="16" fill="#2c1830"/>
    <text x="692" y="140" fill="#f9a8d4" font-size="14" font-weight="700">04 · PLANNING</text>
    <text x="692" y="160" fill="#d5a2c3" font-size="10">prepare next episode</text>
    <rect x="688" y="182" width="154" height="34" rx="9" fill="#281629" stroke="#f9a8d4" stroke-width="1"/>
    <rect x="688" y="224" width="154" height="34" rx="9" fill="#281629" stroke="#f9a8d4" stroke-width="1"/>
    <rect x="688" y="266" width="154" height="34" rx="9" fill="#281629" stroke="#f9a8d4" stroke-width="1"/>
    <rect x="688" y="308" width="154" height="34" rx="9" fill="#281629" stroke="#f9a8d4" stroke-width="1"/>
    <text x="765" y="204" text-anchor="middle" fill="#fde7f3" font-size="11" font-family="monospace">set_goal()</text>
    <text x="765" y="246" text-anchor="middle" fill="#fde7f3" font-size="11" font-family="monospace">assess_resources()</text>
    <text x="765" y="288" text-anchor="middle" fill="#fde7f3" font-size="11" font-family="monospace">build_strategy()</text>
    <text x="765" y="330" text-anchor="middle" fill="#fde7f3" font-size="11" font-family="monospace">generate_plan()</text>
  </g>

  <g fill="none" stroke-width="2.4">
    <path d="M230 241 H248" stroke="#7dd3fc" marker-end="url(#arrow)"/>
    <path d="M440 241 H458" stroke="#6ee7b7" marker-end="url(#arrow)"/>
    <path d="M650 241 H668" stroke="#fbbf24" marker-end="url(#arrow)"/>
    <path d="M765 364 C765 430 680 448 450 448 C220 448 135 430 135 364" stroke="#a78bfa" stroke-dasharray="8 5" marker-end="url(#arrow)"/>
  </g>

  <text x="450" y="470" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">episode feedback loop · planning output becomes next reasoning input</text>

  <g filter="url(#shadow)">
    <rect x="40" y="392" width="820" height="102" rx="16" fill="#0a1428" stroke="#2b456c" stroke-width="1"/>
    <text x="62" y="420" fill="#7dd3fc" font-size="11" font-weight="700" letter-spacing="2">EPISODE CONTROL</text>
    <text x="62" y="442" fill="#dbeafe" font-size="11" font-family="monospace">while episode_count &lt; max_episodes and not task_completed:</text>
    <text x="62" y="462" fill="#dbeafe" font-size="11" font-family="monospace">    reasoning() → acting() → learning() → planning()</text>
    <text x="62" y="482" fill="#8aa4c8" font-size="10">Ralph 的关键增益在于：不是只“做完当下”，而是把经验写回知识层，让下一轮行动更快、更稳、更有策略。</text>
  </g>
</svg>
