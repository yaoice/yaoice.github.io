<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#11213f"/>
      <stop offset="55%" stop-color="#0b1730"/>
      <stop offset="100%" stop-color="#08111f"/>
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12233f"/>
      <stop offset="100%" stop-color="#0d1a31"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020817" flood-opacity="0.34"/>
    </filter>
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#60a5fa" flood-opacity="0.35"/>
    </filter>
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#34d399" flood-opacity="0.30"/>
    </filter>
    <filter id="glowPink" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#f472b6" flood-opacity="0.28"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/>
    </marker>
    <marker id="arrowPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f9a8d4"/>
    </marker>
  </defs>

  <rect width="900" height="480" rx="18" fill="url(#bg)"/>
  <rect width="900" height="480" rx="18" fill="url(#grid)" opacity="0.22"/>
  <rect x="18" y="18" width="864" height="444" rx="14" fill="none" stroke="#29476f" stroke-width="1" opacity="0.85"/>

  <g opacity="0.75">
    <path d="M44 54 H128" stroke="#375780" stroke-width="2"/>
    <path d="M44 54 V108" stroke="#375780" stroke-width="2"/>
    <path d="M856 54 H772" stroke="#375780" stroke-width="2"/>
    <path d="M856 54 V108" stroke="#375780" stroke-width="2"/>
    <path d="M44 426 H128" stroke="#375780" stroke-width="2"/>
    <path d="M44 426 V372" stroke="#375780" stroke-width="2"/>
    <path d="M856 426 H772" stroke="#375780" stroke-width="2"/>
    <path d="M856 426 V372" stroke="#375780" stroke-width="2"/>
  </g>

  <text x="60" y="54" fill="#8fb3da" font-size="11" letter-spacing="3">AGENT PATTERNS / ITERATIVE TOOL USE</text>
  <text x="450" y="58" text-anchor="middle" fill="#f4fbff" font-size="22" font-weight="700" letter-spacing="1.5">ReAct · Thought → Action → Observation</text>
  <text x="450" y="80" text-anchor="middle" fill="#8aa4c8" font-size="11">以最小规划开销构建快速闭环，让模型在推理与外部工具反馈之间持续收敛</text>

  <g filter="url(#shadow)">
    <rect x="322" y="102" width="256" height="48" rx="24" fill="#0c1730" stroke="#fbbf24" stroke-width="1.4"/>
    <circle cx="352" cy="126" r="7" fill="#fbbf24" opacity="0.9"/>
    <text x="378" y="120" fill="#fbbf24" font-size="11" font-weight="700" letter-spacing="2">INPUT CONTEXT</text>
    <text x="378" y="137" fill="#f6d28b" font-size="10">user goal · tools · memory · constraints</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="178" width="220" height="146" rx="16" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.6"/>
    <rect x="70" y="178" width="220" height="34" rx="16" fill="#0d2746" opacity="0.95"/>
    <text x="94" y="200" fill="#7dd3fc" font-size="14" font-weight="700">01 · THOUGHT</text>
    <text x="94" y="220" fill="#8eb8dd" font-size="10">reason over current state</text>
    <circle cx="112" cy="251" r="21" fill="#0d2038" stroke="#7dd3fc" stroke-width="1.2" filter="url(#glowBlue)"/>
    <text x="112" y="256" text-anchor="middle" fill="#d8f3ff" font-size="18" font-weight="700">T</text>
    <text x="145" y="245" fill="#dbeafe" font-size="11" font-family="monospace">analyze(question)</text>
    <text x="145" y="265" fill="#dbeafe" font-size="11" font-family="monospace">choose next operation</text>
    <text x="94" y="296" fill="#8aa4c8" font-size="10">产物：下一步假设、目标子问题、工具调用意图</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="178" width="220" height="146" rx="16" fill="url(#panel)" stroke="#6ee7b7" stroke-width="1.6"/>
    <rect x="340" y="178" width="220" height="34" rx="16" fill="#0d2b2a" opacity="0.95"/>
    <text x="364" y="200" fill="#6ee7b7" font-size="14" font-weight="700">02 · ACTION</text>
    <text x="364" y="220" fill="#8bcbb4" font-size="10">call tools or external systems</text>
    <circle cx="382" cy="251" r="21" fill="#10261f" stroke="#6ee7b7" stroke-width="1.2" filter="url(#glowGreen)"/>
    <text x="382" y="256" text-anchor="middle" fill="#e7fff5" font-size="18" font-weight="700">A</text>
    <text x="415" y="245" fill="#dcfce7" font-size="11" font-family="monospace">invoke(tool, args)</text>
    <text x="415" y="265" fill="#dcfce7" font-size="11" font-family="monospace">read / search / query API</text>
    <text x="364" y="296" fill="#8aa4c8" font-size="10">产物：真实世界反馈，替代纯内部“想象”推理</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="610" y="178" width="220" height="146" rx="16" fill="url(#panel)" stroke="#f9a8d4" stroke-width="1.6"/>
    <rect x="610" y="178" width="220" height="34" rx="16" fill="#2c1830" opacity="0.95"/>
    <text x="634" y="200" fill="#f9a8d4" font-size="14" font-weight="700">03 · OBSERVATION</text>
    <text x="634" y="220" fill="#d5a2c3" font-size="10">fold result back into context</text>
    <circle cx="652" cy="251" r="21" fill="#281629" stroke="#f9a8d4" stroke-width="1.2" filter="url(#glowPink)"/>
    <text x="652" y="256" text-anchor="middle" fill="#fff0f7" font-size="18" font-weight="700">O</text>
    <text x="685" y="245" fill="#fde7f3" font-size="11" font-family="monospace">parse(result)</text>
    <text x="685" y="265" fill="#fde7f3" font-size="11" font-family="monospace">update working memory</text>
    <text x="634" y="296" fill="#8aa4c8" font-size="10">产物：新证据、错误信号、继续循环或结束判断</text>
  </g>

  <g filter="url(#shadow)">
    <polygon points="734,372 796,336 858,372 796,408" fill="#0d1830" stroke="#93c5fd" stroke-width="1.6"/>
    <text x="796" y="369" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="700">COMPLETE?</text>
    <text x="796" y="386" text-anchor="middle" fill="#88a7ca" font-size="10">enough evidence / answer quality</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="648" y="108" width="182" height="42" rx="21" fill="#0d1830" stroke="#7dd3fc" stroke-width="1.4"/>
    <text x="739" y="133" text-anchor="middle" fill="#d9f5ff" font-size="12" font-weight="700">OUTPUT / FINAL ANSWER</text>
  </g>

  <g fill="none" stroke-width="2.3">
    <path d="M450 150 V172" stroke="#fbbf24" marker-end="url(#arrowBlue)"/>
    <path d="M290 251 H338" stroke="#7dd3fc" marker-end="url(#arrowBlue)"/>
    <path d="M560 251 H608" stroke="#6ee7b7" marker-end="url(#arrowBlue)"/>
    <path d="M830 251 C854 251 864 266 864 288 V336" stroke="#f9a8d4" marker-end="url(#arrowPink)"/>
    <path d="M796 336 V151" stroke="#7dd3fc" marker-end="url(#arrowBlue)"/>
    <path d="M734 372 C570 448 258 444 224 324" stroke="#a78bfa" stroke-dasharray="7 5" marker-end="url(#arrowBlue)"/>
  </g>

  <text x="814" y="246" fill="#f8bbd6" font-size="11" font-weight="700">feedback</text>
  <text x="812" y="270" fill="#b3c9e5" font-size="10">judge next step</text>
  <text x="428" y="448" fill="#a78bfa" font-size="11" font-weight="700">if incomplete → loop with updated context</text>

  <g filter="url(#shadow)">
    <rect x="58" y="360" width="612" height="84" rx="14" fill="#0a1428" stroke="#2b456c" stroke-width="1"/>
    <text x="82" y="386" fill="#7dd3fc" font-size="11" font-weight="700" letter-spacing="2">ENGINEERING NOTES</text>
    <text x="82" y="408" fill="#dbeafe" font-size="11" font-family="monospace">while not solved: thought() → action() → observation() → revise_context()</text>
    <text x="82" y="426" fill="#8aa4c8" font-size="10">优势：响应快、可解释、适合工具密集任务；边界：循环过深时需要配额、停止条件和错误恢复机制。</text>
  </g>
</svg>
