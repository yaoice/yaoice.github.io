<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softC"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#7dd3fc" flood-opacity="0.5"/></filter>
    <filter id="softM"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#f472b6" flood-opacity="0.5"/></filter>
    <filter id="softL"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#6ee7b7" flood-opacity="0.5"/></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f4fbff"/></marker>
  </defs>
  <rect width="900" height="420" fill="url(#bg)" rx="14"/>
  <rect width="900" height="420" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">ReAct COMPONENTS · DATA FLOW</text>
  <text x="450" y="62" text-anchor="middle" fill="#8aa4c8" font-size="11" letter-spacing="3">三大组件数据流</text>

  <!-- Thought -->
  <g filter="url(#softC)">
    <circle cx="180" cy="235" r="90" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <circle cx="180" cy="235" r="75" fill="none" stroke="#7dd3fc" stroke-width="0.5" opacity="0.4"/>
  </g>
  <text x="180" y="215" text-anchor="middle" fill="#7dd3fc" font-size="17" font-weight="bold" filter="url(#glow)">THOUGHT</text>
  <text x="180" y="235" text-anchor="middle" fill="#8aa4c8" font-size="11">思考器</text>
  <text x="180" y="258" text-anchor="middle" fill="#dbeafe" font-size="10" font-family="monospace">analyze()</text>
  <text x="180" y="274" text-anchor="middle" fill="#dbeafe" font-size="10" font-family="monospace">plan_strategy()</text>

  <!-- Action -->
  <g filter="url(#softL)">
    <circle cx="720" cy="235" r="90" fill="#0c162c" stroke="#6ee7b7" stroke-width="2"/>
    <circle cx="720" cy="235" r="75" fill="none" stroke="#6ee7b7" stroke-width="0.5" opacity="0.4"/>
  </g>
  <text x="720" y="215" text-anchor="middle" fill="#6ee7b7" font-size="17" font-weight="bold" filter="url(#glow)">ACTION</text>
  <text x="720" y="235" text-anchor="middle" fill="#9ad0b7" font-size="11">执行器</text>
  <text x="720" y="258" text-anchor="middle" fill="#dcfce7" font-size="10" font-family="monospace">invoke_tool()</text>
  <text x="720" y="274" text-anchor="middle" fill="#dcfce7" font-size="10" font-family="monospace">call_api()</text>

  <!-- Observation -->
  <g filter="url(#softM)">
    <circle cx="450" cy="355" r="70" fill="#0c162c" stroke="#f472b6" stroke-width="2"/>
    <circle cx="450" cy="355" r="56" fill="none" stroke="#f472b6" stroke-width="0.5" opacity="0.4"/>
  </g>
  <text x="450" y="345" text-anchor="middle" fill="#f9a8d4" font-size="15" font-weight="bold" filter="url(#glow)">OBSERVATION</text>
  <text x="450" y="365" text-anchor="middle" fill="#d6a6c2" font-size="11">观察器</text>
  <text x="450" y="387" text-anchor="middle" fill="#fde7f3" font-size="10" font-family="monospace">collect_result()</text>

  <!-- 箭头与数据流标签 -->
  <g stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="272" y1="210" x2="625" y2="210" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="680" y1="315" x2="515" y2="355" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="385" y1="355" x2="220" y2="315" stroke="#f472b6" marker-end="url(#arr)"/>
  </g>
  <g font-family="monospace" font-size="11">
    <text x="448" y="200" text-anchor="middle" fill="#7dd3fc">thought → tool_calls</text>
    <text x="640" y="360" text-anchor="end" fill="#6ee7b7">result →</text>
    <text x="260" y="355" text-anchor="start" fill="#f472b6">← feedback</text>
  </g>
</svg>
