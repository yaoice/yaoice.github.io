<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="360" fill="url(#bg)" rx="14"/>
  <rect width="900" height="360" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">CHAIN-OF-THOUGHT · REASONING CHAIN</text>
  <text x="450" y="58" text-anchor="middle" fill="#8aa4c8" font-size="11" letter-spacing="3">推理链：分析→策略→执行→验证→总结</text>

  <g filter="url(#glow)">
    <rect x="30" y="115" width="110" height="60" rx="8" fill="#101b33" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="85" y="145" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">INPUT · Q</text>

    <rect x="170" y="115" width="120" height="60" rx="8" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="230" y="138" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="bold">STEP 1</text>
    <text x="230" y="158" text-anchor="middle" fill="#dbeafe" font-size="10" font-family="monospace">analyze</text>

    <rect x="320" y="115" width="120" height="60" rx="8" fill="#101b33" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="380" y="138" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold">STEP 2</text>
    <text x="380" y="158" text-anchor="middle" fill="#dcfce7" font-size="10" font-family="monospace">strategize</text>

    <rect x="470" y="115" width="120" height="60" rx="8" fill="#101b33" stroke="#f472b6" stroke-width="1.5"/>
    <text x="530" y="138" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="bold">STEP 3</text>
    <text x="530" y="158" text-anchor="middle" fill="#fde7f3" font-size="10" font-family="monospace">execute</text>

    <rect x="620" y="115" width="120" height="60" rx="8" fill="#101b33" stroke="#8338ec" stroke-width="1.5"/>
    <text x="680" y="138" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">STEP 4</text>
    <text x="680" y="158" text-anchor="middle" fill="#e5d4ff" font-size="10" font-family="monospace">verify</text>

    <rect x="770" y="115" width="110" height="60" rx="8" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <text x="825" y="145" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">OUTPUT · A</text>
  </g>

  <g stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="140" y1="145" x2="168" y2="145" stroke="#fbbf24" marker-end="url(#arr)"/>
    <line x1="290" y1="145" x2="318" y2="145" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="440" y1="145" x2="468" y2="145" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="590" y1="145" x2="618" y2="145" stroke="#f472b6" marker-end="url(#arr)"/>
    <line x1="740" y1="145" x2="768" y2="145" stroke="#a78bfa" marker-end="url(#arr)"/>
  </g>

  <!-- 推理类型 -->
  <text x="450" y="230" text-anchor="middle" fill="#f4fbff" font-size="12" font-weight="bold" letter-spacing="2">REASONING TYPES</text>
  <g filter="url(#glow)" font-size="11" font-family="monospace">
    <rect x="130" y="250" width="140" height="30" rx="4" fill="#1d1832" stroke="#8338ec" stroke-width="1"/>
    <text x="200" y="270" text-anchor="middle" fill="#a78bfa">logical</text>
    <rect x="290" y="250" width="140" height="30" rx="4" fill="#102921" stroke="#6ee7b7" stroke-width="1"/>
    <text x="360" y="270" text-anchor="middle" fill="#6ee7b7">numeric</text>
    <rect x="450" y="250" width="140" height="30" rx="4" fill="#281629" stroke="#f472b6" stroke-width="1"/>
    <text x="520" y="270" text-anchor="middle" fill="#f9a8d4">causal</text>
    <rect x="610" y="250" width="160" height="30" rx="4" fill="#2d2410" stroke="#fbbf24" stroke-width="1"/>
    <text x="690" y="270" text-anchor="middle" fill="#fbbf24">analogical</text>
  </g>
  <text x="450" y="320" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">pre-defined STEP_PROMPTS act as reasoning scaffolds → stability++</text>
</svg>
