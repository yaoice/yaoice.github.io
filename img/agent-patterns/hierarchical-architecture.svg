<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/>
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#13243f"/><stop offset="100%" stop-color="#0d1a31"/></linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020817" flood-opacity="0.36"/></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#8fb3da"/></marker>
  </defs>
  <rect width="960" height="520" rx="18" fill="url(#bg)"/>
  <rect width="960" height="520" rx="18" fill="url(#grid)" opacity="0.22"/>
  <rect x="18" y="18" width="924" height="484" rx="14" fill="none" stroke="#29476f" stroke-width="1" opacity="0.85"/>

  <text x="40" y="52" fill="#8fb3da" font-size="11" letter-spacing="3">AGENT PATTERNS / HIERARCHICAL</text>
  <text x="40" y="90" fill="#f4fbff" font-size="24" font-weight="700" letter-spacing="1.2">Hierarchical Agent · Three-Tier Architecture</text>
  <text x="40" y="114" fill="#8aa4c8" font-size="12">按 Master / Supervisor / Worker 三层分工，高层决策模型轻量、底层执行模型廉价</text>

  <!-- Tier 1: Master -->
  <g filter="url(#shadow)">
    <rect x="340" y="148" width="280" height="88" rx="14" fill="url(#panel)" stroke="#f9a8d4" stroke-width="1.5"/>
    <rect x="340" y="148" width="280" height="4" rx="2" fill="#f9a8d4"/>
  </g>
  <g>
    <circle cx="364" cy="182" r="5" fill="#f9a8d4"/>
    <text x="378" y="186" fill="#f9a8d4" font-size="14" font-weight="700" letter-spacing="1.2">MASTER AGENT</text>
    <text x="600" y="186" text-anchor="end" fill="#d6a6c2" font-size="10" font-family="monospace">tier-1</text>
    <line x1="360" y1="200" x2="604" y2="200" stroke="#4b1836" stroke-width="1"/>
    <text x="360" y="222" fill="#fde7f3" font-size="11" font-family="monospace">GPT-4 · strategic planning · task decomposition</text>
  </g>

  <!-- Tier 2: Supervisors -->
  <g filter="url(#shadow)">
    <rect x="40" y="264" width="280" height="92" rx="14" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.4"/>
    <rect x="40" y="264" width="280" height="4" rx="2" fill="#7dd3fc"/>
  </g>
  <g>
    <circle cx="64" cy="298" r="5" fill="#7dd3fc"/>
    <text x="78" y="302" fill="#7dd3fc" font-size="13" font-weight="700">SUPERVISOR 1</text>
    <text x="300" y="302" text-anchor="end" fill="#8aa4c8" font-size="10" font-family="monospace">tier-2</text>
    <line x1="60" y1="316" x2="304" y2="316" stroke="#1f3559" stroke-width="1"/>
    <text x="60" y="336" fill="#dbeafe" font-size="11" font-family="monospace">task_supervisor</text>
    <text x="60" y="352" fill="#8aa4c8" font-size="10">任务执行与调度</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="264" width="280" height="92" rx="14" fill="url(#panel)" stroke="#6ee7b7" stroke-width="1.4"/>
    <rect x="340" y="264" width="280" height="4" rx="2" fill="#6ee7b7"/>
  </g>
  <g>
    <circle cx="364" cy="298" r="5" fill="#6ee7b7"/>
    <text x="378" y="302" fill="#6ee7b7" font-size="13" font-weight="700">SUPERVISOR 2</text>
    <text x="600" y="302" text-anchor="end" fill="#9ad0b7" font-size="10" font-family="monospace">tier-2</text>
    <line x1="360" y1="316" x2="604" y2="316" stroke="#18402f" stroke-width="1"/>
    <text x="360" y="336" fill="#dcfce7" font-size="11" font-family="monospace">resource_supervisor</text>
    <text x="360" y="352" fill="#8aa4c8" font-size="10">资源分配与配额</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="640" y="264" width="280" height="92" rx="14" fill="url(#panel)" stroke="#fbbf24" stroke-width="1.4"/>
    <rect x="640" y="264" width="280" height="4" rx="2" fill="#fbbf24"/>
  </g>
  <g>
    <circle cx="664" cy="298" r="5" fill="#fbbf24"/>
    <text x="678" y="302" fill="#fbbf24" font-size="13" font-weight="700">SUPERVISOR 3</text>
    <text x="900" y="302" text-anchor="end" fill="#c49a3f" font-size="10" font-family="monospace">tier-2</text>
    <line x1="660" y1="316" x2="904" y2="316" stroke="#5a3d10" stroke-width="1"/>
    <text x="660" y="336" fill="#fde7b5" font-size="11" font-family="monospace">quality_supervisor</text>
    <text x="660" y="352" fill="#8aa4c8" font-size="10">质量审核与回滚</text>
  </g>

  <!-- Tier 3: Workers -->
  <g filter="url(#shadow)">
    <rect x="40" y="384" width="880" height="100" rx="14" fill="url(#panel)" stroke="#a78bfa" stroke-width="1.4"/>
    <rect x="40" y="384" width="880" height="4" rx="2" fill="#a78bfa"/>
  </g>
  <g>
    <circle cx="64" cy="418" r="5" fill="#a78bfa"/>
    <text x="78" y="422" fill="#a78bfa" font-size="13" font-weight="700" letter-spacing="1.2">WORKERS · tier-3</text>
    <text x="900" y="422" text-anchor="end" fill="#8aa4c8" font-size="10" font-family="monospace">GPT-3.5-turbo · execution</text>
    <line x1="60" y1="436" x2="904" y2="436" stroke="#2b2a5e" stroke-width="1"/>
  </g>
  <g font-family="monospace" font-size="11" fill="#e5d4ff">
    <rect x="58" y="448" width="130" height="26" rx="6" fill="#1a1430" stroke="#2b2a5e" stroke-width="1"/><text x="72" y="466">worker-1</text>
    <rect x="200" y="448" width="130" height="26" rx="6" fill="#1a1430" stroke="#2b2a5e" stroke-width="1"/><text x="214" y="466">worker-2</text>
    <rect x="342" y="448" width="130" height="26" rx="6" fill="#1a1430" stroke="#2b2a5e" stroke-width="1"/><text x="356" y="466">worker-3</text>
    <rect x="484" y="448" width="130" height="26" rx="6" fill="#1a1430" stroke="#2b2a5e" stroke-width="1"/><text x="498" y="466">worker-4</text>
    <rect x="626" y="448" width="130" height="26" rx="6" fill="#1a1430" stroke="#2b2a5e" stroke-width="1"/><text x="640" y="466">worker-5</text>
    <rect x="768" y="448" width="130" height="26" rx="6" fill="#1a1430" stroke="#2b2a5e" stroke-width="1"/><text x="782" y="466">worker-6</text>
  </g>

  <!-- Orthogonal connectors -->
  <g fill="none" stroke-width="1.6" marker-end="url(#arr)">
    <!-- master trunk -->
    <path d="M480 236 V252" stroke="#8fb3da"/>
    <!-- master → supervisors bus -->
    <path d="M180 252 H780" stroke="#8fb3da" opacity="0.4"/>
    <path d="M180 252 V262" stroke="#8fb3da"/>
    <path d="M480 252 V262" stroke="#8fb3da"/>
    <path d="M780 252 V262" stroke="#8fb3da"/>
    <!-- supervisors → worker bus -->
    <path d="M180 356 V372" stroke="#7dd3fc"/>
    <path d="M480 356 V372" stroke="#6ee7b7"/>
    <path d="M780 356 V372" stroke="#fbbf24"/>
    <path d="M90 372 H870" stroke="#8fb3da" opacity="0.35"/>
  </g>
</svg>
