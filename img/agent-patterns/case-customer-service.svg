<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f4fbff"/></marker>
  </defs>
  <rect width="900" height="460" fill="url(#bg)" rx="14"/>
  <rect width="900" height="460" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">CASE · SMART CUSTOMER SERVICE</text>
  <text x="450" y="60" text-anchor="middle" fill="#8aa4c8" font-size="11" letter-spacing="3">Multi-Agent + ReAct 组合</text>

  <g filter="url(#glow)">
    <rect x="30" y="195" width="130" height="60" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="95" y="222" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">👤 CUSTOMER</text>
    <text x="95" y="240" text-anchor="middle" fill="#c49a3f" font-size="10">客户</text>

    <rect x="240" y="195" width="180" height="60" rx="8" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <text x="330" y="222" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">⚡ ROUTER</text>
    <text x="330" y="240" text-anchor="middle" fill="#8aa4c8" font-size="10" font-family="monospace">intent detection · ReAct</text>

    <rect x="510" y="65" width="180" height="70" rx="8" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="600" y="88" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">TECH AGENT</text>
    <text x="600" y="107" text-anchor="middle" fill="#8aa4c8" font-size="10">技术支持</text>
    <text x="600" y="123" text-anchor="middle" fill="#dbeafe" font-size="10" font-family="monospace">Plan-Execute</text>

    <rect x="510" y="185" width="180" height="70" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="600" y="208" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">SALES AGENT</text>
    <text x="600" y="227" text-anchor="middle" fill="#9ad0b7" font-size="10">销售咨询</text>
    <text x="600" y="243" text-anchor="middle" fill="#dcfce7" font-size="10" font-family="monospace">ReAct</text>

    <rect x="510" y="305" width="180" height="70" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="600" y="328" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">SERVICE AGENT</text>
    <text x="600" y="347" text-anchor="middle" fill="#d6a6c2" font-size="10">售后服务</text>
    <text x="600" y="363" text-anchor="middle" fill="#fde7f3" font-size="10" font-family="monospace">Ralph Loop</text>

    <!-- 后端 -->
    <ellipse cx="820" cy="100" rx="60" ry="24" fill="#101b33" stroke="#7dd3fc" stroke-width="1.2"/>
    <text x="820" y="105" text-anchor="middle" fill="#7dd3fc" font-size="11" font-family="monospace">📚 KB</text>
    <ellipse cx="820" cy="220" rx="60" ry="24" fill="#101b33" stroke="#6ee7b7" stroke-width="1.2"/>
    <text x="820" y="225" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="monospace">🗂 CRM</text>
    <ellipse cx="820" cy="340" rx="60" ry="24" fill="#101b33" stroke="#f472b6" stroke-width="1.2"/>
    <text x="820" y="345" text-anchor="middle" fill="#f9a8d4" font-size="11" font-family="monospace">🎫 Ticket</text>
  </g>

  <g stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="160" y1="225" x2="238" y2="225" stroke="#fbbf24" marker-end="url(#arr)"/>
    <line x1="420" y1="215" x2="508" y2="100" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="420" y1="225" x2="508" y2="220" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="420" y1="235" x2="508" y2="340" stroke="#f472b6" marker-end="url(#arr)"/>
    <line x1="690" y1="100" x2="758" y2="100" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="690" y1="220" x2="758" y2="220" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="690" y1="340" x2="758" y2="340" stroke="#f472b6" marker-end="url(#arr)"/>
  </g>

  <g fill="#8aa4c8" font-size="11" font-family="monospace">
    <text x="450" y="415" text-anchor="middle">routing_layer: ReAct (intent detection) · business_layer: mode-per-domain</text>
    <text x="450" y="435" text-anchor="middle" fill="#fbbf24">tech→plan_complex · sales→react_fast · service→ralph_long_term</text>
  </g>
</svg>
