<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="420" fill="url(#bg)" rx="14"/>
  <rect width="900" height="420" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">REFLECTION · SELF-CRITIQUE LOOP</text>

  <g filter="url(#glow)">
    <circle cx="200" cy="215" r="72" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <circle cx="450" cy="105" r="60" fill="#0c162c" stroke="#6ee7b7" stroke-width="2"/>
    <circle cx="700" cy="215" r="72" fill="#0c162c" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="450" cy="325" r="60" fill="#0c162c" stroke="#f472b6" stroke-width="2"/>
  </g>

  <g text-anchor="middle" font-size="14" font-weight="bold">
    <text x="200" y="210" fill="#7dd3fc">ACTION</text>
    <text x="200" y="230" fill="#8aa4c8" font-size="11">执行行动</text>
    <text x="200" y="248" fill="#dbeafe" font-size="10" font-family="monospace">actor · T=0.7</text>
    <text x="450" y="102" fill="#6ee7b7">REFLECT</text>
    <text x="450" y="120" fill="#9ad0b7" font-size="11">反思评估</text>
    <text x="450" y="137" fill="#dcfce7" font-size="10" font-family="monospace">reflector · T=0</text>
    <text x="700" y="210" fill="#fbbf24">IMPROVE</text>
    <text x="700" y="230" fill="#c49a3f" font-size="11">改进策略</text>
    <text x="700" y="248" fill="#ffdc70" font-size="10" font-family="monospace">gen_improvements</text>
    <text x="450" y="322" fill="#f9a8d4">PLAN</text>
    <text x="450" y="340" fill="#d6a6c2" font-size="11">重新规划</text>
    <text x="450" y="357" fill="#fde7f3" font-size="10" font-family="monospace">iter++</text>
  </g>

  <g stroke-width="2.5" fill="none" filter="url(#glow)">
    <path d="M 255 170 Q 340 115 390 105" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <path d="M 510 108 Q 625 130 645 165" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <path d="M 650 263 Q 600 320 510 325" stroke="#fbbf24" marker-end="url(#arr)"/>
    <path d="M 390 325 Q 290 320 250 263" stroke="#f472b6" marker-end="url(#arr)"/>
  </g>

  <!-- 反思维度 -->
  <g filter="url(#glow)" font-size="11" font-family="monospace">
    <rect x="40" y="50" width="115" height="26" rx="4" fill="#1d1832" stroke="#8338ec" stroke-width="1"/>
    <text x="97" y="68" text-anchor="middle" fill="#a78bfa">effectiveness</text>
    <rect x="745" y="50" width="115" height="26" rx="4" fill="#1d1832" stroke="#8338ec" stroke-width="1"/>
    <text x="802" y="68" text-anchor="middle" fill="#a78bfa">methodology</text>
    <rect x="40" y="355" width="115" height="26" rx="4" fill="#1d1832" stroke="#8338ec" stroke-width="1"/>
    <text x="97" y="373" text-anchor="middle" fill="#a78bfa">goal_align</text>
    <rect x="745" y="355" width="115" height="26" rx="4" fill="#1d1832" stroke="#8338ec" stroke-width="1"/>
    <text x="802" y="373" text-anchor="middle" fill="#a78bfa">learning</text>
  </g>

  <g stroke="#8338ec" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5">
    <line x1="155" y1="63" x2="395" y2="90"/>
    <line x1="745" y1="63" x2="505" y2="90"/>
    <line x1="155" y1="368" x2="395" y2="125"/>
    <line x1="745" y1="368" x2="505" y2="125"/>
  </g>

  <text x="450" y="402" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">halt_conditions: quality_score ≥ threshold  OR  iteration ≥ max_iterations</text>
</svg>
