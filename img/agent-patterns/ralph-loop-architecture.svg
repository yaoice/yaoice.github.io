<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/>
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#13243f"/><stop offset="100%" stop-color="#0d1a31"/></linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020817" flood-opacity="0.36"/></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="960" height="520" rx="18" fill="url(#bg)"/>
  <rect width="960" height="520" rx="18" fill="url(#grid)" opacity="0.22"/>
  <rect x="18" y="18" width="924" height="484" rx="14" fill="none" stroke="#29476f" stroke-width="1" opacity="0.85"/>

  <text x="40" y="52" fill="#8fb3da" font-size="11" letter-spacing="3">AGENT PATTERNS / RALPH LOOP</text>
  <text x="40" y="90" fill="#f4fbff" font-size="24" font-weight="700" letter-spacing="1.2">Ralph Loop · Four-Phase Architecture</text>
  <text x="40" y="114" fill="#8aa4c8" font-size="12">四阶段串行循环：推理 → 行动 → 学习 → 规划；知识库与经验库分层持久化</text>

  <!-- Four phases in a line -->
  <g filter="url(#shadow)">
    <rect x="40" y="156" width="200" height="112" rx="14" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="40" y="156" width="200" height="4" rx="2" fill="#7dd3fc"/>
  </g>
  <g>
    <text x="60" y="188" fill="#7dd3fc" font-size="14" font-weight="700">01 · REASONING</text>
    <text x="60" y="207" fill="#8aa4c8" font-size="10">推理阶段</text>
    <text x="60" y="234" fill="#dbeafe" font-size="11" font-family="monospace">state.assess()</text>
    <text x="60" y="252" fill="#dbeafe" font-size="11" font-family="monospace">hypothesize()</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="260" y="156" width="200" height="112" rx="14" fill="url(#panel)" stroke="#6ee7b7" stroke-width="1.5"/>
    <rect x="260" y="156" width="200" height="4" rx="2" fill="#6ee7b7"/>
  </g>
  <g>
    <text x="280" y="188" fill="#6ee7b7" font-size="14" font-weight="700">02 · ACTING</text>
    <text x="280" y="207" fill="#8aa4c8" font-size="10">行动阶段</text>
    <text x="280" y="234" fill="#dcfce7" font-size="11" font-family="monospace">execute(action)</text>
    <text x="280" y="252" fill="#dcfce7" font-size="11" font-family="monospace">gather_feedback()</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="480" y="156" width="200" height="112" rx="14" fill="url(#panel)" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="480" y="156" width="200" height="4" rx="2" fill="#fbbf24"/>
  </g>
  <g>
    <text x="500" y="188" fill="#fbbf24" font-size="14" font-weight="700">03 · LEARNING</text>
    <text x="500" y="207" fill="#8aa4c8" font-size="10">学习阶段</text>
    <text x="500" y="234" fill="#fde7b5" font-size="11" font-family="monospace">extract_exp()</text>
    <text x="500" y="252" fill="#fde7b5" font-size="11" font-family="monospace">update_kb()</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="156" width="220" height="112" rx="14" fill="url(#panel)" stroke="#f9a8d4" stroke-width="1.5"/>
    <rect x="700" y="156" width="220" height="4" rx="2" fill="#f9a8d4"/>
  </g>
  <g>
    <text x="720" y="188" fill="#f9a8d4" font-size="14" font-weight="700">04 · PLANNING</text>
    <text x="720" y="207" fill="#8aa4c8" font-size="10">规划阶段</text>
    <text x="720" y="234" fill="#fde7f3" font-size="11" font-family="monospace">set_goal(next)</text>
    <text x="720" y="252" fill="#fde7f3" font-size="11" font-family="monospace">build_strategy()</text>
  </g>

  <!-- inline arrows -->
  <g fill="none" stroke-width="2" marker-end="url(#arr)">
    <path d="M240 212 H258" stroke="#7dd3fc"/>
    <path d="M460 212 H478" stroke="#6ee7b7"/>
    <path d="M680 212 H698" stroke="#fbbf24"/>
  </g>

  <!-- Memory layer -->
  <g filter="url(#shadow)">
    <rect x="40" y="304" width="440" height="100" rx="14" fill="url(#panel)" stroke="#a78bfa" stroke-width="1.5"/>
    <rect x="40" y="304" width="440" height="4" rx="2" fill="#a78bfa"/>
  </g>
  <g>
    <circle cx="60" cy="336" r="5" fill="#a78bfa"/>
    <text x="74" y="340" fill="#a78bfa" font-size="13" font-weight="700" letter-spacing="1.2">KNOWLEDGE BASE</text>
    <line x1="54" y1="354" x2="464" y2="354" stroke="#2b2a5e" stroke-width="1"/>
    <text x="54" y="376" fill="#e5d4ff" font-size="11" font-family="monospace">facts · rules · patterns · experiences</text>
    <text x="54" y="394" fill="#8aa4c8" font-size="10">R 读取上下文 · L 写入新知识</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="304" width="420" height="100" rx="14" fill="url(#panel)" stroke="#f9a8d4" stroke-width="1.5"/>
    <rect x="500" y="304" width="420" height="4" rx="2" fill="#f9a8d4"/>
  </g>
  <g>
    <circle cx="520" cy="336" r="5" fill="#f9a8d4"/>
    <text x="534" y="340" fill="#f9a8d4" font-size="13" font-weight="700" letter-spacing="1.2">EXPERIENCE MEMORY</text>
    <line x1="514" y1="354" x2="904" y2="354" stroke="#4b1836" stroke-width="1"/>
    <text x="514" y="376" fill="#fde7f3" font-size="11" font-family="monospace">episodic records · action-result logs</text>
    <text x="514" y="394" fill="#8aa4c8" font-size="10">A 写入反馈 · L 汇总抽取 · P 参考重用</text>
  </g>

  <!-- Env and loop back -->
  <g filter="url(#shadow)">
    <rect x="40" y="432" width="200" height="50" rx="12" fill="#0d1830" stroke="#fbbf24" stroke-width="1.2"/>
  </g>
  <text x="58" y="462" fill="#fbbf24" font-size="12" font-weight="700">ENVIRONMENT</text>
  <text x="170" y="462" fill="#8aa4c8" font-size="10">外部环境</text>

  <g filter="url(#shadow)">
    <rect x="260" y="432" width="660" height="50" rx="12" fill="#0d1830" stroke="#2b456c" stroke-width="1"/>
  </g>
  <g font-family="monospace" font-size="11">
    <text x="280" y="462" fill="#dbeafe">while not task_completed: reasoning() → acting() → learning() → planning()</text>
  </g>

  <!-- loop-back arrow -->
  <g fill="none" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arr)">
    <path d="M810 268 V296 H560 V296 H260 V296 H140 V268" stroke="#a78bfa" opacity="0.55"/>
  </g>
</svg>
