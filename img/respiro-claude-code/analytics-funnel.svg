<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Respiro 监控与分析漏斗</title>
  <desc id="desc">清晰展示 Respiro 从压力信号、提醒、开始练习、完成练习到提交反馈的分析漏斗，并说明 Sentry 与 Amplitude 分别解决质量和行为分析问题。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.56" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#84cc16"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.52"/>
    </pattern>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="132%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .title{font:700 31px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#0f172a}
      .sub{font:500 16px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#64748b}
      .section{font:800 18px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#0f172a}
      .event{font:700 16px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;fill:#1e3a8a}
      .small{font:500 14px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#475569}
      .tiny{font:600 12px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#64748b}
      .panel{fill:#fff;stroke:#dbeafe;stroke-width:1.3;rx:26;filter:url(#shadow)}
      .card{fill:#fff;stroke:#bfdbfe;stroke-width:1.4;rx:22;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)" opacity="0.62"/>

  <text x="600" y="56" text-anchor="middle" class="title">上线不是终点：监控与分析让产品开始“可学习”</text>
  <text x="600" y="86" text-anchor="middle" class="sub">把事件漏斗、崩溃监控和行为分析分开看，页面更清楚，问题也更容易定位</text>

  <rect x="72" y="154" width="238" height="310" class="panel"/>
  <circle cx="191" cy="210" r="34" fill="#fee2e2" stroke="#fecaca"/>
  <text x="191" y="218" text-anchor="middle" fill="#dc2626" style="font:900 28px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">!</text>
  <text x="191" y="270" text-anchor="middle" class="section">Sentry</text>
  <text x="191" y="298" text-anchor="middle" class="small">回答：哪里坏了？</text>
  <rect x="104" y="334" width="174" height="38" rx="19" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="191" y="359" text-anchor="middle" class="tiny" fill="#991b1b">崩溃 / 异常</text>
  <rect x="104" y="384" width="174" height="38" rx="19" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="191" y="409" text-anchor="middle" class="tiny" fill="#991b1b">卡顿 / 设备环境</text>

  <rect x="890" y="154" width="238" height="310" class="panel"/>
  <circle cx="1009" cy="210" r="34" fill="#dbeafe" stroke="#bfdbfe"/>
  <path d="M991 220l14-21 13 12 17-28" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1009" y="270" text-anchor="middle" class="section">Amplitude</text>
  <text x="1009" y="298" text-anchor="middle" class="small">回答：哪里流失？</text>
  <rect x="922" y="334" width="174" height="38" rx="19" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="1009" y="359" text-anchor="middle" class="tiny" fill="#1e3a8a">转化 / 留存</text>
  <rect x="922" y="384" width="174" height="38" rx="19" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="1009" y="409" text-anchor="middle" class="tiny" fill="#1e3a8a">偏好 / 反馈效果</text>

  <text x="600" y="132" text-anchor="middle" class="section">Respiro 行为漏斗</text>
  <rect x="346" y="154" width="508" height="406" rx="34" fill="#ffffff" stroke="#dbeafe" stroke-width="1.3" filter="url(#shadow)"/>
  <line x1="386" y1="206" x2="386" y2="505" stroke="#bfdbfe" stroke-width="4" stroke-linecap="round"/>

  <g transform="translate(374 180)">
    <circle cx="12" cy="26" r="18" fill="#2563eb"/>
    <text x="12" y="32" text-anchor="middle" fill="#fff" style="font:800 13px sans-serif">1</text>
    <rect x="42" y="0" width="414" height="52" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="66" y="22" class="event">stress_signal_detected</text>
    <text x="66" y="42" class="small">检测到压力上升：score / source / confidence</text>
  </g>

  <g transform="translate(374 252)">
    <circle cx="12" cy="26" r="18" fill="#0284c7"/>
    <text x="12" y="32" text-anchor="middle" fill="#fff" style="font:800 13px sans-serif">2</text>
    <rect x="42" y="0" width="414" height="52" rx="18" fill="#ecfeff" stroke="#bae6fd"/>
    <text x="66" y="22" class="event">intervention_shown</text>
    <text x="66" y="42" class="small">展示干预提醒：exercise_type / reason</text>
  </g>

  <g transform="translate(374 324)">
    <circle cx="12" cy="26" r="18" fill="#7c3aed"/>
    <text x="12" y="32" text-anchor="middle" fill="#fff" style="font:800 13px sans-serif">3</text>
    <rect x="42" y="0" width="414" height="52" rx="18" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="66" y="22" class="event">breathing_started</text>
    <text x="66" y="42" class="small">用户开始练习：type / duration</text>
  </g>

  <g transform="translate(374 396)">
    <circle cx="12" cy="26" r="18" fill="#d97706"/>
    <text x="12" y="32" text-anchor="middle" fill="#fff" style="font:800 13px sans-serif">4</text>
    <rect x="42" y="0" width="414" height="52" rx="18" fill="#fffbeb" stroke="#fde68a"/>
    <text x="66" y="22" class="event">session_completed</text>
    <text x="66" y="42" class="small">完成呼吸训练：cycles / actual_duration</text>
  </g>

  <g transform="translate(374 468)">
    <circle cx="12" cy="26" r="18" fill="#16a34a"/>
    <text x="12" y="32" text-anchor="middle" fill="#fff" style="font:800 13px sans-serif">5</text>
    <rect x="42" y="0" width="414" height="52" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="66" y="22" class="event">feedback_submitted</text>
    <text x="66" y="42" class="small">提交效果反馈：rating / helpful</text>
  </g>

  <rect x="250" y="594" width="700" height="70" rx="30" fill="#fff" stroke="#bbf7d0" filter="url(#shadow)"/>
  <text x="600" y="622" text-anchor="middle" class="section" fill="#166534">学习闭环</text>
  <text x="600" y="648" text-anchor="middle" class="small">修复崩溃 → 找出漏斗断点 → 调提醒策略和练习推荐 → 再观察下一批数据</text>
</svg>
