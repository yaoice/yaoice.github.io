<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="React Native to Swift">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f6f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
    
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="800" fill="#0f172a" opacity="1">技术选型路径：先最快验证，再迁移到更适合发布的原生栈</text>
<rect x="110" y="170" width="360" height="250" rx="30" fill="#eff6ff" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/>
<text x="290" y="225" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="28" font-weight="900" fill="#1e3a8a" opacity="1">React Native MVP</text>
<text x="290" y="270" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#1e40af" opacity="1">Hackathon 速度优先</text>
<text x="290" y="310" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#1e40af" opacity="1">验证交互和产品假设</text>
<text x="290" y="350" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#1e40af" opacity="1">能跑起来最重要</text>
<rect x="730" y="170" width="360" height="250" rx="30" fill="#ecfdf5" stroke="#22c55e" stroke-width="3" filter="url(#shadow)"/>
<text x="910" y="225" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="28" font-weight="900" fill="#166534" opacity="1">Swift iOS 原生</text>
<text x="910" y="270" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#166534" opacity="1">发布与生态优先</text>
<text x="910" y="310" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#166534" opacity="1">更贴近 Apple APIs</text>
<text x="910" y="350" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#166534" opacity="1">App Store 路径清晰</text>
<path d="M470 295 C555 210 645 210 730 295" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="600" y="225" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="900" fill="#9a3412" opacity="1">Claude Code 辅助重写</text>
<rect x="400" y="470" width="400" height="62" rx="22" fill="#fff7ed" stroke="#f97316" stroke-width="2" />
<text x="600" y="510" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="900" fill="#9a3412" opacity="1">AI 降低“技术路线切换”的试错成本</text>
</svg>