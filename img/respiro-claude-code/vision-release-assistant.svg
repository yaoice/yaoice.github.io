<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Claude Vision 将陌生后台截图转译成发布步骤</title>
  <desc id="desc">左侧是后台截图输入，中间是 Claude Vision 识别和判断，右侧输出下一步、字段说明、风险提示和提交清单。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.52" stop-color="#f1f7ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#84cc16"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1e3a8a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2l9 5-9 5z" fill="#2563eb"/>
    </marker>
    <style>
      .title{font:700 31px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#0f172a}
      .sub{font:500 16px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#64748b}
      .label{font:700 20px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#0f172a}
      .small{font:500 15px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#475569}
      .tiny{font:600 13px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#64748b}
      .white{fill:#fff}
      .card{fill:#fff;stroke:#dbeafe;stroke-width:1.4;rx:24;filter:url(#shadow)}
      .soft{fill:#f8fbff;stroke:#dbeafe;stroke-width:1.2;rx:18}
    </style>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>
  <rect width="1200" height="640" fill="url(#grid)" opacity="0.62"/>

  <text x="600" y="56" text-anchor="middle" class="title">Claude Vision：把陌生后台页面翻译成可执行发布步骤</text>
  <text x="600" y="86" text-anchor="middle" class="sub">截图不是“求解释”，而是让 AI 识别当前位置、下一步动作和风险点</text>

  <rect x="72" y="126" width="300" height="410" class="card"/>
  <text x="222" y="166" text-anchor="middle" class="label">1. 截图输入</text>
  <text x="222" y="194" text-anchor="middle" class="small">把卡住的后台页面交给 Claude</text>

  <g transform="translate(108 230)">
    <rect width="228" height="70" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
    <circle cx="30" cy="35" r="14" fill="#2563eb" opacity="0.9"/>
    <text x="58" y="32" class="small">Apple Developer</text>
    <text x="58" y="53" class="tiny">证书、标识符、权限</text>
  </g>
  <g transform="translate(108 318)">
    <rect width="228" height="70" rx="16" fill="#f0fdf4" stroke="#bbf7d0"/>
    <circle cx="30" cy="35" r="14" fill="#16a34a" opacity="0.9"/>
    <text x="58" y="32" class="small">App Store Connect</text>
    <text x="58" y="53" class="tiny">隐私、审核、版本信息</text>
  </g>
  <g transform="translate(108 406)">
    <rect width="228" height="70" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
    <circle cx="30" cy="35" r="14" fill="#f97316" opacity="0.9"/>
    <text x="58" y="32" class="small">Sentry / Amplitude</text>
    <text x="58" y="53" class="tiny">项目、SDK、事件配置</text>
  </g>

  <path d="M390 330H478" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="486" y="150" width="230" height="360" rx="34" fill="url(#blue)" filter="url(#shadow)"/>
  <circle cx="601" cy="284" r="76" fill="#ffffff" opacity="0.18"/>
  <circle cx="601" cy="284" r="48" fill="#ffffff" opacity="0.92"/>
  <circle cx="601" cy="284" r="20" fill="#2563eb" opacity="0.95"/>
  <path d="M633 319l47 47" stroke="#fff" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
  <text x="601" y="406" text-anchor="middle" class="white" style="font:700 24px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">Claude Vision</text>
  <text x="601" y="436" text-anchor="middle" class="white" style="font:500 15px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;opacity:.9">识别页面 · 理解字段 · 判断风险</text>

  <path d="M724 330H812" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="828" y="126" width="300" height="410" class="card"/>
  <text x="978" y="166" text-anchor="middle" class="label">2. 操作输出</text>
  <text x="978" y="194" text-anchor="middle" class="small">把复杂流程压成可执行清单</text>

  <g transform="translate(868 228)">
    <rect width="220" height="52" class="soft"/>
    <circle cx="27" cy="26" r="12" fill="#16a34a"/>
    <path d="M21 26l5 5 10-12" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="54" y="31" class="small">下一步点击哪里</text>
  </g>
  <g transform="translate(868 296)">
    <rect width="220" height="52" class="soft"/>
    <circle cx="27" cy="26" r="12" fill="#16a34a"/>
    <path d="M21 26l5 5 10-12" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="54" y="31" class="small">每个字段怎么填</text>
  </g>
  <g transform="translate(868 364)">
    <rect width="220" height="52" class="soft"/>
    <circle cx="27" cy="26" r="12" fill="#f97316"/>
    <text x="23" y="31" class="white" style="font:800 16px sans-serif">!</text>
    <text x="54" y="31" class="small">哪里可能审核失败</text>
  </g>
  <g transform="translate(868 432)">
    <rect width="220" height="52" class="soft"/>
    <circle cx="27" cy="26" r="12" fill="#2563eb"/>
    <path d="M21 26h12M27 20v12" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <text x="54" y="31" class="small">如何提交和回滚</text>
  </g>

  <rect x="236" y="566" width="728" height="42" rx="21" fill="#fff" stroke="#bfdbfe"/>
  <text x="600" y="593" text-anchor="middle" class="small">关键提问格式：截图 + 当前目标 + 卡住点 + 风险检查，让 AI 从解释者变成发布助手</text>
</svg>
