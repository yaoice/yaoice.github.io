<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="Respiro 技术闭环">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f6f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
    
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="800" fill="#0f172a" opacity="1">Respiro 技术闭环：感知、判断、干预、反馈、个性化</text>
<rect x="70" y="215" width="180" height="150" rx="24" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
<text x="160" y="263" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="900" fill="#2563eb" opacity="1">设备与行为信号</text>
<text x="160" y="305" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#475569" opacity="1">motion / usage / context</text>
<line x1="250" y1="290" x2="285" y2="290" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="290" y="215" width="180" height="150" rx="24" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="380" y="263" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="900" fill="#7c3aed" opacity="1">压力窗口聚合</text>
<text x="380" y="305" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#475569" opacity="1">weighted score</text>
<line x1="470" y1="290" x2="505" y2="290" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="510" y="215" width="180" height="150" rx="24" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<text x="600" y="263" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="900" fill="#f59e0b" opacity="1">干预策略</text>
<text x="600" y="305" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#475569" opacity="1">阈值 + 冷却时间</text>
<line x1="690" y1="290" x2="725" y2="290" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="730" y="215" width="180" height="150" rx="24" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
<text x="820" y="263" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="900" fill="#16a34a" opacity="1">呼吸练习</text>
<text x="820" y="305" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#475569" opacity="1">box breathing</text>
<line x1="910" y1="290" x2="945" y2="290" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="950" y="215" width="180" height="150" rx="24" fill="#fee2e2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
<text x="1040" y="263" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="900" fill="#ef4444" opacity="1">反馈学习</text>
<text x="1040" y="305" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#475569" opacity="1">下次推荐更准</text>
<path d="M980 380 C920 505 300 505 160 380" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
<text x="575" y="535" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="800" fill="#991b1b" opacity="1">反馈不是结尾，而是下一次提醒的输入</text>
</svg>