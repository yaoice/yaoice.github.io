<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Respiro 上线后的增长与反馈闭环</title>
  <desc id="desc">上线后的增长闭环由价值主张、内容传播、专家推荐、真实用户、使用反馈、数据分析和产品迭代组成。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.48" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="center" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.56"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth"><path d="M2 2l9 5-9 5z" fill="#0f766e"/></marker>
    <style>
      .title{font:700 31px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#0f172a}
      .sub{font:500 16px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#64748b}
      .cardTitle{font:700 19px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#0f172a}
      .small{font:500 14px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#475569}
      .whiteTitle{font:800 25px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#fff}
      .whiteSmall{font:500 15px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#dbeafe}
      .card{fill:#fff;stroke:#dbeafe;stroke-width:1.3;rx:22;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1200" height="660" fill="url(#bg)"/>
  <rect width="1200" height="660" fill="url(#grid)" opacity="0.62"/>
  <text x="600" y="56" text-anchor="middle" class="title">Respiro 上线后的增长与反馈闭环</text>
  <text x="600" y="86" text-anchor="middle" class="sub">增长不是单点推广，而是“价值表达 → 信任建立 → 使用反馈 → 产品迭代”的连续学习</text>

  <rect x="442" y="246" width="316" height="164" rx="36" fill="url(#center)" filter="url(#shadow)"/>
  <text x="600" y="306" text-anchor="middle" class="whiteTitle">真实用户反馈</text>
  <text x="600" y="338" text-anchor="middle" class="whiteSmall">决定下一轮产品和传播怎么改</text>
  <text x="600" y="368" text-anchor="middle" class="whiteSmall">Claude 帮忙整理反馈、生成实验和复盘</text>

  <g transform="translate(94 150)">
    <rect width="210" height="110" class="card"/>
    <circle cx="34" cy="36" r="17" fill="#dbeafe"/>
    <text x="34" y="42" text-anchor="middle" fill="#2563eb" style="font:800 13px sans-serif">1</text>
    <text x="116" y="44" text-anchor="middle" class="cardTitle">产品价值</text>
    <text x="116" y="74" text-anchor="middle" class="small">压力来临当下</text>
    <text x="116" y="95" text-anchor="middle" class="small">给出低摩擦帮助</text>
  </g>
  <g transform="translate(374 126)">
    <rect width="210" height="110" class="card"/>
    <circle cx="34" cy="36" r="17" fill="#dcfce7"/>
    <text x="34" y="42" text-anchor="middle" fill="#16a34a" style="font:800 13px sans-serif">2</text>
    <text x="116" y="44" text-anchor="middle" class="cardTitle">内容传播</text>
    <text x="116" y="74" text-anchor="middle" class="small">博客、短视频</text>
    <text x="116" y="95" text-anchor="middle" class="small">讲清楚使用场景</text>
  </g>
  <g transform="translate(654 126)">
    <rect width="210" height="110" class="card"/>
    <circle cx="34" cy="36" r="17" fill="#ffedd5"/>
    <text x="34" y="42" text-anchor="middle" fill="#f97316" style="font:800 13px sans-serif">3</text>
    <text x="116" y="44" text-anchor="middle" class="cardTitle">专家推荐</text>
    <text x="116" y="74" text-anchor="middle" class="small">心理学家、正念</text>
    <text x="116" y="95" text-anchor="middle" class="small">从业者建立信任</text>
  </g>
  <g transform="translate(896 268)">
    <rect width="210" height="110" class="card"/>
    <circle cx="34" cy="36" r="17" fill="#e0f2fe"/>
    <text x="34" y="42" text-anchor="middle" fill="#0284c7" style="font:800 13px sans-serif">4</text>
    <text x="116" y="44" text-anchor="middle" class="cardTitle">真实使用</text>
    <text x="116" y="74" text-anchor="middle" class="small">点击提醒、完成练习</text>
    <text x="116" y="95" text-anchor="middle" class="small">形成行为数据</text>
  </g>
  <g transform="translate(654 452)">
    <rect width="210" height="110" class="card"/>
    <circle cx="34" cy="36" r="17" fill="#fef3c7"/>
    <text x="34" y="42" text-anchor="middle" fill="#d97706" style="font:800 13px sans-serif">5</text>
    <text x="116" y="44" text-anchor="middle" class="cardTitle">分析洞察</text>
    <text x="116" y="74" text-anchor="middle" class="small">漏斗、留存</text>
    <text x="116" y="95" text-anchor="middle" class="small">找出断点</text>
  </g>
  <g transform="translate(374 452)">
    <rect width="210" height="110" class="card"/>
    <circle cx="34" cy="36" r="17" fill="#ede9fe"/>
    <text x="34" y="42" text-anchor="middle" fill="#7c3aed" style="font:800 13px sans-serif">6</text>
    <text x="116" y="44" text-anchor="middle" class="cardTitle">产品迭代</text>
    <text x="116" y="74" text-anchor="middle" class="small">调提醒策略</text>
    <text x="116" y="95" text-anchor="middle" class="small">改推荐和体验</text>
  </g>
  <g transform="translate(94 400)">
    <rect width="210" height="110" class="card"/>
    <circle cx="34" cy="36" r="17" fill="#fee2e2"/>
    <text x="34" y="42" text-anchor="middle" fill="#dc2626" style="font:800 13px sans-serif">7</text>
    <text x="116" y="44" text-anchor="middle" class="cardTitle">重新表达</text>
    <text x="116" y="74" text-anchor="middle" class="small">把学到的内容</text>
    <text x="116" y="95" text-anchor="middle" class="small">写回定位和内容</text>
  </g>

  <path d="M304 190C338 178 344 174 374 176" fill="none" stroke="#0f766e" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M584 181H644" stroke="#0f766e" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M864 198C910 220 928 236 946 264" fill="none" stroke="#0f766e" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M930 386C904 428 886 452 864 485" fill="none" stroke="#0f766e" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M654 507H594" stroke="#0f766e" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M374 494C340 482 328 470 308 456" fill="none" stroke="#0f766e" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M172 400C148 350 148 292 172 262" fill="none" stroke="#0f766e" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="430" y="596" width="340" height="34" rx="17" fill="#fff" stroke="#bfdbfe"/>
  <text x="600" y="618" text-anchor="middle" class="small">重点：构建可以被 AI 加速，信任和反馈仍要持续运营</text>
</svg>
