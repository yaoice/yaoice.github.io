<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="Claude Code Agent Workflow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f6f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
    
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="24" font-weight="800" fill="#0f172a" opacity="1">非技术 PM 的新组织方式：把 Claude Code 管成一支虚拟工程团队</text>
<rect x="455" y="105" width="290" height="110" rx="26" fill="#fef3c7" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)"/>
<text x="600" y="150" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="900" fill="#92400e" opacity="1">项目经理</text>
<text x="600" y="180" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#92400e" opacity="1">目标 / 上下文 / 验收标准</text>
<rect x="110" y="300" width="160" height="90" rx="20" fill="white" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
<text x="190" y="336" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="800" fill="#0f172a" opacity="1">Product Agent</text>
<text x="190" y="364" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="600" fill="#64748b" opacity="1">用户故事</text>
<path d="M600 215 C600 270 190 270 190 300" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5 7" marker-end="url(#arrow)"/>
<rect x="315" y="330" width="160" height="90" rx="20" fill="white" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
<text x="395" y="366" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="800" fill="#0f172a" opacity="1">Architect Agent</text>
<text x="395" y="394" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="600" fill="#64748b" opacity="1">模块边界</text>
<path d="M600 215 C600 300 395 300 395 330" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5 7" marker-end="url(#arrow)"/>
<rect x="520" y="300" width="160" height="90" rx="20" fill="white" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
<text x="600" y="336" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="800" fill="#0f172a" opacity="1">Swift Developer</text>
<text x="600" y="364" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="600" fill="#64748b" opacity="1">功能实现</text>
<path d="M600 215 C600 270 600 270 600 300" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5 7" marker-end="url(#arrow)"/>
<rect x="725" y="330" width="160" height="90" rx="20" fill="white" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
<text x="805" y="366" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="800" fill="#0f172a" opacity="1">Reviewer Agent</text>
<text x="805" y="394" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="600" fill="#64748b" opacity="1">质量把关</text>
<path d="M600 215 C600 300 805 300 805 330" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5 7" marker-end="url(#arrow)"/>
<rect x="930" y="300" width="160" height="90" rx="20" fill="white" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
<text x="1010" y="336" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="800" fill="#0f172a" opacity="1">Release Agent</text>
<text x="1010" y="364" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="600" fill="#64748b" opacity="1">上线配置</text>
<path d="M600 215 C600 270 1010 270 1010 300" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5 7" marker-end="url(#arrow)"/>
<rect x="280" y="505" width="640" height="62" rx="22" fill="#ecfdf5" stroke="#22c55e" stroke-width="2" />
<text x="600" y="545" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="800" fill="#166534" opacity="1">PM 不需要亲手写每一行代码，但必须定义清晰目标并验收结果</text>
</svg>