<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="Prompt to Prototype">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f6f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
    
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="800" fill="#0f172a" opacity="1">从一句模糊提示词到可运行原型：AI 降低早期探索成本</text>
<rect x="90" y="170" width="320" height="190" rx="28" fill="#fff7ed" stroke="#f97316" stroke-width="3" filter="url(#shadow)"/>
<text x="250" y="220" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="27" font-weight="900" fill="#9a3412" opacity="1">模糊愿望</text>
<text x="250" y="270" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="700" fill="#9a3412" opacity="1">Make me less stressed</text>
<text x="250" y="315" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="600" fill="#475569" opacity="1">先表达问题，不急着写规格</text>
<line x1="410" y1="265" x2="520" y2="265" stroke="#f97316" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="520" y="150" width="260" height="230" rx="28" fill="#eff6ff" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/>
<text x="650" y="205" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="27" font-weight="900" fill="#1e3a8a" opacity="1">Claude Code</text>
<text x="650" y="252" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#1e40af" opacity="1">补齐页面 / 状态 / 逻辑</text>
<text x="650" y="292" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#1e40af" opacity="1">把想法拆成任务</text>
<line x1="780" y1="265" x2="890" y2="265" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<rect x="890" y="170" width="220" height="190" rx="28" fill="#ecfdf5" stroke="#22c55e" stroke-width="3" filter="url(#shadow)"/>
<text x="1000" y="220" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="27" font-weight="900" fill="#166534" opacity="1">手机原型</text>
<text x="1000" y="270" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#166534" opacity="1">真实设备可体验</text>
<text x="1000" y="310" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="600" fill="#475569" opacity="1">反馈驱动下一步</text>
<rect x="260" y="470" width="680" height="58" rx="20" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
<text x="600" y="507" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="800" fill="#334155" opacity="1">先拿到会动的版本，再把模糊想法收敛成可验收任务</text>
</svg>