<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code 参与从构建到增长的产品循环</title>
  <desc id="desc">图中用上下两条泳道展示 Respiro 从想法、原型、原生重写、上线，到价值表达、内容传播、用户反馈和持续迭代的完整循环。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.56" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f7fee7"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#65a30d"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.6"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth"><path d="M2 2l9 5-9 5z" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth"><path d="M2 2l9 5-9 5z" fill="#16a34a"/></marker>
    <style>
      .title{font:700 31px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#0f172a}
      .sub{font:500 16px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#64748b}
      .lane{font:800 18px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;letter-spacing:.08em}
      .cardTitle{font:700 20px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#0f172a}
      .small{font:500 14px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#475569}
      .tiny{font:600 12px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#64748b}
      .card{fill:#fff;stroke:#dbeafe;stroke-width:1.3;rx:22;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1200" height="660" fill="url(#bg)"/>
  <rect width="1200" height="660" fill="url(#grid)" opacity="0.64"/>
  <text x="600" y="56" text-anchor="middle" class="title">Claude Code 不只是编码工具，而是从构建到增长的产品循环引擎</text>
  <text x="600" y="86" text-anchor="middle" class="sub">把“做出 App”和“让用户理解价值”放在同一张工作流里看</text>

  <rect x="74" y="132" width="1052" height="178" rx="30" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.4"/>
  <text x="104" y="176" class="lane" fill="#2563eb">BUILD 构建泳道</text>
  <text x="104" y="204" class="small">目标是把模糊想法尽快变成可验证、可发布的产品</text>

  <g transform="translate(266 156)">
    <rect width="168" height="112" class="card"/>
    <circle cx="30" cy="32" r="15" fill="#dbeafe"/>
    <text x="30" y="38" text-anchor="middle" class="tiny" fill="#2563eb">1</text>
    <text x="84" y="52" text-anchor="middle" class="cardTitle">产品想法</text>
    <text x="84" y="80" text-anchor="middle" class="small">压力上升时</text>
    <text x="84" y="101" text-anchor="middle" class="small">及时干预</text>
  </g>
  <path d="M444 212H501" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <g transform="translate(516 156)">
    <rect width="168" height="112" class="card"/>
    <circle cx="30" cy="32" r="15" fill="#dbeafe"/>
    <text x="30" y="38" text-anchor="middle" class="tiny" fill="#2563eb">2</text>
    <text x="84" y="52" text-anchor="middle" class="cardTitle">Claude 原型</text>
    <text x="84" y="80" text-anchor="middle" class="small">一句提示词</text>
    <text x="84" y="101" text-anchor="middle" class="small">跑出 MVP</text>
  </g>
  <path d="M694 212H751" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <g transform="translate(766 156)">
    <rect width="168" height="112" class="card"/>
    <circle cx="30" cy="32" r="15" fill="#dbeafe"/>
    <text x="30" y="38" text-anchor="middle" class="tiny" fill="#2563eb">3</text>
    <text x="84" y="52" text-anchor="middle" class="cardTitle">Swift 重写</text>
    <text x="84" y="80" text-anchor="middle" class="small">面向 iOS</text>
    <text x="84" y="101" text-anchor="middle" class="small">补齐工程化</text>
  </g>
  <path d="M944 212H1001" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <g transform="translate(1016 156)">
    <rect width="84" height="112" rx="22" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="42" y="48" text-anchor="middle" fill="#fff" style="font:800 18px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">上线</text>
    <text x="42" y="76" text-anchor="middle" fill="#dbeafe" style="font:600 13px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">App</text>
    <text x="42" y="96" text-anchor="middle" fill="#dbeafe" style="font:600 13px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">Store</text>
  </g>

  <rect x="74" y="354" width="1052" height="178" rx="30" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.4"/>
  <text x="104" y="398" class="lane" fill="#16a34a">GROWTH 增长泳道</text>
  <text x="104" y="426" class="small">目标是让真实用户理解、使用、反馈，并反向驱动下一轮产品迭代</text>

  <g transform="translate(266 378)">
    <rect width="168" height="112" class="card"/>
    <circle cx="30" cy="32" r="15" fill="#dcfce7"/>
    <text x="30" y="38" text-anchor="middle" class="tiny" fill="#16a34a">4</text>
    <text x="84" y="52" text-anchor="middle" class="cardTitle">价值表达</text>
    <text x="84" y="80" text-anchor="middle" class="small">为什么现在</text>
    <text x="84" y="101" text-anchor="middle" class="small">需要它</text>
  </g>
  <path d="M444 434H501" stroke="#16a34a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <g transform="translate(516 378)">
    <rect width="168" height="112" class="card"/>
    <circle cx="30" cy="32" r="15" fill="#dcfce7"/>
    <text x="30" y="38" text-anchor="middle" class="tiny" fill="#16a34a">5</text>
    <text x="84" y="52" text-anchor="middle" class="cardTitle">内容与专家</text>
    <text x="84" y="80" text-anchor="middle" class="small">博客 / TikTok</text>
    <text x="84" y="101" text-anchor="middle" class="small">心理学家推荐</text>
  </g>
  <path d="M694 434H751" stroke="#16a34a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <g transform="translate(766 378)">
    <rect width="168" height="112" class="card"/>
    <circle cx="30" cy="32" r="15" fill="#dcfce7"/>
    <text x="30" y="38" text-anchor="middle" class="tiny" fill="#16a34a">6</text>
    <text x="84" y="52" text-anchor="middle" class="cardTitle">反馈与数据</text>
    <text x="84" y="80" text-anchor="middle" class="small">留存、漏斗</text>
    <text x="84" y="101" text-anchor="middle" class="small">真实评价</text>
  </g>
  <path d="M850 372C850 330 760 322 642 322C510 322 386 330 352 286" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" stroke-dasharray="9 8" marker-end="url(#arrowGreen)"/>
  <text x="592" y="342" text-anchor="middle" class="tiny">反馈驱动下一轮构建</text>

  <rect x="392" y="562" width="416" height="48" rx="24" fill="#fff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="600" y="592" text-anchor="middle" class="small">Claude Code 贯穿两条泳道：既写代码，也帮助拆任务、写内容、看数据、做迭代</text>
</svg>
