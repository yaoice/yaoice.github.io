<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">非技术 PM 能力迁移地图</title>
  <desc id="desc">非技术 PM 的目标定义、拆任务、补上下文、验收和反馈能力，经 Claude Code 放大后，转化为原型、代码、发布和增长迭代。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.5" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.58"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth"><path d="M2 2l9 5-9 5z" fill="#2563eb"/></marker>
    <style>
      .title{font:700 31px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#0f172a}
      .sub{font:500 16px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#64748b}
      .section{font:800 18px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;letter-spacing:.06em}
      .cardTitle{font:700 18px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#0f172a}
      .small{font:500 14px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#475569}
      .tiny{font:600 12px -apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;fill:#64748b}
      .card{fill:#fff;stroke:#dbeafe;stroke-width:1.3;rx:20;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <rect width="1200" height="680" fill="url(#grid)" opacity="0.62"/>
  <text x="600" y="56" text-anchor="middle" class="title">非技术 PM 能力迁移地图：不是亲手写代码，而是组织交付闭环</text>
  <text x="600" y="86" text-anchor="middle" class="sub">Claude Code 放大的，是“把目标说清楚、把任务拆清楚、把结果验清楚”的能力</text>

  <rect x="76" y="132" width="310" height="412" rx="30" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="110" y="176" class="section" fill="#2563eb">PM 原有能力</text>
  <text x="110" y="204" class="small">来自项目管理和产品判断</text>

  <g transform="translate(112 238)">
    <rect width="238" height="54" class="card"/>
    <circle cx="28" cy="27" r="13" fill="#dbeafe"/>
    <text x="52" y="32" class="cardTitle">定义目标</text>
    <text x="148" y="32" class="tiny">成功标准</text>
  </g>
  <g transform="translate(112 308)">
    <rect width="238" height="54" class="card"/>
    <circle cx="28" cy="27" r="13" fill="#dbeafe"/>
    <text x="52" y="32" class="cardTitle">拆解任务</text>
    <text x="148" y="32" class="tiny">小步交付</text>
  </g>
  <g transform="translate(112 378)">
    <rect width="238" height="54" class="card"/>
    <circle cx="28" cy="27" r="13" fill="#dbeafe"/>
    <text x="52" y="32" class="cardTitle">补充上下文</text>
    <text x="164" y="32" class="tiny">背景 / 约束</text>
  </g>
  <g transform="translate(112 448)">
    <rect width="238" height="54" class="card"/>
    <circle cx="28" cy="27" r="13" fill="#dbeafe"/>
    <text x="52" y="32" class="cardTitle">验收结果</text>
    <text x="148" y="32" class="tiny">反馈闭环</text>
  </g>

  <path d="M402 338H486" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="494" y="164" width="212" height="348" rx="38" fill="url(#bridge)" filter="url(#shadow)"/>
  <text x="600" y="226" text-anchor="middle" fill="#fff" style="font:800 25px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">Claude Code</text>
  <text x="600" y="255" text-anchor="middle" fill="#dcfce7" style="font:600 15px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">AI 交付放大器</text>
  <g transform="translate(528 296)">
    <rect width="144" height="40" rx="20" fill="#ffffff" opacity="0.18"/>
    <text x="72" y="26" text-anchor="middle" fill="#fff" style="font:700 14px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">多 Agent 分工</text>
  </g>
  <g transform="translate(528 352)">
    <rect width="144" height="40" rx="20" fill="#ffffff" opacity="0.18"/>
    <text x="72" y="26" text-anchor="middle" fill="#fff" style="font:700 14px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">代码与文档</text>
  </g>
  <g transform="translate(528 408)">
    <rect width="144" height="40" rx="20" fill="#ffffff" opacity="0.18"/>
    <text x="72" y="26" text-anchor="middle" fill="#fff" style="font:700 14px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">发布排障</text>
  </g>

  <path d="M714 338H798" stroke="#16a34a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="814" y="132" width="310" height="412" rx="30" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="848" y="176" class="section" fill="#16a34a">转化后的交付结果</text>
  <text x="848" y="204" class="small">不是替代工程常识，而是更快形成闭环</text>

  <g transform="translate(850 238)">
    <rect width="238" height="54" class="card"/>
    <circle cx="28" cy="27" r="13" fill="#dcfce7"/>
    <text x="52" y="32" class="cardTitle">可运行原型</text>
    <text x="164" y="32" class="tiny">从 0 到 1</text>
  </g>
  <g transform="translate(850 308)">
    <rect width="238" height="54" class="card"/>
    <circle cx="28" cy="27" r="13" fill="#dcfce7"/>
    <text x="52" y="32" class="cardTitle">原生应用</text>
    <text x="148" y="32" class="tiny">Swift / iOS</text>
  </g>
  <g transform="translate(850 378)">
    <rect width="238" height="54" class="card"/>
    <circle cx="28" cy="27" r="13" fill="#dcfce7"/>
    <text x="52" y="32" class="cardTitle">监控分析</text>
    <text x="154" y="32" class="tiny">Sentry / 数据</text>
  </g>
  <g transform="translate(850 448)">
    <rect width="238" height="54" class="card"/>
    <circle cx="28" cy="27" r="13" fill="#dcfce7"/>
    <text x="52" y="32" class="cardTitle">发布增长</text>
    <text x="154" y="32" class="tiny">上线 / 反馈</text>
  </g>

  <rect x="176" y="586" width="848" height="48" rx="24" fill="#fff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="600" y="616" text-anchor="middle" class="small">结论：AI 降低编码门槛，但可靠产品仍依赖目标感、质量意识、监控和人工验收</text>
</svg>
