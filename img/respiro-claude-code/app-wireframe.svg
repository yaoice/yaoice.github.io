<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Respiro 核心体验">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="55%" stop-color="#f6f7fb"/><stop offset="100%" stop-color="#fff8ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
    
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>
  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="800" fill="#0f172a" opacity="1">Respiro 核心体验：在压力上升的当下，给出低摩擦干预</text>
<rect x="450" y="110" width="300" height="500" rx="36" fill="#111827" stroke="#0f172a" stroke-width="3" filter="url(#shadow)"/>
<rect x="475" y="145" width="250" height="430" rx="28" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1" />
<text x="600" y="190" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="24" font-weight="900" fill="#0f172a" opacity="1">压力正在上升</text>
<text x="600" y="225" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="600" fill="#475569" opacity="1">建议做一次方块呼吸</text>
<circle cx="600" cy="335" r="86" fill="#dbeafe" stroke="#2563eb" stroke-width="8"/>
<text x="600" y="326" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="34" font-weight="900" fill="#1e3a8a" opacity="1">4 秒</text>
<text x="600" y="362" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="800" fill="#1e40af" opacity="1">吸气</text>
<rect x="520" y="445" width="160" height="54" rx="27" fill="#2563eb" stroke="#2563eb" stroke-width="1" />
<text x="600" y="480" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="19" font-weight="800" fill="white" opacity="1">开始练习</text>
<path d="M270 300 C330 250 385 250 450 300" fill="none" stroke="#f97316" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="220" y="295" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#9a3412" opacity="1">设备信号</text>
<rect x="120" y="320" width="210" height="80" rx="22" fill="#fff7ed" stroke="#f97316" stroke-width="2" />
<text x="225" y="352" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#9a3412" opacity="1">压力模式</text>
<text x="225" y="380" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#9a3412" opacity="1">上升趋势</text>
<path d="M750 300 C820 250 875 250 930 300" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<rect x="900" y="320" width="210" height="80" rx="22" fill="#ecfdf5" stroke="#22c55e" stroke-width="2" />
<text x="1005" y="352" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#166534" opacity="1">反馈记录</text>
<text x="1005" y="380" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#166534" opacity="1">下次更准</text>
</svg>