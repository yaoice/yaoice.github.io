<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="460" fill="#f8fafc" rx="10"/>

  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">HTML 相对 Markdown 的五大能力维度</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">同一份信息，HTML 多做了什么</text>

  <!-- 5 columns -->
  <!-- col 1 -->
  <g filter="url(#sd)">
    <rect x="40" y="100" width="170" height="320" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <rect x="40" y="100" width="170" height="36" rx="10" fill="#eff6ff"/>
  <text x="125" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">① 信息密度</text>
  <text x="55" y="160" font-size="11" font-weight="600" fill="#1e293b">表达力扩张</text>
  <text x="55" y="180" font-size="10" fill="#475569">表格 / SVG / 代码块</text>
  <text x="55" y="196" font-size="10" fill="#475569">script / canvas</text>
  <text x="55" y="212" font-size="10" fill="#475569">绝对定位 / image</text>
  <line x1="55" y1="232" x2="195" y2="232" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="252" font-size="10" font-weight="600" fill="#94a3b8">Markdown 兜底</text>
  <text x="55" y="270" font-size="10" fill="#94a3b8">ASCII 图 · Unicode 估色</text>
  <line x1="55" y1="290" x2="195" y2="290" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="310" font-size="10" font-weight="600" fill="#1e293b">价值</text>
  <text x="55" y="328" font-size="10" fill="#475569">一份制品装下</text>
  <text x="55" y="344" font-size="10" fill="#475569">原本散在 5 个文件</text>
  <text x="55" y="360" font-size="10" fill="#475569">的内容</text>
  <text x="55" y="396" font-size="10" font-style="italic" fill="#3b82f6">"几乎没什么是 HTML</text>
  <text x="55" y="412" font-size="10" font-style="italic" fill="#3b82f6">表达不了的"</text>

  <!-- col 2 -->
  <g filter="url(#sd)">
    <rect x="225" y="100" width="170" height="320" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <rect x="225" y="100" width="170" height="36" rx="10" fill="#f5f3ff"/>
  <text x="310" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">② 视觉清晰</text>
  <text x="240" y="160" font-size="11" font-weight="600" fill="#1e293b">读得下去</text>
  <text x="240" y="180" font-size="10" fill="#475569">100+ 行 MD 没人读完</text>
  <text x="240" y="196" font-size="10" fill="#475569">HTML 可分块 / Tab</text>
  <text x="240" y="212" font-size="10" fill="#475569">移动端响应式</text>
  <line x1="240" y1="232" x2="380" y2="232" stroke="#e2e8f0" stroke-width="1"/>
  <text x="240" y="252" font-size="10" font-weight="600" fill="#94a3b8">阅读门槛</text>
  <text x="240" y="270" font-size="10" fill="#94a3b8">Markdown 是流</text>
  <text x="240" y="286" font-size="10" fill="#94a3b8">HTML 是版面</text>
  <line x1="240" y1="304" x2="380" y2="304" stroke="#e2e8f0" stroke-width="1"/>
  <text x="240" y="324" font-size="10" font-weight="600" fill="#1e293b">价值</text>
  <text x="240" y="342" font-size="10" fill="#475569">"被实际读完"的</text>
  <text x="240" y="358" font-size="10" fill="#475569">概率高几个量级</text>
  <text x="240" y="396" font-size="10" font-style="italic" fill="#8b5cf6">注意力是稀缺资源</text>

  <!-- col 3 -->
  <g filter="url(#sd)">
    <rect x="410" y="100" width="170" height="320" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <rect x="410" y="100" width="170" height="36" rx="10" fill="#ecfdf5"/>
  <text x="495" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">③ 易于分享</text>
  <text x="425" y="160" font-size="11" font-weight="600" fill="#1e293b">浏览器原生</text>
  <text x="425" y="180" font-size="10" fill="#475569">上传 → 拿到链接</text>
  <text x="425" y="196" font-size="10" fill="#475569">无需 IDE / 终端</text>
  <text x="425" y="212" font-size="10" fill="#475569">同事点开就能看</text>
  <line x1="425" y1="232" x2="565" y2="232" stroke="#e2e8f0" stroke-width="1"/>
  <text x="425" y="252" font-size="10" font-weight="600" fill="#94a3b8">协作摩擦</text>
  <text x="425" y="270" font-size="10" fill="#94a3b8">Markdown 出 IDE</text>
  <text x="425" y="286" font-size="10" fill="#94a3b8">就开始变形</text>
  <line x1="425" y1="304" x2="565" y2="304" stroke="#e2e8f0" stroke-width="1"/>
  <text x="425" y="324" font-size="10" font-weight="600" fill="#1e293b">价值</text>
  <text x="425" y="342" font-size="10" fill="#475569">规格 / 报告 / PR</text>
  <text x="425" y="358" font-size="10" fill="#475569">真的会被同事打开</text>
  <text x="425" y="396" font-size="10" font-style="italic" fill="#10b981">URL 是最低协作成本</text>

  <!-- col 4 -->
  <g filter="url(#sd)">
    <rect x="595" y="100" width="170" height="320" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <rect x="595" y="100" width="170" height="36" rx="10" fill="#fffbeb"/>
  <text x="680" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">④ 双向交互</text>
  <text x="610" y="160" font-size="11" font-weight="600" fill="#1e293b">读者可操作</text>
  <text x="610" y="180" font-size="10" fill="#475569">滑块 / 拖拽 / 选择</text>
  <text x="610" y="196" font-size="10" fill="#475569">"复制到 Claude" 按钮</text>
  <text x="610" y="212" font-size="10" fill="#475569">表单 + 实时预览</text>
  <line x1="610" y1="232" x2="750" y2="232" stroke="#e2e8f0" stroke-width="1"/>
  <text x="610" y="252" font-size="10" font-weight="600" fill="#94a3b8">单向 vs 双向</text>
  <text x="610" y="270" font-size="10" fill="#94a3b8">Markdown：只读</text>
  <text x="610" y="286" font-size="10" fill="#94a3b8">HTML：可写回</text>
  <line x1="610" y1="304" x2="750" y2="304" stroke="#e2e8f0" stroke-width="1"/>
  <text x="610" y="324" font-size="10" font-weight="600" fill="#1e293b">价值</text>
  <text x="610" y="342" font-size="10" fill="#475569">人类决策能</text>
  <text x="610" y="358" font-size="10" fill="#475569">沿原路径回到模型</text>
  <text x="610" y="396" font-size="10" font-style="italic" fill="#f59e0b">闭环始于"导出"</text>

  <!-- col 5 -->
  <g filter="url(#sd)">
    <rect x="780" y="100" width="140" height="320" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <rect x="780" y="100" width="140" height="36" rx="10" fill="#fef2f2"/>
  <text x="850" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">⑤ 数据摄入</text>
  <text x="795" y="160" font-size="11" font-weight="600" fill="#1e293b">多源汇聚</text>
  <text x="795" y="180" font-size="10" fill="#475569">文件系统</text>
  <text x="795" y="196" font-size="10" fill="#475569">MCP (Slack/Linear)</text>
  <text x="795" y="212" font-size="10" fill="#475569">浏览器 / Git 历史</text>
  <line x1="795" y1="232" x2="905" y2="232" stroke="#e2e8f0" stroke-width="1"/>
  <text x="795" y="252" font-size="10" font-weight="600" fill="#94a3b8">为什么是 HTML</text>
  <text x="795" y="270" font-size="10" fill="#94a3b8">输入侧的丰度</text>
  <text x="795" y="286" font-size="10" fill="#94a3b8">需要等量丰度的</text>
  <text x="795" y="302" font-size="10" fill="#94a3b8">输出侧承接</text>
  <line x1="795" y1="318" x2="905" y2="318" stroke="#e2e8f0" stroke-width="1"/>
  <text x="795" y="338" font-size="10" font-weight="600" fill="#1e293b">价值</text>
  <text x="795" y="356" font-size="10" fill="#475569">输入有多杂</text>
  <text x="795" y="372" font-size="10" fill="#475569">输出就要多结构</text>
  <text x="795" y="408" font-size="10" font-style="italic" fill="#ef4444">不要被 MD 卡住带宽</text>
</svg>
