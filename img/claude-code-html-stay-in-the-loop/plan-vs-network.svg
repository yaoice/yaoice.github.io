<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="960" height="440" fill="#f8fafc" rx="10"/>

  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">单文件 Markdown 计划 vs HTML 文件网络</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">从"线性 plan.md"到"为同一计划维护多个 HTML 工件"</text>

  <!-- divider -->
  <line x1="480" y1="92" x2="480" y2="412" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: single markdown -->
  <text x="240" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">过去 · 单一 Markdown 计划</text>

  <rect x="120" y="130" width="240" height="240" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="140" y="156" font-size="11" font-weight="700" fill="#1e293b">plan.md</text>
  <line x1="140" y1="166" x2="340" y2="166" stroke="#e2e8f0" stroke-width="1"/>

  <g font-size="10" fill="#94a3b8" font-family="ui-monospace, Menlo, monospace">
    <text x="140" y="186"># 实现计划</text>
    <text x="140" y="204">## 1. 背景</text>
    <text x="140" y="222">背景背景背景背景……</text>
    <text x="140" y="240">## 2. 方案 A / B / C</text>
    <text x="140" y="258">- 选 B，因为……</text>
    <text x="140" y="276">## 3. UI</text>
    <text x="140" y="294">见 figma 链接</text>
    <text x="140" y="312">## 4. 数据流</text>
    <text x="140" y="330">前端 → API → 队列 →</text>
    <text x="140" y="348">## 5. 风险</text>
  </g>

  <text x="240" y="392" text-anchor="middle" font-size="11" fill="#ef4444">越往下读越不细，UI 和数据流被压成一行</text>

  <!-- RIGHT: HTML network -->
  <text x="720" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">现在 · HTML 文件网络</text>

  <!-- central plan node -->
  <rect x="640" y="130" width="160" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="720" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">implementation-plan.html</text>
  <text x="720" y="170" text-anchor="middle" font-size="10" fill="#475569">按阶段 / 模块 Tab 切分</text>

  <!-- branches -->
  <rect x="520" y="220" width="150" height="50" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="595" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">ui-explorations.html</text>
  <text x="595" y="256" text-anchor="middle" font-size="10" fill="#475569">6 种入职界面对照</text>

  <rect x="690" y="220" width="150" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="765" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">data-flow.html</text>
  <text x="765" y="256" text-anchor="middle" font-size="10" fill="#475569">SVG 数据流 + 关键代码</text>

  <rect x="860" y="220" width="80" height="50" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="900" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">tokens</text>
  <text x="900" y="256" text-anchor="middle" font-size="10" fill="#475569">design.html</text>

  <rect x="540" y="300" width="160" height="50" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="620" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">risks-checklist.html</text>
  <text x="620" y="336" text-anchor="middle" font-size="10" fill="#475569">勾选式风险盘点</text>

  <rect x="720" y="300" width="180" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="810" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">review.html</text>
  <text x="810" y="336" text-anchor="middle" font-size="10" fill="#475569">PR 审查 · diff + 注释</text>

  <!-- lines -->
  <line x1="700" y1="186" x2="595" y2="220" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="730" y1="186" x2="765" y2="220" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="760" y1="186" x2="895" y2="220" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="700" y1="186" x2="620" y2="300" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="740" y1="186" x2="810" y2="300" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <text x="720" y="392" text-anchor="middle" font-size="11" fill="#10b981">每个文件都自带"读得下去 / 改得动 / 导得出"三件套</text>
  <text x="720" y="410" text-anchor="middle" font-size="10" fill="#94a3b8">下次 session 把这一组文件一起喂给新 agent，上下文一秒接续</text>
</svg>
