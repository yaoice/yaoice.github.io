<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#94a3b8"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="380" fill="#f8fafc" rx="10"/>

  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">从一份 mockup 到组织级 HTML 工件库</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">个人 → 团队 → 组织 · 三阶段落地路线</text>

  <!-- timeline -->
  <line x1="80" y1="200" x2="880" y2="200" stroke="#cbd5e1" stroke-width="2"/>

  <!-- stage 1 -->
  <circle cx="200" cy="200" r="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">1</text>

  <g filter="url(#sd)">
    <rect x="100" y="100" width="200" height="80" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.2"/>
  </g>
  <text x="200" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">个人 · 第 1 周</text>
  <text x="200" y="146" text-anchor="middle" font-size="11" fill="#475569">从 prompt 末尾加</text>
  <text x="200" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">"做成一个单页 HTML"</text>
  <text x="200" y="176" text-anchor="middle" font-size="10" fill="#94a3b8">先选规划 / 评审 / 学习一类</text>

  <text x="200" y="232" text-anchor="middle" font-size="11" fill="#475569">单文件 mockup</text>
  <text x="200" y="248" text-anchor="middle" font-size="10" fill="#94a3b8">本地浏览器打开</text>

  <!-- stage 2 -->
  <circle cx="480" cy="200" r="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="480" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">2</text>

  <g filter="url(#sd)">
    <rect x="380" y="100" width="200" height="80" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.2"/>
  </g>
  <text x="480" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">小组 · 第 2~6 周</text>
  <text x="480" y="146" text-anchor="middle" font-size="11" fill="#475569">把"导出按钮"做成约定</text>
  <text x="480" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">每份产物有 Copy as ___</text>
  <text x="480" y="176" text-anchor="middle" font-size="10" fill="#94a3b8">PR / 评审 / 排优先级 都覆盖</text>

  <text x="480" y="232" text-anchor="middle" font-size="11" fill="#475569">文件网络 + 共享链接</text>
  <text x="480" y="248" text-anchor="middle" font-size="10" fill="#94a3b8">CI / Slack / Linear 集成</text>

  <!-- stage 3 -->
  <circle cx="760" cy="200" r="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="760" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">3</text>

  <g filter="url(#sd)">
    <rect x="660" y="100" width="200" height="80" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.2"/>
  </g>
  <text x="760" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">组织 · 3 个月+</text>
  <text x="760" y="146" text-anchor="middle" font-size="11" fill="#475569">沉淀模板 / 设计 token /</text>
  <text x="760" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">HTML 工件 Skill</text>
  <text x="760" y="176" text-anchor="middle" font-size="10" fill="#94a3b8">让"风格统一"自动发生</text>

  <text x="760" y="232" text-anchor="middle" font-size="11" fill="#475569">工件库 + 反向喂回 prompt</text>
  <text x="760" y="248" text-anchor="middle" font-size="10" fill="#94a3b8">CLAUDE.md / Skills 收口</text>

  <!-- arrows -->
  <line x1="220" y1="200" x2="460" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="200" x2="740" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- bottom anti-pattern caption -->
  <rect x="60" y="290" width="840" height="60" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="80" y="312" font-size="12" font-weight="700" fill="#991b1b">反模式提醒</text>
  <text x="80" y="332" font-size="11" fill="#7f1d1d">不要从「搭一个内部 HTML 工件平台」起步：那等于把"一次性编辑器"变成"必须复用的产品"，</text>
  <text x="80" y="348" font-size="11" fill="#7f1d1d">沉没成本会逼着你向后兼容，反而失去 HTML 在 Agent 协作里最值钱的东西——便宜、可丢弃。</text>
</svg>
