<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>

  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">五类工作流 × 五大能力 · 场景矩阵</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">每个场景"被 HTML 撬动"的能力维度不同 — 这决定了 prompt 怎么写</text>

  <!-- header -->
  <g font-size="12" font-weight="700" fill="#1e293b">
    <text x="180" y="100" text-anchor="middle" fill="#1e40af">① 信息密度</text>
    <text x="320" y="100" text-anchor="middle" fill="#5b21b6">② 视觉清晰</text>
    <text x="460" y="100" text-anchor="middle" fill="#065f46">③ 易分享</text>
    <text x="600" y="100" text-anchor="middle" fill="#92400e">④ 双向交互</text>
    <text x="740" y="100" text-anchor="middle" fill="#991b1b">⑤ 数据摄入</text>
    <text x="870" y="100" text-anchor="middle" fill="#475569">关键 prompt 词</text>
  </g>

  <!-- table grid lines -->
  <line x1="40" y1="110" x2="920" y2="110" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="40" y1="170" x2="920" y2="170" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="40" y1="230" x2="920" y2="230" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="40" y1="290" x2="920" y2="290" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="40" y1="350" x2="920" y2="350" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="40" y1="410" x2="920" y2="410" stroke="#cbd5e1" stroke-width="1"/>

  <!-- row labels (left) -->
  <g font-size="13" font-weight="700" fill="#1e293b">
    <text x="60" y="140">A. 规划 / 探索</text>
    <text x="60" y="200">B. 代码评审</text>
    <text x="60" y="260">C. 设计原型</text>
    <text x="60" y="320">D. 报告 · 学习</text>
    <text x="60" y="380">E. 一次性编辑器</text>
  </g>
  <g font-size="10" fill="#94a3b8">
    <text x="60" y="156">单计划 → 文件网络</text>
    <text x="60" y="216">diff + 注释 + 流程图</text>
    <text x="60" y="276">先 HTML 后 React</text>
    <text x="60" y="336">单页讲解 / 幻灯</text>
    <text x="60" y="396">为这一份数据建</text>
  </g>

  <!-- dots: high (filled blue), mid (filled lightblue), low (outline) -->
  <!-- helper: cx,cy,r=8 -->
  <!-- A row y=140 -->
  <circle cx="180" cy="140" r="8" fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  <circle cx="320" cy="140" r="8" fill="#3b82f6" stroke="#5b21b6" stroke-width="1"/>
  <circle cx="460" cy="140" r="8" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <circle cx="600" cy="140" r="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
  <circle cx="740" cy="140" r="8" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
  <text x="780" y="144" font-size="11" fill="#475569">"6 个并排方案，标注取舍"</text>

  <!-- B row y=200 -->
  <circle cx="180" cy="200" r="8" fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  <circle cx="320" cy="200" r="8" fill="#3b82f6" stroke="#5b21b6" stroke-width="1"/>
  <circle cx="460" cy="200" r="8" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <circle cx="600" cy="200" r="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
  <circle cx="740" cy="200" r="8" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="780" y="204" font-size="11" fill="#475569">"渲染 diff，按严重度上色"</text>

  <!-- C row y=260 -->
  <circle cx="180" cy="260" r="8" fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  <circle cx="320" cy="260" r="8" fill="#3b82f6" stroke="#5b21b6" stroke-width="1"/>
  <circle cx="460" cy="260" r="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
  <circle cx="600" cy="260" r="8" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
  <circle cx="740" cy="260" r="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="780" y="264" font-size="11" fill="#475569">"多滑块 + 复制参数按钮"</text>

  <!-- D row y=320 -->
  <circle cx="180" cy="320" r="8" fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  <circle cx="320" cy="320" r="8" fill="#3b82f6" stroke="#5b21b6" stroke-width="1"/>
  <circle cx="460" cy="320" r="8" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <circle cx="600" cy="320" r="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
  <circle cx="740" cy="320" r="8" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
  <text x="780" y="324" font-size="11" fill="#475569">"读一次就懂"</text>

  <!-- E row y=380 -->
  <circle cx="180" cy="380" r="8" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <circle cx="320" cy="380" r="8" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <circle cx="460" cy="380" r="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
  <circle cx="600" cy="380" r="10" fill="#3b82f6" stroke="#1e40af" stroke-width="1.2"/>
  <circle cx="740" cy="380" r="8" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="780" y="384" font-size="11" font-weight="700" fill="#1e40af">"总是以导出结束"</text>

  <!-- legend -->
  <g transform="translate(40,432)">
    <text x="0" y="14" font-size="11" font-weight="700" fill="#1e293b">图例：</text>
    <circle cx="60" cy="10" r="8" fill="#3b82f6" stroke="#1e40af"/>
    <text x="74" y="14" font-size="11" fill="#475569">关键能力</text>
    <circle cx="160" cy="10" r="8" fill="#a7f3d0" stroke="#10b981"/>
    <text x="174" y="14" font-size="11" fill="#475569">显著加分</text>
    <circle cx="260" cy="10" r="6" fill="#ffffff" stroke="#94a3b8"/>
    <text x="274" y="14" font-size="11" fill="#475569">视场景而定</text>
  </g>

  <text x="480" y="478" text-anchor="middle" font-size="11" fill="#64748b">读法：横看是「为这一类任务该写哪些 HTML 元素」，纵看是「同一种能力在不同任务里值多少」</text>
</svg>
