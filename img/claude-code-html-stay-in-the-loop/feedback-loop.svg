<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowg" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#94a3b8"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="440" fill="#f8fafc" rx="10"/>

  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">一次性编辑器的反馈循环</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">视觉决策 → 导出 → 回灌 prompt：HTML 让循环既不松开也不收紧到失控</text>

  <!-- 4 nodes around a circle -->
  <!-- center label -->
  <text x="480" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">tighter loop</text>
  <text x="480" y="246" text-anchor="middle" font-size="11" fill="#94a3b8">人类参与 / Agent 自主性</text>

  <!-- node 1: Claude generates HTML -->
  <g filter="url(#sd)">
    <rect x="80" y="120" width="220" height="80" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <text x="190" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">① Claude 生成 HTML</text>
  <text x="190" y="170" text-anchor="middle" font-size="11" fill="#475569">读 30 个 ticket / 一段代码 /</text>
  <text x="190" y="186" text-anchor="middle" font-size="11" fill="#475569">一份 feature flag</text>

  <!-- node 2: human visually decides -->
  <g filter="url(#sd)">
    <rect x="660" y="120" width="220" height="80" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <text x="770" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">② 工程师在画布上决策</text>
  <text x="770" y="170" text-anchor="middle" font-size="11" fill="#475569">拖拽 · 勾选 · 调滑块 · 高亮</text>
  <text x="770" y="186" text-anchor="middle" font-size="11" fill="#475569">用空间感而不是文字读</text>

  <!-- node 3: export -->
  <g filter="url(#sd)">
    <rect x="660" y="280" width="220" height="80" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <text x="770" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">③ 一键"复制为 X"</text>
  <text x="770" y="330" text-anchor="middle" font-size="11" fill="#475569">JSON / Markdown /</text>
  <text x="770" y="346" text-anchor="middle" font-size="11" fill="#475569">prompt / diff</text>

  <!-- node 4: paste back -->
  <g filter="url(#sd)">
    <rect x="80" y="280" width="220" height="80" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="190" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">④ 回灌 Claude Code</text>
  <text x="190" y="330" text-anchor="middle" font-size="11" fill="#475569">不抹掉决策上下文，</text>
  <text x="190" y="346" text-anchor="middle" font-size="11" fill="#475569">不回到"再讲一遍"</text>

  <!-- arrows clockwise -->
  <line x1="300" y1="160" x2="660" y2="160" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="770" y1="200" x2="770" y2="280" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="660" y1="320" x2="300" y2="320" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="190" y1="280" x2="190" y2="200" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- annotations on edges -->
  <text x="480" y="148" text-anchor="middle" font-size="11" fill="#1e40af">把上下文物化为画布</text>
  <text x="788" y="244" font-size="11" fill="#1e40af">空间 → 离散选择</text>
  <text x="480" y="312" text-anchor="middle" font-size="11" fill="#1e40af">"总是以导出结束"</text>
  <text x="78" y="244" font-size="11" fill="#1e40af">回到 prompt 流</text>

  <!-- bottom caption -->
  <text x="480" y="406" text-anchor="middle" font-size="12" fill="#475569">没有 ③ 的导出按钮，前两步再漂亮，循环也会断在第三步——这是一次性编辑器的设计核心</text>
</svg>
