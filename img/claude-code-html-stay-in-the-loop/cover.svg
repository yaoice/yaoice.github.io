<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="460" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="44" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">HTML 是 Claude Code 的"同步在线"装置</text>
  <text x="480" y="68" text-anchor="middle" font-size="13" fill="#64748b">当 Agent 跑得越快，人类越需要一块能站进去的画布</text>

  <!-- Left: Agent canvas -->
  <g filter="url(#sd)">
    <rect x="60" y="110" width="360" height="280" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <text x="240" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Claude 的 HTML 画布</text>

  <!-- mock html artifacts -->
  <rect x="80" y="160" width="150" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="155" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">spec-mockup.html</text>
  <text x="155" y="202" text-anchor="middle" font-size="10" fill="#475569">6 个并排方案</text>

  <rect x="250" y="160" width="150" height="60" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="325" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">review.html</text>
  <text x="325" y="202" text-anchor="middle" font-size="10" fill="#475569">diff + 边距注释</text>

  <rect x="80" y="232" width="150" height="60" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="155" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">prototype.html</text>
  <text x="155" y="274" text-anchor="middle" font-size="10" fill="#475569">滑块 · 颜色 · 缓动</text>

  <rect x="250" y="232" width="150" height="60" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="325" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">triage.html</text>
  <text x="325" y="274" text-anchor="middle" font-size="10" fill="#475569">30 张可拖拽 ticket</text>

  <rect x="80" y="304" width="320" height="60" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="240" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">explainer.html</text>
  <text x="240" y="346" text-anchor="middle" font-size="10" fill="#475569">令牌桶图 + 关键代码 + 陷阱小节</text>

  <!-- Right: Engineer in loop -->
  <g filter="url(#sd)">
    <rect x="540" y="110" width="360" height="280" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <text x="720" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">工程师 · 在循环中</text>

  <!-- 4 actions list -->
  <g font-size="12" fill="#1e293b">
    <rect x="560" y="160" width="320" height="44" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="576" y="178" font-size="11" font-weight="700" fill="#1e40af">① 看</text>
    <text x="600" y="178" font-size="11" fill="#475569">浏览器打开 HTML，一眼对照 6 个方案</text>
    <text x="576" y="195" font-size="10" fill="#94a3b8">visual clarity</text>

    <rect x="560" y="214" width="320" height="44" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="576" y="232" font-size="11" font-weight="700" fill="#5b21b6">② 改</text>
    <text x="600" y="232" font-size="11" fill="#475569">拖动滑块、勾选 flag、重排卡片</text>
    <text x="576" y="249" font-size="10" fill="#94a3b8">two-way interaction</text>

    <rect x="560" y="268" width="320" height="44" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
    <text x="576" y="286" font-size="11" font-weight="700" fill="#065f46">③ 导出</text>
    <text x="612" y="286" font-size="11" fill="#475569">"Copy as JSON / prompt" 按钮</text>
    <text x="576" y="303" font-size="10" fill="#94a3b8">always end with export</text>

    <rect x="560" y="322" width="320" height="44" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="576" y="340" font-size="11" font-weight="700" fill="#92400e">④ 回灌</text>
    <text x="612" y="340" font-size="11" fill="#475569">粘贴回 Claude Code，开始下一轮</text>
    <text x="576" y="357" font-size="10" fill="#94a3b8">tighter loop</text>
  </g>

  <!-- arrows between -->
  <line x1="430" y1="250" x2="530" y2="250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="280" x2="430" y2="280" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="480" y="244" text-anchor="middle" font-size="10" fill="#64748b">渲染</text>
  <text x="480" y="298" text-anchor="middle" font-size="10" fill="#64748b">导出回灌</text>

  <!-- bottom caption -->
  <text x="480" y="424" text-anchor="middle" font-size="12" fill="#475569">从"看一篇 Markdown 计划"到"在 HTML 工件上做决策" — 循环不仅没断，还更紧了</text>
</svg>
