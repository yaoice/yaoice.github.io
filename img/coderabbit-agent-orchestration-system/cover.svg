<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="480" fill="#f8fafc" rx="10"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#3b82f6"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">CodeRabbit Agent 编排系统：从模糊需求到精准代码</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">规划层如何弥合隐性知识鸿沟，让 AI 生成正确的代码</text>
  <!-- Left: Developer -->
  <rect x="60" y="180" width="180" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="150" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">开发者</text>
  <text x="150" y="232" text-anchor="middle" font-size="11" fill="#475569">模糊需求 + 隐式假设</text>
  <text x="150" y="248" text-anchor="middle" font-size="11" fill="#475569">经验知识内化未表达</text>
  <!-- Center: Orchestration Layer -->
  <rect x="320" y="120" width="320" height="200" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="480" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Agent 编排层（规划系统）</text>
  <!-- Sub nodes inside orchestration -->
  <rect x="340" y="170" width="130" height="44" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="405" y="196" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">① 需求分析</text>
  <rect x="490" y="170" width="130" height="44" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="555" y="196" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">② 假设暴露</text>
  <rect x="340" y="230" width="130" height="44" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="405" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">③ 上下文补全</text>
  <rect x="490" y="230" width="130" height="44" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="555" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">④ 结构化 PRD</text>
  <!-- Arrow label -->
  <text x="480" y="298" text-anchor="middle" font-size="10" fill="#64748b">多模型协作 · Opus/Sonnet/Haiku 分级路由</text>
  <!-- Right: Claude Code -->
  <rect x="720" y="180" width="180" height="80" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="810" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Claude Code</text>
  <text x="810" y="232" text-anchor="middle" font-size="11" fill="#475569">精准代码实现</text>
  <text x="810" y="248" text-anchor="middle" font-size="11" fill="#475569">方向正确、无漂移</text>
  <!-- Arrows -->
  <line x1="240" y1="220" x2="318" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="642" y1="220" x2="718" y2="220" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Bottom: Without planning -->
  <rect x="200" y="380" width="560" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="480" y="406" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">❌ 无规划层：开发者需求 → AI 直接生成 → 隐式假设填补 → 方向偏离</text>
  <text x="480" y="426" text-anchor="middle" font-size="11" fill="#475569">"代码能编译、能通过测试，但并没有解决它本该解决的问题"</text>
  <!-- Legend -->
  <text x="60" y="460" font-size="10" fill="#64748b">来源：Claude Blog · CodeRabbit 案例 · 2026.05</text>
</svg>
