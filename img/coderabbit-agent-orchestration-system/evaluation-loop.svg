<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#3b82f6"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">规划质量评估体系闭环</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">从手动调优到自动化评判，持续提升规划输出质量</text>
  <!-- Main flow: top row -->
  <rect x="60" y="100" width="200" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">① 规划系统</text>
  <text x="160" y="146" text-anchor="middle" font-size="11" fill="#475569">生成结构化计划</text>
  <line x1="260" y1="130" x2="298" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="300" y="100" width="200" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">② LLM 评判</text>
  <text x="400" y="146" text-anchor="middle" font-size="11" fill="#475569">多维度质量评分</text>
  <line x1="500" y1="130" x2="538" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="540" y="100" width="200" height="60" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="640" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">③ 代码生成</text>
  <text x="640" y="146" text-anchor="middle" font-size="11" fill="#475569">按计划执行</text>
  <line x1="740" y1="130" x2="778" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="780" y="100" width="140" height="60" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="850" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">④ 端到端验证</text>
  <text x="850" y="146" text-anchor="middle" font-size="11" fill="#475569">代码有效性检测</text>
  <!-- Feedback arrow -->
  <path d="M850,162 L850,200 L160,200 L160,162" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="480" y="192" text-anchor="middle" font-size="10" fill="#3b82f6">反馈回路：验证结果驱动规划调优</text>
  <!-- Detail section: evaluation dimensions -->
  <text x="100" y="248" font-size="13" font-weight="600" fill="#1e293b">评估维度</text>
  <rect x="60" y="264" width="200" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="160" y="288" text-anchor="middle" font-size="11" fill="#475569">代码有效性（编译/测试）</text>
  <rect x="60" y="314" width="200" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="160" y="338" text-anchor="middle" font-size="11" fill="#475569">范围漂移检测（scope creep）</text>
  <rect x="60" y="364" width="200" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="160" y="388" text-anchor="middle" font-size="11" fill="#475569">Token 消耗量</text>
  <rect x="60" y="414" width="200" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="160" y="438" text-anchor="middle" font-size="11" fill="#475569">意图匹配度</text>
  <!-- Detail section: abstraction balance -->
  <text x="380" y="248" font-size="13" font-weight="600" fill="#1e293b">抽象层级平衡</text>
  <rect x="340" y="264" width="260" height="80" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="470" y="290" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">过于细粒度</text>
  <text x="470" y="310" text-anchor="middle" font-size="11" fill="#475569">代码库一变动就过时</text>
  <text x="470" y="330" text-anchor="middle" font-size="11" fill="#475569">维护成本高、灵活性差</text>
  <rect x="340" y="360" width="260" height="80" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="470" y="386" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">过于高层</text>
  <text x="470" y="406" text-anchor="middle" font-size="11" fill="#475569">给 Agent 留下假设填补空间</text>
  <text x="470" y="426" text-anchor="middle" font-size="11" fill="#475569">回到原始问题</text>
  <!-- Detail section: A/B testing -->
  <text x="720" y="248" font-size="13" font-weight="600" fill="#1e293b">A/B 对比验证</text>
  <rect x="680" y="264" width="220" height="60" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="790" y="288" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">有规划步骤</text>
  <text x="790" y="308" text-anchor="middle" font-size="11" fill="#10b981">方向准确率 ↑</text>
  <rect x="680" y="340" width="220" height="60" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="790" y="364" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">无规划步骤</text>
  <text x="790" y="384" text-anchor="middle" font-size="11" fill="#ef4444">隐式假设填补 ↑</text>
  <text x="790" y="424" text-anchor="middle" font-size="10" fill="#64748b">隔离规划层本身的增量价值</text>
  <!-- Bottom note -->
  <text x="60" y="480" font-size="10" fill="#64748b">核心发现：找到合适的抽象层级需要反复迭代，评估体系使这种迭代成为可能</text>
</svg>
