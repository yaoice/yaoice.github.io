<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="440" fill="#f8fafc" rx="10"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">跨 Claude 模型家族的智能路由策略</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">按任务复杂度匹配模型层级，优化成本与延迟</text>
  <!-- Three columns -->
  <!-- Opus -->
  <rect x="60" y="90" width="260" height="300" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="190" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Opus</text>
  <text x="190" y="138" text-anchor="middle" font-size="11" fill="#8b5cf6">战略层 · 编排循环</text>
  <rect x="80" y="158" width="220" height="40" rx="6" fill="#ffffff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="190" y="182" text-anchor="middle" font-size="11" fill="#475569">理解问题本质</text>
  <rect x="80" y="210" width="220" height="40" rx="6" fill="#ffffff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="190" y="234" text-anchor="middle" font-size="11" fill="#475569">设定整体方向与约束</text>
  <rect x="80" y="262" width="220" height="40" rx="6" fill="#ffffff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="190" y="286" text-anchor="middle" font-size="11" fill="#475569">高层战略决策</text>
  <rect x="80" y="314" width="220" height="40" rx="6" fill="#ffffff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="190" y="338" text-anchor="middle" font-size="11" fill="#475569">质量门禁判断</text>
  <text x="190" y="374" text-anchor="middle" font-size="10" fill="#64748b">成本高 · 延迟高 · 精度最高</text>
  <!-- Sonnet -->
  <rect x="350" y="90" width="260" height="300" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="480" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Sonnet</text>
  <text x="480" y="138" text-anchor="middle" font-size="11" fill="#3b82f6">规划层 · 结构化输出</text>
  <rect x="370" y="158" width="220" height="40" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="480" y="182" text-anchor="middle" font-size="11" fill="#475569">将 Opus 输出转化为步骤</text>
  <rect x="370" y="210" width="220" height="40" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="480" y="234" text-anchor="middle" font-size="11" fill="#475569">生成结构化 PRD</text>
  <rect x="370" y="262" width="220" height="40" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="480" y="286" text-anchor="middle" font-size="11" fill="#475569">需求细化与验证</text>
  <rect x="370" y="314" width="220" height="40" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="480" y="338" text-anchor="middle" font-size="11" fill="#475569">边界条件枚举</text>
  <text x="480" y="374" text-anchor="middle" font-size="10" fill="#64748b">成本中 · 延迟中 · 综合性价比最优</text>
  <!-- Haiku -->
  <rect x="640" y="90" width="260" height="300" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="770" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Haiku</text>
  <text x="770" y="138" text-anchor="middle" font-size="11" fill="#10b981">执行层 · 窄范围操作</text>
  <rect x="660" y="158" width="220" height="40" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
  <text x="770" y="182" text-anchor="middle" font-size="11" fill="#475569">上下文蒸馏</text>
  <rect x="660" y="210" width="220" height="40" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
  <text x="770" y="234" text-anchor="middle" font-size="11" fill="#475569">针对性工具调用</text>
  <rect x="660" y="262" width="220" height="40" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
  <text x="770" y="286" text-anchor="middle" font-size="11" fill="#475569">格式化与提取</text>
  <rect x="660" y="314" width="220" height="40" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
  <text x="770" y="338" text-anchor="middle" font-size="11" fill="#475569">简单分类与路由</text>
  <text x="770" y="374" text-anchor="middle" font-size="10" fill="#64748b">成本低 · 延迟低 · 速度最快</text>
  <!-- Bottom principle -->
  <rect x="160" y="400" width="640" height="30" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">路由原则：如果 Haiku 表现和 Sonnet 一样好，就用 Haiku；需要更高质量时才升级模型</text>
</svg>
