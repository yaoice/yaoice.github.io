<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <style>
      .bg{fill:#fbfdff}.lane{fill:#f1f5f9;stroke:#cbd5e1;rx:18}.step{fill:#fff;stroke:#2563eb;stroke-width:2;rx:14}.fault{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:14}.txt{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:20px;fill:#0f172a}.small{font-size:16px;fill:#475569}.title{font-size:30px;font-weight:700}.line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
  </defs>
  <rect class="bg" width="1280" height="640"/>
  <text class="txt title" x="44" y="54">Ascend for Volcano 调度闭环：从作业校验到芯片编号落盘</text>

  <rect class="lane" x="48" y="94" width="1184" height="122"/>
  <text class="txt" x="78" y="132">Session 初始化</text>
  <rect class="step" x="270" y="116" width="210" height="72"/><text class="txt" x="305" y="147">InitNPUSession</text><text class="small" x="304" y="173">同步节点/任务/CM</text>
  <rect class="step" x="560" y="116" width="210" height="72"/><text class="txt" x="602" y="147">策略工厂</text><text class="small" x="586" y="173">按注解/标签选 handler</text>
  <rect class="fault" x="850" y="116" width="230" height="72"/><text class="txt" x="902" y="147">故障预处理</text><text class="small" x="888" y="173">重调度缓存与故障节点</text>

  <rect class="lane" x="48" y="258" width="1184" height="122"/>
  <text class="txt" x="78" y="296">调度决策</text>
  <rect class="step" x="170" y="280" width="185" height="72"/><text class="txt" x="205" y="311">JobValid</text><text class="small" x="198" y="337">资源请求校验</text>
  <rect class="step" x="415" y="280" width="185" height="72"/><text class="txt" x="450" y="311">Predicate</text><text class="small" x="442" y="337">过滤不满足节点</text>
  <rect class="step" x="660" y="280" width="205" height="72"/><text class="txt" x="696" y="311">BatchNodeOrder</text><text class="small" x="690" y="337">节点打分+芯片预选</text>
  <rect class="step" x="925" y="280" width="205" height="72"/><text class="txt" x="976" y="311">EventHandler</text><text class="small" x="950" y="337">Allocate/Deallocate 管理</text>

  <rect class="lane" x="48" y="422" width="1184" height="122"/>
  <text class="txt" x="78" y="460">执行落地</text>
  <rect class="step" x="228" y="444" width="240" height="72"/><text class="txt" x="284" y="475">Pod Annotation</text><text class="small" x="260" y="501">写入 huawei.com/Ascend910</text>
  <rect class="step" x="520" y="444" width="240" height="72"/><text class="txt" x="574" y="475">Device Plugin</text><text class="small" x="558" y="501">读取选中芯片并传递环境变量</text>
  <rect class="step" x="812" y="444" width="240" height="72"/><text class="txt" x="858" y="475">Docker Runtime</text><text class="small" x="842" y="501">挂载设备、驱动与 CANN 依赖</text>

  <path class="line" d="M480 152 L560 152"/><path class="line" d="M770 152 L850 152"/>
  <path class="line" d="M965 188 C965 238 262 238 262 280"/>
  <path class="line" d="M355 316 L415 316"/><path class="line" d="M600 316 L660 316"/><path class="line" d="M865 316 L925 316"/>
  <path class="line" d="M1028 352 C1028 404 348 404 348 444"/>
  <path class="line" d="M468 480 L520 480"/><path class="line" d="M760 480 L812 480"/>
</svg>
