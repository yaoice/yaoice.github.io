  <rect class="box" x="334" y="124" width="210" height="96"/><text class="txt" x="388" y="164">日志清洗</text><text class="small" x="370" y="194">parse 提取有效事件</text>
  <rect class="box" x="604" y="124" width="210" height="96"/><text class="txt" x="658" y="164">集中转储</text><text class="small" x="628" y="194">多节点结果汇总</text>
