  <rect class="box3" x="178" y="322" width="245" height="108"/><text class="txt" x="232" y="362">知识图谱解析</text><text class="small" x="216" y="392">CANN / MindIE / 组件日志</text><text class="small" x="216" y="416">匹配错误码与规则链</text>
