<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <defs>
    <style>
      .bg{fill:#fcfcfd}.box{fill:#fff;stroke:#0f766e;stroke-width:2;rx:14}.box2{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:14}.box3{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:14}.txt{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:21px;fill:#111827}.small{font-size:16px;fill:#4b5563}.title{font-size:30px;font-weight:700}.line{stroke:#374151;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#374151"/></marker>
  </defs>
  <rect class="bg" width="1280" height="560"/>
  <text class="txt title" x="48" y="58">FaultDiag 诊断流水线：把分散日志变成可行动的根因报告</text>

