<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .bg{fill:#f7f9fc}.box{fill:#fff;stroke:#2f5bea;stroke-width:2;rx:14}.box2{fill:#eef4ff;stroke:#2f5bea;stroke-width:2;rx:14}.box3{fill:#fef7e8;stroke:#d97706;stroke-width:2;rx:14}.box4{fill:#edfdf3;stroke:#16a34a;stroke-width:2;rx:14}.txt{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:22px;fill:#111827}.small{font-size:17px;fill:#374151}.title{font-size:32px;font-weight:700;fill:#111827}.line{stroke:#4b5563;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:8 7}</style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/></marker>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="42" y="58">MindCluster 控制面全景：把 NPU 集群抽象成可调度、可观测、可恢复的资源池</text>

  <rect class="box3" x="52" y="112" width="230" height="118"/>
  <text class="txt" x="82" y="158">部署交付层</text>
  <text class="small" x="82" y="190">Ascend Deployer</text>
  <text class="small" x="82" y="214">驱动 / 固件 / CANN</text>

  <rect class="box2" x="366" y="92" width="548" height="158"/>
  <text class="txt" x="574" y="132">Kubernetes + Volcano</text>
  <text class="small" x="402" y="168">Ascend Operator：训练任务生命周期、RankTable、环境变量注入</text>
  <text class="small" x="402" y="198">Ascend for Volcano：NPU/交换机/多级网络亲和性调度</text>
  <text class="small" x="402" y="228">Infer Operator：推理服务生命周期与实例级管理</text>

  <rect class="box4" x="996" y="112" width="230" height="118"/>
  <text class="txt" x="1030" y="158">运维工具层</text>
  <text class="small" x="1030" y="190">DMI / Cert</text>
  <text class="small" x="1030" y="214">FaultDiag / Toolkit</text>

  <rect class="box" x="96" y="326" width="236" height="142"/>
  <text class="txt" x="134" y="364">计算节点代理</text>
  <text class="small" x="130" y="398">Ascend Device Plugin</text>
  <text class="small" x="130" y="425">NodeD / NPU Exporter</text>
  <text class="small" x="130" y="452">Ascend Docker Runtime</text>

  <rect class="box" x="522" y="326" width="236" height="142"/>
  <text class="txt" x="575" y="364">集群大脑</text>
  <text class="small" x="556" y="398">ClusterD</text>
  <text class="small" x="556" y="425">资源 / 任务 / 故障汇总</text>
  <text class="small" x="556" y="452">策略判定与故障影响面</text>

  <rect class="box" x="948" y="326" width="236" height="142"/>
  <text class="txt" x="1000" y="364">任务容错层</text>
  <text class="small" x="982" y="398">TaskD</text>
  <text class="small" x="982" y="425">MindIO ACP / TFT</text>
  <text class="small" x="982" y="452">Container Manager</text>

  <rect class="box2" x="234" y="570" width="812" height="84"/>
  <text class="txt" x="492" y="606">业务负载：训练 / 推理 Pod</text>
  <text class="small" x="354" y="638">通过 NPU 资源、拓扑注解、RankTable、Checkpoint 与故障策略完成闭环</text>

  <path class="line" d="M282 171 C320 171 330 171 366 171"/>
  <path class="line" d="M914 171 C950 171 960 171 996 171"/>
