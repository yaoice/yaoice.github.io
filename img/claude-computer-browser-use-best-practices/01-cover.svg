<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="Claude Computer/Browser Use 最佳实践全景">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1226"/>
      <stop offset="55%" stop-color="#101a3a"/>
      <stop offset="100%" stop-color="#1a1247"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#334155" opacity="0.5"/>
    </pattern>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <marker id="arrC" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bgC)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#dots)"/>
  <ellipse cx="600" cy="240" rx="640" ry="280" fill="url(#glow)"/>

  <!-- Title -->
  <text x="600" y="100" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="38" font-weight="900" fill="#f8fafc">Claude Computer / Browser Use 最佳实践</text>
  <text x="600" y="148" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="600" fill="#cbd5f5">从「点不准 / 跑歪了 / 算不起」到一条工程师能直接抄走的清单</text>

  <!-- Six pillars cards -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#softShadow)">
    <!-- Card 1 -->
    <g>
      <rect x="80" y="200" width="320" height="120" rx="18" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <circle cx="120" cy="240" r="20" fill="#22d3ee" opacity="0.2"/>
      <text x="120" y="247" text-anchor="middle" font-size="22" font-weight="900" fill="#22d3ee">①</text>
      <text x="160" y="240" font-size="20" font-weight="800" fill="#f8fafc">分辨率 &amp; 坐标缩放</text>
      <text x="160" y="270" font-size="13" fill="#94a3b8">预降采样 · 1280×720 · 还原坐标</text>
      <text x="160" y="292" font-size="13" fill="#94a3b8">点击精度的根因，ROI 最高</text>
    </g>
    <!-- Card 2 -->
    <g>
      <rect x="440" y="200" width="320" height="120" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
      <circle cx="480" cy="240" r="20" fill="#a78bfa" opacity="0.2"/>
      <text x="480" y="247" text-anchor="middle" font-size="22" font-weight="900" fill="#a78bfa">②</text>
      <text x="520" y="240" font-size="20" font-weight="800" fill="#f8fafc">Thinking Effort 调优</text>
      <text x="520" y="270" font-size="13" fill="#94a3b8">UI 任务感知优先 · 别上 max</text>
      <text x="520" y="292" font-size="13" fill="#94a3b8">4.6 medium · Opus 4.7 high</text>
    </g>
    <!-- Card 3 -->
    <g>
      <rect x="800" y="200" width="320" height="120" rx="18" fill="#0f172a" stroke="#f472b6" stroke-width="2"/>
      <circle cx="840" cy="240" r="20" fill="#f472b6" opacity="0.2"/>
      <text x="840" y="247" text-anchor="middle" font-size="22" font-weight="900" fill="#f472b6">③</text>
      <text x="880" y="240" font-size="20" font-weight="800" fill="#f8fafc">Prompt Injection 三层防御</text>
      <text x="880" y="270" font-size="13" fill="#94a3b8">训练 + 实时分类器 + 红队</text>
      <text x="880" y="292" font-size="13" fill="#94a3b8">Web 内容默认不可信</text>
    </g>
    <!-- Card 4 -->
    <g>
      <rect x="80" y="360" width="320" height="120" rx="18" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
      <circle cx="120" cy="400" r="20" fill="#34d399" opacity="0.2"/>
      <text x="120" y="407" text-anchor="middle" font-size="22" font-weight="900" fill="#34d399">④</text>
      <text x="160" y="400" font-size="20" font-weight="800" fill="#f8fafc">上下文管理三件套</text>
      <text x="160" y="430" font-size="13" fill="#94a3b8">Cache + Rolling Buffer + Compact</text>
      <text x="160" y="452" font-size="13" fill="#94a3b8">长任务能跑过 150K tokens</text>
    </g>
    <!-- Card 5 -->
    <g>
      <rect x="440" y="360" width="320" height="120" rx="18" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
      <circle cx="480" cy="400" r="20" fill="#fbbf24" opacity="0.2"/>
      <text x="480" y="407" text-anchor="middle" font-size="22" font-weight="900" fill="#fbbf24">⑤</text>
      <text x="520" y="400" font-size="20" font-weight="800" fill="#f8fafc">Batch / Advisor 实验工具</text>
      <text x="520" y="430" font-size="13" fill="#94a3b8">独立动作合批 · 难任务上顾问</text>
      <text x="520" y="452" font-size="13" fill="#94a3b8">服务端单 RT，无额外往返</text>
    </g>
    <!-- Card 6 -->
    <g>
      <rect x="800" y="360" width="320" height="120" rx="18" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
      <circle cx="840" cy="400" r="20" fill="#60a5fa" opacity="0.2"/>
      <text x="840" y="407" text-anchor="middle" font-size="22" font-weight="900" fill="#60a5fa">⑥</text>
      <text x="880" y="400" font-size="20" font-weight="800" fill="#f8fafc">Teach Mode 演示回放</text>
      <text x="880" y="430" font-size="13" fill="#94a3b8">Show, don't tell · 录制即规范</text>
      <text x="880" y="452" font-size="13" fill="#94a3b8">Strict / Adaptive / Goal 三模式</text>
    </g>
  </g>

  <!-- Bottom rim -->
  <rect x="80" y="540" width="1040" height="6" rx="3" fill="url(#rim)"/>
  <text x="600" y="585" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">让 Claude 像「合格的远端打工人」一样，可控、可观测、可复用</text>
  <text x="600" y="610" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="13" fill="#94a3b8">基于 Anthropic《Best practices for computer and browser use with Claude》 · 2026-05-13</text>
</svg>
