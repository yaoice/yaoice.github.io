<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-label="Computer Use 落地难点全景">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fef2f2"/>
    </linearGradient>
    <pattern id="gr2" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="ar2" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1e293b"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg2)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#gr2)"/>

  <text x="600" y="55" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="28" font-weight="900" fill="#0f172a">Computer Use 真正难的，是「让模型把人当好」的工程地基</text>
  <text x="600" y="88" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600" fill="#475569">五类典型失败 · 各自对应一条本文要拆解的主线</text>

  <!-- Center user -->
  <g filter="url(#sh2)">
    <circle cx="600" cy="340" r="80" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
    <text x="600" y="330" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="900" fill="#7c3aed">Claude Agent</text>
    <text x="600" y="358" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="600" fill="#475569">看屏幕 · 想 · 点</text>
  </g>

  <!-- 5 problem cards arranged around -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh2)">
    <!-- 1 点不准 -->
    <g>
      <rect x="60" y="140" width="280" height="120" rx="16" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
      <text x="80" y="170" font-size="16" font-weight="900" fill="#dc2626">⚠ 点不准</text>
      <text x="80" y="198" font-size="13" fill="#475569">截图过大被静默降采样</text>
      <text x="80" y="218" font-size="13" fill="#475569">坐标错位 / 偏移 / 点空</text>
      <text x="80" y="244" font-size="12" font-weight="700" fill="#0f172a">→ 主线①：分辨率与坐标</text>
    </g>
    <!-- 2 想得太多 -->
    <g>
      <rect x="860" y="140" width="280" height="120" rx="16" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
      <text x="880" y="170" font-size="16" font-weight="900" fill="#d97706">⏳ 想得太多 / 太慢</text>
      <text x="880" y="198" font-size="13" fill="#475569">UI 任务感知 &gt; 推理</text>
      <text x="880" y="218" font-size="13" fill="#475569">max effort 不一定更好</text>
      <text x="880" y="244" font-size="12" font-weight="700" fill="#0f172a">→ 主线②：思考强度</text>
    </g>
    <!-- 3 被网页骗 -->
    <g>
      <rect x="60" y="500" width="280" height="120" rx="16" fill="#ffffff" stroke="#ec4899" stroke-width="2"/>
      <text x="80" y="530" font-size="16" font-weight="900" fill="#be185d">🛡 被网页骗</text>
      <text x="80" y="558" font-size="13" fill="#475569">隐藏指令 / 钓鱼诱导</text>
      <text x="80" y="578" font-size="13" fill="#475569">敏感操作没人审</text>
      <text x="80" y="604" font-size="12" font-weight="700" fill="#0f172a">→ 主线③：注入防御</text>
    </g>
    <!-- 4 算不起 -->
    <g>
      <rect x="860" y="500" width="280" height="120" rx="16" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
      <text x="880" y="530" font-size="16" font-weight="900" fill="#047857">💸 算不起</text>
      <text x="880" y="558" font-size="13" fill="#475569">长任务上下文爆 150K</text>
      <text x="880" y="578" font-size="13" fill="#475569">每轮重传截图 → 钱包失血</text>
      <text x="880" y="604" font-size="12" font-weight="700" fill="#0f172a">→ 主线④：上下文管理</text>
    </g>
    <!-- 5 跑歪了 -->
    <g>
      <rect x="460" y="540" width="280" height="100" rx="16" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
      <text x="480" y="570" font-size="16" font-weight="900" fill="#1d4ed8">🧭 跑歪了 / 不稳定</text>
      <text x="480" y="598" font-size="13" fill="#475569">每次轨迹不一样 · 失败难复现</text>
      <text x="480" y="624" font-size="12" font-weight="700" fill="#0f172a">→ 主线⑤⑥：Batch / Advisor / Teach Mode</text>
    </g>
  </g>

  <!-- Arrows to center -->
  <g stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#ar2)">
    <line x1="340" y1="200" x2="525" y2="305"/>
    <line x1="860" y1="200" x2="675" y2="305"/>
    <line x1="340" y1="560" x2="525" y2="380"/>
    <line x1="860" y1="560" x2="675" y2="380"/>
    <line x1="600" y1="540" x2="600" y2="430"/>
  </g>
</svg>
