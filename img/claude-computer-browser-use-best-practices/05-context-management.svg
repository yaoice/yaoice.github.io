<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-label="上下文管理三件套">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <pattern id="gr5" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#a7f3d0" stroke-width="1" opacity="0.5"/>
    </pattern>
    <filter id="sh5" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f766e" flood-opacity="0.16"/>
    </filter>
    <marker id="ar5" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#0f766e"/></marker>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg5)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#gr5)"/>

  <text x="600" y="55" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="900" fill="#0f172a">上下文管理三件套：让长任务能跑过 150K tokens 而不爆炸</text>
  <text x="600" y="85" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="600" fill="#0f766e">缓存复用 + 滚动修剪 + 智能压缩 · 三层各司其职</text>

  <!-- Token timeline -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">
    <rect x="80" y="120" width="1040" height="40" rx="20" fill="#e2e8f0"/>
    <rect x="80" y="120" width="180" height="40" rx="20" fill="#7c3aed" opacity="0.85"/>
    <text x="170" y="146" text-anchor="middle" font-size="13" font-weight="800" fill="#ffffff">System Prompt (稳定)</text>
    <rect x="260" y="120" width="640" height="40" fill="#bfdbfe" opacity="0.9"/>
    <text x="580" y="146" text-anchor="middle" font-size="13" font-weight="800" fill="#1e3a8a">历史 turns / tool_result（含截图）</text>
    <rect x="900" y="120" width="220" height="40" rx="20" fill="#fde68a"/>
    <text x="1010" y="146" text-anchor="middle" font-size="13" font-weight="800" fill="#7c2d12">最近 N 轮（活跃）</text>

    <text x="80" y="105" font-size="13" font-weight="700" fill="#475569">0</text>
    <text x="1120" y="105" text-anchor="end" font-size="13" font-weight="700" fill="#dc2626">~150K tokens 阈值</text>
  </g>

  <!-- 3 cards -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh5)">
    <!-- Cache breakpoints -->
    <g>
      <rect x="80" y="200" width="320" height="220" rx="16" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
      <rect x="80" y="200" width="320" height="50" rx="16" fill="#7c3aed"/>
      <text x="240" y="232" text-anchor="middle" font-size="17" font-weight="900" fill="#ffffff">① Cache Breakpoints</text>
      <text x="100" y="278" font-size="13" font-weight="800" fill="#0f172a">4 个断点的标准布局</text>
      <text x="100" y="300" font-size="12" fill="#475569">· 1 个固定在 system 前缀</text>
      <text x="100" y="320" font-size="12" fill="#475569">· 3 个跟随最近 tool_result 滚动</text>
      <text x="100" y="350" font-size="13" font-weight="800" fill="#0f172a">每轮重新放置</text>
      <text x="100" y="372" font-size="12" fill="#475569">实现「优雅降级」</text>
      <text x="100" y="394" font-size="12" fill="#475569">前缀字节稳定 → 命中率最大化</text>
      <text x="100" y="412" font-size="12" font-weight="700" fill="#7c3aed">→ 命中即省钱省 latency</text>
    </g>
    <!-- Rolling buffer -->
    <g>
      <rect x="440" y="200" width="320" height="220" rx="16" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
      <rect x="440" y="200" width="320" height="50" rx="16" fill="#0ea5e9"/>
      <text x="600" y="232" text-anchor="middle" font-size="17" font-weight="900" fill="#ffffff">② Rolling Buffer</text>
      <text x="460" y="278" font-size="13" font-weight="800" fill="#0f172a">默认参数</text>
      <text x="460" y="300" font-size="12" fill="#475569">keep_n = 3 · interval = 25</text>
      <text x="460" y="328" font-size="13" font-weight="800" fill="#0f172a">批量修剪 · 不逐条丢</text>
      <text x="460" y="350" font-size="12" fill="#475569">让前缀字节保持稳定</text>
      <text x="460" y="370" font-size="12" fill="#475569">→ 缓存命中不被打断</text>
      <text x="460" y="395" font-size="13" font-weight="800" fill="#0f172a">旧截图替换为占位符</text>
      <text x="460" y="416" font-size="12" font-weight="700" fill="#0284c7">[Image omitted]</text>
    </g>
    <!-- Compaction -->
    <g>
      <rect x="800" y="200" width="320" height="220" rx="16" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
      <rect x="800" y="200" width="320" height="50" rx="16" fill="#f59e0b"/>
      <text x="960" y="232" text-anchor="middle" font-size="17" font-weight="900" fill="#ffffff">③ LLM Compaction</text>
      <text x="820" y="278" font-size="13" font-weight="800" fill="#0f172a">Server-side (beta)</text>
      <text x="820" y="298" font-size="12" fill="#475569">compact_20260112 · 阈值 ~150K</text>
      <text x="820" y="324" font-size="13" font-weight="800" fill="#0f172a">Client-side</text>
      <text x="820" y="344" font-size="12" fill="#475569">手动检 token · 跨阈值调摘要</text>
      <text x="820" y="372" font-size="13" font-weight="800" fill="#0f172a">摘要 prompt 必含 8 节</text>
      <text x="820" y="392" font-size="11" fill="#475569">Instructions / Template / Rules /</text>
      <text x="820" y="408" font-size="11" fill="#475569">Actions / Errors / Progress / State / Next</text>
    </g>
  </g>

  <!-- Cooperation flow -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh5)">
    <rect x="80" y="460" width="1040" height="160" rx="16" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
    <text x="600" y="495" text-anchor="middle" font-size="16" font-weight="900" fill="#0f172a">三层协作流：每轮 turn 触发的处理顺序</text>

    <!-- step boxes -->
    <rect x="120" y="520" width="180" height="70" rx="12" fill="#ede9fe" stroke="#a78bfa"/>
    <text x="210" y="548" text-anchor="middle" font-size="13" font-weight="800" fill="#5b21b6">① 重放 cache</text>
    <text x="210" y="570" text-anchor="middle" font-size="11" fill="#5b21b6">命中前缀 + 最近断点</text>

    <rect x="350" y="520" width="180" height="70" rx="12" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="440" y="548" text-anchor="middle" font-size="13" font-weight="800" fill="#075985">② 修剪 buffer</text>
    <text x="440" y="570" text-anchor="middle" font-size="11" fill="#075985">每 25 轮批量裁掉旧截图</text>

    <rect x="580" y="520" width="180" height="70" rx="12" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="670" y="548" text-anchor="middle" font-size="13" font-weight="800" fill="#9a3412">③ 跨阈值压缩</text>
    <text x="670" y="570" text-anchor="middle" font-size="11" fill="#9a3412">摘要按 8 节模板替换</text>

    <rect x="810" y="520" width="270" height="70" rx="12" fill="#dcfce7" stroke="#16a34a"/>
    <text x="945" y="548" text-anchor="middle" font-size="13" font-weight="800" fill="#14532d">④ 继续推进任务</text>
    <text x="945" y="570" text-anchor="middle" font-size="11" fill="#14532d">上下文「瘦身」但语义连续</text>
  </g>
  <g stroke="#0f766e" stroke-width="2" fill="none" marker-end="url(#ar5)">
    <line x1="300" y1="555" x2="345" y2="555"/>
    <line x1="530" y1="555" x2="575" y2="555"/>
    <line x1="760" y1="555" x2="805" y2="555"/>
  </g>
</svg>
