<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="最佳实践全景清单雷达图">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow8" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots8" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#334155" opacity="0.55"/>
    </pattern>
    <filter id="sh8" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg8)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#dots8)"/>
  <ellipse cx="600" cy="340" rx="540" ry="260" fill="url(#glow8)"/>

  <text x="600" y="55" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="900" fill="#f8fafc">上手清单：照着这一张图，把 Computer Use 工程化跑起来</text>
  <text x="600" y="85" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">六大维度 · 每条都给一个可立刻动手的动作</text>

  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh8)">
    <!-- 1 -->
    <rect x="60" y="130" width="360" height="160" rx="16" fill="#0b1226" stroke="#22d3ee" stroke-width="2"/>
    <text x="80" y="160" font-size="15" font-weight="900" fill="#22d3ee">① Prompt Engineering</text>
    <text x="80" y="188" font-size="12" fill="#cbd5f5">✓ 文本指令在前，截图在后</text>
    <text x="80" y="210" font-size="12" fill="#cbd5f5">✓ 指令包含位置上下文（"右上角"）</text>
    <text x="80" y="232" font-size="12" fill="#cbd5f5">✓ 复杂交互拆成小步</text>
    <text x="80" y="265" font-size="11" font-style="italic" fill="#94a3b8">第一步就把消息体顺序改对，零成本收益</text>

    <!-- 2 -->
    <rect x="440" y="130" width="360" height="160" rx="16" fill="#0b1226" stroke="#a78bfa" stroke-width="2"/>
    <text x="460" y="160" font-size="15" font-weight="900" fill="#a78bfa">② Tool Design</text>
    <text x="460" y="188" font-size="12" fill="#cbd5f5">✓ 优先官方 computer_20251124</text>
    <text x="460" y="210" font-size="12" fill="#cbd5f5">✓ 独立动作合 batch · 探索/纠错别合</text>
    <text x="460" y="232" font-size="12" fill="#cbd5f5">✓ 难任务挂 Advisor (Opus 4.7)</text>
    <text x="460" y="265" font-size="11" font-style="italic" fill="#94a3b8">让"工具集"反映任务结构，不是反过来</text>

    <!-- 3 -->
    <rect x="820" y="130" width="320" height="160" rx="16" fill="#0b1226" stroke="#f472b6" stroke-width="2"/>
    <text x="840" y="160" font-size="15" font-weight="900" fill="#f472b6">③ Guardrails</text>
    <text x="840" y="188" font-size="12" fill="#cbd5f5">✓ 关键操作人审</text>
    <text x="840" y="210" font-size="12" fill="#cbd5f5">✓ 最小权限 + 沙箱</text>
    <text x="840" y="232" font-size="12" fill="#cbd5f5">✓ 全量轨迹日志</text>
    <text x="840" y="254" font-size="12" fill="#cbd5f5">✓ Web 默认不可信</text>

    <!-- 4 -->
    <rect x="60" y="320" width="360" height="160" rx="16" fill="#0b1226" stroke="#34d399" stroke-width="2"/>
    <text x="80" y="350" font-size="15" font-weight="900" fill="#34d399">④ 错误处理</text>
    <text x="80" y="378" font-size="12" fill="#cbd5f5">✓ 维护"症状—原因—修复"对照表</text>
    <text x="80" y="400" font-size="12" fill="#cbd5f5">✓ Localization Playground 复现</text>
    <text x="80" y="422" font-size="12" fill="#cbd5f5">✓ 失败时切键盘 / JS / DOM 操作</text>
    <text x="80" y="455" font-size="11" font-style="italic" fill="#94a3b8">把"点不准"从玄学问题变成查表问题</text>

    <!-- 5 -->
    <rect x="440" y="320" width="360" height="160" rx="16" fill="#0b1226" stroke="#fbbf24" stroke-width="2"/>
    <text x="460" y="350" font-size="15" font-weight="900" fill="#fbbf24">⑤ 成本 / 延迟</text>
    <text x="460" y="378" font-size="12" fill="#cbd5f5">✓ 客户端预降采样 (1280×720 起步)</text>
    <text x="460" y="400" font-size="12" fill="#cbd5f5">✓ Sonnet 4.6 默认，难时上 Opus 4.7</text>
    <text x="460" y="422" font-size="12" fill="#cbd5f5">✓ Cache + Rolling Buffer + Compaction</text>
    <text x="460" y="455" font-size="11" font-style="italic" fill="#94a3b8">省钱的关键不是模型小，而是上下文稳</text>

    <!-- 6 -->
    <rect x="820" y="320" width="320" height="160" rx="16" fill="#0b1226" stroke="#60a5fa" stroke-width="2"/>
    <text x="840" y="350" font-size="15" font-weight="900" fill="#60a5fa">⑥ 可靠性 / 可复用</text>
    <text x="840" y="378" font-size="12" fill="#cbd5f5">✓ Teach Mode 录制人类演示</text>
    <text x="840" y="400" font-size="12" fill="#cbd5f5">✓ Adaptive 回放为默认</text>
    <text x="840" y="422" font-size="12" fill="#cbd5f5">✓ 周期性提醒 batch / advisor 可用</text>
    <text x="840" y="444" font-size="12" fill="#cbd5f5">✓ Trajectory Viewer 复盘</text>
  </g>

  <!-- Bottom call-out -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh8)">
    <rect x="80" y="520" width="1040" height="120" rx="16" fill="#0b1226" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="600" y="555" text-anchor="middle" font-size="16" font-weight="900" fill="#22d3ee">优先级建议（按 ROI 从高到低）</text>
    <text x="100" y="590" font-size="13" fill="#e2e8f0">1️⃣ 先把分辨率与坐标 pipeline 写对</text>
    <text x="430" y="590" font-size="13" fill="#e2e8f0">2️⃣ 把 cache + rolling buffer 接上</text>
    <text x="760" y="590" font-size="13" fill="#e2e8f0">3️⃣ 加 Guardrails（人审 + 日志）</text>
    <text x="100" y="618" font-size="13" fill="#e2e8f0">4️⃣ Effort 选档位 · 模型按场景挑</text>
    <text x="430" y="618" font-size="13" fill="#e2e8f0">5️⃣ 用 Teach Mode 把高频场景固化</text>
    <text x="760" y="618" font-size="13" fill="#e2e8f0">6️⃣ 再考虑 Batch / Advisor 等实验项</text>
  </g>
</svg>
