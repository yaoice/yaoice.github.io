<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="分辨率与坐标缩放因果链">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <pattern id="gr3" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#bae6fd" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="sh3" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0c4a6e" flood-opacity="0.18"/>
    </filter>
    <marker id="arGood" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/></marker>
    <marker id="arBad" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/></marker>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg3)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#gr3)"/>

  <text x="600" y="50" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="900" fill="#0c4a6e">点击精度的根因不是模型，而是「图怎么进、坐标怎么回」</text>
  <text x="600" y="80" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="600" fill="#0369a1">绿色：客户端预降采样 · 红色：交给 API 静默降采样</text>

  <!-- Top: BAD path -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh3)">
    <text x="80" y="135" font-size="16" font-weight="900" fill="#dc2626">✗ 失败路径：原图直接喂给 API</text>
    <rect x="80" y="150" width="200" height="80" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="180" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">原生 1920×1080</text>
    <text x="180" y="205" text-anchor="middle" font-size="12" fill="#991b1b">超 4.6 系列 1568 px 上限</text>

    <rect x="340" y="150" width="200" height="80" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="440" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">服务端静默降采样</text>
    <text x="440" y="203" text-anchor="middle" font-size="12" fill="#991b1b">你不知道按什么比例缩</text>

    <rect x="600" y="150" width="200" height="80" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="700" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">模型返回坐标</text>
    <text x="700" y="203" text-anchor="middle" font-size="12" fill="#991b1b">已经在「未知尺度」上</text>

    <rect x="860" y="150" width="220" height="80" rx="12" fill="#fecaca" stroke="#dc2626" stroke-width="2.5"/>
    <text x="970" y="178" text-anchor="middle" font-size="14" font-weight="800" fill="#7f1d1d">点击偏移 / 落空</text>
    <text x="970" y="203" text-anchor="middle" font-size="12" fill="#991b1b">小目标尤其惨</text>
  </g>
  <g stroke="#dc2626" stroke-width="2.2" fill="none" marker-end="url(#arBad)">
    <line x1="280" y1="190" x2="335" y2="190"/>
    <line x1="540" y1="190" x2="595" y2="190"/>
    <line x1="800" y1="190" x2="855" y2="190"/>
  </g>

  <!-- Bottom: GOOD path -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh3)">
    <text x="80" y="345" font-size="16" font-weight="900" fill="#15803d">✓ 推荐路径：客户端预降采样 + 坐标回放</text>

    <rect x="80" y="365" width="200" height="100" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="180" y="395" text-anchor="middle" font-size="14" font-weight="800" fill="#14532d">prepare_screenshot</text>
    <text x="180" y="420" text-anchor="middle" font-size="12" fill="#166534">1280×720 (4.6 系列)</text>
    <text x="180" y="438" text-anchor="middle" font-size="12" fill="#166534">1080p (Opus 4.7)</text>
    <text x="180" y="456" text-anchor="middle" font-size="12" fill="#166534">compute_max_api_fit</text>

    <rect x="340" y="365" width="200" height="100" rx="12" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
    <text x="440" y="392" text-anchor="middle" font-size="14" font-weight="800" fill="#14532d">文本指令在前</text>
    <text x="440" y="412" text-anchor="middle" font-size="12" fill="#166534">截图在后</text>
    <text x="440" y="438" text-anchor="middle" font-size="12" fill="#166534">指令带「位置上下文」</text>
    <text x="440" y="456" text-anchor="middle" font-size="12" fill="#166534">小目标启用 enable_zoom</text>

    <rect x="600" y="365" width="200" height="100" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="700" y="392" text-anchor="middle" font-size="14" font-weight="800" fill="#14532d">模型在缩放图上输出</text>
    <text x="700" y="412" text-anchor="middle" font-size="12" fill="#166534">e.g. (640, 360)</text>
    <text x="700" y="438" text-anchor="middle" font-size="12" fill="#166534">scale_coordinates 还原</text>
    <text x="700" y="456" text-anchor="middle" font-size="12" fill="#166534">→ 真实屏幕坐标</text>

    <rect x="860" y="365" width="220" height="100" rx="12" fill="#bbf7d0" stroke="#16a34a" stroke-width="2.5"/>
    <text x="970" y="395" text-anchor="middle" font-size="14" font-weight="800" fill="#14532d">点击精确落位</text>
    <text x="970" y="420" text-anchor="middle" font-size="12" fill="#166534">Sonnet 4.6 最稳</text>
    <text x="970" y="440" text-anchor="middle" font-size="12" fill="#166534">Opus 4.7 推理强 + 精度近</text>
    <text x="970" y="458" text-anchor="middle" font-size="12" fill="#166534">Sonnet</text>
  </g>
  <g stroke="#16a34a" stroke-width="2.4" fill="none" marker-end="url(#arGood)">
    <line x1="280" y1="415" x2="335" y2="415"/>
    <line x1="540" y1="415" x2="595" y2="415"/>
    <line x1="800" y1="415" x2="855" y2="415"/>
  </g>

  <!-- Bottom no-go -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">
    <rect x="80" y="510" width="1020" height="100" rx="14" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
    <text x="100" y="540" font-size="14" font-weight="900" fill="#9a3412">⚠ 已被验证「不管用」的优化（别浪费时间）</text>
    <text x="100" y="565" font-size="13" fill="#7c2d12">· 图像分块拼接</text>
    <text x="280" y="565" font-size="13" fill="#7c2d12">· 在截图上叠网格 / 坐标轴</text>
    <text x="540" y="565" font-size="13" fill="#7c2d12">· 换 resize 算法 (lanczos / bicubic …)</text>
    <text x="100" y="588" font-size="13" fill="#7c2d12">· macOS 2× DPR 不缩</text>
    <text x="280" y="588" font-size="13" fill="#7c2d12">· 低于 960×540 的过小图</text>
    <text x="540" y="588" font-size="13" fill="#7c2d12">· 4.6 系列上塞 1920×1080+</text>
  </g>
</svg>
