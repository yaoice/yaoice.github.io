<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-label="Prompt Injection 三层防御漏斗">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="100%" stop-color="#fdf4ff"/>
    </linearGradient>
    <pattern id="gr6" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#fecdd3" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="sh6" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#831843" flood-opacity="0.18"/>
    </filter>
    <marker id="ar6" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#be185d"/></marker>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg6)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#gr6)"/>

  <text x="600" y="55" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="900" fill="#0f172a">Prompt Injection 三层防御漏斗 + Guardrails 四件套</text>
  <text x="600" y="85" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="600" fill="#9f1239">默认假设：来自 web 的所有内容都是不可信的</text>

  <!-- Funnel -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh6)">
    <!-- Layer 1 -->
    <path d="M 240 130 L 760 130 L 720 200 L 280 200 Z" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    <text x="500" y="160" text-anchor="middle" font-size="16" font-weight="900" fill="#831843">① Training-time robustness（训练期）</text>
    <text x="500" y="185" text-anchor="middle" font-size="12" fill="#9f1239">RL 训练让模型识别并拒绝恶意指令 · 默认内置</text>

    <!-- Layer 2 -->
    <path d="M 280 220 L 720 220 L 680 290 L 320 290 Z" fill="#fbcfe8" stroke="#db2777" stroke-width="2"/>
    <text x="500" y="250" text-anchor="middle" font-size="16" font-weight="900" fill="#831843">② Real-time classifiers（实时分类器）</text>
    <text x="500" y="275" text-anchor="middle" font-size="12" fill="#9f1239">computer_20251124 默认开启 · 免费 · 零延迟</text>

    <!-- Layer 3 -->
    <path d="M 320 310 L 680 310 L 640 380 L 360 380 Z" fill="#f9a8d4" stroke="#be185d" stroke-width="2"/>
    <text x="500" y="340" text-anchor="middle" font-size="16" font-weight="900" fill="#500724">③ Continuous red teaming（持续红队）</text>
    <text x="500" y="365" text-anchor="middle" font-size="12" fill="#831843">官方持续演练 · 你也应该针对自家场景演练</text>

    <!-- Bottom: result -->
    <rect x="380" y="395" width="240" height="50" rx="12" fill="#0f172a"/>
    <text x="500" y="426" text-anchor="middle" font-size="14" font-weight="900" fill="#f8fafc">交付到模型的「净化输入」</text>
  </g>

  <!-- Side note: 自定义工具 -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh6)">
    <rect x="800" y="130" width="320" height="160" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="820" y="160" font-size="14" font-weight="900" fill="#0f172a">⚠ 注意：自定义工具暂不开</text>
    <text x="820" y="184" font-size="12" fill="#475569">分类器目前仅支持官方</text>
    <text x="820" y="204" font-size="12" font-weight="700" fill="#7c3aed">computer_20251124</text>
    <text x="820" y="226" font-size="12" fill="#475569">想接自家工具，需填官方</text>
    <text x="820" y="246" font-size="12" fill="#475569">兴趣表单等评估</text>
    <text x="820" y="276" font-size="12" font-style="italic" fill="#0369a1">（在此之前请补足应用层防御）</text>
  </g>

  <!-- Guardrails 4 cards at bottom -->
  <text x="600" y="475" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="900" fill="#0f172a">Guardrails 四件套（应用层兜底，永远不要省）</text>

  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh6)">
    <rect x="80" y="500" width="240" height="120" rx="14" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="100" y="528" font-size="14" font-weight="900" fill="#7f1d1d">⚠ 关键操作必经人审</text>
    <text x="100" y="555" font-size="12" fill="#475569">最有效的缓解措施</text>
    <text x="100" y="575" font-size="12" fill="#475569">付款 · 发邮件 · 删数据</text>
    <text x="100" y="600" font-size="11" font-style="italic" fill="#dc2626">永远别让 agent 直接动钱</text>

    <rect x="340" y="500" width="240" height="120" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="360" y="528" font-size="14" font-weight="900" fill="#9a3412">🔒 最小爆炸半径</text>
    <text x="360" y="555" font-size="12" fill="#475569">权限 / 账号 / 网络分级</text>
    <text x="360" y="575" font-size="12" fill="#475569">沙箱 + 只读为先</text>
    <text x="360" y="600" font-size="11" font-style="italic" fill="#9a3412">越权时损失越小</text>

    <rect x="600" y="500" width="240" height="120" rx="14" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="620" y="528" font-size="14" font-weight="900" fill="#075985">📊 全量监控与日志</text>
    <text x="620" y="555" font-size="12" fill="#475569">每一次截图 / 点击 / 工具调用</text>
    <text x="620" y="575" font-size="12" fill="#475569">写到可回放的轨迹存档</text>
    <text x="620" y="600" font-size="11" font-style="italic" fill="#075985">事后能查 + 事中能告警</text>

    <rect x="860" y="500" width="240" height="120" rx="14" fill="#ffffff" stroke="#ec4899" stroke-width="2"/>
    <text x="880" y="528" font-size="14" font-weight="900" fill="#831843">🚨 Web 内容默认不可信</text>
    <text x="880" y="555" font-size="12" fill="#475569">网页文字 / 评论 / 弹窗</text>
    <text x="880" y="575" font-size="12" fill="#475569">都可能藏注入指令</text>
    <text x="880" y="600" font-size="11" font-style="italic" fill="#831843">「用户说的」≠「页面说的」</text>
  </g>
</svg>
