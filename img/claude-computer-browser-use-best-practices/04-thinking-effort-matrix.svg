<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="Thinking Effort 调优矩阵">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <pattern id="gr4" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e9d5ff" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="sh4" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#312e81" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg4)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#gr4)"/>

  <text x="600" y="55" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="900" fill="#312e81">Thinking Effort × 模型：UI 任务的「场景—档位」矩阵</text>
  <text x="600" y="85" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="600" fill="#4338ca">UI 任务以「感知」为主而不是「推理」 · 过度思考反而拖性能</text>

  <!-- Headers -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">
    <rect x="80" y="120" width="220" height="60" rx="12" fill="#1e293b"/>
    <text x="190" y="158" text-anchor="middle" font-size="16" font-weight="800" fill="#f8fafc">场景</text>

    <rect x="320" y="120" width="380" height="60" rx="12" fill="#7c3aed"/>
    <text x="510" y="148" text-anchor="middle" font-size="16" font-weight="800" fill="#ffffff">Claude 4.6 系列 (Sonnet / Opus)</text>
    <text x="510" y="170" text-anchor="middle" font-size="12" fill="#ede9fe">默认 medium · 不推荐 max</text>

    <rect x="720" y="120" width="380" height="60" rx="12" fill="#0ea5e9"/>
    <text x="910" y="148" text-anchor="middle" font-size="16" font-weight="800" fill="#ffffff">Claude Opus 4.7</text>
    <text x="910" y="170" text-anchor="middle" font-size="12" fill="#e0f2fe">默认 high · 推理强 + 精度近 Sonnet 4.6</text>
  </g>

  <!-- Rows -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh4)">
    <!-- Row 1 默认 -->
    <rect x="80" y="200" width="220" height="80" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="100" y="232" font-size="15" font-weight="800" fill="#0f172a">默认通用任务</text>
    <text x="100" y="258" font-size="12" fill="#64748b">大多数生产工作流</text>

    <rect x="320" y="200" width="380" height="80" rx="12" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
    <text x="345" y="230" font-size="14" font-weight="900" fill="#5b21b6">medium</text>
    <text x="345" y="252" font-size="12" fill="#4338ca">性价比最优 · 推理足够 + token 可控</text>
    <text x="345" y="270" font-size="12" fill="#4338ca">绝大多数项目从这里开始</text>

    <rect x="720" y="200" width="380" height="80" rx="12" fill="#f0f9ff" stroke="#38bdf8" stroke-width="2"/>
    <text x="745" y="230" font-size="14" font-weight="900" fill="#075985">high</text>
    <text x="745" y="252" font-size="12" fill="#0c4a6e">复杂多步任务推理充足</text>
    <text x="745" y="270" font-size="12" fill="#0c4a6e">官方默认推荐</text>

    <!-- Row 2 高吞吐 -->
    <rect x="80" y="295" width="220" height="80" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="100" y="327" font-size="15" font-weight="800" fill="#0f172a">高吞吐 / 成本敏感</text>
    <text x="100" y="353" font-size="12" fill="#64748b">批量处理大量任务</text>

    <rect x="320" y="295" width="380" height="80" rx="12" fill="#fefce8" stroke="#facc15" stroke-width="2"/>
    <text x="345" y="325" font-size="14" font-weight="900" fill="#854d0e">low</text>
    <text x="345" y="347" font-size="12" fill="#713f12">比关「思考」更准且 token 更少</text>
    <text x="345" y="365" font-size="12" fill="#713f12">关掉 thinking 反而是反优化</text>

    <rect x="720" y="295" width="380" height="80" rx="12" fill="#fefce8" stroke="#facc15" stroke-width="2"/>
    <text x="745" y="325" font-size="14" font-weight="900" fill="#854d0e">low</text>
    <text x="745" y="347" font-size="12" fill="#713f12">质量仍超 4.6 high / max</text>
    <text x="745" y="365" font-size="12" fill="#713f12">追求性价比时首选</text>

    <!-- Row 3 简单 -->
    <rect x="80" y="390" width="220" height="80" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="100" y="422" font-size="15" font-weight="800" fill="#0f172a">简单工作流 / 延迟优先</text>
    <text x="100" y="448" font-size="12" fill="#64748b">单步点击 · 表单填充</text>

    <rect x="320" y="390" width="380" height="80" rx="12" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <text x="345" y="420" font-size="14" font-weight="900" fill="#065f46">关闭 thinking</text>
    <text x="345" y="442" font-size="12" fill="#047857">延迟最低</text>
    <text x="345" y="460" font-size="12" fill="#047857">配 Sonnet 4.6 / Haiku 4.5</text>

    <rect x="720" y="390" width="380" height="80" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="745" y="420" font-size="14" font-weight="900" fill="#334155">建议改用 Sonnet 4.6</text>
    <text x="745" y="442" font-size="12" fill="#475569">Opus 4.7 在简单任务上性价比不高</text>
    <text x="745" y="460" font-size="12" fill="#475569">不要为了「最大」而最大</text>

    <!-- Row 4 难任务 -->
    <rect x="80" y="485" width="220" height="80" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="100" y="517" font-size="15" font-weight="800" fill="#0f172a">一次成功的复杂任务</text>
    <text x="100" y="543" font-size="12" fill="#64748b">高难度 · 不允许重试</text>

    <rect x="320" y="485" width="380" height="80" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="345" y="515" font-size="14" font-weight="900" fill="#9a3412">high (上限到此为止)</text>
    <text x="345" y="537" font-size="12" fill="#7c2d12">困难任务用 high</text>
    <text x="345" y="555" font-size="12" fill="#7c2d12">⚠ 不推荐 4.6 上 max effort</text>

    <rect x="720" y="485" width="380" height="80" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="745" y="515" font-size="14" font-weight="900" fill="#7f1d1d">max</text>
    <text x="745" y="537" font-size="12" fill="#991b1b">高难场景 · 一次成的复杂任务</text>
    <text x="745" y="555" font-size="12" fill="#991b1b">注意成本飙升曲线</text>
  </g>

  <!-- Footer takeaway -->
  <text x="600" y="610" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="700" fill="#312e81">Takeaway：先按「场景」选档位，再按「模型代际」决定要不要往上挪一档；UI 不是数学题，别逼模型「想到底」</text>
</svg>
