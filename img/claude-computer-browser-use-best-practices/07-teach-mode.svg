<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Teach Mode 录制与三种回放模式">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#fefce8"/>
    </linearGradient>
    <pattern id="gr7" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#bfdbfe" stroke-width="1" opacity="0.5"/>
    </pattern>
    <filter id="sh7" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e3a8a" flood-opacity="0.18"/>
    </filter>
    <marker id="ar7" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1d4ed8"/></marker>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg7)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#gr7)"/>

  <text x="600" y="50" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="900" fill="#0f172a">Teach Mode：Show, Don't Tell — 录人类一遍，让 Claude 抄一万遍</text>
  <text x="600" y="80" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="600" fill="#1d4ed8">录制时序 + 回放三模式 · 用 selector + coordinates 双保险抗 UI 漂移</text>

  <text x="80" y="120" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="900" fill="#0f172a">① 录制：5 步费用报告示例</text>
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh7)">
    <g><circle cx="160" cy="180" r="32" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5"/><text x="160" y="187" text-anchor="middle" font-size="16" font-weight="900" fill="#1d4ed8">1</text><text x="160" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">导航到</text><text x="160" y="256" text-anchor="middle" font-size="12" fill="#475569">Expense 页</text></g>
    <g><circle cx="350" cy="180" r="32" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5"/><text x="350" y="187" text-anchor="middle" font-size="16" font-weight="900" fill="#1d4ed8">2</text><text x="350" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">点击 Category</text><text x="350" y="256" text-anchor="middle" font-size="12" fill="#475569">下拉</text></g>
    <g><circle cx="540" cy="180" r="32" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5"/><text x="540" y="187" text-anchor="middle" font-size="16" font-weight="900" fill="#1d4ed8">3</text><text x="540" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">选 Travel</text><text x="540" y="256" text-anchor="middle" font-size="12" fill="#475569">分类</text></g>
    <g><circle cx="730" cy="180" r="32" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5"/><text x="730" y="187" text-anchor="middle" font-size="16" font-weight="900" fill="#1d4ed8">4</text><text x="730" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">输入金额</text><text x="730" y="256" text-anchor="middle" font-size="12" fill="#475569">¥1,280</text></g>
    <g><circle cx="920" cy="180" r="32" fill="#ffffff" stroke="#22c55e" stroke-width="2.5"/><text x="920" y="187" text-anchor="middle" font-size="16" font-weight="900" fill="#15803d">5</text><text x="920" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">点击 Submit</text><text x="920" y="256" text-anchor="middle" font-size="12" fill="#475569">完成</text></g>
  </g>
  <g stroke="#3b82f6" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#ar7)">
    <line x1="192" y1="180" x2="318" y2="180"/>
    <line x1="382" y1="180" x2="508" y2="180"/>
    <line x1="572" y1="180" x2="698" y2="180"/>
    <line x1="762" y1="180" x2="888" y2="180"/>
  </g>

  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh7)">
    <rect x="80" y="290" width="1040" height="90" rx="14" fill="#ffffff" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="100" y="318" font-size="14" font-weight="900" fill="#0f172a">每步同时捕获（WorkflowStep）</text>
    <text x="100" y="345" font-size="13" fill="#1e293b">action · description ·</text>
    <text x="290" y="345" font-size="13" font-weight="800" fill="#16a34a">selector（抗布局变化）</text>
    <text x="510" y="345" font-size="13" font-weight="800" fill="#7c3aed">coordinates（视觉回退）</text>
    <text x="740" y="345" font-size="13" fill="#1e293b">· screenshot（带蓝色圆圈点击位）· speech_transcript</text>
    <text x="100" y="368" font-size="12" font-style="italic" fill="#475569">selector + coordinates 双保险，UI 漂一点也能落对</text>
  </g>

  <text x="80" y="430" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" font-weight="900" fill="#0f172a">② 回放：三种模式按业务严苛度选</text>

  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" filter="url(#sh7)">
    <rect x="80" y="450" width="320" height="220" rx="16" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <rect x="80" y="450" width="320" height="50" rx="16" fill="#fee2e2"/>
    <text x="240" y="482" text-anchor="middle" font-size="17" font-weight="900" fill="#7f1d1d">Strict 严格</text>
    <text x="100" y="525" font-size="13" font-weight="800" fill="#0f172a">行为</text>
    <text x="100" y="546" font-size="12" fill="#475569">完全按演示走 · UI 变化大就停</text>
    <text x="100" y="572" font-size="13" font-weight="800" fill="#0f172a">适合</text>
    <text x="100" y="593" font-size="12" fill="#475569">合规审批 / 财务结账</text>
    <text x="100" y="611" font-size="12" fill="#475569">监管报送等不可错的链路</text>
    <text x="100" y="640" font-size="12" font-style="italic" fill="#dc2626">宁可停 ≫ 走错一步</text>

    <rect x="440" y="450" width="320" height="220" rx="16" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/>
    <rect x="440" y="450" width="320" height="50" rx="16" fill="#dcfce7"/>
    <text x="600" y="482" text-anchor="middle" font-size="17" font-weight="900" fill="#14532d">Adaptive 自适应（推荐默认）</text>
    <text x="460" y="525" font-size="13" font-weight="800" fill="#0f172a">行为</text>
    <text x="460" y="546" font-size="12" fill="#475569">演示作指引 · 适应轻微 UI 变化</text>
    <text x="460" y="572" font-size="13" font-weight="800" fill="#0f172a">适合</text>
    <text x="460" y="593" font-size="12" fill="#475569">CRM / 表单填写 / 工单流转</text>
    <text x="460" y="611" font-size="12" fill="#475569">大多数企业内部系统</text>
    <text x="460" y="640" font-size="12" font-style="italic" fill="#15803d">绝大多数业务的甜区</text>

    <rect x="800" y="450" width="320" height="220" rx="16" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="800" y="450" width="320" height="50" rx="16" fill="#fef3c7"/>
    <text x="960" y="482" text-anchor="middle" font-size="17" font-weight="900" fill="#9a3412">Goal-oriented 目标导向</text>
    <text x="820" y="525" font-size="13" font-weight="800" fill="#0f172a">行为</text>
    <text x="820" y="546" font-size="12" fill="#475569">只关心最终结果 · 步骤仅作提示</text>
    <text x="820" y="572" font-size="13" font-weight="800" fill="#0f172a">适合</text>
    <text x="820" y="593" font-size="12" fill="#475569">竞品调研 / 数据采集</text>
    <text x="820" y="611" font-size="12" fill="#475569">UI 频繁变动的开放网页</text>
    <text x="820" y="640" font-size="12" font-style="italic" fill="#9a3412">允许「换路达终点」</text>
  </g>
</svg>
