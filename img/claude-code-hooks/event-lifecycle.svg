<svg width="1200" height="660" viewBox="0 0 1200 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code Hook 事件生命周期</title>
  <desc id="desc">展示从会话开始、用户提交、工具执行到停止检查的 8 类 Hook 事件。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fbff"/><stop offset="1" stop-color="#fff7ed"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.55"/></pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#2563eb"/></marker>
    <style>
      .font{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}.title{font-size:30px;font-weight:800;fill:#0f172a}.sub{font-size:15px;fill:#475569}.card{fill:#fff;stroke:#e2e8f0;filter:url(#shadow)}.h{font-size:17px;font-weight:800;fill:#0f172a}.b{font-size:13px;fill:#475569}.tag{font-size:12px;font-weight:800;fill:#fff}.num{font-size:18px;font-weight:900;fill:#fff}
    </style>
  </defs>
  <rect width="1200" height="660" fill="url(#bg)"/><rect width="1200" height="660" fill="url(#grid)" opacity="0.7"/>
  <text x="60" y="58" class="font title">8 类 Hook 覆盖 Agent 工作流的关键节点</text>
  <text x="60" y="88" class="font sub">越靠前越适合阻断风险，越靠后越适合收尾、记录和完成度检查</text>

  <path d="M120 330 C250 180 390 180 520 330 S790 480 930 330 S1070 180 1120 300" fill="none" stroke="#93c5fd" stroke-width="18" stroke-linecap="round" opacity="0.35"/>
  <path d="M120 330 C250 180 390 180 520 330 S790 480 930 330 S1070 180 1120 300" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(70 155)">
    <rect width="245" height="112" rx="22" class="card"/>
    <circle cx="34" cy="34" r="20" fill="#2563eb"/><text x="28" y="41" class="font num">1</text>
    <text x="66" y="36" class="font h">SessionStart</text>
    <text x="66" y="62" class="font b">会话开始或恢复</text>
    <text x="22" y="92" class="font b">注入 git 状态、TODO、环境说明</text>
  </g>

  <g transform="translate(375 115)">
    <rect width="245" height="112" rx="22" class="card"/>
    <circle cx="34" cy="34" r="20" fill="#2563eb"/><text x="28" y="41" class="font num">2</text>
    <text x="66" y="36" class="font h">UserPromptSubmit</text>
    <text x="66" y="62" class="font b">用户提交后、模型处理前</text>
    <text x="22" y="92" class="font b">追加 Sprint 背景与最近错误</text>
  </g>

  <g transform="translate(680 150)">
    <rect width="245" height="112" rx="22" class="card"/>
    <circle cx="34" cy="34" r="20" fill="#f97316"/><text x="28" y="41" class="font num">3</text>
    <text x="66" y="36" class="font h">PreToolUse</text>
    <text x="66" y="62" class="font b">工具真正执行前</text>
    <text x="22" y="92" class="font b">拦截危险命令与敏感路径</text>
  </g>

  <g transform="translate(925 255)">
    <rect width="225" height="112" rx="22" class="card"/>
    <circle cx="34" cy="34" r="20" fill="#dc2626"/><text x="28" y="41" class="font num">4</text>
    <text x="66" y="36" class="font h">PermissionRequest</text>
    <text x="66" y="62" class="font b">权限弹窗出现前</text>
    <text x="22" y="92" class="font b">自动批准或拒绝</text>
  </g>

  <g transform="translate(690 405)">
    <rect width="245" height="112" rx="22" class="card"/>
    <circle cx="34" cy="34" r="20" fill="#16a34a"/><text x="28" y="41" class="font num">5</text>
    <text x="66" y="36" class="font h">PostToolUse</text>
    <text x="66" y="62" class="font b">工具成功执行后</text>
    <text x="22" y="92" class="font b">格式化、lint、记录变更</text>
  </g>

  <g transform="translate(390 430)">
    <rect width="245" height="112" rx="22" class="card"/>
    <circle cx="34" cy="34" r="20" fill="#7c3aed"/><text x="28" y="41" class="font num">6</text>
    <text x="66" y="36" class="font h">PreCompact</text>
    <text x="66" y="62" class="font b">上下文压缩前</text>
    <text x="22" y="92" class="font b">备份 transcript 与关键决策</text>
  </g>

  <g transform="translate(95 390)">
    <rect width="245" height="112" rx="22" class="card"/>
    <circle cx="34" cy="34" r="20" fill="#0f766e"/><text x="28" y="41" class="font num">7</text>
    <text x="66" y="36" class="font h">Stop</text>
    <text x="66" y="62" class="font b">Claude 准备停下时</text>
    <text x="22" y="92" class="font b">检查任务是否真的完成</text>
  </g>

  <g transform="translate(465 275)">
    <rect width="270" height="112" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="34" cy="34" r="20" fill="#64748b"/><text x="28" y="41" class="font num">8</text>
    <text x="66" y="36" class="font h">SubagentStop</text>
    <text x="66" y="62" class="font b">子代理任务完成时</text>
    <text x="22" y="92" class="font b">校验输出质量，决定是否接受</text>
  </g>

  <rect x="92" y="575" width="1016" height="48" rx="18" fill="#0f172a" opacity="0.92"/>
  <text x="125" y="606" class="font" font-size="17" font-weight="800" fill="#fff">设计直觉：前置 Hook 管风险，后置 Hook 做收尾，会话 Hook 管上下文，停止 Hook 管完成度。</text>
</svg>
