<svg width="1200" height="650" viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code Hooks 配置层级</title>
  <desc id="desc">展示企业策略、项目级配置、本地项目配置和用户级配置的作用范围与推荐用途。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eff6ff"/></linearGradient>
    <linearGradient id="team" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="local" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#fdba74"/></linearGradient>
    <linearGradient id="user" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#16a34a"/><stop offset="1" stop-color="#86efac"/></linearGradient>
    <linearGradient id="enterprise" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#c4b5fd"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.13"/></filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.5"/></pattern>
    <style>.font{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}.title{font-size:30px;font-weight:800;fill:#0f172a}.sub{font-size:15px;fill:#475569}.layer-title{font-size:20px;font-weight:900;fill:#fff}.path{font-size:16px;font-weight:800;fill:#0f172a}.body{font-size:14px;fill:#475569}.small{font-size:12px;fill:#64748b}.card{fill:#fff;stroke:#e2e8f0;filter:url(#shadow)}</style>
  </defs>
  <rect width="1200" height="650" fill="url(#bg)"/><rect width="1200" height="650" fill="url(#grid)" opacity="0.65"/>
  <text x="60" y="58" class="font title">Hooks 配置要分层：团队规则、个人偏好、本地实验不要混在一起</text>
  <text x="60" y="88" class="font sub">项目级设置优先于用户级设置；组织还可能通过企业策略施加更高层控制</text>

  <rect x="86" y="132" width="1028" height="76" rx="24" fill="url(#enterprise)" filter="url(#shadow)"/>
  <text x="122" y="178" class="font layer-title">企业托管策略</text>
  <text x="366" y="163" class="font" font-size="15" fill="#f5f3ff">组织级安全基线、合规要求、全局权限边界</text>
  <text x="366" y="188" class="font" font-size="13" fill="#ede9fe">适合强制控制，不适合承载项目细节</text>

  <g transform="translate(110 250)">
    <rect width="300" height="250" rx="28" class="card"/>
    <rect x="0" y="0" width="300" height="74" rx="28" fill="url(#team)"/>
    <text x="28" y="46" class="font layer-title">项目级</text>
    <text x="28" y="112" class="font path">.claude/settings.json</text>
    <text x="28" y="148" class="font body">进入版本控制</text>
    <text x="28" y="174" class="font body">团队共享规则</text>
    <text x="28" y="200" class="font body">安全护栏与固定自动化</text>
    <rect x="28" y="216" width="244" height="26" rx="13" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="48" y="234" class="font small">推荐：默认放团队必须一致的策略</text>
  </g>

  <g transform="translate(450 250)">
    <rect width="300" height="250" rx="28" class="card"/>
    <rect x="0" y="0" width="300" height="74" rx="28" fill="url(#local)"/>
    <text x="28" y="46" class="font layer-title">本地项目级</text>
    <text x="28" y="112" class="font path">.claude/settings.local.json</text>
    <text x="28" y="148" class="font body">通常不提交</text>
    <text x="28" y="174" class="font body">个人实验和机器相关路径</text>
    <text x="28" y="200" class="font body">临时 Hook 与灰度配置</text>
    <rect x="28" y="216" width="244" height="26" rx="13" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="48" y="234" class="font small">推荐：先试点，再迁移到项目级</text>
  </g>

  <g transform="translate(790 250)">
    <rect width="300" height="250" rx="28" class="card"/>
    <rect x="0" y="0" width="300" height="74" rx="28" fill="url(#user)"/>
    <text x="28" y="46" class="font layer-title">用户级</text>
    <text x="28" y="112" class="font path">~/.claude/settings.json</text>
    <text x="28" y="148" class="font body">跨项目生效</text>
    <text x="28" y="174" class="font body">个人通用效率工具</text>
    <text x="28" y="200" class="font body">全局日志、个人上下文</text>
    <rect x="28" y="216" width="244" height="26" rx="13" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="48" y="234" class="font small">推荐：不要放团队强制规则</text>
  </g>

  <rect x="110" y="540" width="980" height="56" rx="20" fill="#0f172a" opacity="0.92"/>
  <text x="140" y="575" class="font" font-size="17" font-weight="800" fill="#fff">判断标准：希望所有同事都执行的规则放项目级；只属于自己的偏好放用户级；本机实验放 local。</text>
</svg>
