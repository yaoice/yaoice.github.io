<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code Hooks 安全护栏</title>
  <desc id="desc">展示 Hook 安全设计中的输入校验、范围收窄、敏感文件保护、日志脱敏、自动批准控制和代码评审。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="0.55" stop-color="#f8fbff"/><stop offset="1" stop-color="#f0fdf4"/></linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#dc2626"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#16a34a"/><stop offset="1" stop-color="#86efac"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#7dd3fc"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#fdba74"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#0f172a" flood-opacity="0.13"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#2563eb"/></marker>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#fed7aa" stroke-width="1" opacity="0.35"/></pattern>
    <style>.font{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}.title{font-size:30px;font-weight:800;fill:#0f172a}.sub{font-size:15px;fill:#475569}.card{fill:#fff;stroke:#e2e8f0;filter:url(#shadow)}.h{font-size:18px;font-weight:900;fill:#0f172a}.b{font-size:13px;fill:#475569}.white{font-size:18px;font-weight:900;fill:#fff}.small{font-size:12px;fill:#64748b}</style>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/><rect width="1200" height="680" fill="url(#grid)" opacity="0.7"/>
  <text x="60" y="58" class="font title">Hooks 能执行本地命令，因此必须按安全控制面设计</text>
  <text x="60" y="88" class="font sub">好 Hook 的目标不是放大权限，而是把允许、拒绝、记录和人工确认变成明确策略</text>

  <circle cx="600" cy="345" r="120" fill="#fff" stroke="#bfdbfe" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="600" cy="345" r="82" fill="url(#blue)" opacity="0.95"/>
  <text x="535" y="336" class="font white">Hooks Runtime</text>
  <text x="548" y="365" class="font" font-size="14" fill="#eff6ff">stdin JSON</text>
  <text x="536" y="388" class="font" font-size="14" fill="#eff6ff">exit code / JSON</text>

  <g transform="translate(95 155)">
    <rect width="260" height="112" rx="22" class="card"/>
    <rect x="22" y="22" width="54" height="28" rx="14" fill="url(#blue)"/>
    <text x="38" y="42" class="font" font-size="12" font-weight="800" fill="#fff">输入</text>
    <text x="92" y="42" class="font h">校验 stdin</text>
    <text x="22" y="73" class="font b">只读取必要字段，拒绝 eval</text>
    <text x="22" y="94" class="font b">变量引用，路径白名单</text>
  </g>

  <g transform="translate(845 155)">
    <rect width="260" height="112" rx="22" class="card"/>
    <rect x="22" y="22" width="54" height="28" rx="14" fill="url(#red)"/>
    <text x="38" y="42" class="font" font-size="12" font-weight="800" fill="#fff">拒绝</text>
    <text x="92" y="42" class="font h">敏感文件保护</text>
    <text x="22" y="73" class="font b">.env / secrets / pem / production</text>
    <text x="22" y="94" class="font b">阻断时使用 exit 2</text>
  </g>

  <g transform="translate(95 405)">
    <rect width="260" height="112" rx="22" class="card"/>
    <rect x="22" y="22" width="54" height="28" rx="14" fill="url(#green)"/>
    <text x="38" y="42" class="font" font-size="12" font-weight="800" fill="#fff">批准</text>
    <text x="92" y="42" class="font h">自动批准保守</text>
    <text x="22" y="73" class="font b">只读、测试、明确 lint/format</text>
    <text x="22" y="94" class="font b">中间地带继续人工确认</text>
  </g>

  <g transform="translate(845 405)">
    <rect width="260" height="112" rx="22" class="card"/>
    <rect x="22" y="22" width="54" height="28" rx="14" fill="url(#orange)"/>
    <text x="38" y="42" class="font" font-size="12" font-weight="800" fill="#fff">审计</text>
    <text x="92" y="42" class="font h">日志脱敏</text>
    <text x="22" y="73" class="font b">记录事件、工具、决策、退出码</text>
    <text x="22" y="94" class="font b">不要记录完整 content 与 secrets</text>
  </g>

  <g transform="translate(470 525)">
    <rect width="260" height="90" rx="22" class="card"/>
    <text x="31" y="38" class="font h">团队代码评审</text>
    <text x="31" y="65" class="font b">settings 与 hooks 脚本进入 Review</text>
  </g>

  <path d="M355 211 C430 230 485 270 520 310" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M845 211 C770 230 715 270 680 310" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M355 461 C430 445 485 410 520 380" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M845 461 C770 445 715 410 680 380" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M600 465 V525" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="78" y="610" width="1044" height="42" rx="16" fill="#0f172a" opacity="0.92"/>
  <text x="112" y="637" class="font" font-size="16" font-weight="800" fill="#fff">安全口诀：收窄 matcher、校验输入、白名单批准、敏感路径拒绝、日志只记摘要、团队必须评审。</text>
</svg>
