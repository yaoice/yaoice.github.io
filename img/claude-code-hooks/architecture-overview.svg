<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code Hooks 架构总览</title>
  <desc id="desc">展示用户、Claude Code、Hook Dispatcher、配置文件、本地脚本与控制结果之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#fecaca"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1e293b" flood-opacity="0.13"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.55"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .font{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .title{font-size:30px;font-weight:800;fill:#0f172a}
      .subtitle{font-size:15px;fill:#475569}
      .card-title{font-size:18px;font-weight:800;fill:#0f172a}
      .body{font-size:14px;fill:#475569}
      .small{font-size:12px;fill:#64748b}
      .label{font-size:13px;font-weight:700;fill:#fff}
      .card{fill:#fff;stroke:#e2e8f0;stroke-width:1.2;filter:url(#shadow)}
      .pill{fill:#f8fafc;stroke:#dbeafe;stroke-width:1}
    </style>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <rect width="1200" height="680" fill="url(#grid)" opacity="0.6"/>

  <text x="60" y="58" class="font title">Hooks 是 Claude Code 工作流的控制面</text>
  <text x="60" y="88" class="font subtitle">在工具执行、权限确认、会话启动和停止检查等关键节点插入确定性规则</text>

  <rect x="60" y="145" width="180" height="120" rx="24" class="card"/>
  <circle cx="112" cy="194" r="28" fill="url(#blue)"/>
  <text x="152" y="190" class="font card-title">用户</text>
  <text x="152" y="216" class="font body">提交任务</text>
  <text x="88" y="247" class="font small">Prompt / 约束 / 反馈</text>

  <rect x="330" y="125" width="240" height="160" rx="28" class="card"/>
  <rect x="360" y="155" width="180" height="42" rx="15" fill="url(#blue)"/>
  <text x="386" y="181" class="font label">Claude Code</text>
  <text x="360" y="224" class="font body">模型推理：决定下一步</text>
  <text x="360" y="249" class="font body">工具执行：Read / Write / Bash</text>

  <rect x="690" y="115" width="260" height="180" rx="30" class="card"/>
  <rect x="720" y="145" width="200" height="44" rx="16" fill="url(#orange)"/>
  <text x="758" y="173" class="font label">Hook Dispatcher</text>
  <text x="720" y="218" class="font body">匹配事件与 matcher</text>
  <text x="720" y="243" class="font body">并行运行命令或 prompt</text>
  <text x="720" y="268" class="font body">收集 exit code / JSON 决策</text>

  <rect x="970" y="130" width="170" height="62" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="996" y="158" class="font card-title" font-size="15">settings JSON</text>
  <text x="996" y="178" class="font small">.claude / ~/.claude</text>
  <rect x="970" y="218" width="170" height="62" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="996" y="246" class="font card-title" font-size="15">本地 Hook 脚本</text>
  <text x="996" y="266" class="font small">shell / prompt</text>

  <rect x="160" y="405" width="190" height="110" rx="22" class="card"/>
  <rect x="184" y="430" width="78" height="28" rx="14" fill="url(#green)"/>
  <text x="201" y="449" class="font label" font-size="12">通过</text>
  <text x="184" y="484" class="font body">允许工具继续执行</text>

  <rect x="405" y="405" width="190" height="110" rx="22" class="card"/>
  <rect x="429" y="430" width="78" height="28" rx="14" fill="url(#red)"/>
  <text x="446" y="449" class="font label" font-size="12">阻止</text>
  <text x="429" y="484" class="font body">exit 2 / deny 决策</text>

  <rect x="650" y="405" width="190" height="110" rx="22" class="card"/>
  <rect x="674" y="430" width="92" height="28" rx="14" fill="url(#blue)"/>
  <text x="691" y="449" class="font label" font-size="12">注入上下文</text>
  <text x="674" y="484" class="font body">stdout 进入 Claude 上下文</text>

  <rect x="895" y="405" width="190" height="110" rx="22" class="card"/>
  <rect x="919" y="430" width="78" height="28" rx="14" fill="url(#orange)"/>
  <text x="936" y="449" class="font label" font-size="12">记录</text>
  <text x="919" y="484" class="font body">审计日志 / transcript</text>

  <path d="M240 205 C270 205 295 205 330 205" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M570 205 C615 205 645 205 690 205" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M950 160 C965 160 960 160 970 160" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M950 250 C965 250 960 250 970 250" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M815 295 C815 345 255 345 255 405" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)" opacity="0.85"/>
  <path d="M815 295 C815 350 500 350 500 405" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)" opacity="0.85"/>
  <path d="M815 295 C815 350 745 350 745 405" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)" opacity="0.85"/>
  <path d="M815 295 C815 350 990 350 990 405" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)" opacity="0.85"/>

  <rect x="70" y="575" width="1060" height="58" rx="20" fill="#0f172a" opacity="0.92"/>
  <text x="100" y="611" class="font" font-size="18" font-weight="800" fill="#fff">核心原则：把确定性规则交给 Hooks，把创造性判断留给 Claude，把最终责任留给工程流程。</text>
</svg>
