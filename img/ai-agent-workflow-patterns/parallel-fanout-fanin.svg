<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">并行工作流 fan-out/fan-in 机制</title>
  <desc id="desc">展示输入任务被分发到多个并行 Agent，再由聚合器合并结果的过程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <linearGradient id="orange" x1="0" x2="1"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient>
    <linearGradient id="blue" x1="0" x2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#7c2d12" flood-opacity="0.14"/></filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0 L0 0 0 28" fill="none" stroke="#fed7aa" stroke-width="0.7" opacity="0.45"/></pattern>
    <marker id="arrowO" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#f97316"/></marker>
    <marker id="arrowB" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
    <style>
      .title{font:700 30px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.sub{font:500 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}.card-title{font:700 19px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.txt{font:500 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}.small{font:600 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#9a3412}.out{stroke:#f97316;stroke-width:2.6;fill:none;marker-end:url(#arrowO)}.in{stroke:#2563eb;stroke-width:2.6;fill:none;marker-end:url(#arrowB)}
    </style>
  </defs>
  <rect width="1200" height="650" fill="url(#bg)"/>
  <rect width="1200" height="650" fill="url(#grid)"/>
  <text x="60" y="58" class="title">并行工作流：fan-out 分发，fan-in 聚合</text>
  <text x="60" y="88" class="sub">适合相互独立的子任务；真正的工程难点在聚合、冲突处理和限流。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="255" rx="26" width="190" height="120" fill="white" stroke="#fed7aa"/>
    <rect x="98" y="280" rx="16" width="134" height="30" fill="url(#orange)"/>
    <text x="123" y="301" style="font:700 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:white">原始任务</text>
    <text x="104" y="342" class="txt">同一输入或可分片输入</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="150" rx="24" width="210" height="90" fill="white" stroke="#fed7aa"/>
    <text x="462" y="187" class="card-title">安全审查 Agent</text>
    <text x="462" y="214" class="txt">漏洞、权限、注入风险</text>
    <rect x="430" y="280" rx="24" width="210" height="90" fill="white" stroke="#fed7aa"/>
    <text x="462" y="317" class="card-title">性能审查 Agent</text>
    <text x="462" y="344" class="txt">复杂度、缓存、瓶颈</text>
    <rect x="430" y="410" rx="24" width="210" height="90" fill="white" stroke="#fed7aa"/>
    <text x="462" y="447" class="card-title">可维护性 Agent</text>
    <text x="462" y="474" class="txt">命名、结构、测试可读性</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="830" y="255" rx="28" width="230" height="120" fill="white" stroke="#bfdbfe"/>
    <rect x="858" y="280" rx="16" width="138" height="30" fill="url(#blue)"/>
    <text x="887" y="301" style="font:700 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:white">聚合器</text>
    <text x="862" y="342" class="txt">去重、排序、投票、阻断</text>
  </g>

  <path class="out" d="M260 315 C330 315 340 195 425 195"/>
  <path class="out" d="M260 315 C330 315 350 325 425 325"/>
  <path class="out" d="M260 315 C330 315 340 455 425 455"/>
  <path class="in" d="M640 195 C720 195 745 285 825 305"/>
  <path class="in" d="M640 325 C715 325 745 325 825 325"/>
  <path class="in" d="M640 455 C720 455 745 365 825 345"/>

  <g transform="translate(115 520)">
    <rect x="0" y="0" rx="18" width="970" height="80" fill="#0f172a" opacity="0.93"/>
    <text x="30" y="32" style="font:700 17px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#fff7ed">设计重点</text>
    <text x="30" y="58" style="font:500 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#fed7aa">并发调用只解决速度问题；多数投票、专家优先、置信度加权和高风险阻断规则，决定最终结果是否可靠。</text>
  </g>
</svg>
