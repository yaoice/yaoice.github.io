<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent 工作流选型总览</title>
  <desc id="desc">从单 Agent baseline 到顺序、并行和评估器优化器工作流的决策路径。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#eef6ff"/><stop offset="0.55" stop-color="#f7fbff"/><stop offset="1" stop-color="#fff7ed"/></linearGradient>
    <linearGradient id="blue" x1="0" x2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <linearGradient id="green" x1="0" x2="1"><stop offset="0" stop-color="#059669"/><stop offset="1" stop-color="#34d399"/></linearGradient>
    <linearGradient id="orange" x1="0" x2="1"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="purple" x1="0" x2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1e293b" flood-opacity="0.15"/></filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M 28 0 L 0 0 0 28" fill="none" stroke="#cbd5e1" stroke-width="0.6" opacity="0.38"/></pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <style>
      .title{font:700 30px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.sub{font:500 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}.card-title{font:700 20px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.txt{font:500 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#334155}.small{font:500 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#64748b}.label{font:700 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:white}.line{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="660" fill="url(#bg)"/>
  <rect width="1200" height="660" fill="url(#grid)" opacity="0.55"/>
  <text x="60" y="58" class="title">从最小可行 Agent 开始，用失败模式选择工作流</text>
  <text x="60" y="88" class="sub">工作流不是默认选项：只有当依赖、延迟或质量问题可被验证时，才引入结构化编排。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="180" rx="28" ry="28" width="250" height="140" fill="white" stroke="#dbeafe"/>
    <rect x="94" y="204" rx="16" width="96" height="30" fill="url(#blue)"/>
    <text x="112" y="225" class="label">Baseline</text>
    <text x="95" y="263" class="card-title">单 Agent 调用</text>
    <text x="95" y="291" class="txt">先验证任务能否一次完成</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="475" y="126" rx="26" width="270" height="120" fill="white" stroke="#dcfce7"/>
    <rect x="499" y="150" rx="15" width="92" height="28" fill="url(#green)"/>
    <text x="520" y="170" class="label">Enough</text>
    <text x="500" y="205" class="card-title">已满足质量目标</text>
    <text x="500" y="230" class="txt">停止，不要引入工作流</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="475" y="300" rx="26" width="270" height="150" fill="white" stroke="#dbeafe"/>
    <rect x="499" y="324" rx="15" width="106" height="28" fill="url(#blue)"/>
    <text x="519" y="344" class="label">Depends</text>
    <text x="500" y="378" class="card-title">有强依赖链</text>
    <text x="500" y="405" class="txt">前一步输出决定后一步输入</text>
    <text x="500" y="431" class="small">选择：顺序工作流</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="835" y="170" rx="26" width="270" height="150" fill="white" stroke="#ffedd5"/>
    <rect x="859" y="194" rx="15" width="118" height="28" fill="url(#orange)"/>
    <text x="878" y="214" class="label">Latency</text>
    <text x="860" y="248" class="card-title">子任务独立且慢</text>
    <text x="860" y="275" class="txt">并发执行后再聚合结果</text>
    <text x="860" y="301" class="small">选择：并行工作流</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="835" y="390" rx="26" width="270" height="150" fill="white" stroke="#ede9fe"/>
    <rect x="859" y="414" rx="15" width="112" height="28" fill="url(#purple)"/>
    <text x="878" y="434" class="label">Quality</text>
    <text x="860" y="468" class="card-title">初稿可迭代改进</text>
    <text x="860" y="495" class="txt">有明确质量标准和停止条件</text>
    <text x="860" y="521" class="small">选择：评估器-优化器</text>
  </g>

  <path class="line" d="M320 250 C380 250 410 185 470 185"/>
  <text x="360" y="210" class="small">足够好</text>
  <path class="line" d="M320 265 C390 280 410 360 470 372"/>
  <text x="350" y="335" class="small">有稳定失败点</text>
  <path class="line" d="M745 370 C790 350 795 260 832 248"/>
  <text x="760" y="306" class="small">独立任务</text>
  <path class="line" d="M745 397 C790 420 795 465 832 465"/>
  <text x="760" y="450" class="small">质量闭环</text>

  <g transform="translate(90 480)">
    <rect x="0" y="0" rx="20" width="645" height="100" fill="#0f172a" opacity="0.92"/>
    <text x="28" y="36" style="font:700 18px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#f8fafc">工程原则</text>
    <text x="28" y="66" style="font:500 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#cbd5e1">不要从模式出发设计系统；先度量 baseline，再根据依赖、延迟、质量三类失败模式演进。</text>
  </g>
</svg>
