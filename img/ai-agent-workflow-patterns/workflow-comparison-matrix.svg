<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent 工作流模式对比矩阵</title>
  <desc id="desc">从目标、适用结构、代价和主要风险对比单 Agent、顺序工作流、并行工作流和评估器优化器。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="0.5" stop-color="#eef6ff"/><stop offset="1" stop-color="#fff7ed"/></linearGradient>
    <linearGradient id="blue" x1="0" x2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <linearGradient id="orange" x1="0" x2="1"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="purple" x1="0" x2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
    <linearGradient id="green" x1="0" x2="1"><stop offset="0" stop-color="#059669"/><stop offset="1" stop-color="#34d399"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1e293b" flood-opacity="0.14"/></filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0 L0 0 0 28" fill="none" stroke="#cbd5e1" stroke-width="0.6" opacity="0.38"/></pattern>
    <style>
      .title{font:700 30px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.sub{font:500 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}.head{font:800 18px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:white}.label{font:700 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.txt{font:500 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}.risk{font:700 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#b91c1c}
    </style>
  </defs>
  <rect width="1200" height="660" fill="url(#bg)"/>
  <rect width="1200" height="660" fill="url(#grid)"/>
  <text x="60" y="58" class="title">工作流模式对比：不要默认复杂化</text>
  <text x="60" y="88" class="sub">选择标准应来自任务结构和失败模式，而不是来自对“多 Agent 架构”的偏好。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="140" rx="24" width="250" height="405" fill="white" stroke="#bbf7d0"/>
    <rect x="70" y="140" rx="24" width="250" height="68" fill="url(#green)"/>
    <text x="105" y="183" class="head">单 Agent</text>
    <text x="100" y="250" class="label">目标</text><text x="100" y="276" class="txt">最小复杂度</text>
    <text x="100" y="318" class="label">适用</text><text x="100" y="344" class="txt">简单任务、baseline</text>
    <text x="100" y="386" class="label">代价</text><text x="100" y="412" class="txt">最低延迟与成本</text>
    <text x="100" y="454" class="label">风险</text><text x="100" y="480" class="risk">复杂任务输出不稳定</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="350" y="140" rx="24" width="250" height="405" fill="white" stroke="#bfdbfe"/>
    <rect x="350" y="140" rx="24" width="250" height="68" fill="url(#blue)"/>
    <text x="385" y="183" class="head">顺序工作流</text>
    <text x="380" y="250" class="label">目标</text><text x="380" y="276" class="txt">处理阶段依赖</text>
    <text x="380" y="318" class="label">适用</text><text x="380" y="344" class="txt">A 输出驱动 B 输入</text>
    <text x="380" y="386" class="label">代价</text><text x="380" y="412" class="txt">延迟随步骤累加</text>
    <text x="380" y="454" class="label">风险</text><text x="380" y="480" class="risk">过度拆分、状态膨胀</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="630" y="140" rx="24" width="250" height="405" fill="white" stroke="#fed7aa"/>
    <rect x="630" y="140" rx="24" width="250" height="68" fill="url(#orange)"/>
    <text x="665" y="183" class="head">并行工作流</text>
    <text x="660" y="250" class="label">目标</text><text x="660" y="276" class="txt">降低墙钟延迟</text>
    <text x="660" y="318" class="label">适用</text><text x="660" y="344" class="txt">独立子任务、多视角</text>
    <text x="660" y="386" class="label">代价</text><text x="660" y="412" class="txt">并发调用和聚合成本</text>
    <text x="660" y="454" class="label">风险</text><text x="660" y="480" class="risk">冲突输出、聚合困难</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="910" y="140" rx="24" width="250" height="405" fill="white" stroke="#ddd6fe"/>
    <rect x="910" y="140" rx="24" width="250" height="68" fill="url(#purple)"/>
    <text x="936" y="183" class="head">评估器-优化器</text>
    <text x="940" y="250" class="label">目标</text><text x="940" y="276" class="txt">迭代提升质量</text>
    <text x="940" y="318" class="label">适用</text><text x="940" y="344" class="txt">标准清晰、高质量输出</text>
    <text x="940" y="386" class="label">代价</text><text x="940" y="412" class="txt">多轮 Token 和时间</text>
    <text x="940" y="454" class="label">风险</text><text x="940" y="480" class="risk">无限打磨、收益递减</text>
  </g>

  <g transform="translate(70 580)">
    <rect x="0" y="0" rx="18" width="1090" height="52" fill="#0f172a" opacity="0.93"/>
    <text x="28" y="33" style="font:700 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#f8fafc">选型顺序：</text>
    <text x="112" y="33" style="font:500 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#cbd5e1">单 Agent 足够好就停止；有依赖选顺序；独立且慢选并行；质量可评估且需改进选评估器-优化器。</text>
  </g>
</svg>
