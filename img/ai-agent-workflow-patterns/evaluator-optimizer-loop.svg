<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">评估器-优化器工作流闭环</title>
  <desc id="desc">展示生成器产生候选结果、评估器检查并反馈、优化器迭代直到达到停止条件的机制。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f5f3ff"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <linearGradient id="purple" x1="0" x2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
    <linearGradient id="green" x1="0" x2="1"><stop offset="0" stop-color="#059669"/><stop offset="1" stop-color="#34d399"/></linearGradient>
    <linearGradient id="red" x1="0" x2="1"><stop offset="0" stop-color="#dc2626"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#4c1d95" flood-opacity="0.16"/></filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0 L0 0 0 28" fill="none" stroke="#ddd6fe" stroke-width="0.7" opacity="0.55"/></pattern>
    <marker id="arrowP" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/></marker>
    <marker id="arrowG" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#059669"/></marker>
    <style>
      .title{font:700 30px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.sub{font:500 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}.card-title{font:700 20px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.txt{font:500 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}.small{font:600 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#6d28d9}.loop{stroke:#7c3aed;stroke-width:3;fill:none;marker-end:url(#arrowP)}.done{stroke:#059669;stroke-width:3;fill:none;marker-end:url(#arrowG)}
    </style>
  </defs>
  <rect width="1200" height="650" fill="url(#bg)"/>
  <rect width="1200" height="650" fill="url(#grid)"/>
  <text x="60" y="58" class="title">评估器-优化器：把生成与质检拆成有预算的闭环</text>
  <text x="60" y="88" class="sub">适合初稿可改进、评估标准清晰的高质量输出任务；必须设置停止条件。</text>

  <g filter="url(#shadow)">
    <rect x="110" y="250" rx="28" width="235" height="130" fill="white" stroke="#ddd6fe"/>
    <rect x="138" y="275" rx="16" width="118" height="30" fill="url(#purple)"/>
    <text x="166" y="296" style="font:700 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:white">Optimizer</text>
    <text x="140" y="337" class="card-title">生成候选结果</text>
    <text x="140" y="364" class="txt">代码、文档、SQL、回复</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="480" y="250" rx="28" width="235" height="130" fill="white" stroke="#ddd6fe"/>
    <rect x="508" y="275" rx="16" width="112" height="30" fill="url(#purple)"/>
    <text x="535" y="296" style="font:700 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:white">Evaluator</text>
    <text x="510" y="337" class="card-title">根据标准评估</text>
    <text x="510" y="364" class="txt">评分、缺陷、可执行反馈</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="835" y="210" rx="28" width="250" height="210" fill="white" stroke="#bbf7d0"/>
    <rect x="863" y="235" rx="16" width="112" height="30" fill="url(#green)"/>
    <text x="891" y="256" style="font:700 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:white">Stop</text>
    <text x="865" y="298" class="card-title">停止条件</text>
    <text x="865" y="328" class="txt">评分 ≥ 阈值</text>
    <text x="865" y="354" class="txt">阻断问题清零</text>
    <text x="865" y="380" class="txt">达到最大迭代次数</text>
    <text x="865" y="406" class="txt">收益低于增益阈值</text>
  </g>

  <path class="loop" d="M345 315 L475 315"/>
  <text x="377" y="295" class="small">候选结果</text>
  <path class="done" d="M715 300 C760 278 790 275 830 275"/>
  <text x="742" y="255" class="small" fill="#059669">达标</text>
  <path class="loop" d="M600 380 C590 495 250 500 230 385"/>
  <text x="360" y="480" class="small">未达标：反馈回写给生成器</text>

  <g transform="translate(110 500)">
    <rect x="0" y="0" rx="18" width="975" height="86" fill="#0f172a" opacity="0.93"/>
    <text x="30" y="35" style="font:700 17px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#faf5ff">设计重点</text>
    <text x="30" y="62" style="font:500 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#ddd6fe">生成器负责产出，评估器负责应用标准；循环必须受质量阈值、最大轮次、时间和成本预算约束。</text>
  </g>
</svg>
