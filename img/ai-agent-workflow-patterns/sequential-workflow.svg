<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">顺序工作流运行机制</title>
  <desc id="desc">展示 AI Agent 顺序工作流中多个阶段按依赖链依次执行并产生检查点。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <linearGradient id="stage" x1="0" x2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#60a5fa"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1e3a8a" flood-opacity="0.15"/></filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0 L0 0 0 30" fill="none" stroke="#bfdbfe" stroke-width="0.7" opacity="0.5"/></pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
    <style>
      .title{font:700 30px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.sub{font:500 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}.card-title{font:700 19px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.txt{font:500 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}.num{font:800 18px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:white}.line{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arrow)}.pill{font:700 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#1d4ed8}
    </style>
  </defs>
  <rect width="1200" height="650" fill="url(#bg)"/>
  <rect width="1200" height="650" fill="url(#grid)"/>
  <text x="60" y="58" class="title">顺序工作流：把复杂任务拆成可验证的依赖链</text>
  <text x="60" y="88" class="sub">每个阶段接收上一步结构化输出，形成可观测、可回放、可替换的线性管线。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="210" rx="24" width="170" height="150" fill="white" stroke="#dbeafe"/>
    <circle cx="105" cy="245" r="21" fill="url(#stage)"/><text x="99" y="252" class="num">1</text>
    <text x="95" y="288" class="card-title">输入理解</text>
    <text x="95" y="316" class="txt">解析用户目标</text>
    <text x="95" y="340" class="txt">确定任务边界</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="305" y="210" rx="24" width="170" height="150" fill="white" stroke="#dbeafe"/>
    <circle cx="340" cy="245" r="21" fill="url(#stage)"/><text x="334" y="252" class="num">2</text>
    <text x="330" y="288" class="card-title">信息抽取</text>
    <text x="330" y="316" class="txt">调用工具</text>
    <text x="330" y="340" class="txt">生成中间结果</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="540" y="210" rx="24" width="170" height="150" fill="white" stroke="#dbeafe"/>
    <circle cx="575" cy="245" r="21" fill="url(#stage)"/><text x="569" y="252" class="num">3</text>
    <text x="565" y="288" class="card-title">结构校验</text>
    <text x="565" y="316" class="txt">Schema 检查</text>
    <text x="565" y="340" class="txt">失败则重试</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="775" y="210" rx="24" width="170" height="150" fill="white" stroke="#dbeafe"/>
    <circle cx="810" cy="245" r="21" fill="url(#stage)"/><text x="804" y="252" class="num">4</text>
    <text x="800" y="288" class="card-title">业务处理</text>
    <text x="800" y="316" class="txt">写入系统</text>
    <text x="800" y="340" class="txt">触发后续动作</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1010" y="210" rx="24" width="130" height="150" fill="#0f172a"/>
    <text x="1032" y="284" style="font:700 20px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#f8fafc">最终输出</text>
    <text x="1032" y="316" style="font:500 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#cbd5e1">可审计结果</text>
  </g>

  <path class="line" d="M240 285 L300 285"/><path class="line" d="M475 285 L535 285"/><path class="line" d="M710 285 L770 285"/><path class="line" d="M945 285 L1005 285"/>

  <g transform="translate(105 430)">
    <rect x="0" y="0" rx="18" width="990" height="110" fill="white" stroke="#bfdbfe"/>
    <text x="28" y="38" class="card-title">适用条件</text>
    <text x="28" y="70" class="txt">A 的输出是 B 的输入；阶段边界清晰；需要中间检查点、重试、回放和单步调试。</text>
    <text x="650" y="38" class="card-title">主要代价</text>
    <text x="650" y="70" class="txt">端到端延迟随步骤数累加，过度拆分会增加状态管理复杂度。</text>
  </g>
</svg>
