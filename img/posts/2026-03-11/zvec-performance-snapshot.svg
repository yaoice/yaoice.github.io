<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101B"/>
      <stop offset="1" stop-color="#121B34"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#D946EF"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10B981"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <text x="100" y="112" fill="#F6FAFF" font-size="54" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Zvec 性能快照</text>
  <text x="100" y="160" fill="#9DB2CF" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">官方首页与 benchmarks 文档传达的核心信息：轻部署不意味着低性能</text>

  <rect x="90" y="240" width="420" height="260" rx="30" fill="url(#card1)" opacity="0.18" stroke="#3BA5FF" filter="url(#shadow)"/>
  <text x="130" y="318" fill="#DFF6FF" font-size="24" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">官方首页快照</text>
  <text x="130" y="398" fill="#FFFFFF" font-size="70" font-weight="900" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">10M</text>
  <text x="130" y="446" fill="#D8EFFF" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Cohere 数据集规模</text>

  <rect x="590" y="240" width="420" height="260" rx="30" fill="url(#card2)" opacity="0.18" stroke="#B984FF" filter="url(#shadow)"/>
  <text x="630" y="318" fill="#F0E6FF" font-size="24" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">官方首页快照</text>
  <text x="630" y="398" fill="#FFFFFF" font-size="70" font-weight="900" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">~1h</text>
  <text x="630" y="446" fill="#E8DBFF" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">索引构建时间</text>

  <rect x="1090" y="240" width="420" height="260" rx="30" fill="url(#card3)" opacity="0.18" stroke="#37D39B" filter="url(#shadow)"/>
  <text x="1130" y="318" fill="#E2FFF0" font-size="24" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">官方首页快照</text>
  <text x="1130" y="398" fill="#FFFFFF" font-size="70" font-weight="900" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">8500+</text>
  <text x="1130" y="446" fill="#D8FFE8" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">查询吞吐 QPS</text>

  <rect x="90" y="590" width="1420" height="210" rx="30" fill="#0E1730" stroke="#29456D" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="654" fill="#F4F8FF" font-size="28" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Benchmarks 文档中的复现条件（当前公开信息）</text>
  <text x="130" y="706" fill="#B8CAE4" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- 基于 Zvec v0.1.1，Ubuntu 24.04，16 vCPU / 64 GiB RAM</text>
  <text x="130" y="744" fill="#B8CAE4" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- 数据集：Cohere 1M / 10M，向量维度 768，基准工具为 VectorDBBench</text>
  <text x="130" y="782" fill="#B8CAE4" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- 关键指标：QPS、Recall、Index Build Time；公开了 int8、m、ef-search 等调优参数</text>
</svg>
