<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09121D"/>
      <stop offset="1" stop-color="#111B31"/>
    </linearGradient>
    <linearGradient id="dense" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00F0FF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="sparse" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="filter" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="920" rx="36" fill="url(#bg)"/>
  <text x="100" y="112" fill="#F3F8FF" font-size="54" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Dense + Sparse + Filter：Zvec 的混合检索思路</text>
  <text x="100" y="160" fill="#9CB0CB" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">同时利用语义理解、关键词精确匹配与结构化过滤，让召回更贴近真实业务条件</text>

  <rect x="110" y="240" width="360" height="300" rx="28" fill="#0E2238" stroke="url(#dense)" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="308" fill="#C8F8FF" font-size="36" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Dense Vector</text>
  <text x="150" y="356" fill="#E7F4FF" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">语义相似、上下文理解</text>
  <text x="150" y="414" fill="#A8C8E6" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- 适合同义表达、意图召回</text>
  <text x="150" y="452" fill="#A8C8E6" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- 文本、图像、代码 embedding</text>
  <text x="150" y="490" fill="#A8C8E6" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- “意思相近”也能找出来</text>

  <rect x="620" y="240" width="360" height="300" rx="28" fill="#1A1735" stroke="url(#sparse)" stroke-width="2" filter="url(#shadow)"/>
  <text x="660" y="308" fill="#E6D8FF" font-size="36" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Sparse Vector</text>
  <text x="660" y="356" fill="#F7EEFF" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">关键词、术语、词频信号</text>
  <text x="660" y="414" fill="#D7C5FF" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- 可解释性更强</text>
  <text x="660" y="452" fill="#D7C5FF" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- 专有名词与精确匹配更稳</text>
  <text x="660" y="490" fill="#D7C5FF" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- 补足纯语义搜索的不足</text>

  <rect x="1130" y="240" width="360" height="300" rx="28" fill="#102B23" stroke="url(#filter)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1170" y="308" fill="#D9FFE9" font-size="36" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Filter</text>
  <text x="1170" y="356" fill="#EBFFF3" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">业务条件直接进入检索</text>
  <text x="1170" y="414" fill="#B6F1CB" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- 时间、租户、类目、状态</text>
  <text x="1170" y="452" fill="#B6F1CB" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- 减少“先召回再过滤”开销</text>
  <text x="1170" y="490" fill="#B6F1CB" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- 更贴近真实业务语义</text>

  <path d="M290 580C290 640 430 650 800 650C1170 650 1310 640 1310 580" stroke="#4D6B95" stroke-width="4" stroke-dasharray="10 10"/>
  <path d="M800 540V650" stroke="#7BA7FF" stroke-width="6" stroke-linecap="round"/>

  <rect x="420" y="690" width="760" height="150" rx="32" fill="#0E1730" stroke="#2F4E81" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="750" text-anchor="middle" fill="#FFFFFF" font-size="38" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Hybrid Retrieval in Zvec</text>
  <text x="800" y="796" text-anchor="middle" fill="#C4D8F5" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">语义理解 + 字面匹配 + 结构化约束</text>
  <text x="800" y="832" text-anchor="middle" fill="#9DB5D8" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">结果通常更精准，也更容易直接服务于 RAG、内容检索和推荐业务</text>
</svg>
