<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.5" stop-color="#0B1730"/>
      <stop offset="1" stop-color="#101A3D"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#3A8BFF"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#9B7CFF"/>
      <stop offset="1" stop-color="#FF4FD8"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#02101F" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <circle cx="1320" cy="170" r="180" fill="#00E5FF" opacity="0.08"/>
  <circle cx="260" cy="760" r="220" fill="#A855F7" opacity="0.08"/>

  <text x="100" y="120" fill="#EAF4FF" font-size="54" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Zvec：为什么它适合现代 AI 检索应用</text>
  <text x="100" y="168" fill="#8EA6C9" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">轻量级、极速、进程内，把向量数据库从“外部服务”变成“应用内能力”</text>

  <rect x="90" y="230" width="360" height="460" rx="28" fill="#0F203E" stroke="#284C7B" filter="url(#shadow)"/>
  <text x="130" y="292" fill="#9CC8FF" font-size="22" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">传统痛点</text>
  <text x="130" y="352" fill="#F7FBFF" font-size="30" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">关键词检索</text>
  <text x="130" y="392" fill="#AFC3DE" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">精确，但不够理解语义</text>
  <text x="130" y="470" fill="#F7FBFF" font-size="30" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">服务化向量库</text>
  <text x="130" y="510" fill="#AFC3DE" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">强大，但部署与运维成本高</text>
  <text x="130" y="590" fill="#F7FBFF" font-size="30" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">应用侧诉求</text>
  <text x="130" y="630" fill="#AFC3DE" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">想要语义能力，也想要更低接入门槛</text>

  <rect x="560" y="220" width="480" height="500" rx="36" fill="#0E1733" stroke="url(#cyan)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="610" y="280" width="380" height="110" rx="24" fill="url(#cyan)" opacity="0.18"/>
  <text x="800" y="347" text-anchor="middle" fill="#FFFFFF" font-size="62" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Zvec</text>
  <text x="800" y="392" text-anchor="middle" fill="#C7E7FF" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">In-Process Vector Database</text>

  <rect x="620" y="440" width="350" height="58" rx="16" fill="#142449"/>
  <text x="795" y="478" text-anchor="middle" fill="#E8F6FF" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">进程内运行，无需独立服务</text>
  <rect x="620" y="516" width="350" height="58" rx="16" fill="#142449"/>
  <text x="795" y="554" text-anchor="middle" fill="#E8F6FF" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Dense / Sparse / 多向量查询</text>
  <rect x="620" y="592" width="350" height="58" rx="16" fill="#142449"/>
  <text x="795" y="630" text-anchor="middle" fill="#E8F6FF" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">过滤搜索 + 本地持久化</text>

  <rect x="1160" y="230" width="350" height="460" rx="28" fill="#161533" stroke="#4E4A8D" filter="url(#shadow)"/>
  <text x="1200" y="292" fill="#D3B7FF" font-size="22" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">能力来源</text>
  <rect x="1200" y="338" width="270" height="110" rx="24" fill="url(#purple)" opacity="0.18"/>
  <text x="1335" y="400" text-anchor="middle" fill="#FFFFFF" font-size="42" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Proxima</text>
  <text x="1335" y="438" text-anchor="middle" fill="#D8D7FF" font-size="21" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">阿里成熟向量搜索引擎</text>
  <text x="1200" y="522" fill="#F7FBFF" font-size="28" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">更适合的场景</text>
  <text x="1200" y="566" fill="#AFC3DE" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- RAG 与知识检索</text>
  <text x="1200" y="604" fill="#AFC3DE" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- 图像 / 代码搜索</text>
  <text x="1200" y="642" fill="#AFC3DE" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">- 本地工具与边缘节点</text>

  <path d="M450 460H560" stroke="#4AB8FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M1040 460H1160" stroke="#9E82FF" stroke-width="6" stroke-linecap="round"/>
  <circle cx="560" cy="460" r="10" fill="#4AB8FF"/>
  <circle cx="1040" cy="460" r="10" fill="#9E82FF"/>
</svg>
