<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07131E"/>
      <stop offset="1" stop-color="#101B33"/>
    </linearGradient>
    <linearGradient id="step" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <text x="100" y="112" fill="#F5FAFF" font-size="54" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Zvec 快速上手流程</text>
  <text x="100" y="160" fill="#9EB4D0" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">把向量检索能力以库的方式嵌入应用，路径比传统服务化方案更短</text>

  <rect x="90" y="280" width="240" height="220" rx="26" fill="#111D36" stroke="url(#step)" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="338" fill="#87F7FF" font-size="24" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">STEP 1</text>
  <text x="130" y="402" fill="#FFFFFF" font-size="36" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">安装</text>
  <text x="130" y="448" fill="#BDD4F1" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">pip install zvec</text>
  <text x="130" y="484" fill="#BDD4F1" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">npm install @zvec/zvec</text>

  <rect x="390" y="280" width="240" height="220" rx="26" fill="#111D36" stroke="url(#step)" stroke-width="2" filter="url(#shadow)"/>
  <text x="430" y="338" fill="#87F7FF" font-size="24" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">STEP 2</text>
  <text x="430" y="402" fill="#FFFFFF" font-size="36" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">定义 Schema</text>
  <text x="430" y="448" fill="#BDD4F1" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">Collection + VectorSchema</text>
  <text x="430" y="484" fill="#BDD4F1" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">先描述向量与标量结构</text>

  <rect x="690" y="280" width="240" height="220" rx="26" fill="#111D36" stroke="url(#step)" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="338" fill="#87F7FF" font-size="24" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">STEP 3</text>
  <text x="730" y="402" fill="#FFFFFF" font-size="36" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">插入数据</text>
  <text x="730" y="448" fill="#BDD4F1" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">collection.insert(...)</text>
  <text x="730" y="484" fill="#BDD4F1" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">写入 Doc 与 embedding</text>

  <rect x="990" y="280" width="240" height="220" rx="26" fill="#111D36" stroke="url(#step)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1030" y="338" fill="#87F7FF" font-size="24" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">STEP 4</text>
  <text x="1030" y="402" fill="#FFFFFF" font-size="36" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">优化索引</text>
  <text x="1030" y="448" fill="#BDD4F1" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">collection.optimize()</text>
  <text x="1030" y="484" fill="#BDD4F1" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">提升查询阶段表现</text>

  <rect x="1290" y="280" width="240" height="220" rx="26" fill="#111D36" stroke="url(#step)" stroke-width="2" filter="url(#shadow)"/>
  <text x="1330" y="338" fill="#87F7FF" font-size="24" font-weight="700" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">STEP 5</text>
  <text x="1330" y="402" fill="#FFFFFF" font-size="36" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">执行查询</text>
  <text x="1330" y="448" fill="#BDD4F1" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">VectorQuery + topk</text>
  <text x="1330" y="484" fill="#BDD4F1" font-size="22" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">也可结合 filter 查询</text>

  <path d="M330 390H390" stroke="#6AA8FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M630 390H690" stroke="#6AA8FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M930 390H990" stroke="#6AA8FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M1230 390H1290" stroke="#6AA8FF" stroke-width="6" stroke-linecap="round"/>

  <rect x="230" y="620" width="1140" height="140" rx="28" fill="#0E1730" stroke="#2D4974" filter="url(#shadow)"/>
  <text x="800" y="680" text-anchor="middle" fill="#FFFFFF" font-size="34" font-weight="800" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">短链路、低心智负担，是 Zvec 上手体验的核心价值</text>
  <text x="800" y="724" text-anchor="middle" fill="#B7CBE8" font-size="24" font-family="Inter,Segoe UI,Arial,'PingFang SC','Microsoft YaHei',sans-serif">不需要先维护独立数据库服务，应用即可直接拥有向量检索能力</text>
</svg>
