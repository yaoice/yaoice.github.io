<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="pc-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2f7"/></linearGradient>
    <filter id="pc-shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/></filter>
  </defs>

  <rect width="960" height="620" fill="url(#pc-bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">OpenViking 公开性能对比（README）</text>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#64748b">基于 LoCoMo10 + OpenClaw Context Plugin 的公开结果</text>

  <!-- Left Panel: 任务完成率 -->
  <rect x="30" y="85" width="440" height="420" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#pc-shadow)"/>
  <text x="55" y="120" font-size="16" font-weight="700" fill="#1e293b">任务完成率（%）</text>

  <!-- Bar 1: OpenClaw -->
  <text x="55" y="168" font-size="12" fill="#64748b">OpenClaw</text>
  <rect x="185" y="148" width="142" height="30" rx="6" fill="#cbd5e1"/>
  <text x="340" y="168" font-size="13" font-weight="600" fill="#475569">35.65</text>

  <!-- Bar 2: OpenClaw + LanceDB -->
  <text x="55" y="223" font-size="12" fill="#64748b">OpenClaw + LanceDB</text>
  <rect x="185" y="203" width="178" height="30" rx="6" fill="#93c5fd"/>
  <text x="376" y="223" font-size="13" font-weight="600" fill="#1e40af">44.55</text>

  <!-- Bar 3: OpenViking (-memory) -->
  <text x="55" y="278" font-size="12" fill="#64748b">OpenViking（-memory）</text>
  <rect x="185" y="258" width="208" height="30" rx="6" fill="#4ade80"/>
  <text x="406" y="278" font-size="13" font-weight="600" fill="#166534">52.08</text>

  <!-- Bar 4: OpenViking (+memory) -->
  <text x="55" y="333" font-size="12" fill="#64748b">OpenViking（+memory）</text>
  <rect x="185" y="313" width="204" height="30" rx="6" fill="#22c55e"/>
  <text x="402" y="333" font-size="13" font-weight="600" fill="#14532d">51.23</text>

  <!-- 50% reference line -->
  <line x1="385" y1="140" x2="385" y2="350" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="388" y="370" font-size="10" fill="#ef4444">50%</text>

  <text x="55" y="430" font-size="12" fill="#475569">结论：完成率不是小幅提升，</text>
  <text x="55" y="450" font-size="12" fill="#475569">而是直接跨过了 50% 这条线。</text>

  <!-- Right Panel: Token 成本 -->
  <rect x="500" y="85" width="430" height="420" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#pc-shadow)"/>
  <text x="525" y="120" font-size="16" font-weight="700" fill="#1e293b">输入 Token 总成本（百万）</text>

  <!-- Bar 1: OpenClaw -->
  <text x="525" y="168" font-size="12" fill="#64748b">OpenClaw</text>
  <rect x="665" y="148" width="192" height="30" rx="6" fill="#cbd5e1"/>
  <text x="870" y="168" font-size="13" font-weight="600" fill="#475569">24.61</text>

  <!-- Bar 2: OpenClaw + LanceDB -->
  <text x="525" y="223" font-size="12" fill="#64748b">OpenClaw + LanceDB</text>
  <rect x="665" y="203" width="200" height="30" rx="6" fill="#fdba74"/>
  <text x="878" y="223" font-size="13" font-weight="600" fill="#9a3412">51.57</text>

  <!-- Bar 3: OpenViking (-memory) -->
  <text x="525" y="278" font-size="12" fill="#64748b">OpenViking（-memory）</text>
  <rect x="665" y="258" width="34" height="30" rx="6" fill="#67e8f9"/>
  <text x="712" y="278" font-size="13" font-weight="600" fill="#155e75">4.26</text>

  <!-- Bar 4: OpenViking (+memory) -->
  <text x="525" y="333" font-size="12" fill="#64748b">OpenViking（+memory）</text>
  <rect x="665" y="313" width="17" height="30" rx="6" fill="#22d3ee"/>
  <text x="695" y="333" font-size="13" font-weight="600" fill="#0e7490">2.10</text>

  <text x="525" y="430" font-size="12" fill="#475569">结论：省 token 不是附带收益，</text>
  <text x="525" y="450" font-size="12" fill="#475569">而是架构设计直接换来的结果。</text>

  <!-- Footer -->
  <text x="480" y="600" text-anchor="middle" font-size="10" fill="#94a3b8">图：数据取自 OpenViking README 的公开 benchmark，单位为近似百万 token。</text>
</svg>
