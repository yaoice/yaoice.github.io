<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="cm-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2f7"/></linearGradient>
    <linearGradient id="cm-accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    <filter id="cm-shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/></filter>
    <marker id="cm-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>

  <rect width="960" height="580" fill="url(#cm-bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">OpenViking：上下文文件系统总览</text>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#64748b">把资源、用户记忆和 Agent 技能放进同一个可导航的命名空间，而不是扁平 chunk 池</text>

  <!-- Agent / 应用 -->
  <rect x="40" y="100" width="170" height="60" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#cm-shadow)"/>
  <text x="125" y="136" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">Agent / 应用</text>

  <!-- Arrow -->
  <line x1="210" y1="130" x2="265" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#cm-arrow)"/>

  <!-- OpenViking 服务层 -->
  <rect x="270" y="90" width="200" height="80" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#cm-shadow)"/>
  <text x="370" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#6d28d9">OpenViking 服务层</text>
  <text x="370" y="148" text-anchor="middle" font-size="11" fill="#8b5cf6">SDK / Server / CLI</text>

  <!-- Arrow -->
  <line x1="470" y1="130" x2="525" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#cm-arrow)"/>

  <!-- viking:// 命名空间 大框 -->
  <rect x="530" y="80" width="400" height="330" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#cm-shadow)"/>
  <text x="555" y="112" font-size="16" font-weight="700" fill="#1e293b">viking:// 命名空间</text>

  <!-- resources/ -->
  <rect x="555" y="130" width="350" height="70" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="575" y="158" font-size="14" font-weight="700" fill="#166534">resources/</text>
  <text x="575" y="180" font-size="11" fill="#15803d">项目文档、代码库、网页、知识材料</text>

  <!-- user/ -->
  <rect x="555" y="215" width="350" height="70" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.2"/>
  <text x="575" y="243" font-size="14" font-weight="700" fill="#92400e">user/</text>
  <text x="575" y="265" font-size="11" fill="#a16207">偏好、历史习惯、长期记忆</text>

  <!-- agent/ -->
  <rect x="555" y="300" width="350" height="70" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="575" y="328" font-size="14" font-weight="700" fill="#1e40af">agent/</text>
  <text x="575" y="350" font-size="11" fill="#2563eb">skills、instructions、任务记忆</text>

  <!-- 三层上下文表示 -->
  <rect x="40" y="230" width="430" height="230" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#cm-shadow)"/>
  <text x="65" y="262" font-size="16" font-weight="700" fill="#1e293b">三层上下文表示</text>

  <!-- L0 -->
  <rect x="65" y="280" width="380" height="38" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="255" y="305" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">L0：一句摘要（~100 tokens），先做定位</text>

  <!-- L1 -->
  <rect x="65" y="330" width="380" height="48" rx="8" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="255" y="360" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">L1：结构化概览（~2k tokens），帮助规划</text>

  <!-- L2 -->
  <rect x="65" y="390" width="380" height="56" rx="8" fill="#93c5fd" stroke="#3b82f6"/>
  <text x="255" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">L2：完整原始内容，按需再读</text>

  <!-- Arrow from 服务层 to 三层 -->
  <path d="M370 170 L370 195 L255 195 L255 228" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#cm-arrow)"/>

  <!-- Footer -->
  <text x="480" y="560" text-anchor="middle" font-size="10" fill="#94a3b8">图：OpenViking 的关键抽象不是"更多 chunk"，而是"有层次的上下文空间"。</text>
</svg>
