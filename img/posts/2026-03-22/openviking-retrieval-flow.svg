<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="rf-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2f7"/></linearGradient>
    <filter id="rf-shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/></filter>
    <marker id="rf-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>

  <rect width="960" height="620" fill="url(#rf-bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">OpenViking 递归检索流程</text>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#64748b">先找目录，再找目录里的目录，最后才把完整细节读出来</text>

  <!-- Step 1 -->
  <rect x="30" y="90" width="150" height="90" rx="10" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5" filter="url(#rf-shadow)"/>
  <text x="105" y="127" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">1. 问题输入</text>
  <text x="105" y="152" text-anchor="middle" font-size="11" fill="#15803d">生成检索意图</text>

  <line x1="180" y1="135" x2="220" y2="135" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rf-arrow)"/>

  <!-- Step 2 -->
  <rect x="225" y="90" width="160" height="90" rx="10" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" filter="url(#rf-shadow)"/>
  <text x="305" y="127" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">2. L0/L1 粗定位</text>
  <text x="305" y="152" text-anchor="middle" font-size="11" fill="#2563eb">先看摘要，不碰全文</text>

  <line x1="385" y1="135" x2="425" y2="135" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rf-arrow)"/>

  <!-- Step 3 -->
  <rect x="430" y="90" width="160" height="90" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5" filter="url(#rf-shadow)"/>
  <text x="510" y="127" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">3. 锁定高分目录</text>
  <text x="510" y="152" text-anchor="middle" font-size="11" fill="#7c3aed">缩小搜索空间</text>

  <line x1="590" y1="135" x2="630" y2="135" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rf-arrow)"/>

  <!-- Step 4 -->
  <rect x="635" y="90" width="150" height="90" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5" filter="url(#rf-shadow)"/>
  <text x="710" y="127" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">4. 递归下钻</text>
  <text x="710" y="152" text-anchor="middle" font-size="11" fill="#a16207">在子目录里继续找</text>

  <line x1="785" y1="135" x2="820" y2="135" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rf-arrow)"/>

  <!-- Step 5 -->
  <rect x="825" y="90" width="110" height="90" rx="10" fill="#fff1f2" stroke="#fb7185" stroke-width="1.5" filter="url(#rf-shadow)"/>
  <text x="880" y="127" text-anchor="middle" font-size="14" font-weight="700" fill="#be123c">5. 读 L2</text>
  <text x="880" y="152" text-anchor="middle" font-size="11" fill="#e11d48">按需展开</text>

  <!-- 优势说明框 -->
  <rect x="60" y="230" width="840" height="240" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#rf-shadow)"/>
  <text x="90" y="268" font-size="16" font-weight="700" fill="#1e293b">为什么这条链路比传统全局 TopK 更稳</text>

  <!-- Bullet 1 -->
  <circle cx="105" cy="312" r="6" fill="#22c55e"/>
  <text x="125" y="317" font-size="13" fill="#334155">先用目录摘要排除大部分无关区域，减少误召回。</text>

  <!-- Bullet 2 -->
  <circle cx="105" cy="355" r="6" fill="#3b82f6"/>
  <text x="125" y="360" font-size="13" fill="#334155">每深入一层，候选集合都会缩小，后续 rerank 更容易做准。</text>

  <!-- Bullet 3 -->
  <circle cx="105" cy="398" r="6" fill="#8b5cf6"/>
  <text x="125" y="403" font-size="13" fill="#334155">L2 只在最后读取，输入 token 不会因为"保险起见"一路暴涨。</text>

  <!-- 搜索空间收缩标注 -->
  <rect x="620" y="300" width="240" height="70" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="740" y="328" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">搜索空间一路收缩</text>
  <text x="740" y="350" text-anchor="middle" font-size="11" fill="#15803d">这正是 OpenViking 省 token 的关键</text>

  <!-- Shrink illustration - funnel shape -->
  <path d="M640 385 L680 385 L720 420 L680 420 Z" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <path d="M680 385 L730 385 L710 420 L720 420 Z" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <path d="M730 385 L840 385 L710 420 L710 420 Z" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="740" y="445" text-anchor="middle" font-size="10" fill="#64748b">逐层收窄</text>

  <!-- Footer -->
  <text x="480" y="600" text-anchor="middle" font-size="10" fill="#94a3b8">图：检索的核心不是一次捞出最多内容，而是一步步接近真正该读的内容。</text>
</svg>
