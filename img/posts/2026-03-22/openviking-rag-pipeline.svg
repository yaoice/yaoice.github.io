<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2f7"/></linearGradient>
    <linearGradient id="stage1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#f97316"/></linearGradient>
    <linearGradient id="stage2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="stage3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#14b8a6"/></linearGradient>
    <linearGradient id="stage4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>

  <rect width="960" height="720" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">基于 OpenViking 构建完整多模态 RAG 方案 — 全链路概览</text>

  <!-- ===== Stage 1: 多模态文件预处理 ===== -->
  <rect x="30" y="60" width="900" height="155" rx="10" fill="#fff" stroke="#fca5a5" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="30" y="60" width="900" height="30" rx="10" fill="url(#stage1)"/>
  <rect x="30" y="80" width="900" height="10" fill="url(#stage1)"/>
  <text x="480" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Stage 1 — 多模态文件预处理</text>

  <!-- Source docs -->
  <rect x="55" y="105" width="80" height="46" rx="6" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="95" y="124" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="600">PDF</text>
  <text x="95" y="140" text-anchor="middle" font-size="9" fill="#dc2626">扫描件/电子版</text>

  <rect x="150" y="105" width="80" height="46" rx="6" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="190" y="124" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="600">图片</text>
  <text x="190" y="140" text-anchor="middle" font-size="9" fill="#dc2626">PNG/JPG/TIFF</text>

  <rect x="245" y="105" width="80" height="46" rx="6" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="285" y="124" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="600">Office 文档</text>
  <text x="285" y="140" text-anchor="middle" font-size="9" fill="#dc2626">Word/PPT/Excel</text>

  <rect x="340" y="105" width="80" height="46" rx="6" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="380" y="124" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="600">代码仓库</text>
  <text x="380" y="140" text-anchor="middle" font-size="9" fill="#dc2626">Git / Archive</text>

  <!-- Arrow to processing -->
  <line x1="425" y1="128" x2="470" y2="128" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Processing block -->
  <rect x="475" y="100" width="195" height="55" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-dasharray="4,2"/>
  <text x="572" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#c2410c">预处理引擎</text>
  <text x="572" y="132" text-anchor="middle" font-size="9" fill="#ea580c">OCR (MinerU / olmOCR 等)</text>
  <text x="572" y="145" text-anchor="middle" font-size="9" fill="#ea580c">版面分析 · 表格提取 · 图像描述</text>

  <!-- Arrow to output -->
  <line x1="675" y1="128" x2="720" y2="128" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="725" y="100" width="185" height="55" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="817" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">标准化输出</text>
  <text x="817" y="132" text-anchor="middle" font-size="9" fill="#15803d">Markdown + 元数据 JSON</text>
  <text x="817" y="145" text-anchor="middle" font-size="9" fill="#15803d">保留层级 · 表格 · 图注</text>

  <!-- Sub note -->
  <text x="480" y="200" text-anchor="middle" font-size="9" fill="#78716c" font-style="italic">目标：把异构文件统一转成带结构的 Markdown，再喂给 OpenViking</text>

  <!-- ===== Stage 2: 上下文入库与分层表示 ===== -->
  <rect x="30" y="225" width="900" height="140" rx="10" fill="#fff" stroke="#93c5fd" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="30" y="225" width="900" height="30" rx="10" fill="url(#stage2)"/>
  <rect x="30" y="245" width="900" height="10" fill="url(#stage2)"/>
  <text x="480" y="245" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Stage 2 — OpenViking 上下文入库与 L0/L1/L2 生成</text>

  <rect x="55" y="270" width="155" height="48" rx="7" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="132" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">ov add-resource</text>
  <text x="132" y="304" text-anchor="middle" font-size="9" fill="#2563eb">导入 Markdown 目录</text>

  <line x1="215" y1="294" x2="260" y2="294" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="265" y="270" width="155" height="48" rx="7" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="342" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">目录树映射</text>
  <text x="342" y="304" text-anchor="middle" font-size="9" fill="#2563eb">viking:// 命名空间</text>

  <line x1="425" y1="294" x2="470" y2="294" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="475" y="270" width="195" height="48" rx="7" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="572" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">L0 / L1 / L2 生成</text>
  <text x="572" y="304" text-anchor="middle" font-size="9" fill="#2563eb">摘要 · 概览 · 原文 + Embedding</text>

  <line x1="675" y1="294" x2="720" y2="294" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="725" y="270" width="185" height="48" rx="7" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="817" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">向量索引</text>
  <text x="817" y="304" text-anchor="middle" font-size="9" fill="#2563eb">目录+文件多粒度检索就绪</text>

  <text x="480" y="352" text-anchor="middle" font-size="9" fill="#78716c" font-style="italic">核心：保留文档结构 → 目录即路标 → 为递归检索打基础</text>

  <!-- ===== Stage 3: 递归检索与上下文组装 ===== -->
  <rect x="30" y="375" width="900" height="140" rx="10" fill="#fff" stroke="#6ee7b7" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="30" y="375" width="900" height="30" rx="10" fill="url(#stage3)"/>
  <rect x="30" y="395" width="900" height="10" fill="url(#stage3)"/>
  <text x="480" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Stage 3 — 递归检索与上下文组装</text>

  <rect x="55" y="420" width="155" height="48" rx="7" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="132" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">用户 Query</text>
  <text x="132" y="454" text-anchor="middle" font-size="9" fill="#047857">意图解析 · 查询扩展</text>

  <line x1="215" y1="444" x2="260" y2="444" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="265" y="420" width="155" height="48" rx="7" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="342" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">L0 目录定位</text>
  <text x="342" y="454" text-anchor="middle" font-size="9" fill="#047857">排除无关子树</text>

  <line x1="425" y1="444" x2="470" y2="444" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="475" y="420" width="195" height="48" rx="7" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="572" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">L1 递归下钻</text>
  <text x="572" y="454" text-anchor="middle" font-size="9" fill="#047857">逐层缩小候选集</text>

  <line x1="675" y1="444" x2="720" y2="444" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="725" y="420" width="185" height="48" rx="7" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="817" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">L2 按需加载</text>
  <text x="817" y="454" text-anchor="middle" font-size="9" fill="#047857">只读命中文档全文</text>

  <text x="480" y="502" text-anchor="middle" font-size="9" fill="#78716c" font-style="italic">关键收益：先定位再阅读，减少 90%+ 无效 Token 消耗</text>

  <!-- ===== Stage 4: 生成 + 回写 ===== -->
  <rect x="30" y="520" width="900" height="140" rx="10" fill="#fff" stroke="#c4b5fd" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="30" y="520" width="900" height="30" rx="10" fill="url(#stage4)"/>
  <rect x="30" y="540" width="900" height="10" fill="url(#stage4)"/>
  <text x="480" y="540" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Stage 4 — LLM 生成 · 回答输出 · 记忆回写</text>

  <rect x="55" y="565" width="195" height="48" rx="7" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="152" y="585" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">上下文 → LLM</text>
  <text x="152" y="599" text-anchor="middle" font-size="9" fill="#7c3aed">精炼 Prompt · 模型推理</text>

  <line x1="255" y1="589" x2="310" y2="589" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="315" y="565" width="195" height="48" rx="7" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="412" y="585" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">Answer 输出</text>
  <text x="412" y="599" text-anchor="middle" font-size="9" fill="#7c3aed">回答 · 引用 · 置信度</text>

  <line x1="515" y1="589" x2="570" y2="589" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="575" y="565" width="165" height="48" rx="7" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="657" y="585" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">记忆回写</text>
  <text x="657" y="599" text-anchor="middle" font-size="9" fill="#7c3aed">user/ · agent/ memories</text>

  <line x1="745" y1="589" x2="785" y2="589" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="790" y="565" width="120" height="48" rx="7" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="850" y="585" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">反馈闭环</text>
  <text x="850" y="599" text-anchor="middle" font-size="9" fill="#7c3aed">持续优化知识库</text>

  <text x="480" y="648" text-anchor="middle" font-size="9" fill="#78716c" font-style="italic">完整闭环：预处理 → 入库 → 检索 → 生成 → 回写 → 下次检索更准</text>

  <!-- Footer -->
  <text x="480" y="705" text-anchor="middle" font-size="10" fill="#94a3b8">© 2026 iceyao · 基于 OpenViking 公开资料绘制</text>
</svg>
