<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="960" height="480" fill="#f8fafc" rx="10"/>

  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">通用 Harness 做研究的四种典型失败</text>
  <text x="480" y="62" text-anchor="middle" font-size="12" fill="#64748b">为什么「让 Agent 自己搞定一切」在企业研究场景会塌房</text>

  <!-- Left column: General Harness -->
  <rect x="60" y="100" width="400" height="340" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <rect x="60" y="100" width="400" height="40" rx="10" fill="#fee2e2"/>
  <text x="260" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">通用 Agent Harness「亲自研究」</text>

  <g font-size="12" fill="#475569">
    <rect x="80" y="160" width="360" height="58" rx="8" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
    <text x="98" y="182" font-size="13" font-weight="600" fill="#991b1b">① 多源结果不一致</text>
    <text x="98" y="202" font-size="11" fill="#64748b">不同次提问/不同会话给出相互矛盾的答案</text>

    <rect x="80" y="230" width="360" height="58" rx="8" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
    <text x="98" y="252" font-size="13" font-weight="600" fill="#991b1b">② 引文链路缺失</text>
    <text x="98" y="272" font-size="11" fill="#64748b">无法回答「这句结论来自哪一份文件的哪一页」</text>

    <rect x="80" y="300" width="360" height="58" rx="8" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
    <text x="98" y="322" font-size="13" font-weight="600" fill="#991b1b">③ 长周期规划崩坏</text>
    <text x="98" y="342" font-size="11" fill="#64748b">十几步以上的研究链路容易跑偏或半途丢上下文</text>

    <rect x="80" y="370" width="360" height="58" rx="8" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
    <text x="98" y="392" font-size="13" font-weight="600" fill="#991b1b">④ 敏感数据外泄风险</text>
    <text x="98" y="412" font-size="11" fill="#64748b">harness 持有 token 直连数据源，治理难、审计难</text>
  </g>

  <!-- Right column: AI-Q delegation -->
  <rect x="500" y="100" width="400" height="340" rx="10" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5"/>
  <rect x="500" y="100" width="400" height="40" rx="10" fill="#d1fae5"/>
  <text x="700" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#065f46">委托 AI-Q「专门研究后端」</text>

  <g font-size="12" fill="#475569">
    <rect x="520" y="160" width="360" height="58" rx="8" fill="#ffffff" stroke="#a7f3d0" stroke-width="1"/>
    <text x="538" y="182" font-size="13" font-weight="600" fill="#065f46">① 研究专用流水线</text>
    <text x="538" y="202" font-size="11" fill="#64748b">四阶段独立调优，结果可复现、可基准化</text>

    <rect x="520" y="230" width="360" height="58" rx="8" fill="#ffffff" stroke="#a7f3d0" stroke-width="1"/>
    <text x="538" y="252" font-size="13" font-weight="600" fill="#065f46">② 引文为一等公民</text>
    <text x="538" y="272" font-size="11" fill="#64748b">source attribution 内置，输出即可审计</text>

    <rect x="520" y="300" width="360" height="58" rx="8" fill="#ffffff" stroke="#a7f3d0" stroke-width="1"/>
    <text x="538" y="322" font-size="13" font-weight="600" fill="#065f46">③ Deep Researcher 专司长链</text>
    <text x="538" y="342" font-size="11" fill="#64748b">长周期综合任务有专门阶段，不与浅查询混跑</text>

    <rect x="520" y="370" width="360" height="58" rx="8" fill="#ffffff" stroke="#a7f3d0" stroke-width="1"/>
    <text x="538" y="392" font-size="13" font-weight="600" fill="#065f46">④ 数据驻留在受控环境</text>
    <text x="538" y="412" font-size="11" fill="#64748b">harness 只接收报告，敏感数据不离域</text>
  </g>

  <line x1="465" y1="270" x2="495" y2="270" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
