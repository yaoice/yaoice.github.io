<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="460" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">让 Agent Harness 委托研究，而不是亲自研究</text>
  <text x="480" y="76" text-anchor="middle" font-size="13" fill="#64748b">NVIDIA AI-Q Deep Research Skill · 把研究质量从「编排副产品」抽出为独立流水线</text>

  <!-- Harness (left) -->
  <g filter="url(#sd)">
    <rect x="80" y="160" width="200" height="140" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="180" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Agent Harness</text>
    <text x="180" y="222" text-anchor="middle" font-size="11" fill="#64748b">Claude Code · Codex · OpenCode</text>
    <text x="180" y="252" text-anchor="middle" font-size="12" fill="#475569">擅长：编排 · 路由 · UI</text>
    <text x="180" y="272" text-anchor="middle" font-size="12" fill="#475569">短板：多源综合 · 引文 · 数据驻留</text>
  </g>

  <!-- AI-Q (center, focal) -->
  <g filter="url(#sd)">
    <rect x="370" y="140" width="220" height="180" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="480" y="180" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">AI-Q Deep Research Skill</text>
    <text x="480" y="202" text-anchor="middle" font-size="11" fill="#64748b">SKILL.md + scripts/aiq.py</text>
    <line x1="400" y1="218" x2="560" y2="218" stroke="#cbd5e1" stroke-width="1"/>
    <text x="480" y="240" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">研究专用四阶段流水线</text>
    <text x="480" y="262" text-anchor="middle" font-size="11" fill="#475569">Intent · Clarifier · Shallow · Deep</text>
    <text x="480" y="288" text-anchor="middle" font-size="12" font-weight="600" fill="#10b981">带引文 · 可审计 · 可本地部署</text>
  </g>

  <!-- Enterprise Data (right) -->
  <g filter="url(#sd)">
    <rect x="680" y="160" width="200" height="140" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="780" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">企业数据源</text>
    <text x="780" y="222" text-anchor="middle" font-size="11" fill="#64748b">via MCP function group</text>
    <text x="780" y="252" text-anchor="middle" font-size="12" fill="#475569">合同 · Wiki · 数仓 · CRM</text>
    <text x="780" y="272" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">敏感数据不出域</text>
  </g>

  <!-- Arrows -->
  <line x1="285" y1="225" x2="365" y2="225" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="325" y="216" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">委托</text>
  <text x="325" y="244" text-anchor="middle" font-size="10" fill="#64748b">submit task</text>

  <line x1="595" y1="225" x2="675" y2="225" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="635" y="216" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">检索/综合</text>

  <line x1="675" y1="245" x2="595" y2="245" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="365" y1="245" x2="285" y2="245" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="325" y="266" text-anchor="middle" font-size="10" fill="#64748b">结构化报告 + 引文</text>

  <!-- Bottom line -->
  <rect x="120" y="370" width="720" height="56" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="480" y="394" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Harness 决定「问什么」 · AI-Q 决定「怎么研究」 · 数据决定「在哪研究」</text>
  <text x="480" y="414" text-anchor="middle" font-size="11" fill="#64748b">研究质量是独立的工程问题，不是 harness 的附属能力</text>
</svg>
