<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="520" fill="#f8fafc" rx="10"/>

  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">MCP 三种认证模式 · 场景决策表</text>
  <text x="480" y="62" text-anchor="middle" font-size="12" fill="#64748b">「研究后端」到底用谁的身份去查数据，决定了治理边界</text>

  <!-- Header row -->
  <rect x="50" y="100" width="240" height="44" rx="8" fill="#e2e8f0"/>
  <text x="170" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">使用场景</text>

  <rect x="300" y="100" width="280" height="44" rx="8" fill="#e2e8f0"/>
  <text x="440" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">推荐模式</text>

  <rect x="590" y="100" width="320" height="44" rx="8" fill="#e2e8f0"/>
  <text x="750" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">特征与适用边界</text>

  <!-- Row 1 -->
  <g filter="url(#sd)">
    <rect x="50" y="160" width="240" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="170" y="192" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">MCP 服务器无用户认证</text>
    <text x="170" y="214" text-anchor="middle" font-size="11" fill="#64748b">公开 / 内网开放数据源</text>
    <text x="170" y="236" text-anchor="middle" font-size="11" fill="#64748b">实验、原型、PoC</text>
  </g>
  <g filter="url(#sd)">
    <rect x="300" y="160" width="280" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="440" y="194" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">mcp_client</text>
    <text x="440" y="216" text-anchor="middle" font-size="11" fill="#475569">function group</text>
    <text x="440" y="238" text-anchor="middle" font-size="11" fill="#475569">最简单 · 零身份耦合</text>
  </g>
  <rect x="590" y="160" width="320" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="610" y="186" font-size="11" fill="#475569">• 上手最快，AIQ 直连 MCP</text>
  <text x="610" y="206" font-size="11" fill="#475569">• 不适合任何含 PII / 客户数据的源</text>
  <text x="610" y="226" font-size="11" fill="#475569">• 走 streamable-http 传输</text>
  <text x="610" y="246" font-size="11" fill="#475569">• 仅当数据源本身已对内网开放时使用</text>

  <!-- Row 2 -->
  <g filter="url(#sd)">
    <rect x="50" y="280" width="240" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="170" y="312" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">MCP 用后端 / 应用凭证</text>
    <text x="170" y="334" text-anchor="middle" font-size="11" fill="#64748b">CI / 批处理 / 共享数据集</text>
    <text x="170" y="356" text-anchor="middle" font-size="11" fill="#64748b">多用户共享研究后端</text>
  </g>
  <g filter="url(#sd)">
    <rect x="300" y="280" width="280" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="440" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">mcp_client</text>
    <text x="440" y="328" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">+ mcp_service_account</text>
    <text x="440" y="356" text-anchor="middle" font-size="11" fill="#475569">推荐 · 生产首选</text>
  </g>
  <rect x="590" y="280" width="320" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="610" y="306" font-size="11" fill="#475569">• 身份是「服务」而非「用户」</text>
  <text x="610" y="326" font-size="11" fill="#475569">• 长任务、夜间批处理不掉 token</text>
  <text x="610" y="346" font-size="11" fill="#475569">• 审计在 service account 维度聚合</text>
  <text x="610" y="366" font-size="11" fill="#475569">• 适合「研究后端」式部署</text>

  <!-- Row 3 -->
  <g filter="url(#sd)">
    <rect x="50" y="400" width="240" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="170" y="432" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">下游 API 信任用户身份</text>
    <text x="170" y="454" text-anchor="middle" font-size="11" fill="#64748b">行级权限 · 个人数据</text>
    <text x="170" y="476" text-anchor="middle" font-size="11" fill="#64748b">"以本人身份查我的项目"</text>
  </g>
  <g filter="url(#sd)">
    <rect x="300" y="400" width="280" height="100" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="440" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">自定义 AIQ 工具</text>
    <text x="440" y="448" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">+ get_auth_token()</text>
    <text x="440" y="476" text-anchor="middle" font-size="11" fill="#475569">注意当前长任务限制</text>
  </g>
  <rect x="590" y="400" width="320" height="100" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="610" y="426" font-size="11" fill="#92400e" font-weight="600">⚠ 已知约束：</text>
  <text x="610" y="446" font-size="11" fill="#475569">• 用户 bearer token 在 Dask worker 中保留</text>
  <text x="610" y="466" font-size="11" fill="#475569">• 但 token 不会在任务中途刷新</text>
  <text x="610" y="486" font-size="11" fill="#475569">• 长研究任务可能因 token 过期失败</text>
</svg>
