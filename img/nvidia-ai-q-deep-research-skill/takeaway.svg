<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="360" fill="#f8fafc" rx="10"/>

  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">三条带走的判断</text>
  <text x="480" y="62" text-anchor="middle" font-size="12" fill="#64748b">下次给 Harness 加研究能力时，先问自己这三个问题</text>

  <!-- Card 1 -->
  <g filter="url(#sd)">
    <rect x="50" y="110" width="280" height="200" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="50" y="110" width="280" height="44" rx="10" fill="#eff6ff"/>
    <text x="190" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">① 委托 ≠ 拥有</text>
    <text x="68" y="178" font-size="12" font-weight="600" fill="#1e293b">把研究当独立服务</text>
    <text x="68" y="200" font-size="11" fill="#475569">harness 负责编排、UI、人机交互；</text>
    <text x="68" y="218" font-size="11" fill="#475569">研究流水线作为独立后端，可被</text>
    <text x="68" y="236" font-size="11" fill="#475569">单独评测、替换、扩缩容。</text>
    <text x="68" y="270" font-size="11" font-weight="600" fill="#1e40af">→ 别在 harness 里手写检索循环</text>
    <text x="68" y="290" font-size="11" font-weight="600" fill="#1e40af">→ 用 Skill / MCP 等机制委托</text>
  </g>

  <!-- Card 2 -->
  <g filter="url(#sd)">
    <rect x="340" y="110" width="280" height="200" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
    <rect x="340" y="110" width="280" height="44" rx="10" fill="#ecfdf5"/>
    <text x="480" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">② 数据治理反转</text>
    <text x="358" y="178" font-size="12" font-weight="600" fill="#1e293b">少给权限 = 更好结果</text>
    <text x="358" y="200" font-size="11" fill="#475569">harness 越远离原始数据，</text>
    <text x="358" y="218" font-size="11" fill="#475569">越能避免幻觉式回答；</text>
    <text x="358" y="236" font-size="11" fill="#475569">带引文的结构化报告就够用。</text>
    <text x="358" y="270" font-size="11" font-weight="600" fill="#065f46">→ CI/批处理用 service account</text>
    <text x="358" y="290" font-size="11" font-weight="600" fill="#065f46">→ 用户身份模式注意 token 限制</text>
  </g>

  <!-- Card 3 -->
  <g filter="url(#sd)">
    <rect x="630" y="110" width="280" height="200" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="630" y="110" width="280" height="44" rx="10" fill="#fffbeb"/>
    <text x="770" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">③ Frontier 是开关</text>
    <text x="648" y="178" font-size="12" font-weight="600" fill="#1e293b">不是必选，是可关</text>
    <text x="648" y="200" font-size="11" fill="#475569">编排用 frontier，敏感研究路由到</text>
    <text x="648" y="218" font-size="11" fill="#475569">自托管 Nemotron，</text>
    <text x="648" y="236" font-size="11" fill="#475569">或完全禁用——给合规留接口。</text>
    <text x="648" y="270" font-size="11" font-weight="600" fill="#92400e">→ 默认走 Nemotron 推理模型</text>
    <text x="648" y="290" font-size="11" font-weight="600" fill="#92400e">→ 严合规场景关掉外部路由</text>
  </g>
</svg>
