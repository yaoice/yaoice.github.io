<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="500" fill="#f8fafc" rx="10"/>

  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">AI-Q 研究流水线 · 四阶段独立调优</text>
  <text x="480" y="62" text-anchor="middle" font-size="12" fill="#64748b">每阶段都可被单独评测、替换、关闭——而不是一个端到端黑盒</text>

  <!-- Input -->
  <g filter="url(#sd)">
    <rect x="40" y="170" width="120" height="100" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="100" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">用户问题</text>
    <text x="100" y="228" text-anchor="middle" font-size="11" fill="#64748b">From harness</text>
    <text x="100" y="252" text-anchor="middle" font-size="11" fill="#475569">submit task</text>
  </g>

  <!-- Stage 1 -->
  <g filter="url(#sd)">
    <rect x="200" y="150" width="160" height="140" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="280" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">① Intent Classifier</text>
    <text x="280" y="200" text-anchor="middle" font-size="11" fill="#64748b">意图分类</text>
    <line x1="220" y1="212" x2="340" y2="212" stroke="#cbd5e1" stroke-width="1"/>
    <text x="280" y="232" text-anchor="middle" font-size="11" fill="#475569">判断「需要多深」</text>
    <text x="280" y="252" text-anchor="middle" font-size="11" fill="#475569">浅查询 / 深研究</text>
    <text x="280" y="276" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="600">路由决策点</text>
  </g>

  <!-- Stage 2 -->
  <g filter="url(#sd)">
    <rect x="400" y="150" width="160" height="140" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="480" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">② Clarifier</text>
    <text x="480" y="200" text-anchor="middle" font-size="11" fill="#64748b">人机澄清</text>
    <line x1="420" y1="212" x2="540" y2="212" stroke="#cbd5e1" stroke-width="1"/>
    <text x="480" y="232" text-anchor="middle" font-size="11" fill="#475569">检索前消除歧义</text>
    <text x="480" y="252" text-anchor="middle" font-size="11" fill="#475569">human-in-the-loop</text>
    <text x="480" y="276" text-anchor="middle" font-size="10" fill="#92400e" font-weight="600">阻止「错方向跑远」</text>
  </g>

  <!-- Stage 3 (parallel branch top) -->
  <g filter="url(#sd)">
    <rect x="600" y="100" width="160" height="100" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="680" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">③ Shallow Researcher</text>
    <text x="680" y="148" text-anchor="middle" font-size="11" fill="#64748b">浅研究</text>
    <text x="680" y="172" text-anchor="middle" font-size="11" fill="#475569">范围明确·快速返回</text>
    <text x="680" y="190" text-anchor="middle" font-size="10" fill="#64748b">几秒级响应</text>
  </g>

  <!-- Stage 4 (parallel branch bottom) -->
  <g filter="url(#sd)">
    <rect x="600" y="240" width="160" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="680" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">④ Deep Researcher</text>
    <text x="680" y="290" text-anchor="middle" font-size="11" fill="#64748b">深研究</text>
    <text x="680" y="314" text-anchor="middle" font-size="11" fill="#475569">跨源综合·长周期规划</text>
    <text x="680" y="332" text-anchor="middle" font-size="11" fill="#475569">Nemotron 推理模型</text>
    <text x="680" y="350" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="600">分钟级 · 异步</text>
  </g>

  <!-- Output -->
  <g filter="url(#sd)">
    <rect x="810" y="170" width="120" height="100" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="870" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">结构化报告</text>
    <text x="870" y="220" text-anchor="middle" font-size="11" fill="#64748b">+ Citations</text>
    <text x="870" y="244" text-anchor="middle" font-size="11" fill="#475569">+ OTel trace</text>
    <text x="870" y="260" text-anchor="middle" font-size="11" fill="#475569">+ Source attr.</text>
  </g>

  <!-- arrows -->
  <line x1="162" y1="220" x2="198" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="362" y1="220" x2="398" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- branching from Clarifier to Shallow/Deep -->
  <path d="M560 200 Q580 200 580 150 L598 150" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M560 240 Q580 240 580 300 L598 300" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- to output -->
  <path d="M762 150 Q790 150 790 200 L808 200" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M762 300 Q790 300 790 240 L808 240" fill="none" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Bottom legend: independently tuned -->
  <rect x="60" y="400" width="840" height="68" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="80" y="426" font-size="13" font-weight="700" fill="#1e293b">每阶段「独立调优 · 独立评测」的工程价值：</text>
  <text x="80" y="448" font-size="12" fill="#475569">— Intent 误判 ≠ Deep 综合差；FreshQA / Deep Research Bench / DeepSearchQA 可分别打分</text>
  <text x="80" y="466" font-size="12" fill="#475569">— 合规收紧时可单独关闭 Deep 阶段对 frontier model 的路由，而不影响 Shallow 浅查</text>
</svg>
