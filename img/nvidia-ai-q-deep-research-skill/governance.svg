<text x="480" y="111" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">中层 · AI-Q 受控环境</text>
<rect x="640" y="90" width="280" height="32" rx="8" fill="#fee2e2"/>
<text x="780" y="111" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">内层 · 敏感数据域</text>
<rect x="40" y="140" width="280" height="320" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
<rect x="340" y="140" width="280" height="320" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
<rect x="640" y="140" width="280" height="320" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
<g filter="url(#sd)">
<rect x="70" y="170" width="220" height="120" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
<text x="180" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Agent Harness</text>
<text x="180" y="222" text-anchor="middle" font-size="11" fill="#64748b">Claude Code · Codex · OpenCode</text>
<line x1="90" y1="236" x2="270" y2="236" stroke="#e2e8f0"/>
<text x="180" y="258" text-anchor="middle" font-size="11" fill="#475569">只看「结构化报告 + 引文」</text>
<text x="180" y="278" text-anchor="middle" font-size="11" fill="#475569">不见原文 · 不持 token</text>
</g>
<rect x="70" y="310" width="220" height="120" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
<text x="90" y="338" font-size="12" font-weight="700" fill="#1e293b">边界含义</text>
<text x="90" y="362" font-size="11" fill="#475569">• harness 可云端托管</text>
<text x="90" y="384" font-size="11" fill="#475569">• 无需审计其数据访问</text>
<text x="90" y="406" font-size="11" fill="#475569">• 治理面积大幅缩小</text>
<g filter="url(#sd)">
<rect x="370" y="170" width="220" height="80" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
<text x="480" y="198" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">AI-Q Server</text>
<text x="480" y="218" text-anchor="middle" font-size="11" fill="#475569">研究流水线 · NeMo Toolkit</text>
<text x="480" y="236" text-anchor="middle" font-size="11" fill="#64748b">Docker Compose / Helm</text>
</g>
