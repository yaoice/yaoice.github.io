<text x="422" y="310" text-anchor="middle" font-size="10" fill="#475569">推理 · 规划</text>
<text x="422" y="328" text-anchor="middle" font-size="10" fill="#64748b">本地 NIM</text>
</g>
<g filter="url(#sd)">
<rect x="485" y="266" width="105" height="76" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
<text x="537" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Frontier</text>
<text x="537" y="310" text-anchor="middle" font-size="10" fill="#475569">可选 · 可禁</text>
<text x="537" y="328" text-anchor="middle" font-size="10" fill="#92400e">合规开关</text>
</g>
<rect x="370" y="358" width="220" height="80" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
<text x="480" y="380" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">原生可观测</text>
<text x="480" y="400" text-anchor="middle" font-size="10" fill="#475569">OpenTelemetry trace → 审计</text>
<text x="480" y="418" text-anchor="middle" font-size="10" fill="#475569">source attribution → 引文</text>
<g filter="url(#sd)">
<rect x="670" y="170" width="220" height="64" rx="10" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5"/>
<text x="780" y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">合同库 / CRM</text>
<text x="780" y="216" text-anchor="middle" font-size="10" fill="#64748b">via MCP function group</text>
</g>
<g filter="url(#sd)">
<rect x="670" y="250" width="220" height="64" rx="10" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5"/>
<text x="780" y="276" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">内部 Wiki / 文档</text>
<text x="780" y="296" text-anchor="middle" font-size="10" fill="#64748b">streamable-http</text>
</g>
<g filter="url(#sd)">
<rect x="670" y="330" width="220" height="64" rx="10" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5"/>
<text x="780" y="356" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">数仓 / BI</text>
<text x="780" y="376" text-anchor="middle" font-size="10" fill="#64748b">service account</text>
</g>
<text x="780" y="424" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">敏感数据永不离开本域</text>
<line x1="296" y1="220" x2="365" y2="220" stroke="#10b981" stroke-width="2" marker-end="url(#arrowG)"/>
<text x="330" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">① 提问</text>
<line x1="365" y1="248" x2="296" y2="248" stroke="#10b981" stroke-width="2" marker-end="url(#arrowG)"/>
<text x="330" y="266" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">④ 报告 + 引文</text>
<line x1="595" y1="200" x2="665" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="630" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">② 检索</text>
<line x1="665" y1="226" x2="595" y2="226" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="630" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">③ 原文</text>
<rect x="40" y="480" width="880" height="60" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
<line x1="180" y1="510" x2="450" y2="510" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4"/>
<line x1="510" y1="510" x2="780" y2="510" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowR)"/>
<g transform="translate(480 510)">
<circle r="14" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
<line x1="-7" y1="-7" x2="7" y2="7" stroke="#ef4444" stroke-width="2.5"/>
<line x1="-7" y1="7" x2="7" y2="-7" stroke="#ef4444" stroke-width="2.5"/>
</g>
<text x="180" y="500" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">Harness</text>
<text x="780" y="500" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">敏感数据</text>
<text x="480" y="535" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">禁止：harness 不持数据 token · 不直连数据源</text>
</svg>
