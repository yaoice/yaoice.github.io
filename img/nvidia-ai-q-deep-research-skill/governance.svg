<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#64748b"/></marker>
<marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#10b981"/></marker>
<marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#ef4444"/></marker>
<filter id="sd" x="-5%" y="-5%" width="110%" height="110%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
</defs>
<rect width="960" height="560" fill="#f8fafc" rx="10"/>
<text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">数据治理模式反转 · 三栏边界</text>
<text x="480" y="62" text-anchor="middle" font-size="12" fill="#64748b">Harness 不再直接持有数据访问权，反而获得更扎实的研究结果</text>
<rect x="40" y="90" width="280" height="32" rx="8" fill="#e2e8f0"/>
<text x="180" y="111" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">外层 · 用户域</text>
