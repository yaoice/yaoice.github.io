<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <title>系统提示词运行时管线</title>
  <desc>展示用户输入如何与系统提示词、开发者指令、动态上下文、工具列表和合规规则共同进入模型，最终经过工具路由与格式化生成回答。</desc>
  <rect width="960" height="540" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Prompt Scaffold 如何在运行时影响输出</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">从用户输入到最终回答：系统提示词不是开场白，而是运行时控制层</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- 左侧输入层 -->
  <rect x="45" y="100" width="210" height="70" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">用户输入</text>
  <text x="150" y="148" text-anchor="middle" font-size="11" fill="#475569">任务 · 问题 · 文件上下文</text>

  <rect x="45" y="205" width="210" height="70" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="150" y="233" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">系统提示词</text>
  <text x="150" y="253" text-anchor="middle" font-size="11" fill="#475569">身份 · 安全边界 · 输出风格</text>

  <rect x="45" y="310" width="210" height="70" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="150" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">开发者 / 产品策略</text>
  <text x="150" y="358" text-anchor="middle" font-size="11" fill="#475569">工具规则 · 产品术语 · UI 限制</text>

  <!-- 中间上下文汇聚 -->
  <rect x="330" y="110" width="300" height="250" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="480" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#4338ca">运行时上下文装配</text>
  <text x="480" y="164" text-anchor="middle" font-size="11" fill="#475569">System + Developer + User + Tools + Memory</text>

  <rect x="360" y="190" width="240" height="36" rx="6" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="480" y="213" text-anchor="middle" font-size="11" fill="#334155">动态上下文：搜索结果 / 文件 / 记忆</text>
  <rect x="360" y="238" width="240" height="36" rx="6" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="480" y="261" text-anchor="middle" font-size="11" fill="#334155">工具列表：schema / 触发条件 / 禁用项</text>
  <rect x="360" y="286" width="240" height="36" rx="6" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="480" y="309" text-anchor="middle" font-size="11" fill="#334155">合规规则：版权 / 安全 / 隐私 / 拒绝</text>

  <!-- 右侧执行层 -->
  <rect x="705" y="105" width="210" height="64" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="810" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">模型推理</text>
  <text x="810" y="150" text-anchor="middle" font-size="11" fill="#475569">基于装配后的上下文生成计划</text>

  <rect x="705" y="205" width="210" height="64" rx="8" fill="#ffffff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="810" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#0e7490">工具路由</text>
  <text x="810" y="250" text-anchor="middle" font-size="11" fill="#475569">搜索 · 代码执行 · Artifact · Canvas</text>

  <rect x="705" y="305" width="210" height="64" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="810" y="330" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">输出格式化</text>
  <text x="810" y="350" text-anchor="middle" font-size="11" fill="#475569">语气 · 引用 · 结构 · 可视化</text>

  <rect x="705" y="405" width="210" height="64" rx="8" fill="#111827"/>
  <text x="810" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">最终回答</text>
  <text x="810" y="450" text-anchor="middle" font-size="11" fill="#cbd5e1">用户看到的是结果，不是全部输入</text>

  <!-- 连线 -->
  <line x1="255" y1="135" x2="330" y2="185" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="255" y1="240" x2="330" y2="235" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="255" y1="345" x2="330" y2="285" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="630" y1="235" x2="705" y2="137" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="810" y1="169" x2="810" y2="205" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="810" y1="269" x2="810" y2="305" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="810" y1="369" x2="810" y2="405" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="90" y="490" width="780" height="28" rx="5" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="480" y="509" text-anchor="middle" font-size="11" fill="#92400e">CL4R1T4S 的价值：把运行时不可见的 Prompt Scaffold 变成可阅读、可比较、可 diff 的研究材料。</text>
</svg>
