<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <title>AI 系统提示词透明度二维矩阵</title>
  <desc>用官方确认度和披露覆盖度两个维度区分官方 release notes、厂商文档、CL4R1T4S 社区收录与媒体报道，避免把社区收录误认为官方完整披露。</desc>
  <rect width="960" height="560" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">AI 系统提示词透明度矩阵</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">官方确认度 × 披露覆盖度：区分"官方披露"与"社区收录"</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- 坐标轴 -->
  <line x1="140" y1="455" x2="840" y2="455" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="140" y1="455" x2="140" y2="105" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="490" y="490" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">披露覆盖度（Coverage）</text>
  <text x="88" y="282" text-anchor="middle" transform="rotate(-90 88 282)" font-size="13" font-weight="700" fill="#334155">官方确认度（Official Confirmation）</text>
  <text x="140" y="478" text-anchor="middle" font-size="11" fill="#64748b">低</text>
  <text x="835" y="478" text-anchor="middle" font-size="11" fill="#64748b">高</text>
  <text x="112" y="455" text-anchor="end" font-size="11" fill="#64748b">低</text>
  <text x="112" y="110" text-anchor="end" font-size="11" fill="#64748b">高</text>

  <!-- 象限背景 -->
  <rect x="150" y="115" width="330" height="160" fill="#dcfce7" opacity="0.45"/>
  <rect x="490" y="115" width="330" height="160" fill="#dbeafe" opacity="0.45"/>
  <rect x="150" y="285" width="330" height="160" fill="#fee2e2" opacity="0.45"/>
  <rect x="490" y="285" width="330" height="160" fill="#ede9fe" opacity="0.45"/>
  <line x1="485" y1="115" x2="485" y2="455" stroke="#cbd5e1" stroke-dasharray="4 4"/>
  <line x1="140" y1="280" x2="840" y2="280" stroke="#cbd5e1" stroke-dasharray="4 4"/>

  <text x="315" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">官方确认高 · 覆盖有限</text>
  <text x="655" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">理想状态：官方高覆盖披露</text>
  <text x="315" y="310" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">低确认 · 低覆盖</text>
  <text x="655" y="310" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">社区高覆盖 · 非官方确认</text>

  <!-- 数据点 -->
  <g>
    <circle cx="310" cy="195" r="10" fill="#10b981" stroke="#047857" stroke-width="2"/>
    <text x="330" y="191" font-size="12" font-weight="700" fill="#047857">Anthropic release notes</text>
    <text x="330" y="209" font-size="10" fill="#475569">官方确认较高，但版本覆盖不连续</text>
  </g>
  <g>
    <circle cx="255" cy="365" r="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="275" y="362" font-size="12" font-weight="700" fill="#334155">厂商产品文档</text>
    <text x="275" y="380" font-size="10" fill="#475569">通常说明能力与政策，不直接披露完整提示词</text>
  </g>
  <g>
    <circle cx="645" cy="365" r="12" fill="#6366f1" stroke="#4338ca" stroke-width="2"/>
    <text x="665" y="361" font-size="12" font-weight="700" fill="#4338ca">CL4R1T4S</text>
    <text x="665" y="379" font-size="10" fill="#475569">社区高覆盖收录，真实性需结合来源判断</text>
  </g>
  <g>
    <circle cx="390" cy="375" r="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="410" y="371" font-size="12" font-weight="700" fill="#b45309">媒体 / 第三方报道</text>
    <text x="410" y="389" font-size="10" fill="#475569">可提供线索，但通常不可复现验证</text>
  </g>

  <!-- 底部时间线 -->
  <rect x="120" y="515" width="720" height="28" rx="5" fill="#eef2ff" stroke="#6366f1"/>
  <text x="480" y="534" text-anchor="middle" font-size="11" fill="#4338ca">核心结论：CL4R1T4S 的优势是覆盖度，不是官方确认；使用时应把"收录"和"确认"分开判断。</text>
</svg>
