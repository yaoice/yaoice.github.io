<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <title>Claude Opus 4.7 系统提示词工程化分层</title>
  <desc>作者基于 CL4R1T4S 收录的 Claude Opus 4.7 样本归纳出的七层结构，并附带跨厂商可观察模式；该图不是官方架构图。</desc>
  <rect width="960" height="620" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Claude Opus 4.7 系统提示词的工程化分层</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">作者基于 CL4R1T4S 单文件样本归纳，非官方架构</text>

  <g>
    <rect x="60" y="90" width="400" height="60" rx="6" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="80" y="115" font-size="13" font-weight="700" fill="#b91c1c">L1 · 行为根约束</text>
    <text x="80" y="135" font-size="11" fill="#475569">硬规则 · 儿童安全 · 法律/金融免责 · 拒绝策略</text>
    <rect x="60" y="160" width="400" height="60" rx="6" fill="#ffffff" stroke="#f97316" stroke-width="1.5"/>
    <text x="80" y="185" font-size="13" font-weight="700" fill="#c2410c">L2 · 语气与格式</text>
    <text x="80" y="205" font-size="11" fill="#475569">标题/列表策略 · 报告散文 · 表情边界</text>
    <rect x="60" y="230" width="400" height="60" rx="6" fill="#ffffff" stroke="#eab308" stroke-width="1.5"/>
    <text x="80" y="255" font-size="13" font-weight="700" fill="#a16207">L3 · 用户福祉</text>
    <text x="80" y="275" font-size="11" fill="#475569">心理危机 · 资源推荐 · 危险信息重定向</text>
    <rect x="60" y="300" width="400" height="60" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
    <text x="80" y="325" font-size="13" font-weight="700" fill="#15803d">L4 · 立场与公平性</text>
    <text x="80" y="345" font-size="11" fill="#475569">第三方复述者 · 极端立场例外 · 均衡表达</text>
    <rect x="60" y="370" width="400" height="60" rx="6" fill="#ffffff" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="80" y="395" font-size="13" font-weight="700" fill="#0e7490">L5 · 动态 Reminder 系统</text>
    <text x="80" y="415" font-size="11" fill="#475569">动态插入指令 · 防伪官方标签注入</text>
    <rect x="60" y="440" width="400" height="60" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="80" y="465" font-size="13" font-weight="700" fill="#1d4ed8">L6 · 记忆系统与工具</text>
    <text x="80" y="485" font-size="11" fill="#475569">Memory · Computer Use · Artifact · Tool Docs</text>
    <rect x="60" y="510" width="400" height="60" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="80" y="535" font-size="13" font-weight="700" fill="#4338ca">L7 · 工具路由与合规</text>
    <text x="80" y="555" font-size="11" fill="#475569">Visualizer 决策树 · 版权硬限 · 搜索策略</text>
  </g>

  <g>
    <rect x="510" y="90" width="400" height="480" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="710" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">跨厂商可观察模式</text>
    <text x="710" y="138" text-anchor="middle" font-size="10" fill="#64748b">基于仓库样本观察，不代表官方通用标准</text>
    <rect x="530" y="155" width="360" height="30" rx="4" fill="#dcfce7"/>
    <text x="540" y="175" font-size="12" font-weight="700" fill="#166534">✓ 高共性模块</text>
    <text x="540" y="202" font-size="11" fill="#334155">• 身份锚定与产品自述</text>
    <text x="540" y="222" font-size="11" fill="#334155">• 拒绝处理与越狱防御</text>
    <text x="540" y="242" font-size="11" fill="#334155">• 工具 Schema 与触发条件</text>
    <text x="540" y="262" font-size="11" fill="#334155">• 输出格式、语气与引用规则</text>
    <rect x="530" y="285" width="360" height="30" rx="4" fill="#fee2e2"/>
    <text x="540" y="305" font-size="12" font-weight="700" fill="#991b1b">× 产品差异来源</text>
    <text x="540" y="332" font-size="11" fill="#334155"><tspan font-weight="700">Anthropic</tspan> · Reminder / Artifact / 版权硬限</text>
    <text x="540" y="352" font-size="11" fill="#334155"><tspan font-weight="700">OpenAI</tspan> · Memory / Canvas / QDF 新鲜度</text>
    <text x="540" y="372" font-size="11" fill="#334155"><tspan font-weight="700">Google</tspan> · Immersive / thought / tool_code</text>
    <text x="540" y="392" font-size="11" fill="#334155"><tspan font-weight="700">xAI</tspan> · X 搜索生态 / truth-seeking 叙事</text>
    <text x="540" y="412" font-size="11" fill="#334155"><tspan font-weight="700">IDE Agent</tspan> · 文件编辑 / 命令执行 / Git 规则</text>
    <rect x="530" y="435" width="360" height="30" rx="4" fill="#ede9fe"/>
    <text x="540" y="455" font-size="12" font-weight="700" fill="#5b21b6">↗ 可观察趋势</text>
    <text x="540" y="480" font-size="11" fill="#334155">1. 典型样本体积显著增长</text>
    <text x="540" y="500" font-size="11" fill="#334155">2. 工具路由逐渐变成自然语言规则引擎</text>
    <text x="540" y="520" font-size="11" fill="#334155">3. 动态上下文与防注入规则成为标配</text>
    <text x="540" y="540" font-size="11" fill="#334155">4. 版权、隐私、合规规则前移到 Prompt 层</text>
  </g>
</svg>
