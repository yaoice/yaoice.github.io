<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <title>系统提示词来源类型与合规风险矩阵</title>
  <desc>将系统提示词来源按证据可信度和合规风险分为官方披露、公开样本、用户侧观察、客户端分析、侧信道推断等类别，强调研究边界而非操作步骤。</desc>
  <rect width="960" height="560" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">系统提示词来源类型与合规风险</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">Source Taxonomy — 关注证据强度与合规边界，而非操作路线</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- 坐标轴 -->
  <line x1="150" y1="460" x2="835" y2="460" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="150" y1="460" x2="150" y2="105" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="492" y="492" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">证据可信度 / 可复核性</text>
  <text x="92" y="282" text-anchor="middle" transform="rotate(-90 92 282)" font-size="13" font-weight="700" fill="#334155">合规与授权风险</text>
  <text x="150" y="482" text-anchor="middle" font-size="11" fill="#64748b">低</text>
  <text x="832" y="482" text-anchor="middle" font-size="11" fill="#64748b">高</text>
  <text x="122" y="458" text-anchor="end" font-size="11" fill="#64748b">低</text>
  <text x="122" y="110" text-anchor="end" font-size="11" fill="#64748b">高</text>

  <!-- 风险区 -->
  <rect x="160" y="115" width="660" height="105" fill="#fee2e2" opacity="0.55"/>
  <rect x="160" y="225" width="660" height="110" fill="#fef3c7" opacity="0.6"/>
  <rect x="160" y="340" width="660" height="110" fill="#dcfce7" opacity="0.55"/>
  <text x="805" y="140" text-anchor="end" font-size="11" font-weight="700" fill="#991b1b">高风险：不建议作为常规研究路径</text>
  <text x="805" y="250" text-anchor="end" font-size="11" font-weight="700" fill="#92400e">中风险：需授权环境与清晰边界</text>
  <text x="805" y="365" text-anchor="end" font-size="11" font-weight="700" fill="#166534">低风险：公开来源或官方披露</text>

  <!-- 节点 -->
  <g>
    <circle cx="690" cy="385" r="14" fill="#10b981" stroke="#047857" stroke-width="2"/>
    <text x="715" y="382" font-size="12" font-weight="700" fill="#047857">官方 release notes</text>
    <text x="715" y="400" font-size="10" fill="#475569">可信度最高，覆盖通常有限</text>
  </g>
  <g>
    <circle cx="590" cy="405" r="12" fill="#6366f1" stroke="#4338ca" stroke-width="2"/>
    <text x="615" y="402" font-size="12" font-weight="700" fill="#4338ca">CL4R1T4S 收录文件</text>
    <text x="615" y="420" font-size="10" fill="#475569">可读可 diff，但需核验来源</text>
  </g>
  <g>
    <circle cx="420" cy="300" r="11" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="445" y="297" font-size="12" font-weight="700" fill="#b45309">用户侧观察 / Prompt 输出</text>
    <text x="445" y="315" font-size="10" fill="#475569">可能不完整，容易受上下文影响</text>
  </g>
  <g>
    <circle cx="560" cy="250" r="11" fill="#fb923c" stroke="#c2410c" stroke-width="2"/>
    <text x="585" y="247" font-size="12" font-weight="700" fill="#c2410c">授权环境下的客户端/流量分析</text>
    <text x="585" y="265" font-size="10" fill="#475569">证据强，但合规边界更严格</text>
  </g>
  <g>
    <circle cx="330" cy="165" r="10" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
    <text x="355" y="162" font-size="12" font-weight="700" fill="#b91c1c">侧信道推断 / 未授权路径</text>
    <text x="355" y="180" font-size="10" fill="#475569">可信度与合规风险都不稳定，文章不展开操作</text>
  </g>

  <rect x="90" y="510" width="780" height="30" rx="5" fill="#fff7ed" stroke="#f97316"/>
  <text x="480" y="530" text-anchor="middle" font-size="11" fill="#9a3412">本文只讨论风险建模与工程启示，不提供未授权提取步骤；任何研究都应遵守目标平台 ToS 与当地法律。</text>
</svg>
