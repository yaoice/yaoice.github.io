<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <title>CL4R1T4S 社区贡献与版本追踪工作流</title>
  <desc>展示 CL4R1T4S README 中描述的贡献要求：提交模型名、版本、提取日期和上下文备注，通过 PR、X 或 Discord 提交，并由仓库维护者合并归档；底部命令为示意。</desc>
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">CL4R1T4S 社区贡献与版本追踪工作流</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">Extract → Submit → Review/Merge → Version Tracking</text>

  <defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6366f1"/></marker></defs>

  <rect x="40" y="110" width="170" height="100" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="125" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">1. 获取样本</text>
  <text x="125" y="158" text-anchor="middle" font-size="11" fill="#475569">公开披露</text>
  <text x="125" y="175" text-anchor="middle" font-size="11" fill="#475569">授权环境观察</text>
  <text x="125" y="192" text-anchor="middle" font-size="11" fill="#475569">社区补充</text>
  <line x1="210" y1="160" x2="248" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="250" y="110" width="170" height="100" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="335" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">2. 打包元数据</text>
  <text x="335" y="158" text-anchor="middle" font-size="11" fill="#475569">✓ 模型名 / 版本</text>
  <text x="335" y="175" text-anchor="middle" font-size="11" fill="#475569">✓ 提取日期（如已知）</text>
  <text x="335" y="192" text-anchor="middle" font-size="11" fill="#475569">✓ 上下文 / 备注</text>
  <line x1="420" y1="160" x2="458" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="460" y="110" width="170" height="100" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="545" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">3. 提交</text>
  <text x="545" y="158" text-anchor="middle" font-size="11" fill="#475569">GitHub Pull Request</text>
  <text x="545" y="175" text-anchor="middle" font-size="11" fill="#475569">X @elder_plinius</text>
  <text x="545" y="192" text-anchor="middle" font-size="11" fill="#475569">Discord</text>
  <line x1="630" y1="160" x2="668" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="670" y="110" width="190" height="100" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="765" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">4. Review / 合并归档</text>
  <text x="765" y="158" text-anchor="middle" font-size="11" fill="#475569">社区 Review / 维护者处理</text>
  <text x="765" y="175" text-anchor="middle" font-size="11" fill="#475569">分类到厂商目录</text>
  <text x="765" y="192" text-anchor="middle" font-size="11" fill="#475569">Git 记录版本</text>

  <rect x="60" y="270" width="840" height="200" rx="8" fill="#0f172a"/>
  <text x="80" y="300" font-size="12" font-weight="700" fill="#94a3b8">▸ 版本追踪示例（命令示意，非真实 commit 记录）</text>
  <text x="80" y="330" font-size="11" font-family="'Fira Code','SFMono-Regular',Menlo,monospace" fill="#c084fc">$ git log --oneline -- ANTHROPIC/</text>
  <text x="80" y="355" font-size="11" font-family="'Fira Code','SFMono-Regular',Menlo,monospace" fill="#86efac">&lt;hash&gt;</text>
  <text x="160" y="355" font-size="11" font-family="'Fira Code','SFMono-Regular',Menlo,monospace" fill="#e2e8f0">add Claude-Opus-4.7.txt</text>
  <text x="80" y="378" font-size="11" font-family="'Fira Code','SFMono-Regular',Menlo,monospace" fill="#86efac">&lt;hash&gt;</text>
  <text x="160" y="378" font-size="11" font-family="'Fira Code','SFMono-Regular',Menlo,monospace" fill="#e2e8f0">update Claude-4.5-Opus.txt</text>
  <text x="80" y="401" font-size="11" font-family="'Fira Code','SFMono-Regular',Menlo,monospace" fill="#86efac">&lt;hash&gt;</text>
  <text x="160" y="401" font-size="11" font-family="'Fira Code','SFMono-Regular',Menlo,monospace" fill="#e2e8f0">add Claude-4.1.txt</text>
  <text x="80" y="435" font-size="11" font-family="'Fira Code','SFMono-Regular',Menlo,monospace" fill="#c084fc">$ git diff &lt;old&gt; &lt;new&gt; -- ANTHROPIC/Claude-Opus-4.7.txt</text>
  <text x="80" y="455" font-size="10" fill="#64748b" font-style="italic">▸ Git 提供可复核的版本轨迹，但不等同于厂商官方确认。</text>
</svg>
