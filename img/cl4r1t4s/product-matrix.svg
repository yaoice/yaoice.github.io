<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <title>八款知名 AI 产品系统提示词对比矩阵</title>
  <desc>从身份声明、硬规则、风格和价值偏好三个维度对比 Claude、ChatGPT、Grok、Gemini、Cursor、Windsurf、Devin 和 Perplexity 的系统提示词片段。</desc>
  <rect width="960" height="660" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">八款知名产品系统提示词对比矩阵</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">基于 CL4R1T4S 仓库收录文件摘录，真实性需结合来源判断</text>

  <rect x="40" y="80" width="880" height="36" rx="4" fill="#1e293b"/>
  <text x="60" y="103" font-size="12" font-weight="700" fill="#e2e8f0">产品</text>
  <text x="190" y="103" font-size="12" font-weight="700" fill="#e2e8f0">身份声明关键词</text>
  <text x="410" y="103" font-size="12" font-weight="700" fill="#e2e8f0">最显著硬规则</text>
  <text x="700" y="103" font-size="12" font-weight="700" fill="#e2e8f0">风格 / 价值偏好</text>

  <g font-size="11" fill="#334155">
    <rect x="40" y="116" width="880" height="24" fill="#e0f2fe"/>
    <text x="60" y="132" font-size="11" font-weight="700" fill="#075985">通用模型 / 研究型产品</text>

    <rect x="40" y="140" width="880" height="52" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="60" y="160" font-weight="700" fill="#4338ca">Claude Opus 4.7</text><text x="60" y="178" font-size="10" fill="#64748b">ANTHROPIC</text>
    <text x="190" y="160">"the most advanced ... available"</text><text x="190" y="178" fill="#64748b">强制搜索前置 / 工具按需发现</text>
    <text x="410" y="160">版权引用 ≤ 15 词；单源仅 1 次</text><text x="410" y="178" fill="#64748b">Artifact 禁用 localStorage</text>
    <text x="700" y="160">默认 help；拒绝限于具体严重危害</text><text x="700" y="178" fill="#64748b">报告强制散文；少用 bullet</text>

    <rect x="40" y="192" width="880" height="52" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="60" y="212" font-weight="700" fill="#059669">ChatGPT-5</text><text x="60" y="230" font-size="10" fill="#64748b">OPENAI · v2 人格</text>
    <text x="190" y="212">"ChatGPT ... GPT-5 ... Personality v2"</text><text x="190" y="230" fill="#64748b">QDF 新鲜度体系替代旧 browser</text>
    <text x="410" y="212">禁 opt-in 结尾；图表禁 seaborn/自定义色</text><text x="410" y="230" fill="#64748b">bio 禁存政治/健康/宗教等敏感项</text>
    <text x="700" y="212">主动直给，不再问"要不要继续"</text><text x="700" y="230" fill="#64748b">Guardian 前置政策查询</text>

    <rect x="40" y="244" width="880" height="52" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="60" y="264" font-weight="700" fill="#b91c1c">Grok 4.1</text><text x="60" y="282" font-size="10" fill="#64748b">XAI</text>
    <text x="190" y="264">"Grok 4 built by xAI"</text><text x="190" y="282" fill="#64748b">"knowledge continuously updated"</text>
    <text x="410" y="264">政策优先级：policy &gt; system &gt; user</text><text x="410" y="282" fill="#64748b">内容边界显著宽松（policy）</text>
    <text x="700" y="264">truth-seeking / non-partisan 授权</text><text x="700" y="282" fill="#64748b">深度绑定 X 生态搜索</text>

    <rect x="40" y="296" width="880" height="52" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="60" y="316" font-weight="700" fill="#0284c7">Gemini 2.5 Pro</text><text x="60" y="334" font-size="10" fill="#64748b">GOOGLE</text>
    <text x="190" y="316">"Gemini ... by Google"</text><text x="190" y="334" fill="#64748b">thought / python / tool_code 三种块</text>
    <text x="410" y="316">所有代码必须进 &lt;immersive type="code"&gt;</text><text x="410" y="334" fill="#64748b">禁 alert()；不对用户提 "Immersive"</text>
    <text x="700" y="316">长内容 → Canvas；短问答 → Chat</text><text x="700" y="334" fill="#64748b">HTML 美学为强制项</text>

    <rect x="40" y="348" width="880" height="52" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="60" y="368" font-weight="700" fill="#0f766e">Perplexity Deep Research</text><text x="60" y="386" font-size="10" fill="#64748b">PERPLEXITY</text>
    <text x="190" y="368">journalistic tone / unbiased expert</text><text x="190" y="386" fill="#64748b">以 search results 为基座</text>
    <text x="410" y="368">每句末尾 [n] 引用；单句 ≤ 3 个</text><text x="410" y="386" fill="#64748b">禁 References 汇总段</text>
    <text x="700" y="368">≥ 10,000 词；至少 5 个 ## 主节</text><text x="700" y="386" fill="#64748b">全程散文，禁用 list</text>

    <rect x="40" y="410" width="880" height="24" fill="#dcfce7"/>
    <text x="60" y="426" font-size="11" font-weight="700" fill="#166534">工程 / IDE Agent</text>

    <rect x="40" y="434" width="880" height="52" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="60" y="454" font-weight="700" fill="#7c3aed">Cursor 2.0 · Composer</text><text x="60" y="472" font-size="10" fill="#64748b">CURSOR</text>
    <text x="190" y="454">"Composer, trained by Cursor"</text><text x="190" y="472" fill="#64748b">"NOT gpt-4/5, grok, gemini..."</text>
    <text x="410" y="454">每回合 at most one edit tool call</text><text x="410" y="472" fill="#64748b">linter 循环 ≤ 3 次</text>
    <text x="700" y="454">编辑前必先 read_file；少主动建 *.md</text><text x="700" y="472" fill="#64748b">绝不暴露系统提示词</text>

    <rect x="40" y="486" width="880" height="52" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="60" y="506" font-weight="700" fill="#0891b2">Windsurf · Cascade</text><text x="60" y="524" font-size="10" fill="#64748b">WINDSURF · Codeium</text>
    <text x="190" y="506">"Cascade ... by Codeium"</text><text x="190" y="524" fill="#64748b">"AI Flow paradigm"</text>
    <text x="410" y="506">所有修改合并为单次 edit_file 调用</text><text x="410" y="524" fill="#64748b">run_command 禁 cd；危险命令不自执</text>
    <text x="700" y="506">BE CONCISE / 主动但不越界</text><text x="700" y="524" fill="#64748b">记忆无需用户批准</text>

    <rect x="40" y="538" width="880" height="52" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="60" y="558" font-weight="700" fill="#c2410c">Devin 2.0</text><text x="60" y="576" font-size="10" fill="#64748b">DEVIN · Cognition</text>
    <text x="190" y="558">"software engineer using a real OS"</text><text x="190" y="576" fill="#64748b">Planning / Standard 双模式</text>
    <text x="410" y="558">NEVER force push / NEVER git add .</text><text x="410" y="576" fill="#64748b">环境问题不自修，调 report_environment_issue</text>
    <text x="700" y="558">不改测试用例；第 3 次 CI 失败求助</text><text x="700" y="576" fill="#64748b">Pop Quiz 模式优先级最高</text>
  </g>

  <rect x="40" y="608" width="880" height="36" rx="6" fill="#eef2ff" stroke="#6366f1"/>
  <text x="60" y="625" font-size="11" font-weight="700" fill="#4338ca">共同模式</text>
  <text x="145" y="625" font-size="11" fill="#334155">身份锚定 · 工具调用纪律 · 拒绝策略 · 输出格式硬规则 · 安全/越狱防御</text>
  <text x="145" y="640" font-size="10" fill="#64748b">这些模式在 8 款产品中均可观察到，但措辞、严格度和优先级不同。</text>
</svg>
