<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="560" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">生产级 MCP Server 的治理闭环</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">不要只暴露工具，还要把认证、策略、确认、沙箱和审计纳入同一条调用链</text>

  <g filter="url(#sd)">
    <rect x="365" y="210" width="230" height="112" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
    <text x="480" y="244" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">Remote MCP Server</text>
    <text x="480" y="270" text-anchor="middle" font-size="12" fill="#475569">工具语义、资源访问、提示模板</text>
    <text x="480" y="292" text-anchor="middle" font-size="12" fill="#475569">统一接入生产 API 与数据源</text>

    <rect x="80" y="120" width="190" height="78" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
    <text x="175" y="149" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">身份与凭据</text>
    <text x="175" y="171" text-anchor="middle" font-size="11" fill="#475569">OAuth、Vault、短期 Token</text>

    <rect x="80" y="355" width="190" height="78" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.4"/>
    <text x="175" y="384" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">用户确认</text>
    <text x="175" y="406" text-anchor="middle" font-size="11" fill="#475569">Elicitation、审批、风险提示</text>

    <rect x="385" y="390" width="190" height="78" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.4"/>
    <text x="480" y="419" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">沙箱执行</text>
    <text x="480" y="441" text-anchor="middle" font-size="11" fill="#475569">网络白名单、超时、隔离</text>

    <rect x="690" y="355" width="190" height="78" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.4"/>
    <text x="785" y="384" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">审计与观测</text>
    <text x="785" y="406" text-anchor="middle" font-size="11" fill="#475569">调用轨迹、数据访问、成本</text>

    <rect x="690" y="120" width="190" height="78" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>
    <text x="785" y="149" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">策略控制</text>
    <text x="785" y="171" text-anchor="middle" font-size="11" fill="#475569">Scope、租户、环境、限流</text>
  </g>

  <path d="M270 159 C330 159 330 230 365 246" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M690 159 C630 159 630 230 595 246" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M270 394 C330 394 330 310 365 286" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M480 390 V322" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M690 394 C630 394 630 310 595 286" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="72" y="500" width="816" height="32" rx="8" fill="#e2e8f0" stroke="#cbd5e1"/>
    <text x="480" y="521" text-anchor="middle" font-size="11" fill="#475569">治理目标：让 Agent 可以访问生产系统，但每次访问都有身份、有边界、有确认、有记录、可撤销</text>
  </g>
</svg>
