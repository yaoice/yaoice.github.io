<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="520" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Agent 集成方式从单点调用演进为协议层</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">API 适合原型，CLI 适合本地，MCP 适合云端生产级跨客户端复用</text>

  <g filter="url(#sd)">
    <rect x="45" y="100" width="260" height="285" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="175" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">① Direct API Calls</text>
    <text x="175" y="156" text-anchor="middle" font-size="12" fill="#64748b">最快验证，但形成 M×N 复杂度</text>
    <circle cx="115" cy="215" r="28" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.3"/>
    <text x="115" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Agent A</text>
    <circle cx="235" cy="215" r="28" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.3"/>
    <text x="235" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Agent B</text>
    <rect x="88" y="295" width="54" height="32" rx="6" fill="#fff7ed" stroke="#f59e0b"/>
    <text x="115" y="316" text-anchor="middle" font-size="11" fill="#92400e">API 1</text>
    <rect x="148" y="295" width="54" height="32" rx="6" fill="#fff7ed" stroke="#f59e0b"/>
    <text x="175" y="316" text-anchor="middle" font-size="11" fill="#92400e">API 2</text>
    <rect x="208" y="295" width="54" height="32" rx="6" fill="#fff7ed" stroke="#f59e0b"/>
    <text x="235" y="316" text-anchor="middle" font-size="11" fill="#92400e">API 3</text>
    <path d="M115 243 L115 295 M115 243 L175 295 M115 243 L235 295 M235 243 L115 295 M235 243 L175 295 M235 243 L235 295" stroke="#cbd5e1" stroke-width="1.2"/>
    <text x="175" y="360" text-anchor="middle" font-size="11" fill="#ef4444">每个客户端重复处理认证、Schema、错误</text>

    <rect x="350" y="100" width="260" height="285" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="480" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">② CLI</text>
    <text x="480" y="156" text-anchor="middle" font-size="12" fill="#64748b">本地开发强，但依赖 shell 与本机凭据</text>
    <rect x="395" y="195" width="170" height="48" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="480" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Local Agent</text>
    <path d="M480 243 V285" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="395" y="285" width="170" height="48" rx="8" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="480" y="314" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Shell / CLI</text>
    <text x="480" y="360" text-anchor="middle" font-size="11" fill="#92400e">难覆盖 Web、移动端和云托管 Agent</text>

    <rect x="655" y="100" width="260" height="285" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="1.8"/>
    <text x="785" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">③ MCP</text>
    <text x="785" y="156" text-anchor="middle" font-size="12" fill="#64748b">统一协议层，服务多个客户端</text>
    <rect x="690" y="190" width="190" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="785" y="217" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Claude / IDE / 企业 Agent</text>
    <path d="M785 234 V275" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="690" y="275" width="190" height="44" rx="8" fill="#ecfdf5" stroke="#10b981"/>
    <text x="785" y="302" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">Remote MCP Server</text>
    <text x="785" y="348" text-anchor="middle" font-size="11" fill="#047857">一次建设，多客户端复用，集中治理</text>
  </g>

  <path d="M305 242 H350" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M610 242 H655" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="150" y="430" width="660" height="44" rx="8" fill="#e2e8f0" stroke="#cbd5e1"/>
    <text x="480" y="458" text-anchor="middle" font-size="12" fill="#475569">成熟产品通常三者共存：API 提供底座，CLI 服务本地开发，MCP 服务生产级 Agent 连接</text>
  </g>
</svg>
