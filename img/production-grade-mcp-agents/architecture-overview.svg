<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="560" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">MCP 让 Agent 以标准协议触达生产系统</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">Host 负责推理与体验，MCP Server 负责能力暴露、认证、策略、审计和系统适配</text>

  <g filter="url(#sd)">
    <rect x="40" y="110" width="170" height="110" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="125" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">用户与业务目标</text>
    <text x="125" y="164" text-anchor="middle" font-size="12" fill="#475569">自然语言任务</text>
    <text x="125" y="184" text-anchor="middle" font-size="12" fill="#475569">审批与确认</text>
    <text x="125" y="204" text-anchor="middle" font-size="12" fill="#475569">最终结果验收</text>

    <rect x="270" y="100" width="180" height="130" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="360" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Agent Host</text>
    <text x="360" y="156" text-anchor="middle" font-size="12" fill="#475569">Claude / IDE / 企业 Agent</text>
    <text x="360" y="178" text-anchor="middle" font-size="12" fill="#475569">任务规划、工具选择</text>
    <text x="360" y="200" text-anchor="middle" font-size="12" fill="#475569">上下文与对话体验</text>

    <rect x="520" y="92" width="190" height="146" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="615" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Remote MCP Server</text>
    <text x="615" y="150" text-anchor="middle" font-size="12" fill="#475569">Tools / Resources / Prompts</text>
    <text x="615" y="172" text-anchor="middle" font-size="12" fill="#475569">OAuth、Policy、Audit</text>
    <text x="615" y="194" text-anchor="middle" font-size="12" fill="#475569">沙箱执行与结果摘要</text>
    <text x="615" y="216" text-anchor="middle" font-size="12" fill="#475569">Elicitation 用户确认</text>

    <rect x="770" y="110" width="150" height="110" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="845" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">生产系统</text>
    <text x="845" y="164" text-anchor="middle" font-size="12" fill="#475569">SaaS / 数据库</text>
    <text x="845" y="184" text-anchor="middle" font-size="12" fill="#475569">云平台 / 工单</text>
    <text x="845" y="204" text-anchor="middle" font-size="12" fill="#475569">内部 API</text>
  </g>

  <path d="M210 165 H270" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M450 165 H520" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M710 165 H770" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>

  <g>
    <rect x="70" y="310" width="820" height="160" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="480" y="338" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">生产级连接层需要同时解决四类问题</text>

    <rect x="100" y="370" width="170" height="62" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="185" y="394" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">能力发现</text>
    <text x="185" y="414" text-anchor="middle" font-size="11" fill="#475569">按需加载工具与资源</text>

    <rect x="300" y="370" width="170" height="62" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
    <text x="385" y="394" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">认证授权</text>
    <text x="385" y="414" text-anchor="middle" font-size="11" fill="#475569">OAuth、Vault、Scope</text>

    <rect x="500" y="370" width="170" height="62" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="585" y="394" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">风险确认</text>
    <text x="585" y="414" text-anchor="middle" font-size="11" fill="#475569">Elicitation 与审批</text>

    <rect x="700" y="370" width="160" height="62" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
    <text x="780" y="394" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">执行边界</text>
    <text x="780" y="414" text-anchor="middle" font-size="11" fill="#475569">沙箱、审计、限流</text>
  </g>

  <text x="480" y="518" text-anchor="middle" font-size="11" fill="#64748b">核心变化：Agent 不再直接耦合每个生产 API，而是通过 MCP Server 消费标准化能力</text>
</svg>
