<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="340" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">为什么独立审查需要"新上下文"？</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">避免确认偏误，获得真正的"第二意见"</text>

  <!-- 左：主对话审查（错） -->
  <g>
    <rect x="40" y="90" width="420" height="220" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="250" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">✗ 主对话中审查</text>

    <rect x="60" y="140" width="380" height="60" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="250" y="162" text-anchor="middle" font-size="12" fill="#991b1b" font-weight="600">Claude 知道你的设计意图</text>
    <text x="250" y="180" text-anchor="middle" font-size="10" fill="#7f1d1d">刚才一起讨论了方案、写了代码</text>

    <line x1="250" y1="200" x2="250" y2="225" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="60" y="230" width="380" height="65" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="250" y="253" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">倾向于"验证"而非"质疑"</text>
    <text x="250" y="272" text-anchor="middle" font-size="10" fill="#7f1d1d">确认偏误 · 不容易发现问题</text>
    <text x="250" y="288" text-anchor="middle" font-size="10" fill="#7f1d1d">审查结果缺乏客观性</text>
  </g>

  <!-- 右：子代理审查（对） -->
  <g>
    <rect x="500" y="90" width="420" height="220" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="710" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">✓ 子代理审查</text>

    <rect x="520" y="140" width="380" height="60" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="710" y="162" text-anchor="middle" font-size="12" fill="#065f46" font-weight="600">全新上下文，不知道设计意图</text>
    <text x="710" y="180" text-anchor="middle" font-size="10" fill="#064e3b">看到的是最终代码，没有讨论过程</text>

    <line x1="710" y1="200" x2="710" y2="225" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="520" y="230" width="380" height="65" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="710" y="253" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">纯粹从代码出发，更客观</text>
    <text x="710" y="272" text-anchor="middle" font-size="10" fill="#064e3b">无偏见地质疑每一处细节</text>
    <text x="710" y="288" text-anchor="middle" font-size="10" fill="#064e3b">真正的"第二意见"</text>
  </g>
</svg>
