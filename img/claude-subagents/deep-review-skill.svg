<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="360" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">deep-review 技能：三个并行子代理组合威力</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">一次调用触发三视角审查，最后综合为单一报告</text>

  <!-- 触发 -->
  <rect x="360" y="90" width="240" height="50" rx="25" fill="#1e293b"/>
  <text x="480" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">deep-review 技能触发</text>
  <text x="480" y="131" text-anchor="middle" font-size="10" fill="#cbd5e1">.claude/skills/deep-review/SKILL.md</text>

  <!-- 三个子代理 -->
  <line x1="420" y1="140" x2="140" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="140" x2="480" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="140" x2="820" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="40" y="185" width="200" height="100" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="140" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">子代理 1</text>
    <text x="140" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">安全审查</text>
    <line x1="60" y1="240" x2="220" y2="240" stroke="#fca5a5" stroke-width="1"/>
    <text x="140" y="259" text-anchor="middle" font-size="10" fill="#7f1d1d">漏洞 · 注入风险</text>
    <text x="140" y="275" text-anchor="middle" font-size="10" fill="#7f1d1d">认证问题 · 敏感数据</text>
  </g>

  <g>
    <rect x="380" y="185" width="200" height="100" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="480" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">子代理 2</text>
    <text x="480" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">性能审查</text>
    <line x1="400" y1="240" x2="560" y2="240" stroke="#93c5fd" stroke-width="1"/>
    <text x="480" y="259" text-anchor="middle" font-size="10" fill="#1e40af">N+1 查询 · 无效迭代</text>
    <text x="480" y="275" text-anchor="middle" font-size="10" fill="#1e40af">内存泄漏 · 阻塞操作</text>
  </g>

  <g>
    <rect x="720" y="185" width="200" height="100" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="820" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">子代理 3</text>
    <text x="820" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">风格审查</text>
    <line x1="740" y1="240" x2="900" y2="240" stroke="#6ee7b7" stroke-width="1"/>
    <text x="820" y="259" text-anchor="middle" font-size="10" fill="#065f46">项目模式一致性</text>
    <text x="820" y="275" text-anchor="middle" font-size="10" fill="#065f46">对照 style-guide.md</text>
  </g>

  <!-- 汇总 -->
  <line x1="140" y1="285" x2="430" y2="320" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="285" x2="480" y2="320" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="820" y1="285" x2="530" y2="320" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="340" y="320" width="280" height="30" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="480" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">综合报告（优先级排序的问题列表）</text>
</svg>
