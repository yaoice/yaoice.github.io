<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="360" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">模式二：并行修改</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">多文件应用相同模式 · 独立修改 · 总耗时 ≈ 单文件时间</text>

  <!-- 参考模式 -->
  <rect x="380" y="90" width="200" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">参考模式</text>
  <text x="480" y="135" text-anchor="middle" font-size="10" fill="#78350f">src/api/auth.ts（已完成）</text>

  <!-- 三个子代理 -->
  <line x1="430" y1="150" x2="180" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="150" x2="480" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="150" x2="780" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="80" y="195" width="200" height="80" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="180" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">子代理 1</text>
    <text x="180" y="240" text-anchor="middle" font-size="11" fill="#475569">修改 users.ts</text>
    <rect x="100" y="248" width="160" height="22" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="180" y="263" text-anchor="middle" font-size="10" fill="#065f46" font-weight="600">✓ 完成</text>
  </g>

  <g>
    <rect x="380" y="195" width="200" height="80" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="480" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">子代理 2</text>
    <text x="480" y="240" text-anchor="middle" font-size="11" fill="#475569">修改 orders.ts</text>
    <rect x="400" y="248" width="160" height="22" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="480" y="263" text-anchor="middle" font-size="10" fill="#065f46" font-weight="600">✓ 完成</text>
  </g>

  <g>
    <rect x="680" y="195" width="200" height="80" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="780" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">子代理 3</text>
    <text x="780" y="240" text-anchor="middle" font-size="11" fill="#475569">修改 products.ts</text>
    <rect x="700" y="248" width="160" height="22" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="780" y="263" text-anchor="middle" font-size="10" fill="#065f46" font-weight="600">✓ 完成</text>
  </g>

  <!-- 时间对比 -->
  <rect x="40" y="300" width="880" height="44" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="480" y="321" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">时间优势</text>
  <text x="480" y="339" text-anchor="middle" font-size="11" fill="#475569">三文件并行修改 · 总耗时约等于单文件修改时间（而非三倍）</text>
</svg>
