<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="520" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Claude Code 子代理概念模型</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">主对话派发 → 独立上下文中工作 → 仅返回精炼结果</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- 主对话 -->
  <g>
    <rect x="40" y="100" width="250" height="380" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="165" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">主对话 (Main Session)</text>

    <rect x="60" y="140" width="210" height="45" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="165" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">完整的上下文窗口</text>
    <text x="165" y="176" text-anchor="middle" font-size="10" fill="#475569">对话 + 文件 + 工具调用</text>

    <rect x="60" y="195" width="210" height="40" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="165" y="220" text-anchor="middle" font-size="11" fill="#475569">用户："重构认证模块..."</text>

    <rect x="60" y="245" width="210" height="40" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="165" y="270" text-anchor="middle" font-size="11" fill="#475569">Claude: 启动子代理 →</text>

    <rect x="60" y="310" width="210" height="160" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="165" y="330" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">核心优势</text>
    <text x="80" y="355" font-size="10" fill="#475569">• 独立上下文</text>
    <text x="80" y="373" font-size="10" fill="#475569">• 并行执行</text>
    <text x="80" y="391" font-size="10" fill="#475569">• 差异化权限</text>
    <text x="80" y="409" font-size="10" fill="#475569">• 主对话保持干净</text>
    <text x="80" y="427" font-size="10" fill="#475569">• 中间噪声被隔离</text>
    <text x="80" y="445" font-size="10" fill="#475569">• 只有结论回流</text>
    <text x="80" y="463" font-size="10" fill="#475569">• 显著节省 Token</text>
  </g>

  <!-- 三个子代理 -->
  <g>
    <rect x="360" y="100" width="240" height="110" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="480" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">子代理 1：探索</text>
    <rect x="380" y="135" width="200" height="25" rx="3" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="152" text-anchor="middle" font-size="10" fill="#475569">独立上下文 · 只读权限</text>
    <rect x="380" y="165" width="200" height="40" rx="3" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="181" text-anchor="middle" font-size="10" fill="#475569">搜索 API 路由、数据模型</text>
    <text x="480" y="197" text-anchor="middle" font-size="10" fill="#475569">工具：Read · Grep · Glob</text>
  </g>

  <g>
    <rect x="360" y="225" width="240" height="110" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="480" y="250" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">子代理 2：实现</text>
    <rect x="380" y="260" width="200" height="25" rx="3" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="277" text-anchor="middle" font-size="10" fill="#475569">独立上下文 · 编辑权限</text>
    <rect x="380" y="290" width="200" height="40" rx="3" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="306" text-anchor="middle" font-size="10" fill="#475569">重构认证逻辑、更新路由</text>
    <text x="480" y="322" text-anchor="middle" font-size="10" fill="#475569">工具：Read · Write · Bash</text>
  </g>

  <g>
    <rect x="360" y="350" width="240" height="110" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="480" y="375" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">子代理 3：审查</text>
    <rect x="380" y="385" width="200" height="25" rx="3" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="402" text-anchor="middle" font-size="10" fill="#475569">独立上下文 · 只读权限</text>
    <rect x="380" y="415" width="200" height="40" rx="3" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="431" text-anchor="middle" font-size="10" fill="#475569">安全审查、性能检查</text>
    <text x="480" y="447" text-anchor="middle" font-size="10" fill="#475569">工具：Read · Grep</text>
  </g>

  <line x1="290" y1="265" x2="355" y2="160" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="290" y1="265" x2="355" y2="280" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="290" y1="265" x2="355" y2="405" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- 结果 -->
  <g>
    <rect x="670" y="160" width="240" height="240" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="790" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">精简结果返回</text>

    <rect x="685" y="200" width="210" height="35" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="790" y="222" text-anchor="middle" font-size="11" fill="#065f46">摘要而非原始内容</text>
    <rect x="685" y="245" width="210" height="35" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="790" y="267" text-anchor="middle" font-size="11" fill="#065f46">关键发现 + 建议</text>
    <rect x="685" y="290" width="210" height="35" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="790" y="312" text-anchor="middle" font-size="11" fill="#065f46">代码变更摘要</text>
    <rect x="685" y="335" width="210" height="35" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="790" y="357" text-anchor="middle" font-size="11" fill="#065f46">安全问题列表</text>
  </g>

  <line x1="600" y1="155" x2="665" y2="215" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="280" x2="665" y2="280" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="405" x2="665" y2="345" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

  <path d="M670,380 Q440,490 290,415" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="480" y="495" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">仅返回相关结果到主对话</text>
</svg>
