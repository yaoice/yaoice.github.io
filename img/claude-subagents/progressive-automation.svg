<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="280" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">渐进式自动化路径：从临时到永久</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">Anthropic 推荐的四步演进路径</text>

  <!-- Step 1 -->
  <g>
    <rect x="40" y="90" width="200" height="100" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="140" cy="118" r="18" fill="#f59e0b"/>
    <text x="140" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="140" y="154" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">对话式调用</text>
    <text x="140" y="172" text-anchor="middle" font-size="10" fill="#78350f">自然语言请求</text>
    <text x="140" y="186" text-anchor="middle" font-size="10" fill="#78350f">发现需求</text>
  </g>

  <line x1="240" y1="140" x2="275" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="280" y="90" width="200" height="100" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="380" cy="118" r="18" fill="#3b82f6"/>
    <text x="380" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="380" y="154" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">CLAUDE.md</text>
    <text x="380" y="172" text-anchor="middle" font-size="10" fill="#475569">固化规则</text>
    <text x="380" y="186" text-anchor="middle" font-size="10" fill="#475569">团队共享</text>
  </g>

  <line x1="480" y1="140" x2="515" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="520" y="90" width="200" height="100" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="620" cy="118" r="18" fill="#8b5cf6"/>
    <text x="620" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="620" y="154" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">自定义代理 / 技能</text>
    <text x="620" y="172" text-anchor="middle" font-size="10" fill="#475569">标准化流程</text>
    <text x="620" y="186" text-anchor="middle" font-size="10" fill="#475569">可复用接口</text>
  </g>

  <line x1="720" y1="140" x2="755" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="760" y="90" width="160" height="100" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="840" cy="118" r="18" fill="#10b981"/>
    <text x="840" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="840" y="154" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">挂钩 Hooks</text>
    <text x="840" y="172" text-anchor="middle" font-size="10" fill="#064e3b">完全自动化</text>
    <text x="840" y="186" text-anchor="middle" font-size="10" fill="#064e3b">无需记住</text>
  </g>

  <!-- 底部 -->
  <rect x="40" y="210" width="880" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="60" y="232" font-size="11" font-weight="700" fill="#1e293b">演进原则</text>
  <text x="60" y="251" font-size="10" fill="#475569">观察反复出现的模式 → 固化到 CLAUDE.md → 模式成熟后创建专用代理 → 必须执行时设为自动挂钩</text>
</svg>
