<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">自定义子代理的设计要素</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">Frontmatter 元数据 + System Prompt 正文</text>

  <!-- Frontmatter -->
  <g>
    <rect x="40" y="90" width="420" height="360" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="250" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Frontmatter 元数据</text>

    <rect x="60" y="130" width="380" height="70" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="80" y="150" font-size="12" font-weight="700" fill="#1e40af">name: 代理标识符</text>
    <text x="80" y="170" font-size="10" fill="#475569">唯一标识，用于调用和管理</text>
    <text x="80" y="188" font-size="10" fill="#64748b" font-style="italic">例：security-reviewer · test-writer</text>

    <rect x="60" y="210" width="380" height="80" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
    <text x="80" y="230" font-size="12" font-weight="700" fill="#1e40af">description: 触发条件描述 ⭐</text>
    <text x="80" y="250" font-size="10" fill="#475569">不仅是能力，更是何时使用</text>
    <text x="80" y="268" font-size="10" fill="#64748b" font-style="italic">例："before commits touching auth, payments"</text>

    <rect x="60" y="300" width="380" height="70" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="80" y="320" font-size="12" font-weight="700" fill="#1e40af">tools: 工具白名单</text>
    <text x="80" y="340" font-size="10" fill="#475569">遵循最小权限原则</text>
    <text x="80" y="358" font-size="10" fill="#64748b" font-style="italic">只读：Read, Grep, Glob</text>

    <rect x="60" y="380" width="380" height="50" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="80" y="400" font-size="12" font-weight="700" fill="#1e40af">model: 使用的模型</text>
    <text x="80" y="418" font-size="10" fill="#475569">可选 sonnet / opus 等</text>
  </g>

  <!-- System Prompt -->
  <g>
    <rect x="500" y="90" width="420" height="360" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="710" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">System Prompt 正文</text>

    <rect x="520" y="130" width="380" height="70" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="540" y="150" font-size="12" font-weight="700" fill="#5b21b6">角色定义</text>
    <text x="540" y="170" font-size="10" fill="#475569">明确代理的身份与职责</text>
    <text x="540" y="188" font-size="10" fill="#64748b" font-style="italic">"You are a security-focused code reviewer"</text>

    <rect x="520" y="210" width="380" height="70" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="540" y="230" font-size="12" font-weight="700" fill="#5b21b6">检查清单</text>
    <text x="540" y="250" font-size="10" fill="#475569">SQL 注入 · XSS · 认证漏洞 · 数据泄露</text>
    <text x="540" y="268" font-size="10" fill="#64748b" font-style="italic">具体化的审查维度</text>

    <rect x="520" y="290" width="380" height="70" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="540" y="310" font-size="12" font-weight="700" fill="#5b21b6">输出格式要求</text>
    <text x="540" y="330" font-size="10" fill="#475569">优先级列表 · 文件:行号引用</text>
    <text x="540" y="348" font-size="10" fill="#64748b" font-style="italic">结构化输出便于后续处理</text>

    <rect x="520" y="370" width="380" height="60" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
    <text x="540" y="390" font-size="12" font-weight="700" fill="#5b21b6">兜底行为 ⭐</text>
    <text x="540" y="410" font-size="10" fill="#475569">"找不到问题时明确说明，不编造"</text>
    <text x="540" y="425" font-size="10" fill="#64748b" font-style="italic">防止 AI 幻觉</text>
  </g>
</svg>
