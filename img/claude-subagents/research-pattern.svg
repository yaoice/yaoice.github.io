<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="360" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">模式一：实施前研究</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">先用子代理只读调研 → 收集发现 → 制定实施计划</text>

  <!-- 研究问题 -->
  <rect x="40" y="150" width="160" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="120" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">研究问题</text>
  <text x="120" y="195" text-anchor="middle" font-size="10" fill="#78350f">用户通知怎么实现？</text>

  <line x1="200" y1="180" x2="235" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 子代理（只读） -->
  <rect x="240" y="140" width="180" height="80" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="330" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">子代理（只读）</text>
  <text x="330" y="185" text-anchor="middle" font-size="10" fill="#475569">工具：Read · Grep · Glob</text>
  <text x="330" y="203" text-anchor="middle" font-size="10" fill="#475569">独立上下文</text>

  <!-- 发现 -->
  <line x1="420" y1="165" x2="485" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="490" y="95" width="200" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="590" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">发现 1</text>
  <text x="590" y="128" text-anchor="middle" font-size="10" fill="#475569">邮件发送方式</text>

  <line x1="420" y1="180" x2="485" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="490" y="160" width="200" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="590" y="177" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">发现 2</text>
  <text x="590" y="193" text-anchor="middle" font-size="10" fill="#475569">已有通知模式</text>

  <line x1="420" y1="195" x2="485" y2="245" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="490" y="225" width="200" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="590" y="242" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">发现 3</text>
  <text x="590" y="258" text-anchor="middle" font-size="10" fill="#475569">推荐放置位置</text>

  <!-- 综合摘要 -->
  <line x1="690" y1="115" x2="735" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="690" y1="180" x2="735" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="690" y1="245" x2="735" y2="215" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="740" y="145" width="190" height="70" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="835" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">综合摘要</text>
  <text x="835" y="190" text-anchor="middle" font-size="10" fill="#475569">返回主对话</text>
  <text x="835" y="206" text-anchor="middle" font-size="10" fill="#475569">精炼的发现列表</text>

  <!-- 制定计划 -->
  <line x1="835" y1="215" x2="835" y2="245" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="720" y="250" width="230" height="40" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="835" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">基于发现制定实施计划</text>

  <!-- 底部 -->
  <rect x="40" y="315" width="880" height="30" rx="4" fill="#e2e8f0"/>
  <text x="480" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">优势：主对话不被数十个文件内容占满 · 只收到提炼后的发现</text>
</svg>
