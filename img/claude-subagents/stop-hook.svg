<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Stop Hook：阻止未通过测试的提交</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">给 AI 装一个"质量门卫"，Claude 在测试失败时被推回去继续修复</text>

  <!-- Lifelines -->
  <rect x="60" y="85" width="160" height="36" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Claude Code</text>

  <rect x="400" y="85" width="160" height="36" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="480" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Stop Hook</text>

  <rect x="740" y="85" width="160" height="36" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="820" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">测试套件</text>

  <line x1="140" y1="125" x2="140" y2="460" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="480" y1="125" x2="480" y2="460" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="820" y1="125" x2="820" y2="460" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Claude 完成回合 -->
  <rect x="60" y="140" width="160" height="30" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="160" text-anchor="middle" font-size="11" fill="#1e40af">完成当前回合</text>

  <!-- 触发 Stop -->
  <line x1="220" y1="155" x2="475" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="345" y="148" text-anchor="middle" font-size="10" fill="#475569">① 触发 Stop 事件</text>

  <!-- Hook 运行测试 -->
  <line x1="560" y1="185" x2="815" y2="185" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="680" y="178" text-anchor="middle" font-size="10" fill="#475569">② 运行 npm test</text>

  <!-- 测试通过分支 -->
  <rect x="40" y="210" width="880" height="25" rx="4" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="480" y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">分支 A：测试通过</text>

  <line x1="820" y1="250" x2="565" y2="250" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="695" y="243" font-size="10" fill="#10b981" font-weight="600">✓ exit 0</text>

  <line x1="475" y1="275" x2="220" y2="275" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="345" y="268" text-anchor="middle" font-size="10" fill="#10b981" font-weight="600">放行（无输出）</text>

  <rect x="60" y="295" width="160" height="30" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="140" y="315" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">正常结束回合</text>

  <!-- 测试失败分支 -->
  <rect x="40" y="345" width="880" height="25" rx="4" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="480" y="363" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">分支 B：测试失败</text>

  <line x1="820" y1="385" x2="565" y2="385" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="695" y="378" font-size="10" fill="#ef4444" font-weight="600">✗ 测试失败</text>

  <line x1="475" y1="410" x2="220" y2="410" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="345" y="403" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="600">{"decision":"block", "reason":"..."}</text>

  <rect x="60" y="430" width="160" height="35" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="140" y="448" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">不结束回合</text>
  <text x="140" y="462" text-anchor="middle" font-size="9" fill="#7f1d1d">读取 reason，继续修复</text>

  <!-- 底部说明 -->
  <rect x="240" y="430" width="560" height="35" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="520" y="448" text-anchor="middle" font-size="11" fill="#92400e" font-weight="600">stop_hook_active 守卫：防止 Claude 陷入无限循环</text>
  <text x="520" y="462" text-anchor="middle" font-size="9" fill="#78350f">同一个回合内已阻止过一次，直接放行</text>
</svg>
