<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="400" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">子代理的核心价值：有 vs 无的对比</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">独立上下文 + 并行执行 + 精准权限控制</text>

  <g>
    <rect x="40" y="90" width="420" height="270" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="250" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">✗ 没有子代理</text>

    <rect x="60" y="140" width="380" height="40" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="250" y="165" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">单一上下文窗口</text>

    <line x1="250" y1="180" x2="250" y2="200" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="60" y="205" width="380" height="40" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="250" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">越来越慢</text>

    <line x1="250" y1="245" x2="250" y2="265" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="60" y="270" width="380" height="40" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="250" y="295" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">Token 成本攀升</text>

    <line x1="250" y1="310" x2="250" y2="328" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="60" y="333" width="380" height="20" rx="4" fill="#7f1d1d"/>
    <text x="250" y="348" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">串行执行一切</text>
  </g>

  <g>
    <rect x="500" y="90" width="420" height="270" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="710" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">✓ 使用子代理</text>

    <rect x="520" y="140" width="380" height="40" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="710" y="165" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">独立上下文</text>

    <line x1="710" y1="180" x2="710" y2="200" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="520" y="205" width="380" height="40" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="710" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">主对话保持干净</text>

    <line x1="710" y1="245" x2="710" y2="265" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="520" y="270" width="380" height="40" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="710" y="295" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">并行加速</text>

    <line x1="710" y1="310" x2="710" y2="328" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="520" y="333" width="380" height="20" rx="4" fill="#065f46"/>
    <text x="710" y="348" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">精准的权限控制</text>
  </g>
</svg>
