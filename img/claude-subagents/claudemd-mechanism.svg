<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="260" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">CLAUDE.md 指令：始终加载的项目级规则</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">塑造每次 Claude 交互的行为</text>

  <!-- CLAUDE.md -->
  <rect x="60" y="100" width="200" height="80" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="160" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">CLAUDE.md 规则</text>
  <text x="160" y="150" text-anchor="middle" font-size="10" fill="#064e3b">项目级配置文件</text>
  <text x="160" y="166" text-anchor="middle" font-size="10" fill="#064e3b">团队共享一致行为</text>

  <line x1="260" y1="140" x2="345" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="302" y="128" text-anchor="middle" font-size="10" fill="#64748b">始终加载</text>

  <!-- 每次交互 -->
  <rect x="350" y="100" width="200" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">每次 Claude 交互</text>
  <text x="450" y="150" text-anchor="middle" font-size="10" fill="#475569">用户请求进入</text>
  <text x="450" y="166" text-anchor="middle" font-size="10" fill="#475569">带着 CLAUDE.md 规则</text>

  <line x1="550" y1="140" x2="605" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 判断 -->
  <polygon points="685,105 755,140 685,175 615,140" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="685" y="138" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">是审查</text>
  <text x="685" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">请求？</text>

  <!-- 是：子代理 -->
  <line x1="755" y1="140" x2="800" y2="125" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="780" y="115" font-size="10" fill="#10b981" font-weight="600">是</text>
  <rect x="800" y="95" width="130" height="45" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="865" y="114" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">只读子代理</text>
  <text x="865" y="130" text-anchor="middle" font-size="10" fill="#475569">自动启动</text>

  <!-- 否：常规 -->
  <line x1="755" y1="140" x2="800" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="780" y="170" font-size="10" fill="#64748b" font-weight="600">否</text>
  <rect x="800" y="145" width="130" height="45" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="865" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">常规处理</text>
  <text x="865" y="180" text-anchor="middle" font-size="10" fill="#475569">按规则执行</text>

  <!-- 底部 -->
  <rect x="40" y="210" width="880" height="30" rx="4" fill="#e2e8f0"/>
  <text x="480" y="230" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">区别于自定义代理：CLAUDE.md 规则始终加载 · 自定义代理按需触发</text>
</svg>
