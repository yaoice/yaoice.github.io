<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="380" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">权限管理策略：按场景配置工具白名单</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">原则：能用只读就不给编辑 · 能限制就不给完整</text>

  <g>
    <rect x="40" y="90" width="280" height="250" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <rect x="40" y="90" width="280" height="40" rx="10" fill="#10b981"/>
    <rect x="40" y="120" width="280" height="10" fill="#10b981"/>
    <text x="180" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">只读代理（探索/审查）</text>

    <rect x="80" y="150" width="200" height="35" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="180" y="172" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Read</text>

    <rect x="80" y="195" width="200" height="35" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="180" y="217" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Grep</text>

    <rect x="80" y="240" width="200" height="35" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="180" y="262" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Glob</text>

    <text x="180" y="300" text-anchor="middle" font-size="10" fill="#065f46" font-style="italic">适用场景</text>
    <text x="180" y="320" text-anchor="middle" font-size="10" fill="#475569">代码搜索 · 安全审查 · 探索</text>
  </g>

  <g>
    <rect x="340" y="90" width="280" height="250" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="340" y="90" width="280" height="40" rx="10" fill="#3b82f6"/>
    <rect x="340" y="120" width="280" height="10" fill="#3b82f6"/>
    <text x="480" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">编辑代理（实现/修复）</text>

    <rect x="380" y="150" width="200" height="30" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="480" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Read</text>

    <rect x="380" y="185" width="200" height="30" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="480" y="205" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Write</text>

    <rect x="380" y="220" width="200" height="30" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="480" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Grep</text>

    <rect x="380" y="255" width="200" height="30" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="480" y="275" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Bash</text>

    <text x="480" y="305" text-anchor="middle" font-size="10" fill="#1e40af" font-style="italic">适用场景</text>
    <text x="480" y="325" text-anchor="middle" font-size="10" fill="#475569">重构 · Bug 修复 · 新功能</text>
  </g>

  <g>
    <rect x="640" y="90" width="280" height="250" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="640" y="90" width="280" height="40" rx="10" fill="#ef4444"/>
    <rect x="640" y="120" width="280" height="10" fill="#ef4444"/>
    <text x="780" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">完整代理（复杂任务）</text>

    <rect x="680" y="150" width="200" height="50" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="780" y="172" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">所有工具</text>
    <text x="780" y="188" text-anchor="middle" font-size="9" fill="#7f1d1d">Read + Write + Bash + Grep + ...</text>

    <rect x="680" y="210" width="200" height="75" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="780" y="230" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">注意事项</text>
    <text x="780" y="250" text-anchor="middle" font-size="10" fill="#78350f">谨慎使用</text>
    <text x="780" y="266" text-anchor="middle" font-size="10" fill="#78350f">仅用于确实需要的场景</text>
    <text x="780" y="280" text-anchor="middle" font-size="10" fill="#78350f">最好由人类监督</text>

    <text x="780" y="305" text-anchor="middle" font-size="10" fill="#991b1b" font-style="italic">适用场景</text>
    <text x="780" y="325" text-anchor="middle" font-size="10" fill="#475569">通用代理 · 长程复杂任务</text>
  </g>

  <rect x="40" y="350" width="880" height="22" rx="4" fill="#e2e8f0"/>
  <text x="480" y="367" text-anchor="middle" font-size="10" fill="#475569" font-weight="600">最小权限原则：审查代理绝不能意外修改代码 · 探索代理绝不能执行 Bash</text>
</svg>
