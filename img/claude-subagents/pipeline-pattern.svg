<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="420" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">模式四：管道工作流</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">顺序交接阶段 · 文件作为交接物 · 上下文隔离</text>

  <!-- Stage 1 -->
  <g>
    <rect x="40" y="120" width="240" height="150" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="70" cy="145" r="14" fill="#3b82f6"/>
    <text x="70" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="160" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">设计者</text>
    <line x1="60" y1="170" x2="260" y2="170" stroke="#93c5fd" stroke-width="1"/>
    <text x="160" y="195" text-anchor="middle" font-size="11" fill="#475569">设计 API 契约</text>
    <text x="160" y="215" text-anchor="middle" font-size="10" fill="#64748b">工具：Read · Write</text>
    <rect x="60" y="230" width="200" height="30" rx="4" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="160" y="249" text-anchor="middle" font-size="10" fill="#1e40af">产出：docs/api-spec.md</text>
  </g>

  <line x1="280" y1="195" x2="330" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="305" y="185" text-anchor="middle" font-size="10" fill="#64748b">文件交接</text>

  <!-- Stage 2 -->
  <g>
    <rect x="340" y="120" width="240" height="150" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="370" cy="145" r="14" fill="#8b5cf6"/>
    <text x="370" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="460" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">实现者</text>
    <line x1="360" y1="170" x2="560" y2="170" stroke="#c4b5fd" stroke-width="1"/>
    <text x="460" y="195" text-anchor="middle" font-size="11" fill="#475569">基于 spec 实现后端</text>
    <text x="460" y="215" text-anchor="middle" font-size="10" fill="#64748b">工具：Read · Write · Bash</text>
    <rect x="360" y="230" width="200" height="30" rx="4" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="460" y="249" text-anchor="middle" font-size="10" fill="#5b21b6">产出：src/api/**</text>
  </g>

  <line x1="580" y1="195" x2="630" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="605" y="185" text-anchor="middle" font-size="10" fill="#64748b">文件交接</text>

  <!-- Stage 3 -->
  <g>
    <rect x="640" y="120" width="240" height="150" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="670" cy="145" r="14" fill="#10b981"/>
    <text x="670" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="760" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">测试者</text>
    <line x1="660" y1="170" x2="860" y2="170" stroke="#6ee7b7" stroke-width="1"/>
    <text x="760" y="195" text-anchor="middle" font-size="11" fill="#475569">写集成测试</text>
    <text x="760" y="215" text-anchor="middle" font-size="10" fill="#64748b">工具：Read · Write · Bash</text>
    <rect x="660" y="230" width="200" height="30" rx="4" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="760" y="249" text-anchor="middle" font-size="10" fill="#065f46">产出：tests/integration/**</text>
  </g>

  <!-- 底部原则 -->
  <rect x="40" y="305" width="880" height="95" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="60" y="328" font-size="13" font-weight="700" fill="#1e293b">管道模式的精妙之处</text>
  <text x="60" y="352" font-size="11" fill="#475569">• 顺序执行：每个阶段完成后才启动下一个</text>
  <text x="510" y="352" font-size="11" fill="#475569">• 文件交接：输出文件作为阶段间的交接物（非对话历史）</text>
  <text x="60" y="372" font-size="11" fill="#475569">• 上下文隔离：每个子代理只看到本阶段需要的信息</text>
  <text x="510" y="372" font-size="11" fill="#475569">• 关注点分离：设计不关心实现，实现不关心测试</text>
  <text x="60" y="392" font-size="10" fill="#64748b" font-style="italic">优势：产物可追溯 · 易于调试 · 可重复执行 · 天然支持并行某些阶段</text>
</svg>
