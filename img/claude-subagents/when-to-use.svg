<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">何时使用 vs 何时不用子代理</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">了解边界，避免过度委派</text>

  <!-- 左：使用 -->
  <g>
    <rect x="40" y="90" width="420" height="390" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="250" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">✓ 应该使用子代理</text>

    <rect x="60" y="135" width="380" height="55" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="75" y="155" font-size="11" font-weight="700" fill="#065f46">① 10+ 文件的大规模探索</text>
    <text x="75" y="175" font-size="10" fill="#475569">避免大量读取污染主对话</text>

    <rect x="60" y="200" width="380" height="55" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="75" y="220" font-size="11" font-weight="700" fill="#065f46">② 3+ 独立任务并行</text>
    <text x="75" y="240" font-size="10" fill="#475569">利用并行执行加速</text>

    <rect x="60" y="265" width="380" height="55" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="75" y="285" font-size="11" font-weight="700" fill="#065f46">③ 需要无偏见的独立审查</text>
    <text x="75" y="305" font-size="10" fill="#475569">获得客观的第二意见</text>

    <rect x="60" y="330" width="380" height="55" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="75" y="350" font-size="11" font-weight="700" fill="#065f46">④ 需要差异化工具权限</text>
    <text x="75" y="370" font-size="10" fill="#475569">审查用只读，实现用完整工具</text>

    <rect x="60" y="395" width="380" height="55" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="75" y="415" font-size="11" font-weight="700" fill="#065f46">⑤ 大量中间输出但只需结论</text>
    <text x="75" y="435" font-size="10" fill="#475569">隔离中间噪声，仅返回摘要</text>
  </g>

  <!-- 右：不使用 -->
  <g>
    <rect x="500" y="90" width="420" height="390" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="710" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">✗ 不应该使用子代理</text>

    <rect x="520" y="135" width="380" height="55" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="535" y="155" font-size="11" font-weight="700" fill="#991b1b">① 顺序依赖的工作</text>
    <text x="535" y="175" font-size="10" fill="#7f1d1d">步骤 B 需要 A 的完整输出 → 单会话</text>

    <rect x="520" y="200" width="380" height="55" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="535" y="220" font-size="11" font-weight="700" fill="#991b1b">② 同文件的并行编辑</text>
    <text x="535" y="240" font-size="10" fill="#7f1d1d">两子代理改同一文件 = 冲突 → 串行</text>

    <rect x="520" y="265" width="380" height="55" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="535" y="285" font-size="11" font-weight="700" fill="#991b1b">③ 小任务</text>
    <text x="535" y="305" font-size="10" fill="#7f1d1d">委派开销 &gt; 收益 → 主对话直接完成</text>

    <rect x="520" y="330" width="380" height="55" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="535" y="350" font-size="11" font-weight="700" fill="#991b1b">④ 过多专业代理</text>
    <text x="535" y="370" font-size="10" fill="#7f1d1d">选项多 → 自动委派不可靠 → 精简</text>

    <rect x="520" y="395" width="380" height="55" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="535" y="415" font-size="11" font-weight="700" fill="#991b1b">⑤ 需要代理间协调</text>
    <text x="535" y="435" font-size="10" fill="#7f1d1d">子代理之间无法通信 → 用 Agent Teams</text>
  </g>
</svg>
