<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="320" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">子代理三大核心特性</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">区别于普通上下文切换的关键</text>

  <g>
    <rect x="40" y="90" width="280" height="200" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="180" cy="135" r="32" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="180" y="145" text-anchor="middle" font-size="28">🧠</text>
    <text x="180" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">特性 1</text>
    <text x="180" y="212" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">独立上下文</text>
    <line x1="70" y1="225" x2="290" y2="225" stroke="#93c5fd" stroke-width="1"/>
    <text x="180" y="247" text-anchor="middle" font-size="11" fill="#475569">全新的上下文窗口</text>
    <text x="180" y="265" text-anchor="middle" font-size="11" fill="#475569">不受历史对话负担</text>
    <text x="180" y="281" text-anchor="middle" font-size="10" fill="#1e40af" font-style="italic">聚焦当前任务</text>
  </g>

  <g>
    <rect x="340" y="90" width="280" height="200" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="480" cy="135" r="32" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="480" y="145" text-anchor="middle" font-size="28">⚡</text>
    <text x="480" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">特性 2</text>
    <text x="480" y="212" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">并行执行</text>
    <line x1="370" y1="225" x2="590" y2="225" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="247" text-anchor="middle" font-size="11" fill="#475569">多个子代理可同时运行</text>
    <text x="480" y="265" text-anchor="middle" font-size="11" fill="#475569">多任务并行</text>
    <text x="480" y="281" text-anchor="middle" font-size="10" fill="#5b21b6" font-style="italic">显著缩短完成时间</text>
  </g>

  <g>
    <rect x="640" y="90" width="280" height="200" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="780" cy="135" r="32" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
    <text x="780" y="145" text-anchor="middle" font-size="28">🔐</text>
    <text x="780" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">特性 3</text>
    <text x="780" y="212" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">差异化权限</text>
    <line x1="670" y1="225" x2="890" y2="225" stroke="#6ee7b7" stroke-width="1"/>
    <text x="780" y="247" text-anchor="middle" font-size="11" fill="#475569">每个子代理独立配置</text>
    <text x="780" y="265" text-anchor="middle" font-size="11" fill="#475569">研究型只读 · 实现型可编辑</text>
    <text x="780" y="281" text-anchor="middle" font-size="10" fill="#065f46" font-style="italic">最小权限原则</text>
  </g>
</svg>
