<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">五种触发子代理的方式</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">从临时到永久、从手动到自动的演进路径</text>

  <g>
    <rect x="40" y="95" width="180" height="380" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="40" y="95" width="180" height="50" rx="10" fill="#f59e0b"/>
    <rect x="40" y="130" width="180" height="15" fill="#f59e0b"/>
    <text x="130" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">方式 1</text>
    <text x="130" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">对话式调用</text>
    <text x="130" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">临时</text>
    <line x1="60" y1="182" x2="200" y2="182" stroke="#fde68a" stroke-width="1"/>
    <text x="130" y="205" text-anchor="middle" font-size="10" fill="#475569">自然语言请求</text>
    <text x="130" y="223" text-anchor="middle" font-size="10" fill="#475569">最直接的方式</text>
    <text x="130" y="241" text-anchor="middle" font-size="10" fill="#475569">所有界面可用</text>
    <text x="130" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">典型场景</text>
    <text x="130" y="295" text-anchor="middle" font-size="9" fill="#78350f">"让子代理搜索..."</text>
    <text x="130" y="312" text-anchor="middle" font-size="9" fill="#78350f">"并行研究：同时..."</text>
    <text x="130" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">优点</text>
    <text x="130" y="360" text-anchor="middle" font-size="9" fill="#78350f">零配置</text>
    <text x="130" y="378" text-anchor="middle" font-size="9" fill="#78350f">随用随走</text>
    <text x="130" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">缺点</text>
    <text x="130" y="430" text-anchor="middle" font-size="9" fill="#78350f">无法持久化</text>
    <text x="130" y="448" text-anchor="middle" font-size="9" fill="#78350f">团队不能共享</text>
  </g>

  <g>
    <rect x="230" y="95" width="180" height="380" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="230" y="95" width="180" height="50" rx="10" fill="#3b82f6"/>
    <rect x="230" y="130" width="180" height="15" fill="#3b82f6"/>
    <text x="320" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">方式 2</text>
    <text x="320" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">自定义子代理</text>
    <text x="320" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">可复用</text>
    <line x1="250" y1="182" x2="390" y2="182" stroke="#93c5fd" stroke-width="1"/>
    <text x="320" y="205" text-anchor="middle" font-size="10" fill="#475569">.claude/agents/*.md</text>
    <text x="320" y="223" text-anchor="middle" font-size="10" fill="#475569">Frontmatter + Prompt</text>
    <text x="320" y="241" text-anchor="middle" font-size="10" fill="#475569">项目级或用户级</text>
    <text x="320" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">典型场景</text>
    <text x="320" y="295" text-anchor="middle" font-size="9" fill="#1e40af">security-reviewer</text>
    <text x="320" y="312" text-anchor="middle" font-size="9" fill="#1e40af">test-writer</text>
    <text x="320" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">优点</text>
    <text x="320" y="360" text-anchor="middle" font-size="9" fill="#1e40af">可复用</text>
    <text x="320" y="378" text-anchor="middle" font-size="9" fill="#1e40af">团队共享</text>
    <text x="320" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">缺点</text>
    <text x="320" y="430" text-anchor="middle" font-size="9" fill="#1e40af">需要显式调用</text>
    <text x="320" y="448" text-anchor="middle" font-size="9" fill="#1e40af">过多会泛滥</text>
  </g>

  <g>
    <rect x="420" y="95" width="180" height="380" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
    <rect x="420" y="95" width="180" height="50" rx="10" fill="#10b981"/>
    <rect x="420" y="130" width="180" height="15" fill="#10b981"/>
    <text x="510" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">方式 3</text>
    <text x="510" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">CLAUDE.md 指令</text>
    <text x="510" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">始终加载</text>
    <line x1="440" y1="182" x2="580" y2="182" stroke="#6ee7b7" stroke-width="1"/>
    <text x="510" y="205" text-anchor="middle" font-size="10" fill="#475569">项目级规则</text>
    <text x="510" y="223" text-anchor="middle" font-size="10" fill="#475569">塑造每次交互</text>
    <text x="510" y="241" text-anchor="middle" font-size="10" fill="#475569">一致行为</text>
    <text x="510" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">典型场景</text>
    <text x="510" y="295" text-anchor="middle" font-size="9" fill="#065f46">"审查必用只读代理"</text>
    <text x="510" y="312" text-anchor="middle" font-size="9" fill="#065f46">统一代码风格检查</text>
    <text x="510" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">优点</text>
    <text x="510" y="360" text-anchor="middle" font-size="9" fill="#065f46">团队一致</text>
    <text x="510" y="378" text-anchor="middle" font-size="9" fill="#065f46">自动应用</text>
    <text x="510" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">缺点</text>
    <text x="510" y="430" text-anchor="middle" font-size="9" fill="#065f46">占用上下文 token</text>
    <text x="510" y="448" text-anchor="middle" font-size="9" fill="#065f46">规则过多难维护</text>
  </g>

  <g>
    <rect x="610" y="95" width="180" height="380" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="610" y="95" width="180" height="50" rx="10" fill="#8b5cf6"/>
    <rect x="610" y="130" width="180" height="15" fill="#8b5cf6"/>
    <text x="700" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">方式 4</text>
    <text x="700" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">技能 (Skills)</text>
    <text x="700" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">按需加载</text>
    <line x1="630" y1="182" x2="770" y2="182" stroke="#c4b5fd" stroke-width="1"/>
    <text x="700" y="205" text-anchor="middle" font-size="10" fill="#475569">目录结构</text>
    <text x="700" y="223" text-anchor="middle" font-size="10" fill="#475569">SKILL.md + 模板</text>
    <text x="700" y="241" text-anchor="middle" font-size="10" fill="#475569">显式或自动匹配</text>
    <text x="700" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">典型场景</text>
    <text x="700" y="295" text-anchor="middle" font-size="9" fill="#5b21b6">deep-review 三视角</text>
    <text x="700" y="312" text-anchor="middle" font-size="9" fill="#5b21b6">复杂多步骤流程</text>
    <text x="700" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">优点</text>
    <text x="700" y="360" text-anchor="middle" font-size="9" fill="#5b21b6">组合多代理</text>
    <text x="700" y="378" text-anchor="middle" font-size="9" fill="#5b21b6">按需占用上下文</text>
    <text x="700" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">缺点</text>
    <text x="700" y="430" text-anchor="middle" font-size="9" fill="#5b21b6">配置复杂度高</text>
    <text x="700" y="448" text-anchor="middle" font-size="9" fill="#5b21b6">调试难度增加</text>
  </g>

  <g>
    <rect x="800" y="95" width="120" height="380" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="800" y="95" width="120" height="50" rx="10" fill="#ef4444"/>
    <rect x="800" y="130" width="120" height="15" fill="#ef4444"/>
    <text x="860" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">方式 5</text>
    <text x="860" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">挂钩 Hooks</text>
    <text x="860" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">完全自动</text>
    <line x1="820" y1="182" x2="900" y2="182" stroke="#fca5a5" stroke-width="1"/>
    <text x="860" y="205" text-anchor="middle" font-size="10" fill="#475569">生命周期节点</text>
    <text x="860" y="223" text-anchor="middle" font-size="10" fill="#475569">自动执行</text>
    <text x="860" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">场景</text>
    <text x="860" y="295" text-anchor="middle" font-size="9" fill="#991b1b">Stop Hook</text>
    <text x="860" y="312" text-anchor="middle" font-size="9" fill="#991b1b">测试守卫</text>
    <text x="860" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">优点</text>
    <text x="860" y="360" text-anchor="middle" font-size="9" fill="#991b1b">无需记忆</text>
    <text x="860" y="378" text-anchor="middle" font-size="9" fill="#991b1b">类 CI 门禁</text>
    <text x="860" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">缺点</text>
    <text x="860" y="430" text-anchor="middle" font-size="9" fill="#991b1b">需小心</text>
    <text x="860" y="448" text-anchor="middle" font-size="9" fill="#991b1b">无限循环</text>
  </g>
</svg>
