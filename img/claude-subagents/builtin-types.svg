<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="320" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Claude Code 内置子代理类型</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">针对不同使用场景优化</text>

  <g>
    <rect x="40" y="90" width="280" height="200" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="40" y="90" width="280" height="40" rx="10" fill="#3b82f6"/>
    <rect x="40" y="120" width="280" height="10" fill="#3b82f6"/>
    <text x="180" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">通用代理 (General)</text>

    <text x="180" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">完整的工具集</text>
    <line x1="70" y1="180" x2="290" y2="180" stroke="#dbeafe" stroke-width="1"/>
    <text x="180" y="205" text-anchor="middle" font-size="11" fill="#475569">处理复杂的多步骤任务</text>
    <text x="180" y="225" text-anchor="middle" font-size="11" fill="#475569">涉及代码修改</text>
    <text x="60" y="260" font-size="10" fill="#1e40af" font-weight="600">适用场景</text>
    <text x="60" y="278" font-size="10" fill="#475569">重构 · 新功能实现 · Bug 修复</text>
  </g>

  <g>
    <rect x="340" y="90" width="280" height="200" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="340" y="90" width="280" height="40" rx="10" fill="#8b5cf6"/>
    <rect x="340" y="120" width="280" height="10" fill="#8b5cf6"/>
    <text x="480" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">计划代理 (Planner)</text>

    <text x="480" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">研究 + 策略规划</text>
    <line x1="370" y1="180" x2="590" y2="180" stroke="#ede9fe" stroke-width="1"/>
    <text x="480" y="205" text-anchor="middle" font-size="11" fill="#475569">先研究代码库</text>
    <text x="480" y="225" text-anchor="middle" font-size="11" fill="#475569">再提出实施策略</text>
    <text x="360" y="260" font-size="10" fill="#5b21b6" font-weight="600">适用场景</text>
    <text x="360" y="278" font-size="10" fill="#475569">大型重构前的调研与规划</text>
  </g>

  <g>
    <rect x="640" y="90" width="280" height="200" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <rect x="640" y="90" width="280" height="40" rx="10" fill="#10b981"/>
    <rect x="640" y="120" width="280" height="10" fill="#10b981"/>
    <text x="780" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">探索代理 (Explorer)</text>

    <text x="780" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">快速只读搜索</text>
    <line x1="670" y1="180" x2="890" y2="180" stroke="#d1fae5" stroke-width="1"/>
    <text x="780" y="205" text-anchor="middle" font-size="11" fill="#475569">针对快速只读优化</text>
    <text x="780" y="225" text-anchor="middle" font-size="11" fill="#475569">最小化上下文污染</text>
    <text x="660" y="260" font-size="10" fill="#065f46" font-weight="600">适用场景</text>
    <text x="660" y="278" font-size="10" fill="#475569">"认证逻辑在哪里？" 类查找</text>
  </g>
</svg>
