<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f5d8c"/>
    </marker>
    <style>
      .title{font:700 30px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#17324d}
      .h{font:700 22px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#17324d}
      .t{font:16px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#28445f}
      .s{font:14px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#48627a}
      .box{fill:#fff;stroke:#8fb6d8;stroke-width:2;rx:18}
      .blue{fill:#e6f1ff;stroke:#5f9ed6;stroke-width:2;rx:16}
      .green{fill:#eaf8ef;stroke:#67b783;stroke-width:2;rx:16}
      .orange{fill:#fff4e6;stroke:#e4a24f;stroke-width:2;rx:16}
      .line{stroke:#2f5d8c;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#7595b1;stroke-width:2;stroke-dasharray:7 6;fill:none}
    </style>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" class="title">DeepSeek-V3.2 多机推理：vLLM 原生部署 vs TIONE 在线服务</text>

  <rect x="60" y="90" width="510" height="560" class="box"/>
  <text x="315" y="130" text-anchor="middle" class="h">vLLM-Ascend 原生多机</text>
  <text x="315" y="158" text-anchor="middle" class="s">自管容器、自管脚本、自管入口</text>

  <rect x="100" y="200" width="190" height="90" class="blue"/>
  <text x="195" y="236" text-anchor="middle" class="t">Node0 / Master</text>
  <text x="195" y="262" text-anchor="middle" class="s">API + DP Rank 0</text>
  <rect x="340" y="200" width="190" height="90" class="blue"/>
  <text x="435" y="236" text-anchor="middle" class="t">Node1 / Headless</text>
  <text x="435" y="262" text-anchor="middle" class="s">DP Rank 1</text>
  <path d="M290 245 H340" class="line"/>

  <rect x="100" y="330" width="430" height="86" class="green"/>
  <text x="315" y="363" text-anchor="middle" class="t">HCCL / Gloo / TP Socket</text>
  <text x="315" y="389" text-anchor="middle" class="s">显式设置 HCCL_IF_IP、网卡名、RPC 端口</text>

  <rect x="100" y="455" width="430" height="100" class="orange"/>
  <text x="315" y="489" text-anchor="middle" class="t">部署者负责</text>
  <text x="315" y="516" text-anchor="middle" class="s">Docker 设备挂载、模型路径、端口、脚本分发、日志采集</text>

  <rect x="630" y="90" width="510" height="560" class="box"/>
  <text x="885" y="130" text-anchor="middle" class="h">TIONE 在线服务多机</text>
  <text x="885" y="158" text-anchor="middle" class="s">平台编排实例、挂载共享模型、注入启动脚本</text>

  <rect x="690" y="200" width="390" height="82" class="green"/>
  <text x="885" y="232" text-anchor="middle" class="t">共享模型数据源 / NAS</text>
  <text x="885" y="258" text-anchor="middle" class="s">/data/model 挂载到在线服务实例</text>

  <rect x="675" y="330" width="185" height="90" class="blue"/>
  <text x="767" y="364" text-anchor="middle" class="t">Master 实例</text>
  <text x="767" y="390" text-anchor="middle" class="s">start_master.sh</text>
  <rect x="910" y="330" width="185" height="90" class="blue"/>
  <text x="1002" y="364" text-anchor="middle" class="t">Worker 实例</text>
  <text x="1002" y="390" text-anchor="middle" class="s">start_worker.sh</text>
  <path d="M860 375 H910" class="line"/>
  <path d="M885 282 V330" class="line"/>

  <rect x="690" y="465" width="390" height="90" class="orange"/>
  <text x="885" y="498" text-anchor="middle" class="t">平台负责外层交付</text>
  <text x="885" y="525" text-anchor="middle" class="s">实例生命周期、日志、入口、模型存储和服务发布</text>

  <path d="M570 370 H630" class="dash"/>
  <text x="600" y="348" text-anchor="middle" class="s">底层仍是 vLLM + HCCL</text>
</svg>
