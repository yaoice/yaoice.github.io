<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#345f8a"/></marker>
    <style>
      .title{font:700 30px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#17324d}
      .step{font:700 18px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#17324d}
      .txt{font:15px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#425d75}
      .box{fill:#ffffff;stroke:#77a9cf;stroke-width:2;rx:18}
      .npu{fill:#eef8f2;stroke:#63ad7d;stroke-width:2;rx:14}
      .warn{fill:#fff6e8;stroke:#dd9b43;stroke-width:2;rx:14}
      .line{stroke:#345f8a;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .small{font:13px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#61778d}
    </style>
  </defs>
  <rect width="1200" height="620" fill="#f7fbff"/>
  <text x="600" y="52" text-anchor="middle" class="title">vLLM-Ascend 双节点部署主流程</text>

  <rect x="70" y="105" width="190" height="105" class="box"/>
  <text x="165" y="138" text-anchor="middle" class="step">1. 准备模型</text>
  <text x="165" y="166" text-anchor="middle" class="txt">共享目录</text>
  <text x="165" y="190" text-anchor="middle" class="small">W8A8 / MTP 权重</text>

  <rect x="320" y="105" width="190" height="105" class="box"/>
  <text x="415" y="138" text-anchor="middle" class="step">2. 启动容器</text>
  <text x="415" y="166" text-anchor="middle" class="txt">--net=host</text>
  <text x="415" y="190" text-anchor="middle" class="small">挂载 davinci 与驱动</text>

  <rect x="570" y="105" width="190" height="105" class="warn"/>
  <text x="665" y="138" text-anchor="middle" class="step">3. 绑定网络</text>
  <text x="665" y="166" text-anchor="middle" class="txt">HCCL_IF_IP</text>
  <text x="665" y="190" text-anchor="middle" class="small">Gloo / TP / HCCL 网卡</text>

  <rect x="820" y="105" width="190" height="105" class="box"/>
  <text x="915" y="138" text-anchor="middle" class="step">4. 启动 Node0</text>
  <text x="915" y="166" text-anchor="middle" class="txt">API + DP master</text>
  <text x="915" y="190" text-anchor="middle" class="small">data-parallel-address</text>

  <path d="M260 158 H320" class="line"/>
  <path d="M510 158 H570" class="line"/>
  <path d="M760 158 H820" class="line"/>

  <rect x="820" y="305" width="190" height="105" class="box"/>
  <text x="915" y="338" text-anchor="middle" class="step">5. 启动 Node1</text>
  <text x="915" y="366" text-anchor="middle" class="txt">--headless</text>
  <text x="915" y="390" text-anchor="middle" class="small">start-rank=1</text>
  <path d="M915 210 V305" class="line"/>

  <rect x="570" y="305" width="190" height="105" class="npu"/>
  <text x="665" y="338" text-anchor="middle" class="step">6. 建立通信</text>
  <text x="665" y="366" text-anchor="middle" class="txt">DP / TP / EP</text>
  <text x="665" y="390" text-anchor="middle" class="small">HCCL collective</text>
  <path d="M820 358 H760" class="line"/>

  <rect x="320" y="305" width="190" height="105" class="box"/>
  <text x="415" y="338" text-anchor="middle" class="step">7. 请求验证</text>
  <text x="415" y="366" text-anchor="middle" class="txt">/v1/completions</text>
  <text x="415" y="390" text-anchor="middle" class="small">model 名称一致</text>
  <path d="M570 358 H510" class="line"/>

  <rect x="70" y="305" width="190" height="105" class="warn"/>
  <text x="165" y="338" text-anchor="middle" class="step">8. 观测排障</text>
  <text x="165" y="366" text-anchor="middle" class="txt">日志 / npu-smi</text>
  <text x="165" y="390" text-anchor="middle" class="small">端口、rank、网卡、内存</text>
  <path d="M320 358 H260" class="line"/>

  <rect x="115" y="500" width="970" height="58" fill="#eaf2fb" stroke="#9bbbd8" rx="16"/>
  <text x="600" y="535" text-anchor="middle" class="txt">核心原则：先保证网络和 rank 拓扑正确，再调 batch、上下文长度、MTP、CUDAGraph 和内存利用率。</text>
</svg>
