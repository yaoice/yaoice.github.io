<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#335f88"/></marker>
    <style>
      .title{font:700 30px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#17324d}
      .h{font:700 20px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#17324d}
      .t{font:15px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#405b73}
      .s{font:13px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#5d7488}
      .platform{fill:#f0f7ff;stroke:#75a9d1;stroke-width:2;rx:24}
      .box{fill:#fff;stroke:#85afd0;stroke-width:2;rx:16}
      .pod{fill:#eaf8ef;stroke:#68b985;stroke-width:2;rx:16}
      .cmd{fill:#fff6e8;stroke:#e0a24d;stroke-width:2;rx:14}
      .line{stroke:#335f88;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#7895ad;stroke-width:2;stroke-dasharray:8 6;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="700" fill="#f8fbff"/>
  <text x="600" y="52" text-anchor="middle" class="title">TIONE 在线服务中的 DeepSeek-V3.2 多机推理</text>

  <rect x="70" y="95" width="1060" height="520" class="platform"/>
  <text x="600" y="130" text-anchor="middle" class="h">TIONE 3.11 在线服务</text>

  <rect x="120" y="170" width="250" height="92" class="box"/>
  <text x="245" y="203" text-anchor="middle" class="h">模型数据源</text>
  <text x="245" y="230" text-anchor="middle" class="t">平台共享存储 / NAS</text>
  <text x="245" y="250" text-anchor="middle" class="s">挂载到 /data/model</text>

  <rect x="475" y="170" width="250" height="92" class="box"/>
  <text x="600" y="203" text-anchor="middle" class="h">镜像与资源规格</text>
  <text x="600" y="230" text-anchor="middle" class="t">vllm-ascend-v018:v0.18.0rc1</text>
  <text x="600" y="250" text-anchor="middle" class="s">2 × Atlas 800 A2，8 × 910B2</text>

  <rect x="830" y="170" width="250" height="92" class="cmd"/>
  <text x="955" y="203" text-anchor="middle" class="h">启动命令模板</text>
  <text x="955" y="230" text-anchor="middle" class="t">start_${HOST_INDEX}.sh</text>
  <text x="955" y="250" text-anchor="middle" class="s">日志写入 /data/model/logs</text>

  <path d="M370 216 H475" class="line"/>
  <path d="M725 216 H830" class="line"/>

  <rect x="190" y="355" width="330" height="130" class="pod"/>
  <text x="355" y="390" text-anchor="middle" class="h">Master 实例</text>
  <text x="355" y="420" text-anchor="middle" class="t">vLLM API server + DP rank 0</text>
  <text x="355" y="447" text-anchor="middle" class="s">--data-parallel-address $node0_ip</text>
  <text x="355" y="470" text-anchor="middle" class="s">--tensor-parallel-size 8</text>

  <rect x="680" y="355" width="330" height="130" class="pod"/>
  <text x="845" y="390" text-anchor="middle" class="h">Worker 实例</text>
  <text x="845" y="420" text-anchor="middle" class="t">headless engine + DP rank 1</text>
  <text x="845" y="447" text-anchor="middle" class="s">--headless</text>
  <text x="845" y="470" text-anchor="middle" class="s">--data-parallel-start-rank 1</text>

  <path d="M955 262 C955 315 845 318 845 355" class="line"/>
  <path d="M955 262 C955 310 355 318 355 355" class="line"/>
  <path d="M520 420 H680" class="dash"/>

  <rect x="280" y="535" width="640" height="52" fill="#ffffff" stroke="#8fb6d8" rx="16"/>
  <text x="600" y="568" text-anchor="middle" class="t">请求入口通常只暴露 Master；底层多机同步仍依赖 HCCL/Gloo/TP Socket 与正确的 rank 编排。</text>
</svg>
