<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#315e88"/></marker>
    <style>
      .title{font:700 30px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#17324d}
      .h{font:700 20px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#17324d}
      .t{font:15px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#405b73}
      .s{font:13px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#5e7488}
      .box{fill:#fff;stroke:#87afd0;stroke-width:2;rx:18}
      .pre{fill:#e7f2ff;stroke:#5b9bd5;stroke-width:2;rx:18}
      .dec{fill:#eef9ef;stroke:#65b67e;stroke-width:2;rx:18}
      .kv{fill:#fff5e6;stroke:#df9e43;stroke-width:2;rx:18}
      .line{stroke:#315e88;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#7f93a5;stroke-width:2;stroke-dasharray:8 6;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="680" fill="#f8fbff"/>
  <text x="600" y="52" text-anchor="middle" class="title">Prefill-Decode 分离：面向长上下文的多机扩展形态</text>

  <rect x="70" y="120" width="230" height="110" class="box"/>
  <text x="185" y="158" text-anchor="middle" class="h">Client / Proxy</text>
  <text x="185" y="188" text-anchor="middle" class="t">统一 OpenAI 接口</text>
  <text x="185" y="212" text-anchor="middle" class="s">负载均衡请求</text>

  <rect x="390" y="95" width="320" height="160" class="pre"/>
  <text x="550" y="132" text-anchor="middle" class="h">Prefill 集群</text>
  <text x="550" y="165" text-anchor="middle" class="t">DP2 + TP16</text>
  <text x="550" y="192" text-anchor="middle" class="s">处理长输入，生成 KV cache</text>
  <text x="550" y="218" text-anchor="middle" class="s">kv_role = kv_producer</text>

  <rect x="820" y="95" width="320" height="160" class="dec"/>
  <text x="980" y="132" text-anchor="middle" class="h">Decode 集群</text>
  <text x="980" y="165" text-anchor="middle" class="t">DP8 + TP4</text>
  <text x="980" y="192" text-anchor="middle" class="s">高频小步生成 token</text>
  <text x="980" y="218" text-anchor="middle" class="s">kv_role = kv_consumer</text>

  <rect x="440" y="360" width="650" height="110" class="kv"/>
  <text x="765" y="397" text-anchor="middle" class="h">MooncakeLayerwiseConnector</text>
  <text x="765" y="428" text-anchor="middle" class="t">按层传输 KV cache；Prefill 端口 30000，Decode 端口 30100</text>
  <text x="765" y="452" text-anchor="middle" class="s">这条链路不同于 TP/EP 内部 HCCL collective</text>

  <path d="M300 175 H390" class="line"/>
  <path d="M710 175 H820" class="line"/>
  <path d="M550 255 C550 310 620 330 665 360" class="line"/>
  <path d="M940 360 C965 330 980 305 980 255" class="line"/>
  <path d="M980 255 C980 300 1090 310 1090 520 C1090 575 250 575 250 230" class="dash"/>

  <rect x="110" y="520" width="370" height="72" class="box"/>
  <text x="295" y="550" text-anchor="middle" class="t">适合 64k/3k 等长输入场景</text>
  <text x="295" y="574" text-anchor="middle" class="s">官方示例：A3-752T 4 节点，533 tps，TPOT 32 ms</text>

  <rect x="560" y="520" width="500" height="72" class="box"/>
  <text x="810" y="550" text-anchor="middle" class="t">调优重点分离</text>
  <text x="810" y="574" text-anchor="middle" class="s">Prefill 看吞吐与长上下文；Decode 看 TPOT、并发与 CUDAGraph 捕获尺寸</text>
</svg>
