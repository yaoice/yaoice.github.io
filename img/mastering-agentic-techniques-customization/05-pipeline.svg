<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="480" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">多阶段流水线：从 Prompt 起步，按需爬到 RLVR</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">每一阶段都有自己的"投入 / 产出 / 风险"三联表，跳级会断链</text>

  <!-- 5 stages -->
  <g>
    <!-- Stage 1 -->
    <rect x="40" y="110" width="170" height="220" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#sd)"/>
    <text x="125" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Stage 1</text>
    <text x="125" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Prompt + RAG</text>
    <text x="125" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">+ Tool / Skill</text>
    <line x1="56" y1="186" x2="194" y2="186" stroke="#cbd5e1" stroke-width="1"/>
    <text x="56" y="208" font-size="11" fill="#475569" font-weight="700">投入</text>
    <text x="56" y="225" font-size="11" fill="#1e293b">几乎零</text>
    <text x="56" y="248" font-size="11" fill="#475569" font-weight="700">产出</text>
    <text x="56" y="265" font-size="11" fill="#1e293b">基线行为</text>
    <text x="56" y="288" font-size="11" fill="#475569" font-weight="700">风险</text>
    <text x="56" y="305" font-size="11" fill="#ef4444">长指令掉链</text>
    <text x="56" y="320" font-size="11" fill="#ef4444">复杂格式不稳</text>

    <!-- arrow -->
    <line x1="210" y1="220" x2="228" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Stage 2 -->
    <rect x="230" y="110" width="170" height="220" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" filter="url(#sd)"/>
    <text x="315" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Stage 2</text>
    <text x="315" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">SDG</text>
    <text x="315" y="174" text-anchor="middle" font-size="11" fill="#64748b">合成数据生成</text>
    <line x1="246" y1="186" x2="384" y2="186" stroke="#cbd5e1" stroke-width="1"/>
    <text x="246" y="208" font-size="11" fill="#475569" font-weight="700">投入</text>
    <text x="246" y="225" font-size="11" fill="#1e293b">数据 schema</text>
    <text x="246" y="240" font-size="11" fill="#1e293b">+ LLM 调用费</text>
    <text x="246" y="265" font-size="11" fill="#475569" font-weight="700">产出</text>
    <text x="246" y="282" font-size="11" fill="#1e293b">高质 SFT 训练对</text>
    <text x="246" y="305" font-size="11" fill="#475569" font-weight="700">风险</text>
    <text x="246" y="322" font-size="11" fill="#ef4444">数据分布偏移</text>

    <line x1="400" y1="220" x2="418" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Stage 3 -->
    <rect x="420" y="110" width="170" height="220" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" filter="url(#sd)"/>
    <text x="505" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Stage 3</text>
    <text x="505" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">SFT</text>
    <text x="505" y="174" text-anchor="middle" font-size="11" fill="#64748b">监督微调（含 LoRA）</text>
    <line x1="436" y1="186" x2="574" y2="186" stroke="#cbd5e1" stroke-width="1"/>
    <text x="436" y="208" font-size="11" fill="#475569" font-weight="700">投入</text>
    <text x="436" y="225" font-size="11" fill="#1e293b">LoRA 单卡 / </text>
    <text x="436" y="240" font-size="11" fill="#1e293b">全参多卡</text>
    <text x="436" y="265" font-size="11" fill="#475569" font-weight="700">产出</text>
    <text x="436" y="282" font-size="11" fill="#1e293b">领域格式 / 词汇</text>
    <text x="436" y="305" font-size="11" fill="#475569" font-weight="700">风险</text>
    <text x="436" y="322" font-size="11" fill="#ef4444">过拟合 / 灾难性遗忘</text>

    <line x1="590" y1="220" x2="608" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Stage 4 -->
    <rect x="610" y="110" width="170" height="220" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sd)"/>
    <text x="695" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">Stage 4</text>
    <text x="695" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">DPO</text>
    <text x="695" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">→ RLVR + GRPO</text>
    <line x1="626" y1="186" x2="764" y2="186" stroke="#cbd5e1" stroke-width="1"/>
    <text x="626" y="208" font-size="11" fill="#475569" font-weight="700">投入</text>
    <text x="626" y="225" font-size="11" fill="#1e293b">偏好对 / 验证函数</text>
    <text x="626" y="248" font-size="11" fill="#475569" font-weight="700">产出</text>
    <text x="626" y="265" font-size="11" fill="#1e293b">质量对齐 / 推理跃迁</text>
    <text x="626" y="288" font-size="11" fill="#475569" font-weight="700">风险</text>
    <text x="626" y="305" font-size="11" fill="#ef4444">奖励黑客</text>
    <text x="626" y="320" font-size="11" fill="#ef4444">训练不稳</text>

    <line x1="780" y1="220" x2="798" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Stage 5 -->
    <rect x="800" y="110" width="120" height="220" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#sd)"/>
    <text x="860" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">Stage 5</text>
    <text x="860" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Eval</text>
    <text x="860" y="174" text-anchor="middle" font-size="11" fill="#64748b">+ 迭代</text>
    <line x1="816" y1="186" x2="904" y2="186" stroke="#cbd5e1" stroke-width="1"/>
    <text x="816" y="208" font-size="11" fill="#475569" font-weight="700">投入</text>
    <text x="816" y="225" font-size="11" fill="#1e293b">评测集</text>
    <text x="816" y="248" font-size="11" fill="#475569" font-weight="700">产出</text>
    <text x="816" y="265" font-size="11" fill="#1e293b">下次该改哪</text>
    <text x="816" y="288" font-size="11" fill="#475569" font-weight="700">风险</text>
    <text x="816" y="305" font-size="11" fill="#ef4444">没评测</text>
    <text x="816" y="320" font-size="11" fill="#ef4444">就盲优化</text>
  </g>

  <!-- Feedback loop -->
  <path d="M 860 332 Q 860 410 480 410 Q 125 410 125 332" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="480" y="430" text-anchor="middle" font-size="12" fill="#64748b">评测结果回流：决定下一轮加深哪个阶段</text>

  <text x="480" y="460" text-anchor="middle" font-size="11" fill="#94a3b8">「Start lightweight, measure rigorously, add complexity only where data shows it's needed.」</text>
</svg>
