<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="520" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">三梯度 · 9 种技术全景：成本 · 改造深度 · 能力上限</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">从上至下：投入越大，可塑性越高；选型不应跳级，应阶梯组合</text>

  <!-- Header columns -->
  <g>
    <text x="60"  y="100" font-size="12" font-weight="700" fill="#475569">技术</text>
    <text x="280" y="100" font-size="12" font-weight="700" fill="#475569">关键动作</text>
    <text x="540" y="100" font-size="12" font-weight="700" fill="#475569">代价 / 资源</text>
    <text x="740" y="100" font-size="12" font-weight="700" fill="#475569">能力上限</text>
    <line x1="40" y1="110" x2="920" y2="110" stroke="#cbd5e1" stroke-width="1"/>
  </g>

  <!-- Tier 1 band -->
  <rect x="40" y="120" width="880" height="120" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="56" y="140" font-size="12" font-weight="700" fill="#1e40af">推理时 · 不动权重</text>

  <g font-size="12" fill="#1e293b">
    <text x="60"  y="170" font-weight="600">① Prompt</text>
    <text x="280" y="170" fill="#475569">写 System Prompt，约束角色 / 工具 / 输出</text>
    <text x="540" y="170" fill="#475569">几乎为零</text>
    <text x="740" y="170" fill="#94a3b8">★ · 触顶快</text>

    <text x="60"  y="195" font-weight="600">② RAG</text>
    <text x="280" y="195" fill="#475569">向量库召回 → 拼进 Context</text>
    <text x="540" y="195" fill="#475569">检索系统 + 上下文窗口</text>
    <text x="740" y="195" fill="#94a3b8">★★ · 加知识不加推理</text>

    <text x="60"  y="220" font-weight="600">③ Tool / Skill</text>
    <text x="280" y="220" fill="#475569">注入函数与 SKILL.md，组合化执行</text>
    <text x="540" y="220" fill="#475569">工具开发 + 上下文占用</text>
    <text x="740" y="220" fill="#94a3b8">★★★ · 取决于编排可靠性</text>
  </g>

  <!-- Tier 2 band -->
  <rect x="40" y="252" width="880" height="100" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="56" y="272" font-size="12" font-weight="700" fill="#92400e">训练时 · 改权重</text>

  <g font-size="12" fill="#1e293b">
    <text x="60"  y="300" font-weight="600">④ SFT</text>
    <text x="280" y="300" fill="#475569">输入 / 理想输出 配对，学模仿</text>
    <text x="540" y="300" fill="#475569">数据 + 多卡训练</text>
    <text x="740" y="300" fill="#94a3b8">★★★★ · 受数据质量约束</text>

    <text x="60"  y="325" font-weight="600">⑤ PEFT (LoRA/QLoRA)</text>
    <text x="280" y="325" fill="#475569">冻结基座，仅训低秩适配器</text>
    <text x="540" y="325" fill="#475569">单卡可跑 / 多适配器复用</text>
    <text x="740" y="325" fill="#94a3b8">★★★ · 上限低于全参</text>
  </g>

  <!-- Tier 3 band -->
  <rect x="40" y="364" width="880" height="130" rx="10" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="56" y="384" font-size="12" font-weight="700" fill="#6d28d9">对齐与强化 · 改权重 + 改奖励</text>

  <g font-size="12" fill="#1e293b">
    <text x="60"  y="412" font-weight="600">⑥ DPO</text>
    <text x="280" y="412" fill="#475569">偏好对 (preferred vs rejected)</text>
    <text x="540" y="412" fill="#475569">无需独立奖励模型</text>
    <text x="740" y="412" fill="#94a3b8">★★★★ · 适合主观质量</text>

    <text x="60"  y="437" font-weight="600">⑦ RLHF</text>
    <text x="280" y="437" fill="#475569">先训奖励模型，再 RL 微调</text>
    <text x="540" y="437" fill="#475569">极重 · 4 模型同时训</text>
    <text x="740" y="437" fill="#94a3b8">★★★★★ · 不稳定</text>

    <text x="60"  y="462" font-weight="600">⑧ RLVR</text>
    <text x="280" y="462" fill="#475569">写验证函数 → 确定性奖励</text>
    <text x="540" y="462" fill="#475569">需可验证任务 + 验证基础设施</text>
    <text x="740" y="462" fill="#94a3b8">★★★★★ · 推理上限突破口</text>

    <text x="60"  y="487" font-weight="600">⑨ GRPO</text>
    <text x="280" y="487" fill="#475569">采 N 个回答，组内归一化打分</text>
    <text x="540" y="487" fill="#475569">省去 critic · N 越大越稳</text>
    <text x="740" y="487" fill="#94a3b8">★★★★★ · 与 RLVR 天作之合</text>
  </g>
</svg>
