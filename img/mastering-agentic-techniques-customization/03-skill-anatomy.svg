<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="480" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Skill 解剖：从目录结构到一次调用</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">SKILL.md 是 Agent 的"领域说明书"，让模型在 Context 里就能学会一类任务</text>

  <!-- Left: directory tree -->
  <g filter="url(#sd)">
    <rect x="40" y="100" width="380" height="340" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
    <text x="60" y="124" font-size="13" font-weight="700" fill="#1e40af">Skill 目录结构</text>

    <g font-family="'SF Mono','Monaco','Consolas',monospace" font-size="12" fill="#1e293b">
      <text x="60"  y="155">skills/</text>
      <text x="76"  y="178">incident-triage/</text>
      <text x="96"  y="201">SKILL.md          <tspan fill="#3b82f6">← 入口</tspan></text>
      <text x="96"  y="222">README.md</text>
      <text x="96"  y="245">scripts/</text>
      <text x="116" y="266">collect_logs.sh</text>
      <text x="116" y="287">parse_logs.py</text>
      <text x="116" y="308">summarize_findings.py</text>
      <text x="96"  y="331">templates/</text>
      <text x="116" y="352">triage_report.md</text>
      <text x="96"  y="375">examples/</text>
      <text x="116" y="396">sample_incident.json</text>
    </g>

    <text x="60" y="425" font-size="11" fill="#64748b">原则：脚本 + 模板 + 范例自包含，不外泄到 Prompt</text>
  </g>

  <!-- Right: invocation flow -->
  <g>
    <text x="480" y="124" font-size="13" font-weight="700" fill="#6d28d9">Agent 调用 Skill 的 4 步</text>

    <!-- Step 1 -->
    <rect x="460" y="145" width="460" height="56" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#sd)"/>
    <text x="478" y="170" font-size="13" font-weight="700" fill="#1e40af">①</text>
    <text x="498" y="170" font-size="13" font-weight="600" fill="#1e293b">读取 SKILL.md</text>
    <text x="498" y="190" font-size="11" fill="#475569">解析 Purpose / When to Use / Inputs / Outputs / Workflow</text>

    <line x1="690" y1="201" x2="690" y2="217" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Step 2 -->
    <rect x="460" y="223" width="460" height="56" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#sd)"/>
    <text x="478" y="248" font-size="13" font-weight="700" fill="#1e40af">②</text>
    <text x="498" y="248" font-size="13" font-weight="600" fill="#1e293b">校验输入参数</text>
    <text x="498" y="268" font-size="11" fill="#475569">service_name · start_time · end_time（缺则反问用户）</text>

    <line x1="690" y1="279" x2="690" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Step 3 -->
    <rect x="460" y="301" width="460" height="56" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#sd)"/>
    <text x="478" y="326" font-size="13" font-weight="700" fill="#047857">③</text>
    <text x="498" y="326" font-size="13" font-weight="600" fill="#1e293b">按 Workflow 顺序执行脚本</text>
    <text x="498" y="346" font-size="11" fill="#475569">collect_logs.sh → parse_logs.py → summarize_findings.py</text>

    <line x1="690" y1="357" x2="690" y2="373" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Step 4 -->
    <rect x="460" y="379" width="460" height="56" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" filter="url(#sd)"/>
    <text x="478" y="404" font-size="13" font-weight="700" fill="#92400e">④</text>
    <text x="498" y="404" font-size="13" font-weight="600" fill="#1e293b">套模板生成报告</text>
    <text x="498" y="424" font-size="11" fill="#475569">triage_report.md → 输出 summary.md / events.jsonl</text>
  </g>
</svg>
