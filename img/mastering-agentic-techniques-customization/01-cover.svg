<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="380" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Agent 定制化的三梯度地图：从 Prompt 到 RLVR</text>
  <text x="480" y="64" text-anchor="middle" font-size="13" fill="#64748b">9 种技术按"改造深度"由浅入深排布，越往右改的越深、代价越高、上限也越高</text>

  <!-- Tier 1: Inference-time -->
  <g filter="url(#sd)">
    <rect x="40" y="110" width="280" height="220" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="180" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">推理时（Inference-time）</text>
    <text x="180" y="160" text-anchor="middle" font-size="11" fill="#475569">不动权重 · 改 Context</text>

    <rect x="60" y="180" width="240" height="36" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.2"/>
    <text x="180" y="203" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">① Prompt &amp; System Prompts</text>

    <rect x="60" y="222" width="240" height="36" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.2"/>
    <text x="180" y="245" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">② RAG（含 Agentic RAG）</text>

    <rect x="60" y="264" width="240" height="36" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.2"/>
    <text x="180" y="287" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">③ Tool &amp; Skill Injection</text>
  </g>

  <!-- Tier 2: Training-time -->
  <g filter="url(#sd)">
    <rect x="340" y="110" width="280" height="220" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="480" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">训练时（Training-time）</text>
    <text x="480" y="160" text-anchor="middle" font-size="11" fill="#475569">动权重 · 教模仿</text>

    <rect x="360" y="180" width="240" height="36" rx="8" fill="#ffffff" stroke="#fcd34d" stroke-width="1.2"/>
    <text x="480" y="203" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">④ SFT（监督微调）</text>

    <rect x="360" y="222" width="240" height="36" rx="8" fill="#ffffff" stroke="#fcd34d" stroke-width="1.2"/>
    <text x="480" y="245" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">⑤ PEFT：LoRA / QLoRA</text>

    <rect x="360" y="264" width="240" height="36" rx="8" fill="#ffffff" stroke="#fcd34d" stroke-width="1.2" stroke-dasharray="4,3"/>
    <text x="480" y="287" text-anchor="middle" font-size="11" fill="#94a3b8">（合成数据 SDG 作为前置加速器）</text>
  </g>

  <!-- Tier 3: Alignment / RL -->
  <g filter="url(#sd)">
    <rect x="640" y="110" width="280" height="220" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="780" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">对齐与强化（Alignment / RL）</text>
    <text x="780" y="160" text-anchor="middle" font-size="11" fill="#475569">动权重 · 教偏好与正确性</text>

    <rect x="660" y="180" width="240" height="36" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.2"/>
    <text x="780" y="203" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">⑥ DPO（偏好对）</text>

    <rect x="660" y="222" width="240" height="36" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.2"/>
    <text x="780" y="245" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">⑦ RLHF（人类反馈强化）</text>

    <rect x="660" y="264" width="240" height="36" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.2"/>
    <text x="780" y="287" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">⑧ RLVR  +  ⑨ GRPO</text>
  </g>

  <!-- arrows between tiers -->
  <line x1="320" y1="220" x2="338" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="220" x2="638" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bottom axis -->
  <text x="40" y="355" font-size="11" fill="#64748b">浅 · 改造深度 · 改 Prompt</text>
  <text x="920" y="355" text-anchor="end" font-size="11" fill="#64748b">深 · 改造深度 · 改权重 + 改奖励</text>
  <line x1="40" y1="362" x2="920" y2="362" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
