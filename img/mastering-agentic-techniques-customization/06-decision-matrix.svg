<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="500" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">三轴选型决策矩阵</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">任务可验证性 × 资源预算 × 项目成熟度，每个象限给出推荐技术组合</text>

  <!-- Axis labels -->
  <text x="40" y="100" font-size="13" font-weight="700" fill="#475569">任务可验证性 →</text>
  <text x="700" y="100" text-anchor="end" font-size="11" fill="#94a3b8">主观（tone, style）</text>
  <text x="900" y="100" text-anchor="end" font-size="11" fill="#94a3b8">客观（JSON / 代码 / 测试）</text>

  <!-- 4 quadrants -->
  <g>
    <!-- Q1: Early + Subjective -->
    <rect x="40" y="120" width="430" height="170" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#sd)"/>
    <rect x="40" y="120" width="6" height="170" fill="#3b82f6"/>
    <text x="60" y="146" font-size="13" font-weight="700" fill="#1e40af">象限 A · 早期 / 主观</text>
    <text x="60" y="166" font-size="11" fill="#64748b">资源：少量 GPU 或仅 API · 评测：尚未沉淀</text>
    <line x1="60" y1="178" x2="450" y2="178" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="202" font-size="13" font-weight="600" fill="#1e293b">推荐组合</text>
    <text x="60" y="222" font-size="12" fill="#475569">①Prompt + ③Tool/Skill + ②RAG</text>
    <text x="60" y="242" font-size="13" font-weight="600" fill="#1e293b">下一步</text>
    <text x="60" y="262" font-size="12" fill="#475569">先把"评测集 + Trajectory 日志"</text>
    <text x="60" y="278" font-size="12" fill="#475569">建起来，再考虑训练。</text>

    <!-- Q2: Early + Objective -->
    <rect x="490" y="120" width="430" height="170" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#sd)"/>
    <rect x="490" y="120" width="6" height="170" fill="#10b981"/>
    <text x="510" y="146" font-size="13" font-weight="700" fill="#047857">象限 B · 早期 / 可验证</text>
    <text x="510" y="166" font-size="11" fill="#64748b">资源：少量 GPU · 任务：能写验证函数</text>
    <line x1="510" y1="178" x2="900" y2="178" stroke="#e2e8f0" stroke-width="1"/>
    <text x="510" y="202" font-size="13" font-weight="600" fill="#1e293b">推荐组合</text>
    <text x="510" y="222" font-size="12" fill="#475569">①Prompt + ③Tool + 写好 Verifier</text>
    <text x="510" y="242" font-size="13" font-weight="600" fill="#1e293b">下一步</text>
    <text x="510" y="262" font-size="12" fill="#475569">先用 Verifier 跑离线评测，</text>
    <text x="510" y="278" font-size="12" fill="#475569">为未来 ⑧RLVR 蓄势。</text>

    <!-- Q3: Mature + Subjective -->
    <rect x="40" y="310" width="430" height="170" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#sd)"/>
    <rect x="40" y="310" width="6" height="170" fill="#8b5cf6"/>
    <text x="60" y="336" font-size="13" font-weight="700" fill="#6d28d9">象限 C · 成熟 / 主观</text>
    <text x="60" y="356" font-size="11" fill="#64748b">资源：单/多卡 · 标注：可拿到偏好对</text>
    <line x1="60" y1="368" x2="450" y2="368" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="392" font-size="13" font-weight="600" fill="#1e293b">推荐组合</text>
    <text x="60" y="412" font-size="12" fill="#475569">⑤LoRA-SFT  →  ⑥DPO</text>
    <text x="60" y="432" font-size="13" font-weight="600" fill="#1e293b">下一步</text>
    <text x="60" y="452" font-size="12" fill="#475569">用 LLM-as-judge 生成弱标 + 抽样</text>
    <text x="60" y="468" font-size="12" fill="#475569">人审，避免奖励黑客。</text>

    <!-- Q4: Mature + Objective -->
    <rect x="490" y="310" width="430" height="170" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#sd)"/>
    <rect x="490" y="310" width="6" height="170" fill="#ef4444"/>
    <text x="510" y="336" font-size="13" font-weight="700" fill="#b91c1c">象限 D · 成熟 / 可验证</text>
    <text x="510" y="356" font-size="11" fill="#64748b">资源：多卡 · 任务：可量化正确性</text>
    <line x1="510" y1="368" x2="900" y2="368" stroke="#e2e8f0" stroke-width="1"/>
    <text x="510" y="392" font-size="13" font-weight="600" fill="#1e293b">推荐组合</text>
    <text x="510" y="412" font-size="12" fill="#475569">⑤LoRA-SFT  →  ⑥DPO  →  ⑧RLVR + ⑨GRPO</text>
    <text x="510" y="432" font-size="13" font-weight="600" fill="#1e293b">下一步</text>
    <text x="510" y="452" font-size="12" fill="#475569">把 Verifier 接 NeMo Gym，</text>
    <text x="510" y="468" font-size="12" fill="#475569">小心调 GRPO 组大小与 KL 系数。</text>
  </g>

  <!-- Y axis label outside -->
  <text x="20" y="200" font-size="13" font-weight="700" fill="#475569" transform="rotate(-90 20 200)">项目成熟度 ←  早期 / 成熟  →</text>
</svg>
