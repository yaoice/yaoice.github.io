<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="400" fill="url(#bg)" rx="14"/>
  <rect width="900" height="400" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">AI SKILL · FUTURE EVOLUTION</text>

  <!-- 坐标 -->
  <line x1="60" y1="310" x2="860" y2="310" stroke="#3a4670" stroke-width="1"/>
  <line x1="60" y1="310" x2="60" y2="90" stroke="#3a4670" stroke-width="1"/>
  <text x="50" y="85" text-anchor="end" fill="#8aa4c8" font-size="10" font-family="monospace">capability</text>
  <text x="870" y="325" fill="#8aa4c8" font-size="10" font-family="monospace">time</text>

  <!-- 指数曲线 -->
  <path d="M 90 295 Q 260 285 360 255 Q 480 210 600 160 Q 720 115 830 85" fill="none" stroke="#7dd3fc" stroke-width="2.5" stroke-dasharray="5 3" filter="url(#glow)"/>

  <g filter="url(#glow)" font-size="11">
    <circle cx="130" cy="290" r="10" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="80" y="215" width="140" height="62" rx="6" fill="#101b33" stroke="#7dd3fc" stroke-width="1"/>
    <text x="150" y="238" text-anchor="middle" fill="#7dd3fc" font-weight="bold">2024</text>
    <text x="150" y="256" text-anchor="middle" fill="#dbeafe" font-size="10">single-skill</text>
    <text x="150" y="272" text-anchor="middle" fill="#dbeafe" font-size="10">toolification</text>

    <circle cx="290" cy="275" r="13" fill="#2d2410" stroke="#fbbf24" stroke-width="2"/>
    <rect x="240" y="180" width="150" height="62" rx="6" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="315" y="202" text-anchor="middle" fill="#fbbf24" font-weight="bold">2025 · CURRENT</text>
    <text x="315" y="220" text-anchor="middle" fill="#ffdc70" font-size="10">cross-tool spec</text>
    <text x="315" y="236" text-anchor="middle" fill="#ffdc70" font-size="10">MiniMax Skills</text>

    <circle cx="470" cy="225" r="11" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <rect x="420" y="135" width="150" height="62" rx="6" fill="#102921" stroke="#6ee7b7" stroke-width="1"/>
    <text x="495" y="158" text-anchor="middle" fill="#6ee7b7" font-weight="bold">2026</text>
    <text x="495" y="176" text-anchor="middle" fill="#dcfce7" font-size="10">skill marketplace</text>
    <text x="495" y="192" text-anchor="middle" fill="#dcfce7" font-size="10">tradable asset</text>

    <circle cx="660" cy="160" r="11" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <rect x="600" y="90" width="150" height="52" rx="6" fill="#1d1832" stroke="#8338ec" stroke-width="1"/>
    <text x="675" y="110" text-anchor="middle" fill="#a78bfa" font-weight="bold">2027</text>
    <text x="675" y="128" text-anchor="middle" fill="#e5d4ff" font-size="10">self-evolving</text>

    <circle cx="820" cy="95" r="11" fill="#281629" stroke="#f472b6" stroke-width="2"/>
    <text x="820" y="75" text-anchor="middle" fill="#f9a8d4" font-weight="bold" font-size="13">2028+</text>
    <text x="820" y="50" text-anchor="middle" fill="#f9a8d4" font-weight="bold" font-size="12">◆ COMPOSE AI ◆</text>
  </g>

  <g fill="#8aa4c8" font-size="10" font-family="monospace" text-anchor="middle">
    <text x="130" y="335">2024</text>
    <text x="290" y="335">2025</text>
    <text x="470" y="335">2026</text>
    <text x="660" y="335">2027</text>
    <text x="820" y="335">2028+</text>
  </g>

  <text x="450" y="380" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">methodology depth × ecosystem × cross-tool compat = next-gen competition</text>
</svg>
