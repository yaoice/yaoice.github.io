<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#11213f"/>
      <stop offset="55%" stop-color="#0b1730"/>
      <stop offset="100%" stop-color="#08111f"/>
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#13243f"/>
      <stop offset="100%" stop-color="#0d1a31"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#020817" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="960" height="520" rx="18" fill="url(#bg)"/>
  <rect width="960" height="520" rx="18" fill="url(#grid)" opacity="0.22"/>
  <rect x="18" y="18" width="924" height="484" rx="14" fill="none" stroke="#29476f" stroke-width="1" opacity="0.85"/>

  <!-- Header -->
  <text x="40" y="52" fill="#8fb3da" font-size="11" letter-spacing="3">STRUCTURED AGENT SKILLS / PROJECT MAP</text>
  <text x="40" y="90" fill="#f4fbff" font-size="24" font-weight="700" letter-spacing="1.2">MiniMax Skills · Project Overview</text>
  <text x="40" y="114" fill="#8aa4c8" font-size="12">11 个 Skill 被组织为三大能力域，并通过统一规范实现跨工具可组合性</text>

  <!-- Top-right stat -->
  <g>
    <rect x="780" y="44" width="140" height="66" rx="12" fill="#0c1b34" stroke="#2b456c" stroke-width="1"/>
    <text x="850" y="68" text-anchor="middle" fill="#8fb3da" font-size="10" letter-spacing="2">TOTAL SKILLS</text>
    <text x="850" y="96" text-anchor="middle" fill="#f4fbff" font-size="22" font-weight="700">11</text>
  </g>

  <!-- Card 1: APP DEVELOPMENT -->
  <g filter="url(#shadow)">
    <rect x="40" y="148" width="280" height="240" rx="14" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.4"/>
    <rect x="40" y="148" width="280" height="4" rx="2" fill="#7dd3fc"/>
  </g>
  <g>
    <circle cx="62" cy="182" r="5" fill="#7dd3fc"/>
    <text x="76" y="186" fill="#7dd3fc" font-size="13" font-weight="700" letter-spacing="1.2">APP DEVELOPMENT</text>
    <text x="300" y="186" text-anchor="end" fill="#8aa4c8" font-size="11" font-family="monospace">5 skills</text>
    <line x1="56" y1="202" x2="304" y2="202" stroke="#1f3559" stroke-width="1"/>

    <text x="56" y="230" fill="#dbeafe" font-size="12" font-family="monospace">› frontend-dev</text>
    <text x="56" y="252" fill="#dbeafe" font-size="12" font-family="monospace">› fullstack-dev</text>
    <text x="56" y="274" fill="#dbeafe" font-size="12" font-family="monospace">› android-native-dev</text>
    <text x="56" y="296" fill="#dbeafe" font-size="12" font-family="monospace">› ios-application-dev</text>
    <text x="56" y="318" fill="#dbeafe" font-size="12" font-family="monospace">› shader-dev</text>

    <rect x="56" y="334" width="248" height="40" rx="8" fill="#0b1930" stroke="#1f3559" stroke-width="1"/>
    <text x="68" y="351" fill="#8fb3da" font-size="10" font-weight="700" letter-spacing="1.5">OUTPUT</text>
    <text x="68" y="366" fill="#b7cde5" font-size="10.5">可运行应用 · 架构骨架 · 工程规范</text>
  </g>

  <!-- Card 2: DOCUMENT GENERATION -->
  <g filter="url(#shadow)">
    <rect x="340" y="148" width="280" height="240" rx="14" fill="url(#panel)" stroke="#6ee7b7" stroke-width="1.4"/>
    <rect x="340" y="148" width="280" height="4" rx="2" fill="#6ee7b7"/>
  </g>
  <g>
    <circle cx="362" cy="182" r="5" fill="#6ee7b7"/>
    <text x="376" y="186" fill="#6ee7b7" font-size="13" font-weight="700" letter-spacing="1.2">DOCUMENT GENERATION</text>
    <text x="600" y="186" text-anchor="end" fill="#9ad0b7" font-size="11" font-family="monospace">4 skills</text>
    <line x1="356" y1="202" x2="604" y2="202" stroke="#1f3559" stroke-width="1"/>

    <text x="356" y="234" fill="#dcfce7" font-size="12" font-family="monospace">› minimax-pdf</text>
    <text x="356" y="260" fill="#dcfce7" font-size="12" font-family="monospace">› minimax-docx</text>
    <text x="356" y="286" fill="#dcfce7" font-size="12" font-family="monospace">› minimax-xlsx</text>
    <text x="356" y="312" fill="#dcfce7" font-size="12" font-family="monospace">› pptx-generator</text>

    <rect x="356" y="334" width="248" height="40" rx="8" fill="#0b1930" stroke="#1f3559" stroke-width="1"/>
    <text x="368" y="351" fill="#9ad0b7" font-size="10" font-weight="700" letter-spacing="1.5">OUTPUT</text>
    <text x="368" y="366" fill="#b7cde5" font-size="10.5">结构化文档 · OpenXML 产物 · 表格与演示</text>
  </g>

  <!-- Card 3: CONTENT CREATION -->
  <g filter="url(#shadow)">
    <rect x="640" y="148" width="280" height="240" rx="14" fill="url(#panel)" stroke="#f9a8d4" stroke-width="1.4"/>
    <rect x="640" y="148" width="280" height="4" rx="2" fill="#f9a8d4"/>
  </g>
  <g>
    <circle cx="662" cy="182" r="5" fill="#f9a8d4"/>
    <text x="676" y="186" fill="#f9a8d4" font-size="13" font-weight="700" letter-spacing="1.2">CONTENT CREATION</text>
    <text x="900" y="186" text-anchor="end" fill="#d6a6c2" font-size="11" font-family="monospace">2 skills</text>
    <line x1="656" y1="202" x2="904" y2="202" stroke="#1f3559" stroke-width="1"/>

    <text x="656" y="236" fill="#fde7f3" font-size="12" font-family="monospace">› gif-sticker-maker</text>
    <text x="656" y="262" fill="#fde7f3" font-size="12" font-family="monospace">› minimax-multimodal-toolkit</text>

    <rect x="656" y="334" width="248" height="40" rx="8" fill="#0b1930" stroke="#1f3559" stroke-width="1"/>
    <text x="668" y="351" fill="#d6a6c2" font-size="10" font-weight="700" letter-spacing="1.5">OUTPUT</text>
    <text x="668" y="366" fill="#b7cde5" font-size="10.5">动图 · 媒体资产 · 跨模态工作流</text>
  </g>

  <!-- Shared contract bar -->
  <g filter="url(#shadow)">
    <rect x="40" y="412" width="880" height="76" rx="14" fill="#0d1830" stroke="#a78bfa" stroke-width="1.2"/>
  </g>
  <g>
    <circle cx="66" cy="440" r="6" fill="#a78bfa"/>
    <text x="82" y="444" fill="#c7b3ff" font-size="12" font-weight="700" letter-spacing="2">SHARED CONTRACT · SKILL.md</text>
    <line x1="320" y1="432" x2="320" y2="470" stroke="#2b2a5e" stroke-width="1"/>
    <text x="340" y="440" fill="#e9ddff" font-size="11" font-family="monospace">Workflow · Rules · Scripts · Quality Gates · Tool Routing</text>
    <text x="340" y="460" fill="#8aa4c8" font-size="10.5">所有类别共享统一元规范，这是 Skill 可复用、可迁移、可治理的根基</text>
  </g>
</svg>
