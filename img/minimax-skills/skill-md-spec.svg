<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="440" fill="url(#bg)" rx="14"/>
  <rect width="900" height="440" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">SKILL.md SPEC · 7 ELEMENTS</text>

  <g filter="url(#glow)" font-size="11">
    <rect x="40" y="85" width="175" height="105" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="128" y="108" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="bold">① metadata</text>
    <text x="128" y="130" text-anchor="middle" fill="#fde7f3" font-family="monospace">name · version</text>
    <text x="128" y="148" text-anchor="middle" fill="#fde7f3" font-family="monospace">category</text>
    <text x="128" y="172" text-anchor="middle" fill="#d6a6c2" font-size="10">可观测 · 可灰度</text>

    <rect x="230" y="85" width="175" height="105" rx="8" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="318" y="108" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="bold">② description</text>
    <text x="318" y="130" text-anchor="middle" fill="#dbeafe" font-family="monospace">trigger</text>
    <text x="318" y="148" text-anchor="middle" fill="#dbeafe" font-family="monospace">functionality</text>
    <text x="318" y="172" text-anchor="middle" fill="#8aa4c8" font-size="10">路由匹配依据</text>

    <rect x="420" y="85" width="175" height="105" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="508" y="108" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold">③ Workflow</text>
    <text x="508" y="130" text-anchor="middle" fill="#dcfce7" font-family="monospace">Phase / Step</text>
    <text x="508" y="148" text-anchor="middle" fill="#dcfce7" font-family="monospace">mandatory</text>
    <text x="508" y="172" text-anchor="middle" fill="#9ad0b7" font-size="10">过程一致性</text>

    <rect x="610" y="85" width="175" height="105" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="698" y="108" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="bold">④ Rules</text>
    <text x="698" y="130" text-anchor="middle" fill="#fde7f3" font-family="monospace">iron rules</text>
    <text x="698" y="148" text-anchor="middle" fill="#fde7f3" font-family="monospace">non-negotiable</text>
    <text x="698" y="172" text-anchor="middle" fill="#d6a6c2" font-size="10">防止反模式</text>

    <rect x="40" y="215" width="235" height="100" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="158" y="238" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">⑤ Scripts</text>
    <text x="158" y="260" text-anchor="middle" fill="#ffdc70" font-family="monospace">executable toolbox</text>
    <text x="158" y="278" text-anchor="middle" fill="#ffdc70" font-family="monospace">Python · Node · Bash</text>
    <text x="158" y="300" text-anchor="middle" fill="#c49a3f" font-size="10" font-weight="bold">能力实现</text>

    <rect x="290" y="215" width="235" height="100" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="408" y="238" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">⑥ References</text>
    <text x="408" y="260" text-anchor="middle" fill="#e5d4ff" font-family="monospace">lazy-loaded docs</text>
    <text x="408" y="278" text-anchor="middle" fill="#e5d4ff" font-family="monospace">references/</text>
    <text x="408" y="300" text-anchor="middle" fill="#9d7ab3" font-size="10">避免上下文污染</text>

    <rect x="540" y="215" width="320" height="100" rx="8" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <text x="700" y="238" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="bold">⑦ Quality Gates</text>
    <text x="700" y="260" text-anchor="middle" fill="#dbeafe" font-family="monospace">pre-delivery checklist</text>
    <text x="700" y="278" text-anchor="middle" fill="#dbeafe" font-family="monospace">build · visual · business</text>
    <text x="700" y="300" text-anchor="middle" fill="#8aa4c8" font-size="10" font-weight="bold">质量审计的最终关卡</text>
  </g>

  <g stroke-width="1.5" fill="none" filter="url(#glow)">
    <line x1="215" y1="135" x2="228" y2="135" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="405" y1="135" x2="418" y2="135" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="595" y1="135" x2="608" y2="135" stroke="#7dd3fc" marker-end="url(#arr)"/>
  </g>

  <text x="450" y="380" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold" letter-spacing="2">从触发条件到质量门禁，构成 Agent 行为的完整契约闭环</text>
  <text x="450" y="404" text-anchor="middle" fill="#8aa4c8" font-size="10" font-family="monospace">declarative spec → Agent has deterministic path for any user request</text>
</svg>
