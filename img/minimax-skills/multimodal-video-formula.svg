<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="320" fill="url(#bg)" rx="14"/>
  <rect width="900" height="320" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">VIDEO PROMPT · 5-ELEMENT FORMULA</text>

  <g filter="url(#glow)" font-size="12">
    <rect x="30" y="95" width="160" height="70" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="110" y="120" text-anchor="middle" fill="#f9a8d4" font-weight="bold">SUBJECT</text>
    <text x="110" y="145" text-anchor="middle" fill="#fde7f3" font-family="monospace" font-size="11">一只金毛犬</text>

    <rect x="210" y="95" width="160" height="70" rx="8" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="290" y="120" text-anchor="middle" fill="#7dd3fc" font-weight="bold">+ SCENE</text>
    <text x="290" y="145" text-anchor="middle" fill="#dbeafe" font-family="monospace" font-size="11">秋天公园草地</text>

    <rect x="390" y="95" width="160" height="70" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="470" y="120" text-anchor="middle" fill="#6ee7b7" font-weight="bold">+ ACTION</text>
    <text x="470" y="145" text-anchor="middle" fill="#dcfce7" font-family="monospace" font-size="11">奔跑追逐落叶</text>

    <rect x="570" y="95" width="160" height="70" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="650" y="120" text-anchor="middle" fill="#fbbf24" font-weight="bold">+ CAMERA</text>
    <text x="650" y="145" text-anchor="middle" fill="#ffdc70" font-family="monospace" font-size="10">[跟随]平稳跟随</text>

    <rect x="750" y="95" width="120" height="70" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="810" y="120" text-anchor="middle" fill="#a78bfa" font-weight="bold">+ MOOD</text>
    <text x="810" y="145" text-anchor="middle" fill="#e5d4ff" font-family="monospace" font-size="10">暖色调阳光</text>
  </g>

  <g stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="190" y1="130" x2="208" y2="130" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="370" y1="130" x2="388" y2="130" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="550" y1="130" x2="568" y2="130" stroke="#fbbf24" marker-end="url(#arr)"/>
    <line x1="730" y1="130" x2="748" y2="130" stroke="#8338ec" marker-end="url(#arr)"/>
  </g>

  <rect x="60" y="200" width="780" height="70" rx="10" fill="#0c162c" stroke="#7dd3fc" stroke-width="2" filter="url(#glow)"/>
  <text x="80" y="223" fill="#fbbf24" font-size="12" font-weight="bold">✓ ASSEMBLED PROMPT:</text>
  <text x="80" y="248" fill="#f4fbff" font-size="12" font-family="monospace">一只金毛犬, 在秋天的公园草地上, 奔跑追逐落叶, [跟随]镜头平稳跟随, 暖色调阳光氛围</text>

  <text x="450" y="300" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">prompt engineering: alchemy → craft · fill slots in order, no key info missed</text>
</svg>
