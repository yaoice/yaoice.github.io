<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="480" fill="url(#bg)" rx="14"/>
  <rect width="900" height="480" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">FULLSTACK · 7 IRON RULES</text>

  <g filter="url(#glow)">
    <circle cx="450" cy="240" r="58" fill="#281629" stroke="#f472b6" stroke-width="2"/>
    <text x="450" y="236" text-anchor="middle" fill="#f9a8d4" font-size="14" font-weight="bold">IRON RULES</text>
    <text x="450" y="255" text-anchor="middle" fill="#d6a6c2" font-size="10" font-family="monospace">7 · non-negotiable</text>
  </g>

  <g filter="url(#glow)" font-size="11">
    <rect x="40" y="85" width="220" height="80" rx="8" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="150" y="110" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="bold">① FEATURE-FIRST</text>
    <text x="150" y="130" text-anchor="middle" fill="#dbeafe" font-family="monospace">orders/ users/</text>
    <text x="150" y="150" text-anchor="middle" fill="#8aa4c8" font-size="10">而非按技术层</text>

    <rect x="640" y="85" width="220" height="80" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="750" y="110" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">② CONTROLLER = ZERO BIZ</text>
    <text x="750" y="130" text-anchor="middle" fill="#e5d4ff" font-family="monospace">parse · validate · route</text>
    <text x="750" y="150" text-anchor="middle" fill="#9d7ab3" font-size="10">禁止业务逻辑</text>

    <rect x="40" y="175" width="220" height="80" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="150" y="200" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold">③ SERVICE PURE</text>
    <text x="150" y="220" text-anchor="middle" fill="#dcfce7" font-family="monospace">no HTTP types</text>
    <text x="150" y="240" text-anchor="middle" fill="#9ad0b7" font-size="10">与传输层解耦</text>

    <rect x="640" y="175" width="220" height="80" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="750" y="200" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">④ ENV CONFIG</text>
    <text x="750" y="220" text-anchor="middle" fill="#ffdc70" font-family="monospace">process.env.*</text>
    <text x="750" y="240" text-anchor="middle" fill="#c49a3f" font-size="10">禁用硬编码</text>

    <rect x="40" y="265" width="220" height="80" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="150" y="290" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="bold">⑤ TYPED ERRORS</text>
    <text x="150" y="310" text-anchor="middle" fill="#fde7f3" font-family="monospace">AppError · code · log</text>
    <text x="150" y="330" text-anchor="middle" fill="#d6a6c2" font-size="10">统一响应格式</text>

    <rect x="640" y="265" width="220" height="80" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="750" y="290" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">⑥ BOUNDARY VALIDATE</text>
    <text x="750" y="310" text-anchor="middle" fill="#e5d4ff" font-family="monospace">zod / valibot</text>
    <text x="750" y="330" text-anchor="middle" fill="#9d7ab3" font-size="10">脏数据不进业务层</text>

    <rect x="340" y="355" width="220" height="80" rx="8" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <text x="450" y="380" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="bold">⑦ STRUCTURED LOGS</text>
    <text x="450" y="400" text-anchor="middle" fill="#dbeafe" font-family="monospace">JSON + requestId</text>
    <text x="450" y="420" text-anchor="middle" fill="#ffd166" font-size="10">禁用 console.log</text>
  </g>

  <g stroke="#555" stroke-width="1" stroke-dasharray="3 3" opacity="0.6">
    <line x1="260" y1="125" x2="400" y2="215"/>
    <line x1="640" y1="125" x2="500" y2="215"/>
    <line x1="260" y1="215" x2="395" y2="240"/>
    <line x1="640" y1="215" x2="505" y2="240"/>
    <line x1="260" y1="305" x2="400" y2="265"/>
    <line x1="640" y1="305" x2="500" y2="265"/>
    <line x1="450" y1="355" x2="450" y2="298"/>
  </g>
</svg>
