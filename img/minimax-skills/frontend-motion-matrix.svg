<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="460" fill="url(#bg)" rx="14"/>
  <rect width="900" height="460" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">MOTION ENGINE · SELECTION MATRIX</text>

  <g filter="url(#glow)">
    <rect x="50" y="75" width="370" height="34" rx="4" fill="#1d1832" stroke="#8338ec"/>
    <text x="235" y="97" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">SCENARIO · 需求场景</text>
    <rect x="440" y="75" width="410" height="34" rx="4" fill="#1d1832" stroke="#8338ec"/>
    <text x="645" y="97" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">MANDATORY TOOL · 强制使用</text>
  </g>

  <g filter="url(#glow)" font-size="12" font-family="monospace">
    <rect x="50" y="118" width="370" height="34" rx="4" fill="#101b33" stroke="#7dd3fc" stroke-width="0.8"/><text x="235" y="140" text-anchor="middle" fill="#dbeafe">UI enter / exit / layout</text>
    <rect x="440" y="118" width="410" height="34" rx="4" fill="#281629" stroke="#f472b6"/><text x="645" y="140" text-anchor="middle" fill="#f9a8d4">Framer Motion</text>

    <rect x="50" y="158" width="370" height="34" rx="4" fill="#101b33" stroke="#7dd3fc" stroke-width="0.8"/><text x="235" y="180" text-anchor="middle" fill="#dbeafe">scroll storytelling</text>
    <rect x="440" y="158" width="410" height="34" rx="4" fill="#102921" stroke="#6ee7b7"/><text x="645" y="180" text-anchor="middle" fill="#6ee7b7">GSAP + ScrollTrigger</text>

    <rect x="50" y="198" width="370" height="34" rx="4" fill="#101b33" stroke="#7dd3fc" stroke-width="0.8"/><text x="235" y="220" text-anchor="middle" fill="#dbeafe">looping icon animation</text>
    <rect x="440" y="198" width="410" height="34" rx="4" fill="#2d2410" stroke="#fbbf24"/><text x="645" y="220" text-anchor="middle" fill="#fbbf24">Lottie</text>

    <rect x="50" y="238" width="370" height="34" rx="4" fill="#101b33" stroke="#7dd3fc" stroke-width="0.8"/><text x="235" y="260" text-anchor="middle" fill="#dbeafe">3D / WebGL</text>
    <rect x="440" y="238" width="410" height="34" rx="4" fill="#281629" stroke="#f472b6"/><text x="645" y="260" text-anchor="middle" fill="#f9a8d4">Three.js / R3F</text>

    <rect x="50" y="278" width="370" height="34" rx="4" fill="#101b33" stroke="#7dd3fc" stroke-width="0.8"/><text x="235" y="300" text-anchor="middle" fill="#dbeafe">hover / focus micro-interaction</text>
    <rect x="440" y="278" width="410" height="34" rx="4" fill="#1d1832" stroke="#8338ec"/><text x="645" y="300" text-anchor="middle" fill="#a78bfa">pure CSS</text>
  </g>

  <rect x="50" y="340" width="800" height="95" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="70" y="363" fill="#f9a8d4" font-size="13" font-weight="bold">⚠️ CONFLICT RULES · 硬约束</text>
  <g font-size="11" fill="#fde7f3" font-family="monospace">
    <text x="70" y="385">› no mixing GSAP &amp; Framer Motion in the same component</text>
    <text x="70" y="405">› R3F must be isolated inside a dedicated &lt;Canvas&gt; wrapper</text>
    <text x="70" y="425">› heavy libs (GSAP/Three.js/Lottie) MUST be dynamic import()</text>
  </g>
</svg>
