<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="360" fill="url(#bg)" rx="14"/>
  <rect width="900" height="360" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">SHADER ROUTING · CORE + ADDONS</text>

  <rect x="40" y="75" width="820" height="50" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5" filter="url(#glow)"/>
  <text x="60" y="95" fill="#a78bfa" font-size="11" font-weight="bold">USER REQUEST:</text>
  <text x="60" y="114" fill="#e5d4ff" font-size="12" font-family="monospace">"create a ray-marched SDF scene with soft shadows"</text>

  <g filter="url(#glow)">
    <rect x="370" y="150" width="160" height="50" rx="25" fill="#281629" stroke="#f472b6" stroke-width="2"/>
    <text x="450" y="180" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">⚡ ROUTER</text>
  </g>

  <g filter="url(#glow)" font-size="12" font-family="monospace">
    <rect x="40" y="230" width="400" height="90" rx="10" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="60" y="253" fill="#6ee7b7" font-weight="bold">CORE · 主技术</text>
    <rect x="60" y="265" width="170" height="28" rx="4" fill="#0f2920" stroke="#6ee7b7"/>
    <text x="145" y="284" text-anchor="middle" fill="#6ee7b7">ray-marching</text>
    <rect x="250" y="265" width="170" height="28" rx="4" fill="#0f2920" stroke="#6ee7b7"/>
    <text x="335" y="284" text-anchor="middle" fill="#6ee7b7">sdf-3d</text>

    <rect x="460" y="230" width="400" height="90" rx="10" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="480" y="253" fill="#7dd3fc" font-weight="bold">ADDONS · 组合技术</text>
    <rect x="480" y="265" width="170" height="28" rx="4" fill="#0c162c" stroke="#7dd3fc"/>
    <text x="565" y="284" text-anchor="middle" fill="#7dd3fc">lighting-model</text>
    <rect x="670" y="265" width="170" height="28" rx="4" fill="#0c162c" stroke="#7dd3fc"/>
    <text x="755" y="284" text-anchor="middle" fill="#7dd3fc">shadow-techniques</text>
  </g>

  <g stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="450" y1="125" x2="450" y2="148" stroke="#8338ec" marker-end="url(#arr)"/>
    <line x1="420" y1="200" x2="200" y2="228" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="480" y1="200" x2="660" y2="228" stroke="#7dd3fc" marker-end="url(#arr)"/>
  </g>

  <text x="450" y="345" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">vague request → explicit tech stack composition</text>
</svg>
