<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="440" fill="url(#bg)" rx="14"/>
  <rect width="900" height="440" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">DOCX · 3 PROCESSING PIPELINES</text>

  <g filter="url(#glow)">
    <rect x="340" y="80" width="220" height="50" rx="25" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <text x="450" y="110" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">⚡ TASK ROUTER</text>
  </g>

  <g filter="url(#glow)" font-size="11">
    <rect x="30" y="180" width="260" height="210" rx="10" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="30" y="180" width="260" height="40" rx="10" fill="#7dd3fc" opacity="0.15"/>
    <text x="160" y="207" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">A · CREATE</text>
    <text x="160" y="240" text-anchor="middle" fill="#fbbf24" font-size="10">trigger: no input file</text>
    <g font-family="monospace" fill="#dbeafe">
      <text x="50" y="270">› draft new doc</text>
      <text x="50" y="292">› build structure (SDK)</text>
      <text x="50" y="314">› apply template styles</text>
      <text x="50" y="336">› gen title / body / footer</text>
    </g>
    <text x="160" y="370" text-anchor="middle" fill="#6ee7b7" font-size="10">→ validate</text>

    <rect x="320" y="180" width="260" height="210" rx="10" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <rect x="320" y="180" width="260" height="40" rx="10" fill="#6ee7b7" opacity="0.15"/>
    <text x="450" y="207" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">B · FILL-EDIT</text>
    <text x="450" y="240" text-anchor="middle" fill="#fbbf24" font-size="10">trigger: input + fill task</text>
    <g font-family="monospace" fill="#dcfce7">
      <text x="340" y="270">› detect placeholders</text>
      <text x="340" y="292">› replace {{key}}</text>
      <text x="340" y="314">› preserve styles</text>
      <text x="340" y="336">› support loop rows</text>
    </g>
    <text x="450" y="370" text-anchor="middle" fill="#6ee7b7" font-size="10">→ validate</text>

    <rect x="610" y="180" width="260" height="210" rx="10" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <rect x="610" y="180" width="260" height="40" rx="10" fill="#f472b6" opacity="0.15"/>
    <text x="740" y="207" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">C · FORMAT-APPLY</text>
    <text x="740" y="240" text-anchor="middle" fill="#fbbf24" font-size="10">trigger: input + format task</text>
    <rect x="630" y="250" width="220" height="55" rx="5" fill="#0a0e27" stroke="#f472b6" stroke-width="0.8"/>
    <text x="740" y="270" text-anchor="middle" fill="#f9a8d4" font-weight="bold">C-1 Overlay</text>
    <text x="740" y="290" text-anchor="middle" fill="#fde7f3" font-size="10">style-only coverage</text>
    <rect x="630" y="315" width="220" height="55" rx="5" fill="#0a0e27" stroke="#f472b6" stroke-width="0.8"/>
    <text x="740" y="335" text-anchor="middle" fill="#f9a8d4" font-weight="bold">C-2 Base-Replace</text>
    <text x="740" y="355" text-anchor="middle" fill="#fde7f3" font-size="10">template + content</text>
  </g>

  <g stroke-width="1.5" fill="none" filter="url(#glow)">
    <line x1="400" y1="130" x2="160" y2="178" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="450" y1="130" x2="450" y2="178" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="500" y1="130" x2="740" y2="178" stroke="#f472b6" marker-end="url(#arr)"/>
  </g>

  <text x="450" y="420" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">all pipelines end with validate · ensures OpenXML conformance</text>
</svg>
