<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="400" fill="url(#bg)" rx="14"/>
  <rect width="900" height="400" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">XLSX · 5-TASK ROUTING TABLE</text>

  <g filter="url(#glow)" font-size="12">
    <rect x="40" y="80" width="120" height="40" rx="5" fill="#1d1832" stroke="#8338ec"/>
    <text x="100" y="105" text-anchor="middle" fill="#a78bfa" font-weight="bold">TASK</text>
    <rect x="170" y="80" width="240" height="40" rx="5" fill="#1d1832" stroke="#8338ec"/>
    <text x="290" y="105" text-anchor="middle" fill="#a78bfa" font-weight="bold">METHOD</text>
    <rect x="420" y="80" width="440" height="40" rx="5" fill="#1d1832" stroke="#8338ec"/>
    <text x="640" y="105" text-anchor="middle" fill="#a78bfa" font-weight="bold">TOOLCHAIN</text>
  </g>

  <g font-size="12" font-family="monospace">
    <rect x="40" y="130" width="120" height="40" rx="5" fill="#101b33" stroke="#7dd3fc"/><text x="100" y="155" text-anchor="middle" fill="#7dd3fc" font-weight="bold">READ</text>
    <rect x="170" y="130" width="240" height="40" rx="5" fill="#0a0e27" stroke="#21385d"/><text x="290" y="155" text-anchor="middle" fill="#dbeafe">analyze existing data</text>
    <rect x="420" y="130" width="440" height="40" rx="5" fill="#0a0e27" stroke="#21385d"/><text x="440" y="155" fill="#7dd3fc">xlsx_reader.py + pandas</text>

    <rect x="40" y="180" width="120" height="40" rx="5" fill="#102921" stroke="#6ee7b7"/><text x="100" y="205" text-anchor="middle" fill="#6ee7b7" font-weight="bold">CREATE</text>
    <rect x="170" y="180" width="240" height="40" rx="5" fill="#0a0e27" stroke="#21385d"/><text x="290" y="205" text-anchor="middle" fill="#dbeafe">build from scratch</text>
    <rect x="420" y="180" width="440" height="40" rx="5" fill="#0a0e27" stroke="#21385d"/><text x="440" y="205" fill="#6ee7b7">XML template + xlsx_pack.py</text>

    <rect x="40" y="230" width="120" height="40" rx="5" fill="#2d2410" stroke="#fbbf24"/><text x="100" y="255" text-anchor="middle" fill="#fbbf24" font-weight="bold">EDIT</text>
    <rect x="170" y="230" width="240" height="40" rx="5" fill="#0a0e27" stroke="#21385d"/><text x="290" y="255" text-anchor="middle" fill="#dbeafe">modify existing xlsx</text>
    <rect x="420" y="230" width="440" height="40" rx="5" fill="#0a0e27" stroke="#21385d"/><text x="440" y="255" fill="#fbbf24">xlsx_unpack → edit XML → pack</text>

    <rect x="40" y="280" width="120" height="40" rx="5" fill="#281629" stroke="#f472b6"/><text x="100" y="305" text-anchor="middle" fill="#f9a8d4" font-weight="bold">FIX</text>
    <rect x="170" y="280" width="240" height="40" rx="5" fill="#0a0e27" stroke="#21385d"/><text x="290" y="305" text-anchor="middle" fill="#dbeafe">repair formulas</text>
    <rect x="420" y="280" width="440" height="40" rx="5" fill="#0a0e27" stroke="#21385d"/><text x="440" y="305" fill="#f9a8d4">unpack → fix &lt;f&gt; nodes → pack</text>

    <rect x="40" y="330" width="120" height="40" rx="5" fill="#1d1832" stroke="#8338ec"/><text x="100" y="355" text-anchor="middle" fill="#a78bfa" font-weight="bold">VALIDATE</text>
    <rect x="170" y="330" width="240" height="40" rx="5" fill="#0a0e27" stroke="#21385d"/><text x="290" y="355" text-anchor="middle" fill="#dbeafe">verify formulas</text>
    <rect x="420" y="330" width="440" height="40" rx="5" fill="#0a0e27" stroke="#21385d"/><text x="440" y="355" fill="#a78bfa">formula_check.py</text>
  </g>
</svg>
