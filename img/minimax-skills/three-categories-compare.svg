<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020817" flood-opacity="0.36"/></filter>
  </defs>
  <rect width="960" height="520" rx="18" fill="url(#bg)"/>
  <rect width="960" height="520" rx="18" fill="url(#grid)" opacity="0.22"/>
  <rect x="18" y="18" width="924" height="484" rx="14" fill="none" stroke="#29476f" stroke-width="1" opacity="0.85"/>

  <text x="40" y="52" fill="#8fb3da" font-size="11" letter-spacing="3">THREE CATEGORIES / DESIGN COMPARISON</text>
  <text x="40" y="90" fill="#f4fbff" font-size="24" font-weight="700" letter-spacing="1.2">Three Categories · Design Comparison</text>
  <text x="40" y="114" fill="#8aa4c8" font-size="12">三类 Skill 在交互模式、质量保证、核心约束、交付产物上的差异化设计</text>

  <!-- Table header -->
  <g>
    <rect x="40" y="148" width="180" height="48" rx="8" fill="#0d1830" stroke="#2b456c" stroke-width="1"/>
    <text x="130" y="176" text-anchor="middle" fill="#8fb3da" font-size="11" font-weight="700" letter-spacing="2">DIMENSION</text>

    <rect x="230" y="148" width="220" height="48" rx="8" fill="#0d2746" stroke="#7dd3fc" stroke-width="1.4"/>
    <text x="340" y="172" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="700">App Development</text>
    <text x="340" y="188" text-anchor="middle" fill="#8aa4c8" font-size="10" font-family="monospace">frontend / fullstack …</text>

    <rect x="460" y="148" width="240" height="48" rx="8" fill="#0b1c1a" stroke="#6ee7b7" stroke-width="1.4"/>
    <text x="580" y="172" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">Doc Generation</text>
    <text x="580" y="188" text-anchor="middle" fill="#9ad0b7" font-size="10" font-family="monospace">pdf / docx / xlsx / pptx</text>

    <rect x="710" y="148" width="210" height="48" rx="8" fill="#220b1e" stroke="#f9a8d4" stroke-width="1.4"/>
    <text x="815" y="172" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="700">Content Creation</text>
    <text x="815" y="188" text-anchor="middle" fill="#d6a6c2" font-size="10" font-family="monospace">gif-sticker / multimodal</text>
  </g>

  <!-- Row generator -->
  <g font-family="'Inter',sans-serif" font-size="12">
    <!-- Row 1: INTERACTION (y=206) -->
    <rect x="40" y="206" width="180" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="130" y="233" text-anchor="middle" fill="#f4fbff" font-weight="700" font-size="12">INTERACTION</text>
    <text x="130" y="252" text-anchor="middle" fill="#8aa4c8" font-size="10">交互模式</text>
    <rect x="230" y="206" width="220" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="340" y="233" text-anchor="middle" fill="#dbeafe" font-size="12">mandatory workflow</text>
    <text x="340" y="252" text-anchor="middle" fill="#7dd3fc" font-size="11" font-family="monospace">Phase-based</text>
    <rect x="460" y="206" width="240" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="580" y="233" text-anchor="middle" fill="#dcfce7" font-size="12">routing decision</text>
    <text x="580" y="252" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="monospace">Route-based</text>
    <rect x="710" y="206" width="210" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="815" y="233" text-anchor="middle" fill="#fde7f3" font-size="12">pipeline exec</text>
    <text x="815" y="252" text-anchor="middle" fill="#f9a8d4" font-size="11" font-family="monospace">Pipeline</text>

    <!-- Row 2: QUALITY (y=278) -->
    <rect x="40" y="278" width="180" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="130" y="305" text-anchor="middle" fill="#f4fbff" font-weight="700" font-size="12">QUALITY</text>
    <text x="130" y="324" text-anchor="middle" fill="#8aa4c8" font-size="10">质量保证</text>
    <rect x="230" y="278" width="220" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="340" y="305" text-anchor="middle" fill="#dbeafe" font-size="12">Quality Gates</text>
    <text x="340" y="324" text-anchor="middle" fill="#7dd3fc" font-size="11" font-family="monospace">checklist</text>
    <rect x="460" y="278" width="240" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="580" y="305" text-anchor="middle" fill="#dcfce7" font-size="12">XSD / Token verify</text>
    <text x="580" y="324" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="monospace">format check</text>
    <rect x="710" y="278" width="210" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="815" y="305" text-anchor="middle" fill="#fde7f3" font-size="12">asset delivery</text>
    <text x="815" y="324" text-anchor="middle" fill="#f9a8d4" font-size="11" font-family="monospace">deliver_assets</text>

    <!-- Row 3: CONSTRAINT (y=350) -->
    <rect x="40" y="350" width="180" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="130" y="377" text-anchor="middle" fill="#f4fbff" font-weight="700" font-size="12">CONSTRAINT</text>
    <text x="130" y="396" text-anchor="middle" fill="#8aa4c8" font-size="10">核心约束</text>
    <rect x="230" y="350" width="220" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="340" y="377" text-anchor="middle" fill="#dbeafe" font-size="12">iron rules</text>
    <text x="340" y="396" text-anchor="middle" fill="#7dd3fc" font-size="11" font-family="monospace">non-negotiable</text>
    <rect x="460" y="350" width="240" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="580" y="377" text-anchor="middle" fill="#dcfce7" font-size="12">format integrity</text>
    <text x="580" y="396" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="monospace">XML / OpenXML</text>
    <rect x="710" y="350" width="210" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="815" y="377" text-anchor="middle" fill="#fde7f3" font-size="12">API limits</text>
    <text x="815" y="396" text-anchor="middle" fill="#f9a8d4" font-size="11" font-family="monospace">quota · rate · retry</text>

    <!-- Row 4: OUTPUT (y=422) -->
    <rect x="40" y="422" width="180" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="130" y="449" text-anchor="middle" fill="#f4fbff" font-weight="700" font-size="12">OUTPUT</text>
    <text x="130" y="468" text-anchor="middle" fill="#8aa4c8" font-size="10">交付产物</text>
    <rect x="230" y="422" width="220" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="340" y="449" text-anchor="middle" fill="#dbeafe" font-size="12">runnable code</text>
    <text x="340" y="468" text-anchor="middle" fill="#7dd3fc" font-size="11" font-family="monospace">project/</text>
    <rect x="460" y="422" width="240" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="580" y="449" text-anchor="middle" fill="#dcfce7" font-size="12">printable files</text>
    <text x="580" y="468" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="monospace">.pdf / .docx / .xlsx</text>
    <rect x="710" y="422" width="210" height="62" rx="8" fill="#0c1b34" stroke="#1f3559" stroke-width="1"/>
    <text x="815" y="449" text-anchor="middle" fill="#fde7f3" font-size="12">media assets</text>
    <text x="815" y="468" text-anchor="middle" fill="#f9a8d4" font-size="11" font-family="monospace">.gif / .mp4 / .mp3</text>
  </g>
</svg>
