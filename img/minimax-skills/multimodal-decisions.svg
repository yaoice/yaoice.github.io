<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="420" fill="url(#bg)" rx="14"/>
  <rect width="900" height="420" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">TOOLKIT · 3 DECISION TREES</text>

  <g filter="url(#glow)" font-size="11" font-family="monospace">
    <rect x="30" y="80" width="270" height="280" rx="10" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="165" y="105" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">TTS · DECISION</text>
    <text x="165" y="128" text-anchor="middle" fill="#fbbf24">need voice?</text>
    <rect x="50" y="145" width="230" height="48" rx="5" fill="#0c162c" stroke="#21385d"/>
    <text x="165" y="165" text-anchor="middle" fill="#dbeafe">single role</text>
    <text x="165" y="183" text-anchor="middle" fill="#6ee7b7">tts (direct)</text>
    <rect x="50" y="210" width="230" height="85" rx="5" fill="#0c162c" stroke="#21385d"/>
    <text x="165" y="230" text-anchor="middle" fill="#dbeafe">multi-role / long-text</text>
    <text x="165" y="250" text-anchor="middle" fill="#dbeafe">/ audiobook</text>
    <text x="165" y="272" text-anchor="middle" fill="#fbbf24">segments.json</text>
    <text x="165" y="288" text-anchor="middle" fill="#6ee7b7">+ generate</text>
    <text x="165" y="335" text-anchor="middle" fill="#8aa4c8" font-size="10">维度：角色数 × 长度</text>

    <rect x="320" y="80" width="270" height="280" rx="10" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="455" y="105" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">MUSIC · DECISION</text>
    <text x="455" y="128" text-anchor="middle" fill="#fbbf24">need music?</text>
    <rect x="340" y="145" width="230" height="48" rx="5" fill="#0a0e27" stroke="#21385d"/>
    <text x="455" y="165" text-anchor="middle" fill="#dcfce7">bgm / unspecified</text>
    <text x="455" y="183" text-anchor="middle" fill="#6ee7b7">--instrumental def</text>
    <rect x="340" y="210" width="230" height="85" rx="5" fill="#0a0e27" stroke="#21385d"/>
    <text x="455" y="230" text-anchor="middle" fill="#dcfce7">explicit song request</text>
    <text x="455" y="252" text-anchor="middle" fill="#fbbf24">→ ask lyrics? →</text>
    <text x="455" y="275" text-anchor="middle" fill="#6ee7b7">--lyrics "..."</text>
    <text x="455" y="335" text-anchor="middle" fill="#8aa4c8" font-size="10">维度：是否需要人声</text>

    <rect x="610" y="80" width="270" height="280" rx="10" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="745" y="105" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">VIDEO · DECISION</text>
    <text x="745" y="128" text-anchor="middle" fill="#fbbf24">need video?</text>
    <rect x="630" y="145" width="230" height="70" rx="5" fill="#0a0e27" stroke="#21385d"/>
    <text x="745" y="165" text-anchor="middle" fill="#ffdc70">single clip</text>
    <text x="645" y="183" fill="#ffdc70">• 1080P → ≤ 6s</text>
    <text x="645" y="201" fill="#ffdc70">• 768P  → ≤ 10s</text>
    <rect x="630" y="230" width="230" height="65" rx="5" fill="#0a0e27" stroke="#21385d"/>
    <text x="745" y="250" text-anchor="middle" fill="#ffdc70">multi-scene / long</text>
    <text x="745" y="272" text-anchor="middle" fill="#6ee7b7">generate_long_video.sh</text>
    <text x="745" y="335" text-anchor="middle" fill="#8aa4c8" font-size="10">维度：时长 × 分辨率</text>
  </g>

  <text x="450" y="395" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">explicit rules prevent Agent from "guessing parameters"</text>
</svg>
