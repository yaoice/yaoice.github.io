<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/>
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#13243f"/><stop offset="100%" stop-color="#0d1a31"/></linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020817" flood-opacity="0.36"/></filter>
  </defs>
  <rect width="960" height="520" rx="18" fill="url(#bg)"/>
  <rect width="960" height="520" rx="18" fill="url(#grid)" opacity="0.22"/>
  <rect x="18" y="18" width="924" height="484" rx="14" fill="none" stroke="#29476f" stroke-width="1" opacity="0.85"/>

  <text x="40" y="52" fill="#8fb3da" font-size="11" letter-spacing="3">MULTIMODAL TOOLKIT / MODULES</text>
  <text x="40" y="90" fill="#f4fbff" font-size="24" font-weight="700" letter-spacing="1.2">minimax-multimodal-toolkit · 5 Modules</text>
  <text x="40" y="114" fill="#8aa4c8" font-size="12">5 个功能模块共用一套基于 bash 的 runtime，以零依赖在 Agent 环境中执行</text>

  <!-- 5 cards same color system -->
  <g filter="url(#shadow)">
    <rect x="40" y="148" width="176" height="224" rx="14" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.4"/>
    <rect x="40" y="148" width="176" height="4" rx="2" fill="#7dd3fc"/>
  </g>
  <g>
    <text x="62" y="186" fill="#7dd3fc" font-size="14" font-weight="700" letter-spacing="1.2">TTS</text>
    <text x="62" y="205" fill="#8aa4c8" font-size="10">语音合成</text>
    <line x1="58" y1="218" x2="202" y2="218" stroke="#1f3559" stroke-width="1"/>
    <g font-family="monospace" font-size="11" fill="#dbeafe">
      <text x="58" y="242">› single voice</text>
      <text x="58" y="264">› multi-role</text>
      <text x="58" y="286">› voice clone</text>
      <text x="58" y="308">› voice design</text>
    </g>
    <rect x="58" y="326" width="144" height="34" rx="6" fill="#0b1930" stroke="#1f3559" stroke-width="1"/>
    <text x="68" y="347" fill="#8fb3da" font-size="10" font-family="monospace">segments.json</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="224" y="148" width="176" height="224" rx="14" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.4"/>
    <rect x="224" y="148" width="176" height="4" rx="2" fill="#7dd3fc"/>
  </g>
  <g>
    <text x="246" y="186" fill="#7dd3fc" font-size="14" font-weight="700" letter-spacing="1.2">MUSIC</text>
    <text x="246" y="205" fill="#8aa4c8" font-size="10">音乐生成</text>
    <line x1="242" y1="218" x2="386" y2="218" stroke="#1f3559" stroke-width="1"/>
    <g font-family="monospace" font-size="11" fill="#dbeafe">
      <text x="242" y="242">› instrumental</text>
      <text x="242" y="264">› song w/ lyrics</text>
      <text x="242" y="286">› multi-style</text>
    </g>
    <rect x="242" y="326" width="144" height="34" rx="6" fill="#0b1930" stroke="#1f3559" stroke-width="1"/>
    <text x="252" y="347" fill="#8fb3da" font-size="10" font-family="monospace">--instrumental</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="408" y="148" width="176" height="224" rx="14" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.4"/>
    <rect x="408" y="148" width="176" height="4" rx="2" fill="#7dd3fc"/>
  </g>
  <g>
    <text x="430" y="186" fill="#7dd3fc" font-size="14" font-weight="700" letter-spacing="1.2">IMAGE</text>
    <text x="430" y="205" fill="#8aa4c8" font-size="10">图像生成</text>
    <line x1="426" y1="218" x2="570" y2="218" stroke="#1f3559" stroke-width="1"/>
    <g font-family="monospace" font-size="11" fill="#dbeafe">
      <text x="426" y="242">› text-to-image</text>
      <text x="426" y="264">› image-to-image</text>
      <text x="426" y="286">› subject-ref</text>
      <text x="426" y="308">› multi-ratios</text>
    </g>
    <rect x="426" y="326" width="144" height="34" rx="6" fill="#0b1930" stroke="#1f3559" stroke-width="1"/>
    <text x="436" y="347" fill="#8fb3da" font-size="10" font-family="monospace">16:9 · 1:1 · 9:16</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="592" y="148" width="176" height="224" rx="14" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.4"/>
    <rect x="592" y="148" width="176" height="4" rx="2" fill="#7dd3fc"/>
  </g>
  <g>
    <text x="614" y="186" fill="#7dd3fc" font-size="14" font-weight="700" letter-spacing="1.2">VIDEO</text>
    <text x="614" y="205" fill="#8aa4c8" font-size="10">视频生成</text>
    <line x1="610" y1="218" x2="754" y2="218" stroke="#1f3559" stroke-width="1"/>
    <g font-family="monospace" font-size="11" fill="#dbeafe">
      <text x="610" y="242">› text-to-video</text>
      <text x="610" y="264">› image-to-video</text>
      <text x="610" y="286">› long-video</text>
      <text x="610" y="308">› first/last frame</text>
    </g>
    <rect x="610" y="326" width="144" height="34" rx="6" fill="#0b1930" stroke="#1f3559" stroke-width="1"/>
    <text x="620" y="347" fill="#8fb3da" font-size="10" font-family="monospace">1080P≤6s</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="776" y="148" width="146" height="224" rx="14" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.4"/>
    <rect x="776" y="148" width="146" height="4" rx="2" fill="#7dd3fc"/>
  </g>
  <g>
    <text x="798" y="186" fill="#7dd3fc" font-size="14" font-weight="700" letter-spacing="1.2">MEDIA</text>
    <text x="798" y="205" fill="#8aa4c8" font-size="10">媒体工具</text>
    <line x1="794" y1="218" x2="908" y2="218" stroke="#1f3559" stroke-width="1"/>
    <g font-family="monospace" font-size="11" fill="#dbeafe">
      <text x="794" y="242">› convert</text>
      <text x="794" y="264">› concat</text>
      <text x="794" y="286">› crop</text>
      <text x="794" y="308">› mix audio</text>
    </g>
    <rect x="794" y="326" width="114" height="34" rx="6" fill="#0b1930" stroke="#1f3559" stroke-width="1"/>
    <text x="804" y="347" fill="#8fb3da" font-size="10" font-family="monospace">ffmpeg core</text>
  </g>

  <!-- Runtime bar -->
  <g filter="url(#shadow)">
    <rect x="40" y="400" width="882" height="88" rx="14" fill="#0d1830" stroke="#a78bfa" stroke-width="1.2"/>
  </g>
  <g>
    <circle cx="66" cy="428" r="6" fill="#a78bfa"/>
    <text x="82" y="432" fill="#c7b3ff" font-size="12" font-weight="700" letter-spacing="2">RUNTIME STACK · PURE BASH (zero Python)</text>
    <line x1="400" y1="420" x2="400" y2="458" stroke="#2b2a5e" stroke-width="1"/>
    <g font-family="monospace" font-size="13" fill="#e9ddff">
      <text x="420" y="432">bash</text>
      <text x="500" y="432">·</text>
      <text x="520" y="432">curl</text>
      <text x="600" y="432">·</text>
      <text x="620" y="432">ffmpeg</text>
      <text x="740" y="432">·</text>
      <text x="760" y="432">jq</text>
      <text x="820" y="432">·</text>
      <text x="840" y="432">xxd</text>
    </g>
    <text x="82" y="466" fill="#8aa4c8" font-size="10.5">所有命令原子化、可独立执行，Agent 无需任何额外依赖即可调用</text>
  </g>
</svg>
