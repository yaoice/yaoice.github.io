<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="520" fill="url(#bg)" rx="14"/>
  <rect width="900" height="520" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">7 SHARED DESIGN PRINCIPLES</text>

  <g filter="url(#glow)">
    <circle cx="450" cy="270" r="75" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <text x="450" y="262" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">SKILL DESIGN</text>
    <text x="450" y="283" text-anchor="middle" fill="#8aa4c8" font-size="11">方法论</text>
  </g>

  <g filter="url(#glow)" font-size="11" font-family="monospace">
    <rect x="40" y="85" width="220" height="80" rx="8" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="150" y="108" text-anchor="middle" fill="#7dd3fc" font-weight="bold">① DECLARATIVE ROUTING</text>
    <text x="150" y="130" text-anchor="middle" fill="#dbeafe">match_intent(user_req)</text>
    <text x="150" y="150" text-anchor="middle" fill="#8aa4c8" font-size="10">自动路径匹配</text>

    <rect x="640" y="85" width="220" height="80" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="750" y="108" text-anchor="middle" fill="#a78bfa" font-weight="bold">② MANDATORY FLOW</text>
    <text x="750" y="130" text-anchor="middle" fill="#e5d4ff">no step can be skipped</text>
    <text x="750" y="150" text-anchor="middle" fill="#9d7ab3" font-size="10">保证质量一致性</text>

    <rect x="40" y="195" width="220" height="80" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="150" y="218" text-anchor="middle" fill="#6ee7b7" font-weight="bold">③ SCRIPT TOOLCHAIN</text>
    <text x="150" y="240" text-anchor="middle" fill="#dcfce7">each Skill ships scripts</text>
    <text x="150" y="260" text-anchor="middle" fill="#9ad0b7" font-size="10">能力实现</text>

    <rect x="640" y="195" width="220" height="80" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="750" y="218" text-anchor="middle" fill="#6ee7b7" font-weight="bold">④ LAYERED DOCS</text>
    <text x="750" y="240" text-anchor="middle" fill="#dcfce7">SKILL.md + references/</text>
    <text x="750" y="260" text-anchor="middle" fill="#9ad0b7" font-size="10">按需加载</text>

    <rect x="40" y="305" width="220" height="80" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="150" y="328" text-anchor="middle" fill="#fbbf24" font-weight="bold">⑤ ERROR PREVENTION</text>
    <text x="150" y="350" text-anchor="middle" fill="#ffdc70">anti-patterns + pitfalls</text>
    <text x="150" y="370" text-anchor="middle" fill="#c49a3f" font-size="10">防错机制</text>

    <rect x="640" y="305" width="220" height="80" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="750" y="328" text-anchor="middle" fill="#f9a8d4" font-weight="bold">⑥ ENV CHECK</text>
    <text x="750" y="350" text-anchor="middle" fill="#fde7f3">verify deps on boot</text>
    <text x="750" y="370" text-anchor="middle" fill="#d6a6c2" font-size="10">环境预检</text>

    <rect x="340" y="425" width="220" height="80" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="450" y="448" text-anchor="middle" fill="#a78bfa" font-weight="bold">⑦ ZERO PLACEHOLDER</text>
    <text x="450" y="470" text-anchor="middle" fill="#e5d4ff">no Lorem ipsum</text>
    <text x="450" y="490" text-anchor="middle" fill="#9d7ab3" font-size="10">真实内容优先</text>
  </g>

  <g stroke="#555" stroke-width="1" stroke-dasharray="3 3" opacity="0.5">
    <line x1="260" y1="130" x2="390" y2="235"/>
    <line x1="640" y1="130" x2="510" y2="235"/>
    <line x1="260" y1="240" x2="385" y2="260"/>
    <line x1="640" y1="240" x2="515" y2="260"/>
    <line x1="260" y1="350" x2="390" y2="300"/>
    <line x1="640" y1="350" x2="510" y2="300"/>
    <line x1="450" y1="425" x2="450" y2="345"/>
  </g>
</svg>
