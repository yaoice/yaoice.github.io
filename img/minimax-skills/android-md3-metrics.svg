<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="380" fill="url(#bg)" rx="14"/>
  <rect width="900" height="380" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">MATERIAL DESIGN 3 · COMPLIANCE METRICS</text>

  <g filter="url(#glow)">
    <rect x="40" y="80" width="260" height="120" rx="10" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="170" y="105" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">CONTRAST</text>
    <text x="170" y="140" text-anchor="middle" fill="#fbbf24" font-size="26" font-weight="bold" font-family="monospace">≥ 4.5 : 1</text>
    <text x="170" y="162" text-anchor="middle" fill="#dbeafe" font-size="11" font-family="monospace">body text</text>
    <text x="170" y="184" text-anchor="middle" fill="#f9a8d4" font-size="10">✗ WCAG AA failure if below</text>

    <rect x="320" y="80" width="260" height="120" rx="10" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="450" y="105" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">TOUCH TARGET</text>
    <text x="450" y="140" text-anchor="middle" fill="#fbbf24" font-size="24" font-weight="bold" font-family="monospace">≥ 48 × 48 dp</text>
    <text x="450" y="162" text-anchor="middle" fill="#dcfce7" font-size="11" font-family="monospace">minimum size</text>
    <text x="450" y="184" text-anchor="middle" fill="#f9a8d4" font-size="10">✗ 32×32dp button = anti-pattern</text>

    <rect x="600" y="80" width="260" height="120" rx="10" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="730" y="105" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">GRID SYSTEM</text>
    <text x="730" y="140" text-anchor="middle" fill="#6ee7b7" font-size="24" font-weight="bold" font-family="monospace">8 dp base</text>
    <text x="730" y="162" text-anchor="middle" fill="#ffdc70" font-size="11" font-family="monospace">all multiples</text>
    <text x="730" y="184" text-anchor="middle" fill="#f9a8d4" font-size="10">✗ no arbitrary 7dp / 13dp</text>

    <rect x="180" y="220" width="260" height="120" rx="10" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="310" y="245" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">ANIMATION</text>
    <text x="310" y="280" text-anchor="middle" fill="#fbbf24" font-size="24" font-weight="bold" font-family="monospace">50 – 500 ms</text>
    <text x="310" y="302" text-anchor="middle" fill="#fde7f3" font-size="11" font-family="monospace">valid range</text>
    <text x="310" y="324" text-anchor="middle" fill="#f9a8d4" font-size="10">✗ 700ms = too long</text>

    <rect x="460" y="220" width="260" height="120" rx="10" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="590" y="245" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">STARTUP TIME</text>
    <text x="590" y="280" text-anchor="middle" fill="#fbbf24" font-size="26" font-weight="bold" font-family="monospace">&lt; 2 s</text>
    <text x="590" y="302" text-anchor="middle" fill="#e5d4ff" font-size="11" font-family="monospace">cold start cap</text>
    <text x="590" y="324" text-anchor="middle" fill="#f9a8d4" font-size="10">✗ exceeds = perf anti-pattern</text>
  </g>
</svg>
