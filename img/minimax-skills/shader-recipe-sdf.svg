<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="360" fill="url(#bg)" rx="14"/>
  <rect width="900" height="360" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">QUICK RECIPE · PHOTOREAL SDF SCENE</text>

  <g filter="url(#glow)" font-size="11" font-family="monospace">
    <rect x="30" y="115" width="160" height="115" rx="8" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="110" y="138" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">STEP 1 · GEOM</text>
    <text x="110" y="162" text-anchor="middle" fill="#dbeafe">sdf-3d</text>
    <text x="110" y="182" text-anchor="middle" fill="#dbeafe">+ CSG boolean</text>
    <text x="110" y="210" text-anchor="middle" fill="#8aa4c8" font-size="10">构建几何体</text>

    <rect x="210" y="115" width="160" height="115" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="290" y="138" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">STEP 2 · RENDER</text>
    <text x="290" y="162" text-anchor="middle" fill="#e5d4ff">ray-marching</text>
    <text x="290" y="182" text-anchor="middle" fill="#e5d4ff">+ normal-estimate</text>
    <text x="290" y="210" text-anchor="middle" fill="#9d7ab3" font-size="10">光线行进</text>

    <rect x="390" y="115" width="160" height="115" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="470" y="138" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">STEP 3 · LIGHT</text>
    <text x="470" y="162" text-anchor="middle" fill="#dcfce7">lighting-model</text>
    <text x="470" y="182" text-anchor="middle" fill="#dcfce7">+ soft shadow + AO</text>
    <text x="470" y="210" text-anchor="middle" fill="#9ad0b7" font-size="10">光照阴影</text>

    <rect x="570" y="115" width="160" height="115" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="650" y="138" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">STEP 4 · ATMOS</text>
    <text x="650" y="162" text-anchor="middle" fill="#ffdc70">height-fog</text>
    <text x="650" y="182" text-anchor="middle" fill="#ffdc70">+ sun-scattering</text>
    <text x="650" y="210" text-anchor="middle" fill="#c49a3f" font-size="10">大气散射</text>

    <rect x="750" y="115" width="120" height="115" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="810" y="138" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">STEP 5</text>
    <text x="810" y="162" text-anchor="middle" fill="#fde7f3">ACES tonemap</text>
    <text x="810" y="180" text-anchor="middle" fill="#fde7f3">2×SSAA</text>
    <text x="810" y="198" text-anchor="middle" fill="#fde7f3">+ vignette</text>
    <text x="810" y="218" text-anchor="middle" fill="#d6a6c2" font-size="10">后处理</text>
  </g>

  <g stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="190" y1="172" x2="208" y2="172" stroke="#8338ec" marker-end="url(#arr)"/>
    <line x1="370" y1="172" x2="388" y2="172" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="550" y1="172" x2="568" y2="172" stroke="#fbbf24" marker-end="url(#arr)"/>
    <line x1="730" y1="172" x2="748" y2="172" stroke="#f472b6" marker-end="url(#arr)"/>
  </g>

  <text x="450" y="290" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">5 steps · geometry → final frame</text>
  <text x="450" y="315" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">each step has code template · Skill composes in sequence → production-grade shader</text>
</svg>
