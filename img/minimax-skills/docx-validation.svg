<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f472b6"/></marker>
  </defs>
  <rect width="900" height="360" fill="url(#bg)" rx="14"/>
  <rect width="900" height="360" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">DOCX · MANDATORY VALIDATION PIPELINE</text>

  <g filter="url(#glow)" font-size="11">
    <rect x="40" y="130" width="160" height="100" rx="8" fill="#0c162c" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="120" y="155" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">◆ OPERATION</text>
    <text x="120" y="178" text-anchor="middle" fill="#dbeafe">CREATE / EDIT</text>
    <text x="120" y="198" text-anchor="middle" fill="#dbeafe">/ FORMAT</text>
    <text x="120" y="220" text-anchor="middle" fill="#8aa4c8" font-size="10">any pipeline</text>

    <rect x="230" y="130" width="170" height="100" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="315" y="155" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">① merge-runs</text>
    <text x="315" y="178" text-anchor="middle" fill="#e5d4ff" font-family="monospace" font-size="10">merge adjacent</text>
    <text x="315" y="196" text-anchor="middle" fill="#e5d4ff" font-family="monospace" font-size="10">&lt;w:r&gt; nodes</text>
    <text x="315" y="220" text-anchor="middle" fill="#fbbf24" font-size="10">prevent fragmentation</text>

    <rect x="430" y="130" width="180" height="100" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="520" y="155" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">② validate --xsd</text>
    <text x="520" y="178" text-anchor="middle" fill="#dcfce7" font-family="monospace" font-size="10">XSD structural</text>
    <text x="520" y="196" text-anchor="middle" fill="#dcfce7" font-family="monospace" font-size="10">ECMA-376 spec</text>
    <text x="520" y="220" text-anchor="middle" fill="#fbbf24" font-size="10">element order · attrs</text>

    <rect x="640" y="130" width="220" height="100" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="750" y="155" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">③ validate --business</text>
    <text x="750" y="178" text-anchor="middle" fill="#fde7f3" font-family="monospace" font-size="10">business rules</text>
    <text x="750" y="196" text-anchor="middle" fill="#fde7f3" font-family="monospace" font-size="10">section numbering</text>
    <text x="750" y="220" text-anchor="middle" fill="#fbbf24" font-size="10">cross-ref integrity</text>
  </g>

  <g stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="200" y1="180" x2="228" y2="180" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="400" y1="180" x2="428" y2="180" stroke="#8338ec" marker-end="url(#arr)"/>
    <line x1="610" y1="180" x2="638" y2="180" stroke="#6ee7b7" marker-end="url(#arr)"/>
  </g>

  <rect x="300" y="270" width="300" height="50" rx="10" fill="#281629" stroke="#f472b6" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="301" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">⚠ ANY FAILURE → ROLLBACK</text>

  <g stroke="#f472b6" stroke-width="1.2" stroke-dasharray="5 3" opacity="0.7">
    <line x1="315" y1="230" x2="390" y2="268" marker-end="url(#arrR)"/>
    <line x1="520" y1="230" x2="460" y2="268" marker-end="url(#arrR)"/>
    <line x1="750" y1="230" x2="540" y2="268" marker-end="url(#arrR)"/>
  </g>

  <text x="450" y="345" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">prevent Word's "auto-repair" from mangling the doc beyond recognition</text>
</svg>
