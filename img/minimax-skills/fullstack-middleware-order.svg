<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="340" fill="url(#bg)" rx="14"/>
  <rect width="900" height="340" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">MIDDLEWARE PIPELINE · EXECUTION ORDER</text>

  <g filter="url(#glow)" font-size="10" font-family="monospace">
    <rect x="20" y="130" width="80" height="52" rx="5" fill="#2d2410" stroke="#fbbf24"/><text x="60" y="152" text-anchor="middle" fill="#fbbf24" font-weight="bold">Request</text><text x="60" y="168" text-anchor="middle" fill="#ffdc70" font-size="9">入站</text>
    <rect x="115" y="130" width="82" height="52" rx="5" fill="#101b33" stroke="#7dd3fc"/><text x="156" y="150" text-anchor="middle" fill="#7dd3fc" font-weight="bold">RequestID</text><text x="156" y="166" text-anchor="middle" fill="#dbeafe" font-size="9">trace</text>
    <rect x="212" y="130" width="82" height="52" rx="5" fill="#1d1832" stroke="#8338ec"/><text x="253" y="150" text-anchor="middle" fill="#a78bfa" font-weight="bold">Logging</text><text x="253" y="166" text-anchor="middle" fill="#e5d4ff" font-size="9">structured</text>
    <rect x="309" y="130" width="82" height="52" rx="5" fill="#102921" stroke="#6ee7b7"/><text x="350" y="150" text-anchor="middle" fill="#6ee7b7" font-weight="bold">CORS</text><text x="350" y="166" text-anchor="middle" fill="#dcfce7" font-size="9">origin</text>
    <rect x="406" y="130" width="82" height="52" rx="5" fill="#102921" stroke="#6ee7b7"/><text x="447" y="150" text-anchor="middle" fill="#6ee7b7" font-weight="bold">RateLimit</text><text x="447" y="166" text-anchor="middle" fill="#dcfce7" font-size="9">429</text>
    <rect x="503" y="130" width="82" height="52" rx="5" fill="#2d2410" stroke="#fbbf24"/><text x="544" y="150" text-anchor="middle" fill="#fbbf24" font-weight="bold">BodyParse</text><text x="544" y="166" text-anchor="middle" fill="#ffdc70" font-size="9">json</text>
    <rect x="600" y="130" width="72" height="52" rx="5" fill="#281629" stroke="#f472b6"/><text x="636" y="150" text-anchor="middle" fill="#f9a8d4" font-weight="bold">Auth</text><text x="636" y="166" text-anchor="middle" fill="#fde7f3" font-size="9">401</text>
    <rect x="687" y="130" width="72" height="52" rx="5" fill="#281629" stroke="#f472b6"/><text x="723" y="150" text-anchor="middle" fill="#f9a8d4" font-weight="bold">Authz</text><text x="723" y="166" text-anchor="middle" fill="#fde7f3" font-size="9">403</text>
    <rect x="774" y="130" width="72" height="52" rx="5" fill="#1d1832" stroke="#8338ec"/><text x="810" y="150" text-anchor="middle" fill="#a78bfa" font-weight="bold">Validate</text><text x="810" y="166" text-anchor="middle" fill="#e5d4ff" font-size="9">422</text>
    <rect x="862" y="130" width="30" height="52" rx="5" fill="#0c162c" stroke="#7dd3fc" stroke-width="1.5"/><text x="877" y="158" text-anchor="middle" fill="#7dd3fc" font-weight="bold" font-size="9">Handler</text>
  </g>

  <g stroke="#7dd3fc" stroke-width="1.5" filter="url(#glow)">
    <line x1="100" y1="156" x2="112" y2="156" marker-end="url(#arr)"/>
    <line x1="197" y1="156" x2="209" y2="156" marker-end="url(#arr)"/>
    <line x1="294" y1="156" x2="306" y2="156" marker-end="url(#arr)"/>
    <line x1="391" y1="156" x2="403" y2="156" marker-end="url(#arr)"/>
    <line x1="488" y1="156" x2="500" y2="156" marker-end="url(#arr)"/>
    <line x1="585" y1="156" x2="597" y2="156" marker-end="url(#arr)"/>
    <line x1="672" y1="156" x2="684" y2="156" marker-end="url(#arr)"/>
    <line x1="759" y1="156" x2="771" y2="156" marker-end="url(#arr)"/>
    <line x1="846" y1="156" x2="860" y2="156" marker-end="url(#arr)"/>
  </g>

  <g font-size="11" font-family="monospace" fill="#8aa4c8">
    <text x="450" y="235" text-anchor="middle" fill="#fbbf24" font-weight="bold" letter-spacing="2">ORDER AS CONSTRAINT</text>
    <text x="450" y="258" text-anchor="middle">› Auth MUST precede Authz (know-who before what-allowed)</text>
    <text x="450" y="278" text-anchor="middle">› Validation MUST precede Handler (dirty data never reaches biz)</text>
    <text x="450" y="298" text-anchor="middle">› RequestID / Logging placed first (traces everything)</text>
  </g>
</svg>
