<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="420" fill="url(#bg)" rx="14"/>
  <rect width="900" height="420" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">REAL-TIME COMM · MODE SELECTION</text>

  <g filter="url(#glow)">
    <rect x="30" y="80" width="270" height="260" rx="10" fill="#102921" stroke="#6ee7b7" stroke-width="2"/>
    <rect x="30" y="80" width="270" height="40" rx="10" fill="#6ee7b7" opacity="0.15"/>
    <text x="165" y="107" text-anchor="middle" fill="#6ee7b7" font-size="16" font-weight="bold">SSE</text>
    <g fill="#dcfce7" font-size="11" font-family="monospace">
      <text x="50" y="145">direction: server → client</text>
      <text x="50" y="167">complexity: ★☆☆ simple</text>
      <text x="50" y="189">protocol: HTTP (no extra conn)</text>
      <text x="50" y="220" fill="#6ee7b7">BEST FOR:</text>
      <text x="50" y="240">  • notifications / feed</text>
      <text x="50" y="260">  • progress bar / log stream</text>
      <text x="50" y="280">  • one-way updates</text>
    </g>
    <text x="165" y="318" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">▶ PREFER SSE OVER WS</text>

    <rect x="315" y="80" width="270" height="260" rx="10" fill="#281629" stroke="#f472b6" stroke-width="2"/>
    <rect x="315" y="80" width="270" height="40" rx="10" fill="#f472b6" opacity="0.15"/>
    <text x="450" y="107" text-anchor="middle" fill="#f9a8d4" font-size="16" font-weight="bold">WebSocket</text>
    <g fill="#fde7f3" font-size="11" font-family="monospace">
      <text x="335" y="145">direction: full-duplex ↔</text>
      <text x="335" y="167">complexity: ★★★ complex</text>
      <text x="335" y="189">protocol: WS (dedicated)</text>
      <text x="335" y="220" fill="#f9a8d4">BEST FOR:</text>
      <text x="335" y="240">  • chat / IM</text>
      <text x="335" y="260">  • multiplayer games</text>
      <text x="335" y="280">  • collaborative editing</text>
    </g>
    <text x="450" y="318" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">▶ needs heartbeat + reconnect</text>

    <rect x="600" y="80" width="270" height="260" rx="10" fill="#1d1832" stroke="#8338ec" stroke-width="2"/>
    <rect x="600" y="80" width="270" height="40" rx="10" fill="#8338ec" opacity="0.15"/>
    <text x="735" y="107" text-anchor="middle" fill="#a78bfa" font-size="16" font-weight="bold">Polling</text>
    <g fill="#e5d4ff" font-size="11" font-family="monospace">
      <text x="620" y="145">direction: client → server</text>
      <text x="620" y="167">complexity: ★☆☆ simplest</text>
      <text x="620" y="189">protocol: HTTP (interval)</text>
      <text x="620" y="220" fill="#a78bfa">BEST FOR:</text>
      <text x="620" y="240">  • low-frequency status check</text>
      <text x="620" y="260">  • small client population</text>
      <text x="620" y="280">  • compatibility fallback</text>
    </g>
    <text x="735" y="318" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="bold">✗ avoid high-freq × scale</text>
  </g>

  <text x="450" y="395" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">dimensions: bidirectional? · client scale · msg frequency · browser compat</text>
</svg>
