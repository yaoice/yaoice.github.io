<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/>
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#13243f"/><stop offset="100%" stop-color="#0d1a31"/></linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020817" flood-opacity="0.36"/></filter>
  </defs>
  <rect width="960" height="520" rx="18" fill="url(#bg)"/>
  <rect width="960" height="520" rx="18" fill="url(#grid)" opacity="0.22"/>
  <rect x="18" y="18" width="924" height="484" rx="14" fill="none" stroke="#29476f" stroke-width="1" opacity="0.85"/>

  <text x="40" y="52" fill="#8fb3da" font-size="11" letter-spacing="3">SKILLS TAXONOMY / BY DELIVERABLE</text>
  <text x="40" y="90" fill="#f4fbff" font-size="24" font-weight="700" letter-spacing="1.2">MiniMax Skills · Taxonomy</text>
  <text x="40" y="114" fill="#8aa4c8" font-size="12">按最终交付物把 11 个 Skill 分为三类，每类有专属色彩标签</text>

  <!-- APP DEV -->
  <g filter="url(#shadow)">
    <rect x="40" y="148" width="294" height="328" rx="14" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.4"/>
    <rect x="40" y="148" width="294" height="4" rx="2" fill="#7dd3fc"/>
  </g>
  <g>
    <circle cx="62" cy="182" r="5" fill="#7dd3fc"/>
    <text x="76" y="186" fill="#7dd3fc" font-size="13" font-weight="700" letter-spacing="1.2">APP DEVELOPMENT</text>
    <text x="314" y="186" text-anchor="end" fill="#8aa4c8" font-size="11" font-family="monospace">5 skills</text>
    <line x1="56" y1="202" x2="318" y2="202" stroke="#1f3559" stroke-width="1"/>

    <g font-family="monospace" font-size="12" fill="#dbeafe">
      <rect x="56" y="216" width="262" height="32" rx="6" fill="#0c1d38" stroke="#1f3559" stroke-width="1"/>
      <text x="72" y="236">frontend-dev</text>
      <rect x="56" y="254" width="262" height="32" rx="6" fill="#0c1d38" stroke="#1f3559" stroke-width="1"/>
      <text x="72" y="274">fullstack-dev</text>
      <rect x="56" y="292" width="262" height="32" rx="6" fill="#0c1d38" stroke="#1f3559" stroke-width="1"/>
      <text x="72" y="312">android-native-dev</text>
      <rect x="56" y="330" width="262" height="32" rx="6" fill="#0c1d38" stroke="#1f3559" stroke-width="1"/>
      <text x="72" y="350">ios-application-dev</text>
      <rect x="56" y="368" width="262" height="32" rx="6" fill="#0c1d38" stroke="#1f3559" stroke-width="1"/>
      <text x="72" y="388">shader-dev</text>
    </g>

    <rect x="56" y="416" width="262" height="44" rx="8" fill="#0b1930" stroke="#1f3559" stroke-width="1"/>
    <text x="68" y="435" fill="#8fb3da" font-size="10" font-weight="700" letter-spacing="1.5">DELIVERABLE</text>
    <text x="68" y="452" fill="#b7cde5" font-size="11">可运行代码项目</text>
  </g>

  <!-- DOC GEN -->
  <g filter="url(#shadow)">
    <rect x="354" y="148" width="294" height="328" rx="14" fill="url(#panel)" stroke="#6ee7b7" stroke-width="1.4"/>
    <rect x="354" y="148" width="294" height="4" rx="2" fill="#6ee7b7"/>
  </g>
  <g>
    <circle cx="376" cy="182" r="5" fill="#6ee7b7"/>
    <text x="390" y="186" fill="#6ee7b7" font-size="13" font-weight="700" letter-spacing="1.2">DOCUMENT GENERATION</text>
    <text x="628" y="186" text-anchor="end" fill="#9ad0b7" font-size="11" font-family="monospace">4 skills</text>
    <line x1="370" y1="202" x2="632" y2="202" stroke="#1f3559" stroke-width="1"/>

    <g font-family="monospace" font-size="12" fill="#dcfce7">
      <rect x="370" y="216" width="262" height="32" rx="6" fill="#0b1c1a" stroke="#18402f" stroke-width="1"/>
      <text x="386" y="236">minimax-pdf</text>
      <rect x="370" y="254" width="262" height="32" rx="6" fill="#0b1c1a" stroke="#18402f" stroke-width="1"/>
      <text x="386" y="274">minimax-docx</text>
      <rect x="370" y="292" width="262" height="32" rx="6" fill="#0b1c1a" stroke="#18402f" stroke-width="1"/>
      <text x="386" y="312">minimax-xlsx</text>
      <rect x="370" y="330" width="262" height="32" rx="6" fill="#0b1c1a" stroke="#18402f" stroke-width="1"/>
      <text x="386" y="350">pptx-generator</text>
    </g>

    <rect x="370" y="416" width="262" height="44" rx="8" fill="#0b1930" stroke="#1f3559" stroke-width="1"/>
    <text x="382" y="435" fill="#9ad0b7" font-size="10" font-weight="700" letter-spacing="1.5">DELIVERABLE</text>
    <text x="382" y="452" fill="#b7cde5" font-size="11">PDF / DOCX / XLSX / PPTX 文档</text>
  </g>

  <!-- CONTENT CREATION -->
  <g filter="url(#shadow)">
    <rect x="668" y="148" width="254" height="328" rx="14" fill="url(#panel)" stroke="#f9a8d4" stroke-width="1.4"/>
    <rect x="668" y="148" width="254" height="4" rx="2" fill="#f9a8d4"/>
  </g>
  <g>
    <circle cx="690" cy="182" r="5" fill="#f9a8d4"/>
    <text x="704" y="186" fill="#f9a8d4" font-size="13" font-weight="700" letter-spacing="1.2">CONTENT CREATION</text>
    <text x="902" y="186" text-anchor="end" fill="#d6a6c2" font-size="11" font-family="monospace">2 skills</text>
    <line x1="684" y1="202" x2="906" y2="202" stroke="#1f3559" stroke-width="1"/>

    <g font-family="monospace" font-size="12" fill="#fde7f3">
      <rect x="684" y="216" width="222" height="32" rx="6" fill="#220b1e" stroke="#4b1836" stroke-width="1"/>
      <text x="700" y="236">gif-sticker-maker</text>
      <rect x="684" y="254" width="222" height="60" rx="6" fill="#220b1e" stroke="#4b1836" stroke-width="1"/>
      <text x="700" y="274">minimax-multimodal-</text>
      <text x="700" y="294">   toolkit</text>
    </g>

    <rect x="684" y="416" width="222" height="44" rx="8" fill="#0b1930" stroke="#1f3559" stroke-width="1"/>
    <text x="696" y="435" fill="#d6a6c2" font-size="10" font-weight="700" letter-spacing="1.5">DELIVERABLE</text>
    <text x="696" y="452" fill="#b7cde5" font-size="11">图片 / 视频 / 音频 资产</text>
  </g>
</svg>
