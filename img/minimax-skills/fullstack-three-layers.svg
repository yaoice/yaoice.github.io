<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#11213f"/>
      <stop offset="55%" stop-color="#0b1730"/>
      <stop offset="100%" stop-color="#08111f"/>
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12233f"/>
      <stop offset="100%" stop-color="#0d1a31"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020817" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/>
    </marker>
  </defs>

  <rect width="900" height="480" rx="18" fill="url(#bg)"/>
  <rect width="900" height="480" rx="18" fill="url(#grid)" opacity="0.22"/>
  <rect x="18" y="18" width="864" height="444" rx="14" fill="none" stroke="#29476f" stroke-width="1" opacity="0.85"/>

  <text x="60" y="54" fill="#8fb3da" font-size="11" letter-spacing="3">FULLSTACK DEV / FEATURE-FIRST ARCHITECTURE</text>
  <text x="450" y="58" text-anchor="middle" fill="#f4fbff" font-size="22" font-weight="700" letter-spacing="1.4">Three-Layer Architecture · DI Flow</text>
  <text x="450" y="80" text-anchor="middle" fill="#8aa4c8" font-size="11">Controller、Service、Repository 通过接口契约解耦，依赖只向内聚合，边界规则清晰可测试</text>

  <g filter="url(#shadow)">
    <rect x="56" y="142" width="130" height="56" rx="28" fill="#0d1830" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="121" y="165" text-anchor="middle" fill="#f6d28b" font-size="11" font-weight="700">INPUT</text>
    <text x="121" y="184" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">HTTP Request</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="240" y="104" width="540" height="86" rx="16" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.6"/>
    <rect x="240" y="104" width="540" height="34" rx="16" fill="#0d2746"/>
    <text x="264" y="126" fill="#7dd3fc" font-size="14" font-weight="700">CONTROLLER · HTTP LAYER</text>
    <text x="264" y="148" fill="#dbeafe" font-size="11" font-family="monospace">parse(req) → validate(schema) → call service</text>
    <text x="264" y="169" fill="#8aa4c8" font-size="10">职责：协议适配、参数校验、错误映射；禁止承载业务规则，禁止直接读写数据库。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="240" y="212" width="540" height="86" rx="16" fill="url(#panel)" stroke="#6ee7b7" stroke-width="1.6"/>
    <rect x="240" y="212" width="540" height="34" rx="16" fill="#0d2b2a"/>
    <text x="264" y="234" fill="#6ee7b7" font-size="14" font-weight="700">SERVICE · BUSINESS LAYER</text>
    <text x="264" y="256" fill="#dcfce7" font-size="11" font-family="monospace">orchestrate use cases → enforce invariants → open transaction boundary</text>
    <text x="264" y="277" fill="#8aa4c8" font-size="10">职责：聚合业务流程、封装规则与事务；不得依赖 Request / Response 等传输对象。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="240" y="320" width="540" height="86" rx="16" fill="url(#panel)" stroke="#f9a8d4" stroke-width="1.6"/>
    <rect x="240" y="320" width="540" height="34" rx="16" fill="#2c1830"/>
    <text x="264" y="342" fill="#f9a8d4" font-size="14" font-weight="700">REPOSITORY · DATA LAYER</text>
    <text x="264" y="364" fill="#fde7f3" font-size="11" font-family="monospace">db access / cache / external API adapter</text>
    <text x="264" y="385" fill="#8aa4c8" font-size="10">职责：纯数据访问与外部依赖封装；不允许回流业务判断，保证替换性与测试隔离。</text>
  </g>

  <g fill="none" stroke-width="2.4">
    <path d="M186 170 H238" stroke="#fbbf24" marker-end="url(#arrow)"/>
    <path d="M510 190 V210" stroke="#7dd3fc" marker-end="url(#arrow)"/>
    <path d="M510 298 V318" stroke="#6ee7b7" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="798" y="108" width="64" height="298" rx="16" fill="#0a1428" stroke="#2b456c" stroke-width="1"/>
    <text x="830" y="136" text-anchor="middle" fill="#8fb3da" font-size="10" font-weight="700">DI</text>
    <text x="830" y="153" text-anchor="middle" fill="#8fb3da" font-size="10" font-weight="700">SPINE</text>
    <circle cx="830" cy="184" r="10" fill="#0f2038" stroke="#7dd3fc" stroke-width="1.2"/>
    <circle cx="830" cy="255" r="10" fill="#10261f" stroke="#6ee7b7" stroke-width="1.2"/>
    <circle cx="830" cy="364" r="10" fill="#281629" stroke="#f9a8d4" stroke-width="1.2"/>
    <text x="830" y="213" text-anchor="middle" fill="#8aa4c8" font-size="9">validate</text>
    <text x="830" y="284" text-anchor="middle" fill="#8aa4c8" font-size="9">compose</text>
    <text x="830" y="393" text-anchor="middle" fill="#8aa4c8" font-size="9">access</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="58" y="426" width="804" height="26" rx="13" fill="#0a1428" stroke="#2b456c" stroke-width="1"/>
    <text x="460" y="443" text-anchor="middle" fill="#8aa4c8" font-size="10">Feature-First：同一业务域的 Controller / Service / Repository 共置，跨层依赖通过接口契约和依赖注入串联。</text>
  </g>
</svg>
