<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="440" fill="url(#bg)" rx="14"/>
  <rect width="900" height="440" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">iOS · UIKit vs SwiftUI</text>

  <g filter="url(#glow)">
    <rect x="40" y="75" width="260" height="36" rx="5" fill="#1d1832" stroke="#8338ec"/>
    <text x="170" y="98" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">SCENARIO</text>
    <rect x="320" y="75" width="260" height="36" rx="5" fill="#101b33" stroke="#7dd3fc"/>
    <text x="450" y="98" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">UIKit</text>
    <rect x="600" y="75" width="260" height="36" rx="5" fill="#102921" stroke="#6ee7b7"/>
    <text x="730" y="98" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">SwiftUI</text>
  </g>

  <g font-size="12" font-family="monospace">
    <rect x="40" y="118" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="55" y="140" fill="#f4fbff">主要板块</text>
    <rect x="320" y="118" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="335" y="140" fill="#dbeafe">UITabBarController</text>
    <rect x="600" y="118" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="615" y="140" fill="#dcfce7">TabView</text>

    <rect x="40" y="158" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="55" y="180" fill="#f4fbff">下钻导航</text>
    <rect x="320" y="158" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="335" y="180" fill="#dbeafe">UINavigationController</text>
    <rect x="600" y="158" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="615" y="180" fill="#dcfce7">NavigationStack</text>

    <rect x="40" y="198" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="55" y="220" fill="#f4fbff">专注任务</text>
    <rect x="320" y="198" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="335" y="220" fill="#dbeafe">Sheet presentation</text>
    <rect x="600" y="198" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="615" y="220" fill="#dcfce7">.sheet + detents</text>

    <rect x="40" y="238" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="55" y="260" fill="#f4fbff">列表内容</text>
    <rect x="320" y="238" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="335" y="260" fill="#dbeafe">UICollectionView</text>
    <rect x="600" y="238" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="615" y="260" fill="#dcfce7">List + insetGrouped</text>

    <rect x="40" y="278" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="55" y="300" fill="#f4fbff">搜索</text>
    <rect x="320" y="278" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="335" y="300" fill="#dbeafe">UISearchController</text>
    <rect x="600" y="278" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="615" y="300" fill="#dcfce7">.searchable</text>

    <rect x="40" y="318" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="55" y="340" fill="#f4fbff">深色模式</text>
    <rect x="320" y="318" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="335" y="340" fill="#dbeafe">semantic colors</text>
    <rect x="600" y="318" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="615" y="340" fill="#dcfce7">.primary / .secondary</text>

    <rect x="40" y="358" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="55" y="380" fill="#f4fbff">生命周期</text>
    <rect x="320" y="358" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="335" y="380" fill="#dbeafe">UIApplication notif</text>
    <rect x="600" y="358" width="260" height="34" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="615" y="380" fill="#dcfce7">@Environment</text>
  </g>

  <text x="450" y="420" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">interop: UIHostingController / UIViewRepresentable bridges legacy UIKit</text>
</svg>
