<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="480" fill="url(#bg)" rx="14"/>
  <rect width="900" height="480" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">MINIMAX-PDF · 3-MODE ROUTING</text>

  <g filter="url(#glow)">
    <rect x="340" y="70" width="220" height="50" rx="25" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <text x="450" y="100" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">⚡ INTENT ROUTER</text>
  </g>

  <g filter="url(#glow)" font-size="11" font-family="monospace">
    <rect x="30" y="170" width="270" height="260" rx="10" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="30" y="170" width="270" height="40" rx="10" fill="#7dd3fc" opacity="0.15"/>
    <text x="165" y="197" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">CREATE · 从零创建</text>
    <rect x="50" y="225" width="230" height="30" rx="4" fill="#0c162c" stroke="#21385d"/><text x="60" y="244" fill="#dbeafe">1. palette.py 选色</text>
    <rect x="50" y="265" width="230" height="30" rx="4" fill="#0c162c" stroke="#21385d"/><text x="60" y="284" fill="#dbeafe">2. cover.py 封面模板</text>
    <rect x="50" y="305" width="230" height="30" rx="4" fill="#0c162c" stroke="#21385d"/><text x="60" y="324" fill="#dbeafe">3. render_cover.js (Playwright)</text>
    <rect x="50" y="345" width="230" height="30" rx="4" fill="#0c162c" stroke="#21385d"/><text x="60" y="364" fill="#dbeafe">4. render_body.py (reportlab)</text>
    <rect x="50" y="385" width="230" height="30" rx="4" fill="#0c162c" stroke="#21385d"/><text x="60" y="404" fill="#dbeafe">5. merge.py 合并</text>

    <rect x="315" y="170" width="270" height="180" rx="10" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <rect x="315" y="170" width="270" height="40" rx="10" fill="#6ee7b7" opacity="0.15"/>
    <text x="450" y="197" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">FILL · 填充表单</text>
    <rect x="335" y="225" width="230" height="30" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="345" y="244" fill="#dcfce7">1. fill_inspect.py 探测</text>
    <rect x="335" y="265" width="230" height="30" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="345" y="284" fill="#dcfce7">2. fill_write.py 写入</text>
    <text x="450" y="335" text-anchor="middle" fill="#fbbf24" font-size="10">保留原始 PDF 表单结构</text>

    <rect x="600" y="170" width="270" height="180" rx="10" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <rect x="600" y="170" width="270" height="40" rx="10" fill="#f472b6" opacity="0.15"/>
    <text x="735" y="197" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">REFORMAT · 重排版</text>
    <rect x="620" y="225" width="230" height="30" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="630" y="244" fill="#fde7f3">1. reformat_parse.py 解析</text>
    <rect x="620" y="265" width="230" height="30" rx="4" fill="#0a0e27" stroke="#21385d"/><text x="630" y="284" fill="#fde7f3">2. reuse CREATE pipeline</text>
    <text x="735" y="335" text-anchor="middle" fill="#fbbf24" font-size="10">旧文档 → 品牌一致新设计</text>
  </g>

  <g stroke-width="1.5" fill="none" filter="url(#glow)">
    <line x1="400" y1="120" x2="165" y2="168" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="450" y1="120" x2="450" y2="168" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="500" y1="120" x2="735" y2="168" stroke="#f472b6" marker-end="url(#arr)"/>
  </g>

  <g fill="#fbbf24" font-size="10" font-style="italic">
    <text x="200" y="150" text-anchor="middle">"生成一份报告"</text>
    <text x="380" y="150" text-anchor="middle">"填写这个表单"</text>
    <text x="600" y="150" text-anchor="middle">"重新排版文档"</text>
  </g>

  <text x="450" y="460" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">CREATE pipeline reused by REFORMAT · clean modularity</text>
</svg>
