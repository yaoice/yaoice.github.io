    <text x="170" y="223" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">◆ NATURE (4)</text>
    <text x="50" y="247" fill="#dcfce7">› ocean/water · terrain</text>
    <text x="50" y="267" fill="#dcfce7">› atmospheric-scatter</text>
