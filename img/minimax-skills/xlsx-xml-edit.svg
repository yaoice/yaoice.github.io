<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="520" fill="url(#bg)" rx="14"/>
  <rect width="900" height="520" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">XLSX · DIRECT XML EDITING</text>

  <g filter="url(#glow)" font-size="11">
    <rect x="30" y="75" width="220" height="110" rx="10" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="140" y="100" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">📦 report.xlsx</text>
    <text x="140" y="120" text-anchor="middle" fill="#8aa4c8" font-size="10">(essentially a ZIP)</text>
    <text x="140" y="145" text-anchor="middle" fill="#fbbf24" font-family="monospace">✓ VBA macros</text>
    <text x="140" y="163" text-anchor="middle" fill="#fbbf24" font-family="monospace">✓ pivot tables + charts</text>

    <rect x="310" y="65" width="280" height="300" rx="10" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="450" y="88" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">⬢ UNPACKED FILE TREE</text>
    <g font-family="monospace" font-size="10" fill="#dcfce7">
      <rect x="330" y="100" width="240" height="24" rx="3" fill="#0f2920"/><text x="340" y="117">[Content_Types].xml</text>
      <rect x="330" y="128" width="240" height="24" rx="3" fill="#0f2920"/><text x="340" y="145">xl/workbook.xml</text>
      <rect x="330" y="156" width="240" height="24" rx="3" fill="#0f2920"/><text x="340" y="173">xl/styles.xml</text>
      <rect x="330" y="184" width="240" height="24" rx="3" fill="#0f2920"/><text x="340" y="201">xl/sharedStrings.xml</text>
      <rect x="330" y="212" width="240" height="24" rx="3" fill="#2d2410" stroke="#fbbf24"/><text x="340" y="229" fill="#fbbf24">xl/worksheets/sheet1.xml ←</text>
      <rect x="330" y="240" width="240" height="24" rx="3" fill="#0f2920"/><text x="340" y="257">xl/worksheets/sheet2.xml</text>
      <rect x="330" y="268" width="240" height="24" rx="3" fill="#0f2920"/><text x="340" y="285">xl/vbaProject.bin ✓</text>
      <rect x="330" y="296" width="240" height="24" rx="3" fill="#0f2920"/><text x="340" y="313">xl/pivotTables/ ✓</text>
    </g>
    <text x="450" y="348" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">edit XML → preserve ALL features</text>

    <rect x="650" y="75" width="220" height="110" rx="10" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <text x="760" y="100" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">✨ report_edited.xlsx</text>
    <text x="760" y="120" text-anchor="middle" fill="#8aa4c8" font-size="10">(fully preserved)</text>
    <text x="760" y="145" text-anchor="middle" fill="#6ee7b7" font-family="monospace">✓ VBA macros intact</text>
    <text x="760" y="163" text-anchor="middle" fill="#6ee7b7" font-family="monospace">✓ pivot · format · charts</text>
  </g>

  <g stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="250" y1="130" x2="308" y2="180" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="592" y1="180" x2="648" y2="130" stroke="#7dd3fc" marker-end="url(#arr)"/>
  </g>
  <g font-family="monospace" font-size="10" fill="#7dd3fc">
    <text x="268" y="160">xlsx_unpack</text>
    <text x="620" y="160">xlsx_pack</text>
  </g>

  <!-- 对比 openpyxl -->
  <rect x="30" y="400" width="840" height="100" rx="10" fill="#281629" stroke="#f472b6" stroke-width="1.5" filter="url(#glow)" opacity="0.85"/>
  <text x="50" y="422" fill="#f9a8d4" font-size="13" font-weight="bold">✗ TRADITIONAL openpyxl PATH</text>
  <g font-family="monospace" font-size="11" fill="#fde7f3">
    <text x="50" y="445">Python object model: read → modify → write_back</text>
    <text x="50" y="465">issue: unable to fully recognize VBA macros / pivot tables / complex charts</text>
    <text x="50" y="485" fill="#fbbf24">result: "file opens but features lost" — the pain point that motivated XML direct-edit</text>
  </g>
</svg>
