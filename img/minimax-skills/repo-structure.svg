  </g>

  <g stroke-width="1" stroke-dasharray="3 3" opacity="0.55">
    <line x1="155" y1="143" x2="275" y2="203" stroke="#7dd3fc"/>
    <line x1="345" y1="143" x2="345" y2="203" stroke="#7dd3fc"/>
    <line x1="535" y1="143" x2="435" y2="203" stroke="#7dd3fc"/>
