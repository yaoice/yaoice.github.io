    <rect x="55" y="245" width="140" height="30" rx="4" fill="#2d2410" stroke="#fbbf24" stroke-width="0.8"/><text x="125" y="265" text-anchor="middle" fill="#ffdc70">minimax-pdf</text>
    <rect x="205" y="245" width="140" height="30" rx="4" fill="#2d2410" stroke="#fbbf24" stroke-width="0.8"/><text x="275" y="265" text-anchor="middle" fill="#ffdc70">minimax-docx</text>
    <rect x="355" y="245" width="140" height="30" rx="4" fill="#2d2410" stroke="#fbbf24" stroke-width="0.8"/><text x="425" y="265" text-anchor="middle" fill="#ffdc70">minimax-xlsx</text>
    <rect x="505" y="245" width="140" height="30" rx="4" fill="#2d2410" stroke="#fbbf24" stroke-width="0.8"/><text x="575" y="265" text-anchor="middle" fill="#ffdc70">pptx-generator</text>

    <rect x="55" y="285" width="170" height="30" rx="4" fill="#281629" stroke="#f472b6" stroke-width="0.8"/><text x="140" y="305" text-anchor="middle" fill="#fde7f3">gif-sticker-maker</text>
    <rect x="235" y="285" width="240" height="30" rx="4" fill="#281629" stroke="#f472b6" stroke-width="0.8"/><text x="355" y="305" text-anchor="middle" fill="#fde7f3">minimax-multimodal-toolkit</text>
  </g>

