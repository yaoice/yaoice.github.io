  <rect x="30" y="65" width="840" height="90" rx="10" fill="none" stroke="#f472b6" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="50" y="85" fill="#f9a8d4" font-size="11" font-weight="bold" letter-spacing="2">① IDE ADAPTERS</text>
