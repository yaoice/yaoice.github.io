    <rect x="65" y="95" width="180" height="48" rx="5" fill="#281629" stroke="#f472b6" stroke-width="1"/>
    <text x="155" y="114" text-anchor="middle" fill="#f9a8d4" font-weight="bold">.claude/</text>
    <text x="155" y="130" text-anchor="middle" fill="#fde7f3">Claude Code</text>

    <rect x="255" y="95" width="180" height="48" rx="5" fill="#101b33" stroke="#7dd3fc" stroke-width="1"/>
    <text x="345" y="114" text-anchor="middle" fill="#7dd3fc" font-weight="bold">.cursor-plugin/</text>
    <text x="345" y="130" text-anchor="middle" fill="#dbeafe">Cursor</text>

    <rect x="445" y="95" width="180" height="48" rx="5" fill="#102921" stroke="#6ee7b7" stroke-width="1"/>
    <text x="535" y="114" text-anchor="middle" fill="#6ee7b7" font-weight="bold">.codex/</text>
    <text x="535" y="130" text-anchor="middle" fill="#dcfce7">Codex</text>

