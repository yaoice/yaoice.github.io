<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="440" fill="url(#bg)" rx="14"/>
  <rect width="900" height="440" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">iOS DEV · HIG-BASED IRON RULES</text>

  <g filter="url(#glow)" font-size="12">
    <rect x="40" y="75" width="260" height="160" rx="10" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="170" y="100" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">LAYOUT · 布局</text>
    <g fill="#dbeafe" font-family="monospace" font-size="11">
      <text x="60" y="125">› touch target ≥ 44pt</text>
      <text x="60" y="145">› safe area required</text>
      <text x="60" y="165">› 8pt grid (8/16/24...)</text>
      <text x="60" y="185">› primary action in</text>
      <text x="60" y="200">  thumb zone (bottom)</text>
    </g>

    <rect x="320" y="75" width="260" height="160" rx="10" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="450" y="100" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">TYPOGRAPHY · 排版</text>
    <g fill="#dcfce7" font-family="monospace" font-size="11">
      <text x="340" y="125">› Dynamic Type support</text>
      <text x="340" y="145">› text contrast ≥ 4.5:1</text>
      <text x="340" y="165">› semantic colors</text>
      <text x="340" y="185">  (auto dark/light)</text>
      <text x="340" y="205">› VoiceOver a11y</text>
    </g>

    <rect x="600" y="75" width="260" height="160" rx="10" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="730" y="100" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">NAVIGATION · 导航</text>
    <g fill="#fde7f3" font-family="monospace" font-size="11">
      <text x="620" y="125">› TabBar: 3-5 sections</text>
      <text x="620" y="145">› NavStack for drill-down</text>
      <text x="620" y="165" fill="#fbbf24" font-weight="bold">🚫 NO HAMBURGER!</text>
      <text x="620" y="182" fill="#f9a8d4" font-size="10">hidden = doesn't exist</text>
      <text x="620" y="205">› back-swipe must work</text>
    </g>

    <rect x="40" y="255" width="820" height="130" rx="10" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="60" y="280" fill="#a78bfa" font-size="13" font-weight="bold">PRIVACY &amp; ACCOUNT · 隐私</text>
    <g fill="#e5d4ff" font-family="monospace" font-size="11">
      <text x="60" y="305">› request permissions in-context (e.g. only after user taps "Take Photo")</text>
      <text x="60" y="325">› declare all permissions in Info.plist with clear NSUsageDescription</text>
      <text x="60" y="345">› support "Sign in with Apple" if any third-party login is offered</text>
      <text x="60" y="370" fill="#fbbf24" font-weight="bold">⚠ missing any → App Store rejection risk</text>
    </g>
  </g>

  <text x="450" y="415" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">rules map directly to Apple HIG · Skill enforces them before code generation</text>
</svg>
