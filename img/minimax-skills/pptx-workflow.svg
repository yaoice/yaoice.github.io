<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="400" fill="url(#bg)" rx="14"/>
  <rect width="900" height="400" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">PPTX-GENERATOR · 6-PHASE WORKFLOW</text>

  <g filter="url(#glow)" font-size="11">
    <rect x="40" y="130" width="130" height="100" rx="8" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="105" y="155" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">① Research</text>
    <text x="105" y="180" text-anchor="middle" fill="#dbeafe">audience</text>
    <text x="105" y="200" text-anchor="middle" fill="#dbeafe">topic study</text>

    <rect x="190" y="130" width="130" height="100" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="255" y="155" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">② Design</text>
    <text x="255" y="180" text-anchor="middle" fill="#e5d4ff">palette</text>
    <text x="255" y="200" text-anchor="middle" fill="#e5d4ff">font stack</text>

    <rect x="340" y="130" width="130" height="100" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="405" y="155" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">③ Planning</text>
    <text x="405" y="180" text-anchor="middle" fill="#dcfce7">slide plan</text>
    <text x="405" y="200" text-anchor="middle" fill="#dcfce7">5-category</text>

    <rect x="490" y="130" width="130" height="100" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="555" y="155" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">④ Generate</text>
    <text x="555" y="180" text-anchor="middle" fill="#ffdc70">JS modules</text>
    <text x="555" y="200" text-anchor="middle" fill="#ffdc70">1 file/slide</text>

    <rect x="640" y="130" width="130" height="100" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="705" y="155" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">⑤ Compile</text>
    <text x="705" y="180" text-anchor="middle" fill="#fde7f3">compile.js</text>
    <text x="705" y="200" text-anchor="middle" fill="#fde7f3">→ PPTX</text>

    <rect x="30" y="270" width="170" height="80" rx="8" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <text x="115" y="295" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">⑥ QA</text>
    <text x="115" y="315" text-anchor="middle" fill="#dbeafe">quality gates</text>
    <text x="115" y="335" text-anchor="middle" fill="#ffd166" font-size="10">page# · layout · fonts</text>
  </g>

  <g stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="170" y1="180" x2="188" y2="180" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="320" y1="180" x2="338" y2="180" stroke="#8338ec" marker-end="url(#arr)"/>
    <line x1="470" y1="180" x2="488" y2="180" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="620" y1="180" x2="638" y2="180" stroke="#fbbf24" marker-end="url(#arr)"/>
    <path d="M 705 230 Q 705 265 200 310" stroke="#f472b6" marker-end="url(#arr)"/>
  </g>

  <text x="450" y="380" text-anchor="middle" fill="#8aa4c8" font-size="11" font-family="monospace">modular · 1 slide = 1 JS module · merged at compile-time by compile.js</text>
</svg>
