<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="420" fill="url(#bg)" rx="14"/>
  <rect width="900" height="420" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">GIF-STICKER-MAKER · 5-STEP PIPELINE</text>

  <g filter="url(#glow)" font-size="11" font-family="monospace">
    <rect x="30" y="120" width="155" height="140" rx="8" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="107" y="144" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">STEP 0</text>
    <text x="107" y="165" text-anchor="middle" fill="#dbeafe">收集字幕文案</text>
    <text x="107" y="192" text-anchor="middle" fill="#8aa4c8" font-size="10">custom 4 subtitles</text>
    <text x="107" y="212" text-anchor="middle" fill="#8aa4c8" font-size="10">or default preset</text>
    <text x="107" y="240" text-anchor="middle" fill="#fbbf24" font-size="10">hi/laugh/cry/love</text>

    <rect x="205" y="120" width="155" height="140" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="282" y="144" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">STEP 1</text>
    <text x="282" y="165" text-anchor="middle" fill="#dcfce7">静态贴纸生成</text>
    <text x="282" y="192" text-anchor="middle" fill="#9ad0b7" font-size="10">MiniMax Image API</text>
    <text x="282" y="212" text-anchor="middle" fill="#9ad0b7" font-size="10">Funko Pop style</text>
    <text x="282" y="240" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">⚡ PARALLEL × 4</text>

    <rect x="380" y="120" width="155" height="140" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="457" y="144" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">STEP 2</text>
    <text x="457" y="165" text-anchor="middle" fill="#ffdc70">图片 → 动画</text>
    <text x="457" y="192" text-anchor="middle" fill="#c49a3f" font-size="10">MiniMax Video API</text>
    <text x="457" y="212" text-anchor="middle" fill="#c49a3f" font-size="10">i2v → mp4</text>
    <text x="457" y="240" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="bold">⚡ PARALLEL × 4</text>

    <rect x="555" y="120" width="155" height="140" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="632" y="144" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">STEP 3</text>
    <text x="632" y="165" text-anchor="middle" fill="#fde7f3">MP4 → GIF</text>
    <text x="632" y="192" text-anchor="middle" fill="#d6a6c2" font-size="10">FFmpeg local</text>
    <text x="632" y="212" text-anchor="middle" fill="#d6a6c2" font-size="10">palette optimize</text>
    <text x="632" y="240" text-anchor="middle" fill="#6ee7b7" font-size="10">no API call</text>

    <rect x="730" y="120" width="140" height="140" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="800" y="144" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">STEP 4</text>
    <text x="800" y="165" text-anchor="middle" fill="#e5d4ff">交付输出</text>
    <text x="800" y="192" text-anchor="middle" fill="#9d7ab3" font-size="10">deliver_assets</text>
    <text x="800" y="212" text-anchor="middle" fill="#9d7ab3" font-size="10">bundle 4 GIFs</text>
  </g>

  <g stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="185" y1="190" x2="203" y2="190" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="360" y1="190" x2="378" y2="190" stroke="#fbbf24" marker-end="url(#arr)"/>
    <line x1="535" y1="190" x2="553" y2="190" stroke="#f472b6" marker-end="url(#arr)"/>
    <line x1="710" y1="190" x2="728" y2="190" stroke="#8338ec" marker-end="url(#arr)"/>
  </g>

  <g fill="#8aa4c8" font-size="11" font-family="monospace">
    <text x="450" y="315" text-anchor="middle" fill="#fbbf24" font-weight="bold">KEY OPTIMIZATION · PARALLEL×4</text>
    <text x="450" y="340" text-anchor="middle">4 stickers generated independently · E2E time ≈ single sticker time</text>
    <text x="450" y="360" text-anchor="middle">throughput: 4× compared to serial</text>
  </g>
</svg>
