<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="440" fill="url(#bg)" rx="14"/>
  <rect width="900" height="440" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="40" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">INTEGRATION · CROSS-TOOL ARCHITECTURE</text>

  <!-- 中心 core skills -->
  <g filter="url(#glow)">
    <rect x="340" y="185" width="220" height="110" rx="12" fill="#0c162c" stroke="#7dd3fc" stroke-width="2.5"/>
    <text x="450" y="213" text-anchor="middle" fill="#7dd3fc" font-size="15" font-weight="bold">⬢ skills/</text>
    <text x="450" y="235" text-anchor="middle" fill="#dbeafe" font-size="12">core skill registry</text>
    <text x="450" y="255" text-anchor="middle" fill="#fbbf24" font-size="10">11 Skill definitions</text>
    <text x="450" y="275" text-anchor="middle" fill="#8aa4c8" font-size="10" font-family="monospace">IDE-agnostic</text>
  </g>

  <g filter="url(#glow)" font-family="monospace" font-size="12">
    <rect x="40" y="70" width="220" height="100" rx="10" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="150" y="95" text-anchor="middle" fill="#f9a8d4" font-weight="bold" font-size="13">Claude Code</text>
    <text x="150" y="120" text-anchor="middle" fill="#fde7f3">.claude/</text>
    <text x="150" y="140" text-anchor="middle" fill="#fde7f3">.claude-plugin/</text>
    <text x="150" y="160" text-anchor="middle" fill="#fbbf24" font-size="10">plugin marketplace</text>

    <rect x="640" y="70" width="220" height="100" rx="10" fill="#101b33" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="750" y="95" text-anchor="middle" fill="#7dd3fc" font-weight="bold" font-size="13">Cursor</text>
    <text x="750" y="120" text-anchor="middle" fill="#dbeafe">.cursor-plugin/</text>
    <text x="750" y="160" text-anchor="middle" fill="#fbbf24" font-size="10">settings &gt; skills path</text>

    <rect x="40" y="290" width="220" height="100" rx="10" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="150" y="315" text-anchor="middle" fill="#6ee7b7" font-weight="bold" font-size="13">Codex</text>
    <text x="150" y="340" text-anchor="middle" fill="#dcfce7">.codex/</text>
    <text x="150" y="380" text-anchor="middle" fill="#fbbf24" font-size="10">ln -s ~/.agents/skills</text>

    <rect x="640" y="290" width="220" height="100" rx="10" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="750" y="315" text-anchor="middle" fill="#a78bfa" font-weight="bold" font-size="13">OpenCode</text>
    <text x="750" y="340" text-anchor="middle" fill="#e5d4ff">.opencode/</text>
    <text x="750" y="380" text-anchor="middle" fill="#fbbf24" font-size="10">ln -s ~/.config/opencode</text>
  </g>

  <g stroke-width="2" stroke-dasharray="5 3" fill="none" filter="url(#glow)">
    <line x1="260" y1="120" x2="338" y2="205" stroke="#f472b6" marker-end="url(#arr)"/>
    <line x1="640" y1="120" x2="562" y2="205" stroke="#7dd3fc" marker-end="url(#arr)"/>
    <line x1="260" y1="340" x2="338" y2="270" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="640" y1="340" x2="562" y2="270" stroke="#8338ec" marker-end="url(#arr)"/>
  </g>

  <text x="450" y="420" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">dependency inversion · IDEs reference core · core is unaware of IDEs</text>
</svg>
