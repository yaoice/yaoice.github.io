<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Inter','Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%"><stop offset="0%" stop-color="#11213f"/><stop offset="55%" stop-color="#0b1730"/><stop offset="100%" stop-color="#08111f"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#21385d" stroke-width="0.7"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="900" height="420" fill="url(#bg)" rx="14"/>
  <rect width="900" height="420" fill="url(#grid)" rx="14" opacity="0.22"/>
  <text x="450" y="42" text-anchor="middle" fill="#f4fbff" font-size="20" font-weight="600" letter-spacing="2">ANDROID · PROJECT STATE EVALUATION</text>

  <g filter="url(#glow)">
    <rect x="340" y="75" width="220" height="55" rx="8" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <text x="450" y="100" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">▶ EVALUATE STATE</text>
    <text x="450" y="118" text-anchor="middle" fill="#8aa4c8" font-size="10" font-family="monospace">detect_project()</text>

    <rect x="30" y="180" width="200" height="80" rx="8" fill="#281629" stroke="#f472b6" stroke-width="1.5"/>
    <text x="130" y="205" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="bold">EMPTY DIR</text>
    <text x="130" y="225" text-anchor="middle" fill="#fde7f3" font-size="11" font-family="monospace">full init</text>
    <text x="130" y="245" text-anchor="middle" fill="#d6a6c2" font-size="9">Gradle + Manifest + ...</text>

    <rect x="250" y="180" width="200" height="80" rx="8" fill="#102921" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="350" y="205" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">HAS WRAPPER</text>
    <text x="350" y="225" text-anchor="middle" fill="#dcfce7" font-size="11" font-family="monospace">build directly</text>
    <text x="350" y="245" text-anchor="middle" fill="#9ad0b7" font-size="9">./gradlew assembleDebug</text>

    <rect x="470" y="180" width="200" height="80" rx="8" fill="#2d2410" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="570" y="205" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">AS PROJECT</text>
    <text x="570" y="225" text-anchor="middle" fill="#ffdc70" font-size="11" font-family="monospace">verify wrapper</text>
    <text x="570" y="245" text-anchor="middle" fill="#c49a3f" font-size="9">补齐缺失的 Wrapper</text>

    <rect x="690" y="180" width="180" height="80" rx="8" fill="#1d1832" stroke="#8338ec" stroke-width="1.5"/>
    <text x="780" y="205" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">INCOMPLETE</text>
    <text x="780" y="225" text-anchor="middle" fill="#e5d4ff" font-size="11" font-family="monospace">fix configs</text>
    <text x="780" y="245" text-anchor="middle" fill="#9d7ab3" font-size="9">AndroidManifest etc.</text>

    <rect x="200" y="320" width="500" height="70" rx="10" fill="#0c162c" stroke="#7dd3fc" stroke-width="2"/>
    <text x="450" y="347" text-anchor="middle" fill="#7dd3fc" font-size="14" font-weight="bold">◆ BUILD-FIRST PRINCIPLE</text>
    <text x="450" y="370" text-anchor="middle" fill="#ffd166" font-size="11" font-family="monospace">ensure ./gradlew assembleDebug passes BEFORE writing business code</text>
  </g>

  <g stroke-width="1.5" fill="none" filter="url(#glow)">
    <line x1="400" y1="130" x2="165" y2="178" stroke="#f472b6" marker-end="url(#arr)"/>
    <line x1="430" y1="130" x2="345" y2="178" stroke="#6ee7b7" marker-end="url(#arr)"/>
    <line x1="470" y1="130" x2="555" y2="178" stroke="#fbbf24" marker-end="url(#arr)"/>
    <line x1="500" y1="130" x2="755" y2="178" stroke="#8338ec" marker-end="url(#arr)"/>
  </g>
  <g stroke="#7dd3fc" stroke-width="1" stroke-dasharray="3 3" opacity="0.5">
    <line x1="130" y1="260" x2="300" y2="320"/>
    <line x1="350" y1="260" x2="400" y2="320"/>
    <line x1="570" y1="260" x2="500" y2="320"/>
    <line x1="780" y1="260" x2="600" y2="320"/>
  </g>
</svg>
