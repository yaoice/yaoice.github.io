<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Claude Skill 场景地图</title>
  <desc id="desc">用四象限展示 PDF、DOCX、品牌规范、前端设计等 Skill 示例的价值差异。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFBEB"/><stop offset="1" stop-color="#EFF6FF"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.12"/></filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0 L0 0 0 28" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.22"/></pattern>
    <style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0F172A}.title{font-size:34px;font-weight:800}.sub{font-size:16px;fill:#475569}.h{font-size:21px;font-weight:800}.body{font-size:15px;fill:#475569}.small{font-size:13px;fill:#64748B}.axis{font-size:14px;fill:#64748B;font-weight:700}.icon{font-size:34px;font-weight:900;fill:#fff}</style>
  </defs>
  <rect width="1200" height="660" fill="url(#bg)"/><rect width="1200" height="660" fill="url(#grid)"/>
  <text x="70" y="70" class="title">不同 Skill 解决的问题不同：文件格式、组织知识、风格偏好都能被封装</text>
  <text x="70" y="102" class="sub">判断一个场景是否适合 Skill 化，可以看它是否重复、是否有明确流程、是否依赖稳定规则或精确知识。</text>

  <g transform="translate(145 150)">
    <line x1="455" y1="0" x2="455" y2="410" stroke="#CBD5E1" stroke-width="3"/>
    <line x1="0" y1="205" x2="910" y2="205" stroke="#CBD5E1" stroke-width="3"/>
    <text x="344" y="445" class="axis">偏文件/工具流程</text><text x="510" y="445" class="axis">偏知识/偏好编码</text>
    <text x="-78" y="110" transform="rotate(-90 -78 110)" class="axis">结构化强</text><text x="-78" y="330" transform="rotate(-90 -78 330)" class="axis">审美/判断强</text>

    <g filter="url(#shadow)"><rect x="38" y="32" width="340" height="138" rx="26" fill="#fff"/><circle cx="78" cy="74" r="26" fill="#3B82F6"/><text x="67" y="86" class="icon">P</text><text x="122" y="70" class="h">PDF 处理</text><text x="122" y="103" class="body">提取表格、合并拆分、填写表单</text><text x="122" y="130" class="small">价值：把文档操作流程标准化</text></g>
    <g transform="translate(530 32)" filter="url(#shadow)"><rect x="0" y="0" width="340" height="138" rx="26" fill="#fff"/><circle cx="40" cy="42" r="26" fill="#10B981"/><text x="27" y="54" class="icon">B</text><text x="84" y="38" class="h">品牌规范</text><text x="84" y="71" class="body">色值、字体、视觉规则、禁用组合</text><text x="84" y="98" class="small">价值：封装组织内部精确信息</text></g>
    <g transform="translate(38 255)" filter="url(#shadow)"><rect x="0" y="0" width="340" height="138" rx="26" fill="#fff"/><circle cx="40" cy="42" r="26" fill="#F59E0B"/><text x="25" y="54" class="icon">D</text><text x="84" y="38" class="h">DOCX 编辑</text><text x="84" y="71" class="body">读取、修订、批注、保留格式</text><text x="84" y="98" class="small">价值：把复杂文件经验写成决策树</text></g>
    <g transform="translate(530 255)" filter="url(#shadow)"><rect x="0" y="0" width="340" height="138" rx="26" fill="#fff"/><circle cx="40" cy="42" r="26" fill="#8B5CF6"/><text x="28" y="54" class="icon">F</text><text x="84" y="38" class="h">前端设计</text><text x="84" y="71" class="body">视觉方向、排版、动效、质量门槛</text><text x="84" y="98" class="small">价值：把审美偏好变成可执行规则</text></g>
  </g>
</svg>