<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Claude Skill 创建流程</title>
  <desc id="desc">从识别重复任务到测试迭代的 Claude Skill 创建闭环。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FBFF"/>
      <stop offset="52%" stop-color="#F3F6FF"/>
      <stop offset="100%" stop-color="#FFF8F1"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4F7CFF"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#10B981"/><stop offset="1" stop-color="#84CC16"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F59E0B"/><stop offset="1" stop-color="#FB7185"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#1F2937" flood-opacity="0.12"/></filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M 28 0 L 0 0 0 28" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/></pattern>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4F46E5"/></marker>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0F172A}.title{font-size:34px;font-weight:800}.sub{font-size:16px;fill:#475569}.step{font-size:18px;font-weight:800}.body{font-size:14px;fill:#475569}.num{font-size:22px;font-weight:900;fill:#fff}.note{font-size:13px;fill:#64748B}
    </style>
  </defs>
  <rect width="1200" height="660" fill="url(#bg)"/>
  <rect width="1200" height="660" fill="url(#grid)"/>
  <text x="72" y="70" class="title">把重复任务沉淀为 Skill：先定义边界，再写说明，最后测试迭代</text>
  <text x="72" y="102" class="sub">官方流程的关键不是“多写提示词”，而是把任务、触发、执行和验证做成可复用能力单元。</text>

  <g transform="translate(75 178)">
    <path d="M60 92 H965" stroke="#4F46E5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" opacity="0.65"/>

    <g filter="url(#shadow)">
      <rect x="0" y="0" width="190" height="190" rx="26" fill="#FFFFFF"/>
      <circle cx="44" cy="44" r="24" fill="url(#blue)"/><text x="37" y="52" class="num">1</text>
      <text x="24" y="91" class="step">明确核心任务</text>
      <text x="24" y="124" class="body">输入、动作、输出</text>
      <text x="24" y="150" class="body">成功标准与边界</text>
    </g>
    <g transform="translate(220 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="190" height="190" rx="26" fill="#FFFFFF"/>
      <circle cx="44" cy="44" r="24" fill="url(#blue)"/><text x="37" y="52" class="num">2</text>
      <text x="24" y="91" class="step">命名 Skill</text>
      <text x="24" y="124" class="body">小写、短横线</text>
      <text x="24" y="150" class="body">用途一眼可见</text>
    </g>
    <g transform="translate(440 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="190" height="190" rx="26" fill="#FFFFFF"/>
      <circle cx="44" cy="44" r="24" fill="url(#orange)"/><text x="37" y="52" class="num">3</text>
      <text x="24" y="91" class="step">写 description</text>
      <text x="24" y="124" class="body">触发场景</text>
      <text x="24" y="150" class="body">不适用边界</text>
    </g>
    <g transform="translate(660 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="190" height="190" rx="26" fill="#FFFFFF"/>
      <circle cx="44" cy="44" r="24" fill="url(#green)"/><text x="37" y="52" class="num">4</text>
      <text x="24" y="91" class="step">写 instructions</text>
      <text x="24" y="124" class="body">步骤、示例、分支</text>
      <text x="24" y="150" class="body">错误处理与验证</text>
    </g>
    <g transform="translate(880 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="190" height="190" rx="26" fill="#FFFFFF"/>
      <circle cx="44" cy="44" r="24" fill="url(#green)"/><text x="37" y="52" class="num">5</text>
      <text x="24" y="91" class="step">上传与测试</text>
      <text x="24" y="124" class="body">正常 / 边界 / 越界</text>
      <text x="24" y="150" class="body">根据使用反馈迭代</text>
    </g>
  </g>

  <g transform="translate(114 450)" filter="url(#shadow)">
    <rect width="972" height="112" rx="24" fill="#FFFFFF"/>
    <text x="30" y="43" class="step">实用判断</text>
    <text x="30" y="76" class="body">如果一个任务已经做过 5 次、未来还会做 10 次，并且每次都要解释同一套规则，它就值得被 Skill 化。</text>
    <path d="M760 28 C806 28 806 84 852 84 C898 84 898 28 944 28" fill="none" stroke="#10B981" stroke-width="5" stroke-linecap="round"/>
    <text x="760" y="103" class="note">重复任务 → 稳定能力资产</text>
  </g>
</svg>
