<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Prompt 与 Skill 的差异</title>
  <desc id="desc">对比一次性 Prompt、项目说明文档和 Claude Skill 的定位差异。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#ECFEFF"/></linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#94A3B8"/><stop offset="1" stop-color="#64748B"/></linearGradient>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#06B6D4"/></linearGradient>
    <linearGradient id="c" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#10B981"/><stop offset="1" stop-color="#84CC16"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.12"/></filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0 L0 0 0 30" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/></pattern>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/></marker>
    <style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0F172A}.title{font-size:34px;font-weight:800}.sub{font-size:16px;fill:#475569}.h{font-size:22px;font-weight:800}.body{font-size:15px;fill:#475569}.small{font-size:13px;fill:#64748B}.white{fill:#fff;font-weight:900}.tag{font-size:13px;fill:#fff;font-weight:800}</style>
  </defs>
  <rect width="1200" height="660" fill="url(#bg)"/><rect width="1200" height="660" fill="url(#grid)"/>
  <text x="70" y="70" class="title">Prompt、项目文档与 Skill：从一次性沟通到可复用能力</text>
  <text x="70" y="102" class="sub">Prompt 适合临时表达意图；项目文档沉淀背景；Skill 则把触发、流程、示例和资源打包给 Agent 使用。</text>

  <g transform="translate(82 172)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="310" height="340" rx="30" fill="#fff"/>
      <circle cx="56" cy="58" r="30" fill="url(#a)"/><text x="43" y="68" class="white">P</text>
      <text x="36" y="118" class="h">一次性 Prompt</text>
      <text x="36" y="162" class="body">用户临时写入需求、背景和限制。</text>
      <text x="36" y="205" class="body">优点：快速、灵活。</text>
      <text x="36" y="237" class="body">问题：难复用，容易遗漏，</text>
      <text x="36" y="263" class="body">每次都要重新解释。</text>
      <rect x="36" y="292" width="160" height="34" rx="17" fill="#E2E8F0"/><text x="58" y="314" class="small">适合一次性任务</text>
    </g>
    <path d="M330 170 H392" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)" opacity="0.65"/>
    <g transform="translate(430 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="310" height="340" rx="30" fill="#fff"/>
      <circle cx="56" cy="58" r="30" fill="url(#b)"/><text x="44" y="68" class="white">D</text>
      <text x="36" y="118" class="h">项目说明文档</text>
      <text x="36" y="162" class="body">沉淀仓库规则、业务背景和术语。</text>
      <text x="36" y="205" class="body">优点：稳定、集中。</text>
      <text x="36" y="237" class="body">问题：不一定知道何时用，</text>
      <text x="36" y="263" class="body">也缺少执行流程。</text>
      <rect x="36" y="292" width="168" height="34" rx="17" fill="#DBEAFE"/><text x="58" y="314" class="small">适合提供背景</text>
    </g>
    <path d="M760 170 H822" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)" opacity="0.65"/>
    <g transform="translate(860 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="310" height="340" rx="30" fill="#fff"/>
      <circle cx="56" cy="58" r="30" fill="url(#c)"/><text x="44" y="68" class="white">S</text>
      <text x="36" y="118" class="h">Claude Skill</text>
      <text x="36" y="162" class="body">描述何时触发，并提供 SOP、</text>
      <text x="36" y="188" class="body">示例、脚本和模板资源。</text>
      <text x="36" y="231" class="body">优点：可复用、可测试、</text>
      <text x="36" y="257" class="body">适合多步骤工作流。</text>
      <rect x="36" y="292" width="178" height="34" rx="17" fill="#DCFCE7"/><text x="58" y="314" class="small">适合能力沉淀</text>
    </g>
  </g>
</svg>