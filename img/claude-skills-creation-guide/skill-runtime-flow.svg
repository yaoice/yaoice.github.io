<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Claude Skill 运行流程</title>
  <desc id="desc">展示从用户请求到语义匹配、加载 Skill、读取资源、执行和验证的运行流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#F0FDF4"/></linearGradient>
    <linearGradient id="main" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2563EB"/><stop offset="1" stop-color="#14B8A6"/></linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F59E0B"/><stop offset="1" stop-color="#FB7185"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.12"/></filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0 L0 0 0 28" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.22"/></pattern>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/></marker>
    <style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0F172A}.title{font-size:34px;font-weight:800}.sub{font-size:16px;fill:#475569}.h{font-size:18px;font-weight:800}.body{font-size:14px;fill:#475569}.small{font-size:13px;fill:#64748B}.num{font-size:18px;font-weight:900;fill:#fff}.pill{font-size:13px;fill:#fff;font-weight:800}</style>
  </defs>
  <rect width="1200" height="660" fill="url(#bg)"/><rect width="1200" height="660" fill="url(#grid)"/>
  <text x="70" y="70" class="title">Skill 运行时像一条按需装配线：先匹配，再加载，再执行</text>
  <text x="70" y="102" class="sub">好的 Skill 让 Claude 不必每次读完整知识库，而是只在相关任务出现时加载必要说明和资源。</text>

  <g transform="translate(72 170)">
    <path d="M85 92 H1010" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" opacity="0.6"/>
    <g filter="url(#shadow)"><rect x="0" y="0" width="180" height="178" rx="26" fill="#fff"/><circle cx="45" cy="42" r="22" fill="url(#main)"/><text x="39" y="49" class="num">1</text><text x="24" y="86" class="h">用户请求</text><text x="24" y="119" class="body">自然语言描述任务</text><text x="24" y="145" class="body">可能附带文件</text></g>
    <g transform="translate(220 0)" filter="url(#shadow)"><rect x="0" y="0" width="180" height="178" rx="26" fill="#fff"/><circle cx="45" cy="42" r="22" fill="url(#main)"/><text x="39" y="49" class="num">2</text><text x="24" y="86" class="h">语义匹配</text><text x="24" y="119" class="body">比较请求与</text><text x="24" y="145" class="body">name / description</text></g>
    <g transform="translate(440 0)" filter="url(#shadow)"><rect x="0" y="0" width="180" height="178" rx="26" fill="#fff"/><circle cx="45" cy="42" r="22" fill="url(#side)"/><text x="39" y="49" class="num">3</text><text x="24" y="86" class="h">加载 SKILL.md</text><text x="24" y="119" class="body">读取触发说明、</text><text x="24" y="145" class="body">流程和限制</text></g>
    <g transform="translate(660 0)" filter="url(#shadow)"><rect x="0" y="0" width="180" height="178" rx="26" fill="#fff"/><circle cx="45" cy="42" r="22" fill="url(#side)"/><text x="39" y="49" class="num">4</text><text x="24" y="86" class="h">按需取资源</text><text x="24" y="119" class="body">示例、模板、</text><text x="24" y="145" class="body">脚本或参考文档</text></g>
    <g transform="translate(880 0)" filter="url(#shadow)"><rect x="0" y="0" width="180" height="178" rx="26" fill="#fff"/><circle cx="45" cy="42" r="22" fill="url(#main)"/><text x="39" y="49" class="num">5</text><text x="24" y="86" class="h">执行并验证</text><text x="24" y="119" class="body">按 SOP 输出，</text><text x="24" y="145" class="body">自检结果</text></g>
  </g>

  <g transform="translate(165 430)" filter="url(#shadow)">
    <rect width="870" height="110" rx="28" fill="#FFFFFF"/>
    <rect x="32" y="30" width="112" height="34" rx="17" fill="url(#main)"/><text x="56" y="53" class="pill">关键点</text>
    <text x="170" y="43" class="body">`description` 负责让 Skill 在正确场景出现；菜单式结构负责让 Claude 只读取必要材料。</text>
    <text x="170" y="73" class="body">这就是 Skill 与“大段提示词粘贴”的根本差异：它更像可被 Agent 按需装配的知识模块。</text>
  </g>
</svg>