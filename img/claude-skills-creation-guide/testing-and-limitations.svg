<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Skill 测试矩阵与限制</title>
  <desc id="desc">展示正常请求、边界情况、越界请求三类测试，以及 Claude Skills 的主要限制。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#F5F3FF"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#06B6D4"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#10B981"/><stop offset="1" stop-color="#22C55E"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F59E0B"/><stop offset="1" stop-color="#F97316"/></linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#EF4444"/><stop offset="1" stop-color="#FB7185"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#334155" flood-opacity="0.13"/></filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M 28 0 L 0 0 0 28" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.23"/></pattern>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0F172A}.title{font-size:34px;font-weight:800}.sub{font-size:16px;fill:#475569}.h{font-size:20px;font-weight:800}.body{font-size:15px;fill:#475569}.small{font-size:13px;fill:#64748B}.num{font-size:22px;font-weight:900;fill:#fff}.pill{font-size:13px;font-weight:800;fill:#fff}
    </style>
  </defs>
  <rect width="1200" height="660" fill="url(#bg)"/>
  <rect width="1200" height="660" fill="url(#grid)"/>
  <text x="70" y="70" class="title">Skill 不是写完就结束：必须验证触发、执行和边界</text>
  <text x="70" y="102" class="sub">官方建议至少覆盖三类测试，同时正视个人级上传、上下文膨胀和过度泛化等限制。</text>

  <g transform="translate(70 155)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="325" height="230" rx="28" fill="#FFFFFF"/>
      <circle cx="46" cy="48" r="25" fill="url(#green)"/><text x="39" y="56" class="num">1</text>
      <text x="88" y="55" class="h">正常请求</text>
      <text x="30" y="105" class="body">验证主流程是否稳定：</text>
      <text x="30" y="138" class="body">• 典型输入能否完成</text>
      <text x="30" y="168" class="body">• 输出格式是否达标</text>
      <text x="30" y="198" class="body">• 是否遵守成功标准</text>
    </g>
    <g transform="translate(365 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="325" height="230" rx="28" fill="#FFFFFF"/>
      <circle cx="46" cy="48" r="25" fill="url(#orange)"/><text x="39" y="56" class="num">2</text>
      <text x="88" y="55" class="h">边界情况</text>
      <text x="30" y="105" class="body">验证异常输入下的表现：</text>
      <text x="30" y="138" class="body">• 数据缺失或格式不完整</text>
      <text x="30" y="168" class="body">• 用户请求模糊</text>
      <text x="30" y="198" class="body">• 能否说明还缺什么信息</text>
    </g>
    <g transform="translate(730 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="325" height="230" rx="28" fill="#FFFFFF"/>
      <circle cx="46" cy="48" r="25" fill="url(#red)"/><text x="39" y="56" class="num">3</text>
      <text x="88" y="55" class="h">越界请求</text>
      <text x="30" y="105" class="body">验证不该触发时是否沉默：</text>
      <text x="30" y="138" class="body">• 相似但不同的任务类型</text>
      <text x="30" y="168" class="body">• 与 Skill 目标无关的需求</text>
      <text x="30" y="198" class="body">• 触发描述是否需要收紧</text>
    </g>
  </g>

  <g transform="translate(96 435)">
    <g filter="url(#shadow)"><rect x="0" y="0" width="238" height="120" rx="24" fill="#FFFFFF"/><rect x="26" y="24" width="78" height="30" rx="15" fill="url(#blue)"/><text x="45" y="45" class="pill">限制</text><text x="26" y="83" class="body">触发质量依赖 description</text></g>
    <g transform="translate(274 0)" filter="url(#shadow)"><rect x="0" y="0" width="238" height="120" rx="24" fill="#FFFFFF"/><rect x="26" y="24" width="78" height="30" rx="15" fill="url(#blue)"/><text x="45" y="45" class="pill">限制</text><text x="26" y="83" class="body">主文件过大会污染上下文</text></g>
    <g transform="translate(548 0)" filter="url(#shadow)"><rect x="0" y="0" width="238" height="120" rx="24" fill="#FFFFFF"/><rect x="26" y="24" width="78" height="30" rx="15" fill="url(#blue)"/><text x="45" y="45" class="pill">限制</text><text x="26" y="83" class="body">Claude.ai 自定义 Skill 偏个人级</text></g>
    <g transform="translate(822 0)" filter="url(#shadow)"><rect x="0" y="0" width="238" height="120" rx="24" fill="#FFFFFF"/><rect x="26" y="24" width="78" height="30" rx="15" fill="url(#blue)"/><text x="45" y="45" class="pill">限制</text><text x="26" y="83" class="body">一次性任务不值得 Skill 化</text></g>
  </g>
</svg>
