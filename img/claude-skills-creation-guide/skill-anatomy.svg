<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Claude Skill 结构剖面</title>
  <desc id="desc">展示 SKILL.md、description、instructions、示例、资源和脚本之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#EEF6FF"/></linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6366F1"/><stop offset="1" stop-color="#06B6D4"/></linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F59E0B"/><stop offset="1" stop-color="#F97316"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#334155" flood-opacity="0.13"/></filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M 30 0 L 0 0 0 30" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.26"/></pattern>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0F172A}.title{font-size:34px;font-weight:800}.sub{font-size:16px;fill:#475569}.h{font-size:20px;font-weight:800}.body{font-size:15px;fill:#475569}.mono{font-size:17px;font-weight:800;fill:#4338CA}.small{font-size:13px;fill:#64748B}.white{fill:#fff;font-weight:800}.badge{font-size:13px;font-weight:800;fill:#fff}
    </style>
  </defs>
  <rect width="1200" height="660" fill="url(#bg)"/>
  <rect width="1200" height="660" fill="url(#grid)"/>
  <text x="70" y="70" class="title">一个好 Skill 像“能力包”：触发描述很短，执行知识按需展开</text>
  <text x="70" y="102" class="sub">`name` 与 `description` 影响是否触发；`instructions`、示例和资源决定触发后能否稳定完成任务。</text>

  <g transform="translate(80 160)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="430" height="400" rx="30" fill="#FFFFFF"/>
      <rect x="28" y="26" width="154" height="38" rx="19" fill="url(#core)"/><text x="50" y="51" class="badge">SKILL.md</text>
      <text x="32" y="104" class="mono">name: pdf-editor</text>
      <text x="32" y="146" class="h">description</text>
      <text x="32" y="178" class="body">说明何时使用、适合什么输入、</text>
      <text x="32" y="204" class="body">不适合哪些请求。</text>
      <rect x="32" y="230" width="366" height="1" fill="#E2E8F0"/>
      <text x="32" y="270" class="h">instructions</text>
      <text x="32" y="302" class="body">任务步骤、决策树、输出格式、</text>
      <text x="32" y="328" class="body">错误处理、验证标准。</text>
      <text x="32" y="370" class="small">主文件越清晰，模型越容易正确选择和执行。</text>
    </g>

    <g transform="translate(520 0)">
      <g filter="url(#shadow)"><rect x="0" y="0" width="250" height="120" rx="24" fill="#FFFFFF"/><circle cx="34" cy="38" r="12" fill="#10B981"/><text x="60" y="45" class="h">examples/</text><text x="28" y="82" class="body">好 / 坏输出样例</text></g>
      <g transform="translate(300 0)" filter="url(#shadow)"><rect x="0" y="0" width="250" height="120" rx="24" fill="#FFFFFF"/><circle cx="34" cy="38" r="12" fill="#3B82F6"/><text x="60" y="45" class="h">scripts/</text><text x="28" y="82" class="body">可执行脚本或工具</text></g>
      <g transform="translate(0 150)" filter="url(#shadow)"><rect x="0" y="0" width="250" height="120" rx="24" fill="#FFFFFF"/><circle cx="34" cy="38" r="12" fill="#F59E0B"/><text x="60" y="45" class="h">references/</text><text x="28" y="82" class="body">详细流程与规则</text></g>
      <g transform="translate(300 150)" filter="url(#shadow)"><rect x="0" y="0" width="250" height="120" rx="24" fill="#FFFFFF"/><circle cx="34" cy="38" r="12" fill="#8B5CF6"/><text x="60" y="45" class="h">assets/</text><text x="28" y="82" class="body">模板、图片、数据口径</text></g>
      <g transform="translate(80 310)" filter="url(#shadow)"><rect x="0" y="0" width="390" height="90" rx="24" fill="#FFF7ED"/><rect x="28" y="25" width="104" height="32" rx="16" fill="url(#warn)"/><text x="48" y="47" class="badge">menu</text><text x="150" y="38" class="body">复杂 Skill 不把所有内容塞进主文件，</text><text x="150" y="64" class="body">而是让 Claude 按需读取相关材料。</text></g>
    </g>

    <path d="M430 200 C500 200 490 60 520 60" fill="none" stroke="#6366F1" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10"/>
    <path d="M430 200 C500 200 490 210 520 210" fill="none" stroke="#6366F1" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10"/>
    <path d="M430 230 C548 310 590 355 600 355" fill="none" stroke="#6366F1" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10"/>
  </g>
</svg>
