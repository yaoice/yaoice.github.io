<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Skill description 触发边界</title>
  <desc id="desc">展示 description 如何影响 Skill 语义触发的命中、漏触发和误触发。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#FFF7ED"/></linearGradient>
    <radialGradient id="semantic" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#DCFCE7" stop-opacity="0.98"/><stop offset="70%" stop-color="#BBF7D0" stop-opacity="0.58"/><stop offset="100%" stop-color="#BBF7D0" stop-opacity="0.08"/></radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#334155" flood-opacity="0.12"/></filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M 28 0 L 0 0 0 28" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.22"/></pattern>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0F172A}.title{font-size:34px;font-weight:800}.sub{font-size:16px;fill:#475569}.h{font-size:20px;font-weight:800}.body{font-size:15px;fill:#475569}.small{font-size:13px;fill:#64748B}.good{fill:#059669;font-weight:800}.bad{fill:#DC2626;font-weight:800}.warn{fill:#D97706;font-weight:800}.pill{font-size:13px;font-weight:800;fill:#fff}
    </style>
  </defs>
  <rect width="1200" height="660" fill="url(#bg)"/>
  <rect width="1200" height="660" fill="url(#grid)"/>
  <text x="70" y="70" class="title">description 决定 Skill 何时激活：不是关键词匹配，而是语义边界</text>
  <text x="70" y="102" class="sub">写得过宽会误触发，写得过窄会漏触发；好的描述同时包含能力、场景、输入输出和排除条件。</text>

  <g transform="translate(82 148)">
    <circle cx="515" cy="235" r="210" fill="url(#semantic)"/>
    <circle cx="515" cy="235" r="128" fill="#DCFCE7" opacity="0.82" stroke="#10B981" stroke-width="3"/>
    <text x="454" y="228" class="h">目标语义区</text>
    <text x="408" y="260" class="body">应该触发 Skill 的请求</text>

    <g filter="url(#shadow)">
      <rect x="0" y="40" width="300" height="130" rx="24" fill="#FFFFFF"/>
      <rect x="24" y="24" width="118" height="34" rx="17" fill="#EF4444"/><text x="50" y="46" class="pill">过宽</text>
      <text x="28" y="86" class="h">“帮助处理文档”</text>
      <text x="28" y="120" class="body">容易把阅读、翻译、简单转换</text>
      <text x="28" y="146" class="body">也误判为需要 Skill。</text>
    </g>

    <g transform="translate(0 274)" filter="url(#shadow)">
      <rect x="0" y="0" width="300" height="130" rx="24" fill="#FFFFFF"/>
      <rect x="24" y="-16" width="118" height="34" rx="17" fill="#F59E0B"/><text x="50" y="7" class="pill">过窄</text>
      <text x="28" y="45" class="h">“只处理 10-K PDF”</text>
      <text x="28" y="79" class="body">相近的年报、财务表格或</text>
      <text x="28" y="105" class="body">批量提取任务可能漏掉。</text>
    </g>

    <g transform="translate(748 85)" filter="url(#shadow)">
      <rect x="0" y="0" width="310" height="265" rx="28" fill="#FFFFFF"/>
      <rect x="28" y="26" width="126" height="34" rx="17" fill="#10B981"/><text x="54" y="49" class="pill">合适</text>
      <text x="28" y="93" class="h">描述应同时说明</text>
      <text x="28" y="130" class="body">• 能力：提取、生成、合并、校验</text>
      <text x="28" y="162" class="body">• 输入：PDF、DOCX、表格、模板</text>
      <text x="28" y="194" class="body">• 场景：批处理、工作流、表单</text>
      <text x="28" y="226" class="body">• 边界：不用于简单查看或闲聊</text>
    </g>

    <g transform="translate(340 455)">
      <rect x="0" y="0" width="520" height="58" rx="29" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="32" y="37" class="small">写法公式：动作 + 输入对象 + 输出结果 + 使用场景 + 不适用边界</text>
    </g>

    <path d="M310 100 C370 105 390 150 420 180" fill="none" stroke="#EF4444" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 9"/>
    <path d="M300 340 C370 330 395 290 430 260" fill="none" stroke="#F59E0B" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 9"/>
    <path d="M735 215 C680 215 660 224 642 230" fill="none" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
