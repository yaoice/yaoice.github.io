<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Skill 生命周期与治理</title>
  <desc id="desc">展示 Claude Skill 从发现重复任务、创建、测试、发布、观察到更新或退役的生命周期。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="55%" stop-color="#EEF6FF"/>
      <stop offset="100%" stop-color="#FFF1F2"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#0EA5E9"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#10B981"/><stop offset="1" stop-color="#84CC16"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F59E0B"/><stop offset="1" stop-color="#FB7185"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.12"/></filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0 L0 0 0 30" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.22"/></pattern>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4F46E5"/></marker>
    <marker id="arrow-orange" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#F59E0B"/></marker>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0F172A}.title{font-size:34px;font-weight:800}.sub{font-size:16px;fill:#475569}.h{font-size:19px;font-weight:800}.body{font-size:14px;fill:#475569}.small{font-size:13px;fill:#64748B}.num{font-size:20px;font-weight:900;fill:#fff}.pill{font-size:13px;fill:#fff;font-weight:800}.axis{font-size:13px;fill:#64748B;font-weight:700}
    </style>
  </defs>
  <rect width="1200" height="660" fill="url(#bg)"/>
  <rect width="1200" height="660" fill="url(#grid)"/>
  <text x="70" y="64" class="title">团队里的 Skill 需要生命周期治理：创建只是开始</text>
  <text x="70" y="96" class="sub">当 Skill 被多人复用后，它就从个人提示词变成知识资产，需要 owner、版本、审查、监控和退役机制。</text>

  <g transform="translate(72 142)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="236" height="142" rx="26" fill="#FFFFFF"/>
      <circle cx="42" cy="42" r="24" fill="url(#blue)"/><text x="36" y="50" class="num">1</text>
      <text x="78" y="39" class="h">发现重复任务</text>
      <text x="28" y="82" class="body">同类需求反复出现，</text>
      <text x="28" y="108" class="body">规则每次都要重讲。</text>
    </g>
    <path d="M252 71 H300" stroke="#4F46E5" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(320 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="236" height="142" rx="26" fill="#FFFFFF"/>
      <circle cx="42" cy="42" r="24" fill="url(#blue)"/><text x="36" y="50" class="num">2</text>
      <text x="78" y="39" class="h">创建 Skill</text>
      <text x="28" y="82" class="body">写清 name、description、</text>
      <text x="28" y="108" class="body">instructions 与示例。</text>
    </g>
    <path d="M572 71 H620" stroke="#4F46E5" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(640 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="236" height="142" rx="26" fill="#FFFFFF"/>
      <circle cx="42" cy="42" r="24" fill="url(#green)"/><text x="36" y="50" class="num">3</text>
      <text x="78" y="39" class="h">测试验证</text>
      <text x="28" y="82" class="body">覆盖正常、边界、</text>
      <text x="28" y="108" class="body">越界三类请求。</text>
    </g>
    <path d="M892 71 H940" stroke="#4F46E5" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(960 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="96" height="142" rx="26" fill="#FFFFFF"/>
      <circle cx="48" cy="42" r="24" fill="url(#green)"/><text x="42" y="50" class="num">4</text>
      <text x="30" y="91" class="h">发布</text>
    </g>
  </g>

  <path d="M1080 292 C1080 338 1018 346 980 346" fill="none" stroke="#4F46E5" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(192 335)">
    <g transform="translate(640 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="260" height="142" rx="26" fill="#FFFFFF"/>
      <circle cx="42" cy="42" r="24" fill="url(#orange)"/><text x="36" y="50" class="num">5</text>
      <text x="78" y="39" class="h">观察使用</text>
      <text x="28" y="82" class="body">看触发是否准确，</text>
      <text x="28" y="108" class="body">输出是否稳定可用。</text>
    </g>
    <path d="M620 71 H572" stroke="#F59E0B" stroke-width="4" marker-end="url(#arrow-orange)"/>
    <g transform="translate(320 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="260" height="142" rx="26" fill="#FFFFFF"/>
      <circle cx="42" cy="42" r="24" fill="url(#orange)"/><text x="36" y="50" class="num">6</text>
      <text x="78" y="39" class="h">更新或退役</text>
      <text x="28" y="82" class="body">流程变化就更新；</text>
      <text x="28" y="108" class="body">不再有效就下线。</text>
    </g>
    <path d="M300 71 H252" stroke="#F59E0B" stroke-width="4" marker-end="url(#arrow-orange)"/>
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="260" height="142" rx="26" fill="#FFFFFF"/>
      <rect x="28" y="24" width="92" height="30" rx="15" fill="url(#orange)"/><text x="49" y="45" class="pill">治理</text>
      <text x="28" y="86" class="body">owner、版本号、changelog、</text>
      <text x="28" y="112" class="body">共享位置与废弃条件。</text>
    </g>
  </g>

  <g transform="translate(88 535)" filter="url(#shadow)">
    <rect width="1024" height="76" rx="24" fill="#FFFFFF"/>
    <rect x="28" y="22" width="120" height="32" rx="16" fill="url(#blue)"/><text x="52" y="44" class="pill">核心结论</text>
    <text x="172" y="34" class="body">Skill 的长期价值不只来自“写得好”，还来自上线后的持续观察：该触发时是否触发、不该触发时是否沉默、输出是否仍符合团队标准。</text>
    <text x="172" y="59" class="small">如果没有治理闭环，Skill 很容易像无人维护的共享文档一样逐渐失真。</text>
  </g>
</svg>
