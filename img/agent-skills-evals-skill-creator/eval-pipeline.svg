<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Skill eval 执行流水线</title>
  <desc id="desc">展示 eval 从测试输入、隔离执行、结果评判到回归修复的流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#ecfeff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.13"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Microsoft YaHei,sans-serif">
    <text x="60" y="64" font-size="30" font-weight="800" fill="#0f172a">eval 不是一次性验收，而是持续反馈流水线</text>
    <text x="60" y="100" font-size="17" fill="#475569">把 prompt、附件和 rubric 变成可重复运行的测试，再把失败样例沉淀为回归集</text>

    <g filter="url(#shadow)">
      <rect x="72" y="160" width="220" height="330" rx="28" fill="#fff" stroke="#bfdbfe"/>
      <text x="105" y="205" font-size="22" font-weight="800" fill="#1d4ed8">测试输入</text>
      <rect x="105" y="240" width="150" height="48" rx="16" fill="#eff6ff"/><text x="180" y="270" text-anchor="middle" font-size="15" fill="#1e3a8a">用户 prompt</text>
      <rect x="105" y="310" width="150" height="48" rx="16" fill="#eff6ff"/><text x="180" y="340" text-anchor="middle" font-size="15" fill="#1e3a8a">附件 / 样例</text>
      <rect x="105" y="380" width="150" height="48" rx="16" fill="#eff6ff"/><text x="180" y="410" text-anchor="middle" font-size="15" fill="#1e3a8a">通过标准</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="390" y="190" width="230" height="270" rx="28" fill="#fff" stroke="#bbf7d0"/>
      <text x="505" y="235" text-anchor="middle" font-size="22" font-weight="800" fill="#047857">隔离执行</text>
      <circle cx="505" cy="310" r="56" fill="#dcfce7"/>
      <text x="505" y="305" text-anchor="middle" font-size="17" font-weight="800" fill="#065f46">Clean</text>
      <text x="505" y="330" text-anchor="middle" font-size="17" font-weight="800" fill="#065f46">Agent Context</text>
      <text x="505" y="400" text-anchor="middle" font-size="14" fill="#475569">加载 Skill 后执行任务</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="720" y="160" width="220" height="330" rx="28" fill="#fff" stroke="#fed7aa"/>
      <text x="755" y="205" font-size="22" font-weight="800" fill="#c2410c">结果评判</text>
      <rect x="755" y="245" width="150" height="46" rx="15" fill="#fff7ed"/><text x="830" y="274" text-anchor="middle" font-size="14" fill="#9a3412">输出质量</text>
      <rect x="755" y="310" width="150" height="46" rx="15" fill="#fff7ed"/><text x="830" y="339" text-anchor="middle" font-size="14" fill="#9a3412">格式 / 完整性</text>
      <rect x="755" y="375" width="150" height="46" rx="15" fill="#fff7ed"/><text x="830" y="404" text-anchor="middle" font-size="14" fill="#9a3412">成本 / 耗时</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="1000" y="205" width="135" height="220" rx="26" fill="#0f172a"/>
      <text x="1067" y="255" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">反馈</text>
      <text x="1067" y="305" text-anchor="middle" font-size="14" fill="#cbd5e1">修改 SKILL.md</text>
      <text x="1067" y="335" text-anchor="middle" font-size="14" fill="#cbd5e1">补充 eval</text>
      <text x="1067" y="365" text-anchor="middle" font-size="14" fill="#cbd5e1">再次 benchmark</text>
    </g>

    <g stroke="#2563eb" stroke-width="4" fill="none" marker-end="url(#arrow)">
      <path d="M292 325 H380"/>
      <path d="M620 325 H710"/>
      <path d="M940 325 H990"/>
      <path d="M1067 425 C1067 565 205 565 180 492" stroke="#0f766e"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="365" y="525" width="470" height="78" rx="24" fill="#fff" stroke="#e2e8f0"/>
      <text x="600" y="558" text-anchor="middle" font-size="17" font-weight="800" fill="#0f172a">失败样例不是噪声，而是下一轮回归测试</text>
      <text x="600" y="585" text-anchor="middle" font-size="14" fill="#64748b">每次线上失败都应该进入 eval suite，而不只是修改提示词</text>
    </g>
  </g>
</svg>
