<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Skill 触发描述优化</title>
  <desc id="desc">展示 description gate 如何通过正例和负例降低误触发与漏触发。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#fff7ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Microsoft YaHei,sans-serif">
    <text x="60" y="64" font-size="30" font-weight="800" fill="#0f172a">description 是 Skill 的路由规则</text>
    <text x="60" y="100" font-size="17" fill="#475569">写得太宽会误触发，写得太窄会漏触发；优化目标是找到任务边界的 sweet spot</text>

    <g filter="url(#shadow)">
      <rect x="70" y="155" width="240" height="370" rx="28" fill="#fff" stroke="#dbeafe"/>
      <text x="190" y="200" text-anchor="middle" font-size="22" font-weight="800" fill="#1d4ed8">用户 prompts</text>
      <rect x="105" y="245" width="170" height="46" rx="14" fill="#eff6ff"/><text x="190" y="274" text-anchor="middle" font-size="13" fill="#1e3a8a">审查这份 NDA 风险</text>
      <rect x="105" y="315" width="170" height="46" rx="14" fill="#eff6ff"/><text x="190" y="344" text-anchor="middle" font-size="13" fill="#1e3a8a">总结合同主要内容</text>
      <rect x="105" y="385" width="170" height="46" rx="14" fill="#eff6ff"/><text x="190" y="414" text-anchor="middle" font-size="13" fill="#1e3a8a">写邮件确认收到</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="455" y="205" width="290" height="270" rx="32" fill="#0f172a"/>
      <text x="600" y="260" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">Description Gate</text>
      <text x="600" y="305" text-anchor="middle" font-size="15" fill="#cbd5e1">何时应该加载这个 Skill？</text>
      <text x="600" y="337" text-anchor="middle" font-size="15" fill="#cbd5e1">何时应该交给其他 Skill？</text>
      <text x="600" y="369" text-anchor="middle" font-size="15" fill="#cbd5e1">哪些表达属于同一任务？</text>
      <rect x="512" y="405" width="176" height="36" rx="18" fill="#22c55e"/>
      <text x="600" y="429" text-anchor="middle" font-size="14" font-weight="800" fill="#052e16">Sweet Spot</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="875" y="155" width="250" height="155" rx="28" fill="#fef2f2" stroke="#fecaca"/>
      <text x="1000" y="200" text-anchor="middle" font-size="21" font-weight="800" fill="#b91c1c">False Positive</text>
      <text x="1000" y="238" text-anchor="middle" font-size="14" fill="#7f1d1d">不该触发却触发</text>
      <text x="1000" y="266" text-anchor="middle" font-size="14" fill="#7f1d1d">输出过度流程化</text>
      <rect x="875" y="370" width="250" height="155" rx="28" fill="#fffbeb" stroke="#fed7aa"/>
      <text x="1000" y="415" text-anchor="middle" font-size="21" font-weight="800" fill="#c2410c">False Negative</text>
      <text x="1000" y="453" text-anchor="middle" font-size="14" fill="#7c2d12">该触发却没触发</text>
      <text x="1000" y="481" text-anchor="middle" font-size="14" fill="#7c2d12">普通模型输出替代流程</text>
    </g>

    <g stroke="#2563eb" stroke-width="4" fill="none" marker-end="url(#arrow)">
      <path d="M310 340 H445"/>
      <path d="M745 300 C800 250 825 230 865 225" stroke="#ef4444"/>
      <path d="M745 380 C800 425 825 445 865 448" stroke="#f97316"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="185" y="570" width="830" height="62" rx="22" fill="#fff" stroke="#e2e8f0"/>
      <text x="600" y="608" text-anchor="middle" font-size="17" font-weight="800" fill="#0f172a">优化方法：同时准备正例和负例 prompts，让 skill-creator 建议更精确的 description</text>
    </g>
  </g>
</svg>
