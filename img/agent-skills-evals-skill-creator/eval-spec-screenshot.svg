<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">eval 配置的代码截图式示意</title>
  <desc id="desc">以代码截图形式展示 NDA 审查 eval 的概念配置。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Microsoft YaHei,sans-serif">
    <text x="70" y="70" font-size="30" font-weight="800" fill="#f8fafc">一个 eval 可以像测试用例一样被版本化</text>
    <text x="70" y="106" font-size="16" fill="#94a3b8">概念示例，不代表官方固定格式；重点是 prompt、附件、通过标准和指标必须清晰</text>

    <g filter="url(#shadow)">
      <rect x="90" y="150" width="720" height="430" rx="22" fill="#020617" stroke="#334155"/>
      <rect x="90" y="150" width="720" height="54" rx="22" fill="#111827"/>
      <circle cx="125" cy="177" r="8" fill="#ef4444"/>
      <circle cx="153" cy="177" r="8" fill="#f59e0b"/>
      <circle cx="181" cy="177" r="8" fill="#22c55e"/>
      <text x="235" y="183" font-size="15" fill="#cbd5e1">evals/nda-risk-review.yaml</text>
      <g font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="18">
        <text x="130" y="245" fill="#64748b">01</text><text x="180" y="245" fill="#60a5fa">name:</text><text x="250" y="245" fill="#e2e8f0"> nda-risk-review</text>
        <text x="130" y="280" fill="#64748b">02</text><text x="180" y="280" fill="#60a5fa">skill:</text><text x="250" y="280" fill="#e2e8f0"> nda-reviewer</text>
        <text x="130" y="315" fill="#64748b">03</text><text x="180" y="315" fill="#60a5fa">prompt:</text><text x="260" y="315" fill="#fbbf24"> "Review this NDA using internal policy"</text>
        <text x="130" y="350" fill="#64748b">04</text><text x="180" y="350" fill="#60a5fa">attachments:</text><text x="315" y="350" fill="#e2e8f0"> [samples/vendor-nda.pdf]</text>
        <text x="130" y="385" fill="#64748b">05</text><text x="180" y="385" fill="#60a5fa">expected:</text>
        <text x="130" y="420" fill="#64748b">06</text><text x="215" y="420" fill="#93c5fd">must_include:</text><text x="360" y="420" fill="#e2e8f0"> [liability cap, governing law]</text>
        <text x="130" y="455" fill="#64748b">07</text><text x="215" y="455" fill="#93c5fd">must_not:</text><text x="328" y="455" fill="#e2e8f0"> generic disclaimer only</text>
        <text x="130" y="490" fill="#64748b">08</text><text x="180" y="490" fill="#60a5fa">metrics:</text><text x="275" y="490" fill="#e2e8f0"> [pass_rate, elapsed_time, token_usage]</text>
        <text x="130" y="525" fill="#64748b">09</text><text x="180" y="525" fill="#60a5fa">judge:</text><text x="250" y="525" fill="#e2e8f0"> rubric</text>
      </g>
    </g>

    <g>
      <rect x="850" y="195" width="270" height="88" rx="22" fill="#1e40af"/>
      <text x="985" y="230" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">输入要真实</text>
      <text x="985" y="258" text-anchor="middle" font-size="14" fill="#dbeafe">prompt 与附件来自典型任务</text>
      <rect x="850" y="315" width="270" height="88" rx="22" fill="#047857"/>
      <text x="985" y="350" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">标准要可判定</text>
      <text x="985" y="378" text-anchor="middle" font-size="14" fill="#dcfce7">must_include / must_not</text>
      <rect x="850" y="435" width="270" height="88" rx="22" fill="#c2410c"/>
      <text x="985" y="470" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">指标要可比较</text>
      <text x="985" y="498" text-anchor="middle" font-size="14" fill="#ffedd5">质量、耗时、Token 一起看</text>
    </g>
  </g>
</svg>
