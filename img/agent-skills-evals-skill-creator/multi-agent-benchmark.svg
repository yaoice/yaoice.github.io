<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">多智能体 benchmark 与 A/B 盲评架构</title>
  <desc id="desc">展示 eval suite 并行分发到独立 agent，并由 comparator agent 对输出做盲评。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef2ff"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#4f46e5"/></marker>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Microsoft YaHei,sans-serif">
    <text x="60" y="64" font-size="30" font-weight="800" fill="#0f172a">多智能体评估：并行、隔离、可比较</text>
    <text x="60" y="100" font-size="17" fill="#475569">每个 eval 使用干净上下文；质量对比交给盲评 comparator，减少顺序污染和评判偏差</text>

    <g filter="url(#shadow)">
      <rect x="70" y="230" width="180" height="170" rx="28" fill="#fff" stroke="#c7d2fe"/>
      <text x="160" y="275" text-anchor="middle" font-size="22" font-weight="800" fill="#3730a3">Eval Suite</text>
      <text x="160" y="315" text-anchor="middle" font-size="14" fill="#64748b">case 01</text>
      <text x="160" y="345" text-anchor="middle" font-size="14" fill="#64748b">case 02</text>
      <text x="160" y="375" text-anchor="middle" font-size="14" fill="#64748b">case 03 ...</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="390" y="150" width="190" height="105" rx="24" fill="#fff" stroke="#bbf7d0"/>
      <text x="485" y="190" text-anchor="middle" font-size="18" font-weight="800" fill="#047857">Agent A</text>
      <text x="485" y="220" text-anchor="middle" font-size="13" fill="#64748b">clean context</text>
      <rect x="390" y="290" width="190" height="105" rx="24" fill="#fff" stroke="#bbf7d0"/>
      <text x="485" y="330" text-anchor="middle" font-size="18" font-weight="800" fill="#047857">Agent B</text>
      <text x="485" y="360" text-anchor="middle" font-size="13" fill="#64748b">clean context</text>
      <rect x="390" y="430" width="190" height="105" rx="24" fill="#fff" stroke="#bbf7d0"/>
      <text x="485" y="470" text-anchor="middle" font-size="18" font-weight="800" fill="#047857">Agent C</text>
      <text x="485" y="500" text-anchor="middle" font-size="13" fill="#64748b">clean context</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="710" y="190" width="190" height="260" rx="28" fill="#fff" stroke="#fed7aa"/>
      <text x="805" y="235" text-anchor="middle" font-size="22" font-weight="800" fill="#c2410c">Outputs</text>
      <rect x="748" y="270" width="115" height="42" rx="12" fill="#fff7ed"/><text x="805" y="297" text-anchor="middle" font-size="13" fill="#9a3412">v1 result</text>
      <rect x="748" y="330" width="115" height="42" rx="12" fill="#fff7ed"/><text x="805" y="357" text-anchor="middle" font-size="13" fill="#9a3412">v2 result</text>
      <rect x="748" y="390" width="115" height="42" rx="12" fill="#fff7ed"/><text x="805" y="417" text-anchor="middle" font-size="13" fill="#9a3412">no skill</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="990" y="230" width="155" height="170" rx="28" fill="#111827"/>
      <text x="1067" y="275" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">Comparator</text>
      <text x="1067" y="315" text-anchor="middle" font-size="14" fill="#cbd5e1">盲评输出</text>
      <text x="1067" y="345" text-anchor="middle" font-size="14" fill="#cbd5e1">按 rubric 打分</text>
      <text x="1067" y="375" text-anchor="middle" font-size="14" fill="#cbd5e1">给出胜者</text>
    </g>

    <g stroke="#4f46e5" stroke-width="4" fill="none" marker-end="url(#arrow)">
      <path d="M250 315 C310 180 335 190 380 200"/>
      <path d="M250 315 H380"/>
      <path d="M250 315 C310 470 335 480 380 482"/>
      <path d="M580 203 C630 240 660 260 700 278"/>
      <path d="M580 342 H700"/>
      <path d="M580 482 C630 440 660 420 700 410"/>
      <path d="M900 320 H980"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="220" y="575" width="760" height="64" rx="22" fill="#fff" stroke="#e0e7ff"/>
      <text x="600" y="615" text-anchor="middle" font-size="17" font-weight="800" fill="#312e81">关键点：并行解决速度问题，隔离解决上下文污染，盲评解决主观偏差</text>
    </g>
  </g>
</svg>
