<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">两类 Agent Skills 的差异</title>
  <desc id="desc">对比能力增强型 Skills 与偏好编码型 Skills 的目标、验证重点和生命周期。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0f9ff"/><stop offset="1" stop-color="#fff7ed"/></linearGradient>
    <linearGradient id="left" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.15"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/></marker>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Microsoft YaHei,sans-serif">
    <text x="60" y="64" font-size="30" font-weight="800" fill="#0f172a">两类 Skills：补能力，还是固化偏好？</text>
    <text x="60" y="100" font-size="17" fill="#475569">评估前先分类：不同 Skill 的价值假设、测试重点和退役方式完全不同</text>

    <g filter="url(#shadow)">
      <rect x="70" y="145" width="450" height="430" rx="30" fill="#fff" stroke="#bfdbfe"/>
      <rect x="70" y="145" width="450" height="86" rx="30" fill="url(#left)"/>
      <text x="105" y="198" font-size="26" font-weight="800" fill="#fff">Capability uplift skills</text>
      <text x="105" y="258" font-size="18" font-weight="700" fill="#1e3a8a">目标：补足模型当前短板</text>
      <text x="105" y="296" font-size="15" fill="#475569">• 让 Claude 在特定任务上更稳定</text>
      <text x="105" y="326" font-size="15" fill="#475569">• 通过策略、工具步骤、样例提升质量</text>
      <text x="105" y="356" font-size="15" fill="#475569">• 可能随基础模型升级而不再必要</text>
      <rect x="105" y="392" width="370" height="72" rx="18" fill="#eff6ff"/>
      <text x="130" y="423" font-size="16" font-weight="800" fill="#1d4ed8">验证重点</text>
      <text x="130" y="448" font-size="14" fill="#475569">Skill vs no Skill：是否真的带来增益？</text>
      <rect x="105" y="486" width="370" height="54" rx="18" fill="#f8fafc"/>
      <text x="130" y="520" font-size="14" fill="#64748b">例：PDF 处理、复杂格式文档、代码审查策略</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="680" y="145" width="450" height="430" rx="30" fill="#fff" stroke="#fed7aa"/>
      <rect x="680" y="145" width="450" height="86" rx="30" fill="url(#right)"/>
      <text x="715" y="198" font-size="26" font-weight="800" fill="#fff">Encoded preference skills</text>
      <text x="715" y="258" font-size="18" font-weight="700" fill="#9a3412">目标：固化团队流程与标准</text>
      <text x="715" y="296" font-size="15" fill="#475569">• 把组织偏好写入 Agent 执行方式</text>
      <text x="715" y="326" font-size="15" fill="#475569">• 价值来自对真实流程的忠实执行</text>
      <text x="715" y="356" font-size="15" fill="#475569">• 随团队规则变化而持续更新</text>
      <rect x="715" y="392" width="370" height="72" rx="18" fill="#fff7ed"/>
      <text x="740" y="423" font-size="16" font-weight="800" fill="#c2410c">验证重点</text>
      <text x="740" y="448" font-size="14" fill="#475569">是否覆盖检查表、格式和团队语气？</text>
      <rect x="715" y="486" width="370" height="54" rx="18" fill="#f8fafc"/>
      <text x="740" y="520" font-size="14" fill="#64748b">例：NDA 审查、周报生成、PRD 模板</text>
    </g>

    <g>
      <line x1="535" y1="335" x2="665" y2="335" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
      <line x1="665" y1="385" x2="535" y2="385" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="515" y="300" width="170" height="115" rx="22" fill="#0f172a" opacity="0.92"/>
      <text x="600" y="336" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">先分类</text>
      <text x="600" y="366" text-anchor="middle" font-size="14" fill="#cbd5e1">再选择评估指标</text>
      <text x="600" y="392" text-anchor="middle" font-size="14" fill="#cbd5e1">最后决定维护策略</text>
    </g>
  </g>
</svg>
