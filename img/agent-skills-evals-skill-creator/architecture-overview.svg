<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Skills 测试、度量与迭代闭环</title>
  <desc id="desc">展示从 SKILL.md 到 eval suite、benchmark、多智能体评估、盲评比较和持续改进的闭环。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="0.55" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#059669"/><stop offset="1" stop-color="#7dd3fc"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M 28 0 L 0 0 0 28" fill="none" stroke="#94a3b8" stroke-opacity="0.14" stroke-width="1"/></pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <rect width="1200" height="680" fill="url(#grid)"/>
  <text x="60" y="62" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Microsoft YaHei,sans-serif" font-size="30" font-weight="800" fill="#0f172a">从“写一个 Skill”到“运营一个 Skill”</text>
  <text x="60" y="98" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Microsoft YaHei,sans-serif" font-size="17" fill="#475569">skill-creator 把 Agent Skills 推进到可测试、可度量、可回归、可迭代的工程闭环</text>

  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Microsoft YaHei,sans-serif" filter="url(#shadow)">
    <rect x="70" y="180" width="170" height="150" rx="24" fill="#fff" stroke="#bfdbfe"/>
    <circle cx="105" cy="220" r="22" fill="url(#blue)"/>
    <text x="99" y="228" font-size="22" font-weight="800" fill="#fff">1</text>
    <text x="105" y="265" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">SKILL.md</text>
    <text x="105" y="295" text-anchor="middle" font-size="14" fill="#64748b">工作流、示例、约束</text>

    <rect x="285" y="180" width="170" height="150" rx="24" fill="#fff" stroke="#bbf7d0"/>
    <circle cx="320" cy="220" r="22" fill="url(#green)"/>
    <text x="314" y="228" font-size="22" font-weight="800" fill="#fff">2</text>
    <text x="370" y="265" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">Eval Suite</text>
    <text x="370" y="295" text-anchor="middle" font-size="14" fill="#64748b">prompt、附件、rubric</text>

    <rect x="500" y="180" width="170" height="150" rx="24" fill="#fff" stroke="#fed7aa"/>
    <circle cx="535" cy="220" r="22" fill="url(#orange)"/>
    <text x="529" y="228" font-size="22" font-weight="800" fill="#fff">3</text>
    <text x="585" y="265" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">Benchmark</text>
    <text x="585" y="295" text-anchor="middle" font-size="14" fill="#64748b">通过率、耗时、Token</text>

    <rect x="715" y="180" width="170" height="150" rx="24" fill="#fff" stroke="#c4b5fd"/>
    <circle cx="750" cy="220" r="22" fill="#7c3aed"/>
    <text x="744" y="228" font-size="22" font-weight="800" fill="#fff">4</text>
    <text x="800" y="265" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">A/B 盲评</text>
    <text x="800" y="295" text-anchor="middle" font-size="14" fill="#64748b">v1 vs v2 / skill vs none</text>

    <rect x="930" y="180" width="190" height="150" rx="24" fill="#fff" stroke="#fecaca"/>
    <circle cx="965" cy="220" r="22" fill="#ef4444"/>
    <text x="959" y="228" font-size="22" font-weight="800" fill="#fff">5</text>
    <text x="1025" y="265" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">Refine</text>
    <text x="1025" y="295" text-anchor="middle" font-size="14" fill="#64748b">修改 Skill 与 description</text>
  </g>

  <g stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M240 255 H275"/>
    <path d="M455 255 H490"/>
    <path d="M670 255 H705"/>
    <path d="M885 255 H920"/>
    <path d="M1025 330 C1025 460 205 460 155 330" stroke="#0f766e" marker-end="url(#arrow)"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Microsoft YaHei,sans-serif" filter="url(#shadow)">
    <rect x="145" y="500" width="910" height="110" rx="26" fill="#0f172a" opacity="0.94"/>
    <text x="185" y="542" font-size="20" font-weight="800" fill="#fff">持续度量面板</text>
    <text x="185" y="578" font-size="15" fill="#cbd5e1">pass rate</text>
    <rect x="275" y="562" width="160" height="12" rx="6" fill="#334155"/><rect x="275" y="562" width="128" height="12" rx="6" fill="#22c55e"/>
    <text x="475" y="578" font-size="15" fill="#cbd5e1">elapsed time</text>
    <rect x="585" y="562" width="160" height="12" rx="6" fill="#334155"/><rect x="585" y="562" width="95" height="12" rx="6" fill="#38bdf8"/>
    <text x="785" y="578" font-size="15" fill="#cbd5e1">token usage</text>
    <rect x="890" y="562" width="120" height="12" rx="6" fill="#334155"/><rect x="890" y="562" width="74" height="12" rx="6" fill="#f97316"/>
  </g>
</svg>
