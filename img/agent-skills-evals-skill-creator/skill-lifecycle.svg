<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Skill 生命周期</title>
  <desc id="desc">展示 Skill 从创建、验证、发布、观测、迭代到简化或退役的生命周期。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ecfeff"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/></marker>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Microsoft YaHei,sans-serif">
    <text x="60" y="64" font-size="30" font-weight="800" fill="#0f172a">Skill 的生命周期：创建、验证、观测、迭代或退役</text>
    <text x="60" y="100" font-size="17" fill="#475569">当 eval 描述“什么算正确”越来越充分，Skill 与 specification 的边界会逐渐靠近</text>

    <g transform="translate(600 350)">
      <circle r="210" fill="none" stroke="#ccfbf1" stroke-width="34"/>
      <path d="M0,-210 A210,210 0 0,1 199,-65" fill="none" stroke="#2563eb" stroke-width="34" stroke-linecap="round"/>
      <path d="M199,-65 A210,210 0 0,1 123,170" fill="none" stroke="#22c55e" stroke-width="34" stroke-linecap="round"/>
      <path d="M123,170 A210,210 0 0,1 -123,170" fill="none" stroke="#f97316" stroke-width="34" stroke-linecap="round"/>
      <path d="M-123,170 A210,210 0 0,1 -199,-65" fill="none" stroke="#7c3aed" stroke-width="34" stroke-linecap="round"/>
      <path d="M-199,-65 A210,210 0 0,1 0,-210" fill="none" stroke="#0f766e" stroke-width="34" stroke-linecap="round"/>
      <circle r="116" fill="#fff" filter="url(#shadow)"/>
      <text y="-15" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Agent Skill</text>
      <text y="20" text-anchor="middle" font-size="15" fill="#64748b">版本化的能力资产</text>
      <text y="50" text-anchor="middle" font-size="15" fill="#64748b">由 evals 持续定义质量</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="500" y="120" width="200" height="72" rx="22" fill="#fff" stroke="#bfdbfe"/>
      <text x="600" y="150" text-anchor="middle" font-size="18" font-weight="800" fill="#1d4ed8">创建</text>
      <text x="600" y="176" text-anchor="middle" font-size="13" fill="#64748b">SKILL.md + examples</text>

      <rect x="850" y="265" width="205" height="72" rx="22" fill="#fff" stroke="#bbf7d0"/>
      <text x="952" y="295" text-anchor="middle" font-size="18" font-weight="800" fill="#047857">验证</text>
      <text x="952" y="321" text-anchor="middle" font-size="13" fill="#64748b">evals + benchmark</text>

      <rect x="765" y="520" width="230" height="72" rx="22" fill="#fff" stroke="#fed7aa"/>
      <text x="880" y="550" text-anchor="middle" font-size="18" font-weight="800" fill="#c2410c">观测</text>
      <text x="880" y="576" text-anchor="middle" font-size="13" fill="#64748b">pass rate / token / latency</text>

      <rect x="205" y="520" width="230" height="72" rx="22" fill="#fff" stroke="#ddd6fe"/>
      <text x="320" y="550" text-anchor="middle" font-size="18" font-weight="800" fill="#6d28d9">迭代</text>
      <text x="320" y="576" text-anchor="middle" font-size="13" fill="#64748b">修复失败样例和描述</text>

      <rect x="145" y="265" width="205" height="72" rx="22" fill="#fff" stroke="#99f6e4"/>
      <text x="247" y="295" text-anchor="middle" font-size="18" font-weight="800" fill="#0f766e">简化 / 退役</text>
      <text x="247" y="321" text-anchor="middle" font-size="13" fill="#64748b">模型已吸收或流程变化</text>
    </g>

    <g stroke="#0f766e" stroke-width="3" fill="none" stroke-dasharray="8 8" marker-end="url(#arrow)">
      <path d="M700 156 C815 165 890 205 932 258"/>
      <path d="M955 337 C952 420 925 480 885 515"/>
      <path d="M765 556 H445"/>
      <path d="M288 520 C235 450 220 390 240 340"/>
      <path d="M350 285 C425 210 455 175 500 160"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="80" y="610" width="1040" height="42" rx="21" fill="#0f172a" opacity="0.94"/>
      <text x="600" y="637" text-anchor="middle" font-size="15" fill="#e2e8f0">能力增强型 Skill 可能被模型吸收；偏好编码型 Skill 会随团队流程持续演化</text>
    </g>
  </g>
</svg>
