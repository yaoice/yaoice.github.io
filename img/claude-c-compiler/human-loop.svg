<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="260" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">人机协作模式：人类始终在循环中</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">AI 产出上限受限于人类的带宽</text>

  <g>
    <rect x="60" y="110" width="170" height="70" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="145" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">人类提出任务</text>
    <text x="145" y="162" text-anchor="middle" font-size="11" fill="#475569">需求与约束定义</text>
  </g>

  <line x1="230" y1="145" x2="275" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="280" y="110" width="170" height="70" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="365" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">AI 执行</text>
    <text x="365" y="162" text-anchor="middle" font-size="11" fill="#475569">编写代码 / 修改文件</text>
  </g>

  <line x1="450" y1="145" x2="495" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="500" y="110" width="170" height="70" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="585" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">人类审核</text>
    <text x="585" y="162" text-anchor="middle" font-size="11" fill="#475569">代码 review / 意见</text>
  </g>

  <line x1="670" y1="145" x2="715" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="720" y="110" width="170" height="70" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="805" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">AI 调整</text>
    <text x="805" y="162" text-anchor="middle" font-size="11" fill="#475569">根据反馈迭代</text>
  </g>

  <!-- 回环箭头 -->
  <path d="M805,180 Q805,220 585,220 Q585,200 585,180" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="695" y="238" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">循环审核 / 调整</text>
</svg>
