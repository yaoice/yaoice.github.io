<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">并行代理架构：独立容器 + 共享 Git 仓库</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">代理之间不直接通信，通过 Git 间接协调</text>

  <!-- 中央 Git 仓库 -->
  <g>
    <rect x="340" y="200" width="280" height="110" rx="10" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
    <text x="480" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">中央 Git 仓库</text>
    <text x="480" y="252" text-anchor="middle" font-size="11" fill="#cbd5e1">唯一的 source of truth</text>
    <rect x="365" y="265" width="230" height="32" rx="4" fill="#334155"/>
    <text x="480" y="285" text-anchor="middle" font-size="11" fill="#e2e8f0">current_tasks/ · src/ · tests/</text>
  </g>

  <!-- Agent 1 容器 -->
  <g>
    <rect x="40" y="90" width="240" height="130" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="160" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Agent 1 容器 (Docker)</text>
    <rect x="60" y="130" width="200" height="32" rx="4" fill="#eff6ff"/>
    <text x="160" y="150" text-anchor="middle" font-size="11" fill="#1e40af">Claude Code 实例</text>
    <rect x="60" y="172" width="200" height="32" rx="4" fill="#eff6ff"/>
    <text x="160" y="192" text-anchor="middle" font-size="11" fill="#1e40af">本地工作副本 (git clone)</text>
  </g>

  <!-- Agent 2 容器 -->
  <g>
    <rect x="40" y="240" width="240" height="130" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="160" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Agent 2 容器 (Docker)</text>
    <rect x="60" y="280" width="200" height="32" rx="4" fill="#eff6ff"/>
    <text x="160" y="300" text-anchor="middle" font-size="11" fill="#1e40af">Claude Code 实例</text>
    <rect x="60" y="322" width="200" height="32" rx="4" fill="#eff6ff"/>
    <text x="160" y="342" text-anchor="middle" font-size="11" fill="#1e40af">本地工作副本 (git clone)</text>
  </g>

  <!-- Agent N 容器 -->
  <g>
    <rect x="680" y="90" width="240" height="130" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="800" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Agent N 容器 (Docker)</text>
    <rect x="700" y="130" width="200" height="32" rx="4" fill="#eff6ff"/>
    <text x="800" y="150" text-anchor="middle" font-size="11" fill="#1e40af">Claude Code 实例</text>
    <rect x="700" y="172" width="200" height="32" rx="4" fill="#eff6ff"/>
    <text x="800" y="192" text-anchor="middle" font-size="11" fill="#1e40af">本地工作副本 (git clone)</text>
  </g>

  <!-- 省略号代理 -->
  <text x="800" y="265" text-anchor="middle" font-size="28" fill="#cbd5e1">⋯</text>
  <text x="800" y="295" text-anchor="middle" font-size="11" fill="#64748b">（最多 16 个代理）</text>

  <!-- 连接线：agents 到 git -->
  <line x1="280" y1="180" x2="340" y2="235" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="300" y="200" font-size="10" fill="#64748b" font-style="italic">git pull/push</text>

  <line x1="280" y1="305" x2="340" y2="275" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="300" y="310" font-size="10" fill="#64748b" font-style="italic">git pull/push</text>

  <line x1="620" y1="235" x2="680" y2="180" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="640" y="205" font-size="10" fill="#64748b" font-style="italic">git pull/push</text>

  <!-- 底部说明 -->
  <rect x="40" y="395" width="880" height="65" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="60" y="418" font-size="12" font-weight="700" fill="#1e40af">关键设计</text>
  <text x="60" y="440" font-size="11" fill="#475569">• 代理之间无直接通信（通过 Git 仓库间接协调）</text>
  <text x="540" y="440" font-size="11" fill="#475569">• Docker 容器隔离：限制爆炸半径</text>
  <text x="60" y="455" font-size="11" fill="#475569">• 仓库是唯一的共享状态（任务 / 代码 / 锁）</text>
  <text x="540" y="455" font-size="11" fill="#475569">• 无需额外协调服务（Redis、MQ 等）</text>
</svg>
