<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">范式转变：从编码者到架构师/测试设计师</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">人类的价值从"写代码"转向"定义问题与验证"</text>

  <!-- 左：传统模式 -->
  <g>
    <rect x="40" y="85" width="400" height="325" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="240" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">传统模式</text>

    <!-- 人类 -->
    <rect x="160" y="130" width="160" height="40" rx="20" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="240" y="154" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">人类开发者</text>

    <line x1="240" y1="170" x2="240" y2="195" stroke="#94a3b8" stroke-width="1.5"/>

    <rect x="60" y="200" width="160" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="140" y="223" text-anchor="middle" font-size="11" fill="#475569">编写代码</text>

    <rect x="60" y="245" width="160" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="140" y="268" text-anchor="middle" font-size="11" fill="#475569">编写测试</text>

    <rect x="60" y="290" width="160" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="140" y="313" text-anchor="middle" font-size="11" fill="#475569">代码审查</text>

    <rect x="260" y="200" width="160" height="126" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <text x="340" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">产出</text>
    <text x="340" y="255" text-anchor="middle" font-size="11" fill="#475569">代码</text>
    <text x="340" y="275" text-anchor="middle" font-size="11" fill="#475569">测试</text>
    <text x="340" y="295" text-anchor="middle" font-size="11" fill="#475569">审查结论</text>

    <line x1="220" y1="218" x2="260" y2="218" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="220" y1="263" x2="260" y2="263" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="220" y1="308" x2="260" y2="308" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="60" y="360" width="360" height="30" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="240" y="380" text-anchor="middle" font-size="11" fill="#991b1b">瓶颈：人类带宽直接决定上限</text>
  </g>

  <!-- 右：代理团队模式 -->
  <g>
    <rect x="520" y="85" width="400" height="325" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="720" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">代理团队模式</text>

    <rect x="640" y="130" width="160" height="40" rx="20" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="720" y="154" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">人类架构师</text>

    <line x1="720" y1="170" x2="720" y2="195" stroke="#94a3b8" stroke-width="1.5"/>

    <rect x="540" y="200" width="160" height="36" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
    <text x="620" y="223" text-anchor="middle" font-size="11" fill="#5b21b6">设计架构</text>

    <rect x="540" y="245" width="160" height="36" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
    <text x="620" y="268" text-anchor="middle" font-size="11" fill="#5b21b6">设计测试框架</text>

    <rect x="540" y="290" width="160" height="36" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
    <text x="620" y="313" text-anchor="middle" font-size="11" fill="#5b21b6">设计 Agent Prompt</text>

    <rect x="740" y="200" width="160" height="126" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="820" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">AI 代理团队</text>
    <text x="820" y="248" text-anchor="middle" font-size="11" fill="#064e3b">自主编码</text>
    <text x="820" y="267" text-anchor="middle" font-size="11" fill="#064e3b">自主测试</text>
    <text x="820" y="286" text-anchor="middle" font-size="11" fill="#064e3b">自主调试</text>
    <text x="820" y="308" text-anchor="middle" font-size="11" fill="#064e3b">自主重构</text>

    <line x1="700" y1="218" x2="740" y2="218" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="700" y1="263" x2="740" y2="263" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="700" y1="308" x2="740" y2="308" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="540" y="360" width="360" height="30" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="720" y="380" text-anchor="middle" font-size="11" fill="#065f46">优势：AI 自主产出代码，人类专注定义问题</text>
  </g>
</svg>
