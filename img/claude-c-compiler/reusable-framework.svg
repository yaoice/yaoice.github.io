<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">可复用的代理团队框架（四层模型）</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">从基础设施到安全控制的完整分层</text>

  <!-- Layer 1: 基础设施层 -->
  <g>
    <rect x="40" y="85" width="880" height="100" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="60" y="110" font-size="13" font-weight="700" fill="#1e40af">① 基础设施层</text>
    <rect x="80" y="125" width="250" height="50" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="205" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Docker 容器隔离</text>
    <text x="205" y="165" text-anchor="middle" font-size="10" fill="#475569">每个代理独立运行环境</text>
    <rect x="355" y="125" width="250" height="50" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="480" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Git 同步原语</text>
    <text x="480" y="165" text-anchor="middle" font-size="10" fill="#475569">并发控制 + 冲突解决</text>
    <rect x="630" y="125" width="250" height="50" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="755" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">CI/CD 管道</text>
    <text x="755" y="165" text-anchor="middle" font-size="10" fill="#475569">自动测试 + 回归检测</text>
  </g>

  <line x1="480" y1="185" x2="480" y2="205" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: 代理管理层 -->
  <g>
    <rect x="40" y="210" width="880" height="100" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="60" y="235" font-size="13" font-weight="700" fill="#5b21b6">② 代理管理层</text>
    <rect x="80" y="250" width="250" height="50" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="205" y="273" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">无限循环驱动</text>
    <text x="205" y="290" text-anchor="middle" font-size="10" fill="#475569">while true + 新会话</text>
    <rect x="355" y="250" width="250" height="50" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="480" y="273" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">任务锁定机制</text>
    <text x="480" y="290" text-anchor="middle" font-size="10" fill="#475569">基于 git push 的乐观锁</text>
    <rect x="630" y="250" width="250" height="50" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="755" y="273" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">角色分工策略</text>
    <text x="755" y="290" text-anchor="middle" font-size="10" fill="#475569">多个专业化 Agent Prompt</text>
  </g>

  <line x1="480" y1="310" x2="480" y2="330" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: 质量保证层 -->
  <g>
    <rect x="40" y="335" width="880" height="100" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="60" y="360" font-size="13" font-weight="700" fill="#065f46">③ 质量保证层</text>
    <rect x="80" y="375" width="250" height="50" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="205" y="398" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">高质量测试套件</text>
    <text x="205" y="415" text-anchor="middle" font-size="10" fill="#475569">覆盖关键路径和边界</text>
    <rect x="355" y="375" width="250" height="50" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="480" y="398" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">参考实现对比（预言机）</text>
    <text x="480" y="415" text-anchor="middle" font-size="10" fill="#475569">GCC 作为正确基准</text>
    <rect x="630" y="375" width="250" height="50" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="755" y="398" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">快速反馈机制</text>
    <text x="755" y="415" text-anchor="middle" font-size="10" fill="#475569">--fast 模式 1% 随机样本</text>
  </g>

  <line x1="480" y1="435" x2="480" y2="455" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 4: 安全层 -->
  <g>
    <rect x="40" y="460" width="880" height="70" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="60" y="485" font-size="13" font-weight="700" fill="#991b1b">④ 安全层</text>
    <rect x="80" y="495" width="250" height="26" rx="4" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="205" y="513" text-anchor="middle" font-size="11" fill="#7f1d1d">容器隔离执行</text>
    <rect x="355" y="495" width="250" height="26" rx="4" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="480" y="513" text-anchor="middle" font-size="11" fill="#7f1d1d">网络访问限制</text>
    <rect x="630" y="495" width="250" height="26" rx="4" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="755" y="513" text-anchor="middle" font-size="11" fill="#7f1d1d">定期人工审查</text>
  </g>
</svg>
