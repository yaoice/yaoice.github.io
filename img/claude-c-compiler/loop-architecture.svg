<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="400" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Bash 无限循环驱动的自主代理</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">每次迭代都是一个全新的 Claude Code 会话，上下文自动刷新</text>

  <!-- 循环起点 -->
  <g>
    <rect x="380" y="85" width="200" height="50" rx="25" fill="#1e293b"/>
    <text x="480" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">循环开始</text>
  </g>
  <line x1="480" y1="135" x2="480" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 读取 prompt -->
  <g>
    <rect x="360" y="165" width="240" height="50" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="480" y="188" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">① 读取 AGENT_PROMPT.md</text>
    <text x="480" y="205" text-anchor="middle" font-size="10" fill="#475569">自主决策框架、工作方式、原则</text>
  </g>
  <line x1="480" y1="215" x2="480" y2="240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 启动 Claude -->
  <g>
    <rect x="360" y="245" width="240" height="50" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="480" y="268" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">② 启动 Claude Code 会话</text>
    <text x="480" y="285" text-anchor="middle" font-size="10" fill="#475569">claude --dangerously-skip-permissions</text>
  </g>
  <line x1="480" y1="295" x2="480" y2="320" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 自主工作 -->
  <g>
    <rect x="360" y="325" width="240" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="480" y="348" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">③ Claude 自主工作</text>
    <text x="480" y="365" text-anchor="middle" font-size="10" fill="#475569">编码 · 调试 · 测试 · git commit</text>
  </g>

  <!-- 右侧：session 结束后返回循环 -->
  <path d="M600,350 Q720,350 720,240 Q720,110 580,110" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="680" y="230" width="130" height="40" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="745" y="247" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">④ 会话结束</text>
  <text x="745" y="262" text-anchor="middle" font-size="10" fill="#92400e">/ 超时 / 崩溃</text>

  <!-- 左侧要点 -->
  <g>
    <rect x="40" y="155" width="280" height="170" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="60" y="180" font-size="12" font-weight="700" fill="#1e293b">关键设计决策</text>
    <text x="60" y="205" font-size="11" fill="#475569">• 每次迭代 = 全新会话</text>
    <text x="60" y="225" font-size="10" fill="#64748b">  上下文窗口自动刷新</text>
    <text x="60" y="250" font-size="11" fill="#475569">• 从最新状态恢复</text>
    <text x="60" y="270" font-size="10" fill="#64748b">  重新读取 AGENT_PROMPT.md</text>
    <text x="60" y="295" font-size="11" fill="#475569">• 天然故障恢复</text>
    <text x="60" y="315" font-size="10" fill="#64748b">  崩溃后自动启新会话</text>
  </g>
</svg>
