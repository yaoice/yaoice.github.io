<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">GCC 作为预言机：随机分割编译策略</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">让多个代理看到不同文件中的不同错误，自然并行</text>

  <!-- 源码 -->
  <rect x="380" y="90" width="200" height="60" rx="8" fill="#1e293b"/>
  <text x="480" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Linux 内核源码</text>
  <text x="480" y="134" text-anchor="middle" font-size="11" fill="#cbd5e1">数千个 .c 文件</text>

  <line x1="480" y1="150" x2="480" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 分割节点 -->
  <polygon points="480,180 580,220 480,260 380,220" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="217" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">随机分割</text>
  <text x="480" y="235" text-anchor="middle" font-size="10" fill="#92400e">每次选不同文件</text>

  <!-- 左分支：GCC 编译（多数） -->
  <line x1="430" y1="240" x2="280" y2="285" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="260" font-size="11" fill="#475569" font-weight="600">90% 文件</text>

  <rect x="120" y="290" width="320" height="70" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="280" y="315" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">用 GCC 编译（已知正确）</text>
  <text x="280" y="335" text-anchor="middle" font-size="11" fill="#064e3b">作为"正确基准"</text>
  <text x="280" y="350" text-anchor="middle" font-size="11" fill="#064e3b">保证内核整体可编译</text>

  <!-- 右分支：Claude 编译器 -->
  <line x1="530" y1="240" x2="680" y2="285" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="640" y="260" font-size="11" fill="#475569" font-weight="600">10% 文件</text>

  <rect x="520" y="290" width="320" height="70" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="680" y="315" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">用 Claude 编译器编译（待验证）</text>
  <text x="680" y="335" text-anchor="middle" font-size="11" fill="#78350f">每个代理看到不同错误</text>
  <text x="680" y="350" text-anchor="middle" font-size="11" fill="#78350f">自然实现并行修复</text>

  <!-- 底部三代理 -->
  <g>
    <rect x="520" y="380" width="95" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="567" y="398" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Agent 1</text>
    <text x="567" y="412" text-anchor="middle" font-size="10" fill="#475569">修复 file_a.c</text>

    <rect x="632" y="380" width="95" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="679" y="398" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Agent 2</text>
    <text x="679" y="412" text-anchor="middle" font-size="10" fill="#475569">修复 file_b.c</text>

    <rect x="744" y="380" width="95" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="791" y="398" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Agent 3</text>
    <text x="791" y="412" text-anchor="middle" font-size="10" fill="#475569">修复 file_c.c</text>
  </g>
</svg>
