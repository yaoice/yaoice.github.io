<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="320" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">上下文窗口污染：错误做法 vs 正确做法</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">测试框架是为 Claude 写的，不是为人类</text>

  <!-- 左：错误做法 -->
  <g>
    <rect x="40" y="85" width="400" height="195" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="240" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">✗ 错误做法</text>

    <rect x="70" y="130" width="340" height="40" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="240" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">测试框架输出数千行二进制字节</text>
    <text x="240" y="163" text-anchor="middle" font-size="10" fill="#7f1d1d">stdout: [0x00 0x01 0xff...] × 9999 行</text>

    <line x1="240" y1="170" x2="240" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="70" y="195" width="340" height="35" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="240" y="217" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">上下文窗口被无用信息占满</text>

    <line x1="240" y1="230" x2="240" y2="245" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="70" y="248" width="340" height="25" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="240" y="266" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">Claude 无法定位关键信息</text>
  </g>

  <!-- 右：正确做法 -->
  <g>
    <rect x="520" y="85" width="400" height="195" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="720" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">✓ 正确做法</text>

    <rect x="550" y="130" width="340" height="40" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="720" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">测试输出精简：只显示失败摘要</text>
    <text x="720" y="163" text-anchor="middle" font-size="10" fill="#064e3b">3 failed / 100 passed</text>

    <line x1="720" y1="170" x2="720" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="550" y="195" width="340" height="35" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="720" y="217" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">详细日志写入文件，Claude 按需读取</text>

    <line x1="720" y1="230" x2="720" y2="245" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="550" y="248" width="340" height="25" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="720" y="266" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">上下文窗口保持高效</text>
  </g>
</svg>
