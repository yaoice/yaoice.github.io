<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,12 L12,6 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Claude 手写 C 编译器：编译流水线</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">C 源码 → 多阶段处理 → 可启动 Linux 内核的机器码</text>

  <!-- Pipeline -->
  <g>
    <rect x="40" y="110" width="150" height="90" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="115" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">① 词法分析</text>
    <text x="115" y="156" text-anchor="middle" font-size="10" fill="#475569">Lexer</text>
    <text x="115" y="174" text-anchor="middle" font-size="10" fill="#475569">C 源码 → Token 流</text>
    <text x="115" y="190" text-anchor="middle" font-size="9" fill="#64748b">关键字·标识符·字面量</text>
  </g>
  <g>
    <rect x="220" y="110" width="150" height="90" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="295" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">② 语法分析</text>
    <text x="295" y="156" text-anchor="middle" font-size="10" fill="#475569">Parser → AST</text>
    <text x="295" y="174" text-anchor="middle" font-size="10" fill="#475569">Token → 语法树</text>
    <text x="295" y="190" text-anchor="middle" font-size="9" fill="#64748b">C89/C99 子集</text>
  </g>
  <g>
    <rect x="400" y="110" width="150" height="90" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="475" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">③ 语义分析</text>
    <text x="475" y="156" text-anchor="middle" font-size="10" fill="#475569">Type Check</text>
    <text x="475" y="174" text-anchor="middle" font-size="10" fill="#475569">类型检查·符号表</text>
    <text x="475" y="190" text-anchor="middle" font-size="9" fill="#64748b">作用域·隐式转换</text>
  </g>
  <g>
    <rect x="580" y="110" width="150" height="90" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="655" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">④ 中间代码</text>
    <text x="655" y="156" text-anchor="middle" font-size="10" fill="#475569">IR 生成 + 优化</text>
    <text x="655" y="174" text-anchor="middle" font-size="10" fill="#475569">常量折叠·DCE</text>
    <text x="655" y="190" text-anchor="middle" font-size="9" fill="#64748b">寄存器分配</text>
  </g>
  <g>
    <rect x="760" y="110" width="160" height="90" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="840" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">⑤ 代码生成</text>
    <text x="840" y="156" text-anchor="middle" font-size="10" fill="#475569">CodeGen</text>
    <text x="840" y="174" text-anchor="middle" font-size="10" fill="#475569">x86·ARM·RISC-V</text>
    <text x="840" y="190" text-anchor="middle" font-size="9" fill="#64748b">目标汇编代码</text>
  </g>

  <line x1="190" y1="155" x2="220" y2="155" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="155" x2="400" y2="155" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="155" x2="580" y2="155" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="730" y1="155" x2="760" y2="155" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="115" y="95" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">C 源码输入</text>
  <text x="840" y="95" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">汇编/目标码输出</text>

  <!-- External deps -->
  <rect x="360" y="225" width="240" height="50" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">外部依赖</text>
  <text x="480" y="263" text-anchor="middle" font-size="10" fill="#92400e">GCC 汇编器 / 链接器（未自实现）</text>
  <line x1="480" y1="200" x2="480" y2="225" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Results -->
  <text x="480" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">实际能编译的项目</text>
  <g>
    <rect x="60" y="325" width="130" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="125" y="348" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="700">Linux 6.9</text>
    <text x="125" y="366" text-anchor="middle" font-size="10" fill="#475569">可编译并启动</text>
    <text x="125" y="380" text-anchor="middle" font-size="9" fill="#10b981" font-weight="600">✓ 核心成果</text>
  </g>
  <g>
    <rect x="210" y="325" width="130" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="275" y="348" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="700">QEMU</text>
    <text x="275" y="366" text-anchor="middle" font-size="10" fill="#475569">虚拟机模拟器</text>
  </g>
  <g>
    <rect x="360" y="325" width="130" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="425" y="348" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="700">FFmpeg</text>
    <text x="425" y="366" text-anchor="middle" font-size="10" fill="#475569">音视频处理</text>
  </g>
  <g>
    <rect x="510" y="325" width="130" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="575" y="348" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="700">SQLite / Redis</text>
    <text x="575" y="366" text-anchor="middle" font-size="10" fill="#475569">嵌入式/内存数据库</text>
  </g>
  <g>
    <rect x="660" y="325" width="130" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="725" y="348" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="700">PostgreSQL</text>
    <text x="725" y="366" text-anchor="middle" font-size="10" fill="#475569">关系型数据库</text>
  </g>
  <g>
    <rect x="810" y="325" width="110" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="865" y="348" text-anchor="middle" font-size="12" fill="#92400e" font-weight="700">Doom 🎮</text>
    <text x="865" y="366" text-anchor="middle" font-size="10" fill="#92400e">彩蛋：能跑</text>
  </g>

  <!-- 局限 -->
  <rect x="60" y="410" width="840" height="50" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="480" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">已知局限</text>
  <text x="480" y="448" text-anchor="middle" font-size="10" fill="#991b1b">无 16 位实模式 · 无自写汇编器/链接器 · 性能低于 GCC -O0 · Rust 代码质量尚可但非专家水平</text>
</svg>
