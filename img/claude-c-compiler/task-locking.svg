<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="960" height="620" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">任务锁定与同步：基于 Git 的乐观锁</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">利用 git push 冲突作为天然的并发控制</text>

  <!-- Lifeline headers -->
  <rect x="100" y="80" width="140" height="36" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Agent A</text>

  <rect x="410" y="80" width="140" height="36" rx="18" fill="#1e293b"/>
  <text x="480" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Git 仓库</text>

  <rect x="720" y="80" width="140" height="36" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="790" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Agent B</text>

  <!-- Lifelines -->
  <line x1="170" y1="120" x2="170" y2="590" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="480" y1="120" x2="480" y2="590" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="790" y1="120" x2="790" y2="590" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Stage 1: 锁定 -->
  <rect x="40" y="135" width="880" height="28" rx="4" fill="#e2e8f0"/>
  <text x="480" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">阶段 1：任务锁定（抢占）</text>

  <!-- A writes lock file -->
  <line x1="170" y1="180" x2="475" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="322" y="172" text-anchor="middle" font-size="11" fill="#475569">① 写 current_tasks/fix_parser.txt</text>
  <line x1="170" y1="200" x2="475" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="322" y="192" text-anchor="middle" font-size="11" fill="#475569">② git commit + push ✓</text>

  <!-- B tries same lock -->
  <line x1="790" y1="225" x2="485" y2="225" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="638" y="217" text-anchor="middle" font-size="11" fill="#475569">③ 尝试写同一锁文件</text>
  <line x1="475" y1="245" x2="790" y2="245" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="638" y="237" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">✗ push 冲突</text>

  <!-- B gives up, picks another -->
  <rect x="660" y="260" width="240" height="45" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="780" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">④ 放弃该任务</text>
  <text x="780" y="296" text-anchor="middle" font-size="10" fill="#991b1b">选择其他任务 fix_codegen</text>

  <!-- Stage 2: 工作 -->
  <rect x="40" y="325" width="880" height="28" rx="4" fill="#e2e8f0"/>
  <text x="480" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">阶段 2：各自工作（并行编码、测试、调试）</text>

  <rect x="80" y="365" width="200" height="50" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="180" y="386" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">A: 修复 parser</text>
  <text x="180" y="402" text-anchor="middle" font-size="10" fill="#064e3b">编码 · 运行测试 · 调试</text>

  <rect x="680" y="365" width="200" height="50" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="780" y="386" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">B: 修复 codegen</text>
  <text x="780" y="402" text-anchor="middle" font-size="10" fill="#064e3b">编码 · 运行测试 · 调试</text>

  <!-- Stage 3: 提交 -->
  <rect x="40" y="435" width="880" height="28" rx="4" fill="#e2e8f0"/>
  <text x="480" y="455" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">阶段 3：提交与同步</text>

  <line x1="475" y1="480" x2="170" y2="480" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="322" y="472" text-anchor="middle" font-size="11" fill="#475569">⑤ A: git pull（拉取 B 的变更）</text>
  <line x1="170" y1="500" x2="475" y2="500" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="322" y="492" text-anchor="middle" font-size="11" fill="#475569">⑥ A: 合并冲突 → push + 删锁</text>

  <line x1="790" y1="530" x2="485" y2="530" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="638" y="522" text-anchor="middle" font-size="11" fill="#475569">⑦ B: git pull（拉取 A 的变更）</text>
  <line x1="485" y1="550" x2="790" y2="550" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="638" y="542" text-anchor="middle" font-size="11" fill="#475569">⑧ B: push + 删锁</text>

  <!-- Bottom summary -->
  <rect x="40" y="575" width="880" height="30" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="480" y="595" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">关键：Git 本身就是同步原语，无需 Redis / DB / MQ 等额外协调服务</text>
</svg>
