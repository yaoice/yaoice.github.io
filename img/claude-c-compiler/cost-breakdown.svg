<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="400" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">API 成本构成（约 $20,000）</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">20 亿输入 token + 1.4 亿输出 token</text>

  <!-- 饼图 -->
  <g transform="translate(280, 220)">
    <!-- 输入 85% (306°) -->
    <path d="M 0,-120 A 120,120 0 1 1 -119.4,-11.7 L 0,0 Z" fill="#3b82f6" stroke="#ffffff" stroke-width="2"/>
    <!-- 输出 15% (54°) -->
    <path d="M -119.4,-11.7 A 120,120 0 0 1 0,-120 L 0,0 Z" fill="#8b5cf6" stroke="#ffffff" stroke-width="2"/>

    <!-- 中心白圈 -->
    <circle cx="0" cy="0" r="55" fill="#ffffff"/>
    <text x="0" y="-5" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">$20K</text>
    <text x="0" y="15" text-anchor="middle" font-size="11" fill="#64748b">总成本</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(520, 150)">
    <rect x="0" y="0" width="20" height="20" rx="4" fill="#3b82f6"/>
    <text x="30" y="15" font-size="13" font-weight="600" fill="#1e293b">输入 Token</text>
    <text x="30" y="35" font-size="11" fill="#475569">20 亿 tokens</text>
    <text x="30" y="52" font-size="11" fill="#475569">约占 85%</text>

    <rect x="0" y="80" width="20" height="20" rx="4" fill="#8b5cf6"/>
    <text x="30" y="95" font-size="13" font-weight="600" fill="#1e293b">输出 Token</text>
    <text x="30" y="115" font-size="11" fill="#475569">1.4 亿 tokens</text>
    <text x="30" y="132" font-size="11" fill="#475569">约占 15%</text>
  </g>

  <!-- 对比栏 -->
  <rect x="40" y="340" width="880" height="45" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="480" y="362" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">对比参考</text>
  <text x="480" y="379" text-anchor="middle" font-size="11" fill="#475569">$20,000 ≈ 美国中级 Rust 开发者 1–2 周薪资 · 代码量 10 万行 · 会话次数 ~2,000</text>
</svg>
