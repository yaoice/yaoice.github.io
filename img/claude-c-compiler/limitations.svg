<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="360" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">编译器已知局限</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">Carlini 坦诚列出的不足之处</text>

  <!-- Grid 5 cards -->
  <g>
    <rect x="40" y="85" width="170" height="240" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="125" cy="115" r="18" fill="#fed7aa" stroke="#f59e0b" stroke-width="1"/>
    <text x="125" y="122" text-anchor="middle" font-size="14">🔧</text>
    <text x="125" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">16 位 x86</text>
    <line x1="60" y1="170" x2="190" y2="170" stroke="#fed7aa" stroke-width="1"/>
    <text x="125" y="195" text-anchor="middle" font-size="11" fill="#78350f">缺乏 16 位</text>
    <text x="125" y="213" text-anchor="middle" font-size="11" fill="#78350f">实模式支持</text>
    <text x="125" y="245" text-anchor="middle" font-size="10" fill="#9a3412">启动阶段</text>
    <text x="125" y="263" text-anchor="middle" font-size="10" fill="#9a3412">仍依赖 GCC</text>
  </g>

  <g>
    <rect x="225" y="85" width="170" height="240" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="310" cy="115" r="18" fill="#fed7aa" stroke="#f59e0b" stroke-width="1"/>
    <text x="310" y="122" text-anchor="middle" font-size="14">🔗</text>
    <text x="310" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">汇编器/链接器</text>
    <line x1="245" y1="170" x2="375" y2="170" stroke="#fed7aa" stroke-width="1"/>
    <text x="310" y="195" text-anchor="middle" font-size="11" fill="#78350f">没有自己的</text>
    <text x="310" y="213" text-anchor="middle" font-size="11" fill="#78350f">汇编器和链接器</text>
    <text x="310" y="245" text-anchor="middle" font-size="10" fill="#9a3412">仍使用 GCC</text>
    <text x="310" y="263" text-anchor="middle" font-size="10" fill="#9a3412">提供的这些工具</text>
  </g>

  <g>
    <rect x="410" y="85" width="170" height="240" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="495" cy="115" r="18" fill="#fed7aa" stroke="#f59e0b" stroke-width="1"/>
    <text x="495" y="122" text-anchor="middle" font-size="14">📦</text>
    <text x="495" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">兼容性</text>
    <line x1="430" y1="170" x2="560" y2="170" stroke="#fed7aa" stroke-width="1"/>
    <text x="495" y="195" text-anchor="middle" font-size="11" fill="#78350f">能构建许多</text>
    <text x="495" y="213" text-anchor="middle" font-size="11" fill="#78350f">主流开源项目</text>
    <text x="495" y="245" text-anchor="middle" font-size="10" fill="#9a3412">但并非所有</text>
    <text x="495" y="263" text-anchor="middle" font-size="10" fill="#9a3412">C 项目都能编译</text>
  </g>

  <g>
    <rect x="595" y="85" width="170" height="240" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="680" cy="115" r="18" fill="#fed7aa" stroke="#f59e0b" stroke-width="1"/>
    <text x="680" y="122" text-anchor="middle" font-size="14">⚡</text>
    <text x="680" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">性能</text>
    <line x1="615" y1="170" x2="745" y2="170" stroke="#fed7aa" stroke-width="1"/>
    <text x="680" y="195" text-anchor="middle" font-size="11" fill="#78350f">开启所有优化</text>
    <text x="680" y="213" text-anchor="middle" font-size="11" fill="#78350f">生成代码</text>
    <text x="680" y="245" text-anchor="middle" font-size="10" fill="#9a3412">仍低于</text>
    <text x="680" y="263" text-anchor="middle" font-size="10" fill="#9a3412">GCC -O0 水平</text>
  </g>

  <g>
    <rect x="780" y="85" width="140" height="240" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="850" cy="115" r="18" fill="#fed7aa" stroke="#f59e0b" stroke-width="1"/>
    <text x="850" y="122" text-anchor="middle" font-size="14">🦀</text>
    <text x="850" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Rust 质量</text>
    <line x1="800" y1="170" x2="900" y2="170" stroke="#fed7aa" stroke-width="1"/>
    <text x="850" y="195" text-anchor="middle" font-size="11" fill="#78350f">代码尚可</text>
    <text x="850" y="213" text-anchor="middle" font-size="11" fill="#78350f">能编译运行</text>
    <text x="850" y="245" text-anchor="middle" font-size="10" fill="#9a3412">但远不如</text>
    <text x="850" y="263" text-anchor="middle" font-size="10" fill="#9a3412">Rust 专家水平</text>
  </g>
</svg>
