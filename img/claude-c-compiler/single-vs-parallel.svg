<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrowOk" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="960" height="360" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">单代理瓶颈 vs 并行代理优势</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">为什么需要从单兵走向团队？</text>

  <!-- 左：单代理瓶颈 -->
  <g>
    <rect x="40" y="85" width="400" height="250" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="240" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">单代理的瓶颈</text>

    <rect x="70" y="135" width="340" height="80" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1.2"/>
    <text x="240" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">串行执行</text>
    <text x="240" y="180" text-anchor="middle" font-size="11" fill="#475569">一次只能做一件事</text>
    <text x="240" y="200" text-anchor="middle" font-size="10" fill="#64748b">总耗时 ≈ 任务数 × 单任务时间</text>

    <rect x="70" y="230" width="340" height="90" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1.2"/>
    <text x="240" y="253" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">无法专业化</text>
    <text x="240" y="275" text-anchor="middle" font-size="11" fill="#475569">同一个代理既写代码</text>
    <text x="240" y="293" text-anchor="middle" font-size="11" fill="#475569">又做测试 又写文档</text>
    <text x="240" y="310" text-anchor="middle" font-size="10" fill="#64748b">视角单一，易忽视问题</text>
  </g>

  <!-- 中间箭头 -->
  <line x1="460" y1="210" x2="500" y2="210" stroke="#10b981" stroke-width="2" marker-end="url(#arrowOk)"/>
  <text x="480" y="200" text-anchor="middle" font-size="11" fill="#10b981" font-weight="600">并行化</text>

  <!-- 右：并行代理优势 -->
  <g>
    <rect x="520" y="85" width="400" height="250" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="720" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">并行代理的优势</text>

    <rect x="550" y="135" width="340" height="80" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.2"/>
    <text x="720" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">多任务并发</text>
    <text x="720" y="180" text-anchor="middle" font-size="11" fill="#475569">N 个代理同时工作</text>
    <text x="720" y="200" text-anchor="middle" font-size="10" fill="#64748b">总耗时 ≈ 单任务时间</text>

    <rect x="550" y="230" width="340" height="90" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.2"/>
    <text x="720" y="253" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">角色分工</text>
    <text x="720" y="275" text-anchor="middle" font-size="11" fill="#475569">代码 / 测试 / 文档 / 审查</text>
    <text x="720" y="293" text-anchor="middle" font-size="11" fill="#475569">各有专人</text>
    <text x="720" y="310" text-anchor="middle" font-size="10" fill="#64748b">视角多元，覆盖更全面</text>
  </g>
</svg>
