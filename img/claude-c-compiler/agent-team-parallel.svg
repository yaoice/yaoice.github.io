<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">16 个并行 Claude 代理协作构建 C 编译器</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">共享 Git 仓库 · 任务锁定 · 测试驱动 · 多角色分工</text>

  <!-- 中心 Git 仓库 -->
  <rect x="380" y="230" width="200" height="90" rx="10" fill="#1e293b"/>
  <text x="480" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">共享 Git 仓库</text>
  <text x="480" y="278" text-anchor="middle" font-size="11" fill="#cbd5e1">Source of Truth</text>
  <rect x="400" y="288" width="160" height="22" rx="3" fill="#334155"/>
  <text x="480" y="303" text-anchor="middle" font-size="10" fill="#e2e8f0">current_tasks/ · src/ · tests/</text>

  <!-- 顶部：实现/调试 -->
  <g>
    <rect x="40" y="90" width="160" height="90" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="120" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">实现 Agent × 6</text>
    <text x="120" y="137" text-anchor="middle" font-size="10" fill="#475569">挑选任务 · 写代码</text>
    <text x="120" y="155" text-anchor="middle" font-size="10" fill="#475569">提交 · 等待测试</text>
    <text x="120" y="171" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">while true; do claude</text>
  </g>
  <g>
    <rect x="220" y="90" width="160" height="90" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="300" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">调试 Agent × 3</text>
    <text x="300" y="137" text-anchor="middle" font-size="10" fill="#475569">定位失败测试</text>
    <text x="300" y="155" text-anchor="middle" font-size="10" fill="#475569">最小化复现用例</text>
  </g>

  <g>
    <rect x="580" y="90" width="160" height="90" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="660" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">测试 Agent × 3</text>
    <text x="660" y="137" text-anchor="middle" font-size="10" fill="#475569">补测试用例</text>
    <text x="660" y="155" text-anchor="middle" font-size="10" fill="#475569">扩大覆盖范围</text>
  </g>
  <g>
    <rect x="760" y="90" width="160" height="90" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="840" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Review Agent × 2</text>
    <text x="840" y="137" text-anchor="middle" font-size="10" fill="#475569">审查代码质量</text>
    <text x="840" y="155" text-anchor="middle" font-size="10" fill="#475569">提出重构建议</text>
  </g>

  <!-- 底部：文档/效率/CI -->
  <g>
    <rect x="40" y="370" width="160" height="90" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="120" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">文档 Agent × 1</text>
    <text x="120" y="417" text-anchor="middle" font-size="10" fill="#475569">维护 README</text>
    <text x="120" y="435" text-anchor="middle" font-size="10" fill="#475569">补充代码注释</text>
  </g>
  <g>
    <rect x="220" y="370" width="160" height="90" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="300" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">效率 Agent × 1</text>
    <text x="300" y="417" text-anchor="middle" font-size="10" fill="#475569">减少冗余逻辑</text>
    <text x="300" y="435" text-anchor="middle" font-size="10" fill="#475569">优化数据结构</text>
  </g>
  <g>
    <rect x="580" y="370" width="340" height="90" rx="8" fill="#1e293b"/>
    <text x="750" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">CI / 测试基础设施</text>
    <text x="750" y="418" text-anchor="middle" font-size="10" fill="#cbd5e1">自动跑测试 · 记录结果 · 回滚错误提交</text>
    <text x="750" y="436" text-anchor="middle" font-size="10" fill="#cbd5e1">文件锁机制防并发冲突</text>
  </g>

  <!-- 连线 -->
  <line x1="200" y1="180" x2="380" y2="250" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="380" y1="180" x2="410" y2="230" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="580" y1="180" x2="550" y2="230" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="760" y1="180" x2="580" y2="250" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="200" y1="415" x2="380" y2="305" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="380" y1="415" x2="410" y2="320" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="580" y1="400" x2="550" y2="310" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- 统计条 -->
  <rect x="40" y="480" width="880" height="42" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="110" y="500" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">~2,000</text>
  <text x="110" y="514" text-anchor="middle" font-size="9" fill="#64748b">会话数</text>
  <line x1="180" y1="486" x2="180" y2="516" stroke="#e2e8f0"/>
  <text x="260" y="500" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">20 亿 / 1.4 亿</text>
  <text x="260" y="514" text-anchor="middle" font-size="9" fill="#64748b">输入/输出 Token</text>
  <line x1="340" y1="486" x2="340" y2="516" stroke="#e2e8f0"/>
  <text x="420" y="500" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">100,000 行</text>
  <text x="420" y="514" text-anchor="middle" font-size="9" fill="#64748b">Rust 代码</text>
  <line x1="500" y1="486" x2="500" y2="516" stroke="#e2e8f0"/>
  <text x="600" y="500" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">x86 / ARM / RISC-V</text>
  <text x="600" y="514" text-anchor="middle" font-size="9" fill="#64748b">三架构支持</text>
  <line x1="700" y1="486" x2="700" y2="516" stroke="#e2e8f0"/>
  <text x="810" y="500" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Linux 6.9 可编译</text>
  <text x="810" y="514" text-anchor="middle" font-size="9" fill="#64748b">~$20,000 API 成本</text>
</svg>
