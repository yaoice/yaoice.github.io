<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">多角色代理分工：专业化比通用代理更高效</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">16 个代理按角色分工 · 每种角色有专属的 Agent Prompt</text>

  <!-- 核心开发组 -->
  <g>
    <rect x="40" y="85" width="290" height="250" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="185" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">核心开发组</text>

    <rect x="60" y="130" width="250" height="80" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="185" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">功能开发 Agent × 8</text>
    <text x="185" y="172" text-anchor="middle" font-size="10" fill="#475569">修复编译错误</text>
    <text x="185" y="190" text-anchor="middle" font-size="10" fill="#475569">实现新特性</text>

    <rect x="60" y="230" width="250" height="80" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="185" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Bug 修复 Agent × 4</text>
    <text x="185" y="272" text-anchor="middle" font-size="10" fill="#475569">专注测试套件</text>
    <text x="185" y="290" text-anchor="middle" font-size="10" fill="#475569">逐个修复失败用例</text>
  </g>

  <!-- 质量保证组 -->
  <g>
    <rect x="345" y="85" width="290" height="330" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="490" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">质量保证组</text>

    <rect x="365" y="130" width="250" height="80" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="490" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">代码合并 Agent</text>
    <text x="490" y="172" text-anchor="middle" font-size="10" fill="#475569">检测重复代码</text>
    <text x="490" y="190" text-anchor="middle" font-size="10" fill="#475569">提取公共模块</text>

    <rect x="365" y="220" width="250" height="80" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="490" y="242" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">性能优化 Agent</text>
    <text x="490" y="262" text-anchor="middle" font-size="10" fill="#475569">分析热点路径</text>
    <text x="490" y="280" text-anchor="middle" font-size="10" fill="#475569">优化关键算法</text>

    <rect x="365" y="310" width="250" height="80" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="490" y="332" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">设计审查 Agent</text>
    <text x="490" y="352" text-anchor="middle" font-size="10" fill="#475569">以 Rust 专家视角</text>
    <text x="490" y="370" text-anchor="middle" font-size="10" fill="#475569">审查代码质量</text>
  </g>

  <!-- 支持组 -->
  <g>
    <rect x="650" y="85" width="290" height="250" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="795" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">支持组</text>

    <rect x="670" y="130" width="250" height="80" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="795" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">文档维护 Agent</text>
    <text x="795" y="172" text-anchor="middle" font-size="10" fill="#475569">保持 README 更新</text>
    <text x="795" y="190" text-anchor="middle" font-size="10" fill="#475569">添加代码注释</text>

    <rect x="670" y="230" width="250" height="80" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="795" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">代码效率 Agent</text>
    <text x="795" y="272" text-anchor="middle" font-size="10" fill="#475569">减少冗余</text>
    <text x="795" y="290" text-anchor="middle" font-size="10" fill="#475569">优化数据结构</text>
  </g>

  <!-- 底部说明 -->
  <rect x="40" y="435" width="880" height="45" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="480" y="458" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">设计原则</text>
  <text x="480" y="475" text-anchor="middle" font-size="11" fill="#475569">每种角色的 Agent Prompt 不同，关注的视角与产出也不同 · 16 个代理覆盖 8 种专业化角色</text>
</svg>
