<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="400" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">自主代理模式的核心风险</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">"测试通过 ≠ 正确"——Carlini 的警示</text>

  <!-- 人机协作 -->
  <g>
    <rect x="40" y="85" width="400" height="290" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="240" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">人机协作</text>

    <rect x="120" y="135" width="240" height="40" rx="20" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
    <text x="240" y="159" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">人类审查 ✓</text>

    <line x1="240" y1="175" x2="240" y2="200" stroke="#94a3b8" stroke-width="1.5"/>

    <rect x="70" y="205" width="340" height="36" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="240" y="228" text-anchor="middle" font-size="11" fill="#064e3b">代码质量保证（逻辑正确性）</text>

    <rect x="70" y="252" width="340" height="36" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="240" y="275" text-anchor="middle" font-size="11" fill="#064e3b">安全漏洞发现（攻击视角）</text>

    <rect x="70" y="299" width="340" height="36" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="240" y="322" text-anchor="middle" font-size="11" fill="#064e3b">设计意图验证（架构审美）</text>

    <rect x="70" y="345" width="340" height="20" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="240" y="360" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">多维度保证</text>
  </g>

  <!-- 自主代理 -->
  <g>
    <rect x="520" y="85" width="400" height="290" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="720" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">自主代理</text>

    <rect x="600" y="135" width="240" height="40" rx="20" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="720" y="159" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">测试通过 ≠ 正确 ⚠</text>

    <line x1="720" y1="175" x2="720" y2="200" stroke="#94a3b8" stroke-width="1.5"/>

    <rect x="550" y="205" width="340" height="36" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="720" y="228" text-anchor="middle" font-size="11" fill="#7f1d1d">可能存在未覆盖的边界情况</text>

    <rect x="550" y="252" width="340" height="36" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="720" y="275" text-anchor="middle" font-size="11" fill="#7f1d1d">可能存在安全漏洞</text>

    <rect x="550" y="299" width="340" height="36" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="720" y="322" text-anchor="middle" font-size="11" fill="#7f1d1d">可能存在性能陷阱</text>

    <rect x="550" y="345" width="340" height="20" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
    <text x="720" y="360" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">测试覆盖率幻觉</text>
  </g>
</svg>
