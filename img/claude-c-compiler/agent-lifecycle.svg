<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="640" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">代理完整生命周期（状态机）</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">从拉取代码到释放锁，每轮循环都回到起点</text>

  <!-- Start -->
  <circle cx="480" cy="85" r="10" fill="#1e293b"/>

  <!-- 拉取最新代码 -->
  <line x1="480" y1="95" x2="480" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="380" y="120" width="200" height="40" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="480" y="144" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">拉取最新代码</text>

  <line x1="480" y1="160" x2="480" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 扫描任务 -->
  <rect x="380" y="185" width="200" height="40" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="480" y="209" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">扫描任务列表</text>

  <!-- 两条分支 -->
  <line x1="400" y1="225" x2="250" y2="260" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="310" y="245" font-size="10" fill="#64748b">找到任务</text>
  <line x1="560" y1="225" x2="710" y2="260" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="650" y="245" font-size="10" fill="#64748b">无待办</text>

  <!-- 锁定任务 -->
  <rect x="150" y="265" width="200" height="40" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="250" y="289" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">锁定任务</text>

  <!-- 自主发现改进 -->
  <rect x="610" y="265" width="200" height="40" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="710" y="289" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">自主发现改进点</text>

  <!-- 合并到编码 -->
  <line x1="250" y1="305" x2="440" y2="335" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="305" x2="520" y2="335" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 编码实现 -->
  <rect x="380" y="340" width="200" height="40" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="480" y="364" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">编码实现</text>

  <line x1="480" y1="380" x2="480" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 运行测试 -->
  <rect x="380" y="405" width="200" height="40" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="480" y="429" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">运行测试</text>

  <!-- 回路测试失败 -->
  <path d="M380,425 Q280,425 280,370 Q280,340 380,360" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="250" y="400" text-anchor="middle" font-size="10" fill="#dc2626" font-style="italic">测试失败</text>

  <!-- 下：提交 -->
  <line x1="480" y1="445" x2="480" y2="465" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="458" font-size="10" fill="#10b981" font-style="italic">测试通过</text>

  <rect x="380" y="470" width="200" height="40" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="480" y="494" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">提交代码</text>

  <line x1="480" y1="510" x2="480" y2="530" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="380" y="535" width="200" height="40" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="480" y="559" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">同步合并 + 推送 + 释放锁</text>

  <!-- 结束：回到开头 -->
  <line x1="480" y1="575" x2="480" y2="600" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="480" cy="610" r="12" fill="#1e293b"/>
  <circle cx="480" cy="610" r="6" fill="#f8fafc"/>

  <!-- 右侧注释 -->
  <rect x="780" y="490" width="160" height="90" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="860" y="510" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">会话结束</text>
  <text x="795" y="530" font-size="10" fill="#78350f">循环脚本自动启动</text>
  <text x="795" y="548" font-size="10" fill="#78350f">新的 Claude Code 会话</text>
  <text x="795" y="566" font-size="10" fill="#78350f">（回到最顶部）</text>
  <path d="M775,530 Q720,200 490,100" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
