<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="960" height="360" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">测试是自主代理模式下的唯一质量看门人</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">"问题的定义（测试）必须几乎完美" — Carlini</text>

  <!-- Left: 人机协作模式 -->
  <g>
    <rect x="40" y="85" width="400" height="235" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="240" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">人机协作模式</text>

    <rect x="80" y="140" width="320" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="240" y="165" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">① 测试</text>

    <line x1="240" y1="180" x2="240" y2="205" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="80" y="210" width="320" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="240" y="235" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">② 人工代码审查（兜底）</text>

    <line x1="240" y1="250" x2="240" y2="275" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

    <rect x="80" y="280" width="320" height="30" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="240" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">质量保证 ✓</text>
  </g>

  <!-- Right: 自主代理模式 -->
  <g>
    <rect x="520" y="85" width="400" height="235" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="720" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">自主代理模式</text>

    <rect x="560" y="140" width="320" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="720" y="165" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">① 测试 = 唯一验证者</text>

    <!-- 判断菱形 -->
    <polygon points="720,185 820,220 720,255 620,220" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="720" y="217" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">测试质量高？</text>
    <text x="720" y="232" text-anchor="middle" font-size="10" fill="#92400e">（覆盖率/边界）</text>

    <!-- 左下分支 yes -->
    <line x1="625" y1="238" x2="580" y2="280" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    <text x="575" y="258" font-size="10" fill="#10b981" font-weight="600">是</text>
    <rect x="540" y="285" width="90" height="25" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="585" y="302" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">质量保证 ✓</text>

    <!-- 右下分支 no -->
    <line x1="815" y1="238" x2="860" y2="280" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <text x="865" y="258" font-size="10" fill="#ef4444" font-weight="600">否</text>
    <rect x="810" y="285" width="90" height="25" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
    <text x="855" y="302" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">质量漂移 ✗</text>
  </g>
</svg>
