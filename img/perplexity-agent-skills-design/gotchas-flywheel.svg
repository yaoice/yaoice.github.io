<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="Gotchas Flywheel 维护回路">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#bbf7d0" stroke-width="1" opacity="0.5"/>
    </pattern>
    <marker id="arrowG" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.5"/>

  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a">Gotchas Flywheel：Skill 是 append-mostly，价值越维护越厚</text>

  <!-- 中心：飞轮 -->
  <circle cx="600" cy="340" r="120" fill="#fff" stroke="#16a34a" stroke-width="3" filter="url(#shadow)"/>
  <text x="600" y="324" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="22" font-weight="900" fill="#166534">Gotchas</text>
  <text x="600" y="354" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="22" font-weight="900" fill="#166534">Section</text>
  <text x="600" y="382" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" fill="#14532d">越长越值钱</text>

  <!-- 四个象限：观察 → 动作 -->
  <g filter="url(#shadow)">
    <rect x="80" y="130" width="380" height="130" rx="18" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="100" y="158" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#991b1b">观察 ①</text>
    <text x="100" y="184" font-family="PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#7f1d1d">Agent 在某个情境下做错了</text>
    <text x="100" y="214" font-family="PingFang SC, sans-serif" font-size="14" fill="#475569">→ 动作：把这个 case 写成一条 gotcha</text>
    <text x="100" y="238" font-family="PingFang SC, sans-serif" font-size="13" font-style="italic" fill="#475569">不要去改描述、不要重写正文</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="740" y="130" width="380" height="130" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="760" y="158" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#92400e">观察 ②</text>
    <text x="760" y="184" font-family="PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#7c2d12">Skill 被错误激活（off-target）</text>
    <text x="760" y="214" font-family="PingFang SC, sans-serif" font-size="14" fill="#475569">→ 动作：收紧 description + 加负例 eval</text>
    <text x="760" y="238" font-family="PingFang SC, sans-serif" font-size="13" font-style="italic" fill="#475569">负例 eval 比正例还重要</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="420" width="380" height="130" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="100" y="448" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#1e3a8a">观察 ③</text>
    <text x="100" y="474" font-family="PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">该加载时没加载</text>
    <text x="100" y="504" font-family="PingFang SC, sans-serif" font-size="14" fill="#475569">→ 动作：补关键词 + 加正例 eval</text>
    <text x="100" y="528" font-family="PingFang SC, sans-serif" font-size="13" font-style="italic" fill="#475569">用用户原话，不用工程师术语</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="740" y="420" width="380" height="130" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="760" y="448" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#4c1d95">观察 ④</text>
    <text x="760" y="474" font-family="PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#4c1d95">系统提示词被改了</text>
    <text x="760" y="504" font-family="PingFang SC, sans-serif" font-size="14" fill="#475569">→ 动作：检查 Skill 是否与之冲突/重复</text>
    <text x="760" y="528" font-family="PingFang SC, sans-serif" font-size="13" font-style="italic" fill="#475569">"远距离副作用"主要风险源</text>
  </g>

  <!-- 弧线箭头围绕中心 -->
  <path d="M 470 260 A 130 130 0 0 1 470 420" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowG)"/>
  <path d="M 730 420 A 130 130 0 0 1 730 260" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowG)"/>
  <path d="M 460 280 A 200 200 0 0 1 740 280" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrowG)"/>

  <text x="600" y="600" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" font-weight="700" fill="#0f172a">从 80/20 爬到 99.9% 靠的不是写得更长，而是 gotchas 越攒越准</text>
</svg>
