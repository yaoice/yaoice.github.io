<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-label="构建五步法">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fef6ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.4"/>
    </pattern>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>

  <text x="600" y="56" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a">构建一个 Skill 的标准顺序：先 Eval，再描述，最后才是正文</text>

  <!-- 5 步水平流 -->
  <g>
    <rect x="60" y="120" width="200" height="200" rx="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="160" y="158" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="36" font-weight="900" fill="#f59e0b">0</text>
    <text x="160" y="192" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="17" font-weight="800" fill="#92400e">写 Eval</text>
    <text x="160" y="218" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#7c2d12">真实用户问题</text>
    <text x="160" y="236" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#7c2d12">+ 已知失败</text>
    <text x="160" y="254" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#7c2d12">+ 相邻领域</text>
    <text x="160" y="284" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#dc2626">含负例！</text>
  </g>

  <line x1="270" y1="220" x2="295" y2="220" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="305" y="120" width="200" height="200" rx="20" fill="#fee2e2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
    <text x="405" y="158" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="36" font-weight="900" fill="#ef4444">1</text>
    <text x="405" y="192" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="17" font-weight="800" fill="#991b1b">写 Description</text>
    <text x="405" y="218" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#7f1d1d">"Load when..."</text>
    <text x="405" y="236" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#7f1d1d">≤ 50 词</text>
    <text x="405" y="254" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#7f1d1d">描述意图 ≠ 功能</text>
    <text x="405" y="284" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#dc2626">最难的一行</text>
  </g>

  <line x1="515" y1="220" x2="540" y2="220" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="550" y="120" width="200" height="200" rx="20" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
    <text x="650" y="158" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="36" font-weight="900" fill="#2563eb">2</text>
    <text x="650" y="192" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="17" font-weight="800" fill="#1e3a8a">写 Body</text>
    <text x="650" y="218" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#1e40af">跳过显而易见</text>
    <text x="650" y="236" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#1e40af">写 gotchas / 负例</text>
    <text x="650" y="254" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#1e40af">陈述意图不railroad</text>
    <text x="650" y="284" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#1e40af">≤ 5,000 tok</text>
  </g>

  <line x1="760" y1="220" x2="785" y2="220" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="795" y="120" width="200" height="200" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
    <text x="895" y="158" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="36" font-weight="900" fill="#16a34a">3</text>
    <text x="895" y="192" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="17" font-weight="800" fill="#166534">用好层级</text>
    <text x="895" y="218" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#14532d">scripts/ 给确定性</text>
    <text x="895" y="236" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#14532d">references/ 重资料</text>
    <text x="895" y="254" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#14532d">assets/ 输出模板</text>
    <text x="895" y="284" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#166534">Hub-and-Spoke</text>
  </g>

  <line x1="1005" y1="220" x2="1030" y2="220" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="1040" y="120" width="120" height="200" rx="20" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
    <text x="1100" y="158" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="36" font-weight="900" fill="#7c3aed">4</text>
    <text x="1100" y="192" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="17" font-weight="800" fill="#4c1d95">迭代</text>
    <text x="1100" y="218" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#4c1d95">跑 hero queries</text>
    <text x="1100" y="234" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#4c1d95">单 changeset</text>
    <text x="1100" y="250" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#4c1d95">小词大影响</text>
    <text x="1100" y="284" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#4c1d95">Ship 🚀</text>
  </g>

  <!-- 底部：四套 Eval Suite -->
  <text x="600" y="380" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Perplexity 的四套 Eval Suite（贯穿全流程）</text>

  <g filter="url(#shadow)">
    <rect x="80" y="410" width="255" height="180" rx="16" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <text x="207" y="442" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="800" fill="#1e3a8a">① 加载/读取</text>
    <text x="100" y="472" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">precision · recall</text>
    <text x="100" y="494" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">forbidden check</text>
    <text x="100" y="516" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">确保新 Skill</text>
    <text x="100" y="538" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">不破坏既有边界</text>
    <text x="100" y="568" font-family="PingFang SC, sans-serif" font-size="12" font-style="italic" fill="#1e40af">防"远距离副作用"</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="350" y="410" width="255" height="180" rx="16" fill="#fff" stroke="#16a34a" stroke-width="2"/>
    <text x="477" y="442" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="800" fill="#166534">② 渐进式加载</text>
    <text x="370" y="472" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">Skill 是否真的去</text>
    <text x="370" y="494" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">读 FORMATTING.md</text>
    <text x="370" y="516" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">/ SPECIAL_CASES.md</text>
    <text x="370" y="538" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">等辅助文件？</text>
    <text x="370" y="568" font-family="PingFang SC, sans-serif" font-size="12" font-style="italic" fill="#14532d">检验 Hub-and-Spoke</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="410" width="255" height="180" rx="16" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <text x="747" y="442" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="800" fill="#92400e">③ 端到端任务</text>
    <text x="640" y="472" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">跑完整 Agent loop</text>
    <text x="640" y="494" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">LLM judge 按 rubric</text>
    <text x="640" y="516" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">打分</text>
    <text x="640" y="538" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">看真实产出质量</text>
    <text x="640" y="568" font-family="PingFang SC, sans-serif" font-size="12" font-style="italic" fill="#7c2d12">最贵也最关键</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="890" y="410" width="255" height="180" rx="16" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
    <text x="1017" y="442" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="800" fill="#4c1d95">④ 跨模型</text>
    <text x="910" y="472" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">GPT · Claude Opus</text>
    <text x="910" y="494" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">· Claude Sonnet</text>
    <text x="910" y="516" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">Sonnet/GPT 与 Skill</text>
    <text x="910" y="538" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">交互差异显著</text>
    <text x="910" y="568" font-family="PingFang SC, sans-serif" font-size="12" font-style="italic" fill="#4c1d95">编排器不同 ≠ 同效</text>
  </g>

  <text x="600" y="630" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-style="italic" fill="#475569">"自动生成的 Skill 平均无收益" —— 模型不能可靠生成它自己消费时受益的程序性知识</text>
</svg>
