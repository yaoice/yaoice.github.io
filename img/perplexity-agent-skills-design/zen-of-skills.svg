<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Zen of Python vs Zen of Skills 对照">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fef6ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.4"/>
    </pattern>
    <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.6"/>

  <text x="600" y="58" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="28" font-weight="800" fill="#0f172a">写软件的好习惯，到了 Skill 设计里都成了反模式</text>

  <!-- 表头 -->
  <rect x="80" y="100" width="500" height="56" rx="14" fill="#1e3a8a"/>
  <text x="330" y="138" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="22" font-weight="800" fill="#fff">Zen of Python</text>

  <rect x="620" y="100" width="500" height="56" rx="14" fill="#9a3412"/>
  <text x="870" y="138" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="22" font-weight="800" fill="#fff">Zen of Skills（与之反向）</text>

  <!-- 5 行对照 -->
  <g filter="url(#shadow)">
    <rect x="80" y="180" width="500" height="78" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="218" font-family="PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#1e3a8a">简单优于复杂</text>
    <text x="100" y="244" font-family="PingFang SC, sans-serif" font-size="14" fill="#475569">Simple is better than complex</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="620" y="180" width="500" height="78" rx="14" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="640" y="218" font-family="PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#9a3412">Skill 是文件夹，不是文件</text>
    <text x="640" y="244" font-family="PingFang SC, sans-serif" font-size="14" fill="#7c2d12">复杂结构本身就是特性</text>
  </g>
  <line x1="585" y1="219" x2="615" y2="219" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="270" width="500" height="78" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="308" font-family="PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#1e3a8a">显式优于隐式</text>
    <text x="100" y="334" font-family="PingFang SC, sans-serif" font-size="14" fill="#475569">Explicit is better than implicit</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="620" y="270" width="500" height="78" rx="14" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="640" y="308" font-family="PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#9a3412">激活靠模式匹配，渐进式披露</text>
    <text x="640" y="334" font-family="PingFang SC, sans-serif" font-size="14" fill="#7c2d12">让模型按需自取，而非全量塞入</text>
  </g>
  <line x1="585" y1="309" x2="615" y2="309" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="360" width="500" height="78" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="398" font-family="PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#1e3a8a">稀疏优于密集</text>
    <text x="100" y="424" font-family="PingFang SC, sans-serif" font-size="14" fill="#475569">Sparse is better than dense</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="620" y="360" width="500" height="78" rx="14" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="640" y="398" font-family="PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#9a3412">上下文很贵，单 token 信号最大化</text>
    <text x="640" y="424" font-family="PingFang SC, sans-serif" font-size="14" fill="#7c2d12">每句话都要"省 token"</text>
  </g>
  <line x1="585" y1="399" x2="615" y2="399" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="450" width="500" height="78" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="488" font-family="PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#1e3a8a">特殊情况不足以打破规则</text>
    <text x="100" y="514" font-family="PingFang SC, sans-serif" font-size="14" fill="#475569">Special cases aren't special enough</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="620" y="450" width="500" height="78" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="640" y="488" font-family="PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#166534">Gotchas 才是 Skill 最高价值的部分</text>
    <text x="640" y="514" font-family="PingFang SC, sans-serif" font-size="14" fill="#14532d">正常路径模型自己会，特殊情况它不会</text>
  </g>
  <line x1="585" y1="489" x2="615" y2="489" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowRed)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="540" width="500" height="78" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="578" font-family="PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#1e3a8a">易于解释的实现可能是好主意</text>
    <text x="100" y="604" font-family="PingFang SC, sans-serif" font-size="14" fill="#475569">If easy to explain, it may be good</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="620" y="540" width="500" height="78" rx="14" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="640" y="578" font-family="PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#991b1b">如果容易解释，模型已经知道了，删掉</text>
    <text x="640" y="604" font-family="PingFang SC, sans-serif" font-size="14" fill="#7f1d1d">Skill 不该重复训练数据里已有的常识</text>
  </g>
  <line x1="585" y1="579" x2="615" y2="579" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>

  <text x="600" y="660" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="600" fill="#475569">从软件工程师转 Skill 设计师，先把这五条本能翻过来</text>
</svg>
