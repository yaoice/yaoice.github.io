<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="Perplexity Agent Skills 设计封面">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#111a35"/>
      <stop offset="100%" stop-color="#1b1239"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cardD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#581c87"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.7"/>

  <!-- 光晕 -->
  <circle cx="980" cy="120" r="120" fill="#2563eb" opacity="0.35" filter="url(#glow)"/>
  <circle cx="220" cy="540" r="140" fill="#a855f7" opacity="0.25" filter="url(#glow)"/>

  <!-- 主标题 -->
  <text x="80" y="130" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="58" font-weight="900" fill="#f8fafc">Perplexity 的 Agent Skills</text>
  <text x="80" y="200" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="58" font-weight="900" fill="#60a5fa">不是软件工程，是上下文工程</text>

  <text x="80" y="252" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="500" fill="#94a3b8">设计 · 迭代 · 维护：一套与 Zen of Python 几乎完全相反的设计哲学</text>

  <!-- 四张概念卡 -->
  <g filter="url(#shadow)">
    <rect x="80" y="320" width="250" height="240" rx="22" fill="url(#cardA)"/>
    <text x="205" y="380" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="22" font-weight="800" fill="#fff">Skill 是目录</text>
    <text x="205" y="412" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" fill="#dbeafe">不是单文件</text>
    <text x="205" y="468" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="44" font-weight="900" fill="#fff">📁</text>
    <text x="205" y="520" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#bfdbfe">SKILL.md · scripts · refs · assets</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="350" y="320" width="250" height="240" rx="22" fill="url(#cardB)"/>
    <text x="475" y="380" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="22" font-weight="800" fill="#fff">三层上下文成本</text>
    <text x="475" y="412" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" fill="#d1fae5">Index → Load → Runtime</text>
    <text x="475" y="468" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="44" font-weight="900" fill="#fff">💰</text>
    <text x="475" y="520" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#a7f3d0">每个 Skill 都是税</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="320" width="250" height="240" rx="22" fill="url(#cardC)"/>
    <text x="745" y="380" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="22" font-weight="800" fill="#fff">Description 即路由</text>
    <text x="745" y="412" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" fill="#fde68a">"Load when..." 而非文档</text>
    <text x="745" y="468" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="44" font-weight="900" fill="#fff">🎯</text>
    <text x="745" y="520" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#fcd34d">最难写的一行</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="890" y="320" width="230" height="240" rx="22" fill="url(#cardD)"/>
    <text x="1005" y="380" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="22" font-weight="800" fill="#fff">Gotchas Flywheel</text>
    <text x="1005" y="412" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" fill="#e9d5ff">Append-mostly 维护</text>
    <text x="1005" y="468" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="44" font-weight="900" fill="#fff">🔁</text>
    <text x="1005" y="520" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#ddd6fe">从 80/20 到 99.9%</text>
  </g>

  <text x="600" y="610" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="18" font-weight="600" fill="#64748b">"如果它容易解释，模型已经知道了。删掉。"</text>
</svg>
