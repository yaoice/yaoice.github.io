<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-label="Skill vs 软件 的本质差异">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fef6ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>

  <text x="600" y="56" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a">Skill 不是软件，是"模型 + 它的环境"的上下文</text>
  <text x="600" y="86" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#475569">Perplexity Agents 团队把 Skill 质量看得和代码质量一样重</text>

  <!-- 左：软件 -->
  <g filter="url(#shadow)">
    <rect x="80" y="120" width="490" height="380" rx="22" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <text x="325" y="160" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="22" font-weight="900" fill="#1e3a8a">写软件时你会</text>

    <text x="110" y="200" font-family="PingFang SC, sans-serif" font-size="15" fill="#1e3a8a">▸ 写文档解释 API 的功能</text>
    <text x="110" y="232" font-family="PingFang SC, sans-serif" font-size="15" fill="#1e3a8a">▸ 把常用流程写成详细 README</text>
    <text x="110" y="264" font-family="PingFang SC, sans-serif" font-size="15" fill="#1e3a8a">▸ 用抽象与配置应对未来变化</text>
    <text x="110" y="296" font-family="PingFang SC, sans-serif" font-size="15" fill="#1e3a8a">▸ 命名/注释力求显式清晰</text>
    <text x="110" y="328" font-family="PingFang SC, sans-serif" font-size="15" fill="#1e3a8a">▸ 把所有依赖在头部一次加载</text>
    <text x="110" y="360" font-family="PingFang SC, sans-serif" font-size="15" fill="#1e3a8a">▸ 用 try/except 处理一切异常</text>

    <text x="325" y="420" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">原则：显式、覆盖、防御性编程</text>
    <text x="325" y="448" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" fill="#475569">读者是另一个工程师</text>
    <text x="325" y="476" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" fill="#475569">未来的自己也算工程师</text>
  </g>

  <!-- 右：Skill -->
  <g filter="url(#shadow)">
    <rect x="630" y="120" width="490" height="380" rx="22" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <text x="875" y="160" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="22" font-weight="900" fill="#9a3412">写 Skill 时你要</text>

    <text x="660" y="200" font-family="PingFang SC, sans-serif" font-size="15" fill="#9a3412">▸ 描述何时该被加载（路由触发器）</text>
    <text x="660" y="232" font-family="PingFang SC, sans-serif" font-size="15" fill="#9a3412">▸ 跳过显而易见的内容（模型已会）</text>
    <text x="660" y="264" font-family="PingFang SC, sans-serif" font-size="15" fill="#9a3412">▸ 用层级承载复杂度，按需懒加载</text>
    <text x="660" y="296" font-family="PingFang SC, sans-serif" font-size="15" fill="#9a3412">▸ 模糊指意图，让模型按情境裁量</text>
    <text x="660" y="328" font-family="PingFang SC, sans-serif" font-size="15" fill="#9a3412">▸ 重资料放 refs/，只在需要时读</text>
    <text x="660" y="360" font-family="PingFang SC, sans-serif" font-size="15" fill="#9a3412">▸ 重点写 gotchas 和负例</text>

    <text x="875" y="420" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#9a3412">原则：隐式、稀疏、渐进式披露</text>
    <text x="875" y="448" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" fill="#475569">读者是 LLM（带训练数据的协作者）</text>
    <text x="875" y="476" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" fill="#475569">且要为下一次 token 收税付费</text>
  </g>

  <text x="600" y="544" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#0f172a">把"工程师好习惯"翻一个方向，就是 Skill 的第一性原则</text>
</svg>
