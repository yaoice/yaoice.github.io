<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="Description 路由对比">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fef6ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.4"/>
    </pattern>
    <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>

  <text x="600" y="54" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a">Description 不是文档，是路由触发器</text>
  <text x="600" y="84" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#475569">同一个 PR 监控 Skill，两种 description 决定它是否被加载</text>

  <!-- 左：用户真实语言 -->
  <text x="600" y="124" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#0f172a">用户实际说的话</text>
  <g filter="url(#shadow)">
    <rect x="380" y="138" width="440" height="60" rx="14" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
    <text x="600" y="175" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-style="italic" fill="#334155">"帮我盯着这个 PR，CI 过了就 merge"</text>
  </g>

  <!-- 路由箭头 -->
  <line x1="430" y1="218" x2="280" y2="270" stroke="#ef4444" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>
  <line x1="770" y1="218" x2="920" y2="270" stroke="#16a34a" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>

  <!-- 左卡：反面 -->
  <g filter="url(#shadow)">
    <rect x="60" y="280" width="490" height="290" rx="22" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="305" y="318" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="20" font-weight="900" fill="#991b1b">✗ 反例：description 写成文档</text>

    <rect x="85" y="338" width="440" height="100" rx="10" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
    <text x="100" y="362" font-family="ui-monospace, monospace" font-size="13" fill="#7f1d1d">description: This skill monitors</text>
    <text x="100" y="382" font-family="ui-monospace, monospace" font-size="13" fill="#7f1d1d">  pull requests by polling GitHub</text>
    <text x="100" y="402" font-family="ui-monospace, monospace" font-size="13" fill="#7f1d1d">  API, checking CI status, and</text>
    <text x="100" y="422" font-family="ui-monospace, monospace" font-size="13" fill="#7f1d1d">  reporting back to the user.</text>

    <text x="85" y="470" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#991b1b">问题：</text>
    <text x="85" y="494" font-family="PingFang SC, sans-serif" font-size="13" fill="#7f1d1d">• 关键词全是 monitor / poll / API</text>
    <text x="85" y="514" font-family="PingFang SC, sans-serif" font-size="13" fill="#7f1d1d">• 用户嘴里却是"盯着" / "watch" / "merge"</text>
    <text x="85" y="534" font-family="PingFang SC, sans-serif" font-size="13" fill="#7f1d1d">• 路由器永远命不中 → Skill 等于不存在</text>
    <text x="85" y="554" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#991b1b">→ 索引费照付，价值为零</text>
  </g>

  <!-- 右卡：正例 -->
  <g filter="url(#shadow)">
    <rect x="650" y="280" width="490" height="290" rx="22" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="895" y="318" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="20" font-weight="900" fill="#166534">✓ 正例：description 用用户的话</text>

    <rect x="675" y="338" width="440" height="100" rx="10" fill="#fff" stroke="#86efac" stroke-width="1"/>
    <text x="690" y="362" font-family="ui-monospace, monospace" font-size="13" fill="#14532d">description: Load when user</text>
    <text x="690" y="382" font-family="ui-monospace, monospace" font-size="13" fill="#14532d">  asks to babysit, watch, or</text>
    <text x="690" y="402" font-family="ui-monospace, monospace" font-size="13" fill="#14532d">  shepherd a PR through CI</text>
    <text x="690" y="422" font-family="ui-monospace, monospace" font-size="13" fill="#14532d">  until it lands.</text>

    <text x="675" y="470" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#166534">要点：</text>
    <text x="675" y="494" font-family="PingFang SC, sans-serif" font-size="13" fill="#14532d">• 起手 "Load when..." 而非 "This Skill..."</text>
    <text x="675" y="514" font-family="PingFang SC, sans-serif" font-size="13" fill="#14532d">• 抓沮丧工程师的真实用词</text>
    <text x="675" y="534" font-family="PingFang SC, sans-serif" font-size="13" fill="#14532d">• ≤ 50 词，描述意图不描述实现</text>
    <text x="675" y="554" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#166534">→ 路由器一眼命中</text>
  </g>

  <text x="600" y="610" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" font-weight="700" fill="#0f172a">改 description = 改路由：哪怕只换一个词，都可能波及其他 Skill 的加载边界</text>
</svg>
