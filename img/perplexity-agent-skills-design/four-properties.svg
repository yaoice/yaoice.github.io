<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-label="Skill 四属性结构">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fef6ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.4"/>
    </pattern>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>

  <text x="600" y="58" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a">Skill 的四个定义性属性：目录 · 格式 · 可调用 · 渐进式</text>

  <!-- 左：Skill 目录结构 -->
  <g filter="url(#shadow)">
    <rect x="70" y="110" width="380" height="490" rx="22" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="260" y="148" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="20" font-weight="800" fill="#0f172a">① 目录而非文件</text>

    <rect x="100" y="170" width="320" height="48" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="120" y="200" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#1e3a8a">📄 SKILL.md</text>
    <text x="280" y="200" font-family="PingFang SC, sans-serif" font-size="13" fill="#475569">frontmatter + 指令</text>

    <rect x="100" y="230" width="320" height="48" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="120" y="260" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#14532d">📁 scripts/</text>
    <text x="280" y="260" font-family="PingFang SC, sans-serif" font-size="13" fill="#475569">确定性逻辑</text>

    <rect x="100" y="290" width="320" height="48" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="120" y="320" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#92400e">📁 references/</text>
    <text x="280" y="320" font-family="PingFang SC, sans-serif" font-size="13" fill="#475569">按需加载的重文档</text>

    <rect x="100" y="350" width="320" height="48" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="120" y="380" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#4c1d95">📁 assets/</text>
    <text x="280" y="380" font-family="PingFang SC, sans-serif" font-size="13" fill="#475569">模板与 schema</text>

    <rect x="100" y="410" width="320" height="48" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="120" y="440" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#991b1b">📄 config.json</text>
    <text x="280" y="440" font-family="PingFang SC, sans-serif" font-size="13" fill="#475569">首次运行设置</text>

    <text x="260" y="498" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Hub-and-Spoke：中心 SKILL.md，</text>
    <text x="260" y="518" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#0f172a">其余文件按条件向外辐射</text>
    <text x="260" y="555" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-style="italic" fill="#dc2626">案例：美国所得税 1945 节扁平塞入 →</text>
    <text x="260" y="575" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-style="italic" fill="#dc2626">效果比不加载 Skill 还差</text>
  </g>

  <!-- 中：格式与依赖 -->
  <g filter="url(#shadow)">
    <rect x="470" y="110" width="350" height="490" rx="22" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="645" y="148" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="20" font-weight="800" fill="#0f172a">② 格式：SKILL.md 的脸面</text>

    <rect x="490" y="175" width="310" height="195" rx="10" fill="#0f172a"/>
    <text x="505" y="200" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">---</text>
    <text x="505" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#fbbf24">name:</text>
    <text x="560" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0">tax-research</text>
    <text x="505" y="240" font-family="ui-monospace, monospace" font-size="13" fill="#fbbf24">description:</text>
    <text x="505" y="260" font-family="ui-monospace, monospace" font-size="13" fill="#86efac">  Load when user asks about</text>
    <text x="505" y="278" font-family="ui-monospace, monospace" font-size="13" fill="#86efac">  US federal income tax...</text>
    <text x="505" y="302" font-family="ui-monospace, monospace" font-size="13" fill="#fbbf24">depends:</text>
    <text x="505" y="320" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0">  - irs-citations</text>
    <text x="505" y="340" font-family="ui-monospace, monospace" font-size="13" fill="#fbbf24">metadata:</text>
    <text x="505" y="358" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0">  reviewer: alice</text>

    <text x="490" y="400" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#16a34a">✓ name 与目录名一致，小写连字符</text>
    <text x="490" y="425" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#16a34a">✓ description 是"路由触发器"</text>
    <text x="490" y="450" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#16a34a">✓ depends 递归自动加载</text>
    <text x="490" y="475" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#dc2626">✗ 不要把 description 当文档写</text>
    <text x="490" y="500" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#dc2626">✗ frontmatter 在投喂模型前会被剥离</text>

    <text x="645" y="555" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-style="italic" fill="#475569">"Load when..." 而不是 "This Skill does..."</text>
  </g>

  <!-- 右：可调用 + 渐进式 -->
  <g filter="url(#shadow)">
    <rect x="840" y="110" width="290" height="232" rx="22" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="985" y="148" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="20" font-weight="800" fill="#0f172a">③ 可调用</text>
    <text x="855" y="180" font-family="PingFang SC, sans-serif" font-size="14" fill="#0f172a">运行时才装载，不默认入 context</text>

    <rect x="860" y="200" width="250" height="32" rx="8" fill="#dbeafe"/>
    <text x="985" y="222" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#1e3a8a">load_skill(name="...")</text>

    <text x="860" y="252" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">↓ 拷贝到隔离沙箱</text>
    <text x="860" y="275" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">↓ depends 递归加载</text>
    <text x="860" y="298" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">↓ 剥离 frontmatter</text>
    <text x="860" y="321" font-family="PingFang SC, sans-serif" font-size="13" fill="#334155">↓ Agent 看到 body + 文件</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="840" y="362" width="290" height="238" rx="22" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="985" y="400" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="20" font-weight="800" fill="#0f172a">④ 渐进式</text>

    <rect x="860" y="420" width="250" height="44" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="985" y="438" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#991b1b">Index ~100 tok/Skill</text>
    <text x="985" y="456" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#7f1d1d">每会话每用户都付</text>

    <rect x="860" y="475" width="250" height="44" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="985" y="493" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#92400e">Load ~5,000 tok</text>
    <text x="985" y="511" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#7c2d12">加载该 Skill 才付</text>

    <rect x="860" y="530" width="250" height="44" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="985" y="548" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#166534">Runtime 不限</text>
    <text x="985" y="566" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#14532d">读到才付</text>
  </g>

  <line x1="455" y1="350" x2="465" y2="350" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="825" y1="350" x2="835" y2="350" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
