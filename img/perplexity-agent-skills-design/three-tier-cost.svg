<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="三层上下文成本漏斗">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ed"/>
      <stop offset="100%" stop-color="#fef2f2"/>
    </linearGradient>
    <linearGradient id="redG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="orangeG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="greenG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#fde68a" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.5"/>

  <text x="600" y="56" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a">每个 Skill 都是税：上下文成本沿 Index → Load → Runtime 三层递增</text>

  <!-- 倒漏斗：上宽下窄 = 每次付费的用户/会话越来越少 -->
  <g filter="url(#shadow)">
    <polygon points="120,120 1080,120 940,260 260,260" fill="url(#redG)" stroke="#ef4444" stroke-width="2"/>
    <text x="600" y="170" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="26" font-weight="900" fill="#991b1b">① Index 索引层</text>
    <text x="600" y="205" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" fill="#7f1d1d">每个用户、每次会话、每条 Skill 都要付</text>
    <text x="600" y="232" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#991b1b">仅 name + description ≈ 100 tokens / Skill</text>
  </g>

  <g filter="url(#shadow)">
    <polygon points="260,280 940,280 800,420 400,420" fill="url(#orangeG)" stroke="#f59e0b" stroke-width="2"/>
    <text x="600" y="330" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="26" font-weight="900" fill="#92400e">② Load 加载层</text>
    <text x="600" y="365" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" fill="#7c2d12">只有命中路由的会话才付</text>
    <text x="600" y="392" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#92400e">完整 SKILL.md body ≈ 5,000 tokens（建议上限）</text>
  </g>

  <g filter="url(#shadow)">
    <polygon points="400,440 800,440 700,560 500,560" fill="url(#greenG)" stroke="#16a34a" stroke-width="2"/>
    <text x="600" y="490" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="26" font-weight="900" fill="#166534">③ Runtime 运行层</text>
    <text x="600" y="525" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" fill="#14532d">Agent 真正读到时才付</text>
    <text x="600" y="548" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#166534">scripts/ · references/ · assets/ 无上限</text>
  </g>

  <!-- 旁注：警示 -->
  <g>
    <rect x="60" y="380" width="180" height="80" rx="14" fill="#fff" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="410" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#991b1b">每个 Skill 索引费</text>
    <text x="150" y="432" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" fill="#7f1d1d">N 个 Skill = N×100 tok</text>
    <text x="150" y="450" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" fill="#7f1d1d">永远在场，永远收税</text>
  </g>

  <g>
    <rect x="960" y="380" width="180" height="80" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="1050" y="410" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#92400e">同一线程</text>
    <text x="1050" y="432" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" fill="#7c2d12">常同时 Load 3~5 个</text>
    <text x="1050" y="450" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" fill="#7c2d12">一个臃肿 → 全员变笨</text>
  </g>

  <text x="600" y="608" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#0f172a">设计原则：把"必备信号"压在最上层，把"重资料"留到 Runtime 才取</text>
</svg>
