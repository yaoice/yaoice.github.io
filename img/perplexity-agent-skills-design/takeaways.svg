<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="给落地者的 7 条带走清单">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1b1239"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.6"/>

  <text x="600" y="64" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="28" font-weight="900" fill="#f8fafc">把 Skill 当一等公民来设计的 7 条带走清单</text>

  <!-- 7 张小卡，3+3+1 布局 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="360" height="150" rx="18" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="100" cy="148" r="22" fill="url(#gold)"/>
    <text x="100" y="156" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="20" font-weight="900" fill="#0b1220">1</text>
    <text x="140" y="156" font-family="PingFang SC, sans-serif" font-size="17" font-weight="800" fill="#f8fafc">先写 Eval，再写 Skill</text>
    <text x="140" y="190" font-family="PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">包含负例与"禁止加载"案例</text>
    <text x="140" y="212" font-family="PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">防止给相邻 Skill 制造副作用</text>
    <text x="140" y="240" font-family="PingFang SC, sans-serif" font-size="12" font-style="italic" fill="#94a3b8">没有 eval 的 Skill = 没有验收的代码</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="440" y="110" width="360" height="150" rx="18" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <circle cx="480" cy="148" r="22" fill="url(#gold)"/>
    <text x="480" y="156" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="20" font-weight="900" fill="#0b1220">2</text>
    <text x="520" y="156" font-family="PingFang SC, sans-serif" font-size="17" font-weight="800" fill="#f8fafc">Description 是最难的一行</text>
    <text x="520" y="190" font-family="PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">"Load when..." 用用户的话</text>
    <text x="520" y="212" font-family="PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">每个词都在抢路由器的注意力</text>
    <text x="520" y="240" font-family="PingFang SC, sans-serif" font-size="12" font-style="italic" fill="#94a3b8">改一个动词都要补一组 eval</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="110" width="320" height="150" rx="18" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="860" cy="148" r="22" fill="url(#gold)"/>
    <text x="860" y="156" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="20" font-weight="900" fill="#0b1220">3</text>
    <text x="900" y="156" font-family="PingFang SC, sans-serif" font-size="17" font-weight="800" fill="#f8fafc">Gotchas 才值钱</text>
    <text x="900" y="190" font-family="PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">起手薄，随失败逐条加</text>
    <text x="900" y="212" font-family="PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">Append-mostly 维护</text>
    <text x="900" y="240" font-family="PingFang SC, sans-serif" font-size="12" font-style="italic" fill="#94a3b8">正常流程模型会，特殊例外它不会</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="280" width="360" height="150" rx="18" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <circle cx="100" cy="318" r="22" fill="url(#gold)"/>
    <text x="100" y="326" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="20" font-weight="900" fill="#0b1220">4</text>
    <text x="140" y="326" font-family="PingFang SC, sans-serif" font-size="17" font-weight="800" fill="#f8fafc">警惕"远距离副作用"</text>
    <text x="140" y="360" font-family="PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">新增一个 Skill 可能让没动过的</text>
    <text x="140" y="382" font-family="PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">现有 Skill 突然失效</text>
    <text x="140" y="410" font-family="PingFang SC, sans-serif" font-size="12" font-style="italic" fill="#94a3b8">这正是要跑加载/读取 eval 的原因</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="440" y="280" width="360" height="150" rx="18" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <circle cx="480" cy="318" r="22" fill="url(#gold)"/>
    <text x="480" y="326" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="20" font-weight="900" fill="#0b1220">5</text>
    <text x="520" y="326" font-family="PingFang SC, sans-serif" font-size="17" font-weight="800" fill="#f8fafc">Less is more（不必凡事都 Skill）</text>
    <text x="520" y="360" font-family="PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">模型已经会的 → 写成文档</text>
    <text x="520" y="382" font-family="PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">系统提示能装下的 → 直接放</text>
    <text x="520" y="410" font-family="PingFang SC, sans-serif" font-size="12" font-style="italic" fill="#94a3b8">变化太快的 → 别做 Skill，做工具</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="280" width="320" height="150" rx="18" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="860" cy="318" r="22" fill="url(#gold)"/>
    <text x="860" y="326" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="20" font-weight="900" fill="#0b1220">6</text>
    <text x="900" y="326" font-family="PingFang SC, sans-serif" font-size="17" font-weight="800" fill="#f8fafc">Skill 是复利</text>
    <text x="900" y="360" font-family="PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">把 postmortem / 周报 / PR 评审</text>
    <text x="900" y="382" font-family="PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">这种高频自动化为 Skill</text>
    <text x="900" y="410" font-family="PingFang SC, sans-serif" font-size="12" font-style="italic" fill="#94a3b8">买回的时间再投入下一个 Skill</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="240" y="450" width="720" height="120" rx="20" fill="#1e293b" stroke="#fbbf24" stroke-width="3"/>
    <circle cx="290" cy="510" r="26" fill="url(#gold)"/>
    <text x="290" y="520" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="22" font-weight="900" fill="#0b1220">7</text>
    <text x="335" y="500" font-family="PingFang SC, sans-serif" font-size="19" font-weight="800" fill="#fbbf24">不要让模型自己写 Skill</text>
    <text x="335" y="528" font-family="PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">"Self-generated Skills provide no benefit on average"</text>
    <text x="335" y="552" font-family="PingFang SC, sans-serif" font-size="13" fill="#94a3b8">模型能消费程序性知识，却不能可靠地"造出"它</text>
  </g>

  <text x="600" y="618" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-style="italic" fill="#94a3b8">"我没把这封信写短，只是因为我没时间把它写短。" —— Pascal, 1657</text>
</svg>
