<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f8fc"/>
      <stop offset="1" stop-color="#edf1f8"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#dde3ee" stroke-width="0.5"/>
    </pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.16"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr3" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#grid)" opacity="0.5"/>

  <text x="600" y="56" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2937">Agent 输出格式选型决策树</text>
  <text x="600" y="86" text-anchor="middle" font-size="14" fill="#6b7280">不要纠结"哪个更好" — 问"信息形状是什么"</text>

  <!-- root -->
  <g filter="url(#soft)">
    <rect x="470" y="120" width="260" height="80" rx="14" fill="#fff" stroke="#1f2937" stroke-width="2"/>
  </g>
  <text x="600" y="155" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">这次输出的信息形状是什么？</text>
  <text x="600" y="180" text-anchor="middle" font-size="12" fill="#6b7280">先回答这一个问题</text>

  <!-- three branches -->
  <path d="M520 200 L220 250" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arr3)"/>
  <path d="M600 200 L600 250" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arr3)"/>
  <path d="M680 200 L980 250" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arr3)"/>

  <!-- LEFT: linear -->
  <g filter="url(#soft)">
    <rect x="80" y="260" width="280" height="90" rx="12" fill="#fef3c7" stroke="#d97706"/>
  </g>
  <text x="220" y="292" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">A · 线性叙事 / 阅读型</text>
  <text x="220" y="314" text-anchor="middle" font-size="11" fill="#92400e">解释、说明、总结、文档</text>
  <text x="220" y="332" text-anchor="middle" font-size="11" fill="#92400e">"读者按段落顺序消费即可"</text>

  <g filter="url(#soft)">
    <rect x="80" y="380" width="280" height="200" rx="14" fill="#fff" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <text x="220" y="415" text-anchor="middle" font-size="18" font-weight="700" fill="#7c2d12">→ 用 Markdown</text>
  <line x1="100" y1="430" x2="340" y2="430" stroke="#fde68a"/>
  <text x="100" y="455" font-size="11" fill="#374151">✓ 段落、列表、代码块</text>
  <text x="100" y="478" font-size="11" fill="#374151">✓ 简单图表（mermaid 文档）</text>
  <text x="100" y="501" font-size="11" fill="#374151">✓ 流式输出友好</text>
  <text x="100" y="524" font-size="11" fill="#374151">✓ 渲染器无依赖</text>
  <text x="100" y="555" font-size="11" font-style="italic" fill="#7c2d12">不要为了"看起来高级"硬切 HTML</text>

  <!-- MIDDLE: spatial -->
  <g filter="url(#soft)">
    <rect x="460" y="260" width="280" height="90" rx="12" fill="#dbeafe" stroke="#3b82f6"/>
  </g>
  <text x="600" y="292" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">B · 空间信息 / 比较型</text>
  <text x="600" y="314" text-anchor="middle" font-size="11" fill="#1e40af">对比、Diff、流程、状态机、设计</text>
  <text x="600" y="332" text-anchor="middle" font-size="11" fill="#1e40af">"读者要在二维上扫视"</text>

  <g filter="url(#soft)">
    <rect x="460" y="380" width="280" height="200" rx="14" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <text x="600" y="415" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">→ 用 HTML 工件</text>
  <line x1="480" y1="430" x2="720" y2="430" stroke="#dbeafe"/>
  <text x="480" y="455" font-size="11" fill="#374151">✓ 卡片化布局 / 表格 / 时间线</text>
  <text x="480" y="478" font-size="11" fill="#374151">✓ 内联 SVG 画 Diff、调用图</text>
  <text x="480" y="501" font-size="11" fill="#374151">✓ 微交互：tab、悬浮、折叠</text>
  <text x="480" y="524" font-size="11" fill="#374151">✓ 颜色语义：绿/红/蓝/橙</text>
  <text x="480" y="555" font-size="11" font-style="italic" fill="#1e3a8a">关键节点必须有图，不靠"想象"</text>

  <!-- RIGHT: hard-to-describe -->
  <g filter="url(#soft)">
    <rect x="840" y="260" width="280" height="90" rx="12" fill="#dcfce7" stroke="#16a34a"/>
  </g>
  <text x="980" y="292" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">C · 难以描述 / 操作型</text>
  <text x="980" y="314" text-anchor="middle" font-size="11" fill="#166534">配置、分诊、调参、动效</text>
  <text x="980" y="332" text-anchor="middle" font-size="11" fill="#166534">"用文字说不清，用手才行"</text>

  <g filter="url(#soft)">
    <rect x="840" y="380" width="280" height="200" rx="14" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  </g>
  <text x="980" y="415" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">→ 一次性编辑器</text>
  <line x1="860" y1="430" x2="1100" y2="430" stroke="#bbf7d0"/>
  <text x="860" y="455" font-size="11" fill="#374151">✓ 看板 / 滑块 / 开关 / 拖拽</text>
  <text x="860" y="478" font-size="11" fill="#374151">✓ 实时预览（即改即看）</text>
  <text x="860" y="501" font-size="11" fill="#374151">✓ 必须以 ⤓ 导出按钮收尾</text>
  <text x="860" y="524" font-size="11" fill="#374151">✓ 把 UI 操作回灌为下一轮 prompt</text>
  <text x="860" y="555" font-size="11" font-style="italic" fill="#14532d">没有导出按钮 = 只是好看的玩具</text>

  <!-- bottom rule -->
  <g filter="url(#soft)">
    <rect x="180" y="610" width="840" height="60" rx="14" fill="#0f172a"/>
  </g>
  <text x="600" y="640" text-anchor="middle" font-size="14" font-weight="700" fill="#f8fafc">一句话原则</text>
  <text x="600" y="660" text-anchor="middle" font-size="13" fill="#cbd5e1">
    线性 → Markdown ・ 空间 → HTML 工件 ・ 难以描述 → 一次性编辑器 + 导出
  </text>
</svg>
