<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-label="Human-in-the-loop tightened by HTML editor + export">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ed"/>
      <stop offset="55%" stop-color="#f7f7fb"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>
    <linearGradient id="agentBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="uiBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="humanBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <pattern id="grid3" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#fde68a" stroke-width="1" opacity="0.4"/>
    </pattern>
    <marker id="arrowDown" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowBack" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg3)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid3)" opacity="0.5"/>

  <text x="600" y="56" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a">"用一次性 UI + Export 按钮，把人留在回路里，并且让回路收紧"</text>
  <text x="600" y="86" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="500" fill="#475569">以 Ticket triage / Prompt tuner 为例：HTML 编辑器是 Agent 与人的最短共同语言</text>

  <!-- 左：Agent 输出 -->
  <rect x="60" y="130" width="320" height="160" rx="20" fill="url(#agentBox)" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow3)"/>
  <text x="220" y="166" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="800" fill="#1e3a8a">① Agent 生成一个 HTML 编辑器</text>
  <rect x="80" y="186" width="280" height="86" rx="10" fill="white"/>
  <text x="92" y="208" font-family="ui-monospace, monospace" font-size="11" fill="#1e3a8a">&lt;board&gt;</text>
  <text x="100" y="226" font-family="ui-monospace, monospace" font-size="11" fill="#475569">  &lt;col&gt;Now&lt;/col&gt;  &lt;col&gt;Next&lt;/col&gt;</text>
  <text x="100" y="244" font-family="ui-monospace, monospace" font-size="11" fill="#475569">  &lt;col&gt;Later&lt;/col&gt; &lt;col&gt;Cut&lt;/col&gt;</text>
  <text x="100" y="262" font-family="ui-monospace, monospace" font-size="11" fill="#1e3a8a">&lt;/board&gt; · 30 张 ticket · drag-drop</text>

  <!-- 中间：UI -->
  <rect x="430" y="130" width="340" height="400" rx="20" fill="url(#uiBox)" stroke="#d97706" stroke-width="2.5" filter="url(#shadow3)"/>
  <text x="600" y="166" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="800" fill="#78350f">② 浏览器里就是一个看板</text>

  <!-- 4 列 -->
  <g font-family="PingFang SC, sans-serif">
    <rect x="445" y="186" width="76" height="320" rx="10" fill="white" filter="url(#softShadow3)"/>
    <text x="483" y="206" text-anchor="middle" font-size="11" font-weight="800" fill="#0f172a">Now</text>
    <rect x="453" y="218" width="60" height="22" rx="5" fill="#dcfce7"/>
    <text x="483" y="234" text-anchor="middle" font-size="9" fill="#166534">A-1</text>
    <rect x="453" y="246" width="60" height="22" rx="5" fill="#dcfce7"/>
    <text x="483" y="262" text-anchor="middle" font-size="9" fill="#166534">A-2</text>
    <rect x="453" y="274" width="60" height="22" rx="5" fill="#dcfce7"/>
    <text x="483" y="290" text-anchor="middle" font-size="9" fill="#166534">A-3</text>
    <rect x="453" y="302" width="60" height="22" rx="5" fill="#dcfce7"/>
    <text x="483" y="318" text-anchor="middle" font-size="9" fill="#166534">A-4</text>

    <rect x="528" y="186" width="76" height="320" rx="10" fill="white" filter="url(#softShadow3)"/>
    <text x="566" y="206" text-anchor="middle" font-size="11" font-weight="800" fill="#0f172a">Next</text>
    <rect x="536" y="218" width="60" height="22" rx="5" fill="#dbeafe"/>
    <text x="566" y="234" text-anchor="middle" font-size="9" fill="#1e3a8a">B-1</text>
    <rect x="536" y="246" width="60" height="22" rx="5" fill="#dbeafe"/>
    <text x="566" y="262" text-anchor="middle" font-size="9" fill="#1e3a8a">B-2</text>
    <rect x="536" y="274" width="60" height="22" rx="5" fill="#dbeafe"/>
    <text x="566" y="290" text-anchor="middle" font-size="9" fill="#1e3a8a">B-3</text>

    <rect x="611" y="186" width="76" height="320" rx="10" fill="white" filter="url(#softShadow3)"/>
    <text x="649" y="206" text-anchor="middle" font-size="11" font-weight="800" fill="#0f172a">Later</text>
    <rect x="619" y="218" width="60" height="22" rx="5" fill="#fef3c7"/>
    <text x="649" y="234" text-anchor="middle" font-size="9" fill="#92400e">C-1</text>
    <rect x="619" y="246" width="60" height="22" rx="5" fill="#fef3c7"/>
    <text x="649" y="262" text-anchor="middle" font-size="9" fill="#92400e">C-2</text>

    <rect x="694" y="186" width="76" height="320" rx="10" fill="white" filter="url(#softShadow3)"/>
    <text x="732" y="206" text-anchor="middle" font-size="11" font-weight="800" fill="#0f172a">Cut</text>
    <rect x="702" y="218" width="60" height="22" rx="5" fill="#fee2e2"/>
    <text x="732" y="234" text-anchor="middle" font-size="9" fill="#b91c1c">D-1</text>
  </g>

  <!-- export 按钮 -->
  <rect x="500" y="455" width="200" height="50" rx="25" fill="#16a34a" filter="url(#softShadow3)"/>
  <text x="600" y="486" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" font-weight="800" fill="white">↓ Export Markdown</text>

  <!-- 右：Human 行动 -->
  <rect x="820" y="130" width="320" height="160" rx="20" fill="url(#humanBox)" stroke="#16a34a" stroke-width="2.5" filter="url(#shadow3)"/>
  <text x="980" y="166" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="800" fill="#14532d">③ 人拖一拖、点导出</text>
  <text x="980" y="200" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" fill="#14532d">不写一行注解</text>
  <text x="980" y="222" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" fill="#14532d">却把"我心里的优先级"</text>
  <text x="980" y="244" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" fill="#14532d">完整、结构化地告诉了 Agent</text>
  <rect x="850" y="258" width="260" height="22" rx="11" fill="white"/>
  <text x="980" y="274" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#14532d">priorities.md  · 30 行 · 已粘贴回 chat</text>

  <!-- 箭头：Agent -> UI -->
  <line x1="380" y1="210" x2="430" y2="210" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowDown)"/>
  <text x="405" y="200" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" font-weight="800" fill="#2563eb">render</text>

  <!-- 箭头：UI -> Human -->
  <line x1="770" y1="210" x2="820" y2="210" stroke="#d97706" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowDown)"/>
  <text x="795" y="200" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" font-weight="800" fill="#d97706">操作</text>

  <!-- 大回路箭头 -->
  <path d="M 980 290 Q 980 580 220 580 Q 220 290 220 290" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrowBack)"/>
  <rect x="500" y="560" width="200" height="40" rx="20" fill="#16a34a"/>
  <text x="600" y="586" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="white">④ 文本回喂 Agent · 闭环</text>

  <!-- 底部对照 -->
  <rect x="60" y="600" width="320" height="44" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="220" y="618" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="800" fill="#b91c1c">如果只有 Markdown：</text>
  <text x="220" y="636" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#b91c1c">让人写"30 张票的优先级"清单 · 高摩擦 · 易遗漏</text>

  <rect x="820" y="600" width="320" height="44" rx="12" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="980" y="618" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="800" fill="#166534">用 HTML 一次性 UI：</text>
  <text x="980" y="636" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#166534">人 30 秒拖完 · Agent 拿到结构化结果</text>
</svg>
