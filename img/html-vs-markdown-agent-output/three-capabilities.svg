<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="9 scenarios mapped to 3 capabilities">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="55%" stop-color="#f7f7fb"/>
      <stop offset="100%" stop-color="#fff8ed"/>
    </linearGradient>
    <linearGradient id="capA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dbeafe"/><stop offset="100%" stop-color="#bfdbfe"/></linearGradient>
    <linearGradient id="capB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#bbf7d0"/></linearGradient>
    <linearGradient id="capC" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#fcd34d"/></linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <pattern id="grid2" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg2)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid2)" opacity="0.5"/>

  <text x="600" y="56" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a">9 个场景，归并到三类底层能力——HTML 不是排版好看，而是承载了 Markdown 装不下的信息形态</text>

  <!-- ============ 列 1：空间排列 ============ -->
  <rect x="60" y="110" width="360" height="540" rx="22" fill="url(#capA)" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow2)"/>
  <rect x="80" y="128" width="120" height="32" rx="16" fill="#2563eb"/>
  <text x="140" y="150" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="white">能力 A</text>
  <text x="220" y="151" font-family="PingFang SC, sans-serif" font-size="16" font-weight="800" fill="#1e3a8a">空间排列</text>
  <text x="80" y="184" font-family="PingFang SC, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">让信息"并排可指"，而不是顺序读三堵墙</text>

  <!-- 场景卡 -->
  <rect x="80" y="205" width="320" height="68" rx="12" fill="white" filter="url(#softShadow2)"/>
  <text x="98" y="227" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#0f172a">01 · 探索与规划</text>
  <text x="98" y="248" font-family="PingFang SC, sans-serif" font-size="12" fill="#475569">三方案并排对比 · 多套布局实时渲染</text>
  <text x="98" y="265" font-family="PingFang SC, sans-serif" font-size="11" font-style="italic" fill="#64748b">demo: Three code approaches</text>

  <rect x="80" y="285" width="320" height="68" rx="12" fill="white" filter="url(#softShadow2)"/>
  <text x="98" y="307" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#0f172a">02 · 代码审查</text>
  <text x="98" y="328" font-family="PingFang SC, sans-serif" font-size="12" fill="#475569">diff 不被压扁 · 调用图保留拓扑</text>
  <text x="98" y="345" font-family="PingFang SC, sans-serif" font-size="11" font-style="italic" fill="#64748b">demo: Annotated PR · Module map</text>

  <rect x="80" y="365" width="320" height="68" rx="12" fill="white" filter="url(#softShadow2)"/>
  <text x="98" y="387" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#0f172a">05 · 插图与图表</text>
  <text x="98" y="408" font-family="PingFang SC, sans-serif" font-size="12" fill="#475569">inline SVG · "Agent 拿到一支真笔"</text>
  <text x="98" y="425" font-family="PingFang SC, sans-serif" font-size="11" font-style="italic" fill="#64748b">demo: Annotated flowchart</text>

  <rect x="80" y="445" width="320" height="68" rx="12" fill="white" filter="url(#softShadow2)"/>
  <text x="98" y="467" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#0f172a">08 · 报告</text>
  <text x="98" y="488" font-family="PingFang SC, sans-serif" font-size="12" fill="#475569">分钟级时间轴 · 色块状态</text>
  <text x="98" y="505" font-family="PingFang SC, sans-serif" font-size="11" font-style="italic" fill="#64748b">demo: Incident timeline</text>

  <rect x="80" y="540" width="320" height="90" rx="14" fill="#1e3a8a"/>
  <text x="240" y="568" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="800" fill="#dbeafe">关键判断</text>
  <text x="240" y="592" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="white">"Diffs and call-graphs are</text>
  <text x="240" y="612" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="white">spatial information"</text>

  <!-- ============ 列 2：真实渲染 ============ -->
  <rect x="440" y="110" width="320" height="540" rx="22" fill="url(#capB)" stroke="#16a34a" stroke-width="2.5" filter="url(#shadow2)"/>
  <rect x="460" y="128" width="120" height="32" rx="16" fill="#16a34a"/>
  <text x="520" y="150" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="white">能力 B</text>
  <text x="600" y="151" font-family="PingFang SC, sans-serif" font-size="16" font-weight="800" fill="#14532d">真实渲染</text>
  <text x="460" y="184" font-family="PingFang SC, sans-serif" font-size="13" font-weight="600" fill="#14532d">动效、交互、设计 token 不能"描述"，要"摸"</text>

  <rect x="460" y="205" width="280" height="68" rx="12" fill="white" filter="url(#softShadow2)"/>
  <text x="478" y="227" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#0f172a">03 · 设计</text>
  <text x="478" y="248" font-family="PingFang SC, sans-serif" font-size="12" fill="#475569">token 渲染色板 · 组件全状态陈列</text>
  <text x="478" y="265" font-family="PingFang SC, sans-serif" font-size="11" font-style="italic" fill="#64748b">demo: Living design system</text>

  <rect x="460" y="285" width="280" height="68" rx="12" fill="white" filter="url(#softShadow2)"/>
  <text x="478" y="307" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#0f172a">04 · 原型</text>
  <text x="478" y="328" font-family="PingFang SC, sans-serif" font-size="12" fill="#475569">动效 sandbox · 4 屏可点击跳转</text>
  <text x="478" y="345" font-family="PingFang SC, sans-serif" font-size="11" font-style="italic" fill="#64748b">"5 秒内 feel 到对不对"</text>

  <rect x="460" y="365" width="280" height="68" rx="12" fill="white" filter="url(#softShadow2)"/>
  <text x="478" y="387" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#0f172a">06 · 幻灯片</text>
  <text x="478" y="408" font-family="PingFang SC, sans-serif" font-size="12" fill="#475569">&lt;section&gt; + 20 行 JS = 一份 deck</text>
  <text x="478" y="425" font-family="PingFang SC, sans-serif" font-size="11" font-style="italic" fill="#64748b">demo: Arrow-key slide deck</text>

  <rect x="460" y="445" width="280" height="68" rx="12" fill="white" filter="url(#softShadow2)"/>
  <text x="478" y="467" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#0f172a">07 · 研究与学习</text>
  <text x="478" y="488" font-family="PingFang SC, sans-serif" font-size="12" fill="#475569">可折叠 · Tab · 交互式概念环</text>
  <text x="478" y="505" font-family="PingFang SC, sans-serif" font-size="11" font-style="italic" fill="#64748b">demo: 一致性哈希 explainer</text>

  <rect x="460" y="540" width="280" height="90" rx="14" fill="#14532d"/>
  <text x="600" y="568" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="800" fill="#dcfce7">关键判断</text>
  <text x="600" y="592" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="white">"Motion and interaction</text>
  <text x="600" y="612" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="white">can't be described, only felt"</text>

  <!-- ============ 列 3：人机回路 ============ -->
  <rect x="780" y="110" width="360" height="540" rx="22" fill="url(#capC)" stroke="#d97706" stroke-width="2.5" filter="url(#shadow2)"/>
  <rect x="800" y="128" width="120" height="32" rx="16" fill="#d97706"/>
  <text x="860" y="150" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="white">能力 C</text>
  <text x="940" y="151" font-family="PingFang SC, sans-serif" font-size="16" font-weight="800" fill="#78350f">人机回路</text>
  <text x="800" y="184" font-family="PingFang SC, sans-serif" font-size="13" font-weight="600" fill="#78350f">把 Agent 输出变成可操作 UI，再 Export 回喂</text>

  <rect x="800" y="205" width="320" height="100" rx="12" fill="white" filter="url(#softShadow2)"/>
  <text x="818" y="227" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#0f172a">09 · 自定义编辑界面</text>
  <text x="818" y="248" font-family="PingFang SC, sans-serif" font-size="12" fill="#475569">Ticket triage（30 个卡可拖拽）</text>
  <text x="818" y="266" font-family="PingFang SC, sans-serif" font-size="12" fill="#475569">Feature flag editor（含依赖告警）</text>
  <text x="818" y="284" font-family="PingFang SC, sans-serif" font-size="12" fill="#475569">Prompt tuner（3 样例实时预览）</text>
  <text x="818" y="300" font-family="PingFang SC, sans-serif" font-size="11" font-style="italic" fill="#64748b">三个 demo 都以 Export 按钮收尾</text>

  <!-- loop 图 -->
  <text x="960" y="335" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="800" fill="#78350f">回路收紧的关键</text>

  <circle cx="850" cy="395" r="38" fill="#fff7ed" stroke="#d97706" stroke-width="2"/>
  <text x="850" y="392" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" font-weight="800" fill="#78350f">Agent</text>
  <text x="850" y="408" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#92400e">生成 UI</text>

  <circle cx="1070" cy="395" r="38" fill="#fff7ed" stroke="#d97706" stroke-width="2"/>
  <text x="1070" y="392" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" font-weight="800" fill="#78350f">Human</text>
  <text x="1070" y="408" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#92400e">操作 / 导出</text>

  <path d="M 890 380 Q 960 350 1030 380" stroke="#d97706" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>
  <path d="M 1030 410 Q 960 440 890 410" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>

  <defs>
    <marker id="arrowOrange" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#d97706"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <text x="960" y="370" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" font-weight="700" fill="#d97706">UI</text>
  <text x="960" y="445" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" font-weight="700" fill="#16a34a">Export 文本</text>

  <rect x="800" y="470" width="320" height="60" rx="12" fill="white" filter="url(#softShadow2)"/>
  <text x="960" y="495" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" font-weight="800" fill="#0f172a">"You stay in the loop;</text>
  <text x="960" y="515" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" font-weight="800" fill="#0f172a">the loop gets tighter."</text>

  <rect x="800" y="540" width="320" height="90" rx="14" fill="#78350f"/>
  <text x="960" y="568" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="800" fill="#fde68a">关键判断</text>
  <text x="960" y="592" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="white">一次性 UI + Export 按钮</text>
  <text x="960" y="612" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="white">是把模糊意图说清的最短路径</text>

  <text x="600" y="676" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="500" fill="#64748b">看图法：场景之所以受益于 HTML，是因为它的"信息形态"在 Markdown 里被压扁了</text>
</svg>
