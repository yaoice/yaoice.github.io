<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eef2f8"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#dde3ee" stroke-width="0.5"/>
    </pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.16"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="loopBlue" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#bfdbfe"/></linearGradient>
    <linearGradient id="loopOrange" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fed7aa"/><stop offset="1" stop-color="#fdba74"/></linearGradient>
    <linearGradient id="loopGreen" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#bbf7d0"/><stop offset="1" stop-color="#86efac"/></linearGradient>
    <marker id="ar" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>
  <rect width="1200" height="640" fill="url(#grid)" opacity="0.5"/>

  <text x="600" y="56" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2937">为什么"导出按钮"是 HTML 工件的灵魂</text>
  <text x="600" y="88" text-anchor="middle" font-size="14" fill="#6b7280">把空间决策回灌为 prompt — 反馈循环从"分钟级"压缩到"秒级"</text>

  <!-- big circular flow -->
  <g>
    <!-- 1 Agent renders -->
    <g filter="url(#soft)">
      <rect x="80" y="160" width="280" height="160" rx="18" fill="url(#loopBlue)" stroke="#3b82f6" stroke-width="1.5"/>
    </g>
    <text x="220" y="200" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">① Agent 输出 HTML 工件</text>
    <text x="220" y="226" text-anchor="middle" font-size="12" fill="#1e40af">把信息摊成空间布局</text>
    <text x="220" y="246" text-anchor="middle" font-size="12" fill="#1e40af">卡片 · 表格 · 时间线 · SVG</text>
    <text x="220" y="268" text-anchor="middle" font-size="12" fill="#1e40af">可点 · 可切 · 可拖</text>
    <text x="220" y="296" text-anchor="middle" font-size="11" fill="#1e3a8a" font-style="italic">"同一份信息，5 种视角"</text>

    <!-- 2 Human decides -->
    <g filter="url(#soft)">
      <rect x="460" y="160" width="280" height="160" rx="18" fill="url(#loopOrange)" stroke="#f59e0b" stroke-width="1.5"/>
    </g>
    <text x="600" y="200" text-anchor="middle" font-size="16" font-weight="700" fill="#7c2d12">② 用户在空间中决策</text>
    <text x="600" y="226" text-anchor="middle" font-size="12" fill="#92400e">扫一眼对比 → 锁定方向</text>
    <text x="600" y="246" text-anchor="middle" font-size="12" fill="#92400e">点击节点 → 看细节</text>
    <text x="600" y="266" text-anchor="middle" font-size="12" fill="#92400e">拖动卡片 → 表达诉求</text>
    <text x="600" y="296" text-anchor="middle" font-size="11" fill="#7c2d12" font-style="italic">"指着说话，不是描述"</text>

    <!-- 3 Export -->
    <g filter="url(#soft)">
      <rect x="840" y="160" width="280" height="160" rx="18" fill="url(#loopGreen)" stroke="#16a34a" stroke-width="2"/>
    </g>
    <text x="980" y="200" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">③ Export · 回灌 prompt</text>
    <text x="980" y="226" text-anchor="middle" font-size="12" fill="#166534">把决策序列化为 Markdown</text>
    <text x="980" y="246" text-anchor="middle" font-size="12" fill="#166534">/ JSON / Diff / Patch</text>
    <text x="980" y="266" text-anchor="middle" font-size="12" fill="#166534">直接喂给下一轮 Agent</text>
    <text x="980" y="296" text-anchor="middle" font-size="11" fill="#14532d" font-style="italic">"循环变得更紧"</text>

    <!-- top arrows -->
    <path d="M360 240 L460 240" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#ar)" marker-start=""/>
    <path d="M740 240 L840 240" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#ar)"/>

    <!-- bottom return arrow -->
    <path d="M980 320 Q 980 460 600 460 Q 220 460 220 320" stroke="#22c55e" stroke-width="3" fill="none" stroke-dasharray="6 4" marker-end="url(#ar)"/>
    <text x="600" y="450" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">回到 ① · 下一轮迭代（秒级）</text>
  </g>

  <!-- compare panel: with vs without export -->
  <g filter="url(#soft)">
    <rect x="80" y="500" width="500" height="110" rx="14" fill="#fff" stroke="#fbbf24"/>
  </g>
  <text x="100" y="528" font-size="14" font-weight="700" fill="#92400e">没有导出按钮</text>
  <text x="100" y="552" font-size="12" fill="#6b7280">用户看到工件 → 在脑子里转化 → 重新打字描述给 Agent</text>
  <text x="100" y="572" font-size="12" fill="#6b7280">→ Agent 猜歪 → 再来一轮 …</text>
  <text x="100" y="594" font-size="13" font-weight="700" fill="#b45309">⏱ 反馈循环：分钟级 · 信息有损</text>

  <g filter="url(#soft)">
    <rect x="620" y="500" width="500" height="110" rx="14" fill="#fff" stroke="#22c55e"/>
  </g>
  <text x="640" y="528" font-size="14" font-weight="700" fill="#14532d">有导出按钮</text>
  <text x="640" y="552" font-size="12" fill="#6b7280">用户在工件里直接拖 / 点 / 切 → 导出 → 一键回到 prompt</text>
  <text x="640" y="572" font-size="12" fill="#6b7280">→ Agent 拿到结构化输入 → 立刻续作</text>
  <text x="640" y="594" font-size="13" font-weight="700" fill="#15803d">⏱ 反馈循环：秒级 · 信息无损</text>
</svg>
