<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f7fb"/>
      <stop offset="1" stop-color="#eef1f8"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#dbe1ec" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="mdCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff5f0"/>
      <stop offset="1" stop-color="#fde4d4"/>
    </linearGradient>
    <linearGradient id="htmlCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf6ee"/>
      <stop offset="1" stop-color="#cbecd6"/>
    </linearGradient>
    <linearGradient id="arrowG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <rect width="1200" height="680" fill="url(#grid)" opacity="0.5"/>

  <!-- title -->
  <text x="600" y="68" text-anchor="middle" font-size="30" font-weight="700" fill="#1f2937">HTML 让 Agent 输出从「文字墙」变成「可操作工件」</text>
  <text x="600" y="100" text-anchor="middle" font-size="16" fill="#6b7280">同一份信息，两种呈现，反馈循环差一个数量级</text>

  <!-- LEFT: Markdown wall -->
  <g filter="url(#soft)">
    <rect x="70" y="140" width="490" height="460" rx="20" fill="url(#mdCard)" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="100" y="180" font-size="20" font-weight="700" fill="#9a3412">Markdown · 文字墙</text>
  <circle cx="525" cy="170" r="14" fill="#fee2e2" stroke="#ef4444"/>
  <text x="525" y="175" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">×</text>

  <!-- fake markdown lines -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#7c2d12">
    <text x="100" y="220"># 三种实现方案对比</text>
    <text x="100" y="244">方案 A 使用回调，优点是…缺点是…</text>
    <text x="100" y="264">方案 B 使用 Promise，优点是…缺点是…</text>
    <text x="100" y="284">方案 C 使用 async/await，优点是…</text>
    <text x="100" y="312">## 评审意见</text>
    <text x="100" y="336">第 12 行可能有竞态，建议加锁；</text>
    <text x="100" y="356">第 27 行的错误处理被吞掉；</text>
    <text x="100" y="376">第 41 行命名不一致，建议改为…；</text>
    <text x="100" y="404">## 流程</text>
    <text x="100" y="428">用户 → API → 鉴权 → 限流 → 业务 → DB</text>
    <text x="100" y="456">## 颜色 token</text>
    <text x="100" y="480">primary: #2563eb · success: #16a34a</text>
    <text x="100" y="500">danger : #dc2626 · warning: #d97706</text>
    <text x="100" y="528">## 动效</text>
    <text x="100" y="552">"按钮按下时有一个轻微的弹性回弹，</text>
    <text x="100" y="572">缓动曲线类似 ease-out-back…"</text>
  </g>
  <text x="315" y="595" text-anchor="middle" font-size="12" fill="#9a3412" font-style="italic">读者要把这堵墙在脑子里渲染成画面</text>

  <!-- middle arrow -->
  <line x1="585" y1="370" x2="640" y2="370" stroke="url(#arrowG)" stroke-width="6" marker-end="url(#arr)"/>

  <!-- RIGHT: HTML artifact -->
  <g filter="url(#soft)">
    <rect x="660" y="140" width="490" height="460" rx="20" fill="url(#htmlCard)" stroke="#16a34a" stroke-width="1.5"/>
  </g>
  <text x="690" y="180" font-size="20" font-weight="700" fill="#166534">HTML · 可操作工件</text>
  <circle cx="1115" cy="170" r="14" fill="#dcfce7" stroke="#16a34a"/>
  <text x="1115" y="175" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">✓</text>

  <!-- mini cards inside HTML side -->
  <!-- 3 columns approach compare -->
  <g>
    <rect x="690" y="200" width="135" height="86" rx="10" fill="#ffffff" stroke="#86efac"/>
    <text x="757" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">方案 A · 回调</text>
    <rect x="700" y="232" width="115" height="6" rx="3" fill="#bbf7d0"/>
    <rect x="700" y="244" width="95" height="6" rx="3" fill="#bbf7d0"/>
    <rect x="700" y="256" width="105" height="6" rx="3" fill="#bbf7d0"/>
    <text x="757" y="278" text-anchor="middle" font-size="10" fill="#15803d">★★☆</text>

    <rect x="838" y="200" width="135" height="86" rx="10" fill="#ffffff" stroke="#86efac"/>
    <text x="905" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">方案 B · Promise</text>
    <rect x="848" y="232" width="115" height="6" rx="3" fill="#bbf7d0"/>
    <rect x="848" y="244" width="100" height="6" rx="3" fill="#bbf7d0"/>
    <rect x="848" y="256" width="115" height="6" rx="3" fill="#bbf7d0"/>
    <text x="905" y="278" text-anchor="middle" font-size="10" fill="#15803d">★★★</text>

    <rect x="986" y="200" width="135" height="86" rx="10" fill="#ffffff" stroke="#86efac"/>
    <text x="1053" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">方案 C · async</text>
    <rect x="996" y="232" width="115" height="6" rx="3" fill="#bbf7d0"/>
    <rect x="996" y="244" width="105" height="6" rx="3" fill="#bbf7d0"/>
    <rect x="996" y="256" width="120" height="6" rx="3" fill="#bbf7d0"/>
    <text x="1053" y="278" text-anchor="middle" font-size="10" fill="#15803d">★★★★</text>
  </g>

  <!-- diff with sidenote -->
  <g>
    <rect x="690" y="306" width="290" height="138" rx="10" fill="#ffffff" stroke="#86efac"/>
    <text x="705" y="328" font-size="12" font-weight="700" fill="#166534">PR Diff · 边注</text>
    <g font-family="ui-monospace, monospace" font-size="11">
      <rect x="705" y="338" width="270" height="16" fill="#fee2e2"/>
      <text x="710" y="350" fill="#b91c1c">- if (data) { ... }</text>
      <rect x="705" y="356" width="270" height="16" fill="#dcfce7"/>
      <text x="710" y="368" fill="#15803d">+ if (data?.id) { ... }</text>
      <rect x="705" y="374" width="270" height="16" fill="#fef3c7"/>
      <text x="710" y="386" fill="#a16207">~ lock.acquire(); // race</text>
      <rect x="705" y="392" width="270" height="16" fill="#dcfce7"/>
      <text x="710" y="404" fill="#15803d">+ try / finally release</text>
      <rect x="705" y="410" width="270" height="16" fill="#dcfce7"/>
      <text x="710" y="422" fill="#15803d">+ logger.error(err);</text>
    </g>
    <!-- side annotations -->
    <line x1="978" y1="346" x2="998" y2="346" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="998" y="338" width="120" height="22" rx="6" fill="#fff7ed" stroke="#fdba74"/>
    <text x="1058" y="353" text-anchor="middle" font-size="10" fill="#9a3412">空指针风险</text>
    <line x1="978" y1="383" x2="998" y2="383" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="998" y="374" width="120" height="22" rx="6" fill="#fef2f2" stroke="#fca5a5"/>
    <text x="1058" y="389" text-anchor="middle" font-size="10" fill="#b91c1c">竞态 · 高严重度</text>
    <line x1="978" y1="418" x2="998" y2="418" stroke="#16a34a" stroke-width="1.5"/>
    <rect x="998" y="410" width="120" height="22" rx="6" fill="#f0fdf4" stroke="#86efac"/>
    <text x="1058" y="425" text-anchor="middle" font-size="10" fill="#166534">补全错误日志</text>
  </g>

  <!-- color tokens -->
  <g>
    <text x="705" y="468" font-size="12" font-weight="700" fill="#166534">设计 token · 可点击复制</text>
    <rect x="705" y="478" width="56" height="42" rx="8" fill="#2563eb"/>
    <text x="733" y="503" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">primary</text>
    <rect x="769" y="478" width="56" height="42" rx="8" fill="#16a34a"/>
    <text x="797" y="503" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">success</text>
    <rect x="833" y="478" width="56" height="42" rx="8" fill="#dc2626"/>
    <text x="861" y="503" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">danger</text>
    <rect x="897" y="478" width="56" height="42" rx="8" fill="#d97706"/>
    <text x="925" y="503" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">warning</text>
    <rect x="961" y="478" width="56" height="42" rx="8" fill="#7c3aed"/>
    <text x="989" y="503" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">brand</text>
    <rect x="1025" y="478" width="56" height="42" rx="8" fill="#0ea5e9"/>
    <text x="1053" y="503" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">info</text>
  </g>

  <!-- export button -->
  <g>
    <rect x="705" y="540" width="416" height="44" rx="10" fill="#16a34a"/>
    <text x="913" y="567" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">⤓ Export · 把决策回灌为下一轮 prompt</text>
  </g>

  <!-- bottom caption -->
  <text x="600" y="640" text-anchor="middle" font-size="14" fill="#374151">
    <tspan font-weight="700" fill="#16a34a">空间信息 · 可交互 · 可复制 · 闭环导出</tspan>
    <tspan> — 这就是 HTML 的"不合理有效"</tspan>
  </text>
</svg>
