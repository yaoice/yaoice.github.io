<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eef2f8"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#dde3ee" stroke-width="0.5"/>
    </pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.16"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>
  <rect width="1200" height="640" fill="url(#grid)" opacity="0.5"/>

  <text x="600" y="60" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2937">同一份"部署流水线"信息 · Markdown 与 HTML 的密度差距</text>
  <text x="600" y="90" text-anchor="middle" font-size="14" fill="#6b7280">读者扫一眼，左边只能"读"，右边可以"指着说话"</text>

  <!-- LEFT panel -->
  <g filter="url(#soft)">
    <rect x="60" y="120" width="540" height="470" rx="18" fill="#fff" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <rect x="60" y="120" width="540" height="44" rx="18" fill="#fef3c7"/>
  <rect x="60" y="142" width="540" height="22" fill="#fef3c7"/>
  <text x="86" y="150" font-size="14" font-weight="700" fill="#92400e">📄 Markdown 输出</text>
  <text x="568" y="150" text-anchor="end" font-size="12" fill="#92400e">线性 · 扁平</text>

  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#374151">
    <text x="86" y="200">## 部署流水线</text>
    <text x="86" y="226">1. 拉取代码（约 12s）</text>
    <text x="86" y="250">2. 单元测试（约 95s，可能失败：超时）</text>
    <text x="86" y="274">3. 构建镜像（约 180s）</text>
    <text x="86" y="298">4. 安全扫描（约 40s，可能失败：CVE）</text>
    <text x="86" y="322">5. 推送到 Registry（约 25s）</text>
    <text x="86" y="346">6. 灰度部署（约 60s，可能失败：探针）</text>
    <text x="86" y="370">7. 全量部署（约 120s）</text>
    <text x="86" y="394">8. 烟雾测试（约 30s，可能失败：5xx）</text>
  </g>

  <text x="86" y="438" font-size="13" fill="#7c2d12">读者要做的事：</text>
  <text x="86" y="460" font-size="13" fill="#7c2d12">  · 在脑中把 8 个步骤排成时间轴</text>
  <text x="86" y="482" font-size="13" fill="#7c2d12">  · 自己计算总耗时（562s）</text>
  <text x="86" y="504" font-size="13" fill="#7c2d12">  · 心算"哪一步失败概率最高"</text>
  <text x="86" y="526" font-size="13" fill="#7c2d12">  · 想问"第 4 步失败时怎么走？"</text>
  <text x="86" y="548" font-size="13" fill="#7c2d12">    → 只能再去翻另一份文档</text>

  <text x="330" y="578" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">信息密度 · 低 · 阅读成本 · 高</text>

  <!-- RIGHT panel -->
  <g filter="url(#soft)">
    <rect x="620" y="120" width="540" height="470" rx="18" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  </g>
  <rect x="620" y="120" width="540" height="44" rx="18" fill="#dcfce7"/>
  <rect x="620" y="142" width="540" height="22" fill="#dcfce7"/>
  <text x="646" y="150" font-size="14" font-weight="700" fill="#14532d">🧩 HTML 工件</text>
  <text x="1128" y="150" text-anchor="end" font-size="12" fill="#14532d">空间 · 可交互 · 可点击</text>

  <!-- timeline -->
  <g>
    <line x1="660" y1="220" x2="1120" y2="220" stroke="#cbd5e1" stroke-width="2"/>
    <!-- nodes -->
    <g>
      <circle cx="680"  cy="220" r="14" fill="#22c55e"/>
      <text x="680" y="225" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">1</text>
      <text x="680" y="252" text-anchor="middle" font-size="10" fill="#475569">Pull</text>
      <text x="680" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">12s</text>
    </g>
    <g>
      <circle cx="740"  cy="220" r="14" fill="#22c55e"/>
      <text x="740" y="225" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">2</text>
      <text x="740" y="252" text-anchor="middle" font-size="10" fill="#475569">Test</text>
      <text x="740" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">95s</text>
    </g>
    <g>
      <circle cx="820"  cy="220" r="14" fill="#22c55e"/>
      <text x="820" y="225" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">3</text>
      <text x="820" y="252" text-anchor="middle" font-size="10" fill="#475569">Build</text>
      <text x="820" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">180s</text>
    </g>
    <g>
      <circle cx="890"  cy="220" r="14" fill="#ef4444"/>
      <text x="890" y="225" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">4</text>
      <text x="890" y="252" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="700">Scan</text>
      <text x="890" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">40s</text>
    </g>
    <g>
      <circle cx="950"  cy="220" r="14" fill="#22c55e"/>
      <text x="950" y="225" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">5</text>
      <text x="950" y="252" text-anchor="middle" font-size="10" fill="#475569">Push</text>
      <text x="950" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">25s</text>
    </g>
    <g>
      <circle cx="1010" cy="220" r="14" fill="#f59e0b"/>
      <text x="1010" y="225" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">6</text>
      <text x="1010" y="252" text-anchor="middle" font-size="10" fill="#92400e" font-weight="700">Canary</text>
      <text x="1010" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">60s</text>
    </g>
    <g>
      <circle cx="1070" cy="220" r="14" fill="#22c55e"/>
      <text x="1070" y="225" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">7</text>
      <text x="1070" y="252" text-anchor="middle" font-size="10" fill="#475569">Roll</text>
      <text x="1070" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">120s</text>
    </g>
    <g>
      <circle cx="1120" cy="220" r="14" fill="#22c55e"/>
      <text x="1120" y="225" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">8</text>
      <text x="1120" y="252" text-anchor="middle" font-size="10" fill="#475569">Smoke</text>
      <text x="1120" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">30s</text>
    </g>
  </g>

  <!-- detail card on click -->
  <g>
    <rect x="660" y="296" width="460" height="180" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="678" y="320" font-size="13" font-weight="700" fill="#0f172a">点击节点 4 · 安全扫描</text>
    <line x1="678" y1="332" x2="1100" y2="332" stroke="#e2e8f0"/>

    <text x="678" y="354" font-size="12" fill="#475569">运行命令：</text>
    <text x="760" y="354" font-size="12" font-family="ui-monospace, monospace" fill="#0f172a">trivy image $IMG --severity HIGH,CRITICAL</text>

    <text x="678" y="376" font-size="12" fill="#475569">耗时分布：</text>
    <rect x="760" y="367" width="200" height="10" rx="3" fill="#e2e8f0"/>
    <rect x="760" y="367" width="120" height="10" rx="3" fill="#3b82f6"/>
    <text x="970" y="376" font-size="11" fill="#64748b">中位 32s · P95 48s</text>

    <text x="678" y="402" font-size="12" fill="#475569">失败路径：</text>
    <rect x="760" y="392" width="340" height="20" rx="6" fill="#fee2e2"/>
    <text x="770" y="406" font-size="11" fill="#b91c1c">CVE 高危 → 阻断 → Slack 告警 → 待人工豁免</text>

    <text x="678" y="430" font-size="12" fill="#475569">最近 7 天：</text>
    <text x="760" y="430" font-size="12" font-weight="700" fill="#dc2626">3 次失败</text>
    <text x="820" y="430" font-size="12" fill="#475569">/ 41 次 · 失败率 7.3%（高于均值）</text>

    <rect x="678" y="446" width="120" height="22" rx="6" fill="#16a34a"/>
    <text x="738" y="461" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">⤓ 复制为 prompt</text>
    <rect x="806" y="446" width="120" height="22" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="866" y="461" text-anchor="middle" font-size="11" fill="#334155">查看完整日志</text>
  </g>

  <text x="890" y="500" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">信息密度 · 高 · 直接可决策可复制</text>

  <text x="600" y="580" text-anchor="middle" font-size="13" fill="#475569">
    左 · 把空间信息压扁成线 &#160;&#160;|&#160;&#160; 右 · 把空间信息还原为图，把图还原为可点
  </text>
</svg>
