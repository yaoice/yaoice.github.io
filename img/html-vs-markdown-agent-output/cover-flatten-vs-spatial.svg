<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Markdown vs HTML for Agent Output">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="55%" stop-color="#f7f7fb"/>
      <stop offset="100%" stop-color="#fff5ee"/>
    </linearGradient>
    <linearGradient id="mdCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="htmlCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/>
    </pattern>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0891b2"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.5"/>

  <!-- Title -->
  <text x="600" y="56" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a">同一份 PR Review：Markdown 在压扁信息，HTML 在还原结构</text>
  <text x="600" y="88" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="500" fill="#475569">Agent 输出格式不是渲染问题，是信息形态问题</text>

  <!-- LEFT: Markdown card -->
  <rect x="60" y="120" width="520" height="500" rx="24" fill="url(#mdCard)" stroke="#f97316" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="80" y="138" width="120" height="32" rx="16" fill="#f97316"/>
  <text x="140" y="160" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="white">Markdown</text>
  <text x="220" y="161" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#9a3412">线性墙状文本</text>

  <!-- 三段顺序文本，模拟"墙" -->
  <rect x="80" y="190" width="480" height="40" rx="6" fill="#fff" opacity="0.85"/>
  <text x="92" y="216" font-family="ui-monospace, monospace" font-size="13" fill="#475569">## File: api/handler.go</text>

  <rect x="80" y="240" width="480" height="22" rx="4" fill="#fee2e2"/>
  <text x="92" y="256" font-family="ui-monospace, monospace" font-size="12" fill="#b91c1c">- if err != nil { return err }</text>
  <rect x="80" y="265" width="480" height="22" rx="4" fill="#dcfce7"/>
  <text x="92" y="281" font-family="ui-monospace, monospace" font-size="12" fill="#166534">+ if err != nil { return fmt.Errorf("...") }</text>

  <rect x="80" y="305" width="480" height="14" rx="3" fill="#e2e8f0"/>
  <rect x="80" y="325" width="430" height="14" rx="3" fill="#e2e8f0"/>
  <rect x="80" y="345" width="470" height="14" rx="3" fill="#e2e8f0"/>
  <rect x="80" y="365" width="380" height="14" rx="3" fill="#e2e8f0"/>

  <rect x="80" y="395" width="480" height="40" rx="6" fill="#fff" opacity="0.85"/>
  <text x="92" y="421" font-family="ui-monospace, monospace" font-size="13" fill="#475569">## File: api/middleware.go</text>

  <rect x="80" y="445" width="480" height="14" rx="3" fill="#e2e8f0"/>
  <rect x="80" y="465" width="450" height="14" rx="3" fill="#e2e8f0"/>
  <rect x="80" y="485" width="470" height="14" rx="3" fill="#e2e8f0"/>
  <rect x="80" y="505" width="400" height="14" rx="3" fill="#e2e8f0"/>

  <!-- 丢失项 -->
  <rect x="80" y="540" width="480" height="60" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="320" y="565" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="800" fill="#9a3412">丢失了什么</text>
  <text x="320" y="588" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="600" fill="#9a3412">空间排列 · 严重等级 · 跳转链接 · 调用关系</text>

  <!-- 中间箭头 -->
  <line x1="595" y1="370" x2="650" y2="370" stroke="#0891b2" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="623" y="355" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#0891b2">还原</text>

  <!-- RIGHT: HTML card -->
  <rect x="650" y="120" width="490" height="500" rx="24" fill="url(#htmlCard)" stroke="#0891b2" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="670" y="138" width="100" height="32" rx="16" fill="#0891b2"/>
  <text x="720" y="160" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="800" fill="white">HTML</text>
  <text x="790" y="161" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#0e7490">空间还原 · 可点击 · 可标注</text>

  <!-- 文件树 -->
  <rect x="670" y="190" width="140" height="280" rx="10" fill="white" filter="url(#softShadow)"/>
  <text x="685" y="213" font-family="PingFang SC, sans-serif" font-size="12" font-weight="800" fill="#0f172a">文件导览</text>
  <rect x="678" y="225" width="124" height="22" rx="5" fill="#cffafe"/>
  <text x="685" y="241" font-family="ui-monospace, monospace" font-size="11" fill="#0e7490">handler.go</text>
  <circle cx="790" cy="236" r="6" fill="#ef4444"/>
  <text x="790" y="240" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="800" fill="white">2</text>

  <text x="685" y="263" font-family="ui-monospace, monospace" font-size="11" fill="#475569">middleware.go</text>
  <circle cx="790" cy="259" r="6" fill="#f59e0b"/>
  <text x="790" y="263" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="800" fill="white">1</text>

  <text x="685" y="286" font-family="ui-monospace, monospace" font-size="11" fill="#475569">router.go</text>
  <text x="685" y="309" font-family="ui-monospace, monospace" font-size="11" fill="#475569">utils/log.go</text>
  <text x="685" y="332" font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8">...</text>

  <!-- 调用图 mini -->
  <text x="685" y="372" font-family="PingFang SC, sans-serif" font-size="12" font-weight="800" fill="#0f172a">调用关系</text>
  <circle cx="700" cy="395" r="10" fill="#0891b2"/>
  <text x="717" y="399" font-family="ui-monospace, monospace" font-size="10" fill="#0f172a">router</text>
  <line x1="710" y1="395" x2="730" y2="425" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="740" cy="430" r="10" fill="#ef4444"/>
  <text x="757" y="434" font-family="ui-monospace, monospace" font-size="10" fill="#0f172a">handler</text>
  <line x1="750" y1="430" x2="770" y2="455" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="780" cy="460" r="8" fill="#94a3b8"/>

  <!-- diff 卡 -->
  <rect x="825" y="190" width="295" height="155" rx="10" fill="white" filter="url(#softShadow)"/>
  <text x="840" y="213" font-family="ui-monospace, monospace" font-size="12" font-weight="800" fill="#0f172a">handler.go · L42</text>
  <rect x="1062" y="200" width="48" height="20" rx="10" fill="#fee2e2"/>
  <text x="1086" y="214" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" font-weight="800" fill="#b91c1c">高危</text>

  <rect x="838" y="226" width="270" height="22" rx="3" fill="#fee2e2"/>
  <text x="846" y="242" font-family="ui-monospace, monospace" font-size="11" fill="#b91c1c">- return err</text>

  <rect x="838" y="252" width="270" height="22" rx="3" fill="#dcfce7"/>
  <text x="846" y="268" font-family="ui-monospace, monospace" font-size="11" fill="#166534">+ return fmt.Errorf("handle: %w", err)</text>

  <rect x="838" y="285" width="270" height="48" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="848" y="305" font-family="PingFang SC, sans-serif" font-size="11" font-weight="700" fill="#713f12">边注</text>
  <text x="848" y="322" font-family="PingFang SC, sans-serif" font-size="11" fill="#713f12">缺少调用方上下文，建议加 trace id</text>

  <!-- review 列表 -->
  <rect x="825" y="360" width="295" height="135" rx="10" fill="white" filter="url(#softShadow)"/>
  <text x="840" y="383" font-family="PingFang SC, sans-serif" font-size="12" font-weight="800" fill="#0f172a">评审动作</text>

  <rect x="838" y="395" width="270" height="28" rx="6" fill="#ecfdf5"/>
  <circle cx="852" cy="409" r="5" fill="#22c55e"/>
  <text x="864" y="413" font-family="PingFang SC, sans-serif" font-size="11" fill="#166534">3 处可一键 Approve</text>

  <rect x="838" y="427" width="270" height="28" rx="6" fill="#fef3c7"/>
  <circle cx="852" cy="441" r="5" fill="#f59e0b"/>
  <text x="864" y="445" font-family="PingFang SC, sans-serif" font-size="11" fill="#92400e">1 处需作者补 trace id</text>

  <rect x="838" y="459" width="270" height="28" rx="6" fill="#fee2e2"/>
  <circle cx="852" cy="473" r="5" fill="#ef4444"/>
  <text x="864" y="477" font-family="PingFang SC, sans-serif" font-size="11" fill="#b91c1c">1 处建议 Block</text>

  <!-- 底部 export -->
  <rect x="670" y="540" width="450" height="60" rx="10" fill="#ecfdf5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="895" y="565" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="800" fill="#166534">保留了什么</text>
  <text x="895" y="588" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="600" fill="#166534">空间排列 · 严重等级 · 跳转链接 · 调用关系 · 一键导出 markdown</text>

  <!-- footer -->
  <text x="600" y="650" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="500" fill="#64748b">来源：thariqs.github.io/html-effectiveness · 9 大场景 · 20 个 demo</text>
</svg>
