<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f8fc"/>
      <stop offset="1" stop-color="#edf1f8"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#dde3ee" stroke-width="0.5"/>
    </pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.16"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#bfdbfe"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fde68a"/><stop offset="1" stop-color="#fcd34d"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbcfe8"/><stop offset="1" stop-color="#f9a8d4"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#bbf7d0"/><stop offset="1" stop-color="#86efac"/></linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ddd6fe"/><stop offset="1" stop-color="#c4b5fd"/></linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)" opacity="0.5"/>

  <text x="600" y="56" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2937">5 类场景 · 把 20 个 HTML demo 收敛为可复用范式</text>
  <text x="600" y="86" text-anchor="middle" font-size="14" fill="#6b7280">每一类都回答同一个问题：如果用 Markdown 会怎样？</text>

  <!-- card layout: 5 cards -->
  <g>
    <!-- 1 探索规划 -->
    <g filter="url(#soft)"><rect x="50"  y="120" width="220" height="280" rx="16" fill="url(#g1)" stroke="#3b82f6" stroke-width="1.2"/></g>
    <text x="160" y="155" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">① 探索 &amp; 规划</text>
    <text x="160" y="178" text-anchor="middle" font-size="11" fill="#1e40af">代表 demo · 三方案并排</text>

    <!-- mini visual: 3 cards -->
    <rect x="68"  y="194" width="55" height="62" rx="6" fill="#fff" stroke="#93c5fd"/>
    <rect x="74"  y="204" width="43" height="6" fill="#dbeafe"/>
    <rect x="74"  y="214" width="35" height="6" fill="#dbeafe"/>
    <rect x="74"  y="224" width="40" height="6" fill="#dbeafe"/>
    <text x="95"  y="248" text-anchor="middle" font-size="9" fill="#1e3a8a">A</text>

    <rect x="132" y="194" width="55" height="62" rx="6" fill="#fff" stroke="#93c5fd"/>
    <rect x="138" y="204" width="43" height="6" fill="#dbeafe"/>
    <rect x="138" y="214" width="35" height="6" fill="#dbeafe"/>
    <rect x="138" y="224" width="40" height="6" fill="#dbeafe"/>
    <text x="159" y="248" text-anchor="middle" font-size="9" fill="#1e3a8a">B</text>

    <rect x="196" y="194" width="55" height="62" rx="6" fill="#fff" stroke="#93c5fd"/>
    <rect x="202" y="204" width="43" height="6" fill="#dbeafe"/>
    <rect x="202" y="214" width="35" height="6" fill="#dbeafe"/>
    <rect x="202" y="224" width="40" height="6" fill="#dbeafe"/>
    <text x="223" y="248" text-anchor="middle" font-size="9" fill="#1e3a8a">C</text>

    <text x="160" y="290" text-anchor="middle" font-size="11" fill="#0f172a" font-weight="700">收益</text>
    <text x="160" y="310" text-anchor="middle" font-size="11" fill="#334155">横向扫一眼即可对比</text>
    <text x="160" y="326" text-anchor="middle" font-size="11" fill="#334155">而不是顺序读 3 堵墙</text>

    <line x1="60" y1="346" x2="260" y2="346" stroke="#bfdbfe"/>
    <text x="160" y="364" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="700">Markdown 反例</text>
    <text x="160" y="380" text-anchor="middle" font-size="10" fill="#7f1d1d">读完 A 已经忘了 B</text>

    <!-- 2 代码评审 -->
    <g filter="url(#soft)"><rect x="290" y="120" width="220" height="280" rx="16" fill="url(#g2)" stroke="#d97706" stroke-width="1.2"/></g>
    <text x="400" y="155" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">② 代码评审 &amp; 模块理解</text>
    <text x="400" y="178" text-anchor="middle" font-size="11" fill="#92400e">代表 demo · 带边注 Diff</text>

    <!-- diff visual -->
    <rect x="308" y="194" width="184" height="14" fill="#fee2e2"/>
    <text x="316" y="205" font-family="ui-monospace, monospace" font-size="10" fill="#b91c1c">- if (data) {</text>
    <rect x="308" y="210" width="184" height="14" fill="#dcfce7"/>
    <text x="316" y="221" font-family="ui-monospace, monospace" font-size="10" fill="#15803d">+ if (data?.id) {</text>
    <rect x="308" y="226" width="184" height="14" fill="#fef3c7"/>
    <text x="316" y="237" font-family="ui-monospace, monospace" font-size="10" fill="#a16207">~ lock.acquire();</text>
    <!-- side annotations -->
    <line x1="492" y1="218" x2="498" y2="218" stroke="#ef4444"/>
    <rect x="498" y="210" width="6" height="16" fill="#ef4444"/>
    <line x1="492" y1="234" x2="498" y2="234" stroke="#f59e0b"/>
    <rect x="498" y="226" width="6" height="16" fill="#f59e0b"/>

    <text x="400" y="290" text-anchor="middle" font-size="11" fill="#0f172a" font-weight="700">收益</text>
    <text x="400" y="310" text-anchor="middle" font-size="11" fill="#334155">严重度色标 + 跳转链接</text>
    <text x="400" y="326" text-anchor="middle" font-size="11" fill="#334155">陌生包变框图 + 热路径</text>

    <line x1="300" y1="346" x2="500" y2="346" stroke="#fde68a"/>
    <text x="400" y="364" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="700">Markdown 反例</text>
    <text x="400" y="380" text-anchor="middle" font-size="10" fill="#7f1d1d">终端滚动 diff，看不到结构</text>

    <!-- 3 设计 / 原型 -->
    <g filter="url(#soft)"><rect x="530" y="120" width="220" height="280" rx="16" fill="url(#g3)" stroke="#db2777" stroke-width="1.2"/></g>
    <text x="640" y="155" text-anchor="middle" font-size="14" font-weight="700" fill="#831843">③ 设计 &amp; 原型</text>
    <text x="640" y="178" text-anchor="middle" font-size="11" fill="#9d174d">代表 demo · 设计系统色卡</text>

    <!-- color tokens -->
    <rect x="548" y="194" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="594" y="194" width="40" height="40" rx="6" fill="#16a34a"/>
    <rect x="640" y="194" width="40" height="40" rx="6" fill="#dc2626"/>
    <rect x="686" y="194" width="40" height="40" rx="6" fill="#d97706"/>
    <rect x="548" y="240" width="40" height="40" rx="6" fill="#7c3aed"/>
    <rect x="594" y="240" width="40" height="40" rx="6" fill="#0ea5e9"/>
    <rect x="640" y="240" width="40" height="40" rx="6" fill="#1f2937"/>
    <rect x="686" y="240" width="40" height="40" rx="6" fill="#f3f4f6" stroke="#d1d5db"/>

    <text x="640" y="306" text-anchor="middle" font-size="11" fill="#0f172a" font-weight="700">收益</text>
    <text x="640" y="326" text-anchor="middle" font-size="11" fill="#334155">真实缓动曲线 · 真点击</text>

    <line x1="540" y1="346" x2="740" y2="346" stroke="#fbcfe8"/>
    <text x="640" y="364" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="700">Markdown 反例</text>
    <text x="640" y="380" text-anchor="middle" font-size="10" fill="#7f1d1d">"轻微弹性回弹" · 写死也没用</text>

    <!-- 4 一次性编辑器 -->
    <g filter="url(#soft)"><rect x="770" y="120" width="220" height="280" rx="16" fill="url(#g4)" stroke="#16a34a" stroke-width="1.2"/></g>
    <text x="880" y="155" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">④ 一次性编辑器</text>
    <text x="880" y="178" text-anchor="middle" font-size="11" fill="#166534">代表 demo · 工单分诊看板</text>

    <!-- kanban -->
    <rect x="788" y="194" width="44" height="68" rx="4" fill="#fff" stroke="#86efac"/>
    <rect x="794" y="200" width="32" height="10" fill="#bbf7d0"/>
    <rect x="794" y="214" width="32" height="10" fill="#bbf7d0"/>
    <text x="810" y="252" text-anchor="middle" font-size="9" fill="#166534">Now</text>

    <rect x="838" y="194" width="44" height="68" rx="4" fill="#fff" stroke="#86efac"/>
    <rect x="844" y="200" width="32" height="10" fill="#bbf7d0"/>
    <text x="860" y="252" text-anchor="middle" font-size="9" fill="#166534">Next</text>

    <rect x="888" y="194" width="44" height="68" rx="4" fill="#fff" stroke="#86efac"/>
    <rect x="894" y="200" width="32" height="10" fill="#bbf7d0"/>
    <rect x="894" y="214" width="32" height="10" fill="#bbf7d0"/>
    <rect x="894" y="228" width="32" height="10" fill="#bbf7d0"/>
    <text x="910" y="252" text-anchor="middle" font-size="9" fill="#166534">Later</text>

    <rect x="938" y="194" width="44" height="68" rx="4" fill="#fff" stroke="#86efac"/>
    <text x="960" y="252" text-anchor="middle" font-size="9" fill="#166534">Cut</text>

    <!-- export -->
    <rect x="788" y="278" width="194" height="22" rx="6" fill="#16a34a"/>
    <text x="885" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">⤓ Export · 回到 prompt</text>

    <text x="880" y="316" text-anchor="middle" font-size="11" fill="#0f172a" font-weight="700">收益</text>
    <text x="880" y="334" text-anchor="middle" font-size="11" fill="#334155">"难以描述"的需求 → 拖出来</text>

    <line x1="780" y1="346" x2="980" y2="346" stroke="#bbf7d0"/>
    <text x="880" y="364" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="700">Markdown 反例</text>
    <text x="880" y="380" text-anchor="middle" font-size="10" fill="#7f1d1d">来回 N 轮自然语言扯不清</text>

    <!-- 5 教学 / 解释 -->
    <g filter="url(#soft)"><rect x="1010" y="120" width="140" height="280" rx="16" fill="url(#g5)" stroke="#7c3aed" stroke-width="1.2"/></g>
    <text x="1080" y="155" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">⑤ 教学 &amp; 解释</text>
    <text x="1080" y="178" text-anchor="middle" font-size="10" fill="#5b21b6">代表 · 一致性哈希</text>

    <!-- ring -->
    <circle cx="1080" cy="232" r="36" fill="#fff" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="1080" cy="196" r="6" fill="#7c3aed"/>
    <circle cx="1116" cy="232" r="6" fill="#7c3aed"/>
    <circle cx="1080" cy="268" r="6" fill="#7c3aed"/>
    <circle cx="1044" cy="232" r="6" fill="#7c3aed"/>
    <circle cx="1106" cy="206" r="4" fill="#a78bfa"/>
    <circle cx="1106" cy="258" r="4" fill="#a78bfa"/>

    <text x="1080" y="296" text-anchor="middle" font-size="11" fill="#0f172a" font-weight="700">收益</text>
    <text x="1080" y="314" text-anchor="middle" font-size="10" fill="#334155">实时增删节点</text>
    <text x="1080" y="328" text-anchor="middle" font-size="10" fill="#334155">建立直觉</text>

    <line x1="1020" y1="346" x2="1140" y2="346" stroke="#ddd6fe"/>
    <text x="1080" y="364" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="700">Markdown 反例</text>
    <text x="1080" y="380" text-anchor="middle" font-size="10" fill="#7f1d1d">线性段落 · 抓不到环</text>
  </g>

  <!-- bottom: shared pattern -->
  <g filter="url(#soft)">
    <rect x="80" y="450" width="1040" height="200" rx="18" fill="#fff" stroke="#cbd5e1"/>
  </g>
  <text x="600" y="488" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">所有场景共享一个底层模式</text>

  <g>
    <rect x="140" y="520" width="220" height="80" rx="12" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="250" y="552" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">空间呈现</text>
    <text x="250" y="576" text-anchor="middle" font-size="12" fill="#1e40af">把信息摊在二维上</text>

    <rect x="490" y="520" width="220" height="80" rx="12" fill="#fde68a" stroke="#d97706"/>
    <text x="600" y="552" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">在空间中决策</text>
    <text x="600" y="576" text-anchor="middle" font-size="12" fill="#92400e">点击 · 拖拽 · 切换</text>

    <rect x="840" y="520" width="220" height="80" rx="12" fill="#bbf7d0" stroke="#16a34a"/>
    <text x="950" y="552" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">导出回 prompt</text>
    <text x="950" y="576" text-anchor="middle" font-size="12" fill="#166534">人 ↔ Agent 闭环</text>

    <!-- arrows -->
    <path d="M360 560 L490 560" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arr2)"/>
    <path d="M710 560 L840 560" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arr2)"/>
  </g>

  <defs>
    <marker id="arr2" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="600" y="690" text-anchor="middle" font-size="13" fill="#475569">5 类场景共享同一底层结构 → 这就是 HTML 工件的"复用 ROI"</text>
</svg>
