<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="480" fill="url(#sbg)" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">wecom-cli 安全模型</text>

  <!-- Keystore -->
  <rect x="40" y="60" width="220" height="180" rx="10" fill="#1a1e24" stroke="#f0883e" stroke-width="2"/>
  <text x="150" y="85" text-anchor="middle" fill="#f0883e" font-size="14" font-weight="bold">Keystore 密钥管理</text>
  <line x1="55" y1="95" x2="245" y2="95" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="118" fill="#e6edf3" font-size="11">generate_random_key()</text>
  <text x="60" y="138" fill="#8b949e" font-size="10">→ 32字节随机密钥</text>
  <text x="60" y="162" fill="#e6edf3" font-size="11">save_key(key)</text>
  <text x="60" y="182" fill="#8b949e" font-size="10">→ 优先 OS Keyring</text>
  <text x="60" y="200" fill="#8b949e" font-size="10">→ 回退 .config/wecom/key</text>
  <text x="60" y="225" fill="#e6edf3" font-size="11">load_existing_key()</text>

  <!-- Cipher -->
  <rect x="290" y="60" width="220" height="180" rx="10" fill="#1a1e24" stroke="#a371f7" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" fill="#a371f7" font-size="14" font-weight="bold">Cipher 加密引擎</text>
  <line x1="305" y1="95" x2="495" y2="95" stroke="#30363d" stroke-width="1"/>
  <text x="310" y="118" fill="#e6edf3" font-size="11">算法: AES-256-GCM</text>
  <text x="310" y="142" fill="#e6edf3" font-size="11">encrypt(key, plaintext)</text>
  <text x="310" y="162" fill="#8b949e" font-size="10">→ nonce(12B) || ciphertext || tag(16B)</text>
  <text x="310" y="186" fill="#e6edf3" font-size="11">decrypt(key, data)</text>
  <text x="310" y="206" fill="#8b949e" font-size="10">→ 校验 nonce + tag → plaintext</text>
  <text x="310" y="228" fill="#8b949e" font-size="10">每次加密使用随机 nonce</text>

  <!-- Signature -->
  <rect x="540" y="60" width="230" height="180" rx="10" fill="#1a1e24" stroke="#3fb950" stroke-width="2"/>
  <text x="655" y="85" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="bold">签名验证机制</text>
  <line x1="555" y1="95" x2="755" y2="95" stroke="#30363d" stroke-width="1"/>
  <text x="555" y="118" fill="#e6edf3" font-size="11">签名算法: SHA-256</text>
  <text x="555" y="142" fill="#8b949e" font-size="10">sign(secret, bot_id, time, nonce)</text>
  <text x="555" y="166" fill="#e6edf3" font-size="11">公式:</text>
  <text x="555" y="186" fill="#f0883e" font-size="10">sha256(secret + bot_id + time + nonce)</text>
  <text x="555" y="210" fill="#8b949e" font-size="10">→ 小写十六进制零填充</text>
  <text x="555" y="230" fill="#8b949e" font-size="10">用于 MCP 配置请求认证</text>

  <!-- Storage Layout -->
  <rect x="40" y="270" width="720" height="190" rx="10" fill="#1a1e24" stroke="#58a6ff" stroke-width="2"/>
  <text x="400" y="295" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">本地存储布局 (~/.config/wecom/)</text>
  <line x1="55" y1="305" x2="745" y2="305" stroke="#30363d" stroke-width="1"/>

  <!-- File: bot.enc -->
  <rect x="60" y="320" width="200" height="60" rx="6" fill="rgba(240,136,62,0.1)" stroke="#f0883e" stroke-width="1"/>
  <text x="160" y="342" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">bot.enc</text>
  <text x="160" y="362" text-anchor="middle" fill="#8b949e" font-size="10">Bot ID + Secret (AES加密)</text>
  <text x="160" y="376" text-anchor="middle" fill="#8b949e" font-size="9">权限: 0o600</text>

  <!-- File: mcp_config.enc -->
  <rect x="290" y="320" width="200" height="60" rx="6" fill="rgba(163,113,247,0.1)" stroke="#a371f7" stroke-width="1"/>
  <text x="390" y="342" text-anchor="middle" fill="#a371f7" font-size="12" font-weight="bold">mcp_config.enc</text>
  <text x="390" y="362" text-anchor="middle" fill="#8b949e" font-size="10">MCP 配置列表 (AES加密)</text>
  <text x="390" y="376" text-anchor="middle" fill="#8b949e" font-size="9">权限: 0o600</text>

  <!-- File: key -->
  <rect x="520" y="320" width="200" height="60" rx="6" fill="rgba(63,185,80,0.1)" stroke="#3fb950" stroke-width="1"/>
  <text x="620" y="342" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">key (回退密钥文件)</text>
  <text x="620" y="362" text-anchor="middle" fill="#8b949e" font-size="10">32字节 AES 密钥</text>
  <text x="620" y="376" text-anchor="middle" fill="#8b949e" font-size="9">优先使用 OS Keyring</text>

  <!-- Temp dir -->
  <rect x="60" y="400" width="330" height="45" rx="6" fill="rgba(88,166,255,0.1)" stroke="#58a6ff" stroke-width="1"/>
  <text x="225" y="420" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">/tmp/wecom/media/</text>
  <text x="225" y="438" text-anchor="middle" fill="#8b949e" font-size="10">媒体文件临时存储 (原子写入 + 去重)</text>

  <rect x="420" y="400" width="300" height="45" rx="6" fill="rgba(88,166,255,0.1)" stroke="#58a6ff" stroke-width="1"/>
  <text x="570" y="420" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">atomic_write (fs_util.rs)</text>
  <text x="570" y="438" text-anchor="middle" fill="#8b949e" font-size="10">tempfile + rename 保证写入原子性</text>
</svg>
