<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="abg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="860" height="500" fill="url(#abg)" rx="12"/>
  <text x="430" y="32" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">AI Agent 通过 Skill 调用 wecom-cli 流程</text>

  <!-- AI Agent -->
  <rect x="30" y="55" width="180" height="420" rx="10" fill="rgba(163,113,247,0.08)" stroke="#a371f7" stroke-width="1.5"/>
  <text x="120" y="80" text-anchor="middle" fill="#a371f7" font-size="14" font-weight="bold">AI Agent</text>
  <text x="120" y="98" text-anchor="middle" fill="#8b949e" font-size="10">(CodeBuddy / Claude等)</text>

  <!-- Skill Layer -->
  <rect x="240" y="55" width="210" height="420" rx="10" fill="rgba(240,136,62,0.08)" stroke="#f0883e" stroke-width="1.5"/>
  <text x="345" y="80" text-anchor="middle" fill="#f0883e" font-size="14" font-weight="bold">SKILL.md</text>
  <text x="345" y="98" text-anchor="middle" fill="#8b949e" font-size="10">结构化自然语言指令</text>

  <!-- CLI Layer -->
  <rect x="480" y="55" width="180" height="420" rx="10" fill="rgba(31,111,235,0.08)" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="570" y="80" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">wecom-cli</text>
  <text x="570" y="98" text-anchor="middle" fill="#8b949e" font-size="10">Rust 二进制</text>

  <!-- MCP Server -->
  <rect x="690" y="55" width="140" height="420" rx="10" fill="rgba(63,185,80,0.08)" stroke="#3fb950" stroke-width="1.5"/>
  <text x="760" y="80" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="bold">MCP Server</text>
  <text x="760" y="98" text-anchor="middle" fill="#8b949e" font-size="10">企业微信后端</text>

  <!-- Step 1: User request -->
  <rect x="45" y="118" width="150" height="40" rx="20" fill="#238636"/>
  <text x="120" y="143" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">用户: "查一下张三"</text>

  <!-- Step 2: Agent reads skill -->
  <line x1="165" y1="138" x2="255" y2="138" stroke="#a371f7" stroke-width="2"/>
  <polygon points="252,133 262,138 252,143" fill="#a371f7"/>
  <text x="210" y="128" text-anchor="middle" fill="#a371f7" font-size="9">读取 Skill</text>

  <!-- Skill content -->
  <rect x="255" y="115" width="180" height="70" rx="6" fill="#1a1e24" stroke="#30363d" stroke-width="1"/>
  <text x="345" y="135" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">wecomcli-lookup-contact</text>
  <text x="265" y="153" fill="#8b949e" font-size="9">requires: bins: ["wecom-cli"]</text>
  <text x="265" y="167" fill="#8b949e" font-size="9">操作: get_userlist → 本地筛选</text>
  <text x="265" y="181" fill="#8b949e" font-size="9">工作流: 获取全量 → 按名匹配</text>

  <!-- Step 3: Agent understands and executes -->
  <rect x="45" y="210" width="150" height="55" rx="6" fill="#1a1e24" stroke="#a371f7" stroke-width="1"/>
  <text x="120" y="232" text-anchor="middle" fill="#a371f7" font-size="10" font-weight="bold">Agent 理解工作流</text>
  <text x="120" y="250" text-anchor="middle" fill="#8b949e" font-size="9">1. 调用 get_userlist</text>
  <text x="120" y="262" text-anchor="middle" fill="#8b949e" font-size="9">2. 本地筛选 "张三"</text>

  <line x1="195" y1="240" x2="255" y2="240" stroke="#a371f7" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Skill provides command template -->
  <rect x="255" y="210" width="180" height="45" rx="6" fill="#1a1e24" stroke="#30363d" stroke-width="1"/>
  <text x="345" y="230" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">命令模板</text>
  <text x="265" y="248" fill="#8b949e" font-size="9">wecom-cli contact get_userlist '{}'</text>

  <!-- Step 4: Execute CLI command -->
  <rect x="45" y="290" width="150" height="35" rx="6" fill="#1a1e24" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="120" y="312" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="bold">执行 CLI 命令</text>

  <line x1="195" y1="307" x2="495" y2="307" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="492,302 502,307 492,312" fill="#58a6ff"/>

  <!-- CLI processes -->
  <rect x="495" y="290" width="150" height="35" rx="6" fill="#1a1e24" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="570" y="312" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="bold">Clap 解析 + 路由</text>

  <line x1="645" y1="307" x2="705" y2="307" stroke="#3fb950" stroke-width="2"/>
  <polygon points="702,302 712,307 702,312" fill="#3fb950"/>

  <!-- MCP call -->
  <rect x="700" y="290" width="120" height="35" rx="6" fill="#1a1e24" stroke="#3fb950" stroke-width="1.5"/>
  <text x="760" y="312" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">JSON-RPC 调用</text>

  <!-- Response back -->
  <line x1="760" y1="325" x2="760" y2="350" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="700" y="350" width="120" height="30" rx="6" fill="#1a1e24" stroke="#3fb950" stroke-width="1"/>
  <text x="760" y="370" text-anchor="middle" fill="#3fb950" font-size="9">返回 userlist</text>

  <line x1="700" y1="365" x2="645" y2="365" stroke="#3fb950" stroke-width="1.5"/>

  <rect x="495" y="350" width="150" height="30" rx="6" fill="#1a1e24" stroke="#1f6feb" stroke-width="1"/>
  <text x="570" y="370" text-anchor="middle" fill="#58a6ff" font-size="9">输出 JSON 结果</text>

  <line x1="495" y1="365" x2="195" y2="365" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="198,360 188,365 198,370" fill="#58a6ff"/>

  <!-- Step 5: Agent filters -->
  <rect x="45" y="350" width="150" height="50" rx="6" fill="#1a1e24" stroke="#a371f7" stroke-width="1.5"/>
  <text x="120" y="370" text-anchor="middle" fill="#a371f7" font-size="10" font-weight="bold">Agent 本地筛选</text>
  <text x="120" y="388" text-anchor="middle" fill="#8b949e" font-size="9">在 userlist 中匹配</text>
  <text x="120" y="398" text-anchor="middle" fill="#8b949e" font-size="9">"张三" (name/alias)</text>

  <!-- Step 6: Return to user -->
  <line x1="120" y1="400" x2="120" y2="430" stroke="#484f58" stroke-width="2"/>
  <polygon points="115,427 120,437 125,427" fill="#484f58"/>

  <rect x="35" y="435" width="170" height="30" rx="15" fill="#238636"/>
  <text x="120" y="455" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">展示: 张三 (ID: zhangsan)</text>

  <!-- Annotations -->
  <rect x="255" y="280" width="180" height="60" rx="6" fill="#1a1e24" stroke="#f0883e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="345" y="300" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">Skill 指导</text>
  <text x="265" y="316" fill="#8b949e" font-size="9">⚠️ 超过10人 → 报错</text>
  <text x="265" y="330" fill="#8b949e" font-size="9">多个匹配 → 展示候选列表</text>
</svg>
