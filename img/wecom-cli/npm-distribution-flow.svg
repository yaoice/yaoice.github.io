<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="nbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="820" height="420" fill="url(#nbg)" rx="12"/>
  <text x="410" y="32" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">npm 跨平台分发与引导流程</text>

  <!-- npm install -->
  <rect x="280" y="50" width="260" height="40" rx="20" fill="#238636"/>
  <text x="410" y="75" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">npm install -g @wecom/cli</text>

  <line x1="410" y1="90" x2="410" y2="115" stroke="#484f58" stroke-width="2"/>
  <polygon points="405,112 410,122 415,112" fill="#484f58"/>

  <!-- npm resolves optional deps -->
  <rect x="250" y="120" width="320" height="42" rx="8" fill="#1a1e24" stroke="#f0883e" stroke-width="1.5"/>
  <text x="410" y="138" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">npm 解析 optionalDependencies</text>
  <text x="410" y="155" text-anchor="middle" fill="#8b949e" font-size="10">根据当前 OS + Arch 下载对应平台包</text>

  <!-- Platform split -->
  <line x1="410" y1="162" x2="410" y2="185" stroke="#484f58" stroke-width="2"/>

  <!-- Four platform boxes -->
  <rect x="30" y="190" width="160" height="50" rx="8" fill="#1a1e24" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="110" y="212" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">darwin-arm64</text>
  <text x="110" y="230" text-anchor="middle" fill="#8b949e" font-size="10">Apple Silicon Mac</text>

  <rect x="210" y="190" width="160" height="50" rx="8" fill="#1a1e24" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="290" y="212" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">darwin-x64</text>
  <text x="290" y="230" text-anchor="middle" fill="#8b949e" font-size="10">Intel Mac</text>

  <rect x="390" y="190" width="160" height="50" rx="8" fill="#1a1e24" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="470" y="212" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">linux-x64</text>
  <text x="470" y="230" text-anchor="middle" fill="#8b949e" font-size="10">Linux 64-bit</text>

  <rect x="570" y="190" width="160" height="50" rx="8" fill="#1a1e24" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="650" y="212" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">win32-x64</text>
  <text x="650" y="230" text-anchor="middle" fill="#8b949e" font-size="10">Windows 64-bit</text>

  <!-- Lines from center to platforms -->
  <line x1="410" y1="185" x2="110" y2="190" stroke="#484f58" stroke-width="1.5"/>
  <line x1="410" y1="185" x2="290" y2="190" stroke="#484f58" stroke-width="1.5"/>
  <line x1="410" y1="185" x2="470" y2="190" stroke="#484f58" stroke-width="1.5"/>
  <line x1="410" y1="185" x2="650" y2="190" stroke="#484f58" stroke-width="1.5"/>

  <!-- Converge -->
  <line x1="110" y1="240" x2="110" y2="270" stroke="#484f58" stroke-width="1"/>
  <line x1="290" y1="240" x2="290" y2="270" stroke="#484f58" stroke-width="1"/>
  <line x1="470" y1="240" x2="470" y2="270" stroke="#484f58" stroke-width="1"/>
  <line x1="650" y1="240" x2="650" y2="270" stroke="#484f58" stroke-width="1"/>
  <line x1="110" y1="270" x2="650" y2="270" stroke="#484f58" stroke-width="1"/>
  <line x1="410" y1="270" x2="410" y2="290" stroke="#484f58" stroke-width="2"/>
  <polygon points="405,287 410,297 415,287" fill="#484f58"/>

  <!-- User runs wecom-cli -->
  <rect x="260" y="295" width="300" height="40" rx="20" fill="#1f6feb"/>
  <text x="410" y="320" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">用户执行 wecom-cli &lt;command&gt;</text>

  <line x1="410" y1="335" x2="410" y2="355" stroke="#484f58" stroke-width="2"/>
  <polygon points="405,352 410,362 415,352" fill="#484f58"/>

  <!-- bin/wecom.js flow -->
  <rect x="100" y="360" width="180" height="45" rx="8" fill="#1a1e24" stroke="#a371f7" stroke-width="1.5"/>
  <text x="190" y="380" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="bold">bin/wecom.js</text>
  <text x="190" y="396" text-anchor="middle" fill="#8b949e" font-size="10">os.platform() + os.arch()</text>

  <line x1="280" y1="382" x2="330" y2="382" stroke="#484f58" stroke-width="2"/>
  <polygon points="327,377 337,382 327,387" fill="#484f58"/>

  <rect x="335" y="360" width="180" height="45" rx="8" fill="#1a1e24" stroke="#a371f7" stroke-width="1.5"/>
  <text x="425" y="380" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="bold">require.resolve(pkg)</text>
  <text x="425" y="396" text-anchor="middle" fill="#8b949e" font-size="10">定位 Rust 二进制路径</text>

  <line x1="515" y1="382" x2="565" y2="382" stroke="#484f58" stroke-width="2"/>
  <polygon points="562,377 572,382 562,387" fill="#484f58"/>

  <rect x="570" y="360" width="210" height="45" rx="8" fill="#1a1e24" stroke="#3fb950" stroke-width="1.5"/>
  <text x="675" y="380" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">execFileSync(binary, args)</text>
  <text x="675" y="396" text-anchor="middle" fill="#8b949e" font-size="10">透传参数给 Rust 二进制</text>
</svg>
