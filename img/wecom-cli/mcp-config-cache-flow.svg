<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="ccbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="780" height="440" fill="url(#ccbg)" rx="12"/>
  <text x="390" y="32" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">MCP 配置获取与缓存策略</text>

  <!-- Entry -->
  <rect x="260" y="52" width="260" height="38" rx="19" fill="#1f6feb"/>
  <text x="390" y="76" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">get_mcp_config() 被调用</text>

  <line x1="390" y1="90" x2="390" y2="118" stroke="#484f58" stroke-width="2"/>

  <!-- Decision: cache hit -->
  <polygon points="390,118 500,155 390,192 280,155" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="390" y="152" text-anchor="middle" fill="#fff" font-size="11">本地缓存存在?</text>
  <text x="390" y="167" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="9">(mcp_config.enc)</text>

  <!-- Cache HIT -->
  <line x1="500" y1="155" x2="600" y2="155" stroke="#484f58" stroke-width="2"/>
  <text x="545" y="148" fill="#7ee787" font-size="10">命中</text>
  <polygon points="597,150 607,155 597,160" fill="#484f58"/>

  <!-- Decrypt cache -->
  <rect x="608" y="135" width="155" height="45" rx="8" fill="#1a1e24" stroke="#3fb950" stroke-width="1.5"/>
  <text x="685" y="155" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">解密本地缓存</text>
  <text x="685" y="172" text-anchor="middle" fill="#8b949e" font-size="9">load_mcp_config()</text>

  <line x1="685" y1="180" x2="685" y2="210" stroke="#484f58" stroke-width="2"/>
  <polygon points="680,207 685,217 690,207" fill="#484f58"/>

  <rect x="620" y="215" width="130" height="30" rx="15" fill="#238636"/>
  <text x="685" y="235" text-anchor="middle" fill="#fff" font-size="12">返回配置列表</text>

  <!-- Cache MISS -->
  <line x1="390" y1="192" x2="390" y2="220" stroke="#484f58" stroke-width="2"/>
  <text x="402" y="210" fill="#f85149" font-size="10">未命中</text>
  <polygon points="385,217 390,227 395,217" fill="#484f58"/>

  <!-- Build signed request -->
  <rect x="240" y="228" width="300" height="55" rx="8" fill="#1a1e24" stroke="#f0883e" stroke-width="1.5"/>
  <text x="390" y="250" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">构建签名请求</text>
  <text x="390" y="270" text-anchor="middle" fill="#8b949e" font-size="10">bot_id + timestamp + nonce + SHA-256(secret...)</text>

  <line x1="390" y1="283" x2="390" y2="308" stroke="#484f58" stroke-width="2"/>
  <polygon points="385,305 390,315 395,305" fill="#484f58"/>

  <!-- HTTP POST -->
  <rect x="240" y="312" width="300" height="40" rx="8" fill="#1a1e24" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="390" y="337" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">POST qyapi.weixin.qq.com/.../get_mcp_config</text>

  <line x1="390" y1="352" x2="390" y2="375" stroke="#484f58" stroke-width="2"/>

  <!-- Decision: errcode -->
  <polygon points="390,375 470,400 390,425 310,400" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="390" y="404" text-anchor="middle" fill="#fff" font-size="10">errcode == 0?</text>

  <!-- Error -->
  <line x1="310" y1="400" x2="200" y2="400" stroke="#484f58" stroke-width="1.5"/>
  <text x="260" y="393" fill="#f85149" font-size="10">否</text>
  <rect x="90" y="385" width="110" height="30" rx="15" fill="#da3633"/>
  <text x="145" y="405" text-anchor="middle" fill="#fff" font-size="11">返回错误</text>

  <!-- Success -->
  <line x1="470" y1="400" x2="550" y2="400" stroke="#484f58" stroke-width="1.5"/>
  <text x="505" y="393" fill="#7ee787" font-size="10">是</text>
  <polygon points="547,395 557,400 547,405" fill="#484f58"/>

  <!-- Save to cache -->
  <rect x="558" y="376" width="200" height="50" rx="8" fill="#1a1e24" stroke="#3fb950" stroke-width="1.5"/>
  <text x="658" y="396" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">加密并缓存到本地</text>
  <text x="658" y="416" text-anchor="middle" fill="#8b949e" font-size="9">save_mcp_config() → mcp_config.enc</text>

  <!-- Side: cache file detail -->
  <rect x="30" y="228" width="185" height="100" rx="8" fill="#1a1e24" stroke="#a371f7" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="122" y="250" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="bold">McpConfigItem</text>
  <text x="42" y="270" fill="#8b949e" font-size="9">url: "https://.../{biz_type}"</text>
  <text x="42" y="286" fill="#8b949e" font-size="9">transport_type: "streamable_http"</text>
  <text x="42" y="302" fill="#8b949e" font-size="9">is_authed: true</text>
  <text x="42" y="318" fill="#8b949e" font-size="9">biz_type: "contact"</text>

  <line x1="215" y1="280" x2="240" y2="260" stroke="#a371f7" stroke-width="1" stroke-dasharray="4,2"/>
</svg>
