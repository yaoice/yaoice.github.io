<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 700" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="ibg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="780" height="700" fill="url(#ibg)" rx="12"/>
  <text x="390" y="35" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">wecom-cli init 初始化流程</text>

  <!-- Step 1 -->
  <rect x="240" y="55" width="300" height="45" rx="22" fill="#238636" filter="url(#glow)"/>
  <text x="390" y="83" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">用户执行 wecom-cli init</text>

  <line x1="390" y1="100" x2="390" y2="125" stroke="#484f58" stroke-width="2"/>
  <polygon points="385,122 390,132 395,122" fill="#484f58"/>

  <!-- Decision: refresh option -->
  <polygon points="390,135 500,175 390,215 280,175" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="390" y="179" text-anchor="middle" fill="#fff" font-size="12">--refresh 参数?</text>

  <!-- Yes branch -->
  <line x1="500" y1="175" x2="610" y2="175" stroke="#484f58" stroke-width="2"/>
  <text x="545" y="168" fill="#7ee787" font-size="11">是</text>
  <rect x="610" y="155" width="150" height="40" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="685" y="180" text-anchor="middle" fill="#e6edf3" font-size="12">刷新 MCP 配置</text>
  <line x1="685" y1="195" x2="685" y2="220" stroke="#484f58" stroke-width="2"/>
  <rect x="630" y="220" width="110" height="35" rx="17" fill="#238636"/>
  <text x="685" y="242" text-anchor="middle" fill="#fff" font-size="12">完成返回</text>

  <!-- No branch -->
  <line x1="390" y1="215" x2="390" y2="245" stroke="#484f58" stroke-width="2"/>
  <text x="400" y="235" fill="#f85149" font-size="11">否</text>
  <polygon points="385,242 390,252 395,242" fill="#484f58"/>

  <!-- Step 2: Input -->
  <rect x="240" y="255" width="300" height="50" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="390" y="276" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">交互式输入</text>
  <text x="390" y="294" text-anchor="middle" fill="#8b949e" font-size="11">cliclack: Bot ID + Bot Secret (隐藏)</text>

  <line x1="390" y1="305" x2="390" y2="330" stroke="#484f58" stroke-width="2"/>
  <polygon points="385,327 390,337 395,327" fill="#484f58"/>

  <!-- Step 3: Create Bot -->
  <rect x="240" y="335" width="300" height="45" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="390" y="355" text-anchor="middle" fill="#e6edf3" font-size="13">创建 Bot 对象</text>
  <text x="390" y="372" text-anchor="middle" fill="#8b949e" font-size="11">auth::Bot::new(id, secret)</text>

  <line x1="390" y1="380" x2="390" y2="405" stroke="#484f58" stroke-width="2"/>
  <polygon points="385,402 390,412 395,402" fill="#484f58"/>

  <!-- Step 4: Save -->
  <rect x="240" y="410" width="300" height="50" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="390" y="432" text-anchor="middle" fill="#e6edf3" font-size="13">加密存储凭证</text>
  <text x="390" y="450" text-anchor="middle" fill="#8b949e" font-size="11">auth::set_bot_info → AES-256-GCM → bot.enc</text>

  <line x1="390" y1="460" x2="390" y2="485" stroke="#484f58" stroke-width="2"/>
  <polygon points="385,482 390,492 395,482" fill="#484f58"/>

  <!-- Step 5: Verify -->
  <rect x="240" y="490" width="300" height="50" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="390" y="512" text-anchor="middle" fill="#e6edf3" font-size="13">验证凭证有效性</text>
  <text x="390" y="530" text-anchor="middle" fill="#8b949e" font-size="11">fetch_mcp_config → SHA-256 签名 → POST</text>

  <line x1="390" y1="540" x2="390" y2="570" stroke="#484f58" stroke-width="2"/>

  <!-- Decision: Success? -->
  <polygon points="390,570 480,600 390,630 300,600" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="390" y="604" text-anchor="middle" fill="#fff" font-size="12">验证成功?</text>

  <!-- Success -->
  <line x1="480" y1="600" x2="580" y2="600" stroke="#484f58" stroke-width="2"/>
  <text x="520" y="593" fill="#7ee787" font-size="11">是</text>
  <rect x="580" y="582" width="150" height="36" rx="18" fill="#238636"/>
  <text x="655" y="605" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">初始化完成</text>

  <!-- Failure -->
  <line x1="300" y1="600" x2="190" y2="600" stroke="#484f58" stroke-width="2"/>
  <text x="255" y="593" fill="#f85149" font-size="11">否</text>
  <rect x="40" y="580" width="150" height="50" rx="8" fill="#1a1e24" stroke="#f85149" stroke-width="1.5"/>
  <text x="115" y="600" text-anchor="middle" fill="#f85149" font-size="12" font-weight="bold">回滚操作</text>
  <text x="115" y="618" text-anchor="middle" fill="#8b949e" font-size="10">清除 bot.enc + mcp_config</text>

  <line x1="115" y1="630" x2="115" y2="660" stroke="#484f58" stroke-width="2"/>
  <rect x="50" y="660" width="130" height="30" rx="15" fill="#da3633"/>
  <text x="115" y="680" text-anchor="middle" fill="#fff" font-size="12">初始化失败</text>
</svg>
