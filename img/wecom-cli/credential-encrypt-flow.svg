<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="ebg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#ebg)" rx="12"/>
  <text x="400" y="32" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">凭证加密存储与读取流程</text>

  <!-- Left: Write flow -->
  <rect x="30" y="55" width="360" height="420" rx="10" fill="rgba(63,185,80,0.05)" stroke="#3fb950" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="210" y="78" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="bold">写入流程 (set_bot_info)</text>

  <rect x="60" y="95" width="300" height="35" rx="17" fill="#1f6feb"/>
  <text x="210" y="117" text-anchor="middle" fill="#fff" font-size="12">Bot { id, secret, create_time }</text>

  <line x1="210" y1="130" x2="210" y2="155" stroke="#484f58" stroke-width="2"/>
  <polygon points="205,152 210,162 215,152" fill="#484f58"/>

  <rect x="60" y="160" width="300" height="38" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="210" y="184" text-anchor="middle" fill="#e6edf3" font-size="11">① serde_json::to_vec → JSON 字节流</text>

  <line x1="210" y1="198" x2="210" y2="220" stroke="#484f58" stroke-width="2"/>
  <polygon points="205,217 210,227 215,217" fill="#484f58"/>

  <!-- Key generation -->
  <rect x="60" y="225" width="300" height="55" rx="8" fill="#1a1e24" stroke="#f0883e" stroke-width="1.5"/>
  <text x="210" y="247" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">② 加载/生成 AES-256 密钥</text>
  <text x="210" y="267" text-anchor="middle" fill="#8b949e" font-size="10">优先 OS Keyring → 回退 ~/.config/wecom/key</text>

  <line x1="210" y1="280" x2="210" y2="302" stroke="#484f58" stroke-width="2"/>
  <polygon points="205,299 210,309 215,299" fill="#484f58"/>

  <!-- Encrypt -->
  <rect x="60" y="308" width="300" height="55" rx="8" fill="#1a1e24" stroke="#a371f7" stroke-width="1.5"/>
  <text x="210" y="330" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="bold">③ AES-256-GCM 加密</text>
  <text x="210" y="350" text-anchor="middle" fill="#8b949e" font-size="10">随机 nonce(12B) + 认证 tag(16B)</text>

  <line x1="210" y1="363" x2="210" y2="385" stroke="#484f58" stroke-width="2"/>
  <polygon points="205,382 210,392 215,382" fill="#484f58"/>

  <!-- Atomic write -->
  <rect x="60" y="390" width="300" height="55" rx="8" fill="#1a1e24" stroke="#3fb950" stroke-width="1.5"/>
  <text x="210" y="412" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">④ 原子写入磁盘</text>
  <text x="210" y="432" text-anchor="middle" fill="#8b949e" font-size="10">tempfile(0o600) → write → sync → rename</text>

  <line x1="210" y1="445" x2="210" y2="462" stroke="#484f58" stroke-width="2"/>
  <rect x="120" y="455" width="180" height="18" rx="4" fill="rgba(63,185,80,0.2)"/>
  <text x="210" y="468" text-anchor="middle" fill="#3fb950" font-size="10">→ ~/.config/wecom/bot.enc</text>

  <!-- Right: Read flow -->
  <rect x="410" y="55" width="360" height="420" rx="10" fill="rgba(88,166,255,0.05)" stroke="#58a6ff" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="590" y="78" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">读取流程 (get_bot_info)</text>

  <rect x="440" y="95" width="300" height="35" rx="17" fill="rgba(88,166,255,0.2)" stroke="#58a6ff" stroke-width="1"/>
  <text x="590" y="117" text-anchor="middle" fill="#58a6ff" font-size="12">读取 ~/.config/wecom/bot.enc</text>

  <line x1="590" y1="130" x2="590" y2="155" stroke="#484f58" stroke-width="2"/>
  <polygon points="585,152 590,162 595,152" fill="#484f58"/>

  <!-- Check file exists -->
  <polygon points="590,165 660,190 590,215 520,190" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="590" y="194" text-anchor="middle" fill="#fff" font-size="10">文件存在?</text>

  <line x1="660" y1="190" x2="730" y2="190" stroke="#484f58" stroke-width="1.5"/>
  <text x="690" y="183" fill="#f85149" font-size="9">否</text>
  <rect x="720" y="177" width="40" height="26" rx="4" fill="rgba(248,81,73,0.15)"/>
  <text x="740" y="195" text-anchor="middle" fill="#f85149" font-size="10">None</text>

  <line x1="590" y1="215" x2="590" y2="240" stroke="#484f58" stroke-width="2"/>
  <text x="602" y="232" fill="#7ee787" font-size="9">是</text>
  <polygon points="585,237 590,247 595,237" fill="#484f58"/>

  <!-- Load key -->
  <rect x="440" y="245" width="300" height="48" rx="8" fill="#1a1e24" stroke="#f0883e" stroke-width="1.5"/>
  <text x="590" y="265" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">① 加载 AES-256 密钥</text>
  <text x="590" y="283" text-anchor="middle" fill="#8b949e" font-size="10">OS Keyring → 文件回退</text>

  <line x1="590" y1="293" x2="590" y2="318" stroke="#484f58" stroke-width="2"/>
  <polygon points="585,315 590,325 595,315" fill="#484f58"/>

  <!-- Decrypt -->
  <rect x="440" y="322" width="300" height="48" rx="8" fill="#1a1e24" stroke="#a371f7" stroke-width="1.5"/>
  <text x="590" y="342" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="bold">② AES-256-GCM 解密</text>
  <text x="590" y="360" text-anchor="middle" fill="#8b949e" font-size="10">分离 nonce → 解密 → 验证 tag</text>

  <line x1="590" y1="370" x2="590" y2="395" stroke="#484f58" stroke-width="2"/>

  <!-- Decision: decrypt ok? -->
  <polygon points="590,395 660,418 590,441 520,418" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="590" y="422" text-anchor="middle" fill="#fff" font-size="10">解密成功?</text>

  <line x1="660" y1="418" x2="730" y2="418" stroke="#484f58" stroke-width="1.5"/>
  <text x="690" y="411" fill="#f85149" font-size="9">否</text>
  <rect x="720" y="405" width="40" height="26" rx="4" fill="rgba(248,81,73,0.15)"/>
  <text x="740" y="423" text-anchor="middle" fill="#f85149" font-size="10">None</text>

  <line x1="590" y1="441" x2="590" y2="460" stroke="#484f58" stroke-width="2"/>
  <text x="602" y="454" fill="#7ee787" font-size="9">是</text>

  <rect x="490" y="458" width="200" height="18" rx="4" fill="rgba(63,185,80,0.2)"/>
  <text x="590" y="471" text-anchor="middle" fill="#3fb950" font-size="10">→ Some(Bot { id, secret, ... })</text>
</svg>
