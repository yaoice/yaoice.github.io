<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="jbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="860" height="520" fill="url(#jbg)" rx="12"/>
  <text x="430" y="32" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">JSON-RPC 2.0 通信与 MCP 路由流程</text>

  <!-- CLI side -->
  <rect x="30" y="55" width="350" height="440" rx="10" fill="rgba(31,111,235,0.06)" stroke="#1f6feb" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="205" y="78" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">wecom-cli 本地 (Rust)</text>

  <!-- Step 1 -->
  <rect x="55" y="95" width="300" height="38" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="205" y="119" text-anchor="middle" fill="#e6edf3" font-size="12">① 用户输入: wecom-cli contact get_userlist '{}'</text>

  <line x1="205" y1="133" x2="205" y2="155" stroke="#484f58" stroke-width="1.5"/>
  <polygon points="200,152 205,162 210,152" fill="#484f58"/>

  <!-- Step 2 -->
  <rect x="55" y="160" width="300" height="38" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="205" y="184" text-anchor="middle" fill="#e6edf3" font-size="12">② Clap 解析 → category="contact", method="get_userlist"</text>

  <line x1="205" y1="198" x2="205" y2="220" stroke="#484f58" stroke-width="1.5"/>
  <polygon points="200,217 205,227 210,217" fill="#484f58"/>

  <!-- Step 3: Get MCP URL -->
  <rect x="55" y="225" width="300" height="55" rx="8" fill="#1a1e24" stroke="#f0883e" stroke-width="1.5"/>
  <text x="205" y="248" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">③ 获取 MCP URL</text>
  <text x="205" y="268" text-anchor="middle" fill="#8b949e" font-size="10">mcp_config.enc (加密缓存) → 解密 → 匹配 biz_type</text>

  <line x1="205" y1="280" x2="205" y2="302" stroke="#484f58" stroke-width="1.5"/>
  <polygon points="200,299 205,309 210,299" fill="#484f58"/>

  <!-- Step 4: Build JSON-RPC -->
  <rect x="55" y="308" width="300" height="70" rx="8" fill="#1a1e24" stroke="#a371f7" stroke-width="1.5"/>
  <text x="205" y="328" text-anchor="middle" fill="#a371f7" font-size="12" font-weight="bold">④ 构建 JSON-RPC 2.0 请求</text>
  <text x="70" y="348" fill="#8b949e" font-size="10">{ "jsonrpc":"2.0",</text>
  <text x="70" y="362" fill="#8b949e" font-size="10">  "id":"mcp_rpc_17118..._a3f2",</text>
  <text x="70" y="376" fill="#8b949e" font-size="10">  "method":"tools/call", "params":{...} }</text>

  <line x1="205" y1="378" x2="205" y2="400" stroke="#484f58" stroke-width="1.5"/>
  <polygon points="200,397 205,407 210,397" fill="#484f58"/>

  <!-- Step 5: HTTP POST -->
  <rect x="55" y="405" width="300" height="38" rx="8" fill="#1a1e24" stroke="#3fb950" stroke-width="1.5"/>
  <text x="205" y="428" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">⑤ reqwest HTTP POST (超时 30s/120s)</text>

  <!-- Arrow to server -->
  <line x1="355" y1="424" x2="478" y2="424" stroke="#58a6ff" stroke-width="2.5"/>
  <polygon points="475,419 485,424 475,429" fill="#58a6ff"/>
  <text x="418" y="416" text-anchor="middle" fill="#58a6ff" font-size="10">HTTPS</text>

  <!-- Server side -->
  <rect x="480" y="55" width="350" height="440" rx="10" fill="rgba(240,136,62,0.06)" stroke="#f0883e" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="655" y="78" text-anchor="middle" fill="#f0883e" font-size="14" font-weight="bold">企业微信 MCP 云端服务</text>

  <!-- MCP Config endpoint -->
  <rect x="505" y="95" width="300" height="50" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="655" y="116" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">get_mcp_config API</text>
  <text x="655" y="135" text-anchor="middle" fill="#8b949e" font-size="10">qyapi.weixin.qq.com/cgi-bin/aibot/cli/get_mcp_config</text>

  <!-- Down arrow -->
  <line x1="655" y1="145" x2="655" y2="165" stroke="#484f58" stroke-width="1.5"/>
  <polygon points="650,162 655,172 660,162" fill="#484f58"/>

  <!-- Returns config list -->
  <rect x="505" y="170" width="300" height="80" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="655" y="192" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">返回 MCP 配置列表</text>
  <text x="520" y="212" fill="#8b949e" font-size="10">{ biz_type: "contact", url: "https://..../contact" }</text>
  <text x="520" y="228" fill="#8b949e" font-size="10">{ biz_type: "doc",     url: "https://..../doc" }</text>
  <text x="520" y="244" fill="#8b949e" font-size="10">{ biz_type: "meeting", url: "https://..../meeting" }</text>

  <!-- Dashed line from config to step 3 -->
  <line x1="505" y1="210" x2="355" y2="252" stroke="#f0883e" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- MCP Service endpoints -->
  <rect x="505" y="275" width="300" height="55" rx="8" fill="#1a1e24" stroke="#3fb950" stroke-width="1.5"/>
  <text x="655" y="298" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">独立 MCP 服务端点</text>
  <text x="655" y="318" text-anchor="middle" fill="#8b949e" font-size="10">每个 biz_type 对应独立的服务 URL (微服务化)</text>

  <!-- tools/list & tools/call -->
  <rect x="505" y="350" width="140" height="55" rx="8" fill="#1a1e24" stroke="#a371f7" stroke-width="1.5"/>
  <text x="575" y="372" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="bold">tools/list</text>
  <text x="575" y="393" text-anchor="middle" fill="#8b949e" font-size="10">返回工具列表</text>

  <rect x="665" y="350" width="140" height="55" rx="8" fill="#1a1e24" stroke="#a371f7" stroke-width="1.5"/>
  <text x="735" y="372" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="bold">tools/call</text>
  <text x="735" y="393" text-anchor="middle" fill="#8b949e" font-size="10">执行工具方法</text>

  <!-- Response arrow -->
  <line x1="478" y1="440" x2="355" y2="440" stroke="#3fb950" stroke-width="2.5"/>
  <polygon points="358,435 348,440 358,445" fill="#3fb950"/>
  <text x="418" y="456" text-anchor="middle" fill="#3fb950" font-size="10">JSON 响应</text>

  <!-- Step 6: Parse result -->
  <rect x="55" y="455" width="300" height="28" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="205" y="474" text-anchor="middle" fill="#e6edf3" font-size="11">⑥ 解析响应 → 输出 result (或拦截媒体)</text>

  <!-- Lines from endpoints to arrows -->
  <line x1="575" y1="405" x2="575" y2="424" stroke="#484f58" stroke-width="1"/>
  <line x1="735" y1="405" x2="735" y2="424" stroke="#484f58" stroke-width="1"/>
  <line x1="575" y1="424" x2="735" y2="424" stroke="#484f58" stroke-width="1"/>
  <line x1="655" y1="424" x2="655" y2="440" stroke="#484f58" stroke-width="1"/>
</svg>
