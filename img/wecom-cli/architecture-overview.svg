<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#533483;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2b580c;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1a936f;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c84b31;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#e98580;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <text x="450" y="40" text-anchor="middle" fill="#eee" font-size="22" font-weight="bold">wecom-cli 整体架构图</text>

  <!-- Layer 1: npm 分发层 -->
  <rect x="40" y="60" width="820" height="90" rx="10" fill="url(#layer1)" filter="url(#shadow)"/>
  <text x="60" y="85" fill="#fff" font-size="13" font-weight="bold" opacity="0.8">npm 分发层</text>
  <text x="450" y="95" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">@wecom/cli (Node.js Wrapper)</text>
  <rect x="80" y="108" width="160" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="160" y="128" text-anchor="middle" fill="#fff" font-size="12">bin/wecom.js</text>
  <rect x="260" y="108" width="160" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="340" y="128" text-anchor="middle" fill="#fff" font-size="12">平台检测 &amp; 路由</text>
  <rect x="440" y="108" width="140" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="510" y="128" text-anchor="middle" fill="#fff" font-size="12">darwin-arm64</text>
  <rect x="600" y="108" width="110" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="655" y="128" text-anchor="middle" fill="#fff" font-size="12">linux-x64</text>
  <rect x="730" y="108" width="110" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="785" y="128" text-anchor="middle" fill="#fff" font-size="12">win32-x64</text>

  <!-- Arrow -->
  <line x1="450" y1="152" x2="450" y2="170" stroke="#aaa" stroke-width="2" marker-end="url(#arrowhead)"/>
  <polygon points="445,168 450,178 455,168" fill="#aaa"/>

  <!-- Layer 2: Rust CLI 核心层 -->
  <rect x="40" y="180" width="820" height="140" rx="10" fill="url(#layer2)" filter="url(#shadow)"/>
  <text x="60" y="205" fill="#fff" font-size="13" font-weight="bold" opacity="0.8">Rust CLI 核心层</text>
  <text x="450" y="205" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">Rust 二进制 (Tokio + Clap)</text>

  <rect x="60" y="220" width="120" height="45" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="120" y="238" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">main.rs</text>
  <text x="120" y="255" text-anchor="middle" fill="#ddd" font-size="10">入口 &amp; 路由</text>

  <rect x="200" y="220" width="120" height="45" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="260" y="238" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">cmd/init.rs</text>
  <text x="260" y="255" text-anchor="middle" fill="#ddd" font-size="10">凭证初始化</text>

  <rect x="340" y="220" width="120" height="45" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="400" y="238" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">cmd/call.rs</text>
  <text x="400" y="255" text-anchor="middle" fill="#ddd" font-size="10">工具调用分发</text>

  <rect x="480" y="220" width="120" height="45" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="540" y="238" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">json_rpc.rs</text>
  <text x="540" y="255" text-anchor="middle" fill="#ddd" font-size="10">JSON-RPC 2.0</text>

  <rect x="620" y="220" width="110" height="45" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="675" y="238" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">help.rs</text>
  <text x="675" y="255" text-anchor="middle" fill="#ddd" font-size="10">动态帮助</text>

  <rect x="750" y="220" width="95" height="45" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="797" y="238" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">logging.rs</text>
  <text x="797" y="255" text-anchor="middle" fill="#ddd" font-size="10">日志系统</text>

  <rect x="60" y="275" width="120" height="35" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="120" y="297" text-anchor="middle" fill="#fff" font-size="11">config.rs</text>

  <rect x="200" y="275" width="120" height="35" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="260" y="297" text-anchor="middle" fill="#fff" font-size="11">constants.rs</text>

  <rect x="340" y="275" width="120" height="35" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="400" y="297" text-anchor="middle" fill="#fff" font-size="11">fs_util.rs</text>

  <!-- Arrow -->
  <polygon points="445,322 450,332 455,322" fill="#aaa"/>

  <!-- Layer 3: 安全与存储层 -->
  <rect x="40" y="340" width="820" height="100" rx="10" fill="url(#layer3)" filter="url(#shadow)"/>
  <text x="60" y="365" fill="#fff" font-size="13" font-weight="bold" opacity="0.8">安全与存储层</text>

  <rect x="60" y="378" width="180" height="50" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="150" y="398" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">auth 模块</text>
  <text x="150" y="418" text-anchor="middle" fill="#ddd" font-size="10">Bot 凭证加密存储 &amp; 读取</text>

  <rect x="260" y="378" width="180" height="50" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="350" y="398" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">crypto 模块</text>
  <text x="350" y="418" text-anchor="middle" fill="#ddd" font-size="10">AES-256-GCM + Keyring</text>

  <rect x="460" y="378" width="180" height="50" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="550" y="398" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">mcp/config 模块</text>
  <text x="550" y="418" text-anchor="middle" fill="#ddd" font-size="10">MCP 配置加密缓存</text>

  <rect x="660" y="378" width="180" height="50" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="750" y="398" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">media 模块</text>
  <text x="750" y="418" text-anchor="middle" fill="#ddd" font-size="10">媒体文件下载 &amp; 去重</text>

  <!-- Arrow -->
  <polygon points="445,442 450,452 455,442" fill="#aaa"/>

  <!-- Layer 4: 外部服务层 -->
  <rect x="40" y="460" width="820" height="80" rx="10" fill="url(#layer4)" filter="url(#shadow)"/>
  <text x="60" y="485" fill="#fff" font-size="13" font-weight="bold" opacity="0.8">外部服务层</text>
  <text x="450" y="485" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">企业微信 MCP 云端服务</text>

  <rect x="80" y="500" width="200" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="180" y="520" text-anchor="middle" fill="#fff" font-size="12">qyapi.weixin.qq.com</text>
  <rect x="300" y="500" width="200" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="400" y="520" text-anchor="middle" fill="#fff" font-size="12">get_mcp_config API</text>
  <rect x="520" y="500" width="150" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="595" y="520" text-anchor="middle" fill="#fff" font-size="12">tools/list</text>
  <rect x="690" y="500" width="150" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="765" y="520" text-anchor="middle" fill="#fff" font-size="12">tools/call</text>

  <!-- AI Agent Skills Layer -->
  <rect x="40" y="555" width="820" height="55" rx="10" fill="rgba(100,100,200,0.3)" stroke="#7b68ee" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="578" fill="#b8b8ff" font-size="13" font-weight="bold">AI Agent Skills</text>
  <text x="200" y="590" fill="#ddd" font-size="11">wecomcli-lookup-contact | wecomcli-create-meeting | wecomcli-manage-doc | wecomcli-get-msg | ...</text>
  <text x="200" y="578" fill="#ddd" font-size="11">12 个预定义 SKILL.md 技能文件，供 AI Agent 直接调用 wecom-cli 命令</text>
</svg>
