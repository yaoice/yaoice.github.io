<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 580" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="cbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="850" height="580" fill="url(#cbg)" rx="12"/>
  <text x="425" y="35" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">wecom-cli 命令调用流程 (tools/call)</text>

  <!-- User Input -->
  <rect x="50" y="55" width="280" height="45" rx="22" fill="#238636"/>
  <text x="190" y="83" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">wecom-cli contact get_userlist '{}'</text>

  <line x1="190" y1="100" x2="190" y2="130" stroke="#484f58" stroke-width="2"/>
  <polygon points="185,127 190,137 195,127" fill="#484f58"/>

  <!-- Parse -->
  <rect x="90" y="135" width="200" height="40" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="190" y="160" text-anchor="middle" fill="#e6edf3" font-size="12">Clap 解析: category=contact</text>

  <line x1="190" y1="175" x2="190" y2="200" stroke="#484f58" stroke-width="2"/>
  <polygon points="185,197 190,207 195,197" fill="#484f58"/>

  <!-- Validate Category -->
  <rect x="70" y="205" width="240" height="40" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="190" y="230" text-anchor="middle" fill="#e6edf3" font-size="12">校验 category 有效性 (config.rs)</text>

  <line x1="190" y1="245" x2="190" y2="270" stroke="#484f58" stroke-width="2"/>
  <polygon points="185,267 190,277 195,267" fill="#484f58"/>

  <!-- Get MCP URL -->
  <rect x="50" y="275" width="280" height="50" rx="8" fill="#1a1e24" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="190" y="296" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">获取 MCP URL</text>
  <text x="190" y="314" text-anchor="middle" fill="#8b949e" font-size="10">mcp::get_mcp_url("contact")</text>

  <!-- MCP Config cache -->
  <rect x="400" y="135" width="200" height="80" rx="8" fill="#1a1e24" stroke="#f0883e" stroke-width="1.5"/>
  <text x="500" y="160" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">MCP 配置缓存</text>
  <text x="500" y="180" text-anchor="middle" fill="#8b949e" font-size="10">mcp_config.enc (本地加密)</text>
  <text x="500" y="196" text-anchor="middle" fill="#8b949e" font-size="10">优先缓存 → 未命中则远程拉取</text>

  <line x1="330" y1="300" x2="400" y2="200" stroke="#484f58" stroke-width="1.5" stroke-dasharray="5,3"/>

  <line x1="190" y1="325" x2="190" y2="355" stroke="#484f58" stroke-width="2"/>
  <polygon points="185,352 190,362 195,352" fill="#484f58"/>

  <!-- Build JSON-RPC -->
  <rect x="50" y="360" width="280" height="60" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1.5"/>
  <text x="190" y="385" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">构建 JSON-RPC 2.0 请求</text>
  <text x="190" y="405" text-anchor="middle" fill="#8b949e" font-size="10">method: "tools/call" | params: {name, arguments}</text>

  <!-- JSON-RPC detail -->
  <rect x="400" y="330" width="230" height="120" rx="8" fill="#1a1e24" stroke="#a371f7" stroke-width="1.5"/>
  <text x="515" y="352" text-anchor="middle" fill="#a371f7" font-size="12" font-weight="bold">JsonRpcRequest</text>
  <text x="415" y="372" fill="#8b949e" font-size="11">jsonrpc: "2.0"</text>
  <text x="415" y="390" fill="#8b949e" font-size="11">id: "mcp_rpc_{ts}_{hex}"</text>
  <text x="415" y="408" fill="#8b949e" font-size="11">method: "tools/call"</text>
  <text x="415" y="426" fill="#8b949e" font-size="11">params: {name, arguments}</text>
  <text x="415" y="444" fill="#8b949e" font-size="11">timeout: 30s (media: 120s)</text>

  <line x1="330" y1="390" x2="400" y2="390" stroke="#484f58" stroke-width="1.5" stroke-dasharray="5,3"/>

  <line x1="190" y1="420" x2="190" y2="455" stroke="#484f58" stroke-width="2"/>
  <polygon points="185,452 190,462 195,452" fill="#484f58"/>

  <!-- HTTP POST -->
  <rect x="70" y="460" width="240" height="40" rx="8" fill="#1a1e24" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="190" y="485" text-anchor="middle" fill="#58a6ff" font-size="13">reqwest POST → MCP Server</text>

  <line x1="190" y1="500" x2="190" y2="530" stroke="#484f58" stroke-width="2"/>
  <polygon points="185,527 190,537 195,527" fill="#484f58"/>

  <!-- Result -->
  <rect x="50" y="535" width="130" height="35" rx="17" fill="#238636"/>
  <text x="115" y="557" text-anchor="middle" fill="#fff" font-size="12">输出 result</text>

  <!-- Media intercept -->
  <rect x="210" y="535" width="200" height="35" rx="17" fill="#da3633"/>
  <text x="310" y="557" text-anchor="middle" fill="#fff" font-size="11">media: 拦截并保存文件</text>

  <!-- Right side: Enterprise WeChat Server -->
  <rect x="660" y="55" width="170" height="240" rx="10" fill="#1a1e24" stroke="#f78166" stroke-width="2"/>
  <text x="745" y="80" text-anchor="middle" fill="#f78166" font-size="14" font-weight="bold">企业微信</text>
  <text x="745" y="100" text-anchor="middle" fill="#f78166" font-size="14" font-weight="bold">MCP Server</text>
  <line x1="675" y1="110" x2="815" y2="110" stroke="#30363d" stroke-width="1"/>
  <text x="745" y="135" text-anchor="middle" fill="#8b949e" font-size="11">contact (通讯录)</text>
  <text x="745" y="155" text-anchor="middle" fill="#8b949e" font-size="11">doc (文档)</text>
  <text x="745" y="175" text-anchor="middle" fill="#8b949e" font-size="11">meeting (会议)</text>
  <text x="745" y="195" text-anchor="middle" fill="#8b949e" font-size="11">msg (消息)</text>
  <text x="745" y="215" text-anchor="middle" fill="#8b949e" font-size="11">schedule (日程)</text>
  <text x="745" y="235" text-anchor="middle" fill="#8b949e" font-size="11">todo (待办)</text>
  <text x="745" y="265" text-anchor="middle" fill="#8b949e" font-size="11">每个品类独立 URL</text>

  <line x1="310" y1="485" x2="660" y2="200" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="490" y="340" fill="#58a6ff" font-size="11">HTTP POST (JSON-RPC)</text>
</svg>
