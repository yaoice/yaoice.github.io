<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="1" stop-color="#f3efe7"/>
    </linearGradient>
    <pattern id="grid4" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#e9e2d3" stroke-width="0.5"/>
    </pattern>
    <filter id="shadow4" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#c1b48e" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="640" fill="url(#bg4)"/>
  <rect width="1200" height="640" fill="url(#grid4)"/>

  <text x="600" y="54" text-anchor="middle" font-size="26" font-weight="700" fill="#2a2a2a">四家客户 × 三大子行业：Claude 在金融服务的落地地形图</text>
  <text x="600" y="84" text-anchor="middle" font-size="15" fill="#6b6557">左侧是公开露出的头部客户，右侧是三大子行业里 Claude 正被拿来解决的耗时任务</text>

  <!-- 左侧：四个客户卡 -->
  <g font-size="12">
    <text x="220" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#9a6b1e">已公开的头部客户</text>

    <g filter="url(#shadow4)">
      <rect x="90" y="150" width="270" height="80" rx="10" fill="#ffffff" stroke="#e4c98b"/>
      <circle cx="125" cy="190" r="22" fill="#fde6a0"/>
      <text x="125" y="196" text-anchor="middle" font-size="16" font-weight="700" fill="#5c3b06">AIG</text>
      <text x="160" y="182" font-size="14" font-weight="700" fill="#2a2a2a">AIG · 全球保险</text>
      <text x="160" y="202" font-size="12" fill="#444">承保 / 理赔文档密集的</text>
      <text x="160" y="218" font-size="12" fill="#444">重型业务 AI 化样板</text>
    </g>

    <g filter="url(#shadow4)">
      <rect x="90" y="245" width="270" height="80" rx="10" fill="#ffffff" stroke="#e4c98b"/>
      <circle cx="125" cy="285" r="22" fill="#fde6a0"/>
      <text x="125" y="291" text-anchor="middle" font-size="13" font-weight="700" fill="#5c3b06">CBA</text>
      <text x="160" y="277" font-size="14" font-weight="700" fill="#2a2a2a">Commonwealth Bank</text>
      <text x="160" y="297" font-size="12" fill="#444">澳洲头部零售 / 商业银行</text>
      <text x="160" y="313" font-size="12" fill="#444">全员生产力 + 运营自动化</text>
    </g>

    <g filter="url(#shadow4)">
      <rect x="90" y="340" width="270" height="80" rx="10" fill="#ffffff" stroke="#e4c98b"/>
      <circle cx="125" cy="380" r="22" fill="#fde6a0"/>
      <text x="125" y="386" text-anchor="middle" font-size="13" font-weight="700" fill="#5c3b06">IG</text>
      <text x="160" y="372" font-size="14" font-weight="700" fill="#2a2a2a">IG Group</text>
      <text x="160" y="392" font-size="12" fill="#444">经纪 / 零售投资平台</text>
      <text x="160" y="408" font-size="12" fill="#444">交易研究 + 客服运营</text>
    </g>

    <g filter="url(#shadow4)">
      <rect x="90" y="435" width="270" height="80" rx="10" fill="#ffffff" stroke="#e4c98b"/>
      <circle cx="125" cy="475" r="22" fill="#fde6a0"/>
      <text x="125" y="481" text-anchor="middle" font-size="12" font-weight="700" fill="#5c3b06">Moody's</text>
      <text x="160" y="467" font-size="14" font-weight="700" fill="#2a2a2a">Moody's</text>
      <text x="160" y="487" font-size="12" fill="#444">评级 / 研究数据供应商</text>
      <text x="160" y="503" font-size="12" fill="#444">内部研究流水线提速</text>
    </g>
  </g>

  <!-- 右侧：三大子行业与用例 -->
  <g font-size="12">
    <text x="800" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#2350a0">按子行业组织的典型用例</text>

    <g filter="url(#shadow4)">
      <rect x="430" y="150" width="720" height="115" rx="12" fill="#fff8e7" stroke="#e4c98b"/>
      <rect x="430" y="150" width="8" height="115" fill="#f6c96a"/>
      <text x="455" y="180" font-size="15" font-weight="700" fill="#9a6b1e">投资银行 & 私募股权</text>
      <text x="455" y="205" font-size="13" fill="#2a2a2a">核心痛点：承揽材料 / 尽调 / 投委会备忘的"时间税"</text>
      <text x="455" y="226" font-size="12" fill="#444">• Pitch Builder 自动拼材料 · Deal Memo 抽取关键事实</text>
      <text x="455" y="245" font-size="12" fill="#444">• Market Researcher 做行业地图 · Model Reviewer 做内模合规审查</text>
    </g>

    <g filter="url(#shadow4)">
      <rect x="430" y="285" width="720" height="115" rx="12" fill="#eaf6ee" stroke="#8dc4a1"/>
      <rect x="430" y="285" width="8" height="115" fill="#7fc293"/>
      <text x="455" y="315" font-size="15" font-weight="700" fill="#1f6b50">财富管理 & 资管</text>
      <text x="455" y="340" font-size="13" fill="#2a2a2a">核心痛点：客户个性化 + 研究复用 + 合规留痕</text>
      <text x="455" y="361" font-size="12" fill="#444">• Client Outreach 生成差异化沟通 · 投研纪要自动整理</text>
      <text x="455" y="380" font-size="12" fill="#444">• 合规审查 Agent 监管问询 · 产品适配度分析</text>
    </g>

    <g filter="url(#shadow4)">
      <rect x="430" y="420" width="720" height="115" rx="12" fill="#ecf1fa" stroke="#94a9d0"/>
      <rect x="430" y="420" width="8" height="115" fill="#7e96c8"/>
      <text x="455" y="450" font-size="15" font-weight="700" fill="#2350a0">零售 & 商业银行</text>
      <text x="455" y="475" font-size="13" fill="#2a2a2a">核心痛点：海量小额决策 + 客服 + 后台对账</text>
      <text x="455" y="496" font-size="12" fill="#444">• KYC Screener 批量初审 · Underwriting 信贷核保辅助</text>
      <text x="455" y="515" font-size="12" fill="#444">• Claims Triage 分流 · GL Reconciler / Month-End Closer 做后台关账</text>
    </g>
  </g>

  <!-- 底部说明 -->
  <g>
    <rect x="90" y="555" width="1060" height="55" rx="10" fill="#fff" stroke="#e0d7bf"/>
    <text x="110" y="582" font-size="13" fill="#2a2a2a" font-weight="600">读图方式：</text>
    <text x="195" y="582" font-size="13" fill="#444">先从右侧找到自己所在的子行业 → 对照上面产品矩阵决定用哪几款 Claude → 再对照三阶段 Playbook 排路线。</text>
    <text x="110" y="602" font-size="12" fill="#8a8270">左侧客户案例只是"别人已经趟过的坑"的可信度背书，真正复用时需要把你们行的数据源 / 审计 / SOP 替换进去。</text>
  </g>
</svg>
