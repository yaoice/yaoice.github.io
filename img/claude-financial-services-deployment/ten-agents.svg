<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="1" stop-color="#f3efe7"/>
    </linearGradient>
    <pattern id="grid2" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#e9e2d3" stroke-width="0.5"/>
    </pattern>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#c1b48e" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg2)"/>
  <rect width="1200" height="700" fill="url(#grid2)"/>

  <text x="600" y="54" text-anchor="middle" font-size="26" font-weight="700" fill="#2a2a2a">10 个"开箱即用"的金融 Agent 模板覆盖了前中后台的耗时环节</text>
  <text x="600" y="84" text-anchor="middle" font-size="15" fill="#6b6557">Anthropic 已交付的参考架构：左=前台获客 / 交易；中=中台风控 / 合规；右=后台运营 / 财务</text>

  <!-- 三列分组标签 -->
  <g font-size="14" font-weight="700">
    <rect x="70" y="115" width="340" height="34" rx="8" fill="#fdeacb" stroke="#e4c98b"/>
    <text x="240" y="138" text-anchor="middle" fill="#9a6b1e">前台 · 客户 / 交易 / 研究</text>
    <rect x="430" y="115" width="340" height="34" rx="8" fill="#e6f3e9" stroke="#8dc4a1"/>
    <text x="600" y="138" text-anchor="middle" fill="#1f6b50">中台 · 风险 / 合规 / 模型</text>
    <rect x="790" y="115" width="340" height="34" rx="8" fill="#e6ecf7" stroke="#94a9d0"/>
    <text x="960" y="138" text-anchor="middle" fill="#2350a0">后台 · 运营 / 财务 / 报表</text>
  </g>

  <!-- 卡片：每个 Agent 宽 160 高 110 -->
  <!-- 前台组：Pitch Builder / Market Researcher / Deal Memo / Client Outreach -->
  <g font-size="12">
    <!-- row 1 -->
    <g filter="url(#shadow2)">
      <rect x="85" y="170" width="155" height="110" rx="10" fill="#ffffff" stroke="#e4c98b"/>
      <text x="100" y="195" font-size="16">📝</text>
      <text x="125" y="197" font-size="14" font-weight="700" fill="#2a2a2a">Pitch Builder</text>
      <text x="100" y="220" fill="#444">自动拼装推介材料</text>
      <text x="100" y="238" fill="#8a8270">输入：公司 / 交易背景</text>
      <text x="100" y="256" fill="#8a8270">产出：可改的 PPT 草稿</text>
    </g>
    <g filter="url(#shadow2)">
      <rect x="250" y="170" width="155" height="110" rx="10" fill="#ffffff" stroke="#e4c98b"/>
      <text x="265" y="195" font-size="16">🔎</text>
      <text x="290" y="197" font-size="14" font-weight="700" fill="#2a2a2a">Market Researcher</text>
      <text x="265" y="220" fill="#444">行业 / 赛道速报</text>
      <text x="265" y="238" fill="#8a8270">多源聚合 + 引用</text>
      <text x="265" y="256" fill="#8a8270">给交易和投研复用</text>
    </g>
    <!-- row 2 -->
    <g filter="url(#shadow2)">
      <rect x="85" y="300" width="155" height="110" rx="10" fill="#ffffff" stroke="#e4c98b"/>
      <text x="100" y="325" font-size="16">📑</text>
      <text x="125" y="327" font-size="14" font-weight="700" fill="#2a2a2a">Deal Memo</text>
      <text x="100" y="350" fill="#444">尽调要点速写</text>
      <text x="100" y="368" fill="#8a8270">扫财报 / 合同 / CIM</text>
      <text x="100" y="386" fill="#8a8270">输出结构化备忘</text>
    </g>
    <g filter="url(#shadow2)">
      <rect x="250" y="300" width="155" height="110" rx="10" fill="#ffffff" stroke="#e4c98b"/>
      <text x="265" y="325" font-size="16">✉️</text>
      <text x="290" y="327" font-size="14" font-weight="700" fill="#2a2a2a">Client Outreach</text>
      <text x="265" y="350" fill="#444">差异化客户触达</text>
      <text x="265" y="368" fill="#8a8270">结合 CRM + 新闻</text>
      <text x="265" y="386" fill="#8a8270">生成个性化话术</text>
    </g>
  </g>

  <!-- 中台组：KYC Screener / Model Reviewer / Underwriting / Claims Triage -->
  <g font-size="12">
    <g filter="url(#shadow2)">
      <rect x="445" y="170" width="155" height="110" rx="10" fill="#ffffff" stroke="#8dc4a1"/>
      <text x="460" y="195" font-size="16">🛡️</text>
      <text x="485" y="197" font-size="14" font-weight="700" fill="#2a2a2a">KYC Screener</text>
      <text x="460" y="220" fill="#444">反洗钱初审</text>
      <text x="460" y="238" fill="#8a8270">制裁名单 / 风险标签</text>
      <text x="460" y="256" fill="#8a8270">人审前自动排队</text>
    </g>
    <g filter="url(#shadow2)">
      <rect x="610" y="170" width="155" height="110" rx="10" fill="#ffffff" stroke="#8dc4a1"/>
      <text x="625" y="195" font-size="16">🧪</text>
      <text x="650" y="197" font-size="14" font-weight="700" fill="#2a2a2a">Model Reviewer</text>
      <text x="625" y="220" fill="#444">内部模型合规审查</text>
      <text x="625" y="238" fill="#8a8270">比对模型卡 / 文档</text>
      <text x="625" y="256" fill="#8a8270">给监管审计留痕</text>
    </g>
    <g filter="url(#shadow2)">
      <rect x="445" y="300" width="155" height="110" rx="10" fill="#ffffff" stroke="#8dc4a1"/>
      <text x="460" y="325" font-size="16">📋</text>
      <text x="485" y="327" font-size="14" font-weight="700" fill="#2a2a2a">Underwriting</text>
      <text x="460" y="350" fill="#444">保单 / 信贷核保</text>
      <text x="460" y="368" fill="#8a8270">读材料 → 给建议</text>
      <text x="460" y="386" fill="#8a8270">人类做最终决策</text>
    </g>
    <g filter="url(#shadow2)">
      <rect x="610" y="300" width="155" height="110" rx="10" fill="#ffffff" stroke="#8dc4a1"/>
      <text x="625" y="325" font-size="16">🚑</text>
      <text x="650" y="327" font-size="14" font-weight="700" fill="#2a2a2a">Claims Triage</text>
      <text x="625" y="350" fill="#444">理赔分流</text>
      <text x="625" y="368" fill="#8a8270">按金额 / 复杂度路由</text>
      <text x="625" y="386" fill="#8a8270">缩短首次响应时效</text>
    </g>
  </g>

  <!-- 后台组：GL Reconciler / Month-End Closer -->
  <g font-size="12">
    <g filter="url(#shadow2)">
      <rect x="805" y="170" width="155" height="110" rx="10" fill="#ffffff" stroke="#94a9d0"/>
      <text x="820" y="195" font-size="16">📒</text>
      <text x="845" y="197" font-size="14" font-weight="700" fill="#2a2a2a">GL Reconciler</text>
      <text x="820" y="220" fill="#444">总账对账</text>
      <text x="820" y="238" fill="#8a8270">跨系统抓数对齐</text>
      <text x="820" y="256" fill="#8a8270">自动标出差异项</text>
    </g>
    <g filter="url(#shadow2)">
      <rect x="970" y="170" width="155" height="110" rx="10" fill="#ffffff" stroke="#94a9d0"/>
      <text x="985" y="195" font-size="16">📆</text>
      <text x="1010" y="197" font-size="14" font-weight="700" fill="#2a2a2a">Month-End Closer</text>
      <text x="985" y="220" fill="#444">月结收尾编排</text>
      <text x="985" y="238" fill="#8a8270">按清单驱动关账任务</text>
      <text x="985" y="256" fill="#8a8270">异常时回落人工</text>
    </g>
    <g filter="url(#shadow2)">
      <rect x="805" y="300" width="320" height="110" rx="10" fill="#f5f8fe" stroke="#94a9d0"/>
      <text x="820" y="325" font-size="16">＋</text>
      <text x="845" y="327" font-size="14" font-weight="700" fill="#2a2a2a">自定义 Agent</text>
      <text x="820" y="352" font-size="12" fill="#444">基于 Claude Managed Agents 或 Platform 自建，</text>
      <text x="820" y="370" font-size="12" fill="#444">复用上述模板里的工具接入、审计、降级模式。</text>
      <text x="820" y="394" font-size="12" fill="#2350a0" font-weight="600">官方已预置的脚手架可直接 Fork</text>
    </g>
  </g>

  <!-- 底部：输入→处理→产出通用流程条 -->
  <g font-size="13">
    <rect x="85" y="450" width="1040" height="180" rx="12" fill="#ffffff" stroke="#e0d7bf"/>
    <text x="605" y="478" text-anchor="middle" font-size="15" font-weight="700" fill="#2a2a2a">所有模板共用的"三件套"骨架</text>

    <!-- box 1 -->
    <rect x="120" y="500" width="260" height="110" rx="10" fill="#fff6e0" stroke="#e4c98b"/>
    <text x="250" y="528" text-anchor="middle" font-weight="700" fill="#9a6b1e">① 受控数据接入</text>
    <text x="250" y="552" text-anchor="middle" fill="#444">企业网盘 / CRM / 交易系统</text>
    <text x="250" y="572" text-anchor="middle" fill="#444">数据不离开客户租户</text>
    <text x="250" y="594" text-anchor="middle" fill="#8a8270">权限按现有 IAM 沿用</text>

    <!-- arrow -->
    <polygon points="390,555 420,545 420,565" fill="#b8a263"/>

    <!-- box 2 -->
    <rect x="430" y="500" width="260" height="110" rx="10" fill="#e6f3e9" stroke="#8dc4a1"/>
    <text x="560" y="528" text-anchor="middle" font-weight="700" fill="#1f6b50">② Agent 编排 + 审计</text>
    <text x="560" y="552" text-anchor="middle" fill="#444">步骤可追溯，每步留证据</text>
    <text x="560" y="572" text-anchor="middle" fill="#444">人审卡点可配置</text>
    <text x="560" y="594" text-anchor="middle" fill="#8a8270">失败路径显式回落</text>

    <polygon points="700,555 730,545 730,565" fill="#8dc4a1"/>

    <!-- box 3 -->
    <rect x="740" y="500" width="260" height="110" rx="10" fill="#e6ecf7" stroke="#94a9d0"/>
    <text x="870" y="528" text-anchor="middle" font-weight="700" fill="#2350a0">③ 结构化交付</text>
    <text x="870" y="552" text-anchor="middle" fill="#444">直接落到 Excel / 报表 / 工单</text>
    <text x="870" y="572" text-anchor="middle" fill="#444">带引用 / 带不确定度说明</text>
    <text x="870" y="594" text-anchor="middle" fill="#8a8270">人继续加工而不是推翻</text>
  </g>

  <text x="600" y="672" text-anchor="middle" font-size="12" fill="#8a8270">这 10 个 Agent 不是"最终产品"，而是经过验证的骨架，机构可以在其上替换数据源、加内部策略、接自己的审计系统。</text>
</svg>
