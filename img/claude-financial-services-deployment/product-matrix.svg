<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="1" stop-color="#f3efe7"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#e9e2d3" stroke-width="0.5"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#c1b48e" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f6f1e6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <rect width="1200" height="680" fill="url(#grid)"/>

  <!-- 主题句 -->
  <text x="600" y="56" text-anchor="middle" font-size="26" font-weight="700" fill="#2a2a2a">六款 Claude 产品各就各位：从日常问答到大规模 Agent 交付，全栈一张图</text>
  <text x="600" y="88" text-anchor="middle" font-size="15" fill="#6b6557">按"谁用 / 在哪用 / 解决什么问题"三条线给金融机构的 AI 负责人做选型参考</text>

  <!-- 纵轴分组：左=日常使用，中=专业生产力，右=平台能力 -->
  <g font-size="13" fill="#8a8270">
    <text x="200" y="130" text-anchor="middle" font-weight="700" fill="#9a6b1e">日常使用层</text>
    <text x="600" y="130" text-anchor="middle" font-weight="700" fill="#1f6b50">专业生产力层</text>
    <text x="1000" y="130" text-anchor="middle" font-weight="700" fill="#2350a0">平台与 Agent 层</text>
  </g>

  <!-- 卡片通用参数：宽 260 高 190 -->
  <!-- Claude Chat -->
  <g filter="url(#shadow)">
    <rect x="70" y="150" width="260" height="190" rx="14" fill="url(#g1)" stroke="#e1d6ba"/>
    <circle cx="110" cy="190" r="18" fill="#f4e5c4"/>
    <text x="110" y="196" text-anchor="middle" font-size="20">💬</text>
    <text x="145" y="185" font-size="17" font-weight="700" fill="#2a2a2a">Claude Chat</text>
    <text x="145" y="205" font-size="12" fill="#8a8270">问答 · 研究 · 草稿</text>
    <text x="90" y="240" font-size="13" fill="#444">适合：分析师、一线用户</text>
    <text x="90" y="262" font-size="13" fill="#444">场景：市场速查、撰写纪要、</text>
    <text x="90" y="280" font-size="13" fill="#444">邮件改写、辅助投研阅读</text>
    <rect x="90" y="300" width="160" height="24" rx="12" fill="#fff6e0" stroke="#e4c98b"/>
    <text x="170" y="317" text-anchor="middle" font-size="12" fill="#9a6b1e" font-weight="600">最低门槛 · 先从这里切入</text>
  </g>

  <!-- Claude for Microsoft 365 -->
  <g filter="url(#shadow)">
    <rect x="70" y="360" width="260" height="190" rx="14" fill="url(#g1)" stroke="#e1d6ba"/>
    <circle cx="110" cy="400" r="18" fill="#f4e5c4"/>
    <text x="110" y="407" text-anchor="middle" font-size="18">📊</text>
    <text x="145" y="395" font-size="17" font-weight="700" fill="#2a2a2a">Claude for M365</text>
    <text x="145" y="415" font-size="12" fill="#8a8270">Excel / PPT / Word / Outlook</text>
    <text x="90" y="450" font-size="13" fill="#444">适合：所有在 M365 里工作的岗位</text>
    <text x="90" y="472" font-size="13" fill="#444">场景：建模、估值 deck、</text>
    <text x="90" y="490" font-size="13" fill="#444">尽调备忘、邮件起草</text>
    <rect x="90" y="510" width="160" height="24" rx="12" fill="#fff6e0" stroke="#e4c98b"/>
    <text x="170" y="527" text-anchor="middle" font-size="12" fill="#9a6b1e" font-weight="600">覆盖最大工作时长</text>
  </g>

  <!-- Claude Cowork -->
  <g filter="url(#shadow)">
    <rect x="470" y="150" width="260" height="190" rx="14" fill="url(#g1)" stroke="#cfe4d5"/>
    <circle cx="510" cy="190" r="18" fill="#d8ecdc"/>
    <text x="510" y="196" text-anchor="middle" font-size="18">🗂️</text>
    <text x="545" y="185" font-size="17" font-weight="700" fill="#2a2a2a">Claude Cowork</text>
    <text x="545" y="205" font-size="12" fill="#1f6b50">项目级 · 跨文件 / 跨应用</text>
    <text x="490" y="240" font-size="13" fill="#444">适合：交易团队、项目组</text>
    <text x="490" y="262" font-size="13" fill="#444">场景：承揽项目、尽调拆解、</text>
    <text x="490" y="280" font-size="13" fill="#444">模型评审、交叉引用材料</text>
    <rect x="490" y="300" width="160" height="24" rx="12" fill="#e6f3e9" stroke="#8dc4a1"/>
    <text x="570" y="317" text-anchor="middle" font-size="12" fill="#1f6b50" font-weight="600">把散装文档拧成一个会话</text>
  </g>

  <!-- Claude Code -->
  <g filter="url(#shadow)">
    <rect x="470" y="360" width="260" height="190" rx="14" fill="url(#g1)" stroke="#cfe4d5"/>
    <circle cx="510" cy="400" r="18" fill="#d8ecdc"/>
    <text x="510" y="407" text-anchor="middle" font-size="18">⌘</text>
    <text x="545" y="395" font-size="17" font-weight="700" fill="#2a2a2a">Claude Code</text>
    <text x="545" y="415" font-size="12" fill="#1f6b50">Quant · 工程团队</text>
    <text x="490" y="450" font-size="13" fill="#444">适合：量化、风险、工程</text>
    <text x="490" y="472" font-size="13" fill="#444">场景：因子脚本、回测调参、</text>
    <text x="490" y="490" font-size="13" fill="#444">模型文档、合规代码审查</text>
    <rect x="490" y="510" width="160" height="24" rx="12" fill="#e6f3e9" stroke="#8dc4a1"/>
    <text x="570" y="527" text-anchor="middle" font-size="12" fill="#1f6b50" font-weight="600">代码 + 研究一体化</text>
  </g>

  <!-- Claude Platform -->
  <g filter="url(#shadow)">
    <rect x="870" y="150" width="260" height="190" rx="14" fill="url(#g1)" stroke="#c9d6ee"/>
    <circle cx="910" cy="190" r="18" fill="#d9e3f4"/>
    <text x="910" y="197" text-anchor="middle" font-size="18">⚙️</text>
    <text x="945" y="185" font-size="17" font-weight="700" fill="#2a2a2a">Claude Platform</text>
    <text x="945" y="205" font-size="12" fill="#2350a0">API · 自建应用与 Agent</text>
    <text x="890" y="240" font-size="13" fill="#444">适合：AI 平台团队</text>
    <text x="890" y="262" font-size="13" fill="#444">场景：嵌入现有系统、</text>
    <text x="890" y="280" font-size="13" fill="#444">内部 Copilot、私有数据管道</text>
    <rect x="890" y="300" width="160" height="24" rx="12" fill="#e6ecf7" stroke="#94a9d0"/>
    <text x="970" y="317" text-anchor="middle" font-size="12" fill="#2350a0" font-weight="600">需要工程资源投入</text>
  </g>

  <!-- Claude Managed Agents -->
  <g filter="url(#shadow)">
    <rect x="870" y="360" width="260" height="190" rx="14" fill="url(#g1)" stroke="#c9d6ee"/>
    <circle cx="910" cy="400" r="18" fill="#d9e3f4"/>
    <text x="910" y="407" text-anchor="middle" font-size="18">🤖</text>
    <text x="945" y="395" font-size="17" font-weight="700" fill="#2a2a2a">Managed Agents</text>
    <text x="945" y="415" font-size="12" fill="#2350a0">Anthropic 托管的 Agent 运行时</text>
    <text x="890" y="450" font-size="13" fill="#444">适合：需要规模化 Agent 的业务</text>
    <text x="890" y="472" font-size="13" fill="#444">场景：KYC 筛查、对账收盘、</text>
    <text x="890" y="490" font-size="13" fill="#444">承揽材料自动化</text>
    <rect x="890" y="510" width="160" height="24" rx="12" fill="#e6ecf7" stroke="#94a9d0"/>
    <text x="970" y="527" text-anchor="middle" font-size="12" fill="#2350a0" font-weight="600">不用自建编排 / 监控</text>
  </g>

  <!-- 底部提示 -->
  <g>
    <rect x="70" y="590" width="1060" height="60" rx="10" fill="#fff" stroke="#e0d7bf"/>
    <text x="100" y="620" font-size="14" fill="#2a2a2a" font-weight="600">选型口诀：</text>
    <text x="180" y="620" font-size="13" fill="#444">个人问答 → Chat / M365；团队共事 → Cowork / Code；</text>
    <text x="660" y="620" font-size="13" fill="#444">规模化交付 → Platform / Managed Agents。</text>
    <text x="100" y="640" font-size="12" fill="#8a8270">大多数金融客户都是组合使用：以 Chat + M365 作为底盘，在高价值场景上叠加 Cowork / Code 与 Agent。</text>
  </g>
</svg>
