<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="1" stop-color="#f3efe7"/>
    </linearGradient>
    <pattern id="grid3" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#e9e2d3" stroke-width="0.5"/>
    </pattern>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#c1b48e" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="phase1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fdeacb"/><stop offset="1" stop-color="#fde6a0"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d9ecdc"/><stop offset="1" stop-color="#bde0c4"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d9e3f4"/><stop offset="1" stop-color="#b8c9ec"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#8a8270"/>
    </marker>
  </defs>

  <rect width="1200" height="640" fill="url(#bg3)"/>
  <rect width="1200" height="640" fill="url(#grid3)"/>

  <text x="600" y="54" text-anchor="middle" font-size="26" font-weight="700" fill="#2a2a2a">三阶段落地 Playbook：Foundation → Pilot → Scale 每一步都可验收</text>
  <text x="600" y="84" text-anchor="middle" font-size="15" fill="#6b6557">不同阶段目标完全不同，强行跳步通常会"试点成功 → 推不动"；把每阶段的可验收产物做完再进下一阶段</text>

  <!-- 时间线主干 -->
  <line x1="120" y1="300" x2="1080" y2="300" stroke="#c1b48e" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arr)"/>

  <!-- Phase 1：Foundation -->
  <g filter="url(#shadow3)">
    <rect x="120" y="140" width="300" height="320" rx="14" fill="url(#phase1)" stroke="#e4c98b"/>
    <rect x="120" y="140" width="300" height="42" rx="14" fill="#f6c96a"/>
    <text x="270" y="168" text-anchor="middle" font-size="18" font-weight="700" fill="#5c3b06">① Foundation · 打地基</text>
    <text x="140" y="208" font-size="13" fill="#5c3b06" font-weight="700">目标</text>
    <text x="140" y="228" font-size="12" fill="#3a2b08">让所有人"能用"，不出事</text>

    <text x="140" y="258" font-size="13" fill="#5c3b06" font-weight="700">动作</text>
    <text x="140" y="278" font-size="12" fill="#3a2b08">• 部署 Claude Chat + M365</text>
    <text x="140" y="295" font-size="12" fill="#3a2b08">• 数据 / 访问 / 审计策略</text>
    <text x="140" y="312" font-size="12" fill="#3a2b08">• 合规评审 + 使用守则</text>
    <text x="140" y="329" font-size="12" fill="#3a2b08">• 面向全员的基础培训</text>

    <text x="140" y="360" font-size="13" fill="#5c3b06" font-weight="700">Pro Tip</text>
    <text x="140" y="379" font-size="12" fill="#3a2b08">不要一上来就做 Agent——</text>
    <text x="140" y="396" font-size="12" fill="#3a2b08">先把治理机制和"可观测的</text>
    <text x="140" y="413" font-size="12" fill="#3a2b08">使用数据"跑起来。</text>

    <rect x="140" y="428" width="260" height="22" rx="11" fill="#fff" stroke="#e4c98b"/>
    <text x="270" y="444" text-anchor="middle" font-size="11" fill="#9a6b1e" font-weight="600">验收：治理就位 + 全员可访问</text>
  </g>

  <!-- Phase 2：Pilot -->
  <g filter="url(#shadow3)">
    <rect x="450" y="140" width="300" height="320" rx="14" fill="url(#phase2)" stroke="#8dc4a1"/>
    <rect x="450" y="140" width="300" height="42" rx="14" fill="#7fc293"/>
    <text x="600" y="168" text-anchor="middle" font-size="18" font-weight="700" fill="#0f4a33">② Pilot · 选对场景</text>
    <text x="470" y="208" font-size="13" fill="#0f4a33" font-weight="700">目标</text>
    <text x="470" y="228" font-size="12" fill="#1f3a2c">在 2–3 个高价值场景跑通 ROI</text>

    <text x="470" y="258" font-size="13" fill="#0f4a33" font-weight="700">动作</text>
    <text x="470" y="278" font-size="12" fill="#1f3a2c">• 招募真正肯改流程的一线 Lead</text>
    <text x="470" y="295" font-size="12" fill="#1f3a2c">• 引入 Cowork / Code 做项目级工作</text>
    <text x="470" y="312" font-size="12" fill="#1f3a2c">• 定义前置指标（时效 / 返工率）</text>
    <text x="470" y="329" font-size="12" fill="#1f3a2c">• 跑 1 个预建 Agent 模板</text>

    <text x="470" y="360" font-size="13" fill="#0f4a33" font-weight="700">Pro Tip</text>
    <text x="470" y="379" font-size="12" fill="#1f3a2c">不要只选"容易的"场景——</text>
    <text x="470" y="396" font-size="12" fill="#1f3a2c">找"贵、痛、重复"的任务，</text>
    <text x="470" y="413" font-size="12" fill="#1f3a2c">ROI 才能压住后续投入。</text>

    <rect x="470" y="428" width="260" height="22" rx="11" fill="#fff" stroke="#8dc4a1"/>
    <text x="600" y="444" text-anchor="middle" font-size="11" fill="#1f6b50" font-weight="600">验收：用量真数据 + 量化节省</text>
  </g>

  <!-- Phase 3：Scale -->
  <g filter="url(#shadow3)">
    <rect x="780" y="140" width="300" height="320" rx="14" fill="url(#phase3)" stroke="#94a9d0"/>
    <rect x="780" y="140" width="300" height="42" rx="14" fill="#7e96c8"/>
    <text x="930" y="168" text-anchor="middle" font-size="18" font-weight="700" fill="#0f2850">③ Scale · 规模化</text>
    <text x="800" y="208" font-size="13" fill="#0f2850" font-weight="700">目标</text>
    <text x="800" y="228" font-size="12" fill="#1e305a">把赢的场景铺到全业务 / 跨区域</text>

    <text x="800" y="258" font-size="13" fill="#0f2850" font-weight="700">动作</text>
    <text x="800" y="278" font-size="12" fill="#1e305a">• 上 Claude Platform 做系统集成</text>
    <text x="800" y="295" font-size="12" fill="#1e305a">• 用 Managed Agents 接替人工编排</text>
    <text x="800" y="312" font-size="12" fill="#1e305a">• 建立内部"Agent 模板库"</text>
    <text x="800" y="329" font-size="12" fill="#1e305a">• 把指标纳入业务 KPI</text>

    <text x="800" y="360" font-size="13" fill="#0f2850" font-weight="700">Pro Tip</text>
    <text x="800" y="379" font-size="12" fill="#1e305a">此阶段真正的瓶颈是组织，</text>
    <text x="800" y="396" font-size="12" fill="#1e305a">不是模型——</text>
    <text x="800" y="413" font-size="12" fill="#1e305a">流程改造 / 业绩口径要同步。</text>

    <rect x="800" y="428" width="260" height="22" rx="11" fill="#fff" stroke="#94a9d0"/>
    <text x="930" y="444" text-anchor="middle" font-size="11" fill="#2350a0" font-weight="600">验收：进入业务 SOP</text>
  </g>

  <!-- 底部风险提示 -->
  <g>
    <rect x="120" y="500" width="960" height="90" rx="12" fill="#fff" stroke="#e0d7bf"/>
    <text x="140" y="530" font-size="14" font-weight="700" fill="#9a2e2e">常见踩坑</text>
    <text x="140" y="554" font-size="13" fill="#444">• 把 Pilot 结论直接外推 Scale：试点里的人都是"愿意改"的，规模化人群不会那么听话。</text>
    <text x="140" y="574" font-size="13" fill="#444">• 忽略审计和数据边界，导致合规一票否决后再来补——成本远高于一开始就做 Foundation。</text>
  </g>
</svg>
