<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="480" fill="#f8fafc" rx="10"/>

  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">三条 Lessons Learned · 写给所有要做数据 Agent 的团队</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">来自 OpenAI 内部 Data Agent 的工程化沉淀</text>

  <!-- Lesson 1 -->
  <g filter="url(#sd)">
    <rect x="40" y="100" width="290" height="320" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="40" y="100" width="290" height="50" rx="10" fill="#eff6ff"/>
    <rect x="40" y="140" width="290" height="10" fill="#eff6ff"/>
    <text x="65" y="132" font-size="13" font-weight="700" fill="#1e40af">#1</text>
    <text x="100" y="132" font-size="14" font-weight="700" fill="#1e40af">Less is More</text>

    <text x="60" y="180" font-size="13" font-weight="600" fill="#1e293b">少即是多</text>
    <text x="60" y="208" font-size="11" fill="#475569">早期暴露完整工具集</text>
    <text x="60" y="226" font-size="11" fill="#475569">→ 功能重叠让 Agent 困惑</text>

    <line x1="60" y1="246" x2="310" y2="246" stroke="#cbd5e1" stroke-width="1"/>

    <text x="60" y="272" font-size="12" font-weight="600" fill="#1e40af">解法</text>
    <text x="60" y="294" font-size="11" fill="#475569">合并 / 精简工具调用</text>
    <text x="60" y="312" font-size="11" fill="#475569">每个工具只解一类问题</text>

    <text x="60" y="350" font-size="12" font-weight="600" fill="#1e40af">迁移启示</text>
    <text x="60" y="372" font-size="11" fill="#475569">不要"以防万一"加工具</text>
    <text x="60" y="390" font-size="11" fill="#475569">先砍到最小集再扩</text>
  </g>

  <!-- Lesson 2 -->
  <g filter="url(#sd)">
    <rect x="345" y="100" width="290" height="320" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="345" y="100" width="290" height="50" rx="10" fill="#fffbeb"/>
    <rect x="345" y="140" width="290" height="10" fill="#fffbeb"/>
    <text x="370" y="132" font-size="13" font-weight="700" fill="#92400e">#2</text>
    <text x="405" y="132" font-size="14" font-weight="700" fill="#92400e">Guide the Goal</text>

    <text x="365" y="180" font-size="13" font-weight="600" fill="#1e293b">指引目标，不要规定路径</text>
    <text x="365" y="208" font-size="11" fill="#475569">高度规定性的 prompt</text>
    <text x="365" y="226" font-size="11" fill="#475569">→ 反而压制了 GPT-5 推理</text>

    <line x1="365" y1="246" x2="615" y2="246" stroke="#cbd5e1" stroke-width="1"/>

    <text x="365" y="272" font-size="12" font-weight="600" fill="#92400e">解法</text>
    <text x="365" y="294" font-size="11" fill="#475569">写"成功什么样"</text>
    <text x="365" y="312" font-size="11" fill="#475569">不写"先做 A 再做 B"</text>

    <text x="365" y="350" font-size="12" font-weight="600" fill="#92400e">迁移启示</text>
    <text x="365" y="372" font-size="11" fill="#475569">prompt 是目标书</text>
    <text x="365" y="390" font-size="11" fill="#475569">不是流程图</text>
  </g>

  <!-- Lesson 3 -->
  <g filter="url(#sd)">
    <rect x="650" y="100" width="290" height="320" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="650" y="100" width="290" height="50" rx="10" fill="#ecfdf5"/>
    <rect x="650" y="140" width="290" height="10" fill="#ecfdf5"/>
    <text x="675" y="132" font-size="13" font-weight="700" fill="#065f46">#3</text>
    <text x="710" y="132" font-size="14" font-weight="700" fill="#065f46">Meaning Lives in Code</text>

    <text x="670" y="180" font-size="13" font-weight="600" fill="#1e293b">意义存在于代码中</text>
    <text x="670" y="208" font-size="11" fill="#475569">schema 只描述形状</text>
    <text x="670" y="226" font-size="11" fill="#475569">查询历史只描述用法</text>

    <line x1="670" y1="246" x2="920" y2="246" stroke="#cbd5e1" stroke-width="1"/>

    <text x="670" y="272" font-size="12" font-weight="600" fill="#065f46">解法</text>
    <text x="670" y="294" font-size="11" fill="#475569">让 Codex 爬代码库</text>
    <text x="670" y="312" font-size="11" fill="#475569">推导真正的列含义</text>

    <text x="670" y="350" font-size="12" font-weight="600" fill="#065f46">迁移启示</text>
    <text x="670" y="372" font-size="11" fill="#475569">建数据 Agent 时</text>
    <text x="670" y="390" font-size="11" fill="#475569">代码仓库是一等公民</text>
  </g>

  <text x="480" y="455" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">三条经验共同指向同一件事：把"上下文工程"做扎实，比换更大的模型重要</text>
</svg>
