<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="460" fill="#f8fafc" rx="10"/>

  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Evals 闭环：把数据 Agent 当成持续部署的服务来对待</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">问题—Golden SQL 对照集 + 双信号 grader（SQL 文本 + 实际结果）</text>

  <!-- Step 1 question set -->
  <g filter="url(#sd)">
    <rect x="50" y="110" width="180" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="140" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">① 精选问题集</text>
    <text x="140" y="162" text-anchor="middle" font-size="11" fill="#475569">自然语言提问</text>
    <text x="140" y="180" text-anchor="middle" font-size="11" fill="#475569">+ 手写 Golden SQL</text>
  </g>

  <!-- Step 2 Agent -->
  <g filter="url(#sd)">
    <rect x="280" y="110" width="180" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="370" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">② Agent 生成 SQL</text>
    <text x="370" y="162" text-anchor="middle" font-size="11" fill="#475569">候选查询</text>
    <text x="370" y="180" text-anchor="middle" font-size="11" fill="#475569">(每次回归都跑)</text>
  </g>

  <!-- Step 3 Execute -->
  <g filter="url(#sd)">
    <rect x="510" y="110" width="180" height="80" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="600" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">③ 双路执行</text>
    <text x="600" y="162" text-anchor="middle" font-size="11" fill="#475569">候选 SQL + Golden SQL</text>
    <text x="600" y="180" text-anchor="middle" font-size="11" fill="#475569">在仓库各跑一次</text>
  </g>

  <!-- Step 4 Grader -->
  <g filter="url(#sd)">
    <rect x="740" y="110" width="180" height="80" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="830" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">④ Evals Grader</text>
    <text x="830" y="162" text-anchor="middle" font-size="11" fill="#475569">SQL 文本 + 结果数据</text>
    <text x="830" y="180" text-anchor="middle" font-size="11" fill="#475569">综合打分 + 解释</text>
  </g>

  <line x1="230" y1="150" x2="275" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="150" x2="505" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="690" y1="150" x2="735" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Two usages -->
  <g filter="url(#sd)">
    <rect x="120" y="240" width="320" height="100" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="280" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">开发期 · 单元测试式</text>
    <text x="280" y="294" text-anchor="middle" font-size="12" fill="#475569">每次改 prompt / 工具 / 模型版本</text>
    <text x="280" y="313" text-anchor="middle" font-size="12" fill="#475569">先跑全量 evals，对回归零容忍</text>
    <text x="280" y="332" text-anchor="middle" font-size="11" fill="#065f46">→ 防止能力漂移</text>
  </g>

  <g filter="url(#sd)">
    <rect x="500" y="240" width="320" height="100" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="660" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">生产期 · Canaries</text>
    <text x="660" y="294" text-anchor="middle" font-size="12" fill="#475569">线上持续抽样跑同一组金标问题</text>
    <text x="660" y="313" text-anchor="middle" font-size="12" fill="#475569">指标下降即告警，提早发现回归</text>
    <text x="660" y="332" text-anchor="middle" font-size="11" fill="#991b1b">→ 早发现、早回滚</text>
  </g>

  <!-- Footer caveat -->
  <rect x="50" y="370" width="860" height="58" rx="8" fill="#e2e8f0"/>
  <text x="480" y="395" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">不靠"字符串相等" — 同一问题可能有多种正确写法</text>
  <text x="480" y="414" text-anchor="middle" font-size="11" fill="#475569">grader 同时看 SQL 与结果数据，由模型给出最终评分 + 可读理由</text>
</svg>
