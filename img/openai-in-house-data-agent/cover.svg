<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="460" fill="#f8fafc" rx="10"/>

  <!-- Title block -->
  <text x="60" y="80" font-size="30" font-weight="700" fill="#1e293b">Inside OpenAI's In-House Data Agent</text>
  <text x="60" y="118" font-size="20" font-weight="600" fill="#475569">让 3,500 名工程师不再被 SQL 拖住的内部数据智能体</text>
  <text x="60" y="148" font-size="13" fill="#64748b">GPT-5.2 · 六层上下文 · Codex 增强 · Evals 闭环 · 严格透传权限</text>

  <!-- Stat cards -->
  <g filter="url(#sd)">
    <rect x="60" y="200" width="270" height="130" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="195" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">数据规模</text>
    <text x="195" y="282" text-anchor="middle" font-size="36" font-weight="700" fill="#1e40af">600 PB</text>
    <text x="195" y="308" text-anchor="middle" font-size="12" fill="#475569">数据平台总量</text>
  </g>

  <g filter="url(#sd)">
    <rect x="345" y="200" width="270" height="130" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="480" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">表格数量</text>
    <text x="480" y="282" text-anchor="middle" font-size="36" font-weight="700" fill="#92400e">70,000+</text>
    <text x="480" y="308" text-anchor="middle" font-size="12" fill="#475569">"找对表格"是头号瓶颈</text>
  </g>

  <g filter="url(#sd)">
    <rect x="630" y="200" width="270" height="130" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="765" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">单条查询</text>
    <text x="765" y="282" text-anchor="middle" font-size="36" font-weight="700" fill="#991b1b">180+ 行</text>
    <text x="765" y="308" text-anchor="middle" font-size="12" fill="#475569">分析师陷入语义调试地狱</text>
  </g>

  <!-- Bottom band -->
  <rect x="60" y="365" width="840" height="60" rx="10" fill="#e2e8f0"/>
  <text x="480" y="392" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">从"分析要花一天"到"分钟级回答"——上下文工程，而非更聪明的模型</text>
  <text x="480" y="412" text-anchor="middle" font-size="11" fill="#64748b">3,500 internal users · Slack / Web / IDE / Codex CLI / ChatGPT MCP 多端接入</text>
</svg>
