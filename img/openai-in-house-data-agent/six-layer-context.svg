<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="#f8fafc" rx="10"/>

  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">六层上下文体系：让 Agent 像团队成员一样"懂业务"</text>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#64748b">从最稳定的元数据，逐层叠加到运行时实时校验</text>

  <!-- Stack of layers (top = most volatile) -->
  <!-- L6 Runtime -->
  <g filter="url(#sd)">
    <rect x="120" y="90" width="720" height="56" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="155" y="115" font-size="13" font-weight="700" fill="#991b1b">⑥ Runtime Context</text>
    <text x="155" y="134" font-size="11" fill="#475569">实时查询数据仓库 / 与 Airflow、Spark、元数据服务对话，校验最新模式</text>
    <text x="820" y="124" text-anchor="end" font-size="11" font-weight="600" fill="#991b1b">实时</text>
  </g>

  <!-- L5 Memory -->
  <g filter="url(#sd)">
    <rect x="120" y="156" width="720" height="56" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="155" y="181" font-size="13" font-weight="700" fill="#5b21b6">⑤ Memory 记忆</text>
    <text x="155" y="200" font-size="11" fill="#475569">保存更正、过滤约束；分全局 / 个人；用户可手动编辑（如实验门 ID 字符串）</text>
    <text x="820" y="190" text-anchor="end" font-size="11" font-weight="600" fill="#5b21b6">用户共建</text>
  </g>

  <!-- L4 Org Knowledge -->
  <g filter="url(#sd)">
    <rect x="120" y="222" width="720" height="56" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="155" y="247" font-size="13" font-weight="700" fill="#92400e">④ 机构知识</text>
    <text x="155" y="266" font-size="11" fill="#475569">Slack / Google Docs / Notion 接入：发布、事故、内部代号、关键指标定义</text>
    <text x="820" y="256" text-anchor="end" font-size="11" font-weight="600" fill="#92400e">嵌入 + 权限</text>
  </g>

  <!-- L3 Codex Augmentation -->
  <g filter="url(#sd)">
    <rect x="120" y="288" width="720" height="56" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="155" y="313" font-size="13" font-weight="700" fill="#065f46">③ Codex 增强（关键创新）</text>
    <text x="155" y="332" font-size="11" fill="#475569">爬取代码库推导唯一性 / 更新频率 / 范围；判定"此表是否仅含第一方流量"等代码级语义</text>
    <text x="820" y="322" text-anchor="end" font-size="11" font-weight="600" fill="#065f46">自动刷新</text>
  </g>

  <!-- L2 Human annotation -->
  <g filter="url(#sd)">
    <rect x="120" y="354" width="720" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="155" y="379" font-size="13" font-weight="700" fill="#1e40af">② 人工注释</text>
    <text x="155" y="398" font-size="11" fill="#475569">领域专家撰写的表格 / 列描述：意图、语义、业务含义、注意事项</text>
    <text x="820" y="388" text-anchor="end" font-size="11" font-weight="600" fill="#1e40af">高信噪比</text>
  </g>

  <!-- L1 Table usage -->
  <g filter="url(#sd)">
    <rect x="120" y="420" width="720" height="56" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="155" y="445" font-size="13" font-weight="700" fill="#1e293b">① 表格使用情况</text>
    <text x="155" y="464" font-size="11" fill="#475569">模式元数据（列名 / 类型）+ 表格沿袭 + 历史查询采集</text>
    <text x="820" y="454" text-anchor="end" font-size="11" font-weight="600" fill="#475569">基础底座</text>
  </g>

  <!-- Right axis arrow -->
  <text x="60" y="100" font-size="10" fill="#64748b">易变</text>
  <line x1="80" y1="110" x2="80" y2="450" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="60" y="460" font-size="10" fill="#64748b">稳定</text>

  <text x="480" y="510" text-anchor="middle" font-size="12" fill="#475569">底座 ① ② 提供"形状"，③ Codex 揭示"含义"，④ ⑤ 沉淀团队知识，⑥ 兜底校准</text>
</svg>
