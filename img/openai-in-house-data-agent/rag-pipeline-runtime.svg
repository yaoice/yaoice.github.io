<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="480" fill="#f8fafc" rx="10"/>

  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">离线管道 + 运行时 RAG：低延迟拉取最相关上下文</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">每日聚合 → Embeddings → 检索；查询时只把"该看的"塞进窗口</text>

  <!-- Offline pipeline band (top) -->
  <rect x="40" y="90" width="880" height="2" fill="#cbd5e1"/>
  <text x="60" y="86" font-size="11" font-weight="600" fill="#64748b">OFFLINE · 每日</text>

  <!-- Sources -->
  <g filter="url(#sd)">
    <rect x="60" y="110" width="150" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="135" y="135" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">表格使用 / 沿袭</text>
  </g>
  <g filter="url(#sd)">
    <rect x="60" y="160" width="150" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="135" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">人工注释</text>
  </g>
  <g filter="url(#sd)">
    <rect x="60" y="210" width="150" height="40" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="135" y="235" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Codex 代码爬取</text>
  </g>

  <!-- Aggregator -->
  <g filter="url(#sd)">
    <rect x="270" y="135" width="150" height="90" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="345" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">每日聚合</text>
    <text x="345" y="192" text-anchor="middle" font-size="11" fill="#475569">合并 / 去重 / 元数据</text>
    <text x="345" y="210" text-anchor="middle" font-size="11" fill="#475569">+ 权限标签</text>
  </g>

  <!-- Embeddings -->
  <g filter="url(#sd)">
    <rect x="475" y="135" width="170" height="90" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="560" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">OpenAI Embeddings</text>
    <text x="560" y="186" text-anchor="middle" font-size="11" fill="#475569">向量化 schema +</text>
    <text x="560" y="204" text-anchor="middle" font-size="11" fill="#475569">注释 + 代码语义</text>
  </g>

  <!-- Vector store -->
  <g filter="url(#sd)">
    <rect x="700" y="135" width="200" height="90" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="800" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">向量索引</text>
    <text x="800" y="186" text-anchor="middle" font-size="11" fill="#475569">表格 / 列 / 文档 / 历史</text>
    <text x="800" y="204" text-anchor="middle" font-size="11" fill="#475569">查询的 Embedding 库</text>
  </g>

  <line x1="210" y1="180" x2="265" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="180" x2="470" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="645" y1="180" x2="695" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Runtime band -->
  <rect x="40" y="270" width="880" height="2" fill="#cbd5e1"/>
  <text x="60" y="266" font-size="11" font-weight="600" fill="#64748b">RUNTIME · 用户提问时</text>

  <!-- User -->
  <g filter="url(#sd)">
    <rect x="60" y="290" width="150" height="60" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="1.5"/>
    <text x="135" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">用户自然语言提问</text>
    <text x="135" y="335" text-anchor="middle" font-size="10" fill="#64748b">Slack / Web / IDE / CLI</text>
  </g>

  <!-- Retrieval -->
  <g filter="url(#sd)">
    <rect x="270" y="290" width="160" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="350" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">RAG 检索</text>
    <text x="350" y="335" text-anchor="middle" font-size="10" fill="#475569">Top-K 相关表 / 列 / 文档</text>
  </g>

  <!-- Agent -->
  <g filter="url(#sd)">
    <rect x="475" y="282" width="170" height="76" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="560" y="306" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">GPT-5.2 Data Agent</text>
    <text x="560" y="326" text-anchor="middle" font-size="11" fill="#475569">推理 → 生成 SQL</text>
    <text x="560" y="344" text-anchor="middle" font-size="11" fill="#475569">异常自调试重试</text>
  </g>

  <!-- Warehouse -->
  <g filter="url(#sd)">
    <rect x="700" y="282" width="200" height="76" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="800" y="306" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">数据仓库 + 透传权限</text>
    <text x="800" y="326" text-anchor="middle" font-size="11" fill="#475569">仅返回用户有权数据</text>
    <text x="800" y="344" text-anchor="middle" font-size="11" fill="#475569">直链原始结果可核验</text>
  </g>

  <line x1="210" y1="320" x2="265" y2="320" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="320" x2="470" y2="320" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="645" y1="320" x2="695" y2="320" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vector → Retrieval connector -->
  <line x1="800" y1="225" x2="800" y2="252" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="800" y1="252" x2="350" y2="252" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="350" y1="252" x2="350" y2="285" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="575" y="247" text-anchor="middle" font-size="10" fill="#64748b">检索时拉取最相关上下文</text>

  <!-- Footer -->
  <rect x="40" y="395" width="880" height="58" rx="8" fill="#e2e8f0"/>
  <text x="480" y="420" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">关键设计：上下文不入提示词常驻，而是按需检索 → 控制 token、保证延迟、不泄露权限外内容</text>
  <text x="480" y="440" text-anchor="middle" font-size="11" fill="#64748b">运行时还会回查 Airflow / Spark / 元数据服务，验证当下真实 schema</text>
</svg>
