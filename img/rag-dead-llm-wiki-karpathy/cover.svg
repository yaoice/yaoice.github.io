<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="420" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">RAG vs LLM Wiki：核心理念对比</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">一次性回答 vs 持续知识积累</text>

  <!-- Left: RAG (Danger style) -->
  <rect x="40" y="80" width="400" height="320" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="1.5" filter="url(#sd)"/>
  <text x="240" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#ef4444">🔄 RAG（检索增强生成）</text>
  <text x="240" y="138" text-anchor="middle" font-size="11" fill="#64748b">一次性问答模式</text>

  <!-- RAG flow -->
  <rect x="80" y="160" width="320" height="44" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="240" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">① 用户提问</text>
  <text x="240" y="194" text-anchor="middle" font-size="10" fill="#64748b">输入一个问题</text>

  <line x1="240" y1="204" x2="240" y2="224" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="224" width="320" height="44" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="240" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">② 检索相关片段</text>
  <text x="240" y="258" text-anchor="middle" font-size="10" fill="#64748b">从向量库临时检索</text>

  <line x1="240" y1="268" x2="240" y2="288" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="288" width="320" height="44" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="240" y="306" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">③ 生成一次性回答</text>
  <text x="240" y="322" text-anchor="middle" font-size="10" fill="#64748b">回答后上下文丢失</text>

  <line x1="240" y1="332" x2="240" y2="352" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="130" y="352" width="220" height="30" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="240" y="372" text-anchor="middle" font-size="11" fill="#ef4444">❌ 对话结束，知识归零</text>

  <!-- Divider -->
  <line x1="480" y1="80" x2="480" y2="400" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Right: LLM Wiki (Success style) -->
  <rect x="520" y="80" width="400" height="320" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5" filter="url(#sd)"/>
  <text x="720" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#10b981">📚 LLM Wiki（知识库构建）</text>
  <text x="720" y="138" text-anchor="middle" font-size="11" fill="#64748b">持续积累模式 · Andrej Karpathy 理念</text>

  <!-- Wiki flow -->
  <rect x="560" y="160" width="320" height="44" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="720" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#10b981">① 读取多源文档</text>
  <text x="720" y="194" text-anchor="middle" font-size="10" fill="#64748b">PDF / 网页 / 代码 / 笔记</text>

  <line x1="720" y1="204" x2="720" y2="224" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="560" y="224" width="320" height="44" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="720" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#10b981">② 生成结构化 Wiki 页面</text>
  <text x="720" y="258" text-anchor="middle" font-size="10" fill="#64748b">每个概念一个 Markdown 页面</text>

  <line x1="720" y1="268" x2="720" y2="288" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="560" y="288" width="320" height="44" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="720" y="306" text-anchor="middle" font-size="12" font-weight="600" fill="#10b981">③ 页面间 wiki 链接互相关联</text>
  <text x="720" y="322" text-anchor="middle" font-size="10" fill="#64748b">形成可浏览的知识图谱</text>

  <line x1="720" y1="332" x2="720" y2="352" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="590" y="352" width="260" height="30" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="720" y="372" text-anchor="middle" font-size="11" fill="#10b981">✅ 知识持续生长，跨会话积累</text>

  <!-- Bottom annotation -->
  <rect x="200" y="400" width="560" height="0" rx="0" fill="none"/>
</svg>
