<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">四大 LLM Wiki 开源方案功能对比</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">定位不同，可组合使用 · 全部支持本地部署</text>

  <!-- Header row background -->
  <rect x="20" y="70" width="920" height="36" rx="8" fill="#1e293b"/>
  <text x="140" y="93" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">特性</text>
  <text x="310" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">nashsu/llm_wiki</text>
  <text x="490" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">nvk/llm-wiki</text>
  <text x="660" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Pratiyush/llm-wiki</text>
  <text x="830" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">lucasastorian/llmwiki</text>

  <!-- Row 1: 定位 -->
  <rect x="20" y="106" width="920" height="44" rx="0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <rect x="20" y="106" width="240" height="44" rx="0" fill="#f1f5f9"/>
  <text x="140" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">定位</text>
  <text x="140" y="142" text-anchor="middle" font-size="10" fill="#64748b">适用人群</text>

  <rect x="260" y="106" width="160" height="44" rx="0" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="340" y="128" text-anchor="middle" font-size="10" fill="#1e293b">GUI 桌面应用</text>
  <text x="340" y="142" text-anchor="middle" font-size="9" fill="#64748b">需要可视化界面</text>

  <rect x="420" y="106" width="160" height="44" rx="0" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="500" y="128" text-anchor="middle" font-size="10" fill="#1e293b">Claude Code 插件</text>
  <text x="500" y="142" text-anchor="middle" font-size="9" fill="#64748b">已用 AI 编程智能体</text>

  <rect x="580" y="106" width="160" height="44" rx="0" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="660" y="128" text-anchor="middle" font-size="10" fill="#1e293b">对话历史 → 静态 Wiki</text>
  <text x="660" y="142" text-anchor="middle" font-size="9" fill="#64748b">挖掘已有对话历史</text>

  <rect x="740" y="106" width="200" height="44" rx="0" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="840" y="128" text-anchor="middle" font-size="10" fill="#1e293b">MCP 自动维护 Wiki</text>
  <text x="840" y="142" text-anchor="middle" font-size="9" fill="#64748b">大量本地文档</text>

  <!-- Row 2: 核心技术 -->
  <rect x="20" y="150" width="920" height="44" rx="0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <rect x="20" y="150" width="240" height="44" rx="0" fill="#f1f5f9"/>
  <text x="140" y="172" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">核心技术</text>

  <rect x="260" y="150" width="160" height="44" rx="0" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="340" y="168" text-anchor="middle" font-size="9" fill="#1e293b">Tauri + React 19</text>
  <text x="340" y="182" text-anchor="middle" font-size="9" fill="#64748b">三栏布局</text>

  <rect x="420" y="150" width="160" height="44" rx="0" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="500" y="168" text-anchor="middle" font-size="9" fill="#1e293b">复用宿主智能体</text>
  <text x="500" y="182" text-anchor="middle" font-size="9" fill="#64748b">并行多智能体</text>

  <rect x="580" y="150" width="160" height="44" rx="0" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="660" y="168" text-anchor="middle" font-size="9" fill="#1e293b">无需运行时 LLM</text>
  <text x="660" y="182" text-anchor="middle" font-size="9" fill="#64748b">读 .jsonl 转录</text>

  <rect x="740" y="150" width="200" height="44" rx="0" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="840" y="168" text-anchor="middle" font-size="9" fill="#1e293b">Python API + React</text>
  <text x="840" y="182" text-anchor="middle" font-size="9" fill="#64748b">SQLite 本地索引</text>

  <!-- Row 3: 知识图谱 -->
  <rect x="20" y="194" width="920" height="44" rx="0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <rect x="20" y="194" width="240" height="44" rx="0" fill="#f1f5f9"/>
  <text x="140" y="216" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">知识图谱可视化</text>

  <rect x="260" y="194" width="160" height="44" rx="0" fill="#ecfdf5" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="340" y="218" text-anchor="middle" font-size="11" fill="#10b981">✅ 内置</text>

  <rect x="420" y="194" width="160" height="44" rx="0" fill="#fef2f2" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="500" y="218" text-anchor="middle" font-size="11" fill="#ef4444">❌ 无</text>

  <rect x="580" y="194" width="160" height="44" rx="0" fill="#fef2f2" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="660" y="218" text-anchor="middle" font-size="11" fill="#ef4444">❌ 无</text>

  <rect x="740" y="194" width="200" height="44" rx="0" fill="#fef2f2" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="840" y="218" text-anchor="middle" font-size="11" fill="#ef4444">❌ 无</text>

  <!-- Row 4: 多格式文档 -->
  <rect x="20" y="238" width="920" height="44" rx="0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <rect x="20" y="238" width="240" height="44" rx="0" fill="#f1f5f9"/>
  <text x="140" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">多格式文档摄入</text>

  <rect x="260" y="238" width="160" height="44" rx="0" fill="#ecfdf5" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="340" y="262" text-anchor="middle" font-size="11" fill="#10b981">✅ PDF/DOCX/PPTX/视频</text>

  <rect x="420" y="238" width="160" height="44" rx="0" fill="#fef2f2" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="500" y="262" text-anchor="middle" font-size="11" fill="#ef4444">⚠️ 依赖宿主</text>

  <rect x="580" y="238" width="160" height="44" rx="0" fill="#fef2f2" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="660" y="262" text-anchor="middle" font-size="11" fill="#ef4444">⚠️ 仅 .jsonl</text>

  <rect x="740" y="238" width="200" height="44" rx="0" fill="#ecfdf5" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="840" y="262" text-anchor="middle" font-size="11" fill="#10b981">✅ 本地文件夹</text>

  <!-- Row 5: 并行研究 -->
  <rect x="20" y="282" width="920" height="44" rx="0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <rect x="20" y="282" width="240" height="44" rx="0" fill="#f1f5f9"/>
  <text x="140" y="304" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">并行多智能体研究</text>

  <rect x="260" y="282" width="160" height="44" rx="0" fill="#fef2f2" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="340" y="306" text-anchor="middle" font-size="11" fill="#ef4444">❌ 无</text>

  <rect x="420" y="282" width="160" height="44" rx="0" fill="#ecfdf5" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="500" y="306" text-anchor="middle" font-size="11" fill="#10b981">✅ 5–10 智能体并行</text>

  <rect x="580" y="282" width="160" height="44" rx="0" fill="#fef2f2" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="660" y="306" text-anchor="middle" font-size="11" fill="#ef4444">❌ 无</text>

  <rect x="740" y="282" width="200" height="44" rx="0" fill="#fef2f2" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="840" y="306" text-anchor="middle" font-size="11" fill="#ef4444">❌ 无</text>

  <!-- Row 6: 自动更新 -->
  <rect x="20" y="326" width="920" height="44" rx="0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <rect x="20" y="326" width="240" height="44" rx="0" fill="#f1f5f9"/>
  <text x="140" y="348" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">文件变更自动更新</text>

  <rect x="260" y="326" width="160" height="44" rx="0" fill="#fef2f2" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="340" y="350" text-anchor="middle" font-size="11" fill="#ef4444">❌ 手动</text>

  <rect x="420" y="326" width="160" height="44" rx="0" fill="#fef2f2" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="500" y="350" text-anchor="middle" font-size="11" fill="#ef4444">❌ 手动</text>

  <rect x="580" y="326" width="160" height="44" rx="0" fill="#fef2f2" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="660" y="350" text-anchor="middle" font-size="11" fill="#ef4444">❌ 手动</text>

  <rect x="740" y="326" width="200" height="44" rx="0" fill="#ecfdf5" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="840" y="350" text-anchor="middle" font-size="11" fill="#10b981">✅ 自动监听更新</text>

  <!-- Row 7: MCP 服务 -->
  <rect x="20" y="370" width="920" height="44" rx="0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <rect x="20" y="370" width="240" height="44" rx="0" fill="#f1f5f9"/>
  <text x="140" y="392" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">MCP 服务接口</text>

  <rect x="260" y="370" width="160" height="44" rx="0" fill="#fef2f2" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="340" y="394" text-anchor="middle" font-size="11" fill="#ef4444">❌ 无</text>

  <rect x="420" y="370" width="160" height="44" rx="0" fill="#fef2f2" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="500" y="394" text-anchor="middle" font-size="11" fill="#ef4444">❌ 无</text>

  <rect x="740" y="370" width="200" height="44" rx="0" fill="#ecfdf5" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="840" y="394" text-anchor="middle" font-size="11" fill="#10b981">✅ 12 个工具</text>

  <rect x="580" y="370" width="160" height="44" rx="0" fill="#ecfdf5" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="660" y="394" text-anchor="middle" font-size="11" fill="#10b981">✅ 内置 MCP</text>

  <!-- Row 8: 推荐场景 -->
  <rect x="20" y="414" width="920" height="56" rx="0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <rect x="20" y="414" width="240" height="56" rx="0" fill="#f1f5f9"/>
  <text x="140" y="442" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">推荐场景</text>

  <rect x="260" y="414" width="160" height="56" rx="0" fill="#eff6ff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="340" y="436" text-anchor="middle" font-size="9" fill="#1e40af">GUI + 知识图谱</text>
  <text x="340" y="450" text-anchor="middle" font-size="9" fill="#1e40af">多格式文档</text>
  <text x="340" y="462" text-anchor="middle" font-size="9" fill="#1e40af">新手首选</text>

  <rect x="420" y="414" width="160" height="56" rx="0" fill="#eff6ff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="500" y="436" text-anchor="middle" font-size="9" fill="#1e40af">已用 Claude Code</text>
  <text x="500" y="450" text-anchor="middle" font-size="9" fill="#1e40af">深度并行研究</text>

  <rect x="580" y="414" width="160" height="56" rx="0" fill="#eff6ff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="660" y="436" text-anchor="middle" font-size="9" fill="#1e40af">挖掘对话历史</text>
  <text x="660" y="450" text-anchor="middle" font-size="9" fill="#1e40af">离线浏览</text>

  <rect x="740" y="414" width="200" height="56" rx="0" fill="#eff6ff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="840" y="436" text-anchor="middle" font-size="9" fill="#1e40af">大量本地文档</text>
  <text x="840" y="450" text-anchor="middle" font-size="9" fill="#1e40af">自动维护</text>

  <!-- Legend -->
  <rect x="20" y="490" width="12" height="12" rx="2" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="38" y="501" font-size="10" fill="#475569">✅ 支持</text>
  <rect x="120" y="490" width="12" height="12" rx="2" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="138" y="501" font-size="10" fill="#475569">❌ 不支持 / ⚠️ 部分支持</text>
</svg>
