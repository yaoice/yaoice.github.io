<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#3b82f6"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="500" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">RAG 一次性模式 vs LLM Wiki 积累模式</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">知识是否跨会话沉淀的核心差异</text>

  <!-- Left: RAG disposable mode -->
  <rect x="40" y="70" width="420" height="410" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="1.5" filter="url(#sd)"/>
  <text x="250" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">RAG：一次性回答模式</text>

  <!-- User -->
  <rect x="155" y="118" width="190" height="36" rx="18" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="250" y="141" text-anchor="middle" font-size="12" fill="#ef4444">👤 用户提问</text>

  <!-- Arrow down -->
  <line x1="250" y1="154" x2="250" y2="174" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RAG retrieves -->
  <rect x="100" y="176" width="300" height="50" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="250" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">⚡ 检索相关片段（向量库）</text>
  <text x="250" y="218" text-anchor="middle" font-size="10" fill="#64748b">临时检索，无持久化</text>

  <line x1="250" y1="226" x2="250" y2="246" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM generates answer -->
  <rect x="100" y="248" width="300" height="50" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="250" y="272" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">🤖 LLM 生成回答</text>
  <text x="250" y="290" text-anchor="middle" font-size="10" fill="#64748b">一次性输出，无后续</text>

  <line x1="250" y1="298" x2="250" y2="318" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Session ends -->
  <rect x="130" y="320" width="240" height="50" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="250" y="344" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">🔚 对话结束</text>
  <text x="250" y="362" text-anchor="middle" font-size="10" fill="#64748b">所有上下文丢失</text>

  <!-- Knowledge loss indicator -->
  <text x="250" y="460" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">❌ 知识无法跨会话积累</text>

  <!-- Divider -->
  <line x1="480" y1="70" x2="480" y2="480" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Right: LLM Wiki accumulation mode -->
  <rect x="500" y="70" width="420" height="410" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5" filter="url(#sd)"/>
  <text x="710" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#10b981">LLM Wiki：知识积累模式</text>

  <!-- User provides docs -->
  <rect x="585" y="118" width="250" height="36" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="710" y="141" text-anchor="middle" font-size="12" fill="#10b981">📄 用户提供多源文档</text>

  <line x1="710" y1="154" x2="710" y2="174" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- LLM builds wiki pages -->
  <rect x="530" y="176" width="360" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="710" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#10b981">📝 LLM 生成结构化 Wiki 页面</text>
  <text x="710" y="218" text-anchor="middle" font-size="10" fill="#64748b">每个概念一个 MD 页面</text>

  <line x1="710" y1="226" x2="710" y2="246" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- Pages interlink -->
  <rect x="530" y="248" width="360" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="710" y="272" text-anchor="middle" font-size="12" font-weight="600" fill="#10b981">🔗 页面间 wiki 链接互相关联</text>
  <text x="710" y="290" text-anchor="middle" font-size="10" fill="#64748b">形成知识图谱</text>

  <line x1="710" y1="298" x2="710" y2="318" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- New doc updates existing pages -->
  <rect x="555" y="320" width="310" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="710" y="344" text-anchor="middle" font-size="12" font-weight="600" fill="#10b981">♻️ 新文档更新已有页面</text>
  <text x="710" y="362" text-anchor="middle" font-size="10" fill="#64748b">而非生成孤立内容</text>

  <!-- Knowledge growth indicator -->
  <text x="710" y="460" text-anchor="middle" font-size="13" font-weight="700" fill="#10b981">✅ 知识持续生长，复利积累</text>

  <!-- Bottom: circular arrow on right side to show cycle -->
  <path d="M 820 420 A 30 30 0 1 1 820 420" stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <text x="860" y="435" font-size="11" fill="#10b981">循环迭代</text>
</svg>
