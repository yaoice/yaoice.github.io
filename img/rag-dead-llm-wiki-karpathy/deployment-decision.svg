<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#3b82f6"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="580" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Ollama vs vLLM 部署选型决策流</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">根据使用场景、并发需求、硬件条件选择本地部署方案</text>

  <!-- Start -->
  <ellipse cx="480" cy="85" rx="100" ry="28" fill="#1e293b"/>
  <text x="480" y="90" text-anchor="middle" font-size="12" fill="#ffffff">开始选型</text>

  <line x1="480" y1="113" x2="480" y2="138" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Q1: 是否新手 / 单用户？ -->
  <rect x="350" y="140" width="260" height="44" rx="22" fill="#fef2f2" stroke="#f59e0b" stroke-width="1.5" filter="url(#sd)"/>
  <text x="480" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">是否新手入门 / 单用户使用？</text>
  <text x="480" y="178" text-anchor="middle" font-size="10" fill="#64748b">判断：原型验证？偶尔使用？</text>

  <!-- Yes branch -->
  <line x1="350" y1="162" x2="240" y2="162" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="154" font-size="11" fill="#10b981" font-weight="600">是</text>

  <!-- No branch -->
  <line x1="610" y1="162" x2="760" y2="162" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="690" y="154" font-size="11" fill="#ef4444" font-weight="600">否</text>

  <!-- Ollama path -->
  <rect x="100" y="195" width="280" height="130" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#sd)"/>
  <text x="240" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#10b981">✅ 选择 Ollama</text>
  <text x="240" y="248" text-anchor="middle" font-size="11" fill="#1e293b">一条命令启动</text>
  <text x="240" y="268" text-anchor="middle" font-size="10" fill="#475569">ollama pull qwen2.5:14b</text>
  <text x="240" y="286" text-anchor="middle" font-size="10" fill="#475569">端点：localhost:11434/v1</text>
  <text x="240" y="304" text-anchor="middle" font-size="10" fill="#64748b">⚠️ 并发吞吐较低</text>
  <text x="240" y="318" text-anchor="middle" font-size="10" fill="#64748b">适合：入门 / 单用户 / 测试</text>

  <!-- Ollama model rec -->
  <rect x="120" y="335" width="240" height="50" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
  <text x="240" y="355" text-anchor="middle" font-size="10" fill="#1e293b" font-weight="600">推荐模型</text>
  <text x="240" y="372" text-anchor="middle" font-size="10" fill="#475569">8GB GPU → Llama-3.1-8B</text>
  <text x="240" y="386" text-anchor="middle" font-size="10" fill="#475569">16GB GPU → Qwen2.5-14B</text>

  <!-- vLLM path: Q2 -->
  <rect x="660" y="195" width="280" height="44" rx="22" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" filter="url(#sd)"/>
  <text x="800" y="217" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">是否有超长文档（全书/大型语料）？</text>

  <line x1="660" y1="217" x2="540" y2="217" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="585" y="209" font-size="11" fill="#10b981" font-weight="600">是</text>

  <line x1="920" y1="217" x2="960" y2="217" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="890" y="209" font-size="11" fill="#ef4444" font-weight="600">否</text>

  <!-- vLLM long context -->
  <rect x="380" y="260" width="320" height="100" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#sd)"/>
  <text x="540" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#3b82f6">⚡ vLLM + 超长上下文</text>
  <text x="540" y="308" text-anchor="middle" font-size="10" fill="#1e293b">模型：Qwen2.5-1M（1M context）</text>
  <text x="540" y="326" text-anchor="middle" font-size="10" fill="#475569">命令参数：--enable-chunked-prefill</text>
  <text x="540" y="344" text-anchor="middle" font-size="10" fill="#64748b">吞吐 = Ollama 的 3 倍，延迟低 6 倍</text>
  <text x="540" y="358" text-anchor="middle" font-size="10" fill="#64748b">适合：批量文档摄入、多智能体并行</text>

  <!-- vLLM standard -->
  <rect x="680" y="260" width="260" height="100" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#sd)"/>
  <text x="810" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#3b82f6">⚡ vLLM 标准部署</text>
  <text x="810" y="308" text-anchor="middle" font-size="10" fill="#1e293b">模型：Qwen2.5-14B-Instruct</text>
  <text x="810" y="326" text-anchor="middle" font-size="10" fill="#475569">端点：localhost:8000/v1</text>
  <text x="810" y="344" text-anchor="middle" font-size="10" fill="#64748b">适合：生产环境、高并发</text>
  <text x="810" y="358" text-anchor="middle" font-size="10" fill="#64748b">强推理可选 Llama-3.1-70B</text>

  <!-- Connect Ollama and vLLM to bottom summary -->
  <line x1="240" y1="385" x2="240" y2="420" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="360" x2="500" y2="420" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="810" y1="360" x2="660" y2="420" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- Bottom summary -->
  <rect x="140" y="422" width="680" height="130" rx="10" fill="#ffffff" stroke="#1e293b" stroke-width="1.5" filter="url(#sd)"/>
  <text x="480" y="452" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">部署选型速查</text>

  <rect x="160" y="465" width="190" height="78" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="255" y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">Ollama</text>
  <text x="255" y="502" text-anchor="middle" font-size="9" fill="#475569">✅ 零配置上手</text>
  <text x="255" y="516" text-anchor="middle" font-size="9" fill="#475569">✅ 单用户友好</text>
  <text x="255" y="530" text-anchor="middle" font-size="9" fill="#475569">⚠️ 并发性能有限</text>

  <rect x="370" y="465" width="210" height="78" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="475" y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#3b82f6">vLLM 标准</text>
  <text x="475" y="502" text-anchor="middle" font-size="9" fill="#475569">✅ 高吞吐、低延迟</text>
  <text x="475" y="516" text-anchor="middle" font-size="9" fill="#475569">✅ 并发场景 3× 吞吐</text>
  <text x="475" y="530" text-anchor="middle" font-size="9" fill="#475569">⚠️ 需要一定配置</text>

  <rect x="590" y="465" width="210" height="78" rx="8" fill="#eff6ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="695" y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#8b5cf6">vLLM + 超长上下文</text>
  <text x="695" y="502" text-anchor="middle" font-size="9" fill="#475569">✅ 支持 1M token 上下文</text>
  <text x="695" y="516" text-anchor="middle" font-size="9" fill="#475569">✅ 分块预填充优化</text>
  <text x="695" y="530" text-anchor="middle" font-size="9" fill="#475569">⚠️ 需较大显存</text>

  <!-- vLLM perf note -->
  <rect x="480" y="560" width="0" height="0" fill="none"/>
  <text x="480" y="568" text-anchor="middle" font-size="10" fill="#64748b">性能数据：vLLM 并发场景吞吐为 Ollama 3 倍，延迟低 6 倍（PagedAttention 优化）</text>
</svg>
