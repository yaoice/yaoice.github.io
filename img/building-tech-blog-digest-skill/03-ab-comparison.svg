<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="A/B 双跑评测：with-skill vs baseline">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="55%" stop-color="#f6f7fb"/>
      <stop offset="100%" stop-color="#fef3f2"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arrowG3" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/></marker>
    <marker id="arrowR3" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/></marker>
    <pattern id="grid3" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e2e8f0" stroke-width="1" opacity="0.45"/></pattern>
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg3)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid3)" opacity="0.55"/>

  <text x="600" y="46" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a">A/B 双跑：客观打平 8/8 vs 8/8，差异藏在过程里</text>
  <text x="600" y="76" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="500" fill="#475569">硬底线断言抓不到 skill 的真实价值——价值在执行下限和过程效率</text>

  <!-- 顶部相同 prompt -->
  <rect x="370" y="100" width="460" height="55" rx="16" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="124" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="700" fill="#92400e">同一个 prompt：抓 Claude Blog 最新 1 篇，整理成中文图文（不用问我）</text>
  <text x="600" y="143" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="12" fill="#92400e">隔离仓库副本 / 真实联网 / 落 .md + 下图 + hugo 构建</text>

  <!-- 分叉箭头 -->
  <line x1="500" y1="155" x2="280" y2="200" stroke="#16a34a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowG3)"/>
  <line x1="700" y1="155" x2="920" y2="200" stroke="#dc2626" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowR3)"/>

  <!-- 左管道：with-skill -->
  <rect x="60" y="200" width="440" height="380" rx="20" fill="white" stroke="#86efac" stroke-width="2" filter="url(#shadow3)"/>
  <rect x="60" y="200" width="440" height="44" rx="20" fill="#dcfce7"/>
  <text x="280" y="229" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#166534">with-skill：照 SKILL.md 7 步走</text>

  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="13" fill="#0f172a">
    <rect x="80" y="265" width="400" height="36" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="95" y="288" font-weight="700">fetch_listing.py --sources claude --limit 1</text>

    <rect x="80" y="310" width="400" height="36" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="95" y="333" font-weight="700">fetch_article.py + 自动清洗 + 图片本地化</text>

    <rect x="80" y="355" width="400" height="36" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="95" y="378" font-weight="700">写中文复述（agent 唯一发挥空间）</text>

    <rect x="80" y="400" width="400" height="36" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="95" y="423" font-weight="700">render_post.py 拼 front matter + 落盘</text>

    <rect x="80" y="445" width="400" height="36" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="95" y="468" font-weight="700">hugo --gc --minify   ✓ Total in 1175 ms</text>

    <rect x="80" y="490" width="400" height="36" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="95" y="513" font-weight="700">窄化 mark-seen → 仅 1 条 URL</text>

    <rect x="80" y="540" width="400" height="32" rx="10" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="280" y="561" text-anchor="middle" font-weight="800" fill="#1e3a8a">耗时 ~3 分钟</text>
  </g>

  <!-- 右管道：baseline -->
  <rect x="700" y="200" width="440" height="380" rx="20" fill="white" stroke="#fca5a5" stroke-width="2" filter="url(#shadow3)"/>
  <rect x="700" y="200" width="440" height="44" rx="20" fill="#fee2e2"/>
  <text x="920" y="229" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#991b1b">without-skill：从零裸做</text>

  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="13" fill="#0f172a">
    <rect x="720" y="265" width="400" height="36" rx="10" fill="#fff5f5" stroke="#fecaca"/>
    <text x="735" y="288" font-weight="700">curl claude.com/blog + 正则抠 URL</text>

    <rect x="720" y="310" width="400" height="36" rx="10" fill="#fff5f5" stroke="#fecaca"/>
    <text x="735" y="333" font-weight="700">自己写 bs4 找正文容器（试错）</text>

    <rect x="720" y="355" width="400" height="36" rx="10" fill="#fff5f5" stroke="#fecaca"/>
    <text x="735" y="378" font-weight="700">手写图片下载脚本 + 去重 + 命名</text>

    <rect x="720" y="400" width="400" height="36" rx="10" fill="#fff5f5" stroke="#fecaca"/>
    <text x="735" y="423" font-weight="700">看仓库现有 .md 模仿 front matter</text>

    <rect x="720" y="445" width="400" height="36" rx="10" fill="#fff5f5" stroke="#fecaca"/>
    <text x="735" y="468" font-weight="700">写中文复述（含残留 Prev/Next 模板垃圾）</text>

    <rect x="720" y="490" width="400" height="36" rx="10" fill="#fff5f5" stroke="#fecaca"/>
    <text x="735" y="513" font-weight="700">hugo build  ✓ 但产物质量参差</text>

    <rect x="720" y="540" width="400" height="32" rx="10" fill="#fff7ed" stroke="#fbbf24"/>
    <text x="920" y="561" text-anchor="middle" font-weight="800" fill="#9a3412">耗时 ~7 分钟</text>
  </g>

  <!-- 底部对比柱 -->
  <text x="600" y="608" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="700" fill="#0f172a">机检 8 条断言：8/8 vs 8/8 ｜ 时间：3 min vs 7 min（~2.3×）｜ 质量：清洗 / slug / 状态机 全靠自觉</text>
</svg>
