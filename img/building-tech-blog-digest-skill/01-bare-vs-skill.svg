<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="裸做 vs Skill 化的流程对比">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f3"/>
      <stop offset="55%" stop-color="#f6f7fb"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arrowR" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/></marker>
    <marker id="arrowG" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e2e8f0" stroke-width="1" opacity="0.45"/></pattern>
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid)" opacity="0.55"/>

  <text x="600" y="46" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a">同样一篇文章，裸做要照看 6 件事；Skill 化以后 agent 只剩"中文复述"</text>
  <text x="600" y="76" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="500" fill="#475569">把领域知识沉淀进脚本和文档，是把 agent 从"必须聪明"解放成"照做即可"</text>

  <!-- 左：裸做 -->
  <rect x="50" y="110" width="540" height="520" rx="22" fill="#ffffff" stroke="#fca5a5" stroke-width="2" filter="url(#shadow)"/>
  <rect x="50" y="110" width="540" height="50" rx="22" fill="#fee2e2"/>
  <text x="320" y="143" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="800" fill="#991b1b">无 Skill：agent 必须自己想到</text>

  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" fill="#0f172a">
    <rect x="80" y="190" width="480" height="58" rx="12" fill="#fff5f5" stroke="#fecaca"/>
    <text x="100" y="215" font-weight="700">① 选哪个 CSS 选择器抓正文</text>
    <text x="100" y="235" font-size="13" fill="#64748b">Webflow 用 .blog-post_rich-text，要试错或读源码才知道</text>

    <rect x="80" y="258" width="480" height="58" rx="12" fill="#fff5f5" stroke="#fecaca"/>
    <text x="100" y="283" font-weight="700">② 怎么剔除 Prev/Next/FAQ/Subscribe 模板垃圾</text>
    <text x="100" y="303" font-size="13" fill="#64748b">不剔除 → 中文博文里残留"订阅 / 联系销售"等无关内容</text>

    <rect x="80" y="326" width="480" height="58" rx="12" fill="#fff5f5" stroke="#fecaca"/>
    <text x="100" y="351" font-weight="700">③ 怎么 strip 标题里的 "| Claude" 品牌后缀</text>
    <text x="100" y="371" font-size="13" fill="#64748b">不 strip → 文章标题硬带原站后缀，看着别扭</text>

    <rect x="80" y="394" width="480" height="58" rx="12" fill="#fff5f5" stroke="#fecaca"/>
    <text x="100" y="419" font-weight="700">④ 图片下载、去重、文件命名怎么稳定可重跑</text>
    <text x="100" y="439" font-size="13" fill="#64748b">{idx}-{hash}.{ext} 这种约定要自己想到</text>

    <rect x="80" y="462" width="480" height="58" rx="12" fill="#fff5f5" stroke="#fecaca"/>
    <text x="100" y="487" font-weight="700">⑤ Hugo front matter 的字段要对齐仓库现有 .md</text>
    <text x="100" y="507" font-size="13" fill="#64748b">看仓库已有文章自己模仿格式</text>

    <rect x="80" y="530" width="480" height="58" rx="12" fill="#fff5f5" stroke="#fecaca"/>
    <text x="100" y="555" font-weight="700">⑥ 增量去重：下次别再抓今天这篇</text>
    <text x="100" y="575" font-size="13" fill="#64748b">没状态机 → 每次重跑全量重抓</text>
  </g>

  <!-- 中间箭头 -->
  <line x1="595" y1="370" x2="660" y2="370" stroke="#16a34a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowG)"/>
  <text x="627" y="350" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" font-weight="700" fill="#16a34a">沉淀</text>

  <!-- 右：skill 化 -->
  <rect x="660" y="110" width="490" height="520" rx="22" fill="#ffffff" stroke="#86efac" stroke-width="2" filter="url(#shadow)"/>
  <rect x="660" y="110" width="490" height="50" rx="22" fill="#dcfce7"/>
  <text x="905" y="143" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="22" font-weight="800" fill="#14532d">有 Skill：脚本和文档已替 agent 想好</text>

  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="14" fill="#0f172a">
    <rect x="690" y="190" width="430" height="80" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="710" y="216" font-weight="700" fill="#166534">scripts/fetch_article.py</text>
    <text x="710" y="240" font-size="13" fill="#475569">封装 ① 选择器 ② 清洗 ③ 品牌后缀 strip ④ 图片本地化</text>
    <text x="710" y="258" font-size="13" fill="#475569">→ agent 只 cd 进仓库 + 跑命令，零领域知识门槛</text>

    <rect x="690" y="280" width="430" height="80" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="710" y="306" font-weight="700" fill="#166534">scripts/render_post.py</text>
    <text x="710" y="330" font-size="13" fill="#475569">封装 ⑤ front matter 字段对齐 + 自动加原文链接页脚</text>
    <text x="710" y="348" font-size="13" fill="#475569">→ 永远和仓库其它博文同款样式</text>

    <rect x="690" y="370" width="430" height="80" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="710" y="396" font-weight="700" fill="#166534">state/seen.json</text>
    <text x="710" y="420" font-size="13" fill="#475569">封装 ⑥ 增量去重，重跑自动剔已抓 URL</text>
    <text x="710" y="438" font-size="13" fill="#475569">→ 每周跑一次，永远只看到新内容</text>

    <rect x="690" y="460" width="430" height="80" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
    <text x="710" y="486" font-weight="700" fill="#92400e">SKILL.md（约束 + 工作流文档）</text>
    <text x="710" y="510" font-size="13" fill="#475569">7 步骨架 + 摘要确认硬约束 + 豁免/回填/窄化指引</text>
    <text x="710" y="528" font-size="13" fill="#475569">→ 把"判断什么时候做什么"也写进文档</text>

    <rect x="690" y="550" width="430" height="60" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <text x="905" y="578" text-anchor="middle" font-weight="700" fill="#1e3a8a" font-size="15">agent 只剩唯一一件事：把英文原文复述成有节奏的中文</text>
    <text x="905" y="598" text-anchor="middle" font-size="12" fill="#1e40af">这恰好是模型最擅长、最难写进脚本的部分</text>
  </g>
</svg>
