<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="iteration-1 → iteration-2 进化">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f3"/>
      <stop offset="55%" stop-color="#f6f7fb"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/></filter>
    <marker id="arrowK4" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/></marker>
    <pattern id="grid4" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e2e8f0" stroke-width="1" opacity="0.4"/></pattern>
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg4)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid4)" opacity="0.55"/>

  <text x="600" y="46" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a">iteration-2 关键改动：把"agent 必须聪明"迁移到"文档已写明"</text>
  <text x="600" y="76" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="500" fill="#475569">12 条断言里 11 条都不变，唯一变化是元断言——这恰好是 skill 工程化的本质进步</text>

  <!-- 左：iteration-1 网格 -->
  <rect x="50" y="120" width="450" height="540" rx="20" fill="white" stroke="#fcd34d" stroke-width="2" filter="url(#shadow4)"/>
  <rect x="50" y="120" width="450" height="44" rx="20" fill="#fef3c7"/>
  <text x="275" y="149" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#92400e">iteration-1：依赖 agent 经验</text>

  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="12" fill="#0f172a">
    <!-- 旧 8 条都 PASS -->
    <g>
      <rect x="70" y="185" width="410" height="28" rx="6" fill="#f0fdf4" stroke="#86efac"/>
      <text x="85" y="204">①  产出 .md 博文                                         ✓ PASS</text>

      <rect x="70" y="218" width="410" height="28" rx="6" fill="#f0fdf4" stroke="#86efac"/>
      <text x="85" y="237">②  front matter 合法                                       ✓ PASS</text>

      <rect x="70" y="251" width="410" height="28" rx="6" fill="#f0fdf4" stroke="#86efac"/>
      <text x="85" y="270">③  不含 mermaid 代码块                                ✓ PASS</text>

      <rect x="70" y="284" width="410" height="28" rx="6" fill="#f0fdf4" stroke="#86efac"/>
      <text x="85" y="303">④  图片均本地化                                              ✓ PASS</text>

      <rect x="70" y="317" width="410" height="28" rx="6" fill="#f0fdf4" stroke="#86efac"/>
      <text x="85" y="336">⑤  图片文件真实存在                                       ✓ PASS</text>

      <rect x="70" y="350" width="410" height="28" rx="6" fill="#f0fdf4" stroke="#86efac"/>
      <text x="85" y="369">⑥  来源是 Claude/Anthropic                            ✓ PASS</text>

      <rect x="70" y="383" width="410" height="28" rx="6" fill="#f0fdf4" stroke="#86efac"/>
      <text x="85" y="402">⑦  hugo build 通过                                          ✓ PASS</text>

      <rect x="70" y="416" width="410" height="28" rx="6" fill="#f0fdf4" stroke="#86efac"/>
      <text x="85" y="435">⑧  仅 1 篇                                                       ✓ PASS</text>
    </g>

    <!-- 新 4 条 -->
    <g>
      <rect x="70" y="455" width="410" height="28" rx="6" fill="#fff7ed" stroke="#fdba74"/>
      <text x="85" y="474">⑨  豁免行为正确（agent 临场判断）           ✓ PASS</text>

      <rect x="70" y="488" width="410" height="28" rx="6" fill="#fff7ed" stroke="#fdba74"/>
      <text x="85" y="507">⑩  date 不回退到运行当天（agent 手工回填）✓ PASS</text>

      <rect x="70" y="521" width="410" height="28" rx="6" fill="#fff7ed" stroke="#fdba74"/>
      <text x="85" y="540">⑪  seen.json 仅 1 条（agent 自己窄化）        ✓ PASS</text>

      <rect x="70" y="554" width="410" height="34" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <text x="85" y="576" font-weight="700" fill="#991b1b">⑫  SKILL.md 含 P0 三条指引                       ✗ FAIL</text>
    </g>

    <rect x="70" y="600" width="410" height="44" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="275" y="620" text-anchor="middle" font-weight="800" fill="#92400e">11 / 12</text>
    <text x="275" y="638" text-anchor="middle" font-size="11" fill="#92400e">⑨⑩⑪ 全 PASS 是因为我亲跑时"想到了"——文档没写</text>
  </g>

  <!-- 中间箭头 -->
  <path d="M 510 380 Q 580 380 600 380" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowK4)"/>
  <text x="555" y="365" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="13" font-weight="800" fill="#7c3aed">改 SKILL.md</text>
  <text x="555" y="402" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="11" fill="#7c3aed">+49 行 / 4 处增量</text>

  <!-- 右：iteration-2 网格 -->
  <rect x="610" y="120" width="540" height="540" rx="20" fill="white" stroke="#86efac" stroke-width="2" filter="url(#shadow4)"/>
  <rect x="610" y="120" width="540" height="44" rx="20" fill="#dcfce7"/>
  <text x="880" y="149" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="800" fill="#166534">iteration-2：写进 SKILL.md，agent 照做</text>

  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="12" fill="#0f172a">
    <g>
      <rect x="630" y="185" width="500" height="28" rx="6" fill="#f0fdf4" stroke="#86efac"/>
      <text x="645" y="204">①~⑧  原 8 条硬底线断言全部保留 PASS（不会退化）</text>
    </g>

    <rect x="630" y="225" width="500" height="92" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
    <text x="645" y="248" font-weight="800" fill="#92400e">改动 1: Step 2 加豁免出口条款</text>
    <text x="645" y="268" font-size="11" fill="#475569">用户说"不用问我/全部保留/直接整理"时跳过反向提问</text>
    <text x="645" y="285" font-size="11" fill="#475569">仍需在汇报里列出"本次选中的文章"清单</text>
    <text x="645" y="306" font-size="11" font-weight="700" fill="#16a34a">⑨ 现在不再依赖 agent 临场判断 → 任何 agent 照做</text>

    <rect x="630" y="325" width="500" height="92" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
    <text x="645" y="348" font-weight="800" fill="#92400e">改动 2: Step 4.1 元信息回填</text>
    <text x="645" y="368" font-size="11" fill="#475569">published 经常为空，必须从 listing.json 回填</text>
    <text x="645" y="385" font-size="11" fill="#475569">附标准 5 行 Python 代码片段</text>
    <text x="645" y="406" font-size="11" font-weight="700" fill="#16a34a">⑩ 修复"date 错记为运行当天"的潜在 bug</text>

    <rect x="630" y="425" width="500" height="92" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
    <text x="645" y="448" font-weight="800" fill="#92400e">改动 3: Step 7 改写为窄化 mark-seen</text>
    <text x="645" y="468" font-size="11" fill="#475569">不能直接重跑 listing 命令——会过度标记</text>
    <text x="645" y="485" font-size="11" fill="#475569">用 --sources + --limit 收窄到本次实际渲染的来源/数量</text>
    <text x="645" y="506" font-size="11" font-weight="700" fill="#16a34a">⑪ 修复"丢失未圈选文章"的潜在 bug</text>

    <rect x="630" y="525" width="500" height="62" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="645" y="548" font-weight="800" fill="#166534">⑫  SKILL.md 含 P0 三条指引</text>
    <text x="645" y="568" font-size="11" fill="#475569">grep "豁免" "回填" "窄化" → 三个关键词都在文档里</text>
    <text x="1100" y="572" text-anchor="end" font-weight="800" fill="#166534" font-size="14">✓ PASS</text>

    <rect x="630" y="600" width="500" height="44" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="880" y="620" text-anchor="middle" font-weight="800" fill="#166534">12 / 12</text>
    <text x="880" y="638" text-anchor="middle" font-size="11" fill="#14532d">价值不在多 1 条 PASS，而在"agent 不再需要聪明"</text>
  </g>

  <text x="600" y="688" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="13" font-weight="700" fill="#475569">硬底线 = 黄；agent 行为 = 橙；元断言（文档自身）= 紫</text>
</svg>
