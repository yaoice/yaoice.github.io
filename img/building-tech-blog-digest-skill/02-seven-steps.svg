<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-label="tech-blog-digest 的 7 步骨架">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="55%" stop-color="#f6f7fb"/>
      <stop offset="100%" stop-color="#fff8f3"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arrowB2" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <pattern id="grid2" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.45"/></pattern>
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg2)"/>
  <rect width="100%" height="100%" rx="28" fill="url(#grid2)" opacity="0.55"/>

  <text x="600" y="46" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="26" font-weight="800" fill="#0f172a">7 步骨架：把"专家流程"写成可执行清单</text>
  <text x="600" y="76" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="500" fill="#475569">每一步都对应一个脚本或一段提示词；步与步之间的硬约束用红色徽章标出</text>

  <!-- 上排 4 步 -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">
    <!-- Step 1 -->
    <rect x="60" y="120" width="240" height="160" rx="20" fill="white" stroke="#60a5fa" stroke-width="2" filter="url(#shadow2)"/>
    <circle cx="90" cy="150" r="20" fill="#2563eb"/>
    <text x="90" y="157" text-anchor="middle" font-size="20" font-weight="800" fill="white">1</text>
    <text x="120" y="156" font-size="18" font-weight="800" fill="#0f172a">拉列表</text>
    <text x="80" y="190" font-size="13" fill="#475569">fetch_listing.py</text>
    <text x="80" y="212" font-size="13" fill="#475569">--sources google,openai,claude</text>
    <text x="80" y="232" font-size="13" fill="#475569">通过 seen.json 自动去重</text>
    <text x="80" y="262" font-size="12" font-weight="700" fill="#1e40af">→ /tmp/listing.json</text>

    <!-- Step 2 -->
    <rect x="340" y="120" width="240" height="160" rx="20" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#shadow2)"/>
    <circle cx="370" cy="150" r="20" fill="#f59e0b"/>
    <text x="370" y="157" text-anchor="middle" font-size="20" font-weight="800" fill="white">2</text>
    <text x="400" y="156" font-size="18" font-weight="800" fill="#0f172a">摘要确认</text>
    <text x="360" y="190" font-size="13" fill="#475569">列 Markdown 表格给用户</text>
    <text x="360" y="210" font-size="13" fill="#475569">用户回复编号</text>
    <rect x="360" y="225" width="200" height="22" rx="6" fill="#fee2e2"/>
    <text x="460" y="241" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">硬约束：禁止跳过</text>
    <text x="360" y="265" font-size="11" fill="#92400e">（除非用户显式豁免）</text>

    <!-- Step 3 -->
    <rect x="620" y="120" width="240" height="160" rx="20" fill="white" stroke="#60a5fa" stroke-width="2" filter="url(#shadow2)"/>
    <circle cx="650" cy="150" r="20" fill="#2563eb"/>
    <text x="650" y="157" text-anchor="middle" font-size="20" font-weight="800" fill="white">3</text>
    <text x="680" y="156" font-size="18" font-weight="800" fill="#0f172a">抓正文 + 下图</text>
    <text x="640" y="190" font-size="13" fill="#475569">fetch_article.py --slug</text>
    <text x="640" y="212" font-size="13" fill="#475569">图片落到 static/img/&lt;slug&gt;/</text>
    <text x="640" y="232" font-size="13" fill="#475569">src 改写为 /img/&lt;slug&gt;/...</text>
    <text x="640" y="262" font-size="12" font-weight="700" fill="#1e40af">→ /tmp/&lt;slug&gt;.json</text>

    <!-- Step 4 -->
    <rect x="900" y="120" width="240" height="160" rx="20" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#shadow2)"/>
    <circle cx="930" cy="150" r="20" fill="#f59e0b"/>
    <text x="930" y="157" text-anchor="middle" font-size="20" font-weight="800" fill="white">4</text>
    <text x="960" y="156" font-size="18" font-weight="800" fill="#0f172a">写中文复述</text>
    <text x="920" y="190" font-size="13" fill="#475569">不直译 / 留代码 / 配图</text>
    <text x="920" y="210" font-size="13" fill="#475569">每个二级章节配图</text>
    <rect x="920" y="225" width="200" height="22" rx="6" fill="#fff7ed"/>
    <text x="1020" y="241" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">4.1 published 必须回填</text>
    <text x="920" y="265" font-size="11" fill="#92400e">（OG meta 经常为空）</text>
  </g>

  <!-- 上排箭头 -->
  <line x1="305" y1="200" x2="335" y2="200" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowB2)"/>
  <line x1="585" y1="200" x2="615" y2="200" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowB2)"/>
  <line x1="865" y1="200" x2="895" y2="200" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowB2)"/>

  <!-- U 形折返 -->
  <path d="M 1140 280 Q 1190 280 1190 350 Q 1190 420 1140 420 L 60 420 Q 10 420 10 350 Q 10 280 60 280" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="0" stroke-linecap="round" marker-end="url(#arrowB2)"/>

  <!-- 下排 3 步 + 验收 -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">
    <!-- Step 5 -->
    <rect x="60" y="430" width="240" height="160" rx="20" fill="white" stroke="#60a5fa" stroke-width="2" filter="url(#shadow2)"/>
    <circle cx="90" cy="460" r="20" fill="#2563eb"/>
    <text x="90" y="467" text-anchor="middle" font-size="20" font-weight="800" fill="white">5</text>
    <text x="120" y="466" font-size="18" font-weight="800" fill="#0f172a">render 落盘</text>
    <text x="80" y="500" font-size="13" fill="#475569">render_post.py</text>
    <text x="80" y="520" font-size="13" fill="#475569">--meta json --body md</text>
    <text x="80" y="540" font-size="13" fill="#475569">自动拼 front matter</text>
    <text x="80" y="572" font-size="12" font-weight="700" fill="#1e40af">→ content/post/&lt;slug&gt;.md</text>

    <!-- Step 6 -->
    <rect x="340" y="430" width="240" height="160" rx="20" fill="white" stroke="#60a5fa" stroke-width="2" filter="url(#shadow2)"/>
    <circle cx="370" cy="460" r="20" fill="#2563eb"/>
    <text x="370" y="467" text-anchor="middle" font-size="20" font-weight="800" fill="white">6</text>
    <text x="400" y="466" font-size="18" font-weight="800" fill="#0f172a">hugo build 验证</text>
    <text x="360" y="500" font-size="13" fill="#475569">hugo --gc --minify</text>
    <text x="360" y="520" font-size="13" fill="#475569">EXIT=0 才进 Step 7</text>
    <text x="360" y="555" font-size="12" fill="#64748b">失败常见：fm 双引号</text>
    <text x="360" y="572" font-size="12" fill="#64748b">cover_image 缺失</text>

    <!-- Step 7 -->
    <rect x="620" y="430" width="240" height="160" rx="20" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#shadow2)"/>
    <circle cx="650" cy="460" r="20" fill="#f59e0b"/>
    <text x="650" y="467" text-anchor="middle" font-size="20" font-weight="800" fill="white">7</text>
    <text x="680" y="466" font-size="18" font-weight="800" fill="#0f172a">mark-seen</text>
    <text x="640" y="500" font-size="13" fill="#475569">把 URL 写入 seen.json</text>
    <text x="640" y="520" font-size="13" fill="#475569">下次跑自动跳过</text>
    <rect x="640" y="535" width="200" height="22" rx="6" fill="#fee2e2"/>
    <text x="740" y="551" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">必须窄化到本次文章</text>
    <text x="640" y="575" font-size="11" fill="#92400e">否则丢未渲染的文章</text>

    <!-- 验收 -->
    <rect x="900" y="430" width="240" height="160" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="3" filter="url(#shadow2)"/>
    <text x="1020" y="475" text-anchor="middle" font-size="20" font-weight="800" fill="#166534">完成</text>
    <text x="1020" y="505" text-anchor="middle" font-size="13" fill="#14532d">中文图文博文已入仓</text>
    <text x="1020" y="525" text-anchor="middle" font-size="13" fill="#14532d">图片本地化 / front matter 一致</text>
    <text x="1020" y="545" text-anchor="middle" font-size="13" fill="#14532d">下次抓不会重复</text>
    <text x="1020" y="575" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">~3 分钟 / 篇</text>
  </g>

  <!-- 下排箭头 -->
  <line x1="305" y1="510" x2="335" y2="510" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowB2)"/>
  <line x1="585" y1="510" x2="615" y2="510" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowB2)"/>
  <line x1="865" y1="510" x2="895" y2="510" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowB2)"/>

  <text x="600" y="638" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="13" font-weight="600" fill="#475569">蓝色框 = 自动化脚本动作；橙色框 = 需要 agent 决断的关键节点</text>
</svg>
