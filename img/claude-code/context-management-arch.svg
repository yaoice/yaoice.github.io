<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1100" height="780" fill="url(#bgGrad)" rx="12"/>
  <text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="bold">Claude Code 上下文管理架构全景</text>

  <!-- 用户输入 -->
  <rect x="430" y="55" width="240" height="40" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="550" y="80" text-anchor="middle" fill="white" font-size="13" font-weight="600">用户输入 / 工具结果</text>

  <!-- 箭头 -->
  <line x1="550" y1="95" x2="550" y2="115" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#60a5fa"/></marker></defs>

  <!-- 系统提示词组装 -->
  <rect x="60" y="118" width="980" height="105" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="140" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="bold">① 系统提示词组装 (prompts.ts + systemPrompt.ts)</text>
  <rect x="80" y="150" width="180" height="32" rx="6" fill="#1e3a5f"/>
  <text x="170" y="171" text-anchor="middle" fill="#93c5fd" font-size="11">静态指令 (global cache)</text>
  <rect x="275" y="150" width="180" height="32" rx="6" fill="#1e3a5f"/>
  <text x="365" y="171" text-anchor="middle" fill="#93c5fd" font-size="11">动态分区 (session cache)</text>
  <rect x="470" y="150" width="180" height="32" rx="6" fill="#1e3a5f"/>
  <text x="560" y="171" text-anchor="middle" fill="#93c5fd" font-size="11">CLAUDE.md 记忆文件</text>
  <rect x="665" y="150" width="170" height="32" rx="6" fill="#1e3a5f"/>
  <text x="750" y="171" text-anchor="middle" fill="#93c5fd" font-size="11">Git Status 快照</text>
  <rect x="850" y="150" width="170" height="32" rx="6" fill="#1e3a5f"/>
  <text x="935" y="171" text-anchor="middle" fill="#93c5fd" font-size="11">MCP / 环境信息</text>
  <text x="550" y="210" text-anchor="middle" fill="#64748b" font-size="10">SYSTEM_PROMPT_DYNAMIC_BOUNDARY 标记分隔静态/动态内容，实现跨组织全局缓存</text>

  <!-- 箭头 -->
  <line x1="550" y1="223" x2="550" y2="243" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 消息预处理管线 -->
  <rect x="60" y="246" width="980" height="145" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="268" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="bold">② 消息预处理管线 (query.ts 主循环)</text>

  <rect x="80" y="280" width="175" height="48" rx="6" fill="#0d3320"/>
  <text x="167" y="299" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Snip Compact</text>
  <text x="167" y="316" text-anchor="middle" fill="#4ade80" font-size="9">裁剪最老历史片段</text>

  <text x="267" y="308" text-anchor="middle" fill="#4ade80" font-size="16">→</text>

  <rect x="280" y="280" width="175" height="48" rx="6" fill="#0d3320"/>
  <text x="367" y="299" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">MicroCompact</text>
  <text x="367" y="316" text-anchor="middle" fill="#4ade80" font-size="9">清理旧工具结果内容</text>

  <text x="467" y="308" text-anchor="middle" fill="#4ade80" font-size="16">→</text>

  <rect x="480" y="280" width="175" height="48" rx="6" fill="#0d3320"/>
  <text x="567" y="299" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Context Collapse</text>
  <text x="567" y="316" text-anchor="middle" fill="#4ade80" font-size="9">折叠上下文视图</text>

  <text x="667" y="308" text-anchor="middle" fill="#4ade80" font-size="16">→</text>

  <rect x="680" y="280" width="175" height="48" rx="6" fill="#0d3320"/>
  <text x="767" y="299" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Auto Compact</text>
  <text x="767" y="316" text-anchor="middle" fill="#4ade80" font-size="9">全量摘要压缩 / SM压缩</text>

  <text x="867" y="308" text-anchor="middle" fill="#4ade80" font-size="16">→</text>

  <rect x="880" y="280" width="145" height="48" rx="6" fill="#0d3320"/>
  <text x="952" y="299" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Blocking Limit</text>
  <text x="952" y="316" text-anchor="middle" fill="#4ade80" font-size="9">阻止 API 调用</text>

  <text x="550" y="355" text-anchor="middle" fill="#64748b" font-size="10">Token 阈值: effectiveWindow - 13K (autocompact) → effectiveWindow - 3K (blocking)</text>
  <text x="550" y="375" text-anchor="middle" fill="#64748b" font-size="10">tokenCountWithEstimation = 最后 API usage + 新消息粗略估算 (每4字符≈1 token)</text>

  <!-- 箭头 -->
  <line x1="550" y1="391" x2="550" y2="411" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- API 调用与缓存 -->
  <rect x="60" y="414" width="480" height="130" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="300" y="436" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="bold">③ API 调用与提示缓存</text>
  <rect x="80" y="448" width="210" height="36" rx="6" fill="#2e1065"/>
  <text x="185" y="471" text-anchor="middle" fill="#c4b5fd" font-size="11">Prompt Cache (global/org scope)</text>
  <rect x="305" y="448" width="220" height="36" rx="6" fill="#2e1065"/>
  <text x="415" y="471" text-anchor="middle" fill="#c4b5fd" font-size="11">cache_edits (缓存微压缩)</text>
  <rect x="80" y="495" width="210" height="36" rx="6" fill="#2e1065"/>
  <text x="185" y="518" text-anchor="middle" fill="#c4b5fd" font-size="11">缓存破坏检测 (Phase 1+2)</text>
  <rect x="305" y="495" width="220" height="36" rx="6" fill="#2e1065"/>
  <text x="415" y="518" text-anchor="middle" fill="#c4b5fd" font-size="11">Reactive Compact (413 恢复)</text>

  <!-- 工具执行与附件注入 -->
  <rect x="560" y="414" width="480" height="130" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="800" y="436" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="bold">④ 工具执行与附件注入</text>
  <rect x="580" y="448" width="210" height="36" rx="6" fill="#422006"/>
  <text x="685" y="471" text-anchor="middle" fill="#fcd34d" font-size="11">StreamingToolExecutor (并行)</text>
  <rect x="805" y="448" width="220" height="36" rx="6" fill="#422006"/>
  <text x="915" y="471" text-anchor="middle" fill="#fcd34d" font-size="11">文件变更 / 计划 / 技能附件</text>
  <rect x="580" y="495" width="210" height="36" rx="6" fill="#422006"/>
  <text x="685" y="518" text-anchor="middle" fill="#fcd34d" font-size="11">Tool Result Budget 预算</text>
  <rect x="805" y="495" width="220" height="36" rx="6" fill="#422006"/>
  <text x="915" y="518" text-anchor="middle" fill="#fcd34d" font-size="11">Memory Prefetch 记忆预取</text>

  <!-- 箭头 -->
  <line x1="550" y1="544" x2="550" y2="564" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 后处理 -->
  <rect x="60" y="567" width="980" height="100" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="589" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="bold">⑤ 后处理与会话持久化</text>

  <rect x="80" y="600" width="220" height="48" rx="6" fill="#450a0a"/>
  <text x="190" y="619" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Session Memory 后台提取</text>
  <text x="190" y="636" text-anchor="middle" fill="#f87171" font-size="9">维护 markdown 会话笔记文件</text>

  <rect x="320" y="600" width="220" height="48" rx="6" fill="#450a0a"/>
  <text x="430" y="619" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Tool Use Summary 生成</text>
  <text x="430" y="636" text-anchor="middle" fill="#f87171" font-size="9">Haiku 异步生成工具摘要</text>

  <rect x="560" y="600" width="220" height="48" rx="6" fill="#450a0a"/>
  <text x="670" y="619" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Transcript 持久化</text>
  <text x="670" y="636" text-anchor="middle" fill="#f87171" font-size="9">JSONL 格式会话记录</text>

  <rect x="800" y="600" width="220" height="48" rx="6" fill="#450a0a"/>
  <text x="910" y="619" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Post-Compact 清理</text>
  <text x="910" y="636" text-anchor="middle" fill="#f87171" font-size="9">重置缓存/状态/记忆文件</text>

  <!-- 底部循环箭头 -->
  <path d="M1040,620 Q1060,620 1060,400 Q1060,110 550,110" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#475569"/></marker></defs>
  <text x="1070" y="400" fill="#64748b" font-size="10" writing-mode="tb">下一轮循环</text>

  <!-- 底部关键指标 -->
  <rect x="60" y="690" width="980" height="75" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="550" y="712" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold">关键参数</text>
  <text x="150" y="735" text-anchor="middle" fill="#64748b" font-size="10">默认上下文窗口: 200K tokens</text>
  <text x="370" y="735" text-anchor="middle" fill="#64748b" font-size="10">AutoCompact 缓冲: 13K tokens</text>
  <text x="590" y="735" text-anchor="middle" fill="#64748b" font-size="10">Blocking 阈值: 3K tokens</text>
  <text x="810" y="735" text-anchor="middle" fill="#64748b" font-size="10">压缩最大输出: 20K tokens</text>
  <text x="150" y="755" text-anchor="middle" fill="#64748b" font-size="10">1M 上下文: Opus 4.6/Sonnet 4.6</text>
  <text x="370" y="755" text-anchor="middle" fill="#64748b" font-size="10">Token 估算: 每4字符 ≈ 1 token</text>
  <text x="590" y="755" text-anchor="middle" fill="#64748b" font-size="10">Post-Compact 文件恢复: 最多5个</text>
  <text x="810" y="755" text-anchor="middle" fill="#64748b" font-size="10">SM-Compact 保留: 10K-40K tokens</text>
</svg>
