<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="parent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#3a0ca3"/>
    </linearGradient>
    <linearGradient id="cache" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06d6a0"/>
      <stop offset="100%" style="stop-color:#118ab2"/>
    </linearGradient>
    <linearGradient id="fork1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f72585"/>
      <stop offset="100%" style="stop-color:#b5179e"/>
    </linearGradient>
    <linearGradient id="fork2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7209b7"/>
      <stop offset="100%" style="stop-color:#560bad"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <text x="450" y="38" fill="#fff" font-size="22" font-weight="bold" text-anchor="middle">Fork Sub-Agent Prompt Cache 共享机制</text>
  <text x="450" y="60" fill="#8888aa" font-size="12" text-anchor="middle">所有 Fork 子代共享父代的 API 请求前缀 → 最大化缓存命中</text>

  <!-- Parent Agent -->
  <g filter="url(#shadow)">
    <rect x="300" y="80" width="300" height="50" rx="10" fill="url(#parent)" opacity="0.95"/>
    <text x="450" y="110" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">Parent Agent (主代理)</text>
  </g>

  <!-- Prompt Cache Block -->
  <g filter="url(#shadow)">
    <rect x="100" y="160" width="700" height="170" rx="12" fill="url(#cache)" opacity="0.2" stroke="#06d6a0" stroke-width="1.5"/>
    <text x="130" y="185" fill="#06d6a0" font-size="14" font-weight="bold">🔒 Prompt Cache 共享前缀 (所有 Fork 子代字节一致)</text>

    <rect x="120" y="200" width="200" height="50" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(6,214,160,0.4)" stroke-width="1"/>
    <text x="220" y="221" fill="#4cc9f0" font-size="11" font-weight="bold" text-anchor="middle">System Prompt</text>
    <text x="220" y="239" fill="#888" font-size="10" text-anchor="middle">renderedSystemPrompt</text>

    <rect x="340" y="200" width="200" height="50" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(6,214,160,0.4)" stroke-width="1"/>
    <text x="440" y="221" fill="#4cc9f0" font-size="11" font-weight="bold" text-anchor="middle">Tool Definitions</text>
    <text x="440" y="239" fill="#888" font-size="10" text-anchor="middle">useExactTools: true</text>

    <rect x="560" y="200" width="220" height="50" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(6,214,160,0.4)" stroke-width="1"/>
    <text x="670" y="221" fill="#4cc9f0" font-size="11" font-weight="bold" text-anchor="middle">Thinking Config</text>
    <text x="670" y="239" fill="#888" font-size="10" text-anchor="middle">继承父代 thinkingConfig</text>

    <rect x="120" y="265" width="340" height="50" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(6,214,160,0.4)" stroke-width="1"/>
    <text x="290" y="286" fill="#4cc9f0" font-size="11" font-weight="bold" text-anchor="middle">Messages Prefix (历史 + Assistant tool_use 块)</text>
    <text x="290" y="304" fill="#888" font-size="10" text-anchor="middle">克隆完整 assistant 消息 (thinking + text + tool_use)</text>

    <rect x="480" y="265" width="300" height="50" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(6,214,160,0.4)" stroke-width="1"/>
    <text x="630" y="286" fill="#4cc9f0" font-size="11" font-weight="bold" text-anchor="middle">Tool Results (统一占位符)</text>
    <text x="630" y="304" fill="#888" font-size="10" text-anchor="middle">"Fork started — processing in background"</text>
  </g>

  <!-- Diverge point -->
  <rect x="310" y="345" width="280" height="30" rx="6" fill="rgba(247,37,133,0.2)" stroke="#f72585" stroke-width="1"/>
  <text x="450" y="365" fill="#f72585" font-size="11" font-weight="bold" text-anchor="middle">↓ 仅最后一个 text block 不同 (per-child directive) ↓</text>

  <!-- Fork Children -->
  <path d="M350 375 L200 415" stroke="#f72585" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="197,411 198,421 205,413" fill="#f72585"/>
  <path d="M450 375 L450 415" stroke="#7209b7" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="445,412 450,422 455,412" fill="#7209b7"/>
  <path d="M550 375 L700 415" stroke="#4361ee" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="695,413 702,421 703,411" fill="#4361ee"/>

  <g filter="url(#shadow)">
    <rect x="80" y="420" width="230" height="80" rx="10" fill="url(#fork1)" opacity="0.85"/>
    <text x="195" y="448" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">Fork 子代 A</text>
    <text x="195" y="468" fill="rgba(255,255,255,0.7)" font-size="10" text-anchor="middle">FORK_DIRECTIVE: "调研 auth 模块"</text>
    <text x="195" y="488" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="middle">name: "auth-research"</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="335" y="420" width="230" height="80" rx="10" fill="url(#fork2)" opacity="0.85"/>
    <text x="450" y="448" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">Fork 子代 B</text>
    <text x="450" y="468" fill="rgba(255,255,255,0.7)" font-size="10" text-anchor="middle">FORK_DIRECTIVE: "修复 DB 连接"</text>
    <text x="450" y="488" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="middle">name: "db-fix"</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="420" width="230" height="80" rx="10" fill="rgba(67,97,238,0.7)" opacity="0.85" stroke="#4361ee" stroke-width="1"/>
    <text x="705" y="448" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">Fork 子代 C</text>
    <text x="705" y="468" fill="rgba(255,255,255,0.7)" font-size="10" text-anchor="middle">FORK_DIRECTIVE: "验证测试覆盖"</text>
    <text x="705" y="488" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="middle">name: "test-check"</text>
  </g>

  <!-- Cache hit indicator -->
  <g filter="url(#glow)">
    <rect x="150" y="530" width="600" height="65" rx="10" fill="rgba(6,214,160,0.15)" stroke="#06d6a0" stroke-width="1.5"/>
    <text x="450" y="555" fill="#06d6a0" font-size="14" font-weight="bold" text-anchor="middle">✅ 缓存命中率最大化：3 个子代共享同一份 cache_creation</text>
    <text x="450" y="578" fill="#8888aa" font-size="11" text-anchor="middle">cache_read_input_tokens ≈ cache_creation_input_tokens (首次) → 后续 Fork 几乎零创建成本</text>
  </g>
</svg>
