<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="tealG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="orangeG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667eea"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#43e97b"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f5576c"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/>
    </filter>
  </defs>

  <rect width="880" height="520" rx="16" fill="#f8f9fe"/>
  <text x="440" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Agentic Loop 执行流程</text>

  <!-- User Input -->
  <g filter="url(#sh)">
    <rect x="350" y="58" width="180" height="46" rx="23" fill="url(#blueG)"/>
    <text x="440" y="87" text-anchor="middle" font-size="15" fill="#fff" font-weight="600">👤 用户输入</text>
  </g>

  <!-- Arrow down -->
  <path d="M440 104 L440 135" stroke="#667eea" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Claude Model LLM -->
  <g filter="url(#sh)">
    <rect x="310" y="140" width="260" height="54" rx="12" fill="#1a1a2e"/>
    <text x="440" y="173" text-anchor="middle" font-size="16" fill="#fff" font-weight="700">🧠 Claude Model (LLM)</text>
  </g>

  <!-- Context Window on right -->
  <g filter="url(#sh)">
    <rect x="640" y="80" width="210" height="140" rx="10" fill="#fff" stroke="#667eea" stroke-width="1.5"/>
    <rect x="640" y="80" width="210" height="32" rx="10" fill="url(#blueG)"/>
    <text x="745" y="101" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">📋 上下文窗口</text>
    <text x="655" y="130" font-size="11.5" fill="#555">• 对话历史</text>
    <text x="655" y="148" font-size="11.5" fill="#555">• 文件内容 / 命令输出</text>
    <text x="655" y="166" font-size="11.5" fill="#555">• CLAUDE.md 项目配置</text>
    <text x="655" y="184" font-size="11.5" fill="#555">• 系统指令 / Auto Memory</text>
  </g>
  <path d="M570 167 L635 150" stroke="#667eea" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Diamond: Tool Use? -->
  <g filter="url(#sh)">
    <polygon points="440,220 540,270 440,320 340,270" fill="#fff" stroke="#764ba2" stroke-width="2"/>
    <text x="440" y="266" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="700">需要工具?</text>
    <text x="440" y="282" text-anchor="middle" font-size="11" fill="#888">(stop_reason)</text>
  </g>

  <!-- Yes: Left - Execute Tools -->
  <text x="310" y="258" text-anchor="middle" font-size="13" fill="#43e97b" font-weight="700">Yes</text>
  <path d="M340 270 L190 270" stroke="#43e97b" stroke-width="2.5" marker-end="url(#arrG)"/>

  <g filter="url(#sh)">
    <rect x="30" y="235" width="155" height="70" rx="10" fill="url(#greenG)"/>
    <text x="107" y="264" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="700">⚡ 执行工具</text>
    <text x="107" y="284" text-anchor="middle" font-size="11" fill="#1a1a2ecc">TOOL_HANDLERS</text>
  </g>

  <!-- Tool categories below Execute -->
  <g filter="url(#sh)">
    <rect x="15" y="325" width="186" height="140" rx="10" fill="#fff" stroke="#43e97b" stroke-width="1.5"/>
    <text x="108" y="348" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="600">工具注册表</text>
    <line x1="25" y1="356" x2="191" y2="356" stroke="#e0e0e0"/>
    <text x="30" y="374" font-size="11" fill="#555">📁 read / write / edit</text>
    <text x="30" y="392" font-size="11" fill="#555">🔍 glob / grep / semantic</text>
    <text x="30" y="410" font-size="11" fill="#555">⚡ bash (Shell 命令)</text>
    <text x="30" y="428" font-size="11" fill="#555">🌐 web_search / web_fetch</text>
    <text x="30" y="446" font-size="11" fill="#555">📋 todo_write / plan</text>
  </g>

  <!-- Arrow: Execute → tool_result → back to LLM -->
  <path d="M108 305 L108 318" stroke="#43e97b" stroke-width="1.5"/>
  <path d="M108 465 L108 485 L440 485 L440 370" stroke="#667eea" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="280" y="500" text-anchor="middle" font-size="12" fill="#667eea" font-weight="600">tool_result 追加到 messages</text>

  <!-- Arrow: tool_result back up to Diamond -->
  <path d="M440 370 L440 325" stroke="#667eea" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Loop label from Diamond back to LLM -->
  <path d="M415 320 C380 350 280 320 280 200 C280 160 310 155 310 167" stroke="#764ba2" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr)"/>
  <text x="255" y="248" text-anchor="middle" font-size="11" fill="#764ba2" font-weight="600">继续循环</text>

  <!-- No: Right - Generate Text -->
  <text x="570" y="290" text-anchor="middle" font-size="13" fill="#f5576c" font-weight="700">No</text>
  <path d="M540 270 L640 270" stroke="#f5576c" stroke-width="2.5" marker-end="url(#arrR)"/>

  <g filter="url(#sh)">
    <rect x="645" y="248" width="200" height="50" rx="10" fill="url(#orangeG)"/>
    <text x="745" y="278" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">📝 生成文本响应</text>
  </g>

  <!-- Arrow down to Output -->
  <path d="M745 298 L745 338" stroke="#f5576c" stroke-width="2.5" marker-end="url(#arrR)"/>

  <g filter="url(#sh)">
    <rect x="645" y="343" width="200" height="46" rx="23" fill="url(#blueG)"/>
    <text x="745" y="372" text-anchor="middle" font-size="15" fill="#fff" font-weight="600">📤 输出给用户</text>
  </g>

  <!-- Key insight box -->
  <g filter="url(#sh)">
    <rect x="520" y="420" width="340" height="85" rx="10" fill="#fff" stroke="#764ba2" stroke-width="1.5"/>
    <rect x="520" y="420" width="340" height="28" rx="10" fill="#764ba2"/>
    <text x="690" y="439" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">💡 关键洞察</text>
    <text x="535" y="465" font-size="11" fill="#555">• 模型决定是否/何时/如何使用工具</text>
    <text x="535" y="483" font-size="11" fill="#555">• Harness 只负责执行和反馈结果</text>
    <text x="535" y="501" font-size="11" fill="#555">• 循环持续到模型认为任务完成</text>
  </g>
</svg>