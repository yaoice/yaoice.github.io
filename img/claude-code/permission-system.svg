<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 950" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="950" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" fill="#fff" font-size="24" font-weight="bold" text-anchor="middle">Claude Code 权限系统决策流程</text>
  <text x="400" y="70" fill="#8888aa" font-size="13" text-anchor="middle">四级权限模式 + YOLO 智能分类器</text>

  <!-- Tool Call Request -->
  <g filter="url(#shadow2)">
    <rect x="300" y="90" width="200" height="50" rx="25" fill="#4361ee" stroke="#6d8cff" stroke-width="1.5"/>
    <text x="400" y="120" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">工具调用请求</text>
  </g>
  <line x1="400" y1="140" x2="400" y2="170" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="395,168 400,178 405,168" fill="#4cc9f0"/>

  <!-- Permission Mode Check -->
  <g filter="url(#shadow2)">
    <polygon points="400,180 530,240 400,300 270,240" fill="#2d2b55" stroke="#7209b7" stroke-width="2"/>
    <text x="400" y="237" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">检查权限模式</text>
    <text x="400" y="255" fill="#ccc" font-size="10" text-anchor="middle">PermissionMode</text>
  </g>

  <!-- 4 Permission Modes -->
  <!-- bypass -->
  <line x1="270" y1="240" x2="100" y2="240" stroke="#2ec4b9" stroke-width="2"/>
  <text x="185" y="232" fill="#2ec4b9" font-size="11">bypass</text>
  <g filter="url(#shadow2)">
    <rect x="20" y="215" width="160" height="50" rx="10" fill="#1b4332" stroke="#2ec4b9" stroke-width="1.5"/>
    <text x="100" y="237" fill="#2ec4b9" font-size="12" font-weight="bold" text-anchor="middle">bypassPermissions</text>
    <text x="100" y="253" fill="#95d5b2" font-size="10" text-anchor="middle">跳过所有确认 ✓</text>
  </g>
  <line x1="100" y1="265" x2="100" y2="860" stroke="#2ec4b9" stroke-width="1.5" stroke-dasharray="4"/>
  
  <!-- default -->
  <line x1="530" y1="240" x2="680" y2="240" stroke="#e63946" stroke-width="2"/>
  <text x="600" y="232" fill="#e63946" font-size="11">default</text>
  <g filter="url(#shadow2)">
    <rect x="610" y="215" width="170" height="50" rx="10" fill="#3d0814" stroke="#e63946" stroke-width="1.5"/>
    <text x="695" y="237" fill="#e63946" font-size="12" font-weight="bold" text-anchor="middle">default 模式</text>
    <text x="695" y="253" fill="#ffa0a0" font-size="10" text-anchor="middle">每次都需用户确认</text>
  </g>
  <line x1="695" y1="265" x2="695" y2="480" stroke="#e63946" stroke-width="1.5"/>
  <polygon points="690,478 695,488 700,478" fill="#e63946"/>

  <!-- plan -->
  <line x1="340" y1="300" x2="220" y2="370" stroke="#f4a261" stroke-width="2"/>
  <text x="250" y="340" fill="#f4a261" font-size="11">plan</text>
  <g filter="url(#shadow2)">
    <rect x="120" y="350" width="200" height="70" rx="10" fill="#3d2800" stroke="#f4a261" stroke-width="1.5"/>
    <text x="220" y="375" fill="#f4a261" font-size="12" font-weight="bold" text-anchor="middle">plan 模式</text>
    <text x="220" y="395" fill="#ffd6a5" font-size="10" text-anchor="middle">提交计划 → 用户审批</text>
    <text x="220" y="410" fill="#c99a55" font-size="10" text-anchor="middle">→ 批准后执行</text>
  </g>
  <line x1="220" y1="420" x2="220" y2="860" stroke="#f4a261" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- auto/YOLO -->
  <line x1="460" y1="300" x2="500" y2="370" stroke="#7209b7" stroke-width="2"/>
  <text x="510" y="340" fill="#c77dff" font-size="11">auto (YOLO)</text>

  <!-- Rules Check -->
  <g filter="url(#shadow2)">
    <rect x="400" y="370" width="240" height="60" rx="10" fill="#2d1b4e" stroke="#7209b7" stroke-width="1.5"/>
    <text x="520" y="395" fill="#c77dff" font-size="13" font-weight="bold" text-anchor="middle">规则匹配引擎</text>
    <text x="520" y="412" fill="#b89ce0" font-size="10" text-anchor="middle">.claude/settings.json 规则库</text>
  </g>

  <!-- Rules sub-items -->
  <line x1="520" y1="430" x2="520" y2="460" stroke="#7209b7" stroke-width="1.5"/>

  <!-- Diamond: match? -->
  <polygon points="520,460 590,500 520,540 450,500" fill="#2d2b55" stroke="#c77dff" stroke-width="1.5"/>
  <text x="520" y="503" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">匹配?</text>

  <!-- Match → Allow -->
  <line x1="450" y1="500" x2="350" y2="500" stroke="#2ec4b9" stroke-width="1.5"/>
  <text x="390" y="493" fill="#2ec4b9" font-size="10">allow规则</text>
  <g filter="url(#shadow2)">
    <rect x="250" y="480" width="100" height="40" rx="8" fill="#1b4332" stroke="#2ec4b9" stroke-width="1"/>
    <text x="300" y="505" fill="#2ec4b9" font-size="12" font-weight="bold" text-anchor="middle">自动批准</text>
  </g>
  <line x1="300" y1="520" x2="300" y2="860" stroke="#2ec4b9" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- No match → YOLO Classifier -->
  <line x1="520" y1="540" x2="520" y2="580" stroke="#c77dff" stroke-width="1.5"/>
  <text x="540" y="565" fill="#888" font-size="10">无匹配</text>

  <!-- YOLO Classifier Box -->
  <g filter="url(#shadow2)">
    <rect x="350" y="580" width="340" height="170" rx="12" fill="#1e0a3c" stroke="#9d4edd" stroke-width="2"/>
    <rect x="350" y="580" width="340" height="35" rx="12" fill="rgba(157,78,221,0.3)"/>
    <text x="520" y="603" fill="#e0aaff" font-size="14" font-weight="bold" text-anchor="middle">YOLO 分类器 (51KB)</text>

    <rect x="370" y="625" width="145" height="35" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="442" y="647" fill="#ccc" font-size="10" text-anchor="middle">命令语义分析</text>

    <rect x="525" y="625" width="145" height="35" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="597" y="647" fill="#ccc" font-size="10" text-anchor="middle">操作范围评估</text>

    <rect x="370" y="670" width="145" height="35" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="442" y="692" fill="#ccc" font-size="10" text-anchor="middle">路径敏感度检测</text>

    <rect x="525" y="670" width="145" height="35" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="597" y="692" fill="#ccc" font-size="10" text-anchor="middle">历史批准模式</text>

    <rect x="370" y="715" width="300" height="25" rx="6" fill="rgba(157,78,221,0.15)"/>
    <text x="520" y="732" fill="#b89ce0" font-size="10" text-anchor="middle">读操作 vs 写操作 | 项目内 vs 系统目录 | 单文件 vs 全局</text>
  </g>

  <!-- YOLO result -->
  <line x1="520" y1="750" x2="520" y2="780" stroke="#c77dff" stroke-width="1.5"/>
  
  <!-- Diamond: Safe or Dangerous -->
  <polygon points="520,780 590,815 520,850 450,815" fill="#2d2b55" stroke="#c77dff" stroke-width="1.5"/>
  <text x="520" y="818" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">判定</text>

  <!-- Safe -->
  <line x1="450" y1="815" x2="350" y2="815" stroke="#2ec4b9" stroke-width="2"/>
  <text x="390" y="808" fill="#2ec4b9" font-size="10">安全</text>

  <!-- Dangerous → confirm -->
  <line x1="590" y1="815" x2="695" y2="815" stroke="#e63946" stroke-width="2"/>
  <text x="640" y="808" fill="#e63946" font-size="10">危险</text>

  <!-- User Confirm Dialog -->
  <g filter="url(#shadow2)">
    <rect x="610" y="490" width="170" height="80" rx="10" fill="#3d0814" stroke="#e63946" stroke-width="1.5"/>
    <text x="695" y="518" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">弹出确认对话框</text>
    <text x="695" y="538" fill="#ffa0a0" font-size="10" text-anchor="middle">Allow / Deny</text>
    <text x="695" y="555" fill="#888" font-size="9" text-anchor="middle">可保存为永久规则</text>
  </g>
  <line x1="695" y1="570" x2="695" y2="815" stroke="#e63946" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Execute Tool - bottom -->
  <g filter="url(#shadow2)">
    <rect x="250" y="870" width="300" height="55" rx="25" fill="#1b4332" stroke="#2ec4b9" stroke-width="2"/>
    <text x="400" y="900" fill="#2ec4b9" font-size="16" font-weight="bold" text-anchor="middle">✓ 执行工具</text>
    <text x="400" y="918" fill="#95d5b2" font-size="10" text-anchor="middle">结果反馈给 LLM → 继续 Agentic Loop</text>
  </g>

  <!-- Converging lines to Execute -->
  <line x1="100" y1="860" x2="300" y2="895" stroke="#2ec4b9" stroke-width="1" stroke-dasharray="4"/>
  <line x1="220" y1="860" x2="310" y2="890" stroke="#f4a261" stroke-width="1" stroke-dasharray="4"/>
  <line x1="300" y1="860" x2="350" y2="880" stroke="#2ec4b9" stroke-width="1" stroke-dasharray="4"/>
  <line x1="350" y1="815" x2="350" y2="870" stroke="#2ec4b9" stroke-width="1.5"/>
</svg>
