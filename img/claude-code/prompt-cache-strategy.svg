<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgG3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="s3"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1000" height="520" fill="url(#bgG3)" rx="12"/>
  <text x="500" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">Claude Code 提示缓存 (Prompt Cache) 策略</text>

  <!-- System Prompt Cache -->
  <rect x="40" y="55" width="460" height="200" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" filter="url(#s3)"/>
  <text x="270" y="78" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="bold">系统提示词缓存分区</text>

  <rect x="60" y="92" width="200" height="65" rx="8" fill="#2e1065"/>
  <text x="160" y="112" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">静态内容 (scope: global)</text>
  <text x="160" y="128" text-anchor="middle" fill="#a78bfa" font-size="9">身份定义 / 系统规则</text>
  <text x="160" y="143" text-anchor="middle" fill="#a78bfa" font-size="9">任务指令 / 工具使用指南</text>

  <rect x="280" y="92" width="200" height="65" rx="8" fill="#2e1065"/>
  <text x="380" y="112" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">动态内容 (scope: null)</text>
  <text x="380" y="128" text-anchor="middle" fill="#a78bfa" font-size="9">MCP 指令 / 语言偏好</text>
  <text x="380" y="143" text-anchor="middle" fill="#a78bfa" font-size="9">环境信息 / 记忆文件</text>

  <rect x="60" y="168" width="420" height="35" rx="6" fill="#1e1b4b"/>
  <text x="270" y="190" text-anchor="middle" fill="#a78bfa" font-size="10">SYSTEM_PROMPT_DYNAMIC_BOUNDARY 分隔标记 → 静态部分跨 org 共享</text>

  <text x="270" y="238" text-anchor="middle" fill="#64748b" font-size="9">systemPromptSection() = 缓存型，计算一次整个会话不变</text>
  <text x="270" y="248" text-anchor="middle" fill="#64748b" font-size="9">DANGEROUS_uncachedSection() = 易变型，每轮重新计算</text>

  <!-- Tool Schema Cache -->
  <rect x="520" y="55" width="460" height="200" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5" filter="url(#s3)"/>
  <text x="750" y="78" text-anchor="middle" fill="#67e8f9" font-size="14" font-weight="bold">工具 Schema 缓存</text>

  <rect x="540" y="92" width="200" height="65" rx="8" fill="#083344"/>
  <text x="640" y="112" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">toolSchemaCache</text>
  <text x="640" y="128" text-anchor="middle" fill="#22d3ee" font-size="9">name + description + schema</text>
  <text x="640" y="143" text-anchor="middle" fill="#22d3ee" font-size="9">会话期间稳定，防止 GrowthBook 翻转</text>

  <rect x="760" y="92" width="200" height="65" rx="8" fill="#083344"/>
  <text x="860" y="112" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">defer_loading</text>
  <text x="860" y="128" text-anchor="middle" fill="#22d3ee" font-size="9">MCP 工具延迟加载</text>
  <text x="860" y="143" text-anchor="middle" fill="#22d3ee" font-size="9">不计入上下文 token 统计</text>

  <text x="750" y="185" text-anchor="middle" fill="#64748b" font-size="10">cache_control: { type: 'ephemeral', scope: 'global'|'org', ttl: '5m'|'1h' }</text>
  <text x="750" y="208" text-anchor="middle" fill="#64748b" font-size="9">Forked Agent (compact/session_memory) 共享主线程的缓存前缀</text>
  <text x="750" y="223" text-anchor="middle" fill="#64748b" font-size="9">→ 压缩 API 调用可实现高缓存命中率</text>

  <!-- Cache Break Detection -->
  <rect x="40" y="270" width="920" height="120" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#s3)"/>
  <text x="500" y="293" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="bold">缓存破坏检测与防护 (promptCacheBreakDetection.ts)</text>

  <rect x="60" y="305" width="280" height="70" rx="8" fill="#422006"/>
  <text x="200" y="325" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">Phase 1: recordPromptState (pre-call)</text>
  <text x="200" y="342" text-anchor="middle" fill="#fbbf24" font-size="9">记录: systemHash / toolsHash / cacheControlHash</text>
  <text x="200" y="356" text-anchor="middle" fill="#fbbf24" font-size="9">model / fastMode / betas / effortValue / extraBody</text>
  <text x="200" y="370" text-anchor="middle" fill="#fbbf24" font-size="9">perToolHashes 精确到每个工具的 schema</text>

  <rect x="360" y="305" width="280" height="70" rx="8" fill="#422006"/>
  <text x="500" y="325" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">Phase 2: checkResponseForCacheBreak</text>
  <text x="500" y="342" text-anchor="middle" fill="#fbbf24" font-size="9">检测: cache_read_tokens 下降 > 5%</text>
  <text x="500" y="356" text-anchor="middle" fill="#fbbf24" font-size="9">且绝对值 > 2K tokens</text>
  <text x="500" y="370" text-anchor="middle" fill="#fbbf24" font-size="9">排除: TTL 过期 / cacheDeletion / compaction</text>

  <rect x="660" y="305" width="280" height="70" rx="8" fill="#422006"/>
  <text x="800" y="325" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">防护措施</text>
  <text x="800" y="342" text-anchor="middle" fill="#fbbf24" font-size="9">notifyCompaction(): 压缩后重置基线</text>
  <text x="800" y="356" text-anchor="middle" fill="#fbbf24" font-size="9">notifyCacheDeletion(): 微压缩后标记</text>
  <text x="800" y="370" text-anchor="middle" fill="#fbbf24" font-size="9">差异日志: 写入 diff 文件供调试</text>

  <!-- Cached MicroCompact -->
  <rect x="40" y="405" width="920" height="100" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#s3)"/>
  <text x="500" y="428" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="bold">缓存感知微压缩 (Cached MicroCompact)</text>

  <rect x="60" y="440" width="290" height="52" rx="8" fill="#0d3320"/>
  <text x="205" y="460" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">cache_edits API</text>
  <text x="205" y="478" text-anchor="middle" fill="#4ade80" font-size="9">按 tool_use_id 删除旧工具结果 → 不破坏缓存前缀</text>

  <rect x="370" y="440" width="280" height="52" rx="8" fill="#0d3320"/>
  <text x="510" y="460" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Time-based MicroCompact</text>
  <text x="510" y="478" text-anchor="middle" fill="#4ade80" font-size="9">空闲 > N 分钟 → 缓存已冷 → 直接清空旧内容</text>

  <rect x="670" y="440" width="275" height="52" rx="8" fill="#0d3320"/>
  <text x="807" y="460" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">cache_deleted_input_tokens</text>
  <text x="807" y="478" text-anchor="middle" fill="#4ade80" font-size="9">API 返回累计删除 token 数 → 计算每次操作增量</text>
</svg>
