<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="tg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="tg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="tg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="tg4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="tg5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <linearGradient id="tg6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a18cd1"/>
      <stop offset="100%" style="stop-color:#fbc2eb"/>
    </linearGradient>
    <filter id="ts">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000015"/>
    </filter>
    <marker id="ta" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667eea"/>
    </marker>
  </defs>

  <rect width="860" height="540" rx="16" fill="#f8f9fe"/>
  <text x="430" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Claude Code 工具系统架构</text>

  <!-- Model Decision (top center) -->
  <g filter="url(#ts)">
    <rect x="310" y="55" width="240" height="50" rx="25" fill="url(#tg1)"/>
    <text x="430" y="85" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">🧠 模型决策 (tool_use)</text>
  </g>

  <!-- Arrows from Model to Registry -->
  <path d="M430 105 L430 155" stroke="#667eea" stroke-width="2" marker-end="url(#ta)"/>

  <!-- Central Registry -->
  <g filter="url(#ts)">
    <rect x="280" y="160" width="300" height="55" rx="12" fill="#1a1a2e"/>
    <text x="430" y="185" text-anchor="middle" font-size="13" fill="#ffffffcc">Central</text>
    <text x="430" y="203" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">工具注册表 &amp; 分发器</text>
  </g>

  <!-- Lines from Registry to 6 tool categories -->
  <line x1="140" y1="215" x2="140" y2="260" stroke="#f5576c" stroke-width="2"/>
  <line x1="300" y1="215" x2="300" y2="260" stroke="#4facfe" stroke-width="2"/>
  <line x1="430" y1="215" x2="430" y2="260" stroke="#43e97b" stroke-width="2"/>
  <line x1="560" y1="215" x2="560" y2="260" stroke="#fa709a" stroke-width="2"/>
  <line x1="720" y1="215" x2="720" y2="260" stroke="#a18cd1" stroke-width="2"/>

  <line x1="140" y1="215" x2="280" y2="188" stroke="#f5576c" stroke-width="1.5"/>
  <line x1="300" y1="215" x2="310" y2="215" stroke="#4facfe" stroke-width="1.5"/>
  <line x1="560" y1="215" x2="550" y2="215" stroke="#fa709a" stroke-width="1.5"/>
  <line x1="720" y1="215" x2="580" y2="188" stroke="#a18cd1" stroke-width="1.5"/>

  <!-- Category 1: File Operations -->
  <g filter="url(#ts)">
    <rect x="40" y="262" width="200" height="160" rx="10" fill="#fff" stroke="#f5576c" stroke-width="2"/>
    <rect x="40" y="262" width="200" height="38" rx="10" fill="url(#tg2)"/>
    <text x="140" y="286" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">📁 文件操作</text>
    <text x="60" y="322" font-size="12" fill="#555" font-weight="600">Read / ReadFile</text>
    <text x="60" y="344" font-size="12" fill="#555" font-weight="600">Write</text>
    <text x="60" y="366" font-size="12" fill="#555" font-weight="600">Edit</text>
    <text x="60" y="388" font-size="12" fill="#555" font-weight="600">MultiEdit</text>
    <text x="195" y="322" font-size="10" fill="#999" text-anchor="end">读取文件</text>
    <text x="195" y="344" font-size="10" fill="#999" text-anchor="end">创建/覆盖</text>
    <text x="195" y="366" font-size="10" fill="#999" text-anchor="end">精确替换</text>
    <text x="195" y="388" font-size="10" fill="#999" text-anchor="end">批量编辑</text>
  </g>

  <!-- Category 2: Search -->
  <g filter="url(#ts)">
    <rect x="260" y="262" width="165" height="160" rx="10" fill="#fff" stroke="#4facfe" stroke-width="2"/>
    <rect x="260" y="262" width="165" height="38" rx="10" fill="url(#tg3)"/>
    <text x="342" y="286" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">🔍 搜索</text>
    <text x="280" y="322" font-size="12" fill="#555" font-weight="600">Glob</text>
    <text x="280" y="349" font-size="12" fill="#555" font-weight="600">Grep</text>
    <text x="280" y="376" font-size="12" fill="#555" font-weight="600">Codebase</text>
    <text x="280" y="391" font-size="12" fill="#555" font-weight="600">Search</text>
    <text x="405" y="322" font-size="10" fill="#999" text-anchor="end">路径匹配</text>
    <text x="405" y="349" font-size="10" fill="#999" text-anchor="end">正则搜索</text>
    <text x="405" y="383" font-size="10" fill="#999" text-anchor="end">语义搜索</text>
  </g>

  <!-- Category 3: Execution -->
  <g filter="url(#ts)">
    <rect x="445" y="262" width="120" height="110" rx="10" fill="#fff" stroke="#43e97b" stroke-width="2"/>
    <rect x="445" y="262" width="120" height="38" rx="10" fill="url(#tg4)"/>
    <text x="505" y="286" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="700">⚡ 执行</text>
    <text x="465" y="322" font-size="12" fill="#555" font-weight="600">Bash</text>
    <text x="545" y="322" font-size="10" fill="#999" text-anchor="end">Shell</text>
    <text x="465" y="344" font-size="10" fill="#888">构建/测试/Git</text>
  </g>

  <!-- Category 4: Web -->
  <g filter="url(#ts)">
    <rect x="445" y="392" width="120" height="122" rx="10" fill="#fff" stroke="#fa709a" stroke-width="2"/>
    <rect x="445" y="392" width="120" height="38" rx="10" fill="url(#tg5)"/>
    <text x="505" y="416" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">🌐 Web</text>
    <text x="465" y="452" font-size="12" fill="#555" font-weight="600">WebSearch</text>
    <text x="465" y="474" font-size="12" fill="#555" font-weight="600">WebFetch</text>
    <text x="545" y="452" font-size="10" fill="#999" text-anchor="end">搜索</text>
    <text x="545" y="474" font-size="10" fill="#999" text-anchor="end">抓取</text>
  </g>

  <!-- Category 5: Task & Agent -->
  <g filter="url(#ts)">
    <rect x="590" y="262" width="240" height="160" rx="10" fill="#fff" stroke="#a18cd1" stroke-width="2"/>
    <rect x="590" y="262" width="240" height="38" rx="10" fill="url(#tg6)"/>
    <text x="710" y="286" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="700">📋 任务管理 &amp; 🤝 协作</text>
    <text x="610" y="322" font-size="12" fill="#555" font-weight="600">TodoWrite</text>
    <text x="610" y="344" font-size="12" fill="#555" font-weight="600">EnterPlanMode</text>
    <text x="610" y="371" font-size="12" fill="#555" font-weight="600">SendMessage</text>
    <text x="610" y="393" font-size="12" fill="#555" font-weight="600">TeammateTool</text>
    <text x="810" y="322" font-size="10" fill="#999" text-anchor="end">任务列表</text>
    <text x="810" y="344" font-size="10" fill="#999" text-anchor="end">计划模式</text>
    <text x="810" y="371" font-size="10" fill="#999" text-anchor="end">Agent 通信</text>
    <text x="810" y="393" font-size="10" fill="#999" text-anchor="end">团队管理</text>
  </g>

  <!-- Bottom: Tool Result flow -->
  <g filter="url(#ts)">
    <rect x="250" y="470" width="360" height="50" rx="25" fill="#1a1a2e"/>
    <text x="430" y="500" text-anchor="middle" font-size="14" fill="#fff" font-weight="600">📦 Tool Result → 追加到消息历史 → 继续循环</text>
  </g>

  <!-- Arrows from categories to result -->
  <path d="M140 422 L140 480 L250 495" stroke="#ccc" stroke-width="1.5" fill="none"/>
  <path d="M342 422 L370 495" stroke="#ccc" stroke-width="1.5" fill="none"/>
  <path d="M505 514 L505 495 L610 495" stroke="#ccc" stroke-width="1.5" fill="none"/>
  <path d="M710 422 L710 480 L610 495" stroke="#ccc" stroke-width="1.5" fill="none"/>
</svg>