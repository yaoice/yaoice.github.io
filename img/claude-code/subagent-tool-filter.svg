<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="l1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f72585"/>
      <stop offset="100%" style="stop-color:#b5179e"/>
    </linearGradient>
    <linearGradient id="l2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7209b7"/>
      <stop offset="100%" style="stop-color:#560bad"/>
    </linearGradient>
    <linearGradient id="l3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#3a0ca3"/>
    </linearGradient>
    <linearGradient id="pass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06d6a0"/>
      <stop offset="100%" style="stop-color:#118ab2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="550" fill="url(#bg)" rx="12"/>

  <text x="400" y="38" fill="#fff" font-size="22" font-weight="bold" text-anchor="middle">三层工具过滤机制</text>
  <text x="400" y="58" fill="#8888aa" font-size="12" text-anchor="middle">filterToolsForAgent → resolveAgentTools → allowedAgentTypes</text>

  <!-- Input -->
  <g filter="url(#shadow)">
    <rect x="280" y="75" width="240" height="40" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="400" y="100" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">🔧 所有可用工具 (assembleToolPool)</text>
  </g>

  <path d="M400 115 L400 140" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="396,138 400,146 404,138" fill="#4cc9f0"/>

  <!-- Layer 1 -->
  <g filter="url(#shadow)">
    <rect x="80" y="148" width="640" height="105" rx="10" fill="url(#l1)" opacity="0.85"/>
    <text x="110" y="175" fill="#fff" font-size="14" font-weight="bold">L1: 全局过滤 (filterToolsForAgent)</text>

    <rect x="100" y="190" width="180" height="50" rx="6" fill="rgba(0,0,0,0.3)"/>
    <text x="190" y="210" fill="#f72585" font-size="11" font-weight="bold" text-anchor="middle">🚫 全局禁止</text>
    <text x="190" y="228" fill="#ccc" font-size="9" text-anchor="middle">TaskOutput, Agent*, Workflow</text>

    <rect x="300" y="190" width="200" height="50" rx="6" fill="rgba(0,0,0,0.3)"/>
    <text x="400" y="210" fill="#f72585" font-size="11" font-weight="bold" text-anchor="middle">🚫 自定义 Agent 额外禁止</text>
    <text x="400" y="228" fill="#ccc" font-size="9" text-anchor="middle">CUSTOM_AGENT_DISALLOWED</text>

    <rect x="520" y="190" width="180" height="50" rx="6" fill="rgba(0,0,0,0.3)"/>
    <text x="610" y="210" fill="#4cc9f0" font-size="11" font-weight="bold" text-anchor="middle">✅ 异步白名单</text>
    <text x="610" y="228" fill="#ccc" font-size="9" text-anchor="middle">ASYNC_AGENT_ALLOWED</text>
  </g>

  <!-- MCP bypass -->
  <rect x="585" y="148" width="120" height="24" rx="4" fill="rgba(6,214,160,0.3)" stroke="#06d6a0" stroke-width="1"/>
  <text x="645" y="164" fill="#06d6a0" font-size="9" font-weight="bold" text-anchor="middle">mcp__* 始终放行</text>

  <path d="M400 253 L400 278" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="396,276 400,284 404,276" fill="#4cc9f0"/>

  <!-- Layer 2 -->
  <g filter="url(#shadow)">
    <rect x="80" y="286" width="640" height="95" rx="10" fill="url(#l2)" opacity="0.85"/>
    <text x="110" y="313" fill="#fff" font-size="14" font-weight="bold">L2: Agent 定义级过滤 (resolveAgentTools)</text>

    <rect x="100" y="325" width="195" height="42" rx="6" fill="rgba(0,0,0,0.3)"/>
    <text x="197" y="350" fill="#ccc" font-size="11" text-anchor="middle">tools: ['*'] → 全部</text>

    <rect x="310" y="325" width="195" height="42" rx="6" fill="rgba(0,0,0,0.3)"/>
    <text x="407" y="350" fill="#ccc" font-size="11" text-anchor="middle">tools: ['Read','Bash']</text>

    <rect x="520" y="325" width="185" height="42" rx="6" fill="rgba(0,0,0,0.3)"/>
    <text x="612" y="350" fill="#ccc" font-size="11" text-anchor="middle">disallowedTools 排除</text>
  </g>

  <path d="M400 381 L400 406" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="396,404 400,412 404,404" fill="#4cc9f0"/>

  <!-- Layer 3 -->
  <g filter="url(#shadow)">
    <rect x="80" y="414" width="640" height="55" rx="10" fill="url(#l3)" opacity="0.85"/>
    <text x="110" y="440" fill="#fff" font-size="14" font-weight="bold">L3: allowedAgentTypes — Agent(worker, researcher) 语法</text>
    <text x="110" y="458" fill="#ccc" font-size="11">限制子 Agent 可产生的 Agent 类型范围</text>
  </g>

  <path d="M400 469 L400 494" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="396,492 400,500 404,492" fill="#4cc9f0"/>

  <!-- Output -->
  <g filter="url(#shadow)">
    <rect x="200" y="502" width="400" height="36" rx="8" fill="url(#pass)" opacity="0.9"/>
    <text x="400" y="525" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">✅ 最终可用工具池 (resolvedTools)</text>
  </g>

  <!-- Fork bypass note -->
  <rect x="30" y="502" width="155" height="36" rx="6" fill="rgba(247,37,133,0.2)" stroke="#f72585" stroke-width="1"/>
  <text x="107" y="524" fill="#f72585" font-size="10" font-weight="bold" text-anchor="middle">Fork: 跳过全部过滤!</text>
</svg>
