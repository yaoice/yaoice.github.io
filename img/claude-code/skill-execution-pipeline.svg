<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#60a5fa"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#34d399"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#a78bfa"/></marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f87171"/></marker>
  </defs>
  <rect width="1000" height="580" fill="url(#bg3)" rx="12"/>
  <text x="500" y="38" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="bold">SkillTool 执行管线 (Execution Pipeline)</text>
  <!-- Entry -->
  <rect x="380" y="58" width="240" height="44" rx="22" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.6" stroke-width="2"/>
  <text x="500" y="85" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="bold">用户 /skill-name 或 Model 调用</text>
  <line x1="500" y1="102" x2="500" y2="120" stroke="#60a5fa" stroke-width="2" marker-end="url(#a1)"/>
  <!-- validateInput -->
  <rect x="350" y="122" width="300" height="55" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.5"/>
  <text x="500" y="147" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">1. validateInput()</text>
  <text x="500" y="167" text-anchor="middle" fill="#60a5fa" font-size="10">标准化名称 → 查找命令 → 检查 disableModelInvocation → 确认 type='prompt'</text>
  <line x1="500" y1="177" x2="500" y2="195" stroke="#60a5fa" stroke-width="2" marker-end="url(#a1)"/>
  <!-- checkPermissions -->
  <rect x="350" y="197" width="300" height="55" rx="8" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.5"/>
  <text x="500" y="222" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="bold">2. checkPermissions()</text>
  <text x="500" y="242" text-anchor="middle" fill="#fbbf24" font-size="10">deny rules → allow rules → safe props 自动放行 → user ask</text>
  <line x1="500" y1="252" x2="500" y2="270" stroke="#fbbf24" stroke-width="2" marker-end="url(#a1)"/>
  <!-- call() dispatch -->
  <rect x="350" y="272" width="300" height="44" rx="8" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.6" stroke-width="2"/>
  <text x="500" y="299" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="bold">3. call() — 三路分发</text>
  <!-- Three branches -->
  <line x1="400" y1="316" x2="160" y2="350" stroke="#34d399" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="500" y1="316" x2="500" y2="350" stroke="#a78bfa" stroke-width="2" marker-end="url(#a3)"/>
  <line x1="600" y1="316" x2="840" y2="350" stroke="#f87171" stroke-width="2" marker-end="url(#a4)"/>
  <!-- Inline branch -->
  <rect x="30" y="352" width="280" height="200" rx="10" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.4"/>
  <text x="170" y="377" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="bold">Inline (默认)</text>
  <rect x="50" y="392" width="240" height="30" rx="5" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.3"/><text x="170" y="412" text-anchor="middle" fill="#34d399" font-size="10">processPromptSlashCommand()</text>
  <rect x="50" y="430" width="240" height="30" rx="5" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.3"/><text x="170" y="450" text-anchor="middle" fill="#34d399" font-size="10">参数替换 + !command 执行</text>
  <rect x="50" y="468" width="240" height="30" rx="5" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.3"/><text x="170" y="488" text-anchor="middle" fill="#34d399" font-size="10">contextModifier: 合并工具权限</text>
  <rect x="50" y="506" width="240" height="30" rx="5" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.3"/><text x="170" y="526" text-anchor="middle" fill="#34d399" font-size="10">返回 newMessages 注入主对话</text>
  <!-- Fork branch -->
  <rect x="350" y="352" width="300" height="200" rx="10" fill="#2e1e5f" stroke="#8b5cf6" stroke-opacity="0.4"/>
  <text x="500" y="377" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="bold">Fork (context: 'fork')</text>
  <rect x="370" y="392" width="260" height="30" rx="5" fill="#2e1e5f" stroke="#8b5cf6" stroke-opacity="0.3"/><text x="500" y="412" text-anchor="middle" fill="#a78bfa" font-size="10">createAgentId() 创建子 agent</text>
  <rect x="370" y="430" width="260" height="30" rx="5" fill="#2e1e5f" stroke="#8b5cf6" stroke-opacity="0.3"/><text x="500" y="450" text-anchor="middle" fill="#a78bfa" font-size="10">prepareForkedCommandContext()</text>
  <rect x="370" y="468" width="260" height="30" rx="5" fill="#2e1e5f" stroke="#8b5cf6" stroke-opacity="0.3"/><text x="500" y="488" text-anchor="middle" fill="#a78bfa" font-size="10">runAgent() 隔离环境执行</text>
  <rect x="370" y="506" width="260" height="30" rx="5" fill="#2e1e5f" stroke="#8b5cf6" stroke-opacity="0.3"/><text x="500" y="526" text-anchor="middle" fill="#a78bfa" font-size="10">extractResultText → 释放消息内存</text>
  <!-- Remote branch -->
  <rect x="690" y="352" width="280" height="200" rx="10" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.4"/>
  <text x="830" y="377" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="bold">Remote (实验性)</text>
  <rect x="710" y="392" width="240" height="30" rx="5" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.3"/><text x="830" y="412" text-anchor="middle" fill="#f87171" font-size="10">loadRemoteSkill(slug, url)</text>
  <rect x="710" y="430" width="240" height="30" rx="5" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.3"/><text x="830" y="450" text-anchor="middle" fill="#f87171" font-size="10">AKI/GCS 加载 + 本地缓存</text>
  <rect x="710" y="468" width="240" height="30" rx="5" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.3"/><text x="830" y="488" text-anchor="middle" fill="#f87171" font-size="10">注入 base dir + 变量替换</text>
  <rect x="710" y="506" width="240" height="30" rx="5" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.3"/><text x="830" y="526" text-anchor="middle" fill="#f87171" font-size="10">addInvokedSkill → compaction 恢复</text>
</svg>
