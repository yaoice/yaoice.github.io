<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#3a0ca3"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7209b7"/>
      <stop offset="100%" style="stop-color:#560bad"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f72585"/>
      <stop offset="100%" style="stop-color:#b5179e"/>
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4cc9f0"/>
      <stop offset="100%" style="stop-color:#4361ee"/>
    </linearGradient>
    <linearGradient id="card5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06d6a0"/>
      <stop offset="100%" style="stop-color:#118ab2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="750" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" fill="#fff" font-size="22" font-weight="bold" text-anchor="middle">Claude Code Sub-Agent 系统架构总览</text>
  <text x="450" y="62" fill="#8888aa" font-size="12" text-anchor="middle">AgentTool.tsx → runAgent.ts → query() → 结果返回</text>

  <!-- Main Agent -->
  <g filter="url(#shadow)">
    <rect x="300" y="80" width="300" height="50" rx="10" fill="url(#card1)" opacity="0.95"/>
    <text x="450" y="110" fill="#fff" font-size="15" font-weight="bold" text-anchor="middle">Main Agent / Coordinator</text>
  </g>

  <!-- Arrow -->
  <path d="M450 130 L450 165" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="445,162 450,172 455,162" fill="#4cc9f0"/>

  <!-- AgentTool Dispatch Layer -->
  <g filter="url(#shadow)">
    <rect x="100" y="175" width="700" height="95" rx="12" fill="url(#card2)" opacity="0.9"/>
    <rect x="100" y="175" width="700" height="32" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="130" y="197" fill="#fff" font-size="14" font-weight="bold">AgentTool.tsx — 调度 &amp; 生命周期管理</text>

    <rect x="120" y="218" width="140" height="38" rx="6" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="190" y="242" fill="#ccc" font-size="11" text-anchor="middle">类型路由</text>

    <rect x="280" y="218" width="140" height="38" rx="6" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="350" y="242" fill="#ccc" font-size="11" text-anchor="middle">Agent 选择验证</text>

    <rect x="440" y="218" width="140" height="38" rx="6" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="510" y="242" fill="#ccc" font-size="11" text-anchor="middle">工具池组装</text>

    <rect x="600" y="218" width="180" height="38" rx="6" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="690" y="242" fill="#ccc" font-size="11" text-anchor="middle">同步/异步执行分支</text>
  </g>

  <!-- Fork vs Standard arrows -->
  <path d="M300 270 L220 310" stroke="#f72585" stroke-width="2"/>
  <polygon points="217,306 218,316 225,308" fill="#f72585"/>
  <path d="M600 270 L680 310" stroke="#06d6a0" stroke-width="2"/>
  <polygon points="675,308 682,316 683,306" fill="#06d6a0"/>

  <!-- Fork Path -->
  <g filter="url(#shadow)">
    <rect x="50" y="315" width="330" height="110" rx="12" fill="url(#card3)" opacity="0.9"/>
    <rect x="50" y="315" width="330" height="32" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="80" y="337" fill="#fff" font-size="13" font-weight="bold">🔀 Fork 路径 — 继承父上下文</text>
    <text x="75" y="365" fill="#ccc" font-size="11">• 共享父代 Prompt Cache</text>
    <text x="75" y="383" fill="#ccc" font-size="11">• 使用父代精确工具池 (useExactTools)</text>
    <text x="75" y="401" fill="#ccc" font-size="11">• permissionMode: bubble</text>
    <text x="75" y="419" fill="#ccc" font-size="11">• 继承 thinkingConfig + model: inherit</text>
  </g>

  <!-- Standard Path -->
  <g filter="url(#shadow)">
    <rect x="520" y="315" width="330" height="110" rx="12" fill="url(#card5)" opacity="0.9"/>
    <rect x="520" y="315" width="330" height="32" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="550" y="337" fill="#fff" font-size="13" font-weight="bold">📋 标准路径 — 独立上下文</text>
    <text x="545" y="365" fill="#ccc" font-size="11">• Agent 自己的 getSystemPrompt()</text>
    <text x="545" y="383" fill="#ccc" font-size="11">• 独立构建 workerTools</text>
    <text x="545" y="401" fill="#ccc" font-size="11">• permissionMode: acceptEdits</text>
    <text x="545" y="419" fill="#ccc" font-size="11">• thinkingConfig: disabled</text>
  </g>

  <!-- Arrows to runAgent -->
  <path d="M215 425 L350 465" stroke="#f72585" stroke-width="2"/>
  <polygon points="347,461 352,471 357,462" fill="#f72585"/>
  <path d="M685 425 L550 465" stroke="#06d6a0" stroke-width="2"/>
  <polygon points="543,462 548,471 553,461" fill="#06d6a0"/>

  <!-- runAgent -->
  <g filter="url(#shadow)">
    <rect x="200" y="470" width="500" height="50" rx="10" fill="url(#card4)" opacity="0.95"/>
    <text x="450" y="500" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">runAgent.ts — 会话循环 (query → yield → maxTurns)</text>
  </g>

  <!-- Arrow to agents -->
  <path d="M450 520 L450 555" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="445,552 450,562 455,552" fill="#4cc9f0"/>

  <!-- Built-in Agents -->
  <g filter="url(#shadow)">
    <rect x="40" y="565" width="820" height="160" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="70" y="590" fill="#fff" font-size="14" font-weight="bold">内置 Sub-Agents</text>

    <!-- Agent boxes -->
    <rect x="60" y="605" width="120" height="55" rx="8" fill="rgba(67,97,238,0.4)" stroke="#4361ee" stroke-width="1"/>
    <text x="120" y="626" fill="#4cc9f0" font-size="11" font-weight="bold" text-anchor="middle">General</text>
    <text x="120" y="644" fill="#888" font-size="9" text-anchor="middle">tools: * | inherit</text>

    <rect x="195" y="605" width="120" height="55" rx="8" fill="rgba(76,201,240,0.3)" stroke="#4cc9f0" stroke-width="1"/>
    <text x="255" y="626" fill="#4cc9f0" font-size="11" font-weight="bold" text-anchor="middle">Explore</text>
    <text x="255" y="644" fill="#888" font-size="9" text-anchor="middle">只读 | haiku</text>

    <rect x="330" y="605" width="120" height="55" rx="8" fill="rgba(76,201,240,0.3)" stroke="#4cc9f0" stroke-width="1"/>
    <text x="390" y="626" fill="#4cc9f0" font-size="11" font-weight="bold" text-anchor="middle">Plan</text>
    <text x="390" y="644" fill="#888" font-size="9" text-anchor="middle">只读 | inherit</text>

    <rect x="465" y="605" width="120" height="55" rx="8" fill="rgba(247,37,133,0.35)" stroke="#f72585" stroke-width="1"/>
    <text x="525" y="626" fill="#f72585" font-size="11" font-weight="bold" text-anchor="middle">Verification</text>
    <text x="525" y="644" fill="#888" font-size="9" text-anchor="middle">后台 | 对抗验证</text>

    <rect x="600" y="605" width="120" height="55" rx="8" fill="rgba(114,9,183,0.35)" stroke="#7209b7" stroke-width="1"/>
    <text x="660" y="626" fill="#b5a0d0" font-size="11" font-weight="bold" text-anchor="middle">Guide</text>
    <text x="660" y="644" fill="#888" font-size="9" text-anchor="middle">haiku | dontAsk</text>

    <rect x="735" y="605" width="110" height="55" rx="8" fill="rgba(255,165,0,0.3)" stroke="#ffa500" stroke-width="1"/>
    <text x="790" y="626" fill="#ffa500" font-size="11" font-weight="bold" text-anchor="middle">Statusline</text>
    <text x="790" y="644" fill="#888" font-size="9" text-anchor="middle">sonnet | R+W</text>

    <!-- Custom + Plugin -->
    <rect x="60" y="670" width="200" height="40" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="160" y="695" fill="#aaa" font-size="11" text-anchor="middle">📁 Custom Agents (.md)</text>

    <rect x="280" y="670" width="200" height="40" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="380" y="695" fill="#aaa" font-size="11" text-anchor="middle">🔌 Plugin Agents</text>

    <rect x="500" y="670" width="200" height="40" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="600" y="695" fill="#aaa" font-size="11" text-anchor="middle">🏳️ Flag Agents (GrowthBook)</text>
  </g>
</svg>
