<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#60a5fa"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#34d399"/></marker>
    <marker id="arrP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#a78bfa"/></marker>
  </defs>
  <rect width="1000" height="650" fill="url(#bg2)" rx="12"/>
  <text x="500" y="38" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="bold">Skill 发现与加载流程</text>
  <!-- Phase 1: Static Discovery -->
  <rect x="30" y="60" width="940" height="200" rx="10" fill="none" stroke="#3b82f6" stroke-opacity="0.3" stroke-dasharray="6,3"/>
  <text x="50" y="85" fill="#93c5fd" font-size="14" font-weight="bold">阶段一：启动时静态加载 (getSkillDirCommands)</text>
  <!-- Parallel loading boxes -->
  <rect x="50" y="100" width="160" height="55" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.5"/><text x="130" y="122" text-anchor="middle" fill="#93c5fd" font-size="11">managed (policy)</text><text x="130" y="140" text-anchor="middle" fill="#60a5fa" font-size="9">getManagedFilePath()</text>
  <rect x="230" y="100" width="160" height="55" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.5"/><text x="310" y="122" text-anchor="middle" fill="#93c5fd" font-size="11">user (~/.claude)</text><text x="310" y="140" text-anchor="middle" fill="#60a5fa" font-size="9">getClaudeConfigHomeDir()</text>
  <rect x="410" y="100" width="160" height="55" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.5"/><text x="490" y="122" text-anchor="middle" fill="#93c5fd" font-size="11">project (逐级上行)</text><text x="490" y="140" text-anchor="middle" fill="#60a5fa" font-size="9">getProjectDirsUpToHome()</text>
  <rect x="590" y="100" width="160" height="55" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.5"/><text x="670" y="122" text-anchor="middle" fill="#93c5fd" font-size="11">additional (--add-dir)</text><text x="670" y="140" text-anchor="middle" fill="#60a5fa" font-size="9">getAdditionalDirs()</text>
  <rect x="770" y="100" width="180" height="55" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.5"/><text x="860" y="122" text-anchor="middle" fill="#93c5fd" font-size="11">legacy (/commands/)</text><text x="860" y="140" text-anchor="middle" fill="#60a5fa" font-size="9">loadSkillsFromCommandsDir()</text>
  <text x="500" y="97" text-anchor="middle" fill="#60a5fa" font-size="10">Promise.all() 并行加载</text>
  <!-- Dedup + separate -->
  <rect x="200" y="175" width="260" height="40" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-opacity="0.6"/><text x="330" y="200" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">realpath 去重 (解析符号链接)</text>
  <rect x="530" y="175" width="260" height="40" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-opacity="0.6"/><text x="660" y="195" text-anchor="middle" fill="#60a5fa" font-size="11">分离: unconditional / conditional</text><text x="660" y="210" text-anchor="middle" fill="#93c5fd" font-size="9">(paths frontmatter → conditionalSkills map)</text>
  <line x1="330" y1="155" x2="330" y2="173" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="155" x2="660" y2="173" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Phase 2: Dynamic Discovery -->
  <rect x="30" y="275" width="460" height="170" rx="10" fill="none" stroke="#10b981" stroke-opacity="0.3" stroke-dasharray="6,3"/>
  <text x="50" y="300" fill="#6ee7b7" font-size="14" font-weight="bold">阶段二：运行时动态发现</text>
  <rect x="50" y="315" width="200" height="50" rx="6" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.5"/>
  <text x="150" y="337" text-anchor="middle" fill="#6ee7b7" font-size="11">文件操作触发</text><text x="150" y="355" text-anchor="middle" fill="#34d399" font-size="9">Read/Write/Edit tool calls</text>
  <rect x="270" y="315" width="200" height="50" rx="6" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.5"/>
  <text x="370" y="337" text-anchor="middle" fill="#6ee7b7" font-size="11">discoverSkillDirsForPaths()</text><text x="370" y="355" text-anchor="middle" fill="#34d399" font-size="9">向上遍历到 cwd 检查 .claude/skills/</text>
  <line x1="250" y1="340" x2="268" y2="340" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrG)"/>
  <rect x="50" y="380" width="200" height="50" rx="6" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.5"/>
  <text x="150" y="402" text-anchor="middle" fill="#6ee7b7" font-size="11">gitignore 检查</text><text x="150" y="420" text-anchor="middle" fill="#34d399" font-size="9">跳过 gitignored 目录</text>
  <rect x="270" y="380" width="200" height="50" rx="6" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.5"/>
  <text x="370" y="402" text-anchor="middle" fill="#6ee7b7" font-size="11">addSkillDirectories()</text><text x="370" y="420" text-anchor="middle" fill="#34d399" font-size="9">深路径优先 → dynamicSkills map</text>
  <line x1="250" y1="405" x2="268" y2="405" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrG)"/>
  <!-- Phase 3: Conditional Activation -->
  <rect x="510" y="275" width="460" height="170" rx="10" fill="none" stroke="#8b5cf6" stroke-opacity="0.3" stroke-dasharray="6,3"/>
  <text x="530" y="300" fill="#c4b5fd" font-size="14" font-weight="bold">阶段三：条件技能激活</text>
  <rect x="530" y="315" width="200" height="50" rx="6" fill="#2e1e5f" stroke="#8b5cf6" stroke-opacity="0.5"/>
  <text x="630" y="337" text-anchor="middle" fill="#c4b5fd" font-size="11">activateConditionalSkills</text><text x="630" y="355" text-anchor="middle" fill="#a78bfa" font-size="9">ForPaths(filePaths, cwd)</text>
  <rect x="750" y="315" width="200" height="50" rx="6" fill="#2e1e5f" stroke="#8b5cf6" stroke-opacity="0.5"/>
  <text x="850" y="337" text-anchor="middle" fill="#c4b5fd" font-size="11">ignore 库匹配</text><text x="850" y="355" text-anchor="middle" fill="#a78bfa" font-size="9">gitignore 风格路径匹配</text>
  <line x1="730" y1="340" x2="748" y2="340" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrP)"/>
  <rect x="530" y="380" width="420" height="50" rx="6" fill="#2e1e5f" stroke="#a78bfa" stroke-opacity="0.6"/>
  <text x="740" y="402" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">匹配成功 → conditionalSkills.delete → dynamicSkills.set</text>
  <text x="740" y="420" text-anchor="middle" fill="#c4b5fd" font-size="9">activatedConditionalSkillNames 记录已激活 (跨 cache clear 保留)</text>
  <!-- Phase 4: File Watcher -->
  <rect x="30" y="460" width="940" height="100" rx="10" fill="none" stroke="#f59e0b" stroke-opacity="0.3" stroke-dasharray="6,3"/>
  <text x="50" y="485" fill="#fcd34d" font-size="14" font-weight="bold">阶段四：文件变化热重载 (skillChangeDetector)</text>
  <rect x="50" y="500" width="180" height="45" rx="6" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.5"/>
  <text x="140" y="520" text-anchor="middle" fill="#fcd34d" font-size="11">chokidar.watch()</text><text x="140" y="537" text-anchor="middle" fill="#fbbf24" font-size="9">depth:2 · Bun用polling</text>
  <rect x="260" y="500" width="160" height="45" rx="6" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.5"/>
  <text x="340" y="520" text-anchor="middle" fill="#fcd34d" font-size="11">300ms 防抖</text><text x="340" y="537" text-anchor="middle" fill="#fbbf24" font-size="9">scheduleReload()</text>
  <rect x="450" y="500" width="160" height="45" rx="6" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.5"/>
  <text x="530" y="520" text-anchor="middle" fill="#fcd34d" font-size="11">clearSkillCaches()</text><text x="530" y="537" text-anchor="middle" fill="#fbbf24" font-size="9">清除 memoize 缓存</text>
  <rect x="640" y="500" width="160" height="45" rx="6" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.5"/>
  <text x="720" y="520" text-anchor="middle" fill="#fcd34d" font-size="11">skillsChanged.emit()</text><text x="720" y="537" text-anchor="middle" fill="#fbbf24" font-size="9">通知 UI 更新</text>
  <rect x="830" y="500" width="120" height="45" rx="6" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.5"/>
  <text x="890" y="520" text-anchor="middle" fill="#fcd34d" font-size="11">ConfigChange</text><text x="890" y="537" text-anchor="middle" fill="#fbbf24" font-size="9">Hook 拦截</text>
  <line x1="230" y1="522" x2="258" y2="522" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="420" y1="522" x2="448" y2="522" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="610" y1="522" x2="638" y2="522" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="800" y1="522" x2="828" y2="522" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- SKILL.md format -->
  <rect x="30" y="575" width="940" height="60" rx="10" fill="#1e293b" stroke="#475569" stroke-opacity="0.3"/>
  <text x="500" y="598" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="bold">SKILL.md 格式: --- (YAML frontmatter: name, description, allowed-tools, when_to_use, paths, hooks, context, model) --- Body (Markdown 指令)</text>
  <text x="500" y="622" text-anchor="middle" fill="#64748b" font-size="11">parseFrontmatter() → parseSkillFrontmatterFields() → createSkillCommand() → Command { type: 'prompt', ... }</text>
</svg>
