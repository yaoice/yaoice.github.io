<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 550" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="coord" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f72585"/>
      <stop offset="100%" style="stop-color:#b5179e"/>
    </linearGradient>
    <linearGradient id="worker" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#3a0ca3"/>
    </linearGradient>
    <linearGradient id="phase" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06d6a0"/>
      <stop offset="100%" style="stop-color:#118ab2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="850" height="550" fill="url(#bg)" rx="12"/>

  <text x="425" y="38" fill="#fff" font-size="22" font-weight="bold" text-anchor="middle">Coordinator 模式架构</text>
  <text x="425" y="58" fill="#8888aa" font-size="12" text-anchor="middle">CLAUDE_CODE_COORDINATOR_MODE=1 — 纯编排者，不直接执行工具</text>

  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="340" y="75" width="170" height="40" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="425" y="100" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">👤 User</text>
  </g>

  <path d="M425 115 L425 145" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="421,143 425,151 429,143" fill="#4cc9f0"/>

  <!-- Coordinator -->
  <g filter="url(#shadow)">
    <rect x="220" y="152" width="410" height="100" rx="12" fill="url(#coord)" opacity="0.9"/>
    <text x="425" y="178" fill="#fff" font-size="16" font-weight="bold" text-anchor="middle">🎯 Coordinator (协调器)</text>
    <text x="425" y="198" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">"Parallelism is your superpower"</text>

    <rect x="240" y="212" width="90" height="28" rx="5" fill="rgba(0,0,0,0.3)"/>
    <text x="285" y="231" fill="#ccc" font-size="10" text-anchor="middle">Agent</text>
    <rect x="345" y="212" width="100" height="28" rx="5" fill="rgba(0,0,0,0.3)"/>
    <text x="395" y="231" fill="#ccc" font-size="10" text-anchor="middle">SendMessage</text>
    <rect x="460" y="212" width="80" height="28" rx="5" fill="rgba(0,0,0,0.3)"/>
    <text x="500" y="231" fill="#ccc" font-size="10" text-anchor="middle">TaskStop</text>
  </g>

  <!-- Arrows to workers -->
  <path d="M300 252 L155 310" stroke="#f72585" stroke-width="2"/>
  <polygon points="152,306 153,316 160,308" fill="#f72585"/>
  <path d="M425 252 L425 310" stroke="#f72585" stroke-width="2"/>
  <polygon points="421,308 425,316 429,308" fill="#f72585"/>
  <path d="M550 252 L695 310" stroke="#f72585" stroke-width="2"/>
  <polygon points="690,308 697,316 698,306" fill="#f72585"/>

  <!-- Workers -->
  <g filter="url(#shadow)">
    <rect x="50" y="318" width="210" height="70" rx="10" fill="url(#worker)" opacity="0.85"/>
    <text x="155" y="345" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">🔨 Worker A (Research)</text>
    <text x="155" y="365" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">Read, Grep, Glob, WebSearch...</text>
    <text x="155" y="380" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">异步 → &lt;task-notification&gt;</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="320" y="318" width="210" height="70" rx="10" fill="url(#worker)" opacity="0.85"/>
    <text x="425" y="345" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">🔨 Worker B (Implement)</text>
    <text x="425" y="365" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">Bash, Edit, Write, Skill...</text>
    <text x="425" y="380" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">异步 → &lt;task-notification&gt;</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="318" width="210" height="70" rx="10" fill="url(#worker)" opacity="0.85"/>
    <text x="695" y="345" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">🔨 Worker C (Verify)</text>
    <text x="695" y="365" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">Bash, Read, mcp__playwright...</text>
    <text x="695" y="380" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">异步 → &lt;task-notification&gt;</text>
  </g>

  <!-- Notification arrows back -->
  <path d="M155 388 L300 420 L350 420" stroke="rgba(76,201,240,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M425 388 L425 420" stroke="rgba(76,201,240,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M695 388 L550 420 L500 420" stroke="rgba(76,201,240,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Workflow -->
  <g filter="url(#shadow)">
    <rect x="80" y="440" width="690" height="85" rx="10" fill="url(#phase)" opacity="0.2" stroke="#06d6a0" stroke-width="1"/>
    <text x="110" y="465" fill="#06d6a0" font-size="13" font-weight="bold">标准任务工作流</text>

    <rect x="100" y="478" width="140" height="36" rx="6" fill="rgba(76,201,240,0.2)" stroke="#4cc9f0" stroke-width="1"/>
    <text x="170" y="501" fill="#4cc9f0" font-size="11" font-weight="bold" text-anchor="middle">Research</text>

    <text x="255" y="500" fill="#4cc9f0" font-size="14">→</text>

    <rect x="275" y="478" width="140" height="36" rx="6" fill="rgba(247,37,133,0.2)" stroke="#f72585" stroke-width="1"/>
    <text x="345" y="501" fill="#f72585" font-size="11" font-weight="bold" text-anchor="middle">Synthesis</text>

    <text x="430" y="500" fill="#4cc9f0" font-size="14">→</text>

    <rect x="450" y="478" width="140" height="36" rx="6" fill="rgba(114,9,183,0.2)" stroke="#7209b7" stroke-width="1"/>
    <text x="520" y="501" fill="#b5a0d0" font-size="11" font-weight="bold" text-anchor="middle">Implement</text>

    <text x="605" y="500" fill="#4cc9f0" font-size="14">→</text>

    <rect x="620" y="478" width="130" height="36" rx="6" fill="rgba(6,214,160,0.2)" stroke="#06d6a0" stroke-width="1"/>
    <text x="685" y="501" fill="#06d6a0" font-size="11" font-weight="bold" text-anchor="middle">Verify</text>

    <text x="170" y="435" fill="#888" font-size="9" text-anchor="middle">Workers (并行)</text>
    <text x="345" y="435" fill="#888" font-size="9" text-anchor="middle">Coordinator</text>
    <text x="520" y="435" fill="#888" font-size="9" text-anchor="middle">Workers</text>
    <text x="685" y="435" fill="#888" font-size="9" text-anchor="middle">Workers</text>
  </g>
</svg>
