<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="Inter,system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="p3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="p4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="p5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#a78bfa"/></marker>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#60a5fa"/></marker>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#34d399"/></marker>
    <marker id="arr4" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#fbbf24"/></marker>
    <marker id="arr5" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#f87171"/></marker>
  </defs>

  <rect width="1280" height="760" rx="24" fill="url(#bg)"/>
  <text x="640" y="44" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700">Teammate 生命周期与主循环</text>
  <text x="640" y="72" text-anchor="middle" fill="#94a3b8" font-size="14">从产卵、运行、进入 idle，到被消息唤醒或经过 shutdown 协商退出</text>

  <!-- Top lifecycle strip -->
  <g filter="url(#shadow)">
    <rect x="50" y="120" width="200" height="100" rx="18" fill="url(#p1)"/>
    <text x="150" y="158" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">① Spawn</text>
    <text x="150" y="185" text-anchor="middle" fill="#ede9fe" font-size="13">生成 name / color / agentId</text>
    <text x="150" y="204" text-anchor="middle" fill="#ede9fe" font-size="13">注册到 TeamFile 与 AppState</text>

    <rect x="295" y="120" width="200" height="100" rx="18" fill="url(#p2)"/>
    <text x="395" y="158" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">② Bootstrap</text>
    <text x="395" y="185" text-anchor="middle" fill="#dbeafe" font-size="13">in-process 直传 prompt</text>
    <text x="395" y="204" text-anchor="middle" fill="#dbeafe" font-size="13">tmux/iTerm2 通过 mailbox 启动</text>

    <rect x="540" y="120" width="200" height="100" rx="18" fill="url(#p3)"/>
    <text x="640" y="158" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">③ Run</text>
    <text x="640" y="185" text-anchor="middle" fill="#d1fae5" font-size="13">runAgent() 执行一轮工作</text>
    <text x="640" y="204" text-anchor="middle" fill="#d1fae5" font-size="13">更新 progress / tool usage</text>

    <rect x="785" y="120" width="200" height="100" rx="18" fill="url(#p4)"/>
    <text x="885" y="158" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">④ Idle</text>
    <text x="885" y="185" text-anchor="middle" fill="#fef3c7" font-size="13">写回 isActive=false</text>
    <text x="885" y="204" text-anchor="middle" fill="#fef3c7" font-size="13">发送 idle_notification</text>

    <rect x="1030" y="120" width="200" height="100" rx="18" fill="url(#p5)"/>
    <text x="1130" y="158" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">⑤ Exit</text>
    <text x="1130" y="185" text-anchor="middle" fill="#fecaca" font-size="13">approve shutdown → 退出</text>
    <text x="1130" y="204" text-anchor="middle" fill="#fecaca" font-size="13">reject → 回到运行状态</text>
  </g>

  <line x1="250" y1="170" x2="295" y2="170" stroke="#a78bfa" stroke-width="3" marker-end="url(#arr1)"/>
  <line x1="495" y1="170" x2="540" y2="170" stroke="#60a5fa" stroke-width="3" marker-end="url(#arr2)"/>
  <line x1="740" y1="170" x2="785" y2="170" stroke="#34d399" stroke-width="3" marker-end="url(#arr3)"/>
  <line x1="985" y1="170" x2="1030" y2="170" stroke="#fbbf24" stroke-width="3" marker-end="url(#arr4)"/>
  <path d="M885 220 C885 268, 735 275, 640 220" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arr4)"/>
  <text x="788" y="274" fill="#fbbf24" font-size="12">收到新消息 / 新任务时重新唤醒</text>

  <!-- Main runner panel -->
  <g filter="url(#shadow)">
    <rect x="60" y="310" width="1160" height="390" rx="24" fill="#0f172a" stroke="#1f2937"/>
    <text x="640" y="348" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">`runInProcessTeammate()` 的实际循环</text>
    <text x="640" y="374" text-anchor="middle" fill="#94a3b8" font-size="13">核心区别：生命周期 abort 与“当前轮次 abort”分离；teammate 可以被打断，但不必被销毁</text>
  </g>

  <!-- Inner loop steps -->
  <g filter="url(#shadow)">
    <rect x="100" y="420" width="182" height="92" rx="18" fill="url(#p1)"/>
    <text x="191" y="456" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">A. 当前轮次控制器</text>
    <text x="191" y="482" text-anchor="middle" fill="#ede9fe" font-size="12">创建 per-turn AbortController</text>
    <text x="191" y="501" text-anchor="middle" fill="#ede9fe" font-size="12">Escape 只中断当前工作</text>

    <rect x="320" y="420" width="182" height="92" rx="18" fill="url(#p2)"/>
    <text x="411" y="456" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">B. 历史压缩检查</text>
    <text x="411" y="482" text-anchor="middle" fill="#dbeafe" font-size="12">token 超阈值时 compactConversation()</text>
    <text x="411" y="501" text-anchor="middle" fill="#dbeafe" font-size="12">重建 allMessages / UI mirror</text>

    <rect x="540" y="420" width="182" height="92" rx="18" fill="url(#p3)"/>
    <text x="631" y="456" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">C. runAgent 执行</text>
    <text x="631" y="482" text-anchor="middle" fill="#d1fae5" font-size="12">在 TeammateContext + AgentContext 中运行</text>
    <text x="631" y="501" text-anchor="middle" fill="#d1fae5" font-size="12">逐消息更新 progress / tool 状态</text>

    <rect x="760" y="420" width="182" height="92" rx="18" fill="url(#p4)"/>
    <text x="851" y="456" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">D. 进入 idle</text>
    <text x="851" y="482" text-anchor="middle" fill="#fef3c7" font-size="12">isIdle=true，清理 currentWorkAbortController</text>
    <text x="851" y="501" text-anchor="middle" fill="#fef3c7" font-size="12">发送 idle_notification(summary)</text>

    <rect x="980" y="420" width="182" height="92" rx="18" fill="#334155"/>
    <text x="1071" y="456" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">E. 等待唤醒</text>
    <text x="1071" y="482" text-anchor="middle" fill="#cbd5e1" font-size="12">`waitForNextPromptOrShutdown()`</text>
    <text x="1071" y="501" text-anchor="middle" fill="#cbd5e1" font-size="12">轮询邮箱 + 任务列表</text>
  </g>

  <line x1="282" y1="466" x2="320" y2="466" stroke="#a78bfa" stroke-width="3" marker-end="url(#arr1)"/>
  <line x1="502" y1="466" x2="540" y2="466" stroke="#60a5fa" stroke-width="3" marker-end="url(#arr2)"/>
  <line x1="722" y1="466" x2="760" y2="466" stroke="#34d399" stroke-width="3" marker-end="url(#arr3)"/>
  <line x1="942" y1="466" x2="980" y2="466" stroke="#fbbf24" stroke-width="3" marker-end="url(#arr4)"/>

  <!-- wait priority panel -->
  <g>
    <rect x="120" y="560" width="480" height="112" rx="18" fill="#111827" stroke="#334155"/>
    <text x="360" y="592" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">唤醒优先级</text>
    <text x="145" y="618" fill="#fca5a5" font-size="13">① pendingUserMessages（进程内直注入）</text>
    <text x="145" y="640" fill="#fde68a" font-size="13">② shutdown_request（扫描所有 unread，优先级最高）</text>
    <text x="145" y="662" fill="#93c5fd" font-size="13">③ team-lead 普通消息 → ④ peer DM → ⑤ 可认领任务</text>
  </g>

  <!-- shutdown panel -->
  <g>
    <rect x="650" y="560" width="490" height="112" rx="18" fill="#111827" stroke="#334155"/>
    <text x="895" y="592" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">优雅关闭与强制杀死</text>
    <text x="675" y="618" fill="#fca5a5" font-size="13">- Leader 发送 `shutdown_request`，由模型决定 approve / reject</text>
    <text x="675" y="640" fill="#86efac" font-size="13">- approve：in-process 走 abortController；pane backend 走 gracefulShutdown/killPane</text>
    <text x="675" y="662" fill="#94a3b8" font-size="13">- reject：发送 `shutdown_rejected`，队友保留上下文继续工作</text>
  </g>
</svg>