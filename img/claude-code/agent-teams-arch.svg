<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="lead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="worker" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="bus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="store" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#34d399"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="1280" height="820" rx="24" fill="url(#bg)"/>

  <text x="640" y="44" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700">Claude Code Agent Teams — 系统总体架构</text>
  <text x="640" y="72" text-anchor="middle" fill="#94a3b8" font-size="14">从 Team Lead、Teammate 执行后端，到邮箱总线、任务列表与权限同步的全链路视图</text>

  <!-- Legend -->
  <g transform="translate(930 28)">
    <rect x="0" y="0" width="300" height="52" rx="12" fill="#0f172a" stroke="#334155"/>
    <circle cx="26" cy="18" r="6" fill="#8b5cf6"/>
    <text x="40" y="23" fill="#cbd5e1" font-size="12">协调 / 控制平面</text>
    <circle cx="26" cy="36" r="6" fill="#3b82f6"/>
    <text x="40" y="41" fill="#cbd5e1" font-size="12">执行平面</text>
    <circle cx="152" cy="18" r="6" fill="#10b981"/>
    <text x="166" y="23" fill="#cbd5e1" font-size="12">消息总线</text>
    <circle cx="152" cy="36" r="6" fill="#f59e0b"/>
    <text x="166" y="41" fill="#cbd5e1" font-size="12">持久化 / 状态</text>
  </g>

  <!-- Layer labels -->
  <text x="60" y="145" fill="#cbd5e1" font-size="13" font-weight="600">协调层</text>
  <text x="60" y="335" fill="#cbd5e1" font-size="13" font-weight="600">执行层</text>
  <text x="60" y="560" fill="#cbd5e1" font-size="13" font-weight="600">通信 / 状态层</text>

  <!-- Team lead -->
  <g filter="url(#shadow)">
    <rect x="360" y="110" width="560" height="132" rx="20" fill="url(#lead)"/>
    <text x="640" y="150" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">Team Lead（协调者）</text>
    <text x="640" y="178" text-anchor="middle" fill="#ede9fe" font-size="15">`TeamCreateTool` / `TeamDeleteTool` / `SendMessageTool` / `Task*Tool`</text>
    <text x="640" y="204" text-anchor="middle" fill="#ddd6fe" font-size="14">负责建队、发任务、审批权限、处理 shutdown / plan approval、维护 AppState.teamContext</text>
    <text x="640" y="225" text-anchor="middle" fill="#ddd6fe" font-size="13">确定性 ID：`team-lead@team` · 每个 leader 在单会话内只管理一个 team</text>
  </g>

  <!-- Worker cards -->
  <g filter="url(#shadow)">
    <rect x="78" y="300" width="340" height="170" rx="18" fill="url(#worker)"/>
    <text x="248" y="336" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">Teammate A</text>
    <text x="248" y="362" text-anchor="middle" fill="#dbeafe" font-size="15">in-process 后端</text>
    <text x="110" y="392" fill="#dbeafe" font-size="13">- 同一 Node.js 进程内运行</text>
    <text x="110" y="416" fill="#dbeafe" font-size="13">- `AsyncLocalStorage` 隔离身份与上下文</text>
    <text x="110" y="440" fill="#dbeafe" font-size="13">- 初始 prompt 直接传入 `startInProcessTeammate()`</text>
    <text x="110" y="464" fill="#dbeafe" font-size="13">- 可复用 leader 的 API / MCP / 资源</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="300" width="340" height="170" rx="18" fill="url(#worker)" opacity="0.95"/>
    <text x="640" y="336" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">Teammate B</text>
    <text x="640" y="362" text-anchor="middle" fill="#dbeafe" font-size="15">tmux 后端</text>
    <text x="502" y="392" fill="#dbeafe" font-size="13">- 独立 Claude CLI 进程</text>
    <text x="502" y="416" fill="#dbeafe" font-size="13">- 通过 tmux pane/window 托管生命周期</text>
    <text x="502" y="440" fill="#dbeafe" font-size="13">- 初始 prompt 通过 mailbox 投递</text>
    <text x="502" y="464" fill="#dbeafe" font-size="13">- `useInboxPoller` 轮询结构化消息</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="862" y="300" width="340" height="170" rx="18" fill="url(#worker)" opacity="0.95"/>
    <text x="1032" y="336" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">Teammate C</text>
    <text x="1032" y="362" text-anchor="middle" fill="#dbeafe" font-size="15">iTerm2 后端</text>
    <text x="894" y="392" fill="#dbeafe" font-size="13">- 独立 Claude CLI 进程</text>
    <text x="894" y="416" fill="#dbeafe" font-size="13">- 使用 `it2` CLI 创建原生分屏</text>
    <text x="894" y="440" fill="#dbeafe" font-size="13">- 共享相同 mailbox 协议</text>
    <text x="894" y="464" fill="#dbeafe" font-size="13">- pane 关闭由 backend.killPane() 完成</text>
  </g>

  <!-- Arrows from lead -->
  <path d="M510 244 C470 272, 360 282, 286 300" fill="none" stroke="#a78bfa" stroke-width="3" marker-end="url(#arrow-purple)"/>
  <path d="M640 244 L640 292" fill="none" stroke="#a78bfa" stroke-width="3" marker-end="url(#arrow-purple)"/>
  <path d="M770 244 C826 272, 928 282, 1000 300" fill="none" stroke="#a78bfa" stroke-width="3" marker-end="url(#arrow-purple)"/>
  <text x="360" y="280" fill="#c4b5fd" font-size="12">spawnTeammate()</text>
  <text x="654" y="278" fill="#c4b5fd" font-size="12">生成 agentId / color / model</text>
  <text x="894" y="280" fill="#c4b5fd" font-size="12">继承 permission / settings / plugin flags</text>

  <!-- Message bus -->
  <g filter="url(#shadow)">
    <rect x="120" y="530" width="1040" height="118" rx="20" fill="url(#bus)"/>
    <text x="640" y="572" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">Mailbox Message Bus（文件邮箱总线）</text>
    <text x="640" y="602" text-anchor="middle" fill="#d1fae5" font-size="15">`~/.claude/teams/{team}/inboxes/{agent}.json` · `proper-lockfile` 并发控制 · unread/read 状态追踪</text>
    <text x="640" y="628" text-anchor="middle" fill="#d1fae5" font-size="14">消息类型：text / broadcast / shutdown / permission / sandbox_permission / plan_approval / idle_notification / mode_set</text>
  </g>

  <!-- Storage boxes -->
  <g filter="url(#shadow)">
    <rect x="90" y="690" width="340" height="96" rx="18" fill="url(#store)"/>
    <text x="260" y="726" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">TeamFile（config.json）</text>
    <text x="260" y="752" text-anchor="middle" fill="#fef3c7" font-size="13">成员列表 · leadAgentId · hiddenPaneIds</text>
    <text x="260" y="772" text-anchor="middle" fill="#fef3c7" font-size="13">teamAllowedPaths · backendType · isActive · mode</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="470" y="690" width="340" height="96" rx="18" fill="url(#store)"/>
    <text x="640" y="726" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">AppState（内存镜像）</text>
    <text x="640" y="752" text-anchor="middle" fill="#fef3c7" font-size="13">teamContext · tasks · agentNameRegistry · inbox</text>
    <text x="640" y="772" text-anchor="middle" fill="#fef3c7" font-size="13">InProcessTeammateTaskState · progress · pendingUserMessages</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="850" y="690" width="340" height="96" rx="18" fill="url(#store)"/>
    <text x="1020" y="726" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">Task List（共享任务目录）</text>
    <text x="1020" y="752" text-anchor="middle" fill="#fef3c7" font-size="13">`~/.claude/tasks/{team}/` · pending / in_progress / completed</text>
    <text x="1020" y="772" text-anchor="middle" fill="#fef3c7" font-size="13">队友空闲时自动认领未 owner 且未 blocked 的任务</text>
  </g>

  <!-- Connectors to mailbox -->
  <line x1="248" y1="470" x2="248" y2="530" stroke="#34d399" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrow-green)"/>
  <line x1="640" y1="470" x2="640" y2="530" stroke="#34d399" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrow-green)"/>
  <line x1="1032" y1="470" x2="1032" y2="530" stroke="#34d399" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrow-green)"/>
  <path d="M640 648 L640 682" fill="none" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <path d="M320 648 C320 668, 260 672, 260 688" fill="none" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <path d="M960 648 C960 668, 1020 672, 1020 688" fill="none" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow-orange)"/>

  <!-- Side annotations -->
  <g>
    <rect x="38" y="520" width="58" height="110" rx="14" fill="#0f172a" stroke="#1f2937"/>
    <text x="67" y="562" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">总线</text>
    <text x="67" y="588" text-anchor="middle" fill="#94a3b8" font-size="10">异步</text>
    <text x="67" y="604" text-anchor="middle" fill="#94a3b8" font-size="10">跨进程</text>
  </g>
  <g>
    <rect x="38" y="686" width="58" height="100" rx="14" fill="#0f172a" stroke="#1f2937"/>
    <text x="67" y="726" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">状态</text>
    <text x="67" y="750" text-anchor="middle" fill="#94a3b8" font-size="10">磁盘 +</text>
    <text x="67" y="766" text-anchor="middle" fill="#94a3b8" font-size="10">内存</text>
  </g>
</svg>