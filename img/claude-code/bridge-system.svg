<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <filter id="shadow4">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="750" fill="url(#bg4)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" fill="#fff" font-size="24" font-weight="bold" text-anchor="middle">Bridge 桥接系统：IDE 集成架构</text>
  <text x="400" y="70" fill="#8888aa" font-size="13" text-anchor="middle">src/bridge/ · 31 个文件 · WebSocket + JWT 双向通信</text>

  <!-- IDE Extensions (top) -->
  <g filter="url(#shadow4)">
    <rect x="60" y="90" width="310" height="120" rx="12" fill="#1b3a4b" stroke="#4cc9f0" stroke-width="2"/>
    <rect x="60" y="90" width="310" height="32" rx="12" fill="rgba(76,201,240,0.2)"/>
    <text x="215" y="113" fill="#4cc9f0" font-size="14" font-weight="bold" text-anchor="middle">VS Code 扩展</text>
    <text x="85" y="145" fill="#ccc" font-size="11">• 当前文件 / 选区 / 光标</text>
    <text x="85" y="165" fill="#ccc" font-size="11">• 编辑器 diff 展示</text>
    <text x="85" y="185" fill="#ccc" font-size="11">• 权限确认 UI 代理</text>
    <text x="85" y="200" fill="#888" font-size="10">Bridge Extension Protocol</text>
  </g>

  <g filter="url(#shadow4)">
    <rect x="430" y="90" width="310" height="120" rx="12" fill="#1b3a4b" stroke="#4cc9f0" stroke-width="2"/>
    <rect x="430" y="90" width="310" height="32" rx="12" fill="rgba(76,201,240,0.2)"/>
    <text x="585" y="113" fill="#4cc9f0" font-size="14" font-weight="bold" text-anchor="middle">JetBrains 扩展</text>
    <text x="455" y="145" fill="#ccc" font-size="11">• 项目上下文同步</text>
    <text x="455" y="165" fill="#ccc" font-size="11">• 工具结果回传</text>
    <text x="455" y="185" fill="#ccc" font-size="11">• 多实例会话支持</text>
    <text x="455" y="200" fill="#888" font-size="10">Bridge Extension Protocol</text>
  </g>

  <!-- Connection arrows -->
  <line x1="215" y1="210" x2="215" y2="260" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="210,258 215,268 220,258" fill="#4cc9f0"/>
  <line x1="585" y1="210" x2="585" y2="260" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="580,258 585,268 590,258" fill="#4cc9f0"/>

  <!-- WebSocket + JWT label -->
  <rect x="250" y="230" width="300" height="28" rx="14" fill="rgba(76,201,240,0.15)" stroke="#4cc9f0" stroke-width="1"/>
  <text x="400" y="249" fill="#4cc9f0" font-size="12" font-weight="bold" text-anchor="middle">WebSocket + JWT 认证 双向通信</text>

  <!-- Bridge Layer (main box) -->
  <g filter="url(#shadow4)">
    <rect x="60" y="270" width="680" height="300" rx="14" fill="#1e0a3c" stroke="#9d4edd" stroke-width="2"/>
    <rect x="60" y="270" width="680" height="35" rx="14" fill="rgba(157,78,221,0.25)"/>
    <text x="400" y="294" fill="#e0aaff" font-size="16" font-weight="bold" text-anchor="middle">Bridge 层 (src/bridge/)</text>

    <!-- Core modules -->
    <rect x="85" y="320" width="200" height="55" rx="8" fill="rgba(255,255,255,0.08)" stroke="#c77dff" stroke-width="1"/>
    <text x="185" y="343" fill="#e0aaff" font-size="12" font-weight="bold" text-anchor="middle">bridgeMain.ts</text>
    <text x="185" y="363" fill="#999" font-size="10" text-anchor="middle">113KB · 主循环逻辑</text>

    <rect x="300" y="320" width="200" height="55" rx="8" fill="rgba(255,255,255,0.08)" stroke="#c77dff" stroke-width="1"/>
    <text x="400" y="343" fill="#e0aaff" font-size="12" font-weight="bold" text-anchor="middle">replBridge.ts</text>
    <text x="400" y="363" fill="#999" font-size="10" text-anchor="middle">98KB · REPL 桥接</text>

    <rect x="515" y="320" width="200" height="55" rx="8" fill="rgba(255,255,255,0.08)" stroke="#c77dff" stroke-width="1"/>
    <text x="615" y="343" fill="#e0aaff" font-size="12" font-weight="bold" text-anchor="middle">sessionRunner.ts</text>
    <text x="615" y="363" fill="#999" font-size="10" text-anchor="middle">会话执行管理</text>

    <!-- Messaging & API -->
    <rect x="85" y="390" width="200" height="55" rx="8" fill="rgba(255,255,255,0.08)" stroke="#c77dff" stroke-width="1"/>
    <text x="185" y="413" fill="#e0aaff" font-size="12" font-weight="bold" text-anchor="middle">bridgeMessaging.ts</text>
    <text x="185" y="433" fill="#999" font-size="10" text-anchor="middle">消息协议处理</text>

    <rect x="300" y="390" width="200" height="55" rx="8" fill="rgba(255,255,255,0.08)" stroke="#c77dff" stroke-width="1"/>
    <text x="400" y="413" fill="#e0aaff" font-size="12" font-weight="bold" text-anchor="middle">bridgeApi.ts</text>
    <text x="400" y="433" fill="#999" font-size="10" text-anchor="middle">API 接口层</text>

    <rect x="515" y="390" width="200" height="55" rx="8" fill="rgba(255,255,255,0.08)" stroke="#c77dff" stroke-width="1"/>
    <text x="615" y="413" fill="#e0aaff" font-size="12" font-weight="bold" text-anchor="middle">bridgeUI.ts</text>
    <text x="615" y="433" fill="#999" font-size="10" text-anchor="middle">UI 状态同步</text>

    <!-- Security Layer -->
    <rect x="85" y="465" width="300" height="85" rx="10" fill="rgba(230,57,70,0.1)" stroke="#e63946" stroke-width="1.5"/>
    <text x="235" y="488" fill="#e63946" font-size="12" font-weight="bold" text-anchor="middle">安全层</text>
    <text x="115" y="510" fill="#ffa0a0" font-size="10">jwtUtils.ts — JWT 认证签发/验证</text>
    <text x="115" y="528" fill="#ffa0a0" font-size="10">trustedDevice.ts — 可信设备管理</text>
    <text x="115" y="546" fill="#ffa0a0" font-size="10">workSecret.ts — 工作密钥生成</text>

    <!-- Transport Layer -->
    <rect x="405" y="465" width="310" height="85" rx="10" fill="rgba(76,201,240,0.1)" stroke="#4cc9f0" stroke-width="1.5"/>
    <text x="560" y="488" fill="#4cc9f0" font-size="12" font-weight="bold" text-anchor="middle">传输层</text>
    <text x="425" y="510" fill="#a0d8ef" font-size="10">replBridgeTransport.ts — 本地传输</text>
    <text x="425" y="528" fill="#a0d8ef" font-size="10">remoteBridgeCore.ts (39KB) — 远程传输</text>
    <text x="425" y="546" fill="#a0d8ef" font-size="10">bridgePointer.ts — 桥接指针</text>
  </g>

  <!-- Arrow to CLI -->
  <line x1="400" y1="570" x2="400" y2="610" stroke="#9d4edd" stroke-width="2"/>
  <polygon points="395,608 400,618 405,608" fill="#9d4edd"/>

  <!-- Claude Code CLI (bottom) -->
  <g filter="url(#shadow4)">
    <rect x="150" y="620" width="500" height="90" rx="14" fill="#1b4332" stroke="#2ec4b9" stroke-width="2"/>
    <rect x="150" y="620" width="500" height="35" rx="14" fill="rgba(46,196,185,0.2)"/>
    <text x="400" y="644" fill="#2ec4b9" font-size="16" font-weight="bold" text-anchor="middle">Claude Code CLI (REPL)</text>

    <text x="200" y="676" fill="#95d5b2" font-size="11">QueryEngine</text>
    <text x="340" y="676" fill="#95d5b2" font-size="11">Tool System</text>
    <text x="470" y="676" fill="#95d5b2" font-size="11">Command System</text>
    <text x="600" y="676" fill="#95d5b2" font-size="11">Services</text>

    <text x="200" y="696" fill="#777" font-size="9">查询引擎</text>
    <text x="340" y="696" fill="#777" font-size="9">工具系统</text>
    <text x="470" y="696" fill="#777" font-size="9">命令系统</text>
    <text x="600" y="696" fill="#777" font-size="9">服务层</text>
  </g>

  <!-- Bidirectional arrows label -->
  <text x="400" y="740" fill="#666" font-size="11" text-anchor="middle">上下文同步 · 工具结果回传 · 权限代理 · 多实例会话管理</text>
</svg>
