<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgG2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/></filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#60a5fa"/></marker>
  </defs>
  <rect width="1000" height="650" fill="url(#bgG2)" rx="12"/>
  <text x="500" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">Claude Code 多层递进压缩策略</text>

  <!-- Layer 1: Snip -->
  <rect x="40" y="55" width="920" height="85" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5" filter="url(#s2)"/>
  <text x="60" y="78" fill="#22d3ee" font-size="13" font-weight="bold">Layer 1: History Snip (最轻量)</text>
  <text x="60" y="98" fill="#94a3b8" font-size="11">裁剪最老的 API 轮次组，保留最近的对话上下文。不调用 LLM，零 token 成本。</text>
  <text x="60" y="118" fill="#64748b" font-size="10">触发时机: 每次 query 循环入口 · 文件: snipCompact.ts · 特点: 可与其他压缩策略叠加使用</text>
  <rect x="750" y="65" width="190" height="28" rx="6" fill="#083344"/>
  <text x="845" y="84" text-anchor="middle" fill="#22d3ee" font-size="11">成本: 0 token</text>

  <!-- Arrow -->
  <line x1="500" y1="140" x2="500" y2="155" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="510" y="152" fill="#475569" font-size="9">阈值未达</text>

  <!-- Layer 2: MicroCompact -->
  <rect x="40" y="158" width="920" height="100" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5" filter="url(#s2)"/>
  <text x="60" y="181" fill="#a78bfa" font-size="13" font-weight="bold">Layer 2: MicroCompact (工具结果清理)</text>
  <text x="60" y="201" fill="#94a3b8" font-size="11">清空旧的工具结果内容（Read/Bash/Grep/Glob/WebSearch/Edit/Write），替换为 "[Old tool result content cleared]"</text>
  <text x="60" y="221" fill="#64748b" font-size="10">两种路径: ① 缓存微压缩 (cache_edits API，不破坏缓存前缀) ② 基于时间的微压缩 (空闲超过阈值时触发)</text>
  <text x="60" y="241" fill="#64748b" font-size="10">文件: microCompact.ts, cachedMicrocompact.ts · 保留最近 N 个工具结果 · 可压缩工具: Read/Bash/Grep/Glob/WebSearch/Edit/Write</text>
  <rect x="750" y="168" width="190" height="28" rx="6" fill="#1e1b4b"/>
  <text x="845" y="187" text-anchor="middle" fill="#a78bfa" font-size="11">成本: 0 token (本地)</text>

  <!-- Arrow -->
  <line x1="500" y1="258" x2="500" y2="273" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="510" y="270" fill="#475569" font-size="9">阈值未达</text>

  <!-- Layer 3: Context Collapse -->
  <rect x="40" y="276" width="920" height="85" rx="10" fill="#1e293b" stroke="#fb923c" stroke-width="1.5" filter="url(#s2)"/>
  <text x="60" y="299" fill="#fb923c" font-size="13" font-weight="bold">Layer 3: Context Collapse (上下文折叠)</text>
  <text x="60" y="319" fill="#94a3b8" font-size="11">将旧的对话片段折叠为摘要视图，保持细粒度上下文而非全量摘要。读时投影，不修改原始消息。</text>
  <text x="60" y="339" fill="#64748b" font-size="10">触发: 90% 上下文使用率 · Blocking: 95% · 可在 413 错误时 drain 已暂存的折叠 · 文件: contextCollapse/index.ts</text>
  <rect x="750" y="286" width="190" height="28" rx="6" fill="#431407"/>
  <text x="845" y="305" text-anchor="middle" fill="#fb923c" font-size="11">成本: 低 (本地摘要)</text>

  <!-- Arrow -->
  <line x1="500" y1="361" x2="500" y2="376" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="510" y="373" fill="#475569" font-size="9">阈值未达</text>

  <!-- Layer 4: Session Memory Compact -->
  <rect x="40" y="379" width="920" height="100" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="1.5" filter="url(#s2)"/>
  <text x="60" y="402" fill="#34d399" font-size="13" font-weight="bold">Layer 4: Session Memory Compact (SM 压缩)</text>
  <text x="60" y="422" fill="#94a3b8" font-size="11">使用预先提取的 Session Memory 文件替代实时 LLM 摘要。保留最近 10K-40K token 的原始消息。</text>
  <text x="60" y="442" fill="#64748b" font-size="10">前置条件: Session Memory 文件存在且非空 · 保留阈值: minTokens=10K, minTextBlockMessages=5, maxTokens=40K</text>
  <text x="60" y="462" fill="#64748b" font-size="10">文件: sessionMemoryCompact.ts · 优先于传统压缩 · 避免了压缩 API 调用开销</text>
  <rect x="750" y="389" width="190" height="28" rx="6" fill="#052e16"/>
  <text x="845" y="408" text-anchor="middle" fill="#34d399" font-size="11">成本: 0 token (已有摘要)</text>

  <!-- Arrow -->
  <line x1="500" y1="479" x2="500" y2="494" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="510" y="491" fill="#475569" font-size="9">SM 不可用</text>

  <!-- Layer 5: Full Compact -->
  <rect x="40" y="497" width="920" height="100" rx="10" fill="#1e293b" stroke="#f87171" stroke-width="1.5" filter="url(#s2)"/>
  <text x="60" y="520" fill="#f87171" font-size="13" font-weight="bold">Layer 5: Full Compact (传统 LLM 摘要压缩)</text>
  <text x="60" y="540" fill="#94a3b8" font-size="11">使用 Forked Agent 生成结构化摘要(9个部分)，压缩后恢复最近 5 个文件、计划、技能等附件。</text>
  <text x="60" y="560" fill="#64748b" font-size="10">摘要结构: Primary Intent / Key Concepts / Files&amp;Code / Errors / Problem Solving / User Messages / Pending Tasks / Current Work / Next Step</text>
  <text x="60" y="580" fill="#64748b" font-size="10">文件: compact.ts · PTL 重试: 最多 3 次 · Forked Agent 共享主线程 prompt cache · 最大输出: 20K tokens</text>
  <rect x="750" y="507" width="190" height="28" rx="6" fill="#450a0a"/>
  <text x="845" y="526" text-anchor="middle" fill="#f87171" font-size="11">成本: ~20K output tokens</text>

  <!-- Bottom: Reactive Compact -->
  <rect x="40" y="610" width="920" height="32" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="500" y="631" text-anchor="middle" fill="#fbbf24" font-size="11">Reactive Compact: 当 API 返回 prompt-too-long (413) 时的最后兜底，尝试压缩后重试 (reactiveCompact.ts)</text>
</svg>
