<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 820" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <filter id="shadow5">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="820" fill="url(#bg5)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" fill="#fff" font-size="24" font-weight="bold" text-anchor="middle">BashTool 五层安全模型</text>
  <text x="400" y="70" fill="#8888aa" font-size="13" text-anchor="middle">总计 ~463KB 安全代码 · 业界最严格的 AI Shell 执行防护</text>

  <!-- Input -->
  <g filter="url(#shadow5)">
    <rect x="280" y="90" width="240" height="45" rx="22" fill="#4361ee" stroke="#6d8cff" stroke-width="1.5"/>
    <text x="400" y="118" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">Shell 命令输入</text>
  </g>
  <line x1="400" y1="135" x2="400" y2="155" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="395,153 400,163 405,153" fill="#4cc9f0"/>

  <!-- Layer 1 -->
  <g filter="url(#shadow5)">
    <rect x="80" y="165" width="640" height="105" rx="12" fill="#3d0814" stroke="#e63946" stroke-width="2"/>
    <rect x="80" y="165" width="50" height="105" rx="12" fill="rgba(230,57,70,0.3)"/>
    <text x="105" y="225" fill="#e63946" font-size="28" font-weight="bold" text-anchor="middle" transform="rotate(-90, 105, 225)">L1</text>
    <text x="160" y="192" fill="#e63946" font-size="14" font-weight="bold">bashSecurity.ts (100KB) — 命令安全分析</text>
    <rect x="155" y="205" width="175" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="242" y="222" fill="#ffa0a0" font-size="10" text-anchor="middle">命令黑名单检测</text>
    <rect x="340" y="205" width="175" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="427" y="222" fill="#ffa0a0" font-size="10" text-anchor="middle">危险模式识别</text>
    <rect x="525" y="205" width="175" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="612" y="222" fill="#ffa0a0" font-size="10" text-anchor="middle">网络操作审计</text>
    <rect x="155" y="238" width="175" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="242" y="255" fill="#ffa0a0" font-size="10" text-anchor="middle">rm -rf / fork bomb</text>
    <rect x="340" y="238" width="175" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="427" y="255" fill="#ffa0a0" font-size="10" text-anchor="middle">管道注入 · 命令替换</text>
    <rect x="525" y="238" width="175" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="612" y="255" fill="#ffa0a0" font-size="10" text-anchor="middle">密码/密钥操作拦截</text>
  </g>

  <line x1="400" y1="270" x2="400" y2="288" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="395,286 400,296 405,286" fill="#4cc9f0"/>

  <!-- Layer 2 -->
  <g filter="url(#shadow5)">
    <rect x="80" y="295" width="640" height="105" rx="12" fill="#2d1b00" stroke="#f4a261" stroke-width="2"/>
    <rect x="80" y="295" width="50" height="105" rx="12" fill="rgba(244,162,97,0.3)"/>
    <text x="105" y="355" fill="#f4a261" font-size="28" font-weight="bold" text-anchor="middle" transform="rotate(-90, 105, 355)">L2</text>
    <text x="160" y="322" fill="#f4a261" font-size="14" font-weight="bold">bashPermissions.ts (96KB) — 权限规则匹配</text>
    <rect x="155" y="335" width="175" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="242" y="352" fill="#ffd6a5" font-size="10" text-anchor="middle">基于规则的权限匹配</text>
    <rect x="340" y="335" width="175" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="427" y="352" fill="#ffd6a5" font-size="10" text-anchor="middle">路径白名单/黑名单</text>
    <rect x="525" y="335" width="175" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="612" y="352" fill="#ffd6a5" font-size="10" text-anchor="middle">只读操作自动批准</text>
    <rect x="155" y="368" width="545" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="427" y="385" fill="#ffd6a5" font-size="10" text-anchor="middle">.claude/settings.json 用户自定义规则 · Glob 模式匹配 · 危险操作显式用户确认</text>
  </g>

  <line x1="400" y1="400" x2="400" y2="418" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="395,416 400,426 405,416" fill="#4cc9f0"/>

  <!-- Layer 3 -->
  <g filter="url(#shadow5)">
    <rect x="80" y="425" width="640" height="95" rx="12" fill="#1e0a3c" stroke="#9d4edd" stroke-width="2"/>
    <rect x="80" y="425" width="50" height="95" rx="12" fill="rgba(157,78,221,0.3)"/>
    <text x="105" y="478" fill="#9d4edd" font-size="28" font-weight="bold" text-anchor="middle" transform="rotate(-90, 105, 478)">L3</text>
    <text x="160" y="452" fill="#c77dff" font-size="14" font-weight="bold">readOnlyValidation.ts (67KB) — 只读验证</text>
    <rect x="155" y="465" width="210" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="260" y="482" fill="#e0aaff" font-size="10" text-anchor="middle">命令语义分析 (读/写/执行)</text>
    <rect x="375" y="465" width="165" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
