    <rect x="550" y="465" width="150" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="625" y="482" fill="#e0aaff" font-size="10" text-anchor="middle">环境变量修改跟踪</text>
    <text x="160" y="510" fill="#888" font-size="9">依赖自研 Bash Parser (128KB AST) 进行命令语义解析</text>
  </g>

  <line x1="400" y1="520" x2="400" y2="538" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="395,536 400,546 405,536" fill="#4cc9f0"/>

  <!-- Layer 4 -->
  <g filter="url(#shadow5)">
    <rect x="80" y="545" width="640" height="95" rx="12" fill="#1a3320" stroke="#52b788" stroke-width="2"/>
    <rect x="80" y="545" width="50" height="95" rx="12" fill="rgba(82,183,136,0.3)"/>
    <text x="105" y="598" fill="#52b788" font-size="28" font-weight="bold" text-anchor="middle" transform="rotate(-90, 105, 598)">L4</text>
    <text x="160" y="572" fill="#52b788" font-size="14" font-weight="bold">pathValidation.ts (43KB) — 路径安全校验</text>
    <rect x="155" y="585" width="175" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="242" y="602" fill="#95d5b2" font-size="10" text-anchor="middle">工作区边界检查</text>
    <rect x="340" y="585" width="175" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="427" y="602" fill="#95d5b2" font-size="10" text-anchor="middle">符号链接跟随检测</text>
    <rect x="525" y="585" width="175" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="612" y="602" fill="#95d5b2" font-size="10" text-anchor="middle">敏感路径保护</text>
    <text x="160" y="630" fill="#777" font-size="9">保护范围：~/.ssh · /etc/passwd · ~/.gnupg · ~/.aws · 系统关键目录</text>
  </g>

  <line x1="400" y1="640" x2="400" y2="658" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="395,656 400,666 405,656" fill="#4cc9f0"/>

  <!-- Layer 5 -->
  <g filter="url(#shadow5)">
    <rect x="80" y="665" width="640" height="75" rx="12" fill="#1b3a4b" stroke="#4cc9f0" stroke-width="2"/>
    <rect x="80" y="665" width="50" height="75" rx="12" fill="rgba(76,201,240,0.3)"/>
    <text x="105" y="708" fill="#4cc9f0" font-size="28" font-weight="bold" text-anchor="middle" transform="rotate(-90, 105, 708)">L5</text>
    <text x="160" y="692" fill="#4cc9f0" font-size="14" font-weight="bold">sedValidation.ts (21KB) + Sandbox</text>
    <rect x="155" y="705" width="250" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="280" y="722" fill="#a0d8ef" font-size="10" text-anchor="middle">sed 编辑命令专用解析和验证</text>
    <rect x="415" y="705" width="285" height="25" rx="5" fill="rgba(255,255,255,0.06)"/>
    <text x="557" y="722" fill="#a0d8ef" font-size="10" text-anchor="middle">shouldUseSandbox.ts — 容器化执行</text>
  </g>

  <!-- Output -->
  <line x1="400" y1="740" x2="400" y2="765" stroke="#2ec4b9" stroke-width="2"/>
  <polygon points="395,763 400,773 405,763" fill="#2ec4b9"/>
  <g filter="url(#shadow5)">
    <rect x="280" y="775" width="240" height="35" rx="17" fill="#1b4332" stroke="#2ec4b9" stroke-width="1.5"/>
    <text x="400" y="798" fill="#2ec4b9" font-size="13" font-weight="bold" text-anchor="middle">✓ 安全执行命令</text>
  </g>
</svg>
