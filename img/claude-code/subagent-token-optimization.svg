<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 480" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f72585"/>
      <stop offset="100%" style="stop-color:#b5179e"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7209b7"/>
      <stop offset="100%" style="stop-color:#560bad"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#3a0ca3"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4cc9f0"/>
      <stop offset="100%" style="stop-color:#4361ee"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06d6a0"/>
      <stop offset="100%" style="stop-color:#118ab2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="850" height="480" fill="url(#bg)" rx="12"/>

  <text x="425" y="38" fill="#fff" font-size="22" font-weight="bold" text-anchor="middle">Sub-Agent Token 优化效果量化</text>
  <text x="425" y="58" fill="#8888aa" font-size="12" text-anchor="middle">基于 34M+ Explore 调用/周的 fleet 级数据</text>

  <!-- Bar chart -->
  <!-- Bar 1 -->
  <g filter="url(#shadow)">
    <rect x="80" y="90" width="450" height="50" rx="8" fill="url(#bar1)" opacity="0.9"/>
    <text x="100" y="120" fill="#fff" font-size="13" font-weight="bold">省略 CLAUDE.md (Explore/Plan)</text>
    <text x="545" y="120" fill="#f72585" font-size="15" font-weight="bold">~5-15 Gtok/周</text>
    <text x="655" y="120" fill="#888" font-size="10">omitClaudeMd: true</text>
  </g>

  <!-- Bar 2 -->
  <g filter="url(#shadow)">
    <rect x="80" y="155" width="250" height="50" rx="8" fill="url(#bar2)" opacity="0.9"/>
    <text x="100" y="185" fill="#fff" font-size="13" font-weight="bold">省略 gitStatus</text>
    <text x="345" y="185" fill="#b5a0d0" font-size="15" font-weight="bold">~1-3 Gtok/周</text>
    <text x="455" y="185" fill="#888" font-size="10">systemContextNoGit</text>
  </g>

  <!-- Bar 3 -->
  <g filter="url(#shadow)">
    <rect x="80" y="220" width="200" height="50" rx="8" fill="url(#bar3)" opacity="0.9"/>
    <text x="100" y="250" fill="#fff" font-size="13" font-weight="bold">One-shot trailer</text>
    <text x="295" y="250" fill="#4cc9f0" font-size="15" font-weight="bold">~1-2 Gtok/周</text>
    <text x="415" y="250" fill="#888" font-size="10">~135字符 × 34M次/周</text>
  </g>

  <!-- Bar 4 -->
  <g filter="url(#shadow)">
    <rect x="80" y="285" width="320" height="50" rx="8" fill="url(#bar4)" opacity="0.9"/>
    <text x="100" y="315" fill="#fff" font-size="13" font-weight="bold">Agent 列表动态化</text>
    <text x="415" y="315" fill="#4cc9f0" font-size="15" font-weight="bold">~10.2%</text>
    <text x="500" y="315" fill="#888" font-size="10">cache_creation tokens</text>
  </g>

  <!-- Bar 5 -->
  <g filter="url(#shadow)">
    <rect x="80" y="350" width="550" height="50" rx="8" fill="url(#bar5)" opacity="0.9"/>
    <text x="100" y="380" fill="#fff" font-size="13" font-weight="bold">Fork Prompt Cache 共享</text>
    <text x="645" y="380" fill="#06d6a0" font-size="15" font-weight="bold">最大化</text>
    <text x="720" y="380" fill="#888" font-size="10">cache 命中率</text>
  </g>

  <!-- Total -->
  <rect x="80" y="420" width="690" height="42" rx="8" fill="rgba(6,214,160,0.15)" stroke="#06d6a0" stroke-width="1.5"/>
  <text x="425" y="447" fill="#06d6a0" font-size="15" font-weight="bold" text-anchor="middle">累计节省：数十 Gtok/周 的 Token 消耗 | 3400万+ 次 Explore 调用/周</text>
</svg>
