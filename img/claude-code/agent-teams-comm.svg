<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter,system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="lead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="worker" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="bus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrP" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#a78bfa"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#60a5fa"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#34d399"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#f87171"/></marker>
  </defs>

  <rect width="1200" height="700" rx="24" fill="url(#bg)"/>
  <text x="600" y="44" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700">Agent Teams 通信协议</text>
  <text x="600" y="72" text-anchor="middle" fill="#94a3b8" font-size="14">不是点对点 socket，而是以 mailbox 文件为中心的异步消息总线</text>

  <!-- actors -->
  <g filter="url(#shadow)">
    <rect x="100" y="110" width="220" height="88" rx="18" fill="url(#lead)"/>
    <text x="210" y="145" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">Team Lead</text>
    <text x="210" y="172" text-anchor="middle" fill="#e9d5ff" font-size="14">协调 / 审批 / 分配任务</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="100" y="260" width="220" height="88" rx="18" fill="url(#worker)"/>
    <text x="210" y="295" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">Worker A</text>
    <text x="210" y="322" text-anchor="middle" fill="#dbeafe" font-size="14">执行任务 / 请求权限</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="100" y="410" width="220" height="88" rx="18" fill="url(#worker)"/>
    <text x="210" y="445" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">Worker B</text>
    <text x="210" y="472" text-anchor="middle" fill="#dbeafe" font-size="14">Peer 协作 / 接收广播</text>
  </g>

  <!-- mailbox bus -->
  <g filter="url(#shadow)">
    <rect x="430" y="110" width="360" height="388" rx="24" fill="url(#bus)"/>
    <text x="610" y="150" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">Mailbox Bus</text>
    <text x="610" y="178" text-anchor="middle" fill="#d1fae5" font-size="15">`~/.claude/teams/{team}/inboxes/{agent}.json`</text>
    <text x="610" y="202" text-anchor="middle" fill="#d1fae5" font-size="13">`writeToMailbox()` / `readUnreadMessages()` / `markMessagesAsRead()`</text>

    <rect x="465" y="235" width="290" height="52" rx="12" fill="#064e3b" opacity="0.55"/>
    <text x="610" y="266" text-anchor="middle" fill="#ecfdf5" font-size="13">文本消息：task follow-up / peer DM / broadcast</text>

    <rect x="465" y="303" width="290" height="52" rx="12" fill="#064e3b" opacity="0.55"/>
    <text x="610" y="334" text-anchor="middle" fill="#ecfdf5" font-size="13">权限协议：permission_request / response</text>

    <rect x="465" y="371" width="290" height="52" rx="12" fill="#064e3b" opacity="0.55"/>
    <text x="610" y="402" text-anchor="middle" fill="#ecfdf5" font-size="13">控制协议：shutdown / plan approval / mode_set</text>

    <rect x="465" y="439" width="290" height="40" rx="12" fill="#064e3b" opacity="0.55"/>
    <text x="610" y="464" text-anchor="middle" fill="#ecfdf5" font-size="13">状态协议：idle_notification / sandbox_permission</text>
  </g>

  <!-- poller -->
  <g filter="url(#shadow)">
    <rect x="900" y="110" width="220" height="160" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="1010" y="145" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Poller / Router</text>
    <text x="1010" y="175" text-anchor="middle" fill="#94a3b8" font-size="13">`useInboxPoller` 或</text>
    <text x="1010" y="196" text-anchor="middle" fill="#94a3b8" font-size="13">`waitForNextPromptOrShutdown()`</text>
    <text x="1010" y="224" text-anchor="middle" fill="#cbd5e1" font-size="12">负责把结构化消息分流到</text>
    <text x="1010" y="243" text-anchor="middle" fill="#cbd5e1" font-size="12">权限队列、shutdown 流程、</text>
    <text x="1010" y="262" text-anchor="middle" fill="#cbd5e1" font-size="12">plan approval、常规对话输入</text>
  </g>

  <!-- arrows left to bus -->
  <path d="M320 154 C360 154, 390 154, 430 154" fill="none" stroke="#a78bfa" stroke-width="3" marker-end="url(#arrP)"/>
  <path d="M320 304 C360 304, 390 304, 430 304" fill="none" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrB)"/>
  <path d="M320 454 C360 454, 390 454, 430 454" fill="none" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrB)"/>

  <!-- bus to router -->
  <path d="M790 304 C840 304, 850 214, 900 214" fill="none" stroke="#34d399" stroke-width="3" marker-end="url(#arrG)"/>

  <!-- Example flows -->
  <g filter="url(#shadow)">
    <rect x="70" y="550" width="1060" height="104" rx="18" fill="#0f172a" stroke="#1f2937"/>
    <text x="120" y="585" fill="#f8fafc" font-size="18" font-weight="700">关键消息流</text>
    <text x="120" y="614" fill="#c4b5fd" font-size="13">1. Leader → Worker：初始 prompt / follow-up / shutdown_request</text>
    <text x="120" y="636" fill="#93c5fd" font-size="13">2. Worker → Leader：idle_notification / permission_request / shutdown_approved / shutdown_rejected</text>
    <text x="645" y="614" fill="#93c5fd" font-size="13">3. Worker ↔ Worker：Peer DM（通过 `SendMessage` 间接路由）</text>
    <text x="645" y="636" fill="#86efac" font-size="13">4. Bus → Router：按消息类型进入 UI 队列、任务流或普通对话流</text>
  </g>

  <!-- overlay callout -->
  <g>
    <rect x="860" y="316" width="292" height="170" rx="18" fill="#111827" stroke="#334155"/>
    <text x="880" y="346" fill="#f8fafc" font-size="18" font-weight="700">为什么要有“结构化消息”?</text>
    <text x="880" y="376" fill="#cbd5e1" font-size="13">如果 permission / shutdown / plan approval</text>
    <text x="880" y="398" fill="#cbd5e1" font-size="13">只是普通文本，它们会被直接塞进模型上下文，</text>
    <text x="880" y="420" fill="#cbd5e1" font-size="13">而不会进入正确的控制流。于是源码专门用</text>
    <text x="880" y="442" fill="#cbd5e1" font-size="13">`isStructuredProtocolMessage()` 把这些协议消息</text>
    <text x="880" y="464" fill="#cbd5e1" font-size="13">从“普通对话消息”里分离出来。</text>
  </g>

  <!-- note arrows -->
  <path d="M820 388 C865 388, 872 388, 880 388" fill="none" stroke="#f87171" stroke-width="2.5" marker-end="url(#arrR)"/>
</svg>