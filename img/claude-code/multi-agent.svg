<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="mg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="mg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="mg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="mg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="mg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="ms">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/>
    </filter>
    <marker id="ma" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667eea"/>
    </marker>
  </defs>

  <rect width="880" height="600" rx="16" fill="#f8f9fe"/>
  <text x="440" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Claude Code 多Agent协作架构</text>

  <!-- Lead Agent -->
  <g filter="url(#ms)">
    <rect x="310" y="55" width="260" height="60" rx="12" fill="url(#mg1)"/>
    <text x="440" y="82" text-anchor="middle" font-size="13" fill="#ffffffcc">协调者</text>
    <text x="440" y="102" text-anchor="middle" font-size="17" fill="#fff" font-weight="700">👑 Lead Agent (主Agent)</text>
  </g>

  <!-- Task Board (left) -->
  <g filter="url(#ms)">
    <rect x="30" y="55" width="240" height="145" rx="10" fill="#fff" stroke="#fa709a" stroke-width="2"/>
    <rect x="30" y="55" width="240" height="34" rx="10" fill="url(#mg5)"/>
    <text x="150" y="77" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">📋 任务看板 (Task Board)</text>
    <!-- Tasks -->
    <circle cx="52" cy="108" r="6" fill="#43e97b"/>
    <text x="65" y="112" font-size="11" fill="#555">task-001: 用户认证模块</text>
    <text x="245" y="112" font-size="10" fill="#43e97b" font-weight="600" text-anchor="end">completed</text>

    <circle cx="52" cy="133" r="6" fill="#fa709a"/>
    <text x="65" y="137" font-size="11" fill="#555">task-002: 认证API测试</text>
    <text x="245" y="137" font-size="10" fill="#fa709a" font-weight="600" text-anchor="end">in_progress</text>

    <circle cx="52" cy="158" r="6" fill="#ccc"/>
    <text x="65" y="162" font-size="11" fill="#555">task-003: 前端登录页面</text>
    <text x="245" y="162" font-size="10" fill="#999" font-weight="600" text-anchor="end">pending</text>

    <circle cx="52" cy="183" r="6" fill="#ccc"/>
    <text x="65" y="187" font-size="11" fill="#555">task-004: 部署测试环境</text>
    <text x="245" y="187" font-size="10" fill="#999" font-weight="600" text-anchor="end">pending</text>
  </g>

  <!-- Message Queue (right) -->
  <g filter="url(#ms)">
    <rect x="610" y="55" width="240" height="120" rx="10" fill="#fff" stroke="#4facfe" stroke-width="2"/>
    <rect x="610" y="55" width="240" height="34" rx="10" fill="url(#mg2)"/>
    <text x="730" y="77" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">📬 异步邮箱通信</text>
    <text x="625" y="108" font-size="11" fill="#555">📨 message — 点对点消息</text>
    <text x="625" y="128" font-size="11" fill="#555">📢 broadcast — 全员广播</text>
    <text x="625" y="148" font-size="11" fill="#555">🛑 shutdown_request — 关闭</text>
    <text x="625" y="168" font-size="11" fill="#555">✅ plan_approval — 审批</text>
  </g>

  <!-- Arrows from Lead to Sub-Agents -->
  <line x1="370" y1="115" x2="190" y2="248" stroke="#667eea" stroke-width="2" marker-end="url(#ma)"/>
  <line x1="440" y1="115" x2="440" y2="248" stroke="#667eea" stroke-width="2" marker-end="url(#ma)"/>
  <line x1="510" y1="115" x2="690" y2="248" stroke="#667eea" stroke-width="2" marker-end="url(#ma)"/>
  <text x="440" y="180" text-anchor="middle" font-size="11" fill="#667eea" font-weight="600">创建 / 协调</text>

  <!-- Sub-Agent A -->
  <g filter="url(#ms)">
    <rect x="55" y="252" width="230" height="95" rx="10" fill="#fff" stroke="#4facfe" stroke-width="2"/>
    <rect x="55" y="252" width="230" height="32" rx="10" fill="url(#mg2)"/>
    <text x="170" y="273" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">🔧 Sub-Agent A</text>
    <text x="75" y="303" font-size="11" fill="#555" font-weight="600">独立上下文窗口</text>
    <text x="75" y="323" font-size="11" fill="#888">前端开发 / React 组件</text>
    <text x="75" y="340" font-size="10" fill="#4facfe">✦ 独立消息列表</text>
  </g>

  <!-- Sub-Agent B -->
  <g filter="url(#ms)">
    <rect x="325" y="252" width="230" height="95" rx="10" fill="#fff" stroke="#43e97b" stroke-width="2"/>
    <rect x="325" y="252" width="230" height="32" rx="10" fill="url(#mg3)"/>
    <text x="440" y="273" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="700">🔧 Sub-Agent B</text>
    <text x="345" y="303" font-size="11" fill="#555" font-weight="600">独立上下文窗口</text>
    <text x="345" y="323" font-size="11" fill="#888">后端开发 / API 服务</text>
    <text x="345" y="340" font-size="10" fill="#43e97b">✦ 独立消息列表</text>
  </g>

  <!-- Sub-Agent C -->
  <g filter="url(#ms)">
    <rect x="595" y="252" width="230" height="95" rx="10" fill="#fff" stroke="#f5576c" stroke-width="2"/>
    <rect x="595" y="252" width="230" height="32" rx="10" fill="url(#mg4)"/>
    <text x="710" y="273" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">🔧 Sub-Agent C</text>
    <text x="615" y="303" font-size="11" fill="#555" font-weight="600">独立上下文窗口</text>
    <text x="615" y="323" font-size="11" fill="#888">测试工程 / 质量保障</text>
    <text x="615" y="340" font-size="10" fill="#f5576c">✦ 独立消息列表</text>
  </g>

  <!-- Peer-to-peer communication arrows between sub-agents -->
  <path d="M285 300 L325 300" stroke="#43e97b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M555 300 L595 300" stroke="#f5576c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="305" y="292" text-anchor="middle" font-size="9" fill="#888">📬</text>
  <text x="575" y="292" text-anchor="middle" font-size="9" fill="#888">📬</text>

  <!-- Security section (bottom) -->
  <text x="440" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">🔒 安全隔离层</text>

  <!-- Git Worktree A -->
  <g filter="url(#ms)">
    <rect x="55" y="395" width="230" height="80" rx="10" fill="#e8f5e9" stroke="#43e97b" stroke-width="1.5"/>
    <text x="170" y="418" text-anchor="middle" font-size="13" fill="#2e7d32" font-weight="700">🌿 Git Worktree A</text>
    <text x="75" y="440" font-size="11" fill="#555">/workspace/worktree-agent-a/</text>
    <text x="75" y="458" font-size="10" fill="#888">独立分支，文件操作互不干扰</text>
  </g>

  <!-- Git Worktree B -->
  <g filter="url(#ms)">
    <rect x="325" y="395" width="230" height="80" rx="10" fill="#e8f5e9" stroke="#43e97b" stroke-width="1.5"/>
    <text x="440" y="418" text-anchor="middle" font-size="13" fill="#2e7d32" font-weight="700">🌿 Git Worktree B</text>
    <text x="345" y="440" font-size="11" fill="#555">/workspace/worktree-agent-b/</text>
    <text x="345" y="458" font-size="10" fill="#888">独立分支，文件操作互不干扰</text>
  </g>

  <!-- Git Worktree C -->
  <g filter="url(#ms)">
    <rect x="595" y="395" width="230" height="80" rx="10" fill="#e8f5e9" stroke="#43e97b" stroke-width="1.5"/>
    <text x="710" y="418" text-anchor="middle" font-size="13" fill="#2e7d32" font-weight="700">🌿 Git Worktree C</text>
    <text x="615" y="440" font-size="11" fill="#555">/workspace/worktree-agent-c/</text>
    <text x="615" y="458" font-size="10" fill="#888">独立分支，文件操作互不干扰</text>
  </g>

  <!-- Bottom summary -->
  <g filter="url(#ms)">
    <rect x="100" y="500" width="680" height="80" rx="12" fill="#1a1a2e"/>
    <text x="440" y="528" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">🔑 核心特性</text>
    <text x="175" y="555" text-anchor="middle" font-size="12" fill="#4facfe">独立上下文</text>
    <text x="330" y="555" text-anchor="middle" font-size="12" fill="#43e97b">异步邮箱通信</text>
    <text x="480" y="555" text-anchor="middle" font-size="12" fill="#fa709a">任务依赖图</text>
    <text x="620" y="555" text-anchor="middle" font-size="12" fill="#f093fb">Worktree隔离</text>
    <text x="740" y="555" text-anchor="middle" font-size="12" fill="#fee140">自主认领</text>
  </g>
</svg>