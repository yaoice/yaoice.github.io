<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
  </defs>
  <rect width="1000" height="480" fill="url(#bg4)" rx="12"/>
  <text x="500" y="38" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="bold">Skill 安全与权限模型</text>
  <!-- Trust hierarchy -->
  <text x="500" y="70" text-anchor="middle" fill="#94a3b8" font-size="13">来源信任层级 (从高到低)</text>
  <rect x="50" y="85" width="140" height="38" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/><text x="120" y="109" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">bundled</text>
  <rect x="200" y="85" width="140" height="38" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.8"/><text x="270" y="109" text-anchor="middle" fill="#93c5fd" font-size="12">managed</text>
  <rect x="350" y="85" width="140" height="38" rx="6" fill="#2e1e5f" stroke="#8b5cf6" stroke-opacity="0.7"/><text x="420" y="109" text-anchor="middle" fill="#c4b5fd" font-size="12">userSettings</text>
  <rect x="500" y="85" width="150" height="38" rx="6" fill="#2e1e5f" stroke="#8b5cf6" stroke-opacity="0.5"/><text x="575" y="109" text-anchor="middle" fill="#c4b5fd" font-size="12">projectSettings</text>
  <rect x="660" y="85" width="140" height="38" rx="6" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.6"/><text x="730" y="109" text-anchor="middle" fill="#fcd34d" font-size="12">plugin</text>
  <rect x="810" y="85" width="140" height="38" rx="6" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.6"/><text x="880" y="109" text-anchor="middle" fill="#fca5a5" font-size="12">mcp (最低)</text>
  <!-- Permission check flow -->
  <rect x="30" y="145" width="940" height="165" rx="10" fill="none" stroke="#f59e0b" stroke-opacity="0.3" stroke-dasharray="6,3"/>
  <text x="50" y="170" fill="#fcd34d" font-size="14" font-weight="bold">checkPermissions() 决策流</text>
  <rect x="50" y="185" width="180" height="55" rx="8" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.5"/>
  <text x="140" y="207" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="bold">1. Deny Rules</text>
  <text x="140" y="228" text-anchor="middle" fill="#f87171" font-size="9">Skill(name) 或 Skill(prefix:*)</text>
  <text x="140" y="252" text-anchor="middle" fill="#ef4444" font-size="11">→ 直接拒绝</text>
  <rect x="250" y="185" width="180" height="55" rx="8" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.5"/>
  <text x="340" y="207" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold">2. Allow Rules</text>
  <text x="340" y="228" text-anchor="middle" fill="#34d399" font-size="9">精确匹配 或 前缀通配</text>
  <text x="340" y="252" text-anchor="middle" fill="#10b981" font-size="11">→ 自动放行</text>
  <rect x="450" y="185" width="180" height="55" rx="8" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.4"/>
  <text x="540" y="207" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold">3. Safe Props</text>
  <text x="540" y="228" text-anchor="middle" fill="#34d399" font-size="9">无 hooks/allowedTools →</text>
  <text x="540" y="252" text-anchor="middle" fill="#10b981" font-size="11">→ 自动放行</text>
  <rect x="650" y="185" width="180" height="55" rx="8" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.5"/>
  <text x="740" y="207" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="bold">4. User Ask</text>
  <text x="740" y="228" text-anchor="middle" fill="#fbbf24" font-size="9">推入 permission queue</text>
  <text x="740" y="252" text-anchor="middle" fill="#f59e0b" font-size="11">→ 等待用户审批</text>
  <rect x="850" y="185" width="100" height="55" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="900" y="207" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">Hook</text>
  <text x="900" y="228" text-anchor="middle" fill="#60a5fa" font-size="9">PreToolUse</text>
  <text x="900" y="252" text-anchor="middle" fill="#3b82f6" font-size="10">可拦截</text>
  <!-- Security measures -->
  <rect x="30" y="330" width="460" height="130" rx="10" fill="#1e293b" stroke="#ef4444" stroke-opacity="0.3"/>
  <text x="260" y="355" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="bold">文件安全防护</text>
  <rect x="50" y="370" width="200" height="35" rx="6" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.3"/><text x="150" y="393" text-anchor="middle" fill="#f87171" font-size="10">O_NOFOLLOW | O_EXCL 安全写入</text>
  <rect x="270" y="370" width="200" height="35" rx="6" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.3"/><text x="370" y="393" text-anchor="middle" fill="#f87171" font-size="10">per-process nonce 目录</text>
  <rect x="50" y="415" width="200" height="35" rx="6" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.3"/><text x="150" y="438" text-anchor="middle" fill="#f87171" font-size="10">resolveSkillFilePath 防遍历</text>
  <rect x="270" y="415" width="200" height="35" rx="6" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.3"/><text x="370" y="438" text-anchor="middle" fill="#f87171" font-size="10">权限 0o700/0o600 owner-only</text>
  <!-- MCP Security -->
  <rect x="510" y="330" width="460" height="130" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-opacity="0.3"/>
  <text x="740" y="355" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="bold">MCP 技能安全限制</text>
  <rect x="530" y="370" width="200" height="35" rx="6" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.3"/><text x="630" y="393" text-anchor="middle" fill="#fbbf24" font-size="10">禁止 !command 内联执行</text>
  <rect x="750" y="370" width="200" height="35" rx="6" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.3"/><text x="850" y="393" text-anchor="middle" fill="#fbbf24" font-size="10">${CLAUDE_SKILL_DIR} 无意义</text>
  <rect x="530" y="415" width="200" height="35" rx="6" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.3"/><text x="630" y="438" text-anchor="middle" fill="#fbbf24" font-size="10">isRestrictedToPluginOnly()</text>
  <rect x="750" y="415" width="200" height="35" rx="6" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.3"/><text x="850" y="438" text-anchor="middle" fill="#fbbf24" font-size="10">SAFE_SKILL_PROPERTIES 白名单</text>
</svg>
