<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#3a0ca3"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7209b7"/>
      <stop offset="100%" style="stop-color:#560bad"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f72585"/>
      <stop offset="100%" style="stop-color:#b5179e"/>
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4cc9f0"/>
      <stop offset="100%" style="stop-color:#4361ee"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="900" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="50" fill="#fff" font-size="24" font-weight="bold" text-anchor="middle">Claude Code 启动流程</text>
  <text x="400" y="75" fill="#8888aa" font-size="13" text-anchor="middle">main.tsx (785KB) → Bootstrap → REPL Screen</text>

  <!-- Stage 1: Parallel Prefetch -->
  <g filter="url(#shadow)">
    <rect x="80" y="100" width="640" height="160" rx="12" fill="url(#card1)" opacity="0.9"/>
    <rect x="80" y="100" width="640" height="36" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="110" y="125" fill="#fff" font-size="15" font-weight="bold">① 并行预取 (Side Effects) — 模块加载前触发</text>
    <!-- Sub boxes -->
    <rect x="110" y="150" width="180" height="90" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="200" y="178" fill="#4cc9f0" font-size="13" font-weight="bold" text-anchor="middle">MDM 配置预读</text>
    <text x="200" y="198" fill="#ccc" font-size="11" text-anchor="middle">startMdmRawRead()</text>
    <text x="200" y="218" fill="#888" font-size="10" text-anchor="middle">企业管理策略</text>

    <rect x="310" y="150" width="180" height="90" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="400" y="178" fill="#4cc9f0" font-size="13" font-weight="bold" text-anchor="middle">Keychain 预取</text>
    <text x="400" y="198" fill="#ccc" font-size="11" text-anchor="middle">startKeychainPrefetch()</text>
    <text x="400" y="218" fill="#888" font-size="10" text-anchor="middle">凭证提前获取</text>

    <rect x="510" y="150" width="180" height="90" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="600" y="178" fill="#4cc9f0" font-size="13" font-weight="bold" text-anchor="middle">API 预连接</text>
    <text x="600" y="198" fill="#ccc" font-size="11" text-anchor="middle">apiPreconnect()</text>
    <text x="600" y="218" fill="#888" font-size="10" text-anchor="middle">TCP + TLS 握手</text>
  </g>

  <!-- Arrow -->
  <path d="M400 265 L400 290" stroke="#4cc9f0" stroke-width="2" marker-end="url(#arrowhead)"/>
  <polygon id="arrowhead" points="395,288 400,298 405,288" fill="#4cc9f0"/>

  <!-- Stage 2: Commander.js -->
  <g filter="url(#shadow)">
    <rect x="80" y="300" width="640" height="100" rx="12" fill="url(#card2)" opacity="0.9"/>
    <rect x="80" y="300" width="640" height="36" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="110" y="325" fill="#fff" font-size="15" font-weight="bold">② Commander.js CLI 解析</text>
    <text x="130" y="358" fill="#ccc" font-size="12">program.option('--model', ...)</text>
    <text x="130" y="378" fill="#ccc" font-size="12">program.option('--resume', ...)</text>
    <text x="430" y="358" fill="#ccc" font-size="12">program.option('--allowedTools', ...)</text>
    <text x="430" y="378" fill="#ccc" font-size="12">program.action(async () =&gt; { ... })</text>
  </g>

  <!-- Arrow -->
  <path d="M400 405 L400 430" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="395,428 400,438 405,428" fill="#4cc9f0"/>

  <!-- Stage 3: Bootstrap -->
  <g filter="url(#shadow)">
    <rect x="80" y="440" width="640" height="200" rx="12" fill="url(#card3)" opacity="0.9"/>
    <rect x="80" y="440" width="640" height="36" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="110" y="465" fill="#fff" font-size="15" font-weight="bold">③ 环境引导 (bootstrap/state.ts ~ 55KB)</text>

    <rect x="110" y="490" width="140" height="60" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="180" y="515" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">配置加载</text>
    <text x="180" y="535" fill="#ddd" font-size="10" text-anchor="middle">config.ts (62KB)</text>

    <text x="265" y="520" fill="#f72585" font-size="18">→</text>

    <rect x="280" y="490" width="140" height="60" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="350" y="515" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">认证检查</text>
    <text x="350" y="535" fill="#ddd" font-size="10" text-anchor="middle">auth.ts (64KB)</text>

    <text x="435" y="520" fill="#f72585" font-size="18">→</text>

    <rect x="450" y="490" width="140" height="60" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="520" y="515" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">特性开关</text>
    <text x="520" y="535" fill="#ddd" font-size="10" text-anchor="middle">GrowthBook</text>

    <rect x="110" y="565" width="140" height="60" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="180" y="590" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">MCP 连接</text>
    <text x="180" y="610" fill="#ddd" font-size="10" text-anchor="middle">服务器初始化</text>

    <rect x="280" y="565" width="140" height="60" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="350" y="590" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">权限模式</text>
    <text x="350" y="610" fill="#ddd" font-size="10" text-anchor="middle">default/plan/auto</text>

    <rect x="450" y="565" width="140" height="60" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="520" y="590" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">插件加载</text>
    <text x="520" y="610" fill="#ddd" font-size="10" text-anchor="middle">pluginLoader.ts</text>
  </g>

  <!-- Arrow -->
  <path d="M400 645 L400 670" stroke="#4cc9f0" stroke-width="2"/>
  <polygon points="395,668 400,678 405,668" fill="#4cc9f0"/>

  <!-- Stage 4: React/Ink Render -->
  <g filter="url(#shadow)">
    <rect x="80" y="680" width="640" height="140" rx="12" fill="url(#card4)" opacity="0.9"/>
    <rect x="80" y="680" width="640" height="36" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="110" y="705" fill="#fff" font-size="15" font-weight="bold">④ React/Ink 终端 UI 渲染</text>

    <rect x="110" y="730" width="280" height="70" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="250" y="758" fill="#4cc9f0" font-size="14" font-weight="bold" text-anchor="middle">render(&lt;App /&gt;)</text>
    <text x="250" y="780" fill="#ccc" font-size="11" text-anchor="middle">Custom Ink Fork (101 files)</text>

    <text x="405" y="770" fill="#4cc9f0" font-size="22">→</text>

    <rect x="420" y="730" width="280" height="70" rx="8" fill="rgba(0,255,200,0.12)" stroke="rgba(0,255,200,0.3)" stroke-width="1.5"/>
    <text x="560" y="758" fill="#4cc9f0" font-size="14" font-weight="bold" text-anchor="middle">REPL Screen (875KB)</text>
    <text x="560" y="780" fill="#ccc" font-size="11" text-anchor="middle">主交互界面就绪 ✓</text>
  </g>

  <!-- Footer -->
  <text x="400" y="855" fill="#666" font-size="11" text-anchor="middle">性能优化：并行预取在重模块加载前完成 MDM / Keychain / API 连接</text>
  <text x="400" y="875" fill="#555" font-size="10" text-anchor="middle">© Claude Code Source Analysis</text>
</svg>
