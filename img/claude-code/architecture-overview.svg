<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="#f8f9fe"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">Claude Code 整体架构</text>

  <!-- Layer 1: User Interface -->
  <g filter="url(#shadow)">
    <rect x="50" y="65" width="800" height="110" rx="12" fill="url(#g1)"/>
    <text x="450" y="92" text-anchor="middle" font-size="13" fill="#ffffffcc" font-weight="500">LAYER 1</text>
    <text x="450" y="112" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">用户接口层 (Surfaces)</text>
    <!-- Surface items -->
    <rect x="80" y="128" width="130" height="36" rx="8" fill="#ffffff30"/>
    <text x="145" y="151" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">Terminal CLI</text>
    <rect x="225" y="128" width="130" height="36" rx="8" fill="#ffffff30"/>
    <text x="290" y="151" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">VS Code</text>
    <rect x="370" y="128" width="130" height="36" rx="8" fill="#ffffff30"/>
    <text x="435" y="151" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">Desktop App</text>
    <rect x="515" y="128" width="130" height="36" rx="8" fill="#ffffff30"/>
    <text x="580" y="151" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">JetBrains IDE</text>
    <rect x="660" y="128" width="160" height="36" rx="8" fill="#ffffff30"/>
    <text x="740" y="151" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">Web</text>
  </g>

  <!-- Arrow 1→2 -->
  <path d="M450 175 L450 195" stroke="#764ba2" stroke-width="2" marker-end="url(#arrowV)"/>
  <defs><marker id="arrowV" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#764ba2"/></marker></defs>

  <!-- Layer 2: Agentic Loop -->
  <g filter="url(#shadow)">
    <rect x="50" y="200" width="800" height="100" rx="12" fill="url(#g2)"/>
    <text x="450" y="227" text-anchor="middle" font-size="13" fill="#ffffffcc" font-weight="500">LAYER 2</text>
    <text x="450" y="247" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">Agentic Loop 核心层</text>
    <!-- Loop steps -->
    <rect x="120" y="261" width="180" height="30" rx="6" fill="#ffffff30"/>
    <text x="210" y="281" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">① Gather Context</text>
    <text x="345" y="281" text-anchor="middle" font-size="16" fill="#fff">→</text>
    <rect x="370" y="261" width="170" height="30" rx="6" fill="#ffffff30"/>
    <text x="455" y="281" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">② Take Action</text>
    <text x="585" y="281" text-anchor="middle" font-size="16" fill="#fff">→</text>
    <rect x="610" y="261" width="180" height="30" rx="6" fill="#ffffff30"/>
    <text x="700" y="281" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">③ Verify Results</text>
  </g>

  <!-- Arrow 2→3 -->
  <path d="M450 300 L450 320" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowV2)"/>
  <defs><marker id="arrowV2" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f5576c"/></marker></defs>

  <!-- Layer 3: Tool System -->
  <g filter="url(#shadow)">
    <rect x="50" y="325" width="800" height="110" rx="12" fill="url(#g3)"/>
    <text x="450" y="352" text-anchor="middle" font-size="13" fill="#ffffffcc" font-weight="500">LAYER 3</text>
    <text x="450" y="372" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">工具系统层 (核心工具 + MCP 扩展)</text>
    <!-- Tool categories -->
    <rect x="75" y="388" width="125" height="36" rx="8" fill="#ffffff30"/>
    <text x="137" y="411" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">📁 文件操作</text>
    <rect x="215" y="388" width="110" height="36" rx="8" fill="#ffffff30"/>
    <text x="270" y="411" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">🔍 搜索</text>
    <rect x="340" y="388" width="110" height="36" rx="8" fill="#ffffff30"/>
    <text x="395" y="411" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">⚡ 执行</text>
    <rect x="465" y="388" width="110" height="36" rx="8" fill="#ffffff30"/>
    <text x="520" y="411" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">🌐 Web</text>
    <rect x="590" y="388" width="120" height="36" rx="8" fill="#ffffff30"/>
    <text x="650" y="411" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">📋 任务管理</text>
    <rect x="725" y="388" width="100" height="36" rx="8" fill="#ffffff30"/>
    <text x="775" y="411" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">🤝 协作</text>
  </g>

  <!-- Arrow 3→4 -->
  <path d="M450 435 L450 455" stroke="#00c4cc" stroke-width="2" marker-end="url(#arrowV3)"/>
  <defs><marker id="arrowV3" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#00c4cc"/></marker></defs>

  <!-- Layer 4: Context Management -->
  <g filter="url(#shadow)">
    <rect x="50" y="460" width="800" height="110" rx="12" fill="url(#g4)"/>
    <text x="450" y="487" text-anchor="middle" font-size="13" fill="#1a1a2ecc" font-weight="500">LAYER 4</text>
    <text x="450" y="507" text-anchor="middle" font-size="18" fill="#1a1a2e" font-weight="700">上下文管理层</text>
    <rect x="90" y="521" width="155" height="36" rx="8" fill="#ffffff50"/>
    <text x="167" y="544" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="600">📝 CLAUDE.md</text>
    <rect x="260" y="521" width="155" height="36" rx="8" fill="#ffffff50"/>
    <text x="337" y="544" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="600">🧠 Auto Memory</text>
    <rect x="430" y="521" width="175" height="36" rx="8" fill="#ffffff50"/>
    <text x="517" y="544" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="600">📦 上下文压缩</text>
    <rect x="620" y="521" width="155" height="36" rx="8" fill="#ffffff50"/>
    <text x="697" y="544" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="600">🔀 子Agent隔离</text>
  </g>

  <!-- Design philosophy -->
  <rect x="200" y="585" width="500" height="28" rx="14" fill="#1a1a2e"/>
  <text x="450" y="604" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">核心哲学：模型即 Agent，工程即 Harness</text>
</svg>