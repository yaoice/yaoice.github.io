<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 880" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="820" height="880" fill="url(#bg3)" rx="12"/>

  <!-- Title -->
  <text x="410" y="45" fill="#fff" font-size="24" font-weight="bold" text-anchor="middle">终端 UI 系统：React + Ink 深度定制</text>
  <text x="410" y="70" fill="#8888aa" font-size="13" text-anchor="middle">自定义 Ink Fork · 101 个文件 · 完整终端 IDE 体验</text>

  <!-- Layer 1: REPL Screen -->
  <g filter="url(#shadow3)">
    <rect x="60" y="90" width="700" height="100" rx="12" fill="#1b3a4b" stroke="#4cc9f0" stroke-width="2"/>
    <rect x="60" y="90" width="700" height="32" rx="12" fill="rgba(76,201,240,0.2)"/>
    <text x="90" y="113" fill="#4cc9f0" font-size="14" font-weight="bold">REPL Screen — 主交互界面</text>
    <text x="640" y="113" fill="#888" font-size="11" text-anchor="end">screens/REPL.tsx</text>
    <text x="720" y="113" fill="#4cc9f0" font-size="11" font-weight="bold" text-anchor="end">875KB</text>

    <rect x="85" y="135" width="200" height="40" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="185" y="160" fill="#ccc" font-size="11" text-anchor="middle">消息列表 + 虚拟滚动</text>

    <rect x="300" y="135" width="200" height="40" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="400" y="160" fill="#ccc" font-size="11" text-anchor="middle">权限确认 + 覆盖层</text>

    <rect x="515" y="135" width="220" height="40" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="625" y="160" fill="#ccc" font-size="11" text-anchor="middle">Agent 进度 + 状态栏</text>
  </g>

  <!-- Layer 2: Core Components -->
  <g filter="url(#shadow3)">
    <rect x="60" y="210" width="700" height="150" rx="12" fill="#1e0a3c" stroke="#9d4edd" stroke-width="2"/>
    <rect x="60" y="210" width="700" height="32" rx="12" fill="rgba(157,78,221,0.2)"/>
    <text x="90" y="233" fill="#c77dff" font-size="14" font-weight="bold">核心 UI 组件</text>

    <!-- PromptInput -->
    <rect x="85" y="255" width="210" height="90" rx="8" fill="rgba(255,255,255,0.08)" stroke="#c77dff" stroke-width="1"/>
    <text x="190" y="278" fill="#e0aaff" font-size="12" font-weight="bold" text-anchor="middle">PromptInput</text>
    <text x="190" y="296" fill="#999" font-size="10" text-anchor="middle">347KB · 输入框组件</text>
    <text x="190" y="314" fill="#777" font-size="9" text-anchor="middle">Typeahead 自动补全 (208KB)</text>
    <text x="190" y="330" fill="#777" font-size="9" text-anchor="middle">语音指示器 · 斜杠命令提示</text>

    <!-- Messages -->
    <rect x="310" y="255" width="190" height="90" rx="8" fill="rgba(255,255,255,0.08)" stroke="#c77dff" stroke-width="1"/>
    <text x="405" y="278" fill="#e0aaff" font-size="12" font-weight="bold" text-anchor="middle">Messages</text>
    <text x="405" y="296" fill="#999" font-size="10" text-anchor="middle">144KB · 消息渲染</text>
    <text x="405" y="314" fill="#777" font-size="9" text-anchor="middle">VirtualMessageList 145KB</text>
    <text x="405" y="330" fill="#777" font-size="9" text-anchor="middle">分组 · 折叠 · 流式显示</text>

    <!-- Stats & Others -->
    <rect x="515" y="255" width="220" height="90" rx="8" fill="rgba(255,255,255,0.08)" stroke="#c77dff" stroke-width="1"/>
    <text x="625" y="278" fill="#e0aaff" font-size="12" font-weight="bold" text-anchor="middle">辅助组件</text>
    <text x="625" y="296" fill="#999" font-size="10" text-anchor="middle">Stats 149KB · Feedback 86KB</text>
    <text x="625" y="314" fill="#777" font-size="9" text-anchor="middle">ScrollKeybinding 146KB</text>
    <text x="625" y="330" fill="#777" font-size="9" text-anchor="middle">LogSelector 196KB</text>
  </g>

  <!-- Layer 3: Design System -->
  <g filter="url(#shadow3)">
    <rect x="60" y="380" width="700" height="110" rx="12" fill="#1a3320" stroke="#52b788" stroke-width="2"/>
    <rect x="60" y="380" width="700" height="32" rx="12" fill="rgba(82,183,136,0.2)"/>
    <text x="90" y="403" fill="#52b788" font-size="14" font-weight="bold">设计系统 (design-system/)</text>

    <rect x="85" y="425" width="115" height="50" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(82,183,136,0.4)" stroke-width="1"/>
    <text x="142" y="448" fill="#95d5b2" font-size="11" font-weight="bold" text-anchor="middle">Theme</text>
    <text x="142" y="465" fill="#777" font-size="9" text-anchor="middle">亮色/暗色</text>

    <rect x="212" y="425" width="115" height="50" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(82,183,136,0.4)" stroke-width="1"/>
    <text x="270" y="448" fill="#95d5b2" font-size="11" font-weight="bold" text-anchor="middle">Dialog</text>
    <text x="270" y="465" fill="#777" font-size="9" text-anchor="middle">模态对话框</text>

    <rect x="339" y="425" width="115" height="50" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(82,183,136,0.4)" stroke-width="1"/>
    <text x="397" y="448" fill="#95d5b2" font-size="11" font-weight="bold" text-anchor="middle">Tabs</text>
    <text x="397" y="465" fill="#777" font-size="9" text-anchor="middle">标签页 40KB</text>

    <rect x="466" y="425" width="130" height="50" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(82,183,136,0.4)" stroke-width="1"/>
    <text x="531" y="448" fill="#95d5b2" font-size="11" font-weight="bold" text-anchor="middle">FuzzyPicker</text>
    <text x="531" y="465" fill="#777" font-size="9" text-anchor="middle">模糊搜索 40KB</text>

    <rect x="608" y="425" width="130" height="50" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(82,183,136,0.4)" stroke-width="1"/>
    <text x="673" y="448" fill="#95d5b2" font-size="11" font-weight="bold" text-anchor="middle">ProgressBar</text>
    <text x="673" y="465" fill="#777" font-size="9" text-anchor="middle">进度条</text>
  </g>

  <!-- Layer 4: Custom Ink Fork -->
  <g filter="url(#shadow3)">
    <rect x="60" y="510" width="700" height="170" rx="12" fill="#2d1b00" stroke="#f4a261" stroke-width="2"/>
    <rect x="60" y="510" width="700" height="32" rx="12" fill="rgba(244,162,97,0.2)"/>
    <text x="90" y="533" fill="#f4a261" font-size="14" font-weight="bold">自定义 Ink Fork (ink/ · 101 files)</text>

    <!-- Rendering Engine -->
    <rect x="85" y="555" width="210" height="110" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(244,162,97,0.4)" stroke-width="1"/>
    <text x="190" y="578" fill="#f4a261" font-size="12" font-weight="bold" text-anchor="middle">渲染引擎</text>
    <text x="190" y="598" fill="#999" font-size="10" text-anchor="middle">ink.tsx (246KB)</text>
    <text x="190" y="618" fill="#777" font-size="9" text-anchor="middle">render-node-to-output (62KB)</text>
    <text x="190" y="638" fill="#777" font-size="9" text-anchor="middle">screen.ts (48KB)</text>
    <text x="190" y="655" fill="#777" font-size="9" text-anchor="middle">selection.ts (34KB)</text>

    <!-- Event System -->
    <rect x="310" y="555" width="190" height="110" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(244,162,97,0.4)" stroke-width="1"/>
    <text x="405" y="578" fill="#f4a261" font-size="12" font-weight="bold" text-anchor="middle">事件系统</text>
    <text x="405" y="598" fill="#999" font-size="10" text-anchor="middle">ink/events/</text>
    <text x="405" y="618" fill="#777" font-size="9" text-anchor="middle">鼠标点击事件</text>
    <text x="405" y="638" fill="#777" font-size="9" text-anchor="middle">键盘事件</text>
    <text x="405" y="655" fill="#777" font-size="9" text-anchor="middle">终端焦点事件</text>

    <!-- Layout Engine -->
    <rect x="515" y="555" width="220" height="110" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(244,162,97,0.4)" stroke-width="1"/>
    <text x="625" y="578" fill="#f4a261" font-size="12" font-weight="bold" text-anchor="middle">Yoga 布局引擎</text>
    <text x="625" y="598" fill="#999" font-size="10" text-anchor="middle">ink/layout/</text>
    <text x="625" y="618" fill="#777" font-size="9" text-anchor="middle">Flexbox 终端布局</text>
    <text x="625" y="638" fill="#777" font-size="9" text-anchor="middle">App.tsx (96KB)</text>
    <text x="625" y="655" fill="#777" font-size="9" text-anchor="middle">ScrollBox.tsx (31KB)</text>
  </g>

  <!-- Layer 5: Terminal I/O -->
  <g filter="url(#shadow3)">
    <rect x="60" y="700" width="700" height="100" rx="12" fill="#3d0814" stroke="#e63946" stroke-width="2"/>
    <rect x="60" y="700" width="700" height="32" rx="12" fill="rgba(230,57,70,0.2)"/>
    <text x="90" y="723" fill="#e63946" font-size="14" font-weight="bold">终端 I/O 抽象 (ink/termio/)</text>

    <rect x="85" y="745" width="145" height="40" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(230,57,70,0.3)" stroke-width="1"/>
    <text x="157" y="770" fill="#ffa0a0" font-size="11" text-anchor="middle">ANSI Parser</text>

    <rect x="245" y="745" width="120" height="40" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(230,57,70,0.3)" stroke-width="1"/>
    <text x="305" y="770" fill="#ffa0a0" font-size="11" text-anchor="middle">Tokenizer</text>

    <rect x="380" y="745" width="100" height="40" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(230,57,70,0.3)" stroke-width="1"/>
    <text x="430" y="770" fill="#ffa0a0" font-size="11" text-anchor="middle">SGR 样式</text>

    <rect x="495" y="745" width="100" height="40" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(230,57,70,0.3)" stroke-width="1"/>
    <text x="545" y="770" fill="#ffa0a0" font-size="11" text-anchor="middle">CSI 序列</text>

    <rect x="610" y="745" width="125" height="40" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(230,57,70,0.3)" stroke-width="1"/>
    <text x="672" y="770" fill="#ffa0a0" font-size="11" text-anchor="middle">OSC 序列</text>
  </g>

  <!-- Bottom layer indicator -->
  <g filter="url(#shadow3)">
    <rect x="200" y="820" width="420" height="40" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="410" y="845" fill="#888" font-size="12" text-anchor="middle">Terminal (stdin/stdout) · TTY · PTY</text>
  </g>
</svg>
