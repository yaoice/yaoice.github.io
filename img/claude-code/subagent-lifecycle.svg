<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 950" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="step" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#3a0ca3"/>
    </linearGradient>
    <linearGradient id="decision" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f72585"/>
      <stop offset="100%" style="stop-color:#b5179e"/>
    </linearGradient>
    <linearGradient id="exec" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7209b7"/>
      <stop offset="100%" style="stop-color:#560bad"/>
    </linearGradient>
    <linearGradient id="cleanup" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06d6a0"/>
      <stop offset="100%" style="stop-color:#118ab2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="850" height="950" fill="url(#bg)" rx="12"/>

  <text x="425" y="38" fill="#fff" font-size="22" font-weight="bold" text-anchor="middle">Sub-Agent 完整生命周期</text>
  <text x="425" y="58" fill="#8888aa" font-size="12" text-anchor="middle">AgentTool.call() → runAgent() → finalizeAgentTool() → cleanup</text>

  <!-- Step 1 -->
  <g filter="url(#shadow)">
    <rect x="250" y="80" width="350" height="42" rx="8" fill="url(#step)" opacity="0.9"/>
    <text x="275" y="106" fill="#4cc9f0" font-size="12" font-weight="bold">①</text>
    <text x="300" y="106" fill="#fff" font-size="12" font-weight="bold">类型路由 — effectiveType 解析</text>
  </g>
  <path d="M425 122 L425 142" stroke="#4cc9f0" stroke-width="1.5"/>
  <polygon points="421,140 425,148 429,140" fill="#4cc9f0"/>

  <!-- Step 2 -->
  <g filter="url(#shadow)">
    <rect x="250" y="148" width="350" height="42" rx="8" fill="url(#step)" opacity="0.9"/>
    <text x="275" y="174" fill="#4cc9f0" font-size="12" font-weight="bold">②</text>
    <text x="300" y="174" fill="#fff" font-size="12" font-weight="bold">Agent 选择 + 权限过滤 + MCP 就绪检查</text>
  </g>
  <path d="M425 190 L425 210" stroke="#4cc9f0" stroke-width="1.5"/>
  <polygon points="421,208 425,216 429,208" fill="#4cc9f0"/>

  <!-- Step 3 -->
  <g filter="url(#shadow)">
    <rect x="250" y="216" width="350" height="42" rx="8" fill="url(#step)" opacity="0.9"/>
    <text x="275" y="242" fill="#4cc9f0" font-size="12" font-weight="bold">③</text>
    <text x="300" y="242" fill="#fff" font-size="12" font-weight="bold">工具池组装 (assembleToolPool)</text>
  </g>
  <path d="M425 258 L425 278" stroke="#4cc9f0" stroke-width="1.5"/>
  <polygon points="421,276 425,284 429,276" fill="#4cc9f0"/>

  <!-- Decision: Fork? -->
  <g filter="url(#shadow)">
    <polygon points="425,288 560,330 425,372 290,330" fill="url(#decision)" opacity="0.9"/>
    <text x="425" y="326" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">isForkPath?</text>
    <text x="425" y="344" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">subagent_type 省略?</text>
  </g>

  <text x="240" y="310" fill="#f72585" font-size="11" font-weight="bold">Yes (Fork)</text>
  <path d="M290 330 L130 330 L130 385" stroke="#f72585" stroke-width="1.5"/>
  <polygon points="126,382 130,392 134,382" fill="#f72585"/>

  <text x="590" y="310" fill="#06d6a0" font-size="11" font-weight="bold">No (标准)</text>
  <path d="M560 330 L720 330 L720 385" stroke="#06d6a0" stroke-width="1.5"/>
  <polygon points="716,382 720,392 724,382" fill="#06d6a0"/>

  <!-- Fork branch -->
  <g filter="url(#shadow)">
    <rect x="40" y="392" width="200" height="60" rx="8" fill="url(#decision)" opacity="0.8"/>
    <text x="140" y="416" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">继承父代 systemPrompt</text>
    <text x="140" y="436" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">buildForkedMessages()</text>
  </g>

  <!-- Standard branch -->
  <g filter="url(#shadow)">
    <rect x="610" y="392" width="210" height="60" rx="8" fill="url(#cleanup)" opacity="0.8"/>
    <text x="715" y="416" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">调用 getSystemPrompt()</text>
    <text x="715" y="436" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">enhanceWithEnvDetails()</text>
  </g>

  <!-- Merge -->
  <path d="M140 452 L140 482 L425 482" stroke="#f72585" stroke-width="1.5"/>
  <path d="M720 452 L720 482 L425 482" stroke="#06d6a0" stroke-width="1.5"/>
  <path d="M425 482 L425 498" stroke="#4cc9f0" stroke-width="1.5"/>
  <polygon points="421,496 425,504 429,496" fill="#4cc9f0"/>

  <!-- Decision: Async? -->
  <g filter="url(#shadow)">
    <polygon points="425,508 545,545 425,582 305,545" fill="url(#decision)" opacity="0.9"/>
    <text x="425" y="542" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">shouldRunAsync?</text>
    <text x="425" y="558" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">background/coordinator/fork</text>
  </g>

  <text x="205" y="540" fill="#f72585" font-size="11" font-weight="bold">异步</text>
  <path d="M305 545 L150 545 L150 600" stroke="#f72585" stroke-width="1.5"/>
  <polygon points="146,598 150,606 154,598" fill="#f72585"/>

  <text x="600" y="540" fill="#06d6a0" font-size="11" font-weight="bold">同步</text>
  <path d="M545 545 L700 545 L700 600" stroke="#06d6a0" stroke-width="1.5"/>
  <polygon points="696,598 700,606 704,598" fill="#06d6a0"/>

  <!-- Async -->
  <g filter="url(#shadow)">
    <rect x="40" y="608" width="230" height="85" rx="8" fill="url(#exec)" opacity="0.85"/>
    <text x="155" y="632" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">异步执行路径</text>
    <text x="60" y="652" fill="#ccc" font-size="10">• registerAsyncAgent()</text>
    <text x="60" y="668" fill="#ccc" font-size="10">• fire-and-forget runAgent()</text>
    <text x="60" y="684" fill="#ccc" font-size="10">• &lt;task-notification&gt; 通知</text>
  </g>

  <!-- Sync -->
  <g filter="url(#shadow)">
    <rect x="580" y="608" width="230" height="85" rx="8" fill="url(#cleanup)" opacity="0.85"/>
    <text x="695" y="632" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">同步执行路径</text>
    <text x="600" y="652" fill="#ccc" font-size="10">• registerAgentForeground()</text>
    <text x="600" y="668" fill="#ccc" font-size="10">• while(true) { yield msg }</text>
    <text x="600" y="684" fill="#ccc" font-size="10">• 支持中途背景化 (120s)</text>
  </g>

  <!-- Merge to finalize -->
  <path d="M155 693 L155 730 L425 730" stroke="#7209b7" stroke-width="1.5"/>
  <path d="M695 693 L695 730 L425 730" stroke="#118ab2" stroke-width="1.5"/>
  <path d="M425 730 L425 748" stroke="#4cc9f0" stroke-width="1.5"/>
  <polygon points="421,746 425,754 429,746" fill="#4cc9f0"/>

  <!-- Finalize -->
  <g filter="url(#shadow)">
    <rect x="250" y="755" width="350" height="42" rx="8" fill="url(#step)" opacity="0.9"/>
    <text x="275" y="781" fill="#4cc9f0" font-size="12" font-weight="bold">⑥</text>
    <text x="300" y="781" fill="#fff" font-size="12" font-weight="bold">finalizeAgentTool() — 提取结果 + 统计</text>
  </g>
  <path d="M425 797 L425 817" stroke="#4cc9f0" stroke-width="1.5"/>
  <polygon points="421,815 425,823 429,815" fill="#4cc9f0"/>

  <!-- Cleanup -->
  <g filter="url(#shadow)">
    <rect x="150" y="823" width="550" height="105" rx="10" fill="url(#cleanup)" opacity="0.25" stroke="#06d6a0" stroke-width="1"/>
    <text x="175" y="846" fill="#06d6a0" font-size="13" font-weight="bold">⑦ finally 清理 (runAgent.ts)</text>
    <rect x="170" y="858" width="145" height="28" rx="5" fill="rgba(255,255,255,0.08)"/>
    <text x="242" y="877" fill="#ccc" font-size="10" text-anchor="middle">MCP 清理</text>
    <rect x="325" y="858" width="145" height="28" rx="5" fill="rgba(255,255,255,0.08)"/>
    <text x="397" y="877" fill="#ccc" font-size="10" text-anchor="middle">Session Hooks</text>
    <rect x="480" y="858" width="145" height="28" rx="5" fill="rgba(255,255,255,0.08)"/>
    <text x="552" y="877" fill="#ccc" font-size="10" text-anchor="middle">Cache Tracking</text>
    <rect x="170" y="893" width="145" height="28" rx="5" fill="rgba(255,255,255,0.08)"/>
    <text x="242" y="912" fill="#ccc" font-size="10" text-anchor="middle">FileState 释放</text>
    <rect x="325" y="893" width="145" height="28" rx="5" fill="rgba(255,255,255,0.08)"/>
    <text x="397" y="912" fill="#ccc" font-size="10" text-anchor="middle">Todos 清除</text>
    <rect x="480" y="893" width="145" height="28" rx="5" fill="rgba(255,255,255,0.08)"/>
    <text x="552" y="912" fill="#ccc" font-size="10" text-anchor="middle">Shell 任务终止</text>
  </g>
</svg>
