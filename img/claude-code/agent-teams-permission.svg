<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 700" font-family="Inter,system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="stepBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="stepGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrP" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#a78bfa"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#fbbf24"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#34d399"/></marker>
  </defs>

  <rect width="1220" height="700" rx="24" fill="url(#bg)"/>
  <text x="610" y="44" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700">权限同步：首选 UI 桥接，失败时回退邮箱协议</text>
  <text x="610" y="72" text-anchor="middle" fill="#94a3b8" font-size="14">同一套 ask / allow / reject 语义，通过两条不同实现路径实现多 Agent 权限安全</text>

  <!-- left panel -->
  <g filter="url(#shadow)">
    <rect x="40" y="110" width="550" height="530" rx="24" fill="#111827" stroke="#312e81" stroke-width="2"/>
    <rect x="58" y="128" width="514" height="62" rx="16" fill="url(#left)"/>
    <text x="315" y="168" text-anchor="middle" fill="#fff" font-size="23" font-weight="700">路径 A：Leader ToolUseConfirm 队列（首选）</text>
  </g>

  <!-- right panel -->
  <g filter="url(#shadow)">
    <rect x="630" y="110" width="550" height="530" rx="24" fill="#111827" stroke="#92400e" stroke-width="2"/>
    <rect x="648" y="128" width="514" height="62" rx="16" fill="url(#right)"/>
    <text x="905" y="168" text-anchor="middle" fill="#fff" font-size="23" font-weight="700">路径 B：Mailbox 协议回退（兼容跨进程）</text>
  </g>

  <!-- left flow -->
  <g filter="url(#shadow)">
    <rect x="80" y="228" width="210" height="84" rx="18" fill="url(#stepBlue)"/>
    <text x="185" y="260" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">1. Worker 触发 ask</text>
    <text x="185" y="286" text-anchor="middle" fill="#dbeafe" font-size="12">`hasPermissionsToUseTool()`</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="330" y="228" width="220" height="84" rx="18" fill="url(#left)"/>
    <text x="440" y="260" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">2. 直接入队</text>
    <text x="440" y="286" text-anchor="middle" fill="#ede9fe" font-size="12">`getLeaderToolUseConfirmQueue()`</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="165" y="360" width="340" height="108" rx="18" fill="url(#stepGreen)"/>
    <text x="335" y="394" text-anchor="middle" fill="#fff" font-size="19" font-weight="700">3. Leader UI 显示原生权限组件</text>
    <text x="335" y="420" text-anchor="middle" fill="#d1fae5" font-size="12">workerBadge（名称 + 颜色）直接附着在审批卡片上</text>
    <text x="335" y="442" text-anchor="middle" fill="#d1fae5" font-size="12">Bash / FileEdit 等工具仍保留专属审批 UI</text>
  </g>
  <g>
    <rect x="95" y="520" width="190" height="74" rx="16" fill="#14532d"/>
    <text x="190" y="550" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Allow</text>
    <text x="190" y="573" text-anchor="middle" fill="#bbf7d0" font-size="12">resolve(allow)</text>
  </g>
  <g>
    <rect x="385" y="520" width="170" height="74" rx="16" fill="#7f1d1d"/>
    <text x="470" y="550" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Reject</text>
    <text x="470" y="573" text-anchor="middle" fill="#fecaca" font-size="12">resolve(ask / deny)</text>
  </g>

  <line x1="290" y1="270" x2="330" y2="270" stroke="#a78bfa" stroke-width="3" marker-end="url(#arrP)"/>
  <line x1="440" y1="312" x2="440" y2="360" stroke="#a78bfa" stroke-width="3" marker-end="url(#arrP)"/>
  <line x1="270" y1="468" x2="240" y2="520" stroke="#34d399" stroke-width="3" marker-end="url(#arrG)"/>
  <line x1="430" y1="468" x2="455" y2="520" stroke="#34d399" stroke-width="3" marker-end="url(#arrG)"/>

  <!-- right flow -->
  <g filter="url(#shadow)">
    <rect x="670" y="228" width="210" height="84" rx="18" fill="url(#stepBlue)"/>
    <text x="775" y="260" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">1. Worker 构造请求</text>
    <text x="775" y="286" text-anchor="middle" fill="#dbeafe" font-size="12">`createPermissionRequest()`</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="920" y="228" width="220" height="84" rx="18" fill="url(#right)"/>
    <text x="1030" y="260" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">2. 写入 Leader 邮箱</text>
    <text x="1030" y="286" text-anchor="middle" fill="#fef3c7" font-size="12">`sendPermissionRequestViaMailbox()`</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="750" y="360" width="310" height="108" rx="18" fill="url(#stepGreen)"/>
    <text x="905" y="394" text-anchor="middle" fill="#fff" font-size="19" font-weight="700">3. Leader 轮询并解析结构化消息</text>
    <text x="905" y="420" text-anchor="middle" fill="#d1fae5" font-size="12">`useInboxPoller` 识别 `permission_request`</text>
    <text x="905" y="442" text-anchor="middle" fill="#d1fae5" font-size="12">再写回 `permission_response` 给 worker</text>
  </g>
  <g>
    <rect x="770" y="520" width="270" height="74" rx="16" fill="#334155"/>
    <text x="905" y="550" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Worker 500ms 轮询响应</text>
    <text x="905" y="573" text-anchor="middle" fill="#cbd5e1" font-size="12">回调 processMailboxPermissionResponse()</text>
  </g>

  <line x1="880" y1="270" x2="920" y2="270" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrO)"/>
  <line x1="1030" y1="312" x2="1030" y2="360" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrO)"/>
  <line x1="905" y1="468" x2="905" y2="520" stroke="#34d399" stroke-width="3" marker-end="url(#arrG)"/>

  <!-- center comparison -->
  <g>
    <rect x="480" y="618" width="260" height="54" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="610" y="640" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">同一语义，两种实现</text>
    <text x="610" y="660" text-anchor="middle" fill="#94a3b8" font-size="12">A 更快更原生；B 更通用更稳妥</text>
  </g>

  <!-- callouts -->
  <g>
    <rect x="84" y="618" width="350" height="54" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="259" y="640" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">为什么 A 是首选？</text>
    <text x="259" y="660" text-anchor="middle" fill="#94a3b8" font-size="12">少一跳 mailbox 往返，保留工具专属审批 UI，用户体验最接近单 Agent</text>
  </g>
  <g>
    <rect x="786" y="618" width="350" height="54" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="961" y="640" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">为什么 B 仍必须存在？</text>
    <text x="961" y="660" text-anchor="middle" fill="#94a3b8" font-size="12">tmux / iTerm2 等独立进程无法共享 React 队列，只能走文件协议</text>
  </g>
</svg>