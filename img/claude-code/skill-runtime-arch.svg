<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="card5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#60a5fa"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#34d399"/></marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#fbbf24"/></marker>
  </defs>
  <rect width="1100" height="720" fill="url(#bg)" rx="12"/>
  <text x="550" y="40" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold">Claude Code Skill Runtime 架构总览</text>
  <!-- Skill Sources -->
  <rect x="30" y="65" width="320" height="270" rx="10" fill="url(#card1)" stroke="#3b82f6" stroke-opacity="0.5"/>
  <text x="190" y="90" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="bold">Skill 来源层</text>
  <rect x="50" y="105" width="120" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.4"/><text x="110" y="130" text-anchor="middle" fill="#93c5fd" font-size="12">bundled</text>
  <rect x="190" y="105" width="140" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.4"/><text x="260" y="130" text-anchor="middle" fill="#93c5fd" font-size="12">.claude/skills/</text>
  <rect x="50" y="160" width="120" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.4"/><text x="110" y="185" text-anchor="middle" fill="#93c5fd" font-size="12">plugin</text>
  <rect x="190" y="160" width="140" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.4"/><text x="260" y="185" text-anchor="middle" fill="#93c5fd" font-size="12">managed (policy)</text>
  <rect x="50" y="215" width="120" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.4"/><text x="110" y="240" text-anchor="middle" fill="#93c5fd" font-size="12">MCP Server</text>
  <rect x="190" y="215" width="140" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-opacity="0.4"/><text x="260" y="240" text-anchor="middle" fill="#93c5fd" font-size="12">commands (legacy)</text>
  <rect x="50" y="270" width="280" height="40" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-opacity="0.6"/><text x="190" y="295" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">Remote Canonical (实验性)</text>
