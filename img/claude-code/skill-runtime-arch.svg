  <rect x="380" y="65" width="340" height="270" rx="10" fill="url(#card2)" stroke="#8b5cf6" stroke-opacity="0.5"/>
  <text x="550" y="90" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="bold">发现与加载引擎</text>
  <rect x="400" y="105" width="140" height="40" rx="6" fill="#2e1e5f" stroke="#8b5cf6" stroke-opacity="0.4"/><text x="470" y="125" text-anchor="middle" fill="#c4b5fd" font-size="11">initBundledSkills()</text><text x="470" y="140" text-anchor="middle" fill="#a78bfa" font-size="9">启动注册</text>
  <rect x="560" y="105" width="140" height="40" rx="6" fill="#2e1e5f" stroke="#8b5cf6" stroke-opacity="0.4"/><text x="630" y="125" text-anchor="middle" fill="#c4b5fd" font-size="11">getSkillDirCommands</text><text x="630" y="140" text-anchor="middle" fill="#a78bfa" font-size="9">并行加载 + memoize</text>
  <rect x="400" y="160" width="140" height="40" rx="6" fill="#2e1e5f" stroke="#8b5cf6" stroke-opacity="0.4"/><text x="470" y="180" text-anchor="middle" fill="#c4b5fd" font-size="11">discoverSkillDirs</text><text x="470" y="195" text-anchor="middle" fill="#a78bfa" font-size="9">动态发现(路径上行)</text>
  <rect x="560" y="160" width="140" height="40" rx="6" fill="#2e1e5f" stroke="#8b5cf6" stroke-opacity="0.4"/><text x="630" y="180" text-anchor="middle" fill="#c4b5fd" font-size="11">activateConditional</text><text x="630" y="195" text-anchor="middle" fill="#a78bfa" font-size="9">paths 条件激活</text>
  <rect x="400" y="215" width="300" height="40" rx="6" fill="#2e1e5f" stroke="#a78bfa" stroke-opacity="0.6"/><text x="550" y="240" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">skillChangeDetector (chokidar 300ms 防抖)</text>
  <rect x="400" y="270" width="300" height="40" rx="6" fill="#2e1e5f" stroke="#a78bfa" stroke-opacity="0.6"/><text x="550" y="295" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">mcpSkillBuilders 桥接 (避免循环依赖)</text>
  <!-- SkillTool Execution -->
