  <rect x="920" y="105" width="130" height="50" rx="6" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.4"/><text x="985" y="127" text-anchor="middle" fill="#6ee7b7" font-size="11">checkPermissions()</text><text x="985" y="145" text-anchor="middle" fill="#34d399" font-size="9">deny/allow/ask</text>
