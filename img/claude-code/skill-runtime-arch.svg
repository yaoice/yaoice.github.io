  <rect x="770" y="228" width="85" height="36" rx="6" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.4"/><text x="813" y="251" text-anchor="middle" fill="#6ee7b7" font-size="11">Inline</text>
  <rect x="867" y="228" width="85" height="36" rx="6" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.4"/><text x="910" y="251" text-anchor="middle" fill="#6ee7b7" font-size="11">Fork</text>
  <rect x="965" y="228" width="85" height="36" rx="6" fill="#0f3d2e" stroke="#10b981" stroke-opacity="0.4"/><text x="1008" y="251" text-anchor="middle" fill="#6ee7b7" font-size="11">Remote</text>
  <rect x="770" y="278" width="280" height="40" rx="6" fill="#0f3d2e" stroke="#34d399" stroke-opacity="0.5"/><text x="910" y="303" text-anchor="middle" fill="#34d399" font-size="12">contextModifier → 工具权限 / 模型覆盖</text>
