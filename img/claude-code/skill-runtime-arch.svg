  <line x1="350" y1="200" x2="378" y2="200" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="720" y1="200" x2="748" y2="200" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="550" y1="335" x2="550" y2="358" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <line x1="910" y1="335" x2="910" y2="358" stroke="#f87171" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <!-- Key files label -->
  <rect x="30" y="630" width="1040" height="75" rx="10" fill="#1e293b" stroke="#475569" stroke-opacity="0.3"/>
  <text x="550" y="652" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="bold">核心文件</text>
  <text x="50" y="675" fill="#64748b" font-size="10">bundledSkills.ts · loadSkillsDir.ts · mcpSkillBuilders.ts · bundled/index.ts</text>
  <text x="50" y="695" fill="#64748b" font-size="10">SkillTool/SkillTool.ts · SkillTool/prompt.ts · skillChangeDetector.ts · registerSkillHooks.ts · skillImprovement.ts</text>
