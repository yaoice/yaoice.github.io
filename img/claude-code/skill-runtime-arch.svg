  <text x="825" y="385" text-anchor="middle" fill="#fca5a5" font-size="15" font-weight="bold">Hooks 与自动改进系统</text>
  <rect x="600" y="400" width="140" height="50" rx="6" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.4"/><text x="670" y="422" text-anchor="middle" fill="#fca5a5" font-size="11">registerSkillHooks</text><text x="670" y="440" text-anchor="middle" fill="#f87171" font-size="9">session-scoped hooks</text>
  <rect x="760" y="400" width="140" height="50" rx="6" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.4"/><text x="830" y="422" text-anchor="middle" fill="#fca5a5" font-size="11">skillImprovement</text><text x="830" y="440" text-anchor="middle" fill="#f87171" font-size="9">每5条消息分析一次</text>
  <rect x="920" y="400" width="130" height="50" rx="6" fill="#3d0f0f" stroke="#ef4444" stroke-opacity="0.4"/><text x="985" y="422" text-anchor="middle" fill="#fca5a5" font-size="11">addInvokedSkill</text><text x="985" y="440" text-anchor="middle" fill="#f87171" font-size="9">compaction 恢复</text>
  <rect x="600" y="465" width="460" height="40" rx="6" fill="#3d0f0f" stroke="#f87171" stroke-opacity="0.5"/><text x="830" y="490" text-anchor="middle" fill="#f87171" font-size="12">Hook Events: PreToolUse · PostToolUse · Stop · SessionStart · UserPromptSubmit</text>
  <!-- Lifecycle bar -->
  <rect x="30" y="555" width="1040" height="55" rx="10" fill="#1e293b" stroke="#475569" stroke-opacity="0.5"/>
  <text x="550" y="575" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="bold">Skill 生命周期</text>
  <rect x="50" y="590" width="155" height="10" rx="5" fill="#3b82f6" opacity="0.6"/>
  <text x="127" y="588" text-anchor="middle" fill="#93c5fd" font-size="10">Load (发现 + 注册)</text>
  <rect x="220" y="590" width="155" height="10" rx="5" fill="#8b5cf6" opacity="0.6"/>
  <text x="297" y="588" text-anchor="middle" fill="#c4b5fd" font-size="10">Parse (frontmatter)</text>
  <rect x="390" y="590" width="155" height="10" rx="5" fill="#10b981" opacity="0.6"/>
  <text x="467" y="588" text-anchor="middle" fill="#6ee7b7" font-size="10">Execute (3路分发)</text>
  <rect x="560" y="590" width="155" height="10" rx="5" fill="#f59e0b" opacity="0.6"/>
  <text x="637" y="588" text-anchor="middle" fill="#fcd34d" font-size="10">Monitor (hooks)</text>
  <rect x="730" y="590" width="155" height="10" rx="5" fill="#ef4444" opacity="0.6"/>
  <text x="807" y="588" text-anchor="middle" fill="#fca5a5" font-size="10">Improve (自动优化)</text>
  <rect x="900" y="590" width="155" height="10" rx="5" fill="#6b7280" opacity="0.6"/>
  <text x="977" y="588" text-anchor="middle" fill="#9ca3af" font-size="10">Cleanup (释放)</text>
