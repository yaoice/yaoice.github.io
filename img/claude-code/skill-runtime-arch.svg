  <rect x="175" y="400" width="110" height="36" rx="6" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.4"/><text x="230" y="423" text-anchor="middle" fill="#fcd34d" font-size="11">Allow Rules</text>
  <rect x="300" y="400" width="110" height="36" rx="6" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.4"/><text x="355" y="423" text-anchor="middle" fill="#fcd34d" font-size="11">Safe Props</text>
  <rect x="425" y="400" width="110" height="36" rx="6" fill="#3d2e0f" stroke="#f59e0b" stroke-opacity="0.4"/><text x="480" y="423" text-anchor="middle" fill="#fcd34d" font-size="11">User Ask</text>
  <rect x="50" y="450" width="230" height="36" rx="6" fill="#3d2e0f" stroke="#fbbf24" stroke-opacity="0.5"/><text x="165" y="473" text-anchor="middle" fill="#fbbf24" font-size="11">O_NOFOLLOW + O_EXCL 安全写入</text>
  <rect x="300" y="450" width="230" height="36" rx="6" fill="#3d2e0f" stroke="#fbbf24" stroke-opacity="0.5"/><text x="415" y="473" text-anchor="middle" fill="#fbbf24" font-size="11">MCP 技能禁止 !command 执行</text>
  <text x="290" y="510" text-anchor="middle" fill="#fbbf24" font-size="11">信任层级: bundled > managed > user > project > plugin > mcp</text>
  <!-- Hooks & Improvement -->
