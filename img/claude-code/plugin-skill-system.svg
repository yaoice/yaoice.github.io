<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <filter id="shadow6">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="700" fill="url(#bg6)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" fill="#fff" font-size="24" font-weight="bold" text-anchor="middle">插件 &amp; 技能 扩展系统</text>
  <text x="400" y="70" fill="#8888aa" font-size="13" text-anchor="middle">四大扩展点：工具 · 命令 · 插件 · 技能</text>

  <!-- Plugin System (left) -->
  <g filter="url(#shadow6)">
    <rect x="40" y="95" width="350" height="520" rx="14" fill="#1e0a3c" stroke="#9d4edd" stroke-width="2"/>
    <rect x="40" y="95" width="350" height="40" rx="14" fill="rgba(157,78,221,0.25)"/>
    <text x="215" y="122" fill="#e0aaff" font-size="16" font-weight="bold" text-anchor="middle">插件系统 (Plugins)</text>

    <!-- Plugin source -->
    <rect x="65" y="150" width="300" height="55" rx="8" fill="rgba(255,255,255,0.06)" stroke="#c77dff" stroke-width="1"/>
    <text x="215" y="173" fill="#c77dff" font-size="13" font-weight="bold" text-anchor="middle">npm 分发 / Marketplace</text>
    <text x="215" y="193" fill="#888" font-size="10" text-anchor="middle">marketplaceManager.ts (91KB) · validatePlugin.ts (28KB)</text>

    <!-- Arrow -->
    <line x1="215" y1="205" x2="215" y2="225" stroke="#c77dff" stroke-width="1.5"/>
    <polygon points="210,223 215,233 220,223" fill="#c77dff"/>

    <!-- Plugin Loader -->
    <rect x="65" y="235" width="300" height="50" rx="8" fill="rgba(157,78,221,0.15)" stroke="#9d4edd" stroke-width="1.5"/>
    <text x="215" y="258" fill="#e0aaff" font-size="13" font-weight="bold" text-anchor="middle">pluginLoader.ts (108KB)</text>
    <text x="215" y="276" fill="#999" font-size="10" text-anchor="middle">解析 plugin.json · 加载全部扩展</text>

    <!-- What plugins provide -->
    <line x1="215" y1="285" x2="215" y2="305" stroke="#c77dff" stroke-width="1.5"/>

    <rect x="65" y="305" width="140" height="40" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="135" y="330" fill="#ccc" font-size="11" text-anchor="middle">Commands</text>

    <rect x="215" y="305" width="140" height="40" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="285" y="330" fill="#ccc" font-size="11" text-anchor="middle">Hooks</text>

    <rect x="65" y="355" width="140" height="40" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="135" y="380" fill="#ccc" font-size="11" text-anchor="middle">Skills</text>

    <rect x="215" y="355" width="140" height="40" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="285" y="380" fill="#ccc" font-size="11" text-anchor="middle">Agents</text>

    <rect x="65" y="405" width="140" height="40" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="135" y="430" fill="#ccc" font-size="11" text-anchor="middle">MCP Servers</text>

    <rect x="215" y="405" width="140" height="40" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="285" y="430" fill="#ccc" font-size="11" text-anchor="middle">Output Styles</text>

    <!-- Management -->
    <rect x="65" y="465" width="300" height="70" rx="8" fill="rgba(230,57,70,0.08)" stroke="rgba(230,57,70,0.3)" stroke-width="1"/>
    <text x="215" y="488" fill="#e63946" font-size="12" font-weight="bold" text-anchor="middle">管理系统</text>
    <text x="80" y="508" fill="#888" font-size="10">installedPluginsManager.ts (40KB)</text>
    <text x="80" y="525" fill="#888" font-size="10">pluginInstallationHelpers.ts (20KB)</text>

    <!-- Slash commands -->
    <rect x="65" y="550" width="300" height="45" rx="22" fill="rgba(76,201,240,0.1)" stroke="#4cc9f0" stroke-width="1"/>
    <text x="215" y="578" fill="#4cc9f0" font-size="12" font-weight="bold" text-anchor="middle">/plugin install · /plugin list · /plugin remove</text>
  </g>

  <!-- Skill System (right) -->
  <g filter="url(#shadow6)">
    <rect x="410" y="95" width="350" height="520" rx="14" fill="#1a3320" stroke="#52b788" stroke-width="2"/>
    <rect x="410" y="95" width="350" height="40" rx="14" fill="rgba(82,183,136,0.25)"/>
    <text x="585" y="122" fill="#95d5b2" font-size="16" font-weight="bold" text-anchor="middle">技能系统 (Skills)</text>

    <!-- Skill source -->
    <rect x="435" y="150" width="300" height="55" rx="8" fill="rgba(255,255,255,0.06)" stroke="#52b788" stroke-width="1"/>
    <text x="585" y="173" fill="#52b788" font-size="13" font-weight="bold" text-anchor="middle">可复用工作流定义</text>
    <text x="585" y="193" fill="#888" font-size="10" text-anchor="middle">loadSkillsDir.ts (34KB) · bundledSkills.ts (7KB)</text>

    <!-- Arrow -->
    <line x1="585" y1="205" x2="585" y2="225" stroke="#52b788" stroke-width="1.5"/>
    <polygon points="580,223 585,233 590,223" fill="#52b788"/>

    <!-- Skill Loader -->
    <rect x="435" y="235" width="300" height="50" rx="8" fill="rgba(82,183,136,0.15)" stroke="#52b788" stroke-width="1.5"/>
    <text x="585" y="258" fill="#95d5b2" font-size="13" font-weight="bold" text-anchor="middle">SkillTool (37KB)</text>
    <text x="585" y="276" fill="#999" font-size="10" text-anchor="middle">技能执行引擎 · MCP 技能构建</text>

    <!-- Built-in skills -->
    <line x1="585" y1="285" x2="585" y2="305" stroke="#52b788" stroke-width="1.5"/>
    <text x="585" y="318" fill="#95d5b2" font-size="12" font-weight="bold" text-anchor="middle">内置技能 (bundled/)</text>

    <rect x="435" y="330" width="140" height="35" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="505" y="353" fill="#ccc" font-size="10" text-anchor="middle">batch — 批量操作</text>

    <rect x="585" y="330" width="150" height="35" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="660" y="353" fill="#ccc" font-size="10" text-anchor="middle">debug — 调试辅助</text>

    <rect x="435" y="375" width="140" height="35" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="505" y="398" fill="#ccc" font-size="10" text-anchor="middle">loop — 循环执行</text>

    <rect x="585" y="375" width="150" height="35" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="660" y="398" fill="#ccc" font-size="10" text-anchor="middle">remember — 记忆</text>

    <rect x="435" y="420" width="140" height="35" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="505" y="443" fill="#ccc" font-size="10" text-anchor="middle">verify — 验证</text>

    <rect x="585" y="420" width="150" height="35" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="660" y="443" fill="#ccc" font-size="10" text-anchor="middle">stuck — 卡住恢复</text>

    <rect x="435" y="465" width="140" height="35" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="505" y="488" fill="#ccc" font-size="10" text-anchor="middle">skillify (9KB)</text>

    <rect x="585" y="465" width="150" height="35" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="660" y="488" fill="#ccc" font-size="10" text-anchor="middle">scheduleRemote (19KB)</text>

    <!-- MCP Skills -->
    <rect x="435" y="515" width="300" height="40" rx="8" fill="rgba(76,201,240,0.1)" stroke="#4cc9f0" stroke-width="1"/>
    <text x="585" y="540" fill="#4cc9f0" font-size="11" font-weight="bold" text-anchor="middle">mcpSkillBuilders.ts — MCP 技能构建器</text>

    <!-- Slash commands -->
    <rect x="435" y="570" width="300" height="35" rx="17" fill="rgba(76,201,240,0.1)" stroke="#4cc9f0" stroke-width="1"/>
    <text x="585" y="593" fill="#4cc9f0" font-size="12" font-weight="bold" text-anchor="middle">/skills list · /skills install</text>
  </g>

  <!-- Bottom: Connection -->
  <g filter="url(#shadow6)">
    <rect x="150" y="640" width="500" height="45" rx="22" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="400" y="668" fill="#ccc" font-size="13" text-anchor="middle">插件可包含技能 · 技能可通过 MCP 扩展 · 统一通过 Claude Code 执行引擎运行</text>
  </g>

  <!-- Connection lines -->
  <line x1="215" y1="615" x2="300" y2="640" stroke="rgba(157,78,221,0.5)" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="585" y1="615" x2="500" y2="640" stroke="rgba(82,183,136,0.5)" stroke-width="1.5" stroke-dasharray="4"/>
</svg>
