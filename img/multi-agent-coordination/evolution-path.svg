<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="从简单到复杂的演进路径">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">从简单到复杂的演进路径</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">每一次升级都对应一个已经观察到的瓶颈</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="130" y1="300" x2="1000" y2="300" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="130" cy="300" r="7" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="50" y="150" width="180" height="88" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="66" y="168" width="10" height="10" rx="2" fill="#334155"/>
  <text x="84" y="177" text-anchor="start" font-size="13.5" font-weight="650" fill="#111827">单 Agent</text>
  <text x="66" y="202" text-anchor="start" font-size="12" font-weight="500" fill="#374151">最小闭环</text>
  <text x="130" y="328" text-anchor="middle" font-size="12" font-weight="500" fill="#6b7280">最小闭环</text>
  <circle cx="330" cy="300" r="7" fill="#ffffff" stroke="#1f4ed8" stroke-width="2"/>
  <rect x="250" y="150" width="180" height="88" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="266" y="168" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="284" y="177" text-anchor="start" font-size="13.5" font-weight="650" fill="#111827">Generator-Verifier</text>
  <text x="266" y="202" text-anchor="start" font-size="12" font-weight="500" fill="#374151">质量不足</text>
  <text x="330" y="328" text-anchor="middle" font-size="12" font-weight="500" fill="#6b7280">质量不足</text>
  <circle cx="530" cy="300" r="7" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
  <rect x="450" y="150" width="180" height="88" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="466" y="168" width="10" height="10" rx="2" fill="#4f46e5"/>
  <text x="484" y="177" text-anchor="start" font-size="13.5" font-weight="650" fill="#111827">Orchestrator</text>
  <text x="466" y="202" text-anchor="start" font-size="12" font-weight="500" fill="#374151">任务变大</text>
  <text x="530" y="328" text-anchor="middle" font-size="12" font-weight="500" fill="#6b7280">任务变大</text>
  <circle cx="730" cy="300" r="7" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
  <rect x="650" y="150" width="180" height="88" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="666" y="168" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="684" y="177" text-anchor="start" font-size="13.5" font-weight="650" fill="#111827">Agent Teams</text>
  <text x="666" y="202" text-anchor="start" font-size="12" font-weight="500" fill="#374151">长期并行</text>
  <text x="730" y="328" text-anchor="middle" font-size="12" font-weight="500" fill="#6b7280">长期并行</text>
  <circle cx="930" cy="300" r="7" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
  <rect x="850" y="150" width="180" height="88" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="866" y="168" width="10" height="10" rx="2" fill="#b45309"/>
  <text x="884" y="177" text-anchor="start" font-size="13.5" font-weight="650" fill="#111827">Message Bus</text>
  <text x="866" y="202" text-anchor="start" font-size="12" font-weight="500" fill="#374151">事件路径不固定</text>
  <text x="930" y="328" text-anchor="middle" font-size="12" font-weight="500" fill="#6b7280">事件路径不固定</text>
  <rect x="440" y="390" width="200" height="88" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="456" y="408" width="10" height="10" rx="2" fill="#be123c"/>
