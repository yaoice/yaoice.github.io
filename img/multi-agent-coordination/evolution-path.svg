  <text x="456" y="442" text-anchor="start" font-size="12" font-weight="500" fill="#374151">需要共享中间发现</text>
  <path d="M 530 308 L 530 390" fill="none" stroke="#be123c" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-rose)" stroke-dasharray="6 4"/>
