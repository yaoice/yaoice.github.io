<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="700" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="550" y="55" text-anchor="middle" fill="#fff" font-size="26" font-weight="bold">五种多智能体协调模式总览</text>
  <text x="550" y="82" text-anchor="middle" fill="#aaa" font-size="14">Multi-Agent Coordination Patterns Overview</text>

  <!-- Center Hub -->
  <circle cx="550" cy="370" r="70" fill="#1a1a2e" stroke="#667eea" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="550" y="360" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">多智能体</text>
  <text x="550" y="380" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">协调系统</text>

  <!-- Pattern 1: Generator-Verifier (Top Left) -->
  <rect x="40" y="110" width="220" height="160" rx="14" fill="url(#card1)" filter="url(#shadow)" opacity="0.95"/>
  <text x="150" y="145" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">生成器-验证器</text>
  <text x="150" y="167" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">Generator-Verifier</text>
  <line x1="70" y1="180" x2="230" y2="180" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="150" y="200" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">⚡ 迭代生成 + 质量验证</text>
  <text x="150" y="220" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">🎯 明确评估标准</text>
  <text x="150" y="240" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">🔄 反馈循环直至达标</text>
  <text x="150" y="260" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">代码生成 · 事实核查 · 质量审核</text>
  <!-- Connector -->
  <line x1="260" y1="220" x2="485" y2="340" stroke="#667eea" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- Pattern 2: Orchestrator-Subagent (Top Right) -->
  <rect x="840" y="110" width="220" height="160" rx="14" fill="url(#card2)" filter="url(#shadow)" opacity="0.95"/>
  <text x="950" y="145" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">编排器-子智能体</text>
  <text x="950" y="167" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">Orchestrator-Subagent</text>
  <line x1="870" y1="180" x2="1030" y2="180" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="950" y="200" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">📋 中央规划 + 任务分发</text>
  <text x="950" y="220" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">🧩 清晰的任务分解</text>
  <text x="950" y="240" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">📊 结果汇总综合</text>
  <text x="950" y="260" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">代码审查 · 报告生成 · 数据处理</text>
  <!-- Connector -->
  <line x1="840" y1="220" x2="615" y2="340" stroke="#f5576c" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- Pattern 3: Agent Teams (Left) -->
  <rect x="40" y="420" width="220" height="160" rx="14" fill="url(#card3)" filter="url(#shadow)" opacity="0.95"/>
  <text x="150" y="455" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">智能体团队</text>
  <text x="150" y="477" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">Agent Teams</text>
  <line x1="70" y1="490" x2="230" y2="490" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="150" y="510" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">👥 持久化团队成员</text>
  <text x="150" y="530" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">📝 共享任务队列</text>
  <text x="150" y="550" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">🧠 上下文累积</text>
  <text x="150" y="570" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">代码迁移 · 大规模重构 · 并行开发</text>
  <!-- Connector -->
  <line x1="260" y1="480" x2="485" y2="395" stroke="#4facfe" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- Pattern 4: Message Bus (Right) -->
  <rect x="840" y="420" width="220" height="160" rx="14" fill="url(#card4)" filter="url(#shadow)" opacity="0.95"/>
  <text x="950" y="455" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold">消息总线</text>
  <text x="950" y="477" text-anchor="middle" fill="rgba(26,26,46,0.7)" font-size="11">Message Bus</text>
  <line x1="870" y1="490" x2="1030" y2="490" stroke="rgba(26,26,46,0.3)" stroke-width="1"/>
  <text x="950" y="510" text-anchor="middle" fill="rgba(26,26,46,0.85)" font-size="11">📡 发布/订阅机制</text>
  <text x="950" y="530" text-anchor="middle" fill="rgba(26,26,46,0.85)" font-size="11">🔌 热插拔智能体</text>
  <text x="950" y="550" text-anchor="middle" fill="rgba(26,26,46,0.85)" font-size="11">🌊 事件驱动流转</text>
  <text x="950" y="570" text-anchor="middle" fill="rgba(26,26,46,0.6)" font-size="10">安全运营 · 监控告警 · 事件处理</text>
  <!-- Connector -->
  <line x1="840" y1="480" x2="615" y2="395" stroke="#43e97b" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- Pattern 5: Shared State (Bottom Center) -->
  <rect x="385" y="530" width="330" height="140" rx="14" fill="url(#card5)" filter="url(#shadow)" opacity="0.95"/>
  <text x="550" y="565" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold">共享状态</text>
  <text x="550" y="587" text-anchor="middle" fill="rgba(26,26,46,0.7)" font-size="11">Shared State</text>
  <line x1="415" y1="600" x2="685" y2="600" stroke="rgba(26,26,46,0.3)" stroke-width="1"/>
  <text x="550" y="620" text-anchor="middle" fill="rgba(26,26,46,0.85)" font-size="11">💾 共享数据库/文件系统 · 去中心化协调</text>
  <text x="550" y="640" text-anchor="middle" fill="rgba(26,26,46,0.85)" font-size="11">🔍 智能体自主读写发现 · 降低中心调度依赖</text>
  <text x="550" y="660" text-anchor="middle" fill="rgba(26,26,46,0.6)" font-size="10">协作研究 · 知识合成 · 文献分析</text>
  <!-- Connector -->
  <line x1="550" y1="530" x2="550" y2="440" stroke="#fa709a" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- Bottom label -->
  <text x="550" y="695" text-anchor="middle" fill="#666" font-size="10">© Multi-Agent Coordination Patterns — Adapted from Claude Blog</text>
</svg>
