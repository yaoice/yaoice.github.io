<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
<title id="title">五种多智能体协调模式总览</title><desc id="desc">用五列清晰说明五种模式分别解决什么问题。</desc>
<defs><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:34px;font-weight:800;fill:#111827}.sub{font-size:18px;fill:#4b5563}.h{font-size:22px;font-weight:800;fill:#111827}.body{font-size:17px;fill:#374151}.tag{font-size:15px;font-weight:700}.card{fill:#fff;stroke:#d1d5db;stroke-width:1.6}.top{fill:#111827}</style></defs>
<rect width="1200" height="700" fill="#f8fafc"/>
<text x="600" y="54" text-anchor="middle" class="title">五种协调模式：先看要解决的工程问题</text>
<text x="600" y="88" text-anchor="middle" class="sub">每种模式都对应一种主要瓶颈：质量、上下文、长期并行、事件路由、知识累积</text>
<g transform="translate(46 135)">
  <g><rect class="card" width="210" height="430" rx="18"/><rect class="top" width="210" height="58" rx="18"/><text x="105" y="37" text-anchor="middle" fill="#fff" font-size="19" font-weight="800">Generator-Verifier</text><text x="105" y="98" text-anchor="middle" class="h">质量门禁</text><text x="24" y="145" class="body">一个 Agent 生成结果</text><text x="24" y="174" class="body">另一个 Agent 按标准</text><text x="24" y="203" class="body">检查是否通过。</text><text x="24" y="260" class="body">适合：</text><text x="24" y="290" class="body">错误代价高</text><text x="24" y="319" class="body">且标准明确。</text><rect x="24" y="365" width="162" height="34" rx="17" fill="#dbeafe"/><text x="105" y="388" text-anchor="middle" class="tag" fill="#1d4ed8">问：结果对不对？</text></g>
  <g transform="translate(230 0)"><rect class="card" width="210" height="430" rx="18"/><rect class="top" width="210" height="58" rx="18"/><text x="105" y="37" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">Orchestrator</text><text x="105" y="98" text-anchor="middle" class="h">中心拆解</text><text x="24" y="145" class="body">中心 Agent 拆任务</text><text x="24" y="174" class="body">短生命周期 Subagent</text><text x="24" y="203" class="body">独立调查后回报。</text><text x="24" y="260" class="body">适合：</text><text x="24" y="290" class="body">上下文太大</text><text x="24" y="319" class="body">但边界清晰。</text><rect x="24" y="365" width="162" height="34" rx="17" fill="#dcfce7"/><text x="105" y="388" text-anchor="middle" class="tag" fill="#047857">问：能否拆开查？</text></g>
  <g transform="translate(460 0)"><rect class="card" width="210" height="430" rx="18"/><rect class="top" width="210" height="58" rx="18"/><text x="105" y="37" text-anchor="middle" fill="#fff" font-size="19" font-weight="800">Agent Teams</text><text x="105" y="98" text-anchor="middle" class="h">长期并行</text><text x="24" y="145" class="body">多个持久 Worker</text><text x="24" y="174" class="body">各自负责一个分区</text><text x="24" y="203" class="body">持续推进任务。</text><text x="24" y="260" class="body">适合：</text><text x="24" y="290" class="body">任务多、可分区</text><text x="24" y="319" class="body">且要保留上下文。</text><rect x="24" y="365" width="162" height="34" rx="17" fill="#ffedd5"/><text x="105" y="388" text-anchor="middle" class="tag" fill="#c2410c">问：能否分区做？</text></g>
  <g transform="translate(690 0)"><rect class="card" width="210" height="430" rx="18"/><rect class="top" width="210" height="58" rx="18"/><text x="105" y="37" text-anchor="middle" fill="#fff" font-size="19" font-weight="800">Message Bus</text><text x="105" y="98" text-anchor="middle" class="h">事件路由</text><text x="24" y="145" class="body">Agent 发布事件</text><text x="24" y="174" class="body">订阅者按 Topic</text><text x="24" y="203" class="body">接收并处理。</text><text x="24" y="260" class="body">适合：</text><text x="24" y="290" class="body">流程动态变化</text><text x="24" y="319" class="body">Agent 类型增长。</text><rect x="24" y="365" width="162" height="34" rx="17" fill="#ede9fe"/><text x="105" y="388" text-anchor="middle" class="tag" fill="#6d28d9">问：下一步给谁？</text></g>
  <g transform="translate(920 0)"><rect class="card" width="210" height="430" rx="18"/><rect class="top" width="210" height="58" rx="18"/><text x="105" y="37" text-anchor="middle" fill="#fff" font-size="19" font-weight="800">Shared State</text><text x="105" y="98" text-anchor="middle" class="h">知识累积</text><text x="24" y="145" class="body">多个 Agent 共同读写</text><text x="24" y="174" class="body">同一个结构化状态</text><text x="24" y="203" class="body">相互启发。</text><text x="24" y="260" class="body">适合：</text><text x="24" y="290" class="body">中间发现有价值</text><text x="24" y="319" class="body">且会改变方向。</text><rect x="24" y="365" width="162" height="34" rx="17" fill="#fee2e2"/><text x="105" y="388" text-anchor="middle" class="tag" fill="#be123c">问：发现要共享吗？</text></g>
</g>
<rect x="190" y="610" width="820" height="44" rx="22" fill="#111827"/><text x="600" y="639" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">默认从 Orchestrator-Subagent 起步；只有出现明确瓶颈，再升级到更复杂模式</text>
</svg>