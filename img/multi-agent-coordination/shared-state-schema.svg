<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
<title id="title">共享状态最小数据模型</title><desc id="desc">展示共享状态中 Finding、Evidence、Hypothesis、Work Item、Conflict 和 Version 的关系。</desc>
<defs><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:34px;font-weight:800;fill:#111827}.sub{font-size:18px;fill:#4b5563}.entity{fill:#fff;stroke:#d1d5db;stroke-width:1.8}.head{fill:#be123c}.h{font-size:19px;font-weight:800;fill:#fff}.f{font-size:15px;fill:#374151}.line{stroke:#be123c;stroke-width:2.4;fill:none}</style></defs>
<rect width="1200" height="680" fill="#fff7ed"/>
<text x="600" y="54" text-anchor="middle" class="title">Shared State 需要结构化治理，而不是一块随便写的白板</text>
<text x="600" y="86" text-anchor="middle" class="sub">每条发现都应该能追溯来源、版本、负责人和冲突关系</text>
<g transform="translate(70 155)"><rect width="220" height="145" rx="16" class="entity"/><rect width="220" height="44" rx="16" class="head"/><text x="110" y="29" text-anchor="middle" class="h">Finding</text><text x="26" y="78" class="f">id / summary</text><text x="26" y="106" class="f">confidence</text><text x="26" y="134" class="f">status</text></g>
<g transform="translate(365 125)"><rect width="220" height="145" rx="16" class="entity"/><rect width="220" height="44" rx="16" class="head"/><text x="110" y="29" text-anchor="middle" class="h">Evidence</text><text x="26" y="78" class="f">source_url</text><text x="26" y="106" class="f">quote / path</text><text x="26" y="134" class="f">retrieved_at</text></g>
<g transform="translate(365 390)"><rect width="220" height="145" rx="16" class="entity"/><rect width="220" height="44" rx="16" class="head"/><text x="110" y="29" text-anchor="middle" class="h">Hypothesis</text><text x="26" y="78" class="f">claim</text><text x="26" y="106" class="f">supporting_ids</text><text x="26" y="134" class="f">open_questions</text></g>
<g transform="translate(660 125)"><rect width="220" height="145" rx="16" class="entity"/><rect width="220" height="44" rx="16" class="head"/><text x="110" y="29" text-anchor="middle" class="h">Work Item</text><text x="26" y="78" class="f">owner_agent</text><text x="26" y="106" class="f">claimed_until</text><text x="26" y="134" class="f">progress</text></g>
<g transform="translate(660 390)"><rect width="220" height="145" rx="16" class="entity"/><rect width="220" height="44" rx="16" class="head"/><text x="110" y="29" text-anchor="middle" class="h">Conflict</text><text x="26" y="78" class="f">finding_a</text><text x="26" y="106" class="f">finding_b</text><text x="26" y="134" class="f">resolution</text></g>
<g transform="translate(955 258)"><rect width="170" height="145" rx="16" class="entity"/><rect width="170" height="44" rx="16" class="head"/><text x="85" y="29" text-anchor="middle" class="h">Version</text><text x="24" y="78" class="f">revision</text><text x="24" y="106" class="f">writer</text><text x="24" y="134" class="f">diff</text></g>
<path d="M290 225 L365 198" class="line"/><path d="M290 245 L365 455" class="line"/><path d="M585 198 L660 198" class="line"/><path d="M585 465 L660 465" class="line"/><path d="M880 198 L955 300" class="line"/><path d="M880 465 L955 360" class="line"/>
</svg>