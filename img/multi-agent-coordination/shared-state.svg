<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
<title id="title">Shared State 黑板协作</title><desc id="desc">展示多个 Agent 围绕共享知识状态读写事实、假设、证据和冲突。</desc>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#be123c"/></marker><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:34px;font-weight:800;fill:#111827}.sub{font-size:18px;fill:#4b5563}.agent{fill:#fff;stroke:#d1d5db;stroke-width:1.7}.board{fill:#111827}.note{stroke:#111827;stroke-width:1.2}.h{font-size:21px;font-weight:800;fill:#111827}.b{font-size:16px;fill:#374151}.w{font-size:24px;font-weight:800;fill:#fff}.line{stroke:#be123c;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
<rect width="1200" height="680" fill="#fff7f7"/>
<text x="600" y="54" text-anchor="middle" class="title">Shared State：把中间发现沉淀成所有 Agent 可见的结构化黑板</text>
<text x="600" y="86" text-anchor="middle" class="sub">适合开放式研究；但必须记录来源、置信度、版本和冲突</text>
<rect x="370" y="145" width="460" height="370" rx="26" class="board"/><text x="600" y="190" text-anchor="middle" class="w">Shared Knowledge State</text>
<g transform="translate(420 230)"><rect width="150" height="74" rx="10" fill="#fef3c7" class="note"/><text x="75" y="31" text-anchor="middle" class="h">事实</text><text x="75" y="56" text-anchor="middle" class="b">有证据</text></g>
<g transform="translate(630 230)"><rect width="150" height="74" rx="10" fill="#dbeafe" class="note"/><text x="75" y="31" text-anchor="middle" class="h">假设</text><text x="75" y="56" text-anchor="middle" class="b">待验证</text></g>
<g transform="translate(420 360)"><rect width="150" height="74" rx="10" fill="#dcfce7" class="note"/><text x="75" y="31" text-anchor="middle" class="h">证据</text><text x="75" y="56" text-anchor="middle" class="b">可追溯</text></g>
<g transform="translate(630 360)"><rect width="150" height="74" rx="10" fill="#fee2e2" class="note"/><text x="75" y="31" text-anchor="middle" class="h">冲突</text><text x="75" y="56" text-anchor="middle" class="b">需裁决</text></g>
<g transform="translate(70 160)"><rect width="230" height="88" rx="18" class="agent"/><text x="115" y="36" text-anchor="middle" class="h">文献 Agent</text><text x="115" y="64" text-anchor="middle" class="b">论文、作者、引用</text></g>
<g transform="translate(70 430)"><rect width="230" height="88" rx="18" class="agent"/><text x="115" y="36" text-anchor="middle" class="h">行业 Agent</text><text x="115" y="64" text-anchor="middle" class="b">公司、报告、市场</text></g>
<g transform="translate(900 160)"><rect width="230" height="88" rx="18" class="agent"/><text x="115" y="36" text-anchor="middle" class="h">专利 Agent</text><text x="115" y="64" text-anchor="middle" class="b">申请、技术路线</text></g>
<g transform="translate(900 430)"><rect width="230" height="88" rx="18" class="agent"/><text x="115" y="36" text-anchor="middle" class="h">新闻 Agent</text><text x="115" y="64" text-anchor="middle" class="b">融资、发布、舆情</text></g>
<path d="M300 204 L360 250" class="line"/><path d="M300 474 L360 410" class="line"/><path d="M900 204 L840 250" class="line"/><path d="M900 474 L840 410" class="line"/>
<rect x="250" y="590" width="700" height="42" rx="21" fill="#fff" stroke="#fecdd3"/><text x="600" y="617" text-anchor="middle" font-size="17" font-weight="800" fill="#9f1239">如果没有 ownership 和终止条件，共享状态会变成不可治理的信息堆</text>
</svg>