<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e" />
      <stop offset="100%" style="stop-color:#16213e" />
    </linearGradient>
    <linearGradient id="store" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a" />
      <stop offset="100%" style="stop-color:#fee140" />
    </linearGradient>
    <linearGradient id="agent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea" />
      <stop offset="100%" style="stop-color:#764ba2" />
    </linearGradient>
    <filter id="ds5" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="520" fill="url(#bg5)" rx="10"/>
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">Shared State 模式架构</text>
  <text x="450" y="62" text-anchor="middle" fill="#aaa" font-size="12">去中心化协调 · 依赖高可用存储 · 共享知识驱动</text>

  <!-- Central Shared Store -->
  <rect x="275" y="195" width="350" height="130" rx="16" fill="url(#store)" filter="url(#ds5)"/>
  <text x="450" y="235" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">💾 共享状态存储</text>
  <text x="450" y="258" text-anchor="middle" fill="rgba(26,26,46,0.7)" font-size="12">Shared State Store</text>
  <line x1="310" y1="270" x2="590" y2="270" stroke="rgba(26,26,46,0.2)"/>
  <text x="450" y="292" text-anchor="middle" fill="rgba(26,26,46,0.8)" font-size="11">数据库 · 文件系统 · 共享文档</text>
  <text x="450" y="312" text-anchor="middle" fill="rgba(26,26,46,0.6)" font-size="10">读取 → 处理 → 写回 · 所有智能体可见</text>

  <!-- Agent 1: Literature -->
  <rect x="40" y="80" width="180" height="110" rx="12" fill="url(#agent)" filter="url(#ds5)"/>
  <text x="130" y="110" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">📚 文献研究</text>
  <text x="130" y="130" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">Literature Agent</text>
  <text x="130" y="152" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">学术论文搜索</text>
  <text x="130" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">关键发现提取</text>
  <!-- Arrow bidirectional -->
  <line x1="195" y1="165" x2="290" y2="220" stroke="#667eea" stroke-width="2"/>
  <line x1="285" y1="215" x2="200" y2="160" stroke="#fee140" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Agent 2: Industry -->
  <rect x="680" y="80" width="180" height="110" rx="12" fill="url(#agent)" filter="url(#ds5)"/>
  <text x="770" y="110" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🏢 行业报告</text>
  <text x="770" y="130" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">Industry Report Agent</text>
  <text x="770" y="152" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">市场趋势分析</text>
  <text x="770" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">竞争格局研究</text>
  <line x1="705" y1="165" x2="610" y2="220" stroke="#667eea" stroke-width="2"/>
  <line x1="615" y1="215" x2="710" y2="160" stroke="#fee140" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Agent 3: Patent -->
  <rect x="40" y="370" width="180" height="110" rx="12" fill="url(#agent)" filter="url(#ds5)"/>
  <text x="130" y="400" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">📜 专利分析</text>
  <text x="130" y="420" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">Patent Agent</text>
  <text x="130" y="442" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">专利检索与分类</text>
  <text x="130" y="458" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">技术路线图分析</text>
  <line x1="195" y1="395" x2="290" y2="310" stroke="#667eea" stroke-width="2"/>
  <line x1="285" y1="315" x2="200" y2="400" stroke="#fee140" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Agent 4: Synthesis -->
  <rect x="680" y="370" width="180" height="110" rx="12" fill="url(#agent)" filter="url(#ds5)"/>
  <text x="770" y="400" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🧬 知识合成</text>
  <text x="770" y="420" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">Synthesis Agent</text>
  <text x="770" y="442" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">交叉引用发现</text>
  <text x="770" y="458" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">综合报告生成</text>
  <line x1="705" y1="395" x2="610" y2="310" stroke="#667eea" stroke-width="2"/>
  <line x1="615" y1="315" x2="710" y2="400" stroke="#fee140" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- R/W labels -->
  <text x="215" y="182" text-anchor="middle" fill="#667eea" font-size="9" font-weight="bold">WRITE</text>
  <text x="230" y="200" text-anchor="middle" fill="#fee140" font-size="9" font-weight="bold">READ</text>

  <!-- Termination Condition -->
  <rect x="310" y="460" width="280" height="40" rx="8" fill="rgba(250,112,154,0.15)" stroke="rgba(250,112,154,0.4)" stroke-width="1"/>
  <text x="450" y="485" text-anchor="middle" fill="#fa709a" font-size="12">⏰ 终止条件：时间限制 / 收敛阈值 / 完成标记</text>

  <!-- Reactive loop warning -->
  <rect x="310" y="355" width="280" height="30" rx="6" fill="rgba(245,87,108,0.1)" stroke="rgba(245,87,108,0.3)" stroke-width="1"/>
  <text x="450" y="375" text-anchor="middle" fill="#f5576c" font-size="10">⚠️ 需防止反应循环：智能体互相触发无限消耗</text>
</svg>
