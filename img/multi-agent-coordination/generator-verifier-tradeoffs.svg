<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="Generator–Verifier 的适用范围">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">Generator–Verifier 的适用范围</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">Verifier 只有在“标准可表达、验证更可靠”时才成立</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="90" y="150" width="490" height="360" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="106" y="168" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="124" y="177" text-anchor="start" font-size="15" font-weight="650" fill="#111827">适合使用</text>
  <text x="106" y="202" text-anchor="start" font-size="13" font-weight="500" fill="#374151">输出错误的代价较高</text>
  <text x="106" y="220" text-anchor="start" font-size="13" font-weight="500" fill="#374151">可以写出测试或 rubric 作为判定</text>
  <text x="106" y="238" text-anchor="start" font-size="13" font-weight="500" fill="#374151">验证比生成更可靠</text>
  <text x="106" y="256" text-anchor="start" font-size="13" font-weight="500" fill="#374151">可以接受额外调用成本换取质量</text>
  <rect x="620" y="150" width="490" height="360" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="636" y="168" width="10" height="10" rx="2" fill="#be123c"/>
  <text x="654" y="177" text-anchor="start" font-size="15" font-weight="650" fill="#111827">不适合 / 风险</text>
  <text x="636" y="202" text-anchor="start" font-size="13" font-weight="500" fill="#374151">判断高度主观、缺少清晰标准</text>
  <text x="636" y="220" text-anchor="start" font-size="13" font-weight="500" fill="#374151">Verifier 只能笼统评价“好不好”</text>
  <text x="636" y="238" text-anchor="start" font-size="13" font-weight="500" fill="#374151">验证本身和生成一样困难</text>
  <text x="636" y="256" text-anchor="start" font-size="13" font-weight="500" fill="#374151">循环不收敛，缺少 fallback 设计</text>
  <line x1="600" y1="170" x2="600" y2="490" stroke="#e5e7eb" stroke-width="1"/>
  <text x="72" y="558" text-anchor="start" font-size="12" font-weight="600" fill="#9ca3af">实施要点</text>
  <text x="72" y="584" text-anchor="start" font-size="13" font-weight="500" fill="#374151">结构化反馈 · 明确迭代上限 · 定义 fallback 分支。</text>
</svg>
