<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
<title id="title">生产级多智能体护栏</title><desc id="desc">展示生产级多智能体系统需要的五类护栏。</desc>
<defs><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:34px;font-weight:800;fill:#111827}.sub{font-size:18px;fill:#4b5563}.layer{fill:#fff;stroke:#d1d5db;stroke-width:1.8}.n{font-size:18px;font-weight:800;fill:#fff}.h{font-size:21px;font-weight:800;fill:#111827}.b{font-size:16px;fill:#374151}</style></defs>
<rect width="1200" height="660" fill="#f8fafc"/>
<text x="600" y="54" text-anchor="middle" class="title">生产级多智能体系统：先补护栏，再谈自治</text>
<text x="600" y="86" text-anchor="middle" class="sub">多 Agent 常见失败不是直接崩溃，而是静默地产生错误结果</text>
<g transform="translate(150 135)">
<g><circle cx="34" cy="42" r="24" fill="#2563eb"/><text x="34" y="49" text-anchor="middle" class="n">1</text><rect x="80" y="0" width="820" height="84" rx="18" class="layer"/><text x="110" y="34" class="h">输入/输出契约</text><text x="110" y="62" class="b">明确任务范围、证据格式、置信度、失败报告和升级条件。</text></g>
<g transform="translate(0 100)"><circle cx="34" cy="42" r="24" fill="#059669"/><text x="34" y="49" text-anchor="middle" class="n">2</text><rect x="80" y="0" width="820" height="84" rx="18" class="layer"/><text x="110" y="34" class="h">并发控制</text><text x="110" y="62" class="b">为任务领取、共享资源、文件修改、状态写入设计 claim、lock、version。</text></g>
<g transform="translate(0 200)"><circle cx="34" cy="42" r="24" fill="#7c3aed"/><text x="34" y="49" text-anchor="middle" class="n">3</text><rect x="80" y="0" width="820" height="84" rx="18" class="layer"/><text x="110" y="34" class="h">可观测性</text><text x="110" y="62" class="b">记录 trace、event lineage、state diff、token 成本、路由理由和最终合成依据。</text></g>
<g transform="translate(0 300)"><circle cx="34" cy="42" r="24" fill="#ea580c"/><text x="34" y="49" text-anchor="middle" class="n">4</text><rect x="80" y="0" width="820" height="84" rx="18" class="layer"/><text x="110" y="34" class="h">终止条件</text><text x="110" y="62" class="b">设置最大轮次、时间、成本、无新增信息阈值和人工审批。</text></g>
<g transform="translate(0 400)"><circle cx="34" cy="42" r="24" fill="#be123c"/><text x="34" y="49" text-anchor="middle" class="n">5</text><rect x="80" y="0" width="820" height="84" rx="18" class="layer"/><text x="110" y="34" class="h">回退与人工升级</text><text x="110" y="62" class="b">当验证失败、路由低置信、冲突无法解决时，返回最佳尝试并标注风险。</text></g>
</g>
</svg>