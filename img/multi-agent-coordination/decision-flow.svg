<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
<title id="title">多智能体协调模式选型矩阵</title><desc id="desc">用问题导向的选择矩阵说明五种模式的选型。</desc>
<defs><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:34px;font-weight:800;fill:#111827}.sub{font-size:18px;fill:#4b5563}.q{font-size:21px;font-weight:800;fill:#111827}.a{font-size:18px;fill:#374151}.card{fill:#fff;stroke:#d1d5db;stroke-width:1.6}.mode{font-size:20px;font-weight:800}.num{font-size:18px;font-weight:800;fill:#fff}</style></defs>
<rect width="1200" height="700" fill="#f8fafc"/>
<text x="600" y="54" text-anchor="middle" class="title">选型时不要先问“用几个 Agent”，而要先问“瓶颈在哪里”</text>
<text x="600" y="88" text-anchor="middle" class="sub">按下面五个问题顺序判断；命中越早，模式越简单</text>
<g transform="translate(80 130)">
  <g><rect class="card" width="1040" height="82" rx="18"/><circle cx="42" cy="41" r="22" fill="#2563eb"/><text x="42" y="48" text-anchor="middle" class="num">1</text><text x="85" y="35" class="q">输出能否被明确检查？</text><text x="85" y="63" class="a">是：使用 Generator-Verifier，把质量标准写成 rubric、测试或规则。</text><text x="875" y="50" class="mode" fill="#1d4ed8">质量门禁</text></g>
  <g transform="translate(0 100)"><rect class="card" width="1040" height="82" rx="18"/><circle cx="42" cy="41" r="22" fill="#059669"/><text x="42" y="48" text-anchor="middle" class="num">2</text><text x="85" y="35" class="q">任务能否拆成独立调查？</text><text x="85" y="63" class="a">是：使用 Orchestrator-Subagent，让中心 Agent 负责派发和合成。</text><text x="815" y="50" class="mode" fill="#047857">中心编排</text></g>
  <g transform="translate(0 200)"><rect class="card" width="1040" height="82" rx="18"/><circle cx="42" cy="41" r="22" fill="#ea580c"/><text x="42" y="48" text-anchor="middle" class="num">3</text><text x="85" y="35" class="q">每个执行单元是否要长期保留模块上下文？</text><text x="85" y="63" class="a">是：使用 Agent Teams，让持久 Worker 处理各自分区。</text><text x="815" y="50" class="mode" fill="#c2410c">长期并行</text></g>
  <g transform="translate(0 300)"><rect class="card" width="1040" height="82" rx="18"/><circle cx="42" cy="41" r="22" fill="#7c3aed"/><text x="42" y="48" text-anchor="middle" class="num">4</text><text x="85" y="35" class="q">下一步是否由事件内容动态决定？</text><text x="85" y="63" class="a">是：使用 Message Bus，通过 topic 和订阅关系路由事件。</text><text x="815" y="50" class="mode" fill="#6d28d9">事件路由</text></g>
  <g transform="translate(0 400)"><rect class="card" width="1040" height="82" rx="18"/><circle cx="42" cy="41" r="22" fill="#be123c"/><text x="42" y="48" text-anchor="middle" class="num">5</text><text x="85" y="35" class="q">中间发现是否会改变其他 Agent 的方向？</text><text x="85" y="63" class="a">是：使用 Shared State，让事实、假设、证据和冲突可共享。</text><text x="815" y="50" class="mode" fill="#be123c">知识累积</text></g>
</g>
<rect x="240" y="640" width="720" height="36" rx="18" fill="#111827"/><text x="600" y="664" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">如果五个问题都不强烈命中，先保持单 Agent 或简单工作流</text>
</svg>