<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e" />
      <stop offset="100%" style="stop-color:#16213e" />
    </linearGradient>
    <linearGradient id="dec" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a" />
      <stop offset="100%" style="stop-color:#fee140" />
    </linearGradient>
    <linearGradient id="res" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b" />
      <stop offset="100%" style="stop-color:#38f9d7" />
    </linearGradient>
    <filter id="ds6" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bg6)" rx="10"/>
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">多智能体模式选择决策树</text>

  <!-- Start -->
  <rect x="355" y="55" width="190" height="45" rx="22" fill="#2d2d44" stroke="#fff" stroke-width="2" filter="url(#ds6)"/>
  <text x="450" y="83" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🚀 开始选择模式</text>

  <!-- Decision 1 -->
  <polygon points="450,130 580,185 450,240 320,185" fill="url(#dec)" filter="url(#ds6)"/>
  <text x="450" y="180" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="bold">需要质量验证？</text>
  <text x="450" y="196" text-anchor="middle" fill="rgba(26,26,46,0.6)" font-size="10">有明确评估标准</text>
  <line x1="450" y1="100" x2="450" y2="130" stroke="#fff" stroke-width="1.5"/>

  <!-- Yes to Generator-Verifier -->
  <line x1="580" y1="185" x2="720" y2="185" stroke="#43e97b" stroke-width="2"/>
  <text x="640" y="178" fill="#43e97b" font-size="11" font-weight="bold">是</text>
  <rect x="720" y="160" width="160" height="50" rx="10" fill="url(#res)" filter="url(#ds6)"/>
  <text x="800" y="183" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="bold">生成器-验证器</text>
  <text x="800" y="200" text-anchor="middle" fill="rgba(26,26,46,0.6)" font-size="10">Generator-Verifier</text>

  <!-- No -->
  <line x1="450" y1="240" x2="450" y2="270" stroke="#f5576c" stroke-width="2"/>
  <text x="465" y="258" fill="#f5576c" font-size="11" font-weight="bold">否</text>

  <!-- Decision 2 -->
  <polygon points="450,270 580,325 450,380 320,325" fill="url(#dec)" filter="url(#ds6)"/>
  <text x="450" y="320" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="bold">步骤序列已知？</text>
  <text x="450" y="336" text-anchor="middle" fill="rgba(26,26,46,0.6)" font-size="10">清晰的任务分解</text>

  <!-- Yes: needs context? -->
  <line x1="580" y1="325" x2="660" y2="325" stroke="#43e97b" stroke-width="2"/>
  <text x="610" y="318" fill="#43e97b" font-size="11" font-weight="bold">是</text>

  <!-- Sub-Decision: Long context? -->
  <polygon points="740,280 820,325 740,370 660,325" fill="rgba(250,112,154,0.6)" filter="url(#ds6)"/>
  <text x="740" y="322" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">需要长期</text>
  <text x="740" y="336" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">上下文？</text>

  <!-- Short context -->
  <line x1="740" y1="280" x2="740" y2="255" stroke="#4facfe" stroke-width="1.5"/>
  <text x="758" y="268" fill="#4facfe" font-size="10">否</text>
  <rect x="665" y="225" width="150" height="30" rx="8" fill="rgba(79,172,254,0.3)" stroke="#4facfe" stroke-width="1"/>
  <text x="740" y="245" text-anchor="middle" fill="#4facfe" font-size="11" font-weight="bold">编排器-子智能体</text>

  <!-- Long context -->
  <line x1="820" y1="325" x2="855" y2="325" stroke="#43e97b" stroke-width="1.5"/>
  <text x="840" y="318" fill="#43e97b" font-size="10">是</text>
  <rect x="855" y="310" width="40" height="30" rx="5" fill="rgba(67,233,123,0.3)"/>
  <text x="875" y="330" text-anchor="middle" fill="#43e97b" font-size="9" font-weight="bold">团队</text>

  <!-- No: event-driven? -->
  <line x1="450" y1="380" x2="450" y2="410" stroke="#f5576c" stroke-width="2"/>
  <text x="465" y="398" fill="#f5576c" font-size="11" font-weight="bold">否</text>

  <!-- Decision 3 -->
  <polygon points="450,410 580,465 450,520 320,465" fill="url(#dec)" filter="url(#ds6)"/>
  <text x="450" y="460" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="bold">事件驱动？</text>
  <text x="450" y="476" text-anchor="middle" fill="rgba(26,26,46,0.6)" font-size="10">离散事件管道</text>

  <!-- Yes to Message Bus -->
  <line x1="580" y1="465" x2="720" y2="465" stroke="#43e97b" stroke-width="2"/>
  <text x="640" y="458" fill="#43e97b" font-size="11" font-weight="bold">是</text>
  <rect x="720" y="440" width="160" height="50" rx="10" fill="url(#res)" filter="url(#ds6)"/>
  <text x="800" y="463" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="bold">消息总线</text>
  <text x="800" y="480" text-anchor="middle" fill="rgba(26,26,46,0.6)" font-size="10">Message Bus</text>

  <!-- No to Shared State -->
  <line x1="450" y1="520" x2="450" y2="555" stroke="#f5576c" stroke-width="2"/>
  <text x="465" y="540" fill="#f5576c" font-size="11" font-weight="bold">否</text>
  <rect x="355" y="555" width="190" height="35" rx="10" fill="url(#res)" filter="url(#ds6)"/>
  <text x="450" y="578" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="bold">共享状态 Shared State</text>

  <!-- Left side: quick recommendations -->
  <rect x="25" y="400" width="250" height="180" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="150" y="425" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">💡 快速推荐</text>
  <text x="40" y="450" fill="#43e97b" font-size="11">✅ 默认起步 → 编排器-子智能体</text>
  <text x="40" y="472" fill="#4facfe" font-size="11">✅ 并行独立 → 智能体团队</text>
  <text x="40" y="494" fill="#667eea" font-size="11">✅ 质量关键 → 生成器-验证器</text>
  <text x="40" y="516" fill="#fa709a" font-size="11">✅ 事件流水 → 消息总线</text>
  <text x="40" y="538" fill="#fee140" font-size="11">✅ 协作研究 → 共享状态</text>
  <text x="40" y="565" fill="#aaa" font-size="10">⚡ 可组合使用，按需演进</text>
</svg>
