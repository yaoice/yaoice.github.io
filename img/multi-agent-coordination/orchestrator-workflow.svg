<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="Orchestrator–Subagent 工作流">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">Orchestrator–Subagent 工作流</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">规划一次 · 并行派发 · 统一合成</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="60" y="220" width="200" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="76" y="238" width="10" height="10" rx="2" fill="#334155"/>
  <text x="94" y="247" text-anchor="start" font-size="14" font-weight="650" fill="#111827">任务</text>
  <text x="76" y="272" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">用户目标</text>
  <rect x="275" y="220" width="200" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="291" y="238" width="10" height="10" rx="2" fill="#4f46e5"/>
  <text x="309" y="247" text-anchor="start" font-size="14" font-weight="650" fill="#111827">计划</text>
  <text x="291" y="272" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">拆分独立项</text>
  <rect x="490" y="220" width="200" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="506" y="238" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="524" y="247" text-anchor="start" font-size="14" font-weight="650" fill="#111827">并行调查</text>
  <text x="506" y="272" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">多个 subagent</text>
  <rect x="705" y="220" width="200" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="721" y="238" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="739" y="247" text-anchor="start" font-size="14" font-weight="650" fill="#111827">汇总</text>
  <text x="721" y="272" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">发现回传</text>
  <rect x="920" y="220" width="200" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="936" y="238" width="10" height="10" rx="2" fill="#b45309"/>
  <text x="954" y="247" text-anchor="start" font-size="14" font-weight="650" fill="#111827">交付</text>
  <text x="936" y="272" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">统一回答</text>
  <line x1="260" y1="270" x2="275" y2="270" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" marker-end="url(#m-indigo)"/>
  <line x1="475" y1="270" x2="490" y2="270" stroke="#1f4ed8" stroke-width="2" stroke-linecap="round" marker-end="url(#m-blue)"/>
  <line x1="690" y1="270" x2="705" y2="270" stroke="#0d9488" stroke-width="2" stroke-linecap="round" marker-end="url(#m-teal)"/>
  <line x1="905" y1="270" x2="920" y2="270" stroke="#b45309" stroke-width="2" stroke-linecap="round" marker-end="url(#m-amber)"/>
  <rect x="400" y="410" width="64" height="24" rx="12.0" ry="12.0" fill="#eef2ff" stroke="#1f4ed8" stroke-width="1"/>
  <text x="432.0" y="426.0" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1f4ed8">安全</text>
  <rect x="500" y="410" width="64" height="24" rx="12.0" ry="12.0" fill="#eef2ff" stroke="#1f4ed8" stroke-width="1"/>
  <text x="532.0" y="426.0" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1f4ed8">测试</text>
  <rect x="600" y="410" width="64" height="24" rx="12.0" ry="12.0" fill="#eef2ff" stroke="#1f4ed8" stroke-width="1"/>
  <text x="632.0" y="426.0" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1f4ed8">风格</text>
  <rect x="700" y="410" width="64" height="24" rx="12.0" ry="12.0" fill="#eef2ff" stroke="#1f4ed8" stroke-width="1"/>
  <text x="732.0" y="426.0" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1f4ed8">架构</text>
  <text x="72" y="508" text-anchor="start" font-size="12" font-weight="600" fill="#9ca3af">并行化</text>
  <text x="72" y="534" text-anchor="start" font-size="13" font-weight="500" fill="#374151">无显式并行时，子任务会顺序执行；需在实现层确保真正并发。</text>
</svg>
