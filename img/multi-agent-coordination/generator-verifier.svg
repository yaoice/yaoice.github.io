<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea" />
      <stop offset="100%" style="stop-color:#764ba2" />
    </linearGradient>
    <linearGradient id="ver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb" />
      <stop offset="100%" style="stop-color:#f5576c" />
    </linearGradient>
    <linearGradient id="pass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b" />
      <stop offset="100%" style="stop-color:#38f9d7" />
    </linearGradient>
    <filter id="ds" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="450" fill="url(#bg1)" rx="10"/>
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">Generator-Verifier 模式流程</text>

  <!-- Task Input -->
  <rect x="30" y="170" width="120" height="70" rx="10" fill="#2d2d44" stroke="#667eea" stroke-width="2" filter="url(#ds)"/>
  <text x="90" y="200" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">任务输入</text>
  <text x="90" y="218" text-anchor="middle" fill="#aaa" font-size="10">Task Input</text>

  <!-- Arrow -->
  <line x1="150" y1="205" x2="195" y2="205" stroke="#667eea" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/></marker></defs>

  <!-- Generator -->
  <rect x="200" y="140" width="180" height="130" rx="14" fill="url(#gen)" filter="url(#ds)"/>
  <text x="290" y="175" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">生成器</text>
  <text x="290" y="195" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Generator Agent</text>
  <line x1="225" y1="208" x2="355" y2="208" stroke="rgba(255,255,255,0.3)"/>
  <text x="290" y="230" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">接收任务/反馈</text>
  <text x="290" y="250" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">生成/修订输出</text>

  <!-- Arrow to Verifier -->
  <line x1="380" y1="205" x2="440" y2="205" stroke="#fff" stroke-width="2" marker-end="url(#arrowWhite)"/>
  <defs><marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fff"/></marker></defs>
  <text x="410" y="195" text-anchor="middle" fill="#aaa" font-size="10">输出</text>

  <!-- Verifier -->
  <rect x="445" y="140" width="180" height="130" rx="14" fill="url(#ver)" filter="url(#ds)"/>
  <text x="535" y="175" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">验证器</text>
  <text x="535" y="195" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Verifier Agent</text>
  <line x1="470" y1="208" x2="600" y2="208" stroke="rgba(255,255,255,0.3)"/>
  <text x="535" y="230" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">按标准评估输出</text>
  <text x="535" y="250" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">生成详细反馈</text>

  <!-- Reject Arrow (loop back) -->
  <path d="M 535 270 L 535 350 L 290 350 L 290 270" fill="none" stroke="#f5576c" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <defs><marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f5576c"/></marker></defs>
  <rect x="350" y="335" width="120" height="30" rx="8" fill="#f5576c" opacity="0.2"/>
  <text x="410" y="355" text-anchor="middle" fill="#f5576c" font-size="12" font-weight="bold">❌ 未通过 + 反馈</text>

  <!-- Pass Arrow -->
  <line x1="625" y1="205" x2="690" y2="205" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <defs><marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#43e97b"/></marker></defs>

  <!-- Output -->
  <rect x="695" y="155" width="170" height="100" rx="14" fill="url(#pass)" filter="url(#ds)"/>
  <text x="780" y="195" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="bold">✅ 最终输出</text>
  <text x="780" y="215" text-anchor="middle" fill="rgba(26,26,46,0.7)" font-size="11">Quality Verified</text>
  <text x="780" y="237" text-anchor="middle" fill="rgba(26,26,46,0.8)" font-size="11">通过所有验证标准</text>

  <!-- Iteration counter -->
  <rect x="350" y="80" width="180" height="40" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="440" y="105" text-anchor="middle" fill="#aaa" font-size="12">🔄 迭代次数 ≤ MAX_ITERATIONS</text>

  <!-- Max iterations fallback -->
  <rect x="350" y="395" width="180" height="35" rx="8" fill="rgba(245,87,108,0.1)" stroke="rgba(245,87,108,0.3)" stroke-width="1"/>
  <text x="440" y="418" text-anchor="middle" fill="#f5576c" font-size="11">⚠️ 超过最大迭代 → 回退策略</text>
</svg>
