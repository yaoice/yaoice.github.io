<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
<title id="title">Generator-Verifier 生成验证闭环</title><desc id="desc">展示生成器、验证器、通过、反馈重试和终止条件。</desc>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/></marker><marker id="r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#dc2626"/></marker><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:34px;font-weight:800;fill:#111827}.sub{font-size:18px;fill:#4b5563}.box{fill:#fff;stroke:#d1d5db;stroke-width:1.8}.h{font-size:23px;font-weight:800;fill:#111827}.b{font-size:17px;fill:#374151}.arrow{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#a)}.reject{stroke:#dc2626;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#r)}</style></defs>
<rect width="1200" height="680" fill="#f8fafc"/>
<text x="600" y="54" text-anchor="middle" class="title">Generator-Verifier：用明确标准把输出质量关起来</text>
<text x="600" y="86" text-anchor="middle" class="sub">图中所有文字放在独立区域内，蓝色是主路径，红色是反馈重试路径</text>
<rect x="80" y="230" width="180" height="110" rx="18" class="box"/><text x="170" y="275" text-anchor="middle" class="h">任务输入</text><text x="170" y="307" text-anchor="middle" class="b">请求 / 约束 / 资料</text>
<rect x="340" y="210" width="220" height="150" rx="20" class="box"/><text x="450" y="260" text-anchor="middle" class="h">Generator</text><text x="450" y="296" text-anchor="middle" class="b">生成候选结果</text><text x="450" y="324" text-anchor="middle" class="b">答案 / 代码 / 文案</text>
<rect x="640" y="210" width="220" height="150" rx="20" class="box"/><text x="750" y="260" text-anchor="middle" class="h">Verifier</text><text x="750" y="296" text-anchor="middle" class="b">按 rubric 检查</text><text x="750" y="324" text-anchor="middle" class="b">事实 / 格式 / 合规</text>
<rect x="940" y="170" width="180" height="90" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="1.8"/><text x="1030" y="207" text-anchor="middle" class="h">通过</text><text x="1030" y="235" text-anchor="middle" class="b">最终输出</text>
<rect x="940" y="330" width="180" height="105" rx="18" fill="#fee2e2" stroke="#ef4444" stroke-width="1.8"/><text x="1030" y="371" text-anchor="middle" class="h">不通过</text><text x="1030" y="400" text-anchor="middle" class="b">反馈问题</text>
<rect x="410" y="480" width="380" height="82" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="1.8"/><text x="600" y="514" text-anchor="middle" class="h">终止条件</text><text x="600" y="544" text-anchor="middle" class="b">最大轮次 / 超时 / 成本预算 / 人工升级</text>
<path d="M260 285 L330 285" class="arrow"/><path d="M560 285 L630 285" class="arrow"/><path d="M860 250 C900 235 905 218 930 215" class="arrow"/><path d="M860 320 C895 340 905 365 930 382" class="reject"/><path d="M940 402 C770 470 535 435 470 370" class="reject"/><path d="M1030 435 C1000 520 855 520 800 520" class="reject"/>
</svg>