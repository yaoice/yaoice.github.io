<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="Agent Teams 工作流">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">Agent Teams 工作流</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">Worker 在多个任务中持续运行，而非一次性执行</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="60" y="230" width="160" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="76" y="248" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="94" y="257" text-anchor="start" font-size="14" font-weight="650" fill="#111827">初始化</text>
  <text x="76" y="282" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">启动团队</text>
  <rect x="245" y="230" width="160" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="261" y="248" width="10" height="10" rx="2" fill="#b45309"/>
  <text x="279" y="257" text-anchor="start" font-size="14" font-weight="650" fill="#111827">队列</text>
  <text x="261" y="282" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">填充任务</text>
  <rect x="430" y="230" width="160" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="446" y="248" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="464" y="257" text-anchor="start" font-size="14" font-weight="650" fill="#111827">认领</text>
  <text x="446" y="282" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">claim task</text>
  <rect x="615" y="230" width="160" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="631" y="248" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="649" y="257" text-anchor="start" font-size="14" font-weight="650" fill="#111827">推进</text>
  <text x="631" y="282" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">多步骤执行</text>
  <rect x="800" y="230" width="160" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="816" y="248" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="834" y="257" text-anchor="start" font-size="14" font-weight="650" fill="#111827">验证</text>
  <text x="816" y="282" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">局部通过</text>
  <rect x="985" y="230" width="160" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="1001" y="248" width="10" height="10" rx="2" fill="#b45309"/>
  <text x="1019" y="257" text-anchor="start" font-size="14" font-weight="650" fill="#111827">完成</text>
  <text x="1001" y="282" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">集成汇总</text>
  <line x1="220" y1="278" x2="245" y2="278" stroke="#b45309" stroke-width="2" stroke-linecap="round" marker-end="url(#m-amber)"/>
  <line x1="405" y1="278" x2="430" y2="278" stroke="#1f4ed8" stroke-width="2" stroke-linecap="round" marker-end="url(#m-blue)"/>
  <line x1="590" y1="278" x2="615" y2="278" stroke="#1f4ed8" stroke-width="2" stroke-linecap="round" marker-end="url(#m-blue)"/>
  <line x1="775" y1="278" x2="800" y2="278" stroke="#0d9488" stroke-width="2" stroke-linecap="round" marker-end="url(#m-teal)"/>
  <line x1="960" y1="278" x2="985" y2="278" stroke="#b45309" stroke-width="2" stroke-linecap="round" marker-end="url(#m-amber)"/>
  <rect x="400" y="420" width="400" height="82" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="416" y="438" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="434" y="447" text-anchor="start" font-size="14" font-weight="650" fill="#111827">持久上下文</text>
  <text x="416" y="472" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">worker 对自己负责的模块越来越熟悉</text>
  <path d="M 600 502 L 600 540" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-teal)" stroke-dasharray="6 4"/>
  <text x="600" y="560" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0d9488">下一轮继续从队列领取任务</text>
</svg>
