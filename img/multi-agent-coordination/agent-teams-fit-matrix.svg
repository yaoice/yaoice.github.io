<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="Agent Teams 适用性矩阵">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">Agent Teams 适用性矩阵</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">上下文越深、依赖越低，持久 Worker 越划算</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="180" y="150" width="860" height="380" rx="14" ry="14" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <line x1="610.0" y1="150" x2="610.0" y2="530" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="180" y1="340.0" x2="1040" y2="340.0" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="610.0" y="558" text-anchor="middle" font-size="12" font-weight="600" fill="#9ca3af">任务依赖：低 → 高</text>
  <text x="148" y="340.0" transform="rotate(-90 148 340.0)" text-anchor="middle" font-size="12" font-weight="600" fill="#9ca3af">上下文深度：浅 → 深</text>
  <text x="395.0" y="176" text-anchor="middle" font-size="12.5" font-weight="650" fill="#0d9488">适合</text>
  <text x="825.0" y="176" text-anchor="middle" font-size="12.5" font-weight="650" fill="#be123c">谨慎</text>
  <text x="395.0" y="516" text-anchor="middle" font-size="12.5" font-weight="650" fill="#4f46e5">考虑 Orchestrator</text>
  <text x="825.0" y="516" text-anchor="middle" font-size="12.5" font-weight="650" fill="#b45309">考虑 Shared State</text>
  <circle cx="330" cy="235" r="6" fill="#0d9488"/>
  <text x="342" y="239" text-anchor="start" font-size="12" font-weight="600" fill="#111827">代码库迁移</text>
  <circle cx="470" cy="215" r="6" fill="#0d9488"/>
  <text x="482" y="219" text-anchor="start" font-size="12" font-weight="600" fill="#111827">多服务重构</text>
  <circle cx="840" cy="260" r="6" fill="#b45309"/>
  <text x="852" y="264" text-anchor="start" font-size="12" font-weight="600" fill="#111827">协作研究</text>
  <circle cx="310" cy="440" r="6" fill="#4f46e5"/>
  <text x="322" y="444" text-anchor="start" font-size="12" font-weight="600" fill="#111827">并行测试</text>
  <circle cx="250" cy="470" r="6" fill="#4f46e5"/>
  <text x="262" y="474" text-anchor="start" font-size="12" font-weight="600" fill="#111827">批处理</text>
  <circle cx="860" cy="430" r="6" fill="#be123c"/>
  <text x="872" y="434" text-anchor="start" font-size="12" font-weight="600" fill="#111827">强耦合任务</text>
</svg>
