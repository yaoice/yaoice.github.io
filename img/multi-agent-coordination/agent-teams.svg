<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
<title id="title">Agent Teams 看板工作流</title><desc id="desc">展示持久 worker 从任务队列领取分区任务并通过验证合并。</desc>
<defs><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:34px;font-weight:800;fill:#111827}.sub{font-size:18px;fill:#4b5563}.col{fill:#fff;stroke:#d1d5db;stroke-width:1.6}.head{fill:#111827}.h{font-size:20px;font-weight:800;fill:#fff}.card{fill:#fffbeb;stroke:#f59e0b;stroke-width:1.6}.ok{fill:#ecfdf5;stroke:#22c55e;stroke-width:1.6}.risk{fill:#fef2f2;stroke:#ef4444;stroke-width:1.6}.t{font-size:18px;font-weight:800;fill:#111827}.b{font-size:16px;fill:#374151}</style></defs>
<rect width="1200" height="680" fill="#f8fafc"/>
<text x="600" y="54" text-anchor="middle" class="title">Agent Teams：持久 Worker 适合长期、分区、并行任务</text>
<text x="600" y="86" text-anchor="middle" class="sub">看板式表达比复杂连线更清楚：任务从左到右流转，状态一眼可见</text>
<g transform="translate(65 125)">
<g><rect class="col" width="250" height="420" rx="18"/><rect class="head" width="250" height="54" rx="18"/><text x="125" y="35" text-anchor="middle" class="h">任务队列</text><rect x="26" y="88" width="198" height="70" rx="12" class="card"/><text x="125" y="116" text-anchor="middle" class="t">服务 A 迁移</text><text x="125" y="142" text-anchor="middle" class="b">依赖、配置、测试</text><rect x="26" y="180" width="198" height="70" rx="12" class="card"/><text x="125" y="208" text-anchor="middle" class="t">服务 B 迁移</text><text x="125" y="234" text-anchor="middle" class="b">API、部署脚本</text></g>
<g transform="translate(280 0)"><rect class="col" width="250" height="420" rx="18"/><rect class="head" width="250" height="54" rx="18"/><text x="125" y="35" text-anchor="middle" class="h">持久 Worker</text><rect x="26" y="88" width="198" height="92" rx="12" class="card"/><text x="125" y="120" text-anchor="middle" class="t">Worker A</text><text x="125" y="147" text-anchor="middle" class="b">持续理解服务 A</text><rect x="26" y="205" width="198" height="92" rx="12" class="card"/><text x="125" y="237" text-anchor="middle" class="t">Worker B</text><text x="125" y="264" text-anchor="middle" class="b">持续理解服务 B</text></g>
<g transform="translate(560 0)"><rect class="col" width="250" height="420" rx="18"/><rect class="head" width="250" height="54" rx="18"/><text x="125" y="35" text-anchor="middle" class="h">验证门禁</text><rect x="26" y="88" width="198" height="70" rx="12" class="ok"/><text x="125" y="116" text-anchor="middle" class="t">单服务测试</text><text x="125" y="142" text-anchor="middle" class="b">局部验收</text><rect x="26" y="180" width="198" height="70" rx="12" class="risk"/><text x="125" y="208" text-anchor="middle" class="t">冲突检测</text><text x="125" y="234" text-anchor="middle" class="b">文件、接口、Schema</text></g>
<g transform="translate(840 0)"><rect class="col" width="250" height="420" rx="18"/><rect class="head" width="250" height="54" rx="18"/><text x="125" y="35" text-anchor="middle" class="h">合并交付</text><rect x="26" y="88" width="198" height="70" rx="12" class="ok"/><text x="125" y="116" text-anchor="middle" class="t">集成测试</text><text x="125" y="142" text-anchor="middle" class="b">全局验证</text><rect x="26" y="180" width="198" height="70" rx="12" class="ok"/><text x="125" y="208" text-anchor="middle" class="t">迁移报告</text><text x="125" y="234" text-anchor="middle" class="b">状态和剩余风险</text></g>
</g>
<text x="600" y="605" text-anchor="middle" font-size="18" font-weight="800" fill="#92400e">关键：Worker 长期存在才有价值；否则只是更复杂的 Subagent 调用</text>
</svg>