<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e" />
      <stop offset="100%" style="stop-color:#16213e" />
    </linearGradient>
    <linearGradient id="coord" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b" />
      <stop offset="100%" style="stop-color:#38f9d7" />
    </linearGradient>
    <linearGradient id="team" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe" />
      <stop offset="100%" style="stop-color:#00f2fe" />
    </linearGradient>
    <linearGradient id="queue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a" />
      <stop offset="100%" style="stop-color:#fee140" />
    </linearGradient>
    <filter id="ds3" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="aG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#43e97b"/></marker>
    <marker id="aF" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fa709a"/></marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg3)" rx="10"/>
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">Agent Teams 模式架构</text>

  <!-- Coordinator -->
  <rect x="330" y="65" width="240" height="80" rx="14" fill="url(#coord)" filter="url(#ds3)"/>
  <text x="450" y="98" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="bold">🎯 协调器 Coordinator</text>
  <text x="450" y="118" text-anchor="middle" fill="rgba(26,26,46,0.7)" font-size="11">生成团队 · 分配任务 · 监控进度</text>

  <!-- Shared Task Queue -->
  <rect x="300" y="185" width="300" height="55" rx="10" fill="url(#queue)" filter="url(#ds3)"/>
  <text x="450" y="210" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold">📋 共享任务队列 Shared Task Queue</text>
  <text x="450" y="228" text-anchor="middle" fill="rgba(26,26,46,0.6)" font-size="10">任务A · 任务B · 任务C · 任务D · 任务E · ...</text>

  <!-- Arrow from coordinator to queue -->
  <line x1="450" y1="145" x2="450" y2="180" stroke="#43e97b" stroke-width="2" marker-end="url(#aG)"/>

  <!-- Team Members -->
  <!-- Member 1 -->
  <rect x="40" y="290" width="190" height="180" rx="12" fill="url(#team)" filter="url(#ds3)"/>
  <text x="135" y="320" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">👤 团队成员 A</text>
  <text x="135" y="340" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">Service Migration Worker</text>
  <line x1="65" y1="350" x2="205" y2="350" stroke="rgba(255,255,255,0.3)"/>
  <text x="135" y="370" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">📦 迁移服务 Alpha</text>
  <text x="135" y="390" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">🔧 依赖更新</text>
  <text x="135" y="410" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">🧪 测试修复</text>
  <text x="135" y="435" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">持久化 · 上下文累积</text>
  <rect x="95" y="455" width="80" height="18" rx="5" fill="rgba(67,233,123,0.3)"/>
  <text x="135" y="468" text-anchor="middle" fill="#43e97b" font-size="9" font-weight="bold">🟢 ACTIVE</text>

  <!-- Member 2 -->
  <rect x="260" y="290" width="190" height="180" rx="12" fill="url(#team)" filter="url(#ds3)"/>
  <text x="355" y="320" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">👤 团队成员 B</text>
  <text x="355" y="340" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">Service Migration Worker</text>
  <line x1="285" y1="350" x2="425" y2="350" stroke="rgba(255,255,255,0.3)"/>
  <text x="355" y="370" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">📦 迁移服务 Beta</text>
  <text x="355" y="390" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">🔧 API 适配</text>
  <text x="355" y="410" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">🧪 回归测试</text>
  <text x="355" y="435" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">持久化 · 上下文累积</text>
  <rect x="315" y="455" width="80" height="18" rx="5" fill="rgba(67,233,123,0.3)"/>
  <text x="355" y="468" text-anchor="middle" fill="#43e97b" font-size="9" font-weight="bold">🟢 ACTIVE</text>

  <!-- Member 3 -->
  <rect x="480" y="290" width="190" height="180" rx="12" fill="url(#team)" filter="url(#ds3)"/>
  <text x="575" y="320" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">👤 团队成员 C</text>
  <text x="575" y="340" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">Service Migration Worker</text>
  <line x1="505" y1="350" x2="645" y2="350" stroke="rgba(255,255,255,0.3)"/>
  <text x="575" y="370" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">📦 迁移服务 Gamma</text>
  <text x="575" y="390" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">🔧 数据库迁移</text>
  <text x="575" y="410" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">🧪 数据验证</text>
  <text x="575" y="435" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">持久化 · 上下文累积</text>
  <rect x="535" y="455" width="80" height="18" rx="5" fill="rgba(250,112,154,0.3)"/>
  <text x="575" y="468" text-anchor="middle" fill="#fa709a" font-size="9" font-weight="bold">🔴 WORKING</text>

  <!-- Member N -->
  <rect x="700" y="290" width="170" height="180" rx="12" fill="#2d2d44" stroke="#4facfe" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#ds3)"/>
  <text x="785" y="370" text-anchor="middle" fill="#4facfe" font-size="30">···</text>
  <text x="785" y="400" text-anchor="middle" fill="#aaa" font-size="12">更多成员</text>
  <text x="785" y="418" text-anchor="middle" fill="#aaa" font-size="10">按需扩展</text>

  <!-- Arrows from queue to members -->
  <line x1="380" y1="240" x2="135" y2="285" stroke="#fa709a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#aF)"/>
  <line x1="430" y1="240" x2="355" y2="285" stroke="#fa709a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#aF)"/>
  <line x1="480" y1="240" x2="575" y2="285" stroke="#fa709a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#aF)"/>
</svg>
