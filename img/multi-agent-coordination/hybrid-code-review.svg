<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="组合示例：智能代码审查系统">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">组合示例：智能代码审查系统</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">多个模式拼成一条可观测的审查链路</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="70" y="270" width="180" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="86" y="288" width="10" height="10" rx="2" fill="#334155"/>
  <text x="104" y="297" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Pull Request</text>
  <text x="86" y="322" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">用户提交变更</text>
  <rect x="310" y="230" width="230" height="180" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="326" y="248" width="10" height="10" rx="2" fill="#4f46e5"/>
  <text x="344" y="257" text-anchor="start" font-size="15" font-weight="650" fill="#111827">Orchestrator</text>
  <text x="326" y="282" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">拆分审查任务</text>
  <text x="326" y="300" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">汇总各路结果</text>
  <rect x="620" y="130" width="270" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="636" y="148" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="654" y="157" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Generator–Verifier</text>
  <text x="636" y="182" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">修复建议 + 验证</text>
  <path d="M 540 320 H 620 V 178" fill="none" stroke="#1f4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-blue)"/>
  <path d="M 620 202 H 540 V 360" fill="none" stroke="#1f4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-blue)" stroke-dasharray="6 4"/>
  <rect x="620" y="280" width="270" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="636" y="298" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="654" y="307" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Agent Teams</text>
  <text x="636" y="332" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">多模块并行分析</text>
  <path d="M 540 320 H 620 V 328" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-teal)"/>
  <path d="M 620 352 H 540 V 360" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-teal)" stroke-dasharray="6 4"/>
  <rect x="620" y="430" width="270" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="636" y="448" width="10" height="10" rx="2" fill="#be123c"/>
  <text x="654" y="457" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Shared State</text>
  <text x="636" y="482" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">历史模式知识库</text>
  <path d="M 540 320 H 620 V 478" fill="none" stroke="#be123c" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-rose)"/>
  <path d="M 620 502 H 540 V 360" fill="none" stroke="#be123c" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-rose)" stroke-dasharray="6 4"/>
  <rect x="950" y="270" width="180" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="966" y="288" width="10" height="10" rx="2" fill="#b45309"/>
  <text x="984" y="297" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Review Report</text>
  <text x="966" y="322" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">统一交付</text>
  <line x1="250" y1="318" x2="310" y2="318" stroke="#334155" stroke-width="2" stroke-linecap="round" marker-end="url(#m-slate)"/>
  <line x1="540" y1="318" x2="950" y2="318" stroke="#b45309" stroke-width="2" stroke-linecap="round" marker-end="url(#m-amber)"/>
</svg>
