<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="Shared State 工作流">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">Shared State 工作流</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">每个 Agent 独立循环：读 → 推进 → 写；共享存储持续演化</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="500" y="140" width="200" height="80" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="516" y="158" width="10" height="10" rx="2" fill="#334155"/>
  <text x="534" y="167" text-anchor="start" font-size="13.5" font-weight="650" fill="#111827">初始化</text>
  <text x="516" y="192" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">写入问题 / 数据集</text>
  <rect x="470" y="270" width="260" height="120" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="486" y="288" width="10" height="10" rx="2" fill="#be123c"/>
  <text x="504" y="297" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Shared Store</text>
  <text x="486" y="322" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">当前发现</text>
  <text x="486" y="340" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">候选结论</text>
  <rect x="90" y="260" width="230" height="88" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="106" y="278" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="124" y="287" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Read Store</text>
  <rect x="90" y="430" width="230" height="88" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="106" y="448" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="124" y="457" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Investigate</text>
  <rect x="870" y="260" width="230" height="88" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="886" y="278" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="904" y="287" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Write Findings</text>
  <rect x="870" y="430" width="230" height="88" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="886" y="448" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="904" y="457" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Read Updated Store</text>
  <path d="M 600 220 L 600 270" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-slate)"/>
  <path d="M 320 304 H 470 V 320" fill="none" stroke="#1f4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-blue)"/>
  <path d="M 320 474 H 470 V 370" fill="none" stroke="#1f4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-blue)"/>
  <path d="M 730 320 H 870 V 304" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-teal)"/>
  <path d="M 730 370 H 870 V 474" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-teal)"/>
  <text x="600" y="555" text-anchor="middle" font-size="12.5" font-weight="600" fill="#be123c">循环持续，直到命中终止条件（时间 · 收敛 · 判断）。</text>
</svg>
