<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="Shared State 的收益与风险">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">Shared State 的收益与风险</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">实时共享提升协作，但要求一致性与终止条件治理</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="90" y="150" width="490" height="350" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="106" y="168" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="124" y="177" text-anchor="start" font-size="15" font-weight="650" fill="#111827">收益</text>
  <text x="106" y="202" text-anchor="start" font-size="13" font-weight="500" fill="#374151">中间发现可被立即利用</text>
  <text x="106" y="220" text-anchor="start" font-size="13" font-weight="500" fill="#374151">不依赖 coordinator 转发</text>
  <text x="106" y="238" text-anchor="start" font-size="13" font-weight="500" fill="#374151">知识库随时间持续演化</text>
  <text x="106" y="256" text-anchor="start" font-size="13" font-weight="500" fill="#374151">单个 agent 停止不会阻塞其他</text>
  <rect x="620" y="150" width="490" height="350" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="636" y="168" width="10" height="10" rx="2" fill="#be123c"/>
  <text x="654" y="177" text-anchor="start" font-size="15" font-weight="650" fill="#111827">风险</text>
  <text x="636" y="202" text-anchor="start" font-size="13" font-weight="500" fill="#374151">重复劳动与相互矛盾</text>
  <text x="636" y="220" text-anchor="start" font-size="13" font-weight="500" fill="#374151">并发写入冲突</text>
  <text x="636" y="238" text-anchor="start" font-size="13" font-weight="500" fill="#374151">执行路径难以预测</text>
  <text x="636" y="256" text-anchor="start" font-size="13" font-weight="500" fill="#374151">反应循环会空耗 token</text>
  <text x="72" y="540" text-anchor="start" font-size="12" font-weight="600" fill="#9ca3af">治理要点</text>
  <text x="72" y="566" text-anchor="start" font-size="13" font-weight="500" fill="#374151">锁 / 版本 / 分区 / 去重 / 终止条件必须显式设计。</text>
</svg>
