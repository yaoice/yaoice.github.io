<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
<title id="title">上下文中心拆解地图</title><desc id="desc">展示设计多智能体系统时应先判断上下文边界。</desc>
<defs><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:34px;font-weight:800;fill:#111827}.sub{font-size:18px;fill:#4b5563}.box{fill:#fff;stroke:#d1d5db;stroke-width:1.8}.core{fill:#111827}.h{font-size:22px;font-weight:800;fill:#111827}.b{font-size:17px;fill:#374151}.w{font-size:25px;font-weight:800;fill:#fff}.line{stroke:#64748b;stroke-width:2.5;fill:none}</style></defs>
<rect width="1200" height="660" fill="#f8fafc"/>
<text x="600" y="54" text-anchor="middle" class="title">Context-centric Decomposition：先判断信息边界，再决定 Agent 边界</text>
<text x="600" y="86" text-anchor="middle" class="sub">不要先按“角色名称”拆；先问哪些信息必须在同一个上下文里</text>
<rect x="430" y="245" width="340" height="130" rx="24" class="core"/><text x="600" y="296" text-anchor="middle" class="w">上下文边界</text><text x="600" y="330" text-anchor="middle" font-size="18" fill="#e5e7eb">决定能否拆分、如何共享、怎么合成</text>
<rect x="90" y="150" width="280" height="118" rx="18" class="box"/><text x="230" y="196" text-anchor="middle" class="h">必须同窗的信息</text><text x="230" y="230" text-anchor="middle" class="b">放在同一个 Agent 或共享状态</text>
<rect x="830" y="150" width="280" height="118" rx="18" class="box"/><text x="970" y="196" text-anchor="middle" class="h">可隔离的局部任务</text><text x="970" y="230" text-anchor="middle" class="b">适合 Subagent 或 Worker</text>
<rect x="90" y="420" width="280" height="118" rx="18" class="box"/><text x="230" y="466" text-anchor="middle" class="h">可独立验证的输出</text><text x="230" y="500" text-anchor="middle" class="b">适合 Generator-Verifier</text>
<rect x="830" y="420" width="280" height="118" rx="18" class="box"/><text x="970" y="466" text-anchor="middle" class="h">会扩散的中间发现</text><text x="970" y="500" text-anchor="middle" class="b">适合 Bus 或 Shared State</text>
<path d="M370 210 L430 270" class="line"/><path d="M830 210 L770 270" class="line"/><path d="M370 480 L430 350" class="line"/><path d="M830 480 L770 350" class="line"/>
</svg>