<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
<title id="title">Subagent 任务契约</title><desc id="desc">展示派发子任务时输入契约和输出契约应包含哪些内容。</desc>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/></marker><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:34px;font-weight:800;fill:#111827}.sub{font-size:18px;fill:#4b5563}.card{fill:#fff;stroke:#d1d5db;stroke-width:1.8}.head{fill:#1d4ed8}.h{font-size:22px;font-weight:800;fill:#fff}.t{font-size:19px;font-weight:800;fill:#111827}.b{font-size:16px;fill:#374151}.agent{fill:#111827}.w{font-size:24px;font-weight:800;fill:#fff}.line{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
<rect width="1200" height="660" fill="#eff6ff"/>
<text x="600" y="54" text-anchor="middle" class="title">Subagent 不是“去看看”，而是接收一份可执行任务契约</text>
<text x="600" y="86" text-anchor="middle" class="sub">契约越清楚，返回结果越容易合成；契约越模糊，输出越像过程日志</text>
<g transform="translate(80 155)"><rect width="300" height="330" rx="20" class="card"/><rect width="300" height="58" rx="20" class="head"/><text x="150" y="37" text-anchor="middle" class="h">输入契约</text><text x="34" y="112" class="t">目标</text><text x="34" y="140" class="b">要回答的具体问题</text><text x="34" y="190" class="t">范围</text><text x="34" y="218" class="b">可读文件、排除项、约束</text><text x="34" y="268" class="t">成功标准</text><text x="34" y="296" class="b">完成、失败、升级的判定</text></g>
<rect x="455" y="235" width="290" height="170" rx="28" class="agent"/><text x="600" y="304" text-anchor="middle" class="w">Subagent</text><text x="600" y="340" text-anchor="middle" font-size="18" fill="#d1d5db">隔离上下文中独立调查</text>
<g transform="translate(820 155)"><rect width="300" height="330" rx="20" class="card"/><rect width="300" height="58" rx="20" class="head"/><text x="150" y="37" text-anchor="middle" class="h">输出契约</text><text x="34" y="112" class="t">结论</text><text x="34" y="140" class="b">发现了什么，置信度如何</text><text x="34" y="190" class="t">证据</text><text x="34" y="218" class="b">文件位置、引用、日志片段</text><text x="34" y="268" class="t">下一步</text><text x="34" y="296" class="b">建议修复或需主线判断</text></g>
<path d="M380 320 L445 320" class="line"/><path d="M745 320 L810 320" class="line"/>
</svg>