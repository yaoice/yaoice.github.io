<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="Message Bus 工作流">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">Message Bus 工作流</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">原始告警 → 分类 → 路由 → 调查 → 响应</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="50" y="240" width="160" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="66" y="258" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="84" y="267" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Alert</text>
  <text x="66" y="292" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">原始告警</text>
  <rect x="235" y="240" width="160" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="251" y="258" width="10" height="10" rx="2" fill="#b45309"/>
  <text x="269" y="267" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Triage</text>
  <text x="251" y="292" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">分类严重度</text>
  <rect x="420" y="240" width="160" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="436" y="258" width="10" height="10" rx="2" fill="#b45309"/>
  <text x="454" y="267" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Bus</text>
  <text x="436" y="292" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">路由 Topic</text>
  <rect x="605" y="240" width="160" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="621" y="258" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="639" y="267" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Investigation</text>
  <text x="621" y="292" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">调查 / 富化</text>
  <rect x="790" y="240" width="160" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="806" y="258" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="824" y="267" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Findings</text>
  <text x="806" y="292" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">发布发现</text>
  <rect x="975" y="240" width="160" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="991" y="258" width="10" height="10" rx="2" fill="#be123c"/>
  <text x="1009" y="267" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Response</text>
  <text x="991" y="292" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">响应动作</text>
  <line x1="210" y1="290" x2="235" y2="290" stroke="#b45309" stroke-width="2" stroke-linecap="round" marker-end="url(#m-amber)"/>
  <line x1="395" y1="290" x2="420" y2="290" stroke="#b45309" stroke-width="2" stroke-linecap="round" marker-end="url(#m-amber)"/>
  <line x1="580" y1="290" x2="605" y2="290" stroke="#0d9488" stroke-width="2" stroke-linecap="round" marker-end="url(#m-teal)"/>
  <line x1="765" y1="290" x2="790" y2="290" stroke="#1f4ed8" stroke-width="2" stroke-linecap="round" marker-end="url(#m-blue)"/>
  <line x1="950" y1="290" x2="975" y2="290" stroke="#be123c" stroke-width="2" stroke-linecap="round" marker-end="url(#m-rose)"/>
  <rect x="240" y="420" width="720" height="90" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="240" y="420" width="3" height="90" rx="1.5" fill="#be123c"/>
  <text x="260" y="448" text-anchor="start" font-size="14" font-weight="650" fill="#111827">可观测性要求</text>
  <text x="260" y="472" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">必须记录 correlation ID、路由结果与未匹配事件。</text>
  <text x="260" y="494" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">否则错误分类会造成静默失败，难以追踪。</text>
</svg>
