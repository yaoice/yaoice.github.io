<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="Generator–Verifier 工作流">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">Generator–Verifier 工作流</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">通过 / 反馈 / 降级三条路径都明确可达</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="90" y="200" width="160" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="106" y="218" width="10" height="10" rx="2" fill="#334155"/>
  <text x="124" y="227" text-anchor="start" font-size="14" font-weight="650" fill="#111827">输入任务</text>
  <text x="106" y="252" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">需求与验收标准</text>
  <rect x="310" y="200" width="160" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="326" y="218" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="344" y="227" text-anchor="start" font-size="14" font-weight="650" fill="#111827">生成候选</text>
  <text x="326" y="252" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">Generator</text>
  <rect x="530" y="200" width="160" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="546" y="218" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="564" y="227" text-anchor="start" font-size="14" font-weight="650" fill="#111827">执行验证</text>
  <text x="546" y="252" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">Verifier</text>
  <rect x="750" y="200" width="160" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="766" y="218" width="10" height="10" rx="2" fill="#b45309"/>
  <text x="784" y="227" text-anchor="start" font-size="14" font-weight="650" fill="#111827">决策</text>
  <text x="766" y="252" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">pass / fail</text>
  <rect x="970" y="200" width="160" height="100" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="986" y="218" width="10" height="10" rx="2" fill="#4f46e5"/>
  <text x="1004" y="227" text-anchor="start" font-size="14" font-weight="650" fill="#111827">交付</text>
  <text x="986" y="252" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">输出或升级</text>
  <line x1="250" y1="250" x2="310" y2="250" stroke="#1f4ed8" stroke-width="2" stroke-linecap="round" marker-end="url(#m-blue)"/>
  <line x1="470" y1="250" x2="530" y2="250" stroke="#0d9488" stroke-width="2" stroke-linecap="round" marker-end="url(#m-teal)"/>
  <line x1="690" y1="250" x2="750" y2="250" stroke="#b45309" stroke-width="2" stroke-linecap="round" marker-end="url(#m-amber)"/>
  <line x1="910" y1="250" x2="970" y2="250" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" marker-end="url(#m-indigo)"/>
  <rect x="310" y="400" width="600" height="86" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="310" y="400" width="3" height="86" rx="1.5" fill="#be123c"/>
  <text x="324" y="428" text-anchor="start" font-size="14" font-weight="650" fill="#111827">失败分支</text>
  <text x="324" y="450" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">Verifier 返回具体可执行的反馈，Generator 仅修改未达标部分。</text>
  <text x="324" y="470" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">达到最大迭代次数后，进入 human escalation 或 best-effort fallback。</text>
  <path d="M 830 300 L 830 400" fill="none" stroke="#be123c" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-rose)" stroke-dasharray="6 4"/>
  <path d="M 390 400 L 390 300" fill="none" stroke="#be123c" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter" marker-end="url(#m-rose)" stroke-dasharray="6 4"/>
</svg>
