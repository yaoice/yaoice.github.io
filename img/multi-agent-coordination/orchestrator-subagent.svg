<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
<title id="title">Orchestrator-Subagent 编排架构</title><desc id="desc">展示中心编排器如何派发四个独立子任务并合成结果。</desc>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#047857"/></marker><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:34px;font-weight:800;fill:#111827}.sub{font-size:18px;fill:#4b5563}.box{fill:#fff;stroke:#d1d5db;stroke-width:1.8}.hub{fill:#064e3b}.h{font-size:22px;font-weight:800;fill:#111827}.b{font-size:17px;fill:#374151}.w{font-size:24px;font-weight:800;fill:#fff}.line{stroke:#047857;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
<rect width="1200" height="680" fill="#f8fafc"/>
<text x="600" y="54" text-anchor="middle" class="title">Orchestrator-Subagent：一个中心目标，多个隔离调查</text>
<text x="600" y="86" text-anchor="middle" class="sub">适合“子任务边界清楚，但最终需要统一判断”的场景</text>
<rect x="430" y="125" width="340" height="115" rx="22" class="hub"/><text x="600" y="170" text-anchor="middle" class="w">Orchestrator</text><text x="600" y="205" text-anchor="middle" font-size="17" fill="#d1fae5">拆解任务 · 派发上下文 · 合成结论</text>
<g transform="translate(70 330)"><rect width="240" height="120" rx="18" class="box"/><text x="120" y="45" text-anchor="middle" class="h">安全 Subagent</text><text x="120" y="78" text-anchor="middle" class="b">权限、注入、越权</text></g>
<g transform="translate(350 330)"><rect width="240" height="120" rx="18" class="box"/><text x="120" y="45" text-anchor="middle" class="h">测试 Subagent</text><text x="120" y="78" text-anchor="middle" class="b">覆盖率、失败用例</text></g>
<g transform="translate(630 330)"><rect width="240" height="120" rx="18" class="box"/><text x="120" y="45" text-anchor="middle" class="h">架构 Subagent</text><text x="120" y="78" text-anchor="middle" class="b">依赖、分层、边界</text></g>
<g transform="translate(910 330)"><rect width="240" height="120" rx="18" class="box"/><text x="120" y="45" text-anchor="middle" class="h">文档 Subagent</text><text x="120" y="78" text-anchor="middle" class="b">API、README、示例</text></g>
<rect x="430" y="540" width="340" height="80" rx="20" fill="#ecfdf5" stroke="#22c55e" stroke-width="1.8"/><text x="600" y="573" text-anchor="middle" class="h">综合输出</text><text x="600" y="602" text-anchor="middle" class="b">去重、排序、处理冲突、保留证据</text>
<path d="M535 240 C420 280 260 280 190 320" class="line"/><path d="M575 240 C540 280 505 295 470 320" class="line"/><path d="M625 240 C660 280 695 295 750 320" class="line"/><path d="M665 240 C790 280 960 280 1030 320" class="line"/>
