<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e" />
      <stop offset="100%" style="stop-color:#16213e" />
    </linearGradient>
    <linearGradient id="orch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb" />
      <stop offset="100%" style="stop-color:#f5576c" />
    </linearGradient>
    <linearGradient id="sub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe" />
      <stop offset="100%" style="stop-color:#00f2fe" />
    </linearGradient>
    <filter id="ds2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="aW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fff"/></marker>
    <marker id="aP" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f093fb"/></marker>
    <marker id="aB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4facfe"/></marker>
  </defs>

  <rect width="900" height="520" fill="url(#bg2)" rx="10"/>
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">Orchestrator-Subagent 模式架构</text>

  <!-- Task Input -->
  <rect x="365" y="65" width="170" height="55" rx="10" fill="#2d2d44" stroke="#f093fb" stroke-width="2" filter="url(#ds2)"/>
  <text x="450" y="90" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">复杂任务输入</text>
  <text x="450" y="107" text-anchor="middle" fill="#aaa" font-size="10">Complex Task</text>
  <line x1="450" y1="120" x2="450" y2="150" stroke="#f093fb" stroke-width="2" marker-end="url(#aP)"/>

  <!-- Orchestrator -->
  <rect x="300" y="155" width="300" height="120" rx="14" fill="url(#orch)" filter="url(#ds2)"/>
  <text x="450" y="190" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">🎯 编排器 Orchestrator</text>
  <line x1="325" y1="200" x2="575" y2="200" stroke="rgba(255,255,255,0.3)"/>
  <text x="450" y="222" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="12">① 分析任务 → ② 制定计划 → ③ 分发子任务</text>
  <text x="450" y="242" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="12">④ 收集结果 → ⑤ 综合输出</text>
  <text x="450" y="262" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">中央决策 · 全局视图 · 结果汇聚</text>

  <!-- Arrows down to subagents -->
  <line x1="150" y1="275" x2="150" y2="340" stroke="#fff" stroke-width="1.5" marker-end="url(#aW)"/>
  <line x1="350" y1="275" x2="350" y2="340" stroke="#fff" stroke-width="1.5" marker-end="url(#aW)"/>
  <line x1="550" y1="275" x2="550" y2="340" stroke="#fff" stroke-width="1.5" marker-end="url(#aW)"/>
  <line x1="750" y1="275" x2="750" y2="340" stroke="#fff" stroke-width="1.5" marker-end="url(#aW)"/>
  <!-- Horizontal distribution line -->
  <line x1="150" y1="275" x2="750" y2="275" stroke="#fff" stroke-width="1.5"/>
  <line x1="450" y1="275" x2="450" y2="265" stroke="#fff" stroke-width="1.5"/>

  <!-- Subagent 1 -->
  <rect x="60" y="345" width="180" height="100" rx="12" fill="url(#sub)" filter="url(#ds2)"/>
  <text x="150" y="375" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🔒 安全检查</text>
  <text x="150" y="395" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Security Audit Agent</text>
  <text x="150" y="420" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">漏洞扫描 · 依赖检查</text>
  <text x="150" y="435" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">SQL注入 · XSS · CSRF</text>

  <!-- Subagent 2 -->
  <rect x="260" y="345" width="180" height="100" rx="12" fill="url(#sub)" filter="url(#ds2)"/>
  <text x="350" y="375" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🧪 测试覆盖</text>
  <text x="350" y="395" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Test Coverage Agent</text>
  <text x="350" y="420" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">单元测试 · 集成测试</text>
  <text x="350" y="435" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">边界条件 · 异常路径</text>

  <!-- Subagent 3 -->
  <rect x="460" y="345" width="180" height="100" rx="12" fill="url(#sub)" filter="url(#ds2)"/>
  <text x="550" y="375" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">📐 代码风格</text>
  <text x="550" y="395" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Style Check Agent</text>
  <text x="550" y="420" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">规范检查 · 格式统一</text>
  <text x="550" y="435" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">命名规范 · 复杂度分析</text>

  <!-- Subagent 4 -->
  <rect x="660" y="345" width="180" height="100" rx="12" fill="url(#sub)" filter="url(#ds2)"/>
  <text x="750" y="375" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">⚡ 性能分析</text>
  <text x="750" y="395" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Performance Agent</text>
  <text x="750" y="420" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">热点分析 · 内存检查</text>
  <text x="750" y="435" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">算法优化 · 资源使用</text>

  <!-- Return arrows -->
  <line x1="150" y1="445" x2="150" y2="490" stroke="#4facfe" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="350" y1="445" x2="350" y2="490" stroke="#4facfe" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="550" y1="445" x2="550" y2="490" stroke="#4facfe" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="750" y1="445" x2="750" y2="490" stroke="#4facfe" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="150" y1="490" x2="750" y2="490" stroke="#4facfe" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="450" y="508" text-anchor="middle" fill="#4facfe" font-size="12">📊 结果汇总至编排器 → 生成统一报告</text>
</svg>
