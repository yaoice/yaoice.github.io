<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="四个关键选型问题">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">四个关键选型问题</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">把模式切换点还原成可回答的工程问题</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="90" y="150" width="490" height="170" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="106" y="168" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="124" y="177" text-anchor="start" font-size="15" font-weight="650" fill="#111827">1. Worker 是否需要长期上下文？</text>
  <text x="106" y="202" text-anchor="start" font-size="13" font-weight="500" fill="#374151">否 → Orchestrator–Subagent</text>
  <text x="106" y="220" text-anchor="start" font-size="13" font-weight="500" fill="#374151">是 → Agent Teams</text>
  <rect x="620" y="150" width="490" height="170" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="636" y="168" width="10" height="10" rx="2" fill="#b45309"/>
  <text x="654" y="177" text-anchor="start" font-size="15" font-weight="650" fill="#111827">2. 工作流路径是否可预测？</text>
  <text x="636" y="202" text-anchor="start" font-size="13" font-weight="500" fill="#374151">可预测 → Orchestrator</text>
  <text x="636" y="220" text-anchor="start" font-size="13" font-weight="500" fill="#374151">事件触发 → Message Bus</text>
  <rect x="90" y="360" width="490" height="170" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="106" y="378" width="10" height="10" rx="2" fill="#be123c"/>
  <text x="124" y="387" text-anchor="start" font-size="15" font-weight="650" fill="#111827">3. 是否需要共享中间发现？</text>
  <text x="106" y="412" text-anchor="start" font-size="13" font-weight="500" fill="#374151">只汇总最终结果 → Agent Teams</text>
  <text x="106" y="430" text-anchor="start" font-size="13" font-weight="500" fill="#374151">实时共享发现 → Shared State</text>
  <rect x="620" y="360" width="490" height="170" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="636" y="378" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="654" y="387" text-anchor="start" font-size="15" font-weight="650" fill="#111827">4. 工作流本质是事件还是知识？</text>
  <text x="636" y="412" text-anchor="start" font-size="13" font-weight="500" fill="#374151">触发动作 → Message Bus</text>
  <text x="636" y="430" text-anchor="start" font-size="13" font-weight="500" fill="#374151">积累发现 → Shared State</text>
</svg>
