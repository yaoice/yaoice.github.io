<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="Reactive Loop 防护">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">Reactive Loop 防护</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">共享状态必须显式定义停止条件，避免 Agent 相互触发</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="120" y="300" width="200" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="136" y="318" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="154" y="327" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Agent A</text>
  <text x="136" y="352" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">写入发现</text>
  <rect x="500" y="290" width="200" height="116" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="516" y="308" width="10" height="10" rx="2" fill="#be123c"/>
  <text x="534" y="317" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Shared Store</text>
  <text x="516" y="342" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">状态变更</text>
  <rect x="880" y="300" width="200" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="896" y="318" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="914" y="327" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Agent B</text>
  <text x="896" y="352" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">写入后续发现</text>
  <line x1="320" y1="348" x2="500" y2="348" stroke="#1f4ed8" stroke-width="2" stroke-linecap="round" marker-end="url(#m-blue)"/>
  <rect x="376.0" y="326.0" width="68" height="18" rx="4" fill="#f7f9fc" stroke="#e5e7eb" stroke-width="1"/>
  <text x="410.0" y="339.0" text-anchor="middle" font-size="11" font-weight="600" fill="#1f4ed8">write</text>
  <line x1="700" y1="348" x2="880" y2="348" stroke="#1f4ed8" stroke-width="2" stroke-linecap="round" marker-end="url(#m-blue)"/>
  <rect x="744.0" y="326.0" width="92" height="18" rx="4" fill="#f7f9fc" stroke="#e5e7eb" stroke-width="1"/>
  <text x="790.0" y="339.0" text-anchor="middle" font-size="11" font-weight="600" fill="#1f4ed8">trigger</text>
  <path d="M 980 396 V 460 H 220 V 396" fill="none" stroke="#be123c" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#m-rose)"/>
  <text x="600" y="484" text-anchor="middle" font-size="12.5" font-weight="600" fill="#be123c">无限循环风险：A 的写入触发 B，B 的写入再触发 A</text>
  <text x="72" y="140" text-anchor="start" font-size="12" font-weight="600" fill="#9ca3af">必须配套任一条件</text>
  <rect x="90" y="170" width="250" height="40" rx="10" ry="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="90" y="170" width="3" height="40" rx="1.5" fill="#be123c"/>
  <text x="108" y="195" text-anchor="start" font-size="13" font-weight="600" fill="#111827">时间预算</text>
  <rect x="350" y="170" width="250" height="40" rx="10" ry="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="350" y="170" width="3" height="40" rx="1.5" fill="#be123c"/>
  <text x="368" y="195" text-anchor="start" font-size="13" font-weight="600" fill="#111827">N 轮无新发现</text>
  <rect x="610" y="170" width="250" height="40" rx="10" ry="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="610" y="170" width="3" height="40" rx="1.5" fill="#be123c"/>
  <text x="628" y="195" text-anchor="start" font-size="13" font-weight="600" fill="#111827">收敛阈值</text>
  <rect x="870" y="170" width="250" height="40" rx="10" ry="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="870" y="170" width="3" height="40" rx="1.5" fill="#be123c"/>
  <text x="888" y="195" text-anchor="start" font-size="13" font-weight="600" fill="#111827">Judge Agent 判定</text>
</svg>
