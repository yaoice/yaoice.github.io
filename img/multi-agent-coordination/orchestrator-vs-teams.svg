<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="Orchestrator–Subagent vs Agent Teams">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">Orchestrator–Subagent vs Agent Teams</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">核心差异：Subagent 是一次性，Worker 是持久的</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="90" y="150" width="480" height="360" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="106" y="168" width="10" height="10" rx="2" fill="#4f46e5"/>
  <text x="124" y="177" text-anchor="start" font-size="16" font-weight="650" fill="#111827">Orchestrator–Subagent</text>
  <text x="106" y="202" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">Subagent 任务完成即销毁</text>
  <text x="106" y="220" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">上下文主要留在 Lead Agent</text>
  <text x="106" y="238" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">适合：短、聚焦、一次性子任务</text>
  <rect x="630" y="150" width="480" height="360" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="646" y="168" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="664" y="177" text-anchor="start" font-size="16" font-weight="650" fill="#111827">Agent Teams</text>
  <text x="646" y="202" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">Worker 持续存在，跨任务保留上下文</text>
  <text x="646" y="220" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">从共享队列持续认领任务</text>
  <text x="646" y="238" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">适合：长期、多步骤、独立分区</text>
  <rect x="128" y="320" width="138" height="24" rx="12.0" ry="12.0" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/>
  <text x="197.0" y="336.0" text-anchor="middle" font-size="11.5" font-weight="600" fill="#4f46e5">Subagent 1</text>
  <rect x="258" y="320" width="138" height="24" rx="12.0" ry="12.0" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/>
  <text x="327.0" y="336.0" text-anchor="middle" font-size="11.5" font-weight="600" fill="#4f46e5">Subagent 2</text>
  <rect x="388" y="320" width="138" height="24" rx="12.0" ry="12.0" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/>
  <text x="457.0" y="336.0" text-anchor="middle" font-size="11.5" font-weight="600" fill="#4f46e5">Subagent 3</text>
  <rect x="668" y="320" width="112" height="24" rx="12.0" ry="12.0" fill="#ecfdf5" stroke="#0d9488" stroke-width="1"/>
  <text x="724.0" y="336.0" text-anchor="middle" font-size="11.5" font-weight="600" fill="#0d9488">Worker 1</text>
  <rect x="798" y="320" width="112" height="24" rx="12.0" ry="12.0" fill="#ecfdf5" stroke="#0d9488" stroke-width="1"/>
  <text x="854.0" y="336.0" text-anchor="middle" font-size="11.5" font-weight="600" fill="#0d9488">Worker 2</text>
  <rect x="928" y="320" width="112" height="24" rx="12.0" ry="12.0" fill="#ecfdf5" stroke="#0d9488" stroke-width="1"/>
  <text x="984.0" y="336.0" text-anchor="middle" font-size="11.5" font-weight="600" fill="#0d9488">Worker 3</text>
  <text x="330" y="420" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4f46e5">一次性调用 · 结果回传后释放</text>
  <text x="870" y="420" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0d9488">持续存活 · 上下文积累</text>
</svg>
