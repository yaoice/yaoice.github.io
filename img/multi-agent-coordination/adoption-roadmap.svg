<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 640" role="img" aria-label="落地路线：按真实瓶颈演进">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#dbe2ee" opacity="0.55"/></pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.06"/></filter>
    <marker id="m-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#334155"/></marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#1f4ed8"/></marker>
    <marker id="m-indigo" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#4f46e5"/></marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#0d9488"/></marker>
    <marker id="m-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#b45309"/></marker>
    <marker id="m-rose" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#be123c"/></marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect width="1200" height="640" fill="url(#dots)"/>
  <text x="72" y="56" text-anchor="start" font-size="22" font-weight="700" fill="#111827">落地路线：按真实瓶颈演进</text>
  <text x="72" y="82" text-anchor="start" font-size="13.5" font-weight="500" fill="#6b7280">不要一次性设计终局架构；先让最小系统可观测地运行</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="50" y="240" width="165" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="66" y="258" width="10" height="10" rx="2" fill="#334155"/>
  <text x="84" y="267" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Step 0</text>
  <text x="66" y="292" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">单 Agent</text>
  <rect x="235" y="240" width="165" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="251" y="258" width="10" height="10" rx="2" fill="#4f46e5"/>
  <text x="269" y="267" text-anchor="start" font-size="14" font-weight="650" fill="#111827">Step 1</text>
  <text x="251" y="292" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">Orchestrator</text>
  <rect x="420" y="240" width="165" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="436" y="258" width="10" height="10" rx="2" fill="#1f4ed8"/>
  <text x="454" y="267" text-anchor="start" font-size="14" font-weight="650" fill="#111827">瓶颈 A</text>
  <text x="436" y="292" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">质量不足 · GV</text>
  <rect x="605" y="240" width="165" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="621" y="258" width="10" height="10" rx="2" fill="#0d9488"/>
  <text x="639" y="267" text-anchor="start" font-size="14" font-weight="650" fill="#111827">瓶颈 B</text>
  <text x="621" y="292" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">长期并行 · Teams</text>
  <rect x="790" y="240" width="165" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="806" y="258" width="10" height="10" rx="2" fill="#b45309"/>
  <text x="824" y="267" text-anchor="start" font-size="14" font-weight="650" fill="#111827">瓶颈 C</text>
  <text x="806" y="292" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">事件驱动 · Bus</text>
  <rect x="975" y="240" width="165" height="96" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="991" y="258" width="10" height="10" rx="2" fill="#be123c"/>
  <text x="1009" y="267" text-anchor="start" font-size="14" font-weight="650" fill="#111827">瓶颈 D</text>
  <text x="991" y="292" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">共享发现 · Shared</text>
  <line x1="215" y1="288" x2="235" y2="288" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" marker-end="url(#m-indigo)"/>
  <line x1="400" y1="288" x2="420" y2="288" stroke="#1f4ed8" stroke-width="2" stroke-linecap="round" marker-end="url(#m-blue)"/>
  <line x1="585" y1="288" x2="605" y2="288" stroke="#0d9488" stroke-width="2" stroke-linecap="round" marker-end="url(#m-teal)"/>
  <line x1="770" y1="288" x2="790" y2="288" stroke="#b45309" stroke-width="2" stroke-linecap="round" marker-end="url(#m-amber)"/>
  <line x1="955" y1="288" x2="975" y2="288" stroke="#be123c" stroke-width="2" stroke-linecap="round" marker-end="url(#m-rose)"/>
  <rect x="310" y="420" width="580" height="92" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#soft)"/>
  <rect x="310" y="420" width="3" height="92" rx="1.5" fill="#334155"/>
  <text x="328" y="446" text-anchor="start" font-size="14" font-weight="650" fill="#111827">工程检查点</text>
  <text x="328" y="468" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">升级前先回答：当前模式具体在哪里失败？</text>
  <text x="328" y="490" text-anchor="start" font-size="12.5" font-weight="500" fill="#374151">能否通过更严格的约束、更好的可观测性先解决？</text>
</svg>
