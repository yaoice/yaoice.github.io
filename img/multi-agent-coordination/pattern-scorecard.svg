<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
<title id="title">五种模式工程评分卡</title><desc id="desc">用清晰表格比较五种多智能体模式的能力强弱。</desc>
<defs><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:34px;font-weight:800;fill:#111827}.sub{font-size:17px;fill:#4b5563}.head{font-size:17px;font-weight:800;fill:#111827}.row{font-size:17px;font-weight:800;fill:#111827}.cellText{font-size:16px;font-weight:800;fill:#111827}.grid{fill:#fff;stroke:#d1d5db}.low{fill:#f3f4f6}.mid{fill:#bfdbfe}.high{fill:#86efac}.risk{fill:#fecaca}</style></defs>
<rect width="1200" height="680" fill="#f8fafc"/>
<text x="600" y="54" text-anchor="middle" class="title">五种模式工程评分卡：能力越强，治理成本也可能越高</text>
<text x="600" y="86" text-anchor="middle" class="sub">深色不是“更好”，而是说明该模式更擅长对应维度；红色表示调试或治理复杂度高</text>
<g transform="translate(70 130)">
  <rect width="1060" height="390" rx="16" fill="#fff" stroke="#d1d5db"/>
  <text x="40" y="45" class="head">模式</text><text x="270" y="45" text-anchor="middle" class="head">质量控制</text><text x="430" y="45" text-anchor="middle" class="head">并行度</text><text x="590" y="45" text-anchor="middle" class="head">动态路由</text><text x="760" y="45" text-anchor="middle" class="head">知识共享</text><text x="930" y="45" text-anchor="middle" class="head">治理复杂度</text>
  <g transform="translate(0 70)">
    <text x="40" y="31" class="row">Generator-Verifier</text><rect x="210" y="0" width="120" height="44" rx="10" class="high"/><text x="270" y="28" text-anchor="middle" class="cellText">强</text><rect x="370" y="0" width="120" height="44" rx="10" class="low"/><text x="430" y="28" text-anchor="middle" class="cellText">弱</text><rect x="530" y="0" width="120" height="44" rx="10" class="low"/><text x="590" y="28" text-anchor="middle" class="cellText">弱</text><rect x="700" y="0" width="120" height="44" rx="10" class="low"/><text x="760" y="28" text-anchor="middle" class="cellText">弱</text><rect x="870" y="0" width="120" height="44" rx="10" class="mid"/><text x="930" y="28" text-anchor="middle" class="cellText">中</text>
  </g>
  <g transform="translate(0 130)">
    <text x="40" y="31" class="row">Orchestrator-Subagent</text><rect x="210" y="0" width="120" height="44" rx="10" class="mid"/><text x="270" y="28" text-anchor="middle" class="cellText">中</text><rect x="370" y="0" width="120" height="44" rx="10" class="mid"/><text x="430" y="28" text-anchor="middle" class="cellText">中</text><rect x="530" y="0" width="120" height="44" rx="10" class="low"/><text x="590" y="28" text-anchor="middle" class="cellText">弱</text><rect x="700" y="0" width="120" height="44" rx="10" class="low"/><text x="760" y="28" text-anchor="middle" class="cellText">弱</text><rect x="870" y="0" width="120" height="44" rx="10" class="mid"/><text x="930" y="28" text-anchor="middle" class="cellText">中</text>
  </g>
  <g transform="translate(0 190)">
    <text x="40" y="31" class="row">Agent Teams</text><rect x="210" y="0" width="120" height="44" rx="10" class="mid"/><text x="270" y="28" text-anchor="middle" class="cellText">中</text><rect x="370" y="0" width="120" height="44" rx="10" class="high"/><text x="430" y="28" text-anchor="middle" class="cellText">强</text><rect x="530" y="0" width="120" height="44" rx="10" class="low"/><text x="590" y="28" text-anchor="middle" class="cellText">弱</text><rect x="700" y="0" width="120" height="44" rx="10" class="mid"/><text x="760" y="28" text-anchor="middle" class="cellText">中</text><rect x="870" y="0" width="120" height="44" rx="10" class="risk"/><text x="930" y="28" text-anchor="middle" class="cellText">高</text>
  </g>
  <g transform="translate(0 250)">
    <text x="40" y="31" class="row">Message Bus</text><rect x="210" y="0" width="120" height="44" rx="10" class="mid"/><text x="270" y="28" text-anchor="middle" class="cellText">中</text><rect x="370" y="0" width="120" height="44" rx="10" class="mid"/><text x="430" y="28" text-anchor="middle" class="cellText">中</text><rect x="530" y="0" width="120" height="44" rx="10" class="high"/><text x="590" y="28" text-anchor="middle" class="cellText">强</text><rect x="700" y="0" width="120" height="44" rx="10" class="mid"/><text x="760" y="28" text-anchor="middle" class="cellText">中</text><rect x="870" y="0" width="120" height="44" rx="10" class="risk"/><text x="930" y="28" text-anchor="middle" class="cellText">高</text>
  </g>
  <g transform="translate(0 310)">
    <text x="40" y="31" class="row">Shared State</text><rect x="210" y="0" width="120" height="44" rx="10" class="low"/><text x="270" y="28" text-anchor="middle" class="cellText">弱</text><rect x="370" y="0" width="120" height="44" rx="10" class="mid"/><text x="430" y="28" text-anchor="middle" class="cellText">中</text><rect x="530" y="0" width="120" height="44" rx="10" class="mid"/><text x="590" y="28" text-anchor="middle" class="cellText">中</text><rect x="700" y="0" width="120" height="44" rx="10" class="high"/><text x="760" y="28" text-anchor="middle" class="cellText">强</text><rect x="870" y="0" width="120" height="44" rx="10" class="risk"/><text x="930" y="28" text-anchor="middle" class="cellText">高</text>
  </g>
</g>
<text x="600" y="595" text-anchor="middle" font-size="17" font-weight="700" fill="#374151">读法：先找当前最大瓶颈，再看该模式的治理成本是否可接受。</text>
</svg>