<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
<title id="title">Message Bus Topic 路由</title><desc id="desc">展示事件经消息总线按 Topic 路由到不同 Agent。</desc>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#6d28d9"/></marker><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.title{font-size:34px;font-weight:800;fill:#111827}.sub{font-size:18px;fill:#4b5563}.box{fill:#fff;stroke:#d1d5db;stroke-width:1.7}.bus{fill:#312e81}.topic{fill:#ede9fe;stroke:#8b5cf6;stroke-width:1.6}.h{font-size:21px;font-weight:800;fill:#111827}.b{font-size:16px;fill:#374151}.w{font-size:23px;font-weight:800;fill:#fff}.line{stroke:#6d28d9;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
<rect width="1200" height="680" fill="#faf5ff"/>
<text x="600" y="54" text-anchor="middle" class="title">Message Bus：用 Topic 路由替代中心 if/else 爆炸</text>
<text x="600" y="86" text-anchor="middle" class="sub">左侧发布事件，中间只负责路由，右侧 Agent 各自订阅明确 Topic</text>
<g transform="translate(70 160)"><rect width="230" height="96" rx="18" class="box"/><text x="115" y="38" text-anchor="middle" class="h">事件来源</text><text x="115" y="67" text-anchor="middle" class="b">日志 / 告警 / 工单</text></g>
<g transform="translate(70 360)"><rect width="230" height="96" rx="18" class="box"/><text x="115" y="38" text-anchor="middle" class="h">Triage Agent</text><text x="115" y="67" text-anchor="middle" class="b">分类、打分、发布</text></g>
<rect x="430" y="145" width="340" height="350" rx="28" class="bus"/><text x="600" y="190" text-anchor="middle" class="w">Message Bus</text><g transform="translate(480 230)"><rect width="240" height="54" rx="13" class="topic"/><text x="120" y="35" text-anchor="middle" class="h">network.alert</text></g><g transform="translate(480 315)"><rect width="240" height="54" rx="13" class="topic"/><text x="120" y="35" text-anchor="middle" class="h">identity.alert</text></g><g transform="translate(480 400)"><rect width="240" height="54" rx="13" class="topic"/><text x="120" y="35" text-anchor="middle" class="h">enrich.request</text></g>
<g transform="translate(890 145)"><rect width="230" height="88" rx="18" class="box"/><text x="115" y="36" text-anchor="middle" class="h">Network Agent</text><text x="115" y="64" text-anchor="middle" class="b">调查网络异常</text></g><g transform="translate(890 300)"><rect width="230" height="88" rx="18" class="box"/><text x="115" y="36" text-anchor="middle" class="h">Identity Agent</text><text x="115" y="64" text-anchor="middle" class="b">分析账号凭证</text></g><g transform="translate(890 455)"><rect width="230" height="88" rx="18" class="box"/><text x="115" y="36" text-anchor="middle" class="h">Context Agent</text><text x="115" y="64" text-anchor="middle" class="b">补充资产情报</text></g>
<path d="M300 208 L420 252" class="line"/><path d="M300 408 L420 428" class="line"/><path d="M720 257 C790 235 830 190 880 189" class="line"/><path d="M720 342 L880 344" class="line"/><path d="M720 427 C790 455 830 490 880 499" class="line"/>
<rect x="265" y="590" width="670" height="42" rx="21" fill="#fff" stroke="#c4b5fd"/><text x="600" y="617" text-anchor="middle" font-size="17" font-weight="800" fill="#5b21b6">生产要求：记录 correlation ID、路由置信度、未匹配事件和死信队列</text>
</svg>