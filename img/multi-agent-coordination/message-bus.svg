<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e" />
      <stop offset="100%" style="stop-color:#16213e" />
    </linearGradient>
    <linearGradient id="bus" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b" />
      <stop offset="30%" style="stop-color:#38f9d7" />
      <stop offset="70%" style="stop-color:#4facfe" />
      <stop offset="100%" style="stop-color:#667eea" />
    </linearGradient>
    <linearGradient id="pub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb" />
      <stop offset="100%" style="stop-color:#f5576c" />
    </linearGradient>
    <linearGradient id="subsc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea" />
      <stop offset="100%" style="stop-color:#764ba2" />
    </linearGradient>
    <linearGradient id="router" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a" />
      <stop offset="100%" style="stop-color:#fee140" />
    </linearGradient>
    <filter id="ds4" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="520" fill="url(#bg4)" rx="10"/>
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">Message Bus 模式架构</text>

  <!-- Publishers (Top) -->
  <text x="450" y="72" text-anchor="middle" fill="#f5576c" font-size="13" font-weight="bold">发布者 Publishers</text>

  <rect x="40" y="85" width="160" height="80" rx="12" fill="url(#pub)" filter="url(#ds4)"/>
  <text x="120" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🚨 告警分类器</text>
  <text x="120" y="135" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Alert Triage Agent</text>
  <text x="120" y="152" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">publish("security.*")</text>

  <rect x="230" y="85" width="160" height="80" rx="12" fill="url(#pub)" filter="url(#ds4)"/>
  <text x="310" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">📊 指标监控</text>
  <text x="310" y="135" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Metrics Monitor</text>
  <text x="310" y="152" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">publish("perf.*")</text>

  <rect x="510" y="85" width="160" height="80" rx="12" fill="url(#pub)" filter="url(#ds4)"/>
  <text x="590" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">📝 日志分析器</text>
  <text x="590" y="135" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Log Analyzer</text>
  <text x="590" y="152" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">publish("log.*")</text>

  <rect x="700" y="85" width="160" height="80" rx="12" fill="url(#pub)" filter="url(#ds4)"/>
  <text x="780" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🔔 事件源</text>
  <text x="780" y="135" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Event Source</text>
  <text x="780" y="152" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">publish("event.*")</text>

  <!-- Publish arrows -->
  <line x1="120" y1="165" x2="120" y2="215" stroke="#f5576c" stroke-width="1.5" opacity="0.6"/>
  <line x1="310" y1="165" x2="310" y2="215" stroke="#f5576c" stroke-width="1.5" opacity="0.6"/>
  <line x1="590" y1="165" x2="590" y2="215" stroke="#f5576c" stroke-width="1.5" opacity="0.6"/>
  <line x1="780" y1="165" x2="780" y2="215" stroke="#f5576c" stroke-width="1.5" opacity="0.6"/>

  <!-- Message Bus Bar -->
  <rect x="30" y="220" width="840" height="60" rx="12" fill="url(#bus)" filter="url(#ds4)"/>
  <text x="450" y="248" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">📡 消息总线 Message Bus</text>
  <text x="450" y="268" text-anchor="middle" fill="rgba(26,26,46,0.6)" font-size="10">Topic Routing · Pattern Matching · Event Distribution</text>

  <!-- Router -->
  <rect x="360" y="310" width="180" height="55" rx="10" fill="url(#router)" filter="url(#ds4)"/>
  <text x="450" y="335" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold">🔀 消息路由器 Router</text>
  <text x="450" y="353" text-anchor="middle" fill="rgba(26,26,46,0.6)" font-size="10">按 topic 分发到订阅者</text>
  <line x1="450" y1="280" x2="450" y2="305" stroke="#fee140" stroke-width="2"/>

  <!-- Subscribe arrows -->
  <line x1="360" y1="345" x2="120" y2="395" stroke="#667eea" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="410" y1="365" x2="350" y2="395" stroke="#667eea" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="490" y1="365" x2="580" y2="395" stroke="#667eea" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="540" y1="345" x2="780" y2="395" stroke="#667eea" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Subscribers (Bottom) -->
  <text x="450" y="390" text-anchor="middle" fill="#667eea" font-size="13" font-weight="bold">订阅者 Subscribers</text>

  <rect x="30" y="400" width="180" height="95" rx="12" fill="url(#subsc)" filter="url(#ds4)"/>
  <text x="120" y="428" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🔍 安全调查</text>
  <text x="120" y="448" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Security Investigator</text>
  <text x="120" y="468" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">subscribe("security.*")</text>
  <text x="120" y="485" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="9">漏洞分析 · 威胁评估</text>

  <rect x="240" y="400" width="180" height="95" rx="12" fill="url(#subsc)" filter="url(#ds4)"/>
  <text x="330" y="428" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">📈 性能优化</text>
  <text x="330" y="448" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Performance Optimizer</text>
  <text x="330" y="468" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">subscribe("perf.*")</text>
  <text x="330" y="485" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="9">瓶颈定位 · 扩容建议</text>

  <rect x="480" y="400" width="180" height="95" rx="12" fill="url(#subsc)" filter="url(#ds4)"/>
  <text x="570" y="428" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🛡️ 响应协调</text>
  <text x="570" y="448" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Response Coordinator</text>
  <text x="570" y="468" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">subscribe("security.alert.critical")</text>
  <text x="570" y="485" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="9">应急响应 · 隔离处置</text>

  <rect x="690" y="400" width="180" height="95" rx="12" fill="#2d2d44" stroke="#667eea" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#ds4)"/>
  <text x="780" y="430" text-anchor="middle" fill="#667eea" font-size="13" font-weight="bold">🔌 新增智能体</text>
  <text x="780" y="450" text-anchor="middle" fill="#aaa" font-size="10">New Agent</text>
  <text x="780" y="475" text-anchor="middle" fill="#aaa" font-size="10">热插拔接入</text>
  <text x="780" y="490" text-anchor="middle" fill="#aaa" font-size="9">无需重新布线</text>
</svg>
