<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Claude Cowork 营销运营架构</title>
  <desc id="desc">从连接器、技能、编排到验证与人类决策的分层架构</desc>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#3b82f6"/></marker></defs>
  <rect width="960" height="620" rx="10" fill="#f8fafc"/>
  <text x="48" y="48" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="18" font-weight="700" fill="#1e293b">两个案例背后的同一套 Agent 运营架构</text>
  <text x="48" y="75" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="13" fill="#64748b">连接器解决“能做”，技能定义“怎么做”，验证证明“做对了”</text>
  <g font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <rect x="72" y="112" width="660" height="82" rx="10" fill="#fff" stroke="#1e293b"/>
    <text x="96" y="143" font-size="13" font-weight="700" fill="#1e293b">人类决策层</text>
    <text x="96" y="169" font-size="12" fill="#475569">叙事焦点 · 口径冲突 · 生产发布 · 权限变更 · 异常处置</text>
    <rect x="588" y="134" width="120" height="36" rx="18" fill="#e2e8f0"/><text x="648" y="157" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">关键关口在环</text>
    <path d="M402 194v35" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a)"/>
    <rect x="72" y="238" width="660" height="112" rx="10" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="96" y="270" font-size="13" font-weight="700" fill="#1d4ed8">编排层</text>
    <rect x="96" y="290" width="178" height="40" rx="8" fill="#fff"/><text x="185" y="315" text-anchor="middle" font-size="12" fill="#334155">Scheduled Tasks</text>
    <rect x="290" y="290" width="178" height="40" rx="8" fill="#fff"/><text x="379" y="315" text-anchor="middle" font-size="12" fill="#334155">Dispatcher / 路由</text>
    <rect x="484" y="290" width="224" height="40" rx="8" fill="#fff"/><text x="596" y="315" text-anchor="middle" font-size="12" fill="#334155">专用 Agent / Skill 执行</text>
    <path d="M402 350v35" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a)"/>
    <rect x="72" y="394" width="660" height="92" rx="10" fill="#fff" stroke="#cbd5e1"/>
    <text x="96" y="426" font-size="13" font-weight="700" fill="#1e293b">技能层</text>
    <text x="96" y="453" font-size="12" fill="#475569">业务规则 · 执行顺序 · 质量标准 · 异常上报 · 重复纠正</text>
    <rect x="568" y="416" width="140" height="42" rx="8" fill="#eff6ff" stroke="#93c5fd"/><text x="638" y="442" text-anchor="middle" font-size="11" fill="#1d4ed8">持续写回更新</text>
    <path d="M402 486v35" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a)"/>
    <rect x="72" y="530" width="660" height="62" rx="10" fill="#e2e8f0" stroke="#cbd5e1"/>
    <text x="96" y="567" font-size="13" font-weight="700" fill="#334155">连接器与系统：Slack · 数据仓库 · CRM · 营销平台 · 活动平台 · Gmail · Asana</text>
    <rect x="770" y="112" width="142" height="480" rx="10" fill="#dcfce7" stroke="#86efac"/>
    <text x="841" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">验证侧车</text>
    <line x1="792" y1="166" x2="890" y2="166" stroke="#86efac"/>
    <text x="841" y="204" text-anchor="middle" font-size="12" fill="#334155">Proofreading</text>
    <text x="841" y="226" text-anchor="middle" font-size="11" fill="#64748b">数字追溯来源</text>
    <text x="841" y="278" text-anchor="middle" font-size="12" fill="#334155">Fresh Audit Agent</text>
    <text x="841" y="300" text-anchor="middle" font-size="11" fill="#64748b">真实路径验收</text>
    <text x="841" y="352" text-anchor="middle" font-size="12" fill="#334155">Mismatch Flag</text>
    <text x="841" y="374" text-anchor="middle" font-size="11" fill="#64748b">冲突时不猜测</text>
    <line x1="792" y1="410" x2="890" y2="410" stroke="#86efac"/>
    <text x="841" y="448" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">成功证据</text>
    <text x="841" y="476" text-anchor="middle" font-size="11" fill="#334155">来源一致</text>
    <text x="841" y="500" text-anchor="middle" font-size="11" fill="#334155">用户路径通过</text>
    <text x="841" y="524" text-anchor="middle" font-size="11" fill="#334155">人工关口确认</text>
  </g>
</svg>
