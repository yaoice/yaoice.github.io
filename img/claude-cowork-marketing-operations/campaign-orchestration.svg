<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" role="img" aria-labelledby="title desc">
  <title id="title">活动搭建的调度、执行与独立审计</title>
  <desc id="desc">请求经调度技能路由到专用技能，再由无前序上下文的审计 Agent 验证，最终人工发布</desc>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#3b82f6"/></marker></defs>
  <rect width="960" height="650" rx="10" fill="#f8fafc"/>
  <text x="48" y="48" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="18" font-weight="700" fill="#1e293b">活动搭建：调度器不干活，执行者不自审</text>
  <text x="48" y="75" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="13" fill="#64748b">职责拆分让路由、业务执行与质量验证可以独立演进</text>
  <g font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <rect x="48" y="128" width="152" height="96" rx="10" fill="#fff" stroke="#cbd5e1"/>
    <text x="124" y="159" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">请求入口</text>
    <text x="124" y="184" text-anchor="middle" font-size="12" fill="#475569">表单 + Slack 频道</text>
    <text x="124" y="205" text-anchor="middle" font-size="11" fill="#64748b">类型 / 优先级 / 资料</text>
    <path d="M200 176h62" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a)"/>
    <rect x="272" y="112" width="192" height="128" rx="10" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="368" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Dispatcher Skill</text>
    <text x="368" y="174" text-anchor="middle" font-size="12" fill="#334155">每小时读取 → 排序</text>
    <text x="368" y="197" text-anchor="middle" font-size="12" fill="#334155">标记已领取 → 路由</text>
    <rect x="310" y="212" width="116" height="18" rx="9" fill="#fff"/><text x="368" y="225" text-anchor="middle" font-size="10" fill="#2563eb">不执行具体搭建</text>
    <path d="M464 176h66" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a)"/>
    <rect x="540" y="96" width="214" height="288" rx="10" fill="#fff" stroke="#cbd5e1"/>
    <text x="647" y="129" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">专用技能池</text>
    <g font-size="12">
      <rect x="560" y="148" width="174" height="42" rx="7" fill="#eff6ff" stroke="#93c5fd"/><text x="647" y="174" text-anchor="middle" fill="#1d4ed8">Event Build</text>
      <rect x="560" y="200" width="174" height="42" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/><text x="647" y="226" text-anchor="middle" fill="#334155">Webinar Landing Page</text>
      <rect x="560" y="252" width="174" height="42" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/><text x="647" y="278" text-anchor="middle" fill="#334155">Apply-to-attend / Approval</text>
      <rect x="560" y="304" width="174" height="42" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/><text x="647" y="330" text-anchor="middle" fill="#334155">Data Import</text>
    </g>
    <text x="647" y="368" text-anchor="middle" font-size="11" fill="#64748b">CRM · 自动化平台 · 活动平台 · 邮件</text>
    <path d="M754 240h55" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a)"/>
    <rect x="818" y="112" width="96" height="256" rx="10" fill="#dcfce7" stroke="#86efac"/>
    <text x="866" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Audit</text>
    <text x="866" y="164" text-anchor="middle" font-size="11" fill="#047857">全新实例</text>
    <line x1="836" y1="183" x2="896" y2="183" stroke="#86efac"/>
    <text x="866" y="211" text-anchor="middle" font-size="11" fill="#334155">提交测试报名</text>
    <text x="866" y="242" text-anchor="middle" font-size="11" fill="#334155">检查落地页</text>
    <text x="866" y="273" text-anchor="middle" font-size="11" fill="#334155">打开确认邮件</text>
    <text x="866" y="304" text-anchor="middle" font-size="11" fill="#334155">核对任务状态</text>
    <rect x="834" y="326" width="64" height="24" rx="12" fill="#fff"/><text x="866" y="342" text-anchor="middle" font-size="10" fill="#047857">独立验收</text>
  </g>
  <path d="M866 368v66H707" stroke="#3b82f6" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <rect x="525" y="414" width="174" height="74" rx="10" fill="#fff" stroke="#1e293b"/>
  <text x="612" y="444" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="14" font-weight="700" fill="#1e293b">Annabel 人工审阅</text>
  <text x="612" y="469" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12" fill="#475569">确认后正式发布</text>
  <rect x="48" y="522" width="866" height="82" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="72" y="552" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="13" font-weight="700" fill="#1e293b">独立改进链</text>
  <rect x="196" y="541" width="150" height="42" rx="8" fill="#fee2e2" stroke="#fecaca"/>
  <text x="271" y="567" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12" fill="#b91c1c">运行失误 / 边界案例</text>
  <path d="M346 562h61" stroke="#3b82f6" stroke-width="2" marker-end="url(#a)"/>
  <rect x="416" y="541" width="146" height="42" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="489" y="567" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12" fill="#1d4ed8">Manager Agent 复盘</text>
  <path d="M562 562h61" stroke="#3b82f6" stroke-width="2" marker-end="url(#a)"/>
  <rect x="632" y="541" width="186" height="42" rx="8" fill="#dcfce7" stroke="#86efac"/>
  <text x="725" y="567" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12" fill="#047857">人确认后更新对应 Skill</text>
  <text x="480" y="630" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12" fill="#64748b">生产链负责稳定交付，改进链负责把错误转化为组织经验</text>
</svg>
