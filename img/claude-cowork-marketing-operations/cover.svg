<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">Claude Cowork 重塑营销运营</title>
  <desc id="desc">营销运营从跨平台手工搬运转向技能驱动、可验证的自动化流水线</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#3b82f6"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".08"/></filter>
  </defs>
  <rect width="960" height="500" rx="10" fill="#f8fafc"/>
  <text x="48" y="50" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="18" font-weight="700" fill="#1e293b">Claude Cowork 如何重塑营销运营</text>
  <text x="48" y="78" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="13" fill="#64748b">不是更快地点击，而是把重复工作改造成可运行、可验证、可进化的系统</text>
  <rect x="48" y="116" width="320" height="292" rx="12" fill="#fff" stroke="#cbd5e1"/>
  <text x="72" y="151" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="15" font-weight="700" fill="#475569">手工作坊</text>
  <g font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="13" fill="#334155">
    <rect x="72" y="178" width="272" height="44" rx="8" fill="#f1f5f9"/><text x="92" y="205">Slack / 会议记录里追信息</text>
    <rect x="72" y="234" width="272" height="44" rx="8" fill="#f1f5f9"/><text x="92" y="261">CRM / 营销平台逐项配置</text>
    <rect x="72" y="290" width="272" height="44" rx="8" fill="#f1f5f9"/><text x="92" y="317">人工核数、复制、提交任务</text>
  </g>
  <rect x="104" y="356" width="208" height="34" rx="17" fill="#fee2e2"/>
  <text x="208" y="378" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="13" font-weight="700" fill="#b91c1c">周报最多 1–2 天</text>
  <path d="M394 262h116" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="452" y="244" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="13" font-weight="700" fill="#2563eb">流程重构</text>
  <rect x="548" y="116" width="364" height="292" rx="12" fill="#fff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="572" y="151" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="15" font-weight="700" fill="#1e293b">Agent 运营流水线</text>
  <g font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="13">
    <rect x="572" y="178" width="142" height="52" rx="8" fill="#dbeafe" stroke="#93c5fd"/><text x="643" y="209" text-anchor="middle" fill="#1d4ed8">连接器 + 定时任务</text>
    <rect x="746" y="178" width="142" height="52" rx="8" fill="#e2e8f0" stroke="#cbd5e1"/><text x="817" y="209" text-anchor="middle" fill="#334155">调度 + 专用技能</text>
    <rect x="572" y="250" width="142" height="52" rx="8" fill="#dcfce7" stroke="#86efac"/><text x="643" y="281" text-anchor="middle" fill="#047857">独立验证</text>
    <rect x="746" y="250" width="142" height="52" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/><text x="817" y="281" text-anchor="middle" fill="#334155">人类决策关口</text>
  </g>
  <path d="M643 230v16M817 230v16M714 276h28" stroke="#94a3b8" stroke-width="2"/>
  <rect x="620" y="332" width="216" height="58" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="728" y="357" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12" fill="#475569">周度指标报告</text>
  <text x="728" y="378" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="20" font-weight="700" fill="#2563eb">最多 2 小时</text>
  <text x="480" y="457" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="14" font-weight="700" fill="#1e293b">执行被自动化，人的精力转向口径、验证、流程与 Enablement</text>
</svg>
