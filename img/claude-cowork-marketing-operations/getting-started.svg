<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">从第一个营销运营工作流开始的六步路径</title>
  <desc id="desc">从选择可验证流程到设置人工关口的渐进式落地路线</desc>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#3b82f6"/></marker></defs>
  <rect width="960" height="620" rx="10" fill="#f8fafc"/>
  <text x="48" y="48" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="18" font-weight="700" fill="#1e293b">从第一个工作流开始：先证明可靠，再扩大自主权</text>
  <text x="48" y="75" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="13" fill="#64748b">不要从“自动化整个部门”开始，沿着可验证、可复盘的路径逐步扩展</text>
  <path d="M168 151H392M568 151h224M792 220v102M792 390H568M392 390H168M168 458v72H392" fill="none" stroke="#3b82f6" stroke-width="3" marker-end="url(#a)"/>
  <g font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <g><circle cx="104" cy="151" r="30" fill="#3b82f6"/><text x="104" y="158" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">1</text><rect x="144" y="112" width="214" height="78" rx="10" fill="#fff" stroke="#93c5fd"/><text x="164" y="142" font-size="13" font-weight="700" fill="#1e293b">选择合适流程</text><text x="164" y="167" font-size="11" fill="#475569">高频 · 重复 · 输入明确 · 可验证</text></g>
    <g><circle cx="504" cy="151" r="30" fill="#3b82f6"/><text x="504" y="158" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">2</text><rect x="544" y="112" width="214" height="78" rx="10" fill="#fff" stroke="#93c5fd"/><text x="564" y="142" font-size="13" font-weight="700" fill="#1e293b">先定义成功证据</text><text x="564" y="167" font-size="11" fill="#475569">先做 Proofreading / 验收清单</text></g>
    <g><circle cx="856" cy="352" r="30" fill="#3b82f6"/><text x="856" y="359" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">3</text><rect x="602" y="313" width="214" height="78" rx="10" fill="#fff" stroke="#93c5fd"/><text x="622" y="343" font-size="13" font-weight="700" fill="#1e293b">拆分角色</text><text x="622" y="368" font-size="11" fill="#475569">调度 · 执行 · 独立审计</text></g>
    <g><circle cx="504" cy="390" r="30" fill="#3b82f6"/><text x="504" y="397" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">4</text><rect x="250" y="351" width="214" height="78" rx="10" fill="#fff" stroke="#93c5fd"/><text x="270" y="381" font-size="13" font-weight="700" fill="#1e293b">把纠正写回 Skill</text><text x="270" y="406" font-size="11" fill="#475569">第二次出现，就不再临时提醒</text></g>
    <g><circle cx="104" cy="390" r="30" fill="#3b82f6"/><text x="104" y="397" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">5</text><rect x="144" y="351" width="82" height="78" rx="10" fill="#fff" stroke="#93c5fd"/><text x="185" y="381" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">定时运行</text><text x="185" y="406" text-anchor="middle" font-size="10" fill="#475569">先低风险</text></g>
    <g><circle cx="504" cy="530" r="30" fill="#10b981"/><text x="504" y="537" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">6</text><rect x="544" y="491" width="270" height="78" rx="10" fill="#dcfce7" stroke="#86efac"/><text x="564" y="521" font-size="13" font-weight="700" fill="#047857">保留明确的人类关口</text><text x="564" y="546" font-size="11" fill="#334155">冲突 · 发布 · 权限 · 异常必须上报</text></g>
  </g>
  <rect x="48" y="584" width="864" height="20" rx="10" fill="#e2e8f0"/>
  <rect x="48" y="584" width="620" height="20" rx="10" fill="#bfdbfe"/>
  <text x="480" y="599" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="10" font-weight="700" fill="#334155">自主权随验证证据与稳定运行逐步扩大</text>
</svg>
