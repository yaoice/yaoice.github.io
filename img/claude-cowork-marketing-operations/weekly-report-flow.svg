<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 610" role="img" aria-labelledby="title desc">
  <title id="title">周度营销报告的人机协作流程</title>
  <desc id="desc">周日定时搜集数据，周一由人选择叙事，再生成报告、领导层幻灯片和任务</desc>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#3b82f6"/></marker></defs>
  <rect width="960" height="610" rx="10" fill="#f8fafc"/>
  <text x="48" y="48" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="18" font-weight="700" fill="#1e293b">周度营销报告：Claude 扩大搜索面，人类决定叙事</text>
  <text x="48" y="75" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="13" fill="#64748b">从“周一开始找数”变成“周一审阅已准备好的报告”</text>
  <text x="50" y="126" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="13" font-weight="700" fill="#475569">周日晚上 · 自动准备</text>
  <g font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12" fill="#334155">
    <rect x="48" y="148" width="142" height="48" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="119" y="177" text-anchor="middle">上周业务回顾</text>
    <rect x="48" y="210" width="142" height="48" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="119" y="239" text-anchor="middle">会议转录</text>
    <rect x="48" y="272" width="142" height="48" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="119" y="301" text-anchor="middle">Slack 销售重点</text>
    <rect x="48" y="334" width="142" height="48" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="119" y="363" text-anchor="middle">数据仓库</text>
  </g>
  <path d="M190 172h62M190 234h62M190 296h62M190 358h62" stroke="#94a3b8" stroke-width="2"/>
  <path d="M252 172v186" stroke="#94a3b8" stroke-width="2"/>
  <path d="M252 265h55" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a)"/>
  <rect x="316" y="202" width="176" height="126" rx="10" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="404" y="235" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="14" font-weight="700" fill="#1d4ed8">Scheduled Task</text>
  <text x="404" y="263" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12" fill="#334155">Prep Skill 搜集并组装</text>
  <text x="404" y="286" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12" fill="#334155">指标表 + 候选标题</text>
  <text x="404" y="309" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12" fill="#334155">+ 建议关注点</text>
  <path d="M492 265h66" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a)"/>
  <rect x="568" y="182" width="164" height="166" rx="10" fill="#fff" stroke="#1e293b"/>
  <text x="650" y="216" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="14" font-weight="700" fill="#1e293b">Ian 人工判断</text>
  <text x="650" y="247" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12" fill="#475569">确认数字与口径</text>
  <text x="650" y="274" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12" fill="#475569">选择本周叙事焦点</text>
  <text x="650" y="301" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12" fill="#475569">决定继续或升级冲突</text>
  <rect x="599" y="318" width="102" height="20" rx="10" fill="#e2e8f0"/><text x="650" y="332" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="10" fill="#334155">人类决策关口</text>
  <path d="M732 265h57" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a)"/>
  <g font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12">
    <rect x="798" y="148" width="116" height="60" rx="8" fill="#dcfce7" stroke="#86efac"/><text x="856" y="176" text-anchor="middle" fill="#047857">完整周报</text><text x="856" y="194" text-anchor="middle" fill="#475569">支撑细节</text>
    <rect x="798" y="226" width="116" height="60" rx="8" fill="#dcfce7" stroke="#86efac"/><text x="856" y="254" text-anchor="middle" fill="#047857">领导层幻灯片</text><text x="856" y="272" text-anchor="middle" fill="#475569">变化 / 原因 / 行动</text>
    <rect x="798" y="304" width="116" height="60" rx="8" fill="#dcfce7" stroke="#86efac"/><text x="856" y="332" text-anchor="middle" fill="#047857">Asana 任务</text><text x="856" y="350" text-anchor="middle" fill="#475569">跟进事项</text>
  </g>
  <rect x="48" y="430" width="866" height="118" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="72" y="461" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="13" font-weight="700" fill="#1e293b">贯穿全程的质量闭环</text>
  <g font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="12">
    <rect x="72" y="480" width="214" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd"/><text x="179" y="507" text-anchor="middle" fill="#1d4ed8">Proofreading：每个数字可追溯</text>
    <path d="M286 502h45" stroke="#3b82f6" stroke-width="2" marker-end="url(#a)"/>
    <rect x="340" y="480" width="214" height="44" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/><text x="447" y="507" text-anchor="middle" fill="#334155">不一致：标记差异，不猜测</text>
    <path d="M554 502h45" stroke="#3b82f6" stroke-width="2" marker-end="url(#a)"/>
    <rect x="608" y="480" width="278" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd"/><text x="747" y="507" text-anchor="middle" fill="#1d4ed8">会后反思：纠正与新口径写回 Skill</text>
  </g>
  <text x="480" y="584" text-anchor="middle" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="14" font-weight="700" fill="#2563eb">耗时：最多 1–2 天 → 最多 2 小时</text>
</svg>
