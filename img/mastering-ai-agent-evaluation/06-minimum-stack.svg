<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="480" fill="#f8fafc" rx="10"/>
  <defs>
    <marker id="arrS" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd6" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Agent 评估最小可行栈（MVS）</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">五块缺一不可 · 工具选谁都行，但形状不能少</text>

  <!-- Layers stacked from bottom to top -->
  <!-- Layer 1: trace collection -->
  <g filter="url(#sd6)">
    <rect x="80" y="380" width="800" height="68" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <rect x="80" y="380" width="60" height="68" rx="10" fill="#eff6ff"/>
  <text x="110" y="420" text-anchor="middle" font-size="20" font-weight="700" fill="#1e40af">1</text>
  <text x="160" y="408" font-size="14" font-weight="700" fill="#1e40af">轨迹采集层</text>
  <text x="160" y="430" font-size="11.5" fill="#475569">OpenTelemetry · LangSmith · NeMo Agent Toolkit — 结构化日志，不是 print</text>

  <line x1="480" y1="380" x2="480" y2="365" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrS)"/>

  <!-- Layer 2: eval set -->
  <g filter="url(#sd6)">
    <rect x="80" y="290" width="800" height="68" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <rect x="80" y="290" width="60" height="68" rx="10" fill="#f5f3ff"/>
  <text x="110" y="330" text-anchor="middle" font-size="20" font-weight="700" fill="#6d28d9">2</text>
  <text x="160" y="318" font-size="14" font-weight="700" fill="#6d28d9">评测集仓库</text>
  <text x="160" y="340" font-size="11.5" fill="#475569">用 Git 管 · 正常 / 降级 / 模糊 / 对抗 四桶分类 · case 即代码资产</text>

  <line x1="480" y1="290" x2="480" y2="275" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrS)"/>

  <!-- Layer 3: metrics -->
  <g filter="url(#sd6)">
    <rect x="80" y="200" width="800" height="68" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="80" y="200" width="60" height="68" rx="10" fill="#ecfdf5"/>
  <text x="110" y="240" text-anchor="middle" font-size="20" font-weight="700" fill="#065f46">3</text>
  <text x="160" y="228" font-size="14" font-weight="700" fill="#065f46">指标计算器</text>
  <text x="160" y="250" font-size="11.5" fill="#475569">TSR · Tool Call Acc · Trajectory Eff · Schema Compliance · 业务 KPI</text>

  <line x1="480" y1="200" x2="480" y2="185" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrS)"/>

  <!-- Layer 4: dashboard -->
  <g filter="url(#sd6)">
    <rect x="80" y="110" width="800" height="68" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="80" y="110" width="60" height="68" rx="10" fill="#fffbeb"/>
  <text x="110" y="150" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">4</text>
  <text x="160" y="138" font-size="14" font-weight="700" fill="#92400e">可视化看板</text>
  <text x="160" y="160" font-size="11.5" fill="#475569">Grafana / Streamlit / 自建 — 让 PM 和工程师看同一张图，省下一半口水</text>

  <!-- Layer 5: CI gate at top (单独条 + 标签) -->
  <g filter="url(#sd6)">
    <rect x="80" y="76" width="800" height="22" rx="6" fill="#1e293b"/>
  </g>
  <text x="100" y="92" font-size="12" font-weight="700" fill="#ffffff">5 · CI 守门员（SLO 卡线 · 不达标不合 PR）</text>
  <text x="870" y="92" text-anchor="end" font-size="11" fill="#cbd5e1">栈顶</text>

</svg>
