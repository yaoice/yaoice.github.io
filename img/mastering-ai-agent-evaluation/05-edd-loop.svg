<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="460" fill="#f8fafc" rx="10"/>
  <defs>
    <marker id="arrL" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#3b82f6"/>
    </marker>
    <filter id="sd5" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">评估驱动开发（EDD）循环</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">把评估织进开发循环，每一版改动都用同一把尺子量</text>

  <!-- 4 nodes in a circle -->
  <!-- center -->
  <circle cx="480" cy="265" r="60" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="480" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">EDD</text>
  <text x="480" y="280" text-anchor="middle" font-size="11" fill="#475569">Loop</text>

  <!-- Node A: Design with observability -->
  <g filter="url(#sd5)">
    <rect x="80" y="120" width="280" height="100" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <circle cx="105" cy="145" r="14" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="105" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">①</text>
  <text x="125" y="150" font-size="13" font-weight="700" fill="#1e40af">设计即埋点</text>
  <text x="100" y="178" font-size="11.5" fill="#475569">每个 plan / tool call / 推理步骤</text>
  <text x="100" y="196" font-size="11.5" fill="#475569">都打稳定 ID，结构化落盘</text>
  <text x="100" y="212" font-size="11" fill="#64748b">轨迹是代码资产，不是 print</text>

  <!-- Node B: Eval set -->
  <g filter="url(#sd5)">
    <rect x="600" y="120" width="280" height="100" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <circle cx="625" cy="145" r="14" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="625" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">②</text>
  <text x="645" y="150" font-size="13" font-weight="700" fill="#6d28d9">日常评测集</text>
  <text x="620" y="178" font-size="11.5" fill="#475569">每 PR 都跑的 30–100 case</text>
  <text x="620" y="196" font-size="11.5" fill="#475569">覆盖：正常 / 降级 / 模糊 / 对抗</text>
  <text x="620" y="212" font-size="11" fill="#64748b">用 Git 管，case 是代码资产</text>

  <!-- Node C: Metrics -->
  <g filter="url(#sd5)">
    <rect x="600" y="310" width="280" height="100" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <circle cx="625" cy="335" r="14" fill="#ecfdf5" stroke="#10b981"/>
  <text x="625" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">③</text>
  <text x="645" y="340" font-size="13" font-weight="700" fill="#065f46">三件套报告</text>
  <text x="620" y="368" font-size="11.5" fill="#475569">TSR · Tool Acc · Trajectory Eff</text>
  <text x="620" y="386" font-size="11.5" fill="#475569">叠加自定义业务 KPI</text>
  <text x="620" y="402" font-size="11" fill="#64748b">同一张图给 PM 和工程师看</text>

  <!-- Node D: CI gate -->
  <g filter="url(#sd5)">
    <rect x="80" y="310" width="280" height="100" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <circle cx="105" cy="335" r="14" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="105" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">④</text>
  <text x="125" y="340" font-size="13" font-weight="700" fill="#92400e">CI 守门员</text>
  <text x="100" y="368" font-size="11.5" fill="#475569">SLO 卡线，不达标不合 PR</text>
  <text x="100" y="386" font-size="11.5" fill="#475569">上线指标退化触发回滚</text>
  <text x="100" y="402" font-size="11" fill="#64748b">把主观争论变成可量化对比</text>

  <!-- arrows around circle -->
  <path d="M 360 170 Q 420 170 420 220" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrL)"/>
  <path d="M 600 170 Q 540 170 540 220" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrL)"/>
  <path d="M 740 220 Q 740 265 700 290" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrL)"/>
  <path d="M 600 360 Q 540 360 540 320" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrL)"/>
  <path d="M 360 360 Q 420 360 420 320" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrL)"/>
  <path d="M 220 310 Q 220 265 260 240" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrL)"/>

  <!-- bottom caption -->
  <text x="480" y="440" text-anchor="middle" font-size="12" fill="#475569" font-weight="600">埋点 → 评测 → 三件套 → 守门 → 推动下一版埋点优化</text>
</svg>
