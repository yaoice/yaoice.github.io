<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="460" fill="#f8fafc" rx="10"/>
  <defs>
    <filter id="sd3" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Agent 评估五维清单</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">任意一项缺位，评估就有盲区 · Outcomes / Trajectory / Tools / Reasoning / Domain</text>

  <!-- 5 cards in 2 rows: 3 + 2 centered -->
  <!-- Card 1 -->
  <g filter="url(#sd3)">
    <rect x="50" y="90" width="280" height="155" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <circle cx="78" cy="118" r="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="78" y="123" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">1</text>
  <text x="100" y="123" font-size="14" font-weight="700" fill="#1e40af">任务成功率（TSR）</text>
  <text x="68" y="158" font-size="11.5" fill="#475569">意图 + 约束 都满足才算 1</text>
  <text x="68" y="178" font-size="11.5" fill="#475569">分场景拆开：</text>
  <text x="68" y="198" font-size="11" fill="#64748b">· 正常 · 降级工具 · 模糊指令</text>
  <text x="68" y="225" font-size="11" font-weight="600" fill="#1e40af">回答："能不能做完这件事"</text>

  <!-- Card 2 -->
  <g filter="url(#sd3)">
    <rect x="340" y="90" width="280" height="155" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <circle cx="368" cy="118" r="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="368" y="123" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">2</text>
  <text x="390" y="123" font-size="14" font-weight="700" fill="#6d28d9">完整轨迹可见</text>
  <text x="358" y="158" font-size="11.5" fill="#475569">记下：</text>
  <text x="358" y="178" font-size="11" fill="#64748b">· 计划 / 子目标</text>
  <text x="358" y="195" font-size="11" fill="#64748b">· 工具调用参数与响应</text>
  <text x="358" y="212" font-size="11" fill="#64748b">· 推理步骤 · 副作用</text>
  <text x="358" y="232" font-size="11" font-weight="600" fill="#6d28d9">回答："走了什么路"</text>

  <!-- Card 3 -->
  <g filter="url(#sd3)">
    <rect x="630" y="90" width="280" height="155" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <circle cx="658" cy="118" r="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="658" y="123" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">3</text>
  <text x="680" y="123" font-size="14" font-weight="700" fill="#92400e">工具是一等信号</text>
  <text x="648" y="158" font-size="11.5" fill="#475569">为每个任务声明工具契约</text>
  <text x="648" y="178" font-size="11" fill="#64748b">· Tool selection P / R</text>
  <text x="648" y="195" font-size="11" fill="#64748b">· Schema 一次性通过率</text>
  <text x="648" y="212" font-size="11" fill="#64748b">· 最大调用次数</text>
  <text x="648" y="232" font-size="11" font-weight="600" fill="#92400e">回答："调对工具了吗"</text>

  <!-- Card 4 -->
  <g filter="url(#sd3)">
    <rect x="195" y="265" width="280" height="155" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <circle cx="223" cy="293" r="14" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="223" y="298" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">4</text>
  <text x="245" y="298" font-size="14" font-weight="700" fill="#065f46">推理质量 &amp; 效率</text>
  <text x="213" y="333" font-size="11.5" fill="#475569">每任务的 tokens / 步数 / 延迟</text>
  <text x="213" y="353" font-size="11" fill="#64748b">推理抽样标注：</text>
  <text x="213" y="370" font-size="11" fill="#64748b">正确 / 部分有缺陷 / 错误</text>
  <text x="213" y="390" font-size="11" fill="#64748b">显式预算约束</text>
  <text x="213" y="408" font-size="11" font-weight="600" fill="#065f46">回答："多少代价做对的"</text>

  <!-- Card 5 -->
  <g filter="url(#sd3)">
    <rect x="485" y="265" width="280" height="155" rx="10" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
  </g>
  <circle cx="513" cy="293" r="14" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="513" y="298" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">5</text>
  <text x="535" y="298" font-size="14" font-weight="700" fill="#1e293b">业务自定义指标</text>
  <text x="503" y="333" font-size="11.5" fill="#475569">用例 KPI：</text>
  <text x="503" y="353" font-size="11" fill="#64748b">· 客服：语气合规、安全词</text>
  <text x="503" y="370" font-size="11" fill="#64748b">· 研究：引用覆盖率</text>
  <text x="503" y="387" font-size="11" fill="#64748b">· 风控：误判 / 漏判成本</text>
  <text x="503" y="408" font-size="11" font-weight="600" fill="#1e293b">回答："能不能上线"</text>
</svg>
