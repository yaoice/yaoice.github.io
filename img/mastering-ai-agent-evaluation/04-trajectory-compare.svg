<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="540" fill="#f8fafc" rx="10"/>
  <defs>
    <marker id="arrA" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#10b981"/>
    </marker>
    <marker id="arrB" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#ef4444"/>
    </marker>
    <filter id="sd4" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">同一个答案的两条轨迹</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">订单查询 Agent · 都答对，但只有打开轨迹才能分出可靠与不可靠</text>

  <!-- Left: Agent A -->
  <g filter="url(#sd4)">
    <rect x="50" y="80" width="420" height="380" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="50" y="80" width="420" height="36" rx="10" fill="#ecfdf5"/>
  <text x="260" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Agent A · 精确轨迹（3 步）</text>

  <!-- A nodes -->
  <g>
    <rect x="80" y="140" width="360" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
    <text x="100" y="162" font-size="12" font-weight="700" fill="#065f46">① get_user_recent_orders</text>
    <text x="100" y="180" font-size="11" fill="#475569">(user_id, limit=1) → order_id</text>

    <line x1="260" y1="195" x2="260" y2="218" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrA)"/>

    <rect x="80" y="225" width="360" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
    <text x="100" y="247" font-size="12" font-weight="700" fill="#065f46">② track_shipment</text>
    <text x="100" y="265" font-size="11" fill="#475569">(order_id) → 物流状态</text>

    <line x1="260" y1="280" x2="260" y2="303" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrA)"/>

    <rect x="80" y="310" width="360" height="50" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="100" y="332" font-size="12" font-weight="700" fill="#1e40af">③ 综合答复用户</text>
    <text x="100" y="350" font-size="11" fill="#475569">「正在派送，预计今晚 8 点送达」</text>
  </g>

  <!-- A metrics -->
  <g font-size="11" fill="#475569">
    <rect x="80" y="380" width="360" height="64" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="95" y="400" font-weight="700" fill="#065f46">TSR=1 · Tool Acc=100% · Eff=3 步</text>
    <text x="95" y="420">Schema 一次过 100% · ~1.2k tokens</text>
    <text x="95" y="438">端到端延迟 ≈ 2s</text>
  </g>

  <!-- Right: Agent B -->
  <g filter="url(#sd4)">
    <rect x="490" y="80" width="420" height="380" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  </g>
  <rect x="490" y="80" width="420" height="36" rx="10" fill="#fef2f2"/>
  <text x="700" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Agent B · 乱试轨迹（17 步）</text>

  <g>
    <rect x="520" y="140" width="360" height="44" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
    <text x="540" y="160" font-size="12" font-weight="700" fill="#991b1b">① search_orders() ✗ Schema 错</text>
    <text x="540" y="176" font-size="11" fill="#7f1d1d">重试 4 次，参数字段幻觉</text>

    <line x1="700" y1="189" x2="700" y2="207" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrB)"/>

    <rect x="520" y="214" width="360" height="44" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
    <text x="540" y="234" font-size="12" font-weight="700" fill="#991b1b">② query_database() ✗ 工具选错</text>
    <text x="540" y="250" font-size="11" fill="#7f1d1d">无权限，返回 403</text>

    <line x1="700" y1="263" x2="700" y2="281" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrB)"/>

    <rect x="520" y="288" width="360" height="44" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
    <text x="540" y="308" font-size="12" font-weight="700" fill="#991b1b">③ web_search() ✗ 不相关</text>
    <text x="540" y="324" font-size="11" fill="#7f1d1d">"昨晚 订单" 拿到 SEO 文章</text>

    <text x="700" y="350" text-anchor="middle" font-size="12" fill="#94a3b8">⋮ 再瞎试 10 步 ⋮</text>

    <rect x="520" y="360" width="360" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="540" y="380" font-size="12" font-weight="700" fill="#1e40af">⑰ 最终撞对 track_shipment</text>
    <text x="540" y="396" font-size="11" fill="#475569">「正在派送，预计今晚 8 点送达」</text>
  </g>

  <g font-size="11" fill="#475569">
    <rect x="520" y="416" width="360" height="32" rx="6" fill="#fef2f2" stroke="#fecaca"/>
    <text x="535" y="436" font-weight="700" fill="#991b1b">TSR=0 · Tool Acc=12% · Eff=17 步 · ~14k tokens · ≈28s</text>
  </g>

  <!-- Bottom callout -->
  <rect x="50" y="480" width="860" height="46" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="480" y="502" text-anchor="middle" font-size="13" fill="#92400e" font-weight="600">只看「最终答案准确率」，两个 Agent 并列冠军</text>
  <text x="480" y="518" text-anchor="middle" font-size="11" fill="#78350f">打开轨迹才会发现：Agent B 是一个等着被熔断的定时炸弹</text>
</svg>
