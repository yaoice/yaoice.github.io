<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="460" fill="#f8fafc" rx="10"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#3b82f6"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <text x="480" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">从静态考卷到动态轨迹</text>
  <text x="480" y="68" text-anchor="middle" font-size="14" fill="#64748b">AI Agent 评估的范式迁移：模型能力 ≠ 系统可靠性</text>

  <!-- Left: static exam paper -->
  <g filter="url(#sd)">
    <rect x="80" y="120" width="300" height="240" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <text x="230" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">AI 模型评估</text>
  <text x="230" y="170" text-anchor="middle" font-size="11" fill="#94a3b8">静态考卷 · 一锤定音</text>

  <!-- exam items -->
  <g font-size="12" fill="#475569">
    <rect x="105" y="190" width="250" height="28" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="118" y="208">MMLU · 通用知识</text>
    <text x="338" y="208" text-anchor="end" fill="#10b981" font-weight="600">92.4</text>

    <rect x="105" y="226" width="250" height="28" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="118" y="244">GSM8K · 数学推理</text>
    <text x="338" y="244" text-anchor="end" fill="#10b981" font-weight="600">89.1</text>

    <rect x="105" y="262" width="250" height="28" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="118" y="280">HumanEval · 编码</text>
    <text x="338" y="280" text-anchor="end" fill="#10b981" font-weight="600">87.6</text>

    <rect x="105" y="298" width="250" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="118" y="316" fill="#1e40af" font-weight="600">核心问题</text>
    <text x="118" y="332" font-size="11" fill="#475569">引擎够不够强？</text>
  </g>

  <!-- arrow -->
  <line x1="400" y1="240" x2="555" y2="240" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="478" y="232" text-anchor="middle" font-size="12" fill="#3b82f6" font-weight="600">范式迁移</text>

  <!-- Right: dynamic trajectory -->
  <g filter="url(#sd)">
    <rect x="580" y="120" width="300" height="240" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <text x="730" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">AI Agent 评估</text>
  <text x="730" y="170" text-anchor="middle" font-size="11" fill="#64748b">动态轨迹 · 端到端跑通</text>

  <g font-size="12" fill="#475569">
    <rect x="605" y="190" width="250" height="28" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="618" y="208" fill="#1e40af">Task Success Rate (TSR)</text>

    <rect x="605" y="226" width="250" height="28" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="618" y="244" fill="#1e40af">Tool Call Accuracy</text>

    <rect x="605" y="262" width="250" height="28" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="618" y="280" fill="#1e40af">Trajectory Efficiency</text>

    <rect x="605" y="298" width="250" height="40" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
    <text x="618" y="316" fill="#065f46" font-weight="600">核心问题</text>
    <text x="618" y="332" font-size="11" fill="#475569">系统能不能反复跑通？</text>
  </g>

  <!-- bottom callout -->
  <rect x="80" y="395" width="800" height="46" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="480" y="417" text-anchor="middle" font-size="13" fill="#92400e" font-weight="600">考卷打 90 分的引擎，未必能把车开到目的地</text>
  <text x="480" y="432" text-anchor="middle" font-size="11" fill="#78350f">从模型基准到系统轨迹，是 Agent 工程化绕不开的一次认知升级</text>
</svg>
