<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="480" fill="#f8fafc" rx="10"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">模型评估 vs Agent 评估：两件事的根本差异</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">同样长着评估的样子，问的却是完全不同的两个问题</text>

  <!-- Left column: Model Eval -->
  <g filter="url(#sd2)">
    <rect x="60" y="90" width="410" height="360" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
  </g>
  <rect x="60" y="90" width="410" height="40" rx="10" fill="#f1f5f9"/>
  <text x="265" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">AI 模型评估</text>

  <!-- rows -->
  <g font-size="12">
    <text x="84" y="160" fill="#94a3b8">评估对象</text>
    <text x="84" y="180" fill="#1e293b" font-weight="600">孤立的基础模型</text>

    <line x1="76" y1="200" x2="454" y2="200" stroke="#e2e8f0" stroke-dasharray="3,3"/>

    <text x="84" y="225" fill="#94a3b8">环境</text>
    <text x="84" y="245" fill="#1e293b" font-weight="600">静态、预定义</text>

    <line x1="76" y1="265" x2="454" y2="265" stroke="#e2e8f0" stroke-dasharray="3,3"/>

    <text x="84" y="290" fill="#94a3b8">典型基准</text>
    <text x="84" y="310" fill="#1e293b" font-weight="600">MMLU · GSM8K · HumanEval</text>

    <line x1="76" y1="330" x2="454" y2="330" stroke="#e2e8f0" stroke-dasharray="3,3"/>

    <text x="84" y="355" fill="#94a3b8">核心指标</text>
    <text x="84" y="375" fill="#1e293b" font-weight="600">知识 · 推理 · 编码准确率</text>

    <line x1="76" y1="395" x2="454" y2="395" stroke="#e2e8f0" stroke-dasharray="3,3"/>

    <text x="84" y="420" fill="#94a3b8">回答的问题</text>
    <text x="84" y="440" fill="#1e40af" font-weight="700">引擎够不够强？</text>
  </g>

  <!-- VS divider -->
  <circle cx="480" cy="270" r="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="480" y="275" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">VS</text>

  <!-- Right column: Agent Eval -->
  <g filter="url(#sd2)">
    <rect x="490" y="90" width="410" height="360" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <rect x="490" y="90" width="410" height="40" rx="10" fill="#eff6ff"/>
  <text x="695" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">AI Agent 评估</text>

  <g font-size="12">
    <text x="514" y="160" fill="#94a3b8">评估对象</text>
    <text x="514" y="180" fill="#1e293b" font-weight="600">端到端运行的系统</text>

    <line x1="506" y1="200" x2="884" y2="200" stroke="#e2e8f0" stroke-dasharray="3,3"/>

    <text x="514" y="225" fill="#94a3b8">环境</text>
    <text x="514" y="245" fill="#1e293b" font-weight="600">动态、非确定性</text>

    <line x1="506" y1="265" x2="884" y2="265" stroke="#e2e8f0" stroke-dasharray="3,3"/>

    <text x="514" y="290" fill="#94a3b8">典型基准</text>
    <text x="514" y="310" fill="#1e293b" font-weight="600">GAIA · SWE-bench · WebArena</text>

    <line x1="506" y1="330" x2="884" y2="330" stroke="#e2e8f0" stroke-dasharray="3,3"/>

    <text x="514" y="355" fill="#94a3b8">核心指标</text>
    <text x="514" y="375" fill="#1e293b" font-weight="600">TSR · Tool Acc · Trajectory Eff</text>

    <line x1="506" y1="395" x2="884" y2="395" stroke="#e2e8f0" stroke-dasharray="3,3"/>

    <text x="514" y="420" fill="#94a3b8">回答的问题</text>
    <text x="514" y="440" fill="#065f46" font-weight="700">系统能不能反复跑通？</text>
  </g>
</svg>
