<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="gPlan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#2563eb" />
    </linearGradient>
    <linearGradient id="gBuild" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>
    <linearGradient id="gQA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
    <linearGradient id="gFile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b" />
      <stop offset="100%" style="stop-color:#475569" />
    </linearGradient>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <marker id="aBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="aPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="aAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="aGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="860" height="560" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="430" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">三智能体全栈开发架构</text>

  <!-- User Prompt -->
  <rect x="320" y="55" width="220" height="45" rx="22" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="430" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#4338ca">👤 用户 Prompt (1-4句)</text>

  <!-- Arrow down to Planner -->
  <line x1="430" y1="100" x2="430" y2="130" stroke="#3b82f6" stroke-width="2" marker-end="url(#aBlue)"/>

  <!-- Planner Agent -->
  <rect x="270" y="130" width="320" height="110" rx="14" fill="url(#gPlan)" filter="url(#sh)"/>
  <text x="430" y="160" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">📋 规划器 Agent (Planner)</text>
  <line x1="300" y1="170" x2="560" y2="170" stroke="#ffffff40" stroke-width="1"/>
  <text x="430" y="190" text-anchor="middle" font-size="11" fill="#dbeafe">扩展 Prompt → 完整产品规格说明书</text>
  <text x="430" y="207" text-anchor="middle" font-size="11" fill="#dbeafe">融入 AI 功能 · 创建视觉设计语言</text>
  <text x="430" y="224" text-anchor="middle" font-size="11" fill="#dbeafe">定义技术架构 · 拆分功能模块</text>

  <!-- Arrow down from Planner -->
  <line x1="430" y1="240" x2="430" y2="270" stroke="#3b82f6" stroke-width="2" marker-end="url(#aBlue)"/>
  <text x="448" y="260" font-size="10" fill="#3b82f6">产品规格</text>

  <!-- Sprint Contract (center) -->
  <rect x="340" y="270" width="180" height="40" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="430" y="295" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">📝 Sprint 合同</text>

  <!-- Arrows from Contract -->
  <line x1="340" y1="290" x2="235" y2="340" stroke="#8b5cf6" stroke-width="2" marker-end="url(#aPurple)"/>
  <line x1="520" y1="290" x2="625" y2="340" stroke="#f59e0b" stroke-width="2" marker-end="url(#aAmber)"/>

  <!-- Generator Agent -->
  <rect x="60" y="340" width="280" height="130" rx="14" fill="url(#gBuild)" filter="url(#sh)"/>
  <text x="200" y="370" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">🔨 生成器 Agent (Builder)</text>
  <line x1="85" y1="380" x2="315" y2="380" stroke="#ffffff40" stroke-width="1"/>
  <text x="200" y="398" text-anchor="middle" font-size="11" fill="#ede9fe">按 Sprint 选取功能进行开发</text>
  <text x="200" y="415" text-anchor="middle" font-size="11" fill="#ede9fe">React + Vite + FastAPI + SQLite</text>
  <text x="200" y="432" text-anchor="middle" font-size="11" fill="#ede9fe">Git 版本控制 · 自我评估</text>
  <text x="200" y="449" text-anchor="middle" font-size="11" fill="#ede9fe">冲刺结束后移交 QA</text>
  <text x="200" y="466" text-anchor="middle" font-size="10" fill="#c4b5fd">⚡ Opus 4.6: 移除 Sprint，连贯运行</text>

  <!-- QA Agent -->
  <rect x="520" y="340" width="280" height="130" rx="14" fill="url(#gQA)" filter="url(#sh)"/>
  <text x="660" y="370" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">🔍 评估器 Agent (QA)</text>
  <line x1="545" y1="380" x2="775" y2="380" stroke="#ffffff40" stroke-width="1"/>
  <text x="660" y="398" text-anchor="middle" font-size="11" fill="#fef3c7">Playwright MCP 端到端测试</text>
  <text x="660" y="415" text-anchor="middle" font-size="11" fill="#fef3c7">UI · API · 数据库全面验证</text>
  <text x="660" y="432" text-anchor="middle" font-size="11" fill="#fef3c7">四维度评分: 深度/功能/视觉/代码</text>
  <text x="660" y="449" text-anchor="middle" font-size="11" fill="#fef3c7">硬性阈值 · 不通过则退回修改</text>
  <text x="660" y="466" text-anchor="middle" font-size="10" fill="#fde68a">⚡ Opus 4.6: 运行结束时单次评估</text>

  <!-- Bidirectional arrow between Generator and QA -->
  <path d="M340,420 Q430,390 520,420" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#aGray)"/>
  <path d="M520,440 Q430,470 340,440" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#aGray)"/>

  <!-- File-based communication label -->
  <rect x="370" y="415" width="120" height="30" rx="6" fill="url(#gFile)" filter="url(#sh)"/>
  <text x="430" y="435" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">📁 文件通信</text>

  <!-- Output -->
  <rect x="290" y="500" width="280" height="42" rx="21" fill="#10b981" filter="url(#sh)"/>
  <text x="430" y="526" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">✅ 功能完备的全栈应用</text>

  <line x1="200" y1="470" x2="340" y2="510" stroke="#10b981" stroke-width="2" marker-end="url(#aGray)"/>
  <line x1="660" y1="470" x2="520" y2="510" stroke="#10b981" stroke-width="2" marker-end="url(#aGray)"/>

  <text x="430" y="553" text-anchor="middle" font-size="10" fill="#94a3b8">图 2: 三智能体全栈开发架构 — 规划、构建、质保的协作流水线</text>
</svg>
