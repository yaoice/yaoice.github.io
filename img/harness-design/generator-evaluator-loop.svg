<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="gGen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gEval" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gOutput" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000025"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">生成器 - 评估器反馈循环（GAN 启发式架构）</text>

  <!-- Generator Box -->
  <rect x="60" y="70" width="220" height="140" rx="14" fill="url(#gGen)" filter="url(#shadow)"/>
  <text x="170" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">🔨 生成器 Agent</text>
  <text x="170" y="135" text-anchor="middle" font-size="11" fill="#e0e7ff">根据 Prompt 生成代码/设计</text>
  <text x="170" y="155" text-anchor="middle" font-size="11" fill="#e0e7ff">策略决策: 优化 or 转向</text>
  <text x="170" y="175" text-anchor="middle" font-size="11" fill="#e0e7ff">每次迭代 5-15 轮</text>
  <text x="170" y="195" text-anchor="middle" font-size="11" fill="#e0e7ff">工具: Claude Agent SDK</text>

  <!-- Evaluator Box -->
  <rect x="520" y="70" width="220" height="140" rx="14" fill="url(#gEval)" filter="url(#shadow)"/>
  <text x="630" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">🔍 评估器 Agent</text>
  <text x="630" y="135" text-anchor="middle" font-size="11" fill="#fef3c7">独立评估，怀疑态度</text>
  <text x="630" y="155" text-anchor="middle" font-size="11" fill="#fef3c7">Playwright MCP 交互测试</text>
  <text x="630" y="175" text-anchor="middle" font-size="11" fill="#fef3c7">四维度结构化打分</text>
  <text x="630" y="195" text-anchor="middle" font-size="11" fill="#fef3c7">发现深层 Bug &amp; 设计缺陷</text>

  <!-- Output Box -->
  <rect x="260" y="300" width="280" height="90" rx="14" fill="url(#gOutput)" filter="url(#shadow)"/>
  <text x="400" y="335" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">✅ 高质量输出</text>
  <text x="400" y="358" text-anchor="middle" font-size="11" fill="#d1fae5">通过所有评估维度阈值</text>
  <text x="400" y="378" text-anchor="middle" font-size="11" fill="#d1fae5">功能完备 · 设计精良 · 代码健壮</text>

  <!-- Arrow: Generator → Evaluator (产出) -->
  <path d="M280,140 Q400,100 520,140" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <text x="400" y="108" text-anchor="middle" font-size="11" font-weight="600" fill="#6366f1">产出作品</text>

  <!-- Arrow: Evaluator → Generator (反馈) -->
  <path d="M520,190 Q400,235 280,190" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="400" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#f59e0b">结构化反馈 &amp; 评分</text>

  <!-- Arrow: Loop → Output -->
  <path d="M400,250 L400,300" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="450" y="275" text-anchor="start" font-size="10" fill="#10b981">达到质量阈值</text>

  <!-- Iteration indicator -->
  <rect x="345" y="245" width="110" height="26" rx="13" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="262" text-anchor="middle" font-size="11" font-weight="600" fill="#6366f1">迭代 N 轮</text>

  <!-- Key insight callout -->
  <rect x="30" y="270" width="200" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="130" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">💡 核心洞察</text>
  <text x="130" y="306" text-anchor="middle" font-size="9" fill="#92400e">自我评估存在偏差</text>
  <text x="130" y="318" text-anchor="middle" font-size="9" fill="#92400e">独立评估器消除盲点</text>

  <rect x="570" y="270" width="200" height="55" rx="8" fill="#ede9fe" stroke="#6366f1" stroke-width="1"/>
  <text x="670" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">💡 灵感来源</text>
  <text x="670" y="306" text-anchor="middle" font-size="9" fill="#4338ca">借鉴 GAN 对抗训练思想</text>
  <text x="670" y="318" text-anchor="middle" font-size="9" fill="#4338ca">生成与判别相互促进</text>

  <!-- Bottom note -->
  <text x="400" y="412" text-anchor="middle" font-size="10" fill="#94a3b8">图 1: 生成器-评估器反馈循环 — Anthropic Harness 的核心架构范式</text>
</svg>
