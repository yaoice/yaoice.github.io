<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="dsh" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <linearGradient id="gOld" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9" />
      <stop offset="100%" style="stop-color:#e2e8f0" />
    </linearGradient>
    <linearGradient id="gNew" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ede9fe" />
      <stop offset="100%" style="stop-color:#ddd6fe" />
    </linearGradient>
    <marker id="aRight" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="820" height="440" rx="12" fill="#f8fafc"/>

  <text x="410" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">模型演进驱动架构简化</text>

  <!-- Phase 1: Sonnet 4.5 -->
  <rect x="30" y="60" width="360" height="340" rx="14" fill="url(#gOld)" stroke="#94a3b8" stroke-width="1.5" filter="url(#dsh)"/>
  <rect x="30" y="60" width="360" height="40" rx="14" fill="#64748b"/>
  <rect x="30" y="86" width="360" height="14" fill="#64748b"/>
  <text x="210" y="87" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">阶段一: Sonnet 4.5 时代</text>

  <!-- Problems -->
  <rect x="50" y="115" width="140" height="115" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="120" y="137" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">⚠️ 核心痛点</text>
  <text x="120" y="158" text-anchor="middle" font-size="9" fill="#991b1b">上下文焦虑</text>
  <text x="120" y="174" text-anchor="middle" font-size="9" fill="#991b1b">过早结束工作</text>
  <text x="120" y="190" text-anchor="middle" font-size="9" fill="#991b1b">自评过度宽容</text>
  <text x="120" y="206" text-anchor="middle" font-size="9" fill="#991b1b">规划能力有限</text>
  <text x="120" y="222" text-anchor="middle" font-size="9" fill="#991b1b">需要频繁分解</text>

  <!-- Harness solution -->
  <rect x="210" y="115" width="160" height="115" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="290" y="137" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">🏗️ Harness 架构</text>
  <text x="290" y="158" text-anchor="middle" font-size="9" fill="#1e40af">上下文重置策略</text>
  <text x="290" y="174" text-anchor="middle" font-size="9" fill="#1e40af">Sprint 分解机制</text>
  <text x="290" y="190" text-anchor="middle" font-size="9" fill="#1e40af">Sprint 合同协商</text>
  <text x="290" y="206" text-anchor="middle" font-size="9" fill="#1e40af">独立评估器</text>
  <text x="290" y="222" text-anchor="middle" font-size="9" fill="#1e40af">结构化交接工件</text>

  <!-- Metrics -->
  <rect x="50" y="245" width="320" height="60" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1"/>
  <text x="210" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">📊 典型性能指标</text>
  <text x="210" y="287" text-anchor="middle" font-size="10" fill="#64748b">复古游戏: 6h · $200 · 10个Sprint · 16功能</text>
  <text x="210" y="300" text-anchor="middle" font-size="9" fill="#94a3b8">架构复杂但必要 — 弥补模型能力不足</text>

  <!-- Complexity indicator -->
  <rect x="50" y="320" width="320" height="28" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="65" y="339" font-size="10" fill="#92400e">架构复杂度:</text>
  <rect x="155" y="328" width="200" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="155" y="328" width="180" height="12" rx="6" fill="#ef4444"/>
  <text x="365" y="339" font-size="10" font-weight="600" fill="#dc2626">高</text>

  <!-- Arrow between phases -->
  <line x1="400" y1="230" x2="425" y2="230" stroke="#6366f1" stroke-width="3" marker-end="url(#aRight)"/>
  <text x="413" y="218" text-anchor="middle" font-size="22" fill="#6366f1">→</text>

  <!-- Phase 2: Opus 4.6 -->
  <rect x="430" y="60" width="360" height="340" rx="14" fill="url(#gNew)" stroke="#8b5cf6" stroke-width="1.5" filter="url(#dsh)"/>
  <rect x="430" y="60" width="360" height="40" rx="14" fill="#7c3aed"/>
  <rect x="430" y="86" width="360" height="14" fill="#7c3aed"/>
  <text x="610" y="87" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">阶段二: Opus 4.6 时代</text>

  <!-- Improvements -->
  <rect x="450" y="115" width="140" height="115" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="520" y="137" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">✅ 模型提升</text>
  <text x="520" y="158" text-anchor="middle" font-size="9" fill="#065f46">规划能力增强</text>
  <text x="520" y="174" text-anchor="middle" font-size="9" fill="#065f46">长上下文检索改善</text>
  <text x="520" y="190" text-anchor="middle" font-size="9" fill="#065f46">自我纠错提升</text>
  <text x="520" y="206" text-anchor="middle" font-size="9" fill="#065f46">连贯运行时间更长</text>
  <text x="520" y="222" text-anchor="middle" font-size="9" fill="#065f46">上下文焦虑消失</text>

  <!-- Simplified Harness -->
  <rect x="610" y="115" width="160" height="115" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="690" y="137" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">🎯 精简架构</text>
  <text x="690" y="158" text-anchor="middle" font-size="9" fill="#5b21b6">✗ 移除 Sprint 分解</text>
  <text x="690" y="174" text-anchor="middle" font-size="9" fill="#5b21b6">✗ 移除上下文重置</text>
  <text x="690" y="190" text-anchor="middle" font-size="9" fill="#5b21b6">✓ 保留评估器</text>
  <text x="690" y="206" text-anchor="middle" font-size="9" fill="#5b21b6">✓ 运行末尾单次QA</text>
  <text x="690" y="222" text-anchor="middle" font-size="9" fill="#5b21b6">✓ 少量修复轮次</text>

  <!-- New Metrics -->
  <rect x="450" y="245" width="320" height="60" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="610" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">📊 典型性能指标</text>
  <text x="610" y="287" text-anchor="middle" font-size="10" fill="#64748b">DAW 项目: 4h · $124.70 · 连贯构建 · 3轮QA</text>
  <text x="610" y="300" text-anchor="middle" font-size="9" fill="#94a3b8">架构精简但评估器依然不可或缺</text>

  <!-- Complexity indicator -->
  <rect x="450" y="320" width="320" height="28" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="465" y="339" font-size="10" fill="#065f46">架构复杂度:</text>
  <rect x="555" y="328" width="200" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="555" y="328" width="80" height="12" rx="6" fill="#10b981"/>
  <text x="765" y="339" font-size="10" font-weight="600" fill="#059669">低</text>

  <!-- Bottom insight -->
  <rect x="200" y="408" width="420" height="26" rx="13" fill="#6366f1"/>
  <text x="410" y="426" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">💡 核心原则: 找到尽可能简单的方案，仅在需要时增加复杂性</text>

  <text x="410" y="438" text-anchor="middle" font-size="10" fill="#94a3b8"></text>
</svg>
