<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="ds" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <rect width="800" height="380" rx="12" fill="#f8fafc"/>

  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">评估器四维度评分体系</text>

  <!-- Dimension 1: Design Quality -->
  <rect x="30" y="60" width="170" height="260" rx="12" fill="#fff" stroke="#6366f1" stroke-width="2" filter="url(#ds)"/>
  <rect x="30" y="60" width="170" height="46" rx="12" fill="#6366f1"/>
  <rect x="30" y="92" width="170" height="14" fill="#6366f1"/>
  <text x="115" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">🎨 设计质量</text>
  <text x="115" y="125" text-anchor="middle" font-size="10" fill="#4338ca" font-weight="600">Design Quality</text>
  <line x1="50" y1="137" x2="180" y2="137" stroke="#e0e7ff" stroke-width="1"/>
  <text x="115" y="158" text-anchor="middle" font-size="10" fill="#475569">是否像连贯的整体</text>
  <text x="115" y="178" text-anchor="middle" font-size="10" fill="#475569">而非零件堆砌？</text>
  <line x1="50" y1="192" x2="180" y2="192" stroke="#e0e7ff" stroke-width="1"/>
  <text x="115" y="212" text-anchor="middle" font-size="9" fill="#64748b">• 颜色和谐度</text>
  <text x="115" y="228" text-anchor="middle" font-size="9" fill="#64748b">• 字体搭配</text>
  <text x="115" y="244" text-anchor="middle" font-size="9" fill="#64748b">• 布局韵律</text>
  <text x="115" y="260" text-anchor="middle" font-size="9" fill="#64748b">• 整体氛围</text>
  <rect x="60" y="280" width="110" height="24" rx="12" fill="#ede9fe"/>
  <text x="115" y="296" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">审美 · 感性</text>

  <!-- Dimension 2: Originality -->
  <rect x="220" y="60" width="170" height="260" rx="12" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#ds)"/>
  <rect x="220" y="60" width="170" height="46" rx="12" fill="#f59e0b"/>
  <rect x="220" y="92" width="170" height="14" fill="#f59e0b"/>
  <text x="305" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">💡 原创性</text>
  <text x="305" y="125" text-anchor="middle" font-size="10" fill="#92400e" font-weight="600">Originality</text>
  <line x1="240" y1="137" x2="370" y2="137" stroke="#fef3c7" stroke-width="1"/>
  <text x="305" y="158" text-anchor="middle" font-size="10" fill="#475569">是否有定制决策？</text>
  <text x="305" y="178" text-anchor="middle" font-size="10" fill="#475569">避免 AI 生成模式</text>
  <line x1="240" y1="192" x2="370" y2="192" stroke="#fef3c7" stroke-width="1"/>
  <text x="305" y="212" text-anchor="middle" font-size="9" fill="#64748b">• 拒绝模板布局</text>
  <text x="305" y="228" text-anchor="middle" font-size="9" fill="#64748b">• 拒绝库默认值</text>
  <text x="305" y="244" text-anchor="middle" font-size="9" fill="#64748b">• 拒绝紫渐变+白卡</text>
  <text x="305" y="260" text-anchor="middle" font-size="9" fill="#64748b">• 独特视觉语言</text>
  <rect x="250" y="280" width="110" height="24" rx="12" fill="#fef3c7"/>
  <text x="305" y="296" text-anchor="middle" font-size="10" font-weight="600" fill="#f59e0b">创意 · 差异化</text>

  <!-- Dimension 3: Craftsmanship -->
  <rect x="410" y="60" width="170" height="260" rx="12" fill="#fff" stroke="#10b981" stroke-width="2" filter="url(#ds)"/>
  <rect x="410" y="60" width="170" height="46" rx="12" fill="#10b981"/>
  <rect x="410" y="92" width="170" height="14" fill="#10b981"/>
  <text x="495" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">🔧 工艺水平</text>
  <text x="495" y="125" text-anchor="middle" font-size="10" fill="#065f46" font-weight="600">Craftsmanship</text>
  <line x1="430" y1="137" x2="560" y2="137" stroke="#d1fae5" stroke-width="1"/>
  <text x="495" y="158" text-anchor="middle" font-size="10" fill="#475569">技术执行质量</text>
  <text x="495" y="178" text-anchor="middle" font-size="10" fill="#475569">能力检查非创意检查</text>
  <line x1="430" y1="192" x2="560" y2="192" stroke="#d1fae5" stroke-width="1"/>
  <text x="495" y="212" text-anchor="middle" font-size="9" fill="#64748b">• 排版层次</text>
  <text x="495" y="228" text-anchor="middle" font-size="9" fill="#64748b">• 间距一致性</text>
  <text x="495" y="244" text-anchor="middle" font-size="9" fill="#64748b">• 色彩和谐</text>
  <text x="495" y="260" text-anchor="middle" font-size="9" fill="#64748b">• 对比度达标</text>
  <rect x="440" y="280" width="110" height="24" rx="12" fill="#d1fae5"/>
  <text x="495" y="296" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">精度 · 规范</text>

  <!-- Dimension 4: Functionality -->
  <rect x="600" y="60" width="170" height="260" rx="12" fill="#fff" stroke="#ef4444" stroke-width="2" filter="url(#ds)"/>
  <rect x="600" y="60" width="170" height="46" rx="12" fill="#ef4444"/>
  <rect x="600" y="92" width="170" height="14" fill="#ef4444"/>
  <text x="685" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">⚡ 功能性</text>
  <text x="685" y="125" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="600">Functionality</text>
  <line x1="620" y1="137" x2="750" y2="137" stroke="#fee2e2" stroke-width="1"/>
  <text x="685" y="158" text-anchor="middle" font-size="10" fill="#475569">独立于美学的</text>
  <text x="685" y="178" text-anchor="middle" font-size="10" fill="#475569">可用性评估</text>
  <line x1="620" y1="192" x2="750" y2="192" stroke="#fee2e2" stroke-width="1"/>
  <text x="685" y="212" text-anchor="middle" font-size="9" fill="#64748b">• 用户能否理解</text>
  <text x="685" y="228" text-anchor="middle" font-size="9" fill="#64748b">• 找到主要操作</text>
  <text x="685" y="244" text-anchor="middle" font-size="9" fill="#64748b">• 完成核心任务</text>
  <text x="685" y="260" text-anchor="middle" font-size="9" fill="#64748b">• 交互流畅性</text>
  <rect x="630" y="280" width="110" height="24" rx="12" fill="#fee2e2"/>
  <text x="685" y="296" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">实用 · 可用</text>

  <!-- Connecting line at bottom -->
  <line x1="115" y1="330" x2="685" y2="330" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="115" cy="330" r="4" fill="#6366f1"/>
  <circle cx="305" cy="330" r="4" fill="#f59e0b"/>
  <circle cx="495" cy="330" r="4" fill="#10b981"/>
  <circle cx="685" cy="330" r="4" fill="#ef4444"/>

  <text x="400" y="355" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">每个维度设有硬性阈值，全部达标方可通过评估</text>
  <text x="400" y="375" text-anchor="middle" font-size="10" fill="#94a3b8">图 3: 评估器的四维度结构化评分体系</text>
</svg>
