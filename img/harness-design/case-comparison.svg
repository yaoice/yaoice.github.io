<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="dsc" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <rect width="820" height="400" rx="12" fill="#f8fafc"/>

  <text x="410" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">案例对比: 复古游戏制作器 — 单 Agent vs Harness</text>

  <!-- Table header -->
  <rect x="30" y="55" width="160" height="40" rx="0" fill="#1e293b"/>
  <rect x="190" y="55" width="300" height="40" rx="0" fill="#ef4444"/>
  <rect x="490" y="55" width="300" height="40" rx="0" fill="#10b981"/>
  <text x="110" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">评估维度</text>
  <text x="340" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">❌ 单 Agent 模式</text>
  <text x="640" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">✅ Harness 模式</text>

  <!-- Row 1: Time -->
  <rect x="30" y="95" width="160" height="40" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="190" y="95" width="300" height="40" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="490" y="95" width="300" height="40" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">⏱️ 耗时</text>
  <text x="340" y="120" text-anchor="middle" font-size="12" fill="#64748b">20 分钟</text>
  <text x="640" y="120" text-anchor="middle" font-size="12" fill="#64748b">6 小时 (18x)</text>

  <!-- Row 2: Cost -->
  <rect x="30" y="135" width="160" height="40" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="190" y="135" width="300" height="40" fill="#fefce8" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="490" y="135" width="300" height="40" fill="#fefce8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="160" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">💰 成本</text>
  <text x="340" y="160" text-anchor="middle" font-size="12" fill="#64748b">$9</text>
  <text x="640" y="160" text-anchor="middle" font-size="12" fill="#64748b">$200 (22x)</text>

  <!-- Row 3: Scope -->
  <rect x="30" y="175" width="160" height="40" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="190" y="175" width="300" height="40" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="490" y="175" width="300" height="40" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">📐 范围</text>
  <text x="340" y="200" text-anchor="middle" font-size="12" fill="#64748b">基础功能，未详细规划</text>
  <text x="640" y="200" text-anchor="middle" font-size="12" fill="#64748b">16 功能 · 10 Sprint · AI 辅助</text>

  <!-- Row 4: Functionality -->
  <rect x="30" y="215" width="160" height="50" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="190" y="215" width="300" height="50" fill="#fee2e2" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="490" y="215" width="300" height="50" fill="#d1fae5" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="245" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">⚡ 功能可用性</text>
  <text x="340" y="237" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">失败</text>
  <text x="340" y="255" text-anchor="middle" font-size="10" fill="#991b1b">核心运行时无法响应输入</text>
  <text x="640" y="237" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">成功</text>
  <text x="640" y="255" text-anchor="middle" font-size="10" fill="#065f46">游戏可玩，物理引擎正常</text>

  <!-- Row 5: Design -->
  <rect x="30" y="265" width="160" height="40" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="190" y="265" width="300" height="40" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="490" y="265" width="300" height="40" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="290" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">🎨 界面设计</text>
  <text x="340" y="290" text-anchor="middle" font-size="12" fill="#64748b">空间浪费，工作流僵硬</text>
  <text x="640" y="290" text-anchor="middle" font-size="12" fill="#64748b">全屏画布，视觉一致性高</text>

  <!-- Row 6: AI -->
  <rect x="30" y="305" width="160" height="40" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="190" y="305" width="300" height="40" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="490" y="305" width="300" height="40" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="330" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">🤖 AI 集成</text>
  <text x="340" y="330" text-anchor="middle" font-size="12" fill="#dc2626">无</text>
  <text x="640" y="330" text-anchor="middle" font-size="12" fill="#059669">内置 Claude 生成关卡和精灵</text>

  <!-- Bottom insight -->
  <rect x="130" y="360" width="560" height="30" rx="15" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1" filter="url(#dsc)"/>
  <text x="410" y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">💡 Harness 以 22 倍成本换取了从"不可用"到"功能完备"的质变</text>

  <text x="410" y="398" text-anchor="middle" font-size="10" fill="#94a3b8"></text>
</svg>
