<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">四种循环类型对比</title>
  <desc id="d">按触发、停止、原语与适用场景对比四种循环。</desc>
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">四种循环：选型关键不是复杂度，而是你愿意交出哪一环</text>

  <!-- 表头 -->
  <rect x="30" y="56" width="170" height="34" rx="6" fill="#1e293b"/>
  <text x="115" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">维度</text>
  <rect x="210" y="56" width="180" height="34" rx="6" fill="#475569"/>
  <text x="300" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">轮次驱动</text>
  <rect x="400" y="56" width="180" height="34" rx="6" fill="#3b82f6"/>
  <text x="490" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">目标驱动</text>
  <rect x="590" y="56" width="160" height="34" rx="6" fill="#10b981"/>
  <text x="670" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">时间驱动</text>
  <rect x="760" y="56" width="170" height="34" rx="6" fill="#8b5cf6"/>
  <text x="845" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">主动式</text>

  <!-- 行 1 触发 -->
  <rect x="30" y="98" width="170" height="56" rx="6" fill="#e2e8f0"/>
  <text x="115" y="131" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">触发方式</text>
  <rect x="210" y="98" width="180" height="56" rx="6" fill="#fff" stroke="#e2e8f0"/>
  <text x="300" y="131" text-anchor="middle" font-size="11" fill="#1e293b">手动输入提示</text>
  <rect x="400" y="98" width="180" height="56" rx="6" fill="#fff" stroke="#dbeafe"/>
  <text x="490" y="131" text-anchor="middle" font-size="11" fill="#1e293b">实时手动提示</text>
  <rect x="590" y="98" width="160" height="56" rx="6" fill="#fff" stroke="#d1fae5"/>
  <text x="670" y="131" text-anchor="middle" font-size="11" fill="#1e293b">指定时间间隔</text>
  <rect x="760" y="98" width="170" height="56" rx="6" fill="#fff" stroke="#ede9fe"/>
  <text x="845" y="131" text-anchor="middle" font-size="11" fill="#1e293b">事件 / 计划触发</text>

  <!-- 行 2 停止 -->
  <rect x="30" y="162" width="170" height="56" rx="6" fill="#e2e8f0"/>
  <text x="115" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">停止条件</text>
  <rect x="210" y="162" width="180" height="56" rx="6" fill="#fff" stroke="#e2e8f0"/>
  <text x="300" y="190" text-anchor="middle" font-size="11" fill="#1e293b">Claude 判断完成</text>
  <text x="300" y="206" text-anchor="middle" font-size="10" fill="#64748b">或需更多上下文</text>
  <rect x="400" y="162" width="180" height="56" rx="6" fill="#fff" stroke="#dbeafe"/>
  <text x="490" y="190" text-anchor="middle" font-size="11" fill="#1e293b">目标达成 / 上限</text>
  <text x="490" y="206" text-anchor="middle" font-size="10" fill="#64748b">评估模型每轮查</text>
  <rect x="590" y="162" width="160" height="56" rx="6" fill="#fff" stroke="#d1fae5"/>
  <text x="670" y="190" text-anchor="middle" font-size="11" fill="#1e293b">取消 / 完成</text>
  <text x="670" y="206" text-anchor="middle" font-size="10" fill="#64748b">PR 合并、队列空</text>
  <rect x="760" y="162" width="170" height="56" rx="6" fill="#fff" stroke="#ede9fe"/>
  <text x="845" y="190" text-anchor="middle" font-size="11" fill="#1e293b">任务目标达成</text>
  <text x="845" y="206" text-anchor="middle" font-size="10" fill="#64748b">例程运行至关闭</text>

  <!-- 行 3 适用 -->
  <rect x="30" y="226" width="170" height="56" rx="6" fill="#e2e8f0"/>
  <text x="115" y="259" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">适用任务</text>
  <rect x="210" y="226" width="180" height="56" rx="6" fill="#fff" stroke="#e2e8f0"/>
  <text x="300" y="254" text-anchor="middle" font-size="11" fill="#1e293b">短任务 / 探索</text>
  <text x="300" y="270" text-anchor="middle" font-size="10" fill="#64748b">不属于常规流程</text>
  <rect x="400" y="226" width="180" height="56" rx="6" fill="#fff" stroke="#dbeafe"/>
  <text x="490" y="254" text-anchor="middle" font-size="11" fill="#1e293b">可验证退出标准</text>
  <text x="490" y="270" text-anchor="middle" font-size="10" fill="#64748b">测试数、评分阈值</text>
  <rect x="590" y="226" width="160" height="56" rx="6" fill="#fff" stroke="#d1fae5"/>
  <text x="670" y="254" text-anchor="middle" font-size="11" fill="#1e293b">周期性 / 外部</text>
  <text x="670" y="270" text-anchor="middle" font-size="10" fill="#64748b">CI、PR 审查</text>
  <rect x="760" y="226" width="170" height="56" rx="6" fill="#fff" stroke="#ede9fe"/>
  <text x="845" y="254" text-anchor="middle" font-size="11" fill="#1e293b">定义良好流</text>
  <text x="845" y="270" text-anchor="middle" font-size="10" fill="#64748b">bug 分流、依赖升级</text>

  <!-- 行 4 原语 -->
  <rect x="30" y="290" width="170" height="56" rx="6" fill="#e2e8f0"/>
  <text x="115" y="323" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">原语</text>
  <rect x="210" y="290" width="180" height="56" rx="6" fill="#fff" stroke="#e2e8f0"/>
  <text x="300" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">验证 Skills</text>
  <text x="300" y="334" text-anchor="middle" font-size="10" fill="#64748b">SKILL.md 编码检查</text>
  <rect x="400" y="290" width="180" height="56" rx="6" fill="#fff" stroke="#dbeafe"/>
  <text x="490" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">/goal</text>
  <text x="490" y="334" text-anchor="middle" font-size="10" fill="#64748b">+ 验证 Skills</text>
  <rect x="590" y="290" width="160" height="56" rx="6" fill="#fff" stroke="#d1fae5"/>
  <text x="670" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">/loop /schedule</text>
  <text x="670" y="334" text-anchor="middle" font-size="10" fill="#64748b">本地 / 云端</text>
  <rect x="760" y="290" width="170" height="56" rx="6" fill="#fff" stroke="#ede9fe"/>
  <text x="845" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">全部 + 动态工作流</text>
  <text x="845" y="334" text-anchor="middle" font-size="10" fill="#64748b">+ Auto mode</text>

  <!-- 行 5 你交出什么（核心行）-->
  <rect x="30" y="354" width="170" height="64" rx="6" fill="#1e293b"/>
  <text x="115" y="383" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">你交出什么</text>
  <text x="115" y="401" text-anchor="middle" font-size="10" fill="#cbd5e1">放手的核心</text>
  <rect x="210" y="354" width="180" height="64" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text x="300" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">验证检查</text>
  <rect x="400" y="354" width="180" height="64" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="490" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">停止条件</text>
  <rect x="590" y="354" width="160" height="64" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="670" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">触发器</text>
  <rect x="760" y="354" width="170" height="64" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="845" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">提示本身</text>

  <text x="480" y="445" text-anchor="middle" font-size="11" font-style="italic" fill="#64748b">从左到右：自动化程度递增，人工参与递减</text>
</svg>
