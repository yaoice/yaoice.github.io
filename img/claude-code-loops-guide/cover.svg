<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Claude Code 循环：从手动逐轮到自动化主动式</title>
  <desc id="d">四种循环类型按放手程度递增排列：轮次驱动、目标驱动、时间驱动、主动式。</desc>
  <rect width="960" height="420" fill="#f8fafc" rx="10"/>
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Claude Code 循环：你交出什么，它就替你跑多远</text>
  <text x="480" y="62" text-anchor="middle" font-size="12" fill="#64748b">触发方式 · 停止条件 · 适用任务 · 对应原语</text>

  <!-- 4 个循环卡片，放手程度递增 -->
  <g transform="translate(30 95)">
    <rect width="210" height="250" rx="10" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="14" y="14" width="70" height="22" rx="11" fill="#f1f5f9"/>
    <text x="49" y="29" text-anchor="middle" font-size="10" fill="#475569">第 1 级</text>
    <text x="18" y="66" font-size="15" font-weight="700" fill="#1e293b">轮次驱动</text>
    <text x="18" y="86" font-size="11" fill="#64748b">Turn-based</text>
    <line x1="18" y1="100" x2="192" y2="100" stroke="#e2e8f0"/>
    <text x="18" y="122" font-size="11" font-weight="600" fill="#475569">交出：验证检查</text>
    <text x="18" y="146" font-size="11" fill="#64748b">触发：手动输入提示</text>
    <text x="18" y="166" font-size="11" fill="#64748b">停止：Claude 判断完成</text>
    <text x="18" y="200" font-size="11" fill="#1e293b">适合：探索 / 决策</text>
    <text x="18" y="226" font-size="11" fill="#3b82f6">原语：Skills</text>
  </g>

  <g transform="translate(260 95)">
    <rect width="210" height="250" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="14" y="14" width="70" height="22" rx="11" fill="#eff6ff"/>
    <text x="49" y="29" text-anchor="middle" font-size="10" fill="#1e40af">第 2 级</text>
    <text x="18" y="66" font-size="15" font-weight="700" fill="#1e293b">目标驱动</text>
    <text x="18" y="86" font-size="11" fill="#64748b">Goal-based</text>
    <line x1="18" y1="100" x2="192" y2="100" stroke="#e2e8f0"/>
    <text x="18" y="122" font-size="11" font-weight="600" fill="#475569">交出：停止条件</text>
    <text x="18" y="146" font-size="11" fill="#64748b">触发：实时手动提示</text>
    <text x="18" y="166" font-size="11" fill="#64748b">停止：目标达成 / 上限</text>
    <text x="18" y="200" font-size="11" fill="#1e293b">适合：可验证退出标准</text>
    <text x="18" y="226" font-size="11" fill="#3b82f6">原语：/goal</text>
  </g>

  <g transform="translate(490 95)">
    <rect width="210" height="250" rx="10" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
    <rect x="14" y="14" width="70" height="22" rx="11" fill="#ecfdf5"/>
    <text x="49" y="29" text-anchor="middle" font-size="10" fill="#047857">第 3 级</text>
    <text x="18" y="66" font-size="15" font-weight="700" fill="#1e293b">时间驱动</text>
    <text x="18" y="86" font-size="11" fill="#64748b">Time-based</text>
    <line x1="18" y1="100" x2="192" y2="100" stroke="#e2e8f0"/>
    <text x="18" y="122" font-size="11" font-weight="600" fill="#475569">交出：触发器</text>
    <text x="18" y="146" font-size="11" fill="#64748b">触发：指定时间间隔</text>
    <text x="18" y="166" font-size="11" fill="#64748b">停止：取消 / 工作完成</text>
    <text x="18" y="200" font-size="11" fill="#1e293b">适合：周期性 / 外部系统</text>
    <text x="18" y="226" font-size="11" fill="#3b82f6">原语：/loop /schedule</text>
  </g>

  <g transform="translate(720 95)">
    <rect width="210" height="250" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="14" y="14" width="70" height="22" rx="11" fill="#f5f3ff"/>
    <text x="49" y="29" text-anchor="middle" font-size="10" fill="#6d28d9">第 4 级</text>
    <text x="18" y="66" font-size="15" font-weight="700" fill="#1e293b">主动式</text>
    <text x="18" y="86" font-size="11" fill="#64748b">Proactive</text>
    <line x1="18" y1="100" x2="192" y2="100" stroke="#e2e8f0"/>
    <text x="18" y="122" font-size="11" font-weight="600" fill="#475569">交出：提示本身</text>
    <text x="18" y="146" font-size="11" fill="#64748b">触发：事件 / 计划</text>
    <text x="18" y="166" font-size="11" fill="#64748b">停止：例程关闭</text>
    <text x="18" y="200" font-size="11" fill="#1e293b">适合：周期性定义良好流</text>
    <text x="18" y="226" font-size="11" fill="#3b82f6">原语：全部 + 动态工作流</text>
  </g>

  <!-- 底部递进箭头 -->
  <line x1="120" y1="370" x2="840" y2="370" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="840,365 852,370 840,375" fill="#cbd5e1"/>
  <text x="480" y="392" text-anchor="middle" font-size="12" fill="#64748b">放手程度递增 · 自动化程度递增 · 人工参与递减</text>
</svg>
