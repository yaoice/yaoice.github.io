<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">渐进式放手：从交出验证检查到交出提示本身</title>
  <desc id="d">四个阶梯展示循环中逐步交给 Claude 的部分：验证检查、停止条件、触发器、提示本身。</desc>
  <rect width="960" height="460" fill="#f8fafc" rx="10"/>
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">渐进式放手：每上一级，你交出的就多一环</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">不要一上来就上主动式，先从你能验证的级别开始</text>

  <!-- 阶梯 1（最矮）-->
  <g transform="translate(40 360)">
    <rect width="200" height="80" rx="10" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="14" y="12" width="50" height="22" rx="11" fill="#f1f5f9"/>
    <text x="39" y="27" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">第 1 级</text>
    <text x="14" y="54" font-size="14" font-weight="700" fill="#1e293b">交出验证检查</text>
    <text x="14" y="72" font-size="10" fill="#64748b">你决定何时停，Claude 自己查</text>
  </g>

  <!-- 阶梯 2 -->
  <g transform="translate(260 300)">
    <rect width="200" height="140" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="14" y="12" width="50" height="22" rx="11" fill="#eff6ff"/>
    <text x="39" y="27" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">第 2 级</text>
    <text x="14" y="54" font-size="14" font-weight="700" fill="#1e293b">交出停止条件</text>
    <text x="14" y="76" font-size="10" fill="#64748b">你定义"完成"长什么样</text>
    <text x="14" y="92" font-size="10" fill="#64748b">Claude 跑到满足为止</text>
    <text x="14" y="120" font-size="10" font-style="italic" fill="#3b82f6">例：Lighthouse ≥ 90</text>
  </g>

  <!-- 阶梯 3 -->
  <g transform="translate(480 240)">
    <rect width="200" height="200" rx="10" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
    <rect x="14" y="12" width="50" height="22" rx="11" fill="#ecfdf5"/>
    <text x="39" y="27" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">第 3 级</text>
    <text x="14" y="54" font-size="14" font-weight="700" fill="#1e293b">交出触发器</text>
    <text x="14" y="76" font-size="10" fill="#64748b">你设定时间或事件</text>
    <text x="14" y="92" font-size="10" fill="#64748b">Claude 定时自己启动</text>
    <text x="14" y="120" font-size="10" font-style="italic" fill="#10b981">例：每 5 分钟查 CI</text>
    <text x="14" y="160" font-size="10" fill="#64748b">/loop 本地运行</text>
    <text x="14" y="176" font-size="10" fill="#64748b">/schedule 云端运行</text>
  </g>

  <!-- 阶梯 4（最高）-->
  <g transform="translate(700 180)">
    <rect width="220" height="260" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="14" y="12" width="50" height="22" rx="11" fill="#f5f3ff"/>
    <text x="39" y="27" text-anchor="middle" font-size="10" font-weight="700" fill="#6d28d9">第 4 级</text>
    <text x="14" y="54" font-size="14" font-weight="700" fill="#1e293b">交出提示本身</text>
    <text x="14" y="76" font-size="10" fill="#64748b">你只写一次例程</text>
    <text x="14" y="92" font-size="10" fill="#64748b">Claude 自主编排多代理</text>
    <text x="14" y="120" font-size="10" font-style="italic" fill="#8b5cf6">例：bug 分流全流程</text>
    <text x="14" y="160" font-size="10" fill="#64748b">+ 动态工作流</text>
    <text x="14" y="176" font-size="10" fill="#64748b">+ Auto mode</text>
    <text x="14" y="220" font-size="10" font-weight="600" fill="#ef4444">风险最高</text>
    <text x="14" y="238" font-size="10" fill="#64748b">先小切片试点</text>
  </g>

  <!-- 上升箭头 -->
  <path d="M 240 380 Q 480 300 720 220" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="715,215 725,218 718,225" fill="#cbd5e1"/>
  <text x="480" y="280" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">自动化程度递增</text>

  <text x="480" y="445" text-anchor="middle" font-size="11" fill="#64748b">原则：从最简单方案开始，选择性使用更高级别</text>
</svg>
