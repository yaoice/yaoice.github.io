<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">主动式循环组合方案：四种原语编排一条自动化流水线</title>
  <desc id="d">展示 /schedule、/goal、动态工作流与 Auto mode 如何组合成处理 bug 报告的完整例程。</desc>
  <rect width="960" height="520" fill="#f8fafc" rx="10"/>
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">主动式循环：四种原语组合成一条无人值守的例程</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">以"每小时处理 bug 报告"为例</text>

  <!-- 第 1 层：/schedule 触发 -->
  <g transform="translate(60 90)">
    <rect width="840" height="70" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <rect x="16" y="14" width="120" height="24" rx="12" fill="#10b981"/>
    <text x="76" y="31" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">第 1 步 · 触发</text>
    <text x="150" y="31" font-size="14" font-weight="700" fill="#047857">/schedule</text>
    <text x="150" y="52" font-size="11" fill="#475569">每小时检查 #project-feedback 的新 bug 报告</text>
    <text x="780" y="40" text-anchor="end" font-size="11" fill="#64748b">云端运行 · 关机不停</text>
  </g>

  <line x1="480" y1="165" x2="480" y2="185" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="475,180 480,190 485,180" fill="#cbd5e1"/>

  <!-- 第 2 层：/goal 定义完成标准 -->
  <g transform="translate(60 195)">
    <rect width="840" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="16" y="14" width="120" height="24" rx="12" fill="#3b82f6"/>
    <text x="76" y="31" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">第 2 步 · 标准</text>
    <text x="150" y="31" font-size="14" font-weight="700" fill="#1e40af">/goal</text>
    <text x="150" y="52" font-size="11" fill="#475569">不停止，直到本次所有报告被分流、处理、回复</text>
    <text x="780" y="40" text-anchor="end" font-size="11" fill="#64748b">+ Skills 文档验证方式</text>
  </g>

  <line x1="480" y1="270" x2="480" y2="290" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="475,285 480,295 485,285" fill="#cbd5e1"/>

  <!-- 第 3 层：动态工作流编排 -->
  <g transform="translate(60 300)">
    <rect width="840" height="120" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="16" y="14" width="120" height="24" rx="12" fill="#8b5cf6"/>
    <text x="76" y="31" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">第 3 步 · 编排</text>
    <text x="150" y="31" font-size="14" font-weight="700" fill="#6d28d9">动态工作流</text>
    <text x="150" y="52" font-size="11" fill="#475569">在并行 worktree 中探索 3 个解决方案，由 judge 对抗式审查</text>

    <!-- 3 个并行代理 -->
    <g transform="translate(180 64)">
      <rect width="200" height="42" rx="8" fill="#fff" stroke="#cbd5e1"/>
      <circle cx="20" cy="21" r="8" fill="#3b82f6"/>
      <text x="38" y="26" font-size="11" fill="#1e293b">代理 A · 方案 1</text>
    </g>
    <g transform="translate(400 64)">
      <rect width="200" height="42" rx="8" fill="#fff" stroke="#cbd5e1"/>
      <circle cx="20" cy="21" r="8" fill="#10b981"/>
      <text x="38" y="26" font-size="11" fill="#1e293b">代理 B · 方案 2</text>
    </g>
    <g transform="translate(620 64)">
      <rect width="200" height="42" rx="8" fill="#fff" stroke="#cbd5e1"/>
      <circle cx="20" cy="21" r="8" fill="#f59e0b"/>
      <text x="38" y="26" font-size="11" fill="#1e293b">代理 C · 方案 3</text>
    </g>
  </g>

  <line x1="480" y1="425" x2="480" y2="445" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="475,440 480,450 485,440" fill="#cbd5e1"/>

  <!-- 第 4 层：Auto mode -->
  <g transform="translate(60 455)">
    <rect width="840" height="50" rx="10" fill="#1e293b"/>
    <rect x="16" y="12" width="120" height="26" rx="13" fill="#fbbf24"/>
    <text x="76" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">第 4 步 · 放手</text>
    <text x="150" y="30" font-size="13" font-weight="700" fill="#fff">Auto mode</text>
    <text x="270" y="30" font-size="11" fill="#cbd5e1">例程无需人工许可自动运行，每轮 /usage 审查用量</text>
  </g>
</svg>
