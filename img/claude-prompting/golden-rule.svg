<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="460" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">清晰性黄金法则：把 Claude 当作"缺上下文的新同事"</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">The Golden Rule of Clear Prompting</text>

  <!-- 左侧：差示例 -->
  <g>
    <rect x="60" y="90" width="380" height="320" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <rect x="60" y="90" width="380" height="48" rx="10" fill="#ef4444"/>
    <rect x="60" y="126" width="380" height="12" fill="#ef4444"/>
    <text x="250" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">✗ 模糊提示</text>

    <rect x="80" y="160" width="340" height="50" rx="6" fill="#ffffff" stroke="#fca5a5"/>
    <text x="250" y="180" text-anchor="middle" font-size="12" font-style="italic" fill="#7f1d1d">"Create an analytics dashboard"</text>
    <text x="250" y="200" text-anchor="middle" font-size="10" fill="#991b1b">（模型无法判断范围与完整度）</text>

    <text x="250" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">常见失败模式</text>
    <g font-size="11" fill="#475569">
      <text x="100" y="275">· 只生成 3~4 个最小控件</text>
      <text x="100" y="298">· 占位字段很多、交互不完整</text>
      <text x="100" y="321">· 与目标读者 / 使用场景完全无关</text>
      <text x="100" y="344">· 你必须多轮追问才接近想要的</text>
    </g>

    <rect x="80" y="360" width="340" height="36" rx="6" fill="#fee2e2"/>
    <text x="250" y="383" text-anchor="middle" font-size="11" fill="#7f1d1d">模型并不知道"足够好"长什么样</text>
  </g>

  <!-- 右侧：好示例 -->
  <g>
    <rect x="520" y="90" width="380" height="320" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
    <rect x="520" y="90" width="380" height="48" rx="10" fill="#10b981"/>
    <rect x="520" y="126" width="380" height="12" fill="#10b981"/>
    <text x="710" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">✓ 清晰提示</text>

    <rect x="540" y="160" width="340" height="74" rx="6" fill="#ffffff" stroke="#6ee7b7"/>
    <text x="710" y="180" text-anchor="middle" font-size="11" font-style="italic" fill="#065f46">"Create an analytics dashboard.</text>
    <text x="710" y="196" text-anchor="middle" font-size="11" font-style="italic" fill="#065f46">Include as many relevant features</text>
    <text x="710" y="212" text-anchor="middle" font-size="11" font-style="italic" fill="#065f46">and interactions as possible. Go</text>
    <text x="710" y="228" text-anchor="middle" font-size="11" font-style="italic" fill="#065f46">beyond the basics..."</text>

    <text x="710" y="265" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">成功要素</text>
    <g font-size="11" fill="#475569">
      <text x="560" y="290">· 明确目标：feature-complete</text>
      <text x="560" y="312">· 明确深度：go beyond basics</text>
      <text x="560" y="334">· 明确交互：include interactions</text>
      <text x="560" y="356">· 留出自由度：as possible</text>
    </g>

    <rect x="540" y="370" width="340" height="30" rx="6" fill="#d1fae5"/>
    <text x="710" y="390" text-anchor="middle" font-size="11" fill="#065f46">给模型"完成标准"，而不是凭感觉</text>
  </g>
</svg>
