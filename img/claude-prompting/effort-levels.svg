<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="520" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">effort 参数：用"思考深度"代替反复改提示词</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">Effort Levels on Claude Opus 4.7</text>

  <!-- 横向坐标轴 -->
  <line x1="80" y1="440" x2="880" y2="440" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="80" y="465" font-size="11" fill="#475569">延迟低 / 成本低</text>
  <text x="880" y="465" text-anchor="end" font-size="11" fill="#475569">智能高 / 思考深</text>

  <!-- 5 个档位：low / medium / high / xhigh / max -->
  <!-- low -->
  <g>
    <rect x="90" y="120" width="140" height="300" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
    <rect x="90" y="120" width="140" height="42" rx="10" fill="#10b981"/>
    <rect x="90" y="152" width="140" height="10" fill="#10b981"/>
    <text x="160" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">low</text>
    <text x="160" y="185" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">短小任务</text>
    <text x="160" y="203" text-anchor="middle" font-size="10" fill="#475569">延迟敏感</text>
    <text x="160" y="221" text-anchor="middle" font-size="10" fill="#475569">高并发场景</text>
    <text x="160" y="255" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">典型用例</text>
    <text x="160" y="273" text-anchor="middle" font-size="9" fill="#475569">分类 / 简单问答</text>
    <text x="160" y="289" text-anchor="middle" font-size="9" fill="#475569">提取 / 格式化</text>
    <text x="160" y="330" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">注意</text>
    <text x="160" y="348" text-anchor="middle" font-size="9" fill="#475569">Opus 4.7 严格遵循</text>
    <text x="160" y="362" text-anchor="middle" font-size="9" fill="#475569">low 意味着浅推理</text>
    <text x="160" y="395" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">推理不足时可显式提示</text>
    <text x="160" y="408" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">"think carefully"</text>
  </g>

  <!-- medium -->
  <g>
    <rect x="245" y="100" width="140" height="320" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <rect x="245" y="100" width="140" height="42" rx="10" fill="#3b82f6"/>
    <rect x="245" y="132" width="140" height="10" fill="#3b82f6"/>
    <text x="315" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">medium</text>
    <text x="315" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">通用默认</text>
    <text x="315" y="183" text-anchor="middle" font-size="10" fill="#475569">成本敏感业务</text>
    <text x="315" y="201" text-anchor="middle" font-size="10" fill="#475569">常规知识工作</text>
    <text x="315" y="235" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">典型用例</text>
    <text x="315" y="253" text-anchor="middle" font-size="9" fill="#475569">对话 / 总结</text>
    <text x="315" y="269" text-anchor="middle" font-size="9" fill="#475569">文档问答</text>
    <text x="315" y="310" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">Sonnet 4.6 推荐</text>
    <text x="315" y="328" text-anchor="middle" font-size="9" fill="#475569">大多数应用</text>
    <text x="315" y="342" text-anchor="middle" font-size="9" fill="#475569">推荐默认值</text>
  </g>

  <!-- high -->
  <g>
    <rect x="400" y="80" width="140" height="340" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
    <rect x="400" y="80" width="140" height="42" rx="10" fill="#f59e0b"/>
    <rect x="400" y="112" width="140" height="10" fill="#f59e0b"/>
    <text x="470" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">high</text>
    <text x="470" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">智能敏感底线</text>
    <text x="470" y="163" text-anchor="middle" font-size="10" fill="#475569">多步推理任务</text>
    <text x="470" y="181" text-anchor="middle" font-size="10" fill="#475569">代码生成 / 分析</text>
    <text x="470" y="215" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">典型用例</text>
    <text x="470" y="233" text-anchor="middle" font-size="9" fill="#475569">研究 / 规划</text>
    <text x="470" y="249" text-anchor="middle" font-size="9" fill="#475569">技术写作</text>
    <text x="470" y="290" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">推荐设置</text>
    <text x="470" y="308" text-anchor="middle" font-size="9" fill="#475569">智能敏感场景</text>
    <text x="470" y="322" text-anchor="middle" font-size="9" fill="#475569">最低可接受档位</text>
  </g>

  <!-- xhigh -->
  <g>
    <rect x="555" y="90" width="140" height="330" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <rect x="555" y="90" width="140" height="42" rx="10" fill="#8b5cf6"/>
    <rect x="555" y="122" width="140" height="10" fill="#8b5cf6"/>
    <text x="625" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">xhigh (新增)</text>
    <text x="625" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">编码代理最佳</text>
    <text x="625" y="173" text-anchor="middle" font-size="10" fill="#475569">长周期任务</text>
    <text x="625" y="191" text-anchor="middle" font-size="10" fill="#475569">深度工具使用</text>
    <text x="625" y="225" text-anchor="middle" font-size="10" font-weight="700" fill="#5b21b6">典型用例</text>
    <text x="625" y="243" text-anchor="middle" font-size="9" fill="#475569">交互式编码产品</text>
    <text x="625" y="259" text-anchor="middle" font-size="9" fill="#475569">多步代理工作流</text>
    <text x="625" y="300" text-anchor="middle" font-size="10" font-weight="700" fill="#5b21b6">Opus 4.7 推荐</text>
    <text x="625" y="318" text-anchor="middle" font-size="9" fill="#475569">64k 输出 token 预算</text>
  </g>

  <!-- max -->
  <g>
    <rect x="710" y="110" width="160" height="310" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <rect x="710" y="110" width="160" height="42" rx="10" fill="#ef4444"/>
    <rect x="710" y="142" width="160" height="10" fill="#ef4444"/>
    <text x="790" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">max</text>
    <text x="790" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">极限努力档</text>
    <text x="790" y="193" text-anchor="middle" font-size="10" fill="#475569">最难的研究问题</text>
    <text x="790" y="211" text-anchor="middle" font-size="10" fill="#475569">极复杂规划</text>
    <text x="790" y="245" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">典型用例</text>
    <text x="790" y="263" text-anchor="middle" font-size="9" fill="#475569">大规模代码迁移</text>
    <text x="790" y="279" text-anchor="middle" font-size="9" fill="#475569">扩展自主工作</text>
    <text x="790" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">注意</text>
    <text x="790" y="338" text-anchor="middle" font-size="9" fill="#475569">可能过度思考</text>
    <text x="790" y="352" text-anchor="middle" font-size="9" fill="#475569">延迟 / 成本最高</text>
  </g>
</svg>
