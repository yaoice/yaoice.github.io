<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="540" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">代理工作流四大治理点</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">Agentic Prompting — Four Governance Levers</text>

  <!-- 中心：长任务循环 -->
  <g>
    <ellipse cx="480" cy="290" rx="110" ry="70" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
    <text x="480" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">长周期代理循环</text>
    <text x="480" y="302" text-anchor="middle" font-size="11" fill="#4338ca">plan → act → reflect</text>
    <text x="480" y="320" text-anchor="middle" font-size="11" fill="#4338ca">→ update state</text>
  </g>

  <!-- 四个象限治理点 -->
  <!-- 左上：行动 vs 建议 -->
  <g>
    <rect x="50" y="90" width="320" height="150" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="50" y="90" width="320" height="34" rx="10" fill="#3b82f6"/>
    <rect x="50" y="114" width="320" height="10" fill="#3b82f6"/>
    <text x="210" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">① 行动 vs 建议</text>

    <g font-size="11" fill="#475569">
      <text x="70" y="148" font-weight="700" fill="#1e40af">核心问题</text>
      <text x="70" y="166">Claude 会严格按动词行事</text>
      <text x="70" y="184" font-weight="700" fill="#1e40af">对比</text>
      <text x="70" y="200">· "suggest changes" → 只给建议</text>
      <text x="70" y="216">· "change this function" → 直接修改</text>
      <text x="70" y="232" font-style="italic" fill="#64748b">用 default_to_action 块显式要求执行</text>
    </g>
    <line x1="370" y1="165" x2="420" y2="250" stroke="#93c5fd" stroke-dasharray="3,3"/>
  </g>

  <!-- 右上：并行工具调用 -->
  <g>
    <rect x="590" y="90" width="320" height="150" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
    <rect x="590" y="90" width="320" height="34" rx="10" fill="#10b981"/>
    <rect x="590" y="114" width="320" height="10" fill="#10b981"/>
    <text x="750" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">② 并行工具调用</text>

    <g font-size="11" fill="#475569">
      <text x="610" y="148" font-weight="700" fill="#065f46">核心问题</text>
      <text x="610" y="166">独立调用串行 → 延迟显著放大</text>
      <text x="610" y="184" font-weight="700" fill="#065f46">做法</text>
      <text x="610" y="200">· 无依赖的工具调用合并为一批</text>
      <text x="610" y="216">· 3 个 read_file 一次性下发</text>
      <text x="610" y="232" font-style="italic" fill="#64748b">use_parallel_tool_calls 块显式声明</text>
    </g>
    <line x1="590" y1="165" x2="540" y2="250" stroke="#6ee7b7" stroke-dasharray="3,3"/>
  </g>

  <!-- 左下：状态跟踪 -->
  <g>
    <rect x="50" y="360" width="320" height="150" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="50" y="360" width="320" height="34" rx="10" fill="#f59e0b"/>
    <rect x="50" y="384" width="320" height="10" fill="#f59e0b"/>
    <text x="210" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">③ 上下文 / 状态跟踪</text>

    <g font-size="11" fill="#475569">
      <text x="70" y="418" font-weight="700" fill="#92400e">核心问题</text>
      <text x="70" y="436">长任务中上下文被压缩或刷新</text>
      <text x="70" y="454" font-weight="700" fill="#92400e">做法</text>
      <text x="70" y="470">· JSON 存结构化状态</text>
      <text x="70" y="486">· git / 文件做持久化</text>
      <text x="70" y="502" font-style="italic" fill="#64748b">token 耗尽前主动存 memory</text>
    </g>
    <line x1="370" y1="425" x2="420" y2="340" stroke="#fcd34d" stroke-dasharray="3,3"/>
  </g>

  <!-- 右下：幻觉与过度工程 -->
  <g>
    <rect x="590" y="360" width="320" height="150" rx="10" fill="#ffffff" stroke="#ec4899" stroke-width="1.5"/>
    <rect x="590" y="360" width="320" height="34" rx="10" fill="#ec4899"/>
    <rect x="590" y="384" width="320" height="10" fill="#ec4899"/>
    <text x="750" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">④ 抑制幻觉与过度工程</text>

    <g font-size="11" fill="#475569">
      <text x="610" y="418" font-weight="700" fill="#9d174d">核心问题</text>
      <text x="610" y="436">未读文件就回答 / 自作主张重构</text>
      <text x="610" y="454" font-weight="700" fill="#9d174d">做法</text>
      <text x="610" y="470">· 回答前必须读相关文件</text>
      <text x="610" y="486">· 只改被要求的部分，不加注释</text>
      <text x="610" y="502" font-style="italic" fill="#64748b">investigate_before_answering 块</text>
    </g>
    <line x1="590" y1="425" x2="540" y2="340" stroke="#fbcfe8" stroke-dasharray="3,3"/>
  </g>
</svg>
