<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="520" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Claude 提示词工程知识体系总览</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">Prompting Best Practices — Taxonomy</text>

  <!-- 中心节点 -->
  <circle cx="480" cy="280" r="66" fill="#6366f1"/>
  <text x="480" y="275" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Prompt</text>
  <text x="480" y="294" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Engineering</text>

  <!-- 六个分支：通用原则 / 输出格式 / 工具使用 / 思考推理 / 代理系统 / Opus 4.7 技巧 -->
  <!-- 1 通用原则 -->
  <g>
    <line x1="480" y1="214" x2="200" y2="120" stroke="#93c5fd" stroke-width="1.5"/>
    <rect x="60" y="90" width="280" height="70" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="200" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">① 通用原则</text>
    <text x="200" y="135" text-anchor="middle" font-size="11" fill="#475569">清晰直接 · 上下文 · 少样本示例</text>
    <text x="200" y="151" text-anchor="middle" font-size="11" fill="#475569">XML 结构 · 角色 · 长上下文</text>
  </g>

  <!-- 2 输出格式 -->
  <g>
    <line x1="480" y1="214" x2="760" y2="120" stroke="#fde68a" stroke-width="1.5"/>
    <rect x="620" y="90" width="280" height="70" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="760" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">② 输出与格式</text>
    <text x="760" y="135" text-anchor="middle" font-size="11" fill="#475569">冗长度控制 · Markdown 抑制</text>
    <text x="760" y="151" text-anchor="middle" font-size="11" fill="#475569">LaTeX · 迁移离开预填充</text>
  </g>

  <!-- 3 工具使用 -->
  <g>
    <line x1="414" y1="280" x2="200" y2="280" stroke="#a7f3d0" stroke-width="1.5"/>
    <rect x="60" y="245" width="280" height="70" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
    <text x="200" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">③ 工具使用</text>
    <text x="200" y="290" text-anchor="middle" font-size="11" fill="#475569">行动 vs 建议 · 并行调用</text>
    <text x="200" y="306" text-anchor="middle" font-size="11" fill="#475569">Claude 4.6+ 系统提示敏感度</text>
  </g>

  <!-- 4 思考与推理 -->
  <g>
    <line x1="546" y1="280" x2="760" y2="280" stroke="#fbcfe8" stroke-width="1.5"/>
    <rect x="620" y="245" width="280" height="70" rx="8" fill="#ffffff" stroke="#ec4899" stroke-width="1.5"/>
    <text x="760" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#9d174d">④ 思考与推理</text>
    <text x="760" y="290" text-anchor="middle" font-size="11" fill="#475569">自适应思考 · effort 参数</text>
    <text x="760" y="306" text-anchor="middle" font-size="11" fill="#475569">过度思考治理 · 自检循环</text>
  </g>

  <!-- 5 代理系统 -->
  <g>
    <line x1="480" y1="346" x2="200" y2="440" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="60" y="410" width="280" height="70" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="200" y="435" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">⑤ 代理系统</text>
    <text x="200" y="455" text-anchor="middle" font-size="11" fill="#475569">状态跟踪 · 子代理编排</text>
    <text x="200" y="471" text-anchor="middle" font-size="11" fill="#475569">抑制过度工程与幻觉</text>
  </g>

  <!-- 6 Opus 4.7 -->
  <g>
    <line x1="480" y1="346" x2="760" y2="440" stroke="#bae6fd" stroke-width="1.5"/>
    <rect x="620" y="410" width="280" height="70" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="760" y="435" text-anchor="middle" font-size="13" font-weight="700" fill="#075985">⑥ Opus 4.7 专属技巧</text>
    <text x="760" y="455" text-anchor="middle" font-size="11" fill="#475569">更字面化 · 更克制使用工具</text>
    <text x="760" y="471" text-anchor="middle" font-size="11" fill="#475569">前端默认风格需要主动打破</text>
  </g>
</svg>
