<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">长上下文排版：把长文档放顶部，指令放末尾</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">Long Context Layout — 长文档靠前可提升质量约 30%</text>

  <!-- 左：错误排版 -->
  <g>
    <rect x="60" y="90" width="400" height="380" rx="10" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5"/>
    <rect x="60" y="90" width="400" height="40" rx="10" fill="#ef4444"/>
    <rect x="60" y="120" width="400" height="10" fill="#ef4444"/>
    <text x="260" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">✗ 指令在前、文档在后</text>

    <rect x="80" y="150" width="360" height="60" rx="6" fill="#fff7ed" stroke="#fdba74"/>
    <text x="260" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">指令 / 问题</text>
    <text x="260" y="194" text-anchor="middle" font-size="11" fill="#7c2d12">"请从下面文档中找出 Q3 重点..."</text>

    <rect x="80" y="225" width="360" height="200" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="260" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">长文档内容</text>
    <line x1="100" y1="260" x2="420" y2="260" stroke="#fcd34d"/>
    <line x1="100" y1="275" x2="420" y2="275" stroke="#fcd34d"/>
    <line x1="100" y1="290" x2="420" y2="290" stroke="#fcd34d"/>
    <line x1="100" y1="305" x2="420" y2="305" stroke="#fcd34d"/>
    <line x1="100" y1="320" x2="420" y2="320" stroke="#fcd34d"/>
    <line x1="100" y1="335" x2="420" y2="335" stroke="#fcd34d"/>
    <line x1="100" y1="350" x2="420" y2="350" stroke="#fcd34d"/>
    <line x1="100" y1="365" x2="420" y2="365" stroke="#fcd34d"/>
    <line x1="100" y1="380" x2="420" y2="380" stroke="#fcd34d"/>
    <line x1="100" y1="395" x2="420" y2="395" stroke="#fcd34d"/>
    <line x1="100" y1="410" x2="420" y2="410" stroke="#fcd34d"/>

    <text x="260" y="448" text-anchor="middle" font-size="11" fill="#7f1d1d">问题过早出现，被后面的长文本"稀释"</text>
  </g>

  <!-- 右：正确排版 -->
  <g>
    <rect x="500" y="90" width="400" height="380" rx="10" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.5"/>
    <rect x="500" y="90" width="400" height="40" rx="10" fill="#10b981"/>
    <rect x="500" y="120" width="400" height="10" fill="#10b981"/>
    <text x="700" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">✓ 文档在前、指令在后</text>

    <rect x="520" y="150" width="360" height="200" rx="6" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="700" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">长文档内容（XML 标签包裹）</text>
    <line x1="540" y1="185" x2="860" y2="185" stroke="#6ee7b7"/>
    <line x1="540" y1="200" x2="860" y2="200" stroke="#6ee7b7"/>
    <line x1="540" y1="215" x2="860" y2="215" stroke="#6ee7b7"/>
    <line x1="540" y1="230" x2="860" y2="230" stroke="#6ee7b7"/>
    <line x1="540" y1="245" x2="860" y2="245" stroke="#6ee7b7"/>
    <line x1="540" y1="260" x2="860" y2="260" stroke="#6ee7b7"/>
    <line x1="540" y1="275" x2="860" y2="275" stroke="#6ee7b7"/>
    <line x1="540" y1="290" x2="860" y2="290" stroke="#6ee7b7"/>
    <line x1="540" y1="305" x2="860" y2="305" stroke="#6ee7b7"/>
    <line x1="540" y1="320" x2="860" y2="320" stroke="#6ee7b7"/>
    <line x1="540" y1="335" x2="860" y2="335" stroke="#6ee7b7"/>

    <rect x="520" y="365" width="360" height="60" rx="6" fill="#d1fae5" stroke="#34d399"/>
    <text x="700" y="387" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">指令 / 问题（末尾给出）</text>
    <text x="700" y="409" text-anchor="middle" font-size="11" fill="#065f46">"基于上面文档，请先引用原文片段再回答"</text>

    <text x="700" y="448" text-anchor="middle" font-size="11" fill="#065f46">贴近生成位置 → 指令影响力更强</text>
  </g>
</svg>
