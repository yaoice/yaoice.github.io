<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Claude Opus 4.7 — 需要关注的行为变化</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">What Changed vs. Opus 4.6 — 给迁移者的速查表</text>

  <!-- 表头 -->
  <rect x="50" y="85" width="860" height="36" rx="6" fill="#1e293b"/>
  <text x="80" y="108" font-size="12" font-weight="700" fill="#ffffff">维度</text>
  <text x="275" y="108" font-size="12" font-weight="700" fill="#ffffff">Opus 4.7 的新行为</text>
  <text x="620" y="108" font-size="12" font-weight="700" fill="#ffffff">应对建议</text>

  <!-- 行 1 -->
  <rect x="50" y="121" width="860" height="50" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="80" y="150" font-size="12" font-weight="700" fill="#0f172a">指令遵循</text>
  <text x="275" y="142" font-size="11" fill="#334155">更字面化、更明确</text>
  <text x="275" y="160" font-size="11" fill="#64748b">不会"善意地"扩大指令范围</text>
  <text x="620" y="142" font-size="11" fill="#334155">显式声明范围</text>
  <text x="620" y="160" font-size="11" fill="#64748b">"apply to every section, not just the first"</text>

  <!-- 行 2 -->
  <rect x="50" y="171" width="860" height="50" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="200" font-size="12" font-weight="700" fill="#0f172a">工具使用</text>
  <text x="275" y="192" font-size="11" fill="#334155">更克制，更依赖推理</text>
  <text x="275" y="210" font-size="11" fill="#64748b">Bug 发现召回率反而提升 11pp</text>
  <text x="620" y="192" font-size="11" fill="#334155">需要更多工具调用时</text>
  <text x="620" y="210" font-size="11" fill="#64748b">提高 effort 到 high 或 xhigh</text>

  <!-- 行 3 -->
  <rect x="50" y="221" width="860" height="50" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="80" y="250" font-size="12" font-weight="700" fill="#0f172a">子代理</text>
  <text x="275" y="242" font-size="11" fill="#334155">默认生成更少</text>
  <text x="275" y="260" font-size="11" fill="#64748b">倾向于单轮内直接完成</text>
  <text x="620" y="242" font-size="11" fill="#334155">需要扇出时明确写出条件</text>
  <text x="620" y="260" font-size="11" fill="#64748b">"spawn when fanning out across items"</text>

  <!-- 行 4 -->
  <rect x="50" y="271" width="860" height="50" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="300" font-size="12" font-weight="700" fill="#0f172a">语气</text>
  <text x="275" y="292" font-size="11" fill="#334155">更直接、更有主见</text>
  <text x="275" y="310" font-size="11" fill="#64748b">确认性措辞和 emoji 变少</text>
  <text x="620" y="292" font-size="11" fill="#334155">需要温暖语气时</text>
  <text x="620" y="310" font-size="11" fill="#64748b">"use a warm, collaborative tone"</text>

  <!-- 行 5 -->
  <rect x="50" y="321" width="860" height="50" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="80" y="350" font-size="12" font-weight="700" fill="#0f172a">effort 参数</text>
  <text x="275" y="342" font-size="11" fill="#334155">严格遵循档位尤其是 low</text>
  <text x="275" y="360" font-size="11" fill="#64748b">low 下推理明显变浅</text>
  <text x="620" y="342" font-size="11" fill="#334155">智能敏感场景</text>
  <text x="620" y="360" font-size="11" fill="#64748b">直接升到 high / xhigh 比改提示更有效</text>

  <!-- 行 6 -->
  <rect x="50" y="371" width="860" height="50" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="400" font-size="12" font-weight="700" fill="#0f172a">前端默认风格</text>
  <text x="275" y="392" font-size="11" fill="#334155">家族默认：米色底 + 衬线 + 赤陶色</text>
  <text x="275" y="410" font-size="11" fill="#64748b">不指定会偏向同一种审美</text>
  <text x="620" y="392" font-size="11" fill="#334155">先让模型提出 4 个方案</text>
  <text x="620" y="410" font-size="11" fill="#64748b">用户挑选后再落地实现</text>

  <!-- 行 7 -->
  <rect x="50" y="421" width="860" height="50" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="80" y="450" font-size="12" font-weight="700" fill="#0f172a">预填充响应</text>
  <text x="275" y="442" font-size="11" fill="#334155">从 4.6 起不再支持</text>
  <text x="275" y="460" font-size="11" fill="#64748b">末尾 assistant 回合无法预填</text>
  <text x="620" y="442" font-size="11" fill="#334155">迁移方案</text>
  <text x="620" y="460" font-size="11" fill="#64748b">Structured Outputs / 工具调用 / 系统提示</text>
</svg>
