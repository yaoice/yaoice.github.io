<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="480" fill="#f8fafc" rx="10"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">XML 标签：给提示词一个"文档树"</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">Use XML Tags to Structure Prompts</text>

  <!-- 左侧：无结构 -->
  <g>
    <rect x="50" y="90" width="400" height="360" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="50" y="90" width="400" height="40" rx="10" fill="#64748b"/>
    <rect x="50" y="120" width="400" height="10" fill="#64748b"/>
    <text x="250" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">无结构提示（容易混淆）</text>

    <rect x="70" y="150" width="360" height="280" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <g font-family="'Monaco','Menlo',monospace" font-size="10" fill="#334155">
      <text x="82" y="174">请分析下面的年度报告和竞品分析。</text>
      <text x="82" y="192">年度报告内容：公司 2023 年营收...</text>
      <text x="82" y="210">...（500 行文字混在一起）...</text>
      <text x="82" y="228">竞品分析内容：竞品 A 在 Q2 推出...</text>
      <text x="82" y="246">...（又是 300 行文字）...</text>
      <text x="82" y="264">请找出战略优势，推荐 Q3 重点。</text>
      <text x="82" y="290" fill="#dc2626">⚠ 模型难以判断：</text>
      <text x="96" y="308" fill="#dc2626">- 哪里是数据、哪里是指令？</text>
      <text x="96" y="326" fill="#dc2626">- 两份文档之间的边界在哪？</text>
      <text x="96" y="344" fill="#dc2626">- 回答时该引用哪一段？</text>
      <text x="82" y="374" fill="#64748b">→ 容易漏读文档、回答跑题</text>
    </g>
  </g>

  <!-- 右侧：结构化 -->
  <g>
    <rect x="510" y="90" width="400" height="360" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="510" y="90" width="400" height="40" rx="10" fill="#3b82f6"/>
    <rect x="510" y="120" width="400" height="10" fill="#3b82f6"/>
    <text x="710" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">XML 结构化提示（边界清晰）</text>

    <rect x="530" y="150" width="360" height="280" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
    <g font-family="'Monaco','Menlo',monospace" font-size="10">
      <text x="542" y="174" fill="#1e40af">&lt;documents&gt;</text>
      <text x="556" y="192" fill="#1e40af">&lt;document index="1"&gt;</text>
      <text x="570" y="210" fill="#64748b">&lt;source&gt;annual_report.pdf&lt;/source&gt;</text>
      <text x="570" y="228" fill="#64748b">&lt;document_content&gt;...&lt;/&gt;</text>
      <text x="556" y="246" fill="#1e40af">&lt;/document&gt;</text>
      <text x="556" y="264" fill="#1e40af">&lt;document index="2"&gt;</text>
      <text x="570" y="282" fill="#64748b">&lt;source&gt;competitor.xlsx&lt;/source&gt;</text>
      <text x="570" y="300" fill="#64748b">&lt;document_content&gt;...&lt;/&gt;</text>
      <text x="556" y="318" fill="#1e40af">&lt;/document&gt;</text>
      <text x="542" y="336" fill="#1e40af">&lt;/documents&gt;</text>
      <text x="542" y="362" fill="#334155">Analyze ... identify strategic</text>
      <text x="542" y="380" fill="#334155">advantages and recommend Q3 focus.</text>
      <text x="542" y="410" fill="#065f46">✓ 模型能精确定位每段引用</text>
    </g>
  </g>
</svg>
