<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">多副本高可用：Leader Election 机制</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">同一虚拟节点的 Active-Standby 切换</text>

  <!-- Lifeline headers -->
  <rect x="80" y="85" width="160" height="40" rx="20" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">实例 A（Leader）</text>

  <rect x="400" y="85" width="160" height="40" rx="20" fill="#1e293b"/>
  <text x="480" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Leader Lease</text>

  <rect x="720" y="85" width="160" height="40" rx="20" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="800" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">实例 B（Standby）</text>

  <!-- Lifelines -->
  <line x1="160" y1="130" x2="160" y2="440" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="480" y1="130" x2="480" y2="440" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="800" y1="130" x2="800" y2="440" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Stage 1: 正常运行 -->
  <rect x="40" y="145" width="880" height="25" rx="4" fill="#e2e8f0"/>
  <text x="480" y="163" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">阶段 1：正常运行 — A 持续续约</text>

  <line x1="160" y1="185" x2="475" y2="185" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="177" text-anchor="middle" font-size="11" fill="#475569">① A 每 10s 续约一次</text>

  <line x1="800" y1="210" x2="485" y2="210" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="645" y="202" text-anchor="middle" font-size="11" fill="#475569">② B 监听但不接管</text>

  <rect x="680" y="225" width="240" height="30" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="800" y="244" text-anchor="middle" font-size="10" fill="#5b21b6">B 处于待命状态，不处理 Pod</text>

  <!-- Stage 2: A 崩溃 -->
  <rect x="40" y="275" width="880" height="25" rx="4" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="480" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">阶段 2：实例 A 崩溃，停止续约</text>

  <rect x="80" y="310" width="160" height="30" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="329" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">A ✗ 进程退出</text>

  <rect x="400" y="310" width="160" height="30" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="329" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Lease 计时中</text>

  <!-- Stage 3: Lease 过期，B 接管 -->
  <rect x="40" y="355" width="880" height="25" rx="4" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="480" y="373" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">阶段 3：Lease 过期，B 竞争并接管</text>

  <line x1="480" y1="395" x2="795" y2="395" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="635" y="387" text-anchor="middle" font-size="11" fill="#065f46">③ Lease 过期 → B 竞争接管</text>

  <line x1="800" y1="420" x2="485" y2="420" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="645" y="412" text-anchor="middle" font-size="11" fill="#065f46">④ B 获得 Lease → 悬垂清理 + 开始服务</text>
</svg>
