<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="380" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">三路合并（Three-Way Strategic Merge Patch）</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">只修改自己负责的字段，不破坏其他控制器的写入</text>

  <!-- A: Last Applied State -->
  <g>
    <rect x="40" y="110" width="200" height="90" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="140" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">A: Last Applied State</text>
    <text x="140" y="156" text-anchor="middle" font-size="10" fill="#475569">上次自己成功应用的状态</text>
    <text x="140" y="175" text-anchor="middle" font-size="10" fill="#475569">保存在 annotation 中</text>
    <text x="140" y="192" text-anchor="middle" font-size="9" fill="#64748b">virtualKubelet.io/last-applied</text>
  </g>

  <!-- C: Provider Desired State -->
  <g>
    <rect x="40" y="220" width="200" height="90" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="140" y="245" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">C: Provider Desired</text>
    <text x="140" y="266" text-anchor="middle" font-size="10" fill="#475569">Provider 报告的新状态</text>
    <text x="140" y="285" text-anchor="middle" font-size="10" fill="#475569">当前期望状态</text>
  </g>

  <!-- B: Current Server State -->
  <g>
    <rect x="720" y="110" width="200" height="200" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="820" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">B: Current Server State</text>
    <text x="820" y="156" text-anchor="middle" font-size="10" fill="#475569">K8s 服务器当前 Node 状态</text>
    <text x="820" y="175" text-anchor="middle" font-size="10" fill="#475569">可能被多方修改：</text>
    <text x="820" y="195" text-anchor="middle" font-size="10" fill="#78350f">• Virtual Kubelet</text>
    <text x="820" y="213" text-anchor="middle" font-size="10" fill="#78350f">• Node Controller</text>
    <text x="820" y="231" text-anchor="middle" font-size="10" fill="#78350f">• External Operators</text>
    <text x="820" y="260" text-anchor="middle" font-size="10" fill="#475569">含自定义 Taint / Condition</text>
  </g>

  <!-- Step 1: diff(A → C) -->
  <line x1="240" y1="155" x2="310" y2="205" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="265" x2="310" y2="215" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="310" y="180" width="160" height="60" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="390" y="203" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">计算 diff(A → C)</text>
  <text x="390" y="222" text-anchor="middle" font-size="10" fill="#475569">找出 Provider 的增量</text>

  <line x1="470" y1="210" x2="510" y2="210" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="180" width="180" height="60" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="203" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">merge(diff, B)</text>
  <text x="600" y="222" text-anchor="middle" font-size="10" fill="#475569">增量合并到服务器状态</text>

  <line x1="690" y1="210" x2="720" y2="210" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 底部说明 -->
  <rect x="40" y="325" width="880" height="40" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="480" y="347" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Final Patch：仅包含 Provider 自身的增量变更 · 保留 B 中其他组件的修改</text>
  <text x="480" y="363" text-anchor="middle" font-size="10" fill="#064e3b">Virtual Kubelet = 好公民 · 只修改自己负责的字段</text>
</svg>
