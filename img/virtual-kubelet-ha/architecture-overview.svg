<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Virtual Kubelet 定位：Kubernetes 与外部平台之间的桥梁</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">Kubernetes API 在上，可编程后端在下</text>

  <!-- Top: API Server -->
  <rect x="280" y="85" width="400" height="60" rx="8" fill="#1e293b"/>
  <text x="480" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">Kubernetes API Server</text>
  <text x="480" y="130" text-anchor="middle" font-size="11" fill="#cbd5e1">调度 · 服务发现 · RBAC</text>

  <!-- Arrow down -->
  <path d="M480,145 L480,175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="540" y="163" font-size="10" fill="#64748b" font-style="italic">Watch / Update</text>

  <!-- Middle: Virtual Kubelet process -->
  <rect x="160" y="180" width="640" height="160" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="480" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Virtual Kubelet 进程</text>

  <g>
    <rect x="200" y="220" width="280" height="100" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="340" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">NodeController</text>
    <text x="340" y="267" text-anchor="middle" font-size="10" fill="#475569">节点注册 · 心跳 · 状态更新</text>
    <text x="340" y="285" text-anchor="middle" font-size="10" fill="#475569">Lease Controller</text>
    <text x="340" y="303" text-anchor="middle" font-size="10" fill="#475569">Ping 健康检测</text>
  </g>
  <g>
    <rect x="500" y="220" width="280" height="100" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="640" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">PodController</text>
    <text x="640" y="267" text-anchor="middle" font-size="10" fill="#475569">Pod 生命周期管理</text>
    <text x="640" y="285" text-anchor="middle" font-size="10" fill="#475569">多队列架构</text>
    <text x="640" y="303" text-anchor="middle" font-size="10" fill="#475569">状态同步循环</text>
  </g>

  <!-- Arrow down to Provider -->
  <path d="M480,340 L480,370" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="540" y="358" font-size="10" fill="#64748b" font-style="italic">Provider Interface</text>

  <!-- Bottom: Provider -->
  <rect x="280" y="375" width="400" height="55" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="480" y="398" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Provider 实现层</text>
  <text x="480" y="418" text-anchor="middle" font-size="11" fill="#475569">ACI · AWS Fargate · Nomad · 自定义后端</text>
</svg>
