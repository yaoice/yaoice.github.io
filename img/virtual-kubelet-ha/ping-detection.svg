<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Ping 健康检测：singleflight 去重 + MonitorVariable 发布</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">防止 Provider 响应缓慢时积累悬挂 Ping · 时序安全的发布订阅</text>

  <!-- 起点 -->
  <rect x="40" y="100" width="200" height="50" rx="8" fill="#1e293b"/>
  <text x="140" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#f1f5f9">定时触发</text>
  <text x="140" y="138" text-anchor="middle" font-size="10" fill="#cbd5e1">pingInterval</text>

  <line x1="240" y1="125" x2="275" y2="125" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="280" y="100" width="180" height="50" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="370" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">singleflight.DoChan</text>
  <text x="370" y="138" text-anchor="middle" font-size="10" fill="#475569">去重，避免重复 Ping</text>

  <line x1="460" y1="125" x2="495" y2="125" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="500" y="100" width="200" height="50" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Provider.Ping(ctx)</text>
  <text x="600" y="138" text-anchor="middle" font-size="10" fill="#475569">可附带 pingTimeout</text>

  <line x1="600" y1="150" x2="600" y2="170" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 判断 -->
  <polygon points="600,175 700,210 600,245 500,210" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="600" y="207" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">返回</text>
  <text x="600" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">还是超时？</text>

  <!-- 左分支：成功 -->
  <line x1="500" y1="210" x2="390" y2="260" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="440" y="225" font-size="10" fill="#10b981" font-weight="600">成功</text>

  <rect x="260" y="265" width="270" height="45" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="395" y="286" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">记录成功结果</text>
  <text x="395" y="302" text-anchor="middle" font-size="10" fill="#064e3b">pingResult.time = now</text>

  <!-- 右分支：超时 -->
  <line x1="700" y1="210" x2="810" y2="260" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="755" y="225" font-size="10" fill="#ef4444" font-weight="600">超时/取消</text>

  <rect x="670" y="265" width="270" height="45" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="805" y="286" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">记录错误结果</text>
  <text x="805" y="302" text-anchor="middle" font-size="10" fill="#7f1d1d">context.DeadlineExceeded</text>

  <!-- 合并 -->
  <line x1="395" y1="310" x2="480" y2="340" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="805" y1="310" x2="720" y2="340" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 发布 -->
  <rect x="280" y="345" width="440" height="45" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="500" y="365" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">MonitorVariable.Set(pingResult)</text>
  <text x="500" y="382" text-anchor="middle" font-size="10" fill="#475569">发布结果，LeaseController / NodeController 通过 getResult 读取</text>

  <!-- 底部说明 -->
  <rect x="40" y="400" width="880" height="28" rx="4" fill="#e2e8f0"/>
  <text x="480" y="419" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">首次调用阻塞等待 · 后续非阻塞读取最新 · 时序安全的启动保证</text>
</svg>
