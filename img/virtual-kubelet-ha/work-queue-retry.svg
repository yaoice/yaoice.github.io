<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">自定义工作队列重试策略</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">ShouldRetryFunc 驱动的灵活调度机制</text>

  <!-- 入口 -->
  <rect x="380" y="85" width="200" height="45" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="480" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">Queue 处理失败</text>
  <text x="480" y="122" text-anchor="middle" font-size="10" fill="#7f1d1d">触发重试判断</text>

  <line x1="480" y1="130" x2="480" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ShouldRetryFunc 调用 -->
  <rect x="300" y="155" width="360" height="55" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="480" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">ShouldRetryFunc(key, attempts, err)</text>
  <text x="480" y="196" text-anchor="middle" font-size="10" fill="#475569">由用户自定义重试策略</text>

  <line x1="480" y1="210" x2="480" y2="230" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 菱形：返回值类型 -->
  <polygon points="480,235 620,275 480,315 340,275" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="272" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">返回值类型</text>
  <text x="480" y="287" text-anchor="middle" font-size="10" fill="#92400e">？</text>

  <!-- 4 个分支 -->
  <!-- 分支1：error -->
  <line x1="340" y1="275" x2="215" y2="350" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="275" y="315" text-anchor="middle" font-size="10" fill="#ef4444">error</text>
  <rect x="40" y="355" width="180" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="130" y="378" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">永久放弃</text>
  <text x="130" y="395" text-anchor="middle" font-size="10" fill="#7f1d1d">不再重试</text>

  <!-- 分支2：nil -->
  <line x1="430" y1="310" x2="350" y2="350" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="380" y="332" text-anchor="middle" font-size="10" fill="#64748b">nil</text>
  <rect x="250" y="355" width="180" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="340" y="378" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">默认速率限制</text>
  <text x="340" y="395" text-anchor="middle" font-size="10" fill="#475569">使用默认退避重试</text>

  <!-- 分支3：delay > 0 -->
  <line x1="530" y1="310" x2="570" y2="350" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="560" y="332" text-anchor="middle" font-size="10" fill="#64748b">delay &gt; 0</text>
  <rect x="460" y="355" width="220" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="570" y="378" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">延迟指定时间后重试</text>
  <text x="570" y="395" text-anchor="middle" font-size="10" fill="#78350f">按指定时长排队</text>

  <!-- 分支4：delay < 0 -->
  <line x1="620" y1="275" x2="780" y2="350" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="740" y="315" text-anchor="middle" font-size="10" fill="#8b5cf6">delay &lt; 0</text>
  <rect x="710" y="355" width="220" height="60" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="820" y="378" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">提前调度（插队）</text>
  <text x="820" y="395" text-anchor="middle" font-size="10" fill="#6b21a8">更高优先级</text>

  <!-- 底部说明 -->
  <rect x="40" y="435" width="880" height="34" rx="4" fill="#e2e8f0"/>
  <text x="480" y="456" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">注意：所有路径最终都会检查"尝试次数 &lt; 20"，超过则永久放弃</text>
</svg>
