<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Lease 更新的多层防护网</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">逐层降级 · 层层兜底 · 最终由时间兜底</text>

  <!-- Layer 1 -->
  <g>
    <rect x="40" y="85" width="880" height="60" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="70" y="112" font-size="13" font-weight="700" fill="#065f46">Layer 1</text>
    <text x="170" y="112" font-size="12" font-weight="600" fill="#065f46">基于 latestLease 直接 Update</text>
    <text x="480" y="132" font-size="10" fill="#475569">跳过 GET，直接 PUT。减少 API Server 和 etcd 负载。</text>
    <rect x="820" y="104" width="80" height="22" rx="11" fill="#10b981"/>
    <text x="860" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">成功 → 结束</text>
  </g>

  <!-- 失败下沉箭头 -->
  <line x1="480" y1="148" x2="480" y2="168" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="163" font-size="10" fill="#ef4444" font-weight="600">失败</text>

  <!-- Layer 2 -->
  <g>
    <rect x="40" y="170" width="880" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="70" y="197" font-size="13" font-weight="700" fill="#1e40af">Layer 2</text>
    <text x="170" y="197" font-size="12" font-weight="600" fill="#1e40af">backoffEnsureLease + retryUpdateLease</text>
    <text x="480" y="217" font-size="10" fill="#475569">指数退避 100ms → 7s · 最多 5 次重试 · 处理 "lease 不存在" 等情况</text>
    <rect x="820" y="189" width="80" height="22" rx="11" fill="#3b82f6"/>
    <text x="860" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">无冲突 → 结束</text>
  </g>

  <line x1="480" y1="233" x2="480" y2="253" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="248" font-size="10" fill="#ef4444" font-weight="600">Conflict</text>

  <!-- Layer 3 -->
  <g>
    <rect x="40" y="255" width="880" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="70" y="282" font-size="13" font-weight="700" fill="#92400e">Layer 3</text>
    <text x="170" y="282" font-size="12" font-weight="600" fill="#92400e">重新获取最新 Lease 再重试</text>
    <text x="480" y="302" font-size="10" fill="#475569">遇到乐观锁冲突，重新 GET 最新版本，基于新版本再 Update</text>
    <rect x="820" y="274" width="80" height="22" rx="11" fill="#f59e0b"/>
    <text x="860" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">成功 → 结束</text>
  </g>

  <line x1="480" y1="318" x2="480" y2="338" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="333" font-size="10" fill="#ef4444" font-weight="600">全部失败</text>

  <!-- Layer 4 -->
  <g>
    <rect x="40" y="340" width="880" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="70" y="367" font-size="13" font-weight="700" fill="#991b1b">Layer 4</text>
    <text x="170" y="367" font-size="12" font-weight="600" fill="#991b1b">等待下一个 renewInterval 再恢复</text>
    <text x="480" y="387" font-size="10" fill="#475569">时间兜底：等待 10s 后整个流程从 Layer 1 重新开始</text>
    <rect x="820" y="359" width="80" height="22" rx="11" fill="#ef4444"/>
    <text x="860" y="375" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">最终兜底</text>
  </g>

  <!-- 底部说明 -->
  <text x="480" y="425" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">LeaseDuration 40s 内任意层成功即可 · 否则节点被标记 NotReady</text>
</svg>
