<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">分层架构：双控制器 + 可插拔 Provider 接口</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">NodeController · PodController · Provider 接口三层解耦</text>

  <!-- Outer container -->
  <rect x="40" y="85" width="880" height="400" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="108" font-size="13" font-weight="700" fill="#1e293b">Virtual Kubelet 进程</text>

  <!-- NodeController 层 -->
  <g>
    <rect x="60" y="125" width="420" height="170" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="80" y="148" font-size="12" font-weight="700" fill="#1e40af">NodeController 层</text>

    <rect x="80" y="165" width="120" height="55" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="140" y="185" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Ping Controller</text>
    <text x="140" y="203" text-anchor="middle" font-size="10" fill="#475569">存活检测</text>

    <line x1="200" y1="192" x2="230" y2="192" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="230" y="165" width="120" height="55" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="290" y="185" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Lease Controller</text>
    <text x="290" y="203" text-anchor="middle" font-size="10" fill="#475569">心跳续约</text>

    <line x1="350" y1="192" x2="380" y2="192" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="380" y="165" width="90" height="55" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="425" y="185" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Status</text>
    <text x="425" y="200" text-anchor="middle" font-size="10" fill="#475569">三路合并</text>
    <text x="425" y="214" text-anchor="middle" font-size="10" fill="#475569">Update</text>

    <text x="270" y="250" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Ping 健康 → Lease 续约 → 节点状态 Strategic Merge</text>
  </g>

  <!-- PodController 层 -->
  <g>
    <rect x="500" y="125" width="400" height="170" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="520" y="148" font-size="12" font-weight="700" fill="#5b21b6">PodController 层</text>

    <rect x="520" y="160" width="170" height="40" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="605" y="178" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">syncPodsFromKubernetes</text>
    <text x="605" y="193" text-anchor="middle" font-size="9" fill="#475569">K8s → Provider</text>

    <rect x="700" y="160" width="180" height="40" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="790" y="178" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">deletePodsFromKubernetes</text>
    <text x="790" y="193" text-anchor="middle" font-size="9" fill="#475569">强制删除</text>

    <rect x="520" y="210" width="360" height="40" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="700" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">syncPodStatusFromProvider</text>
    <text x="700" y="243" text-anchor="middle" font-size="9" fill="#475569">Provider → K8s · 5 秒轮询同步</text>

    <text x="700" y="275" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">三个独立工作队列 · 互不阻塞</text>
  </g>

  <!-- Provider Interface -->
  <g>
    <rect x="60" y="320" width="840" height="150" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="80" y="343" font-size="12" font-weight="700" fill="#065f46">Provider Interface（可插拔）</text>

    <rect x="80" y="360" width="250" height="90" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="205" y="382" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">PodLifecycleHandler</text>
    <text x="205" y="402" text-anchor="middle" font-size="10" fill="#475569">Create / Update / Delete</text>
    <text x="205" y="418" text-anchor="middle" font-size="10" fill="#475569">GetPod / GetPodStatus</text>
    <text x="205" y="433" text-anchor="middle" font-size="10" fill="#475569">GetPods</text>

    <rect x="350" y="360" width="250" height="90" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="475" y="382" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">NodeProvider</text>
    <text x="475" y="402" text-anchor="middle" font-size="10" fill="#475569">Ping</text>
    <text x="475" y="418" text-anchor="middle" font-size="10" fill="#475569">NotifyNodeStatus</text>

    <rect x="620" y="360" width="250" height="90" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="745" y="382" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">PodNotifier（可选）</text>
    <text x="745" y="402" text-anchor="middle" font-size="10" fill="#475569">NotifyPods</text>
    <text x="745" y="418" text-anchor="middle" font-size="10" fill="#475569">主动推送 Pod 状态</text>
  </g>

  <!-- 连线：上到下 -->
  <line x1="425" y1="295" x2="475" y2="320" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="700" y1="295" x2="745" y2="320" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="605" y1="295" x2="205" y2="320" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
</svg>
