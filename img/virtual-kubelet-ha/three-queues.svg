<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">PodController 多队列架构：三个独立工作队列</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">创建 / 删除 / 状态更新互不阻塞</text>

  <!-- 顶部 K8s -->
  <rect x="360" y="85" width="240" height="50" rx="8" fill="#1e293b"/>
  <text x="480" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Kubernetes API Server</text>
  <text x="480" y="126" text-anchor="middle" font-size="10" fill="#cbd5e1">Watch 事件源</text>

  <!-- 3 个 Informer -->
  <g>
    <rect x="80" y="170" width="180" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="170" y="195" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Pod Informer</text>

    <rect x="280" y="170" width="180" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="370" y="195" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Secret Informer</text>

    <rect x="480" y="170" width="180" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="570" y="195" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">ConfigMap Informer</text>
  </g>

  <line x1="480" y1="135" x2="480" y2="170" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="170" x2="370" y2="170" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="540" y1="170" x2="570" y2="170" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- 3 个队列 -->
  <g>
    <rect x="40" y="240" width="280" height="130" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="180" y="265" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">队列 1</text>
    <text x="180" y="283" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">syncPodsFromKubernetes</text>
    <rect x="60" y="295" width="240" height="25" rx="4" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="180" y="312" text-anchor="middle" font-size="10" fill="#475569">K8s → Provider 创建/更新</text>
    <rect x="60" y="325" width="240" height="35" rx="4" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="180" y="341" text-anchor="middle" font-size="10" fill="#475569">可能耗时长（拉镜像等）</text>
    <text x="180" y="355" text-anchor="middle" font-size="10" fill="#475569">不阻塞删除</text>
  </g>

  <g>
    <rect x="340" y="240" width="280" height="130" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="480" y="265" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">队列 2</text>
    <text x="480" y="283" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">deletePodsFromKubernetes</text>
    <rect x="360" y="295" width="240" height="25" rx="4" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="480" y="312" text-anchor="middle" font-size="10" fill="#475569">高优先级强制删除</text>
    <rect x="360" y="325" width="240" height="35" rx="4" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
    <text x="480" y="341" text-anchor="middle" font-size="10" fill="#475569">key = ns/name/uid</text>
    <text x="480" y="355" text-anchor="middle" font-size="10" fill="#475569">不被创建操作阻塞</text>
  </g>

  <g>
    <rect x="640" y="240" width="280" height="130" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="780" y="265" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">队列 3</text>
    <text x="780" y="283" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">syncPodStatusFromProvider</text>
    <rect x="660" y="295" width="240" height="25" rx="4" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="780" y="312" text-anchor="middle" font-size="10" fill="#475569">Provider → K8s 状态回写</text>
    <rect x="660" y="325" width="240" height="35" rx="4" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="780" y="341" text-anchor="middle" font-size="10" fill="#475569">频繁但不影响生命周期</text>
    <text x="780" y="355" text-anchor="middle" font-size="10" fill="#475569">5 秒轮询兜底</text>
  </g>

  <!-- Pod Informer -> Q1,Q2,Q3 -->
  <line x1="170" y1="210" x2="180" y2="240" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="170" y1="210" x2="440" y2="240" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="170" y1="210" x2="720" y2="240" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <!-- Secret/ConfigMap -> Q1 -->
  <line x1="370" y1="210" x2="220" y2="240" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="570" y1="210" x2="260" y2="240" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- 底部说明 -->
  <rect x="40" y="390" width="880" height="34" rx="4" fill="#e2e8f0"/>
  <text x="480" y="411" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">队列隔离原则：创建慢、删除急、状态频繁 · 各走各的不互相拖累</text>
</svg>
