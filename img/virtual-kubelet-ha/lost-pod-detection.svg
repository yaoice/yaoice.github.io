<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">丢失 Pod 的自动故障检测（updatePodStatus）</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">Provider 报告"Pod 不存在"时的安全处理逻辑</text>

  <!-- 入口 -->
  <rect x="280" y="85" width="400" height="50" rx="8" fill="#1e293b"/>
  <text x="480" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#f1f5f9">Provider.GetPodStatus 返回 NotFound</text>
  <text x="480" y="127" text-anchor="middle" font-size="10" fill="#cbd5e1">触发 updatePodStatus 特殊处理</text>

  <line x1="480" y1="135" x2="480" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 判断 1: 在 deletedPods 缓存中 -->
  <polygon points="480,160 620,200 480,240 340,200" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="195" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Pod 在 deletedPods</text>
  <text x="480" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">缓存中？</text>

  <!-- 是：忽略 -->
  <line x1="340" y1="200" x2="215" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="190" font-size="10" fill="#10b981" font-weight="600">是</text>
  <rect x="40" y="175" width="175" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="127" y="197" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">忽略</text>
  <text x="127" y="214" text-anchor="middle" font-size="9" fill="#064e3b">正在删除中，预期行为</text>

  <!-- 否：继续判断 -->
  <line x1="480" y1="240" x2="480" y2="260" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="253" font-size="10" fill="#ef4444" font-weight="600">否</text>

  <!-- 判断 2: 创建时间 < 1 分钟 -->
  <polygon points="480,265 620,305 480,345 340,305" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="298" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">创建时间 &lt; 1 分钟</text>
  <text x="480" y="313" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">且尚未运行？</text>

  <line x1="340" y1="305" x2="215" y2="305" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="295" font-size="10" fill="#10b981" font-weight="600">是</text>
  <rect x="40" y="280" width="175" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="127" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">忽略</text>
  <text x="127" y="319" text-anchor="middle" font-size="9" fill="#064e3b">可能仍在初始化</text>

  <line x1="480" y1="345" x2="480" y2="365" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="358" font-size="10" fill="#ef4444" font-weight="600">否</text>

  <!-- 判定丢失 -->
  <rect x="300" y="370" width="360" height="45" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="480" y="392" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">判定 Pod 已丢失</text>
  <text x="480" y="408" text-anchor="middle" font-size="10" fill="#7f1d1d">后端意外丢失，需要触发重调度</text>

  <line x1="480" y1="415" x2="480" y2="435" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 状态设置 -->
  <rect x="220" y="440" width="520" height="60" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="480" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">设置失败状态并通知 API Server</text>
  <text x="280" y="483" font-size="10" fill="#475569">• Phase = Failed</text>
  <text x="480" y="483" font-size="10" fill="#475569">• Reason = NotFound</text>
  <text x="280" y="498" font-size="10" fill="#475569">• 容器 exit code = -137 (SIGKILL)</text>
  <text x="480" y="498" font-size="10" fill="#475569">• 触发 Deployment 重新调度</text>

  <!-- 底部说明 -->
  <text x="480" y="525" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">最多 5 秒（syncLoopInterval）内完成故障检测</text>
</svg>
