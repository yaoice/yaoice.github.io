<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="280" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">动态修剪架构：随模型能力提升持续减少辅助机制</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">"我可以停止做什么？" —— 定期审视与修剪代理框架中的"死重"</text>

  <!-- 四代演化 -->
  <g>
    <rect x="40" y="100" width="200" height="110" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="140" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">模型 v1</text>
    <line x1="60" y1="138" x2="220" y2="138" stroke="#fca5a5" stroke-width="1"/>
    <text x="140" y="160" text-anchor="middle" font-size="10" fill="#7f1d1d">需要辅助机制</text>
    <text x="140" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">A + B + C</text>
    <text x="140" y="198" text-anchor="middle" font-size="9" fill="#991b1b" font-style="italic">初始复杂架构</text>
  </g>

  <line x1="240" y1="155" x2="275" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="258" y="145" text-anchor="middle" font-size="10" fill="#64748b">能力提升</text>

  <g>
    <rect x="280" y="100" width="200" height="110" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="380" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">模型 v2</text>
    <line x1="300" y1="138" x2="460" y2="138" stroke="#fde68a" stroke-width="1"/>
    <text x="380" y="160" text-anchor="middle" font-size="10" fill="#78350f">A 不再需要</text>
    <text x="380" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">B + C</text>
    <text x="380" y="198" text-anchor="middle" font-size="9" fill="#92400e" font-style="italic">移除 A：变"死重"</text>
  </g>

  <line x1="480" y1="155" x2="515" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="498" y="145" text-anchor="middle" font-size="10" fill="#64748b">能力提升</text>

  <g>
    <rect x="520" y="100" width="200" height="110" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="620" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">模型 v3</text>
    <line x1="540" y1="138" x2="700" y2="138" stroke="#93c5fd" stroke-width="1"/>
    <text x="620" y="160" text-anchor="middle" font-size="10" fill="#475569">A, B 不再需要</text>
    <text x="620" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">C</text>
    <text x="620" y="198" text-anchor="middle" font-size="9" fill="#1e40af" font-style="italic">继续修剪</text>
  </g>

  <line x1="720" y1="155" x2="755" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="738" y="145" text-anchor="middle" font-size="10" fill="#64748b">能力提升</text>

  <g>
    <rect x="760" y="100" width="160" height="110" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="840" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">模型 v4</text>
    <line x1="780" y1="138" x2="900" y2="138" stroke="#6ee7b7" stroke-width="1"/>
    <text x="840" y="160" text-anchor="middle" font-size="10" fill="#064e3b">只保留</text>
    <text x="840" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#064e3b">C</text>
    <text x="840" y="198" text-anchor="middle" font-size="9" fill="#065f46" font-style="italic">最精简</text>
  </g>

  <rect x="40" y="230" width="880" height="34" rx="4" fill="#e2e8f0"/>
  <text x="480" y="252" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">"Sonnet 4.5 的上下文焦虑"案例：Opus 4.5 发布后自动消失 → 之前为此添加的上下文重置机制变成了"死重"</text>
</svg>
