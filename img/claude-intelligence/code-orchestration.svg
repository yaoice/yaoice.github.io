<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">代码执行作为编排层：Claude 自己决定信息流</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">只有精炼的最终结果回到主上下文，中间数据不污染</text>

  <!-- Lifelines -->
  <rect x="60" y="85" width="140" height="36" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Claude</text>

  <rect x="300" y="85" width="180" height="36" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="390" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">代码执行环境</text>

  <rect x="580" y="85" width="140" height="36" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="650" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">工具 A</text>

  <rect x="800" y="85" width="120" height="36" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="860" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">工具 B</text>

  <line x1="130" y1="125" x2="130" y2="455" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="390" y1="125" x2="390" y2="455" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="650" y1="125" x2="650" y2="455" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="860" y1="125" x2="860" y2="455" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: 编排代码 -->
  <line x1="130" y1="150" x2="385" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="257" y="143" text-anchor="middle" font-size="11" fill="#475569">① 编写编排代码</text>

  <!-- Step 2 -->
  <line x1="390" y1="180" x2="645" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="517" y="173" text-anchor="middle" font-size="11" fill="#475569">② 调用工具 A</text>

  <line x1="645" y1="210" x2="395" y2="210" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="517" y="203" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">返回大量原始数据</text>

  <!-- Step 3: 过滤 -->
  <rect x="320" y="228" width="140" height="30" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="390" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">③ 过滤、转换</text>

  <!-- Step 4: 传给B -->
  <line x1="390" y1="275" x2="855" y2="275" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="625" y="268" text-anchor="middle" font-size="11" fill="#475569">④ 将处理后数据传给工具 B</text>

  <line x1="855" y1="305" x2="395" y2="305" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="625" y="298" text-anchor="middle" font-size="11" fill="#475569">⑤ 返回结果</text>

  <!-- Step 5: 提取 -->
  <rect x="320" y="323" width="140" height="30" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="390" y="343" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">⑥ 提取关键信息</text>

  <!-- Step 6: 返回精炼 -->
  <line x1="385" y1="375" x2="135" y2="375" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="260" y="368" text-anchor="middle" font-size="11" fill="#10b981" font-weight="600">⑦ 只返回精炼的输出</text>

  <!-- 结论 -->
  <rect x="60" y="410" width="860" height="40" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="490" y="432" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Claude 只看到最终精炼结果，不被中间数据污染</text>
  <text x="490" y="448" text-anchor="middle" font-size="10" fill="#064e3b">BrowseComp 基准：Opus 4.6 从 45.3% 提升到 61.6%（+36% 相对提升）</text>
</svg>
