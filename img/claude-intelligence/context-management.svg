<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">上下文管理策略：让 Claude 自主治理上下文</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">Skills · Context Editing · Subagents · Compaction · Memory Folder</text>

  <!-- Strategy 1: Skills -->
  <g>
    <rect x="40" y="90" width="280" height="180" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="40" y="90" width="280" height="38" rx="10" fill="#3b82f6"/>
    <rect x="40" y="120" width="280" height="8" fill="#3b82f6"/>
    <text x="180" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">策略一：Skills 按需加载</text>

    <rect x="60" y="140" width="240" height="40" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="180" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">YAML 元数据（常驻）</text>
    <text x="180" y="173" text-anchor="middle" font-size="9" fill="#64748b">简短描述 · 预加载</text>

    <line x1="180" y1="185" x2="180" y2="205" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

    <rect x="60" y="210" width="240" height="50" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="180" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">完整技能内容（按需）</text>
    <text x="180" y="244" text-anchor="middle" font-size="9" fill="#64748b">通过 read_file 渐进加载</text>
    <text x="180" y="258" text-anchor="middle" font-size="9" fill="#64748b">进入上下文窗口</text>
  </g>

  <!-- Strategy 2: Context Editing -->
  <g>
    <rect x="340" y="90" width="280" height="180" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="340" y="90" width="280" height="38" rx="10" fill="#f59e0b"/>
    <rect x="340" y="120" width="280" height="8" fill="#f59e0b"/>
    <text x="480" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">策略二：Context Editing</text>

    <rect x="360" y="140" width="240" height="36" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="480" y="162" text-anchor="middle" font-size="10" fill="#92400e">🟢 活跃上下文 · 🟡 过期片段</text>

    <line x1="480" y1="180" x2="480" y2="200" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

    <rect x="360" y="205" width="240" height="30" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="480" y="225" text-anchor="middle" font-size="10" fill="#92400e">识别过期/无关并选择性移除</text>

    <line x1="480" y1="240" x2="480" y2="255" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

    <rect x="360" y="258" width="240" height="12" rx="3" fill="#fef3c7"/>
  </g>

  <!-- Strategy 3: Subagents -->
  <g>
    <rect x="640" y="90" width="280" height="180" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
    <rect x="640" y="90" width="280" height="38" rx="10" fill="#10b981"/>
    <rect x="640" y="120" width="280" height="8" fill="#10b981"/>
    <text x="780" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">策略三：Subagents 分叉</text>

    <rect x="720" y="140" width="120" height="36" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="780" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">主代理</text>

    <line x1="750" y1="180" x2="700" y2="210" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
    <line x1="810" y1="180" x2="860" y2="210" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

    <rect x="650" y="215" width="100" height="45" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="700" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">子代理 A</text>
    <text x="700" y="250" text-anchor="middle" font-size="9" fill="#064e3b">独立上下文</text>

    <rect x="810" y="215" width="100" height="45" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="860" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">子代理 B</text>
    <text x="860" y="250" text-anchor="middle" font-size="9" fill="#064e3b">独立上下文</text>
  </g>

  <!-- Strategy 4: Compaction -->
  <g>
    <rect x="40" y="300" width="430" height="190" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="40" y="300" width="430" height="38" rx="10" fill="#8b5cf6"/>
    <rect x="40" y="330" width="430" height="8" fill="#8b5cf6"/>
    <text x="255" y="324" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">策略四：Compaction（压缩/精简）</text>

    <rect x="60" y="355" width="120" height="50" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="120" y="374" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">窗口 v1</text>
    <text x="120" y="390" text-anchor="middle" font-size="9" fill="#6b21a8">已满</text>

    <line x1="180" y1="380" x2="215" y2="380" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="197" y="370" text-anchor="middle" font-size="9" fill="#64748b">Compact</text>

    <rect x="220" y="355" width="100" height="50" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="270" y="380" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">摘要</text>

    <line x1="320" y1="380" x2="355" y2="380" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="360" y="355" width="100" height="50" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="410" y="374" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">窗口 v2</text>
    <text x="410" y="390" text-anchor="middle" font-size="9" fill="#6b21a8">继续</text>

    <text x="255" y="430" text-anchor="middle" font-size="10" fill="#5b21b6">"什么值得留"的能力与智能强相关</text>
    <text x="255" y="455" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">Sonnet 4.5 → 43% · Opus 4.5 → 68% · Opus 4.6 → 84%</text>
  </g>

  <!-- Strategy 5: Memory Folder -->
  <g>
    <rect x="490" y="300" width="430" height="190" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect x="490" y="300" width="430" height="38" rx="10" fill="#0ea5e9"/>
    <rect x="490" y="330" width="430" height="8" fill="#0ea5e9"/>
    <text x="705" y="324" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">策略五：Memory Folder（持久化记忆）</text>

    <rect x="510" y="355" width="390" height="50" rx="6" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1"/>
    <text x="705" y="375" text-anchor="middle" font-size="11" fill="#075985">Claude 自行决定写入什么 · 按需读取</text>
    <text x="705" y="391" text-anchor="middle" font-size="10" fill="#0c4a6e">原文未规定固定目录结构</text>

    <text x="705" y="425" text-anchor="middle" font-size="10" fill="#075985">BrowseComp-Plus · Sonnet 4.5</text>
    <text x="705" y="450" text-anchor="middle" font-size="14" font-weight="700" fill="#0369a1">60.4% → 67.2%</text>
    <text x="705" y="468" text-anchor="middle" font-size="9" fill="#075985">（加上记忆文件夹后）</text>
  </g>
</svg>
