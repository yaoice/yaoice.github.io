<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="360" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">缓存优化的五大原则</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">最大化 Prompt Caching 命中率 · 缓存 token 仅需基础输入的 10%</text>

  <g>
    <rect x="40" y="90" width="170" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="125" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">原则一</text>
    <text x="125" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">静态优先</text>
    <line x1="60" y1="145" x2="190" y2="145" stroke="#93c5fd" stroke-width="1"/>
    <text x="125" y="164" text-anchor="middle" font-size="10" fill="#475569">稳定内容在前</text>
    <text x="125" y="180" text-anchor="middle" font-size="10" fill="#475569">动态内容在后</text>
  </g>

  <g>
    <rect x="225" y="90" width="170" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="310" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">原则二</text>
    <text x="310" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">消息追加</text>
    <line x1="245" y1="145" x2="375" y2="145" stroke="#93c5fd" stroke-width="1"/>
    <text x="310" y="164" text-anchor="middle" font-size="10" fill="#475569">system-reminder</text>
    <text x="310" y="180" text-anchor="middle" font-size="10" fill="#475569">而非编辑提示</text>
  </g>

  <g>
    <rect x="410" y="90" width="170" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="495" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">原则三</text>
    <text x="495" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">不切换模型</text>
    <line x1="430" y1="145" x2="560" y2="145" stroke="#93c5fd" stroke-width="1"/>
    <text x="495" y="164" text-anchor="middle" font-size="10" fill="#475569">缓存与模型绑定</text>
    <text x="495" y="180" text-anchor="middle" font-size="10" fill="#475569">会话内保持一致</text>
  </g>

  <g>
    <rect x="595" y="90" width="170" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="680" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">原则四</text>
    <text x="680" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">谨慎管理工具</text>
    <line x1="615" y1="145" x2="745" y2="145" stroke="#93c5fd" stroke-width="1"/>
    <text x="680" y="164" text-anchor="middle" font-size="10" fill="#475569">工具定义在前缀中</text>
    <text x="680" y="180" text-anchor="middle" font-size="10" fill="#475569">增删会使缓存失效</text>
  </g>

  <g>
    <rect x="780" y="90" width="140" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="850" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">原则五</text>
    <text x="850" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">更新断点</text>
    <line x1="800" y1="145" x2="900" y2="145" stroke="#93c5fd" stroke-width="1"/>
    <text x="850" y="164" text-anchor="middle" font-size="10" fill="#475569">移至最新消息</text>
    <text x="850" y="180" text-anchor="middle" font-size="10" fill="#475569">前缀尽量长</text>
  </g>

  <!-- 汇合到最终结果 -->
  <line x1="125" y1="195" x2="440" y2="240" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="310" y1="195" x2="460" y2="240" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="495" y1="195" x2="480" y2="240" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="680" y1="195" x2="500" y2="240" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="850" y1="195" x2="520" y2="240" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <rect x="320" y="245" width="320" height="50" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="480" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">更高缓存命中率</text>
  <text x="480" y="287" text-anchor="middle" font-size="10" fill="#064e3b">成本降至基础输入的 10%</text>

  <!-- 反模式提示 -->
  <rect x="40" y="315" width="880" height="32" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="480" y="337" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="600">反模式：每轮修改系统提示 · 频繁切换模型 · 动态增删工具 · 固定断点不移动</text>
</svg>
