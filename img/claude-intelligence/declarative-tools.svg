<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">声明式工具：把边界变成可拦截、可审计的动作</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">类型化参数 → 代理框架可对动作进行拦截/门控/渲染/审计</text>

  <!-- Claude Agent -->
  <rect x="80" y="220" width="180" height="80" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Claude Agent</text>
  <text x="170" y="270" text-anchor="middle" font-size="10" fill="#475569">触发声明式工具调用</text>
  <text x="170" y="286" text-anchor="middle" font-size="9" fill="#64748b">带类型化参数</text>

  <line x1="260" y1="260" x2="275" y2="260" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 声明式工具 (菱形) -->
  <polygon points="380,220 490,260 380,300 270,260" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="380" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Declarative</text>
  <text x="380" y="274" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Tool</text>

  <!-- 三分支 -->
  <line x1="460" y1="235" x2="540" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="175" text-anchor="middle" font-size="10" fill="#64748b">安全敏感</text>
  <rect x="540" y="100" width="180" height="90" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="630" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">🔒 安全门控</text>
  <text x="630" y="150" text-anchor="middle" font-size="10" fill="#475569">不可逆/高风险操作</text>
  <text x="630" y="168" text-anchor="middle" font-size="10" fill="#475569">要求用户确认</text>
  <text x="630" y="184" text-anchor="middle" font-size="10" fill="#64748b">外部 API / DB 写入</text>

  <line x1="490" y1="260" x2="540" y2="260" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="515" y="250" text-anchor="middle" font-size="10" fill="#64748b">用户交互</text>
  <rect x="540" y="215" width="180" height="90" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="630" y="243" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">🎨 UX 渲染</text>
  <text x="630" y="265" text-anchor="middle" font-size="10" fill="#475569">渲染为 UI 组件</text>
  <text x="630" y="283" text-anchor="middle" font-size="10" fill="#475569">模态框 · 选项列表</text>
  <text x="630" y="299" text-anchor="middle" font-size="10" fill="#64748b">取代纯文本往返</text>

  <line x1="460" y1="285" x2="540" y2="375" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="340" text-anchor="middle" font-size="10" fill="#64748b">所有动作</text>
  <rect x="540" y="330" width="180" height="90" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="630" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">📊 可观察性</text>
  <text x="630" y="380" text-anchor="middle" font-size="10" fill="#475569">结构化参数可审计</text>
  <text x="630" y="398" text-anchor="middle" font-size="10" fill="#475569">日志 · 追踪 · 回放</text>
  <text x="630" y="414" text-anchor="middle" font-size="10" fill="#64748b">生产级监控</text>

  <!-- 右端结果 -->
  <rect x="760" y="100" width="160" height="90" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="840" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">执行 / 阻止</text>
  <text x="840" y="148" text-anchor="middle" font-size="9" fill="#7f1d1d">用户确认 → 执行</text>
  <text x="840" y="164" text-anchor="middle" font-size="9" fill="#7f1d1d">否则拒绝并退回</text>
  <text x="840" y="182" text-anchor="middle" font-size="9" fill="#7f1d1d">由 Claude 重新规划</text>

  <rect x="760" y="215" width="160" height="90" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="840" y="243" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">用户界面</text>
  <text x="840" y="265" text-anchor="middle" font-size="9" fill="#6b21a8">清晰的可视化选择</text>
  <text x="840" y="281" text-anchor="middle" font-size="9" fill="#6b21a8">结构化输入控件</text>

  <rect x="760" y="330" width="160" height="90" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="840" y="358" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">审计 / 回放</text>
  <text x="840" y="380" text-anchor="middle" font-size="9" fill="#064e3b">操作日志可检索</text>
  <text x="840" y="396" text-anchor="middle" font-size="9" fill="#064e3b">失败场景可复现</text>

  <line x1="720" y1="145" x2="760" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="260" x2="760" y2="260" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="375" x2="760" y2="375" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 底部：auto-mode -->
  <rect x="80" y="450" width="800" height="50" rx="10" fill="#1e293b"/>
  <text x="480" y="473" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">Claude Code auto-mode</text>
  <text x="480" y="491" text-anchor="middle" font-size="10" fill="#cbd5e1">在 bash 工具外增加安全层 · 由第二个 Claude 读取命令字符串并判断是否安全</text>
</svg>
