<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">BrowseComp 基准性能对比</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">不同架构/模型/策略下的准确率（数据来源：Anthropic 官方原文）</text>

  <!-- Chart frame -->
  <line x1="90" y1="120" x2="90" y2="420" stroke="#475569" stroke-width="1.5"/>
  <line x1="90" y1="420" x2="890" y2="420" stroke="#475569" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="75" y="125" text-anchor="end" font-size="10" fill="#64748b">100%</text>
  <text x="75" y="185" text-anchor="end" font-size="10" fill="#64748b">80%</text>
  <text x="75" y="245" text-anchor="end" font-size="10" fill="#64748b">60%</text>
  <text x="75" y="305" text-anchor="end" font-size="10" fill="#64748b">40%</text>
  <text x="75" y="365" text-anchor="end" font-size="10" fill="#64748b">20%</text>
  <text x="75" y="425" text-anchor="end" font-size="10" fill="#64748b">0%</text>

  <!-- Grid -->
  <line x1="90" y1="120" x2="890" y2="120" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="90" y1="180" x2="890" y2="180" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="90" y1="240" x2="890" y2="240" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="90" y1="300" x2="890" y2="300" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="90" y1="360" x2="890" y2="360" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bars (6 个) -->
  <!-- Bar 1: 标准 45.3% -->
  <rect x="140" y="284" width="80" height="136" rx="4" fill="#f59e0b"/>
  <text x="180" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">45.3%</text>
  <text x="180" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">标准模式</text>
  <text x="180" y="455" text-anchor="middle" font-size="9" fill="#64748b">Opus 4.6</text>
  <text x="180" y="470" text-anchor="middle" font-size="9" fill="#94a3b8">基线</text>

  <!-- Bar 2: 自编排 61.6% -->
  <rect x="260" y="235" width="80" height="185" rx="4" fill="#3b82f6"/>
  <text x="300" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">61.6%</text>
  <text x="300" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">自编排</text>
  <text x="300" y="455" text-anchor="middle" font-size="9" fill="#64748b">Opus 4.6</text>
  <text x="300" y="470" text-anchor="middle" font-size="9" fill="#10b981">+16.3pp</text>

  <!-- Bar 3: Sonnet4.5 Compaction 43% -->
  <rect x="380" y="291" width="80" height="129" rx="4" fill="#94a3b8"/>
  <text x="420" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">43%</text>
  <text x="420" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Compaction</text>
  <text x="420" y="455" text-anchor="middle" font-size="9" fill="#64748b">Sonnet 4.5</text>
  <text x="420" y="470" text-anchor="middle" font-size="9" fill="#ef4444">未提升</text>

  <!-- Bar 4: Opus 4.5 Compaction 68% -->
  <rect x="500" y="216" width="80" height="204" rx="4" fill="#8b5cf6"/>
  <text x="540" y="207" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">68%</text>
  <text x="540" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Compaction</text>
  <text x="540" y="455" text-anchor="middle" font-size="9" fill="#64748b">Opus 4.5</text>
  <text x="540" y="470" text-anchor="middle" font-size="9" fill="#10b981">显著</text>

  <!-- Bar 5: Opus 4.6 Compaction 84% -->
  <rect x="620" y="168" width="80" height="252" rx="4" fill="#10b981"/>
  <text x="660" y="159" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">84%</text>
  <text x="660" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Compaction</text>
  <text x="660" y="455" text-anchor="middle" font-size="9" fill="#64748b">Opus 4.6</text>
  <text x="660" y="470" text-anchor="middle" font-size="9" fill="#10b981">最佳</text>

  <!-- Bar 6: Subagent +2.8% -->
  <rect x="740" y="227" width="80" height="193" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="780" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">+2.8%</text>
  <text x="780" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">+子代理</text>
  <text x="780" y="455" text-anchor="middle" font-size="9" fill="#64748b">Opus 4.6</text>
  <text x="780" y="470" text-anchor="middle" font-size="9" fill="#10b981">天花板提升</text>

  <!-- 底部说明 -->
  <rect x="60" y="488" width="840" height="10" rx="2" fill="#eef2ff"/>
  <text x="480" y="100" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">另外：BrowseComp-Plus 给 Sonnet 4.5 加记忆文件夹可将准确率从 60.4% 提升到 67.2%</text>
</svg>
