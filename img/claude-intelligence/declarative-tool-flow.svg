<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="380" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">声明式工具：让代理框架可拦截、可审计</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">类型化参数带来的三类工程价值</text>

  <!-- Claude Agent -->
  <rect x="40" y="160" width="160" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Claude Agent</text>
  <text x="120" y="205" text-anchor="middle" font-size="10" fill="#475569">触发动作</text>

  <line x1="200" y1="190" x2="245" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 声明式工具（菱形） -->
  <polygon points="325,140 420,190 325,240 230,190" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="325" y="187" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Declarative</text>
  <text x="325" y="203" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Tool</text>

  <!-- 三个输出分支 -->
  <line x1="420" y1="165" x2="540" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="190" x2="540" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="215" x2="540" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 1. 安全门控 -->
  <rect x="545" y="85" width="200" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="645" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">安全门控</text>
  <text x="645" y="126" text-anchor="middle" font-size="10" fill="#475569">不可逆/高风险操作</text>
  <text x="645" y="142" text-anchor="middle" font-size="10" fill="#475569">用户确认</text>

  <!-- 2. UX 渲染 -->
  <rect x="545" y="160" width="200" height="60" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="645" y="183" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">UX 渲染</text>
  <text x="645" y="201" text-anchor="middle" font-size="10" fill="#475569">渲染为界面交互</text>
  <text x="645" y="217" text-anchor="middle" font-size="10" fill="#475569">而非纯文本往返</text>

  <!-- 3. 可观察性 -->
  <rect x="545" y="235" width="200" height="60" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="645" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">可观察性</text>
  <text x="645" y="276" text-anchor="middle" font-size="10" fill="#475569">结构化参数</text>
  <text x="645" y="292" text-anchor="middle" font-size="10" fill="#475569">日志/追踪/重放</text>

  <!-- 右端最终结果 -->
  <line x1="745" y1="115" x2="775" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="780" y="95" width="150" height="40" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="855" y="119" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="600">执行或阻止</text>

  <line x1="745" y1="190" x2="775" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="780" y="170" width="150" height="40" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.2"/>
  <text x="855" y="194" text-anchor="middle" font-size="11" fill="#5b21b6" font-weight="600">用户交互</text>

  <line x1="745" y1="265" x2="775" y2="265" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="780" y="245" width="150" height="40" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.2"/>
  <text x="855" y="269" text-anchor="middle" font-size="11" fill="#065f46" font-weight="600">审计与回放</text>

  <!-- 注意 -->
  <rect x="40" y="320" width="880" height="40" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="60" y="340" font-size="11" font-weight="700" fill="#92400e">注意</text>
  <text x="110" y="340" font-size="11" fill="#78350f">原文讨论的是设计思想，没有给出固定的 JSON schema</text>
  <text x="60" y="356" font-size="10" fill="#78350f" font-style="italic">不要把自拟的 requires_confirmation / render_as / risk_level 当作官方标准字段</text>
</svg>
