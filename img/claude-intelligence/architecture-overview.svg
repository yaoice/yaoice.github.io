<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Claude 智能架构总览</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">Harnessing Claude's Intelligence — 三大核心模式</text>

  <!-- 中心 Claude -->
  <circle cx="480" cy="260" r="70" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <text x="480" y="253" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">Claude</text>
  <text x="480" y="273" text-anchor="middle" font-size="10" fill="#cbd5e1">智能 · 延迟 · 成本</text>
  <text x="480" y="287" text-anchor="middle" font-size="9" fill="#94a3b8">持续演进</text>

  <!-- 三大模式 -->
  <!-- Pattern 1: 左上 -->
  <g>
    <rect x="60" y="100" width="240" height="110" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="180" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">模式一</text>
    <text x="180" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">使用 Claude 已知的能力</text>
    <line x1="80" y1="160" x2="280" y2="160" stroke="#93c5fd" stroke-width="1"/>
    <text x="180" y="180" text-anchor="middle" font-size="10" fill="#475569">Bash · 文本编辑器</text>
    <text x="180" y="196" text-anchor="middle" font-size="10" fill="#475569">SWE-bench 49%</text>
  </g>

  <!-- Pattern 2: 右上 -->
  <g>
    <rect x="660" y="100" width="240" height="110" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="780" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">模式二</text>
    <text x="780" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">问自己：能停止做什么？</text>
    <line x1="680" y1="160" x2="880" y2="160" stroke="#fde68a" stroke-width="1"/>
    <text x="780" y="180" text-anchor="middle" font-size="10" fill="#475569">让 Claude 自主编排/管理</text>
    <text x="780" y="196" text-anchor="middle" font-size="10" fill="#475569">BrowseComp 45.3% → 61.6%</text>
  </g>

  <!-- Pattern 3: 下 -->
  <g>
    <rect x="360" y="390" width="240" height="90" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="480" y="415" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">模式三</text>
    <text x="480" y="435" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">精准设置边界</text>
    <line x1="380" y1="445" x2="580" y2="445" stroke="#6ee7b7" stroke-width="1"/>
    <text x="480" y="465" text-anchor="middle" font-size="10" fill="#475569">缓存 · 声明式工具 · auto-mode</text>
  </g>

  <!-- 三条连线 -->
  <line x1="280" y1="210" x2="420" y2="240" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="680" y1="210" x2="540" y2="240" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="480" y1="330" x2="480" y2="385" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 左侧概念 -->
  <rect x="60" y="240" width="140" height="25" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="130" y="258" text-anchor="middle" font-size="10" fill="#334155">Agent Skills</text>
  <rect x="60" y="270" width="140" height="25" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="130" y="288" text-anchor="middle" font-size="10" fill="#334155">Memory Folder</text>
  <rect x="60" y="300" width="140" height="25" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="130" y="318" text-anchor="middle" font-size="10" fill="#334155">Programmatic Tool</text>

  <!-- 右侧概念 -->
  <rect x="760" y="240" width="140" height="25" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="830" y="258" text-anchor="middle" font-size="10" fill="#334155">Compaction</text>
  <rect x="760" y="270" width="140" height="25" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="830" y="288" text-anchor="middle" font-size="10" fill="#334155">Context Editing</text>
  <rect x="760" y="300" width="140" height="25" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="830" y="318" text-anchor="middle" font-size="10" fill="#334155">Subagents</text>

  <line x1="200" y1="252" x2="410" y2="260" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="200" y1="312" x2="410" y2="270" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="760" y1="252" x2="550" y2="260" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="760" y1="312" x2="550" y2="270" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 引言 -->
  <text x="480" y="80" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">"最好的 Claude 应用是那些知道何时放手的应用。"</text>
</svg>
