<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="420" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">三种上下文管理策略</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">Skills · Context Editing · Subagents</text>

  <!-- 策略 1 -->
  <g>
    <rect x="40" y="90" width="280" height="290" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="40" y="90" width="280" height="38" rx="10" fill="#3b82f6"/>
    <rect x="40" y="120" width="280" height="8" fill="#3b82f6"/>
    <text x="180" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">策略一：Skills</text>

    <rect x="60" y="145" width="240" height="50" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="180" y="167" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">YAML 元数据（始终可见）</text>
    <text x="180" y="185" text-anchor="middle" font-size="10" fill="#475569">简短描述 · 预加载</text>

    <line x1="180" y1="200" x2="180" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="200" y="214" font-size="10" fill="#64748b">按需加载</text>

    <rect x="60" y="225" width="240" height="50" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="180" y="247" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">完整技能内容</text>
    <text x="180" y="265" text-anchor="middle" font-size="10" fill="#475569">通过 read_file 获取</text>

    <line x1="180" y1="280" x2="180" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="60" y="305" width="240" height="40" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="180" y="329" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">进入上下文窗口</text>
  </g>

  <!-- 策略 2 -->
  <g>
    <rect x="340" y="90" width="280" height="290" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="340" y="90" width="280" height="38" rx="10" fill="#f59e0b"/>
    <rect x="340" y="120" width="280" height="8" fill="#f59e0b"/>
    <text x="480" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">策略二：Context Editing</text>

    <rect x="360" y="145" width="240" height="50" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1"/>
    <text x="480" y="167" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">活跃上下文</text>
    <text x="480" y="185" text-anchor="middle" font-size="10" fill="#475569">混合过期/无关内容</text>

    <line x1="480" y1="200" x2="480" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="510" y="214" font-size="10" fill="#64748b">识别并移除</text>

    <rect x="360" y="225" width="240" height="50" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1"/>
    <text x="480" y="247" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">选择性移除</text>
    <text x="480" y="265" text-anchor="middle" font-size="10" fill="#475569">过期工具结果 · 陈旧思考块</text>

    <line x1="480" y1="280" x2="480" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="360" y="305" width="240" height="40" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="480" y="329" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">精简的上下文窗口</text>
  </g>

  <!-- 策略 3 -->
  <g>
    <rect x="640" y="90" width="280" height="290" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <rect x="640" y="90" width="280" height="38" rx="10" fill="#10b981"/>
    <rect x="640" y="120" width="280" height="8" fill="#10b981"/>
    <text x="780" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">策略三：Sub-agents</text>

    <rect x="720" y="145" width="120" height="45" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="780" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">主代理</text>
    <text x="780" y="180" text-anchor="middle" font-size="10" fill="#475569">Main</text>

    <line x1="745" y1="195" x2="700" y2="225" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="815" y1="195" x2="860" y2="225" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="780" y="208" text-anchor="middle" font-size="10" fill="#64748b">分叉</text>

    <rect x="650" y="230" width="100" height="50" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="700" y="250" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">子代理 A</text>
    <text x="700" y="266" text-anchor="middle" font-size="9" fill="#475569">独立上下文</text>

    <rect x="810" y="230" width="100" height="50" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
    <text x="860" y="250" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">子代理 B</text>
    <text x="860" y="266" text-anchor="middle" font-size="9" fill="#475569">独立上下文</text>

    <line x1="700" y1="285" x2="755" y2="310" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="860" y1="285" x2="805" y2="310" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="780" y="302" text-anchor="middle" font-size="10" fill="#10b981" font-weight="600">返回精炼结果</text>

    <rect x="700" y="315" width="160" height="40" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="780" y="339" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">回到主代理</text>
  </g>

  <!-- 底部 -->
  <rect x="40" y="390" width="880" height="22" rx="4" fill="#e2e8f0"/>
  <text x="480" y="407" text-anchor="middle" font-size="10" fill="#475569" font-weight="600">把上下文管理的决策权交给 Claude 自身 · 不要把所有指令硬编码进系统提示</text>
</svg>
