<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="300" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">从基础工具到复杂模式的组合</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">两个通用工具通过组合衍生出三种高级模式</text>

  <g>
    <rect x="60" y="105" width="180" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="150" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Bash 工具</text>
    <text x="150" y="150" text-anchor="middle" font-size="10" fill="#475569">通用命令执行</text>
  </g>
  <g>
    <rect x="60" y="195" width="180" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="150" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">文本编辑器</text>
    <text x="150" y="240" text-anchor="middle" font-size="10" fill="#475569">文件读写操作</text>
  </g>

  <!-- 3 右侧模式 -->
  <g>
    <rect x="580" y="90" width="300" height="50" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="730" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Agent Skills（代理技能）</text>
    <text x="730" y="128" text-anchor="middle" font-size="10" fill="#475569">预加载元数据 + 按需加载内容</text>
  </g>
  <g>
    <rect x="580" y="150" width="300" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="730" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Programmatic Tool Use</text>
    <text x="730" y="188" text-anchor="middle" font-size="10" fill="#475569">程序化工具调用 / 代码编排</text>
  </g>
  <g>
    <rect x="580" y="210" width="300" height="50" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="730" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Memory Tools（记忆工具）</text>
    <text x="730" y="248" text-anchor="middle" font-size="10" fill="#475569">跨会话的信息持久化</text>
  </g>

  <!-- 连线 -->
  <line x1="240" y1="135" x2="575" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="135" x2="575" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="225" x2="575" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="225" x2="575" y2="235" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="135" x2="575" y2="235" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
