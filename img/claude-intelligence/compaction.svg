<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="260" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Compaction（压缩/精简）示意</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">让长任务在新上下文窗口中延续</text>

  <rect x="60" y="110" width="220" height="100" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="170" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">上下文窗口 v1</text>
  <rect x="80" y="150" width="180" height="20" rx="2" fill="#fca5a5"/>
  <rect x="80" y="175" width="180" height="20" rx="2" fill="#fca5a5"/>
  <text x="170" y="165" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">已满</text>
  <text x="170" y="190" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">无可用空间</text>

  <line x1="280" y1="160" x2="345" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="312" y="150" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">Compaction</text>

  <rect x="350" y="125" width="180" height="70" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="440" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">摘要</text>
  <text x="440" y="170" text-anchor="middle" font-size="10" fill="#78350f">保留关键信息</text>
  <text x="440" y="185" text-anchor="middle" font-size="10" fill="#78350f">去除冗余细节</text>

  <line x1="530" y1="160" x2="595" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="562" y="150" text-anchor="middle" font-size="10" fill="#64748b">作为起点</text>

  <rect x="600" y="110" width="220" height="100" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="710" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">上下文窗口 v2</text>
  <rect x="620" y="150" width="60" height="20" rx="2" fill="#6ee7b7"/>
  <rect x="620" y="175" width="180" height="20" rx="2" fill="#ffffff" stroke="#6ee7b7" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="650" y="165" text-anchor="middle" font-size="9" fill="#065f46" font-weight="600">摘要</text>
  <text x="710" y="190" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">可继续工作</text>

  <line x1="820" y1="160" x2="895" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="860" y="150" text-anchor="middle" font-size="10" fill="#64748b">继续</text>

  <rect x="40" y="225" width="880" height="22" rx="4" fill="#e2e8f0"/>
  <text x="480" y="242" text-anchor="middle" font-size="10" fill="#475569" font-weight="600">BrowseComp 数据：Sonnet 4.5 保持 43%（无效果）· Opus 4.5 达 68% · Opus 4.6 达 84%</text>
</svg>
