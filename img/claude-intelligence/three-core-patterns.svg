<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="960" height="500" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">三大核心模式概览</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">Harnessing Claude's Intelligence — 3 Key Patterns</text>

  <!-- Pattern 1 -->
  <g>
    <rect x="40" y="90" width="280" height="370" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="40" y="90" width="280" height="60" rx="10" fill="#3b82f6"/>
    <rect x="40" y="140" width="280" height="10" fill="#3b82f6"/>
    <text x="180" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Pattern 1</text>
    <text x="180" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">使用 Claude 已知的能力</text>

    <rect x="60" y="170" width="240" height="70" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="180" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">核心洞察</text>
    <text x="180" y="215" text-anchor="middle" font-size="10" fill="#475569">Claude 深度理解的通用工具</text>
    <text x="180" y="230" text-anchor="middle" font-size="10" fill="#475569">&gt; 专用工具</text>

    <text x="180" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">基础工具</text>
    <rect x="80" y="280" width="200" height="26" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="180" y="297" text-anchor="middle" font-size="10" fill="#1e40af">Bash · 文本编辑器</text>

    <text x="180" y="335" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">组合出</text>
    <rect x="80" y="345" width="200" height="22" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="180" y="361" text-anchor="middle" font-size="10" fill="#1e40af">Agent Skills</text>
    <rect x="80" y="372" width="200" height="22" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="180" y="388" text-anchor="middle" font-size="10" fill="#1e40af">Programmatic Tool Calling</text>
    <rect x="80" y="399" width="200" height="22" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="180" y="415" text-anchor="middle" font-size="10" fill="#1e40af">Memory Tool / Folder</text>

    <text x="180" y="445" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">SWE-bench Verified 49%</text>
  </g>

  <!-- Pattern 2 -->
  <g>
    <rect x="340" y="90" width="280" height="370" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="340" y="90" width="280" height="60" rx="10" fill="#f59e0b"/>
    <rect x="340" y="140" width="280" height="10" fill="#f59e0b"/>
    <text x="480" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Pattern 2</text>
    <text x="480" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">我可以停止做什么？</text>

    <rect x="360" y="170" width="240" height="70" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="480" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">核心洞察</text>
    <text x="480" y="215" text-anchor="middle" font-size="10" fill="#475569">随模型能力提升持续修剪</text>
    <text x="480" y="230" text-anchor="middle" font-size="10" fill="#475569">"辅助轮"</text>

    <text x="480" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">三个维度的"放手"</text>

    <rect x="360" y="285" width="240" height="42" rx="4" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="480" y="303" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">① 编排自己的操作</text>
    <text x="480" y="319" text-anchor="middle" font-size="9" fill="#78350f">代码执行过滤中间结果</text>

    <rect x="360" y="332" width="240" height="42" rx="4" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="480" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">② 管理自己的上下文</text>
    <text x="480" y="366" text-anchor="middle" font-size="9" fill="#78350f">Skills · Context Editing · 子代理</text>

    <rect x="360" y="379" width="240" height="42" rx="4" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="480" y="397" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">③ 持久化自己的上下文</text>
    <text x="480" y="413" text-anchor="middle" font-size="9" fill="#78350f">Compaction · Memory Folder</text>

    <text x="480" y="445" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">BrowseComp: 45.3% → 61.6%</text>
  </g>

  <!-- Pattern 3 -->
  <g>
    <rect x="640" y="90" width="280" height="370" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
    <rect x="640" y="90" width="280" height="60" rx="10" fill="#10b981"/>
    <rect x="640" y="140" width="280" height="10" fill="#10b981"/>
    <text x="780" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Pattern 3</text>
    <text x="780" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">精准设置边界</text>

    <rect x="660" y="170" width="240" height="70" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="780" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">核心洞察</text>
    <text x="780" y="215" text-anchor="middle" font-size="10" fill="#475569">只在 UX / 安全 / 成本</text>
    <text x="780" y="230" text-anchor="middle" font-size="10" fill="#475569">真正需要的地方设限</text>

    <text x="780" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">落地手段</text>

    <rect x="660" y="285" width="240" height="42" rx="4" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="780" y="303" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">缓存命中最大化</text>
    <text x="780" y="319" text-anchor="middle" font-size="9" fill="#064e3b">静态优先 · 不切模型 · 移动断点</text>

    <rect x="660" y="332" width="240" height="42" rx="4" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="780" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">声明式工具</text>
    <text x="780" y="366" text-anchor="middle" font-size="9" fill="#064e3b">拦截 · 门控 · 渲染 · 审计</text>

    <rect x="660" y="379" width="240" height="42" rx="4" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="780" y="397" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">auto-mode 安全层</text>
    <text x="780" y="413" text-anchor="middle" font-size="9" fill="#064e3b">第二个 Claude 审核命令</text>

    <text x="780" y="445" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">缓存 token = 基础 10%</text>
  </g>
</svg>
