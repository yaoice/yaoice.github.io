<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">从基础工具到高阶模式的概念关系图</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">作者整理：原文未给出"应用层/编排层/基础层"的正式分层架构</text>

  <!-- Base tools -->
  <g>
    <rect x="40" y="100" width="180" height="70" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="130" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Bash tool</text>
    <text x="130" y="145" text-anchor="middle" font-size="11" fill="#475569">Bash 工具</text>
    <text x="130" y="160" text-anchor="middle" font-size="9" fill="#64748b">Claude 深度理解</text>
  </g>
  <g>
    <rect x="40" y="200" width="180" height="70" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="130" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Text editor</text>
    <text x="130" y="245" text-anchor="middle" font-size="11" fill="#475569">文本编辑器工具</text>
    <text x="130" y="260" text-anchor="middle" font-size="9" fill="#64748b">查看/创建/编辑</text>
  </g>
  <g>
    <rect x="40" y="300" width="180" height="70" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="130" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Code execution</text>
    <text x="130" y="345" text-anchor="middle" font-size="11" fill="#475569">代码执行环境</text>
    <text x="130" y="360" text-anchor="middle" font-size="9" fill="#64748b">REPL / Bash</text>
  </g>

  <!-- Mid tier: modes -->
  <g>
    <rect x="360" y="90" width="200" height="70" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="460" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Agent Skills</text>
    <text x="460" y="132" text-anchor="middle" font-size="10" fill="#475569">YAML 元数据 + 内容</text>
    <text x="460" y="148" text-anchor="middle" font-size="10" fill="#475569">按需加载上下文</text>
  </g>
  <g>
    <rect x="360" y="175" width="200" height="70" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="460" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Programmatic</text>
    <text x="460" y="217" text-anchor="middle" font-size="10" fill="#475569">Tool calling</text>
    <text x="460" y="233" text-anchor="middle" font-size="10" fill="#475569">Claude 编写编排代码</text>
  </g>
  <g>
    <rect x="360" y="260" width="200" height="70" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="460" y="284" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Memory tool /</text>
    <text x="460" y="302" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Memory folder</text>
    <text x="460" y="318" text-anchor="middle" font-size="10" fill="#475569">跨会话持久化</text>
  </g>

  <!-- Right: higher-order -->
  <g>
    <rect x="700" y="90" width="220" height="70" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="810" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Context editing</text>
    <text x="810" y="132" text-anchor="middle" font-size="10" fill="#475569">上下文编辑</text>
    <text x="810" y="148" text-anchor="middle" font-size="10" fill="#475569">选择性移除陈旧内容</text>
  </g>
  <g>
    <rect x="700" y="175" width="220" height="70" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="810" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Subagents</text>
    <text x="810" y="217" text-anchor="middle" font-size="10" fill="#475569">子代理</text>
    <text x="810" y="233" text-anchor="middle" font-size="10" fill="#475569">独立上下文隔离任务</text>
  </g>
  <g>
    <rect x="700" y="260" width="220" height="70" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="810" y="284" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Compaction</text>
    <text x="810" y="302" text-anchor="middle" font-size="10" fill="#475569">压缩</text>
    <text x="810" y="318" text-anchor="middle" font-size="10" fill="#475569">总结历史，延续长任务</text>
  </g>

  <!-- Connections: base → mid -->
  <line x1="220" y1="125" x2="355" y2="125" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="220" y1="230" x2="355" y2="125" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="220" y1="335" x2="355" y2="210" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="220" y1="125" x2="355" y2="210" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="220" y1="230" x2="355" y2="295" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="220" y1="335" x2="355" y2="295" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Mid → higher -->
  <line x1="560" y1="125" x2="695" y2="125" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="560" y1="210" x2="695" y2="210" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="560" y1="295" x2="695" y2="295" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- 底部说明 -->
  <rect x="40" y="390" width="880" height="34" rx="4" fill="#e2e8f0"/>
  <text x="480" y="411" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">原文核心事实：高阶模式都是由 Claude 已深度理解的 Bash / 文本编辑器工具"组合"而来</text>
</svg>
