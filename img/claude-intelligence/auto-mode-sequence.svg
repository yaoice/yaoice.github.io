<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="960" height="420" fill="#f8fafc" rx="10"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Claude Code auto-mode 安全边界</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">用第二个 Claude 读取命令字符串并判断是否安全</text>

  <!-- Lifelines -->
  <rect x="80" y="85" width="140" height="36" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">主 Claude</text>

  <rect x="400" y="85" width="160" height="36" rx="18" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">审核 Claude</text>

  <rect x="740" y="85" width="140" height="36" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="810" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Bash 环境</text>

  <line x1="150" y1="125" x2="150" y2="380" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="480" y1="125" x2="480" y2="380" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="810" y1="125" x2="810" y2="380" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: 生成命令 -->
  <line x1="150" y1="150" x2="475" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="312" y="143" text-anchor="middle" font-size="11" fill="#475569">① 生成待执行的 bash 命令</text>

  <!-- Step 2: 判断安全 -->
  <rect x="400" y="170" width="160" height="30" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">② 判断命令安全性</text>

  <!-- 分支 A: 允许 -->
  <rect x="40" y="225" width="880" height="25" rx="4" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="480" y="243" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">分支 A：允许执行</text>

  <line x1="480" y1="260" x2="805" y2="260" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="642" y="253" text-anchor="middle" font-size="11" fill="#10b981" font-weight="600">③ 放行命令</text>

  <line x1="810" y1="285" x2="155" y2="285" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="482" y="278" text-anchor="middle" font-size="11" fill="#10b981" font-weight="600">④ 返回执行结果</text>

  <!-- 分支 B: 拒绝 -->
  <rect x="40" y="310" width="880" height="25" rx="4" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="480" y="328" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">分支 B：拒绝执行</text>

  <line x1="475" y1="355" x2="155" y2="355" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="315" y="348" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">③ 退回并要求重规划</text>

  <!-- 底部说明 -->
  <text x="480" y="395" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">工程启示：随着 Claude 能力增强，一些辅助机制可被重新内化到更灵活的代理框架里</text>
</svg>
