<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="460" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Sandbox → Canary → Production：Agent 发布漏斗</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">每一阶段验证不同行为，错误成本逐级提升</text>

  <!-- Funnel: 3 trapezoids -->
  <!-- Sandbox -->
  <g filter="url(#sd)">
    <polygon points="80,110 380,110 340,200 120,200" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="230" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">① Sandbox</text>
    <text x="230" y="162" text-anchor="middle" font-size="12" fill="#475569">内部测试 · 流量 0%</text>
    <text x="230" y="182" text-anchor="middle" font-size="11" fill="#64748b">验证：单元功能 · 工具调用正确性</text>
  </g>

  <!-- Canary -->
  <g filter="url(#sd)">
    <polygon points="380,110 660,110 620,260 420,260" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="520" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">② Canary</text>
    <text x="520" y="178" text-anchor="middle" font-size="12" fill="#475569">真实场景 · 流量 1–10%</text>
    <text x="520" y="200" text-anchor="middle" font-size="11" fill="#64748b">验证：Trajectory 质量</text>
    <text x="520" y="220" text-anchor="middle" font-size="11" fill="#64748b">错误恢复 · 长尾 case</text>
  </g>

  <!-- Production -->
  <g filter="url(#sd)">
    <polygon points="660,110 880,110 840,330 700,330" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="770" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#065f46">③ Production</text>
    <text x="770" y="184" text-anchor="middle" font-size="12" fill="#475569">完整发布 · 100%</text>
    <text x="770" y="206" text-anchor="middle" font-size="11" fill="#64748b">验证：可观测</text>
    <text x="770" y="224" text-anchor="middle" font-size="11" fill="#64748b">回滚 · 容量</text>
    <text x="770" y="242" text-anchor="middle" font-size="11" fill="#64748b">SLO 兜底</text>
  </g>

  <!-- Stage arrows -->
  <line x1="380" y1="155" x2="378" y2="155" stroke="#94a3b8" stroke-width="0"/>
  <line x1="350" y1="240" x2="408" y2="240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="0"/>
  <line x1="630" y1="280" x2="688" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bottom comparison table -->
  <rect x="60" y="350" width="840" height="90" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="80" y="375" font-size="13" font-weight="700" fill="#1e293b">vs 传统蓝绿/灰度发布</text>

  <line x1="60" y1="385" x2="900" y2="385" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="320" y1="385" x2="320" y2="440" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="600" y1="385" x2="600" y2="440" stroke="#e2e8f0" stroke-width="1"/>

  <text x="80" y="405" font-size="12" font-weight="600" fill="#475569">维度</text>
  <text x="340" y="405" font-size="12" font-weight="600" fill="#475569">传统服务</text>
  <text x="620" y="405" font-size="12" font-weight="600" fill="#475569">Agent 服务</text>

  <text x="80" y="425" font-size="11" fill="#1e293b">回归对象</text>
  <text x="340" y="425" font-size="11" fill="#475569">输入 → 输出</text>
  <text x="620" y="425" font-size="11" fill="#1e293b">Trajectory（决策序列）</text>

  <text x="200" y="425" font-size="11" fill="#475569"></text>

  <!-- vertical risk bar -->
  <text x="100" y="100" font-size="11" fill="#94a3b8">爆炸半径</text>
  <text x="50" y="225" font-size="10" fill="#94a3b8" transform="rotate(-90 50 225)">小 → 大</text>
</svg>
