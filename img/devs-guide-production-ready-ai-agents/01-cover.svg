<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="360" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">从 Demo 到生产：AI Agent 的 5 个工程化阶段</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">每一阶段都有传统工程范式失效的地方</text>

  <!-- 5 stages -->
  <g filter="url(#sd)">
    <rect x="40" y="120" width="160" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="120" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">① 定义</text>
    <text x="120" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">What is Agent</text>
    <text x="120" y="195" text-anchor="middle" font-size="11" fill="#475569">Brain · Loop · Orchestrator</text>
    <text x="120" y="225" text-anchor="middle" font-size="11" fill="#ef4444">风险：把它当函数</text>
  </g>

  <g filter="url(#sd)">
    <rect x="220" y="120" width="160" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="300" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">② 工具</text>
    <text x="300" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Tools &amp; Interop</text>
    <text x="300" y="195" text-anchor="middle" font-size="11" fill="#475569">MCP · A2A</text>
    <text x="300" y="225" text-anchor="middle" font-size="11" fill="#ef4444">风险：N×M 集成爆炸</text>
  </g>

  <g filter="url(#sd)">
    <rect x="400" y="120" width="160" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="480" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">③ 上下文</text>
    <text x="480" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Context Engineering</text>
    <text x="480" y="195" text-anchor="middle" font-size="11" fill="#475569">Prompt · RAG · Memory</text>
    <text x="480" y="225" text-anchor="middle" font-size="11" fill="#ef4444">风险：失忆与重复</text>
  </g>

  <g filter="url(#sd)">
    <rect x="580" y="120" width="160" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="660" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">④ 评估</text>
    <text x="660" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Test &amp; Eval</text>
    <text x="660" y="195" text-anchor="middle" font-size="11" fill="#475569">Trajectory · Unit · Stage</text>
    <text x="660" y="225" text-anchor="middle" font-size="11" fill="#ef4444">风险：只看终点</text>
  </g>

  <g filter="url(#sd)">
    <rect x="760" y="120" width="160" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="840" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">⑤ 部署</text>
    <text x="840" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Production</text>
    <text x="840" y="195" text-anchor="middle" font-size="11" fill="#475569">Sandbox→Canary→Prod</text>
    <text x="840" y="225" text-anchor="middle" font-size="11" fill="#ef4444">风险：直接灰度</text>
  </g>

  <!-- arrows -->
  <line x1="200" y1="180" x2="218" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="180" x2="398" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="180" x2="578" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="740" y1="180" x2="758" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- bottom band -->
  <rect x="40" y="280" width="880" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="60" y="304" font-size="13" font-weight="600" fill="#1e293b">贯穿主线</text>
  <text x="60" y="322" font-size="11" fill="#475569">Agent 会推理、行动、自适应——确定性代码的工程范式无法直接套用</text>
  <rect x="700" y="290" width="200" height="30" rx="15" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="800" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">非确定性 ≠ 不可控</text>
</svg>
