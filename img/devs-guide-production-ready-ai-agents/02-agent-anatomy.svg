<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrowSm" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L8,4 z" fill="#94a3b8"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="480" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Agent 解剖：Brain · 核心循环 · 编排层</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">认知（思考）+ 神经系统（编排）+ 行动器（工具）</text>

  <!-- Brain (left) -->
  <g filter="url(#sd)">
    <rect x="50" y="110" width="200" height="280" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="150" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Brain · 大脑</text>
    <text x="150" y="160" text-anchor="middle" font-size="11" fill="#6b21a8">LLM 认知引擎</text>
    <line x1="70" y1="178" x2="230" y2="178" stroke="#c4b5fd" stroke-width="1"/>
    <text x="150" y="205" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">理解任务</text>
    <text x="150" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">基于上下文决策</text>
    <text x="150" y="255" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">生成响应</text>
    <rect x="70" y="280" width="160" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="150" y="305" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">核心循环</text>
    <text x="150" y="328" text-anchor="middle" font-size="12" fill="#3b82f6">Think</text>
    <text x="150" y="346" text-anchor="middle" font-size="12" fill="#10b981">→ Act</text>
    <text x="150" y="364" text-anchor="middle" font-size="12" fill="#f59e0b">→ Observe</text>
  </g>

  <!-- arrow brain -> orchestration -->
  <line x1="252" y1="250" x2="288" y2="250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Orchestration layer (center) -->
  <g filter="url(#sd)">
    <rect x="290" y="110" width="380" height="320" rx="12" fill="#ffffff" stroke="#3b82f6" stroke-width="1.8"/>
    <text x="480" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Orchestration Layer · 编排层</text>
    <text x="480" y="160" text-anchor="middle" font-size="11" fill="#475569">协调通信与数据流的"神经系统"</text>

    <!-- 5 components 2x3 grid -->
    <rect x="310" y="180" width="160" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="390" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Session State</text>
    <text x="390" y="223" text-anchor="middle" font-size="11" fill="#475569">短期记忆 · 即时回忆</text>

    <rect x="490" y="180" width="160" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="570" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Memory Service</text>
    <text x="570" y="223" text-anchor="middle" font-size="11" fill="#475569">长期记忆 · 跨会话</text>

    <rect x="310" y="252" width="160" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="390" y="277" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">RAG · 检索</text>
    <text x="390" y="295" text-anchor="middle" font-size="11" fill="#475569">外部知识接入</text>

    <rect x="490" y="252" width="160" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="570" y="277" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Tool Use</text>
    <text x="570" y="295" text-anchor="middle" font-size="11" fill="#475569">在外部世界执行动作</text>

    <rect x="400" y="324" width="160" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
    <text x="480" y="349" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Security Framework</text>
    <text x="480" y="367" text-anchor="middle" font-size="11" fill="#475569">边界 · 鉴权 · 审计</text>

    <text x="480" y="410" text-anchor="middle" font-size="11" fill="#64748b">每一块都对应一类常见生产事故</text>
  </g>

  <!-- arrow orchestration -> external -->
  <line x1="672" y1="280" x2="708" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- External world (right) -->
  <g filter="url(#sd)">
    <rect x="710" y="110" width="200" height="280" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="810" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">External World</text>
    <text x="810" y="160" text-anchor="middle" font-size="11" fill="#047857">数据 · 工具 · 其他 Agent</text>
    <line x1="730" y1="178" x2="890" y2="178" stroke="#a7f3d0" stroke-width="1"/>
    <rect x="730" y="195" width="160" height="40" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
    <text x="810" y="220" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">数据库 / API</text>
    <rect x="730" y="245" width="160" height="40" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
    <text x="810" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">企业系统 · SaaS</text>
    <rect x="730" y="295" width="160" height="40" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
    <text x="810" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">其他 Agent</text>
    <rect x="730" y="345" width="160" height="35" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
    <text x="810" y="368" text-anchor="middle" font-size="11" fill="#065f46">通过 MCP / A2A 接入</text>
  </g>

  <!-- footer -->
  <rect x="50" y="430" width="860" height="36" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="453" text-anchor="middle" font-size="12" fill="#92400e">缺一不可：少了 Memory 会失忆，少了 Security 会越权，少了 Orchestration 就只是裸 LLM</text>
</svg>
