<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#10b981"/>
    </marker>
    <filter id="sd" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="440" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">MCP vs A2A：两条不同方向的标准化</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#64748b">一个解决 Agent 接工具，一个解决 Agent 连 Agent</text>

  <!-- divider -->
  <line x1="480" y1="90" x2="480" y2="410" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Left: MCP -->
  <text x="240" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">MCP · Model Context Protocol</text>
  <text x="240" y="128" text-anchor="middle" font-size="11" fill="#64748b">Anthropic · Agent ↔ 工具 / 数据源</text>

  <g filter="url(#sd)">
    <rect x="170" y="150" width="140" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="240" y="175" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Agent</text>
    <text x="240" y="194" text-anchor="middle" font-size="11" fill="#475569">单一 LLM 主体</text>
  </g>

  <line x1="240" y1="212" x2="240" y2="248" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
  <text x="252" y="232" font-size="11" fill="#1e40af">标准化调用</text>

  <g filter="url(#sd)">
    <rect x="80" y="260" width="140" height="56" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="150" y="282" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">数据库</text>
    <text x="150" y="302" text-anchor="middle" font-size="11" fill="#475569">SQL · 文件系统</text>
  </g>
  <g filter="url(#sd)">
    <rect x="240" y="260" width="140" height="56" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="310" y="282" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">SaaS API</text>
    <text x="310" y="302" text-anchor="middle" font-size="11" fill="#475569">Slack · GitHub</text>
  </g>
  <g filter="url(#sd)">
    <rect x="160" y="328" width="140" height="56" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="230" y="350" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">无状态工具</text>
    <text x="230" y="370" text-anchor="middle" font-size="11" fill="#475569">脚本 · 计算器</text>
  </g>

  <!-- MCP traits -->
  <rect x="100" y="395" width="280" height="30" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="240" y="414" text-anchor="middle" font-size="11" fill="#1e40af">关键词：标准化连接 · 替代 N×M 集成</text>

  <!-- Right: A2A -->
  <text x="720" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">A2A · Agent2Agent Protocol</text>
  <text x="720" y="128" text-anchor="middle" font-size="11" fill="#64748b">Google · Agent ↔ Agent，跨框架</text>

  <g filter="url(#sd)">
    <rect x="540" y="150" width="120" height="60" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="600" y="175" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Agent A</text>
    <text x="600" y="194" text-anchor="middle" font-size="11" fill="#475569">框架 X</text>
  </g>
  <g filter="url(#sd)">
    <rect x="780" y="150" width="120" height="60" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="840" y="175" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Agent B</text>
    <text x="840" y="194" text-anchor="middle" font-size="11" fill="#475569">框架 Y</text>
  </g>

  <line x1="660" y1="180" x2="780" y2="180" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <line x1="780" y1="200" x2="660" y2="200" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <text x="720" y="172" text-anchor="middle" font-size="11" fill="#065f46">能力发现 · 协商</text>
  <text x="720" y="220" text-anchor="middle" font-size="11" fill="#065f46">结构化消息</text>

  <g filter="url(#sd)">
    <rect x="660" y="260" width="120" height="56" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.2"/>
    <text x="720" y="282" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Agent C</text>
    <text x="720" y="302" text-anchor="middle" font-size="11" fill="#475569">框架 Z</text>
  </g>
  <line x1="600" y1="212" x2="690" y2="258" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="840" y1="212" x2="750" y2="258" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- A2A traits -->
  <rect x="580" y="395" width="280" height="30" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="720" y="414" text-anchor="middle" font-size="11" fill="#065f46">关键词：跨框架协作 · 不暴露内部实现</text>

  <!-- Mid badge -->
  <rect x="410" y="330" width="140" height="34" rx="17" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="480" y="352" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">两者互补，不替代</text>
</svg>
