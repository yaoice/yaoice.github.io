<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 450" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">四条洞察的递进关系</title>
  <desc id="d">公开上下文、明确角色、设定北极星、建立信任，逐级抬高智能体的自主度。</desc>
  <rect width="960" height="450" fill="#f8fafc" rx="10"/>
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">四条洞察：逐级抬高智能体的自主度</text>

  <!-- 阶梯 1 公开上下文 -->
  <rect x="40" y="288" width="210" height="128" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <rect x="40" y="288" width="210" height="30" rx="10" fill="#475569"/>
  <text x="145" y="308" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">① 公开工作</text>
  <text x="145" y="340" text-anchor="middle" font-size="11" fill="#1e293b">给 agent 足够上下文</text>
  <text x="145" y="368" text-anchor="middle" font-size="10" fill="#64748b">没写下来且可访问的</text>
  <text x="145" y="384" text-anchor="middle" font-size="10" fill="#64748b">对 agent 就不存在</text>

  <!-- 阶梯 2 明确角色 -->
  <rect x="270" y="226" width="210" height="128" rx="10" fill="#fff" stroke="#dbeafe"/>
  <rect x="270" y="226" width="210" height="30" rx="10" fill="#3b82f6"/>
  <text x="375" y="246" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">② 明确角色</text>
  <text x="375" y="278" text-anchor="middle" font-size="11" fill="#1e293b">每人每 agent 有分工</text>
  <text x="375" y="306" text-anchor="middle" font-size="10" fill="#64748b">否则各跑各的私人 AI</text>
  <text x="375" y="322" text-anchor="middle" font-size="10" fill="#64748b">重复劳动、撕裂上下文</text>

  <!-- 阶梯 3 北极星 -->
  <rect x="500" y="164" width="210" height="128" rx="10" fill="#fff" stroke="#fde68a"/>
  <rect x="500" y="164" width="210" height="30" rx="10" fill="#f59e0b"/>
  <text x="605" y="184" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">③ 设定北极星</text>
  <text x="605" y="216" text-anchor="middle" font-size="11" fill="#1e293b">让 agent 更主动</text>
  <text x="605" y="244" text-anchor="middle" font-size="10" fill="#64748b">宏大目标由人类设定</text>
  <text x="605" y="260" text-anchor="middle" font-size="10" fill="#64748b">agent 主动建议工作流</text>

  <!-- 阶梯 4 建立信任 -->
  <rect x="730" y="102" width="210" height="128" rx="10" fill="#fff" stroke="#a7f3d0"/>
  <rect x="730" y="102" width="210" height="30" rx="10" fill="#10b981"/>
  <text x="835" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">④ 建立信任</text>
  <text x="835" y="154" text-anchor="middle" font-size="11" fill="#1e293b">随时间赢得自主权</text>
  <text x="835" y="182" text-anchor="middle" font-size="10" fill="#64748b">可验证 + 反思 + 上报</text>
  <text x="835" y="198" text-anchor="middle" font-size="10" fill="#64748b">500 个 bug 独立修复</text>

  <!-- 递进箭头 -->
  <line x1="250" y1="300" x2="270" y2="288" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="266,281 274,286 268,293" fill="#94a3b8"/>
  <line x1="480" y1="238" x2="500" y2="226" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="496,219 504,224 498,231" fill="#94a3b8"/>
  <line x1="710" y1="176" x2="730" y2="164" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="726,157 734,162 728,169" fill="#94a3b8"/>

  <text x="480" y="436" text-anchor="middle" font-size="11" font-style="italic" fill="#64748b">从左到右：上下文 → 角色 → 目标 → 信任，agent 能被托付的边界越来越大</text>
</svg>
