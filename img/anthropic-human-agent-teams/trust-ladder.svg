<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">随时间建立信任的循环</title>
  <desc id="d">执行、验证、人在环审查、反思周报形成闭环，重复成功后逐步扩大自主权。</desc>
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="960" height="470" fill="#f8fafc" rx="10"/>
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">信任不是一开始就有：一个可验证、会反思的闭环</text>

  <!-- 左侧闭环流水线 -->
  <rect x="96" y="70" width="440" height="60" rx="8" fill="#eff6ff" stroke="#bfdbfe" filter="url(#s)"/>
  <text x="118" y="98" font-size="13" font-weight="700" fill="#1e40af">① 执行者 Agent 做任务</text>
  <text x="118" y="118" font-size="11" fill="#475569">读积压、打复杂度分、创建代码变更</text>

  <rect x="96" y="158" width="440" height="60" rx="8" fill="#fff" stroke="#e2e8f0" filter="url(#s)"/>
  <text x="118" y="186" font-size="13" font-weight="700" fill="#1e293b">② 验证者 Agent 检查</text>
  <text x="118" y="206" font-size="11" fill="#475569">代码有测试 · 文档套评分标准与风格指南</text>

  <rect x="96" y="246" width="440" height="60" rx="8" fill="#fff" stroke="#e2e8f0" filter="url(#s)"/>
  <text x="118" y="274" font-size="13" font-weight="700" fill="#1e293b">③ 人在环审查</text>
  <text x="118" y="294" font-size="11" fill="#475569">初期逐项审查 · 硬性权衡主动上报给人类</text>

  <rect x="96" y="334" width="440" height="60" rx="8" fill="#fff" stroke="#e2e8f0" filter="url(#s)"/>
  <text x="118" y="362" font-size="13" font-weight="700" fill="#1e293b">④ 反思周报「经验与失误」</text>
  <text x="118" y="382" font-size="11" fill="#475569">记录踩过的坑，避免重复犯错</text>

  <!-- 向下箭头 -->
  <line x1="316" y1="130" x2="316" y2="158" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="311,152 316,160 321,152" fill="#94a3b8"/>
  <line x1="316" y1="218" x2="316" y2="246" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="311,240 316,248 321,240" fill="#94a3b8"/>
  <line x1="316" y1="306" x2="316" y2="334" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="311,328 316,336 321,328" fill="#94a3b8"/>

  <!-- 回环箭头 -->
  <path d="M96 364 C40 364 40 100 96 100" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="90,94 98,100 90,106" fill="#10b981"/>
  <text x="30" y="236" text-anchor="middle" font-size="11" font-weight="600" fill="#059669" transform="rotate(-90 30 236)">重复成功 → 按任务类型扩大自主权</text>

  <!-- 右侧数据与治理 -->
  <rect x="576" y="70" width="336" height="150" rx="10" fill="#1e293b" filter="url(#s)"/>
  <text x="744" y="104" text-anchor="middle" font-size="12" fill="#cbd5e1">工程师已成功派遣团队智能体</text>
  <text x="744" y="150" text-anchor="middle" font-size="40" font-weight="800" fill="#fff">500</text>
  <text x="744" y="182" text-anchor="middle" font-size="13" fill="#e2e8f0">个 bug 独立修复</text>
  <text x="744" y="204" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">——但绝非一开始就如此</text>

  <rect x="576" y="236" width="336" height="158" rx="10" fill="#fff" stroke="#e2e8f0" filter="url(#s)"/>
  <text x="600" y="264" font-size="12" font-weight="700" fill="#8b5cf6">把人类注意力当作稀缺资源</text>
  <text x="600" y="292" font-size="11" fill="#475569">· 批量提问，一次性回答</text>
  <text x="600" y="316" font-size="11" fill="#475569">· 重复关键上下文，帮人快速跟上</text>
  <text x="600" y="340" font-size="11" fill="#475569">· 限制每次呈现给人的事项数量</text>
  <text x="600" y="364" font-size="11" fill="#475569">· 设护栏限制每日工作量，审查可持续</text>
  <text x="600" y="384" font-size="10" font-style="italic" fill="#94a3b8">模型升级后需重新测试任务与护栏</text>

  <text x="480" y="448" text-anchor="middle" font-size="11" font-style="italic" fill="#64748b">当人类设定标准、且所有工作可核查时，质量才能长期保持而不偏离原意</text>
</svg>
