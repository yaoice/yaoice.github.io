<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">多人智能体与普通智能体的差异</title>
  <desc id="d">多人智能体拥有独立记忆技能、独立凭证与持续广泛访问，且生活在工作发生的地方。</desc>
  <rect width="960" height="430" fill="#f8fafc" rx="10"/>
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">什么是「多人智能体」：能同时与多人协作的 AI</text>

  <!-- 左：普通 agent -->
  <rect x="48" y="66" width="256" height="300" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <rect x="48" y="66" width="256" height="34" rx="10" fill="#94a3b8"/>
  <text x="176" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">普通智能体</text>
  <text x="176" y="132" text-anchor="middle" font-size="12" fill="#64748b">依附于某一个人</text>
  <text x="176" y="168" text-anchor="middle" font-size="12" fill="#64748b">借用主人的凭证</text>
  <text x="176" y="204" text-anchor="middle" font-size="12" fill="#64748b">上下文随会话消失</text>
  <text x="176" y="240" text-anchor="middle" font-size="12" fill="#64748b">只服务单人单任务</text>
  <rect x="72" y="278" width="208" height="60" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="176" y="304" text-anchor="middle" font-size="11" fill="#475569">换个人协作 = 重头再来</text>
  <text x="176" y="324" text-anchor="middle" font-size="11" fill="#475569">团队上下文被撕裂</text>

  <!-- 中间 vs -->
  <text x="352" y="222" text-anchor="middle" font-size="16" font-weight="700" fill="#94a3b8">VS</text>

  <!-- 右：多人智能体三要素 -->
  <rect x="400" y="66" width="512" height="300" rx="10" fill="#fff" stroke="#dbeafe"/>
  <rect x="400" y="66" width="512" height="34" rx="10" fill="#3b82f6"/>
  <text x="656" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">多人智能体 · 三项关键能力</text>

  <rect x="424" y="120" width="150" height="150" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="499" y="150" text-anchor="middle" font-size="26" fill="#3b82f6">◍</text>
  <text x="499" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">持久记忆</text>
  <text x="499" y="212" text-anchor="middle" font-size="11" fill="#475569">记住目标与技能</text>
  <text x="499" y="232" text-anchor="middle" font-size="11" fill="#475569">据此调整执行</text>

  <rect x="581" y="120" width="150" height="150" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="656" y="150" text-anchor="middle" font-size="26" fill="#3b82f6">⚿</text>
  <text x="656" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">独立凭证</text>
  <text x="656" y="212" text-anchor="middle" font-size="11" fill="#475569">不绑定任何人</text>
  <text x="656" y="232" text-anchor="middle" font-size="11" fill="#475569">在安全护栏内运作</text>

  <rect x="738" y="120" width="150" height="150" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="813" y="150" text-anchor="middle" font-size="26" fill="#3b82f6">⛯</text>
  <text x="813" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">持续广泛访问</text>
  <text x="813" y="212" text-anchor="middle" font-size="11" fill="#475569">了解组织如何运作</text>
  <text x="813" y="232" text-anchor="middle" font-size="11" fill="#475569">并直接执行任务</text>

  <rect x="424" y="290" width="464" height="48" rx="8" fill="#1e293b"/>
  <text x="656" y="319" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">生活在工作真正发生的地方，而不是一个独立的聊天框</text>

  <text x="480" y="404" text-anchor="middle" font-size="11" font-style="italic" fill="#64748b">技术基础只是前提——真正让它跑起来的是共享的工作方式与规范</text>
</svg>
