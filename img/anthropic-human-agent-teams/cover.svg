<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">从单人游戏到多人游戏</title>
  <desc id="d">工作方式从一人一会话，转向人类与多个智能体在同一工作空间协作。</desc>
  <rect width="960" height="400" fill="#f8fafc" rx="10"/>
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">人类设定战略，Claude 执行工作</text>
  <text x="480" y="66" text-anchor="middle" font-size="13" fill="#64748b">工作方式正从「单人游戏」走向「多人游戏」——Anthropic 的人机协作团队实战</text>

  <!-- 左：单人游戏 -->
  <rect x="48" y="96" width="360" height="256" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <rect x="48" y="96" width="360" height="34" rx="10" fill="#475569"/>
  <text x="228" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">过去 · 单人游戏</text>

  <circle cx="120" cy="192" r="22" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="120" y="197" text-anchor="middle" font-size="13" fill="#475569">人</text>
  <line x1="146" y1="192" x2="210" y2="192" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="210,187 220,192 210,197" fill="#94a3b8"/>
  <rect x="224" y="168" width="120" height="48" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="284" y="197" text-anchor="middle" font-size="12" fill="#475569">1 个会话窗口</text>

  <text x="228" y="262" text-anchor="middle" font-size="12" fill="#64748b">1 人 ↔ 1 智能体</text>
  <text x="228" y="284" text-anchor="middle" font-size="12" fill="#64748b">完成单一任务</text>
  <text x="228" y="316" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">上下文困在个人窗口里</text>

  <!-- 中间箭头 -->
  <line x1="416" y1="224" x2="544" y2="224" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="544,217 558,224 544,231" fill="#3b82f6"/>
  <text x="480" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#3b82f6">工作方式转变</text>

  <!-- 右：多人游戏 -->
  <rect x="552" y="96" width="360" height="256" rx="10" fill="#fff" stroke="#dbeafe"/>
  <rect x="552" y="96" width="360" height="34" rx="10" fill="#3b82f6"/>
  <text x="732" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">现在 · 多人游戏</text>

  <rect x="576" y="150" width="312" height="120" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="732" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">同一工作空间（如 Slack）</text>

  <circle cx="632" cy="210" r="16" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="632" y="214" text-anchor="middle" font-size="10" fill="#475569">人</text>
  <circle cx="688" cy="210" r="16" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="688" y="214" text-anchor="middle" font-size="10" fill="#475569">人</text>
  <circle cx="776" cy="210" r="16" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="776" y="214" text-anchor="middle" font-size="9" fill="#1e40af">Agent</text>
  <circle cx="832" cy="210" r="16" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="832" y="214" text-anchor="middle" font-size="9" fill="#1e40af">Agent</text>
  <text x="732" y="252" text-anchor="middle" font-size="10" fill="#64748b">共享名册 · 共享产物 · 共享目标</text>

  <text x="732" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">人类设定战略</text>
  <text x="732" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Claude 执行工作</text>
</svg>
