<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">这些习惯并不新，agent 放大了它们的重要性</title>
  <desc id="d">几十年就已知的健康团队习惯，经过智能体放大后变得更加不可跳过。</desc>
  <rect width="960" height="380" fill="#f8fafc" rx="10"/>
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">没有一条是新的——agent 只是让「不跳过基本功」更重要</text>

  <!-- 左：老习惯 -->
  <rect x="48" y="70" width="300" height="264" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <rect x="48" y="70" width="300" height="32" rx="10" fill="#475569"/>
  <text x="198" y="91" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">几十年就懂的健康团队习惯</text>
  <text x="72" y="140" font-size="12" fill="#1e293b">· 清晰的北极星</text>
  <text x="72" y="176" font-size="12" fill="#1e293b">· 明确的角色</text>
  <text x="72" y="212" font-size="12" fill="#1e293b">· 扎实的文档</text>
  <text x="72" y="248" font-size="12" fill="#1e293b">· 共享的质量标准</text>
  <text x="72" y="284" font-size="12" fill="#1e293b">· 从错误中学习的空间</text>
  <text x="198" y="318" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">对人类而言，早就不新鲜</text>

  <!-- 中：放大器 -->
  <polygon points="392,150 480,120 480,250 392,220" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="436" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">智能体</text>
  <text x="436" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">放大器</text>
  <line x1="348" y1="185" x2="392" y2="185" stroke="#94a3b8" stroke-width="2"/>
  <line x1="480" y1="185" x2="524" y2="185" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="524,178 538,185 524,192" fill="#3b82f6"/>

  <!-- 右：放大后 -->
  <rect x="540" y="70" width="372" height="264" rx="10" fill="#fff" stroke="#dbeafe"/>
  <rect x="540" y="70" width="372" height="32" rx="10" fill="#3b82f6"/>
  <text x="726" y="91" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">被 agent 放大之后</text>
  <text x="726" y="150" text-anchor="middle" font-size="13" fill="#1e293b">跳过基本功的代价</text>
  <text x="726" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">被成倍放大</text>
  <rect x="576" y="208" width="300" height="96" rx="8" fill="#1e293b"/>
  <text x="726" y="242" text-anchor="middle" font-size="12" fill="#e2e8f0">获益最多的团队，正是那些</text>
  <text x="726" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">最有意识践行这些基本原则</text>
  <text x="726" y="292" text-anchor="middle" font-size="12" fill="#e2e8f0">的团队</text>
</svg>
